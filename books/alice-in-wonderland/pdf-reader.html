s the Duchess\u2019s cook. She carried the pepper-box in her hand, and Alice guessed who it was, even before she got into the court, by the way the people near the door began sneezing all at once.</p>\n<p>\u201cGive your evidence,\u201d said the King.</p>\n<p>\u201cShan\u2019t,\u201d said the cook.</p>\n<p>The King looked anxiously at the White Rabbit, who said in a low voice, \u201cYour Majesty must cross-examine <em>this</em> witness.\u201d</p>\n<p>\u201cWell, if I must, I must,\u201d the King said, with a melancholy air, and, after folding his arms and frowning at the cook till his eyes were nearly out of sight, he said in a deep voice, \u201cWhat are tarts made of?\u201d</p>\n<p>\u201cPepper, mostly,\u201d said the cook.</p>\n<p>\u201cTreacle,\u201d said a sleepy voice behind her.</p>\n<p>\u201cCollar that Dormouse,\u201d the Queen shrieked out. \u201cBehead that Dormouse! Turn that Dormouse out of court! Suppress him! Pinch him! Off with his whiskers!\u201d</p>\n<p>For some minutes the whole court was in confusion, getting the Dormouse turned out, and, by the time they had settled down again, the cook had disappeared.</p>\n<p>\u201cNever mind!\u201d said the King, with an air of great relief. \u201cCall the next witness.\u201d And he added in an undertone to the Queen, \u201cReally, my dear, <em>you</em> must cross-examine the next witness. It quite makes my forehead ache!\u201d</p>\n<p>Alice watched the White Rabbit as he fumbled over the list, feeling very curious to see what the next witness would be like, \u201c\u2014for they haven\u2019t got much evidence <em>yet</em>,\u201d she said to herself. Imagine her surprise, when the White Rabbit read out, at the top of his shrill little voice, the name \u201cAlice!\u201d</p>"}, {"num": 12, "title": "Alice's Evidence", "html": "<p>Alice\u2019s Evidence</p>\n<p>\u201cHere!\u201d cried Alice, quite forgetting in the flurry of the moment how large she had grown in the last few minutes, and she jumped up in such a hurry that she tipped over the jury-box with the edge of her skirt, upsetting all the jurymen on to the heads of the crowd below, and there they lay sprawling about, reminding her very much of a globe of goldfish she had accidentally upset the week before.</p>\n<p>\u201cOh, I <em>beg</em> your pardon!\u201d she exclaimed in a tone of great dismay, and began picking them up again as quickly as she could, for the accident of the goldfish kept running in her head, and she had a vague sort of idea that they must be collected at once and put back into the jury-box, or they would die.</p>\n<p>\u201cThe trial cannot proceed,\u201d said the King in a very grave voice, \u201cuntil all the jurymen are back in their proper places\u2014<em>all</em>,\u201d he repeated with great emphasis, looking hard at Alice as he said so.</p>\n<p>Alice looked at the jury-box, and saw that, in her haste, she had put the Lizard in head downwards, and the poor little thing was waving its tail about in a melancholy way, being quite unable to move. She soon got it out again, and put it right; \u201cnot that it signifies much,\u201d she said to herself; \u201cI should think it would be <em>quite</em> as much use in the trial one way up as the other.\u201d</p>\n<p>As soon as the jury had a little recovered from the shock of being upset, and their slates and pencils had been found and handed back to them, they set to work very diligently to write out a history of the accident, all except the Lizard, who seemed too much overcome to do anything but sit with its mouth open, gazing up into the roof of the court.</p>\n<p>\u201cWhat do you know about this business?\u201d the King said to Alice.</p>\n<p>\u201cNothing,\u201d said Alice.</p>\n<p>\u201cNothing <em>whatever?</em>\u201d persisted the King.</p>\n<p>\u201cNothing whatever,\u201d said Alice.</p>\n<p>\u201cThat\u2019s very important,\u201d the King said, turning to the jury. They were just beginning to write this down on their slates, when the White Rabbit interrupted: \u201c<em>Un</em>important, your Majesty means, of course,\u201d he said in a very respectful tone, but frowning and making faces at him as he spoke.</p>\n<p>\u201c<em>Un</em>important, of course, I meant,\u201d the King hastily said, and went on to himself in an undertone,</p>\n<p>\u201cimportant\u2014unimportant\u2014unimportant\u2014important\u2014\u201d as if he were trying which word sounded best.</p>\n<p>Some of the jury wrote it down \u201cimportant,\u201d and some \u201cunimportant.\u201d Alice could see this, as she was near enough to look over their slates; \u201cbut it doesn\u2019t matter a bit,\u201d she thought to herself.</p>\n<p>At this moment the King, who had been for some time busily writing in his note-book, cackled out \u201cSilence!\u201d and read out from his book, \u201cRule Forty-two. <em>All persons more than a mile high to leave the court</em>.\u201d</p>\n<p>Everybody looked at Alice.</p>\n<p>\u201c<em>I\u2019m</em> not a mile high,\u201d said Alice.</p>\n<p>\u201cYou are,\u201d said the King.</p>\n<p>\u201cNearly two miles high,\u201d added the Queen.</p>\n<p>\u201cWell, I shan\u2019t go, at any rate,\u201d said Alice: \u201cbesides, that\u2019s not a regular rule: you invented it just now.\u201d</p>\n<p>\u201cIt\u2019s the oldest rule in the book,\u201d said the King.</p>\n<p>\u201cThen it ought to be Number One,\u201d said Alice.</p>\n<p>The King turned pale, and shut his note-book hastily. \u201cConsider your verdict,\u201d he said to the jury, in a low, trembling voice.</p>\n<p>\u201cThere\u2019s more evidence to come yet, please your Majesty,\u201d said the White Rabbit, jumping up in a great hurry; \u201cthis paper has just been picked up.\u201d</p>\n<p>\u201cWhat\u2019s in it?\u201d said the Queen.</p>\n<p>\u201cI haven\u2019t opened it yet,\u201d said the White Rabbit, \u201cbut it seems to be a letter, written by the prisoner to\u2014to somebody.\u201d</p>\n<p>\u201cIt must have been that,\u201d said the King, \u201cunless it was written to nobody, which isn\u2019t usual, you know.\u201d</p>\n<p>\u201cWho is it directed to?\u201d said one of the jurymen.</p>\n<p>\u201cIt isn\u2019t directed at all,\u201d said the White Rabbit; \u201cin fact, there\u2019s nothing written on the <em>outside</em>.\u201d He unfolded the paper as he spoke, and added \u201cIt isn\u2019t a letter, after all: it\u2019s a set of verses.\u201d</p>\n<p>\u201cAre they in the prisoner\u2019s handwriting?\u201d asked another of the jurymen.</p>\n<p>\u201cNo, they\u2019re not,\u201d said the White Rabbit, \u201cand that\u2019s the queerest thing about it.\u201d (The jury all looked puzzled.)</p>\n<p>\u201cHe must have imitated somebody else\u2019s hand,\u201d said the King. (The jury all brightened up again.)</p>\n<p>\u201cPlease your Majesty,\u201d said the Knave, \u201cI didn\u2019t write it, and they can\u2019t prove I did: there\u2019s no name signed at the end.\u201d</p>\n<p>\u201cIf you didn\u2019t sign it,\u201d said the King, \u201cthat only makes the matter worse. You <em>must</em> have meant some mischief, or else you\u2019d have signed your name like an honest man.\u201d</p>\n<p>There was a general clapping of hands at this: it was the first really clever thing the King had said that day.</p>\n<p>\u201cThat <em>proves</em> his guilt,\u201d said the Queen.</p>\n<p>\u201cIt proves nothing of the sort!\u201d said Alice. \u201cWhy, you don\u2019t even know what they\u2019re about!\u201d</p>\n<p>\u201cRead them,\u201d said the King.</p>\n<p>The White Rabbit put on his spectacles. \u201cWhere shall I begin, please your Majesty?\u201d he asked.</p>\n<p>\u201cBegin at the beginning,\u201d the King said gravely, \u201cand go on till you come to the end: then stop.\u201d</p>\n<p>These were the verses the White Rabbit read:\u2014</p>\n<p>\u201cThey told me you had been to her, And mentioned me to him: She gave me a good character, But said I could not swim.</p>\n<p>He sent them word I had not gone (We know it to be true): If she should push the matter on, What would become of you?</p>\n<p>I gave her one, they gave him two, You gave us three or more; They all returned from him to you, Though they were mine before.</p>\n<p>If I or she should chance to be Involved in this affair, He trusts to you to set them free, Exactly as we were.</p>\n<p>My notion was that you had been (Before she had this fit) An obstacle that came between Him, and ourselves, and it.</p>\n<p>Don\u2019t let him know she liked them best, For this must ever be A secret, kept from all the rest, Between yourself and me.\u201d</p>\n<p>\u201cThat\u2019s the most important piece of evidence we\u2019ve heard yet,\u201d said the King, rubbing his hands; \u201cso now let the jury\u2014\u201d</p>\n<p>\u201cIf any one of them can explain it,\u201d said Alice, (she had grown so large in the last few minutes that she wasn\u2019t a bit afraid of interrupting him,) \u201cI\u2019ll give him sixpence. <em>I</em> don\u2019t believe there\u2019s an atom of meaning in it.\u201d</p>\n<p>The jury all wrote down on their slates, \u201c<em>She</em> doesn\u2019t believe there\u2019s an atom of meaning in it,\u201d but none of them attempted to explain the paper.</p>\n<p>\u201cIf there\u2019s no meaning in it,\u201d said the King, \u201cthat saves a world of trouble, you know, as we needn\u2019t try to find any. And yet I don\u2019t know,\u201d he went on, spreading out the verses on his knee, and looking at them with one eye; \u201cI seem to see some meaning in them, after all. \u201c\u2014<em>said I could not swim</em>\u2014\u201d you can\u2019t swim, can you?\u201d he added, turning to the Knave.</p>\n<p>The Knave shook his head sadly. \u201cDo I look like it?\u201d he said. (Which he certainly did <em>not</em>, being made entirely of cardboard.)</p>\n<p>\u201cAll right, so far,\u201d said the King, and he went on muttering over the verses to himself: \u201c\u2018<em>We know it to be true</em>\u2014\u2019 that\u2019s the jury, of course\u2014\u2018<em>I gave her one, they gave him two</em>\u2014\u2019 why, that must be what he did with the tarts, you know\u2014\u201d</p>\n<p>\u201cBut, it goes on \u2018<em>they all returned from him to you</em>,\u2019\u201d said Alice.</p>\n<p>\u201cWhy, there they are!\u201d said the King triumphantly, pointing to the tarts on the table. \u201cNothing can be clearer than <em>that</em>. Then again\u2014\u2018<em>before she had this fit</em>\u2014\u2019 you never had fits, my dear, I think?\u201d he said to the Queen.</p>\n<p>\u201cNever!\u201d said the Queen furiously, throwing an inkstand at the Lizard as she spoke. (The unfortunate little Bill had left off writing on his slate with one finger, as he found it made no mark; but he now hastily began again, using the ink, that was trickling down his face, as long as it lasted.)</p>\n<p>\u201cThen the words don\u2019t <em>fit</em> you,\u201d said the King, looking round the court with a smile. There was a dead silence.</p>\n<p>\u201cIt\u2019s a pun!\u201d the King added in an offended tone, and everybody laughed, \u201cLet the jury consider their verdict,\u201d the King said, for about the twentieth time that day.</p>\n<p>\u201cNo, no!\u201d said the Queen. \u201cSentence first\u2014verdict afterwards.\u201d</p>\n<p>\u201cStuff and nonsense!\u201d said Alice loudly. \u201cThe idea of having the sentence first!\u201d</p>\n<p>\u201cHold your tongue!\u201d said the Queen, turning purple.</p>\n<p>\u201cI won\u2019t!\u201d said Alice.</p>\n<p>\u201cOff with her head!\u201d the Queen shouted at the top of her voice. Nobody moved.</p>\n<p>\u201cWho cares for you?\u201d said Alice, (she had grown to her full size by this time.) \u201cYou\u2019re nothing but a pack of cards!\u201d</p>\n<p>At this the whole pack rose up into the air, and came flying down upon her: she gave a little scream, half of fright and half of anger, and tried to beat them off, and found herself lying on the bank, with her head in the lap of her sister, who was gently brushing away some dead leaves that had fluttered down from the trees upon her face.</p>\n<p>\u201cWake up, Alice dear!\u201d said her sister; \u201cWhy, what a long sleep you\u2019ve had!\u201d</p>\n<p>\u201cOh, I\u2019ve had such a curious dream!\u201d said Alice, and she told her sister, as well as she could remember them, all these strange Adventures of hers that you have just been reading about; and when she had finished, her sister kissed her, and said, \u201cIt <em>was</em> a curious dream, dear, certainly: but now run in to your tea; it\u2019s getting late.\u201d So Alice got up and ran off, thinking while she ran, as well she might, what a wonderful dream it had been.</p>\n<p>But her sister sat still just as she left her, leaning her head on her hand, watching the setting sun, and thinking of little Alice and all her wonderful Adventures, till she too began dreaming after a fashion, and this was her dream:\u2014</p>\n<p>First, she dreamed of little Alice herself, and once again the tiny hands were clasped upon her knee, and the bright eager eyes were looking up into hers\u2014she could hear the very tones of her voice, and see that queer little toss of her head to keep back the wandering hair that <em>would</em> always get into her eyes\u2014and still as she listened, or seemed to listen, the whole place around her became alive with the strange creatures of her little sister\u2019s dream.</p>\n<p>The long grass rustled at her feet as the White Rabbit hurried by\u2014the frightened Mouse splashed his way through the neighbouring pool\u2014she could hear the rattle of the teacups as the March Hare and his friends shared their never-ending meal, and the shrill voice of the Queen ordering off her unfortunate guests to execution\u2014once more the pig-baby was sneezing on the Duchess\u2019s knee, while plates and dishes crashed around it\u2014once more the shriek of the Gryphon, the squeaking of the Lizard\u2019s slate-pencil, and the choking of the suppressed guinea-pigs, filled the air, mixed up with the distant sobs of the miserable Mock Turtle.</p>\n<p>So she sat on, with closed eyes, and half believed herself in Wonderland, though she knew she had but to open them again, and all would change to dull reality\u2014the grass would be only rustling in the wind, and the pool rippling to the waving of the reeds\u2014the rattling teacups would change to tinkling sheep-bells, and the Queen\u2019s shrill cries to the voice of the shepherd boy\u2014and the sneeze of the baby, the shriek of the Gryphon, and all the other queer noises, would change (she knew) to the confused clamour of the busy farm-yard\u2014while the lowing of the cattle in the distance would take the place of the Mock Turtle\u2019s heavy sobs.</p>\n<p>Lastly, she pictured to herself how this same little sister of hers would, in the after-time, be herself a grown woman; and how she would keep, through all her riper years, the simple and loving heart of her childhood: and how she would gather about her other little children, and make <em>their</em> eyes bright and eager with many a strange tale, perhaps even with the dream of Wonderland of long ago: and how she would feel with all their simple sorrows, and find a pleasure in all their simple joys, remembering her own child-life, and the happy summer days.</p>\n<p>THE END</p>"}];

// ===== STATE =====
let pages = [];
let currentPage = 0;
let sidebarOpen = false;
let zoomLevel = 100;
let fontMode = 0; // 0=serif, 1=sans, 2=mono
let darkMode = false;
let twoPageMode = false;

// ===== PAGINATION =====
function paginateContent() {
  pages = [];

  // Page 0: Cover
  pages.push({
    type: 'cover',
    html: `<div class="cover-page">
      <div class="ornament">\u2756</div>
      <h1>Alice\u2019s Adventures<br>in Wonderland</h1>
      <div class="author">Lewis Carroll</div>
      <div class="ornament">\u2756</div>
    </div>`
  });

  // Page 1: TOC
  let tocHtml = '<div class="toc-page"><h1>Table of Contents</h1><ul class="toc-list">';
  let pageOffset = 2;
  const chapterStartPages = [];

  // Pre-calculate chapter start pages for TOC
  CHAPTERS.forEach((ch, i) => {
    chapterStartPages.push(pageOffset);
    const tmpPages = splitChapterIntoPages(ch);
    pageOffset += tmpPages.length;
  });

  CHAPTERS.forEach((ch, i) => {
    tocHtml += `<li onclick="goToPage(${chapterStartPages[i]})">`
      + `<span>Chapter ${ch.num}. ${ch.title}</span>`
      + `<span class="toc-page-num">${chapterStartPages[i] + 1}</span></li>`;
  });
  tocHtml += '</ul></div>';
  pages.push({ type: 'toc', html: tocHtml });

  // Content pages
  CHAPTERS.forEach((ch, i) => {
    const chPages = splitChapterIntoPages(ch);
    chPages.forEach((html, j) => {
      pages.push({
        type: 'content',
        chapter: i,
        chapterPage: j,
        chapterTitle: ch.title,
        chapterNum: ch.num,
        isChapterStart: j === 0,
        html: html
      });
    });
  });
}

function splitChapterIntoPages(chapter) {
  // Parse HTML into paragraphs, then group into pages by estimated height
  const tmp = document.createElement('div');
  tmp.innerHTML = chapter.html;
  const elements = Array.from(tmp.children);

  const result = [];
  let currentPageHtml = `<h1>Chapter ${chapter.num}</h1><h2>${chapter.title}</h2>`;
  let lineEstimate = 6; // header takes ~6 lines
  const linesPerPage = getEffectiveLinesPerPage();

  elements.forEach(el => {
    const text = el.textContent || '';
    const estLines = Math.ceil(text.length / getCharsPerLine()) + 1;

    if (lineEstimate + estLines > linesPerPage && lineEstimate > 6) {
      result.push(currentPageHtml);
      currentPageHtml = '';
      lineEstimate = 0;
    }
    currentPageHtml += el.outerHTML;
    lineEstimate += estLines;
  });

  if (currentPageHtml) result.push(currentPageHtml);
  return result;
}

function getCharsPerLine() {
  // Approximate chars per line based on zoom
  const base = 65;
  return Math.round(base * (100 / zoomLevel));
}

function getEffectiveLinesPerPage() {
  // Approximate lines per page based on zoom
  const base = 32;
  return Math.round(base * (100 / zoomLevel));
}

// ===== RENDERING =====
function renderPage() {
  const page = pages[currentPage];
  if (!page) return;

  const inner = document.getElementById('pageInner');

  if (page.type === 'cover' || page.type === 'toc') {
    inner.innerHTML = page.html;
  } else {
    inner.innerHTML = page.html + `<div class="page-number">${currentPage + 1}</div>`;
  }

  // Render second page in two-page mode
  const inner2 = document.getElementById('pageInner2');
  const secondPageIdx = currentPage + 1;
  if (twoPageMode && secondPageIdx < pages.length) {
    const page2 = pages[secondPageIdx];
    if (page2.type === 'cover' || page2.type === 'toc') {
      inner2.innerHTML = page2.html;
    } else {
      inner2.innerHTML = page2.html + `<div class="page-number">${secondPageIdx + 1}</div>`;
    }
  } else if (twoPageMode) {
    inner2.innerHTML = '';
  }

  // Update toolbar
  if (twoPageMode && secondPageIdx < pages.length) {
    document.getElementById('pageInput').value = (currentPage + 1) + '\u2013' + (secondPageIdx + 1);
    document.getElementById('pageTotal').textContent = `/ ${pages.length}`;
  } else {
    document.getElementById('pageInput').value = currentPage + 1;
    document.getElementById('pageTotal').textContent = `/ ${pages.length}`;
  }

  // Update chapter select
  if (page.chapter !== undefined) {
    document.getElementById('chapterSelect').value = page.chapter;
  } else {
    document.getElementById('chapterSelect').value = '';
  }

  // Update sidebar highlight
  document.querySelectorAll('.thumb').forEach((t, i) => {
    const isVisible = i === currentPage || (twoPageMode && i === secondPageIdx && secondPageIdx < pages.length);
    t.classList.toggle('current', isVisible);
  });

  // Scroll sidebar to current
  const currentThumb = document.querySelector('.thumb.current');
  if (currentThumb) {
    currentThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  pages.forEach((page, i) => {
    const wrapper = document.createElement('div');

    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === currentPage ? ' current' : '');
    thumb.onclick = () => goToPage(i);

    let label = '';
    if (page.type === 'cover') {
      thumb.textContent = 'Cover';
      label = 'Cover';
    } else if (page.type === 'toc') {
      thumb.textContent = 'TOC';
      label = 'Contents';
    } else {
      thumb.textContent = i + 1;
      if (page.isChapterStart) {
        label = `Ch. ${page.chapterNum}`;
      }
    }

    wrapper.appendChild(thumb);
    if (label) {
      const lbl = document.createElement('div');
      lbl.className = 'thumb-label';
      lbl.textContent = label;
      wrapper.appendChild(lbl);
    }
    sidebar.appendChild(wrapper);
  });
}

function populateChapterSelect() {
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = '<option value="">-- Chapter --</option>';
  CHAPTERS.forEach((ch, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${ch.num}. ${ch.title}`;
    sel.appendChild(opt);
  });
}

// ===== PAGE SIZE =====
function resizePageCard() {
  const vp = document.getElementById('viewport');
  const card = document.getElementById('pageCard');
  const card2 = document.getElementById('pageCard2');
  const vpH = vp.clientHeight - 32; // padding
  const vpW = vp.clientWidth - 32;

  // US Letter aspect ratio 8.5:11
  const ratio = 8.5 / 11;

  if (twoPageMode) {
    // Two cards side by side with a 10px gap
    const availW = (vpW - 10) / 2;
    let h = vpH;
    let w = h * ratio;
    if (w > availW) { w = availW; h = w / ratio; }
    if (w > 650) { w = 650; h = w / ratio; }
    card.style.width = w + 'px';
    card.style.height = h + 'px';
    card2.style.width = w + 'px';
    card2.style.height = h + 'px';
  } else {
    let h = vpH;
    let w = h * ratio;
    if (w > vpW) { w = vpW; h = w / ratio; }
    if (w > 750) { w = 750; h = w / ratio; }
    card.style.width = w + 'px';
    card.style.height = h + 'px';
  }
}

// ===== NAVIGATION =====
function goToPage(n) {
  if (n < 0) n = 0;
  if (n >= pages.length) n = pages.length - 1;
  if (n === currentPage) return;
  currentPage = n;
  renderPage();
}

function nextPage() { goToPage(currentPage + (twoPageMode ? 2 : 1)); }
function prevPage() { goToPage(currentPage - (twoPageMode ? 2 : 1)); }

function goToChapter(chapterIndex) {
  const idx = pages.findIndex(p => p.chapter === chapterIndex && p.isChapterStart);
  if (idx >= 0) goToPage(idx);
}

// ===== ZOOM =====
const ZOOM_LEVELS = [75, 100, 125, 150];
function setZoom(level) {
  zoomLevel = level;
  document.getElementById('zoomLabel').textContent = level + '%';
  const body = document.body;
  ZOOM_LEVELS.forEach(z => body.classList.remove('zoom-' + z));
  body.classList.add('zoom-' + level);

  // Re-paginate at new zoom
  const oldChapter = pages[currentPage]?.chapter;
  const oldChapterPage = pages[currentPage]?.chapterPage || 0;
  paginateContent();
  renderSidebar();

  // Try to stay near the same place
  if (oldChapter !== undefined) {
    const idx = pages.findIndex(p => p.chapter === oldChapter && p.chapterPage === Math.min(oldChapterPage, 999));
    if (idx >= 0) { currentPage = idx; }
    else {
      const chStart = pages.findIndex(p => p.chapter === oldChapter);
      if (chStart >= 0) currentPage = chStart;
    }
  }
  renderPage();
}

// ===== FONT / THEME =====
const FONT_MODES = ['', 'font-sans', 'font-mono'];
const FONT_LABELS = ['Serif', 'Sans', 'Mono'];
function cycleFont() {
  document.body.classList.remove(FONT_MODES[fontMode]);
  fontMode = (fontMode + 1) % FONT_MODES.length;
  if (FONT_MODES[fontMode]) document.body.classList.add(FONT_MODES[fontMode]);
  document.getElementById('fontToggle').textContent = FONT_LABELS[fontMode];

  // Re-paginate
  const savedPage = currentPage;
  paginateContent();
  renderSidebar();
  currentPage = Math.min(savedPage, pages.length - 1);
  renderPage();
}

function toggleTheme() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
}

function toggleTwoPageMode() {
  twoPageMode = !twoPageMode;
  document.body.classList.toggle('two-page-mode', twoPageMode);
  document.getElementById('twoPageToggle').textContent = twoPageMode ? '2pg' : '1pg';
  document.getElementById('twoPageToggle').classList.toggle('active', twoPageMode);
  // Widen page input for range display
  document.getElementById('pageInput').style.width = twoPageMode ? '62px' : '42px';
  resizePageCard();
  renderPage();
}

// ===== SIDEBAR =====
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('viewport').classList.toggle('sidebar-open', sidebarOpen);
  document.getElementById('sidebarToggle').classList.toggle('active', sidebarOpen);
  setTimeout(resizePageCard, 220);
}

// ===== EVENTS =====
function init() {
  populateChapterSelect();
  paginateContent();
  renderSidebar();
  resizePageCard();
  document.body.classList.add('zoom-100');
  renderPage();

  // Toolbar
  document.getElementById('sidebarToggle').onclick = toggleSidebar;
  document.getElementById('prevBtn').onclick = prevPage;
  document.getElementById('nextBtn').onclick = nextPage;
  document.getElementById('navLeft').onclick = prevPage;
  document.getElementById('navRight').onclick = nextPage;
  document.getElementById('fontToggle').onclick = cycleFont;
  document.getElementById('themeToggle').onclick = toggleTheme;
  document.getElementById('twoPageToggle').onclick = toggleTwoPageMode;

  document.getElementById('zoomIn').onclick = () => {
    const i = ZOOM_LEVELS.indexOf(zoomLevel);
    if (i < ZOOM_LEVELS.length - 1) setZoom(ZOOM_LEVELS[i + 1]);
  };
  document.getElementById('zoomOut').onclick = () => {
    const i = ZOOM_LEVELS.indexOf(zoomLevel);
    if (i > 0) setZoom(ZOOM_LEVELS[i - 1]);
  };

  document.getElementById('chapterSelect').onchange = function() {
    if (this.value !== '') goToChapter(parseInt(this.value));
  };

  document.getElementById('pageInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const n = parseInt(this.value);
      if (n >= 1 && n <= pages.length) goToPage(n - 1);
      else renderPage(); // reset display
      this.blur();
    }
  });

  // Keyboard nav
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    switch (e.key) {
      case 'ArrowRight': case 'PageDown': nextPage(); e.preventDefault(); break;
      case 'ArrowLeft': case 'PageUp': prevPage(); e.preventDefault(); break;
      case 'Home': goToPage(0); e.preventDefault(); break;
      case 'End': goToPage(pages.length - 1); e.preventDefault(); break;
    }
  });

  // Scroll on page cards
  document.getElementById('pageCard').addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY > 0) nextPage();
    else if (e.deltaY < 0) prevPage();
  }, { passive: false });
  document.getElementById('pageCard2').addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY > 0) nextPage();
    else if (e.deltaY < 0) prevPage();
  }, { passive: false });

  // Resize
  window.addEventListener('resize', () => {
    resizePageCard();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
