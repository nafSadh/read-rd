<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; overflow: hidden; }
body { font-family: 'EB Garamond', 'Georgia', serif; font-size: 17px; line-height: 1.65; }

/* ===== THEME VARIABLES ===== */
:root {
  --bg-left: #f0eee8;
  --bg-right: #f6f4f0;
  --text: #1e2a3a;
  --text-muted: #6a7a8a;
  --spine: #d0d4da;
  --shadow-left: rgba(0,0,0,0.06);
  --shadow-right: rgba(0,0,0,0.04);
  --accent: #1a4a7a;
  --border: #d0d4da;
  --control-bg: rgba(240,238,232,0.92);
  --control-border: rgba(0,0,0,0.1);
  --drop-cap-color: #1a4a7a;
  --ch-title: #0a2a4a;
}
body.dark {
  --bg-left: #0c1018;
  --bg-right: #10141e;
  --text: #9aa8b8;
  --text-muted: #4a5a6a;
  --spine: #1a2838;
  --shadow-left: rgba(0,0,0,0.3);
  --shadow-right: rgba(0,0,0,0.2);
  --accent: #4a8acc;
  --border: #1a2838;
  --control-bg: rgba(12,16,24,0.92);
  --control-border: rgba(26,40,56,0.5);
  --drop-cap-color: #4a8acc;
  --ch-title: #88b0d8;
}

/* ===== BOOK SPREAD ===== */
#book {
  width: 100vw; height: 100vh;
  display: flex; position: relative;
  perspective: 1800px;
}
.page-half {
  width: 50%; height: 100%;
  position: relative; overflow: hidden;
}
#left-half { background: var(--bg-left); }
#right-half { background: var(--bg-right); }

/* Spine line */
#book::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 1px; background: var(--spine);
  z-index: 5; pointer-events: none;
}

/* Inner edge shadow gradients (toward spine) */
#left-half::after {
  content: ''; position: absolute;
  top: 0; right: 0; width: 40px; height: 100%;
  background: linear-gradient(to left, var(--shadow-left), transparent);
  pointer-events: none; z-index: 2;
}
#right-half::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 40px; height: 100%;
  background: linear-gradient(to right, var(--shadow-right), transparent);
  pointer-events: none; z-index: 2;
}

/* ===== PAGE CONTENT AREA ===== */
.page-content {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 48px 40px 60px;
  color: var(--text);
  position: relative;
}
.page-inner {
  max-width: 560px; width: 100%;
  flex: 1; overflow: hidden;
  text-align: justify;
  hyphens: auto;
  -webkit-hyphens: auto;
}
.page-number {
  position: absolute; bottom: 24px;
  font-family: 'Jost', sans-serif;
  font-size: 13px; color: var(--text-muted);
  letter-spacing: 0.5px;
}
#left-half .page-number { left: 50%; transform: translateX(-50%); }
#right-half .page-number { left: 50%; transform: translateX(-50%); }

/* ===== CHAPTER HEADERS ===== */
.chapter-header {
  text-align: center;
  margin-bottom: 28px;
  padding-top: 60px;
}
.chapter-header .chapter-num {
  font-family: 'Jost', sans-serif;
  font-size: 12px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.chapter-header .chapter-title {
  font-size: 26px; font-weight: 600;
  line-height: 1.3; margin-bottom: 16px;
  color: var(--ch-title);
}
.chapter-header .ornament {
  display: block; text-align: center;
  color: var(--text-muted); font-size: 18px;
  letter-spacing: 8px;
}

/* ===== DROP CAP ===== */
.drop-cap::first-letter {
  float: left;
  font-size: 3.5em;
  line-height: 0.8;
  padding-right: 8px;
  padding-top: 4px;
  font-weight: 600;
  color: var(--drop-cap-color);
}

/* ===== TYPOGRAPHY INSIDE PAGES ===== */
.page-inner p { margin-bottom: 0.6em; text-indent: 1.5em; }
.page-inner p:first-child { text-indent: 0; }
.page-inner .chapter-header + p { text-indent: 0; }

/* ===== COVER ===== */
#cover-spread {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: linear-gradient(135deg, #0a1e3a 0%, #061428 100%);
  color: #d0d8e8; z-index: 10;
  text-align: center;
}
body.dark #cover-spread {
  background: linear-gradient(135deg, #061428 0%, #040c1a 100%);
}
#cover-spread .cover-title {
  font-size: 48px; font-weight: 700;
  line-height: 1.2; margin-bottom: 12px;
  letter-spacing: 1px;
}
#cover-spread .cover-author {
  font-family: 'Jost', sans-serif;
  font-size: 18px; font-weight: 300;
  letter-spacing: 4px; text-transform: uppercase;
  color: #6a9ad0; margin-bottom: 40px;
}
#cover-spread .cover-ornament {
  font-size: 24px; letter-spacing: 12px;
  color: #4a7ab0; margin-bottom: 40px;
}
#cover-spread .cover-hint {
  font-family: 'Jost', sans-serif;
  font-size: 13px; color: #4a7ab0;
  letter-spacing: 1px;
}

/* ===== TITLE PAGE ===== */
.title-page {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; text-align: center;
}
.title-page h1 {
  font-size: 36px; font-weight: 700;
  line-height: 1.3; margin-bottom: 16px;
}
.title-page .subtitle {
  font-family: 'Jost', sans-serif;
  font-size: 15px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 32px;
}
.title-page .pub-ornament {
  font-size: 20px; letter-spacing: 10px;
  color: var(--text-muted); margin-bottom: 32px;
}
.title-page .pub-info {
  font-family: 'Jost', sans-serif;
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase;
}

/* ===== TOC ===== */
.toc-page { padding-top: 20px; }
.toc-page h2 {
  text-align: center; font-size: 22px;
  font-weight: 600; margin-bottom: 24px;
  letter-spacing: 1px;
}
.toc-page .toc-list { list-style: none; }
.toc-page .toc-list li {
  display: flex; justify-content: space-between;
  align-items: baseline; padding: 6px 0;
  border-bottom: 1px dotted var(--spine);
  cursor: pointer; transition: color 0.2s;
}
.toc-page .toc-list li:hover { color: var(--accent); }
.toc-page .toc-list .toc-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; color: var(--text-muted);
  min-width: 28px;
}
.toc-page .toc-list .toc-title { flex: 1; margin: 0 8px; }
.toc-page .toc-list .toc-page-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; color: var(--text-muted);
}

/* ===== FLIP OVERLAY ===== */
.flip-overlay {
  position: absolute; top: 0;
  width: 50%; height: 100%;
  transform-style: preserve-3d;
  z-index: 20;
  pointer-events: none;
}
.flip-overlay.right-flip {
  right: 0;
  transform-origin: left center;
}
.flip-overlay.left-flip {
  left: 0;
  transform-origin: right center;
}
.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.flip-face.front { z-index: 2; }
.flip-face.back {
  transform: rotateY(180deg);
  z-index: 1;
}

/* Inner shadow on flip faces */
.flip-face::after {
  content: ''; position: absolute;
  top: 0; width: 40px; height: 100%;
  pointer-events: none; z-index: 3;
}
.right-flip .flip-face.front::after {
  left: 0;
  background: linear-gradient(to right, var(--shadow-right), transparent);
}
.right-flip .flip-face.back::after {
  right: 0;
  background: linear-gradient(to left, var(--shadow-left), transparent);
}
.left-flip .flip-face.front::after {
  right: 0;
  background: linear-gradient(to left, var(--shadow-left), transparent);
}
.left-flip .flip-face.back::after {
  left: 0;
  background: linear-gradient(to right, var(--shadow-right), transparent);
}

/* ===== CONTROLS ===== */
#controls {
  position: fixed; bottom: 20px;
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px;
  background: var(--control-bg);
  border: 1px solid var(--control-border);
  border-radius: 24px;
  padding: 8px 20px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  opacity: 0.15;
  transition: opacity 0.3s;
  z-index: 50;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#controls:hover { opacity: 1; }
#controls button {
  background: none; border: none;
  color: var(--text); cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 14px; padding: 4px 10px;
  border-radius: 12px;
  transition: background 0.2s;
}
#controls button:hover { background: var(--control-border); }
#page-indicator {
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; min-width: 60px;
  text-align: center;
}
#chapter-select {
  background: transparent;
  border: 1px solid var(--control-border);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-size: 12px; padding: 3px 8px;
  border-radius: 8px; cursor: pointer;
  max-width: 180px;
}
#theme-toggle {
  font-size: 16px !important;
  padding: 2px 8px !important;
}

/* ===== CLICK ZONES ===== */
.click-zone {
  position: absolute; top: 0; width: 50%; height: 100%;
  z-index: 8; cursor: pointer;
}
#click-left { left: 0; }
#click-right { right: 0; }

/* ===== HIDDEN MEASURE DIV ===== */
#measure-box {
  position: absolute; top: -9999px; left: -9999px;
  visibility: hidden; pointer-events: none;
}
.measure-content {
  width: 560px;
  font-family: 'EB Garamond', 'Georgia', serif;
  font-size: 17px; line-height: 1.65;
  text-align: justify; hyphens: auto;
  -webkit-hyphens: auto;
}
.measure-content p { margin-bottom: 0.6em; text-indent: 1.5em; }
.measure-content p:first-child { text-indent: 0; }
</style>
</head>

const CHAPTERS = [{"num": 1, "title": "Down the Rabbit-Hole", "html": "<p>Alice was beginning to get very tired of sitting by her sister on the bank, and of having nothing to do: once or twice she had peeped into the book her sister was reading, but it had no pictures or conversations in it, “and what is the use of a book,” thought Alice “without pictures or conversations?”</p>\n<p>So she was considering in her own mind (as well as she could, for the hot day made her feel very sleepy and stupid), whether the pleasure of making a daisy-chain would be worth the trouble of getting up and picking the daisies, when suddenly a White Rabbit with pink eyes ran close by her.</p>\n<p>There was nothing so <em>very</em> remarkable in that; nor did Alice think it so <em>very</em> much out of the way to hear the Rabbit say to itself, “Oh dear! Oh dear! I shall be late!” (when she thought it over afterwards, it occurred to her that she ought to have wondered at this, but at the time it all seemed quite natural); but when the Rabbit actually <em>took a watch out of its waistcoat-pocket</em>, and looked at it, and then hurried on, Alice started to her feet, for it flashed across her mind that she had never before seen a rabbit with either a waistcoat-pocket, or a watch to take out of it, and burning with curiosity, she ran across the field after it, and fortunately was just in time to see it pop down a large rabbit-hole under the hedge.</p>\n<p>In another moment down went Alice after it, never once considering how in the world she was to get out again.</p>\n<p>The rabbit-hole went straight on like a tunnel for some way, and then dipped suddenly down, so suddenly that Alice had not a moment to think about stopping herself before she found herself falling down a very deep well.</p>\n<p>Either the well was very deep, or she fell very slowly, for she had plenty of time as she went down to look about her and to wonder what was going to happen next. First, she tried to look down and make out what she was coming to, but it was too dark to see anything; then she looked at the sides of the well, and noticed that they were filled with cupboards and book-shelves; here and there she saw maps and pictures hung upon pegs. She took down a jar from one of the shelves as she passed; it was labelled “ORANGE MARMALADE”, but to her great disappointment it was empty: she did not like to drop the jar for fear of killing somebody underneath, so managed to put it into one of the cupboards as she fell past it.</p>\n<p>“Well!” thought Alice to herself, “after such a fall as this, I shall think nothing of tumbling down stairs! How brave they’ll all think me at home! Why, I wouldn’t say anything about it, even if I fell off the top of the house!” (Which was very likely true.)</p>\n<p>Down, down, down. Would the fall <em>never</em> come to an end? “I wonder how many miles I’ve fallen by this time?” she said aloud. “I must be getting somewhere near the centre of the earth. Let me see: that would be four thousand miles down, I think—” (for, you see, Alice had learnt several things of this sort in her lessons in the schoolroom, and though this was not a <em>very</em> good opportunity for showing off her knowledge, as there was no one to listen to her, still it was good practice to say it over) “—yes, that’s about the right distance—but then I wonder what Latitude or Longitude I’ve got to?” (Alice had no idea what Latitude was, or Longitude either, but thought they were nice grand words to say.)</p>\n<p>Presently she began again. “I wonder if I shall fall right <em>through</em> the earth! How funny it’ll seem to come out among the people that walk with their heads downward! The Antipathies, I think—” (she was rather glad there <em>was</em> no one listening, this time, as it didn’t sound at all the right word) “—but I shall have to ask them what the name of the country is, you know. Please, Ma’am, is this New Zealand or Australia?” (and she tried to curtsey as she spoke—fancy <em>curtseying</em> as you’re falling through the air! Do you think you could manage it?) “And what an ignorant little girl she’ll think me for asking! No, it’ll never do to ask: perhaps I shall see it written up somewhere.”</p>\n<p>Down, down, down. There was nothing else to do, so Alice soon began talking again. “Dinah’ll miss me very much to-night, I should think!” (Dinah was the cat.) “I hope they’ll remember her saucer of milk at tea-time. Dinah my dear! I wish you were down here with me! There are no mice in the air, I’m afraid, but you might catch a bat, and that’s very like a mouse, you know. But do cats eat bats, I wonder?” And here Alice began to get rather sleepy, and went on saying to herself, in a dreamy sort of way, “Do cats eat bats? Do cats eat bats?” and sometimes, “Do bats eat cats?” for, you see, as she couldn’t answer either question, it didn’t much matter which way she put it. She felt that she was dozing off, and had just begun to dream that she was walking hand in hand with Dinah, and saying to her very earnestly, “Now, Dinah, tell me the truth: did you ever eat a bat?” when suddenly, thump! thump! down she came upon a heap of sticks and dry leaves, and the fall was over.</p>\n<p>Alice was not a bit hurt, and she jumped up on to her feet in a moment: she looked up, but it was all dark overhead; before her was another long passage, and the White Rabbit was still in sight, hurrying down it. There was not a moment to be lost: away went Alice like the wind, and was just in time to hear it say, as it turned a corner, “Oh my ears and whiskers, how late it’s getting!” She was close behind it when she turned the corner, but the Rabbit was no longer to be seen: she found herself in a long, low hall, which was lit up by a row of lamps hanging from the roof.</p>\n<p>There were doors all round the hall, but they were all locked; and when Alice had been all the way down one side and up the other, trying every door, she walked sadly down the middle, wondering how she was ever to get out again.</p>\n<p>Suddenly she came upon a little three-legged table, all made of solid glass; there was nothing on it except a tiny golden key, and Alice’s first thought was that it might belong to one of the doors of the hall; but, alas! either the locks were too large, or the key was too small, but at any rate it would not open any of them. However, on the second time round, she came upon a low curtain she had not noticed before, and behind it was a little door about fifteen inches high: she tried the little golden key in the lock, and to her great delight it fitted!</p>\n<p>Alice opened the door and found that it led into a small passage, not much larger than a rat-hole: she knelt down and looked along the passage into the loveliest garden you ever saw. How she longed to get out of that dark hall, and wander about among those beds of bright flowers and those cool fountains, but she could not even get her head through the doorway; “and even if my head would go through,” thought poor Alice, “it would be of very little use without my shoulders. Oh, how I wish I could shut up like a telescope! I think I could, if I only knew how to begin.” For, you see, so many out-of-the-way things had happened lately, that Alice had begun to think that very few things indeed were really impossible.</p>\n<p>There seemed to be no use in waiting by the little door, so she went back to the table, half hoping she might find another key on it, or at any rate a book of rules for shutting people up like telescopes: this time she found a little bottle on it, (“which certainly was not here before,” said Alice,) and round the neck of the bottle was a paper label, with the words “DRINK ME,” beautifully printed on it in large letters.</p>\n<p>It was all very well to say “Drink me,” but the wise little Alice was not going to do <em>that</em> in a hurry. “No, I’ll look first,” she said, “and see whether it’s marked ‘<em>poison</em>’ or not”; for she had read several nice little histories about children who had got burnt, and eaten up by wild beasts and other unpleasant things, all because they <em>would</em> not remember the simple rules their friends had taught them: such as, that a red-hot poker will burn you if you hold it too long; and that if you cut your finger <em>very</em> deeply with a knife, it usually bleeds; and she had never forgotten that, if you drink much from a bottle marked “poison,” it is almost certain to disagree with you, sooner or later.</p>\n<p>However, this bottle was <em>not</em> marked “poison,” so Alice ventured to taste it, and finding it very nice, (it had, in fact, a sort of mixed flavour of cherry-tart, custard, pine-apple, roast turkey, toffee, and hot buttered toast,) she very soon finished it off.</p>\n<p>*      *      *      *      *      *      *</p>\n<p>*      *      *      *      *      *</p>\n<p>*      *      *      *      *      *      *</p>\n<p>“What a curious feeling!” said Alice; “I must be shutting up like a telescope.”</p>\n<p>And so it was indeed: she was now only ten inches high, and her face brightened up at the thought that she was now the right size for going through the little door into that lovely garden. First, however, she waited for a few minutes to see if she was going to shrink any further: she felt a little nervous about this; “for it might end, you know,” said Alice to herself, “in my going out altogether, like a candle. I wonder what I should be like then?” And she tried to fancy what the flame of a candle is like after the candle is blown out, for she could not remember ever having seen such a thing.</p>\n<p>After a while, finding that nothing more happened, she decided on going into the garden at once; but, alas for poor Alice! when she got to the door, she found she had forgotten the little golden key, and when she went back to the table for it, she found she could not possibly reach it: she could see it quite plainly through the glass, and she tried her best to climb up one of the legs of the table, but it was too slippery; and when she had tired herself out with trying, the poor little thing sat down and cried.</p>\n<p>“Come, there’s no use in crying like that!” said Alice to herself, rather sharply; “I advise you to leave off this minute!” She generally gave herself very good advice, (though she very seldom followed it), and sometimes she scolded herself so severely as to bring tears into her eyes; and once she remembered trying to box her own ears for having cheated herself in a game of croquet she was playing against herself, for this curious child was very fond of pretending to be two people. “But it’s no use now,” thought poor Alice, “to pretend to be two people! Why, there’s hardly enough of me left to make <em>one</em> respectable person!”</p>\n<p>Soon her eye fell on a little glass box that was lying under the table: she opened it, and found in it a very small cake, on which the words “EAT ME” were beautifully marked in currants. “Well, I’ll eat it,” said Alice, “and if it makes me grow larger, I can reach the key; and if it makes me grow smaller, I can creep under the door; so either way I’ll get into the garden, and I don’t care which happens!”</p>\n<p>She ate a little bit, and said anxiously to herself, “Which way? Which way?”, holding her hand on the top of her head to feel which way it was growing, and she was quite surprised to find that she remained the same size: to be sure, this generally happens when one eats cake, but Alice had got so much into the way of expecting nothing but out-of-the-way things to happen, that it seemed quite dull and stupid for life to go on in the common way.</p>\n<p>So she set to work, and very soon finished off the cake.</p>\n<p>*      *      *      *      *      *      *</p>\n<p>*      *      *      *      *      *</p>\n<p>*      *      *      *      *      *      *</p>"}, {"num": 2, "title": "The Pool of Tears", "html": "<p>“Curiouser and curiouser!” cried Alice (she was so much surprised, that for the moment she quite forgot how to speak good English); “now I’m opening out like the largest telescope that ever was! Good-bye, feet!” (for when she looked down at her feet, they seemed to be almost out of sight, they were getting so far off). “Oh, my poor little feet, I wonder who will put on your shoes and stockings for you now, dears? I’m sure <em>I</em> shan’t be able! I shall be a great deal too far off to trouble myself about you: you must manage the best way you can;—but I must be kind to them,” thought Alice, “or perhaps they won’t walk the way I want to go! Let me see: I’ll give them a new pair of boots every Christmas.”</p>\n<p>And she went on planning to herself how she would manage it. “They must go by the carrier,” she thought; “and how funny it’ll seem, sending presents to one’s own feet! And how odd the directions will look!</p>\n<p><em>Alice’s Right Foot, Esq., Hearthrug, near the Fender,</em> (<em>with Alice’s love</em>).</p>\n<p>Oh dear, what nonsense I’m talking!”</p>\n<p>Just then her head struck against the roof of the hall: in fact she was now more than nine feet high, and she at once took up the little golden key and hurried off to the garden door.</p>\n<p>Poor Alice! It was as much as she could do, lying down on one side, to look through into the garden with one eye; but to get through was more hopeless than ever: she sat down and began to cry again.</p>\n<p>“You ought to be ashamed of yourself,” said Alice, “a great girl like you,” (she might well say this), “to go on crying in this way! Stop this moment, I tell you!” But she went on all the same, shedding gallons of tears, until there was a large pool all round her, about four inches deep and reaching half down the hall.</p>\n<p>After a time she heard a little pattering of feet in the distance, and she hastily dried her eyes to see what was coming. It was the White Rabbit returning, splendidly dressed, with a pair of white kid gloves in one hand and a large fan in the other: he came trotting along in a great hurry, muttering to himself as he came, “Oh! the Duchess, the Duchess! Oh! won’t she be savage if I’ve kept her waiting!” Alice felt so desperate that she was ready to ask help of any one; so, when the Rabbit came near her, she began, in a low, timid voice, “If you please, sir—” The Rabbit started violently, dropped the white kid gloves and the fan, and skurried away into the darkness as hard as he could go.</p>\n<p>Alice took up the fan and gloves, and, as the hall was very hot, she kept fanning herself all the time she went on talking: “Dear, dear! How queer everything is to-day! And yesterday things went on just as usual. I wonder if I’ve been changed in the night? Let me think: was I the same when I got up this morning? I almost think I can remember feeling a little different. But if I’m not the same, the next question is, Who in the world am I? Ah, <em>that’s</em> the great puzzle!” And she began thinking over all the children she knew that were of the same age as herself, to see if she could have been changed for any of them.</p>\n<p>“I’m sure I’m not Ada,” she said, “for her hair goes in such long ringlets, and mine doesn’t go in ringlets at all; and I’m sure I can’t be Mabel, for I know all sorts of things, and she, oh! she knows such a very little! Besides, <em>she’s</em> she, and <em>I’m</em> I, and—oh dear, how puzzling it all is! I’ll try if I know all the things I used to know. Let me see: four times five is twelve, and four times six is thirteen, and four times seven is—oh dear! I shall never get to twenty at that rate! However, the Multiplication Table doesn’t signify: let’s try Geography. London is the capital of Paris, and Paris is the capital of Rome, and Rome—no, <em>that’s</em> all wrong, I’m certain! I must have been changed for Mabel! I’ll try and say ‘<em>How doth the little</em>—’” and she crossed her hands on her lap as if she were saying lessons, and began to repeat it, but her voice sounded hoarse and strange, and the words did not come the same as they used to do:—</p>\n<p>“How doth the little crocodile Improve his shining tail, And pour the waters of the Nile On every golden scale!</p>\n<p>“How cheerfully he seems to grin, How neatly spread his claws, And welcome little fishes in With gently smiling jaws!”</p>\n<p>“I’m sure those are not the right words,” said poor Alice, and her eyes filled with tears again as she went on, “I must be Mabel after all, and I shall have to go and live in that poky little house, and have next to no toys to play with, and oh! ever so many lessons to learn! No, I’ve made up my mind about it; if I’m Mabel, I’ll stay down here! It’ll be no use their putting their heads down and saying ‘Come up again, dear!’ I shall only look up and say ‘Who am I then? Tell me that first, and then, if I like being that person, I’ll come up: if not, I’ll stay down here till I’m somebody else’—but, oh dear!” cried Alice, with a sudden burst of tears, “I do wish they <em>would</em> put their heads down! I am so <em>very</em> tired of being all alone here!”</p>\n<p>As she said this she looked down at her hands, and was surprised to see that she had put on one of the Rabbit’s little white kid gloves while she was talking. “How <em>can</em> I have done that?” she thought. “I must be growing small again.” She got up and went to the table to measure herself by it, and found that, as nearly as she could guess, she was now about two feet high, and was going on shrinking rapidly: she soon found out that the cause of this was the fan she was holding, and she dropped it hastily, just in time to avoid shrinking away altogether.</p>\n<p>“That <em>was</em> a narrow escape!” said Alice, a good deal frightened at the sudden change, but very glad to find herself still in existence; “and now for the garden!” and she ran with all speed back to the little door: but, alas! the little door was shut again, and the little golden key was lying on the glass table as before, “and things are worse than ever,” thought the poor child, “for I never was so small as this before, never! And I declare it’s too bad, that it is!”</p>\n<p>As she said these words her foot slipped, and in another moment, splash! she was up to her chin in salt water. Her first idea was that she had somehow fallen into the sea, “and in that case I can go back by railway,” she said to herself. (Alice had been to the seaside once in her life, and had come to the general conclusion, that wherever you go to on the English coast you find a number of bathing machines in the sea, some children digging in the sand with wooden spades, then a row of lodging houses, and behind them a railway station.) However, she soon made out that she was in the pool of tears which she had wept when she was nine feet high.</p>\n<p>“I wish I hadn’t cried so much!” said Alice, as she swam about, trying to find her way out. “I shall be punished for it now, I suppose, by being drowned in my own tears! That <em>will</em> be a queer thing, to be sure! However, everything is queer to-day.”</p>\n<p>Just then she heard something splashing about in the pool a little way off, and she swam nearer to make out what it was: at first she thought it must be a walrus or hippopotamus, but then she remembered how small she was now, and she soon made out that it was only a mouse that had slipped in like herself.</p>\n<p>“Would it be of any use, now,” thought Alice, “to speak to this mouse? Everything is so out-of-the-way down here, that I should think very likely it can talk: at any rate, there’s no harm in trying.” So she began: “O Mouse, do you know the way out of this pool? I am very tired of swimming about here, O Mouse!” (Alice thought this must be the right way of speaking to a mouse: she had never done such a thing before, but she remembered having seen in her brother’s Latin Grammar, “A mouse—of a mouse—to a mouse—a mouse—O mouse!”) The Mouse looked at her rather inquisitively, and seemed to her to wink with one of its little eyes, but it said nothing.</p>\n<p>“Perhaps it doesn’t understand English,” thought Alice; “I daresay it’s a French mouse, come over with William the Conqueror.” (For, with all her knowledge of history, Alice had no very clear notion how long ago anything had happened.) So she began again: “Où est ma chatte?” which was the first sentence in her French lesson-book. The Mouse gave a sudden leap out of the water, and seemed to quiver all over with fright. “Oh, I beg your pardon!” cried Alice hastily, afraid that she had hurt the poor animal’s feelings. “I quite forgot you didn’t like cats.”</p>\n<p>“Not like cats!” cried the Mouse, in a shrill, passionate voice. “Would <em>you</em> like cats if you were me?”</p>\n<p>“Well, perhaps not,” said Alice in a soothing tone: “don’t be angry about it. And yet I wish I could show you our cat Dinah: I think you’d take a fancy to cats if you could only see her. She is such a dear quiet thing,” Alice went on, half to herself, as she swam lazily about in the pool, “and she sits purring so nicely by the fire, licking her paws and washing her face—and she is such a nice soft thing to nurse—and she’s such a capital one for catching mice—oh, I beg your pardon!” cried Alice again, for this time the Mouse was bristling all over, and she felt certain it must be really offended. “We won’t talk about her any more if you’d rather not.”</p>\n<p>“We indeed!” cried the Mouse, who was trembling down to the end of his tail. “As if <em>I</em> would talk on such a subject! Our family always <em>hated</em> cats: nasty, low, vulgar things! Don’t let me hear the name again!”</p>\n<p>“I won’t indeed!” said Alice, in a great hurry to change the subject of conversation. “Are you—are you fond—of—of dogs?” The Mouse did not answer, so Alice went on eagerly: “There is such a nice little dog near our house I should like to show you! A little bright-eyed terrier, you know, with oh, such long curly brown hair! And it’ll fetch things when you throw them, and it’ll sit up and beg for its dinner, and all sorts of things—I can’t remember half of them—and it belongs to a farmer, you know, and he says it’s so useful, it’s worth a hundred pounds! He says it kills all the rats and—oh dear!” cried Alice in a sorrowful tone, “I’m afraid I’ve offended it again!” For the Mouse was swimming away from her as hard as it could go, and making quite a commotion in the pool as it went.</p>\n<p>So she called softly after it, “Mouse dear! Do come back again, and we won’t talk about cats or dogs either, if you don’t like them!” When the Mouse heard this, it turned round and swam slowly back to her: its face was quite pale (with passion, Alice thought), and it said in a low trembling voice, “Let us get to the shore, and then I’ll tell you my history, and you’ll understand why it is I hate cats and dogs.”</p>\n<p>It was high time to go, for the pool was getting quite crowded with the birds and animals that had fallen into it: there were a Duck and a Dodo, a Lory and an Eaglet, and several other curious creatures. Alice led the way, and the whole party swam to the shore.</p>"}, {"num": 3, "title": "A Caucus-Race and a Long Tale", "html": "<p>They were indeed a queer-looking party that assembled on the bank—the birds with draggled feathers, the animals with their fur clinging close to them, and all dripping wet, cross, and uncomfortable.</p>\n<p>The first question of course was, how to get dry again: they had a consultation about this, and after a few minutes it seemed quite natural to Alice to find herself talking familiarly with them, as if she had known them all her life. Indeed, she had quite a long argument with the Lory, who at last turned sulky, and would only say, “I am older than you, and must know better;” and this Alice would not allow without knowing how old it was, and, as the Lory positively refused to tell its age, there was no more to be said.</p>\n<p>At last the Mouse, who seemed to be a person of authority among them, called out, “Sit down, all of you, and listen to me! <em>I’ll</em> soon make you dry enough!” They all sat down at once, in a large ring, with the Mouse in the middle. Alice kept her eyes anxiously fixed on it, for she felt sure she would catch a bad cold if she did not get dry very soon.</p>\n<p>“Ahem!” said the Mouse with an important air, “are you all ready? This is the driest thing I know. Silence all round, if you please! ‘William the Conqueror, whose cause was favoured by the pope, was soon submitted to by the English, who wanted leaders, and had been of late much accustomed to usurpation and conquest. Edwin and Morcar, the earls of Mercia and Northumbria—’”</p>\n<p>“Ugh!” said the Lory, with a shiver.</p>\n<p>“I beg your pardon!” said the Mouse, frowning, but very politely: “Did you speak?”</p>\n<p>“Not I!” said the Lory hastily.</p>\n<p>“I thought you did,” said the Mouse. “—I proceed. ‘Edwin and Morcar, the earls of Mercia and Northumbria, declared for him: and even Stigand, the patriotic archbishop of Canterbury, found it advisable—’”</p>\n<p>“Found <em>what</em>?” said the Duck.</p>\n<p>“Found <em>it</em>,” the Mouse replied rather crossly: “of course you know what ‘it’ means.”</p>\n<p>“I know what ‘it’ means well enough, when <em>I</em> find a thing,” said the Duck: “it’s generally a frog or a worm. The question is, what did the archbishop find?”</p>\n<p>The Mouse did not notice this question, but hurriedly went on, “‘—found it advisable to go with Edgar Atheling to meet William and offer him the crown. William’s conduct at first was moderate. But the insolence of his Normans—’ How are you getting on now, my dear?” it continued, turning to Alice as it spoke.</p>\n<p>“As wet as ever,” said Alice in a melancholy tone: “it doesn’t seem to dry me at all.”</p>\n<p>“In that case,” said the Dodo solemnly, rising to its feet, “I move that the meeting adjourn, for the immediate adoption of more energetic remedies—”</p>\n<p>“Speak English!” said the Eaglet. “I don’t know the meaning of half those long words, and, what’s more, I don’t believe you do either!” And the Eaglet bent down its head to hide a smile: some of the other birds tittered audibly.</p>\n<p>“What I was going to say,” said the Dodo in an offended tone, “was, that the best thing to get us dry would be a Caucus-race.”</p>\n<p>“What <em>is</em> a Caucus-race?” said Alice; not that she wanted much to know, but the Dodo had paused as if it thought that <em>somebody</em> ought to speak, and no one else seemed inclined to say anything.</p>\n<p>“Why,” said the Dodo, “the best way to explain it is to do it.” (And, as you might like to try the thing yourself, some winter day, I will tell you how the Dodo managed it.)</p>\n<p>First it marked out a race-course, in a sort of circle, (“the exact shape doesn’t matter,” it said,) and then all the party were placed along the course, here and there. There was no “One, two, three, and away,” but they began running when they liked, and left off when they liked, so that it was not easy to know when the race was over. However, when they had been running half an hour or so, and were quite dry again, the Dodo suddenly called out “The race is over!” and they all crowded round it, panting, and asking, “But who has won?”</p>\n<p>This question the Dodo could not answer without a great deal of thought, and it sat for a long time with one finger pressed upon its forehead (the position in which you usually see Shakespeare, in the pictures of him), while the rest waited in silence. At last the Dodo said, “<em>Everybody</em> has won, and all must have prizes.”</p>\n<p>“But who is to give the prizes?” quite a chorus of voices asked.</p>\n<p>“Why, <em>she</em>, of course,” said the Dodo, pointing to Alice with one finger; and the whole party at once crowded round her, calling out in a confused way, “Prizes! Prizes!”</p>\n<p>Alice had no idea what to do, and in despair she put her hand in her pocket, and pulled out a box of comfits, (luckily the salt water had not got into it), and handed them round as prizes. There was exactly one a-piece, all round.</p>\n<p>“But she must have a prize herself, you know,” said the Mouse.</p>\n<p>“Of course,” the Dodo replied very gravely. “What else have you got in your pocket?” he went on, turning to Alice.</p>\n<p>“Only a thimble,” said Alice sadly.</p>\n<p>“Hand it over here,” said the Dodo.</p>\n<p>Then they all crowded round her once more, while the Dodo solemnly presented the thimble, saying “We beg your acceptance of this elegant thimble;” and, when it had finished this short speech, they all cheered.</p>\n<p>Alice thought the whole thing very absurd, but they all looked so grave that she did not dare to laugh; and, as she could not think of anything to say, she simply bowed, and took the thimble, looking as solemn as she could.</p>\n<p>The next thing was to eat the comfits: this caused some noise and confusion, as the large birds complained that they could not taste theirs, and the small ones choked and had to be patted on the back. However, it was over at last, and they sat down again in a ring, and begged the Mouse to tell them something more.</p>\n<p>“You promised to tell me your history, you know,” said Alice, “and why it is you hate—C and D,” she added in a whisper, half afraid that it would be offended again.</p>\n<p>“Mine is a long and a sad tale!” said the Mouse, turning to Alice, and sighing.</p>\n<p>“It <em>is</em> a long tail, certainly,” said Alice, looking down with wonder at the Mouse’s tail; “but why do you call it sad?” And she kept on puzzling about it while the Mouse was speaking, so that her idea of the tale was something like this:—</p>\n<p>“Fury said to a mouse, That he met in the house, ‘Let us both go to law: <em>I</em> will prosecute <em>you</em>.—Come, I’ll take no denial; We must have a trial: For really this morning I’ve nothing to do.’ Said the mouse to the cur, ‘Such a trial, dear sir, With no jury or judge, would be wasting our breath.’ ‘I’ll be judge, I’ll be jury,’ Said cunning old Fury: ‘I’ll try the whole cause, and condemn you to death.’”</p>\n<p>“You are not attending!” said the Mouse to Alice severely. “What are you thinking of?”</p>\n<p>“I beg your pardon,” said Alice very humbly: “you had got to the fifth bend, I think?”</p>\n<p>“I had <em>not!</em>” cried the Mouse, sharply and very angrily.</p>\n<p>“A knot!” said Alice, always ready to make herself useful, and looking anxiously about her. “Oh, do let me help to undo it!”</p>\n<p>“I shall do nothing of the sort,” said the Mouse, getting up and walking away. “You insult me by talking such nonsense!”</p>\n<p>“I didn’t mean it!” pleaded poor Alice. “But you’re so easily offended, you know!”</p>\n<p>The Mouse only growled in reply.</p>\n<p>“Please come back and finish your story!” Alice called after it; and the others all joined in chorus, “Yes, please do!” but the Mouse only shook its head impatiently, and walked a little quicker.</p>\n<p>“What a pity it wouldn’t stay!” sighed the Lory, as soon as it was quite out of sight; and an old Crab took the opportunity of saying to her daughter “Ah, my dear! Let this be a lesson to you never to lose <em>your</em> temper!” “Hold your tongue, Ma!” said the young Crab, a little snappishly. “You’re enough to try the patience of an oyster!”</p>\n<p>“I wish I had our Dinah here, I know I do!” said Alice aloud, addressing nobody in particular. “She’d soon fetch it back!”</p>\n<p>“And who is Dinah, if I might venture to ask the question?” said the Lory.</p>\n<p>Alice replied eagerly, for she was always ready to talk about her pet: “Dinah’s our cat. And she’s such a capital one for catching mice you can’t think! And oh, I wish you could see her after the birds! Why, she’ll eat a little bird as soon as look at it!”</p>\n<p>This speech caused a remarkable sensation among the party. Some of the birds hurried off at once: one old Magpie began wrapping itself up very carefully, remarking, “I really must be getting home; the night-air doesn’t suit my throat!” and a Canary called out in a trembling voice to its children, “Come away, my dears! It’s high time you were all in bed!” On various pretexts they all moved off, and Alice was soon left alone.</p>\n<p>“I wish I hadn’t mentioned Dinah!” she said to herself in a melancholy tone. “Nobody seems to like her, down here, and I’m sure she’s the best cat in the world! Oh, my dear Dinah! I wonder if I shall ever see you any more!” And here poor Alice began to cry again, for she felt very lonely and low-spirited. In a little while, however, she again heard a little pattering of footsteps in the distance, and she looked up eagerly, half hoping that the Mouse had changed his mind, and was coming back to finish his story.</p>"}, {"num": 4, "title": "The Rabbit Sends in a Little Bill", "html": "<p>It was the White Rabbit, trotting slowly back again, and looking anxiously about as it went, as if it had lost something; and she heard it muttering to itself “The Duchess! The Duchess! Oh my dear paws! Oh my fur and whiskers! She’ll get me executed, as sure as ferrets are ferrets! Where <em>can</em> I have dropped them, I wonder?” Alice guessed in a moment that it was looking for the fan and the pair of white kid gloves, and she very good-naturedly began hunting about for them, but they were nowhere to be seen—everything seemed to have changed since her swim in the pool, and the great hall, with the glass table and the little door, had vanished completely.</p>\n<p>Very soon the Rabbit noticed Alice, as she went hunting about, and called out to her in an angry tone, “Why, Mary Ann, what <em>are</em> you doing out here? Run home this moment, and fetch me a pair of gloves and a fan! Quick, now!” And Alice was so much frightened that she ran off at once in the direction it pointed to, without trying to explain the mistake it had made.</p>\n<p>“He took me for his housemaid,” she said to herself as she ran. “How surprised he’ll be when he finds out who I am! But I’d better take him his fan and gloves—that is, if I can find them.” As she said this, she came upon a neat little house, on the door of which was a bright brass plate with the name “W. RABBIT,” engraved upon it. She went in without knocking, and hurried upstairs, in great fear lest she should meet the real Mary Ann, and be turned out of the house before she had found the fan and gloves.</p>\n<p>“How queer it seems,” Alice said to herself, “to be going messages for a rabbit! I suppose Dinah’ll be sending me on messages next!” And she began fancying the sort of thing that would happen: “‘Miss Alice! Come here directly, and get ready for your walk!’ ‘Coming in a minute, nurse! But I’ve got to see that the mouse doesn’t get out.’ Only I don’t think,” Alice went on, “that they’d let Dinah stop in the house if it began ordering people about like that!”</p>\n<p>By this time she had found her way into a tidy little room with a table in the window, and on it (as she had hoped) a fan and two or three pairs of tiny white kid gloves: she took up the fan and a pair of the gloves, and was just going to leave the room, when her eye fell upon a little bottle that stood near the looking-glass. There was no label this time with the words “DRINK ME,” but nevertheless she uncorked it and put it to her lips. “I know <em>something</em> interesting is sure to happen,” she said to herself, “whenever I eat or drink anything; so I’ll just see what this bottle does. I do hope it’ll make me grow large again, for really I’m quite tired of being such a tiny little thing!”</p>\n<p>It did so indeed, and much sooner than she had expected: before she had drunk half the bottle, she found her head pressing against the ceiling, and had to stoop to save her neck from being broken. She hastily put down the bottle, saying to herself “That’s quite enough—I hope I shan’t grow any more—As it is, I can’t get out at the door—I do wish I hadn’t drunk quite so much!”</p>\n<p>Alas! it was too late to wish that! She went on growing, and growing, and very soon had to kneel down on the floor: in another minute there was not even room for this, and she tried the effect of lying down with one elbow against the door, and the other arm curled round her head. Still she went on growing, and, as a last resource, she put one arm out of the window, and one foot up the chimney, and said to herself “Now I can do no more, whatever happens. What <em>will</em> become of me?”</p>\n<p>Luckily for Alice, the little magic bottle had now had its full effect, and she grew no larger: still it was very uncomfortable, and, as there seemed to be no sort of chance of her ever getting out of the room again, no wonder she felt unhappy.</p>\n<p>“It was much pleasanter at home,” thought poor Alice, “when one wasn’t always growing larger and smaller, and being ordered about by mice and rabbits. I almost wish I hadn’t gone down that rabbit-hole—and yet—and yet—it’s rather curious, you know, this sort of life! I do wonder what <em>can</em> have happened to me! When I used to read fairy-tales, I fancied that kind of thing never happened, and now here I am in the middle of one! There ought to be a book written about me, that there ought! And when I grow up, I’ll write one—but I’m grown up now,” she added in a sorrowful tone; “at least there’s no room to grow up any more <em>here</em>.”</p>\n<p>“But then,” thought Alice, “shall I <em>never</em> get any older than I am now? That’ll be a comfort, one way—never to be an old woman—but then—always to have lessons to learn! Oh, I shouldn’t like <em>that!</em>”</p>\n<p>“Oh, you foolish Alice!” she answered herself. “How can you learn lessons in here? Why, there’s hardly room for <em>you</em>, and no room at all for any lesson-books!”</p>\n<p>And so she went on, taking first one side and then the other, and making quite a conversation of it altogether; but after a few minutes she heard a voice outside, and stopped to listen.</p>\n<p>“Mary Ann! Mary Ann!” said the voice. “Fetch me my gloves this moment!” Then came a little pattering of feet on the stairs. Alice knew it was the Rabbit coming to look for her, and she trembled till she shook the house, quite forgetting that she was now about a thousand times as large as the Rabbit, and had no reason to be afraid of it.</p>\n<p>Presently the Rabbit came up to the door, and tried to open it; but, as the door opened inwards, and Alice’s elbow was pressed hard against it, that attempt proved a failure. Alice heard it say to itself “Then I’ll go round and get in at the window.”</p>\n<p>“<em>That</em> you won’t!” thought Alice, and, after waiting till she fancied she heard the Rabbit just under the window, she suddenly spread out her hand, and made a snatch in the air. She did not get hold of anything, but she heard a little shriek and a fall, and a crash of broken glass, from which she concluded that it was just possible it had fallen into a cucumber-frame, or something of the sort.</p>\n<p>Next came an angry voice—the Rabbit’s—“Pat! Pat! Where are you?” And then a voice she had never heard before, “Sure then I’m here! Digging for apples, yer honour!”</p>\n<p>“Digging for apples, indeed!” said the Rabbit angrily. “Here! Come and help me out of <em>this!</em>” (Sounds of more broken glass.)</p>\n<p>“Now tell me, Pat, what’s that in the window?”</p>\n<p>“Sure, it’s an arm, yer honour!” (He pronounced it “arrum.”)</p>\n<p>“An arm, you goose! Who ever saw one that size? Why, it fills the whole window!”</p>\n<p>“Sure, it does, yer honour: but it’s an arm for all that.”</p>\n<p>“Well, it’s got no business there, at any rate: go and take it away!”</p>\n<p>There was a long silence after this, and Alice could only hear whispers now and then; such as, “Sure, I don’t like it, yer honour, at all, at all!” “Do as I tell you, you coward!” and at last she spread out her hand again, and made another snatch in the air. This time there were <em>two</em> little shrieks, and more sounds of broken glass. “What a number of cucumber-frames there must be!” thought Alice. “I wonder what they’ll do next! As for pulling me out of the window, I only wish they <em>could!</em> I’m sure <em>I</em> don’t want to stay in here any longer!”</p>\n<p>She waited for some time without hearing anything more: at last came a rumbling of little cartwheels, and the sound of a good many voices all talking together: she made out the words: “Where’s the other ladder?—Why, I hadn’t to bring but one; Bill’s got the other—Bill! fetch it here, lad!—Here, put ’em up at this corner—No, tie ’em together first—they don’t reach half high enough yet—Oh! they’ll do well enough; don’t be particular—Here, Bill! catch hold of this rope—Will the roof bear?—Mind that loose slate—Oh, it’s coming down! Heads below!” (a loud crash)—“Now, who did that?—It was Bill, I fancy—Who’s to go down the chimney?—Nay, <em>I</em> shan’t! <em>You</em> do it!—<em>That</em> I won’t, then!—Bill’s to go down—Here, Bill! the master says you’re to go down the chimney!”</p>\n<p>“Oh! So Bill’s got to come down the chimney, has he?” said Alice to herself. “Shy, they seem to put everything upon Bill! I wouldn’t be in Bill’s place for a good deal: this fireplace is narrow, to be sure; but I <em>think</em> I can kick a little!”</p>\n<p>She drew her foot as far down the chimney as she could, and waited till she heard a little animal (she couldn’t guess of what sort it was) scratching and scrambling about in the chimney close above her: then, saying to herself “This is Bill,” she gave one sharp kick, and waited to see what would happen next.</p>\n<p>The first thing she heard was a general chorus of “There goes Bill!” then the Rabbit’s voice along—“Catch him, you by the hedge!” then silence, and then another confusion of voices—“Hold up his head—Brandy now—Don’t choke him—How was it, old fellow? What happened to you? Tell us all about it!”</p>\n<p>Last came a little feeble, squeaking voice, (“That’s Bill,” thought Alice,) “Well, I hardly know—No more, thank ye; I’m better now—but I’m a deal too flustered to tell you—all I know is, something comes at me like a Jack-in-the-box, and up I goes like a sky-rocket!”</p>\n<p>“So you did, old fellow!” said the others.</p>\n<p>“We must burn the house down!” said the Rabbit’s voice; and Alice called out as loud as she could, “If you do, I’ll set Dinah at you!”</p>\n<p>There was a dead silence instantly, and Alice thought to herself, “I wonder what they <em>will</em> do next! If they had any sense, they’d take the roof off.” After a minute or two, they began moving about again, and Alice heard the Rabbit say, “A barrowful will do, to begin with.”</p>\n<p>“A barrowful of <em>what?</em>” thought Alice; but she had not long to doubt, for the next moment a shower of little pebbles came rattling in at the window, and some of them hit her in the face. “I’ll put a stop to this,” she said to herself, and shouted out, “You’d better not do that again!” which produced another dead silence.</p>\n<p>Alice noticed with some surprise that the pebbles were all turning into little cakes as they lay on the floor, and a bright idea came into her head. “If I eat one of these cakes,” she thought, “it’s sure to make <em>some</em> change in my size; and as it can’t possibly make me larger, it must make me smaller, I suppose.”</p>\n<p>So she swallowed one of the cakes, and was delighted to find that she began shrinking directly. As soon as she was small enough to get through the door, she ran out of the house, and found quite a crowd of little animals and birds waiting outside. The poor little Lizard, Bill, was in the middle, being held up by two guinea-pigs, who were giving it something out of a bottle. They all made a rush at Alice the moment she appeared; but she ran off as hard as she could, and soon found herself safe in a thick wood.</p>\n<p>“The first thing I’ve got to do,” said Alice to herself, as she wandered about in the wood, “is to grow to my right size again; and the second thing is to find my way into that lovely garden. I think that will be the best plan.”</p>\n<p>It sounded an excellent plan, no doubt, and very neatly and simply arranged; the only difficulty was, that she had not the smallest idea how to set about it; and while she was peering about anxiously among the trees, a little sharp bark just over her head made her look up in a great hurry.</p>\n<p>An enormous puppy was looking down at her with large round eyes, and feebly stretching out one paw, trying to touch her. “Poor little thing!” said Alice, in a coaxing tone, and she tried hard to whistle to it; but she was terribly frightened all the time at the thought that it might be hungry, in which case it would be very likely to eat her up in spite of all her coaxing.</p>\n<p>Hardly knowing what she did, she picked up a little bit of stick, and held it out to the puppy; whereupon the puppy jumped into the air off all its feet at once, with a yelp of delight, and rushed at the stick, and made believe to worry it; then Alice dodged behind a great thistle, to keep herself from being run over; and the moment she appeared on the other side, the puppy made another rush at the stick, and tumbled head over heels in its hurry to get hold of it; then Alice, thinking it was very like having a game of play with a cart-horse, and expecting every moment to be trampled under its feet, ran round the thistle again; then the puppy began a series of short charges at the stick, running a very little way forwards each time and a long way back, and barking hoarsely all the while, till at last it sat down a good way off, panting, with its tongue hanging out of its mouth, and its great eyes half shut.</p>\n<p>This seemed to Alice a good opportunity for making her escape; so she set off at once, and ran till she was quite tired and out of breath, and till the puppy’s bark sounded quite faint in the distance.</p>\n<p>“And yet what a dear little puppy it was!” said Alice, as she leant against a buttercup to rest herself, and fanned herself with one of the leaves: “I should have liked teaching it tricks very much, if—if I’d only been the right size to do it! Oh dear! I’d nearly forgotten that I’ve got to grow up again! Let me see—how <em>is</em> it to be managed? I suppose I ought to eat or drink something or other; but the great question is, what?”</p>\n<p>The great question certainly was, what? Alice looked all round her at the flowers and the blades of grass, but she did not see anything that looked like the right thing to eat or drink under the circumstances. There was a large mushroom growing near her, about the same height as herself; and when she had looked under it, and on both sides of it, and behind it, it occurred to her that she might as well look and see what was on the top of it.</p>\n<p>She stretched herself up on tiptoe, and peeped over the edge of the mushroom, and her eyes immediately met those of a large blue caterpillar, that was sitting on the top with its arms folded, quietly smoking a long hookah, and taking not the smallest notice of her or of anything else.</p>"}, {"num": 5, "title": "Advice from a Caterpillar", "html": "<p>The Caterpillar and Alice looked at each other for some time in silence: at last the Caterpillar took the hookah out of its mouth, and addressed her in a languid, sleepy voice.</p>\n<p>“Who are <em>you?</em>” said the Caterpillar.</p>\n<p>This was not an encouraging opening for a conversation. Alice replied, rather shyly, “I—I hardly know, sir, just at present—at least I know who I <em>was</em> when I got up this morning, but I think I must have been changed several times since then.”</p>\n<p>“What do you mean by that?” said the Caterpillar sternly. “Explain yourself!”</p>\n<p>“I can’t explain <em>myself</em>, I’m afraid, sir,” said Alice, “because I’m not myself, you see.”</p>\n<p>“I don’t see,” said the Caterpillar.</p>\n<p>“I’m afraid I can’t put it more clearly,” Alice replied very politely, “for I can’t understand it myself to begin with; and being so many different sizes in a day is very confusing.”</p>\n<p>“It isn’t,” said the Caterpillar.</p>\n<p>“Well, perhaps you haven’t found it so yet,” said Alice; “but when you have to turn into a chrysalis—you will some day, you know—and then after that into a butterfly, I should think you’ll feel it a little queer, won’t you?”</p>\n<p>“Not a bit,” said the Caterpillar.</p>\n<p>“Well, perhaps your feelings may be different,” said Alice; “all I know is, it would feel very queer to <em>me</em>.”</p>\n<p>“You!” said the Caterpillar contemptuously. “Who are <em>you?</em>”</p>\n<p>Which brought them back again to the beginning of the conversation. Alice felt a little irritated at the Caterpillar’s making such <em>very</em> short remarks, and she drew herself up and said, very gravely, “I think, you ought to tell me who <em>you</em> are, first.”</p>\n<p>“Why?” said the Caterpillar.</p>\n<p>Here was another puzzling question; and as Alice could not think of any good reason, and as the Caterpillar seemed to be in a <em>very</em> unpleasant state of mind, she turned away.</p>\n<p>“Come back!” the Caterpillar called after her. “I’ve something important to say!”</p>\n<p>This sounded promising, certainly: Alice turned and came back again.</p>\n<p>“Keep your temper,” said the Caterpillar.</p>\n<p>“Is that all?” said Alice, swallowing down her anger as well as she could.</p>\n<p>“No,” said the Caterpillar.</p>\n<p>Alice thought she might as well wait, as she had nothing else to do, and perhaps after all it might tell her something worth hearing. For some minutes it puffed away without speaking, but at last it unfolded its arms, took the hookah out of its mouth again, and said, “So you think you’re changed, do you?”</p>\n<p>“I’m afraid I am, sir,” said Alice; “I can’t remember things as I used—and I don’t keep the same size for ten minutes together!”</p>\n<p>“Can’t remember <em>what</em> things?” said the Caterpillar.</p>\n<p>“Well, I’ve tried to say “How doth the little busy bee,” but it all came different!” Alice replied in a very melancholy voice.</p>\n<p>“Repeat, ‘<em>You are old, Father William</em>,’” said the Caterpillar.</p>\n<p>Alice folded her hands, and began:—</p>\n<p>“You are old, Father William,” the young man said, “And your hair has become very white; And yet you incessantly stand on your head— Do you think, at your age, it is right?”</p>\n<p>“In my youth,” Father William replied to his son, “I feared it might injure the brain; But, now that I’m perfectly sure I have none, Why, I do it again and again.”</p>\n<p>“You are old,” said the youth, “as I mentioned before, And have grown most uncommonly fat; Yet you turned a back-somersault in at the door— Pray, what is the reason of that?”</p>\n<p>“In my youth,” said the sage, as he shook his grey locks, “I kept all my limbs very supple By the use of this ointment—one shilling the box— Allow me to sell you a couple?”</p>\n<p>“You are old,” said the youth, “and your jaws are too weak For anything tougher than suet; Yet you finished the goose, with the bones and the beak— Pray, how did you manage to do it?”</p>\n<p>“In my youth,” said his father, “I took to the law, And argued each case with my wife; And the muscular strength, which it gave to my jaw, Has lasted the rest of my life.”</p>\n<p>“You are old,” said the youth, “one would hardly suppose That your eye was as steady as ever; Yet you balanced an eel on the end of your nose— What made you so awfully clever?”</p>\n<p>“I have answered three questions, and that is enough,” Said his father; “don’t give yourself airs! Do you think I can listen all day to such stuff? Be off, or I’ll kick you down stairs!”</p>\n<p>“That is not said right,” said the Caterpillar.</p>\n<p>“Not <em>quite</em> right, I’m afraid,” said Alice, timidly; “some of the words have got altered.”</p>\n<p>“It is wrong from beginning to end,” said the Caterpillar decidedly, and there was silence for some minutes.</p>\n<p>The Caterpillar was the first to speak.</p>\n<p>“What size do you want to be?” it asked.</p>\n<p>“Oh, I’m not particular as to size,” Alice hastily replied; “only one doesn’t like changing so often, you know.”</p>\n<p>“I <em>don’t</em> know,” said the Caterpillar.</p>\n<p>Alice said nothing: she had never been so much contradicted in her life before, and she felt that she was losing her temper.</p>\n<p>“Are you content now?” said the Caterpillar.</p>\n<p>“Well, I should like to be a <em>little</em> larger, sir, if you wouldn’t mind,” said Alice: “three inches is such a wretched height to be.”</p>\n<p>“It is a very good height indeed!” said the Caterpillar angrily, rearing itself upright as it spoke (it was exactly three inches high).</p>\n<p>“But I’m not used to it!” pleaded poor Alice in a piteous tone. And she thought of herself, “I wish the creatures wouldn’t be so easily offended!”</p>\n<p>“You’ll get used to it in time,” said the Caterpillar; and it put the hookah into its mouth and began smoking again.</p>\n<p>This time Alice waited patiently until it chose to speak again. In a minute or two the Caterpillar took the hookah out of its mouth and yawned once or twice, and shook itself. Then it got down off the mushroom, and crawled away in the grass, merely remarking as it went, “One side will make you grow taller, and the other side will make you grow shorter.”</p>\n<p>“One side of <em>what?</em> The other side of <em>what?</em>” thought Alice to herself.</p>\n<p>“Of the mushroom,” said the Caterpillar, just as if she had asked it aloud; and in another moment it was out of sight.</p>\n<p>Alice remained looking thoughtfully at the mushroom for a minute, trying to make out which were the two sides of it; and as it was perfectly round, she found this a very difficult question. However, at last she stretched her arms round it as far as they would go, and broke off a bit of the edge with each hand.</p>\n<p>“And now which is which?” she said to herself, and nibbled a little of the right-hand bit to try the effect: the next moment she felt a violent blow underneath her chin: it had struck her foot!</p>\n<p>She was a good deal frightened by this very sudden change, but she felt that there was no time to be lost, as she was shrinking rapidly; so she set to work at once to eat some of the other bit. Her chin was pressed so closely against her foot, that there was hardly room to open her mouth; but she did it at last, and managed to swallow a morsel of the lefthand bit.</p>\n<p>*      *      *      *      *      *      *</p>\n<p>*      *      *      *      *      *</p>\n<p>*      *      *      *      *      *      *</p>\n<p>“Come, my head’s free at last!” said Alice in a tone of delight, which changed into alarm in another moment, when she found that her shoulders were nowhere to be found: all she could see, when she looked down, was an immense length of neck, which seemed to rise like a stalk out of a sea of green leaves that lay far below her.</p>\n<p>“What <em>can</em> all that green stuff be?” said Alice. “And where <em>have</em> my shoulders got to? And oh, my poor hands, how is it I can’t see you?” She was moving them about as she spoke, but no result seemed to follow, except a little shaking among the distant green leaves.</p>\n<p>As there seemed to be no chance of getting her hands up to her head, she tried to get her head down to them, and was delighted to find that her neck would bend about easily in any direction, like a serpent. She had just succeeded in curving it down into a graceful zigzag, and was going to dive in among the leaves, which she found to be nothing but the tops of the trees under which she had been wandering, when a sharp hiss made her draw back in a hurry: a large pigeon had flown into her face, and was beating her violently with its wings.</p>\n<p>“Serpent!” screamed the Pigeon.</p>\n<p>“I’m <em>not</em> a serpent!” said Alice indignantly. “Let me alone!”</p>\n<p>“Serpent, I say again!” repeated the Pigeon, but in a more subdued tone, and added with a kind of sob, “I’ve tried every way, and nothing seems to suit them!”</p>\n<p>“I haven’t the least idea what you’re talking about,” said Alice.</p>\n<p>“I’ve tried the roots of trees, and I’ve tried banks, and I’ve tried hedges,” the Pigeon went on, without attending to her; “but those serpents! There’s no pleasing them!”</p>\n<p>Alice was more and more puzzled, but she thought there was no use in saying anything more till the Pigeon had finished.</p>\n<p>“As if it wasn’t trouble enough hatching the eggs,” said the Pigeon; “but I must be on the look-out for serpents night and day! Why, I haven’t had a wink of sleep these three weeks!”</p>\n<p>“I’m very sorry you’ve been annoyed,” said Alice, who was beginning to see its meaning.</p>\n<p>“And just as I’d taken the highest tree in the wood,” continued the Pigeon, raising its voice to a shriek, “and just as I was thinking I should be free of them at last, they must needs come wriggling down from the sky! Ugh, Serpent!”</p>\n<p>“But I’m <em>not</em> a serpent, I tell you!” said Alice. “I’m a—I’m a—”</p>\n<p>“Well! <em>What</em> are you?” said the Pigeon. “I can see you’re trying to invent something!”</p>\n<p>“I—I’m a little girl,” said Alice, rather doubtfully, as she remembered the number of changes she had gone through that day.</p>\n<p>“A likely story indeed!” said the Pigeon in a tone of the deepest contempt. “I’ve seen a good many little girls in my time, but never <em>one</em> with such a neck as that! No, no! You’re a serpent; and there’s no use denying it. I suppose you’ll be telling me next that you never tasted an egg!”</p>\n<p>“I <em>have</em> tasted eggs, certainly,” said Alice, who was a very truthful child; “but little girls eat eggs quite as much as serpents do, you know.”</p>\n<p>“I don’t believe it,” said the Pigeon; “but if they do, why then they’re a kind of serpent, that’s all I can say.”</p>\n<p>This was such a new idea to Alice, that she was quite silent for a minute or two, which gave the Pigeon the opportunity of adding, “You’re looking for eggs, I know <em>that</em> well enough; and what does it matter to me whether you’re a little girl or a serpent?”</p>\n<p>“It matters a good deal to <em>me</em>,” said Alice hastily; “but I’m not looking for eggs, as it happens; and if I was, I shouldn’t want <em>yours</em>: I don’t like them raw.”</p>\n<p>“Well, be off, then!” said the Pigeon in a sulky tone, as it settled down again into its nest. Alice crouched down among the trees as well as she could, for her neck kept getting entangled among the branches, and every now and then she had to stop and untwist it. After a while she remembered that she still held the pieces of mushroom in her hands, and she set to work very carefully, nibbling first at one and then at the other, and growing sometimes taller and sometimes shorter, until she had succeeded in bringing herself down to her usual height.</p>\n<p>It was so long since she had been anything near the right size, that it felt quite strange at first; but she got used to it in a few minutes, and began talking to herself, as usual. “Come, there’s half my plan done now! How puzzling all these changes are! I’m never sure what I’m going to be, from one minute to another! However, I’ve got back to my right size: the next thing is, to get into that beautiful garden—how <em>is</em> that to be done, I wonder?” As she said this, she came suddenly upon an open place, with a little house in it about four feet high. “Whoever lives there,” thought Alice, “it’ll never do to come upon them <em>this</em> size: why, I should frighten them out of their wits!” So she began nibbling at the righthand bit again, and did not venture to go near the house till she had brought herself down to nine inches high.</p>"}, {"num": 6, "title": "Pig and Pepper", "html": "<p>For a minute or two she stood looking at the house, and wondering what to do next, when suddenly a footman in livery came running out of the wood—(she considered him to be a footman because he was in livery: otherwise, judging by his face only, she would have called him a fish)—and rapped loudly at the door with his knuckles. It was opened by another footman in livery, with a round face, and large eyes like a frog; and both footmen, Alice noticed, had powdered hair that curled all over their heads. She felt very curious to know what it was all about, and crept a little way out of the wood to listen.</p>\n<p>The Fish-Footman began by producing from under his arm a great letter, nearly as large as himself, and this he handed over to the other, saying, in a solemn tone, “For the Duchess. An invitation from the Queen to play croquet.” The Frog-Footman repeated, in the same solemn tone, only changing the order of the words a little, “From the Queen. An invitation for the Duchess to play croquet.”</p>\n<p>Then they both bowed low, and their curls got entangled together.</p>\n<p>Alice laughed so much at this, that she had to run back into the wood for fear of their hearing her; and when she next peeped out the Fish-Footman was gone, and the other was sitting on the ground near the door, staring stupidly up into the sky.</p>\n<p>Alice went timidly up to the door, and knocked.</p>\n<p>“There’s no sort of use in knocking,” said the Footman, “and that for two reasons. First, because I’m on the same side of the door as you are; secondly, because they’re making such a noise inside, no one could possibly hear you.” And certainly there <em>was</em> a most extraordinary noise going on within—a constant howling and sneezing, and every now and then a great crash, as if a dish or kettle had been broken to pieces.</p>\n<p>“Please, then,” said Alice, “how am I to get in?”</p>\n<p>“There might be some sense in your knocking,” the Footman went on without attending to her, “if we had the door between us. For instance, if you were <em>inside</em>, you might knock, and I could let you out, you know.” He was looking up into the sky all the time he was speaking, and this Alice thought decidedly uncivil. “But perhaps he can’t help it,” she said to herself; “his eyes are so <em>very</em> nearly at the top of his head. But at any rate he might answer questions.—How am I to get in?” she repeated, aloud.</p>\n<p>“I shall sit here,” the Footman remarked, “till tomorrow—”</p>\n<p>At this moment the door of the house opened, and a large plate came skimming out, straight at the Footman’s head: it just grazed his nose, and broke to pieces against one of the trees behind him.</p>\n<p>“—or next day, maybe,” the Footman continued in the same tone, exactly as if nothing had happened.</p>\n<p>“How am I to get in?” asked Alice again, in a louder tone.</p>\n<p>“<em>Are</em> you to get in at all?” said the Footman. “That’s the first question, you know.”</p>\n<p>It was, no doubt: only Alice did not like to be told so. “It’s really dreadful,” she muttered to herself, “the way all the creatures argue. It’s enough to drive one crazy!”</p>\n<p>The Footman seemed to think this a good opportunity for repeating his remark, with variations. “I shall sit here,” he said, “on and off, for days and days.”</p>\n<p>“But what am <em>I</em> to do?” said Alice.</p>\n<p>“Anything you like,” said the Footman, and began whistling.</p>\n<p>“Oh, there’s no use in talking to him,” said Alice desperately: “he’s perfectly idiotic!” And she opened the door and went in.</p>\n<p>The door led right into a large kitchen, which was full of smoke from one end to the other: the Duchess was sitting on a three-legged stool in the middle, nursing a baby; the cook was leaning over the fire, stirring a large cauldron which seemed to be full of soup.</p>\n<p>“There’s certainly too much pepper in that soup!” Alice said to herself, as well as she could for sneezing.</p>\n<p>There was certainly too much of it in the air. Even the Duchess sneezed occasionally; and as for the baby, it was sneezing and howling alternately without a moment’s pause. The only things in the kitchen that did not sneeze, were the cook, and a large cat which was sitting on the hearth and grinning from ear to ear.</p>\n<p>“Please would you tell me,” said Alice, a little timidly, for she was not quite sure whether it was good manners for her to speak first, “why your cat grins like that?”</p>\n<p>“It’s a Cheshire cat,” said the Duchess, “and that’s why. Pig!”</p>\n<p>She said the last word with such sudden violence that Alice quite jumped; but she saw in another moment that it was addressed to the baby, and not to her, so she took courage, and went on again:—</p>\n<p>“I didn’t know that Cheshire cats always grinned; in fact, I didn’t know that cats <em>could</em> grin.”</p>\n<p>“They all can,” said the Duchess; “and most of ’em do.”</p>\n<p>“I don’t know of any that do,” Alice said very politely, feeling quite pleased to have got into a conversation.</p>\n<p>“You don’t know much,” said the Duchess; “and that’s a fact.”</p>\n<p>Alice did not at all like the tone of this remark, and thought it would be as well to introduce some other subject of conversation. While she was trying to fix on one, the cook took the cauldron of soup off the fire, and at once set to work throwing everything within her reach at the Duchess and the baby—the fire-irons came first; then followed a shower of saucepans, plates, and dishes. The Duchess took no notice of them even when they hit her; and the baby was howling so much already, that it was quite impossible to say whether the blows hurt it or not.</p>\n<p>“Oh, <em>please</em> mind what you’re doing!” cried Alice, jumping up and down in an agony of terror. “Oh, there goes his <em>precious</em> nose!” as an unusually large saucepan flew close by it, and very nearly carried it off.</p>\n<p>“If everybody minded their own business,” the Duchess said in a hoarse growl, “the world would go round a deal faster than it does.”</p>\n<p>“Which would <em>not</em> be an advantage,” said Alice, who felt very glad to get an opportunity of showing off a little of her knowledge. “Just think of what work it would make with the day and night! You see the earth takes twenty-four hours to turn round on its axis—”</p>\n<p>“Talking of axes,” said the Duchess, “chop off her head!”</p>\n<p>Alice glanced rather anxiously at the cook, to see if she meant to take the hint; but the cook was busily stirring the soup, and seemed not to be listening, so she went on again: “Twenty-four hours, I <em>think</em>; or is it twelve? I—”</p>\n<p>“Oh, don’t bother <em>me</em>,” said the Duchess; “I never could abide figures!” And with that she began nursing her child again, singing a sort of lullaby to it as she did so, and giving it a violent shake at the end of every line:</p>\n<p>“Speak roughly to your little boy, And beat him when he sneezes: He only does it to annoy, Because he knows it teases.”</p>\n<p>CHORUS. (In which the cook and the baby joined):</p>\n<p>“Wow! wow! wow!”</p>\n<p>While the Duchess sang the second verse of the song, she kept tossing the baby violently up and down, and the poor little thing howled so, that Alice could hardly hear the words:—</p>\n<p>“I speak severely to my boy, I beat him when he sneezes; For he can thoroughly enjoy The pepper when he pleases!”</p>\n<p>CHORUS.</p>\n<p>“Wow! wow! wow!”</p>\n<p>“Here! you may nurse it a bit, if you like!” the Duchess said to Alice, flinging the baby at her as she spoke. “I must go and get ready to play croquet with the Queen,” and she hurried out of the room. The cook threw a frying-pan after her as she went out, but it just missed her.</p>\n<p>Alice caught the baby with some difficulty, as it was a queer-shaped little creature, and held out its arms and legs in all directions, “just like a star-fish,” thought Alice. The poor little thing was snorting like a steam-engine when she caught it, and kept doubling itself up and straightening itself out again, so that altogether, for the first minute or two, it was as much as she could do to hold it.</p>\n<p>As soon as she had made out the proper way of nursing it, (which was to twist it up into a sort of knot, and then keep tight hold of its right ear and left foot, so as to prevent its undoing itself,) she carried it out into the open air. “If I don’t take this child away with me,” thought Alice, “they’re sure to kill it in a day or two: wouldn’t it be murder to leave it behind?” She said the last words out loud, and the little thing grunted in reply (it had left off sneezing by this time). “Don’t grunt,” said Alice; “that’s not at all a proper way of expressing yourself.”</p>\n<p>The baby grunted again, and Alice looked very anxiously into its face to see what was the matter with it. There could be no doubt that it had a <em>very</em> turn-up nose, much more like a snout than a real nose; also its eyes were getting extremely small for a baby: altogether Alice did not like the look of the thing at all. “But perhaps it was only sobbing,” she thought, and looked into its eyes again, to see if there were any tears.</p>\n<p>No, there were no tears. “If you’re going to turn into a pig, my dear,” said Alice, seriously, “I’ll have nothing more to do with you. Mind now!” The poor little thing sobbed again (or grunted, it was impossible to say which), and they went on for some while in silence.</p>\n<p>Alice was just beginning to think to herself, “Now, what am I to do with this creature when I get it home?” when it grunted again, so violently, that she looked down into its face in some alarm. This time there could be <em>no</em> mistake about it: it was neither more nor less than a pig, and she felt that it would be quite absurd for her to carry it further.</p>\n<p>So she set the little creature down, and felt quite relieved to see it trot away quietly into the wood. “If it had grown up,” she said to herself, “it would have made a dreadfully ugly child: but it makes rather a handsome pig, I think.” And she began thinking over other children sh
