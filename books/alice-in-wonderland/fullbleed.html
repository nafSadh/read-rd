onderland, though she knew she had but to open them again, and all would change to dull reality—the grass would be only rustling in the wind, and the pool rippling to the waving of the reeds—the rattling teacups would change to tinkling sheep-bells, and the Queen’s shrill cries to the voice of the shepherd boy—and the sneeze of the baby, the shriek of the Gryphon, and all the other queer noises, would change (she knew) to the confused clamour of the busy farm-yard—while the lowing of the cattle in the distance would take the place of the Mock Turtle’s heavy sobs.</p>\n<p>Lastly, she pictured to herself how this same little sister of hers would, in the after-time, be herself a grown woman; and how she would keep, through all her riper years, the simple and loving heart of her childhood: and how she would gather about her other little children, and make <em>their</em> eyes bright and eager with many a strange tale, perhaps even with the dream of Wonderland of long ago: and how she would feel with all their simple sorrows, and find a pleasure in all their simple joys, remembering her own child-life, and the happy summer days.</p>\n<p>THE END</p>"}];

// ===================================================================
// PAGINATION ENGINE
// ===================================================================

/**
 * Paginate all chapter HTML into fixed-height virtual pages.
 * Each page is an object: { html: string, chapterNum: number, isChapterStart: boolean }
 *
 * Strategy: render each chapter's HTML into a hidden div, then binary-search
 * for how many block-level children fit within the available page height.
 */
function paginateAll() {
  const measureBox = document.getElementById('measure-content');
  // Available height for content: viewport height minus padding (48px top + 60px bottom)
  const availableHeight = window.innerHeight - 108;
  const pages = [];

  for (const chapter of CHAPTERS) {
    // Parse chapter HTML into a temp container
    const temp = document.createElement('div');
    temp.innerHTML = chapter.html;

    // Build chapter header
    const headerHTML =
      '<div class="chapter-header">' +
        '<div class="chapter-num">Chapter ' + chapter.num + '</div>' +
        '<div class="chapter-title">' + chapter.title + '</div>' +
        '<div class="ornament">&mdash; &#x2766; &mdash;</div>' +
      '</div>';

    // Collect all block-level children (paragraphs, etc.)
    const blocks = [];
    for (let i = 0; i < temp.childNodes.length; i++) {
      const node = temp.childNodes[i];
      if (node.nodeType === 1) { // Element node
        blocks.push(node.outerHTML);
      } else if (node.nodeType === 3 && node.textContent.trim()) {
        blocks.push('<p>' + node.textContent + '</p>');
      }
    }

    let blockIdx = 0;
    let isFirst = true;

    while (blockIdx < blocks.length) {
      let pageHTML = '';

      // Add chapter header on first page of chapter
      if (isFirst) {
        pageHTML += headerHTML;
      }

      // Greedily add blocks until we exceed available height
      let testHTML = pageHTML;
      let lastFit = blockIdx;

      while (blockIdx < blocks.length) {
        let blockHTML = blocks[blockIdx];

        // Add drop-cap class to the very first <p> of the chapter
        if (isFirst && blockIdx === 0 && blockHTML.startsWith('<p')) {
          blockHTML = blockHTML.replace('<p', '<p class="drop-cap"');
        }

        testHTML += blockHTML;
        measureBox.innerHTML = testHTML;

        if (measureBox.scrollHeight > availableHeight && blockIdx > lastFit) {
          // This block doesn't fit; remove it
          testHTML = testHTML.slice(0, testHTML.length - blockHTML.length);
          break;
        }
        blockIdx++;
      }

      // If we couldn't fit even one block (very tall block), force it
      if (blockIdx === lastFit) {
        let blockHTML = blocks[blockIdx];
        if (isFirst && blockIdx === 0 && blockHTML.startsWith('<p')) {
          blockHTML = blockHTML.replace('<p', '<p class="drop-cap"');
        }
        testHTML = pageHTML + blockHTML;
        blockIdx++;
      }

      pages.push({
        html: testHTML,
        chapterNum: chapter.num,
        isChapterStart: isFirst
      });
      isFirst = false;
    }
  }

  // Clean up
  measureBox.innerHTML = '';
  return pages;
}

// APP STATE
// ===================================================================

let contentPages = [];  // Paginated content pages
let totalSpreads = 0;   // Total number of spreads (0=cover, 1=title, 2=TOC+p1, etc.)
let currentSpread = 0;  // Current spread index
let busy = false;        // Animation lock
let chapterStartSpreads = {}; // chapter num -> spread index

// Map a content-page index (0-based) to the spread it appears on.
// Content page 0 appears on spread 2 (right side).
// Content pages pair up: even index = right side of spread, odd = left side of next spread.
// Actually: spread 2 right = content[0], spread 3 left = content[1], spread 3 right = content[2], etc.
// Let's think differently:
//   Spread 0 = cover
//   Spread 1 = left: blank, right: title page
//   Spread 2 = left: TOC, right: content[0]
//   Spread 3 = left: content[1], right: content[2]
//   Spread N (N>=3) = left: content[2*(N-3)+1], right: content[2*(N-3)+2]
//     i.e. left: content[2*N - 5], right: content[2*N - 4]

function contentIndexForSpreadLeft(s) {
  // Spread 3+ left side
  if (s < 3) return -1;
  return 2 * s - 5;
}
function contentIndexForSpreadRight(s) {
  // Spread 2+ right side
  if (s < 2) return -1;
  if (s === 2) return 0;
  return 2 * s - 4;
}

// DOM REFERENCES

const leftInner = document.getElementById('left-inner');
const rightInner = document.getElementById('right-inner');
const leftPageNum = document.getElementById('left-page-num');
const rightPageNum = document.getElementById('right-page-num');
const leftHalf = document.getElementById('left-half');
const rightHalf = document.getElementById('right-half');
const coverSpread = document.getElementById('cover-spread');
const bookEl = document.getElementById('book');
const pageIndicator = document.getElementById('page-indicator');
const chapterSelect = document.getElementById('chapter-select');

// ===================================================================
// RENDER HELPERS
// ===================================================================

function getPageHTML(contentIdx) {
  if (contentIdx < 0 || contentIdx >= contentPages.length) return '';
  return contentPages[contentIdx].html;
}

function getPageNumber(contentIdx) {
  if (contentIdx < 0 || contentIdx >= contentPages.length) return '';
  return String(contentIdx + 1);
}

/** Build the TOC page HTML */
function buildTOC() {
  let html = '<div class="toc-page"><h2>Contents</h2><ol class="toc-list">';
  for (const ch of CHAPTERS) {
    const spread = chapterStartSpreads[ch.num] || 2;
    const contentIdx = contentIndexForSpreadRight(spread);
    const pageNum = (contentIdx >= 0) ? contentIdx + 1 : '';
    html += '<li data-chapter="' + ch.num + '">' +
      '<span class="toc-num">' + ch.num + '.</span>' +
      '<span class="toc-title">' + ch.title + '</span>' +
      '<span class="toc-page-num">' + pageNum + '</span>' +
      '</li>';
  }
  html += '</ol></div>';
  return html;
}

function buildTitlePage() {
  return '<div class="title-page">' +
    '<h1>Alice&rsquo;s Adventures<br>in Wonderland</h1>' +
    '<div class="subtitle">Lewis Carroll</div>' +
    '<div class="pub-ornament">&mdash; &#x2766; &mdash;</div>' +
    '<div class="pub-info">Originally published 1865</div>' +
    '</div>';
}

/** Render a spread (update left and right page content) */
function renderSpread(s) {
  if (s === 0) {
    // Cover
    coverSpread.style.display = 'flex';
    leftHalf.style.display = 'none';
    rightHalf.style.display = 'none';
    leftPageNum.textContent = '';
    rightPageNum.textContent = '';
  } else {
    coverSpread.style.display = 'none';
    leftHalf.style.display = '';
    rightHalf.style.display = '';

    if (s === 1) {
      // Title spread: left blank, right title
      leftInner.innerHTML = '';
      rightInner.innerHTML = buildTitlePage();
      leftPageNum.textContent = '';
      rightPageNum.textContent = '';
    } else if (s === 2) {
      // TOC + first content page
      leftInner.innerHTML = buildTOC();
      rightInner.innerHTML = getPageHTML(0);
      leftPageNum.textContent = '';
      rightPageNum.textContent = getPageNumber(0);
      // Attach TOC click handlers
      attachTOCHandlers();
    } else {
      const li = contentIndexForSpreadLeft(s);
      const ri = contentIndexForSpreadRight(s);
      leftInner.innerHTML = getPageHTML(li);
      rightInner.innerHTML = getPageHTML(ri);
      leftPageNum.textContent = getPageNumber(li);
      rightPageNum.textContent = getPageNumber(ri);
    }
  }
  updateIndicator();
}

function updateIndicator() {
  if (currentSpread === 0) {
    pageIndicator.textContent = 'Cover';
  } else {
    const ri = contentIndexForSpreadRight(currentSpread);
    const maxPage = contentPages.length;
    if (ri >= 0 && ri < maxPage) {
      pageIndicator.textContent = (ri + 1) + ' / ' + maxPage;
    } else {
      const li = contentIndexForSpreadLeft(currentSpread);
      if (li >= 0) {
        pageIndicator.textContent = (li + 1) + ' / ' + maxPage;
      } else {
        pageIndicator.textContent = '';
      }
    }
  }
  // Update chapter select
  const ch = getCurrentChapter();
  if (ch) chapterSelect.value = String(ch);
}

function getCurrentChapter() {
  const ri = contentIndexForSpreadRight(currentSpread);
  const li = contentIndexForSpreadLeft(currentSpread);
  let idx = ri >= 0 ? ri : li;
  if (idx >= 0 && idx < contentPages.length) {
    return contentPages[idx].chapterNum;
  }
  return 0;
}

function attachTOCHandlers() {
  const items = document.querySelectorAll('.toc-list li[data-chapter]');
  items.forEach(item => {
    item.addEventListener('click', () => {
      const chNum = parseInt(item.getAttribute('data-chapter'));
      goToChapter(chNum);
    });
  });
}

// ===================================================================
// FLIP ANIMATION
// ===================================================================

const FLIP_DURATION = 700; // ms
const FLIP_EASING = 'cubic-bezier(0.4, 0.0, 0.2, 1)';

/**
 * Create a flip-face div with the given background color and inner HTML.
 */
function createFlipFace(cssClass, bgColor, innerHTML, shadowSide) {
  const face = document.createElement('div');
  face.className = 'flip-face ' + cssClass;
  face.style.background = bgColor;

  // Content container matching page layout
  const content = document.createElement('div');
  content.className = 'page-content';
  const inner = document.createElement('div');
  inner.className = 'page-inner';
  inner.innerHTML = innerHTML;
  content.appendChild(inner);
  face.appendChild(content);

  return face;
}

/**
 * Forward flip: turn current right page over to reveal next spread.
 */
function flipForward() {
  if (busy) return;
  if (currentSpread >= totalSpreads - 1) return;

  // No flip animation from cover — just jump
  if (currentSpread === 0) {
    currentSpread = 1;
    renderSpread(currentSpread);
    return;
  }

  busy = true;
  const nextSpread = currentSpread + 1;

  // --- Content for the flip faces ---
  // Front face: current right page content
  let frontHTML, frontPageNum;
  if (currentSpread === 1) {
    frontHTML = buildTitlePage();
    frontPageNum = '';
  } else if (currentSpread === 2) {
    frontHTML = getPageHTML(0);
    frontPageNum = getPageNumber(0);
  } else {
    const ri = contentIndexForSpreadRight(currentSpread);
    frontHTML = getPageHTML(ri);
    frontPageNum = getPageNumber(ri);
  }

  // Back face: next spread's left page content
  let backHTML, backPageNum;
  if (nextSpread === 2) {
    backHTML = buildTOC();
    backPageNum = '';
  } else {
    const li = contentIndexForSpreadLeft(nextSpread);
    backHTML = getPageHTML(li);
    backPageNum = getPageNumber(li);
  }

  // --- Create overlay ---
  const overlay = document.createElement('div');
  overlay.className = 'flip-overlay right-flip';

  const bgRight = getComputedStyle(document.body).getPropertyValue('--bg-right').trim();
  const bgLeft = getComputedStyle(document.body).getPropertyValue('--bg-left').trim();

  const front = createFlipFace('front', bgRight, frontHTML);
  const back = createFlipFace('back', bgLeft, backHTML);

  overlay.appendChild(front);
  overlay.appendChild(back);

  // Add overlay to book
  bookEl.appendChild(overlay);

  // Step 3: While overlay covers right side, update underlying right page
  // to show the NEXT spread's right page.
  if (nextSpread === 1) {
    rightInner.innerHTML = buildTitlePage();
    rightPageNum.textContent = '';
  } else if (nextSpread === 2) {
    rightInner.innerHTML = getPageHTML(0);
    rightPageNum.textContent = getPageNumber(0);
  } else {
    const nri = contentIndexForSpreadRight(nextSpread);
    rightInner.innerHTML = getPageHTML(nri);
    rightPageNum.textContent = getPageNumber(nri);
  }

  // Step 5: Animate
  // Force layout before starting transition
  overlay.getBoundingClientRect();

  overlay.style.transition = 'transform ' + FLIP_DURATION + 'ms ' + FLIP_EASING;
  overlay.style.transform = 'rotateY(-180deg)';

  // Step 7: After animation completes
  setTimeout(() => {
    currentSpread = nextSpread;

    // Update underlying LEFT page to match overlay back face
    if (nextSpread === 2) {
      leftInner.innerHTML = buildTOC();
      leftPageNum.textContent = '';
      attachTOCHandlers();
    } else {
      const li = contentIndexForSpreadLeft(nextSpread);
      leftInner.innerHTML = getPageHTML(li);
      leftPageNum.textContent = getPageNumber(li);
    }

    // Brief delay to ensure paint, then remove overlay
    setTimeout(() => {
      overlay.remove();
      updateIndicator();
      busy = false;
    }, 20);
  }, FLIP_DURATION);
}

/**
 * Backward flip: turn current left page back to reveal previous spread.
 */
function flipBackward() {
  if (busy) return;
  if (currentSpread <= 0) return;

  // Jump to cover without animation
  if (currentSpread === 1) {
    currentSpread = 0;
    renderSpread(currentSpread);
    return;
  }

  busy = true;
  const prevSpread = currentSpread - 1;

  // --- Content for the flip faces ---
  // Front face: current left page content
  let frontHTML;
  if (currentSpread === 2) {
    frontHTML = buildTOC();
  } else {
    const li = contentIndexForSpreadLeft(currentSpread);
    frontHTML = getPageHTML(li);
  }

  // Back face: previous spread's right page content
  let backHTML;
  if (prevSpread === 1) {
    backHTML = buildTitlePage();
  } else if (prevSpread === 2) {
    backHTML = getPageHTML(0);
  } else {
    const ri = contentIndexForSpreadRight(prevSpread);
    backHTML = getPageHTML(ri);
  }

  // --- Create overlay ---
  const overlay = document.createElement('div');
  overlay.className = 'flip-overlay left-flip';

  const bgLeft = getComputedStyle(document.body).getPropertyValue('--bg-left').trim();
  const bgRight = getComputedStyle(document.body).getPropertyValue('--bg-right').trim();

  const front = createFlipFace('front', bgLeft, frontHTML);
  const back = createFlipFace('back', bgRight, backHTML);

  overlay.appendChild(front);
  overlay.appendChild(back);

  bookEl.appendChild(overlay);

  // Step 3: While overlay covers left side, update underlying left page
  // to show the PREVIOUS spread's left page.
  if (prevSpread === 1) {
    leftInner.innerHTML = '';
    leftPageNum.textContent = '';
  } else if (prevSpread === 2) {
    leftInner.innerHTML = buildTOC();
    leftPageNum.textContent = '';
  } else {
    const pli = contentIndexForSpreadLeft(prevSpread);
    leftInner.innerHTML = getPageHTML(pli);
    leftPageNum.textContent = getPageNumber(pli);
  }

  // Force layout
  overlay.getBoundingClientRect();

  overlay.style.transition = 'transform ' + FLIP_DURATION + 'ms ' + FLIP_EASING;
  overlay.style.transform = 'rotateY(180deg)';

  // After animation completes
  setTimeout(() => {
    currentSpread = prevSpread;

    // Update underlying RIGHT page to match overlay back face
    if (prevSpread === 1) {
      rightInner.innerHTML = buildTitlePage();
      rightPageNum.textContent = '';
    } else if (prevSpread === 2) {
      rightInner.innerHTML = getPageHTML(0);
      rightPageNum.textContent = getPageNumber(0);
      attachTOCHandlers();
    } else {
      const ri = contentIndexForSpreadRight(prevSpread);
      rightInner.innerHTML = getPageHTML(ri);
      rightPageNum.textContent = getPageNumber(ri);
    }

    setTimeout(() => {
      overlay.remove();
      updateIndicator();
      busy = false;
    }, 20);
  }, FLIP_DURATION);
}

// ===================================================================
// NAVIGATION
// ===================================================================

function goToChapter(chNum) {
  if (busy) return;
  const spread = chapterStartSpreads[chNum];
  if (spread !== undefined) {
    currentSpread = spread;
    renderSpread(currentSpread);
  }
}

// ===================================================================
// THEME
// ===================================================================

function toggleTheme() {
  document.body.classList.toggle('dark');
}

// ===================================================================
// INITIALIZATION
// ===================================================================

function init() {
  // 1. Paginate
  contentPages = paginateAll();

  // 2. Compute total spreads
  // Spread 0: cover
  // Spread 1: title (right only)
  // Spread 2: TOC (left) + content[0] (right)
  // Spread 3+: pairs of content pages
  // Content pages 1,2 on spread 3; 3,4 on spread 4; etc.
  // Total content pages beyond [0]: contentPages.length - 1
  // Spreads needed for those: ceil((contentPages.length - 1) / 2)
  totalSpreads = 3 + Math.ceil((contentPages.length - 1) / 2);

  // 3. Build chapter -> spread mapping
  for (let i = 0; i < contentPages.length; i++) {
    const pg = contentPages[i];
    if (pg.isChapterStart && !(pg.chapterNum in chapterStartSpreads)) {
      // Figure out which spread this content page index lands on
      if (i === 0) {
        chapterStartSpreads[pg.chapterNum] = 2;
      } else {
        // content[i] for i>=1: spread = 3 + floor((i-1)/2)
        // But we want the chapter to appear as a right page (recto).
        // contentIndexForSpreadRight(s) = 2*s - 4 for s>=3
        // So s = (i + 4) / 2 for right side
        // Check if i is on right side of its spread
        const spreadForRight = Math.ceil((i + 4) / 2);  // s where right = i
        const spreadForLeft = Math.ceil((i + 5) / 2);   // s where left = i

        // If content[i] falls on the right side, use that spread
        if (contentIndexForSpreadRight(spreadForRight) === i) {
          chapterStartSpreads[pg.chapterNum] = spreadForRight;
        } else {
          chapterStartSpreads[pg.chapterNum] = spreadForLeft;
        }
      }
    }
  }

  // 4. Populate chapter dropdown
  chapterSelect.innerHTML = '<option value="0">Select chapter...</option>';
  for (const ch of CHAPTERS) {
    const opt = document.createElement('option');
    opt.value = ch.num;
    opt.textContent = ch.num + '. ' + ch.title;
    chapterSelect.appendChild(opt);
  }

  // 5. Render cover
  currentSpread = 0;
  renderSpread(0);

  // 6. Event listeners
  document.getElementById('btn-prev').addEventListener('click', flipBackward);
  document.getElementById('btn-next').addEventListener('click', flipForward);

  document.getElementById('click-left').addEventListener('click', flipBackward);
  document.getElementById('click-right').addEventListener('click', flipForward);

  coverSpread.addEventListener('click', () => {
    if (currentSpread === 0) {
      currentSpread = 1;
      renderSpread(1);
    }
  });

  chapterSelect.addEventListener('change', () => {
    const v = parseInt(chapterSelect.value);
    if (v > 0) goToChapter(v);
  });

  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      flipForward();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      flipBackward();
    }
  });
}

// Run after fonts load for accurate pagination
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(init);
} else {
  window.addEventListener('load', init);
}
</script>
