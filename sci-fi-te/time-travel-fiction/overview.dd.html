<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Overview: Before Einstein — Time Travel in Fiction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --close-text:"\2715";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,var(--grad1),transparent),radial-gradient(ellipse 60% 50% at 85% 75%,var(--grad2),transparent),radial-gradient(ellipse 40% 40% at 50% 10%,var(--grad1),transparent);transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'\263D'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'\2600'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--grad1),transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Ancient Roots', title: '<em>Ancient</em> Roots of Time Travel' },
  { num: '02', short: 'Pre-Einstein', title: 'The Pre-<em>Einstein</em> Canon' },
  { num: '03', short: 'Wells', title: 'Wells & <em>The Time Machine</em>' },
  { num: '04', short: 'Anacronopete', title: '<em>El Anacronopete</em> & the Lost First' },
  { num: '05', short: 'Vocabulary', title: 'Words Fiction <em>Gave</em> Us' },
  { num: '06', short: 'Concepts', title: 'Concepts <em>Coined</em> by Authors' },
  { num: '07', short: 'Fiction→Science', title: 'Fiction Becoming <em>Science</em>' },
  { num: '08', short: 'Living Lineage', title: 'The <em>Living</em> Lineage' }
];

const summaries = [

  // 01 - Ancient Roots
  `<p>Time displacement appears in human storytelling millennia before science fiction existed as a genre. The Mahabharata recounts King Kakudmi (Revati) traveling to the realm of Brahma, where a brief audience lasts many ages on Earth &mdash; a narrative of relativistic time dilation written roughly two thousand years before Einstein.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Revati">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Revati" target="_blank">Wikipedia: Revati &mdash; Hindu legend of time dilation &rarr;</a></span></sup> Japanese folklore offers the tale of Urashima Tar&omacr;, a fisherman who spends days in an undersea palace and returns to find centuries have passed.</p>
  <p>These ancient narratives share a common structure: travel to another realm produces temporal displacement upon return. The emotional core &mdash; the traveler returns to find everything changed, everyone dead &mdash; is identical to the structure Wells would formalize in 1895.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">~400 BCE</div><div class="sl">Mahabharata</div></div>
    <div class="st"><div class="sv">~720 CE</div><div class="sl">Urashima Tar&omacr;</div></div>
    <div class="st"><div class="sv">1733</div><div class="sl">Madden&rsquo;s Memoirs</div></div>
    <div class="st"><div class="sv">1819</div><div class="sl">Rip Van Winkle</div></div>
  </div>
  <div class="s-chips">
    <span class="s-chip">Kakudmi</span>
    <span class="s-chip">Urashima</span>
    <span class="s-chip">realm-travel</span>
    <span class="s-chip">forward displacement</span>
  </div>`,

  // 02 - Pre-Einstein Canon
  `<p>Before Einstein published special relativity in 1905, a remarkable body of time-travel fiction already existed. Washington Irving&rsquo;s &ldquo;Rip Van Winkle&rdquo; (1819) established the time-slip archetype: involuntary forward travel via sleep.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Rip_Van_Winkle">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Rip_Van_Winkle" target="_blank">Wikipedia: Rip Van Winkle (1819) &rarr;</a></span></sup> Dickens&rsquo;s <em>A Christmas Carol</em> (1843) created the first bidirectional temporal narrative: Scrooge visits past, present, and future, then returns changed.<sup class="fn"><a href="https://en.wikipedia.org/wiki/A_Christmas_Carol">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/A_Christmas_Carol" target="_blank">Wikipedia: A Christmas Carol (1843) &rarr;</a></span></sup></p>
  <p>Mark Twain&rsquo;s <em>A Connecticut Yankee in King Arthur&rsquo;s Court</em> (1889) used time travel as social criticism, transplanting modern technology into the medieval past to expose the violence of both eras. Edward Page Mitchell published &ldquo;The Clock That Went Backward&rdquo; (1881) &mdash; an early mechanical time-travel story &mdash; anonymously in the New York Sun.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">5</div><div class="sl">Major Authors</div></div>
    <div class="st"><div class="sv">1819&ndash;95</div><div class="sl">Creative Period</div></div>
    <div class="st"><div class="sv">76 yrs</div><div class="sl">Before Relativity</div></div>
  </div>
  <div class="s-chips">
    <span class="s-chip">Irving</span>
    <span class="s-chip">Dickens</span>
    <span class="s-chip">Twain</span>
    <span class="s-chip">Mitchell</span>
    <span class="s-chip">time slip</span>
  </div>`,

  // 03 - Wells
  `<p>H.G. Wells&rsquo;s <em>The Time Machine</em> (1895) transformed time travel from supernatural occurrence to technological possibility. The unnamed Time Traveller builds a machine, sits in it, and navigates the fourth dimension as deliberately as one navigates space.<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Time_Machine">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Time_Machine" target="_blank">Wikipedia: The Time Machine (1895) &rarr;</a></span></sup> This was a conceptual revolution: time became a dimension that could be traversed with the right technology.</p>
  <p>Wells described all moments of time as coexisting simultaneously &mdash; what physicists now call the block universe or eternalism. He articulated this thirteen years before Minkowski formalized spacetime geometry in 1908. The novel&rsquo;s vision of temporal coexistence was not a metaphor borrowed from physics; it was an independent philosophical insight that physics would later validate.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1895</div><div class="sl">Published</div></div>
    <div class="st"><div class="sv">13 yrs</div><div class="sl">Before Minkowski</div></div>
    <div class="st"><div class="sv">10 yrs</div><div class="sl">Before Einstein</div></div>
    <div class="st"><div class="sv">&infin;</div><div class="sl">Cultural Influence</div></div>
  </div>`,

  // 04 - El Anacronopete
  `<p>The actual first time machine in fiction belongs not to Wells but to the Spanish novelist Enrique Gaspar y Rimbau, whose <em>El Anacronopete</em> appeared in 1887 &mdash; eight years before <em>The Time Machine</em>.<sup class="fn"><a href="https://en.wikipedia.org/wiki/El_Anacron%C3%B3pete">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/El_Anacron%C3%B3pete" target="_blank">Wikipedia: El Anacronopete (1887) &rarr;</a></span></sup> The title means &ldquo;the one who flies against time.&rdquo; Gaspar&rsquo;s machine is a box powered by electricity that carries passengers backward through history.</p>
  <p>The novel was largely unknown outside the Spanish-speaking world until scholars recovered it in the 21st century. Its rediscovery reshaped the standard narrative of time-travel fiction, which had centered Wells as the sole originator. The Anacronopete demonstrates that the concept of mechanical time travel emerged independently in multiple literary traditions.</p>
  <div class="s-chips">
    <span class="s-chip">Gaspar y Rimbau</span>
    <span class="s-chip">1887</span>
    <span class="s-chip">Spanish</span>
    <span class="s-chip">recovered text</span>
    <span class="s-chip">priority</span>
  </div>`,

  // 05 - Vocabulary
  `<p>Time travel fiction has contributed an extraordinary number of terms to common language. &ldquo;Time machine&rdquo; itself comes from Wells (1895). &ldquo;Time travel&rdquo; as a compound noun entered English through science fiction and was codified in the genre&rsquo;s vocabulary.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Brave_New_Words">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Brave_New_Words" target="_blank">Wikipedia: Brave New Words &mdash; Oxford Dictionary of Science Fiction &rarr;</a></span></sup></p>
  <h4>Terms from Fiction</h4>
  <ul class="s-list">
    <li><strong>Time machine</strong> &mdash; Wells, 1895. Now universal shorthand for any temporal transport device.</li>
    <li><strong>Grandfather paradox</strong> &mdash; Barjavel, 1943. The most-cited paradox in philosophy and physics.</li>
    <li><strong>Bootstrap paradox</strong> &mdash; Heinlein, 1941. From &ldquo;By His Bootstraps.&rdquo;</li>
    <li><strong>Butterfly effect</strong> &mdash; Bradbury, 1952. The metaphor preceded Lorenz&rsquo;s formal term by over a decade.</li>
    <li><strong>Time loop</strong> &mdash; Science fiction convention, now standard in game design and film.</li>
  </ul>`,

  // 06 - Concepts Coined
  `<p>Beyond vocabulary, fiction has originated concepts that science later formalized. The most striking cases involve authors who articulated physical or philosophical ideas years or decades before the relevant scientific papers were published.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Block Universe</h4><p>Wells (1895) described all moments coexisting simultaneously. Minkowski formalized spacetime in 1908. Lead time: 13 years.</p></div>
    <div class="feat"><h4>Self-Consistent Loops</h4><p>Heinlein (1941) dramatized causal loops where time travelers cannot alter history. Novikov published the self-consistency principle in 1989. Lead time: 48 years.</p></div>
    <div class="feat"><h4>Chaos Sensitivity</h4><p>Bradbury (1952) showed a crushed butterfly altering all of history. Lorenz published chaos theory in 1963. Lead time: 11 years.</p></div>
    <div class="feat"><h4>Branching Worlds</h4><p>Science fiction explored parallel timelines from time-travel branching well before Everett&rsquo;s many-worlds interpretation (1957) became mainstream.</p></div>
  </div>
  <div class="s-stat">
    <div class="st"><div class="sv">48 yrs</div><div class="sl">Heinlein &rarr; Novikov</div></div>
    <div class="st"><div class="sv">13 yrs</div><div class="sl">Wells &rarr; Minkowski</div></div>
    <div class="st"><div class="sv">11 yrs</div><div class="sl">Bradbury &rarr; Lorenz</div></div>
  </div>`,

  // 07 - Fiction Becoming Science
  `<p>The most documented case of fiction becoming science is the Sagan&ndash;Thorne pipeline. In 1985, Carl Sagan was writing <em>Contact</em> and needed a scientifically plausible mechanism for faster-than-light travel. He called Kip Thorne at Caltech for advice. Thorne&rsquo;s analysis of the problem produced two landmark physics papers on traversable wormholes (Morris &amp; Thorne, 1988; Morris, Thorne &amp; Yurtsever, 1988), which opened an entirely new field of research.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes" target="_blank">Wikipedia: Traversable Wormholes &rarr;</a></span></sup></p>
  <p>A novelist&rsquo;s plot requirement generated genuine physics. This is not fiction borrowing from science &mdash; it is science originating from fiction. The bidirectional relationship between the two domains is the central thesis of this survey.</p>
  <div class="callout"><h4>The Pipeline</h4><p>Sagan needed plausible FTL for a novel. He asked Thorne. Thorne did the physics. The physics became a research field. A work of fiction created a branch of theoretical physics.</p></div>`,

  // 08 - Living Lineage
  `<p>Every dimension of time travel fiction explored in this survey &mdash; paradoxes, narrative structures, scientific accuracy, philosophy, notable works, and the modern renaissance &mdash; descends from the pre-Einstein canon. The five structural archetypes established before 1900 (time slip, moral journey, Yankee abroad, the machine, the bootstrap) remain the grammar of every subsequent time travel story.</p>
  <h4>The Six Dimensions</h4>
  <ul class="s-list">
    <li><strong><a href="s1-paradoxes.dd.html">S1: Paradoxes &amp; Causal Logic</a></strong> &mdash; Grandfather, bootstrap, predestination, and resolution strategies</li>
    <li><strong><a href="s2-narrative-structures.dd.html">S2: Narrative Structures</a></strong> &mdash; Time slip, moral journey, the machine, closed loops, experimental forms</li>
    <li><strong><a href="s3-scientific-accuracy.dd.html">S3: Scientific Accuracy</a></strong> &mdash; Relativistic dilation, wormholes, CTCs, chronology protection</li>
    <li><strong><a href="s4-philosophy.dd.html">S4: Philosophical Implications</a></strong> &mdash; Block universe, McTaggart, free will, Lewis, the chronoclasm</li>
    <li><strong><a href="s5-notable-works.dd.html">S5: Notable Works</a></strong> &mdash; Wells, Heinlein, Vonnegut, Bradbury, Dark, Primer, Arrival</li>
    <li><strong><a href="s6-modern-renaissance.dd.html">S6: Modern Renaissance</a></strong> &mdash; Television, games, cinema, global perspectives, interactive temporality</li>
  </ul>
  <div class="callout"><h4>The Thesis</h4><p>Fiction is not a derivative consumer of physics. It is a co-equal conceptual laboratory that has repeatedly preceded formal science. The lineage runs from the Mahabharata through Wells to Dark &mdash; and the laboratory is still operating.</p></div>`
];

const details = [

  // 01 Detail - Ancient Roots
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Deep Dive</div>
    <h2><em>Ancient</em> Roots of Time Travel</h2>
  </div>
  <p>The desire to move through time is as old as storytelling itself. Long before the scientific concept of time as a navigable dimension, cultures across the world told stories of characters displaced in time &mdash; traveling to otherworldly realms where time flows differently, sleeping through centuries, or receiving visions of the future.</p>
  <p>The Hindu epic Mahabharata contains what may be the earliest explicit depiction of time dilation.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Revati">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Revati" target="_blank">Wikipedia: Revati &mdash; Hindu legend of time dilation &rarr;</a></span></sup> King Kakudmi (also called Revati&rsquo;s father) travels with his daughter to the realm of Brahma to seek advice on a suitable husband. When they arrive, Brahma is listening to a musical performance. After waiting for the performance to finish &mdash; a wait that feels brief &mdash; Brahma explains that ages have passed on Earth during their visit. Everyone Kakudmi knew is long dead. The structure is identical to relativistic time dilation: time passes at different rates in different reference frames.</p>
  <h3>Urashima Tar&omacr; and the Dragon Palace</h3>
  <p>Japanese folklore tells of the fisherman Urashima Tar&omacr;, who rescues a turtle and is taken to the undersea Dragon Palace (Ry&umacr;g&umacr;-j&omacr;) as a reward. He spends what seems like three days in the palace. When he returns to his village, he discovers that three hundred years have passed. Everyone he knew has died. The village itself has changed beyond recognition. When he opens a box given to him by the sea princess &mdash; against her instructions &mdash; he ages three centuries in an instant.</p>
  <h3>Common Structures</h3>
  <p>These ancient narratives share structural elements that would persist in time travel fiction for millennia: travel to another realm produces temporal displacement; the traveler returns to find the familiar world transformed; the emotional weight falls on loss, alienation, and the irreversibility of time. The mechanisms are supernatural rather than technological, but the narrative architecture is remarkably consistent with modern time travel fiction.</p>
  <div class="callout">
    <h4>Before the Machine</h4>
    <p>The pre-technological time travel stories reveal something fundamental: the human fascination with temporal displacement is not a product of modernity or scientific awareness. It emerges from the basic human experience of time&rsquo;s passage &mdash; the awareness that the world changes in one's absence, and that return is never really return.</p>
  </div>`,

  // 02 Detail - Pre-Einstein Canon
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Deep Dive</div>
    <h2>The Pre-<em>Einstein</em> Canon</h2>
  </div>
  <p>The 19th century produced a substantial body of time travel fiction, all of it written before Einstein&rsquo;s 1905 paper on special relativity. These authors had no physics of time to draw on &mdash; they were working from pure literary imagination and philosophical intuition. What they produced was not merely entertainment but a set of narrative archetypes that would define the genre forever.</p>
  <h3>Irving&rsquo;s Time Slip (1819)</h3>
  <p>Washington Irving&rsquo;s &ldquo;Rip Van Winkle&rdquo; established the time-slip archetype: involuntary forward travel through unconsciousness.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Rip_Van_Winkle">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Rip_Van_Winkle" target="_blank">Wikipedia: Rip Van Winkle (1819) &rarr;</a></span></sup> Rip falls asleep in the Catskill Mountains and wakes to find twenty years have passed. His wife has died, his children have grown, and the American Revolution has happened without him. The emotional architecture &mdash; return to a world that has moved on &mdash; is the foundation of every time-displacement story that followed.</p>
  <h3>Dickens&rsquo;s Temporal Morality (1843)</h3>
  <p>Charles Dickens&rsquo;s <em>A Christmas Carol</em> created the first bidirectional time travel narrative. Scrooge visits his own past, observes his present from an external vantage, and witnesses a possible future &mdash; then returns to the present changed.<sup class="fn"><a href="https://en.wikipedia.org/wiki/A_Christmas_Carol">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/A_Christmas_Carol" target="_blank">Wikipedia: A Christmas Carol (1843) &rarr;</a></span></sup> The mechanism is supernatural (three ghosts), but the narrative structure &mdash; temporal perspective as a tool for moral transformation &mdash; would be inherited by countless subsequent works.</p>
  <h3>Twain&rsquo;s Technological Critique (1889)</h3>
  <p>Mark Twain&rsquo;s <em>A Connecticut Yankee in King Arthur&rsquo;s Court</em> used time travel as social criticism. Hank Morgan, a 19th-century engineer, is transported to 6th-century England and attempts to modernize it. The novel is simultaneously a satire of medieval superstition and a critique of modern industrial violence &mdash; Twain shows both eras as barbaric in different ways. The &ldquo;Yankee abroad in time&rdquo; became a durable archetype.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">1819</div><div class="tl-text">Irving: &ldquo;Rip Van Winkle&rdquo; &mdash; the time-slip archetype</div></div>

  // 03 Detail - Wells
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Deep Dive</div>
    <h2>Wells & <em>The Time Machine</em></h2>
  </div>
  <p>H.G. Wells did not invent time travel fiction, but he invented the conceptual framework that made it a distinct genre. Before Wells, time displacement was something that happened to characters through sleep, magic, or supernatural intervention. After Wells, it was something characters chose to do using technology. This shift &mdash; from passive displacement to active navigation &mdash; transformed time travel from a narrative device into a subject of inquiry.</p>
  <p>The novel&rsquo;s opening chapter contains a passage of remarkable prescience.<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Time_Machine">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Time_Machine" target="_blank">Wikipedia: The Time Machine (1895) &rarr;</a></span></sup> The Time Traveller argues to his dinner guests that time is merely a fourth dimension, no different in kind from the three spatial dimensions. If we can move through space, why not through time? This argument treats time as a geometric property of the universe rather than a subjective flow of experience &mdash; exactly the view Minkowski would formalize thirteen years later when he introduced the concept of spacetime.</p>
  <h3>The Block Universe Intuition</h3>
  <p>Wells&rsquo;s Time Traveller describes all moments of time as existing simultaneously, accessible to anyone with the right technology. This is the block universe &mdash; the view that past, present, and future are equally real, and that the apparent &ldquo;flow&rdquo; of time is an illusion of consciousness. This view is now the standard interpretation of relativity in physics. Wells arrived at it through narrative logic, not equations.</p>
  <h3>Social Prophecy</h3>
  <p>The novel is also a work of social criticism. The Eloi and Morloi of the year 802,701 represent a class division carried to evolutionary extremes: the beautiful, helpless Eloi (descended from the leisure class) and the underground Morloi (descended from the working class) who farm the Eloi for food. Wells used the future as a mirror for Victorian class anxiety &mdash; establishing time travel fiction&rsquo;s enduring capacity for social commentary.</p>
  <div class="callout">
    <h4>The Foundational Insight</h4>
    <p>Wells&rsquo;s deepest contribution was not the time machine as device but time as dimension. By treating time as navigable space, he gave subsequent writers, philosophers, and physicists a framework that persists to this day.</p>
  </div>`,

  // 04 Detail - Anacronopete
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Deep Dive</div>
    <h2><em>El Anacronopete</em> & the Lost First</h2>
  </div>
  <p>Enrique Gaspar y Rimbau&rsquo;s <em>El Anacronopete</em> (1887) holds a distinction that eluded scholarship for over a century: it contains the first time machine in fiction, predating Wells by eight years.<sup class="fn"><a href="https://en.wikipedia.org/wiki/El_Anacron%C3%B3pete">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/El_Anacron%C3%B3pete" target="_blank">Wikipedia: El Anacronopete (1887) &rarr;</a></span></sup> The title combines Greek roots meaning &ldquo;against,&rdquo; &ldquo;time,&rdquo; and &ldquo;to fly&rdquo; &mdash; roughly, &ldquo;the one who flies against time.&rdquo;</p>
  <p>Gaspar was a Spanish diplomat and playwright, not a scientist, and his novel is comedic rather than philosophical. The Anacronopete is a large iron box, powered by electricity, that carries passengers backward through time. The travelers visit the siege of Granada (1492), the court of Charlemagne, ancient Rome, and eventually the creation of the world. A special fluid called &ldquo;Garc&iacute;a&rsquo;s fluid&rdquo; prevents passengers from aging backward along with the surrounding time.</p>
  <h3>Rediscovery and Reassessment</h3>
  <p>The novel was published in Barcelona and performed as a zarzuela (Spanish light opera). It received limited attention in its time and was essentially forgotten until literary scholars rediscovered it in the early 21st century. The first English translation appeared in 2014. This rediscovery forced a reassessment of the standard narrative of time travel fiction, which had placed Wells as the sole originator of the mechanical time-travel concept.</p>
  <h3>Significance</h3>
  <p>El Anacronopete demonstrates that the idea of a machine that travels through time emerged independently in multiple literary traditions. Gaspar and Wells were working from similar cultural contexts (late 19th-century fascination with technology, evolutionary theory, and the accelerating pace of change) but without knowledge of each other&rsquo;s work. The convergence suggests that the time machine was, in a sense, an inevitable literary invention &mdash; one that the cultural moment would have produced regardless of which individual author wrote it first.</p>
  <div class="callout">
    <h4>The Lost Priority</h4>
    <p>Gaspar&rsquo;s priority matters not because it diminishes Wells but because it reveals the time machine as a cultural emergent property &mdash; an idea whose time had come, appearing independently in Spanish and English fiction within a single decade.</p>
  </div>`,

  // 05 Detail - Vocabulary
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Deep Dive</div>
    <h2>Words Fiction <em>Gave</em> Us</h2>
  </div>
  <p>Science fiction has been one of the most productive sources of new vocabulary in English. Jeff Prucher&rsquo;s <em>Brave New Words: The Oxford Dictionary of Science Fiction</em> (2007) documents hundreds of terms that originated in fiction and entered common usage.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Brave_New_Words">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Brave_New_Words" target="_blank">Wikipedia: Brave New Words &mdash; Oxford Dict. of Science Fiction &rarr;</a></span></sup> Time travel fiction has contributed a disproportionate share of this vocabulary.</p>
  <h3>Core Terms</h3>
  <p>The phrase &ldquo;time machine&rdquo; entered English through Wells in 1895 and is now universally understood even by people who have never read the novel. &ldquo;Time travel&rdquo; as a compound noun followed, becoming the standard term for the entire concept. These terms are so deeply embedded in common language that it is difficult to imagine discussing the subject without them &mdash; yet both originated as fictional inventions.</p>
  <h3>Paradox Names</h3>
  <p>The names of the major temporal paradoxes all come from fiction. The &ldquo;grandfather paradox&rdquo; traces to Barjavel&rsquo;s 1943 novel. The &ldquo;bootstrap paradox&rdquo; comes from Heinlein&rsquo;s 1941 story. The &ldquo;butterfly effect&rdquo; as a popular metaphor derives from Bradbury&rsquo;s 1952 story, even though the formal scientific concept was named independently by Lorenz (or, more precisely, by the title of his 1972 talk, which was likely chosen by Philip Merilees).</p>
  <h3>Beyond Terminology</h3>
  <p>Fiction&rsquo;s linguistic contributions go beyond individual terms. Phrases like &ldquo;fixed timeline,&rdquo; &ldquo;branching timeline,&rdquo; &ldquo;time loop,&rdquo; &ldquo;temporal paradox,&rdquo; and &ldquo;causal loop&rdquo; are all products of science fiction discourse. They have been adopted by physicists and philosophers who needed vocabulary for concepts that formal language had not yet named. Fiction created the words; science adopted them.</p>
  <div class="callout">
    <h4>Language Creates Thought</h4>
    <p>The Sapir-Whorf hypothesis suggests that language shapes thought. If time travel fiction created the vocabulary used to think about temporal paradoxes, then fiction has shaped the conceptual space in which physics and philosophy operate.</p>
  </div>`,

  // 06 Detail - Concepts Coined
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Deep Dive</div>
    <h2>Concepts <em>Coined</em> by Authors</h2>
  </div>
  <p>The most striking evidence for fiction as a conceptual laboratory is the chronological record. In multiple documented cases, fiction writers articulated ideas about time that physicists and philosophers would not formalize for years or decades. These are not cases of fiction simplifying existing science for popular consumption &mdash; they are cases of fiction arriving at ideas independently, through narrative logic rather than mathematical formalism.</p>
  <h3>Wells and the Block Universe (1895 &rarr; 1908)</h3>
  <p>Wells described all moments of time as coexisting simultaneously, navigable by a sufficiently advanced technology. Minkowski formalized spacetime &mdash; the mathematical structure in which past, present, and future coexist as a four-dimensional continuum &mdash; thirteen years later. Wells&rsquo;s Time Traveller reasons about the fourth dimension in terms that would not be out of place in a modern physics textbook.</p>
  <h3>Heinlein and Self-Consistent Loops (1941 &rarr; 1989)</h3>
  <p>Heinlein&rsquo;s &ldquo;By His Bootstraps&rdquo; (1941) and &ldquo;All You Zombies&rdquo; (1959) demonstrated that closed causal loops can be internally consistent &mdash; that a time traveler can interact with their own past without creating paradoxes, as long as every action is compatible with the loop&rsquo;s structure.<sup class="fn"><a href="https://en.wikipedia.org/wiki/%22All_You_Zombies%E2%80%94%22">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/%22All_You_Zombies%E2%80%94%22" target="_blank">Wikipedia: &ldquo;All You Zombies&rdquo; (1959) &rarr;</a></span></sup> Novikov did not publish the self-consistency principle until 1989 &mdash; forty-eight years later.</p>
  <h3>Bradbury and Sensitive Dependence (1952 &rarr; 1963)</h3>
  <p>Bradbury&rsquo;s &ldquo;A Sound of Thunder&rdquo; (1952) dramatized the idea that a tiny change in initial conditions (stepping on a butterfly in the Cretaceous) can produce enormous consequences in the future (a different president is elected).<sup class="fn"><a href="https://en.wikipedia.org/wiki/A_Sound_of_Thunder">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/A_Sound_of_Thunder" target="_blank">Wikipedia: A Sound of Thunder (1952) &rarr;</a></span></sup> Lorenz published his foundational chaos theory paper in 1963, eleven years later. The popular term &ldquo;butterfly effect&rdquo; itself echoes Bradbury, though the direct etymological connection is debated.</p>

  // 07 Detail - Fiction Becoming Science
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Deep Dive</div>
    <h2>Fiction Becoming <em>Science</em></h2>
  </div>
  <p>The Sagan&ndash;Thorne collaboration is the most dramatic documented case of fiction generating genuine scientific research. In 1985, Carl Sagan was completing his novel <em>Contact</em> and needed a mechanism for faster-than-light travel that would satisfy a physicist. He sent his manuscript to Kip Thorne at Caltech with a request for help.</p>
  <p>Thorne&rsquo;s response went well beyond consultation. Rather than simply vetting Sagan&rsquo;s existing ideas, he conducted original research into the physics of wormholes. The result was two landmark papers: Morris &amp; Thorne, &ldquo;Wormholes in spacetime and their use for interstellar travel&rdquo; (1988) in the <em>American Journal of Physics</em>, and Morris, Thorne &amp; Yurtsever, &ldquo;Wormholes, Time Machines, and the Weak Energy Condition&rdquo; (1988) in <em>Physical Review Letters</em>.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes" target="_blank">Wikipedia: Traversable Wormholes &rarr;</a></span></sup></p>
  <h3>From Novel to Research Field</h3>
  <p>These papers did not merely answer Sagan&rsquo;s question; they opened an entirely new field of research in general relativity. The concept of traversable wormholes &mdash; wormholes that could theoretically be used for travel &mdash; generated hundreds of subsequent papers. Thorne&rsquo;s analysis also led directly to the study of closed timelike curves (CTCs) in wormhole spacetimes, connecting the traversable-wormhole research to the physics of time travel.</p>
  <h3>The Interstellar Legacy</h3>
  <p>Thorne continued the fiction-to-physics pipeline with Christopher Nolan&rsquo;s <em>Interstellar</em> (2014), serving as executive producer and science advisor. The film&rsquo;s depictions of black holes and time dilation were based on Thorne&rsquo;s calculations, and the visualization of the supermassive black hole Gargantua produced a peer-reviewed paper on gravitational lensing.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Interstellar_(film)">[10]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Interstellar_(film)" target="_blank">Wikipedia: Interstellar (2014 film) &rarr;</a></span></sup></p>
  <h3>Science Fiction Science (2025)</h3>
  <p>The formal recognition of fiction as scientific methodology came with Rahwan, Shariff, and Bonnefon&rsquo;s 2025 paper in <em>Nature</em>, which proposed &ldquo;Science Fiction Science&rdquo; (SFS) as a research paradigm.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Science_fiction#Relationship_to_science">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Science_fiction#Relationship_to_science" target="_blank">Wikipedia: Science Fiction &mdash; Relationship to Science &rarr;</a></span></sup> The paper argued that fictional scenarios can serve as systematic tools for studying human responses to futures that do not yet exist. The Moral Machine experiment (which studied autonomous vehicle ethics using millions of online participants choosing between fictional scenarios) is the paradigmatic example.</p>
  <div class="callout">
    <h4>Bidirectional Flow</h4>
    <p>The Sagan&ndash;Thorne pipeline demonstrates that the relationship between fiction and science is not one-directional. Fiction does not merely popularize science; it generates research questions that science then investigates. The flow is genuinely bidirectional.</p>
  </div>`,

  // 08 Detail - Living Lineage
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 &mdash; Deep Dive</div>
    <h2>The <em>Living</em> Lineage</h2>
  </div>
  <p>The overview of time travel fiction reveals a living lineage that stretches from ancient myth to contemporary interactive media &mdash; a continuous tradition of narrative experimentation with temporal displacement, paradox, and the nature of time itself. This lineage is not merely historical; it is generative. Every new work of time travel fiction inherits the structural archetypes established before Einstein and recombines them in ways shaped by the available medium and the prevailing scientific understanding.</p>
  <h3>Five Foundational Archetypes</h3>
  <p>The pre-Einstein canon established five narrative archetypes that remain the grammar of time travel fiction: the time slip (involuntary displacement, Irving 1819), the moral journey (temporal perspective as ethical transformation, Dickens 1843), the Yankee abroad (technological superiority in a primitive past, Twain 1889), the machine (deliberate technological navigation, Gaspar 1887 / Wells 1895), and the bootstrap (self-causing loops, implicit throughout and formalized by Heinlein 1941). Every subsequent time travel story is a variation on or combination of these five grammars.</p>
  <h3>The Six Dimensions</h3>
  <p>This survey examines time travel fiction across six analytical dimensions, each of which traces a distinct thread through the lineage. <a href="s1-paradoxes.dd.html">Paradoxes and causal logic</a> (S1) examines how fiction discovers and resolves temporal contradictions. <a href="s2-narrative-structures.dd.html">Narrative structures</a> (S2) maps the formal architectures that writers have developed. <a href="s3-scientific-accuracy.dd.html">Scientific accuracy</a> (S3) investigates the productive tension between physics and storytelling. <a href="s4-philosophy.dd.html">Philosophical implications</a> (S4) connects fictional treatments to formal philosophy of time. <a href="s5-notable-works.dd.html">Notable works</a> (S5) analyzes the landmark texts that advanced the genre. <a href="s6-modern-renaissance.dd.html">The modern renaissance</a> (S6) surveys the unprecedented proliferation of time travel fiction across all media in the 2020s.</p>
  <h3>The Central Thesis</h3>
  <p>The unifying thesis across all six dimensions is that fiction is not a derivative consumer of ideas that originate in physics and philosophy. It is a co-equal conceptual laboratory that has repeatedly preceded formal science &mdash; and in several documented cases, directly generated it. Wells articulated the block universe before Minkowski. Heinlein demonstrated self-consistent loops before Novikov. Bradbury dramatized chaos sensitivity before Lorenz. Sagan&rsquo;s novel created a research field in wormhole physics. The laboratory is still operating: interactive media are now exploring temporal mechanics that no formal theory has yet described.</p>
  <div class="callout">
    <h4>A Grammar of Time</h4>
    <p>Time travel fiction is not a genre. It is a grammar &mdash; a set of structural rules for thinking about time, causation, and human agency. The grammar was invented by storytellers, adopted by physicists, and is now being extended by game designers. Its history is the history of how humans learn to think about the dimension they inhabit but cannot see.</p>
  </div>`
];

sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
