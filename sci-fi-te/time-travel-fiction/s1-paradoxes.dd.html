<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,var(--grad1),transparent),radial-gradient(ellipse 60% 50% at 85% 75%,var(--grad2),transparent),radial-gradient(ellipse 40% 40% at 50% 10%,var(--grad1),transparent);transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--grad1),transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Grandfather', title: 'The <em>Grandfather</em> Paradox' },
  { num: '02', short: 'Bootstrap', title: '<em>Bootstrap</em> & Ontological Paradoxes' },
  { num: '03', short: 'Predestination', title: 'The <em>Predestination</em> Trap' },
  { num: '04', short: 'Novikov', title: '<em>Novikov</em> Self-Consistency' },
  { num: '05', short: 'Branching', title: '<em>Branching</em> Timeline Resolution' },
  { num: '06', short: 'Information', title: 'The <em>Information</em> Paradox' },
  { num: '07', short: 'Fiction Lab', title: 'Fiction as <em>Paradox</em> Laboratory' },
  { num: '08', short: 'Taxonomy', title: 'A <em>Taxonomy</em> of Resolutions' }
];

const summaries = [

  // 01 - Grandfather Paradox
  `<p>The most famous paradox in time travel: if you travel back and prevent your own grandfather from meeting your grandmother, you would never be born -- but then who traveled back to prevent the meeting? The paradox exposes a fundamental tension between backward causation and logical consistency that has driven both philosophical analysis and fictional exploration for over a century.</p>
  <p>The paradox was first formalized by science fiction writer Rene Barjavel in his 1943 novel <em>Le Voyageur Imprudent</em>, though the underlying logical structure was implicit in earlier time travel narratives.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Grandfather_paradox">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Grandfather_paradox" target="_blank">Wikipedia: Grandfather Paradox &rarr;</a></span></sup> It remains the starting point for virtually all serious thinking about temporal mechanics.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1943</div><div class="sl">Barjavel's Novel</div></div>
    <div class="st"><div class="sv">1976</div><div class="sl">Lewis's Analysis</div></div>
    <div class="st"><div class="sv">1989</div><div class="sl">Novikov Principle</div></div>
    <div class="st"><div class="sv">2020</div><div class="sl">Tobar-Costa Proof</div></div>
  </div>
  <div class="s-chips">
    <span class="s-chip">consistency paradox</span>
    <span class="s-chip">backward causation</span>
    <span class="s-chip">logical impossibility</span>
    <span class="s-chip">Barjavel</span>
  </div>`,

  // 02 - Bootstrap
  `<p>Also called the ontological paradox or causal loop: an object or piece of information is sent back in time and becomes the cause of its own existence. Where did it originate? Nowhere -- it exists in a closed causal loop with no discernible point of creation. The loop is self-consistent but causally uncaused.</p>
  <p>Robert Heinlein's 1941 story "By His Bootstraps" gave the paradox its popular name.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Bootstrap_paradox">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Bootstrap_paradox" target="_blank">Wikipedia: Bootstrap Paradox &rarr;</a></span></sup> The protagonist meets his future self, receives instructions, follows them, and eventually becomes the future self who gave the instructions. Nothing in the loop has an external cause. The information creates itself.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1941</div><div class="sl">Heinlein Coined It</div></div>
    <div class="st"><div class="sv">1959</div><div class="sl">"All You Zombies"</div></div>
    <div class="st"><div class="sv">2017</div><div class="sl">Dark (Netflix)</div></div>
    <div class="st"><div class="sv">&infin;</div><div class="sl">Loop Iterations</div></div>
  </div>`,

  // 03 - Predestination
  `<p>The predestination paradox occurs when a time traveler's actions in the past become the cause of the very events they traveled back to prevent or observe. The attempt to change history becomes part of history. Your intervention was always part of the timeline -- you cannot escape the loop because the loop includes your escape attempt.</p>
  <p>This is the structural backbone of Terry Gilliam's <em>12 Monkeys</em> (1995),<sup class="fn"><a href="https://en.wikipedia.org/wiki/12_Monkeys">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/12_Monkeys" target="_blank">Wikipedia: 12 Monkeys (1995 film) &rarr;</a></span></sup> where Cole is sent back to prevent a plague but discovers his mission was always embedded in the events that led to it. The emotional power comes from the recognition of inevitability: not fate as mysticism, but fate as logical necessity.</p>
  <div class="s-chips">
    <span class="s-chip">fixed timeline</span>
    <span class="s-chip">causal loop</span>
    <span class="s-chip">inevitability</span>
    <span class="s-chip">12 Monkeys</span>
    <span class="s-chip">Oedipus</span>
  </div>`,

  // 04 - Novikov
  `<p>Russian physicist Igor Novikov proposed in 1989 that the laws of physics would simply prevent any action that would create a paradox.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Novikov_self-consistency_principle">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Novikov_self-consistency_principle" target="_blank">Wikipedia: Novikov Self-Consistency Principle &rarr;</a></span></sup> You can travel to the past, but you cannot change it in any way that would be logically inconsistent. If you try to shoot your grandfather, the gun will jam, or you'll miss, or you'll discover he wasn't your biological grandfather after all.</p>
  <p>Novikov's principle is not a narrative convention -- it's a physics conjecture. Thorne and Klinkhammer tested it using the "billiard ball problem" (a ball sent through a wormhole to collide with its past self) and found that quantum-mechanical path integrals always produce self-consistent solutions. Nature, in this view, enforces consistency automatically.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1989</div><div class="sl">Novikov Principle</div></div>
    <div class="st"><div class="sv">1991</div><div class="sl">Thorne Billiard Ball</div></div>
    <div class="st"><div class="sv">1992</div><div class="sl">Hawking Conjecture</div></div>
    <div class="st"><div class="sv">100%</div><div class="sl">Consistent Solutions</div></div>
  </div>`,

  // 05 - Branching
  `<p>The branching timeline model resolves all paradoxes by positing that changing the past creates a new timeline rather than altering the existing one. Your grandfather still lives in your original timeline; you've created a branch where he doesn't. No contradiction, because the two timelines are causally independent.</p>
  <p>This is the model used by <em>Back to the Future</em>,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Back_to_the_Future">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Back_to_the_Future" target="_blank">Wikipedia: Back to the Future (1985) &rarr;</a></span></sup> the MCU's <em>Endgame</em>, and most popular time travel fiction. It's also compatible with the many-worlds interpretation of quantum mechanics (Everett, 1957)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Many-worlds_interpretation">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Many-worlds_interpretation" target="_blank">Wikipedia: Many-Worlds Interpretation &rarr;</a></span></sup>, which posits that all possible outcomes of quantum measurements are realized in separate branches of a universal wavefunction.</p>
  <div class="s-chips">
    <span class="s-chip">many-worlds</span>
    <span class="s-chip">parallel timelines</span>
    <span class="s-chip">Back to the Future</span>
    <span class="s-chip">Endgame</span>
    <span class="s-chip">Everett</span>
  </div>`,

  // 06 - Information
  `<p>A special case of the bootstrap paradox focused on knowledge rather than objects: a time traveler brings information from the future to the past, where it becomes the basis for the future knowledge. A physicist reads her own future paper, publishes it, and the paper exists in a loop with no original author.</p>
  <p>Ted Chiang's "Story of Your Life"<sup class="fn"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life" target="_blank">Wikipedia: Story of Your Life (Chiang, 1998) &rarr;</a></span></sup> explores a related problem: if you can perceive the future, does that knowledge change your actions? Chiang's answer is radical -- Louise Banks learns the heptapod language, gains non-linear temporal perception, and chooses to live through future pain she already knows is coming. Knowledge of the future does not change it; it deepens the experience of living through it.</p>
  <div class="s-chips">
    <span class="s-chip">Chiang</span>
    <span class="s-chip">heptapod B</span>
    <span class="s-chip">foreknowledge</span>
    <span class="s-chip">free will</span>
    <span class="s-chip">information loop</span>
  </div>`,

  // 07 - Fiction Lab
  `<p>Fiction is the primary laboratory for exploring temporal paradoxes because it can do something that formal logic and physics cannot: hold contradictory possibilities simultaneously and explore their emotional, narrative, and philosophical consequences. A paradox that is a dead end in logic becomes a generative starting point in fiction.</p>
  <p>Heinlein explored the bootstrap paradox in 1941 -- forty-eight years before Novikov formalized self-consistency in physics. Bradbury explored the butterfly effect in 1952 -- eleven years before Lorenz published his chaos theory paper. Fiction doesn't just illustrate paradoxes; it discovers them first.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">48 yrs</div><div class="sl">Heinlein before Novikov</div></div>
    <div class="st"><div class="sv">11 yrs</div><div class="sl">Bradbury before Lorenz</div></div>
    <div class="st"><div class="sv">34 yrs</div><div class="sl">Wells before Everett</div></div>
    <div class="st"><div class="sv">10 yrs</div><div class="sl">Wells before Einstein</div></div>
  </div>`,

  // 08 - Taxonomy
  `<p>Every time travel story resolves its paradoxes using one of four strategies, each with distinct narrative consequences:</p>
  <h4>Resolution Strategies</h4>
  <ul class="s-list">
    <li><strong>Fixed timeline</strong> -- You cannot change the past. Your actions were always part of history. Produces tragedy and deterministic irony. (<em>12 Monkeys</em>, <em>Dark</em>, Novikov principle)</li>
    <li><strong>Dynamic timeline</strong> -- You can change the past, and the present updates accordingly. Produces adventure and agency. (<em>Back to the Future</em>, "A Sound of Thunder")</li>
    <li><strong>Branching timeline</strong> -- Changes create new parallel timelines. Produces multiverse complexity. (<em>Endgame</em>, <em>Primer</em> partially)</li>
    <li><strong>Dissolution</strong> -- The story reframes time travel so paradoxes don't apply. Produces philosophical wonder. (<em>Arrival</em>, <em>Slaughterhouse-Five</em>)</li>
  </ul>
  <div class="s-chips">
    <span class="s-chip">fixed</span>
    <span class="s-chip">dynamic</span>
    <span class="s-chip">branching</span>
    <span class="s-chip">dissolution</span>
  </div>`
];

const details = [

  // 01 Detail - Grandfather
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 — Deep Dive</div>
    <h2>The <em>Grandfather</em> Paradox</h2>
  </div>
  <p>The grandfather paradox is the most discussed problem in the philosophy and physics of time travel, but its deepest significance is not logical -- it is existential. The paradox asks: can an agent act in a way that negates the conditions of their own existence? This is not merely a puzzle about temporal mechanics; it is a question about the relationship between agency, identity, and causation.</p>
  <p>Rene Barjavel's 1943 novel <em>Le Voyageur Imprudent</em> (The Imprudent Traveler) is credited with the first explicit formulation.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Grandfather_paradox">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Grandfather_paradox" target="_blank">Wikipedia: Grandfather Paradox &rarr;</a></span></sup> The protagonist travels to the past and inadvertently kills an ancestor, creating the logical impossibility. But the structure was already present in earlier works -- any story where a time traveler changes their own past contains the seed of the grandfather paradox.</p>
  <h3>David Lewis's Resolution</h3>
  <p>Philosopher David Lewis, in his influential 1976 paper "The Paradoxes of Time Travel,"<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Paradoxes_of_Time_Travel">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Paradoxes_of_Time_Travel" target="_blank">Wikipedia: Lewis, &ldquo;The Paradoxes of Time Travel&rdquo; (1976) &rarr;</a></span></sup> argued that the grandfather paradox is not really a paradox at all. Lewis distinguished between two senses of "can": Tim can kill his grandfather in the sense that he has the physical ability, the weapon, and the opportunity. But Tim cannot kill his grandfather in the sense that doing so would be logically contradictory -- and logic is not a constraint that can be overcome by determination or better aim. The past is what happened. If Tim's grandfather survived, then Tim didn't kill him, regardless of what Tim tried to do.</p>
  <p>Lewis's analysis is elegant but raises its own questions. What constrains Tim? Not physics in any obvious sense -- there's no force field around grandfather. Lewis's answer is that the constraint is logical, not physical. But this feels unsatisfying to storytellers, who need dramatic tension. The best time travel fiction finds creative ways to show the constraint in action: the gun jams, the bullet misses, a stranger intervenes. The constraint becomes narrative machinery.</p>
  <h3>The 2020 Tobar-Costa Result</h3>
  <p>In 2020, physicists Germain Tobar and Fabio Costa at the University of Queensland published a mathematical proof that self-consistent time travel is possible even in the presence of paradox-generating scenarios. Their model showed that events would "adjust" themselves to avoid paradoxes -- if you tried to prevent patient zero from being infected, the virus would find another pathway. The mathematics produces deterministic self-consistency without requiring external constraints.</p>
  <div class="callout">
    <h4>The Emotional Core</h4>
    <p>Beneath the logic, the grandfather paradox captures a universal human anxiety: the fear that our existence is contingent, fragile, dependent on a chain of events that could so easily have gone differently. Time travel fiction transforms this existential vertigo into narrative.</p>
  </div>`,

  // 02 Detail - Bootstrap
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Deep Dive</div>
    <h2><em>Bootstrap</em> & Ontological Paradoxes</h2>
  </div>
  <p>The bootstrap paradox is named after the absurd proposition of pulling yourself up by your own bootstraps -- an act that violates basic causality. In its temporal form, an object or piece of information travels in a closed loop through time, with no originating event. The object has no creator, the information has no author, and the loop sustains itself across iterations that have no beginning or end.</p>
  <p>The term was popularized by Robert Heinlein's 1941 story "By His Bootstraps,"<sup class="fn"><a href="https://en.wikipedia.org/wiki/%22By_His_Bootstraps%22">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/%22By_His_Bootstraps%22" target="_blank">Wikipedia: &ldquo;By His Bootstraps&rdquo; (Heinlein, 1941) &rarr;</a></span></sup> in which a man meets his future self, receives a set of instructions, follows them, and eventually becomes the person who delivers the instructions. The story's brilliance is structural: Heinlein doesn't just describe a bootstrap paradox -- he makes the reader experience one by gradually revealing that all the characters in the story are the same person at different points in his timeline.</p>
  <h3>Heinlein's "All You Zombies" (1959)</h3>
  <p>Heinlein pushed the bootstrap paradox to its logical extreme in this short story,<sup class="fn"><a href="https://en.wikipedia.org/wiki/%22All_You_Zombies%E2%80%94%22">[10]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/%22All_You_Zombies%E2%80%94%22" target="_blank">Wikipedia: &ldquo;All You Zombies&rdquo; (Heinlein, 1959) &rarr;</a></span></sup> where a character is revealed to be their own mother, father, daughter, son, and the temporal agent who recruited them. Every character in the story is the same person. The causal loop is total: no external cause exists for any event in the narrative. It is the purest bootstrap paradox in fiction.</p>
  <h3>Dark's Generational Loops</h3>
  <p>The Netflix series <em>Dark</em> (2017-2020)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Dark_(TV_series)">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Dark_(TV_series)" target="_blank">Wikipedia: Dark (TV series, 2017&ndash;2020) &rarr;</a></span></sup> extended the bootstrap paradox across three generations and three time periods (1953, 1986, 2019), creating loops where characters are their own grandparents, where objects circulate endlessly through time, and where the town of Winden exists in a self-causing knot of causality. The series treated the bootstrap paradox not as a puzzle to be solved but as a condition to be endured -- the emotional weight comes from characters who discover they cannot escape a loop that defines their existence.</p>
  <h3>The Philosophical Problem</h3>
  <p>The bootstrap paradox violates the principle of sufficient reason -- the philosophical claim that everything must have a cause or explanation. In a bootstrap loop, the loop itself is the explanation, but the loop has no explanation. This is not a logical contradiction (the loop is internally consistent), but it is deeply unsettling to our causal intuitions. Some philosophers argue that bootstrap paradoxes prove time travel is impossible. Others argue they simply show that our intuitions about causation are parochial.</p>

  // 03 Detail - Predestination
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 — Deep Dive</div>
    <h2>The <em>Predestination</em> Trap</h2>
  </div>
  <p>The predestination paradox is the narrative engine of tragedy applied to time travel. A character travels back in time to prevent a catastrophe, and their very attempt to prevent it becomes the cause. The structure is ancient -- it is the structure of Oedipus, who flees the prophecy and thereby fulfills it. Time travel fiction gave this structure a mechanical basis.</p>
  <p>In Terry Gilliam's <em>12 Monkeys</em> (1995, adapted from Chris Marker's <em>La Jet&eacute;e</em>, 1962),<sup class="fn"><a href="https://en.wikipedia.org/wiki/12_Monkeys">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/12_Monkeys" target="_blank">Wikipedia: 12 Monkeys (1995 film) &rarr;</a></span></sup> James Cole is sent back from a post-apocalyptic future to gather information about a plague. Throughout the film, Cole experiences fragmentary memories of a scene at an airport -- a woman's face, a man being shot. In the final act, we discover that the man being shot is Cole himself, and the memory that has haunted him his entire life is the memory of his own death, witnessed as a child. His mission to prevent the plague was never going to succeed; it was always part of the events that produced the future he came from.</p>
  <h3>The Fixed Timeline Aesthetic</h3>
  <p>The predestination paradox requires a fixed timeline -- the past cannot be changed, and attempts to change it are absorbed into the existing causal structure. This produces a distinctive aesthetic: the beauty of inevitability. Characters in fixed-timeline stories don't have less agency; they have a different relationship to it. Their choices are real, but their outcomes were always determined. The drama comes from the gap between what characters want and what was always going to happen.</p>
  <h3>Dark's Sic Mundus</h3>
  <p>The Netflix series <em>Dark</em> pushed predestination to its structural limit. The secret society "Sic Mundus Creatus Est" (Thus the world was created) operates across three time periods, and every action its members take to break the cycle of tragedy turns out to be the action that creates the cycle. Adam (the elderly Jonas) spends decades trying to destroy the knot of intertwined timelines, only to discover that his attempts to destroy it are what created it. The emotional devastation comes from the recognition that effort, hope, and resistance are all part of the machine.</p>
  <div class="callout">
    <h4>The Oedipus Structure</h4>
    <p>The predestination paradox is the oldest dramatic structure in Western literature, transplanted into science fiction. Oedipus's father sent him away to prevent the prophecy; the sending-away was the prophecy's fulfillment mechanism. Every predestination story is a variation on Sophocles.</p>
  </div>`,

  // 04 Detail - Novikov
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 — Deep Dive</div>
    <h2><em>Novikov</em> Self-Consistency</h2>
  </div>
  <p>Igor Dmitrievich Novikov, a Russian theoretical physicist, proposed in the mid-1980s what became known as the Novikov self-consistency principle (formally published in 1989)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Novikov_self-consistency_principle">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Novikov_self-consistency_principle" target="_blank">Wikipedia: Novikov Self-Consistency Principle &rarr;</a></span></sup>: if closed timelike curves exist in spacetime, the probability of any event that would create a paradox is zero. Not low -- zero. Physics itself enforces consistency.</p>
  <p>This is a remarkable claim. It means that the laws of physics are not merely descriptive (telling us what happens) but prescriptive in a new way (telling us what can happen given the global structure of spacetime). If you could travel to the past, you would be physically unable to do anything that would create a logical contradiction. The constraint is built into the geometry of spacetime itself.</p>
  <h3>The Billiard Ball Experiment</h3>
  <p>Kip Thorne and his colleagues at Caltech tested Novikov's principle using a thought experiment: a billiard ball enters a wormhole, exits in the past, and collides with its earlier self in a way that prevents it from entering the wormhole. This seems to create an unavoidable paradox. But when Thorne and Klinkhammer analyzed the problem using quantum-mechanical path integrals (Feynman's sum-over-histories approach), they found that every initial condition produced at least one self-consistent trajectory. The ball might graze its past self instead of hitting it head-on, deflecting just enough to still enter the wormhole. Consistency is not just possible -- it is inevitable.</p>
  <h3>Hawking's Chronology Protection</h3>
  <p>Stephen Hawking proposed a complementary conjecture in 1992: the chronology protection conjecture.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Chronology_protection_conjecture">[12]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Chronology_protection_conjecture" target="_blank">Wikipedia: Chronology Protection Conjecture (Hawking, 1992) &rarr;</a></span></sup> Where Novikov says "time travel is possible but paradoxes are not," Hawking says "the laws of physics prevent time travel from occurring in the first place." The mechanism Hawking proposed is quantum back-reaction: as a time machine approaches activation, quantum vacuum fluctuations near the chronology horizon grow without bound, destroying the machine before it can operate. Nature, Hawking suggested, protects chronological order.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Novikov's View</h4>
      <ul>
        <li>Time travel is physically possible</li>
        <li>Paradoxes are automatically prevented</li>
        <li>Self-consistent histories always exist</li>
        <li>Free will is constrained but not eliminated</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Hawking's View</h4>
      <ul>
        <li>Time travel is physically prevented</li>
        <li>Paradoxes never arise because CTCs never form</li>
        <li>Chronology is protected by quantum effects</li>
        <li>The question of free will never arises</li>
      </ul>
    </div>
  </div>`,

  // 05 Detail - Branching
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 — Deep Dive</div>
    <h2><em>Branching</em> Timeline Resolution</h2>
  </div>
  <p>The branching timeline model is the most popular resolution to time travel paradoxes in mainstream fiction, and for good reason: it preserves both the ability to change the past and logical consistency. When Marty McFly prevents his parents from meeting in <em>Back to the Future</em>, he doesn't create a paradox -- he creates a new branch of reality where his parents never met, while his original timeline (from which he departed) continues to exist.</p>
  <p>The physics basis for branching timelines comes from Hugh Everett III's 1957 many-worlds interpretation of quantum mechanics, which proposes that every quantum measurement causes the universe to split into branches representing all possible outcomes. If time travel creates new branches rather than altering existing ones, paradoxes become impossible because the "changed" past exists in a different branch from the traveler's origin.</p>
  <h3>Primer's Nested Branches</h3>
  <p>Shane Carruth's <em>Primer</em> (2004)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Primer_(film)">[13]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Primer_(film)" target="_blank">Wikipedia: Primer (2004 film) &rarr;</a></span></sup> uses a version of branching that is almost impossibly complex. Each use of the time machine creates a new timeline, and characters from different timelines can interact, creating overlapping layers of reality. By the film's end, there are at least nine overlapping timelines, and no character (including the audience) can be certain which branch they're observing. Primer doesn't just use branching timelines as a plot device -- it makes the cognitive difficulty of tracking branches the film's primary experience.</p>
  <h3>The Narrative Cost</h3>
  <p>Branching timelines solve the logic problem but create a narrative one: if every change creates a new branch, then nothing the characters do in the past has consequences for the world they care about. The original timeline is unaffected. This is why many writers avoid pure branching -- it removes stakes. The most effective branching stories find ways to make the branches matter emotionally even when they don't matter causally.</p>

  // 06 Detail - Information
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 — Deep Dive</div>
    <h2>The <em>Information</em> Paradox</h2>
  </div>
  <p>The information paradox is a special case of the bootstrap paradox that focuses specifically on knowledge, data, or creative works that exist in closed causal loops. A composer hears a symphony from the future, transcribes it, and the transcription becomes the symphony that will be sent back. Who wrote it? The question has no answer -- the information is self-creating, and the second law of thermodynamics (which governs information entropy) seems to be violated.</p>
  <p>This variant of the bootstrap paradox has particular resonance because it touches on questions of authorship, creativity, and originality. If a novel exists in a causal loop, is it a work of art? Does it have aesthetic value if no consciousness ever created it? These questions connect time travel physics to philosophy of mind and aesthetics.</p>
  <h3>Chiang's Linguistic Solution</h3>
  <p>Ted Chiang's "Story of Your Life" (1998)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life" target="_blank">Wikipedia: Story of Your Life (Chiang, 1998) &rarr;</a></span></sup> offers perhaps the most sophisticated treatment of temporal information in fiction. The heptapod aliens perceive time non-linearly -- they experience all moments simultaneously, as a block. Their written language (Heptapod B) is semasiographic: it conveys meaning without reference to temporal sequence. When Louise Banks learns Heptapod B, she gains the ability to perceive her own future, including the death of her daughter.</p>
  <p>The key insight is that foreknowledge does not eliminate choice. Louise knows her daughter will die young. She chooses to have her daughter anyway. This is not fatalism -- it is what Chiang calls "performing" a future you already know, the way an actor performs a script they've memorized. The information paradox dissolves because the question was wrong: knowing the future doesn't mean you could have changed it. It means you understand why you chose what you chose.</p>
  <h3>Dark's Letter</h3>
  <p>In <em>Dark</em>, a letter from the future circulates through the timeline, delivered to characters who then ensure it reaches the next recipient in the chain. The letter has no author -- or rather, its author is the loop itself. The series uses this letter as a symbol for the information paradox writ large: the entire town of Winden runs on information that has no origin, embedded in a causal structure that created itself.</p>
  <div class="callout">
    <h4>The Thermodynamic Problem</h4>
    <p>Information in a closed loop appears to violate the second law of thermodynamics. Each pass through the loop should degrade the information (increase entropy). But the loop is closed -- there is no "each pass." The information exists timelessly, outside the arrow of entropy. This is either a deep feature of temporal physics or a sign that closed causal loops are impossible.</p>
  </div>`,

  // 07 Detail - Fiction Lab
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 — Deep Dive</div>
    <h2>Fiction as <em>Paradox</em> Laboratory</h2>
  </div>
  <p>The relationship between fiction and formal analysis of temporal paradoxes is not one of illustration -- fiction leading, theory following. In nearly every major case, writers discovered paradoxes decades before physicists and philosophers formalized them. This is not coincidence. Fiction has structural advantages as a laboratory for paradox exploration that formal systems lack.</p>
  <p>First, fiction can hold contradictory states simultaneously. A story can show both sides of a paradox -- the timeline where grandfather dies and the timeline where he doesn't -- without being required to resolve the contradiction formally. The audience experiences the paradox rather than merely analyzing it. Second, fiction embeds paradoxes in emotional contexts that reveal their human significance. The grandfather paradox is not just a logical puzzle; it is a meditation on the contingency of existence. Third, fiction can explore consequences of paradoxes across extended timescales and multiple characters -- something that thought experiments in philosophy and physics cannot do.</p>
  <h3>The Chronological Evidence</h3>
  <p>The timeline of discovery is striking. H.G. Wells articulated the idea that all moments of time coexist simultaneously in 1895 -- the block universe, which physicists now call eternalism. Minkowski formalized this as spacetime in 1908. Heinlein explored the bootstrap paradox in 1941; Novikov published the self-consistency principle in 1989. Bradbury dramatized sensitive dependence on initial conditions in 1952; Lorenz published the butterfly effect in chaos theory in 1963. In each case, fiction arrived first by years or decades.</p>
  <h3>Science Fiction Science</h3>
  <p>A 2025 paper in Nature by Rahwan, Shariff, and Bonnefon formally proposed "Science Fiction Science" (SFS) as a research methodology<sup class="fn"><a href="https://en.wikipedia.org/wiki/Science_fiction#Relationship_to_science">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Science_fiction#Relationship_to_science" target="_blank">Rahwan et al.: Science Fiction Science, Nature (2025) &rarr;</a></span></sup> -- using fictional scenarios to systematically study how people would respond to futures that don't yet exist. The Moral Machine experiment, which studied autonomous vehicle ethics using millions of online participants, is a direct application. The paper argues that fiction is not merely a source of inspiration for science but a legitimate tool within it.</p>
  <div class="callout">
    <h4>The Thesis</h4>
    <p>Fiction is not a popularizer of ideas that originate in physics and philosophy. It is an independent mode of discovery that operates through narrative rather than formalism. The paradoxes of time travel were discovered in fiction first because fiction is better at exploring paradoxes than formal logic is.</p>
  </div>`,

  // 08 Detail - Taxonomy
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 — Deep Dive</div>
    <h2>A <em>Taxonomy</em> of Resolutions</h2>
  </div>
  <p>After surveying the major paradoxes and their treatments in fiction, physics, and philosophy, a clear taxonomy emerges. Every time travel narrative resolves its temporal mechanics using one of four fundamental strategies. The choice of strategy is not merely technical -- it determines the story's emotional register, philosophical implications, and narrative possibilities.</p>
  <h3>Fixed Timeline (Novikov/Deterministic)</h3>
  <p>The past cannot be changed. Every action the time traveler takes in the past was always part of history. This produces stories of tragic inevitability: characters struggle against a fate that their struggle creates. The emotional register is melancholy, irony, and the beauty of acceptance. Representative works: <em>12 Monkeys</em>, <em>Dark</em>, "All You Zombies," <em>The Time Traveler's Wife</em>. Physics basis: Novikov self-consistency principle.</p>
  <h3>Dynamic Timeline (Mutable Past)</h3>
  <p>The past can be changed, and those changes propagate forward to alter the present. This is the most intuitive model for audiences but the most problematic for physics (it violates conservation laws and creates paradoxes unless additional rules are imposed). The emotional register is adventure, urgency, and consequence. Representative works: <em>Back to the Future</em>, "A Sound of Thunder," <em>The Butterfly Effect</em>. Physics basis: none directly; requires metaphysical assumptions beyond standard GR.</p>
  <h3>Branching Timeline (Many-Worlds)</h3>
  <p>Changes to the past create new timeline branches rather than altering the original. Paradoxes are impossible because each version of events occurs in its own causally independent branch. The emotional register is vertigo, loss (you can never return to your original branch), and the existential weight of infinite possibility. Representative works: <em>Primer</em>, <em>Endgame</em>, <em>Rick and Morty</em>. Physics basis: Everett's many-worlds interpretation of quantum mechanics.</p>
  <h3>Dissolution (Transcendence)</h3>
  <p>The story reframes the nature of time itself so that paradoxes become category errors. Time is not a river that can be dammed or diverted; it is an ocean in which all moments coexist. The traveler doesn't change the past -- they perceive it differently. The emotional register is wonder, acceptance, and philosophical depth. Representative works: <em>Arrival</em>, <em>Slaughterhouse-Five</em>, <em>Interstellar</em> (partially). Physics basis: block universe / eternalism.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Fixed: Tragedy</h4>
      <p>You cannot change what happened. Your attempt to change it was always part of what happened. The beauty is in acceptance.</p>
    </div>
    <div class="feat">
      <h4>Dynamic: Adventure</h4>
      <p>The past is malleable. Your choices matter. The danger is unintended consequences rippling forward.</p>
    </div>
    <div class="feat">
      <h4>Branching: Vertigo</h4>
      <p>Every change creates a new world. You can never go home. The weight is in infinite divergence.</p>
    </div>
    <div class="feat">
      <h4>Dissolution: Wonder</h4>
      <p>Time is not what you thought. The paradox was in the question, not the answer. Perception is liberation.</p>
    </div>
  </div>`
];

    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
