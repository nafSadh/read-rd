<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'TV Golden Age', title: 'Television\'s <em>Golden</em> Age' },
  { num: '02', short: 'Games', title: '<em>Interactive</em> Temporality' },
  { num: '03', short: 'Film 2010s', title: '<em>Cinema</em> in the 2010s-2020s' },
  { num: '04', short: 'Literature', title: '<em>Literary</em> Fiction & Time' },
  { num: '05', short: 'Streaming', title: 'The <em>Streaming</em> Effect' },
  { num: '06', short: 'Global', title: '<em>Global</em> Perspectives' },
  { num: '07', short: 'Why Now', title: 'Why Time Travel <em>Now</em>?' },
  { num: '08', short: 'Future', title: 'The <em>Future</em> of Time Travel Fiction' }
];

const summaries = [
  `<p>The 2010s and 2020s represent an unprecedented golden age for time travel on television. Long-form serialized storytelling enables temporal complexity that 2-hour films cannot sustain. <em>Dark</em> (3 seasons, 26 episodes)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Dark_(TV_series)">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Dark_(TV_series)" target="_blank">Wikipedia: Dark (TV series, 2017&ndash;2020) &rarr;</a></span></sup> built the most intricate causal loop structure ever filmed. <em>12 Monkeys</em> (4 seasons) expanded Gilliam's film into a sprawling epic. <em>Russian Doll</em>, <em>The Peripheral</em>, and <em>Travelers</em> each found distinctive approaches to temporal mechanics.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Dark</div><div class="sl">2017-2020</div></div>
    <div class="st"><div class="sv">12 Monkeys</div><div class="sl">2015-2018</div></div>
    <div class="st"><div class="sv">Russian Doll</div><div class="sl">2019-2022</div></div>
    <div class="st"><div class="sv">Loki</div><div class="sl">2021-2023</div></div>
  </div>`,

  `<p>Video games have created temporal structures impossible in linear media. The player becomes the time traveler, making decisions whose consequences unfold across timelines they can directly experience. <em>Braid</em> (2008)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Braid_(video_game)">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Braid_(video_game)" target="_blank">Wikipedia: Braid (2008 video game) &rarr;</a></span></sup> assigns different time-manipulation rules to each world. <em>Outer Wilds</em> (2019)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Outer_Wilds">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Outer_Wilds" target="_blank">Wikipedia: Outer Wilds (2019 game) &rarr;</a></span></sup> uses a 22-minute loop where knowledge alone persists. <em>Life is Strange</em> (2015) gives players rewind power with butterfly-effect consequences.</p>
  <div class="s-chips">
    <span class="s-chip">Braid 2008</span>
    <span class="s-chip">Life is Strange 2015</span>
    <span class="s-chip">Outer Wilds 2019</span>
    <span class="s-chip">Hades 2020</span>
    <span class="s-chip">Deathloop 2021</span>
  </div>`,

  `<p>Cinema in the 2010s-2020s produced some of the most ambitious time travel films ever made. <em>Interstellar</em> (2014) brought real physics to blockbuster cinema. <em>Arrival</em> (2016) turned linguistics into time travel. <em>Tenet</em> (2020)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Tenet_(film)">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Tenet_(film)" target="_blank">Wikipedia: Tenet (2020 film) &rarr;</a></span></sup> introduced temporal inversion as military strategy. <em>Everything Everywhere All at Once</em> (2022) used multiverse mechanics as a vehicle for immigrant family drama.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">$681M</div><div class="sl">Interstellar</div></div>
    <div class="st"><div class="sv">$203M</div><div class="sl">Arrival</div></div>
    <div class="st"><div class="sv">$363M</div><div class="sl">Tenet</div></div>
    <div class="st"><div class="sv">7 Oscars</div><div class="sl">EEAAO</div></div>
  </div>`,

  `<p>Literary fiction has increasingly embraced temporal manipulation beyond genre boundaries. Kate Atkinson's <em>Life After Life</em> (2013) restarts its protagonist's life from birth repeatedly, each iteration diverging from the last. Matt Haig's <em>The Midnight Library</em> (2020) uses a multiverse conceit to explore unlived lives. Emily St. John Mandel's <em>Sea of Tranquility</em> (2022) combines time travel with pandemic fiction across centuries.</p>
  <div class="s-chips">
    <span class="s-chip">Atkinson</span>
    <span class="s-chip">Haig</span>
    <span class="s-chip">Mandel</span>
    <span class="s-chip">literary fiction</span>
    <span class="s-chip">crossover</span>
  </div>`,

  `<p>Streaming platforms have transformed time travel fiction by removing constraints that broadcast television imposed: episode length, season length, and the need for episodic self-containment. Netflix's <em>Dark</em> could sustain 26 episodes of continuous temporal complexity because viewers could rewatch and pause. Apple TV+'s <em>Severance</em> uses temporal fragmentation as workplace horror. The binge model rewards narrative density that broadcast models punished.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Netflix</div><div class="sl">Dark, 1899</div></div>
    <div class="st"><div class="sv">Apple TV+</div><div class="sl">Severance, Dark Matter</div></div>
    <div class="st"><div class="sv">Prime</div><div class="sl">The Peripheral</div></div>

  <p>Television has become the dominant medium for time travel fiction in the 2020s, and the reason is structural: long-form serialized storytelling can sustain temporal complexity that 2-hour films cannot. A film must establish its time travel rules, create emotional stakes, and resolve them in approximately 120 minutes. A television series can spend 26 hours building a causal structure so intricate that it becomes a world unto itself.</p>
  <p><em>Dark</em> is the supreme example. Baran bo Odar and Jantje Friese used the Netflix model -- full-season drops, binge-watching culture, an engaged online community that collaborated on deciphering the timeline -- to create a narrative that would have been impossible in any prior television era. The show's official website with interactive family tree and timeline navigation became essential viewing companion, blurring the line between watching and studying.</p>
  <h3>The 12 Monkeys Achievement</h3>
  <p>The Syfy series <em>12 Monkeys</em> (2015-2018) expanded Terry Gilliam's 1995 film into four seasons of sustained temporal complexity, ultimately creating one of the most ambitious time travel narratives on television. The series used both fixed-timeline and branching-timeline mechanics, combining them in ways that the film's limited runtime could never have supported. By its final season, the show had built a cosmology of temporal physics that rivaled any in the genre.</p>
  <h3>Russian Doll's Innovation</h3>
  <p>Natasha Lyonne's <em>Russian Doll</em> (2019-2022) brought the time loop to prestige television. Season 1 used a Groundhog Day loop structure filtered through millennial anxiety and New York texture. Season 2 shifted to a different temporal mechanic entirely -- time travel into the bodies of family members in the past -- demonstrating that the same show could explore multiple temporal structures across seasons. The series treated temporal mechanics as flexible tools for emotional exploration rather than fixed genre requirements.</p>

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Deep Dive</div><h2><em>Interactive</em> Temporality</h2></div>
  <p>Video games have introduced a dimension to time travel fiction that no linear medium can replicate: the player as time traveler. In a film or novel, the audience observes someone else's temporal displacement. In a game, the player experiences it directly -- making decisions, living with consequences, and (crucially) rewinding to try again. This transforms the time loop from narrative device to gameplay mechanic, and the transformation reveals new philosophical dimensions of temporal experience.</p>
  <h3>Outer Wilds: Pure Knowledge</h3>
  <p><em>Outer Wilds</em> (2019) by Mobius Digital is the most philosophically elegant time travel game. The player explores a solar system that resets every 22 minutes when the sun goes supernova. There are no upgrades, no power-ups, no permanent changes to the game world. The only thing that persists across loops is the player's knowledge. The game can be completed in a single 22-minute loop -- if the player knows exactly what to do. This makes knowledge itself the progression mechanic and creates a pure expression of the time loop's philosophical core: repetition strips away everything except understanding.</p>
  <h3>Braid: Rules as Meaning</h3>
  <p>Jonathan Blow's <em>Braid</em> (2008) assigns a different time-manipulation rule to each of its six worlds. In one world, time reverses when you walk left. In another, a shadow replays your previous actions while you move independently. In a third, time only advances when you move. Each ruleset is a thought experiment about a different aspect of temporal mechanics, and the player must internalize each set to solve the puzzles. The final level -- revealed to be a reversal of what appeared to be a rescue -- recontextualizes the entire game as a meditation on obsession and the desire to undo the past.</p>
  <h3>The Roguelike as Time Loop</h3>
  <p>The roguelike genre -- games where death sends you back to the beginning, retaining knowledge but losing progress -- has become a dominant form in the 2020s. <em>Hades</em> (2020), <em>Returnal</em> (2021), and <em>Deathloop</em> (2021) all use the death-and-rebirth structure as a narrative time loop. The player's repeated deaths become plot points: characters acknowledge them, the world responds to them, and the experience of repetition-with-variation becomes the game's emotional texture.</p>
  <div class="callout"><h4>The Medium's Advantage</h4><p>Games can make the player the time traveler in a way no other medium can. When you rewind in Life is Strange, or restart in Outer Wilds, or die and return in Hades, you are not observing a character's temporal displacement -- you are experiencing it. The philosophical implications of time travel become experiential rather than intellectual, and the medium's interactivity reveals dimensions of temporal experience that linear storytelling cannot access.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 — Deep Dive</div><h2><em>Cinema</em> in the 2010s-2020s</h2></div>
  <p>The 2010s and 2020s produced the most scientifically rigorous, philosophically sophisticated, and formally ambitious time travel films in cinema history. Christopher Nolan alone contributed three films that each approached temporal mechanics from a different angle: <em>Interstellar</em> (2014, relativistic time dilation), <em>Dunkirk</em> (2017, three timescales running simultaneously), and <em>Tenet</em> (2020, temporal inversion/entropy reversal).</p>
  <h3>Everything Everywhere All at Once</h3>
  <p>Daniel Kwan and Daniel Scheinert's 2022 film used multiverse mechanics -- a character accessing skills and experiences from parallel versions of herself -- as a vehicle for a story about immigrant family dynamics, generational trauma, and the overwhelming absurdity of existence. The film won seven Academy Awards including Best Picture, demonstrating that temporal/multiverse mechanics had moved from genre curiosity to mainstream prestige. The mechanics serve the emotional story rather than the other way around: the multiverse is interesting because the family dynamics are devastating.</p>
  <h3>The Nolan Trajectory</h3>
  <p>Nolan's three time-focused films trace a trajectory from emotional accessibility to formal difficulty. <em>Interstellar</em> makes relativistic dilation emotionally devastating through the Miller's planet sequence. <em>Dunkirk</em> runs three timescales simultaneously (one week on the beach, one day on the sea, one hour in the air) without time travel, using temporal structure as a storytelling technique. <em>Tenet</em> introduces temporal inversion -- objects and people moving backward through time while the world moves forward -- and the audience's difficulty following the mechanics became a cultural phenomenon in itself.</p>
  <div class="callout"><h4>The Pattern</h4><p>21st-century time travel cinema has split into two streams: blockbusters that use temporal mechanics as emotional machinery (Interstellar, EEAAO) and cerebral puzzles that use temporal mechanics as cognitive challenge (Tenet, Primer). The most successful films find a balance; the most talked-about films sacrifice accessibility for ambition.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 — Deep Dive</div><h2><em>Literary</em> Fiction & Time</h2></div>
  <p>One of the most significant developments of the 2010s-2020s is the absorption of time travel mechanics into mainstream literary fiction. Works by Kate Atkinson, Matt Haig, Emily St. John Mandel, and others use temporal displacement not as genre machinery but as literary technique -- the same way modernist fiction used stream of consciousness or postmodern fiction used metanarrative.</p>
  <p>Kate Atkinson's <em>Life After Life</em> (2013) restarts its protagonist Ursula Todd's life from birth each time she dies, with each iteration diverging from the last. The novel is not interested in explaining its temporal mechanics; there is no time machine, no scientific rationale. The mechanism is structural: the narrative simply resets, and the reader experiences a life branching across multiple versions of the 20th century, including one where Ursula kills Hitler.</p>
  <h3>Sea of Tranquility</h3>
  <p>Emily St. John Mandel's <em>Sea of Tranquility</em> (2022) combines time travel with themes from her earlier pandemic novel <em>Station Eleven</em>. Characters from 1912, 2020, 2203, and 2401 are connected by an anomaly in the fabric of spacetime and by a time traveler investigating whether they all live inside a simulation. The novel uses time travel to explore the recurrence of pandemic experience across centuries and the question of whether human civilization is a loop rather than a progression.</p>
  <h3>The Genre Dissolution</h3>
  <p>These works represent the dissolution of time travel as a distinct genre. When Atkinson and Mandel use temporal mechanics, they are not writing "science fiction" in any meaningful sense -- they are using temporal displacement as a narrative device in the same way any literary novelist might use an unreliable narrator or a nonlinear structure. This mainstreaming signals that time travel has achieved the status that stream of consciousness achieved in the early 20th century: a technique available to any writer, not a genre marker.</p>
  <div class="callout"><h4>The Thesis</h4><p>Time travel is becoming what fragmented narrative was for modernism and metafiction was for postmodernism: a structural technique that defines its era. The 21st century is the century when temporal manipulation became a fundamental tool of literary fiction, available to any writer in any genre, signaling that our relationship with time itself has become the central preoccupation of contemporary storytelling.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 — Deep Dive</div><h2>The <em>Streaming</em> Effect</h2></div>
  <p>Streaming platforms have fundamentally altered the economics and aesthetics of time travel fiction. The key changes: full-season drops enable binge-watching of complex temporal narratives that would be impossible to follow week-to-week; global distribution means a German-language show like <em>Dark</em> can find its audience worldwide; and the recommendation algorithm rewards shows that generate intense viewer engagement, which complex temporal narratives reliably do.</p>
  <p>The binge model is particularly well-suited to time travel stories because it allows viewers to rewatch key scenes, pause to consult timelines, and consume the entire narrative arc in a concentrated period. <em>Dark</em>'s success on Netflix -- becoming one of the platform's most critically acclaimed originals -- demonstrated that audiences would invest significant cognitive effort in temporal complexity if the streaming model supported it.</p>
  <h3>Platform Competition</h3>
  <p>Every major streaming platform now has at least one time-travel-adjacent show in its catalog. Netflix: <em>Dark</em>, <em>1899</em>, <em>Bodies</em>. Apple TV+: <em>Severance</em> (temporal fragmentation), <em>Dark Matter</em> (branching realities). Amazon Prime: <em>The Peripheral</em> (consciousness-based time travel). Disney+: <em>Loki</em> (multiverse mechanics). This proliferation suggests that time travel has become a reliable draw for the kinds of engaged, discussion-generating audiences that streaming platforms value most.</p>
  <div class="callout"><h4>The Economic Logic</h4><p>Time travel shows generate exactly what streaming platforms want: intense viewer engagement, social media discussion, rewatch value, and passionate fanbases that sustain subscriptions. The complexity that would have been a liability on broadcast television is an asset on streaming platforms where engagement metrics matter more than mass appeal.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 — Deep Dive</div><h2><em>Global</em> Perspectives</h2></div>
  <p>The 21st-century time travel renaissance is global. South Korean, Japanese, German, Indian, and Latin American works have each brought distinctive cultural perspectives to temporal mechanics, expanding the genre beyond its Anglo-American origins and revealing that different cultures have different relationships with time, memory, and destiny.</p>
  <h3>Japanese Temporal Aesthetics</h3>
  <p>Japanese anime and cinema have a distinctive approach to time travel that emphasizes emotional connection across temporal distances. Makoto Shinkai's <em>Your Name</em> (2016) -- the highest-grossing anime film of its time -- uses body-swapping across a temporal divide to create a love story between characters who exist in different times. The temporal mechanics serve a specifically Japanese emotional sensibility: <em>mono no aware</em>, the bittersweet awareness of impermanence. <em>Steins;Gate</em> (2011) brings rigorous worldline theory to anime, while maintaining the medium's emotional intensity.</p>
  <h3>Korean Temporal Thriller</h3>
  <p>South Korean cinema has developed a distinctive time travel subgenre that combines temporal mechanics with the country's tradition of intense thriller filmmaking. <em>The Call</em> (2020) connects two women 20 years apart through a phone; each can change the other's timeline with devastating consequences. The film uses time travel to explore intergenerational trauma and the way Korea's compressed modernization (from agrarian to digital in two generations) has created a culture unusually aware of temporal acceleration.</p>
  <h3>Dark: The German Perspective</h3>
  <p><em>Dark</em> is not just a time travel show -- it is a specifically German meditation on the weight of history. The show's treatment of cyclical time, predetermined fate, and the impossibility of escaping the past resonates with German cultural memory of the 20th century. The characters' inability to change the timeline despite desperate effort mirrors the broader cultural question of how a nation processes historical trauma that continues to shape the present.</p>
  <div class="callout"><h4>Cultural Time</h4><p>Different cultures experience time differently, and their time travel fiction reflects those differences. Anglo-American time travel tends to emphasize individual agency and technological mastery. Japanese time travel emphasizes emotional connection and impermanence. Korean time travel emphasizes generational debt and historical compression. German time travel emphasizes cyclical fate and the inescapability of the past. The global proliferation of time travel fiction reveals that the genre is not just about physics -- it is about cultural temporality.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 — Deep Dive</div><h2>Why Time Travel <em>Now</em>?</h2></div>
  <p>The explosion of time travel fiction in the 2020s is not accidental. Several structural and cultural factors converge to make temporal displacement uniquely resonant in the current moment.</p>
  <h3>The Acceleration Thesis</h3>
  <p>The pace of technological and social change has accelerated to the point where the present feels discontinuous with the recent past. People born in the 1990s have lived through the pre-internet era, the smartphone revolution, the social media transformation, a global pandemic, and the AI revolution -- each of which fundamentally restructured daily life. This compression creates a subjective experience of temporal displacement: the world of five years ago feels like a different era. Time travel fiction gives narrative shape to this disorientation.</p>
  <h3>Pandemic Loops</h3>
  <p>The COVID-19 pandemic gave hundreds of millions of people a lived experience of the time loop. Days blurred together; routines repeated without variation; time lost its usual structure. The explosion of time loop content during and after the pandemic -- <em>Palm Springs</em> (2020), <em>The Map of Tiny Perfect Things</em> (2021), countless TikTok references to Groundhog Day -- suggests that the loop structure resonated because it matched lived experience.</p>
  <h3>Climate Grief and Temporal Desire</h3>
  <p>The climate crisis creates a specific form of temporal desire: the wish to go back and change the decisions that produced the current trajectory. This is the emotional core of the "fix the past" subgenre, and its cultural salience has increased as climate anxiety has intensified. Time travel fiction offers a fantasy of temporal agency -- the ability to reach back and alter the causal chain -- that climate science denies.</p>
  <div class="callout"><h4>The Pattern</h4><p>Time travel fiction has always peaked during periods of crisis and rapid change. Wells wrote during industrialization. The golden age flourished during the atomic era. Vonnegut wrote during Vietnam. The current renaissance coincides with the polycrisis of the 2020s. The genre thrives when the present feels unstable, because temporal displacement is most compelling when the present is hardest to inhabit.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 — Deep Dive</div><h2>The <em>Future</em> of Time Travel Fiction</h2></div>
  <p>Three trajectories are shaping the future of time travel fiction, each enabled by technological and cultural shifts that did not exist a decade ago.</p>
  <h3>AI-Generated Temporal Narratives</h3>
  <p>Generative AI enables a new kind of time travel fiction: stories that generate their own timelines in response to reader or player decisions. Instead of a fixed branching tree (like a choose-your-own-adventure book), an AI system could generate genuinely novel timeline branches, creating temporal narratives that no two readers experience identically. This would make the reader not just a traveler through a pre-authored timeline but a co-creator of temporal structure.</p>
  <h3>Embodied Temporal Experience</h3>
  <p>Virtual and augmented reality technologies enable temporal displacement as embodied experience rather than observed narrative. A VR experience could place the user physically in a different era, with spatial audio and haptic feedback creating the sensation of being-in-another-time. This moves time travel from metaphor to phenomenology: instead of imagining what temporal displacement feels like, you feel it.</p>
  <h3>Post-Genre Temporality</h3>
  <p>The mainstreaming of temporal mechanics in literary fiction -- Atkinson, Mandel, Haig -- suggests that time travel is completing its transition from genre to technique. Just as stream of consciousness moved from being a modernist innovation to being a tool any writer can use, temporal manipulation is becoming a universal narrative technique. The "time travel story" as a distinct genre may dissolve into general fiction, the way the "epistolary novel" dissolved: not by dying out but by being absorbed into the broader toolkit of narrative craft.</p>
  <div class="callout"><h4>The Enduring Question</h4><p>The future of time travel fiction will be shaped by the same question that has driven the genre since the Mahabharata: what would it mean to experience time differently? Every technological advance -- streaming, VR, AI, spatial computing -- is a new way of answering that question. The genre's future is as open as the future itself.</p></div>`

const ms=document.getElementById('main-scroll');const mi=document.createElement('div');mi.className='main-scroll-inner';ms.appendChild(mi);sections.forEach((s,i)=>{const b=document.createElement('div');b.className='section-block';b.innerHTML=`<div class="s-num"><span>${s.num}</span><button class="s-detail-btn" onclick="openDetail(${i})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${s.title}</h2>${summaries[i]}`;mi.appendChild(b)});
const ri=document.getElementById('right-inner');sections.forEach((s,i)=>{const d=document.createElement('div');d.className='detail';d.id=`detail-${i}`;d.innerHTML=details[i];ri.appendChild(d)});
let ldi=0;function scrollToSection(i){const b=document.querySelectorAll('.section-block');if(b[i])b[i].scrollIntoView({behavior:'smooth',block:'start'})}function openDetail(i){ldi=i;document.querySelectorAll('.detail').forEach(d=>d.style.display='none');document.getElementById(`detail-${i}`).style.display='block';document.getElementById('right').classList.remove('closed');document.body.classList.add('detail-open');document.getElementById('right').scrollTop=0;document.getElementById('right-sticky-title').classList.remove('visible')}function closeRight(){document.getElementById('right').classList.add('closed');document.body.classList.remove('detail-open')}function toggleDetail(){if(document.body.classList.contains('detail-open'))closeRight();else openDetail(ldi)}function toggleTheme(){const c=document.body.getAttribute('data-theme');document.body.setAttribute('data-theme',c==='light'?'dark':'light');localStorage.setItem('theme',c==='light'?'dark':'light')}document.body.setAttribute('data-theme',localStorage.getItem('theme')||'light');ms.addEventListener('scroll',()=>{document.querySelector('.main-head').classList.toggle('compact',ms.scrollTop>40);const b=ms.querySelectorAll('.section-block');const items=document.querySelectorAll('.sidebar-item');let a=0;b.forEach((x,i)=>{if(x.getBoundingClientRect().top<ms.getBoundingClientRect().top+120)a=i});items.forEach((x,i)=>x.classList.toggle('active',i===a))});const rp=document.getElementById('right');const stk=document.getElementById('right-sticky-title');rp.addEventListener('scroll',()=>{const ad=rp.querySelector('.detail[style*="display: block"],.detail[style*="display:block"]');if(!ad)return;const h=ad.querySelector('.detail-header h2')||ad.querySelector('h2');if(!h)return;const r=h.getBoundingClientRect();const pr=rp.getBoundingClientRect();const tb=document.querySelector('.right-topbar');if(r.bottom<pr.top+56){stk.textContent=h.textContent;stk.classList.add('visible');tb.classList.add('scrolled')}else{stk.classList.remove('visible');tb.classList.remove('scrolled')}});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeRight()});
</script>
