<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grammar of Time — Synthesis Paper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --close-text:"\2715";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,var(--grad1),transparent),radial-gradient(ellipse 60% 50% at 85% 75%,var(--grad2),transparent),radial-gradient(ellipse 40% 40% at 50% 10%,var(--grad1),transparent);transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'\263D'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'\2600'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--grad1),transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

<script>
const sections = [
  { num: '01', short: 'Thesis', title: 'Fiction as Conceptual <em>Laboratory</em>' },
  { num: '02', short: 'Five Grammars', title: 'The Five <em>Grammars</em>' },
  { num: '03', short: 'Priority', title: 'The <em>Priority</em> of Fiction' },
  { num: '04', short: 'Tensions', title: 'Five Cross-Cutting <em>Tensions</em>' },
  { num: '05', short: 'Media', title: 'Medium Shapes <em>Mechanics</em>' },

];

const summaries = [

  // 01 - Thesis
  `<p>Time travel fiction is not a genre. It is a grammar &mdash; a set of structural rules for thinking about time, causation, and human agency that has been invented, refined, and extended by storytellers over two millennia.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Time_travel_in_fiction">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Time_travel_in_fiction" target="_blank">Wikipedia: Time Travel in Fiction &rarr;</a></span></sup> This paper argues that fiction functions as a conceptual laboratory for time &mdash; a space where paradoxes are discovered, causal structures are tested, and the nature of temporal experience is explored through narrative rather than formalism.</p>
  <p>The evidence is chronological: in every major case, fiction articulated ideas about time that physics and philosophy would not formalize for years or decades. Wells described the block universe before Minkowski.<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Time_Machine">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Time_Machine" target="_blank">Wikipedia: The Time Machine (1895) &rarr;</a></span></sup> Heinlein demonstrated self-consistent loops before Novikov.<sup class="fn"><a href="https://en.wikipedia.org/wiki/%22By_His_Bootstraps%22">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/%22By_His_Bootstraps%22" target="_blank">Wikipedia: &ldquo;By His Bootstraps&rdquo; (1941) &rarr;</a></span></sup> Bradbury dramatized chaos sensitivity before Lorenz.<sup class="fn"><a href="https://en.wikipedia.org/wiki/A_Sound_of_Thunder">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/A_Sound_of_Thunder" target="_blank">Wikipedia: A Sound of Thunder (1952) &rarr;</a></span></sup> Fiction is not a derivative consumer of physics. It is an independent mode of discovery.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">50</div><div class="sl">Sources Surveyed</div></div>
    <div class="st"><div class="sv">6</div><div class="sl">Analytical Dimensions</div></div>
    <div class="st"><div class="sv">5</div><div class="sl">Cross-Cutting Tensions</div></div>
    <div class="st"><div class="sv">~2500 yrs</div><div class="sl">Literary Lineage</div></div>
  </div>`,

  // 02 - Five Grammars
  `<p>All time travel fiction inherits from five structural archetypes established before Einstein published special relativity in 1905. These archetypes are the grammar of the genre &mdash; the foundational patterns from which every subsequent story is composed.</p>
  <div class="feat-grid">
    <div class="feat"><h4>The Time Slip (1819)</h4><p>Involuntary displacement. Irving&rsquo;s Rip Van Winkle falls asleep, wakes twenty years later. Agency removed; the story is about return and loss.</p></div>
    <div class="feat"><h4>The Moral Journey (1843)</h4><p>Temporal perspective as ethical transformation. Dickens&rsquo;s Scrooge sees past, present, future, then changes. The trip transforms the traveler.</p></div>
    <div class="feat"><h4>The Yankee Abroad (1889)</h4><p>Modern knowledge in a primitive past. Twain&rsquo;s Connecticut Yankee critiques both eras. Technology as weapon, not liberation.</p></div>
    <div class="feat"><h4>The Machine (1887/1895)</h4><p>Deliberate technological navigation. Gaspar and Wells independently invented the time machine. Time as controllable dimension.</p></div>
  </div>
  <p>The fifth archetype &mdash; the <strong>bootstrap loop</strong> &mdash; was implicit in earlier works but formalized by Heinlein in 1941. Self-causing events, information without origin, identity without source. Together, these five grammars define the possibility space of time travel fiction.</p>`,

  // 03 - Priority of Fiction
  `<p>The chronological record demonstrates that fiction precedes science in discovering temporal concepts. This is the strongest evidence for the laboratory thesis.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">1895 &rarr; 1908 (13 years)</div><div class="tl-text">Wells describes all moments coexisting simultaneously.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Spacetime">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Spacetime" target="_blank">Wikipedia: Spacetime (Minkowski, 1908) &rarr;</a></span></sup> Minkowski formalizes spacetime.</div></div>
    <div class="tl-item"><div class="tl-date">1941 &rarr; 1989 (48 years)</div><div class="tl-text">Heinlein demonstrates self-consistent causal loops.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Novikov_self-consistency_principle">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Novikov_self-consistency_principle" target="_blank">Wikipedia: Novikov Self-Consistency Principle (1989) &rarr;</a></span></sup> Novikov publishes the self-consistency principle.</div></div>
    <div class="tl-item"><div class="tl-date">1952 &rarr; 1963 (11 years)</div><div class="tl-text">Bradbury dramatizes sensitive dependence on initial conditions.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Butterfly_effect">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Butterfly_effect" target="_blank">Wikipedia: Butterfly Effect (Lorenz, 1963) &rarr;</a></span></sup> Lorenz publishes chaos theory.</div></div>
    <div class="tl-item"><div class="tl-date">1985 &rarr; 1988</div><div class="tl-text">Sagan needs plausible FTL for <em>Contact</em>.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes" target="_blank">Wikipedia: Traversable Wormholes (Morris &amp; Thorne, 1988) &rarr;</a></span></sup> Thorne creates a new research field in wormhole physics.</div></div>
  </div>
  <p>These are not cases of fiction simplifying existing science. They are cases of fiction arriving at ideas independently, through narrative logic rather than mathematical formalism. The laboratory produces results before the formal discipline catches up.</p>`,

  // 04 - Five Tensions
  `<p>Across the six dimensions surveyed, five cross-cutting tensions emerge that define the possibility space of time travel fiction. Every work positions itself within these tensions; no work escapes them.</p>
  <ul class="s-list">
    <li><strong>Determinism vs. Agency</strong> &mdash; The block universe demands determinism; storytelling demands choice. The &ldquo;chronoclasm&rdquo; (Gomel)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Narrative_Space_and_Time">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Narrative_Space_and_Time" target="_blank">Gomel: Narrative Space and Time (2014) &rarr;</a></span></sup> is the fundamental tension of the genre.</li>
    <li><strong>Accuracy vs. Narrative</strong> &mdash; The most scientifically accurate stories (<em>Primer</em>)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Primer_(film)">[10]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Primer_(film)" target="_blank">Wikipedia: Primer (2004) &rarr;</a></span></sup> are often the least accessible. The least accurate (<em>Back to the Future</em>)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Back_to_the_Future">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Back_to_the_Future" target="_blank">Wikipedia: Back to the Future (1985) &rarr;</a></span></sup> are the most beloved.</li>
    <li><strong>Innovation vs. Convention</strong> &mdash; Every new work inherits the five pre-Einstein archetypes. True structural novelty is rare; most innovation occurs within inherited forms.</li>
    <li><strong>Individual vs. Collective</strong> &mdash; Time travel stories almost always focus on individual travelers. The societal implications of temporal displacement remain underexplored.</li>
    <li><strong>Entertainment vs. Philosophy</strong> &mdash; The genre oscillates between popcorn adventure and genuine metaphysical inquiry, with the greatest works (<em>Arrival</em>,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Arrival_(film)">[12]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Arrival_(film)" target="_blank">Wikipedia: Arrival (2016 film) &rarr;</a></span></sup> <em>Dark</em>)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Dark_(TV_series)">[13]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Dark_(TV_series)" target="_blank">Wikipedia: Dark (TV series) &rarr;</a></span></sup> achieving both simultaneously.</li>
  </ul>`,

  // 05 - Medium Shapes Mechanics
  `<p>The available medium determines the temporal mechanics a story can explore. This is one of the most underappreciated insights from the survey: the history of time travel fiction is inseparable from the history of narrative media.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Literature</h4><p>Interiority. The novel can show a character&rsquo;s experience of temporal displacement from the inside. Wells, Vonnegut,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Slaughterhouse-Five">[14]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Slaughterhouse-Five" target="_blank">Wikipedia: Slaughterhouse-Five (1969) &rarr;</a></span></sup> Chiang.</p></div>
    <div class="feat"><h4>Film</h4><p>Compression. Two hours demands emotional impact over logical completeness. <em>Interstellar</em>,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Interstellar_(film)">[15]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Interstellar_(film)" target="_blank">Wikipedia: Interstellar (2014) &rarr;</a></span></sup> <em>12 Monkeys</em>.<sup class="fn"><a href="https://en.wikipedia.org/wiki/12_Monkeys">[16]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/12_Monkeys" target="_blank">Wikipedia: 12 Monkeys (1995) &rarr;</a></span></sup></p></div>
    <div class="feat"><h4>Television</h4><p>Duration. Long-form serialization sustains paradoxes across dozens of hours. <em>Dark</em>&rsquo;s 26 episodes enabled the most intricate causal structure ever filmed.</p></div>
    <div class="feat"><h4>Games</h4><p>Agency. The player <em>is</em> the time traveler. <em>Outer Wilds</em><sup class="fn"><a href="https://en.wikipedia.org/wiki/Outer_Wilds">[17]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Outer_Wilds" target="_blank">Wikipedia: Outer Wilds (2019) &rarr;</a></span></sup> makes knowledge the only persistent state across loops.</p></div>
  </div>`,

  // 06 - The Pipeline
  `<p>The Sagan&ndash;Thorne collaboration is the paradigmatic example of the fiction-to-science pipeline, but it is not the only one. Fiction has generated research questions, provided conceptual vocabulary, and shaped the public imagination of temporal physics in ways that feed back into the scientific enterprise itself.</p>
  <p>Kip Thorne&rsquo;s two 1988 papers on traversable wormholes<sup class="fn"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Wormhole#Traversable_wormholes" target="_blank">Wikipedia: Traversable Wormholes &rarr;</a></span></sup> were commissioned by a novelist&rsquo;s plot requirement. Thorne&rsquo;s visualization of the black hole Gargantua for <em>Interstellar</em> produced peer-reviewed physics papers. In 2025, Rahwan, Shariff, and Bonnefon proposed &ldquo;Science Fiction Science&rdquo; as a formal research methodology in <em>Nature</em>.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Science_fiction#Relationship_to_science">[18]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Science_fiction#Relationship_to_science" target="_blank">Rahwan et al.: Science Fiction Science, Nature (2025) &rarr;</a></span></sup></p>
  <div class="callout"><h4>Bidirectional Flow</h4><p>The relationship between fiction and science is not one of popularization. It is bidirectional: fiction generates hypotheses, science validates (or refutes) them, and the results feed back into fiction. The pipeline runs in both directions simultaneously.</p></div>`,

  // 07 - The Chronoclasm
  `<p>The deepest philosophical problem in time travel fiction is what Elana Gomel called the &ldquo;chronoclasm&rdquo;: the collision between physical determinism and narrative agency.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Narrative_Space_and_Time">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Narrative_Space_and_Time" target="_blank">Gomel: Narrative Space and Time (2014) &rarr;</a></span></sup> For time travel to be physically plausible, the block universe must be true &mdash; all moments coexist, the timeline is fixed, determinism rules.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Eternalism_(philosophy_of_time)">[19]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Eternalism_(philosophy_of_time)" target="_blank">Wikipedia: Eternalism &rarr;</a></span></sup> But for fiction to work, characters must make meaningful choices.</p>
  <p>David Lewis&rsquo;s compatibilism<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Paradoxes_of_Time_Travel">[20]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Paradoxes_of_Time_Travel" target="_blank">Wikipedia: Lewis, &ldquo;The Paradoxes of Time Travel&rdquo; (1976) &rarr;</a></span></sup> offers one resolution: free will and determinism coexist because &ldquo;free&rdquo; means &ldquo;uncoerced,&rdquo; not &ldquo;undetermined.&rdquo; Chiang&rsquo;s <em>Arrival</em> offers another: Louise Banks knows the future and chooses to live through it anyway. Neither resolution closes the tension. The chronoclasm is generative precisely because it cannot be resolved &mdash; it is what makes time travel fiction philosophically inexhaustible.</p>`,

  // 08 - Conclusion
  `<p>Time travel fiction is a grammar of time. Its five foundational archetypes (time slip, moral journey, Yankee abroad, machine, bootstrap) were established before Einstein. Its five cross-cutting tensions (determinism/agency, accuracy/narrative, innovation/convention, individual/collective, entertainment/philosophy) define every work in the tradition. Its relationship to science is bidirectional: fiction discovers, science formalizes, fiction incorporates the formalism.</p>
  <p>The grammar is still evolving. Interactive media are creating temporal structures that linear narrative cannot replicate.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Braid_(video_game)">[21]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Braid_(video_game)" target="_blank">Wikipedia: Braid (2008) &rarr;</a></span></sup> Global perspectives are expanding the tradition beyond its Western origins.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Your_Name">[22]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Your_Name" target="_blank">Wikipedia: Your Name (2016) &rarr;</a></span></sup> AI-assisted storytelling may generate temporal mechanics that no human author has yet imagined. The laboratory remains open, its most productive experiments still to come.</p>
  <div class="callout"><h4>The Enduring Question</h4><p>Why do humans tell stories about traveling through time? Because time is the dimension humans inhabit but cannot see, the river they swim in but cannot step outside. Fiction is the only instrument that lets us stand on the bank and watch ourselves go by. That is why the grammar of time is still being written.</p></div>`
];

const details = [

  // 01 Detail - Thesis
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Deep Dive</div><h2>Fiction as Conceptual <em>Laboratory</em></h2></div>
  <p>The thesis of this synthesis paper is straightforward but radical: time travel fiction is not a genre that borrows concepts from physics and philosophy. It is an independent conceptual laboratory that has repeatedly discovered ideas about time, causation, and identity before the formal disciplines caught up. The relationship between fiction and science is not one of popularization &mdash; it is one of parallel, and sometimes prior, discovery.</p>
  <p>This claim rests on documented chronological evidence. H.G. Wells described the block universe &mdash; the view that all moments of time coexist simultaneously &mdash; in 1895, thirteen years before Hermann Minkowski formalized spacetime geometry in 1908. Robert Heinlein demonstrated that closed causal loops can be internally self-consistent in 1941, forty-eight years before Igor Novikov published the self-consistency principle in 1989. Ray Bradbury dramatized sensitive dependence on initial conditions in 1952, eleven years before Edward Lorenz published his foundational chaos theory paper.</p>
  <h3>Why Fiction Arrives First</h3>
  <p>Fiction has structural advantages as a laboratory for exploring temporal concepts. First, it can hold contradictory states simultaneously &mdash; something formal logic cannot do. A story can show both sides of a paradox without being required to resolve the contradiction. Second, fiction embeds concepts in emotional contexts that reveal their human significance. The grandfather paradox is not merely a logical puzzle; in fiction, it becomes a meditation on the contingency of existence. Third, fiction can trace the consequences of temporal ideas across extended timescales, multiple characters, and richly detailed worlds &mdash; a form of simulation that thought experiments in physics cannot match.</p>
  <h3>The Scope of This Synthesis</h3>
  <p>This paper synthesizes findings from a survey of time travel fiction across six analytical dimensions: paradoxes and causal logic (<a href="s1-paradoxes.dd.html">S1</a>), narrative structures (<a href="s2-narrative-structures.dd.html">S2</a>), scientific accuracy (<a href="s3-scientific-accuracy.dd.html">S3</a>), philosophical implications (<a href="s4-philosophy.dd.html">S4</a>), notable works (<a href="s5-notable-works.dd.html">S5</a>), and the modern renaissance (<a href="s6-modern-renaissance.dd.html">S6</a>). The survey draws on a <a href="literature-collection.md">literature collection</a> of 50 sources spanning ancient texts through 2025, covering fiction, film, television, games, physics, philosophy, and literary criticism.</p>`,

  // 02 Detail - Five Grammars
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Deep Dive</div><h2>The Five <em>Grammars</em></h2></div>
  <p>The pre-Einstein canon of time travel fiction established five structural archetypes that remain the foundational grammar of the genre. Every subsequent time travel story is a variation on, combination of, or reaction against these five patterns. Understanding them is essential to understanding the grammar of time.</p>
  <h3>1. The Time Slip</h3>
  <p>Originating with the Mahabharata and codified by Washington Irving in 1819, the time slip removes agency from the traveler entirely. Displacement happens through sleep, accident, or supernatural intervention. The traveler does not choose to travel, cannot control the mechanism, and cannot repeat the experience. The emotional register is loss and alienation &mdash; the world moves on without you. Modern inheritors include Audrey Niffenegger&rsquo;s <em>The Time Traveler&rsquo;s Wife</em> (2003), where involuntary time travel becomes a chronic condition.</p>
  <h3>2. The Moral Journey</h3>
  <p>Dickens&rsquo;s <em>A Christmas Carol</em> (1843) invented a structure that maps perfectly onto narrative arc: the protagonist&rsquo;s flaw is revealed through temporal perspective, consequences are shown, and redemption is offered upon return. <em>Groundhog Day</em> (1993) and <em>It&rsquo;s a Wonderful Life</em> (1946) are direct descendants. The key insight: temporal displacement serves as a mechanism for moral transformation.</p>
  <h3>3. The Yankee Abroad</h3>
  <p>Twain&rsquo;s 1889 novel established the pattern of transplanting modern knowledge into a primitive past. The collision between eras enables social criticism &mdash; Twain used it to attack both medieval superstition and industrial violence simultaneously. The pattern persists in Michael Crichton&rsquo;s <em>Timeline</em> (1999) and Stephen King&rsquo;s <em>11/22/63</em> (2011).</p>
  <h3>4. The Machine</h3>
  <p>Gaspar y Rimbau (1887) and Wells (1895) independently invented the mechanical time machine, transforming time travel from something that happens to characters into something characters choose to do. This archetype makes time a controllable dimension &mdash; and the narrative tension comes from the limits and consequences of that control.</p>
  <h3>5. The Bootstrap</h3>
  <p>Implicit in earlier works but formalized by Heinlein in 1941, the bootstrap loop is a self-causing structure where an event or object is the cause of its own existence. This archetype introduced the concept of temporal paradox as a narrative feature rather than a bug &mdash; the loop itself generates meaning.</p>`,

  // 03 Detail - Priority
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Deep Dive</div><h2>The <em>Priority</em> of Fiction</h2></div>
  <p>The claim that fiction precedes science requires careful argument. It is not merely that fiction stories happen to include ideas that later appear in physics &mdash; it is that fiction writers arrive at these ideas through narrative logic, independently of and prior to the formal scientific work.</p>
  <h3>Wells and Minkowski</h3>
  <p>In the opening chapter of <em>The Time Machine</em>, the Time Traveller argues that time is a fourth dimension, no different in kind from the three spatial dimensions. He describes all moments as coexisting simultaneously, accessible to anyone with the right technology. This is the block universe &mdash; eternalism &mdash; described thirteen years before Minkowski introduced the concept of spacetime at a 1908 lecture in Cologne. Wells was not simplifying Minkowski; Minkowski had not yet published. Wells arrived at the block universe through the narrative requirements of his story: if a machine is to travel to 802,701 CE, that moment must already exist to be traveled to.</p>
  <h3>Heinlein and Novikov</h3>
  <p>Heinlein&rsquo;s &ldquo;By His Bootstraps&rdquo; (1941) demonstrated that a time traveler can interact with their own past without creating paradoxes, as long as every action is compatible with the closed loop&rsquo;s structure. &ldquo;All You Zombies&rdquo; (1959) pushed this further: a single person is their own mother, father, and recruiter, existing in a total causal loop with no external cause. Novikov did not publish the self-consistency principle until 1989 &mdash; forty-eight years after Heinlein had already proven its narrative viability.</p>
  <h3>The Significance</h3>
  <p>These are not coincidences. Fiction and science are both investigating the same subject &mdash; the nature of time &mdash; using different instruments. Fiction uses narrative; science uses mathematics. That fiction sometimes arrives first tells us something important about the relationship between narrative and formal reasoning: narrative is not merely a way of communicating ideas. It is a way of discovering them.</p>`,

  // 04 Detail - Tensions
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Deep Dive</div><h2>Five Cross-Cutting <em>Tensions</em></h2></div>
  <p>The survey identified five tensions that cut across all six dimensions. These are not problems to be solved but productive constraints that generate the genre&rsquo;s richness. Every work of time travel fiction positions itself within these tensions; the greatest works hold multiple tensions simultaneously without resolving them.</p>
  <h3>1. Determinism vs. Agency</h3>
  <p>The block universe implies that the future is as fixed as the past. If so, characters cannot meaningfully choose &mdash; their actions were always part of the timeline. But fiction requires characters who make meaningful choices. Fixed-timeline stories like <em>Dark</em> navigate this by finding beauty in inevitability: characters choose what they were always going to choose, and the drama lies in their growing awareness of this fact. Chiang&rsquo;s Louise Banks knows her daughter will die and chooses to have her anyway &mdash; a compatibilist resolution that preserves both determinism and meaningful choice.</p>
  <h3>2. Accuracy vs. Narrative</h3>
  <p><em>Primer</em> achieves near-perfect internal logic at the cost of accessibility &mdash; most viewers cannot follow its nine overlapping timelines. <em>Back to the Future</em> violates physics constantly but produces one of cinema&rsquo;s most perfectly constructed adventure narratives. The tension is structural, not a failure of either approach: rigorous accuracy constrains narrative possibility, while narrative freedom requires physics violations.</p>
  <h3>3. Innovation vs. Convention</h3>
  <p>The five pre-Einstein archetypes are remarkably durable. Even the most formally ambitious contemporary works &mdash; <em>Tenet</em>&rsquo;s entropy reversal, <em>Outer Wilds</em>&rsquo; knowledge-loop, <em>Dark</em>&rsquo;s multi-generational knot &mdash; are recognizably variations on the machine, the loop, and the fixed timeline. True structural novelty in time travel fiction is extraordinarily rare.</p>
  <h3>4. Individual vs. Collective</h3>
  <p>Time travel fiction is overwhelmingly individualistic. A lone traveler navigates time; the social, economic, and political implications of temporal displacement are rarely explored systematically. Asimov&rsquo;s <em>The End of Eternity</em> (1955) is a notable exception: it imagines an entire bureaucracy of temporal managers. The individualist bias reflects the genre&rsquo;s origins in adventure fiction, but it limits the genre&rsquo;s capacity for social analysis.</p>
  <h3>5. Entertainment vs. Philosophy</h3>
  <p>The genre oscillates between spectacle and inquiry. The greatest works achieve both: <em>Arrival</em> is simultaneously a first-contact thriller and a treatise on linguistic relativity and determinism. <em>Dark</em> is both a mystery series and a meditation on the ethics of existence in a deterministic universe. The tension is productive when both registers are sustained simultaneously.</p>`,

  // 05 Detail - Media
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Deep Dive</div><h2>Medium Shapes <em>Mechanics</em></h2></div>
  <p>One of the most underappreciated findings of this survey is the degree to which the available medium determines the temporal mechanics a story can explore. The history of time travel fiction is inseparable from the history of narrative media.</p>
  <h3>Literature: Interiority</h3>
  <p>The novel&rsquo;s privileged access to a character&rsquo;s inner experience makes it uniquely suited to depicting the subjective experience of temporal displacement. Vonnegut&rsquo;s Billy Pilgrim &ldquo;becomes unstuck in time&rdquo; &mdash; and the reader experiences this unsticking through fragmented, non-linear prose that mimics traumatic dissociation. Chiang&rsquo;s Louise Banks experiences time non-linearly after learning Heptapod B &mdash; and the story&rsquo;s prose progressively dissolves the distinction between memory and anticipation. These effects require the interiority that only written narrative provides.</p>
  <h3>Film: Emotional Compression</h3>
  <p>Two hours is not enough time to sustain the logical complexity of a nine-timeline story like <em>Primer</em> &mdash; which is why <em>Primer</em> is celebrated but not widely loved. Film&rsquo;s strength is emotional compression: <em>Interstellar</em>&rsquo;s Miller&rsquo;s planet sequence compresses the devastation of relativistic time dilation into a single scene of Cooper watching 23 years of messages from his aging children. The constraint of duration forces filmmakers to choose moments of maximum emotional impact.</p>
  <h3>Television: Sustained Complexity</h3>
  <p><em>Dark</em>&rsquo;s three seasons and 26 episodes enabled a causal structure of unprecedented complexity: four families connected across four time periods by loops within loops. This structure would be impossible in a two-hour film. The streaming model &mdash; which allows viewers to rewatch, pause, and build fan wikis &mdash; further expanded what temporal complexity audiences could tolerate.</p>
  <h3>Games: Lived Agency</h3>
  <p>Interactive media introduced something no previous medium could achieve: the player as time traveler. In <em>Outer Wilds</em>, the player explores a solar system on the verge of destruction, dying every 22 minutes and retaining only knowledge across loops. The game mechanic and the temporal mechanic are identical: learning <em>is</em> time travel. <em>Braid</em> assigns different temporal rules to each world &mdash; time reverses, time flows relative to movement, time creates shadows of past actions &mdash; making the player directly experience temporal manipulation rather than merely observing it.</p>`,

  // 06 Detail - Pipeline
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Deep Dive</div><h2>The Fiction-to-Science <em>Pipeline</em></h2></div>
  <p>The Sagan&ndash;Thorne collaboration remains the clearest documented case of fiction generating genuine scientific research. Carl Sagan was writing <em>Contact</em> (1985) and needed a scientifically plausible mechanism for faster-than-light travel. He sent his manuscript to Kip Thorne at Caltech. Thorne&rsquo;s response was not a simple consultation &mdash; it was original research that produced two landmark physics papers (Morris &amp; Thorne, 1988; Morris, Thorne &amp; Yurtsever, 1988) and opened an entirely new field of research on traversable wormholes.</p>
  <h3>Interstellar&rsquo;s Double Contribution</h3>
  <p>Thorne continued the pipeline with Christopher Nolan&rsquo;s <em>Interstellar</em> (2014). The film&rsquo;s visualization of the supermassive black hole Gargantua was generated from Thorne&rsquo;s general-relativistic calculations, producing images so accurate that they were published as peer-reviewed physics papers on gravitational lensing. Fiction generated the visualization requirements; the visualization generated publishable science. The pipeline ran from screenplay to peer-reviewed journal.</p>
  <h3>Science Fiction Science (2025)</h3>
  <p>The formal recognition came in 2025, when Rahwan, Shariff, and Bonnefon published &ldquo;Science Fiction Science&rdquo; in <em>Nature</em>. The paper argued that fictional scenarios can serve as systematic tools for studying human responses to futures that do not yet exist. The Moral Machine experiment &mdash; which studied autonomous vehicle ethics using millions of online participants choosing between fictional trolley-problem variants &mdash; is the paradigmatic example. Fiction is no longer merely an inspiration for science; it is a recognized methodology within it.</p>
  <h3>The Vocabulary Pipeline</h3>
  <p>Beyond specific research collaborations, fiction has provided the vocabulary that science uses to discuss temporal concepts. &ldquo;Time machine,&rdquo; &ldquo;time travel,&rdquo; &ldquo;grandfather paradox,&rdquo; &ldquo;bootstrap paradox,&rdquo; &ldquo;butterfly effect,&rdquo; &ldquo;time loop,&rdquo; &ldquo;fixed timeline,&rdquo; &ldquo;branching timeline&rdquo; &mdash; all originated in fiction. Physicists and philosophers adopted these terms because they needed vocabulary for concepts that formal language had not yet named. If language shapes thought (the Sapir-Whorf hypothesis), then fiction has literally shaped the conceptual space in which physics operates.</p>`,

  // 07 Detail - Chronoclasm
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Deep Dive</div><h2>The <em>Chronoclasm</em></h2></div>
  <p>Elana Gomel&rsquo;s concept of the &ldquo;chronoclasm&rdquo; identifies the fundamental generative tension of time travel fiction: the collision between the deterministic metaphysics that time travel requires and the narrative agency that storytelling demands. This tension cannot be resolved &mdash; and its irresolvability is precisely what makes the genre philosophically inexhaustible.</p>
  <h3>The Deterministic Requirement</h3>
  <p>For backward time travel to be physically plausible, the block universe must be true: past, present, and future coexist as a four-dimensional spacetime continuum. If only the present exists (presentism), there is no &ldquo;past&rdquo; to travel to. But the block universe implies that the future is as fixed as the past &mdash; every event that will happen has already happened, from the perspective of the block. Determinism is not a philosophical preference within the block universe; it is a structural necessity.</p>
  <h3>The Narrative Requirement</h3>
  <p>Fiction requires characters who make meaningful choices &mdash; characters whose decisions matter, whose agency drives the plot, whose struggles have stakes. A fully deterministic narrative, in which every outcome was always going to be exactly what it is, risks becoming dramatically inert. If nothing could have been otherwise, why should the audience care?</p>
  <h3>Four Navigational Strategies</h3>
  <p>Time travel fiction has developed four strategies for navigating the chronoclasm, each producing a distinctive aesthetic and philosophical register. Fixed-timeline stories (<em>Dark</em>, <em>12 Monkeys</em>) embrace determinism and find beauty in inevitability. Dynamic-timeline stories (<em>Back to the Future</em>) reject determinism and find excitement in agency. Branching stories (<em>Primer</em>, <em>Endgame</em>) split the difference by preserving agency in new branches while leaving original timelines intact. And dissolution stories (<em>Arrival</em>, <em>Slaughterhouse-Five</em>) transcend the distinction entirely by redefining what &ldquo;choice&rdquo; means.</p>
  <h3>Chiang&rsquo;s Resolution</h3>
  <p>Ted Chiang&rsquo;s &ldquo;Story of Your Life&rdquo; offers perhaps the most philosophically sophisticated navigation of the chronoclasm. Louise Banks learns to perceive time non-linearly. She knows her daughter will be born, will bring joy, and will die young. She chooses to have her daughter anyway &mdash; not despite knowing the outcome, but in full awareness of it. This is not fatalism (passive acceptance) but what Chiang calls &ldquo;performing&rdquo; a life already known. Choice and determinism coexist because the nature of choice has been redefined: to choose is not to select from undetermined possibilities but to embrace a trajectory already perceived.</p>`,

  // 08 Detail - Conclusion
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 &mdash; Deep Dive</div><h2>A Grammar Still <em>Evolving</em></h2></div>
  <p>This synthesis has argued that time travel fiction constitutes a grammar &mdash; a set of structural rules for thinking about time that has been invented, refined, and extended by storytellers across two millennia and five continents. The grammar has five foundational archetypes, five cross-cutting tensions, a documented history of preceding formal science, a bidirectional pipeline with physics, and a fundamental philosophical tension (the chronoclasm) that ensures its continued productivity.</p>
  <h3>What&rsquo;s Next</h3>
  <p>Several developments suggest the grammar is entering a new phase of evolution. Interactive media are creating temporal structures that no previous medium could achieve &mdash; structures where the audience is not merely observer but participant in temporal mechanics. Global perspectives are enriching the tradition with non-Western conceptions of time, memory, and ancestral obligation. And the 2025 formalization of &ldquo;Science Fiction Science&rdquo; as a research methodology suggests that fiction&rsquo;s role in the scientific enterprise is being recognized and institutionalized.</p>
  <h3>The Open Questions</h3>
  <p>The survey leaves several questions open. What temporal structures will emerge from AI-assisted storytelling? How will non-Western time-travel traditions reshape the five pre-Einstein archetypes? Can interactive media sustain the philosophical depth that literature achieves, or does player agency inevitably privilege adventure over inquiry? What happens when the fiction-to-science pipeline runs through computational simulation rather than narrative thought experiment?</p>
  <h3>The Laboratory Remains Open</h3>
  <p>Time travel fiction began with the Mahabharata&rsquo;s King Kakudmi visiting Brahma&rsquo;s realm and returning to find ages passed. It continues with players exploring the time-looped solar system of <em>Outer Wilds</em> and viewers untangling the causal knot of <em>Dark</em>. The questions have not changed: What is time? Can we navigate it? What would it mean if we could? The grammar of time is how we think about these questions. And the grammar is still being written.</p>

function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
