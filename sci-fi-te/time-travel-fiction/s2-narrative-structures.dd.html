</head>
<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Time Slip', title: 'The Time <em>Slip</em>' },
  { num: '02', short: 'Moral Journey', title: 'The <em>Moral</em> Journey' },
  { num: '03', short: 'Yankee Abroad', title: 'The <em>Yankee</em> Abroad' },
  { num: '04', short: 'The Machine', title: 'The <em>Machine</em>' },
  { num: '05', short: 'The Loop', title: 'The <em>Closed</em> Loop' },
  { num: '06', short: 'Reverse', title: '<em>Reverse</em> Chronology' },
  { num: '07', short: 'Hybrid Forms', title: '<em>Hybrid</em> & Experimental Forms' },
  { num: '08', short: 'Mechanics Map', title: '<em>Mechanics</em> Determine Meaning' }
];

const summaries = [
  // 01 - Time Slip
  `<p>The oldest narrative structure in time travel fiction: the protagonist is transported through time involuntarily, without understanding the mechanism or being able to control it. Originating with the Mahabharata and codified by Washington Irving's "Rip Van Winkle" (1819),<sup class="fn"><a href="https://en.wikipedia.org/wiki/Rip_Van_Winkle">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Rip_Van_Winkle" target="_blank">Wikipedia: Rip Van Winkle (1819) &rarr;</a></span></sup> the time slip removes agency from the traveler and makes displacement itself the story.</p>
  <p>The time slip produces narratives of loss and disorientation. The traveler returns to find the world changed, the people they knew dead or aged beyond recognition. The emotional register is elegiac -- grief for a world that moved on without you.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">~800 BCE</div><div class="sl">Mahabharata</div></div>
    <div class="st"><div class="sv">1819</div><div class="sl">Rip Van Winkle</div></div>
    <div class="st"><div class="sv">2003</div><div class="sl">Time Traveler's Wife</div></div>
    <div class="st"><div class="sv">2011</div><div class="sl">Midnight in Paris</div></div>
  </div>`,

  // 02 - Moral Journey
  `<p>Invented by Charles Dickens in <em>A Christmas Carol</em> (1843):<sup class="fn"><a href="https://en.wikipedia.org/wiki/A_Christmas_Carol">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/A_Christmas_Carol" target="_blank">Wikipedia: A Christmas Carol (1843) &rarr;</a></span></sup> the protagonist is shown past, present, and future as moral instruction, then returned to the present with the chance to change. This is the first bidirectional time travel narrative -- visiting all three temporal directions within a single story.</p>
  <p>The moral journey structure persists because it maps perfectly onto narrative arc: the protagonist's flaw is revealed (past), its consequences are shown (present/future), and redemption is offered (return). <em>Groundhog Day</em>, <em>It's a Wonderful Life</em>, and the "what if" genre all inherit this architecture.</p>
  <div class="s-chips">
    <span class="s-chip">Dickens</span>
    <span class="s-chip">Groundhog Day</span>
    <span class="s-chip">moral arc</span>
    <span class="s-chip">redemption</span>
    <span class="s-chip">bidirectional</span>
  </div>`,

  // 03 - Yankee Abroad
  `<p>Mark Twain's <em>A Connecticut Yankee in King Arthur's Court</em> (1889)<sup class="fn"><a href="https://en.wikipedia.org/wiki/A_Connecticut_Yankee_in_King_Arthur%27s_Court">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/A_Connecticut_Yankee_in_King_Arthur%27s_Court" target="_blank">Wikipedia: A Connecticut Yankee in King Arthur&rsquo;s Court &rarr;</a></span></sup> established this archetype: a character from the present brings modern knowledge and technology to the past, disrupting the historical period. The time traveler is not passive observer but active agent, and the tension comes from the collision between modern and pre-modern worldviews.</p>
  <p>This structure enables social commentary -- Twain used it to critique both medieval ignorance and modern industrial violence. Its descendants include <em>Timeline</em> (Crichton), <em>Lest Darkness Fall</em> (de Camp), and the entire "fix the past" subgenre where characters use future knowledge to reshape history.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1889</div><div class="sl">Twain</div></div>
    <div class="st"><div class="sv">1939</div><div class="sl">de Camp</div></div>
    <div class="st"><div class="sv">1999</div><div class="sl">Crichton</div></div>
    <div class="st"><div class="sv">2011</div><div class="sl">11/22/63 (King)</div></div>
  </div>`,

  // 04 - The Machine
  `<p>The defining innovation of modern time travel fiction: a physical device that enables controlled, repeatable movement through time. Enrique Gaspar's <em>El Anacronopete</em> (1887) was the first, but H.G. Wells's <em>The Time Machine</em> (1895)<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Time_Machine">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Time_Machine" target="_blank">Wikipedia: The Time Machine (1895) &rarr;</a></span></sup> established the archetype -- a lever-operated vehicle that treats time as a navigable dimension, transforming time travel from supernatural experience to engineering problem.</p>
  <p>The machine structure enables stories about mastery and its limits. The traveler has control -- until they don't. The machine breaks, or time behaves differently than expected, or the consequences of mechanical time travel turn out to be mechanical consequences. <em>Back to the Future</em>, <em>Primer</em>, and <em>Tenet</em> are all machine stories.</p>
  <div class="s-chips">
    <span class="s-chip">Gaspar 1887</span>
    <span class="s-chip">Wells 1895</span>
    <span class="s-chip">DeLorean</span>
    <span class="s-chip">Primer box</span>
    <span class="s-chip">turnstile</span>
  </div>`,

  // 05 - The Loop
  `<p>The time loop traps a character in a repeating segment of time, forcing them to relive the same period over and over. Unlike the bootstrap paradox (which is a single closed loop), the time loop involves iteration -- the character retains memory across repetitions and must discover how to break the cycle.</p>
  <p><em>Groundhog Day</em> (1993)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Groundhog_Day_(film)">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Groundhog_Day_(film)" target="_blank">Wikipedia: Groundhog Day (1993 film) &rarr;</a></span></sup> is the cultural touchstone, but the structure appears in <em>Edge of Tomorrow</em> (2014), the videogame <em>Outer Wilds</em> (2019), and <em>Russian Doll</em> (2019). The loop structure makes repetition itself meaningful: each iteration reveals something new, and escape requires self-knowledge rather than mechanical intervention.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1993</div><div class="sl">Groundhog Day</div></div>
    <div class="st"><div class="sv">2014</div><div class="sl">Edge of Tomorrow</div></div>
    <div class="st"><div class="sv">2019</div><div class="sl">Russian Doll</div></div>
    <div class="st"><div class="sv">2019</div><div class="sl">Outer Wilds</div></div>
  </div>`,

  // 06 - Reverse Chronology
  `<p>A distinct narrative technique where the story is told backward -- from ending to beginning -- without the characters themselves traveling through time. Christopher Nolan's <em>Memento</em> (2000)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Memento_(film)">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Memento_(film)" target="_blank">Wikipedia: Memento (2000 film) &rarr;</a></span></sup> and Martin Amis's <em>Time's Arrow</em> (1991)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Time%27s_Arrow_(novel)">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Time%27s_Arrow_(novel)" target="_blank">Wikipedia: Time&rsquo;s Arrow (Amis, 1991) &rarr;</a></span></sup> use this structure to make the audience experience temporal disorientation that mirrors the characters' psychological states.</p>
  <p>Nolan's <em>Tenet</em> (2020) combined reverse chronology with actual temporal inversion: characters and objects moving backward through time while the world moves forward. This created a new hybrid where narrative structure and physical mechanism are fused -- the story is told backward because the characters are literally moving backward.</p>
  <div class="s-chips">
    <span class="s-chip">Memento</span>
    <span class="s-chip">Time's Arrow</span>
    <span class="s-chip">Tenet</span>
    <span class="s-chip">Irr&eacute;versible</span>
    <span class="s-chip">Betrayal (Pinter)</span>
  </div>`,

  // 07 - Hybrid & Experimental
  `<p>The most ambitious contemporary time travel narratives combine multiple structural archetypes within a single work. <em>Dark</em> fuses the loop, the machine, and the predestination structure across three seasons. <em>Primer</em> layers machine-based travel with branching timelines that compound into near-incomprehensible complexity. <em>Arrival</em> dissolves the category entirely by making temporal perception a linguistic rather than physical phenomenon.</p>
  <p>Interactive media have added a new dimension: the player as time traveler. <em>Braid</em> (2008) assigns different temporal rules to each world. <em>Outer Wilds</em> uses a 22-minute loop where knowledge is the only persistent state. These works create structures that linear narrative cannot replicate.</p>
  <div class="s-chips">
    <span class="s-chip">Dark</span>
    <span class="s-chip">Primer</span>
    <span class="s-chip">Arrival</span>
    <span class="s-chip">Braid</span>
    <span class="s-chip">Outer Wilds</span>
  </div>`,

  // 08 - Mechanics Determine Meaning
  `<p>The central argument of this section: the temporal mechanics a story chooses are not arbitrary -- they determine what the story can mean. Fixed timelines produce tragedy. Branching timelines produce adventure. Loops produce existential comedy or horror. Dissolution produces philosophical wonder. The choice of mechanic is the choice of theme.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Fixed &rarr; Tragedy</h4>
      <p>You cannot escape what was always going to happen. The beauty is in the struggle against inevitability. (<em>Dark</em>, <em>12 Monkeys</em>)</p>
    </div>
    <div class="feat">
      <h4>Branching &rarr; Adventure</h4>
      <p>Every choice creates a new world. Agency is real but fragmented across realities. (<em>Back to the Future</em>, <em>Primer</em>)</p>
    </div>
    <div class="feat">
      <h4>Loop &rarr; Growth</h4>
      <p>Repetition forces self-knowledge. Escape requires becoming a different person. (<em>Groundhog Day</em>, <em>Outer Wilds</em>)</p>
    </div>
    <div class="feat">
      <h4>Dissolution &rarr; Wonder</h4>
      <p>Time is not what you thought. The question was wrong. Perception is everything. (<em>Arrival</em>, <em>Slaughterhouse-Five</em>)</p>
    </div>
  </div>`
];

const details = [
  // 01 Detail - Time Slip
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 — Deep Dive</div><h2>The Time <em>Slip</em></h2></div>
  <p>The time slip is the most ancient and psychologically primal form of time travel narrative. The traveler does not choose to travel, does not understand the mechanism, and cannot control or repeat the experience. They are displaced through time the way a leaf is carried by wind -- without agency, without understanding, without recourse.</p>
  <p>The emotional core of every time slip story is the same: return and recognition. The traveler comes back to their own time and finds it transformed -- or finds themselves transformed by what they experienced in the other time. The slip is not really about time; it is about the experience of being out of place, out of phase, out of sync with the world you thought was yours.</p>
  <h3>The Ancient Pattern</h3>
  <p>The Mahabharata's story of King Kakudmi establishes the archetype around 800 BCE. Kakudmi visits the celestial realm of Brahma, where time passes differently. He returns to find ages have passed on Earth. The Japanese tale of Urashima Taro (720 CE) follows the same structure: a fisherman visits an undersea palace, returns to find centuries gone, opens a magical box, and ages to dust. In both cases, the mechanism is supernatural, the traveler is passive, and the emotional weight is in the return -- the devastating discovery that the world moved on without you.</p>
  <h3>Modern Inheritors</h3>
  <p>Audrey Niffenegger's <em>The Time Traveler's Wife</em> (2003)<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Time_Traveler%27s_Wife">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Time_Traveler%27s_Wife" target="_blank">Wikipedia: The Time Traveler&rsquo;s Wife (2003) &rarr;</a></span></sup> reinvented the time slip for the 21st century by making involuntary time travel a chronic medical condition. Henry DeTamble has no control over when or where he travels -- his displacement is genetic, uncontrollable, and progressively debilitating. The novel transforms the time slip from a single dramatic event into a sustained condition of life, turning temporal displacement into a metaphor for the way chronic illness, trauma, or neurodivergence can make a person feel perpetually out of phase with the people who love them.</p>
  <p>Woody Allen's <em>Midnight in Paris</em> (2011) uses the time slip as nostalgia critique. Gil Pender slips into 1920s Paris each midnight, meeting Hemingway, Fitzgerald, and Stein. But the 1920s characters are themselves nostalgic for the Belle Epoque, and the Belle Epoque characters yearn for the Renaissance. The film argues that the time slip reveals not a better past but the universal human tendency to believe the present is insufficient.</p>
  <div class="callout">
    <h4>The Thesis</h4>
    <p>The time slip is the narrative structure closest to the actual human experience of time. We do not choose to move through time. We cannot stop, reverse, or control our passage. The time slip simply makes literal what is already metaphorically true: we are all being carried through time without our consent.</p>
  </div>`,

  // 02 Detail - Moral Journey
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Deep Dive</div><h2>The <em>Moral</em> Journey</h2></div>
  <p>Dickens did not think of <em>A Christmas Carol</em> (1843) as a time travel story. But structurally, it invented the most durable template in the genre: a protagonist is shown their past, present, and future by an external guide, undergoes moral transformation, and returns to the present with the ability to change. This is bidirectional time travel in service of character development -- the three ghosts are, functionally, a time machine operated by moral necessity.</p>
  <p>The moral journey succeeds as narrative architecture because it maps onto the three-act structure with mathematical precision. Act One (Ghost of Christmas Past): the protagonist's flaw is revealed through memory. Act Two (Ghost of Christmas Present): the flaw's current consequences are shown. Act Three (Ghost of Christmas Yet to Come): the flaw's ultimate consequence -- death, isolation, irrelevance -- is revealed. Denouement: the protagonist returns to the present and chooses differently.</p>
  <h3>Groundhog Day as Moral Loop</h3>
  <p>Harold Ramis's <em>Groundhog Day</em> (1993) fused the moral journey with the time loop, creating a new hybrid. Phil Connors relives February 2nd hundreds (perhaps thousands) of times. The loop is the moral mechanism: Phil cannot escape until he transforms. The film never explains why the loop exists or what causes it to end -- because the mechanism is not physical but ethical. The universe (or the narrative) holds Phil in temporal stasis until he earns release through genuine compassion.</p>
  <p>This fusion of loop and moral arc has become one of the most productive structures in 21st-century storytelling. <em>Russian Doll</em>, <em>Palm Springs</em>, and <em>The Map of Tiny Perfect Things</em> all use loops as moral education devices. The structure persists because it solves a fundamental narrative problem: how do you show a character earning growth when growth requires time and repetition that linear narrative compresses away?</p>
  <div class="callout">
    <h4>Why It Works</h4>
    <p>The moral journey structure endures because it externalizes an internal process. Moral growth is invisible -- it happens inside a person's mind over months or years. Time travel makes it visible, spatial, and dramatic. You can watch Scrooge watch himself fail, and watch him choose differently. The time machine is a mirror.</p>
  </div>`,

  // 03 Detail - Yankee Abroad
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 — Deep Dive</div><h2>The <em>Yankee</em> Abroad</h2></div>
  <p>Twain's <em>A Connecticut Yankee in King Arthur's Court</em> is a time travel novel about power. Hank Morgan, a 19th-century factory superintendent, is transported to 6th-century England. He has no time machine -- he was hit on the head. But he has something more powerful: knowledge. He knows about electricity, explosives, engineering, economics. He uses this knowledge to reshape Arthurian England in the image of industrial America, establishing himself as "The Boss."</p>
  <p>The novel's climax is one of the most disturbing scenes in 19th-century American literature. Morgan fortifies a position with electric fences and Gatling guns and slaughters 25,000 knights in a single battle. Critics have read this as Twain's prophetic vision of industrialized warfare -- trench warfare, machine guns, the meaningless mass death of World War I, written 25 years before the fact. The Yankee abroad structure reveals that the power differential created by temporal knowledge is not liberation but a new form of violence.</p>
  <h3>Stephen King's 11/22/63</h3>
  <p>King's 2011 novel is the most ambitious modern Yankee abroad story. Jake Epping travels to 1958 through a portal to prevent the assassination of JFK. He spends five years living in the past, using his knowledge of the future to navigate events. But the past, King writes, is obdurate -- it resists change. And when Epping finally succeeds in saving Kennedy, the altered present is catastrophically worse. The Yankee abroad discovers that superior knowledge does not guarantee superior outcomes.</p>
  <h3>The Colonial Critique</h3>
  <p>Recent scholarship has identified the Yankee abroad structure as implicitly colonial: a traveler from a "more advanced" civilization arrives in a "less advanced" one and reorganizes it according to their own values. This critique connects time travel fiction to postcolonial theory and raises questions about whether the structure can be used self-critically. Some modern works (Octavia Butler's <em>Kindred</em>, 1979) deliberately invert the power dynamic, sending a Black woman back to the antebellum South, where her modern knowledge provides no advantage at all.</p>
  <div class="callout">
    <h4>The Inversion</h4>
    <p>The most interesting Yankee abroad stories are the ones where the Yankee fails. Knowledge of the future is not power -- it is a different kind of ignorance. You know what happens, but not why, and not how to change it without making everything worse.</p>
  </div>`,

  // 04 Detail - The Machine
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 — Deep Dive</div><h2>The <em>Machine</em></h2></div>
  <p>The shift from supernatural to mechanical time travel -- from magic to engineering -- is the single most important structural innovation in the genre's history. When Enrique Gaspar described his Anacronopete in 1887 and H.G. Wells described his Time Machine in 1895, they transformed temporal displacement from a spiritual or psychological experience into a technical problem. The traveler does not pray, dream, or suffer a blow to the head. They build a device, operate it, and navigate time as one navigates space.</p>
  <p>This engineering framing has two profound consequences. First, it makes time travel repeatable and controllable -- you can go where you want, when you want, and (in principle) return. This enables plot structures that supernatural time travel cannot support: you can have a second act. Second, it implicitly argues that time is a physical dimension, subject to physical manipulation. Wells made this argument explicitly in 1895; Einstein made it rigorously in 1905. The fiction preceded the physics.</p>
  <h3>The DeLorean Paradigm</h3>
  <p>The DeLorean time machine in <em>Back to the Future</em> (1985) is the most culturally influential machine in the genre. Its design is brilliantly cinematic: a specific speed (88 mph), a visible threshold (flux capacitor activation), and a measurable fuel (1.21 gigawatts / plutonium / lightning). Every detail serves both narrative and comprehensibility. The audience always knows the rules, the stakes, and the constraints. This transparency is what makes Back to the Future's branching timeline mechanics accessible where Primer's are impenetrable.</p>
  <h3>Primer's Anti-DeLorean</h3>
  <p>Shane Carruth's Primer (2004) is the anti-DeLorean: a time machine built in a garage from off-the-shelf electronics, whose operation requires the traveler to sit inside a coffin-sized box for the exact duration they wish to travel backward. There is no spectacle, no flash, no visible threshold. The machine's mundanity is the point: time travel as plumbing, not magic. And because the machine's rules are so precisely defined, the consequences of using it -- overlapping timelines, duplicate selves, compounding paradoxes -- are rigorously logical and nearly impossible to follow.</p>

  // 05 Detail - The Loop
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 — Deep Dive</div><h2>The <em>Closed</em> Loop</h2></div>
  <p>The time loop differs from the bootstrap paradox in a crucial way: where the bootstrap is a single self-causing event, the time loop involves repeated iterations. The character lives through the same period multiple times, retaining memory across repetitions, and must discover how to break the cycle. The loop structure turns repetition into narrative engine -- each pass reveals new information, new possibilities, and new depths of desperation or understanding.</p>
  <p>The loop operates on a simple but profound principle: when you repeat an experience with awareness, you are forced to engage with it more deeply than you would in a single pass. The first iteration is survival. The second is understanding. The third is mastery or despair. By the hundredth, the character has been stripped of everything except their relationship to the experience itself.</p>
  <h3>Outer Wilds: The Knowledge Loop</h3>
  <p>Mobius Digital's <em>Outer Wilds</em> (2019) may be the most elegant time loop in any medium. The player explores a solar system that resets every 22 minutes when its sun goes supernova. Death is inevitable and frequent. The only thing that persists across loops is the player's knowledge. There are no upgrades, no power-ups, no permanent changes to the game world. The loop can be broken only when the player understands enough about the solar system to reach the right place at the right time with the right knowledge.</p>
  <p>This design is a pure expression of the loop's philosophical core: the only permanent thing is understanding. Everything else resets. The game makes the player experience what it means for knowledge alone to persist while the world returns to zero.</p>
  <h3>The Loop and Existentialism</h3>
  <p>The time loop has deep structural parallels with existentialist philosophy, particularly Albert Camus's essay "The Myth of Sisyphus." Sisyphus is condemned to push a boulder up a hill for eternity, watching it roll back down each time. Camus argues that Sisyphus must be imagined happy -- that the struggle itself is meaningful even without progress. Time loop narratives make the same argument: the loop is not a prison but a laboratory for discovering what matters when external progress is impossible.</p>
  <div class="callout">
    <h4>Why Loops Resonate Now</h4>
    <p>The explosion of time loop stories in the 2010s and 2020s may reflect a cultural condition: the feeling that we are repeating the same crises -- pandemic waves, economic cycles, political polarization -- without making progress. The loop structure gives narrative shape to the experience of collective stasis.</p>
  </div>`,

  // 06 Detail - Reverse
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 — Deep Dive</div><h2><em>Reverse</em> Chronology</h2></div>
  <p>Reverse chronology is not, strictly speaking, time travel -- the characters experience time normally. But the narrative is told backward, from ending to beginning, and this structural choice forces the audience into a relationship with time that mimics the disorientation of actual temporal displacement. The audience knows the outcome but not the cause; they experience effects before seeing the events that produced them.</p>
  <p>Martin Amis's <em>Time's Arrow</em> (1991) tells the entire life of a Nazi doctor in reverse. The narrator experiences everything backward: food is extracted from mouths, injuries heal spontaneously, and the Holocaust, when we reach it, appears as an act of creation -- people assembled from ash and smoke. The horror of the novel is that the backward perspective makes genocide look benevolent. Amis uses reverse chronology to expose how our moral understanding of events depends entirely on temporal direction.</p>
  <h3>Tenet's Physical Reversal</h3>
  <p>Christopher Nolan's <em>Tenet</em> (2020) took reverse chronology from narrative technique to physical mechanism. Characters and objects can have their entropy inverted, causing them to move backward through time while the rest of the world moves forward. A bullet returns to a gun. An explosion implodes. Two versions of a fight occur simultaneously from opposite temporal directions.</p>
  <p>The film's central concept -- the "temporal pincer movement" -- involves coordinating two teams, one moving forward through time and one moving backward, who share information at a midpoint. This is military strategy applied to the arrow of time, and it represents the most ambitious fusion of reverse chronology with physical time travel mechanics in any film.</p>
  <div class="callout">
    <h4>The Arrow of Time</h4>
    <p>Reverse chronology in fiction is ultimately about the arrow of time -- the thermodynamic asymmetry that makes the past different from the future. By reversing the narrative, these works ask: what if the arrow pointed the other way? The answer, consistently, is that meaning itself depends on temporal direction. Cause and effect, guilt and innocence, creation and destruction -- all reverse when time reverses.</p>
  </div>`,

  // 07 Detail - Hybrid
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 — Deep Dive</div><h2><em>Hybrid</em> & Experimental Forms</h2></div>
  <p>The most formally ambitious time travel narratives of the 21st century refuse to stay within a single structural archetype. They combine, layer, and hybridize the fundamental forms -- creating works whose temporal complexity exceeds what any single structure can produce.</p>
  <p><em>Dark</em> is the supreme example. Across three seasons, the series uses fixed-timeline predestination, bootstrap paradoxes, machine-based travel, generational loops, parallel worlds, and the dissolution of time itself. Each season adds a new layer of temporal complexity: Season 1 operates as a mystery within a single closed loop. Season 2 introduces the idea that the loop contains sub-loops. Season 3 reveals that the entire structure is a knot between two parallel worlds, and the only escape is to prevent the knot from forming -- which requires a character to not exist.</p>
  <h3>Interactive Temporality</h3>
  <p>Video games have created temporal structures that no linear medium can replicate. Jonathan Blow's <em>Braid</em> (2008) assigns a different time-manipulation rule to each of its six worlds: in one, time reverses when you walk left; in another, a shadow of yourself replays your previous actions; in another, time only moves when you move. Each world is a thought experiment about a different aspect of temporal mechanics, and the player must internalize each set of rules to solve the puzzles.</p>
  <p><em>Life is Strange</em> (2015) gives the player a rewind ability with a crucial constraint: rewinding time does not reset your knowledge. You can redo conversations with information from the future -- but the consequences of your "optimized" choices are often worse than the original ones. The game argues that perfect information does not produce perfect outcomes, a direct narrative critique of the Yankee abroad archetype.</p>
  <div class="security-box">
    <h4>The Complexity Ceiling</h4>
    <p>There may be a limit to how much temporal complexity an audience can track. Primer's approximately nine overlapping timelines are widely considered the threshold of comprehensibility. Dark's three-season structure required an official website with an interactive family tree. These works suggest that the most formally ambitious time travel narratives risk losing their audience in the mechanics -- and that the best ones (like Arrival) achieve complexity through emotional rather than structural means.</p>
  </div>`,

  // 08 Detail - Mechanics Determine Meaning
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 — Deep Dive</div><h2><em>Mechanics</em> Determine Meaning</h2></div>
  <p>This is the central argument of the narrative structures analysis: the temporal mechanics a time travel story selects are not a technical detail -- they are the story's deepest thematic commitment. The mechanics determine what kinds of stories can be told, what emotional registers are available, and what philosophical positions are implicitly endorsed.</p>
  <p>A fixed-timeline story is a deterministic story. It says: the universe is a block, all moments coexist, and what happened was always going to happen. The only freedom is in how you respond to inevitability. This is the metaphysics of Stoicism, and it produces narratives of tragic beauty.</p>
  <p>A branching-timeline story is a libertarian story (in the metaphysical sense). It says: every choice creates a new reality, agency is real, and the multiverse contains all possibilities. This is the metaphysics of quantum mechanics (on the many-worlds interpretation), and it produces narratives of vertiginous freedom.</p>
  <p>A loop story is an existentialist story. It says: you are trapped in repetition, and the only escape is self-transformation. This is the metaphysics of Camus and Nietzsche (eternal recurrence), and it produces narratives of growth through suffering.</p>
  <p>A dissolution story is a mystical story. It says: your experience of time as linear and flowing is an illusion. All moments are equally real, and liberation comes from perceiving them simultaneously. This is the metaphysics of eternalism, and it produces narratives of transcendent wonder.</p>
  <h3>Cross-References</h3>
  <p>See <a href="s1-paradoxes.dd.html">S1: Paradoxes & Causal Logic</a> for how each resolution strategy handles paradoxes. See <a href="s4-philosophy.dd.html">S4: Philosophical Implications</a> for the metaphysical foundations of each mechanic. See <a href="s5-notable-works.dd.html">S5: Notable Works Analysis</a> for how specific works instantiate these structures.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Mechanic as Worldview</h4>
      <p>Every time travel mechanic implicitly commits to a position on free will, the nature of time, and the relationship between cause and effect. The mechanic is the metaphysics.</p>
    </div>
    <div class="feat">
      <h4>Mechanic as Genre</h4>
      <p>Fixed timelines produce tragedy. Branching produces adventure. Loops produce comedy or horror. Dissolution produces literary fiction. The mechanic is the genre.</p>
    </div>
    <div class="feat">
      <h4>Mechanic as Emotion</h4>
      <p>The dominant emotional register -- melancholy, excitement, desperation, wonder -- follows directly from the temporal mechanics. The mechanic is the feeling.</p>
    </div>
    <div class="feat">
      <h4>Mechanic as Argument</h4>
      <p>Every time travel story is implicitly arguing for a model of reality. Fiction doesn't just illustrate physics and philosophy -- it proposes alternatives. The mechanic is the thesis.</p>
    </div>
  </div>`
];
