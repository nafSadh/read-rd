const sections = [
  { num: '01', short: 'Block Universe', title: 'The <em>Block</em> Universe' },
  { num: '02', short: 'McTaggart', title: "<em>McTaggart's</em> Paradox" },
  { num: '03', short: 'Free Will', title: '<em>Free</em> Will & Determinism' },
  { num: '04', short: 'Lewis', title: "<em>David</em> Lewis on Time Travel" },
  { num: '05', short: 'Identity', title: '<em>Personal</em> Identity Through Time' },
  { num: '06', short: 'Chronoclasm', title: 'The <em>Chronoclasm</em> Problem' },
  { num: '07', short: 'Fiction Argues', title: 'Fiction as <em>Philosophical</em> Argument' },
  { num: '08', short: 'Synthesis', title: 'The <em>Metaphysics</em> of Narrative' }

const summaries = [
  `<p>Eternalism -- the view that past, present, and future are equally real<sup class="fn"><a href="https://en.wikipedia.org/wiki/Eternalism_(philosophy_of_time)">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Eternalism_(philosophy_of_time)" target="_blank">Wikipedia: Eternalism (Philosophy of Time) &rarr;</a></span></sup> -- is the implicit metaphysics of virtually all time travel fiction. If only the present exists (presentism), there is no "past" to travel to. Time travel fiction requires the block universe: a four-dimensional spacetime in which all moments coexist, and what we call "the flow of time" is a feature of consciousness, not of reality.</p>
  <p>Wells described this in 1895, thirteen years before Minkowski formalized it. Vonnegut's Tralfamadorians articulate it explicitly in <em>Slaughterhouse-Five</em>: all moments exist simultaneously, and death is just one of many moments a person occupies. Chiang's heptapods embody it in <em>Arrival</em>.</p>

  <p>The block universe -- also called eternalism or the B-theory of time -- is the view that the past, present, and future are equally real. Spacetime is a four-dimensional block in which all events exist simultaneously. What we experience as "the present" is simply our current location in the block; what we experience as "the flow of time" is an artifact of consciousness, not a feature of reality.</p>
  <p>This view has strong support in physics. Special relativity's key insight -- the relativity of simultaneity -- shows that observers in different reference frames disagree about which events are simultaneous. If the present is relative, then the distinction between past, present, and future cannot be absolute. The Rietdijk-Putnam argument formalizes this: if event E is present for observer A, future for observer B, and past for observer C (all of whom can be in the same spacetime), then E must be real in all three temporal positions. All moments are equally real.</p>
  <h3>Fiction's Block Universe</h3>
  <p>H.G. Wells articulated the block universe in the opening chapter of <em>The Time Machine</em> (1895), thirteen years before Minkowski formalized spacetime. The Time Traveller argues that time is the fourth dimension, that all moments of time are equally real, and that our inability to navigate time freely is a limitation of perception, not physics. This is eternalism expressed in Victorian prose.</p>
  <p>Vonnegut's Tralfamadorians in <em>Slaughterhouse-Five</em> (1969) perceive all moments simultaneously. They see a person's life as a complete four-dimensional shape, not a sequence of moments. Death is not an ending -- it is one of many moments the person occupies. When someone dies, the Tralfamadorians say "So it goes" -- an acceptance born from perceiving the block.</p>
  <p>Chiang's heptapods in "Story of Your Life" (1998) embody the block universe through language. Their written language, Heptapod B, is semasiographic -- it conveys meaning without temporal sequence. Learning this language gives Louise Banks access to non-linear temporal perception: she begins to remember the future as well as the past. The block universe becomes experiential through linguistic transformation.</p>

  <p>In 1908, J.M.E. McTaggart published one of the most influential papers in the history of philosophy: "The Unreality of Time." His argument proceeds in two steps. First, he distinguishes two ways of ordering temporal events. The A-series orders events as past, present, and future -- these are tensed properties that change (today's lunch is future this morning, present at noon, and past this evening). The B-series orders events as earlier-than or later-than -- these are tenseless relations that don't change (the Battle of Hastings is always earlier than the moon landing).</p>
  <p>Second, McTaggart argues that time essentially requires the A-series (because change requires the shift from future to present to past), but the A-series is self-contradictory (because every event must have all three properties -- past, present, and future -- which are mutually incompatible). Therefore, time is unreal.</p>
  <h3>The A-Theory and B-Theory</h3>
  <p>Philosophers responded to McTaggart by splitting into two camps. A-theorists (or presentists) reject his conclusion but accept his premise that the A-series is essential to time. They argue the A-series is not self-contradictory because an event has different A-properties at different times. B-theorists (or eternalists) reject his premise: time does not require the A-series. The B-series -- the tenseless ordering of events -- is sufficient. Change is real but does not require a privileged "present."</p>

  <p>The relationship between time travel fiction and philosophy is not one of illustration (fiction depicting philosophical ideas) but of argumentation (fiction making philosophical claims through narrative means). The most philosophically significant time travel stories don't just dramatize existing philosophical positions -- they advance new arguments that philosophy hasn't yet articulated.</p>
  <p>Chiang's "Story of Your Life" argues for a specific form of compatibilism: that knowing the future does not eliminate the meaningfulness of choice, because choice is constituted by the experience of acting for reasons, not by the availability of alternatives. This is a philosophical argument, but it is made through narrative rather than through premises and conclusions. A reader who follows Louise Banks's journey has engaged with the argument more completely than a reader who encounters it in abstract form.</p>
  <h3>Vonnegut's Fatalism</h3>
  <p>Vonnegut's <em>Slaughterhouse-Five</em> makes a different argument: that fatalism (the view that the future is fixed and there is nothing anyone can do about it) is the psychologically necessary response to overwhelming trauma. Billy Pilgrim becomes "unstuck in time" after surviving the firebombing of Dresden. His temporal displacement is not a physical phenomenon -- it is a psychological defense mechanism. The Tralfamadorian block universe, in which all moments coexist and nothing can be changed, provides Billy with a framework for accepting the unacceptable. Fatalism is presented not as a philosophical position but as a survival strategy.</p>
  <h3>Dark's Tragic Determinism</h3>
  <p><em>Dark</em> argues that determinism does not eliminate the significance of human effort -- it transforms its meaning. Jonas fights to break the cycle even though his fight is the cycle. His resistance is not futile in the sense of being meaningless; it is futile in the sense of being predetermined. But the experience of resistance -- the grief, the hope, the desperation -- is real regardless of whether the outcome was determined. Dark argues that the value of human effort lies in the effort itself, not in its ability to change outcomes.</p>
  <div class="callout">
    <h4>Fiction's Advantage</h4>
    <p>Fiction has a methodological advantage over philosophy when it comes to questions about time, free will, and determinism: it can make abstract positions experiential. Readers do not merely understand compatibilism after reading "Story of Your Life" -- they feel what it would be like to live it. This experiential dimension is something that formal philosophical argument, by its nature, cannot provide.</p>
  </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 — Deep Dive</div><h2>The <em>Metaphysics</em> of Narrative</h2></div>
  <p>This section synthesizes the philosophical implications into a single thesis: time travel fiction is the genre where narrative structure and metaphysical commitment are identical. The temporal mechanics a story selects are not merely plot devices -- they are philosophical positions enacted through narrative means. To choose fixed timelines is to commit to eternalism and determinism. To choose branching timelines is to commit to modal realism and libertarian free will. To choose loops is to commit to eternal recurrence. To choose dissolution is to commit to transcendental idealism.</p>
  <p>This is not metaphor. The mechanics literally determine what is true within the world of the story. In <em>Dark</em>, determinism is not just a theme -- it is the structure of the world. Events are determined because the timeline is a closed curve. Characters lack genuine alternatives because the geometry of spacetime does not permit them. The metaphysics is the mechanics.</p>
  <h3>The Four Metaphysical Commitments</h3>
  <div class="feat-grid">
    <div class="feat">
      <h4>Fixed = Eternalism</h4>
      <p>All moments are equally real. The past cannot be changed. The appropriate response is acceptance, contemplation, or tragic resistance. (Dark, 12 Monkeys, Arrival)</p>
    </div>
    <div class="feat">
      <h4>Branching = Modal Realism</h4>
      <p>Many possible worlds are real. Choice creates new realities. The appropriate response is adventurous exploration of possibility. (Back to the Future, Primer, Endgame)</p>
    </div>
    <div class="feat">
      <h4>Loop = Eternal Recurrence</h4>
      <p>The same events repeat. The only escape is self-transformation. The appropriate response is existential growth through repetition. (Groundhog Day, Outer Wilds, Russian Doll)</p>
    </div>
    <div class="feat">
      <h4>Dissolution = Transcendence</h4>
      <p>Time as we understand it is an illusion. Perception can be transformed. The appropriate response is wonder and acceptance of a larger reality. (Arrival, Slaughterhouse-Five, Interstellar)</p>
    </div>
  </div>
  <h3>Cross-References</h3>
  <p>See <a href="s1-paradoxes.dd.html">S1: Paradoxes</a> for how each metaphysical position handles causal paradoxes. See <a href="s2-narrative-structures.dd.html">S2: Narrative Structures</a> for the narrative consequences of each position. See <a href="s3-scientific-accuracy.dd.html">S3: Scientific Accuracy</a> for the physics that supports (or constrains) each position. See <a href="s5-notable-works.dd.html">S5: Notable Works</a> for how specific works instantiate these metaphysical commitments.</p>`
