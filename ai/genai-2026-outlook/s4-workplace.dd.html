<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S4: Workplace Adoption — GenAI 2026 Outlook</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<script>
const sections = [
  { num: '01', short: 'Overview', title: '<em>Workplace</em> Adoption' },
  { num: '02', short: 'Gap', title: 'The <em>Adoption-Value</em> Gap' },
  { num: '03', short: 'Evaluation', title: 'The <em>Evaluation</em> Shift' },
  { num: '04', short: 'Wins', title: 'Where <em>Value</em> Materializes' },
  { num: '05', short: 'Fails', title: 'Where <em>Value</em> Doesn&rsquo;t' },
  { num: '06', short: 'Barriers', title: 'The <em>Real</em> Barriers' },
  { num: '07', short: 'Shadow AI', title: 'The <em>Free-Tool</em> Shadow' },

  { num: '09', short: 'Disputes', title: 'Where Sources <em>Disagree</em>' }

const summaries = [
  `<p>Everyone uses AI. Almost nobody gets enterprise-level value from it. That is the single most important finding across ten sources and three major enterprise surveys. <strong>78-88%</strong> of organizations deploy AI somewhere. Only <strong>10-39%</strong> report enterprise-wide impact. <a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC</a><sup class="fn"><a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">[1]</a><span class="tip">PwC CEO Survey &mdash; 56% of CEOs captured neither revenue nor cost savings from AI.</span></sup>: 56% of CEOs captured neither revenue nor cost savings.</p>
   <p>The era of AI evangelism is giving way to the era of AI evaluation. &ldquo;Can AI do this?&rdquo; has been replaced by &ldquo;How well, at what cost, for whom?&rdquo; The technology works. The organization doesn&rsquo;t &mdash; yet.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">78%</div><div class="sl">use AI (<a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey</a>, up from 55%)</div></div>
     <div class="st"><div class="sv">39%</div><div class="sl">report enterprise EBIT impact</div></div>
     <div class="st"><div class="sv">56%</div><div class="sl">CEOs: no revenue or cost gains</div></div>
     <div class="st"><div class="sv">20-30%</div><div class="sl">junior productivity boost</div></div>
   </div>`,

  `<p>Three major enterprise surveys paint a consistent picture of a gap between deployment and value. <a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey</a>: 78% use AI, but only <strong>39% report EBIT impact.</strong> <a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a>: 66% report productivity gains, but only <strong>20% report revenue growth.</strong> <a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC</a>: 88% deploy AI somewhere, but only <strong>12% achieved both revenue growth and cost reduction.</strong></p>
   <p>These aren&rsquo;t contradictory findings &mdash; they&rsquo;re measuring different slices of the same elephant. AI is easy to deploy for narrow tasks. It is extraordinarily hard to translate those deployments into enterprise-level financial impact. <a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a>: enterprise AI adoption moves at &ldquo;the speed of business, not the speed of technology.&rdquo;</p>
   <p>Only <strong>34%</strong> of organizations are truly reimagining their businesses through AI. The other two-thirds are layering it onto existing processes and capturing surface-level efficiency gains.</p>`,

  `<p><a href="https://hai.stanford.edu/ai-predictions-2026" target="_blank">Stanford HAI</a><sup class="fn"><a href="https://hai.stanford.edu/ai-predictions-2026" target="_blank">[2]</a><span class="tip">Stanford HAI &mdash; from AI evangelism to the era of AI evaluation.</span></sup> captures the mood shift: we&rsquo;ve moved from the era of AI evangelism to the <strong>era of AI evaluation.</strong> The question &ldquo;Can AI do this?&rdquo; &mdash; which dominated 2023-2024 &mdash; has been replaced by &ldquo;How well, at what cost, for whom?&rdquo;</p>
   <p><a href="https://sloanreview.mit.edu/" target="_blank">MIT Sloan</a>&rsquo;s <a href="https://sloanreview.mit.edu/" target="_blank">Davenport and Bean</a> describe the consequences: copilot-style tools deliver &ldquo;incremental and mostly unmeasurable productivity gains&rdquo; for individual users. But translating individual productivity into enterprise-level value requires organizational change that most companies haven&rsquo;t done.</p>
   <p><a href="https://makebot.sh/key-llm-market-trends/" target="_blank">Makebot</a>: LLMs now evaluated by outcomes, not benchmarks. Productivity improvements &ldquo;most consistently observed in <strong>programming, call centers, and narrowly defined workflows</strong>.&rdquo; The pattern from <a href="s3-agents.dd.html" title="AI Agents">S3</a> repeats: narrow and measurable succeeds; broad and ambitious fails.</p>`,

  `<p><strong>Coding</strong> is the clear winner. <a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">Anthropic</a><sup class="fn"><a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">[3]</a><span class="tip">Anthropic &mdash; agentic coding trends: 67% more PRs merged per day.</span></sup>: 67% more PRs merged per day. Fountain: 50% faster development. Rakuten: 7-hour autonomous coding sessions. TELUS: 500K hours saved. But delegation remains thin &mdash; only 0-20% of coding fully delegated to AI. AI accelerates; it doesn&rsquo;t replace.</p>
   <p><strong>Junior workers benefit most.</strong> Deloitte: GenAI boosted junior productivity 20-30%, senior only 10-15%. AI closes the skill gap from below &mdash; the least experienced gain the most. This has profound implications for career ladders (explored in <a href="s5-employment.dd.html" title="Employment &amp; Labor">S5</a>).</p>
   <p><strong>Decision support</strong> is the emerging win. <a href="https://itsm.tools/ai-in-it-survey/" target="_blank">ITSM</a><sup class="fn"><a href="https://itsm.tools/ai-in-it-survey/" target="_blank">[4]</a><span class="tip">ITSM.tools &mdash; AI in IT survey: decision-making jumped from 28% to 47%.</span></sup>: better decision-making jumped from 28% to <strong>47%</strong> as the top-cited benefit in one year. AI doesn&rsquo;t make decisions &mdash; it makes decision-makers faster and more informed.</p>`,

  `<p><strong>Revenue growth</strong> remains aspirational. 20% achieving it vs 74% hoping for it (Deloitte). PwC: only 12% of CEOs achieved both revenue growth <em>and</em> cost reduction. The belief-execution gap is the largest in any category.</p>
   <p><strong>Enterprise-wide scaling</strong> is the hardest challenge. Only 10% scaled AI value enterprise-wide (PwC). Two-thirds merely layer AI onto existing processes. McKinsey: only 6-10% of firms with weak data pipelines realize consistent value at scale.</p>
   <p>The uncomfortable pattern: organizations that <em>most need</em> AI transformation (poor data, rigid processes, weak digital infrastructure) are the ones least equipped to benefit from it.</p>`,

  `<p>Deloitte surveyed 3,235 leaders across 24 countries. The #1 barrier: <strong>insufficient worker skills.</strong> Not technology limitations, not cost, not regulatory concerns &mdash; the workforce doesn&rsquo;t know how to use the tools effectively.</p>
   <p>42% believe their strategy is highly prepared for AI &mdash; but feel <em>less</em> prepared on infrastructure, data, risk, and talent. The confidence is in the vision; the gap is in execution.</p>
   <p>McKinsey identifies the management gap: high performers are <strong>3&times; more likely</strong> to have senior leadership demonstrating ownership and commitment. Not delegating to IT. Not appointing a Chief AI Officer. Actively using AI themselves and role-modeling adoption. The differentiator is cultural, not technical.</p>`,

  `<p>A parallel adoption story that official enterprise surveys miss: <strong>82%</strong> of end-users use free AI tools at work (ITSM, up from 71% in 2025). Only 2% report zero AI use. This is happening regardless of whether the organization has an AI strategy.</p>
   <p>But trust remains shallow. Only <strong>16%</strong> fully trust AI for autonomous operational decisions. Trust increased for 62% of respondents, yet the gap between &ldquo;I use ChatGPT daily&rdquo; and &ldquo;I trust AI to make decisions&rdquo; is vast.</p>
   <p>The implication: organizations face a <strong>shadow AI</strong> problem where employees are using unvetted tools on company data, without governance, outside IT visibility. This connects directly to the <a href="s3-agents.dd.html" title="AI Agents">S3</a> &ldquo;shadow agents&rdquo; concern.</p>`,

  `<p>Six findings converge across ten sources:</p>
   <p><strong>1.</strong> Adoption is near-universal (78-88%). The &ldquo;will we adopt?&rdquo; question is settled. <strong>2.</strong> Enterprise value is rare (10-39%). The gap is the defining story. <strong>3.</strong> Coding is the strongest measurable use case. <strong>4.</strong> Junior workers benefit most (20-30% vs 10-15%). <strong>5.</strong> Skills, not technology, are the #1 barrier. <strong>6.</strong> Leadership commitment &mdash; not AI strategy documents &mdash; is what differentiates high performers.</p>
   <p>The meta-finding: the technology-adoption question is answered. The organizational-transformation question is wide open.</p>`,

  `<p><strong>How much value is real?</strong> McKinsey (39% enterprise EBIT) vs PwC (12% both revenue + cost). Different survey populations, different definitions &mdash; but the gap suggests we don&rsquo;t yet have consensus on what &ldquo;AI value&rdquo; even means at the enterprise level.</p>
   <p><strong>Tool vs transformation:</strong> Microsoft frames &ldquo;AI coworkers&rdquo; and ambient AI. Deloitte counters that only 34% reimagine business through AI. The rest bolt it onto existing processes. Whether &ldquo;bolting on&rdquo; is a failure or a sensible first step depends on the organization&rsquo;s ambition horizon.</p>
   <p><strong>Timeline to value:</strong> Deloitte says 6-12 months minimum. McKinsey high-performer data suggests faster is possible. But <a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC&rsquo;s</a> 56% with no gains after 2+ years suggests many never arrive.</p>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>Workplace</em> Adoption</h2></div>
   <h3>The Paradox That Defines 2026</h3>
   <p>On the surface, AI adoption looks like a triumph: 78% of organizations use AI, up from 55% just two years ago. The fastest enterprise technology adoption in recent memory. But the enterprise surveys underneath the headlines tell a very different story. Deployment is near-universal. Value realization is not.</p>
   <p>This section synthesizes three of the most comprehensive enterprise AI surveys available &mdash; <a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey&rsquo;s State of AI</a> 2025 (global survey, multi-thousand respondents), <a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte&rsquo;s State of AI</a> in the Enterprise 2026 (3,235 leaders, 24 countries), and <a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC&rsquo;s</a> 2026 CEO Survey &mdash; alongside domain-specific data from <a href="https://hai.stanford.edu/news/stanford-hai-experts-predict-ai-2026" target="_blank">Stanford HAI</a>, <a href="https://sloanreview.mit.edu/" target="_blank">MIT Sloan</a>, Microsoft, <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic</a>, <a href="https://www.idc.com/" target="_blank">IDC</a>, and <a href="https://itsm.tools/" target="_blank">ITSM.tools</a>.</p>
   <div class="diagram-wrap"><svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
     <rect x="0" y="0" width="400" height="240" fill="rgba(0,0,0,0.025)" rx="6"/>
     <text x="200" y="20" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" class="lbl" letter-spacing="1.5">THE ADOPTION-VALUE GAP</text>
     <line x1="30" y1="32" x2="370" y2="32" stroke="currentColor" class="border" stroke-width="0.5"/>
     <text x="200" y="54" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="600" class="lbl-hi">ADOPTION (near-universal)</text>
     <rect x="40" y="62" width="320" height="16" fill="rgba(91,91,214,0.15)" rx="2"/>
     <rect x="40" y="62" width="280" height="16" fill="rgba(91,91,214,0.35)" rx="2"/>
     <text x="326" y="74" font-family="'IBM Plex Mono',monospace" font-size="8" class="lbl-hi" style="font-size:8px">88%</text>
     <text x="40" y="90" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl" style="font-size:7px">deploy AI somewhere (PwC synthesis)</text>
     <rect x="40" y="100" width="320" height="16" fill="rgba(91,91,214,0.15)" rx="2"/>
     <rect x="40" y="100" width="250" height="16" fill="rgba(91,91,214,0.3)" rx="2"/>
     <text x="296" y="112" font-family="'IBM Plex Mono',monospace" font-size="8" class="lbl-hi" style="font-size:8px">78%</text>
     <text x="40" y="128" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl" style="font-size:7px">use AI in at least one function (McKinsey)</text>
     <text x="200" y="148" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="600" class="lbl-hi">VALUE (rare)</text>

     <rect x="40" y="156" width="125" height="16" fill="rgba(124,58,237,0.35)" rx="2"/>
     <text x="170" y="168" font-family="'IBM Plex Mono',monospace" font-size="8" class="lbl-hi" style="font-size:8px">39%</text>
     <text x="40" y="184" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl" style="font-size:7px">enterprise EBIT impact (McKinsey)</text>

     <rect x="40" y="194" width="38" height="16" fill="rgba(124,58,237,0.35)" rx="2"/>
     <text x="84" y="206" font-family="'IBM Plex Mono',monospace" font-size="8" class="lbl-hi" style="font-size:8px">12%</text>
     <text x="40" y="222" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl" style="font-size:7px">both revenue growth + cost reduction (PwC)</text>

   <h3>Why This Gap Matters</h3>
   <p>The adoption-value gap is not merely a measurement problem. It represents real capital being deployed without proportional returns. If 88% of organizations have AI but only 12% achieve both revenue and cost improvement, the remaining 76% are spending money on a technology that &mdash; so far &mdash; hasn&rsquo;t changed their financial trajectory. This doesn&rsquo;t mean it won&rsquo;t. But it does mean the current discourse about AI as a business imperative is running ahead of the financial evidence for most organizations.</p>
   <p><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte&rsquo;s</a> <a href="https://www.klover.ai/ai-agents-in-enterprise-market-survey-mckinsey-pwc-deloitte-gartner/" target="_blank">Klover.ai</a> synthesis captures the tension between consulting firms: McKinsey and PwC argue that the answer is <em>bolder</em> AI strategy (&ldquo;rewire your company&rdquo;). Deloitte and <a href="https://www.gartner.com/en/articles/gartner-top-10-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> argue for <em>pragmatic</em> approaches (&ldquo;focus on a small number of high-impact use cases&rdquo;). Both may be right for different organizations at different stages &mdash; but the data currently favors the pragmatists.</p>
   <div class="callout"><strong>Connection to <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> and <a href="s3-agents.dd.html" title="AI Agents">S3</a>:</strong> The cost deflation from <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> makes AI cheap to try. The agent production reality from <a href="s3-agents.dd.html" title="AI Agents">S3</a> shows it&rsquo;s hard to make it work at scale. S4 quantifies the gap: cheap to deploy, hard to extract enterprise value. The same pattern, three different views.</div>`,

  `<div class="detail-header"><div class="num">02</div><h2>The <em>Adoption-Value</em> Gap</h2></div>
   <p>The three major enterprise surveys provide complementary views of the same phenomenon, each measured slightly differently, which gives us confidence that the gap is real rather than a measurement artifact.</p>
   <h3><a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey</a><sup class="fn"><a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">[5]</a><span class="tip">McKinsey State of AI &mdash; 78% use AI, only 39% report EBIT impact.</span></sup>: 78% → 39%</h3>
   <p><a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey&rsquo;s State of AI</a> survey (November 2025) finds 78% of organizations use AI in at least one business function, up from 55% in 2023. Usage is real. But when asked about enterprise-level impact: only 39% report EBIT impact. 64% say AI enables innovation &mdash; but &ldquo;enables innovation&rdquo; and &ldquo;improved our bottom line&rdquo; are very different claims. Nearly two-thirds of respondents say their organizations have <em>not yet begun scaling AI across the enterprise.</em> Most are still experimenting.</p>
   <h3><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a><sup class="fn"><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">[6]</a><span class="tip">Deloitte Enterprise AI 2026 &mdash; 3,235 leaders, 24 countries surveyed.</span></sup>: 66% → 20%</h3>
   <p>Deloitte surveyed 3,235 leaders across 24 countries. 66% report productivity and efficiency gains &mdash; the most commonly cited benefit. But only 20% report actual revenue growth from AI, while 74% are hoping for future revenue impact. The gap between &ldquo;we&rsquo;re more productive&rdquo; and &ldquo;we make more money&rdquo; reflects a fundamental challenge: productivity gains at the individual or team level don&rsquo;t automatically translate to enterprise-level financial performance. The gains may be real but offset by the costs of AI infrastructure, the organizational disruption of adoption, or simply not large enough to move the needle on enterprise financials.</p>
   <h3><a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC</a>: 88% → 12%</h3>
   <p><a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC&rsquo;s</a> synthesis is the most sobering. 88% of companies deploy AI somewhere. But only 12% of CEOs report achieving <em>both</em> revenue growth and cost reduction from AI. 56% captured neither. This suggests that for the majority of organizations, AI deployment has not yet translated into measurable business improvement by either metric. The remaining 32% saw improvement on one dimension but not both &mdash; meaning even partial success is the exception, not the norm.</p>

   <h3>Why the Gap Persists</h3>
   <p>Individual AI tools (Copilot, ChatGPT, Claude) deliver genuine personal productivity gains. A developer writes code faster. An analyst summarizes documents more quickly. A marketer drafts copy in minutes instead of hours. These gains are real, consistent, and well-documented. But they are <em>individual</em> gains. Enterprise value requires that individual gains compound through organizational processes &mdash; that the faster code gets deployed, the quicker summaries lead to better decisions, the faster drafts go to market. That compounding requires process changes, workflow redesign, and management systems that most organizations haven&rsquo;t built.</p>
   <p>Deloitte quantifies what&rsquo;s missing: only 34% of organizations are &ldquo;truly reimagining their businesses through AI.&rdquo; The other two-thirds are &ldquo;simply layering it onto existing processes and capturing only surface-level efficiency gains.&rdquo; The technology is there. The organizational transformation isn&rsquo;t.</p>
   <div class="callout"><strong>The uncomfortable implication:</strong> If most AI value comes from organizational transformation rather than technology capability, then the competitive advantage goes not to whoever has the best AI, but to whoever is best at organizational change. Companies with strong change management cultures, good data infrastructure, and empowered leadership will extract disproportionate value &mdash; regardless of which AI tools they use. This is exactly what <a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey&rsquo;s</a> high-performer data shows.</div>`,

  `<div class="detail-header"><div class="num">03</div><h2>The <em>Evaluation</em> Shift</h2></div>
   <p><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">Stanford HAI</a>&rsquo;s panel of AI experts identifies a tonal shift that pervades the entire discourse: the move from AI evangelism to AI evaluation. In 2023-2024, the dominant question was &ldquo;Can AI do X?&rdquo; and every demo answered emphatically yes. In 2026, the questions have matured: &ldquo;How well does AI do X in our specific context? At what total cost including integration, governance, and organizational change? For which users and use cases? With what failure modes and mitigation strategies?&rdquo;</p>
   <p><a href="https://sloanreview.mit.edu/article/five-genai-trends-to-watch-in-2025/" target="_blank">MIT Sloan</a>&rsquo;s <a href="https://sloanreview.mit.edu/" target="_blank">Davenport and Bean</a> articulate the consequence: the shift from individual to enterprise-level implementation has exposed a fundamental limitation of the &ldquo;AI copilot&rdquo; paradigm. Copilot-style tools &mdash; integrated into individual workflows via chat interfaces, code completions, and document assistants &mdash; deliver what they call &ldquo;incremental and mostly unmeasurable productivity gains.&rdquo; The gains are real at the individual level (people feel faster and more capable) but hard to measure at the enterprise level (did revenue go up? did costs go down? by how much, attributable specifically to AI?).</p>
   <p><a href="https://makebot.sh/key-llm-market-trends/" target="_blank">Makebot&rsquo;s</a> trend analysis confirms the domains where productivity gains <em>are</em> measurable: &ldquo;programming, call centers, and narrowly defined workflows.&rdquo; The common thread: these are domains where the output is countable (lines of code, tickets resolved, documents processed), the workflow is structured, and the before-and-after comparison is straightforward. Open-ended knowledge work &mdash; strategy, research, creative direction &mdash; resists measurement even when AI clearly helps.</p>
   <h3>What &ldquo;Evaluation Era&rdquo; Means in Practice</h3>
   <p>Stanford&rsquo;s experts predict several consequences of the evaluation shift. First: <strong>AI sovereignty</strong> will gain steam as organizations (and countries) demand control over the AI infrastructure they depend on. Second: <strong>neural net archaeology</strong> (interpretability and mechanistic understanding of what models actually do) will become a priority, because evaluation requires understanding, not just measurement. Third: efficiency will be assessed in <strong>real workflows, not controlled scenarios</strong> &mdash; the era of lab benchmarks defining value is ending.</p>
   <div class="callout"><strong>The pattern from <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>-<a href="s3-agents.dd.html" title="AI Agents">S3</a> repeats:</strong> narrow, measurable tasks succeed. Broad, ambiguous initiatives fail. The evaluation shift is the organizational recognition of this pattern &mdash; moving from &ldquo;let&rsquo;s try AI everywhere&rdquo; to &ldquo;let&rsquo;s measure AI where it works and cut where it doesn&rsquo;t.&rdquo;</div>`,

  `<div class="detail-header"><div class="num">04</div><h2>Where <em>Value</em> Materializes</h2></div>
   <p>Despite the gloomy enterprise numbers, AI delivers real, measurable value in specific domains. The pattern is consistent across sources: structured tasks, countable outputs, clear before-and-after metrics.</p>

   <h3>The Coding Story in Depth</h3>
   <p><a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic&rsquo;s</a> 2026 Agentic Coding Trends report provides the most detailed production data. 60% of developers use AI regularly, but only 0-20% fully delegate coding tasks to AI. The typical pattern: AI writes the first draft, human reviews and refines. PRs merged per day increased 67%. Case studies show dramatic time savings &mdash; Rakuten ran 7-hour autonomous coding sessions, TELUS saved 500,000 hours. But delegation remained thin: AI accelerates the human coder rather than replacing them. This is the &ldquo;augmentation, not automation&rdquo; pattern that shows up across every successful deployment.</p>
   <h3>The Junior-Senior Asymmetry</h3>
   <p><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte&rsquo;s</a> finding that GenAI boosts junior productivity 20-30% versus 10-15% for seniors is one of the most consequential findings in the entire survey. It means AI is a skill equalizer &mdash; it closes the performance gap between inexperienced and experienced workers by giving juniors access to pattern libraries, boilerplate generation, and error checking that seniors already carry in their heads. The implication for career development is profound and will be explored in <a href="s5-employment.dd.html" title="Employment &amp; Labor">S5</a>: if AI gives a first-year analyst the output quality of a third-year, what happens to the career ladder?</p>
   <div class="callout"><strong>The 0-20% delegation ceiling:</strong> Even in coding &mdash; AI&rsquo;s strongest domain &mdash; full delegation remains rare. This finding should calibrate expectations for every other domain. If the best use case still requires heavy human involvement, the &ldquo;autonomous AI agent replacing workers&rdquo; narrative is years away from reality in most contexts.</div>`,

  `<div class="detail-header"><div class="num">05</div><h2>Where <em>Value</em> Doesn&rsquo;t</h2></div>
   <p>The failures are as informative as the successes, because they reveal what AI cannot yet do rather than what it can.</p>
   <h3>The Revenue Growth Gap</h3>
   <p><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte&rsquo;s</a> data is stark: 20% of organizations report revenue growth from AI, while 74% are hoping for future revenue impact. That 54-percentage-point gap between hope and reality is the largest in any benefit category. Productivity is easier to achieve because it means &ldquo;doing the same things faster.&rdquo; Revenue growth requires &ldquo;doing new things&rdquo; or &ldquo;doing things differently&rdquo; &mdash; which demands the organizational transformation that 66% of organizations haven&rsquo;t undertaken.</p>
   <h3>The Scaling Wall</h3>
   <p><a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC&rsquo;s</a> finding that only 10% of organizations have scaled AI value enterprise-wide explains why the revenue numbers are low. Most AI deployments are team-level or department-level. They produce local efficiencies that don&rsquo;t compound into enterprise-level impact because the adjacent workflows haven&rsquo;t been redesigned to absorb the efficiency gains. A team that produces reports 3&times; faster still delivers them to a process that reviews them at the old pace.</p>
   <p><a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey</a> adds a critical qualifier: only 6-10% of firms with weak data pipelines realize consistent value at scale. Data infrastructure is the foundation &mdash; without clean, accessible, well-governed data, even excellent AI tools produce inconsistent results. The implication is circular and frustrating: the organizations that most need AI to improve their data operations are the ones whose poor data prevents AI from working effectively.</p>
   <div class="callout"><strong>The uncomfortable pattern:</strong> Organizations that most need AI transformation (poor data, rigid processes, weak digital infrastructure) are least equipped to benefit from it. AI amplifies organizational capability &mdash; it doesn&rsquo;t create it from scratch. This means AI may <em>widen</em> the gap between well-run and poorly-run organizations rather than closing it.</div>`,

  `<div class="detail-header"><div class="num">06</div><h2>The <em>Real</em> Barriers</h2></div>
   <p><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a> surveyed 3,235 senior leaders specifically about what stands in the way of AI adoption delivering value. The results challenge the assumption that the barriers are primarily technical or financial.</p>

     <text x="200" y="192" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl" style="font-size:7px">Note: "technology cost" and "model quality" are NOT top barriers</text>

   <h3>The Skills Gap</h3>
   <p>The #1 barrier &mdash; insufficient worker skills &mdash; is not about programming ability or data science expertise. It&rsquo;s about the ability to use AI tools effectively in the context of actual work. Can a marketing manager write prompts that produce useful first drafts? Can a financial analyst evaluate whether an AI-generated summary is accurate? Can a project manager design a workflow that incorporates AI at the right points? These are new skills that existing training programs don&rsquo;t cover, and most organizations haven&rsquo;t invested in developing them.</p>
   <h3>The Leadership Differentiator</h3>
   <p><a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey&rsquo;s</a> most actionable finding: AI high performers are <strong>3&times; more likely</strong> to have senior leadership that demonstrates ownership of and commitment to AI initiatives. Not delegates it. Not appoints a Chief AI Officer. Actively uses AI, role-models its adoption, and drives the organizational changes needed to extract value. The finding is consistent with decades of organizational change research: transformation requires visible, committed leadership from the top.</p>
   <p>The 42% confidence gap (Deloitte) is telling: 42% of leaders believe their <em>strategy</em> is highly prepared for AI, but they feel significantly less prepared on infrastructure, data, risk management, and talent. The confidence is in the PowerPoint. The gap is in the execution.</p>
   <div class="callout"><strong>What this means:</strong> For organizations struggling with AI adoption, the answer is probably not a better model, a bigger budget, or a new platform. It is training the workforce, fixing data infrastructure, and ensuring senior leadership visibly champions and uses AI. These are hard, slow, unsexy investments &mdash; which is exactly why most organizations underinvest in them.</div>`,

  `<div class="detail-header"><div class="num">07</div><h2>The <em>Free-Tool</em> Shadow</h2></div>
   <p>While enterprise AI programs struggle with governance and ROI, a parallel adoption story is unfolding outside official channels. <a href="https://itsm.tools/" target="_blank">ITSM.tools</a>&rsquo; 2026 survey finds that <strong>82%</strong> of end-users use free AI tools at work &mdash; up from 71% in 2025. Only 2% report no AI use at all. This is happening regardless of corporate AI strategy, governance frameworks, or IT approval.</p>
   <p>The tools are familiar: ChatGPT (free tier), Claude, Gemini, Copilot (bundled with Microsoft 365). Workers use them to draft emails, summarize documents, debug code, prepare for meetings, and answer questions. The usage is informal, ungoverned, and often invisible to IT.</p>
   <h3>The Trust Paradox</h3>
   <p>The same ITSM survey reveals a paradox: trust in AI <em>increased</em> for 62% of respondents over the past year. But only <strong>16%</strong> fully trust AI for autonomous operational decisions. People trust AI enough to use it every day for personal tasks but not enough to let it make decisions that matter. This is rational behavior &mdash; a tool that&rsquo;s helpful 80% of the time and wrong 20% of the time is great for drafting emails but terrible for approving transactions.</p>
   <p>The &ldquo;better decision-making&rdquo; finding is notable: it jumped from 28% to 47% as the top-cited AI benefit in one year. AI&rsquo;s most valued contribution isn&rsquo;t automating work &mdash; it&rsquo;s <em>informing</em> decisions. People use AI to think better, not to think less.</p>
   <h3>Shadow AI Governance</h3>
   <p>This connects directly to <a href="s3-agents.dd.html" title="AI Agents">S3</a>&rsquo;s &ldquo;shadow agents&rdquo; concern. Employees using free AI tools are potentially entering sensitive company data into systems outside IT governance. Customer names, financial figures, strategic plans, code snippets &mdash; all flowing into third-party AI services without data processing agreements, access controls, or audit trails. The risk isn&rsquo;t hypothetical: multiple data leak incidents involving AI chat tools have been documented.</p>
   <p><a href="https://www.microsoft.com/en-us/microsoft-365/blog/2026/01/15/7-ai-trends-for-2026/" target="_blank">Microsoft&rsquo;s</a> &ldquo;AI coworkers&rdquo; framing and the <a href="https://www.idc.com/getdoc.jsp?containerId=US51739024" target="_blank">IDC</a> prediction that 40% of G2000 job roles will involve working with AI agents by 2026 both point toward formalization of what&rsquo;s currently informal. The question is whether organizations can build governance around shadow AI before an incident forces them to.</p>
   <div class="callout"><strong>The organizational reality:</strong> Employees are already using AI. 82% of them. The choice for organizations is not whether to adopt AI &mdash; employees already have. The choice is whether to govern it (with approved tools, training, and policies) or to ignore it (and accept the risk). Most organizations are still in the latter phase.</div>`,

  `<div class="detail-header"><div class="num">08</div><h2>What <em>Everyone</em> Agrees On</h2></div>
   <p>Six points of convergence across ten sources &mdash; notable because these sources come from different methodological traditions (academic forecasting, enterprise surveys, domain-specific analysis, vendor reports) and still arrive at the same conclusions.</p>
   <p><strong>1. Adoption is near-universal and the question is settled.</strong> 78-88% of organizations use AI. The debate about <em>whether</em> to adopt is over. The debate about <em>how to extract value</em> is just beginning.</p>
   <p><strong>2. Enterprise value is rare and the gap is the story.</strong> Depending on how you measure: 10-39% report meaningful enterprise impact. Most organizations have deployed AI without changing their financial trajectory. This is the defining challenge of 2026-2027.</p>
   <p><strong>3. Coding is the strongest measurable use case.</strong> 67% more PRs merged per day. 50% faster development. These numbers show up consistently across <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic</a>, Microsoft, and domain surveys. Coding succeeds because it&rsquo;s structured, measurable, and has tight feedback loops.</p>
   <p><strong>4. Junior workers benefit most.</strong> 20-30% productivity boost for juniors vs 10-15% for seniors (<a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a>). AI is a skill equalizer. This has profound implications for workforce development, career ladders, and the distribution of economic gains from AI.</p>
   <p><strong>5. Skills, not technology, are the #1 barrier.</strong> <a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte&rsquo;s</a> 3,235-person survey puts it at the top. Not cost. Not model quality. Not infrastructure. The workforce doesn&rsquo;t know how to use the tools effectively.</p>
   <p><strong>6. Leadership commitment is the differentiator.</strong> <a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey</a>: high performers are 3&times; more likely to have senior leadership demonstrating ownership. Not delegating, not appointing, but actively using and championing. Cultural change, not technical capability, separates winners from the rest.</p>
   <div class="callout"><strong>The meta-finding:</strong> the technology-adoption question is answered. Everyone has AI. The organizational-transformation question is wide open. The 78% who have adopted minus the 12% who achieved full value = 66% of organizations in limbo, with AI deployed but not yet delivering on its promise. That 66% is where the next two years of enterprise AI strategy will be fought.</div>`,

  `<div class="detail-header"><div class="num">09</div><h2>Where Sources <em>Disagree</em></h2></div>
   <h3>How Much Value Is Real?</h3>
   <p>The spread is meaningful: McKinsey finds 39% reporting enterprise EBIT impact. <a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC</a> finds only 12% achieving both revenue growth and cost reduction. The difference likely reflects survey methodology (<a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey&rsquo;s</a> question is about <em>any</em> EBIT impact; PwC requires <em>both</em> revenue and cost improvement). But the gap also suggests we don&rsquo;t have consensus on what &ldquo;AI value&rdquo; means. A 5% productivity improvement in one department counts as &ldquo;EBIT impact&rdquo; in one survey but wouldn&rsquo;t register as &ldquo;revenue growth&rdquo; in another.</p>
   <h3>Tool vs Transformation</h3>
   <p>Microsoft frames AI as &ldquo;coworkers, not just tools&rdquo; and predicts three-person teams launching global campaigns with AI assistance. This is the transformation vision: AI fundamentally changes how work gets done, what teams look like, and what&rsquo;s possible.</p>
   <p><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a> counters that only 34% of organizations are truly reimagining their business through AI. The other two-thirds are &ldquo;simply layering it onto existing processes.&rdquo; Whether &ldquo;layering on&rdquo; is a failure or a sensible pragmatic first step depends entirely on your ambition and timeline. For many organizations, a 20% efficiency gain from bolted-on AI may be a perfectly rational outcome &mdash; but it&rsquo;s not the transformation that vendor marketing promises.</p>
   <h3>Timeline to Enterprise Value</h3>
   <p>Deloitte says 6-12 months minimum to scale from pilot to strong ROI. <a href="https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai" target="_blank">McKinsey&rsquo;s high-performer</a> data suggests faster is possible with the right leadership and infrastructure. But <a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC&rsquo;s</a> finding that 56% of CEOs have <em>no gains</em> after 2+ years of AI investment suggests that for many organizations, the timeline may be &ldquo;never&rdquo; under current approaches. The resolution likely depends on whether organizations invest in the unglamorous foundations (data infrastructure, workforce training, process redesign) or continue to chase new AI features on a broken base.</p>
   <div class="callout"><strong>What would resolve these disagreements:</strong> A standardized, third-party measure of enterprise AI value &mdash; similar to how NPS standardized customer satisfaction or how DORA metrics standardized software delivery performance. Until we agree on <em>how to measure</em> AI value, we can&rsquo;t agree on <em>how much</em> value there is. This may be the most important methodological gap in the entire AI discourse.</div>`
];


const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">W<em>k</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> GENAI 2026 · S4 · 10 SOURCES</div>
        <div class="hero-title">Workplace Adoption &amp; <em>Productivity</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>The gap between universal deployment and enterprise-level value</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});



</script>
</body>
</html>
