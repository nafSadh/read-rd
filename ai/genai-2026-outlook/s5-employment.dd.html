<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S5: Employment & Labor — GenAI 2026 Outlook</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

const summaries = [
  `<p>Thirty-three months after ChatGPT launched, <a href="https://budgetlab.yale.edu/" target="_blank">Yale&rsquo;s Budget Lab</a> finds &ldquo;no discernible disruption&rdquo; to the broader US labor market. But the headline obscures a more complex reality: young tech workers are already feeling it (unemployment <strong>+3 percentage points</strong>), the career ladder is breaking in ways that won&rsquo;t show up in aggregate statistics for years, and <strong>6.1 million</strong> clerical workers have low adaptive capacity.</p>
   <p>The employment story is not &ldquo;AI is replacing workers.&rdquo; It is &ldquo;AI is reshaping <em>which</em> work is valuable, <em>who</em> does it, and <em>how</em> people build careers&rdquo; &mdash; and the effects are distributed extremely unevenly.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">33 mo</div><div class="sl">since ChatGPT, no broad disruption</div></div>
     <div class="st"><div class="sv">+3pp</div><div class="sl">young tech unemployment</div></div>
     <div class="st"><div class="sv">6.1M</div><div class="sl">low-capacity clerical workers</div></div>
     <div class="st"><div class="sv">92M</div><div class="sl">jobs displaced by 2030 (<a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">WEF</a>)</div></div>
   </div>`,

  `<p><a href="https://budgetlab.yale.edu/" target="_blank">Yale Budget Lab</a><sup class="fn"><a href="https://budgetlab.yale.edu/" target="_blank">[1]</a><span class="tip">Yale Budget Lab &mdash; no discernible labor market disruption 33 months post-ChatGPT.</span></sup>, the most rigorous labor-market study in our sources: &ldquo;No discernible disruption&rdquo; to the broader US labor market 33 months after ChatGPT. No clear growth in AI exposure among the unemployed. The <a href="https://www.bls.gov/emp/" target="_blank">BLS</a> treats AI like any other technology and notes that displacement &ldquo;tends to take longer than technologists expect.&rdquo;</p>
   <p>Historical precedent supports this: the PC revolution took over a decade to measurably restructure work. The internet didn&rsquo;t kill retail &mdash; it took 20 years for e-commerce to reach 15% of retail sales. Technologies transform labor markets in slow waves, not sudden shocks.</p>
   <p>But the <a href="https://www.bls.gov/emp/" target="_blank">BLS</a> adds a caveat that should give everyone pause: their methods are &ldquo;<strong>not designed to capture extremely rapid technological change.</strong>&rdquo; If this time really is different, the standard measurements won&rsquo;t catch it until well after the fact.</p>`,

  `<p><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a><sup class="fn"><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">[2]</a><span class="tip">Goldman Sachs &mdash; young tech workers (20-30) saw unemployment rise ~3pp.</span></sup>&rsquo;s research reveals what the aggregate numbers miss: <strong>20-30 year olds in tech-exposed occupations</strong> saw unemployment rise ~3 percentage points since the start of 2025, while the broader labor market held steady. The pain is concentrated, not distributed.</p>
   <p>Only 9.3% of companies report using GenAI for tasks that directly affect employment levels. But VC predictions for 2026 are more aggressive: &ldquo;budget shifts from labor to AI.&rdquo; One investor predicts &ldquo;AI will become the <strong>scapegoat for executives</strong> looking to cover past mistakes&rdquo; &mdash; layoffs blamed on AI that are actually about cost-cutting.</p>
   <p>Goldman estimates: 2.5% of US employment at risk with current AI use cases. 6-7% at risk with wide adoption. Unemployment could rise <strong>+0.5 percentage points</strong> during transition &mdash; historically, temporary (~2 years).</p>`,

  `<p>The <a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">Dallas Fed&rsquo;s</a><sup class="fn"><a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">[3]</a><span class="tip">Dallas Fed &mdash; AI breaks the career ladder; codified vs tacit knowledge.</span></sup> analysis may be the single most consequential finding in this section. AI doesn&rsquo;t affect all knowledge equally. <strong>Codified knowledge</strong> (textbook learning, procedures, lookup tasks) is automatable. <strong>Tacit knowledge</strong> (judgment, pattern recognition from experience, relationship navigation) is complemented by AI.</p>
   <p>This means entry-level workers &mdash; whose value comes primarily from codified knowledge &mdash; get <em>substituted.</em> Experienced workers &mdash; whose value comes from tacit knowledge &mdash; get <em>augmented.</em> Wages are actually <strong>rising</strong> in AI-exposed occupations with high experience premiums.</p>
   <p>The paradox: if AI does what juniors used to do, how do juniors <em>develop</em> the experience that makes seniors valuable? The career ladder breaks at the first rung.</p>`,

  `<p><a href="https://www.brookings.edu/articles/which-workers-which-places-artificial-intelligence-in-the-us-labor-market/" target="_blank">Brookings</a><sup class="fn"><a href="https://www.brookings.edu/articles/which-workers-which-places-artificial-intelligence-in-the-us-labor-market/" target="_blank">[4]</a><span class="tip">Brookings &mdash; 37.1M AI-exposed workers; 6.1M clerical workers most vulnerable.</span></sup> maps who is actually at risk. <strong>37.1 million</strong> US workers are highly AI-exposed. But exposure is not vulnerability. 70% (26.5M) have high adaptive capacity: high pay, financial buffers, diverse skills. They&rsquo;ll adapt &mdash; maybe uncomfortably, but they have options.</p>
   <p>The truly vulnerable: <strong>6.1 million</strong> clerical and administrative workers with LOW adaptive capacity. Office clerks (2.5M), secretaries (1.7M), receptionists (965K). Low pay, limited savings, narrow skills.</p>
   <p>The gender dimension: <strong>79%</strong> of employed women hold jobs at high automation risk, versus 58% of men. AI labor displacement is not gender-neutral.</p>`,

  `<p><a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">WEF&rsquo;s</a><sup class="fn"><a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">[5]</a><span class="tip">World Economic Forum &mdash; Future of Jobs Report 2025: 92M displaced, 170M created.</span></sup> global forecast: <strong>85-92M jobs displaced</strong> by 2030, but <strong>97-170M new roles created</strong> (net positive). 59% of workers need reskilling by 2030. 41% of employers foresee reductions.</p>
   <p>The critical caveat: &ldquo;displaced&rdquo; and &ldquo;created&rdquo; don&rsquo;t happen to the same people, in the same places, at the same time. A displaced secretary in Ohio is not going to become a prompt engineer in San Francisco. The <em>net</em> may be positive. The <em>distribution</em> will be brutal.</p>
   <p>Generational divide: workers 18-24 are <strong>129% more likely</strong> to worry about AI job loss. 49% of Gen Z believe AI reduced the value of a college degree.</p>`,

  `<p>Five convergence points across eight sources:</p>
   <p><strong>1.</strong> No broad disruption yet &mdash; but early signals in specific demographics. <strong>2.</strong> The career ladder is the most consequential structural risk (<a href="https://www.dallasfed.org/research/economics/2026/0213" target="_blank">Dallas Fed</a>). <strong>3.</strong> Exposure &ne; vulnerability &mdash; adaptive capacity matters more (<a href="https://www.brookings.edu/" target="_blank">Brookings</a>). <strong>4.</strong> Clerical workers (especially women) are most at risk. <strong>5.</strong> Historical precedent: effects take years, not months.</p>
   <p>The meta-finding: AI&rsquo;s labor impact is <strong>not</strong> a single story of &ldquo;robots taking jobs.&rdquo; It&rsquo;s a complex redistribution where some workers gain, some lose, and the career development pipeline that produces tomorrow&rsquo;s experts is at risk.</p>`,

  `<p><strong>Timeline:</strong> Yale (no disruption, may take a decade) vs VCs (budget shifts in 2026) vs Goldman (2-year cycles). <strong>Scale:</strong> BLS (incremental) vs WEF (92M displaced). <strong>Net effect:</strong> WEF (net positive, 170M &gt; 92M) vs Dallas Fed (career ladder damage may be more consequential than job counts).</p>
   <p>The deepest disagreement: does &ldquo;no disruption yet&rdquo; mean &ldquo;AI won&rsquo;t disrupt labor&rdquo; or &ldquo;the disruption is building beneath a calm surface&rdquo;? <a href="https://budgetlab.yale.edu/research/impact-ai-us-labor-market" target="_blank">Yale&rsquo;s</a> historical analogy (computers took a decade) suggests patience. <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman&rsquo;s</a> young-tech-worker data suggests the undertow is already pulling.</p>
   <p>What to watch: junior hiring rates in AI-exposed occupations over the next 12 months. If the career ladder is truly breaking, the leading indicator is a decline in entry-level hiring &mdash; not a rise in overall unemployment.</p>`

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>Employment</em> &amp; Labor</h2></div>
   <h3>Why This Section Requires Nuance</h3>
   <p>The employment question is where the GenAI discourse is most polarized and least useful. One camp says &ldquo;AI will destroy millions of jobs.&rdquo; The other says &ldquo;every technology creates more jobs than it destroys.&rdquo; Both are citing real evidence. Neither is telling the full story.</p>
   <p>What eight sources &mdash; spanning a Federal Reserve bank, the <a href="https://www.brookings.edu/" target="_blank">Brookings Institution</a>, <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026" target="_blank">Goldman Sachs</a>, <a href="https://budgetlab.yale.edu/" target="_blank">Yale&rsquo;s Budget Lab</a>, the <a href="https://www.bls.gov/emp/" target="_blank">BLS</a>, the <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">WEF</a>, investor analysis, and demographic research &mdash; reveal is a far more textured picture. The aggregate labor market is fine. But specific demographics are already hurting. The structural damage to career development pipelines may be more consequential than any job count. And the effects are distributed extremely unevenly by age, gender, skill type, and geography.</p>

   <div class="callout"><strong>How to read this section:</strong> Start with the calm surface (Yale), then look at what&rsquo;s moving underneath (Goldman), then examine the structural damage that won&rsquo;t show up in aggregate statistics for years (Dallas Fed), then ask who specifically is at risk (Brookings). Each layer tells a piece of the story that the others miss.</div>`,

  `<div class="detail-header"><div class="num">02</div><h2><em>No</em> Disruption &mdash; Yet</h2></div>
   <p><a href="https://budgetlab.yale.edu/research/impact-ai-us-labor-market" target="_blank">Yale Budget Lab</a> conducted the most methodologically rigorous analysis of AI&rsquo;s labor market impact to date. Their finding: 33 months after the launch of ChatGPT, there is &ldquo;no discernible disruption&rdquo; to the broader US labor market. No clear growth in AI exposure among the unemployed compared to the employed. The unemployment rate for AI-exposed occupations has not diverged meaningfully from non-exposed occupations.</p>
   <p>This is not a contrarian claim &mdash; it&rsquo;s what the data shows. And it aligns with historical precedent that Yale explicitly invokes: the personal computer was introduced in the early 1980s, but measurable labor market restructuring didn&rsquo;t begin until the mid-1990s. The internet became publicly available in 1993, but didn&rsquo;t measurably affect retail employment until the 2010s. Technologies transform labor markets in waves that take a decade or more to materialize in aggregate statistics.</p>
   <h3>The <a href="https://www.bls.gov/emp/" target="_blank">BLS</a> Methodology Caveat</h3>
   <p>The <a href="https://www.bls.gov/emp/" target="_blank">Bureau of Labor Statistics</a> treats AI the same way it treats any technology in its employment projections. This is methodologically conservative by design: projections assume technologies affect occupations incrementally, based on historical precedent. BLS explicitly notes that many AI-affected occupations continue to see employment growth even as automation advances, because new tasks emerge alongside automated ones.</p>
   <p>But BLS includes an unusual caveat: their methods are &ldquo;not designed to capture extremely rapid technological change.&rdquo; If AI&rsquo;s pace of improvement is genuinely unprecedented &mdash; and the benchmark data from <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> suggests it might be &mdash; then the standard measurement framework may be too slow to catch the disruption until it&rsquo;s well underway. The instruments are calibrated for previous technology cycles, not necessarily for this one.</p>
   <h3>What &ldquo;No Disruption Yet&rdquo; Does and Doesn&rsquo;t Mean</h3>
   <p>It means: the doomsday predictions from 2023 (&ldquo;AI will eliminate millions of jobs within two years&rdquo;) were wrong. The labor market is robust. Most workers in AI-exposed occupations still have jobs. But it does <em>not</em> mean disruption won&rsquo;t come. The absence of evidence at 33 months is consistent with both &ldquo;AI won&rsquo;t significantly disrupt labor&rdquo; <em>and</em> &ldquo;AI will disrupt labor but hasn&rsquo;t reached the tipping point yet.&rdquo; <a href="https://budgetlab.yale.edu/research/impact-ai-us-labor-market" target="_blank">Yale&rsquo;s historical</a> analogy argues for the latter interpretation.</p>
   <div class="callout"><strong>The measurement problem:</strong> Labor markets are measured quarterly and annually. AI capabilities are improving monthly. The resolution of our measurement instruments is lower than the resolution of the change we&rsquo;re trying to detect. If the <a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">Dallas Fed</a> is right about career ladder damage, we may not see it in employment statistics until entry-level hiring rates decline &mdash; a lagging indicator that could take 2-3 years to materialize after the structural change begins.</div>`,

  `<div class="detail-header"><div class="num">03</div><h2>The <em>Undertow</em></h2></div>
   <p><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a>&rsquo;s research (<a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Briggs and Dong</a>, August 2025) identifies what aggregate statistics conceal: a specific demographic is already hurting. Workers aged 20-30 in tech-exposed occupations &mdash; software engineers, data analysts, technical writers, QA testers &mdash; have seen unemployment rise approximately 3 percentage points since the start of 2025. This is happening while the broader labor market remains near historic lows.</p>
   <p>The 3 percentage point increase is significant. For context: during the Great Recession, overall US unemployment rose about 5 percentage points. A 3pp increase in a specific demographic, during an otherwise strong labor market, indicates a targeted effect &mdash; not a cyclical downturn. Goldman attributes this to companies using AI to handle entry-level tech tasks that previously required junior hires: code review, documentation, basic feature implementation, testing, data cleaning.</p>

   <h3>The Scapegoat Thesis</h3>
   <p><a href="https://techcrunch.com/2025/12/28/investors-predict-ai-coming-for-labor-in-2026/" target="_blank">TechCrunch&rsquo;s</a> investor roundup adds a cynical but important caveat: &ldquo;AI will become the scapegoat for executives looking to cover past mistakes.&rdquo; Some layoffs attributed to AI are actually about over-hiring during 2021-2022, poor business decisions, or cost-cutting that would have happened regardless. The AI narrative provides cover for organizational restructuring that has non-AI causes. This doesn&rsquo;t mean AI isn&rsquo;t causing real displacement &mdash; <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman&rsquo;s</a> data is specific to AI-exposed occupations &mdash; but it means headline &ldquo;AI layoff&rdquo; numbers likely overcount the technology&rsquo;s actual impact.</p>
   <h3>The 9.3% Puzzle</h3>
   <p>Goldman&rsquo;s finding that only 9.3% of companies report using GenAI for tasks that directly affect employment is striking. If true, it means the current unemployment effects in young tech workers are coming from <em>less than 10%</em> of companies adopting AI for employment-relevant tasks. The implication: if adoption broadens to 50-80% (which <a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>&rsquo;s data suggests is the trajectory for overall AI use), the employment effects could multiply substantially &mdash; unless new jobs and tasks emerge to absorb displaced workers. Goldman&rsquo;s historical analysis suggests this rebalancing typically happens within ~2 years per disruption wave.</p>
   <div class="callout"><strong>The generational data:</strong> Workers 18-24 are 129% more likely than older workers to worry about AI job loss. 49% of Gen Z believe AI has reduced the value of a college education. 14% of workers report they&rsquo;ve <em>already been displaced</em> by AI. These perceptions matter regardless of whether aggregate statistics confirm them &mdash; they affect career choices, education investment, and political attitudes toward AI regulation.</div>`,

  `<div class="detail-header"><div class="num">04</div><h2>The <em>Career</em> Ladder Problem</h2></div>
   <p>The <a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">Dallas Fed&rsquo;s</a> February 2026 Economic Letter contains what may be the most consequential analytical insight in the entire employment debate. Their framework distinguishes between two types of professional knowledge: <strong>codified knowledge</strong> (things you learn from books, procedures, lookup tables &mdash; the kind of knowledge that can be written down) and <strong>tacit knowledge</strong> (judgment, pattern recognition, relationship navigation, contextual understanding &mdash; the kind of knowledge that can only be developed through experience).</p>
   <p>AI&rsquo;s effect on these two knowledge types is asymmetric. Codified knowledge is highly automatable: AI can look up procedures, apply rules, and process structured information faster and more accurately than humans. Tacit knowledge is complemented by AI: experienced professionals use AI to enhance their judgment, accelerate their analysis, and extend their reach, while AI cannot replicate the judgment itself.</p>

   <h3>The Paradox in Detail</h3>
   <p>The career ladder traditionally works like this: a worker enters a profession performing structured, codified tasks (data entry, basic analysis, routine coding, document preparation). Over years, the worker develops tacit knowledge &mdash; intuition about which analyses matter, judgment about edge cases, relationships with key stakeholders, understanding of organizational context. Seniority comes from knowing things that can&rsquo;t be written down.</p>
   <p>AI disrupts this pipeline. If AI handles the codified tasks that juniors used to perform, there are two consequences. First, fewer juniors are hired (why pay a human for work AI does faster and cheaper?). Second, the juniors who <em>are</em> hired don&rsquo;t develop tacit knowledge at the same rate, because they&rsquo;re no longer doing the grunt work that builds expertise. Entry-level development becomes, in the <a href="https://www.dallasfed.org/research/economics/2026/0213" target="_blank">Dallas Fed&rsquo;s</a> phrase, &ldquo;cost-ineffective&rdquo; for employers.</p>
   <p>The wage data confirms the asymmetry: wages are <em>rising</em> in AI-exposed occupations with high experience premiums. Employers value tacit knowledge more than ever, precisely because AI makes codified knowledge cheap. But the pipeline that produces workers with tacit knowledge is being undermined.</p>
   <h3>Connection to <a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a></h3>
   <p>This connects directly to <a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte&rsquo;s</a> finding (<a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>) that GenAI boosts junior productivity 20-30% versus 10-15% for seniors. At the individual level, this looks like AI helping juniors. At the structural level, it&rsquo;s AI doing the work that juniors used to learn from. The same data point means opposite things depending on whether you&rsquo;re looking at today&rsquo;s productivity or tomorrow&rsquo;s career development.</p>
   <div class="callout"><strong>The long-term risk:</strong> If this pattern holds for a decade, we face a future where experienced professionals are extremely valuable (and highly paid, augmented by AI) but the pipeline producing new experienced professionals has broken. This is a structural problem that won&rsquo;t show up in employment statistics for years but could create a severe talent crisis in the 2030s. Organizations that invest in <em>developing</em> junior talent (not just hiring it) may have a durable competitive advantage.</div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Who</em>&rsquo;s Actually Vulnerable</h2></div>
   <p><a href="https://www.brookings.edu/articles/how-many-workers-are-exposed-to-ai-and-which-are-most-adaptable/" target="_blank">Brookings Institution</a> provides the most granular map of AI vulnerability in the US workforce. Their framework distinguishes between <strong>exposure</strong> (how much of your job involves tasks AI can do) and <strong>adaptive capacity</strong> (how well positioned you are to adapt if your job changes). The key insight: exposure is necessary but not sufficient for vulnerability. What matters is the combination.</p>

   <h3>Adaptive Capacity: The Overlooked Variable</h3>
   <p>The <a href="https://www.brookings.edu/" target="_blank">Brookings</a> framework is more useful than raw exposure counts because it predicts <em>who will manage the transition</em> and <em>who will be left behind</em>. High-adaptive-capacity workers &mdash; software engineers, financial analysts, marketing professionals &mdash; are highly exposed to AI. But they also have high salaries (financial buffer for retraining), diverse skill sets (can shift to adjacent roles), and strong professional networks (can find new opportunities). Their jobs will change, but they will adapt.</p>
   <p>Low-adaptive-capacity workers &mdash; office clerks, secretaries, receptionists, data entry operators &mdash; face a different calculus. Their jobs are highly routinized (automatable), their pay is low (no financial buffer), their skills are narrow (hard to pivot), and their professional networks are thin. When AI handles the filing, scheduling, and data entry that constitutes their job, they have limited options.</p>
   <h3>The Gender Dimension</h3>
   <p>The gender asymmetry is stark and underexamined in the AI discourse: 79% of employed women hold jobs at high automation risk, versus 58% of men. This isn&rsquo;t because women&rsquo;s work is intrinsically more automatable &mdash; it&rsquo;s because women are disproportionately concentrated in administrative, clerical, and service roles that happen to be highly structured and repetitive. The AI labor displacement story is, in significant part, a gender equity story.</p>
   <div class="callout"><strong>Policy implication:</strong> The 6.1 million low-adaptive-capacity workers won&rsquo;t benefit from generic &ldquo;learn to code&rdquo; reskilling programs. They need targeted support: income bridges during transition, community college programs aligned with local employer needs, and recognition that some workers &mdash; particularly older workers with narrow skill sets &mdash; may need social safety net support rather than retraining. The <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">WEF&rsquo;s</a> &ldquo;59% need reskilling by 2030&rdquo; figure is meaningless without addressing who provides, pays for, and designs the reskilling.</div>`,

  `<div class="detail-header"><div class="num">06</div><h2>The <em>Global</em> Picture</h2></div>
   <p>The <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">World Economic Forum</a> provides the most-cited global forecast: 85-92 million jobs displaced by AI and automation by 2030, but 97-170 million new roles created &mdash; a net positive of roughly 78 million jobs. 59% of the global workforce will need reskilling. 41% of employers foresee workforce reductions in areas where AI handles tasks.</p>
   <h3>Why the <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">WEF</a> Numbers Require Careful Reading</h3>
   <p>The WEF forecast is commonly presented as reassuring: more jobs created than destroyed, net positive. But this framing obscures critical distributional questions. &ldquo;92 million displaced&rdquo; and &ldquo;170 million created&rdquo; don&rsquo;t happen to the <em>same people</em>, in the <em>same places</em>, at the <em>same time</em>, requiring the <em>same skills</em>. A displaced secretary in Ohio is not going to become a prompt engineer in San Francisco. A laid-off factory worker in Indonesia is not going to retrain as a machine learning engineer in London.</p>
   <p>The <em>net</em> may be positive globally. The <em>distribution</em> will be brutal locally. And the transition period &mdash; the years between losing an old job and finding a new one &mdash; represents real human suffering that aggregate numbers erase.</p>
   <h3>The Generational Divide</h3>
   <p>Workers 18-24 are 129% more likely than older workers to worry about AI job loss. 49% of Gen Z believe AI has reduced the value of a college education. 40% of employers expect to reduce their workforce due to AI. 14% of workers say they have already been personally displaced.</p>
   <p>The generational anxiety is rational, even if the aggregate statistics haven&rsquo;t confirmed it yet. Young workers are entering a labor market where: their codified knowledge (the main thing they have) is being commoditized by AI, the career ladder that would develop their tacit knowledge is eroding, and the most AI-exposed entry-level roles are exactly the ones they&rsquo;d typically fill. The <a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">Dallas Fed</a> career ladder analysis and <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman&rsquo;s</a> young-tech-worker data both validate these concerns.</p>
   <div class="callout"><strong>The connection to <a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>&rsquo;s junior-worker paradox:</strong> AI boosts junior productivity 20-30% (<a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>). AI substitutes entry-level codified work (Dallas Fed). Young tech workers see unemployment rise 3pp (Goldman). These aren&rsquo;t contradictions &mdash; they&rsquo;re three facets of the same phenomenon. AI makes individual juniors more productive while making the <em>category</em> of junior work less necessary. The surviving juniors do well. The ones who don&rsquo;t get hired never enter the data.</div>`,

  `<div class="detail-header"><div class="num">07</div><h2>What <em>Everyone</em> Agrees On</h2></div>
   <p>Five convergence points emerge despite the wide methodological differences between these sources (a Federal Reserve economic letter, a think tank labor analysis, an investment bank research report, an international organization forecast, and a university survey).</p>
   <p><strong>1. No broad labor market disruption &mdash; yet.</strong> <a href="https://budgetlab.yale.edu/research/impact-ai-us-labor-market" target="_blank">Yale&rsquo;s 33-month</a> finding is robust. The aggregate labor market is healthy. Unemployment in AI-exposed occupations has not diverged meaningfully from non-exposed. But this is consistent with disruption that hasn&rsquo;t reached its tipping point, not with disruption that won&rsquo;t come.</p>
   <p><strong>2. The career ladder is the most consequential structural risk.</strong> The <a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">Dallas Fed&rsquo;s</a> codified/tacit knowledge framework identifies a damage mechanism that operates below the surface of employment statistics. If juniors aren&rsquo;t hired, or aren&rsquo;t developed, the effects won&rsquo;t show up for years &mdash; but when they do, they&rsquo;ll be severe.</p>
   <p><strong>3. Exposure ≠ vulnerability.</strong> <a href="https://www.brookings.edu/" target="_blank">Brookings&rsquo;s</a> adaptive capacity framework is the most useful analytical tool in this section. 37 million workers are exposed; 6 million are truly vulnerable. Policy that treats all exposed workers as victims, or all exposed workers as adaptable, misses the point.</p>
   <p><strong>4. Clerical workers (especially women) are most at risk.</strong> 6.1 million workers with low adaptive capacity, 79% of employed women in high-risk jobs. The gender dimension is underexamined.</p>
   <p><strong>5. Historical precedent: effects take years, not months.</strong> PCs took a decade. The internet took two decades to measurably affect retail. Every source that examines historical analogies (Yale, <a href="https://www.bls.gov/emp/" target="_blank">BLS</a>, <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman</a>) arrives at the same conclusion: patience. But BLS&rsquo;s caveat (&ldquo;not designed for extremely rapid change&rdquo;) adds uncertainty.</p>
   <div class="callout"><strong>The meta-finding:</strong> AI&rsquo;s employment impact is not &ldquo;robots taking jobs.&rdquo; It&rsquo;s a redistribution where: experienced workers gain (augmented), junior workers face headwinds (substituted), low-skill administrative workers are most vulnerable, and the career development pipeline is being quietly undermined. The aggregate numbers may stay positive. The distributional consequences will define the political and social response to AI for a generation.</div>`,

  `<div class="detail-header"><div class="num">08</div><h2>Where Sources <em>Disagree</em></h2></div>
   <h3>Timeline of Disruption</h3>
   <p><a href="https://budgetlab.yale.edu/research/impact-ai-us-labor-market" target="_blank">Yale</a> (backed by <a href="https://www.bls.gov/emp/" target="_blank">BLS</a> methodology): disruption follows historical patterns &mdash; a decade or more from introduction to measurable labor market restructuring. Goldman: effects are already visible in specific demographics, historically temporary (~2 years per wave). VC predictions (<a href="https://techcrunch.com/2025/12/28/investors-predict-ai-coming-for-labor-in-2026/" target="_blank">TechCrunch</a>): 2026 will see budget shifts from labor to AI. The <a href="https://ai-2027.com/" target="_blank">AI 2027</a> scenario (from <a href="s3-agents.dd.html" title="AI Agents">S3</a>): full SWE job automation within 18 months.</p>
   <p>The disagreement is partially about <em>which</em> disruption. Yale measures aggregate employment statistics (slow-moving). Goldman measures demographic-specific effects (faster). VCs predict corporate budget decisions (fastest). They&rsquo;re measuring different things on different timescales and can all be right simultaneously.</p>
   <h3>Scale of Impact</h3>
   <p>BLS (incremental effects, consistent with historical technology transitions) vs <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank">WEF</a> (92 million displaced by 2030). The gap reflects fundamentally different methodologies: BLS extrapolates from historical precedent with conservative assumptions. WEF aggregates expert forecasts and employer surveys, which tend toward dramatic numbers. <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman&rsquo;s</a> 2.5-7% of US employment at risk sits between these extremes.</p>
   <h3>Net Positive or Net Negative?</h3>
   <p>WEF says net positive: 170M created &gt; 92M displaced. But the <a href="https://www.dallasfed.org/research/economics/2026/0211" target="_blank">Dallas Fed&rsquo;s</a> career ladder analysis suggests that counting jobs misses the point. The <em>number</em> of jobs may stay stable or grow, but the <em>quality</em> of career development and the <em>pathway</em> from junior to senior may deteriorate. A world with the same number of jobs but a broken career ladder is not a positive outcome even if the job count is net positive.</p>
   <h3>What Would Resolve It</h3>
   <p>The single most informative data point to watch: <strong>entry-level hiring rates in AI-exposed occupations</strong> over the next 12 months. If the career ladder is truly breaking, the leading indicator is a decline in entry-level hiring &mdash; not a rise in overall unemployment. Companies that hire fewer juniors today produce fewer seniors in 5-10 years. If this decline is visible by end of 2026, the Dallas Fed&rsquo;s thesis is confirmed and the long-term consequences are serious. If entry-level hiring remains stable, the disruption is slower than feared.</p>
   <div class="callout"><strong>The honest assessment:</strong> We are in the early innings of a labor market transition whose final shape is genuinely uncertain. The &ldquo;no disruption yet&rdquo; camp and the &ldquo;disruption is coming&rdquo; camp are both citing valid evidence for positions that are not yet distinguishable by the available data. The resolution will come from time, not from argument. What we can say now: targeted effects on young tech workers are real, the career ladder risk is the most underexamined structural concern, and the 6.1 million low-adaptive-capacity workers deserve policy attention regardless of which timeline proves right.</div>`
];


const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">E<em>m</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> GENAI 2026 · S5 · 8 SOURCES</div>
        <div class="hero-title">Employment &amp; <em>Labor</em> Market</div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>No broad disruption yet — but the career ladder is breaking</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});



</script>
</body>
</html>
