<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S2: Multimodal & Diffusion Models — GenAI 2026 Outlook</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

  `<div class="detail-header"><div class="num">02</div><h2><em>Video</em> Generation</h2></div>
   <p>The AI video generation landscape underwent more change in the first six weeks of 2026 than in all of Q3-Q4 2025 combined. Three structural shifts define the moment: native audio became table stakes, resolution and duration ceilings lifted, and the routing paradigm replaced the &ldquo;best model&rdquo; question.</p>
   <h3>The Six Major Models</h3>
   <p>Six months ago, most AI video models produced silent output. By February 2026, four of six major models &mdash; <strong>Kling 3.0</strong>, <strong>Sora 2</strong>, <strong>Veo 3.1</strong>, and <strong>Seedance 1.5 Pro</strong> &mdash; generate synchronized dialogue, ambient sound, and sound effects natively. This single shift eliminated the most time-consuming part of professional AI video workflows: audio post-production.</p>
   <p><strong>Kling 3.0</strong> (Kuaishou, February 2026) generates natively at 4K/60fps &mdash; not upscaled 1080p but pixel-level diffusion. It produces multi-shot storyboards with up to six camera cuts per generation, with automatic visual consistency across cuts. Multilingual dialogue in English, Chinese, Japanese, Korean, and Spanish. This is the model doing what professionals actually need: production-grade output at broadcast resolution.</p>
   <p><strong>Veo 3.1</strong> (Google DeepMind, January 2026) achieved the highest photorealism scores and physics understanding in independent evaluations. It handles complex physical interactions &mdash; fluid dynamics, soft-body deformation, realistic lighting &mdash; better than any competitor. Integrated with Google&rsquo;s ecosystem, it benefits from YouTube distribution and partnership infrastructure.</p>

   <h3>The Routing Paradigm</h3>
   <p>The most significant workflow shift: professional creators now route specific shots to specific models rather than choosing one. Veo 3.1 for photorealism. Sora 2 (when it was available) for narrative coherence and character performance. Kling 3.0 for production versatility and 4K delivery. Runway Gen-4 Turbo for stylized and VFX work. Seedance for multi-modal input flexibility. The question &ldquo;which model is best?&rdquo; has become as meaningless as asking &ldquo;which camera is best?&rdquo; &mdash; it depends entirely on the shot.</p>
   <h3>The Global South Surprise</h3>
   <p>Vivideo&rsquo;s platform data (120,000+ orders across 220 countries in 3 months) reveals a pattern that challenges Western-centric assumptions: Vietnamese, Arabic, Turkish, and Russian prompts collectively outpace non-English Western languages. The Global South is not just adopting AI video &mdash; it&rsquo;s leading adoption. Vertical video (9:16) reached 43.7% of all generations and is expected to surpass landscape by mid-2026, driven by TikTok/Reels-native audiences.</p>
   <div class="callout"><strong>The consolidation signal:</strong> Veo 3.1&rsquo;s 96.4% market share on Vivideo looks like winner-take-most. But Vivideo measures consumer/prosumer use. The professional routing model suggests enterprise use will remain multi-model. The consumer and professional markets may diverge: one dominant model for casual creation, 3-5 specialized models for production work.</div>`,

  `<div class="detail-header"><div class="num">03</div><h2>The <em>Sora</em> Shutdown</h2></div>
   <p>On March 24, 2026 &mdash; the day this section was written &mdash; OpenAI announced it is shutting down Sora entirely. The standalone app, API, and Disney&rsquo;s $1 billion investment deal are all being unwound. This was the most high-profile AI video product in the world: the February 2024 preview rattled Hollywood, Sora 2 launched September 2025 with 1 million downloads in five days, and the December 2025 Disney deal licensed 200+ characters across Disney, Marvel, Pixar, and Star Wars.</p>
   <h3>The Timeline</h3>
   <p><strong>February 2024:</strong> OpenAI previews Sora, generating global attention and alarm in creative industries. <strong>September 2025:</strong> Sora 2 launches with native audio, 1M downloads in 5 days, becoming OpenAI&rsquo;s fastest product adoption ever. <strong>November 2025:</strong> Studio Ghibli&rsquo;s parent company CODA sends a formal demand letter over Sora 2&rsquo;s opt-out copyright model. <strong>December 2025:</strong> Disney signs $1B deal licensing 200+ characters. <strong>March 24, 2026:</strong> Sora shut down entirely.</p>
   <h3>Why It Happened</h3>
   <p>Four factors converged. First, <strong>pre-IPO cost-cutting:</strong> video generation is the most compute-intensive AI workload, and OpenAI is consolidating into a single unified platform ahead of its anticipated IPO. The resource-intensive video business competed directly with the core text/code products that drive most revenue. Second, <strong>competitive pressure:</strong> Veo 3.1 captured 96.4% of consumer market share. Sora&rsquo;s 2.0% share made it a money-losing also-ran rather than a market leader. Third, <strong>copyright liability:</strong> Sora 2&rsquo;s opt-out model &mdash; requiring IP holders to proactively exclude their works &mdash; provoked escalating legal challenges. The CODA demand letter, potential European litigation under the AI Act, and the broader uncertainty around training data rights created mounting legal exposure. Fourth, <strong>strategic focus:</strong> Anthropic&rsquo;s success with text/code-focused Claude models showed that you didn&rsquo;t need multimedia to win the enterprise market.</p>
   <h3>Competing Interpretations</h3>
   <p>How you read the Sora shutdown depends on your frame. CNBC positions it as pre-IPO cost discipline &mdash; the rational choice of a company preparing for public markets. IndieWire sees validation for creative communities who opposed AI video generation. Bloomberg frames it as portfolio simplification. Deadline emphasizes the Hollywood angle &mdash; the Disney deal collapse as a sign that AI-Hollywood partnerships remain fraught. The truth likely involves all four: Sora was simultaneously too expensive, too controversial, too legally risky, and too competitively weak to justify continued investment as a standalone product.</p>
   <p>What OpenAI isn&rsquo;t doing: abandoning video entirely. Video generation capabilities will likely persist within ChatGPT as a feature, not a product. The lesson isn&rsquo;t that AI video generation doesn&rsquo;t work. It&rsquo;s that breakthrough AI capabilities can fail as standalone products when business model, IP, and cost economics don&rsquo;t align.</p>
   <div class="callout"><strong>The broader signal:</strong> Google/DeepMind is now the only player in AI video with both scale and active Hollywood engagement, though it too faces IP lawsuits. The Sora episode suggests that AI video&rsquo;s path to market runs through existing platforms (YouTube, Google Cloud, Adobe) rather than standalone products. The standalone AI video app may be a dead category.</div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>Image</em> Generation</h2></div>
   <p>The AI image generation landscape has reached a maturity inflection. The gap between &ldquo;AI-looking&rdquo; and &ldquo;indistinguishable from photography&rdquo; has effectively closed for the top 4-5 tools. With over 50 million creators worldwide using these tools, quality is no longer the differentiator. The new competitive axes are prompt adherence, style consistency, text rendering, commercial licensing, and workflow integration.</p>
   <h3>The 2026 Leaders</h3>
   <p><strong>Midjourney v7</strong> (April 2025) holds unmatched aesthetic and artistic quality &mdash; the tool photographers and designers reach for when the goal is evocative rather than photographic. Now available via web interface beyond Discord. Added video generation (v1, up to 21 seconds). Niji 7 for anime. $10-60/month. No public API remains a deliberate choice, keeping their ecosystem controlled. Midjourney v8 Alpha is already in testing.</p>
   <p><strong>FLUX 1.1 Pro</strong> (Black Forest Labs, valued at $3.25B with Meta partnership) delivers the best photorealism and speed &mdash; 4.5-second generation time. Apache 2.0 licensing makes it the foundation of the open-source image generation ecosystem. For developers who need photorealistic output with minimal latency and full customization rights, FLUX is the default.</p>
   <p><strong>GPT Image 1.5</strong> replaced DALL-E 3 entirely &mdash; OpenAI retired the DALL-E brand. 4&times; faster generation with significantly better photorealism. Best-in-class prompt adherence and text-in-image rendering (~95% accuracy). Ranked #1 on LM Arena for image quality. The integration with ChatGPT gives it unmatched distribution.</p>
   <p><strong>Adobe Firefly 3</strong> is the only major generator trained exclusively on licensed content. Full commercial indemnification. Integrated into Photoshop and Illustrator. For enterprises where copyright risk is the primary concern (marketing, advertising, publishing), Firefly is the only defensible choice.</p>
   <p><strong>Ideogram 2.0/3.0</strong> owns the text-rendering niche: 90-95% accuracy for text in images, critical for marketing and branding where AI-generated images must include readable copy.</p>
   <h3>The Quality Plateau</h3>
   <p>The most impactful insight across sources: <strong>prompt quality matters more than model choice.</strong> A mediocre prompt on any top-tier platform produces mediocre results. A skilled prompt engineer gets excellent results from any of them. This echoes <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>&rsquo;s commodity thesis &mdash; when models are within striking distance of each other, the differentiator shifts from the model to the user&rsquo;s skill in deploying it. Many professionals now use 2-3 tools depending on the project: Midjourney for creative exploration, Stable Diffusion for customization, Firefly for commercial safety.</p>
   <div class="callout"><strong>Enterprise calculus:</strong> For commercial use, the image generation choice is increasingly a legal decision, not a quality decision. Adobe Firefly&rsquo;s licensed-data training + indemnification makes it the default for risk-averse enterprises. FLUX&rsquo;s Apache 2.0 licensing makes it the default for developers. Midjourney for aesthetics. GPT Image for integration. The market has segmented by business requirement, not capability.</div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Audio</em> &amp; Music Generation</h2></div>
   <p>February 2026 marked a turning point. Suno, Udio, and Google almost simultaneously launched updates that elevated AI music from novelty to production-grade. But the music industry&rsquo;s response &mdash; lawsuits, settlements, and an ethical divide &mdash; makes this the domain where copyright tension is most acute.</p>
   <h3>The Big Three</h3>
   <p><strong>Suno v5</strong> is the quality benchmark with an ELO score of 1,293, ahead of all competitors. Its vocal synthesis captures whispers, vibrato, breathiness, and emotional depth that approach human performance. Suno Studio is the first AI-native DAW (digital audio workstation) with multitrack timeline editing, 12-stem separation, MIDI export, and warp markers &mdash; features that make it a professional tool, not just a generator. Approximately 100 million users. $2.45 billion valuation. A landmark settlement with Warner Music Group will lead to new licensed models in 2026, potentially establishing a template for industry-wide accommodation.</p>
   <p><strong>Udio 2.0</strong> focuses on studio-level audio fidelity and spatial depth. Its inpainting feature (re-generate specific sections of a track without affecting the rest) and stem downloads give it a production-focused niche. Founded by ex-Google DeepMind engineers. Still facing active RIAA litigation, without the Warner settlement that gives Suno a path forward.</p>
   <p><strong>Google Lyria 3</strong> (February 2026) added vocal capabilities that had been exclusive to Suno and Udio. Rather than one model, Google split into three specialized variants &mdash; recognizing that music generation has distinct sub-tasks (composition, arrangement, vocals) that benefit from specialization.</p>
   <h3>The Copyright Minefield</h3>
   <p>Sony, Universal, and Warner filed suit against both Suno and Udio in June 2024 for &ldquo;willful copyright infringement on an almost unimaginable scale&rdquo; (RIAA). The Warner-Suno settlement may establish a template, but Udio&rsquo;s litigation continues. <strong>ElevenLabs Music</strong> (trained exclusively on licensed data) offers the strongest legal footing for developers needing API access with clear commercial rights. <strong>Beatoven.ai</strong>, with Fairly Trained certification, is the only platform with full ethical provenance.</p>
   <p>For enterprise use, the copyright question now dominates the quality question. A company producing background music for video content faces a choice: Suno produces better music but with uncertain legal standing; ElevenLabs produces good-enough music with clean rights. Most enterprises choose legal safety over quality at the margin.</p>
   <div class="callout"><strong>The Warner settlement precedent:</strong> If the Suno-Warner deal leads to broadly licensed training data for music AI, it creates a path where AI music companies pay royalties into a pool &mdash; similar to how radio stations pay ASCAP/BMI. If it doesn&rsquo;t generalize, and the RIAA lawsuits prevail, the entire AI music industry may be forced to retrain on licensed-only data. The outcome of this legal question determines whether AI music is a $10B industry or a niche tool.</div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>World</em> Models</h2></div>
   <p>A convergence of high-profile bets signals that world models &mdash; AI systems that simulate how environments evolve and how actions affect them &mdash; are being positioned as the successor paradigm to LLMs for achieving general intelligence. Three of the most prominent AI researchers alive are independently betting their careers on this thesis.</p>
   <h3>AMI Labs (Yann LeCun)</h3>
   <p>LeCun departed Meta in December 2025 after 12 years to launch AMI Labs. Seeking &euro;500M at a &euro;3B valuation <em>before launching any product</em> &mdash; one of the largest pre-launch raises in AI history. Headquartered in Paris. Built on JEPA (Joint Embedding Predictive Architecture), which learns by predicting representations rather than generating pixels. LeCun&rsquo;s core thesis is radical: LLMs will <em>never</em> achieve general intelligence because they lack an internal model of physical reality. Language alone cannot ground understanding.</p>
   <h3>World Labs (Fei-Fei Li)</h3>
   <p>Launched Marble in November 2025 as the first commercially available world model product. Generates persistent, downloadable 3D environments from text, images, or video. Exports to Unreal Engine and Unity. Freemium model starting at $20/month. In talks to raise $500M at a $5B valuation. Supports VR headsets (Vision Pro, Quest 3). This is the &ldquo;ship product early, iterate in market&rdquo; approach &mdash; contrasting with LeCun&rsquo;s &ldquo;solve the theory first&rdquo; philosophy.</p>
   <h3>Google DeepMind (Genie 3)</h3>
   <p>Released August 2025 as the first real-time interactive general-purpose world model. Generates navigable worlds at 720p/24fps, building on Veo 3&rsquo;s physics understanding. Project Genie prototype rolled out to Google AI Ultra subscribers in February 2026. Being tested with DeepMind&rsquo;s SIMA agent for embodied AI tasks. Reports indicate OpenAI triggered a &ldquo;code red&rdquo; response to Genie 3&rsquo;s capabilities.</p>

   <h3>Why This Matters for the Multimodal Story</h3>
   <p>World models represent a shift from generating media (images, video, audio) to simulating reality &mdash; from &ldquo;predict the next token&rdquo; to &ldquo;predict the next state.&rdquo; This is where multimodal AI intersects with robotics, spatial computing, and the AGI debate. If LeCun is right that language alone cannot ground understanding, then world models become necessary infrastructure for any AI system that must interact with physical reality &mdash; autonomous vehicles, surgical robots, manufacturing systems, embodied agents.</p>
   <div class="callout"><strong>For scientific AI:</strong> World models are potentially more consequential than LLMs. A world model that accurately simulates molecular dynamics, protein folding, or climate systems doesn&rsquo;t just generate text <em>about</em> these domains &mdash; it runs experiments in silico. Stanford expects clarity on the early vs late fusion question within a year.</div>`,

  `<div class="detail-header"><div class="num">07</div><h2><em>Deepfakes</em> &amp; Safety</h2></div>
   <p>The same diffusion model advances enabling stunning creative tools enable deepfakes at scale. The numbers are alarming and accelerating: deepfake incidents surged <strong>257%</strong> in 2024. Q1 2025 alone saw 19% more incidents than the entire previous year. Half of all businesses have experienced fraud involving AI-altered audio and video. Deepfakes-as-a-service is now a commercial category with easy-to-use tools requiring zero technical skill.</p>
   <h3>The Threat Landscape</h3>
   <p>Non-consensual intimate imagery is the most urgent harm vector &mdash; victims are overwhelmingly women, the content is trivial to produce and nearly impossible to fully remove, and the psychological damage is severe. Beyond NCII: political deepfakes during election cycles (realistic video of candidates making fabricated statements), corporate impersonation fraud (deepfake CEO on video calls authorizing wire transfers &mdash; multiple documented cases), and identity theft at scale. The technology has moved from &ldquo;detectable with effort&rdquo; to &ldquo;indistinguishable from reality for most viewers.&rdquo;</p>
   <h3>The Regulatory Response</h3>
   <p>The US response is a patchwork of 45+ state laws plus emerging federal action. The <strong>TAKE IT DOWN Act</strong> (signed May 2025) criminalizes non-consensual intimate deepfakes with up to 3 years imprisonment and requires platforms to remove flagged content within 48 hours. The <strong>DEFIANCE Act</strong> passed the Senate unanimously in January 2026 with statutory damages up to $250,000. Platforms must have notice-and-takedown systems by May 2026.</p>
   <p>The <a href="https://artificialintelligenceact.eu/" target="_blank">EU AI Act&rsquo;s</a><sup class="fn"><a href="https://artificialintelligenceact.eu/" target="_blank">[5]</a><span class="tip">EU AI Act &mdash; Article 50 transparency and deepfake marking requirements.</span></sup> Article 50 transparency obligations take effect August 2, 2026: all AI-generated content must be machine-readable marked, deepfakes must be disclosed. Penalties reach &euro;35M or 7% of global turnover. France launched an investigation in early 2026 into non-consensual deepfakes generated using Grok on X.</p>
   <h3>Technical Countermeasures and Their Limits</h3>
   <p>C2PA content credentials are becoming standard across platforms &mdash; embedding cryptographic provenance data into media files at creation. Watermarking, metadata embedding, and detection tools are maturing. But the arms race continues: tools to remove watermarks and strip metadata emerge as fast as they&rsquo;re deployed. Detection accuracy degrades with each generation of diffusion models. The fundamental asymmetry: creating a deepfake takes minutes; detecting and removing it takes days; the damage happens in hours.</p>
   <div class="callout"><strong>The connection to <a href="s7-regulation.dd.html" title="Regulation &amp; Governance">S7</a>:</strong> Deepfake regulation is where the AI governance frameworks from S7 face their hardest test. The EU&rsquo;s comprehensive marking requirements depend on AI companies complying voluntarily (or being caught). The US patchwork means enforcement depends on which state the victim is in. The technology is global; the legal response is fragmented. California&rsquo;s AB 2655 being struck down over Section 230 conflicts shows how existing legal frameworks struggle to accommodate AI-generated content that is neither &ldquo;user speech&rdquo; nor &ldquo;platform speech.&rdquo;</div>`,

  `<div class="detail-header"><div class="num">08</div><h2>The <em>LWM</em> Transition</h2></div>
   <p><a href="https://www.nngroup.com/articles/large-world-models/" target="_blank">Nielsen&rsquo;s</a><sup class="fn"><a href="https://www.nngroup.com/articles/large-world-models/" target="_blank">[1]</a><span class="tip">Nielsen Norman Group &mdash; Large World Models prediction.</span></sup> prediction crystallizes the overarching narrative for this entire section: &ldquo;By end of 2026, &lsquo;frontier model&rsquo; will stop meaning &lsquo;text engine with a few attachments&rsquo; and start meaning &lsquo;a single system that speaks, listens, sees, imagines, and edits.&rsquo;&rdquo;</p>
   <p><a href="https://www.ibm.com/think/" target="_blank">IBM&rsquo;s</a><sup class="fn"><a href="https://www.ibm.com/think/" target="_blank">[2]</a><span class="tip">IBM Think &mdash; multimodal convergence thesis.</span></sup> Baughman echoes this: &ldquo;Models will perceive and act much more like a human &mdash; bridge language, vision, action, all together.&rdquo; The convergence evidence is accumulating rapidly. Video models now generate with synchronized audio. Image models render text with 95% accuracy. Music models produce stems and MIDI for professional workflows. World models simulate navigable, physics-accurate 3D environments.</p>
   <h3>The Fusion Question</h3>
   <p>The critical architectural question is whether this convergence happens through <strong>early fusion</strong> (one massive model trained on all modalities from scratch) or <strong>late fusion</strong> (separate specialist models integrated at the application layer). Early fusion potentially captures richer cross-modal patterns &mdash; a model that &ldquo;sees&rdquo; and &ldquo;hears&rdquo; simultaneously might understand a scene better than one that processes audio and video separately. But early fusion is expensive (you rebuild everything when any modality&rsquo;s state of the art advances) and fragile (a failure in one modality can cascade).</p>
   <p>Late fusion is modular &mdash; you can swap in a better video model without retraining the text model. But it may miss cross-modal insights that early fusion captures. Stanford&rsquo;s Altman: &ldquo;In the next year, we may get clarity&rdquo; on which approach wins. The current market is hedging: Google&rsquo;s Gemini uses early fusion, while most production deployments use late fusion (routing different modalities to different models).</p>
   <h3>What LWM Means for <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>&rsquo;s Thesis</h3>
   <p>If the LWM transition plays out as Nielsen predicts, the &ldquo;model commoditization&rdquo; finding from S1 gets complicated. Text models are commoditizing because the task (predicting the next token from a text corpus) is well-understood and performance has converged. Multimodal integration introduces new axes of differentiation: audio synchronization quality, physics simulation accuracy, cross-modal coherence. The commodity zone may narrow (text stays commoditized) while new premium tiers emerge (world simulation, embodied reasoning).</p>
   <div class="callout"><strong>The prediction:</strong> By end of 2026, &ldquo;frontier model&rdquo; means LWM. By 2027-2028, pricing tiers stratify: text inference is near-free (<a href="s8-economics.dd.html" title="Economics &amp; Infrastructure">S8</a>&rsquo;s deflation curve), while multimodal generation and world simulation command premium pricing. The business model shifts from charging for text capability (commoditized) to charging for integrated multimodal experiences (differentiated).</div>`,

  `<div class="detail-header"><div class="num">09</div><h2>What Sources <em>Agree</em> On</h2></div>
   <p>Six convergence points across ten sources with very different methodologies &mdash; market data platforms, industry analysts, research labs, news coverage, and regulatory analysis:</p>
   <p><strong>1. Multimodal is table stakes.</strong> Every major AI lab &mdash; Google, OpenAI, Anthropic, Meta, Stability, Kuaishou &mdash; is investing in cross-modal generation. Text-only models are heading for obsolescence as frontier systems. The question is not <em>whether</em> models become multimodal but <em>how fast</em> and through what architecture (early vs late fusion).</p>
   <p><strong>2. Image quality has plateaued at the top; video is still climbing.</strong> The top 4-5 image generators produce quality that is indistinguishable from each other and from photography. The competitive frontier has shifted to licensing, workflow integration, and niche capabilities (text rendering, style control). Video generation still has meaningful quality gaps between models &mdash; and the Sora shutdown just removed one of the top players.</p>
   <p><strong>3. Native audio changed everything.</strong> The shift from silent to synchronized audio and dialogue in video generation was the single most impactful change in the last 6 months. It transformed AI video from a visual curiosity requiring extensive post-production into a tool that produces ready-to-use content.</p>
   <p><strong>4. World models are the next paradigm bet.</strong> Three of the most prominent AI researchers (LeCun, Fei-Fei Li, DeepMind leadership) are independently betting their careers and companies on world models as the path to general intelligence. This isn&rsquo;t incremental improvement &mdash; it&rsquo;s a thesis that the LLM paradigm has fundamental limitations that only world simulation can address.</p>
   <p><strong>5. Copyright is the binding constraint, not capability.</strong> For image, video, and music generation, the legal and licensing question is now more important than the quality question for commercial adoption. Adobe Firefly&rsquo;s licensed-data approach, the Suno-Warner settlement, and Beatoven.ai&rsquo;s ethical provenance all point toward a market where copyright cleanliness commands a premium over raw quality.</p>
   <p><strong>6. The Global South is a leading adopter.</strong> Vivideo&rsquo;s data shows non-English, non-Western users driving AI video adoption. This challenges the assumption that generative AI tools are primarily Western products consumed by Western creators. The adoption curve is global from the start.</p>
   <div class="callout"><strong>The meta-finding:</strong> Capability has raced ahead of governance. Every modality &mdash; video, image, audio, world models &mdash; has reached or is approaching production quality. But the commercial, legal, and ethical frameworks needed to deploy these capabilities responsibly are years behind. The binding constraint on multimodal AI in 2026 is not &ldquo;can the technology do this?&rdquo; but &ldquo;are we allowed to, and at what legal risk?&rdquo;</div>`,

  `<div class="detail-header"><div class="num">10</div><h2>Where Sources <em>Disagree</em></h2></div>
   <h3>Sora Shutdown Interpretation</h3>
   <p>The widest split in framing: CNBC positions the Sora shutdown as rational pre-IPO cost-cutting. IndieWire sees it as a victory for creative communities opposed to AI video generation. Bloomberg frames it as portfolio simplification for a company preparing to go public. Deadline emphasizes the Hollywood relationship collapse &mdash; the Disney deal unwinding as a sign that AI-content partnerships remain fundamentally fraught. Each interpretation is partially correct, which suggests the shutdown was overdetermined &mdash; multiple sufficient causes converging simultaneously.</p>
   <h3>Video Market Structure</h3>
   <p>Vivideo&rsquo;s platform data shows Veo 3.1 at 96.4% market share &mdash; suggesting winner-take-most dynamics where one model dominates consumer creation. But Cliprise&rsquo;s professional workflow analysis argues the opposite: production environments will use 3-5 models for different shot types. The resolution may be that consumer and professional markets diverge: one dominant model for casual creation (Veo, because Google&rsquo;s distribution is unmatched), and a multi-model ecosystem for production work where quality on specific shot types matters more than convenience.</p>
   <h3>World Models Timeline</h3>
   <p>LeCun and Fei-Fei Li frame world models as imminent commercial products (Marble is already shipping, AMI Labs is raising at $3B). DeepMind is more cautious &mdash; Genie 3 remains in limited preview. Some observers argue world models are decades from meaningful AGI contribution, pointing out that simulating simple 3D environments is qualitatively different from simulating the complex physical world with sufficient fidelity for robotics or scientific discovery.</p>
   <h3>Music Copyright Resolution</h3>
   <p>Suno&rsquo;s Warner settlement suggests industry accommodation is possible &mdash; AI music companies paying royalties into a pool, similar to radio&rsquo;s ASCAP/BMI model. But the RIAA lawsuits against both Suno and Udio are still active, and Beatoven.ai&rsquo;s licensed-data approach suggests an alternative path where training on copyrighted material is simply avoided. The resolution determines whether AI music is a mainstream industry or a legally constrained niche.</p>
   <h3>Deepfake Regulation Effectiveness</h3>
   <p>The EU&rsquo;s comprehensive framework (<a href="https://artificialintelligenceact.eu/" target="_blank">AI Act</a> Article 50) mandates marking and disclosure with severe penalties. The US relies on a patchwork of 45+ state laws with Section 230 conflicts (California&rsquo;s AB 2655 already struck down). Some argue regulation will always lag the technology; others point to the TAKE IT DOWN Act&rsquo;s 48-hour takedown requirement as a viable enforcement model. The fundamental question: can you regulate the misuse of a tool that is inherently dual-use (the same model that creates art creates deepfakes)?</p>
   <div class="callout"><strong>What to watch:</strong> Three developments in the next 12 months will clarify these disagreements. First: does a Veo competitor emerge to challenge the 96.4% share, or does video generation consolidate into a Google monopoly? Second: do the RIAA lawsuits settle or go to trial? Third: how effective is the EU&rsquo;s Article 50 enforcement starting August 2026 &mdash; does mandatory marking actually reduce deepfake harm, or do bad actors simply ignore it?</div>`
];


const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">M<em>M</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> GENAI 2026 · S2 · 10 SOURCES</div>
        <div class="hero-title">Multimodal &amp; Diffusion <em>Models</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Video, image, audio, world models, and the safety landscape</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>

`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});


</script>
</body>
