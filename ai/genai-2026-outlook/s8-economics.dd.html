<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S8: economics — GenAI 2026 Outlook</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:16px 0;border:1px solid var(--border)}
.price-card{border-right:1px solid var(--border);padding:18px 12px;text-align:center;background:none;border-radius:0}
.price-card:last-child{border-right:none}.price-card.hl{background:var(--accent-soft)}
.price-card h4{font-size:var(--price-h4-size);font-weight:var(--body-weight);color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--price-h4-ls);font-family:var(--sans)}
.price-card .price{font-family:var(--serif);font-size:var(--price-val-size);color:var(--bright);font-weight:var(--heading-weight);font-style:italic;letter-spacing:var(--price-val-ls)}
.price-card .pn{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--sans)}

@media(max-width:1000px){
  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}

  .right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}
  .right:not(.closed){transform:translateX(0)}
  .right-inner{padding:0 20px 80px}

  .detail-header h2{font-size:26px!important}
  .feat-grid,.verdict,.price-grid{grid-template-columns:1fr}
  .feat{border-left:none!important;padding-left:0!important}
  .feat:nth-child(2n){padding-left:0}
  .v-col{padding:16px 0!important}
  .v-col:last-child{border-left:none!important;padding-left:0!important}
  .price-card{border-right:none!important;border-bottom:1px solid var(--border)}.price-card:last-child{border-bottom:none}
  .tl-item{flex-direction:column!important;gap:4px}
  .tl-date{min-width:unset!important}
  .detail p{font-size:16px}
  .detail pre{font-size:12px;padding:14px 16px}

}

  /* Links */
  a{color:var(--dim);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--dim),transparent 50%);transition:color .2s,border-color .2s}
  a:hover{color:var(--accent);border-bottom-color:var(--accent);border-bottom-style:solid}

  .section-block a{color:var(--text);border-bottom-color:color-mix(in srgb,var(--accent),transparent 60%)}
  .section-block a:hover{color:var(--accent);border-bottom-color:var(--accent)}

  /* Wikipedia-style citations */
  sup{font-size:11px;line-height:0;vertical-align:super}sup.fn{position:relative;cursor:pointer;font-family:var(--sans)}sup.fn>a{color:var(--accent);font-weight:600;text-decoration:none;border-bottom:none}sup.fn:hover>a{color:var(--bright)}sup.fn .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:400;color:var(--text);white-space:normal;max-width:480px;min-width:200px;z-index:50;pointer-events:auto;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.15)}sup.fn .tip a{color:var(--link);text-decoration:none;border-bottom:1px dotted var(--accent)}sup.fn .tip a:hover{color:var(--bright);border-bottom-style:solid}sup.fn:hover .tip,sup.fn .tip:hover{display:block}sup.fn .tip::after{content:'';position:absolute;left:0;right:0;top:100%;height:10px}

</head>
<body>
<script>

const sections = [
  { num: '01', short: 'Overview', title: '<em>Economics</em> &amp; Infrastructure' },
  { num: '02', short: 'Capex', title: 'The $<em>500B</em> Capex Wave' },
  { num: '03', short: 'Revenue', title: '<em>Revenue</em> vs Investment' },
  { num: '04', short: 'Deflation', title: 'The <em>Pricing</em> Collapse' },
  { num: '05', short: 'Disruption', title: '<em>Market</em> Disruption' },
  { num: '06', short: 'Consensus', title: 'What <em>Everyone</em> Agrees On' },
  { num: '07', short: 'Bubble', title: 'The <em>Bubble</em> Question' }
];

const summaries = [
  `<p><strong>$500B+</strong> in hyperscaler capital expenditure. <strong>$252B</strong> in corporate AI investment. AI company revenues growing <strong>9&times;</strong>. But 42% of companies abandoned most AI initiatives in 2024. The economics of AI in 2026 are defined by a single question: is this rational investment or speculative excess?</p>
   <p>The answer depends on which metric you look at. Revenue growth is real: OpenAI targeting $15B, <a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">Anthropic</a> $7B ARR. Pricing collapse is real: 10&times; annual cost deflation. But so is the gap between investment and realized enterprise value (<a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>&rsquo;s adoption-value gap).</p>
   <div class="s-stat">
     <div class="st"><div class="sv">$500B+</div><div class="sl">hyperscaler capex 2026</div></div>
     <div class="st"><div class="sv">$252B</div><div class="sl">corporate AI investment 2024</div></div>
     <div class="st"><div class="sv">9&times;</div><div class="sl">AI company revenue growth</div></div>
     <div class="st"><div class="sv">$58B</div><div class="sl">productivity market at stake</div></div>
   </div>`,
  `<p><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a><sup class="fn"><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">[1]</a><span class="tip">Goldman Sachs &mdash; AI investment forecasts and hyperscaler capex analysis.</span></sup>: the seven biggest tech companies now represent <strong>30%+ of the S&amp;P 500&rsquo;s market cap</strong> and ~25% of its earnings. They are collectively spending $500B+ on AI infrastructure in 2026 &mdash; data centers, chips, power agreements, cooling systems.</p>
   <p>For context: $500B is roughly the GDP of Thailand. It exceeds the entire US defense R&amp;D budget. It is the largest concentrated infrastructure investment by private companies in modern history. The bet is that AI will generate returns that justify this unprecedented capital deployment.</p>
   <p>The &ldquo;gigawatt ceiling&rdquo; (<a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>) constrains how fast this capital can be deployed. Power, not money, is the bottleneck. Companies are &ldquo;obsessing over allocating every megawatt to activities with the highest return.&rdquo;</p>`,
  `<p>AI revenue is real and growing fast. <a href="https://epoch.ai/" target="_blank">Epoch AI</a><sup class="fn"><a href="https://epoch.ai/" target="_blank">[2]</a><span class="tip">Epoch AI &mdash; AI company revenue growth tracking (9&times; in 2023-2024).</span></sup>: combined revenues of leading AI companies grew <strong>9&times; in 2023-2024.</strong> OpenAI is targeting $15B revenue in 2026. <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic</a> grew from $4.7B to $7B ARR in 2025. The AI industry is generating substantial cash, not just burning venture capital.</p>
   <p>But revenue doesn&rsquo;t equal returns. <a href="https://aiindex.stanford.edu/report/" target="_blank">Stanford</a><sup class="fn"><a href="https://aiindex.stanford.edu/report/" target="_blank">[3]</a><span class="tip">Stanford AI Index 2025 &mdash; $252B corporate AI investment in 2024.</span></sup>: total corporate AI investment was $252B in 2024 (up 26% YoY). US private AI investment: $109B. GenAI specifically: $33.9B. These numbers dwarf current AI revenues. The gap between investment and revenue is the fuel for the bubble debate.</p>
   <p><a href="https://www.spglobal.com/" target="_blank">S&amp;P Global</a><sup class="fn"><a href="https://www.spglobal.com/" target="_blank">[4]</a><span class="tip">S&amp;P Global &mdash; 42% of companies abandoned most AI initiatives in 2024.</span></sup>: <strong>42% of companies abandoned most AI initiatives in 2024</strong>, up from 17% the prior year. The projects being abandoned suggest that a significant portion of AI investment is not generating returns.</p>`,
  `<p>The most structurally important economic trend: <strong>~10&times; annual cost deflation</strong> for equivalent AI capability. GPT-4-level inference went from ~$30 to &lt;$1 per million tokens in three years. This isn&rsquo;t a one-time price cut &mdash; it&rsquo;s an exponential curve driven by hardware, algorithmic, and architectural improvements (detailed in <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>).</p>
   <p>The economic consequence: applications that were impossible at $30/M tokens become viable at $1. Use cases that are marginal at $1 become compelling at $0.10. Each 10&times; drop opens a new tier of economically viable applications. This is the mechanism by which AI moves from premium service to infrastructure commodity.</p>
   <p>For AI companies, deflation is a double-edged sword: it expands the market (more use cases are viable) but compresses margins (the same capability gets cheaper every year). The business model shifts from charging for capability to charging for integration, reliability, and ecosystem.</p>`,
  `<p><a href="https://www.gartner.com/en/articles/gartner-top-10-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a><sup class="fn"><a href="https://www.gartner.com/en/articles/gartner-top-10-strategic-predictions-for-2026-and-beyond" target="_blank">[5]</a><span class="tip">Gartner &mdash; AI agents challenge mainstream productivity tools; $58B market.</span></sup>: AI agents create the &ldquo;first true challenge to mainstream productivity tools in <strong>35 years</strong>&rdquo; &mdash; a $58B market. If agents can draft documents, manage schedules, prepare presentations, and coordinate workflows, the productivity software stack (Office, Google Workspace, project management tools) faces fundamental disruption.</p>
   <p>IBM: &ldquo;a new class of chips for agentic workloads may emerge&rdquo; &mdash; alongside GPUs, purpose-built hardware for the 3B-7B model workloads that dominate real-world deployment (<a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>&rsquo;s efficiency argument). If this materializes, the chip market diversifies beyond <a href="https://arxiv.org/abs/2409.15790" target="_blank">NVIDIA&rsquo;s</a> current 60%+ share.</p>
   <p>The AI device breakout (<a href="https://www.salesforce.com/blog/ai-agents-predictions/" target="_blank">Salesforce</a>): dedicated AI hardware moving beyond phones and laptops. Whether this becomes a real market category or another smart-speaker-scale disappointment is one of 2026&rsquo;s open bets.</p>`,
  `<p>Four convergence points: <strong>1.</strong> Investment is massive and unprecedented &mdash; $500B+ capex is not debatable. <strong>2.</strong> Revenue is real and growing 9&times;, but concentrated in a few companies. <strong>3.</strong> Cost deflation is structural and enabling new use cases at each 10&times; drop. <strong>4.</strong> Power (not money) is the binding infrastructure constraint.</p>
   <p>The meta-finding: the economic story is not &ldquo;AI doesn&rsquo;t generate value&rdquo; (it does &mdash; $15B OpenAI, $7B Anthropic) nor &ldquo;AI investment is rational&rdquo; (42% abandonment rate suggests much of it isn&rsquo;t). It&rsquo;s that <strong>value is concentrating</strong> in AI providers while <strong>enterprise returns are elusive</strong> for most deployers.</p>`,
  `<p>The bubble question is the survey&rsquo;s most irreducible disagreement. <strong>The case for bubble:</strong> $252B invested, 42% of initiatives abandoned, 56% of CEOs with no gains (<a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC</a>), investment dramatically exceeds revenue. <a href="https://www.spglobal.com/" target="_blank">S&amp;P Global</a> data shows project abandonment <em>accelerating.</em></p>
   <p><strong>The case against:</strong> 9&times; revenue growth, $15B+ at a single company, 78% adoption, 10&times; annual cost deflation enabling new use cases. Unlike dot-com, AI companies have real revenue, real customers, and real utility.</p>
   <p>The honest answer: <strong>both arguments cite valid evidence.</strong> AI is simultaneously generating real value (for providers and a minority of deployers) and attracting speculative investment (from the majority who haven&rsquo;t realized returns). This is consistent with what economist Carlota Perez calls the &ldquo;installation phase&rdquo; of a technological revolution &mdash; massive capital deployment that eventually produces returns, but with substantial waste and correction along the way.</p>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>Economics</em> &amp; Infrastructure</h2></div>
   <h3>The Economic Stakes</h3>
   <p>Every previous section feeds into this one. <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>&rsquo;s cost deflation determines AI&rsquo;s economic trajectory. <a href="s3-agents.dd.html" title="AI Agents">S3</a>&rsquo;s 40% agent failure rate determines how much investment generates returns. <a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>&rsquo;s adoption-value gap quantifies the distance between spending and benefit. <a href="s5-employment.dd.html" title="Employment &amp; Labor">S5</a>&rsquo;s employment effects shape the political response. <a href="s6-trust.dd.html" title="Public Perception &amp; Trust">S6</a>&rsquo;s trust deficit constrains adoption speed. <a href="s7-regulation.dd.html" title="Regulation &amp; Governance">S7</a>&rsquo;s regulatory landscape determines compliance costs. S8 asks: given all of this, are the economics working?</p>
   <p>Five sources provide the data. <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026" target="_blank">Goldman Sachs</a> gives the macro view ($500B+ capex, hyperscaler concentration). <a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> identifies the market disruption ($58B productivity software). IBM frames the technology-hardware intersection. <a href="https://llm-stats.com/" target="_blank">LLM-Stats</a> tracks the deflation curve. <a href="https://www.understandingai.org/" target="_blank">Understanding AI</a> provides company-level revenue data. Together they paint a picture of an industry with real revenue, unprecedented investment, and a gap between the two that is either a sign of early-stage rational investment or a speculative bubble.</p>
   <div class="callout"><strong>How this section connects:</strong> The bubble question cannot be answered with economic data alone. It depends on whether the adoption-value gap (<a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>) closes or widens, whether agent deployments (<a href="s3-agents.dd.html" title="AI Agents">S3</a>) succeed at scale, whether the career ladder damage (<a href="s5-employment.dd.html" title="Employment &amp; Labor">S5</a>) creates political backlash, and whether regulation (<a href="s7-regulation.dd.html" title="Regulation &amp; Governance">S7</a>) imposes costs that shift the economic calculus. The economics section is the capstone where every other trend&rsquo;s implications converge.</div>`,
  `<div class="detail-header"><div class="num">02</div><h2>The $<em>500B</em> Capex Wave</h2></div>
   <p><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a> frames the scale of AI investment through the lens of market concentration. The seven biggest technology companies now account for more than 30% of the S&amp;P 500&rsquo;s market capitalization and roughly 25% of its earnings. They are collectively deploying over $500 billion in capital expenditure on AI infrastructure in 2026.</p>
   <p>The investment goes to physical infrastructure: data centers with tens of thousands of GPUs, power procurement agreements, cooling systems, networking equipment, and the real estate to house it all. Bloomberg reports a 400,000-GPU cluster under construction at an estimated cost of $17 billion for a single facility. <a href="https://www.microsoft.com/en-us/microsoft-365/blog/2026/01/15/7-ai-trends-for-2026/" target="_blank">Microsoft&rsquo;s</a> Stargate project in Wisconsin approaches $15 billion. xAI is expanding Colossus toward 1 million GPUs at 1.2 GW capacity.</p>
   <p>These numbers are unprecedented for private companies. For comparison: the Manhattan Project (in 2024 dollars) cost roughly $30 billion. The Apollo Program cost roughly $260 billion. The entire US defense R&amp;D budget is approximately $140 billion annually. The hyperscalers are spending 3-4&times; the defense R&amp;D budget on AI infrastructure in a single year.</p>
   <p>The constraint, as <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> established, is power. $500B in capital expenditure can buy the chips and build the buildings, but it cannot create gigawatts of electrical power overnight. Power infrastructure has multi-year construction timelines, environmental review requirements, and grid interconnection queues. Companies that secured power agreements two years ago are now positioned to deploy; those that didn&rsquo;t are scrambling.</p>
   <div class="callout"><strong>The concentration risk:</strong> Seven companies are making this $500B bet. If AI returns materialize, these companies capture most of the value. If returns don&rsquo;t materialize, the write-downs will be enormous &mdash; concentrated in the same companies that represent 30% of the S&amp;P 500. This is a systemic risk that extends beyond the AI industry to the broader equity market.</div>`,
  `<div class="detail-header"><div class="num">03</div><h2><em>Revenue</em> vs Investment</h2></div>
   <p>The revenue story is encouraging. <a href="https://epoch.ai/" target="_blank">Epoch AI</a> reports that the combined revenues of leading AI companies grew more than 9&times; in 2023-2024. This is not a vaporware industry &mdash; AI companies are generating real cash from real customers for real services. OpenAI is targeting $15 billion in revenue for 2026. <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic</a> grew from $4.7B to approximately $7B in annual recurring revenue during 2025. These are substantial businesses by any measure.</p>
   <p>But revenue is not the same as return on investment. <a href="https://aiindex.stanford.edu/report/" target="_blank">Stanford&rsquo;s AI Index</a> reports total corporate AI investment of $252 billion in 2024, up 26% year-over-year. US private AI investment alone was $109 billion. GenAI specifically attracted $33.9 billion in private investment. These numbers dramatically exceed current AI industry revenues. Even accounting for the lag between investment and revenue, the ratio is stretched.</p>
   <p><a href="https://www.spglobal.com/" target="_blank">S&amp;P Global</a> provides the most sobering datapoint: 42% of companies abandoned most of their AI initiatives in 2024, up from 17% the prior year. The average organization scrapped 46% of AI proofs-of-concept. This is not the behavior of an industry where investment is matching returns. It&rsquo;s the behavior of an industry where a significant portion of investment is failing to generate value &mdash; and organizations are starting to cut their losses.</p>
   <p><a href="https://www.pwc.com/gx/en/issues/c-suite-insights/ceo-survey.html" target="_blank">PwC&rsquo;s</a> CEO survey (from <a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>) adds another dimension: 56% of CEOs captured neither revenue nor cost savings from AI. Only 12% achieved both. If most CEOs can&rsquo;t point to financial returns after 2+ years of AI investment, the $252B in aggregate corporate AI spending includes a substantial component that is not generating returns.</p>
   <div class="callout"><strong>The installation-phase interpretation:</strong> Economist Carlota Perez&rsquo;s framework for technological revolutions distinguishes between the &ldquo;installation phase&rdquo; (massive capital deployment, speculation, infrastructure building) and the &ldquo;deployment phase&rdquo; (returns materialize as infrastructure enables new business models). By this reading, $500B in capex and 42% project failure are both normal: the railroad era had similar investment patterns. The question is whether we&rsquo;re in 1847 (pre-crash) or 1870 (pre-boom).</div>`,
  `<div class="detail-header"><div class="num">04</div><h2>The <em>Pricing</em> Collapse</h2></div>
   <p>The pricing trajectory for AI inference is the most structurally important economic trend in the section. GPT-4-level capability cost approximately $30 per million tokens in early 2023. By early 2026, equivalent capability costs less than $1 per million tokens. That is roughly 30&times; deflation in three years, or approximately 10&times; per year.</p>
   <p>This deflation is not slowing down. <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> identified three compounding curves: hardware price-performance improving 40%/year, algorithmic efficiency gaining 3&times;/year, and architectural efficiency (the 142&times; model shrinkage). These curves show no sign of flattening.</p>
   <p>The economic consequence is profound. Each 10&times; cost reduction opens a new tier of viable applications. At $30/M tokens, AI was cost-effective only for high-value, low-volume tasks (legal research, financial analysis). At $1/M tokens, it becomes viable for medium-value, medium-volume tasks (customer service, content generation). At $0.10/M tokens, it becomes viable for low-value, high-volume tasks (email sorting, data classification, routine documentation). This is the mechanism by which AI moves from premium service to background infrastructure.</p>
   <p>For AI companies, deflation creates a strategic tension. Revenue per query drops 10&times;/year, which means you need 10&times; more queries to maintain the same revenue. The companies that win are those that expand usage faster than prices fall &mdash; which requires expanding into new use cases and new customer segments at each price tier. OpenAI&rsquo;s trajectory from API provider to consumer product to enterprise platform reflects this pressure.</p>
   <div class="callout"><strong>The deflation endgame:</strong> If pricing continues on the current trajectory, GPT-4-level inference costs $0.001/M tokens by 2030 &mdash; essentially free. At that point, the capability itself has zero economic value, and all value resides in the system around it: integration, reliability, customization, governance. This is exactly <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>&rsquo;s &ldquo;model as commodity&rdquo; thesis playing out in pricing data.</div>`,
  `<div class="detail-header"><div class="num">05</div><h2><em>Market</em> Disruption</h2></div>
   <p><a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> identifies what they call &ldquo;the first true challenge to mainstream productivity tools in 35 years.&rdquo; The $58 billion productivity software market &mdash; dominated by Microsoft Office and Google Workspace since the late 1980s &mdash; faces fundamental disruption from AI agents that can draft, summarize, schedule, coordinate, and present without the traditional tool paradigm of blank documents and empty spreadsheets.</p>
   <p>The disruption model: instead of opening Word and writing a document, you describe what you need and an agent produces it. Instead of building a spreadsheet, you describe the analysis and an agent generates the data model. Instead of creating a presentation, you specify the audience and key messages and an agent builds the deck. The tools don&rsquo;t disappear &mdash; they become execution surfaces for agent-generated content rather than primary creation interfaces.</p>
   <p>IBM adds the hardware dimension: alongside GPUs, &ldquo;a new class of chips for agentic workloads may emerge.&rdquo; <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>&rsquo;s efficiency argument (7B models are 10-30&times; more cost-effective for most sub-tasks) implies a hardware opportunity for chips optimized for the small-model workloads that dominate actual deployment. ASIC-based accelerators, chiplet designs, analog inference, and quantum-assisted optimizers are all maturing. If purpose-built agentic chips emerge, NVIDIA&rsquo;s 60%+ market share faces competitive pressure from below.</p>
   <div class="callout"><strong>The $58B question:</strong> <a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner&rsquo;s</a> prediction of productivity software disruption is the most ambitious market forecast in the survey. The incumbents (Microsoft, Google) are also the leading AI providers. Whether AI disrupts their existing products or strengthens their position depends on whether the disruption comes from within (Copilot as a feature of Office) or from without (standalone AI tools that replace Office entirely). So far, the former is winning.</div>`,
  `<div class="detail-header"><div class="num">06</div><h2>What <em>Everyone</em> Agrees On</h2></div>
   <p><strong>1. Investment is massive and unprecedented.</strong> $500B+ hyperscaler capex. $252B corporate AI investment. These numbers are not debatable &mdash; they represent physical infrastructure under construction and money already spent. <strong>2. Revenue is real and growing.</strong> 9&times; revenue growth for leading AI companies. $15B+ at OpenAI, $7B at <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic</a>. This is not a zero-revenue bubble. <strong>3. Cost deflation is structural.</strong> 10&times;/year for equivalent capability. Three independent compounding curves with no sign of flattening. <strong>4. Power is the binding constraint.</strong> Not money, not chips, not algorithms. Multi-year construction timelines make power the strategic bottleneck.</p>
   <p>The meta-finding: AI generates real economic value &mdash; for AI providers. The question is whether that value extends to the broader economy (the enterprise deployers from <a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>) at a rate that justifies the investment being made.</p>
   <div class="callout"><strong>The capstone finding:</strong> Value is concentrating in AI providers (OpenAI, Anthropic, cloud hyperscalers) while enterprise returns remain elusive for most deployers. This is consistent with an infrastructure buildout phase where the infrastructure providers profit before the infrastructure users do &mdash; similar to how railroad companies profited before the industries they enabled did, or how cloud providers (AWS) profited before most cloud adopters achieved ROI. The question is not whether value will eventually flow to enterprise deployers but how many investment cycles it takes and how much capital is wasted along the way.</div>`,
  `<div class="detail-header"><div class="num">07</div><h2>The <em>Bubble</em> Question</h2></div>
   <h3>The Case For Bubble</h3>
   <p>The circumstantial evidence is substantial. $252B in corporate AI investment. 42% of companies abandoning most AI initiatives (up from 17%). 56% of CEOs with no financial gains. <a href="https://www.spglobal.com/" target="_blank">S&amp;P Global</a> data showing project abandonment <em>accelerating</em>. Investment dramatically exceeding current revenue. <a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> predicting 40% of agent projects canceled. The pattern &mdash; massive investment with modest returns and rising abandonment rates &mdash; resembles the dot-com era circa 1999.</p>
   <h3>The Case Against</h3>
   <p>Unlike the dot-com bubble, AI companies have real and rapidly growing revenue. OpenAI&rsquo;s $15B target is not a fantasy &mdash; they have a path to it based on existing customer growth. 78% of organizations use AI (not the 5% adoption of internet commerce in 1999). The 10&times; annual cost deflation creates a genuine expanding market. The technology works &mdash; SWE-bench went from 4% to 72% in a year (<a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>). AI company revenues grew 9&times; in 2023-2024. Historical analogies suggest this might be closer to 2004 (post-crash but pre-boom for the real internet economy) than 1999.</p>
   <h3>The Honest Assessment</h3>
   <p>Both arguments cite valid evidence because both are <em>partially true simultaneously.</em> AI is generating real value for a minority of organizations (AI providers, high-performer deployers) while attracting speculative investment from the majority (who haven&rsquo;t realized returns). The investment-to-return ratio is stretched but not obviously irrational if you take a 5-10 year view. Some portion of the $500B capex will generate excellent returns. Some portion will be written off.</p>
   <p>The defining characteristic of a bubble is that it can only be identified after the fact. Anyone claiming certainty in either direction &mdash; &ldquo;definitely a bubble&rdquo; or &ldquo;definitely not&rdquo; &mdash; is selling confidence they don&rsquo;t have. What we <em>can</em> say: the economic fundamentals (real revenue, real utility, cost deflation) are stronger than the dot-com era. The investment-to-return gap (42% abandonment, 56% CEO no-gains) is cause for concern but not alarm if you believe the gap will close over a multi-year horizon.</p>
   <div class="callout"><strong>What to watch:</strong> The leading indicator is the project abandonment rate. If S&amp;P Global&rsquo;s 42% holds steady or declines in 2026-2027, it suggests organizations are learning what works and concentrating investment on viable use cases. If it rises toward 60-70%, the investment-value gap is widening and a correction becomes likely. The second indicator: AI company revenue growth. If the 9&times; growth rate decelerates sharply, the revenue story that supports current valuations weakens. If it sustains at even 3-4&times;, the economic fundamentals are solid.</div>`
];


const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">E<em>c</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> GENAI 2026 · S8 · 5 SOURCES</div>
        <div class="hero-title">Economics &amp; <em>Infrastructure</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>$500B capex, 9&times; revenue growth, and the bubble question</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});



</script>
</body>
</html>
