<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3: AI Agents — GenAI 2026 Outlook</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

const summaries = [
  `<p>AI agents are the most hyped category in AI since generative AI itself &mdash; and the one where the gap between promise and production reality is widest. Ten sources tell a story of enormous potential colliding with stubborn operational obstacles.</p>
   <p><a href="https://www.gartner.com/en/articles/gartner-top-10-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> predicts <strong>40% of agentic AI projects will be canceled by 2027.</strong> Production agents execute &le;10 steps before needing a human in 68% of cases. The integration layer &mdash; not the LLM &mdash; is where projects die. Yet where agents work (narrow tasks, clear metrics), they deliver: <strong>40% cost reduction</strong>, 80% containment rate, 23% speed improvement.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">40%</div><div class="sl">projects canceled by 2027</div></div>
     <div class="st"><div class="sv">10</div><div class="sl">steps before human needed</div></div>
     <div class="st"><div class="sv">1000+</div><div class="sl">MCP community servers</div></div>
     <div class="st"><div class="sv">$58B</div><div class="sl">productivity market at stake</div></div>
   </div>`,

  `<p><a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner&rsquo;s</a><sup class="fn"><a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">[1]</a><span class="tip">Gartner &mdash; strategic predictions: 40% of agentic AI projects will be canceled by 2027.</span></sup> headline prediction: 40% of agentic AI projects will be canceled by end 2027. Not &ldquo;will underperform&rdquo; &mdash; <em>canceled.</em> The causes: escalating inference costs, unclear business value, and inadequate risk controls. &ldquo;Agent washing&rdquo; is rampant &mdash; only ~130 of thousands of vendors offer genuine agentic capabilities.</p>
   <p><a href="https://sloanreview.mit.edu/" target="_blank">MIT Sloan</a>&rsquo;s <a href="https://sloanreview.mit.edu/" target="_blank">Davenport and Bean</a>: agents are &ldquo;just not ready for prime-time business.&rdquo; GenAI has already entered the trough of disillusionment on the <a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> hype cycle. Agents are heading there in 2026. <a href="https://www.forrester.com/" target="_blank">Forrester</a>: 25% of planned AI spend will be <strong>deferred by 2027</strong> due to ROI concerns.</p>
   <p>The pattern is painfully familiar from previous tech cycles: vendor excitement &rarr; executive FOMO &rarr; underfunded pilots &rarr; underwhelming results &rarr; disillusionment &rarr; (eventually) mature adoption at lower expectations.</p>`,

  `<p>The most sobering finding in this section: production agents execute <strong>&le;10 steps</strong> before requiring human intervention in 68% of cases. Not the hundred-step autonomous chains in demos. Not the &ldquo;fully autonomous&rdquo; systems in marketing slides. Ten steps, then a human.</p>
   <p>85% of deployed agents are built custom from scratch &mdash; teams reject generic frameworks in favor of control. 74% rely on human evaluation, not automated benchmarks. Internal use cases dominate because error tolerance is higher and feedback loops are tighter.</p>
   <p>The failure mode isn&rsquo;t the LLM. It&rsquo;s the integration: brittle API connectors, undocumented legacy systems, OAuth flows that weren&rsquo;t designed for non-human callers. The model works. The plumbing doesn&rsquo;t.</p>`,

  `<p>Agents succeed when the task is <strong>narrow, repetitive, and measurable.</strong> <a href="https://www.cbinsights.com/" target="_blank">CB Insights</a><sup class="fn"><a href="https://www.cbinsights.com/" target="_blank">[2]</a><span class="tip">CB Insights &mdash; AI agents market map and 5 markets with genuine traction.</span></sup> identifies five markets with genuine traction: multimodal customer service (115+ companies, 6 at $100M+ revenue), voice AI, continuous red teaming, agent observability, and enterprise scaling platforms.</p>
   <p>Where agents are deployed, the numbers are real: <strong>40% median cost reduction</strong>, 80% customer-service containment, 23% speed-to-market improvement (G2). The pattern: agents crush structured repetition but collapse on open-ended judgment.</p>
   <p><a href="https://www.salesforce.com/blog/future-of-ai-agents/" target="_blank">Salesforce</a> predicts brand identity will be defined by AI agent quality: &ldquo;Your AI agent <em>is</em> your brand experience.&rdquo;</p>`,

  `<p>MCP has become the de facto standard for agent-tool integration in 18 months. Announced by <a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">Anthropic</a><sup class="fn"><a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">[3]</a><span class="tip">Anthropic &mdash; Model Context Protocol (MCP) and agentic coding trends.</span></sup> November 2024, adopted by OpenAI and Google, donated to the Linux Foundation December 2025. <strong>1,000+ community servers, 50+ enterprise partners.</strong></p>
   <p>But the security story is alarming. RSA Conference 2026: fewer than <strong>4% of MCP submissions</strong> focus on opportunity &mdash; the rest focus on security risk. &ldquo;Shadow agents&rdquo; &mdash; unvetted MCP-connected agents accessing production data from developer laptops &mdash; are an emerging threat.</p>
   <p>The 2026 roadmap prioritizes enterprise readiness: auth, observability, gateway patterns. <a href="https://www.cio.com/article/4136548/why-model-context-protocol-is-suddenly-on-every-executive-agenda.html" target="_blank">CIO magazine</a>: MCP &ldquo;shifts the question from what an AI system can <em>see</em> to what it can <em>do.</em>&rdquo;</p>`,

  `<p>The widest disagreement in the entire survey: <strong>when will agents achieve genuine autonomy?</strong></p>
   <p><a href="https://ai-2027.com/" target="_blank">AI 2027</a><sup class="fn"><a href="https://ai-2027.com/" target="_blank">[4]</a><span class="tip">AI 2027 scenario &mdash; predicts agents doing full SWE jobs by mid-2027.</span></sup> says 18 months to agents doing full SWE jobs. <a href="https://sloanreview.mit.edu/article/five-genai-trends-to-watch-in-2025/" target="_blank">Davenport/Bean</a><sup class="fn"><a href="https://sloanreview.mit.edu/article/five-genai-trends-to-watch-in-2025/" target="_blank">[5]</a><span class="tip">MIT Sloan Review &mdash; Davenport &amp; Bean on GenAI trends; 5-year agent timeline.</span></sup> say 5 years for most business transactions. Karpathy says 10 years. Production data (10-step limit, 68% human intervention) suggests the longer timelines are more realistic &mdash; unless there&rsquo;s a discontinuous capability jump.</p>
   <p><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a><sup class="fn"><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">[6]</a><span class="tip">Goldman Sachs &mdash; AI as operating system; agents as infrastructure.</span></sup> frames the transition differently: AI models are becoming &ldquo;operating systems that independently access tools.&rdquo; The question isn&rsquo;t when agents become autonomous but when they become <em>infrastructure.</em></p>`,

  `<p><a href="https://www.ibm.com/think/insights/ai-leaders-goals-2026" target="_blank">IBM&rsquo;s framework</a><sup class="fn"><a href="https://www.ibm.com/think/insights/ai-leaders-goals-2026" target="_blank">[7]</a><span class="tip">IBM Think &mdash; agentic AI framework: KPIs, ROI, and runtime accountability.</span></sup>: the proof-of-concept phase is <strong>over.</strong> Every agentic program needs KPIs, defensible ROI, and runtime accountability &mdash; not just observability. 70% of multi-agent systems should have narrow, focused roles by 2027.</p>
   <p>The production study adds: start internal (higher error tolerance), limit to &le;10 steps (that&rsquo;s what actually works), build for failure from day one (not after the pilot &ldquo;succeeds&rdquo;), and invest in integration before model quality. The companies that get agents to production treat it as a <strong>systems engineering problem</strong>, not an AI problem.</p>
   <p><a href="https://www.salesforce.com/news/stories/future-of-ai-agents-2026/" target="_blank">Salesforce</a>: trust in data is the #1 bottleneck, ahead of model capability or agent architecture.</p>`,

  `<p>Across ten sources, five points of convergence &mdash; and the unanimity on the integration bottleneck is striking:</p>
   <p><strong>1.</strong> Agents are strategically important AND overhyped &mdash; both simultaneously true. <strong>2.</strong> Integration, not model quality, is where projects die. <strong>3.</strong> Narrow tasks with clear metrics succeed; open-ended autonomy fails. <strong>4.</strong> MCP is becoming the standard, but security lags adoption. <strong>5.</strong> Production is nothing like demos: 10 steps, custom-built, human-evaluated.</p>`,

  `<p>Sources fracture on three questions that define the next 2-5 years:</p>
   <p><strong>Timeline to autonomy:</strong> 18 months (<a href="https://ai-2027.com/" target="_blank">AI 2027</a>) vs 5 years (Davenport) vs 10 years (Karpathy). Production data favors the longer estimates. <strong>Adoption rate:</strong> 11% in production (<a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a>) vs 57% (G2) &mdash; a gap that reveals how much &ldquo;agent in production&rdquo; is a definitional question. <strong>Failure rate floor:</strong> Gartner&rsquo;s 40% is already considered optimistic by production analysts citing 80-90% pilot failure.</p>
   <p>The unresolved question: will MCP achieve REST-like ubiquity, or will competing protocols fragment the ecosystem before enterprise adoption matures?</p>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>AI</em> Agents</h2></div>
   <h3>Why This Section Cuts Deepest</h3>
   <p>If <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">Section 1</a> (LLMs) told us the model is becoming a commodity, and <a href="s2-multimodal.dd.html" title="Multimodal &amp; Diffusion">Section 2</a> (Multimodal) told us capabilities keep expanding, Section 3 asks the question that actually matters for organizations: <em>can you deploy these capabilities into production workflows that deliver measurable business value?</em> The answer, in early 2026, is a qualified &ldquo;sometimes, barely, and at much higher cost than expected.&rdquo;</p>
   <p>This section is where the survey&rsquo;s key tensions become sharpest. Cost deflation from <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> should make agents cheap to run &mdash; but inference costs for multi-step agentic workflows are far higher than single-query chat. Model commoditization should make agents portable &mdash; but 85% of production agents are custom-built. Open-source should lower barriers &mdash; but integration with legacy enterprise systems is the real barrier, and open-source helps little there.</p>

   <h3>Source Assessment</h3>
   <p>Ten sources spanning analyst forecasts (Gartner, <a href="https://www.goldmansachs.com/insights/articles/ai-in-2026" target="_blank">Goldman Sachs</a>, <a href="https://www.cbinsights.com/" target="_blank">CB Insights</a>, <a href="https://www.forrester.com/" target="_blank">Forrester</a>), academic/practitioner analysis (<a href="https://sloanreview.mit.edu/" target="_blank">MIT Sloan</a>, <a href="https://azuretechinsider.com/" target="_blank">AzureTechInsider</a> production study), enterprise perspectives (IBM, <a href="https://www.salesforce.com/blog/ai-agents-predictions/" target="_blank">Salesforce</a>, <a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a>, G2), scenario forecasting (<a href="https://ai-2027.com/" target="_blank">AI 2027</a>), and infrastructure coverage (MCP ecosystem). The range of perspectives makes the points of convergence more meaningful &mdash; when <a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner&rsquo;s</a> analyst predictions, <a href="https://sloanreview.mit.edu/article/five-genai-trends-to-watch-in-2025/" target="_blank">MIT Sloan</a>&rsquo;s academic assessment, and a production deployment study all agree that integration is the bottleneck, that&rsquo;s robust.</p>
   <div class="callout"><strong>The thread from <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>:</strong> <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">Section 1</a> established that models are commoditizing and costs are collapsing. The natural prediction would be that deploying AI into production gets easier and cheaper. Section 3 explains why it doesn&rsquo;t: the model was never the hard part. The hard part is connecting a non-deterministic AI system to deterministic enterprise workflows, with appropriate governance, in production, at scale. That problem doesn&rsquo;t get cheaper when inference costs drop.</div>`,

  `<div class="detail-header"><div class="num">02</div><h2>The <em>Hype-Reality</em> Gap</h2></div>
   <p><a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner&rsquo;s</a> prediction deserves close reading because the specificity is unusual. Not &ldquo;some agents will fail&rdquo; but &ldquo;over 40% of agentic AI projects will be canceled or fail to reach production by the end of 2027, due to escalating costs, unclear business value, or inadequate risk controls.&rdquo; This is a prediction about projects that have already been funded and staffed &mdash; they will be killed, not just deprioritized.</p>
   <p>The explanation points to a structural problem, not a temporary one. Gartner analyst Anushree Verma: &ldquo;Most agentic AI projects right now are early stage experiments or proof of concepts that are mostly driven by hype and are often misapplied. This can blind organizations to the real cost and complexity of deploying AI agents at scale, stalling projects from moving into production.&rdquo;</p>

   <h3>Agent Washing</h3>
   <p>Gartner identifies a market-wide credibility problem: &ldquo;agent washing.&rdquo; Vendors are rebranding existing products &mdash; chatbots, RPA tools, AI assistants &mdash; as &ldquo;agents&rdquo; without adding genuine agentic capabilities (multi-step planning, autonomous tool use, error recovery, memory across interactions). Only about 130 of thousands of agentic AI vendors offer genuine capabilities. The rest are selling the same product with a new label.</p>
   <p>This matters because it pollutes the market signal. When an executive buys an &ldquo;agent&rdquo; that is actually a chatbot with a few API connectors, the inevitable disappointment is attributed to &ldquo;agents don&rsquo;t work&rdquo; rather than &ldquo;this wasn&rsquo;t actually an agent.&rdquo; The cycle feeds itself: overpromise &rarr; disappointment &rarr; budget cuts &rarr; slower adoption of tools that actually do work.</p>
   <h3>The <a href="https://www.forrester.com/" target="_blank">Forrester</a> Warning</h3>
   <p><a href="https://www.forrester.com/press-newsroom/forrester-predictions-2026/" target="_blank">Forrester</a> predicts 25% of planned AI spend will be deferred by 2027 due to ROI concerns. Combined with Gartner&rsquo;s 40% cancellation rate and <a href="https://www.spglobal.com/" target="_blank">S&amp;P Global</a>&rsquo;s finding that 42% of companies abandoned most AI initiatives in 2024 (up from 17% the prior year), the picture is of an industry entering a consolidation phase where only projects with clear, measurable returns survive. The money isn&rsquo;t disappearing &mdash; it&rsquo;s concentrating on narrower, proven use cases.</p>
   <div class="callout"><strong>The historical pattern:</strong> This hype-disillusionment arc has played out before in cloud computing (2008-2012), big data (2012-2016), and blockchain (2017-2020). In each case, the technology eventually delivered substantial value &mdash; but to fewer organizations, in narrower applications, and on a longer timeline than the peak-hype predictions. The question isn&rsquo;t whether agents will matter. It&rsquo;s whether your organization will be among the 60% that survive the trough or the 40% that cancel.</div>`,

   <h3>The 10-Step Limit</h3>
   <p>The 10-step finding deserves unpacking. It does not mean agents <em>can&rsquo;t</em> take more than 10 steps &mdash; in controlled settings, they can execute far longer chains. It means that in production, with real data, real edge cases, and real consequences for errors, 68% of the time the agent reaches a point within 10 steps where it either makes an error significant enough to require human correction, encounters a situation outside its training distribution, or hits an integration failure. The remaining 32% that go further tend to be in the most structured, best-integrated workflows &mdash; customer service scripts, data entry validation, document classification.</p>
   <p>This is not a model capability problem. A model that scores 72% on SWE-bench can reason through complex software problems. But reasoning through a problem and <em>executing the solution in a production environment</em> &mdash; with live APIs that return unexpected errors, databases that have undocumented fields, and upstream systems that occasionally time out &mdash; are different challenges. The model provides the intelligence; the system around it provides the reliability. And the system is where things break.</p>
   <h3>Why Teams Build Custom</h3>
   <p>The 85% custom-build rate surprised researchers. Generic agent frameworks (LangChain, CrewAI, AutoGen, etc.) promise rapid development and interoperability. In practice, production teams find that opinionated frameworks impose architectural decisions that conflict with their specific infrastructure, security requirements, and workflow patterns. The cost of learning and fighting the framework exceeds the cost of building from scratch. As one team put it: &ldquo;we&rsquo;re not rejecting external tools. We&rsquo;re rejecting external opinions about how our workflows should work.&rdquo;</p>
   <h3>Human Evaluation Dominance</h3>
   <p>The industry has invested years in automated benchmarks for agents (SWE-bench, GAIA, AgentBench, RE-Bench). Yet 74% of production systems rely primarily on human evaluation. Why? Because automated benchmarks measure task completion on clean, well-defined problems. Production success depends on nuance, context, and judgment that benchmarks miss: did the agent&rsquo;s response match the organization&rsquo;s tone? Did it handle the edge case gracefully? Did it escalate appropriately when uncertain? Automated metrics capture the easy part. The hard part &mdash; fitness for purpose in a specific organizational context &mdash; remains a human judgment call.</p>
   <div class="callout"><strong>The implication:</strong> Organizations evaluating agent solutions based on benchmark scores and demo performance may be measuring the wrong thing. The differentiator in production is integration quality, failure handling, and organizational fit &mdash; none of which appear in benchmarks. Vendor production deployment counts and average step counts before human intervention are more informative than SWE-bench scores.</div>`,

  `<div class="detail-header"><div class="num">04</div><h2>Where <em>Agents</em> Work</h2></div>

   <h3>Where the Money Is</h3>
   <p><a href="https://www.cbinsights.com/research/ai-agent-predictions-2026/" target="_blank">CB Insights</a> identifies five market segments with genuine revenue traction, not just VC interest. <strong>Multimodal customer service</strong> is the most mature, with 115+ companies competing and six private companies already exceeding $100M in revenue. The economics are straightforward: customer service is high-volume, highly structured, and already measured with clear KPIs (resolution time, containment rate, satisfaction). Agents can handle the structured 80% (password resets, order status, FAQ) and escalate the ambiguous 20% to humans.</p>
   <p><strong>Agent observability</strong> is perhaps the most interesting emerging segment. As organizations deploy more agents, the question &ldquo;what did this agent actually do?&rdquo; becomes critical for compliance, debugging, and security. <a href="https://www.cbinsights.com/" target="_blank">CB Insights</a> describes it as an &ldquo;M&amp;A battleground&rdquo; &mdash; larger platforms are acquiring observability startups to fill a gap their agent offerings can&rsquo;t address alone.</p>
   <h3>The Results When It Works</h3>
   <p><a href="https://www.g2.com/articles/enterprise-ai-agents-report" target="_blank">G2&rsquo;s</a> data from enterprises with production agents shows compelling numbers: median 40% reduction in cost per unit for mature workflows, 80% containment rate for customer service incidents (meaning 80% are resolved without human escalation), and 23% improvement in speed-to-market for marketing and development cycles. These are not marginal gains &mdash; they&rsquo;re transformative for the specific workflows where agents are deployed. The catch is in the phrase &ldquo;mature workflows&rdquo; &mdash; the gains come after significant investment in integration, training, and iteration. The path to &ldquo;mature workflow&rdquo; is where most projects die.</p>
   <div class="callout"><strong><a href="https://www.salesforce.com/news/stories/future-of-ai-agents-2026/" target="_blank">Salesforce&rsquo;s</a> prediction:</strong> &ldquo;Brand identity will be defined by AI agent quality &mdash; your AI agent IS your brand experience.&rdquo; If this proves right, agent capability becomes a competitive differentiator on par with product quality or customer service. The organizations that invest through the trough of disillusionment will emerge with brand-defining agent experiences that latecomers struggle to replicate.</div>`,

  `<div class="detail-header"><div class="num">05</div><h2>The <em>Integration</em> Layer</h2></div>
   <p>If the production study identified integration as the #1 failure mode, MCP is the industry&rsquo;s attempt to solve it. The Model Context Protocol, introduced by <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic</a> in November 2024, provides a standardized way for AI agents to connect to external tools, data sources, and other agents &mdash; replacing the custom connectors that make agent deployments brittle and expensive.</p>
   <p>The adoption velocity is remarkable. Within 18 months of announcement: adopted by OpenAI and Google DeepMind, donated to the Linux Foundation (via the <a href="https://www.linuxfoundation.org/press/anthropic-block-and-openai-co-found-agentic-ai-initiative" target="_blank">Agentic AI Foundation</a>, co-founded by Anthropic, Block, and OpenAI) in December 2025, and supported by 1,000+ community-built servers and 50+ enterprise partners including <a href="https://www.salesforce.com/blog/ai-agents-predictions/" target="_blank">Salesforce</a>, ServiceNow, and Workday. The <a href="https://blog.modelcontextprotocol.io/posts/2026-mcp-roadmap/" target="_blank">MCP lead maintainer</a>&rsquo;s March 2026 roadmap describes a protocol that &ldquo;runs in production at companies large and small, powers agent workflows, and is shaped by a growing community.&rdquo;</p>

   <h3>What MCP Solves</h3>
   <p>Before MCP, every agent-tool integration was a custom connector. Want your agent to read from Salesforce? Build a Salesforce connector. Want it to also write to Jira? Build a Jira connector. Want it to query a database? Another connector. Each one requires understanding the target API&rsquo;s authentication, rate limits, error handling, and data model. For an agent touching 10 systems, that&rsquo;s 10 custom integrations, each a potential failure point. This is the &ldquo;N&times;M integration problem&rdquo; &mdash; N agents times M tools &mdash; that made agent deployment prohibitively expensive for most organizations.</p>
   <p>MCP replaces this with a standardized protocol: build an MCP server for each tool once, and any MCP-compatible agent can use it. The agent doesn&rsquo;t need to know <a href="https://www.salesforce.com/news/stories/future-of-ai-agents-2026/" target="_blank">Salesforce&rsquo;s</a> API &mdash; it needs to know MCP&rsquo;s protocol. <a href="https://www.cio.com/article/4136548/why-model-context-protocol-is-suddenly-on-every-executive-agenda.html" target="_blank">CIO magazine</a> describes it: &ldquo;MCP lets you plug your existing stack of applications together without all of the annoying API integration work.&rdquo; Organizations report 40-60% faster agent deployment times with MCP compared to custom connectors.</p>
   <h3>What MCP Doesn&rsquo;t Solve (Yet)</h3>
   <p>The 2026 MCP roadmap (published March 2026 by lead maintainer David Soria Parra) is remarkably transparent about gaps. The top four priorities: <strong>transport scalability</strong> (horizontal scaling without holding state &mdash; stateful sessions fight with load balancers), <strong>agent communication</strong> (agents talking to other agents, not just tools), <strong>governance maturation</strong> (contributor ladder, delegation model for working groups), and <strong>enterprise readiness</strong> (audit trails, SSO-integrated auth, gateway patterns, configuration portability).</p>
   <p>The <a href="https://workos.com/blog/2026-mcp-roadmap-enterprise-readiness" target="_blank">WorkOS</a> analysis is pointed: &ldquo;If an IT administrator can&rsquo;t manage MCP server access from the same console where they manage everything else, adoption stalls at the security review.&rdquo; Multi-tenancy, rate limiting, and cost attribution are not yet addressed at the protocol level. These are exactly the features that enterprise deployments require and that developer-focused protocols typically add too late.</p>
   <h3>Shadow Agents</h3>
   <p>The most urgent security concern: &ldquo;shadow agents.&rdquo; Analogous to &ldquo;shadow IT&rdquo; of the cloud era, these are MCP-connected agents running on developer laptops or &ldquo;servers in closets&rdquo; that access production data systems without going through security review, access controls, or compliance checks. The protocol makes this easy &mdash; install an MCP server, connect your agent, and you have access to whatever the server exposes. The security gap between MCP&rsquo;s ease of use and its governance capabilities is a vulnerability that organizations are only beginning to recognize.</p>
   <div class="callout"><strong>The REST analogy:</strong> MCP is often compared to REST &mdash; a structured pattern for AI-tool interaction, the way REST was a pattern for web APIs. If the analogy holds, MCP will become invisible infrastructure that powers everything without most users knowing its name. But REST took a decade to mature from Roy Fielding&rsquo;s dissertation (2000) to widespread enterprise adoption. MCP has been public for 16 months and is already in production. The question is whether it can build enterprise-grade security and governance at the speed of adoption, or whether it will be another protocol that developers love and security teams hate.</div>`,

   <h3>The <a href="https://ai-2027.com/" target="_blank">AI 2027</a> Case</h3>
   <p><a href="https://ai-2027.com/" target="_blank">Kokotajlo, Lifland, Larsen, and Dean</a>&rsquo;s AI 2027 scenario is the most detailed aggressive forecast. Their argument: AI-accelerated AI R&amp;D creates a positive feedback loop where each improvement in AI capability accelerates the next improvement. They predict agents doing full software engineering jobs by mid-2027, stock markets up 30% in 2026 driven by AI companies, and the junior SWE job market &ldquo;in turmoil.&rdquo;</p>
   <p>The critique: the scenario assumes that model capability improvements translate directly to production deployment at scale. The production data suggests a large gap between &ldquo;can do the task in a controlled setting&rdquo; and &ldquo;can reliably do the task in production, integrated with real systems, handling edge cases, at enterprise scale.&rdquo; A model that passes SWE-bench doesn&rsquo;t necessarily replace a software engineer &mdash; it might be a powerful tool that a software engineer uses to work 2&times; faster.</p>
   <h3>The Conservative Case</h3>
   <p><a href="https://karpathy.ai/" target="_blank">Karpathy&rsquo;s</a> 10-year estimate and the production study&rsquo;s 10-step finding suggest a different trajectory: agents improve steadily but remain human-supervised tools rather than autonomous replacements. The constraint is not model intelligence but the accumulated complexity of integrating with real-world systems, handling edge cases, maintaining reliability, and earning organizational trust. These are problems that get solved incrementally, not through breakthroughs.</p>
   <h3><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a>&rsquo;s Reframe</h3>
   <p>Goldman Sachs offers perhaps the most useful framing: the question isn&rsquo;t &ldquo;when will agents be autonomous?&rdquo; but &ldquo;when will AI models become operating systems that independently access tools?&rdquo; This reframes agents not as replacements for human workers but as a new kind of infrastructure &mdash; an OS layer that sits between users and tools, routing requests, maintaining context, and orchestrating multi-step workflows. The timeline for agents-as-infrastructure is shorter than agents-as-autonomous-workers, because infrastructure doesn&rsquo;t need to handle every edge case &mdash; it needs to handle the common cases reliably and escalate the rest.</p>
   <div class="callout"><strong>How to read the timeline disagreement:</strong> When well-informed people with access to the same data produce a 6&times; spread in predictions, the honest conclusion is not that one side is right. It&rsquo;s that the outcome depends on variables we cannot currently predict &mdash; the pace of integration infrastructure maturation, the tolerance of enterprises for AI errors, and whether there&rsquo;s a discontinuous capability jump or steady incremental progress. Position for the middle scenario (3-5 years) while monitoring the signals that would indicate the aggressive scenario (1-2 years) is playing out.</div>`,

  `<div class="detail-header"><div class="num">07</div><h2>What <em>Actually</em> Works</h2></div>
   <p>Synthesizing across all ten sources, a practical playbook emerges for organizations that want to be in the 60% that survive rather than the 40% that cancel.</p>
   <h3>IBM&rsquo;s Framework</h3>
   <p><a href="https://www.ibm.com/think/insights/ai-leaders-goals-2026" target="_blank">IBM&rsquo;s position</a> is that the proof-of-concept phase is over. The bar has moved from &ldquo;can we build an agent that does X?&rdquo; to &ldquo;does this agent deliver measurable ROI in production?&rdquo; Their specific guidance: every agentic program needs KPIs and defensible ROI. 70% of multi-agent systems should have narrow, focused roles by 2027. Observability alone is insufficient &mdash; you need runtime accountability (not just seeing what an agent did, but being able to explain <em>why</em> and demonstrate compliance). <a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner</a> adds: &ldquo;use AI agents when decisions are needed, automation for routine workflows, and assistants for simple retrieval.&rdquo;</p>
   <h3>The Production Study&rsquo;s Practical Advice</h3>
   <p>From the <a href="https://azuretechinsider.com/" target="_blank">AzureTechInsider</a> analysis of real deployments: <strong>Start internal.</strong> Internal users provide rapid feedback, tolerate occasional errors, and help refine the system before external deployment. <strong>Limit to &le;10 steps.</strong> That&rsquo;s what actually works reliably. Design workflows that complete within this constraint rather than building 50-step chains that break. <strong>Build for failure from day one.</strong> Not as an afterthought when the pilot is &ldquo;ready.&rdquo; Graceful error handling, human escalation paths, and rollback mechanisms must be in the initial architecture. <strong>Invest in integration before model quality.</strong> The model works. The plumbing doesn&rsquo;t. Spend your engineering budget on connectors, auth, and error handling &mdash; not on chasing a 2% better benchmark score.</p>
   <h3><a href="https://www.salesforce.com/news/stories/future-of-ai-agents-2026/" target="_blank">Salesforce&rsquo;s</a> Additions</h3>
   <p>Two insights from <a href="https://www.salesforce.com/blog/ai-agents-predictions/" target="_blank">Salesforce</a>. First: <strong>simulation &ldquo;gyms&rdquo; for agent training.</strong> Before deploying agents against production systems, train them in simulated environments that replicate your actual infrastructure, data patterns, and edge cases. This catches failures before they reach users. Second: <strong>trust in data is the #1 bottleneck</strong> &mdash; ahead of model capability, agent architecture, or integration complexity. If your agent can&rsquo;t trust its input data (inconsistent definitions, stale records, missing fields), it will produce unreliable outputs regardless of how sophisticated its reasoning is.</p>
   <div class="callout"><strong>The uncomfortable truth:</strong> The companies getting agents to production are treating it as a <strong>systems engineering problem</strong>, not an AI problem. They spend more time on plumbing than on prompts. They invest in failure handling before feature building. They measure success by cost-per-resolution, not by benchmark scores. This is unsexy work that doesn&rsquo;t demo well &mdash; which is exactly why most organizations underinvest in it and end up in the 40%.</div>`,

  `<div class="detail-header"><div class="num">08</div><h2>What <em>Everyone</em> Agrees On</h2></div>
   <p>Five convergence points across ten sources with very different methodologies and perspectives:</p>
   <p><strong>1. Agents are strategically important AND overhyped.</strong> Every source &mdash; from the most bullish (<a href="https://ai-2027.com/" target="_blank">AI 2027</a>) to the most cautious (<a href="https://sloanreview.mit.edu/" target="_blank">Davenport/Bean</a>) &mdash; agrees that agents represent a genuine paradigm shift in how AI delivers value. Every source also acknowledges that current expectations are ahead of current capabilities. Both of these things are simultaneously true, which is the defining characteristic of a technology in the peak-to-trough transition.</p>
   <p><strong>2. Integration, not model quality, is the bottleneck.</strong> This is the single most actionable finding. The LLM works. It has been working for two years. What doesn&rsquo;t work is connecting it to enterprise systems in a reliable, secure, governable way. The production study, IBM, <a href="https://www.salesforce.com/blog/ai-agents-predictions/" target="_blank">Salesforce</a>, and the MCP ecosystem coverage all converge on this point from different angles. If your agent project is spending more on model evaluation than on integration engineering, your priorities are inverted.</p>
   <p><strong>3. Narrow beats general.</strong> Agents that do one thing well (answer tier-1 support tickets, classify documents, validate data entry) deliver measurable value. Agents that attempt to handle open-ended, cross-system workflows reliably fail. The successful deployment pattern is to start with the narrowest possible task that has clear success criteria, prove it works, then carefully expand scope.</p>
   <p><strong>4. MCP is becoming the standard.</strong> Despite being only 16 months old, MCP has achieved a level of adoption (OpenAI, Google, Linux Foundation, 1,000+ servers, 50+ enterprise partners) that makes it the clear frontrunner for agent integration infrastructure. But security and governance capabilities lag far behind adoption, creating a gap that organizations need to manage actively.</p>
   <p><strong>5. Production is nothing like demos.</strong> 10 steps before human intervention. 85% custom-built. 74% evaluated by humans. Internal use cases dominate. These numbers describe a technology that works but is far from the autonomous, general-purpose vision that vendor marketing promotes.</p>
   <div class="callout"><strong>Connection to <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a>:</strong> The model commoditization from <a href="s1-llms.dd.html" title="LLMs &amp; Foundation Models">S1</a> has a direct implication for agents: if all models are within 5% of each other, the agent&rsquo;s competitive advantage cannot come from model selection. It must come from integration quality, workflow design, and domain-specific training data. This is exactly what the production study confirms &mdash; and why the 85% custom-build rate makes strategic sense.</div>`,

  `<div class="detail-header"><div class="num">09</div><h2>Where Sources <em>Disagree</em></h2></div>
   <h3>Timeline to Meaningful Autonomy</h3>
   <p>The 6&times; spread (18 months to 10 years) is the largest disagreement in the survey. <a href="https://ai-2027.com/" target="_blank">AI 2027</a> represents the discontinuous-jump camp: if AI R&amp;D accelerates AI R&amp;D, the feedback loop could produce rapid, unexpected capability gains. Karpathy represents the incremental camp: the hard part is not model intelligence but the accumulated work of integrating with the messy real world. <a href="https://sloanreview.mit.edu/" target="_blank">Davenport/Bean</a> are in the middle: 5 years, with agents handling most routine business transactions. Production data (10 steps, 68% human intervention) is consistent with the longer timelines.</p>
   <p>What would resolve this: watch for agents that consistently execute &gt;50 steps in production without human intervention across diverse enterprise environments. If this happens by end of 2026, the aggressive timeline is plausible. If not, the 5-10 year estimates are more realistic.</p>
   <h3>Adoption Rate</h3>
   <p><a href="https://www.deloitte.com/us/en/what-we-do/capabilities/applied-artificial-intelligence/content/state-of-ai-in-the-enterprise.html" target="_blank">Deloitte</a> says 11% of organizations have agents in production. G2 says 57%. The gap is almost certainly definitional: G2 surveys enterprise software companies building AI tools (selection bias) and may count any AI-powered automation as an &ldquo;agent.&rdquo; Deloitte surveys broader enterprise populations with a stricter definition of &ldquo;agentic AI.&rdquo; The practical implication: don&rsquo;t compare yourself to &ldquo;57% of companies have agents&rdquo; without understanding what &ldquo;agent&rdquo; means in that survey&rsquo;s context.</p>
   <h3>Failure Rate Floor</h3>
   <p><a href="https://www.gartner.com/en/articles/gartner-top-strategic-predictions-for-2026-and-beyond" target="_blank">Gartner&rsquo;s</a> 40% cancellation rate is already considered optimistic by analysts closer to production. The <a href="https://azuretechinsider.com/" target="_blank">AzureTechInsider</a> study implies much higher failure rates at the pilot-to-production transition (consistent with the 88% figure cited by other analysts). <a href="https://www.spglobal.com/" target="_blank">S&amp;P Global</a> found 42% of companies abandoned most AI initiatives in 2024, up from 17% the prior year &mdash; and that was for all AI, not just the harder agentic category. If 40% turns out to be the floor rather than the ceiling, the trough of disillusionment will be deeper than Gartner projects.</p>
   <h3>MCP&rsquo;s Future</h3>
   <p>Will MCP achieve REST-like ubiquity, or will competing protocols (Google&rsquo;s A2A, <a href="https://www.ibm.com/think/" target="_blank">IBM&rsquo;s</a> ACP, others) fragment the ecosystem? MCP has a head start in adoption, neutral governance (Linux Foundation), and multi-vendor support. But enterprise requirements (multi-tenancy, fine-grained auth, cost attribution) are not yet in the spec, and competitors may target those gaps. The 2026 roadmap&rsquo;s enterprise readiness focus suggests the MCP community recognizes this risk. Resolution: if MCP ships enterprise-grade auth and observability by end of 2026, fragmentation becomes unlikely. If it doesn&rsquo;t, enterprise buyers will default to vendor-specific solutions.</p>
   <div class="callout"><strong>The meta-lesson from these disagreements:</strong> the uncertainty is not about whether agents will work. All sources agree they will &mdash; eventually. The uncertainty is about <em>when</em> and <em>at what cost</em>. For organizations making investment decisions today, the safe bet is to invest in integration infrastructure (especially MCP), start with narrow use cases that deliver measurable ROI, and plan for a 3-5 year maturation cycle rather than the 12-18 month timeline that vendor marketing implies.</div>`

    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});



</script>
</body>
</html>
