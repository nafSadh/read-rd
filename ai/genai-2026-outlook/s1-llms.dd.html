<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S1: LLMs & Foundation Models — GenAI 2026 Outlook</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}

.v-col ul{list-style:none;padding:0}

.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}

.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}

<script>
const sections = [
  { num: '01', short: 'Overview', title: '<em>LLMs</em> &amp; Foundation Models' },
  { num: '02', short: 'Benchmarks', title: 'The <em>Benchmark</em> Crisis' },
  { num: '03', short: 'Cost Curve', title: 'The <em>Deflation</em> Curve' },

const summaries = [
  `<p>Here is what eight sources — from <a href="https://aiindex.stanford.edu/report/" target="_blank">Stanford&rsquo;s annual census</a><sup class="fn"><a href="https://aiindex.stanford.edu/report/" target="_blank">[1]</a><span class="tip">Stanford AI Index 2025 &mdash; annual census of AI benchmarks, investment, adoption, and policy.</span></sup> to <a href="https://epoch.ai/" target="_blank">Epoch AI</a><sup class="fn"><a href="https://epoch.ai/" target="_blank">[2]</a><span class="tip">Epoch AI &mdash; supercomputer dataset of 500+ systems tracking compute trends.</span></sup>&rsquo;s supercomputer dataset — converge on: the raw capability story is <em>almost boring now.</em> Models keep getting better. That part is settled.</p>
   <p>The interesting stories in 2026 are about what happens <strong>around</strong> the models. A 280&times; cost collapse that turns a luxury into a commodity. A power grid that can&rsquo;t keep up. A Chinese open-source movement that is quietly rewriting the geopolitical map. And an efficiency counter-narrative that asks whether we even need the biggest models at all.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">280&times;</div><div class="sl">cost collapse in 18 months</div></div>
     <div class="st"><div class="sv">142&times;</div><div class="sl">smaller model, same score</div></div>
     <div class="st"><div class="sv">5.4%</div><div class="sl">gap between #1 and #10 model</div></div>
     <div class="st"><div class="sv">9 GW</div><div class="sl">projected 2030 cluster power</div></div>
   </div>`,

  `<p>In 2023, researchers built three benchmarks &mdash; MMMU, GPQA, SWE-bench &mdash; specifically designed to stay hard for years. By the end of 2024, they were effectively conquered. SWE-bench went from <strong>4.4% to 71.7%</strong> in twelve months. That&rsquo;s not incremental improvement. That&rsquo;s a phase transition.</p>
   <p>But here is the uncomfortable question <a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">Stanford&rsquo;s Vanessa Parli</a><sup class="fn"><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">[3]</a><span class="tip">Stanford HAI &mdash; AI experts predict trends for 2026.</span></sup> is raising: &ldquo;Are we measuring the right thing? Are those benchmarks compromised?&rdquo; When benchmarks are saturated faster than they can be designed, the validity of the underlying measurements warrants scrutiny.</p>
   <p>Meanwhile, the gap between the #1 and #10 model on Chatbot Arena shrank from <strong>11.9% to 5.4%</strong> in a single year. The top two models? 0.7% apart. The market is commoditizing in real time.</p>`,

  `<p>One figure captures the economic transformation more than any other: GPT-3.5-level inference cost $20 per million tokens in November 2022. By October 2024, the same capability cost <strong>seven cents.</strong> That&rsquo;s a 280-fold reduction in 18 months.</p>
   <p>This isn&rsquo;t a one-off. Hardware price-performance improves 40% per year. Algorithmic efficiency gains deliver 3&times; less compute per year for the same result. The curves are compounding on each other. <a href="https://www.ibm.com/think/" target="_blank">IBM&rsquo;s</a><sup class="fn"><a href="https://www.ibm.com/think/" target="_blank">[4]</a><span class="tip">IBM Think &mdash; industry interpretation and AI trends analysis.</span></sup> prediction: &ldquo;We&rsquo;re going to hit a commodity point for AI models in 2026.&rdquo;</p>
   <p>When the top ten models are within 5% of each other and the cost of running them drops 10&times; a year, the question stops being <em>which model</em> and becomes <em>which system.</em></p>`,

  `<p>The biggest AI supercomputer in January 2019 was Oak Ridge&rsquo;s Summit at 13 megawatts. Today xAI&rsquo;s Colossus draws <strong>280 megawatts</strong> &mdash; and it uses mobile generators because the Memphis grid can&rsquo;t supply enough power. That single fact illustrates where the constraint has moved.</p>
   <p><a href="https://epoch.ai/blog/ai-supercomputer-landscape" target="_blank">Epoch AI</a><sup class="fn"><a href="https://epoch.ai/blog/ai-supercomputer-landscape" target="_blank">[2]</a><span class="tip">Epoch AI &mdash; AI supercomputer landscape analysis and projections.</span></sup>&rsquo;s projection: if trends continue, the leading 2030 supercomputer needs <strong>2 million chips, costs $200 billion, and draws 9 gigawatts</strong> &mdash; the output of nine nuclear reactors, the electricity demand of a mid-sized country. Power, not compute, is the binding physical limit on AI scaling.</p>
   <p>Industry now owns <strong>80%</strong> of all AI compute (up from 40% in 2019). The US hosts 75% of supercomputers globally. This is not just a technology race &mdash; it is an infrastructure race.</p>`,

  `<p>Context windows exploded from 8K tokens (late 2022) to 2 million (early 2024) &mdash; and then <em>stopped.</em> <a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">Anthropic</a><sup class="fn"><a href="https://www.anthropic.com/research/agentic-coding-trends-2026" target="_blank">[5]</a><span class="tip">Anthropic &mdash; agentic coding trends 2026.</span></sup>&rsquo;s Claude hasn&rsquo;t changed since the 200K of Claude 2.1. GPT-5.2 shipped with 400K, which is <em>smaller</em> than GPT-4.1. Google retreated from 2M back to 1M.</p>
   <p>This isn&rsquo;t a pause. It&rsquo;s a plateau with structural causes. The transformer architecture hits diminishing returns at extreme lengths. &ldquo;Context rot&rdquo; degrades quality well before the window limit is reached. And for most real tasks, a smaller window with better retrieval is both cheaper and more effective.</p>
   <p>The bet: general-purpose context windows stay at ~1M through 2026. The real innovation moves to retrieval, memory architectures, and possibly entirely different models.</p>`,

  `<p><a href="https://www.technologyreview.com/" target="_blank">MIT Technology Review</a><sup class="fn"><a href="https://www.technologyreview.com/" target="_blank">[6]</a><span class="tip">MIT Technology Review &mdash; 10 Breakthrough Technologies 2026.</span></sup>, early 2026: &ldquo;Expect more Silicon Valley apps to <em>quietly ship on top of Chinese open models.</em>&rdquo; Qwen2.5-1.5B alone has 8.85 million downloads. DeepSeek&rsquo;s open-weight playbook was so effective it forced even OpenAI to release open-source models for the first time.</p>
   <p>The <a href="https://aiindex.stanford.edu/report/" target="_blank">Stanford numbers</a><sup class="fn"><a href="https://aiindex.stanford.edu/report/" target="_blank">[1]</a><span class="tip">Stanford AI Index 2025 &mdash; US-China benchmark comparison data.</span></sup> tell the geopolitical story: the US-China benchmark gap collapsed from double digits to <strong>near parity</strong> in one year. China leads in publications and patents. But here&rsquo;s the twist &mdash; Chinese firms gained this ground largely through <em>openness</em>, winning trust in the global AI community even as governments escalate antagonism.</p>
   <p><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">Stanford&rsquo;s Parli</a><sup class="fn"><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">[3]</a><span class="tip">Stanford HAI &mdash; AI experts predict trends for 2026.</span></sup>: &ldquo;I don&rsquo;t think we can take for granted that the US is always going to be at the top of these charts.&rdquo;</p>`,

  `<p><a href="https://www.nngroup.com/articles/large-world-models/" target="_blank">Nielsen&rsquo;s</a><sup class="fn"><a href="https://www.nngroup.com/articles/large-world-models/" target="_blank">[8]</a><span class="tip">Nielsen Norman Group &mdash; Large World Models prediction for 2026.</span></sup> prediction crystallizes the shift: by end of 2026, &ldquo;frontier model&rdquo; will mean a system that <strong>speaks, listens, sees, imagines, and edits</strong> &mdash; not a text engine with attachments bolted on. Text-only AI will be &ldquo;as archaic as a DOS command line.&rdquo;</p>
   <p>The evidence is already here. Video models generate synchronized audio. Image models render typography. Music models produce separable stems. World models simulate physics in real time. The modalities are no longer separate tracks &mdash; they are converging into a single medium.</p>
   <p>The architectural question: <strong>early fusion</strong> (one model, all senses) vs <strong>late fusion</strong> (separate models, integrated). Stanford expects clarity within a year.</p>`,

  `<p><a href="https://arxiv.org/abs/2409.15790" target="_blank">NVIDIA&rsquo;s</a><sup class="fn"><a href="https://arxiv.org/abs/2409.15790" target="_blank">[7]</a><span class="tip">NVIDIA &mdash; SLM position paper arguing 7B models are 10-30&times; more efficient for agentic tasks.</span></sup> own position paper makes the counterintuitive case: for most agentic tasks, a <strong>7-billion-parameter model</strong> is not just adequate &mdash; it&rsquo;s 10-30&times; more efficient. &ldquo;Insisting on LLMs for all tasks reflects a misallocation of computational resources.&rdquo;</p>
   <p>This aligns with <a href="https://hai.stanford.edu/news/stanford-hai-experts-predict-ai-2026" target="_blank">Stanford&rsquo;s Landay</a><sup class="fn"><a href="https://hai.stanford.edu/news/stanford-hai-experts-predict-ai-2026" target="_blank">[3]</a><span class="tip">Stanford HAI &mdash; AI experts predict trends for 2026.</span></sup>: &ldquo;We have huge models, but we&rsquo;ve seen better models that are smaller. We&rsquo;ve reached some amount of peak data &mdash; both because we&rsquo;re running out and because the data is poor quality.&rdquo;</p>
   <p>IBM frames 2026 as the year of <strong>frontier vs. efficient</strong>. Edge AI moves from hype to reality. The question isn&rsquo;t just &ldquo;how big?&rdquo; but &ldquo;how smart per watt?&rdquo;</p>`,

  `<p>Across eight sources, five points of convergence emerge &mdash; and the consistency is striking given how differently these sources approach AI.</p>
   <p><strong>1.</strong> Cost deflation is real, compounding, and the most robust finding. <strong>2.</strong> The top models are commoditizing &mdash; competition moves to systems. <strong>3.</strong> Open-source is winning strategically &mdash; trust through transparency. <strong>4.</strong> Power is the binding physical constraint. <strong>5.</strong> Efficiency matters as much as scale &mdash; smaller, better-trained models beat raw parameter counts.</p>
   <p>The meta-finding: the <em>model itself</em> is becoming the least interesting part of the AI stack. Integration, orchestration, data quality, and power access are where the real advantages lie.</p>`,

  `<p>Sources fracture on three fundamental questions that will define the next two years:</p>
   <p><strong>Is this a bubble?</strong> <a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">Stanford&rsquo;s Landay</a><sup class="fn"><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">[3]</a><span class="tip">Stanford HAI &mdash; AI experts predict trends for 2026.</span></sup> calls it &ldquo;very speculative.&rdquo; <a href="https://www.understandingai.org/" target="_blank">Understanding AI</a><sup class="fn"><a href="https://www.understandingai.org/" target="_blank">[9]</a><span class="tip">Understanding AI &mdash; independent AI analysis by Timothy B. Lee.</span></sup>&rsquo;s Lee counters that companies are racing to fill customer orders. <strong>Will context windows break through?</strong> Williams says the transformer architecture has hit its limit. Others bet on coding models as the exception. <strong>How fast does multimodal arrive?</strong> Nielsen says end of 2026. Others are more cautious.</p>
   <p>What&rsquo;s notable isn&rsquo;t just the disagreements &mdash; it&rsquo;s that reasonable, well-informed people can look at the same data and reach opposite conclusions. That indicates a genuinely uncertain moment in the field.</p>`
];


const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>LLMs</em> & Foundation Models</h2></div><h3>Why This Section Matters</h3>
   <p>Of the eight sections in this survey, this one may seem like the most familiar territory &mdash; LLMs, benchmarks, costs, compute. But the familiarity is deceptive. The discourse around LLMs in early 2026 has shifted in a way that most commentary hasn&rsquo;t caught up to. The action is no longer in what models <em>can do</em> (which keeps improving, predictably) but in what the improving models <em>mean</em> for the competitive landscape. The model, as a standalone artifact, is losing strategic importance. Everything around it &mdash; data, integration, orchestration, power &mdash; is gaining.</p>
   <p>This is a crucial insight for the rest of the survey. When the agents section (<a href="s3-agents.dd.html" title="AI Agents">S3</a>) discusses a 40% failure rate, or workplace adoption (<a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>) lags behind hype, the reason traces back here: the model works fine; it&rsquo;s the <em>system</em> around the model that fails.</p>

   <h3>Source Assessment</h3>
   <p>Eight sources, each with a distinct vantage point. <strong><a href="https://aiindex.stanford.edu/report/" target="_blank">Stanford AI Index 2025</a></strong><sup class="fn"><a href="https://aiindex.stanford.edu/report/" target="_blank">[1]</a><span class="tip">Stanford AI Index 2025 &mdash; comprehensive annual report on AI benchmarks, investment, and policy.</span></sup> provides the canonical annual dataset &mdash; it&rsquo;s the closest thing to a census of the field, tracking benchmarks, investment, adoption, and policy across hundreds of data points. <strong><a href="https://epoch.ai/" target="_blank">Epoch AI</a></strong><sup class="fn"><a href="https://epoch.ai/" target="_blank">[2]</a><span class="tip">Epoch AI &mdash; compute trends, supercomputer dataset of 500+ systems.</span></sup> brings hardware rigor &mdash; their supercomputer dataset of 500+ systems is the most comprehensive publicly available analysis of the physical infrastructure underlying AI. <strong><a href="https://llm-stats.com/" target="_blank">LLM-Stats</a></strong><sup class="fn"><a href="https://llm-stats.com/" target="_blank">[10]</a><span class="tip">LLM-Stats &mdash; real-time tracking of 500+ models with pricing data.</span></sup> tracks 500+ models with real-time pricing. <strong><a href="https://www.technologyreview.com/" target="_blank">MIT Technology Review</a></strong><sup class="fn"><a href="https://www.technologyreview.com/" target="_blank">[6]</a><span class="tip">MIT Technology Review &mdash; 10 Breakthrough Technologies and industry analysis.</span></sup> and <strong><a href="https://www.ibm.com/think/" target="_blank">IBM Think</a></strong><sup class="fn"><a href="https://www.ibm.com/think/" target="_blank">[4]</a><span class="tip">IBM Think &mdash; AI trends and enterprise adoption analysis.</span></sup> provide industry interpretation. <strong><a href="https://arxiv.org/abs/2409.15790" target="_blank">NVIDIA&rsquo;s SLM paper</a></strong><sup class="fn"><a href="https://arxiv.org/abs/2409.15790" target="_blank">[7]</a><span class="tip">NVIDIA SLM paper &mdash; argues 7B models are 10-30&times; more efficient for agentic tasks.</span></sup> is notable as an argument <em>against</em> the interests of its publisher. <strong><a href="https://www.understandingai.org/" target="_blank">Understanding AI</a></strong><sup class="fn"><a href="https://www.understandingai.org/" target="_blank">[9]</a><span class="tip">Understanding AI &mdash; independent analysis by Timothy B. Lee.</span></sup> offers independent analysis. <strong><a href="https://www.nngroup.com/" target="_blank">Nielsen/UX Tigers</a></strong><sup class="fn"><a href="https://www.nngroup.com/" target="_blank">[8]</a><span class="tip">Nielsen Norman Group &mdash; Large World Models and multimodal AI thesis.</span></sup> provides the multimodal thesis.</p>
   <p>What this set does <em>not</em> include: primary technical papers on architecture (transformer alternatives, state-space models), training recipes, or alignment methods. Those are covered in depth in the companion <a href="../agentic-lm-survey/s1-reason.dd.html">Agentic LLM Survey</a>. This section is about the <em>discourse</em> &mdash; what informed observers are saying about where LLMs stand and where they&rsquo;re going.</p>
   <h3>How to Read This Section</h3>
   <p>Each sub-section pairs a summary (center panel) with analytical depth (this right panel). The summaries provide the story arc in 2-3 paragraphs. The details provide the evidence, the methodology caveats, the connections between findings, and the implications the summaries do not spell out. For a quick overview, the summaries suffice. For a thorough understanding of the underlying dynamics, the details are essential.</p>
   <div class="callout"><strong>The thread connecting everything:</strong> Four of the five points of consensus (cost deflation, commoditization, open-source, efficiency) point in the same direction &mdash; away from model capability as a competitive advantage, toward system-level integration as the differentiator. The fifth (power constraint) determines who gets to play the game at all. This thread connects the analysis throughout.</div>`,
  `<div class="detail-header"><div class="num">02</div><h2>The <em>Benchmark</em> Crisis</h2></div><h3>The Numbers That Broke the Tests</h3>
   <p><a href="https://aiindex.stanford.edu/report/" target="_blank">Stanford&rsquo;s AI Index</a><sup class="fn"><a href="https://aiindex.stanford.edu/report/" target="_blank">[1]</a><span class="tip">Stanford AI Index 2025 &mdash; annual benchmark performance tracking.</span></sup> tracks benchmark performance annually. In 2023, the research community introduced three new benchmarks specifically designed to test the limits of frontier systems and remain challenging for years: MMMU (Massive Multitask Multimodal Understanding), GPQA (Graduate-level Google-Proof QA), and SWE-bench (real-world software engineering). The intent was explicit: these were supposed to be the hard problems that would take time to crack.</p>
   <p>By the end of 2024, all three were effectively conquered. MMMU gained 18.8 percentage points. GPQA gained 48.9. SWE-bench &mdash; where AI systems had to understand codebases, diagnose bugs, and write functional fixes &mdash; went from 4.4% to 71.7% in twelve months. These are not incremental improvements on a mature curve. They represent qualitative phase transitions in capability. A system that solves 4% of real software engineering problems is a toy. A system that solves 72% is a colleague.</p>

   <h3>But What Are Benchmarks Actually Measuring?</h3>
   <p><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">Stanford&rsquo;s Parli</a><sup class="fn"><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">[3]</a><span class="tip">Stanford HAI predictions for 2026.</span></sup> raises the question that should make everyone pause: &ldquo;Are we measuring the right thing? Are those benchmarks compromised?&rdquo; <a href="https://www.ibm.com/think/" target="_blank">IBM&rsquo;s</a><sup class="fn"><a href="https://www.ibm.com/think/" target="_blank">[4]</a><span class="tip">IBM Think &mdash; AI trends analysis.</span></sup> Minhas is more blunt: &ldquo;Are we just training the model to pass the benchmark?&rdquo; This isn&rsquo;t idle skepticism. The concern is specific: when training data potentially includes benchmark questions, or when models are optimized through extensive post-training to handle benchmark-style problems, a high score may reflect memorization and pattern-matching rather than genuine generalized capability. The 71.7% on SWE-bench looks impressive &mdash; until you ask whether the model would perform similarly on a codebase it has never seen that doesn&rsquo;t resemble anything in SWE-bench&rsquo;s distribution.</p>
   <p>The new generation of harder benchmarks designed to resist this are <em>humbling</em>. Humanity&rsquo;s Last Exam, a crowdsourced set of the hardest questions from domain experts, tops out at 8.8%. FrontierMath, which tests complex mathematical reasoning: 2%. BigCodeBench, which tests real-world coding beyond typical patterns: 35.5% (vs. human expert 97%). These results suggest that the headline benchmarks are measuring something real but limited &mdash; perhaps fluency with common problem types rather than genuine reasoning across novel domains.</p>
   <h3>Commoditization Is Already Here</h3>
   <p>The Chatbot Arena leaderboard (now LM Arena) provides the most direct measure of how users perceive model quality in head-to-head comparisons. The numbers tell an unambiguous story of convergence: the Elo gap between the #1 and #10 model shrank from 11.9% to 5.4% in one year. The gap between #1 and #2: 4.9% to 0.7%. The open-weight vs closed-weight gap collapsed from 8% to 1.7%. When the top models are this close, the user experience of switching between them is nearly indistinguishable for most tasks. That is the definition of a commodity market.</p>
   <p>There is a further consequence of commoditization that Stanford&rsquo;s data reveals: 90% of notable 2024 models came from industry, up from 60% in 2023. Academic AI labs still dominate in highly cited publications, but model <em>production</em> has shifted decisively to industry. The capital and compute requirements for frontier model development have effectively priced universities out. The era of academic AI leadership in model development &mdash; the era of AlexNet, of attention-is-all-you-need, of BERT &mdash; is over. Academic contributions now flow through papers and techniques that industry adopts, not through models that compete on capability.</p>
   <h3>The 142&times; Shrinkage</h3>
   <p>Amid the race to build bigger models, the most underappreciated data point in the Stanford report may be this: in 2022, hitting 60% on the MMLU benchmark required PaLM at 540 billion parameters. By 2024, <a href="https://www.microsoft.com/en-us/microsoft-365/blog/2026/01/15/7-ai-trends-for-2026/" target="_blank">Microsoft&rsquo;s</a><sup class="fn"><a href="https://www.microsoft.com/en-us/microsoft-365/blog/2026/01/15/7-ai-trends-for-2026/" target="_blank">[11]</a><span class="tip">Microsoft &mdash; 7 AI Trends for 2026; Phi-3-mini efficiency data.</span></sup> Phi-3-mini achieved the same threshold with 3.8 billion parameters. That is a 142-fold reduction in model size for equivalent benchmark performance in over two years. This finding cuts against the dominant narrative that AI progress requires ever-larger models and ever-more compute. It suggests, instead, that a substantial portion of &ldquo;progress&rdquo; in the 2020-2023 era was achieved by brute-force scaling of undertrained architectures &mdash; and that with better training recipes, data curation, and architectural choices, far smaller models can reach the same destination.</p>
   <div class="callout"><strong>The real benchmark crisis</strong> isn&rsquo;t that models are getting too good at tests. It&rsquo;s that we don&rsquo;t have reliable ways to measure what actually matters for deployment: generalization to genuinely novel problems, reliability under distribution shift, calibrated uncertainty, and the ability to know when to refuse. The gap between benchmark scores and real-world value may be <em>growing</em>, not shrinking &mdash; which is exactly the dynamic that produces the &ldquo;pilot purgatory&rdquo; we see in the agents section (<a href="s3-agents.dd.html" title="AI Agents">S3</a>).</div>`,
  `<div class="detail-header"><div class="num">03</div><h2>The <em>Deflation</em> Curve</h2></div><h3>The Anatomy of a 280&times; Collapse</h3>
   <p>In November 2022, querying a model at GPT-3.5&rsquo;s quality level (64.8% on MMLU) cost $20 per million tokens. By October 2024, Gemini-1.5-Flash-8B delivered the same quality at $0.07 per million tokens. That is a 280-fold reduction in 18 months. To understand why this matters, consider the math: a task that cost $100 in late 2022 costs 35 cents by late 2024. An application that was economically impossible at $20/M tokens &mdash; say, analyzing every customer support ticket in real time &mdash; becomes trivially cheap at $0.07.</p>
   <p>But the 280&times; number, dramatic as it is, understates the full picture because it only captures the inference cost curve. The total cost deflation is actually the product of three independent curves that compound on each other.</p>

   <h3>Curve 1: Hardware (<a href="https://epoch.ai/" target="_blank">Epoch AI</a><sup class="fn"><a href="https://epoch.ai/" target="_blank">[2]</a><span class="tip">Epoch AI &mdash; AI accelerator price-performance trends.</span></sup>)</h3>
   <p>Epoch AI tracks the price-performance of AI accelerators across 20+ chips released between 2012 and 2025. The trend: roughly 40% improvement per year in compute per dollar. Much of this comes not from making chips cheaper, but from making each chip dramatically more powerful. NVIDIA&rsquo;s GB300 costs 9&times; the P100&rsquo;s release price &mdash; but delivers 24&times; the performance per dollar. Energy efficiency improves on a similar curve: GPUs have been getting 34% more energy-efficient per year since 2008, doubling every 2.4 years.</p>
   <h3>Curve 2: Algorithmic Efficiency (Stanford)</h3>
   <p>Each year, researchers find ways to achieve the same model performance with roughly 3&times; less compute. This is not hardware improvement &mdash; it&rsquo;s smarter training: better learning rate schedules, attention optimizations, distillation techniques, improved data mixing strategies. This curve is the least visible but may be the most important, because it compounds <em>on top of</em> hardware gains. A 40% hardware improvement combined with 3&times; algorithmic improvement means that the effective cost of a given capability level drops roughly 4-5&times; per year.</p>
   <h3>Curve 3: Architecture (Stanford)</h3>
   <p>The 142&times; model shrinkage &mdash; from 540B to 3.8B parameters for the same MMLU threshold &mdash; represents a third, distinct efficiency curve. This isn&rsquo;t about training the same architecture more cheaply; it&rsquo;s about discovering that much smaller architectures, properly trained, can reach benchmarks that previously required massive scale. <a href="https://www.microsoft.com/en-us/microsoft-365/blog/2026/01/15/7-ai-trends-for-2026/" target="_blank">Microsoft&rsquo;s</a><sup class="fn"><a href="https://www.microsoft.com/en-us/microsoft-365/blog/2026/01/15/7-ai-trends-for-2026/" target="_blank">[11]</a><span class="tip">Microsoft &mdash; Phi series and small model efficiency.</span></sup> Phi series demonstrated this most dramatically, but the pattern is widespread: open-weight models like Qwen-2.5 and DeepSeek consistently show that technique and data quality can substitute for raw scale.</p>
   <h3>What Commoditization Means in Practice</h3>
   <p><a href="https://www.ibm.com/think/insights/ai-leaders-goals-2026" target="_blank">IBM&rsquo;s Goodhart</a><sup class="fn"><a href="https://www.ibm.com/think/insights/ai-leaders-goals-2026" target="_blank">[4]</a><span class="tip">IBM Think &mdash; AI leaders goals for 2026.</span></sup> calls this &ldquo;the commodity point&rdquo;: the moment when the top models are functionally interchangeable for most use cases. When that happens, competitive advantage shifts to four things: <strong>workflow integration</strong> (how deeply AI is embedded in actual business processes, not bolted on as a chatbot), <strong>data quality</strong> (domain-specific, curated datasets that give a model knowledge competitors cannot replicate), <strong>orchestration</strong> (multi-agent coordination, tool selection, cost-optimal routing between models), and <strong>governance</strong> (audit trails, compliance, cost management, reproducibility).</p>
   <p>This is why the agents story (<a href="s3-agents.dd.html" title="AI Agents">S3</a>) and the workplace adoption story (<a href="s4-workplace.dd.html" title="Workplace Adoption">S4</a>) matter more than the model capability story. A 5% better model is irrelevant if an organization&rsquo;s agent infrastructure cannot get past proof-of-concept. A 10&times; cheaper model is transformative for organizations with the integration layer to deploy it across 10,000 workflows.</p>
   <div class="callout"><strong>The strategic implication:</strong> For an AI company whose primary offering is &ldquo;our model is the best,&rdquo; the business is shrinking. For a company whose offering is &ldquo;our system deploys the right model for the right task inside existing workflows,&rdquo; the business is growing. The deflation curve doesn&rsquo;t destroy value &mdash; it moves it from model providers to system integrators. This is exactly the pattern that played out with cloud computing (AWS didn&rsquo;t win by having the best servers), mobile (Apple didn&rsquo;t win by having the best cellular modem), and databases (Snowflake didn&rsquo;t win by having the best storage engine).</div>`,
  `<div class="detail-header"><div class="num">04</div><h2>The <em>Gigawatt</em> Ceiling</h2></div><h3>The Physical Reality</h3>
   <p>Every other trend in this section &mdash; cost deflation, commoditization, efficiency gains &mdash; is a story about software economics improving. This section is about the hardware reality that constrains all of it. And the hardware reality is that AI&rsquo;s appetite for electricity is growing faster than the grid can supply it.</p>
   <p>Epoch AI curated a dataset of over 500 AI supercomputers from 2019 to 2025 and analyzed trends in performance, cost, and power. Their core finding: computational performance of leading AI supercomputers doubles every 9 months, driven by two factors that each contribute 1.6&times; annually &mdash; more chips per system and better performance per chip. But unlike Moore&rsquo;s Law, which made computing cheaper and more efficient simultaneously, AI supercomputing is getting more powerful <em>and</em> more expensive <em>and</em> more power-hungry at the same time.</p>

   <h3>The Colossus Problem</h3>
   <p>xAI&rsquo;s Colossus supercomputer in Memphis is the current leader: 200,000 AI chips, roughly $7 billion in hardware, 280 megawatts of power draw. That last number is the important one. 280 MW is enough to power roughly 230,000 US homes. And Memphis&rsquo;s local power grid cannot supply it &mdash; Colossus relies partly on mobile generators to bridge the gap. This is not a developing-world infrastructure problem. It is a Fortune 500 company in Tennessee unable to get enough electricity from the grid for a single facility.</p>
   <p>Bloomberg reports that a cluster of 400,000 NVIDIA chips is currently under construction, expected to be complete by mid-2026. Assuming GB200 chips at $3 million per 72-chip server, this system costs approximately $17 billion. Its power demand will be proportionally enormous.</p>
   <h3>The 2030 Extrapolation</h3>
   <p><a href="https://epoch.ai/blog/ai-supercomputer-landscape" target="_blank">Epoch AI&rsquo;s</a><sup class="fn"><a href="https://epoch.ai/blog/ai-supercomputer-landscape" target="_blank">[2]</a><span class="tip">Epoch AI &mdash; AI supercomputer landscape projections to 2030.</span></sup> projection: if current trends continue, the leading AI supercomputer in 2030 will need 2 million AI chips, cost $200 billion in hardware, and require 9 gigawatts of power. To calibrate that number: 9 GW is the output of nine large nuclear reactors. It is roughly the total electricity consumption of a country like Austria. It exceeds the total power capacity of all existing data centers in the United States as of 2022.</p>
   <p>This is not a prediction of what <em>will</em> happen &mdash; it is a statement of what the current trajectory <em>implies</em>. The relevant question is where the trajectory breaks. Epoch AI&rsquo;s own analysis, conducted jointly with the Electric Power Research Institute (EPRI), suggests the largest individual frontier training runs in 2030 will likely draw 4-16 GW of power. The lower end is consistent with already-announced plans for multi-gigawatt campuses. The upper end would require distributed training across geographically separate facilities &mdash; which is technically feasible (Google trained Gemini 1.0 across multiple campuses) but adds significant engineering complexity.</p>
   <h3>The Ownership Shift Nobody Discussed</h3>
   <p>Buried in Epoch&rsquo;s data is a structural change that happened without public debate. In 2019, private industry owned about 40% of global AI compute capacity. By 2025, industry owns 80%. The public sector &mdash; governments, universities, national labs &mdash; went from controlling the majority of AI compute to controlling less than 20% in six years. The United States hosts 75% of global AI supercomputer performance, with China at 15% and the rest of the world splitting the remainder.</p>
   <p>This concentration has implications that extend well beyond the AI industry. When a small number of private companies control the vast majority of the physical infrastructure that determines AI capability, they become de facto gatekeepers of an increasingly critical technology. The companies that can secure multi-gigawatt power agreements &mdash; through political connections, early land acquisition, or partnerships with energy providers &mdash; will have advantages that no amount of algorithmic innovation can overcome.</p>
   <h3>Why Power Becomes Geopolitics</h3>
   <p><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">Goldman Sachs</a><sup class="fn"><a href="https://www.goldmansachs.com/insights/articles/ai-in-2026-seven-predictions" target="_blank">[12]</a><span class="tip">Goldman Sachs &mdash; seven AI predictions for 2026; hyperscaler capex analysis.</span></sup> projects $500B+ in hyperscaler capital expenditure in 2026, but notes that the &ldquo;gigawatt ceiling&rdquo; means companies will &ldquo;obsess over allocating every megawatt to activities with the highest return.&rdquo; Power allocation becomes the strategic decision. A US Executive Order (14141) has made federal lands available for frontier AI infrastructure and called for expedited permitting. The Middle East (UAE, Saudi Arabia) is investing in AI data centers partly because it has cheap energy. Multi-year lead times for new power facilities mean that the power procurement decisions being made <em>right now</em> will determine who has the compute capacity to train frontier models in 2028 and 2029.</p>
   <div class="callout"><strong>The binding constraint hierarchy:</strong> In 2020, the constraint was <em>talent</em> &mdash; not enough ML researchers. In 2022, it was <em>compute</em> &mdash; not enough GPUs. In 2024, it was <em>data</em> &mdash; running out of high-quality training text. In 2026, it is <em>power</em> &mdash; the grid cannot grow fast enough. Each constraint is harder to solve than the last, because each one is more physical, more capital-intensive, and has longer lead times. Researchers can be hired in months, GPUs manufactured in quarters, data curated in months &mdash; but building power infrastructure takes years.</div>`,
  `<div class="detail-header"><div class="num">05</div><h2><em>Context</em> Window Plateau</h2></div><h3>The Shape of the Plateau</h3>
   <p>Context window expansion was one of the most visible forms of LLM progress from 2022 to 2024. ChatGPT launched with 8,192 tokens in November 2022. A year later, GPT-4 Turbo offered 128K and Claude 2.1 offered 200K. By February 2024, Gemini 1.5 Pro demonstrated 1 million tokens, later extended to 2 million. Each jump felt like a new capability class: 8K meant you couldn&rsquo;t fit a long document; 128K meant you could; 1M meant you could fit an entire codebase or book.</p>
   <p>And then it stopped. Not gradually &mdash; abruptly. Since early 2024, no major model has meaningfully exceeded the 1-2M range. More strikingly, some have <em>retreated</em>. <a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">Anthropic&rsquo;s</a><sup class="fn"><a href="https://www.anthropic.com/research/swe-bench-sonnet" target="_blank">[5]</a><span class="tip">Anthropic &mdash; SWE-bench performance and coding trends.</span></sup> Claude has been unchanged at 200K since Claude 2.1. GPT-5.2 shipped with 400K tokens &mdash; which is actually <em>smaller</em> than GPT-4.1&rsquo;s context. Google pulled back from 2M to 1M for Gemini. This pattern &mdash; simultaneous plateau across all major providers &mdash; strongly suggests a structural limit rather than a temporary pause.</p>

   <h3>Three Structural Causes</h3>
   <p><a href="https://www.understandingai.org/" target="_blank">Understanding AI</a><sup class="fn"><a href="https://www.understandingai.org/" target="_blank">[9]</a><span class="tip">Understanding AI &mdash; context window analysis and structural limits.</span></sup>&rsquo;s Kai Williams identifies three reasons this plateau is structural rather than temporary. First, the <strong>quadratic scaling problem</strong>: the transformer&rsquo;s self-attention mechanism computes interactions between every pair of tokens. Doubling context length roughly quadruples the computational cost. At 1M tokens, you&rsquo;re paying enormous compute for the attention calculation alone, much of it on token pairs that contribute little to the output.</p>
   <p>Second, <strong>context rot</strong>: empirical testing shows that model quality degrades for information placed in the middle of very long contexts. The &ldquo;lost in the middle&rdquo; phenomenon &mdash; where models attend well to the beginning and end of context but lose track of material in between &mdash; means that a 1M-token window does not actually provide 1M tokens of useful context. Effective context is substantially smaller than nominal context.</p>
   <p>Third, <strong>economics</strong>: for most real-world tasks, a smaller context window combined with good retrieval (RAG) produces equivalent results at far lower cost. Retrieving the 5 most relevant paragraphs from a 10,000-page corpus instead of ingesting the entire corpus into context yields better results (because the model attends more precisely) at a tiny fraction of the compute cost.</p>
   <h3>What Comes Next</h3>
   <p>If context windows plateau at the transformer architecture&rsquo;s natural limit, three alternative paths open. <strong>Better retrieval</strong> (RAG systems that find exactly what&rsquo;s needed without brute-force context stuffing) is already the dominant production approach. <strong>Memory architectures</strong> (persistent state across conversations, learned summarization of past interactions) are an active research area that could give models effectively unlimited context through compression rather than expansion. And <strong>fundamentally different architectures</strong> &mdash; state-space models (Mamba, etc.), diffusion language models, or hybrid approaches &mdash; might bypass the transformer&rsquo;s quadratic bottleneck entirely.</p>
   <p>The most provocative possibility is that the context window plateau becomes the forcing function that finally drives serious architectural innovation beyond the transformer. The transformer has dominated since 2017 partly because scaling it was easy and effective. When scaling stops working, the pressure to find alternatives becomes commercially urgent, not just academically interesting.</p>
   <div class="callout"><strong>Prediction (80% confidence):</strong> General-purpose frontier model context windows remain at ~1M through end of 2026. Possible exception: coding-specific models where ingesting entire large codebases (100K+ lines) provides clear value. But even there, sophisticated retrieval may prove more efficient than brute-force expansion &mdash; finding the 50 relevant functions is better than feeding the model 10,000 irrelevant ones.</div>`,
  `<div class="detail-header"><div class="num">06</div><h2>The <em>Open-Source</em> Gambit</h2></div><h3>The Irony at the Heart of AI Geopolitics</h3>
   <p>The conventional narrative about US-China AI competition focuses on compute, capital, and export controls: the US has more money ($109B vs $9.3B in private investment), more frontier models (40 vs 15), and more supercomputer capacity (75% vs 15%). By these metrics, the US is clearly ahead. But there is a parallel story that the conventional narrative almost entirely misses, and it may prove more consequential.</p>
   <p>Chinese AI companies &mdash; led by DeepSeek, Alibaba&rsquo;s Qwen team, Zhipu (GLM), and Moonshot (Kimi) &mdash; adopted a near-universal open-source strategy. They release competitive model weights freely. The Qwen family spans dozens of variants: different sizes (1.5B to 72B+), different specializations (math, coding, vision, instruction-following), all openly available. Qwen2.5-1.5B-Instruct alone has been downloaded 8.85 million times, making it one of the most widely deployed pretrained LLMs on Earth. DeepSeek&rsquo;s models have been forked and fine-tuned across the global open-source community.</p>

   <h3>The Benchmark Gap Collapse</h3>
   <p>Stanford&rsquo;s data quantifies how rapidly the quality gap is closing. At the end of 2023, the performance gap between leading American and Chinese models was 17.5 percentage points on MMLU, 13.5 on MMMU, 24.3 on MATH, and 31.6 on HumanEval. By end of 2024: 0.3, 8.1, 1.6, and 3.7 respectively. On MMLU &mdash; the most widely watched general-purpose benchmark &mdash; the gap went from 17.5 points to <em>0.3 points</em>. That is effectively parity.</p>
   <p>This happened despite US export controls on advanced AI chips and despite a 12&times; advantage in private investment. The Chinese labs achieved near-parity on a fraction of the capital, partly because open-source models allowed them to build on each other&rsquo;s work, and partly because algorithmic efficiency gains matter more than brute-force compute for catching up to a frontier someone else has already established.</p>
   <h3>The Forced Opening of America</h3>
   <p>Chinese open-source didn&rsquo;t just help China. It changed America&rsquo;s strategy. <a href="https://www.technologyreview.com/" target="_blank">MIT Technology Review</a><sup class="fn"><a href="https://www.technologyreview.com/" target="_blank">[6]</a><span class="tip">MIT Technology Review &mdash; Chinese open-source AI models analysis.</span></sup>: &ldquo;In 2026, expect more Silicon Valley apps to quietly ship on top of Chinese open models.&rdquo; The competitive pressure from high-quality open-weight Chinese models forced US companies to reconsider their closed postures. OpenAI &mdash; the company that went from &ldquo;Open&rdquo; AI to the most prominent advocate of closed models &mdash; released its first open-source model in August 2025. Allen AI followed with Olmo 3 in November 2025. Meta had already embraced open weights with Llama, partly in response to the same dynamic.</p>
   <p>There is a deeper irony here that the MIT Tech Review captures: Chinese firms&rsquo; &ldquo;near-unanimous embrace of open source has earned them goodwill in the global AI community and a long-term trust advantage&rdquo; &mdash; even as US-China geopolitical tensions intensify in every other domain. Open-source, in this framing, is not just a technical strategy but a soft power instrument.</p>
   <h3>AI Sovereignty Is Coming</h3>
   <p><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">Stanford&rsquo;s Landay</a><sup class="fn"><a href="https://hai.stanford.edu/news/stanford-ai-experts-predict-2026" target="_blank">[3]</a><span class="tip">Stanford HAI &mdash; AI sovereignty and geopolitics predictions.</span></sup> predicts &ldquo;AI sovereignty will gain huge steam this year&rdquo;: countries building their own LLMs, insisting on running foreign models on domestic GPUs, ensuring training data stays within borders. The UAE and Saudi Arabia are making massive data center investments. South Korea, Japan, India, and the EU are all pursuing some form of AI independence. NVIDIA and OpenAI are on world tours securing national partnerships. The model may be globally shared, but the infrastructure is fiercely national &mdash; and the nationality of your infrastructure determines who can access your training data, who can audit your models, and who can shut you off.</p>
   <div class="callout"><strong>The geopolitical reversal:</strong> For decades, the US was the global champion of open innovation &mdash; open internet, open standards, open markets. In AI, the US is increasingly the closed party: proprietary models, export controls, restricted chip sales. China is the open party: published weights, shared architectures, community engagement. Whether this reflects genuine commitment to openness or strategic calculation (or both) matters less than the outcome: Chinese models are becoming embedded in global AI infrastructure in ways that export controls cannot reverse.</div>`,
  `<div class="detail-header"><div class="num">07</div><h2><em>Beyond</em> Text</h2></div><h3>The Large World Model Thesis</h3>
   <p><a href="https://www.nngroup.com/articles/large-world-models/" target="_blank">Nielsen&rsquo;s</a><sup class="fn"><a href="https://www.nngroup.com/articles/large-world-models/" target="_blank">[8]</a><span class="tip">Nielsen Norman Group &mdash; Large World Models thesis, January 2026.</span></sup> prediction from January 2026 is the most specific claim about LLM evolution in any of our sources: by end of 2026, &ldquo;frontier model&rdquo; will stop meaning &ldquo;text engine with a few attachments&rdquo; and start meaning &ldquo;a single system that speaks, listens, sees, imagines, and edits, with every modality treated as first-class.&rdquo; A leading AI model that is merely text-based will be &ldquo;as archaic as a DOS command line.&rdquo;</p>
   <p>This is a bold timeline. But the evidence for the direction (if not the speed) is accumulating rapidly. Google Veo 3.1 generates video with synchronized audio and dialogue. Suno v5 produces vocal performances that professional musicians describe as emotionally convincing. GPT Image 1.5 renders text inside images at 95% accuracy. DeepMind&rsquo;s Genie 3 simulates navigable 3D environments in real time at 24 frames per second. Each modality is approaching professional grade <em>independently</em>. The convergence question is whether and when they merge into a single system.</p>

   <h3>The Architectural Question That Matters</h3>
   <p>Stanford&rsquo;s Russ Altman frames the fundamental decision. <strong>Early fusion</strong> trains a single model on all modalities simultaneously &mdash; text, images, audio, video as interleaved tokens in one training run. The advantage: the model can discover cross-modal correlations that exist in the training data (like the relationship between what a dog looks like and the sound it makes, or between how a material looks and how it behaves under stress). The disadvantage: updating any single modality requires retraining the entire system.</p>
   <p><strong>Late fusion</strong> trains separate specialist models for each modality and integrates them after the fact through a shared embedding space or orchestration layer. The advantage: modularity. Update your vision model without touching your language model. The disadvantage: you may miss emergent cross-modal understanding that only arises from joint training.</p>
   <p>The current industry practice is largely late fusion: companies route different tasks to different specialized models (Veo for video, separate image models, separate audio models) and integrate the outputs. But the trend is toward early fusion, especially at Google/DeepMind where Veo and Genie build on shared foundations.</p>
   <h3>Why the Sora Shutdown Is Relevant Here</h3>
   <p>OpenAI&rsquo;s shutdown of Sora today (March 24, 2026) is a cautionary datapoint for the LWM thesis. Sora was the highest-profile multimodal product in the world, with impressive capabilities and a billion-dollar Disney deal. It failed not because the model couldn&rsquo;t generate good video, but because the <em>business</em> around the model &mdash; cost structure, copyright, competitive positioning &mdash; didn&rsquo;t work. Nielsen&rsquo;s prediction that multimodal becomes table stakes by end of 2026 may be right about capability but wrong about product readiness.</p>
   <div class="callout"><strong>For scientific AI:</strong> Altman frames multimodal fusion as an opportunity for scientific discovery. A model trained jointly on text (papers), images (microscopy, medical scans), and structured data (gene expression, protein structures) might discover correlations that separate specialist models would miss. This is the strongest argument for early fusion: it&rsquo;s not about making better chatbots, it&rsquo;s about enabling a new kind of cross-disciplinary pattern recognition that no human researcher could perform because no human can simultaneously read 10,000 papers and examine 1 million images.</div>`,
  `<div class="detail-header"><div class="num">08</div><h2><em>Small</em> Models, Big Ideas</h2></div><h3>NVIDIA Argues Against Its Own Revenue</h3>
   <p>It is notable &mdash; and should be interpreted carefully &mdash; when the company that profits most from selling massive GPU clusters publishes a peer-reviewed paper arguing that most workloads should use much smaller models. NVIDIA&rsquo;s Belcak and Heinrich (arXiv:2506.02153) make the case that for agentic AI, the default should be Small Language Models (SLMs, typically 7B parameters or smaller) rather than frontier LLMs (70B-175B+).</p>
   <p>Their argument is both technical and economic. Agentic systems decompose complex goals into modular sub-tasks: retrieving information, formatting data, making tool calls, summarizing results, checking constraints. Most of these sub-tasks do not require frontier-level reasoning. A 7B model fine-tuned for a specific sub-task performs equivalently to a 175B model on that sub-task, at 10-30&times; lower cost in latency, energy, and FLOPs. The paper frames this not just as a technical optimization but as &ldquo;a Humean moral ought&rdquo; given the environmental and infrastructure costs of running 175B models for tasks that don&rsquo;t need them.</p>
