<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Cutting — Skills & Configuration Standards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

const summaries = [
  `<p>A notable trend involves the adoption of markdown-based files for configuration and instruction across various tools. Examples include SKILL.md files, CLAUDE.md configurations, and AGENTS.md instructions. This approach leverages markdown's readability and common tooling to facilitate informal standardization. Such standardization aims to enhance practical adoption by simplifying configuration management and promoting interoperability across different tools.</p>

  `<p>A SKILL.md is a Markdown document with YAML frontmatter designed to define a specific workflow for an AI agent. It typically serves as the primary definition file within a directory-based package, which may also include optional scripts, references, and assets. The format is designed for interoperability, allowing the same file to be utilized across various agent environments, such as <code>.claude/skills/</code>, <code>.gemini/skills/</code>, and <code>.cursor/skills/</code>, without requiring modification of the SKILL.md file itself.</p>
  <p><strong>Progressive Disclosure:</strong> The SKILL.md format supports a progressive disclosure model for agents. In this model, agents are designed to load skill definitions on-demand when relevance is detected, rather than pre-loading all skills at the start of a session. This approach typically involves the agent initially accessing lightweight metadata and subsequently loading complete instructions only when required, thereby mitigating context bloat. This mechanism is analogous to lazy loading in software systems.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Format</h4><p>Markdown + YAML frontmatter. Required: name, description. Optional: scripts, references, assets. Validated by <code>validate_skills.py</code>.</p></div>
    <div class="feat"><h4>Portability</h4><p>The format is designed for broad interoperability, enabling the same SKILL.md file to be utilized across various agent platforms and environments, including Claude Code, Gemini CLI, Cursor, Codex CLI, Antigravity, GitHub Copilot, and OpenCode.</p></div>
    <div class="feat"><h4>Activation Model</h4><p>SKILL.md definitions facilitate an activation model positioned between static Rules (passive, always-on) and explicit Workflows (user-triggered). In this model, skills are designed to be <em>agent-triggered</em>, where the interpreting agent or model detects user intent and dynamically applies the relevant expertise defined in the SKILL.md document.</p></div>

  </div>`,

  `<p>This cross-tool skill collection currently includes over 1,300 skills and has accumulated over 22,000 GitHub stars. It is MIT licensed, with official contributions from Anthropic, Vercel Labs, OpenAI, Supabase, Microsoft, Google DeepMind, Sentry, Trail of Bits, Expo, and Hugging Face. Version 8.6.0 is anticipated for release in March 2026.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Bundles</h4><p>Curated skill groups by role: Web Wizard, Security Engineer, OSS Maintainer, Full-Stack Developer, DevOps &amp; Cloud.</p></div>
    <div class="feat"><h4>Workflows</h4><p>Ordered execution sequences: &ldquo;SaaS MVP&rdquo; = Essentials + Full-Stack + QA. &ldquo;Hardening&rdquo; = Security + DevOps + Observability.</p></div>

  `<p>Per-project agent configuration is being implemented across various tools, often under distinct filenames. Examples include CLAUDE.md (Anthropic), AGENTS.md (OpenAI/AAIF), <code>.cursorrules</code> (Cursor), and <code>.github/copilot-instructions.md</code> (GitHub). These configurations typically define parameters such as coding standards, workflow constraints, tool permissions, and project context.</p>
  <p>CLAUDE.md, for instance, enables the adaptation of a general-purpose agent for project-specific requirements. The adoption of structured configuration for agents exhibits characteristics analogous to infrastructure-as-code, employing declarative specifications that facilitate version control, peer review, and collaborative sharing.</p>
  <div class="s-chips"><span class="s-chip">CLAUDE.md</span><span class="s-chip">AGENTS.md</span><span class="s-chip">.cursorrules</span><span class="s-chip">copilot-instructions.md</span><span class="s-chip">version-controlled</span></div>`,

  `<p>Pi (OpenClaw&rsquo;s engine, developed by Armin Ronacher) adopts an alternative methodology, eschewing a Master Control Program (MCP), skill marketplace, or predefined SKILL.md files. Its operational principle is based on the directive: &ldquo;If the agent requires new functionality, it is prompted to extend its own capabilities.&rdquo; This involves the generation of its own tools through code, thereby functioning as a self-extending agent.</p>
<p>Observations indicate that self-generated capabilities can demonstrate superior performance compared to pre-configured ones, as evidenced by higher success rates in certain contexts. However, self-extension mechanisms have encountered challenges when operating in adversarial environments. To mitigate such risks, a potential strategy involves integrating curated skills with sandboxed self-extension.</p>
<div class="s-chips"><span class="s-chip">Pi</span><span class="s-chip">self-extension</span><span class="s-chip">no MCP</span><span class="s-chip">code as tool</span><span class="s-chip">security tradeoff</span></div>`,

  `<p>Four configuration layers are emerging, each with distinct trust boundaries, governance, and security requirements:</p>
  <div class="feat-grid">
    <div class="feat"><h4>1. Model Config</h4><p>System prompt. Per-model. Provider-controlled. Trust is established at the provider level.</p></div>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01</div><h2>The <em>Portable</em> Agent Layer</h2></div>
  <p>Analysis of Sections 1&ndash;4 reveals a recurring theme: the development of a cross-vendor configuration layer for agentic AI. While academic research has predominantly focused on areas such as reinforcement learning training, benchmarks, protocols, and security, industry development has concurrently advanced practical elements, including portable skill definitions and project configurations.</p>
  <h3>Implications</h3>
  <p>While existing protocol standards (e.g., MCP, A2A) define inter-agent communication mechanisms, they do not typically specify agent capabilities or context-specific behaviors. Emerging specifications, such as SKILL.md, aim to standardize agent capability definitions, while CLAUDE.md and AGENTS.md propose frameworks for defining agent behavior within project contexts. The integration of such specifications could establish a portable agent layer, potentially mitigating vendor lock-in for practitioners.</p>
  <p>Economically, the portability of skills and configurations could substantially reduce switching costs between agentic tools. This shift could offer practitioners increased flexibility in tool selection and encourage vendors to differentiate based on execution quality rather than proprietary ecosystem integration.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02</div><h2>The <em>SKILL.md</em> Format</h2></div>
  <p>Google&rsquo;s Antigravity Codelab<sup class="fn"><a>[1]</a><span class="tip">Google, &ldquo;Antigravity Codelab: Agent Skills&rdquo; (developers.google.com, 2025)</span></sup> and the Antigravity Awesome Skills documentation define the format. A SKILL.md is a Markdown document with YAML frontmatter (name, description required) plus optional supporting assets (scripts, references, templates).</p>
  <h3>Progressive Disclosure Architecture</h3>
  <p>A core design principle aims to mitigate the potential for &ldquo;context rot,&rdquo; a phenomenon where the inclusion of extensive unused tool definitions in active memory might diminish model performance, even in models with large context windows, due to the presence of irrelevant data. The SKILL.md format employs a two-tier architecture to manage this:</p>
  <p><strong>Tier 1 (Always loaded):</strong> Lightweight skill metadata&mdash;name, description, triggers. Acts as a &ldquo;menu&rdquo; the agent scans to match user intent.</p>
  <p><strong>Tier 2 (On demand):</strong> Full skill instructions, scripts, references. Loaded only when the agent determines relevance to the current request.</p>
  <p>This is functionally equivalent to lazy loading in software design. It is designed to allow agents to incorporate numerous potential capabilities without necessarily degrading reasoning quality.</p>
  <h3>Language and Execution</h3>
  <p>Skills can execute any script available in the host environment (Python, Node, Bash, Go). The SKILL.md specifies how to pass arguments; the agent generates the CLI invocation based on user intent. This means skills can be arbitrarily powerful&mdash;which is both the feature and the security concern.</p>
  <div class="callout"><h4>The Format Standard</h4><p>There is no formal RFC or specification body for SKILL.md. The de facto standard is defined by: (1) Google&rsquo;s Antigravity Codelab documentation, (2) Anthropic&rsquo;s Claude Code skill format, (3) The agentskills.io specification validator, (4) The Antigravity Awesome Skills validation scripts. This bottom-up standardization process is analogous to the historical development of other widely adopted formats, such as JSON, which also gained standardization through widespread adoption rather than initial committee decree.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03</div><h2><em>Antigravity</em> Skill Repository</h2></div>
  <p>The Antigravity Skill Repository<sup class="fn"><a>[2]</a><span class="tip">Antigravity Awesome Skills (github.com/sickn33/antigravity-awesome-skills, 22K+ stars)</span></sup> serves as a widely adopted repository for cross-tool agentic skills, demonstrating significant community engagement and enterprise contributions.</p>
  <h3>Scale and Governance</h3>
  <p>v8.6.0 (March 2026): 1,300+ skills. 22K+ GitHub stars. 3,800+ forks. 40+ named contributors. Skills sourced from 20+ community repositories. Major enterprise contributors: Anthropic, Vercel Labs, OpenAI, Supabase, Microsoft, Google DeepMind. Major security contributors: Sentry, Trail of Bits. Community sources include rmyndharis (300+ enterprise skills), zebbern (60+ security skills), VoltAgent (61 skills).</p>
  <h3>Bundles as User Experience</h3>
  <p>The extensive catalog of over 1,300 skills can present challenges for navigation. Bundles address this by grouping related skills; for example, the &ldquo;Web Wizard&rdquo; bundle includes frontend-design, api-design-principles, lint-and-validate, and create-pr. Similarly, the &ldquo;Security Engineer&rdquo; bundle aggregates security-focused skills. This approach is analogous to Linux metapackages, providing curated collections tailored for specific roles.</p>
  <h3>Workflows as Orchestration</h3>
  <p>Workflows define execution order across skills. &ldquo;Building a SaaS MVP&rdquo; = Essentials + Full-Stack Developer + QA &amp; Testing. This is lightweight orchestration at the skill level, complementary to the protocol-level orchestration (A2A, LangGraph) discussed in Section 3.</p>
  <h3>Maintenance and Quality</h3>
  <p>The project's CHANGELOG documents ongoing maintenance activities, including security triage (33 findings documented in March 2026), community pull request merges, registry regeneration, and Claude Code marketplace manifest maintenance. These activities indicate continuous development and address the inherent governance complexities of a dynamic open-source project.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04</div><h2><em>CLAUDE.md</em> &amp; AGENTS.md</h2></div>
  <p>Per-project agent configuration is converging toward a common semantic model, though currently implemented under different filenames.</p>
  <h3>CLAUDE.md (Anthropic)</h3>
  <p>This file defines per-project configuration for Claude Code. It specifies coding standards, workflow constraints, tool access permissions, project terminology, and file access patterns. It resides at the project root and is version-controlled with the project. This configuration facilitates the adaptation of a general-purpose agent to function within project-specific contexts.</p>
  <h3>AGENTS.md (OpenAI &rarr; AAIF)</h3>
  <p>Plans indicate its donation to the Agentic AI Foundation in December 2025. It provides a standardized structure for agent behavior, tool access, and project instructions. It is designed for adoption by platforms such as Cursor, OpenAI Codex, and OpenCode. A key design principle from its inception was vendor-neutrality, distinguishing it from CLAUDE.md, which originated as Anthropic-specific.</p>
  <h3>The Filename Problem</h3>
  <p>Currently, four distinct filenames are in use for similar configuration purposes: <code>CLAUDE.md</code> (Anthropic), <code>AGENTS.md</code> (OpenAI/AAIF), <code>.cursorrules</code> (Cursor), and <code>.github/copilot-instructions.md</code> (GitHub). While format unification has been observed in the skill layer (SKILL.md), the configuration layer currently lacks such standardization. Consequently, some projects implement multiple configuration files to ensure cross-tool compatibility.</p>
  <div class="security-box"><h4>Config Files as Attack Surface</h4><p>Research has documented the AIShellJack attack, which involves malicious <code>.cursorrules</code> files in repositories that execute arbitrary commands when developers clone and open a project. This attack demonstrates that configuration files can be exploited to execute arbitrary commands. The potential for similar vulnerabilities exists in other per-project agent configuration files, contingent on their parsing and execution environments. Consequently, the security implications of configuration files suggest the need for a review process comparable to that applied to executable code.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05</div><h2><em>Pi</em>&rsquo;s Self-Extension</h2></div>
  <p>Armin Ronacher (creator of Flask) designed Pi<sup class="fn"><a>[3]</a><span class="tip">Armin Ronacher, &ldquo;Pi: The Agent Engine Under OpenClaw&rdquo; (blog post, 2026)</span></sup> with a distinct design philosophy: the agent extends itself through code generation, rather than through pre-defined skills or MCP servers.</p>
  <h3>The Argument</h3>
  <p>&ldquo;If you want the agent to do something that it doesn&rsquo;t do yet, you ask the agent to extend itself.&rdquo; This design principle prioritizes code generation and execution, positing it as a highly versatile primitive. This contrasts with pre-configuration by enabling the agent to generate precisely the required functionality.</p>
  <h3>Evidence: Live-SWE-agent</h3>
  <p>Section 2&rsquo;s Live-SWE-agent demonstrates the efficacy of this philosophy empirically. Starting from minimal bash tools, the agent creates custom tools per-problem and achieves 77.4% on SWE-bench Verified&mdash;surpassing all pre-configured agents. Self-generated tools adapt to the specific problem, repository, and language.</p>
  <h3>Evidence: OpenClaw Incidents</h3>
  <p>Section 4 illustrates the challenges associated with this approach. Pi&rsquo;s unrestricted code execution combined with ClawHub&rsquo;s open skill ecosystem resulted in: 21K+ exposed gateways, 14 malicious skills in 72 hours, autonomous agent actions without user consent (MoltMatch), and subsequent government restrictions.</p>
  <h3>The Synthesis</h3>
  <p>A balanced approach may integrate a hybrid model: a base of curated, signed, sandboxed skills (SKILL.md) providing safe default capabilities, supplemented by the ability to create ad-hoc tools within a sandbox when existing skills do not cover the task. This combines the safety of pre-configuration with the adaptability of self-extension.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06</div><h2>The <em>Five</em> Configuration Layers</h2></div>
  <p>Analysis of agentic AI configurations has identified five distinct layers:</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">Layer 1</div><div class="tl-text"><strong>Model Config (System Prompt):</strong> Provider-defined, always loaded, highest trust. The baseline behavior.</div></div>
    <div class="tl-item"><div class="tl-date">Layer 2</div><div class="tl-text"><strong>Project Config (CLAUDE.md / AGENTS.md):</strong> Team-defined, per-repo, version-controlled. Project-specific behavior and constraints.</div></div>
    <div class="tl-item"><div class="tl-date">Layer 3</div><div class="tl-text"><strong>Skills (SKILL.md):</strong> Community-contributed, cross-project, on-demand loading. Specific workflow capabilities.</div></div>
    <div class="tl-item"><div class="tl-date">Layer 4</div><div class="tl-text"><strong>Tools (MCP Servers):</strong> Developer-configured, per-integration. External system connectivity with OAuth and capability scoping.</div></div>
    <div class="tl-item"><div class="tl-date">Layer 5</div><div class="tl-text"><strong>Agent-to-Agent (A2A Agent Cards):</strong> Cross-organizational discovery. Capability-based routing and delegation.</div></div>
  </div>
  <p>A trend suggests that trust tends to diminish in layers further removed from direct provider control, necessitating heightened security measures. This layered structure appears to have evolved organically rather than through a unified architectural design, yet its distinct characteristics are sufficiently clear to suggest that formalization may be warranted.</p>
  <div class="callout"><h4>Contribution to the Field</h4><p>Existing literature reviews and surveys, such as those by Plaat et al. and the ARL Landscape Survey, do not comprehensively address this specific configuration stack. Similarly, protocol-focused surveys primarily concentrate on MCP/A2A. The proposed five-layer model emerges from an analysis of these diverse categories, offering a structured perspective on agentic AI configurations.</p></div><div class="security-box"><h4>Recent Research and Developments</h4><p><strong>SoK: Agentic Skills</strong> (UTS/CSIRO): This work provides a formal definition S=(C,\u03c0,T,R) and identifies seven design patterns (metadata-driven, code-as-skill, workflow enforcement, self-evolving, hybrid NL+code, meta-skills, marketplace), along with a full lifecycle model and the ClawHavoc case study.</p><p><strong>Agent Skills Survey</strong> (Zhejiang): This survey details SKILL.md progressive disclosure (~30 tokens/skill at L1), presents a Skills+MCP complementarity table, and reports SAGE achieving +8.9% with skill-augmented GRPO. It also introduces a Skill Trust and Lifecycle Governance Framework with 4 trust tiers.</p><p><strong>Vulnerability Analysis:</strong> Studies indicate that 26.1% of community skills contain vulnerabilities, with 157 confirmed malicious skills. Skills incorporating executable scripts are 2.12\u00d7 more likely to be vulnerable.</p></div><div class="security-box"><h4>Recent Ecosystem Developments</h4><p><strong>Growth in Skills Ecosystem:</strong> The SkillsMP marketplace hosts over 500,000 agent skills. The Antigravity community library contains over 1,234 curated skills, and the agentskill.sh directory lists over 44,000 skills, each undergoing two-layer security scanning. The Agent Skills format is currently supported across 19 agents, including Claude Code, Codex CLI, Cursor, Copilot, Windsurf, and Cline.</p><p><strong>Spring AI Integration:</strong> Spring AI has integrated Agent Skills into the Java ecosystem, providing LLM portability that allows skills to be defined once and utilized across various models such as OpenAI, Anthropic, and Google Gemini. This integration signifies a maturation of the enterprise ecosystem, extending beyond its initial focus on developer tools.</p><p><strong>Configuration Standard Emergence:</strong> The adoption of a consistent Agent Skills format by platforms such as Anthropic&rsquo;s agentskills.io and OpenAI Codex indicates the emergence of a widely adopted cross-vendor standard. The SKILL.md pattern is becoming a significant interoperable standard for AI agent capabilities.</p></div>`
];

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {

});
