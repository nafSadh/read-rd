<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADHD / ASD / AuDHD: A Deep Dive into Neurodivergence</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

/* Grain texture overlay */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

/* Gradient background blobs */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

/* CONTROL GROUP (top-right, moves to center in detail-open mode) */
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

/* SIDEBAR */
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}

/* Sidebar tooltip appears on hover in detail-open mode */
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

/* MAIN CONTENT AREA */
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}

/* Main header (hero section) */
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}

.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}

.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}

.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}

/* Compact header (when scrolled down) */
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Main scrollable content */
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

/* Section blocks */
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}

.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}

.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}

.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}

.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}

.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}

.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}

.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

/* RIGHT PANEL (Details) */
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}

/* Ghost overlay behind right panel — CRITICAL for both themes */
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}

.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}

.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}

.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}

.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}

.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Detail header with section number SVG and title */
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

/* Detail prose */
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}

.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}

.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

/* CONTENT COMPONENTS */

/* Feature grid (2 columns in detail, 1 on mobile) */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}

const summaries = [
  // 01 Landscape
  `<p>ADHD, Autism Spectrum Disorder (ASD), and their intersection (AuDHD) represent three distinct but often overlapping ways brains are wired. They are not deficits to overcome, but rather neurodevelopmental differences—different operating systems, different ways of processing information, attention, social connection, and sensory experience.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">~5%</div><div class="sl">ADHD Prevalence</div></div>
     <div class="st"><div class="sv">~1-2%</div><div class="sl">ASD Prevalence</div></div>
     <div class="st"><div class="sv">30%+</div><div class="sl">Co-occurrence Rate</div></div>
   </div>
   <p>For years, ADHD and ASD were thought to be mutually exclusive diagnoses. Since DSM-5 (2013), both diagnoses can be given simultaneously. What emerged from research is the concept of AuDHD: individuals who navigate the world with traits of both conditions, creating a unique and often misunderstood neurotype.</p>
   <p>Understanding these conditions means moving beyond deficit-focused models toward a neurodiversity-affirming framework—one that recognizes both the genuine challenges and the distinctive strengths these neurotypes bring.</p>`,

  // 02 ADHD
  `<p>ADHD is fundamentally about executive function and emotional regulation, not just the ability to "pay attention." The brain in ADHD operates on an interest-based nervous system: attention flows readily to stimulating, urgent, or novel tasks, but initiating non-preferred activities requires enormous effort.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">3 Types</div><div class="sl">Inattentive, Hyperactive, Combined</div></div>
     <div class="st"><div class="sv">~2:1</div><div class="sl">Late Diagnosis Ratio (Adults)</div></div>
   </div>
   <h4>The Three Presentations</h4>
   <ul class="s-list">
     <li><strong>Inattentive:</strong> Difficulty sustaining focus, forgetfulness, losing track of things, easily sidetracked</li>
     <li><strong>Hyperactive/Impulsive:</strong> Fidgeting, restlessness, difficulty waiting, interrupting, excessive talking</li>
     <li><strong>Combined:</strong> Both inattentive and hyperactive/impulsive traits</li>
   </ul>
   <p>ADHD is also characterized by emotional dysregulation—intense, sometimes overwhelming emotional responses, rapid mood shifts, and difficulty managing frustration or disappointment. This is often the most distressing aspect for those living with ADHD but is rarely addressed in diagnostic criteria.</p>
   <h4>Late Diagnosis in Adults</h4>
   <p>Many adults, especially women and those who are autistic, went undiagnosed because they were "high-functioning," had good grades, or masked symptoms through sheer effort. Burnout, life transitions, or observing their children's ADHD often triggers the search for adult diagnosis.</p>`,

  // 03 ASD
  `<p>Autism is not a disorder of defective social skills—it's a different neurotype with a distinct cognitive and sensory architecture. Autistic people perceive, process, and navigate the world differently, not worse.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1 in 36</div><div class="sl">Current Estimate (CDC)</div></div>
     <div class="st"><div class="sv">3–4:1</div><div class="sl">Male:Female (Diagnosis Ratio)</div></div>
   </div>
   <p>Core autistic traits include intense, focused interests (monotropism), sensory sensitivities, social communication differences, and a strong need for predictability and routine. Many autistic people are excellent problem-solvers, creative thinkers, and bring remarkable depth to their areas of focus.</p>
   <h4>Key Features</h4>
   <ul class="s-list">
     <li><strong>Monotropism:</strong> Tendency to focus intensely on a small number of interests at a time, with extraordinary depth in those areas</li>
     <li><strong>Sensory processing:</strong> Heightened or muted sensory experiences—certain sounds, textures, lights, or tastes may be overwhelming or barely perceptible</li>
     <li><strong>Social communication differences:</strong> Difficulty with unwritten social rules, eye contact, and turn-taking in conversation; different but not deficient empathy</li>
     <li><strong>Need for structure:</strong> Preference for predictability, routines, and specific ways of doing things; transitions can be distressing</li>
   </ul>
   <p>Masking and camouflaging—the practice of suppressing autistic traits to fit in—is widespread, especially among girls and women, leading to underdiagnosis and significant mental health strain.</p>`,

  // 04 AuDHD
  `<p>AuDHD exists at the intersection of two neurotypes with conflicting needs. Someone with AuDHD might crave novelty and stimulation (ADHD) while simultaneously needing deep routines and predictability (ASD). This creates a unique internal tension that, without understanding, manifests as self-sabotage or inconsistency.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">30-80%</div><div class="sl">Co-occurrence Estimated</div></div>
     <div class="st"><div class="sv">↑↑</div><div class="sl">Burnout Risk</div></div>
   </div>
   <p>The traits of each condition can mask the other. ADHD's novelty-seeking impulses mask autism's routine needs; autism's deep focus can look like ADHD hyperfocus. This diagnostic shadowing means many AuDHD individuals go unrecognized or receive only one diagnosis, missing crucial supports.</p>
   <h4>The Spiky Profile</h4>
   <p>AuDHD creates a "spiky profile"—extreme peaks in certain abilities and extreme valleys in others. Someone might be brilliant at one type of task and completely unable to function in another. This isn't laziness or inconsistency; it reflects the genuine variation in how different types of demands engage these two neurotypes.</p>
   <h4>Conflicting Needs</h4>
   <ul class="s-list">
     <li>Wants novelty AND craves routine</li>
     <li>High stimulation-seeking AND sensory sensitivity</li>
     <li>Interest-based attention AND need for structure</li>
     <li>Impulse to try everything AND exhaustion from transitions</li>
   </ul>`,

  // 05 Executive Function
  `<p>Executive function is the brain's management system: planning, organizing, initiating tasks, managing time, holding information in mind, switching between tasks, and regulating emotions. ADHD and ASD impact executive function differently, and when combined, the effects are complex.</p>
   <h4>Working Memory</h4>
   <p>The ability to hold and manipulate information temporarily. In ADHD, working memory deficits are central; things slip away unless written down. In ASD, working memory might be intact for areas of interest but compromised in others.</p>
   <h4>Task Initiation & Activation</h4>
   <p>The hardest part for many with ADHD is starting. Procrastination isn't laziness—it's a neurological difficulty initiating action unless there's immediate external pressure (deadline, someone watching) or intense internal interest. ASD can add perfectionism or overwhelm at the complexity of the task.</p>
   <h4>Emotional Regulation</h4>
   <p>ADHD produces rapid, intense emotional responses and difficulty managing frustration. ASD can involve difficulty recognizing or naming emotions (alexithymia), leading to sudden emotional floods when the dam breaks. Together, emotional life can feel chaotic.</p>
   <h4>Time Blindness</h4>
   <p>A common ADHD trait: time passes invisibly. Minutes feel like seconds; hours disappear. ASD might have different time perception, with difficulty estimating how long tasks take or when to transition.</p>
   <h4>Cognitive Flexibility</h4>
   <p>Switching between tasks or ways of thinking is effortful for both. ADHD can struggle with task-switching (time-blindly shifting from one thing to another). ASD might need extended time to shift mental sets or may experience significant distress with unexpected changes.</p>`,

  // 06 Sensory
  `<p>Sensory experience is a cornerstone of both ADHD and ASD, though it's often invisible. Sensory sensitivities are not "just preferences"—they are neurological realities that profoundly affect focus, mood, energy, and the ability to function in particular environments.</p>
   <h4>Sensory Seeking vs. Avoidance</h4>
   <p>Some people are sensory-seeking (craving strong input like loud music, spicy food, deep pressure) while others are sensory-avoiding (distressed by bright lights, certain textures, background noise). AuDHD individuals often have both: seeking in some areas and avoidant in others.</p>
   <h4>Emotional Intensity</h4>
   <p>Both ADHD and autistic individuals often experience emotions intensely and with vivid physical sensations. Anxiety, joy, frustration—all hit harder. This isn't fragility; it's a different baseline of emotional arousal.</p>
   <h4>Meltdowns vs. Shutdowns vs. Burnout</h4>
   <ul class="s-list">
     <li><strong>Meltdown (often autistic):</strong> External, visible emotional release—crying, yelling, physical reactions to overwhelming sensory or emotional input</li>
     <li><strong>Shutdown (often autistic):</strong> Internal collapse—going nonverbal, withdrawing, becoming unable to respond or function</li>
     <li><strong>Burnout (ADHD and ASD):</strong> Prolonged depletion from masking, high demand, or sensory overload; characterized by exhaustion, irritability, and loss of function</li>
   </ul>
   <h4>Interoception</h4>
   <p>Interoception is the ability to sense internal body states (hunger, tiredness, needing the bathroom). Many neurodivergent people have weak interoception, leading to neglect of basic needs and sudden crashes when the body finally demands attention.</p>`,

  // 07 Strategies
  `<p>There is no one-size-fits-all approach to supporting ADHD, ASD, or AuDHD. But certain frameworks and practices have helped many navigate their neurotypes more successfully.</p>
   <h4>External Scaffolding</h4>
   <ul class="s-list pro">
     <li>Calendars, timers, alarms, and reminders—outsourcing executive function</li>
     <li>Checklists and task-breaking (ADHD loves external structure)</li>
     <li>Meal planning and prep to reduce daily decisions</li>
     <li>Organized physical spaces to reduce cognitive load</li>
   </ul>
   <h4>Body Doubling & Co-regulation</h4>
   <p>Working or existing near another person—even without interaction—makes task initiation easier for many with ADHD. For ASD, this might be overstimulating, but having a predictable, quiet companion can be grounding.</p>
   <h4>Special Interests as Regulation</h4>
   <p>Autistic people, and many with ADHD, use intense interests as a form of self-regulation. Allowing time for focused pursuit isn't indulgence—it's self-care and dopamine management.</p>
   <h4>Medication Overview</h4>
   <ul class="s-list">
     <li><strong>Stimulants (methylphenidate, amphetamine salts):</strong> Work for ~80% of people with ADHD by increasing dopamine and norepinephrine; help with focus, motivation, emotional regulation</li>
     <li><strong>Non-stimulants (atomoxetine, guanfacine, clonidine):</strong> Raise norepinephrine levels; helpful for those who don't tolerate stimulants or have anxiety</li>
     <li><strong>For ASD:</strong> No specific medication for core autism traits, but medications may address co-occurring anxiety, sensory sensitivities, or emotional dysregulation</li>
   </ul>
   <h4>Therapy Approaches</h4>
   <ul class="s-list">
     <li><strong>CBT (adapted):</strong> Traditional CBT can be helpful for ADHD executive dysfunction and anxiety, but must be neurodiversity-affirming to avoid shame-based approaches</li>
     <li><strong>Occupational Therapy (OT):</strong> Sensory integration, environmental modification, and activity coaching—especially valuable for ASD and AuDHD</li>
     <li><strong>Acceptance & Commitment Therapy (ACT):</strong> Focusing on values and acceptance rather than symptom elimination</li>
   </ul>`,

  // 08 Identity
  `<p>Late diagnosis, whether in adolescence or adulthood, brings a complex blend of relief, grief, and identity reconstruction. Suddenly, behaviors, struggles, and ways of being that were labeled as personal failures or character flaws are reframed as neurological differences.</p>
   <h4>The Neurodiversity Paradigm</h4>
   <p>Rather than viewing ADHD and autism as disorders to be cured, the neurodiversity paradigm recognizes them as natural human variation. Just as humanity needs people of different heights, body types, and sensory abilities, we may need people with different neurological wiring. This doesn't negate real challenges, but it shifts the conversation from "fixing the person" to "building a world that accommodates different brains."</p>
   <h4>Late Diagnosis Grief</h4>
   <p>Learning you are neurodivergent as an adult often involves grief: mourning years spent struggling unnecessarily, relationships that suffered from misunderstanding, the internal shame of "just not trying hard enough," and adjusting identity midway through life. This grief is valid and deserves space.</p>
   <h4>Unmasking</h4>
   <p>Many discover that surviving their youth required constant masking—suppressing stims, hiding interests, forcing eye contact, exhausting themselves to appear "normal." Unmasking—allowing yourself to stim, express interests openly, communicate differently—is liberating but also risky. Not everyone in your environment will accept your unmasked self.</p>
   <h4>Building Self-Compassion</h4>
   <ul class="s-list">
     <li>Recognize that your struggles were real, not personal failures</li>
     <li>Grieve what you needed but didn't have (early understanding, accommodations, acceptance)</li>
     <li>Celebrate the resilience, creativity, and problem-solving that kept you going</li>
     <li>Connect with community—finding others like you is profoundly validating</li>
   </ul>
   <h4>Strengths-Based Reframing</h4>
   <p>Autism brings: deep pattern recognition, attention to detail, loyal and intense relationships, creative problem-solving, and the ability to see what others miss. ADHD brings: resilience, adaptability, out-of-the-box thinking, high energy, and the ability to hyperfocus on meaningful work. These are real strengths, not consolation prizes for having a "disorder."</p>`,
  `<p>References and sources for further study on the topics covered in this deep dive.</p>`
];

     <div class="num">Section 01 — Overview</div>
     <h2>The <em>Neurodivergent</em> Landscape</h2>
   </div>
   <p>Understanding ADHD, ASD, and AuDHD begins with shifting perspective: these are not defects in need of repair, but rather neurodevelopmental differences in how brains are organized and how people perceive, process, and navigate the world. This shift from a medical model (something is "wrong" and needs to be "fixed") to a neurodiversity-affirming model opens space for both genuine support and self-acceptance.</p>

   <h3>Historical Context</h3>
   <div class="timeline">

   <h3>Prevalence & Co-occurrence</h3>

   <h3>Why Neurodiversity Matters</h3>
   <p>A neurodiversity-affirming approach doesn't deny real challenges. Someone with ADHD genuinely struggles with task initiation; an autistic person genuinely struggles with transitions or sensory overwhelm. But it reframes the conversation: rather than "you are broken," it asks "what supports does your brain need? How can your environment adapt?" This shift reduces shame and opens doors to actual, effective accommodation.</p>

   <h3>What This Means for You</h3>
   <p>If you're reading this because you suspect you might be ADHD, autistic, or both, know that understanding your neurology is an act of self-compassion. It explains struggles that may have felt like personal failures. It opens doors to actual, tailored support. And it connects you to a global community of people who think and experience the world in ways similar to yours.</p>`,

  // 02 ADHD detail
  `<div class="detail-header">
     <div class="num">Section 02 — Understanding ADHD</div>
     <h2><em>ADHD</em>: Attention as a Spectrum</h2>
   </div>
   <p>ADHD is not a disorder of lack of attention—it's a disorder of attention regulation. The ADHD brain can hyperfocus intensely on a fascinating task for hours, then struggle to initiate a boring-but-necessary task for five minutes. This inconsistency is neurological, not a character flaw.</p>

   <h3>The Executive Function Model</h3>
   <p>Researchers like Russell Barkley reframe ADHD primarily as an executive dysfunction, not an attention deficit. Executive functions include working memory, inhibition, task initiation, emotional regulation, and time management. In ADHD, these are the core struggles—attention is just one piece.</p>

   <h3>The Interest-Based Nervous System</h3>
   <p>The ADHD brain runs on dopamine. Tasks that are boring, routine, or lack immediate relevance don't trigger sufficient dopamine release for engagement. A person with ADHD might struggle with email for hours but hyperfocus on a video game for twelve uninterrupted hours. This is not inconsistency; it's the way the ADHD brain's reward system works. Understanding this means building life and work around what engages you, rather than forcing yourself through tasks that don't.</p>

   <h3>Emotional Dysregulation</h3>
   <p>One of the most distressing ADHD traits, rarely highlighted in diagnostic criteria, is emotional dysregulation. Emotions arrive suddenly and intensely. Frustration can flash to rage; disappointment can spiral into despair. This isn't drama or oversensitivity—it's a neurological trait. People with ADHD often describe their emotions as "too big" or "too fast."</p>

   <div class="callout">
     <h4>The three presentations</h4>
     <p>Inattentive ADHD (often women, often late-diagnosed): difficulty with focus, organization, and follow-through; may appear spacey or forgetful. Hyperactive/impulsive ADHD (often visible from childhood): restlessness, interrupting, risk-taking, high energy. Combined: traits of both presentations. Many people's presentation changes across the lifespan.</p>
   </div>

   <h3>Brain Chemistry</h3>
   <p>ADHD involves dysregulation of dopamine and norepinephrine—neurotransmitters involved in attention, motivation, and emotional regulation. Stimulant medications work by increasing availability of these neurotransmitters. For about 80% of people with ADHD, stimulants produce substantial improvement in focus, motivation, emotional regulation, and overall functioning.</p>

   <h3>Late Diagnosis in Adults</h3>
   <p>Many people, especially women and autistic individuals, develop coping mechanisms that mask ADHD symptoms until burnout, a major life transition, or observing ADHD in a child prompts assessment. By then, years of struggling without understanding have taken a mental health toll. Adult ADHD diagnosis often feels both vindicating and grief-inducing.</p>

   <div class="verdict">
     <div class="v-col pro">
       <h4>Strengths</h4>
       <ul>
         <li>Hyperfocus ability</li>
         <li>High energy and enthusiasm</li>
         <li>Creative problem-solving</li>
         <li>Adaptability and resilience</li>
       </ul>
     </div>
     <div class="v-col con">
       <h4>Challenges</h4>
       <ul>
         <li>Emotional intensity & dysregulation</li>
         <li>Task initiation paralysis</li>
         <li>Time blindness</li>
         <li>Working memory deficits</li>
       </ul>
     </div>
   </div>`,

  // 03 ASD detail
  `<div class="detail-header">
     <div class="num">Section 03 — Understanding Autism</div>
     <h2><em>ASD</em>: A Different Operating System</h2>
   </div>
   <p>Autism is a neurotype characterized by a distinct way of processing sensory information, focusing attention (monotropism), and navigating social communication. It's not a deficit model—autistic people don't lack empathy or intelligence. Rather, they process the world differently, and a world designed by and for neurotypical people creates friction.</p>

   <h3>Monotropism: The Autistic Attention Model</h3>
   <p>Rather than neurotypical "polytropism" (the ability to divide attention among many things), autistic people are described as monotropic: tending to focus intensely on one or a few interests at a time, with the ability to attain extraordinary depth. This isn't rigidity; it's a different mode of attention that allows for deep expertise and passion.</p>

   <h3>The Double Empathy Problem</h3>
   <p>Autistic researcher Damian Milton coined the term "double empathy problem" to describe the mutual difficulty in understanding between autistic and neurotypical people. The assumption that autistic people lack empathy misses a crucial point: empathy is bidirectional. When a neurotypical person fails to understand autistic communication, we don't blame their neurology—but when an autistic person doesn't intuitively "read the room," they're labeled as lacking empathy. This is a double standard. Many autistic people have rich, deep empathy; it's expressed and received differently.</p>

   <h3>Sensory Processing</h3>
   <p>Autistic sensory processing is fundamentally different. Some autistic people are hypersensitive (a sound that no one else notices is distressingly loud; a texture that feels neutral to others is unbearable). Others are hyposensitive (difficulty feeling pain, hunger, temperature changes). Many are both—sensitive to some stimuli and insensitive to others. This sensory reality profoundly affects where autistic people can work, live, and socialize.</p>

   <h3>Masking & Camouflaging</h3>
   <p>Many autistic people, especially women and BIPOC autistic individuals, suppress autistic traits (stimming, special interests, different communication styles) to fit in. This is exhausting and takes a severe toll on mental health. Late-diagnosed autistic women often describe feeling like they've been "faking normal" their entire lives.</p>

   <div class="callout">
     <h4>Unmasking</h4>
     <p>The process of revealing one's authentic autistic self—allowing stims, discussing special interests openly, communicating in your natural style—is deeply important for mental health, but it requires a safe environment and acceptance from others.</p>
   </div>

   <h3>Need for Routine & Predictability</h3>
   <p>Many autistic people have a strong need for predictable routines. Unexpected changes, transitions, or unpredictability can trigger significant distress. This isn't inflexibility; it's how the autistic brain manages sensory and cognitive load. Routines are stabilizing and energy-conserving.</p>

   <h3>Social Communication Differences</h3>
   <p>Autistic people may struggle with unwritten social rules, eye contact, turn-taking in conversation, or reading subtle social cues. But this doesn't mean they lack social desire or skill. Many autistic people are deeply social, but in ways that don't follow neurotypical templates. Autistic-to-autistic friendships often feel more natural because the communication styles match.</p>

   <div class="verdict">
     <div class="v-col pro">
       <h4>Strengths</h4>
       <ul>
         <li>Deep pattern recognition</li>
         <li>Intense focus & expertise</li>

         <li>Loyalty & consistency</li>
       </ul>
     </div>
     <div class="v-col con">
       <h4>Challenges</h4>
       <ul>
         <li>Sensory sensitivities</li>
         <li>Social communication differences</li>
         <li>Difficulty with transitions</li>
         <li>Overwhelm in unpredictable environments</li>
       </ul>
     </div>
   </div>`,

  // 04 AuDHD detail
  `<div class="detail-header">
     <div class="num">Section 04 — The Intersection</div>
     <h2><em>AuDHD</em>: The Intersection</h2>
   </div>
   <p>AuDHD is the experience of having both ADHD and autism. But it's not simply "ADHD plus autism"—the interaction between the two creates a unique neurotype with its own particular challenges and strengths.</p>

   <h3>How They Interact: The Conflict Model</h3>
   <p>ADHD and ASD have conflicting operating principles:</p>
   <ul class="s-list">
     <li>ADHD craves novelty and stimulation; ASD seeks predictability and routine</li>
     <li>ADHD is impulsive; ASD tends toward cautiousness or paralysis</li>
     <li>ADHD hyperfocuses on interesting things; ASD hyperfocuses on special interests (which might not align with what's currently interesting)</li>
     <li>ADHD's executive dysfunction clashes with ASD's need for structure</li>
   </ul>

   <h3>The Spiky Profile</h3>
   <p>AuDHD creates extreme variability in functioning. Someone might be brilliant at engineering (deep focus, detail work) but completely unable to manage their own meals and sleep. They might be socially fluent one day and completely overwhelmed the next. This isn't inconsistency or laziness—it's the genuine variation in how their brain manages different types of demands based on sensory load, interest, and executive function state.</p>

   <div class="callout">
     <h4>Spiky profile example</h4>
     <p>Exceptional ability to hyperfocus on special interests AND severe executive dysfunction with daily tasks. Intense sensory sensitivities in some domains AND sensory seeking in others. Social ability that fluctuates wildly based on energy and context.</p>
   </div>

   <h3>Diagnostic Shadowing</h3>
   <p>ADHD and ASD traits can mask each other, making diagnosis difficult. The ADHD trait of novelty-seeking and impulsivity can mask autism's need for routine (the person constantly seeks change, so you don't notice the internal desire for predictability). The autism trait of intense focus can look like ADHD hyperfocus. The result: many AuDHD people receive only one diagnosis or none at all, missing crucial understanding and support.</p>

   <h3>Burnout in AuDHD</h3>
   <p>AuDHD individuals are at elevated risk for burnout. The internal conflict between wanting novelty and needing routine creates a cycle: the ADHD impulse says "try something new, go somewhere, change things." The ASD response to that change is overwhelm and exhaustion. The result is often a boom-bust cycle: over-committing, then crashing and withdrawing. Without understanding this pattern, people blame themselves for "not following through" or "being irresponsible."</p>

   <h3>The Novelty-Routine Compromise</h3>
   <p>AuDHD people often find creative compromises: same routine with a new twist (always snacking at the same time, but with a different snack each day); familiar environment with one novel element. These aren't quirks—they're adaptive solutions to conflicting neurological needs.</p>

   <h3>Strengths of AuDHD</h3>
   <p>This intersection also brings unique abilities: the ability to hyperfocus on meaningful work (autism) while maintaining adaptability to new information (ADHD); the capacity to solve problems creatively (ADHD) with attention to detail and pattern (ASD); resilience born from managing conflicting neurological needs.</p>

  // 05 Executive Function detail
  `<div class="detail-header">
     <div class="num">Section 05 — Deep Dive</div>
     <h2><em>Executive</em> Function Deep Dive</h2>
   </div>
   <p>Executive function is the brain's management and planning system. It's what allows you to plan a project, hold a phone number in mind while dialing, resist a temptation, recognize your emotional state, and shift attention between tasks. In ADHD, ASD, and especially AuDHD, executive function is impaired in complex ways.</p>

   <h3>Working Memory Deficits (Core to ADHD)</h3>
   <p>Working memory is the ability to hold and manipulate information temporarily—like remembering a phone number while walking to write it down, or following multi-step instructions. In ADHD, working memory capacity is reduced. Information simply vanishes without external reinforcement (writing it down, setting reminders, having someone repeat it).</p>
   <p>For AuDHD individuals, working memory might be intact for areas of intense interest but compromised in others—further contributing to the "spiky profile."</p>

   <h3>Task Initiation: The ADHD Wall</h3>
   <p>One of the most paralyzing ADHD challenges: initiating tasks, especially those that are boring, non-urgent, or lack immediate relevance. The internal experience is not laziness—it's a neurological barrier. The dopamine system isn't engaged, and effort feels impossible. Procrastination intensifies until external pressure (a deadline, someone watching) or acute interest triggers action.</p>
   <p>For AuDHD, this is compounded by autism's need for certainty about the task. Unclear instructions, unpredictable duration, or fear of doing it "wrong" adds another layer of paralysis.</p>

   <h3>Emotional Regulation</h3>
   <p>The ADHD brain has difficulty managing emotions. They arrive intensely and suddenly. The working memory deficit that characterizes ADHD also impairs the ability to hold onto coping strategies or self-soothing techniques in the moment. Emotions often feel uncontrollable.</p>
   <p>ASD adds a different challenge: sometimes difficulty recognizing or naming emotions (alexithymia) until they're overwhelming. Someone might be in extreme distress without realizing it until the emotional dam breaks.</p>

   <h3>Time Blindness</h3>
   <p>Time blindness is a hallmark ADHD trait: time passes invisibly. Five minutes feels like thirty seconds. You look up from a task and three hours have vanished. This isn't ADHD people being inconsiderate or not caring—it's a neurological inability to sense time passage the way others do.</p>
   <p>ASD can involve different time perception—difficulty estimating task duration or feeling extremely disrupted when time-based transitions arrive unexpectedly.</p>

   <h3>Cognitive Flexibility</h3>
   <p>Shifting between different mental sets or tasks is effortful for both ADHD and ASD. ADHD might hyperfocus on one task and struggle to switch even when time-pressured. ASD might need significant time to transition between different modes of thinking or activities. Together, task-switching becomes extremely difficult.</p>

   <h3>Planning & Organization</h3>
   <p>Both ADHD and ASD have difficulty with planning. ADHD struggles with sequencing steps and managing multiple steps simultaneously. ASD might struggle with flexibility in plans or difficulty breaking large tasks into steps. The result: projects often go undone or are completed in chaotic bursts.</p>

   <div class="callout">
     <h4>External scaffolding works</h4>
     <p>The key insight: when executive function is weak, external structures—checklists, timers, reminders, organized spaces, schedules—become essential tools, not signs of weakness. Using external systems frees cognitive capacity for actual work.</p>
   </div>

   <h3>Neurotransmitter Basis</h3>
   <p>Executive function depends on dopamine and norepinephrine. ADHD involves insufficient activity in prefrontal regions that rely on these neurotransmitters. Medication and environmental design both work by either increasing neurotransmitter availability or reducing the cognitive load on these regions.</p>`,

  // 06 Sensory & Emotional detail
  `<div class="detail-header">
     <div class="num">Section 06 — Sensory & Emotional</div>
     <h2><em>Sensory</em> & Emotional Worlds</h2>
   </div>
   <p>Sensory experience and emotional intensity are often the invisible parts of ADHD and autism—rarely mentioned in diagnostic criteria, but profoundly shaping lived experience.</p>

   <h3>Hyper- and Hyposensitivity</h3>
   <p>Sensory processing differences exist on a spectrum. Someone might be hypersensitive to sound (a door slamming is painfully loud) but hyposensitive to touch (doesn't feel minor pain). This asymmetry means standard "quiet, calm environments" might not be the answer—the person might need specific types of sensory input while avoiding others.</p>

   <h3>Sensory Seeking vs. Avoidance</h3>
   <p>Some neurodivergent individuals seek strong sensory input: loud music, spicy food, intense exercise, deep pressure. Others avoid sensory input intensely: quiet spaces, soft textures, low light. AuDHD individuals often do both—seeking in some sensory domains and avoiding in others.</p>

   <h3>Sensory Seeking as Regulation</h3>
   <p>Stimming (self-stimulation)—rocking, fidgeting, humming, picking, repetitive movement—is not a sign of distress. It's a regulation mechanism. Stims help filter out overwhelming sensory input, manage anxiety, and focus attention. Suppressing stims increases internal distress.</p>

   <h3>Emotional Intensity & Interoception</h3>
   <p>Both ADHD and autistic people often experience emotions intensely. A disappointment that neurotypical people weather calmly hits like a crisis. Anxiety feels paralyzing. Joy is ecstatic. This emotional intensity is neurological, not a character flaw or sign of instability.</p>
   <p>Interoception—the ability to sense internal body states (hunger, fatigue, need for bathroom)—is weak in many neurodivergent people. This leads to ignoring basic needs, then suddenly crashing when the body demands attention.</p>

   <h3>Meltdowns, Shutdowns, and Burnout</h3>
   <p><strong>Meltdowns</strong> (often associated with autism but can occur in ADHD too): external, visible emotional release. Crying, yelling, physical reactions to overwhelming sensory or emotional input. They're not tantrums or drama—they're a neurological response to unbearable overload.</p>
   <p><strong>Shutdowns</strong> (often autistic): internal collapse. Going nonverbal, withdrawing, becoming unable to respond or function. The brain essentially "turns off" in response to overwhelming input.</p>
   <p><strong>Burnout</strong> (ADHD and ASD): prolonged depletion from masking, high demand, sensory overload, or internal conflict. Characterized by exhaustion, irritability, loss of function, and often a months-long recovery period.</p>

   <h3>Alexithymia: Difficulty Naming Emotions</h3>
   <p>Some autistic and ADHD individuals experience alexithymia: difficulty recognizing and naming their own emotions. They might not realize they're anxious or angry until the feeling explodes suddenly. This is a real neurological difference, not emotional immaturity.</p>

   <h3>Emotional Dysregulation in ADHD</h3>
   <p>ADHD involves rapid shifts in emotional state and difficulty managing intense emotions. The person isn't "being dramatic"—they're experiencing a genuine neurological difference in emotional regulation. Over time, this creates real stress and social strain.</p>

   <div class="callout">
     <h4>Sensory & emotional support matters</h4>
     <p>Reducing sensory load, allowing self-regulation tools (stims, quiet spaces, intense exercise), and building time for recovery from sensory overload are not luxuries—they're foundational health needs.</p>
   </div>`,

  // 07 Strategies detail
  `<div class="detail-header">
     <div class="num">Section 07 — Support & Strategy</div>
     <h2><em>Strategies</em> & Support</h2>
   </div>
   <p>Supporting ADHD, ASD, and AuDHD isn't about willpower or therapy alone. The most effective approaches combine external structures, medication (if helpful), therapeutic support, and environmental design tailored to the individual's neurotype.</p>

   <h3>External Scaffolding: The Foundation</h3>
   <p>When internal executive function is weak, external systems become essential. This includes:</p>
   <ul class="s-list">
     <li><strong>Calendars and reminders:</strong> Externalizing working memory. Put everything in a system you'll check regularly.</li>
     <li><strong>Timers and alarms:</strong> Compensating for time blindness. Set timers not just for task end-time but for transitions.</li>
     <li><strong>Task-breaking:</strong> Large, vague tasks are paralyzing. Break them into specific, tiny steps with checkboxes.</li>
     <li><strong>Organized physical spaces:</strong> Reduce visual clutter and cognitive load. Make it obvious where things go and where supplies are.</li>
     <li><strong>Routines and automation:</strong> Reduce the number of daily decisions (meal plans, same sleep/wake time, set exercise time). Automation frees mental energy.</li>
   </ul>

   <h3>Body Doubling & Co-regulation</h3>
   <p>For many with ADHD, working or existing near another person makes task initiation dramatically easier, even without interaction. This is called "body doubling." The physical presence of another person provides enough external structure and accountability to bypass the task initiation wall.</p>
   <p>For ASD, this might be less helpful or overstimulating, but some autistic people benefit from a quiet, predictable co-presence.</p>

   <h3>Special Interests as Regulation</h3>
   <p>For autistic and ADHD individuals, intense interests aren't indulgence—they're self-regulation and dopamine management. Allowing time for focused pursuit of special interests is part of effective self-care, not taking away from productivity.</p>

   <h3>Medication Overview</h3>
   <p><strong>Stimulants (methylphenidate, amphetamine salts):</strong> Work for about 80% of people with ADHD by increasing dopamine and norepinephrine availability in the prefrontal cortex. Effects include improved focus, motivation, emotional regulation, and reduced impulsivity. For those who respond, the improvement can be dramatic and life-changing.</p>
   <p><strong>Non-stimulants (atomoxetine, guanfacine, clonidine):</strong> Increase norepinephrine levels; helpful for those with anxiety, tics, or who don't tolerate stimulants. Slower onset but fewer side effects for some.</p>
   <p><strong>For autism:</strong> No medication treats core autism traits, but medications can address co-occurring anxiety, sensory sensitivities, emotional dysregulation, or sleep issues.</p>
   <p>Medication isn't a cure—it's a support tool that works best combined with behavioral strategies and environmental design.</p>

   <h3>Therapy Approaches</h3>
   <p><strong>CBT (Cognitive Behavioral Therapy, adapted):</strong> Traditional CBT can help with ADHD executive dysfunction and anxiety, but it must be neurodiversity-affirming. Shame-based approaches harm more than help.</p>
   <p><strong>Occupational Therapy (OT):</strong> Particularly valuable for ASD and AuDHD. OT focuses on sensory integration, environmental modification, and practical activity coaching. This is often more helpful than traditional talk therapy.</p>
   <p><strong>ACT (Acceptance & Commitment Therapy):</strong> Focuses on acceptance of your neurology and commitment to values-based action, rather than fighting your brain's wiring.</p>

   <h3>Environmental Design</h3>
   <p>Modifying your environment is often more effective than trying to change your neurology:</p>
   <ul class="s-list">
     <li>Sensory needs: lighting, sound, temperature, tactile input</li>
     <li>Task setup: removing friction, pre-organizing materials, reducing choices</li>
     <li>Social environment: choosing people and spaces where you can be your authentic self</li>
     <li>Routine and structure: predictability reduces anxiety and sensory overload</li>
   </ul>

   <div class="callout">
     <h4>Accommodations aren't cheating</h4>
     <p>Using tools, structures, and accommodations isn't weakness or failure. It's intelligent adaptation. Everyone uses tools suited to their brain—neurotypical people just don't notice theirs.</p>
   </div>`,

  // 08 Identity & Flourishing detail
  `<div class="detail-header">
     <div class="num">Section 08 — Identity & Flourishing</div>
     <h2><em>Identity</em> & Flourishing</h2>
   </div>
   <p>Diagnosis—especially late diagnosis in adulthood—initiates a profound identity shift. Suddenly, core aspects of yourself that felt like personal failures or character flaws are reframed as neurological differences. This is validating and disorienting in equal measure.</p>

   <h3>Late Diagnosis Grief</h3>
   <p>Learning you are neurodivergent as an adult often involves complex grief: mourning years spent struggling unnecessarily, relationships that could have been better with understanding, the shame of "just not trying hard enough," lost opportunities. This grief deserves space and validation. You're not ungrateful for your diagnosis; you're grieving what you needed but didn't have.</p>

   <h3>The Neurodiversity Paradigm: A Shift in Perspective</h3>
   <p>Rather than viewing ADHD and autism as disorders to be cured, the neurodiversity paradigm recognizes them as natural human variation. Humanity includes diversity in height, body type, sensory ability, and cognition. Different neurotypes bring different strengths. The goal isn't to make neurodivergent people think like neurotypical people, but to build a world that accommodates and values different brains.</p>
   <p>This doesn't negate real challenges. Someone with ADHD genuinely struggles with task initiation; an autistic person genuinely struggles with sensory overwhelm. But it shifts the responsibility: rather than "fix yourself," the question becomes "what support and accommodation do you need?"</p>

   <h3>Unmasking</h3>
   <p>Many neurodivergent people, especially autistic women, spent their youth suppressing their authentic selves: no stimming, hiding interests, forcing eye contact, exhausting themselves to appear "normal." Unmasking—allowing your real self to show—is liberating but also risky. Not everyone in your environment will accept your unmasked self. Unmasking requires choosing safe people and spaces.</p>

   <div class="callout">
     <h4>Unmasking is not selfish</h4>
     <p>Revealing your authentic neurodivergent self is an act of self-preservation. Continuous masking leads to burnout, anxiety, and depression. You deserve to exist as you are.</p>
   </div>

   <h3>Building Self-Compassion</h3>
   <p>Diagnosis offers an opportunity to rebuild relationship with yourself:</p>
   <ul class="s-list">
     <li><strong>Recognize:</strong> Your struggles were real. Not a sign of weakness, but of neurology meeting an inflexible world.</li>
     <li><strong>Grieve:</strong> What you needed but didn't have. Early understanding, accommodations, acceptance. This grief is valid.</li>
     <li><strong>Celebrate:</strong> The resilience and creativity that kept you going. You survived without support—imagine what you'll do with it.</li>
     <li><strong>Connect:</strong> Finding community of people like you is profoundly validating. You're not alone, and you're not weird—you're neurodivergent.</li>
   </ul>

   <h3>Strengths-Based Reframing</h3>
   <p><strong>Autism brings:</strong> Deep pattern recognition, attention to detail, loyalty, intense focus, ability to see what others miss, creative problem-solving, systematic thinking.</p>
   <p><strong>ADHD brings:</strong> Resilience, adaptability, out-of-the-box thinking, high energy, hyperfocus ability, enthusiasm, ability to see big-picture patterns others miss.</p>
   <p><strong>AuDHD brings:</strong> All of the above, plus the ability to integrate seemingly contradictory perspectives, deep creativity born from managing conflicting needs, and resilience born from navigating complexity.</p>
   <p>These aren't consolation prizes. They're real, valuable strengths that shape how you move through the world.</p>

   <h3>Flourishing as a Neurodivergent Person</h3>
   <p>Flourishing doesn't mean becoming neurotypical. It means:</p>
   <ul class="s-list">
     <li>Understanding your neurology and building life around it, not against it</li>
     <li>Using supports and accommodations freely, without shame</li>
     <li>Choosing work and relationships aligned with how your brain works</li>
     <li>Allowing yourself rest and recovery without guilt</li>
     <li>Connecting with community where your neurology is understood</li>
     <li>Contributing your unique strengths to the world</li>
   </ul>

   <div class="verdict">
     <div class="v-col pro">
       <h4>Neurodiversity Paradigm</h4>
       <ul>
         <li>Reduces shame & self-blame</li>
         <li>Enables actual, tailored support</li>
         <li>Honors diverse strengths</li>
         <li>Builds community & connection</li>
       </ul>
     </div>
     <div class="v-col con">
       <h4>Real Challenges Remain</h4>
       <ul>
         <li>Societal barriers & discrimination</li>
         <li>Genuine executive/sensory struggles</li>
         <li>Burnout risk & recovery need</li>
         <li>Late diagnosis loss</li>
       </ul>
     </div>
   </div>

   <h3>Final Reflection</h3>
   <p>If you're neurodivergent—ADHD, autistic, or both—you are not broken. Your brain works differently, and the world hasn't always been designed for how you work. But that is a world problem, not a you problem. Understanding your neurology is an act of self-compassion. Seeking support is an act of self-respect. Connecting with others like you is an act of belonging. You deserve to exist fully as you are.</p>`,
  `<div class="detail-header"><div class="num">09 · Sources</div><h2><em>Sources</em> & References</h2></div>
<h3>Diagnostic & Clinical References</h3>
<p><a href="https://en.wikipedia.org/wiki/Diagnostic_and_Statistical_Manual_of_Mental_Disorders" target="_blank">Wikipedia: DSM-5 (Diagnostic and Statistical Manual)</a> — Official diagnostic criteria for ADHD and autism spectrum disorder from the American Psychiatric Association.</p>
<p><a href="https://en.wikipedia.org/wiki/Autism_spectrum" target="_blank">Wikipedia: Autism Spectrum Disorder</a> — Comprehensive overview of autism diagnosis, characteristics, and current understanding.</p>
<p><a href="https://en.wikipedia.org/wiki/Attention_deficit_hyperactivity_disorder" target="_blank">Wikipedia: ADHD</a> — Detailed information on ADHD diagnosis, symptoms, and treatment options.</p>
<h3>Clinical & Professional Resources</h3>
<p><a href="https://www.nimh.nih.gov/health/topics/attention-deficit-hyperactivity-disorder-adhd" target="_blank">NIMH — ADHD Information</a> — National Institute of Mental Health resources on ADHD research and information.</p>
<p><a href="https://www.nimh.nih.gov/health/topics/autism-spectrum-disorder-asd" target="_blank">NIMH — Autism Information</a> — NIMH resources on autism spectrum disorder.</p>
<h3>Co-occurrence & Understanding</h3>
<p><a href="https://en.wikipedia.org/wiki/Comorbidity" target="_blank">Wikipedia: Comorbidity</a> — Overview of comorbid conditions and dual diagnosis concepts relevant to autism-ADHD co-occurrence.
`
];

// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">A<em>D</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Self & Understanding</div>
        <div class="hero-title">ADHD / ASD / <em>AuDHD</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Neurodivergence · Executive Function · Identity · Strategies</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>

</body>
</html>
