const summaries = [

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 — Details</div><h2><em>Depression</em> & Low Energy States</h2></div>
  <p>Depression is perhaps the psychiatric condition most intuitively connected to energy deficit. Its cardinal symptoms -- fatigue, psychomotor retardation, anhedonia, cognitive slowing, hypersomnia -- read like a clinical description of cellular energy failure. The metabolic theory proposes this connection is not metaphorical but literal.</p>
  <h3>Brain Imaging Evidence</h3>
  <p>PET imaging consistently shows reduced glucose metabolism in the prefrontal cortex of depressed patients. The dorsolateral prefrontal cortex (executive function) and anterior cingulate cortex (emotional regulation) are particularly affected. This hypometabolism correlates with symptom severity and often normalizes with successful treatment, suggesting it tracks with disease state rather than being a fixed trait.<sup class="fn"><a href="#ref-13">[13]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank">Jiang et al. CNS Neurosci Ther (2024) &rarr;</a></span></sup></p>
  <h3>Stress Models</h3>
  <p>Animal models of depression (chronic unpredictable mild stress, social defeat, learned helplessness) consistently show bioenergetic impairment: decreased ATP production, increased reactive oxygen species, decreased antioxidant defense, and mitochondrial morphological changes. These findings are consistent across different stress paradigms, strengthening the metabolic connection.</p>
  <h3>The Serotonin Question</h3>
  <p>If depression involves serotonin deficiency, the metabolic theory asks: why is serotonin low? Serotonin synthesis requires tryptophan hydroxylase, an enzyme that consumes ATP and requires iron-containing cofactors produced by mitochondria. Vesicular packaging of serotonin into synaptic vesicles requires vesicular monoamine transporters driven by proton gradients that require mitochondrial ATP. The metabolic theory suggests serotonin deficiency is downstream of energy deficiency.</p>
  <h3>JAMA Psychiatry RCT (2025)</h3>
  <p>The first high-quality randomized controlled trial for ketogenic diet in treatment-resistant depression (TRD) was published in JAMA Psychiatry in 2025. With 88 UK participants and a 6-week protocol, the ketogenic group showed significantly greater improvement than controls. While the trial was relatively small and short-duration, it represents the first RCT-level evidence for dietary metabolic intervention in a psychiatric condition.</p>
  <h3>Exercise as Metabolic Antidepressant</h3>
  <p>Exercise is the best-validated non-pharmaceutical treatment for depression. The metabolic theory explains why: exercise increases PGC-1alpha (master regulator of mitochondrial biogenesis), drives new mitochondria production, reduces NLRP3 inflammasome activation, and increases BDNF. A 2025 meta-analysis declared exercise should be a mainstay approach for depression management. The metabolic mechanism unifies the exercise and dietary intervention evidence.</p>
  <div class="callout"><h4>Clinical Significance</h4><p>Depression is the most prevalent psychiatric condition and the leading cause of disability worldwide. If even a subset of treatment-resistant depression responds to metabolic intervention, the clinical impact would be substantial. The JAMA Psychiatry RCT provides the first rigorous evidence that this may be the case.</p></div>`,

  <p>Bipolar disorder involves oscillations between depressive lows and manic or hypomanic highs. The metabolic theory proposes these cycles may reflect oscillating mitochondrial function -- periods of energy deficit (depression) alternating with periods of energy dysregulation or excess (mania).</p>
  <h3>Mitochondrial Biomarker</h3>
  <p>A 2024 MDPI review critically assessed mitochondrial dysfunction as a state biomarker in bipolar disorder. If mitochondrial function tracks with mood episodes, it could serve as an objective measure of illness severity and treatment response. This would be particularly valuable given the subjective nature of mood assessment.</p>
  <h3>Lithium and Mitochondria</h3>
  <p>Lithium, the gold standard mood stabilizer for bipolar disorder, has documented effects on mitochondrial function and insulin signaling. It enhances mitochondrial complex I activity, increases antioxidant enzyme expression, and improves mitochondrial membrane potential. The metabolic theory suggests lithium's efficacy may be partly explained by these metabolic effects, providing a mechanistic bridge between traditional pharmacology and the metabolic framework.</p>
  <h3>Stanford Pilot Results</h3>
  <p>Dr. Shebani Sethi's Stanford pilot trial (2024) included patients with bipolar disorder alongside those with schizophrenia. After four months on a ketogenic diet, 75% of participants were in recovery. All participants with metabolic syndrome achieved complete reversal. The sample was small (n=21), unblinded, and lacked a control group, so these results should be interpreted as preliminary.</p>
  <h3>Edinburgh Pilot</h3>
  <p>A European pilot trial at the University of Edinburgh specifically tested ketogenic diet for bipolar disorder. Results showed the diet was safe and effective, with improvements in mood, energy, and anxiety, along with weight loss and lower blood pressure. Metabolic and psychiatric improvements appeared to be linked.</p>

  <p>Schizophrenia provides perhaps the strongest case for the metabolic theory. The metabolic evidence is extensive, begins before treatment, and is measurable across multiple biological systems.</p>
  <h3>Pre-Treatment Metabolic Disruption</h3>
  <p>The most significant finding is that first-episode, drug-naive schizophrenia patients already show disrupted insulin and glucose metabolism in the brain. This undermines the argument that metabolic dysfunction in schizophrenia is merely a side effect of antipsychotic medication. The metabolic disruption appears to be intrinsic to the illness itself.<sup class="fn"><a href="#ref-16">[16]</a><span class="tip"><a href="https://www.frontiersin.org/journals/psychiatry" target="_blank">Li et al. Front Psychiatry (2019) &rarr;</a></span></sup></p>
  <h3>Insulin Resistance and Negative Symptoms</h3>
  <p>Insulin resistance in schizophrenia correlates specifically with negative symptoms (flat affect, social withdrawal, poverty of speech, avolition). This is clinically significant because negative symptoms are the most treatment-resistant aspect of schizophrenia -- antipsychotics primarily address positive symptoms (hallucinations, delusions). If insulin resistance contributes to negative symptoms, metabolic intervention may address the most intractable dimension of the illness.</p>
  <h3>Brain Tissue Evidence</h3>
  <p>Post-mortem and imaging studies reveal abnormal mitochondrial morphology, size, and density in the brains of individuals with schizophrenia. These are structural findings, not merely functional measurements. They indicate that mitochondrial pathology is a biological feature of the disease.</p>
  <h3>Metabolic Syndrome Prevalence</h3>
  <p>Metabolic syndrome rates in schizophrenia patients substantially exceed the general population. While antipsychotic medication contributes, the pre-treatment metabolic disruption suggests an underlying vulnerability. A 2025 PMC review detailed the underlying mechanisms and therapeutic approaches for metabolic syndrome in schizophrenia.</p>
  <h3>Stanford Pilot: Recovery Rates</h3>
  <p>In the Stanford pilot trial, 75% of participants (including those with schizophrenia) were reported in recovery after four months on a ketogenic diet; 100% of those with metabolic syndrome achieved full reversal. These results must be interpreted cautiously given the small sample (n=21), lack of control group, and absence of blinding. Pilot studies with self-selected participants routinely produce inflated effect sizes, so larger controlled trials are needed to establish the true magnitude of benefit.</p>

  <p>Anxiety disorders involve chronic hyperarousal, excessive threat detection, and failure of emotional regulation. The metabolic theory proposes that energy deficits in specific brain regions tip the balance from regulated vigilance toward pathological anxiety.</p>
  <h3>Amygdala Energy Demands</h3>
  <p>The amygdala, the brain's primary threat detection center, requires constant energy to maintain balanced function. Under energy-sufficient conditions, the amygdala detects genuine threats and the prefrontal cortex provides top-down regulation. When ATP is insufficient, this regulatory balance breaks down: the amygdala becomes hyperactive while the energy-expensive prefrontal regulation weakens. The result is hypervigilance without the cognitive capacity to modulate it.</p>
  <h3>NLRP3 and Anxiety</h3>
  <p>NLRP3 inflammasome activation increases anxiety-like behavior in animal models. Since mitochondrial ROS activate NLRP3, and ketones (BHB) directly inhibit NLRP3, the metabolic pathway provides a mechanistic link: mitochondrial dysfunction produces ROS, ROS activates NLRP3, NLRP3-driven neuroinflammation increases anxiety. Ketogenic intervention may break this chain at multiple points.</p>
  <h3>GABA and Ketones</h3>
  <p>Ketone metabolism increases brain GABA levels. GABA is the primary inhibitory neurotransmitter, and GABAergic deficits are implicated in anxiety disorders. Benzodiazepines (the most common anxiolytic medications) work by enhancing GABA signaling. The ketogenic pathway may achieve a similar GABAergic effect through metabolic rather than pharmacological means.</p>
  <h3>Animal Model Evidence</h3>
  <p>Hollis et al. (2016) demonstrated that mitochondrial function in the brain is directly linked to anxiety-related behavior and social subordination in animal models. Animals with lower mitochondrial function in specific brain regions showed increased anxiety and social withdrawal. This provides experimental evidence for the metabolic-anxiety connection.</p>
  <div class="callout"><h4>Integration with Other Sections</h4><p>Anxiety often co-occurs with depression and is a feature of bipolar and schizophrenia. The metabolic framework explains this comorbidity: the same underlying energy dysfunction can produce anxiety, depression, or both depending on which regulatory circuits are most affected. This is more parsimonious than requiring separate explanations for each diagnosis.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 — Details</div><h2>The <em>Insulin</em> Resistance Connection</h2></div>
  <p>Insulin resistance has emerged as a connecting mechanism between metabolic dysfunction and psychiatric illness. Once thought relevant only to diabetes and cardiovascular disease, insulin signaling in the brain plays important roles in cognition, mood, and neural maintenance.</p>
  <h3>Insulin in the Brain</h3>
  <p>Although neurons do not require insulin for glucose uptake (unlike muscle and fat cells), insulin has multiple CNS roles: it functions as a growth factor promoting neuronal survival, directly influences memory formation and consolidation, modulates synaptic plasticity (the basis of learning), and regulates dopamine and serotonin signaling. Insulin resistance therefore impairs far more than glucose metabolism.</p>
  <h3>Blood-Brain Barrier Breakdown</h3>
  <p>As insulin resistance develops, the blood-brain barrier becomes more permeable. This increased permeability allows substances that should remain in the bloodstream to enter brain tissue, resulting in accumulation of toxins and inflammatory molecules. This provides a mechanism by which peripheral metabolic disease directly affects brain function.</p>
  <h3>Shared Pathology Across Disorders</h3>
  <p>The same metabolic disruptions -- neuroinflammation, brain glucose hypometabolism, oxidative stress, mitochondrial dysfunction, and insulin resistance -- appear across depression, bipolar disorder, and schizophrenia. This convergence of metabolic pathology across clinically distinct disorders is one of the strongest arguments for the metabolic theory. Different clinical presentations may reflect the same underlying biology affecting different brain regions.</p>
  <h3>Pre-Medication Evidence</h3>
  <p>The finding that insulin resistance exists in drug-naive, first-episode schizophrenia patients is particularly important. It means metabolic dysfunction is not caused by psychiatric medication (a common counterargument) but is instead a feature of the illness itself. Similar findings in untreated depression strengthen this conclusion.</p>

  <p>The metabolic theory explicitly positions metabolic interventions as complementary to existing psychiatric treatment, not as replacements. The goal is to add a metabolic dimension to comprehensive psychiatric care.</p>
  <h3>Reframing Existing Medications</h3>
  <p>Many existing psychiatric medications may work partly through metabolic mechanisms. Lithium enhances mitochondrial complex I activity. Some antidepressants reduce inflammatory markers. Valproic acid (an anticonvulsant and mood stabilizer) was originally developed from a fatty acid. Recognizing these metabolic effects could help optimize medication selection and dosing.</p>
  <h3>Synergistic Effects</h3>
  <p>Preliminary evidence suggests metabolic interventions may enhance pharmaceutical treatment. Improving mitochondrial function could make neurons more responsive to neurotransmitter-targeted medications. Reducing inflammation could improve treatment response in patients with elevated inflammatory markers (a known predictor of antidepressant resistance).</p>
  <h3>Dose Reduction Potential</h3>
  <p>Some patients on metabolic interventions report being able to reduce medication doses with their psychiatrist's guidance. This is clinically significant because many psychiatric medications have substantial side effects (weight gain, metabolic syndrome, sedation, sexual dysfunction). If metabolic optimization allows lower effective doses, the therapeutic ratio improves.</p>
  <h3>Treatment Timeline</h3>
  <p>Metabolic interventions operate on different timescales than medications. Dietary changes begin affecting metabolism within days. Metabolic switching to ketones takes 3-5 days. Symptom improvement may begin within 2-4 weeks. Mitochondrial biogenesis and neuroplasticity changes require months. Full consolidation may take 4-6 months. This contrasts with medications, which often show effects within 2-6 weeks.</p>
  <div class="callout"><h4>Clinical Reality</h4><p>Integration requires collaboration between psychiatrists, dietitians, and primary care physicians. Most psychiatric practice currently lacks this infrastructure. Building metabolic psychiatry into standard care will require institutional change, training programs, and new clinical pathways -- not just new evidence.</p></div>`

const sidebarNav=document.getElementById('sidebar-nav');sections.forEach((sec,idx)=>{const item=document.createElement('div');item.className='sidebar-item'+(idx===0?' active':'');item.setAttribute('data-label',sec.short);item.innerHTML=`<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;item.onclick=()=>scrollToSection(idx);sidebarNav.appendChild(item)});
const sidebarTip=document.createElement('div');sidebarTip.className='sidebar-tooltip';document.body.appendChild(sidebarTip);
const mainScroll=document.getElementById('main-scroll');const mainScrollInner=document.createElement('div');mainScrollInner.className='main-scroll-inner';sections.forEach((sec,idx)=>{const block=document.createElement('div');block.className='section-block';block.innerHTML=`<div class="s-num"><span>${sec.num} · ${sec.short}</span><button class="s-detail-btn" onclick="viewDetail(${idx})"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;mainScrollInner.appendChild(block)});mainScroll.appendChild(mainScrollInner);
const rightInner=document.getElementById('right-inner');sections.forEach((sec,idx)=>{const detail=document.createElement('div');detail.className='detail';detail.innerHTML=details[idx];rightInner.appendChild(detail)});
function toggleTheme(){document.body.setAttribute('data-theme',document.body.getAttribute('data-theme')==='light'?'dark':'light')}
let currentDetail=0;function viewDetail(idx){currentDetail=idx;document.body.classList.add('detail-open');document.querySelector('.main-head').classList.add('compact');updateDetails();document.getElementById('right').classList.remove('closed');updateRightScroll()}
function toggleDetail(){document.body.classList.toggle('detail-open');document.querySelector('.main-head').classList.toggle('compact');document.getElementById('right').classList.toggle('closed');if(!document.body.classList.contains('detail-open'))currentDetail=0;updateDetails()}
function updateDetails(){const d=document.querySelectorAll('.detail');d.forEach(x=>x.style.display='none');d[currentDetail].style.display='block'}
function scrollToSection(idx){currentDetail=idx;document.querySelectorAll('.section-block')[idx].scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.sidebar-item').forEach((item,i)=>item.classList.toggle('active',i===idx))}
const rightPanel=document.getElementById('right'),rightTopbar=document.querySelector('.right-topbar'),stickyTitle=document.getElementById('right-sticky-title');
function updateRightScroll(){if(rightPanel.scrollTop>20){rightTopbar.classList.add('scrolled');stickyTitle.classList.add('visible');stickyTitle.textContent=sections[currentDetail].short}else{rightTopbar.classList.remove('scrolled');stickyTitle.classList.remove('visible')}}
rightPanel.addEventListener('scroll',updateRightScroll);
let sidebarHoverTimeout;document.addEventListener('mousemove',e=>{const item=e.target.closest('.sidebar-item');if(item&&document.body.classList.contains('detail-open')){clearTimeout(sidebarHoverTimeout);sidebarTip.classList.add('visible');sidebarTip.textContent=item.getAttribute('data-label');const rect=item.getBoundingClientRect();sidebarTip.style.top=(rect.top+rect.height/2-12)+'px';sidebarTip.style.left=(rect.right+12)+'px'}else{sidebarHoverTimeout=setTimeout(()=>sidebarTip.classList.remove('visible'),100)}});
</script>
</body>
</html>
