<script>
const sections=[
{num:'01',short:'Core Thesis',title:'The <em>Metabolic</em> Theory'},
{num:'02',short:'Palmer',title:'<em>Palmer</em> & Brain Energy'},
{num:'03',short:'Paradigm Shift',title:'From <em>Neurotransmitters</em> to Metabolism'},
{num:'04',short:'History',title:'<em>Historical</em> Context'},
{num:'05',short:'The Field',title:'<em>Metabolic</em> Psychiatry as Discipline'},
{num:'06',short:'Critiques',title:'<em>Limitations</em> & Pushback'},
{num:'07',short:'Implications',title:'<em>Clinical</em> Implications'},
{num:'08',short:'Sources',title:'References & <em>Resources</em>'}
];
const summaries=[
`<p>Mental illness as metabolic dysfunction: psychiatric conditions emerge from impaired cellular energy production.<sup class="fn"><a href="#ref-1">[1]</a><span class="tip"><a href="https://brainenergy.com/" target="_blank">Palmer, Brain Energy (2022) &rarr;</a></span></sup> The brain consumes 20% of body energy despite being 2% of body weight. When mitochondria fail, neurotransmitter synthesis, ion pumping, and synaptic maintenance all fail. Meta-analyses confirm Complex I/IV deficits across depression, bipolar, and schizophrenia.<sup class="fn"><a href="#ref-9">[9]</a><span class="tip"><a href="https://www.frontiersin.org/journals/psychiatry" target="_blank">Hjelm et al. Front Psychiatry (2018) &rarr;</a></span></sup></p>
<div class="s-stat"><div class="st"><div class="sv">20%</div><div class="sl">Brain Energy</div></div><div class="st"><div class="sv">2%</div><div class="sl">Body Weight</div></div><div class="st"><div class="sv">30-32</div><div class="sl">ATP / Glucose</div></div><div class="st"><div class="sv">2022</div><div class="sl">Book Published</div></div></div>
<div class="s-chips"><span class="s-chip">mitochondria</span><span class="s-chip">ATP</span><span class="s-chip">metabolism</span><span class="s-chip">energy deficit</span></div>`,
`<p>Dr. Christopher Palmer (McLean Hospital, Harvard Medical School) published "Brain Energy" in 2022.<sup class="fn"><a href="#ref-1">[1]</a><span class="tip"><a href="https://brainenergy.com/" target="_blank">Palmer, Brain Energy (2022) &rarr;</a></span></sup> He proposes mitochondria regulate neurotransmitters, hormones, gene expression, and inflammation. His framework synthesizes decades of metabolic observations into a unified psychiatric theory. He has treated patients with ketogenic approaches since ~2016.</p>
<div class="s-stat"><div class="st"><div class="sv">Harvard</div><div class="sl">Affiliation</div></div><div class="st"><div class="sv">McLean</div><div class="sl">Hospital</div></div><div class="st"><div class="sv">2016</div><div class="sl">Clinical Use</div></div><div class="st"><div class="sv">75+</div><div class="sl">Trials Worldwide</div></div></div>`,
`<p>Traditional psychiatry emphasizes neurotransmitters (serotonin, dopamine). The metabolic theory does not deny neurotransmitter dysfunction but proposes it stems from energy deficiency.<sup class="fn"><a href="#ref-2">[2]</a><span class="tip"><a href="https://www.psychologytoday.com/us/blog/brain-energy" target="_blank">Palmer, Psychology Today (2022) &rarr;</a></span></sup> Low ATP impairs neurotransmitter synthesis, vesicle transport, and synaptic function. The 2022 umbrella review (Moncrieff et al.) found no consistent evidence that depression is caused by low serotonin.</p>
<div class="s-stat"><div class="st"><div class="sv">Serotonin</div><div class="sl">Traditional</div></div><div class="st"><div class="sv">Dopamine</div><div class="sl">Traditional</div></div><div class="st"><div class="sv">ATP</div><div class="sl">Metabolic Root</div></div><div class="st"><div class="sv">Upstream</div><div class="sl">Causal Claim</div></div></div>`,
`<p>Metabolic abnormalities in psychiatric patients documented for decades but treated as side effects. Ketogenic diet for epilepsy since 1920s. Metabolic syndrome prevalence in schizophrenia dramatically exceeds general population. Drug-naive first-episode patients already show disrupted insulin/glucose metabolism -- not a medication side effect.<sup class="fn"><a href="#ref-16">[16]</a><span class="tip"><a href="https://www.frontiersin.org/journals/psychiatry" target="_blank">Li et al. Front Psychiatry (2019) &rarr;</a></span></sup></p>

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 \u2014 Details</div><h2>The <em>Metabolic</em> Theory</h2></div>
<p>The metabolic theory proposes psychiatric conditions emerge from cellular energy dysfunction.<sup class="fn"><a href="#ref-1">[1]</a><span class="tip"><a href="https://brainenergy.com/" target="_blank">Palmer, Brain Energy (2022) &rarr;</a></span></sup> The brain consumes ~20% of body energy despite being only 2% of body weight. This extraordinary demand makes the brain uniquely vulnerable to energy supply disruptions.</p>
<h3>The Energy-First Hypothesis</h3>
<p>When mitochondria fail to produce adequate ATP, consequences cascade through every aspect of neural function. Neurotransmitter synthesis, ion channel maintenance, synaptic vesicle cycling, axonal transport, and calcium sequestration all require ATP. Without sufficient energy, neurons become hyperexcitable or shut down, producing cognitive fog, mood dysregulation, and emotional lability.</p>
<h3>Unifying Framework</h3>
<p>Depression, bipolar disorder, schizophrenia, and anxiety all show measurable mitochondrial dysfunction in meta-analyses. Rather than treating each as mechanistically distinct, the theory proposes a shared upstream cause with different downstream manifestations depending on which brain regions are most affected by energy failure.</p>
<h3>Beyond Fuel</h3>
<p>Mitochondria do far more than produce ATP. They regulate calcium signaling, control apoptosis, generate ROS signaling molecules, and produce neurotransmitter precursors. BHB (the primary ketone body) acts as HDAC inhibitor, NLRP3 inhibitor, and epigenetic modifier. This makes ketogenic intervention a multi-mechanism therapy, not merely alternative fuel.</p>
<div class="callout"><h4>Key Insight</h4><p>The metabolic theory does not claim metabolism is the only factor in mental illness. Genetics, trauma, social environment all matter. But it proposes metabolic dysfunction is an underappreciated biological substrate that connects many of these factors and offers new therapeutic targets.</p></div>`,
`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 \u2014 Details</div><h2><em>Palmer's</em> Framework & Brain Energy</h2></div>
<p>Christopher Palmer published "Brain Energy" in November 2022.<sup class="fn"><a href="#ref-1">[1]</a><span class="tip"><a href="https://brainenergy.com/" target="_blank">Palmer, Brain Energy (2022) &rarr;</a></span></sup> As Director of Postgraduate Education at McLean Hospital and Assistant Professor at Harvard Medical School, he synthesizes metabolic medicine, neurochemistry, and clinical psychiatry into a unified framework.</p>
<h3>Core Claims</h3>
<p>(1) Mental illness equals metabolic dysfunction at the cellular level. (2) Mitochondria regulate neurotransmitters, hormones, gene expression, and inflammation simultaneously. (3) The standard neurotransmitter model describes symptoms, not causes. (4) Metabolic interventions can address root biological causes. (5) This complements rather than replaces pharmaceutical approaches.</p>
<h3>From Book to Field</h3>
<p>Since publication, metabolic psychiatry has grown from individual practice to recognized emerging field. Over 75 clinical trials underway worldwide. Nature Mental Health published priorities (2025). Stanford, Harvard, and other institutions have established programs. Metabolic Mind provides nonprofit CME training.</p>

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 \u2014 Details</div><h2>From <em>Neurotransmitters</em> to Metabolism</h2></div>
<p>The dominant paradigm since the 1960s: depression from serotonin deficiency, schizophrenia from dopamine excess, anxiety from GABA insufficiency. The metabolic theory doesn't reject this but proposes it describes downstream effects.</p>
<h3>The Serotonin Question</h3>
<p>A 2022 umbrella review (Moncrieff et al.) found no consistent evidence that depression is caused by low serotonin. The metabolic theory offers an alternative: if ATP deficit impairs serotonin synthesis and vesicle packaging, the observable effect looks like serotonin deficiency, but the cause is energetic.<sup class="fn"><a href="#ref-2">[2]</a><span class="tip"><a href="https://www.psychologytoday.com/us/blog/brain-energy" target="_blank">Palmer, Psychology Today (2022) &rarr;</a></span></sup></p>
<h3>Not Anti-Medication</h3>
<p>Palmer positions the framework as complementary. Lithium affects mitochondrial function and insulin signaling. Antidepressants reduce inflammatory markers. The metabolic lens reinterprets why existing medications work rather than dismissing them.</p>
<div class="callout"><h4>The Reframe</h4><p>Neurotransmitter dysfunction is real and measurable. The question is whether it is the disease or a symptom of the disease. The metabolic theory proposes the latter, with energy dysfunction as the deeper biological substrate.</p></div>`,
`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 \u2014 Details</div><h2><em>Historical</em> Context</h2></div>
<p>The connection between metabolism and mental illness is not new. What is new is the unified theory.</p>
<h3>Ketogenic Diet for Epilepsy</h3>
<p>Developed in the 1920s, predating modern antiepileptic drugs. Remains established treatment for drug-resistant epilepsy. Demonstrated that dietary manipulation could significantly affect brain function.</p>
<h3>Metabolic Syndrome in Psychiatric Patients</h3>
<p>Elevated rates of metabolic syndrome, diabetes, and cardiovascular disease in schizophrenia and bipolar. First-episode, drug-naive schizophrenia patients already show disrupted insulin/glucose metabolism -- intrinsic to the illness, not medication effect.</p>
<h3>Mitochondrial Disorders</h3>
<p>Confirmed genetic mitochondrial disorders: 54% lifetime MDD, 17% bipolar, 11% GAD. If genetic mitochondrial impairment produces psychiatric symptoms, acquired impairment plausibly does the same.</p>
<div class="callout"><h4>The Missing Connection</h4><p>These observations existed in separate medical literatures. Palmer's contribution was connecting them into a testable framework with clinical predictions.</p></div>`,
`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 \u2014 Details</div><h2><em>Metabolic</em> Psychiatry as Discipline</h2></div>
<p>Metabolic psychiatry has evolved from fringe idea to emerging academic discipline.</p>
<h3>Stanford Program</h3>
<p>Dr. Shebani Sethi founded the world's first academic Metabolic Psychiatry clinic at Stanford in 2015. Her pilot study (2024, n=21, uncontrolled): reported 75% recovery, 100% metabolic syndrome reversal in bipolar/schizophrenia.<sup class="fn"><a href="#ref-31">[31]</a><span class="tip"><a href="https://med.stanford.edu/news/all-news/2024/04/keto-diet-mental-illness.html" target="_blank">Sethi et al. Psychiatry Res (2024) &rarr;</a></span></sup></p>
<h3>Research Landscape</h3>
<p>75+ studies underway worldwide. Nature Mental Health field priorities (2025). Harvard Brain Science Initiative support. CME courses via Metabolic Mind. Universities launching training programs.</p>
<h3>Infrastructure Challenges</h3>
<p>Most psychiatrists receive no nutrition training. Few mental health centers employ dietitians. No insurance codes for metabolic psychiatric care. Standardized protocols still being developed.</p>
<div class="feat-grid"><div class="feat"><h4>75+ Trials</h4><p>Worldwide clinical trials investigating metabolic interventions.</p></div><div class="feat"><h4>Stanford Clinic</h4><p>First academic program, established 2015 by Sethi.</p></div><div class="feat"><h4>Nature 2025</h4><p>Field-defining perspectives paper in Nature Mental Health.</p></div><div class="feat"><h4>CME Training</h4><p>Metabolic Mind offers free continuing education.</p></div></div>`,
`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 \u2014 Details</div><h2><em>Limitations</em> & Critical Perspectives</h2></div>
<p>Any emerging field must be assessed with skepticism. The metabolic theory faces several legitimate criticisms.</p>
<h3>Unfalsifiability</h3>
<p>Almost any condition can be reframed as metabolic.<sup class="fn"><a href="#ref-4">[4]</a><span class="tip"><a href="https://inhn.org/" target="_blank">Blackwell, INHN (2023) &rarr;</a></span></sup> A strong theory should specify what it cannot explain. The metabolic theory needs to predict which conditions should NOT respond to metabolic intervention.</p>
<h3>Evidence Quality</h3>
<p>Most evidence from case reports and small unblinded pilots. First RCT (JAMA 2025) had only 88 participants over 6 weeks.<sup class="fn"><a href="#ref-32">[32]</a><span class="tip"><a href="https://jamanetwork.com/journals/jamapsychiatry/fullarticle/2844388" target="_blank">JAMA Psychiatry RCT (2025) &rarr;</a></span></sup> Selection bias inherent. Blinding impossible for dietary studies.</p>
<h3>Premature Adoption Risk</h3>
<p>Popular media amplifies beyond evidence. Patients may delay proven treatment. The field acknowledges this (Psychiatric Times: "promising therapy, not a cure").</p>
<div class="verdict"><div class="v-col pro"><h4>Supported</h4><ul><li>Mitochondrial deficits measurable across disorders</li><li>BHB mechanisms clear (Science 2013)</li><li>Metabolic health improves in pilots</li><li>Exercise validates the pathway</li></ul></div><div class="v-col con"><h4>Unproven</h4><ul><li>Whether metabolic Rx replaces medication</li><li>Optimal protocols for specific conditions</li><li>Long-term outcomes beyond 6 months</li><li>Which patients will respond</li></ul></div></div>`,
`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 \u2014 Details</div><h2><em>Clinical</em> Implications</h2></div>
<p>If the metabolic theory proves correct even in part, the clinical implications are significant.</p>
<h3>Expanded Assessment</h3>
<p>Psychiatric assessment would include metabolic markers: fasting glucose, insulin, HbA1c, lipid panel, inflammatory markers. Treatment planning considers metabolic status alongside symptom profiles.</p>
<h3>Adjunctive Treatment</h3>
<p>Dietary modification, exercise prescription, sleep optimization, targeted supplementation alongside medication. Early evidence suggests synergistic effects, potentially allowing dose reduction.</p>
<h3>Research Priorities</h3>
<p>Large multi-site RCTs, head-to-head trials, long-term follow-up, biomarker studies, cost-effectiveness analyses, integration protocols for combining metabolic and pharmacological approaches.</p>
<div class="callout"><h4>Bottom Line</h4><p>The metabolic theory is a serious scientific framework with strong mechanistic plausibility, growing evidence, and institutional support. Not yet proven, but far beyond speculation. The next 5 years of trials will be decisive.</p></div>`
