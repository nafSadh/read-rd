<body data-theme="light">
<script>
const sections=[
{num:'01',short:'NLRP3 Inflammasome',title:'The <em>NLRP3</em> Inflammasome'},
{num:'02',short:'Cytokines',title:'<em>Cytokine</em> Elevation in Psychiatric Illness'},
{num:'03',short:'Microglia',title:'<em>Microglial</em> Activation & Synaptic Damage'},
{num:'04',short:'ROS Bridge',title:'<em>Oxidative</em> Stress as Bridge'},
{num:'05',short:'Gut-Brain Axis',title:'The <em>Gut-Brain</em> Axis'},
{num:'06',short:'Dysbiosis',title:'<em>Gut</em> Dysbiosis in Psychiatric Disorders'},
{num:'07',short:'Therapeutics',title:'<em>Anti-Inflammatory</em> Interventions'},
{num:'08',short:'Sources',title:'References & <em>Resources</em>'}
];

const summaries=[
`<p>The NLRP3 inflammasome is a key regulator of innate immunity, significantly elevated in major depressive disorder. It functions as a convergent signaling node: stress, metabolic dysfunction, and infection all activate NLRP3. BHB (the primary ketone body) directly inhibits NLRP3, providing a mechanistic link between ketogenic diet and reduced neuroinflammation.<sup class="fn"><a href="#ref-22">[22]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC11040318/" target="_blank">Chen et al. J Neuroinflammation (2024) &rarr;</a></span></sup></p>
<div class="s-stat"><div class="st"><div class="sv">NLRP3</div><div class="sl">Inflammasome</div></div><div class="st"><div class="sv">IL-1\u03b2</div><div class="sl">Output</div></div><div class="st"><div class="sv">BHB</div><div class="sl">Inhibitor</div></div><div class="st"><div class="sv">Elevated</div><div class="sl">In MDD</div></div></div>`,

`<p>IL-1\u03b2, IL-6, and TNF-\u03b1 are consistently elevated in MDD patients. Cytokine levels correlate with symptom severity and treatment resistance. Anti-inflammatory medications show efficacy in treatment-resistant depression. Antidepressants themselves reduce pro-inflammatory markers while enhancing anti-inflammatory cytokines (IL-10, TGF-\u03b2).<sup class="fn"><a href="#ref-26">[26]</a><span class="tip"><a href="https://www.nature.com/articles/s41398-025-03000-0" target="_blank">K\u00f6hler-Forsberg et al. Transl Psychiatry (2025) &rarr;</a></span></sup></p>
<div class="s-stat"><div class="st"><div class="sv">IL-6</div><div class="sl">Elevated</div></div><div class="st"><div class="sv">TNF-\u03b1</div><div class="sl">Elevated</div></div><div class="st"><div class="sv">CRP</div><div class="sl">Elevated</div></div><div class="st"><div class="sv">Severity</div><div class="sl">Correlates</div></div></div>`,

`<p>Microglia are the brain's resident immune cells. Chronic activation leads to synaptic pruning, reduced neuroplasticity, and impaired neurotransmitter production. A self-perpetuating cycle: metabolic dysfunction activates microglia, which release inflammatory cytokines, causing further metabolic damage. Ketogenic diets shift microglia toward resting states.</p>
<div class="s-chips"><span class="s-chip">synaptic pruning</span><span class="s-chip">neuroplasticity</span><span class="s-chip">chronic activation</span><span class="s-chip">resting state</span></div>`,

`<p>Mitochondrial dysfunction produces excess ROS. ROS activate the NLRP3 inflammasome, triggering cytokine release and neuroinflammation. This bridges mitochondrial dysfunction (S2) with neuroinflammation. Ketones reduce ROS production while simultaneously inhibiting NLRP3 -- a dual mechanism that explains dietary intervention effects.</p>
<div class="s-stat"><div class="st"><div class="sv">Mito \u2192 ROS</div><div class="sl">Production</div></div><div class="st"><div class="sv">ROS \u2192 NLRP3</div><div class="sl">Activation</div></div><div class="st"><div class="sv">NLRP3 \u2192 IL-1\u03b2</div><div class="sl">Inflammation</div></div><div class="st"><div class="sv">BHB</div><div class="sl">Breaks Cycle</div></div></div>`,

`<p>Bidirectional communication between gut and brain through microbial metabolites, neurotransmitters, and immune interactions. Gut microbes synthesize serotonin, dopamine, and GABA. Dysbiosis increases LPS translocation ("leaky gut"), activating systemic and neuroinflammation. SCFAs from healthy microbiota reduce inflammation.<sup class="fn"><a href="#ref-27">[27]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC12007925/" target="_blank">Gut Microbiome & Mental Health (2025) &rarr;</a></span></sup></p>
<div class="s-stat"><div class="st"><div class="sv">Serotonin</div><div class="sl">Gut-Produced</div></div><div class="st"><div class="sv">GABA</div><div class="sl">Gut-Produced</div></div><div class="st"><div class="sv">SCFA</div><div class="sl">Anti-Inflammatory</div></div><div class="st"><div class="sv">LPS</div><div class="sl">Pro-Inflammatory</div></div></div>`,

`<p>Altered microbial diversity is documented in depression, anxiety, and schizophrenia. Decreased SCFA production leads to increased neuroinflammation. Proinflammatory bacteria are increased in schizophrenia. Dietary interventions (including ketogenic) improve microbiome composition, offering dual benefit: metabolic optimization plus microbiome improvement.<sup class="fn"><a href="#ref-30">[30]</a><span class="tip"><a href="https://www.mdpi.com/" target="_blank">Cenit et al. Cells (2024) &rarr;</a></span></sup></p>
<div class="s-chips"><span class="s-chip">diversity loss</span><span class="s-chip">SCFA reduction</span><span class="s-chip">LPS leakage</span><span class="s-chip">proinflammatory shift</span></div>`,

`<p>Emerging therapeutic approaches target the inflammation-metabolism cycle: ketogenic diets (NLRP3 inhibition + microbiome improvement), probiotics and prebiotics, exercise (reduces NLRP3, increases BDNF), and targeted anti-inflammatory agents. Fecal microbiota transplantation is very early but emerging.</p>

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 \u2014 Details</div><h2>The <em>NLRP3</em> Inflammasome</h2></div>
<p>The NLRP3 inflammasome is a multiprotein complex of the innate immune system that acts as a sensor for cellular stress. When activated, it processes pro-IL-1\u03b2 and pro-IL-18 into their active forms, initiating inflammatory cascades. In the brain, NLRP3 is primarily expressed in microglia.</p>
<h3>Convergent Signaling Node</h3>
<p>NLRP3 is activated by diverse stimuli: mitochondrial ROS, extracellular ATP, bacterial products (LPS), uric acid crystals, and cellular debris. This makes it a convergent node where metabolic dysfunction, infection, and cellular stress all funnel into the same inflammatory output. In depression, NLRP3 levels are significantly elevated, and its activation correlates with symptom severity.<sup class="fn"><a href="#ref-21">[21]</a><span class="tip"><a href="https://www.sciencedirect.com/" target="_blank">Wang et al. Pharmacol Res (2025) &rarr;</a></span></sup></p>
<h3>BHB as Direct Inhibitor</h3>
<p>Beta-hydroxybutyrate directly inhibits NLRP3 inflammasome assembly. This is not an indirect effect of ketone metabolism -- BHB binds to and prevents NLRP3 oligomerization.<sup class="fn"><a href="#ref-38">[38]</a><span class="tip"><a href="https://www.science.org/doi/10.1126/science.1227166" target="_blank">Shimazu et al. Science (2013) &rarr;</a></span></sup> This provides a molecular mechanism for the anti-inflammatory effects of ketogenic diets and fasting that is independent of their energetic effects. The dual action of BHB (energy substrate plus NLRP3 inhibitor) makes ketogenic intervention uniquely positioned among metabolic therapies.</p>
<h3>Therapeutic Target</h3>
<p>NLRP3 is increasingly recognized as a therapeutic target for depression. Several pharmaceutical companies are developing specific NLRP3 inhibitors. The ketogenic approach provides a dietary means of achieving partial NLRP3 inhibition. Exercise also reduces NLRP3 activation through mechanisms involving AMPK and anti-inflammatory myokines.</p>

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 \u2014 Details</div><h2><em>Cytokine</em> Elevation in Psychiatric Illness</h2></div>
<p>Elevated inflammatory cytokines in psychiatric disorders are among the most replicated findings in biological psychiatry. IL-6, TNF-\u03b1, and C-reactive protein are consistently elevated in patients with major depressive disorder, and these elevations are not minor associations -- they correlate with symptom severity and predict treatment resistance.</p>
<h3>IL-6 and Treatment Resistance</h3>
<p>Elevated IL-6 is one of the strongest predictors of antidepressant non-response. Patients with high baseline IL-6 are significantly less likely to respond to SSRIs. This has led to the proposal that inflammation-associated depression may be a distinct subtype requiring different treatment approaches -- including metabolic and anti-inflammatory interventions.</p>
<h3>Antidepressant Effects on Cytokines</h3>
<p>A 2025 Translational Psychiatry study showed that diverse antidepressant classes reduce pro-inflammatory markers (IFN-\u03b3, TNF-\u03b1, IL-6) while enhancing anti-inflammatory cytokines (IL-10, TGF-\u03b2). This suggests that the anti-inflammatory effect of antidepressants may contribute to their therapeutic action, not just their neurotransmitter effects. The metabolic theory provides a framework for understanding why this anti-inflammatory action matters.</p>
<h3>Bidirectional Causation</h3>
<p>The relationship between inflammation and depression appears bidirectional. Experimentally induced inflammation (e.g., interferon therapy for hepatitis C) produces depressive symptoms. Conversely, depression increases inflammatory markers. This bidirectionality creates a self-maintaining cycle that may explain why depression is often chronic and relapsing.</p>
<div class="callout"><h4>Clinical Implication</h4><p>If inflammatory biomarkers predict treatment resistance and identify a distinct depression subtype, measuring CRP and IL-6 at baseline could guide treatment selection. High-inflammation patients might benefit more from metabolic/anti-inflammatory approaches as adjuncts to standard care.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 \u2014 Details</div><h2><em>Microglial</em> Activation & Synaptic Damage</h2></div>
<p>Microglia serve as the brain's immune surveillance system. In their resting state, they continuously survey the neural environment, phagocytosing debris and supporting synaptic maintenance. When activated by inflammatory signals, they shift to an M1 phenotype that releases pro-inflammatory cytokines and engages in aggressive synaptic pruning.</p>
<h3>Chronic Activation in Depression</h3>
<p>PET imaging studies using TSPO ligands (markers of microglial activation) show increased microglial activation in the brains of depressed patients. This activation is particularly pronounced in the prefrontal cortex and anterior cingulate cortex -- the same regions showing glucose hypometabolism. Chronic microglial activation damages synapses, reduces neuroplasticity, and impairs the very circuits needed for mood regulation.</p>
<h3>The Self-Perpetuating Cycle</h3>
<p>Activated microglia release cytokines that damage mitochondria. Damaged mitochondria produce ROS that further activate microglia. This creates a self-perpetuating inflammatory cycle that maintains psychiatric symptoms even after the original stressor has resolved. Breaking this cycle -- through metabolic optimization, anti-inflammatory intervention, or both -- is a key therapeutic goal.</p>
<h3>Ketogenic Shift to Resting State</h3>
<p>Ketogenic diets appear to shift microglia from activated (M1) toward resting or anti-inflammatory (M2) phenotypes. This may occur through multiple mechanisms: BHB-mediated NLRP3 inhibition, reduced ROS from more efficient ketone oxidation, and improved mitochondrial function in microglia themselves. The combined effect is reduced neuroinflammation and improved synaptic maintenance.</p>
<div class="callout"><h4>Research Frontier</h4><p>Microglial imaging with next-generation PET tracers could potentially measure the neuroinflammatory effects of metabolic interventions directly. This would provide objective biomarkers for treatment response beyond self-reported symptom scales.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 \u2014 Details</div><h2><em>Oxidative</em> Stress as Molecular Bridge</h2></div>
<p>Reactive oxygen species (ROS) serve as the molecular bridge between mitochondrial dysfunction and neuroinflammation. This connection is critical for understanding why the metabolic theory encompasses both energy failure and inflammatory pathology -- they are linked through a common biochemical pathway.</p>
<h3>The Cascade</h3>
<p>Damaged or stressed mitochondria produce excess ROS through electron leak at Complexes I and III. ROS directly damage mitochondrial DNA and membrane lipids, further impairing function. Critically, ROS also activate the NLRP3 inflammasome, converting a metabolic problem into an inflammatory one. The resulting cytokine release (IL-1\u03b2, IL-18) further damages mitochondria, creating a positive feedback loop.</p>
<h3>Why Ketones Break the Cycle</h3>
<p>Ketone body oxidation produces fewer ROS than glucose oxidation, reducing the upstream signal. BHB directly inhibits NLRP3, blocking the conversion of oxidative stress to inflammation. BHB also increases expression of antioxidant genes through HDAC inhibition (increased FOXO3a and catalase transcription). These three mechanisms together break the ROS-inflammation cycle at multiple points simultaneously.</p>
<div class="callout"><h4>The Unifying Mechanism</h4><p>This ROS bridge explains why mitochondrial dysfunction (S2) and neuroinflammation (this section) co-occur in psychiatric disorders. They are not independent pathologies but connected aspects of the same metabolic-inflammatory cycle. Interventions that address one side necessarily affect the other.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 \u2014 Details</div><h2>The <em>Gut-Brain</em> Axis</h2></div>
<p>The gut-brain axis represents a bidirectional communication system connecting the gastrointestinal tract and central nervous system through microbial metabolites, neurotransmitters, immune signaling, and the vagus nerve. Recent research has established this axis as a major factor in psychiatric disorders.</p>
<h3>Microbial Neurotransmitter Production</h3>
<p>Approximately 90% of the body's serotonin is produced in the gut. Gut bacteria synthesize and regulate serotonin, dopamine, and GABA -- the same neurotransmitters targeted by psychiatric medications. Changes in gut microbiome composition can therefore directly affect neurotransmitter availability in the brain through both vagal and humoral pathways.</p>
<h3>Short-Chain Fatty Acids (SCFAs)</h3>
<p>Beneficial gut bacteria ferment dietary fiber into SCFAs (butyrate, propionate, acetate). SCFAs maintain gut barrier integrity, reduce inflammation, and cross the blood-brain barrier to influence neural function. Notably, butyrate is itself an HDAC inhibitor -- similar to BHB. Reduced SCFA production from gut dysbiosis may contribute to both peripheral and neuroinflammation.</p>
<h3>Leaky Gut and Systemic Inflammation</h3>
<p>Gut dysbiosis increases intestinal permeability, allowing bacterial lipopolysaccharides (LPS) to enter the bloodstream. LPS activates Toll-like receptor 4 (TLR4) on immune cells, triggering systemic inflammatory responses that reach the brain. This "leaky gut" mechanism provides another pathway by which metabolic and dietary factors affect brain function and psychiatric symptoms.</p>
<h3>Dietary Intervention Double Effect</h3>
<p>Dietary changes that improve metabolic health (ketogenic, whole-food, fiber-rich) simultaneously improve microbiome composition. This creates a dual benefit: direct metabolic optimization (better mitochondrial function, more ketones) plus indirect improvement through healthier gut microbiota (more SCFAs, less LPS translocation). The gut-brain axis amplifies the effects of metabolic intervention.</p>
<div class="callout"><h4>An Additional Entry Point</h4><p>The gut-brain axis provides another entry point into the metabolic-inflammatory cycle. Even modest dietary improvements that increase fiber and reduce processed food can shift microbiome composition toward anti-inflammatory profiles, potentially improving psychiatric symptoms through reduced systemic inflammation.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 \u2014 Details</div><h2><em>Gut</em> Dysbiosis in Psychiatric Disorders</h2></div>
<p>Studies consistently show altered gut microbiome composition in individuals with depression, anxiety, bipolar disorder, and schizophrenia. These are not minor variations but significant shifts in microbial diversity and community structure.</p>
<h3>Depression</h3>
<p>Depressed individuals show reduced diversity in gut microbiota, decreased abundance of SCFA-producing bacteria (Faecalibacterium, Coprococcus), and increased abundance of pro-inflammatory species. These changes correlate with symptom severity and persist beyond acute episodes.</p>
<h3>Schizophrenia</h3>
<p>Research reveals significant differences in microbial composition in schizophrenia, with an increase in proinflammatory bacteria. Gut-produced metabolites may influence brain function through immune and metabolic pathways. The metabolic disruption in schizophrenia may therefore have a gut component in addition to direct mitochondrial dysfunction.</p>
<h3>Emerging Treatments</h3>
<p>Probiotics (psychobiotics) are being tested as adjunctive treatments for depression and anxiety. Several clinical trials show modest but significant symptom improvement. Prebiotics (dietary fiber that feeds beneficial bacteria) improve microbiome composition. Fecal microbiota transplantation (FMT) is the most direct intervention but remains very early-stage for psychiatric applications.</p>
<div class="feat-grid"><div class="feat"><h4>Diversity Loss</h4><p>Reduced microbial diversity correlates with depression severity across multiple studies.</p></div><div class="feat"><h4>SCFA Reduction</h4><p>Decreased short-chain fatty acid production impairs gut barrier and increases inflammation.</p></div><div class="feat"><h4>Psychobiotics</h4><p>Specific probiotic strains showing promise as adjunctive treatments for mood disorders.</p></div><div class="feat"><h4>Diet as First Line</h4><p>Dietary improvements may be the most practical way to shift microbiome composition.</p></div></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 \u2014 Details</div><h2><em>Anti-Inflammatory</em> Therapeutic Approaches</h2></div>
<p>Multiple therapeutic approaches target the neuroinflammation pathway, either directly or through the metabolic-inflammatory connection documented in this section.</p>
<h3>Ketogenic Diet</h3>
<p>The ketogenic diet operates on inflammation through at least three mechanisms: (1) BHB directly inhibits NLRP3 inflammasome assembly, (2) ketone oxidation produces fewer ROS than glucose, reducing upstream inflammatory signaling, and (3) dietary changes improve gut microbiome composition, reducing LPS-mediated systemic inflammation. This multi-mechanism action distinguishes it from single-target pharmaceutical approaches.</p>
<h3>Exercise</h3>
<p>Exercise reduces NLRP3 inflammasome activation through AMPK signaling. It increases production of anti-inflammatory myokines (IL-6 as myokine acts anti-inflammatory, unlike IL-6 from immune cells). Exercise drives mitochondrial biogenesis, reducing the metabolic source of inflammatory signaling. The 2025 meta-analysis supporting exercise as a mainstay for depression management aligns with the neuroinflammation pathway.</p>
<h3>Targeted Anti-Inflammatory Agents</h3>
<p>Clinical trials of specific anti-inflammatory drugs (celecoxib, minocycline, anti-TNF agents) as adjuncts to antidepressants show modest but significant effects, particularly in patients with elevated baseline inflammation. NLRP3-specific inhibitors are in pharmaceutical development. These targeted approaches may complement broader metabolic interventions.</p>
<div class="callout"><h4>Integration Principle</h4><p>The most effective approach to neuroinflammation in psychiatric disorders may combine multiple strategies: dietary optimization (ketogenic or anti-inflammatory diet), regular exercise, sleep improvement, stress reduction, and potentially targeted supplementation or medication. Each addresses the inflammatory cycle through different entry points.</p></div>`
