<script>
const sections=[
{num:'01',short:'Ketogenic Diet',title:'<em>Ketogenic</em> Diet Protocol'},
{num:'02',short:'BHB Signaling',title:'<em>BHB</em> as Signaling Molecule'},
{num:'03',short:'Fasting',title:'<em>Intermittent</em> Fasting'},
{num:'04',short:'Exercise',title:'<em>Exercise</em> & Mitochondrial Biogenesis'},
{num:'05',short:'Sleep',title:'<em>Sleep</em> Optimization'},
{num:'06',short:'Supplements',title:'<em>Targeted</em> Supplementation'},
{num:'07',short:'Safety',title:'<em>Safety</em> & Monitoring'},
{num:'08',short:'Sources',title:'References & <em>Resources</em>'}
];
const summaries=[
`<p>High fat (70-80%), moderate protein (15-20%), very low carbohydrate (<5%, typically <50g/day). Forces metabolic switching to ketone production within 3-5 days. Stanford pilot (Sethi, 2024): 21 adults with bipolar/schizophrenia, 75% recovery, 100% metabolic syndrome reversal. JAMA Psychiatry RCT (2025): 88 participants with TRD, ketogenic group showed greater improvement.<sup class="fn"><a href="#ref-32">[32]</a><span class="tip"><a href="https://jamanetwork.com/journals/jamapsychiatry/fullarticle/2844388" target="_blank">JAMA Psychiatry RCT (2025) &rarr;</a></span></sup></p>
<div class="s-stat"><div class="st"><div class="sv">70-80%</div><div class="sl">Fat</div></div><div class="st"><div class="sv"><50g</div><div class="sl">Daily Carbs</div></div><div class="st"><div class="sv">3-5 days</div><div class="sl">Switching</div></div><div class="st"><div class="sv">2-4 wks</div><div class="sl">Mood Change</div></div></div>`,

`<p>Beta-hydroxybutyrate is not merely alternative fuel. It is an endogenous HDAC inhibitor (class I: HDAC1, HDAC3, HDAC4), NLRP3 inflammasome inhibitor, and epigenetic modifier. It increases BDNF and TrkB signaling in hippocampus. Published in Science (Shimazu et al., 2013).<sup class="fn"><a href="#ref-38">[38]</a><span class="tip"><a href="https://www.science.org/doi/10.1126/science.1227166" target="_blank">Shimazu et al. Science (2013) &rarr;</a></span></sup> This makes ketogenic intervention a multi-mechanism signaling therapy.</p>
<div class="s-stat"><div class="st"><div class="sv">HDAC</div><div class="sl">Inhibitor</div></div><div class="st"><div class="sv">NLRP3</div><div class="sl">Inhibitor</div></div><div class="st"><div class="sv">BDNF</div><div class="sl">Upregulation</div></div><div class="st"><div class="sv">Epigenetic</div><div class="sl">Modifier</div></div></div>
<div class="s-chips"><span class="s-chip">Science 2013</span><span class="s-chip">histone acetylation</span><span class="s-chip">\u03b2-hydroxybutyrylation</span><span class="s-chip">DNA methylation</span></div>`,

`<p>Periodic fasting (16:8 or 5:2 protocols) induces metabolic switching similar to ketogenic diet without permanent dietary changes. Increases autophagy and mitochondrial quality control. Evidence suggests comparable mood and cognitive benefits with better long-term adherence. May be more accessible than strict ketogenic protocol.</p>
<div class="s-stat"><div class="st"><div class="sv">16:8</div><div class="sl">Common Protocol</div></div><div class="st"><div class="sv">5:2</div><div class="sl">Alternative</div></div><div class="st"><div class="sv">Autophagy</div><div class="sl">Increased</div></div><div class="st"><div class="sv">Adherence</div><div class="sl">Better vs Keto</div></div></div>`,

`<p>Exercise increases mitochondrial biogenesis (PGC-1\u03b1 upregulation), enhances ATP production, reduces inflammation, upregulates BDNF, AMPK, SIRT1, and downregulates NLRP3. A 2025 meta-analysis declared exercise a "mainstay approach" for depression and anxiety.<sup class="fn"><a href="#ref-41">[41]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC12117297/" target="_blank">Singh et al. BJSM (2025) &rarr;</a></span></sup> Synergistic with dietary interventions. Both aerobic and resistance training beneficial.</p>
<div class="s-stat"><div class="st"><div class="sv">PGC-1\u03b1</div><div class="sl">Mito Biogenesis</div></div><div class="st"><div class="sv">BDNF</div><div class="sl">Upregulated</div></div><div class="st"><div class="sv">NLRP3</div><div class="sl">Downregulated</div></div><div class="st"><div class="sv">Mainstay</div><div class="sl">2025 Meta</div></div></div>`,

`<p>Sleep deprivation impairs mitochondrial function, increases ROS and inflammation. 7-9 hours nightly supports metabolic health. Circadian alignment important for metabolic function. Often overlooked dimension in metabolic psychiatry despite strong mechanistic rationale.</p>

`<p>CoQ10 supports electron transport chain. L-carnitine enhances fatty acid oxidation. B vitamins (B1, B6, B12, folate) are energy metabolism cofactors. Magnesium supports mitochondrial function and reduces anxiety. Alpha-lipoic acid: antioxidant for mitochondrial recovery. Omega-3: anti-inflammatory.</p>

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 \u2014 Details</div><h2><em>Ketogenic</em> Diet Protocol</h2></div>
<p>The ketogenic diet for psychiatric applications follows the same macronutrient ratios established for epilepsy treatment: 70-80% calories from fat, 15-20% from protein, and less than 5% from carbohydrates (typically less than 50g/day, often less than 20g for therapeutic ketosis). This forces the body to shift from glucose to ketone metabolism within 3-5 days.</p>
<h3>Stanford Pilot (Sethi, 2024)</h3>
<p>Dr. Shebani Sethi's pilot study enrolled 21 adults with bipolar disorder or schizophrenia who also had metabolic dysfunction. After four months on a ketogenic diet with clinical support, 75% of participants met recovery criteria. 100% of those with metabolic syndrome at baseline achieved complete reversal. The psychiatric improvements paralleled metabolic improvements, suggesting a shared mechanism.<sup class="fn"><a href="#ref-31">[31]</a><span class="tip"><a href="https://med.stanford.edu/news/all-news/2024/04/keto-diet-mental-illness.html" target="_blank">Sethi et al. Psychiatry Res (2024) &rarr;</a></span></sup></p>
<h3>JAMA Psychiatry RCT (2025)</h3>
<p>The first randomized controlled trial for ketogenic diet in psychiatry enrolled 88 UK participants with treatment-resistant depression. Over 6 weeks, the ketogenic group showed significantly greater improvement than controls. While small and short-duration, this represents the first RCT-level evidence for dietary metabolic intervention in a psychiatric condition, published in a top-tier journal.<sup class="fn"><a href="#ref-32">[32]</a><span class="tip"><a href="https://jamanetwork.com/journals/jamapsychiatry/fullarticle/2844388" target="_blank">JAMA Psychiatry RCT (2025) &rarr;</a></span></sup></p>
<h3>Practical Implementation</h3>
<p>Ketogenic diets for psychiatric patients require more clinical support than typical dietary interventions. Food planning, electrolyte monitoring, medication adjustment (particularly for diabetes medications and anticonvulsants that may need dose reduction), and psychiatric symptom monitoring are all necessary. The limited availability of dietitians in mental health settings is a significant barrier to implementation.</p>
<div class="callout"><h4>Evidence Assessment</h4><p>The clinical evidence is promising but early-stage. One RCT (n=88, 6 weeks) and several pilot studies. The magnitude of improvement in pilots is notable, but larger, longer, multi-site trials are needed before ketogenic diet can be recommended as standard psychiatric care.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 \u2014 Details</div><h2><em>BHB</em> as Multi-Mechanism Signaling Molecule</h2></div>
<p>The 2013 Science paper by Shimazu et al. transformed understanding of ketone bodies from simple alternative fuels to endogenous signaling molecules. Beta-hydroxybutyrate (BHB) inhibits class I histone deacetylases (HDAC1, HDAC3, HDAC4) in a dose-dependent manner. This was demonstrated at physiological concentrations achievable through fasting or ketogenic diet.<sup class="fn"><a href="#ref-38">[38]</a><span class="tip"><a href="https://www.science.org/doi/10.1126/science.1227166" target="_blank">Shimazu et al. Science (2013) &rarr;</a></span></sup></p>
<h3>HDAC Inhibition and Gene Expression</h3>
<p>By inhibiting HDACs, BHB increases histone acetylation, loosening chromatin structure and activating transcription of specific gene sets. Key upregulated genes include FOXO3a (longevity/stress resistance), MnSOD (mitochondrial antioxidant), and catalase (hydrogen peroxide detoxification). This means ketone metabolism directly enhances cellular antioxidant defenses through an epigenetic mechanism.</p>
<h3>BDNF Upregulation</h3>
<p>Through inhibition of HDAC2 and HDAC3 specifically, BHB increases brain-derived neurotrophic factor (BDNF) and TrkB signaling in the hippocampus. BDNF is the most-studied neurotrophin in depression -- reduced BDNF is one of the most replicated findings in depression research. BHB-mediated BDNF increase provides a direct molecular pathway from ketogenic metabolism to antidepressant effects.</p>
<h3>NLRP3 Inflammasome Inhibition</h3>
<p>Independent of its HDAC effects, BHB directly inhibits NLRP3 inflammasome assembly. This prevents processing of pro-IL-1\u03b2 into active IL-1\u03b2, reducing neuroinflammation. The anti-inflammatory effect operates through a different mechanism than the epigenetic effect, making BHB a true multi-target molecule.</p>
<h3>Novel Post-Translational Modification</h3>
<p>BHB also participates in a novel histone modification: \u03b2-hydroxybutyrylation. This is distinct from acetylation and represents a new type of epigenetic regulation directly linking metabolic state to chromatin structure. The full functional significance is still being characterized, but it demonstrates that metabolic intermediates can directly modify the epigenome.</p>

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 \u2014 Details</div><h2><em>Intermittent</em> Fasting</h2></div>
<p>Intermittent fasting induces periodic metabolic switching from glucose to ketone metabolism without requiring permanent dietary changes. The most common protocols are 16:8 (eating only during an 8-hour window daily) and 5:2 (normal eating 5 days, restricted calories 2 days per week).</p>
<h3>Metabolic Switching</h3>
<p>After approximately 12-16 hours of fasting, liver glycogen is depleted and ketogenesis begins. BHB levels rise, producing the same HDAC inhibition, NLRP3 suppression, and BDNF upregulation as ketogenic diet, but intermittently rather than continuously. Whether intermittent exposure is sufficient for psychiatric benefit is still being studied.</p>
<h3>Autophagy and Mitochondrial Quality Control</h3>
<p>Fasting activates autophagy -- the cellular recycling process that removes damaged organelles including dysfunctional mitochondria (mitophagy). This quality control mechanism ensures that new mitochondria replace damaged ones. Regular fasting may therefore improve overall mitochondrial function not by adding new mitochondria but by removing the worst-performing ones.</p>
<h3>Adherence Advantage</h3>
<p>Strict ketogenic diets are difficult to maintain long-term, especially for patients with severe mental illness. Intermittent fasting may provide many of the same metabolic benefits with better adherence. It requires no special food purchases, no macronutrient tracking, and allows normal eating during the feeding window. This accessibility advantage may matter more than theoretical metabolic superiority.</p>
<div class="callout"><h4>Practical Consideration</h4><p>For psychiatric patients who find ketogenic diet impractical, intermittent fasting may be a more achievable entry point to metabolic intervention. Even modest periods of metabolic switching (12-16 hours overnight) activate some degree of ketogenesis and autophagy.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 \u2014 Details</div><h2><em>Exercise</em> & Mitochondrial Biogenesis</h2></div>
<p>Exercise is the best-validated non-pharmaceutical intervention for depression and anxiety. The metabolic theory provides a mechanistic explanation for why exercise works through the same mitochondrial pathway as dietary interventions.</p>
<h3>PGC-1\u03b1 and Mitochondrial Biogenesis</h3>
<p>Exercise activates PGC-1\u03b1 (peroxisome proliferator-activated receptor gamma coactivator 1-alpha), the master regulator of mitochondrial biogenesis. PGC-1\u03b1 increases the number and improves the function of mitochondria in both muscle and brain. This directly addresses the mitochondrial deficit documented in psychiatric disorders.</p>
<h3>The AMPK-SIRT1-PGC-1\u03b1 Axis</h3>
<p>Exercise activates AMPK (energy sensor), which activates SIRT1 (deacetylase), which activates PGC-1\u03b1. This signaling cascade connects exercise-induced energy depletion to mitochondrial improvement. AMPK also inhibits mTOR (reducing inflammatory signaling) and activates autophagy (improving mitochondrial quality control).</p>
<h3>BDNF and Neuroplasticity</h3>
<p>Exercise is the most potent known stimulus for BDNF production in the brain. BDNF promotes neuroplasticity, neurogenesis in the hippocampus, and synaptic strengthening. The metabolic theory notes that exercise increases BDNF through the same pathway as BHB (via HDAC regulation), suggesting convergent mechanisms.</p>
<h3>Anti-Inflammatory Effects</h3>
<p>Exercise reduces NLRP3 inflammasome activation and increases anti-inflammatory cytokines. IL-6 released from exercising muscle acts as an anti-inflammatory myokine (distinct from IL-6 released from immune cells, which is pro-inflammatory). This anti-inflammatory effect addresses the neuroinflammation component of psychiatric illness.</p>
<h3>2025 Meta-Analysis</h3>
<p>A comprehensive meta-analysis of nearly 100 meta-reviews of RCTs, published in the British Journal of Sports Medicine, concluded that exercise should be a mainstay approach for managing depression, anxiety, and psychological distress. Both aerobic exercise and resistance training showed significant benefits, with effect sizes comparable to pharmacotherapy.</p>
<div class="callout"><h4>The Strongest Metabolic Intervention</h4><p>Exercise has the deepest evidence base of any metabolic intervention for psychiatric conditions. It works through the same mitochondrial pathways as ketogenic diet but with decades of RCT support. The metabolic theory explains why exercise is effective and suggests it should be combined with dietary optimization for maximal benefit.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 \u2014 Details</div><h2><em>Sleep</em> Optimization</h2></div>
<p>Sleep is critical for mitochondrial maintenance, yet sleep disruption is both a symptom and cause of psychiatric illness. This bidirectional relationship makes sleep optimization a key component of metabolic psychiatric intervention.</p>
<h3>Mitochondrial Maintenance During Sleep</h3>
<p>Sleep activates autophagy and mitophagy -- the processes that remove damaged mitochondria and cellular debris. The glymphatic system, active primarily during sleep, clears metabolic waste products from the brain. Chronic sleep deprivation therefore allows damaged mitochondria to accumulate and metabolic waste to build up, directly impairing brain energy production.</p>
<h3>ROS and Inflammation</h3>
<p>Sleep deprivation increases ROS production and inflammatory markers. Even one night of poor sleep measurably increases IL-6 and TNF-\u03b1. Chronic sleep disruption creates the same ROS-NLRP3-inflammation cycle documented in metabolic psychiatric illness. Restoring sleep quality may therefore break this cycle independently of dietary intervention.</p>
<h3>Circadian Alignment</h3>
<p>Mitochondrial function follows circadian rhythms. Enzymes of the electron transport chain, autophagy machinery, and antioxidant systems all show circadian variation. Disrupted circadian rhythms (shift work, irregular sleep patterns, social jet lag) impair these cyclical maintenance processes. Circadian alignment -- consistent sleep/wake times, morning light exposure, evening light reduction -- supports optimal mitochondrial function.</p>
<div class="callout"><h4>Often Overlooked</h4><p>Sleep optimization may be the most underutilized metabolic intervention in psychiatry. Unlike dietary changes, it requires no special resources. Unlike exercise, it requires no physical capacity. For patients unable to adopt ketogenic diets, improving sleep quality and duration may provide meaningful metabolic benefit.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 \u2014 Details</div><h2><em>Targeted</em> Supplementation</h2></div>
<p>Supplementation targets specific components of the mitochondrial energy production pathway. Evidence varies by compound, with CoQ10 and magnesium having the strongest support.</p>
<h3>CoQ10 (Ubiquinone)</h3>
<p>CoQ10 is a required electron carrier between Complexes I-II and Complex III in the electron transport chain. Supplementation has shown benefit in mitochondrial disorders and has been studied in depression with mixed but generally positive results. It also serves as a lipid-soluble antioxidant, protecting mitochondrial membranes from ROS damage.</p>
<h3>Magnesium</h3>
<p>Magnesium is required for over 300 enzymatic reactions including ATP production (ATP actually exists as Mg-ATP complex). Magnesium deficiency is common in psychiatric populations and correlates with depression and anxiety. Supplementation shows anxiolytic effects in clinical trials and supports mitochondrial function directly.</p>
<h3>B Vitamins</h3>
<p>B1 (thiamine), B2 (riboflavin), B3 (niacin), B6, B12, and folate are all required as cofactors in mitochondrial energy metabolism. Deficiencies impair ATP production. While supplementation shows clear benefit in deficient individuals, evidence for benefit in replete individuals is weaker.</p>
<h3>Alpha-Lipoic Acid</h3>
<p>A mitochondrial antioxidant that crosses the blood-brain barrier. It regenerates other antioxidants (vitamin C, vitamin E, glutathione) and chelates redox-active metals. May help break the ROS-mitochondrial damage cycle.</p>
<h3>Omega-3 Fatty Acids</h3>
<p>EPA and DHA reduce neuroinflammation through resolvin and protectin production. Multiple meta-analyses show modest but significant antidepressant effects, particularly for EPA-predominant formulations. The anti-inflammatory mechanism aligns with the metabolic theory's neuroinflammation component.</p>
<div class="callout"><h4>Supplementation Hierarchy</h4><p>For patients adopting metabolic approaches: (1) Magnesium and electrolytes first (especially with ketogenic diet). (2) CoQ10 if mitochondrial support is primary goal. (3) Omega-3 if inflammation is prominent. (4) B vitamins if diet quality is poor. Supplementation should complement, not replace, dietary and lifestyle interventions.</p></div>`,

`<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 \u2014 Details</div><h2><em>Safety</em> & Clinical Monitoring</h2></div>
<p>Metabolic interventions in psychiatric populations require careful clinical oversight. While generally safe, specific considerations apply.</p>
<h3>Ketogenic Diet Safety</h3>
<p>Initial "keto flu" (headache, fatigue, irritability) typically resolves within 1 week with adequate electrolyte supplementation. Sodium, potassium, and magnesium requirements increase during ketosis. Dehydration risk is elevated in the transition period. Long-term concerns include kidney stones (rare, mitigated by hydration) and lipid panel changes (variable, often improve despite higher fat intake).</p>
<h3>Medication Interactions</h3>
<p>Ketogenic diet may alter the metabolism and efficacy of psychiatric medications. Anticonvulsants (valproic acid, carbamazepine) may need dose adjustment. Diabetes medications (insulin, metformin) may require reduction as glucose metabolism improves. Lithium levels may be affected by electrolyte changes. Close psychiatric and medical monitoring during dietary transition is necessary.</p>
<h3>Vulnerable Populations</h3>
<p>Patients with eating disorder history require careful screening before ketogenic intervention. The restrictive nature of the diet could trigger disordered eating patterns. Patients with severe mental illness may have limited executive function for meal planning and preparation. Patients with food insecurity may not have access to ketogenic-appropriate foods.</p>
<h3>Implementation Recommendations</h3>
<p>Hospital initiation recommended for severe mental illness. Multidisciplinary team (psychiatrist, dietitian, primary care). Regular monitoring: ketone levels, electrolytes, lipids, psychiatric symptoms, medication levels. Clear protocols for medication adjustment as metabolic health improves. Patient education about the difference between nutritional ketosis (safe) and diabetic ketoacidosis (dangerous).</p>
<div class="callout"><h4>Clinical Reality</h4><p>The gap between metabolic psychiatry research and clinical infrastructure is the field's biggest practical challenge. Few psychiatric facilities employ dietitians. Insurance may not cover metabolic psychiatry consultations. Standardized protocols are still being developed. Bridging this implementation gap is as important as generating more evidence.</p></div>`

function urs(){if(rp.scrollTop>20){rt.classList.add('scrolled');st.classList.add('visible');st.textContent=sections[c].short}else{rt.classList.remove('scrolled');st.classList.remove('visible')}}rp.addEventListener('scroll',urs);
let ht;document.addEventListener('mousemove',e=>{const x=e.target.closest('.sidebar-item');if(x&&document.body.classList.contains('detail-open')){clearTimeout(ht);tip.classList.add('visible');tip.textContent=x.getAttribute('data-label');const r=x.getBoundingClientRect();tip.style.top=(r.top+r.height/2-12)+'px';tip.style.left=(r.right+12)+'px'}else{ht=setTimeout(()=>tip.classList.remove('visible'),100)}});
</script>
