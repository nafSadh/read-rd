<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S1: Historical Melancholy &mdash; Fashionable Despair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

    <h2>The Humoral <em>Foundation</em></h2>
  </div>
  <p>The word &ldquo;melancholy&rdquo; itself tells the story of its origins. From the Greek <em>melas</em> (dark, black) and <em>khole</em> (bile), it names the blackest of the four bodily humours in the Hippocratic medical system. Where blood made you sanguine and yellow bile made you choleric, an excess of black bile made you melancholic &mdash; prone to fears, despondency, poor appetite, sleeplessness, and irritability. The spleen was the suspected organ of origin. The planet Saturn governed the condition, lending us the adjective &ldquo;saturnine.&rdquo;</p>
  <p>What makes the Hippocratic account remarkable is its clinical precision. Of the nine symptoms listed in the modern DSM-5 for major depressive disorder, six appear in Hippocratic descriptions written around the 5th century BC: depressed mood, sleep disturbance, appetite change, loss of interest, psychomotor agitation, and fatigue. The overlap suggests that the underlying experience of depression has been recognizably consistent for millennia, even as cultural framings have shifted wildly.</p>
  <h3>Aristotle&rsquo;s Question</h3>
  <p>The pivotal moment comes in <em>Problemata</em> XXX.1, attributed to Aristotle or his school: &ldquo;Why is it that all men who have become outstanding in philosophy, statesmanship, poetry, or the arts are melancholic?&rdquo; The question itself does most of the work. It does not ask <em>whether</em> genius and melancholy are linked &mdash; it presupposes the link and asks for the mechanism. In doing so, it establishes a template that every subsequent era will fill in with its own explanations: Neoplatonic cosmology, Romantic sensibility, creative genius, existential authenticity.</p>
  <p>The feedback loop is elegant and self-reinforcing. If great minds are melancholic, then melancholy signals a great mind. If you want to be taken seriously as a thinker, performing melancholy is a shortcut. And if you perform it long enough, it becomes indistinguishable from the real thing. This is precisely the dynamic that repeats on social media 2,400 years later.</p>

    <h2>Vice to <em>Virtue</em></h2>
  </div>
  <p>Marsilio Ficino occupies the most consequential position in the history of fashionable sadness. A Florentine Neoplatonist, physician, and priest (1433&ndash;1499), Ficino performed an intellectual alchemy that would echo for centuries: he took the humour most associated with suffering and rebranded it as the humour of genius. Art historian Roy Strong, in an influential 1964 essay in <em>Apollo</em>, traces the origins of England&rsquo;s fashionable melancholy directly to Ficino&rsquo;s intervention.</p>
  <p>The mechanism was cosmological. In Ficino&rsquo;s system, Saturn &mdash; the planet that governed the melancholic temperament &mdash; was also the planet of contemplation, deep thought, and philosophical insight. Through this celestial link, melancholy stopped being a disease to be cured and became a sign of a soul drawn to higher things. The logic was: Saturn makes you melancholic; Saturn also makes you a philosopher; therefore melancholy and philosophy are kindred states.</p>
  <h3>The Cultural Cascade</h3>
  <p>The effects were swift and pervasive. By the late 16th century, as Strong documents, melancholic poses became standard in English portraiture. Sitters were arranged in the posture of &ldquo;the lover, with his crosse&rdquo; &mdash; arms folded, gaze downcast, hat pulled low. These were not portraits of illness but of status. To be painted in the melancholic pose was to claim membership in the intellectual elite. Giorgio Vasari, the great biographer of Renaissance artists, considered painters &ldquo;especially prone to melancholy by the nature of their work&rdquo; &mdash; and his subjects knew it and played to it.</p>
  <p>The parallel to contemporary social media is almost uncanny. Where the 16th-century gentleman had his portrait commissioned in the melancholic pose, the 21st-century teenager curates a feed of greyscale images and Sylvia Plath quotes. Both are using cultural tools to signal depth through displayed suffering. Both are performing a version of Ficino&rsquo;s move: converting pathology into prestige.</p>
  <h3>The Destigmatization Paradox &mdash; First Instance</h3>
  <p>Here lies the deepest tension in the entire project. Ficino&rsquo;s move was, in one reading, genuinely liberating. Before him, the melancholic was sick, sinful, perhaps possessed. After him, the melancholic was gifted, sensitive, tuned to frequencies others couldn&rsquo;t hear. This is destigmatization in its purest form. But it came at a cost: by making melancholy desirable, Ficino created incentives for its performance. And once performance and experience become indistinguishable &mdash; once the pose of melancholy earns the same social rewards as the condition &mdash; the concept loses its diagnostic utility. This is exactly the problem that Freya India and others identify in contemporary therapy culture: the labels become social currency, and the distinction between description and performance collapses.</p>
  <div class="callout">
    <h4>The Template</h4>
    <p>Every subsequent era repeats Ficino&rsquo;s move in its own idiom: Romantics rebrand suffering as artistic sensitivity; Prozac Nation rebrands it as chemical identity; TikTok rebrands it as aesthetic. The structure is always the same: take a stigmatized experience, make it signal depth, and watch the distinction between genuine and performed collapse.</p>

  // 03 Detail — Burton
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div>
    <h2>The First Literature of <em>Sadness</em></h2>
  </div>
  <p>If Ficino provided the philosophical license, Robert Burton provided the script. His <em>Anatomy of Melancholy</em> (1621) &mdash; full title: <em>The Anatomy of Melancholy, What It Is: With All the Kinds, Causes, Symptomes, Prognostickes, and Several Cures of It</em> &mdash; runs to over 900 pages and treats melancholy as both medical condition and cosmic joke. The book is itself a melancholic performance: too long, too digressive, too obsessive, as though the form must mirror the condition it describes.</p>
  <p>Burton wrote under the pseudonym Democritus Junior, positioning himself as heir to the &ldquo;laughing philosopher&rdquo; who saw human folly clearly enough to find it absurd rather than tragic. But the comedy is a thin membrane over genuine suffering. Burton reportedly struggled with depression throughout his life, and the <em>Anatomy</em> reads like a man trying to understand himself by understanding everything. The book surveys love melancholy, religious melancholy, political melancholy, jealousy, solitude, air quality, diet &mdash; the scope is staggering and slightly mad.</p>
  <h3>The Visual and Musical Traditions</h3>
  <p>D&uuml;rer&rsquo;s <em>Melencolia I</em> (1514) deserves special attention because it establishes the visual vocabulary of intellectual melancholy that persists to this day. The engraving shows a winged figure surrounded by tools of geometry and science &mdash; compass, magic square, truncated rhombohedron &mdash; but the figure is not working. She sits, chin on fist, staring into the middle distance. This is melancholy as the state of waiting for inspiration to strike. The tools are there; the capacity is there; but the will has gone somewhere else. It is the first image of what we now call creative block, and it presents that block as noble rather than pathetic.</p>
  <p>Edward Young&rsquo;s <em>Night-Thoughts</em> (1742&ndash;45), published in nine &ldquo;nights,&rdquo; achieved something Burton could not: it went viral. Translated into French, German, Italian, Spanish, Portuguese, and Swedish, it influenced early Romantics across Europe. William Blake illustrated a later edition. The poem&rsquo;s central conceit &mdash; a narrator meditating through the night on life, death, and immortality &mdash; established the template for melancholic literature as nocturnal, solitary, and addressed to an absent or indifferent audience. Every late-night Tumblr post about feeling empty is, in some distant structural sense, a descendant of Young&rsquo;s Night-Thoughts.</p>
  <h3>Performance as Content</h3>
  <p>What all three works share &mdash; Burton&rsquo;s prose, D&uuml;rer&rsquo;s engraving, Young&rsquo;s poetry &mdash; is that they are not reports about melancholy but <em>performances</em> of it. They make sadness into content. They demonstrate that suffering, when properly aestheticized, becomes valuable: commercially (Burton&rsquo;s book was a bestseller), socially (D&uuml;rer&rsquo;s engraving was widely copied), and culturally (Young&rsquo;s poem shaped a continental movement). This is the lesson the Romantics will take to its extreme, and that social media will later industrialize.</p>
  <div class="callout">
    <h4>The Content Model</h4>
    <p>Burton, D&uuml;rer, and Young don&rsquo;t just describe melancholy &mdash; they produce it as content. They demonstrate that suffering, properly aestheticized, generates cultural value. Every era since has rediscovered this formula.</p>
  </div>`,

  // 04 Detail — Romantics
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div>
    <h2>The Genius Cult at Full <em>Power</em></h2>
  </div>
  <p>If Ficino lit the fuse and Burton laid the foundation, the Romantics built the cathedral. Between roughly 1770 and 1850, melancholy moved from an interesting intellectual pose to the defining characteristic of the artist. To be a serious poet was to suffer. To suffer beautifully was to prove the seriousness of your art. The circularity is obvious in retrospect, but it was lived with absolute conviction at the time.</p>
  <h3>Keats and the Dwelling</h3>
  <p>John Keats&rsquo;s &ldquo;Ode on Melancholy&rdquo; (1820) is the most sophisticated articulation of the Romantic position. The poem opens with negation: do not go to Lethe, do not seek forgetfulness, do not reach for the poisons that numb. Instead, the poem commands: &ldquo;go to&rdquo; melancholy. Dwell in it. The reason is ontological, not therapeutic: melancholy &ldquo;dwells with Beauty &mdash; Beauty that must die.&rdquo; Sadness and beauty are not opposites but companions, and the capacity to feel one depends on the capacity to feel the other.</p>
  <p>Helen Vendler reads the poem as a &ldquo;heroic romantic quest, a descent into Hades to find the female goddess Melancholy.&rdquo; This framing is important: melancholy is not something to be cured but something to be sought, a feminine divine figure who rewards those brave enough to approach her. The gendering is telling &mdash; the poet is male, the melancholy is female, and the encounter is framed as conquest or seduction.</p>
  <h3>Goethe and the First Viral Sadness</h3>
  <p>Goethe&rsquo;s <em>Die Leiden des jungen Werthers</em> (1774) is the first documented case of sadness going viral with lethal consequences. The novel, about a young artist who kills himself over unrequited love, triggered a wave of copycat suicides across Europe &mdash; young men dressed in Werther&rsquo;s costume (blue coat, yellow vest) and shot themselves. The phenomenon was so widespread that the book was banned in several jurisdictions. It remains the most extreme example of what happens when fashionable melancholy meets a susceptible audience without the protective irony of distance.</p>
  <h3>The Pelican Image</h3>
  <p>Irving Babbitt captures the Romantic self-conception with characteristic directness: the Romantic poet &ldquo;is like the pelican who rends and lacerates his own flesh to provide nourishment for his young.&rdquo; The poet&rsquo;s suffering is not incidental to his art &mdash; it IS the art. Musset: &ldquo;Les plus d&eacute;sesp&eacute;r&eacute;s sont les chants les plus beaux&rdquo; &mdash; the most desperate songs are the most beautiful. This equation (maximum suffering = maximum beauty) is the logical endpoint of Aristotle&rsquo;s question, and it remains operative today in every cultural context where &ldquo;authenticity&rdquo; is measured by visible pain.</p>
  <h3>Pfau and the Epistemological Reading</h3>
  <p>Thomas Pfau offers a more charitable interpretation. In <em>Romantic Moods</em> (2005), he argues that Romantic melancholy stems from &ldquo;an excess of knowledge that exceeds representation, leading to feelings of futility.&rdquo; This is melancholy not as self-indulgence but as the natural response to seeing more than you can articulate. It is, in a philosophical register, strikingly close to what <a href="../../sci-fi-te/retrocausal-emotion/" title="Retrocausal Emotion">the retrocausality project</a> describes as depression being &ldquo;structurally correct for certain worldlines&rdquo; &mdash; the idea that some forms of despair may be accurate perceptions of reality rather than distortions of it.</p>
  <div class="callout">
    <h4>The Romantic Equation</h4>
    <p>Maximum suffering = maximum beauty = maximum authenticity. This equation, fully operational by 1820, has never been dismantled. It has only changed platforms.</p>
  </div>`,

  // 05 Detail — Class
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div>
    <h2>Who Got to Be <em>Melancholic</em></h2>
  </div>
  <p>The history of fashionable melancholy has a persistent demographic signature. It belongs to educated, wealthy, Western men &mdash; and occasionally to women who are young, beautiful, and doomed (Ophelia, Lady of Shalott). This is not accidental. It is structural. Melancholy-as-genius requires three preconditions that map neatly onto class privilege: leisure (to be introspective rather than productive), education (to articulate one&rsquo;s suffering in culturally valued forms), and social position (to have one&rsquo;s suffering taken seriously rather than dismissed).</p>
  <p>Eighteenth-century writers were explicit about this. The melancholic diagnosis was most likely to be applied to &ldquo;the well-to-do, the sedentary, and the studious.&rdquo; The laboring classes experienced suffering too, of course, but their suffering was not melancholy &mdash; it was exhaustion, poverty, disease. Their sadness had no aesthetic dimension because no one was looking at it aesthetically. Matthew Bell argues in his study of European melancholia that the condition is &ldquo;fundamentally associated with a Western understanding of self-consciousness&rdquo; &mdash; not a universal feature of human experience but a cultural product of specific social conditions.</p>
  <h3>The Gender Filter</h3>
  <p>Erin Frink&rsquo;s 2016 thesis on Romantic melancholy in England and Spain includes a chapter specifically on &ldquo;the female perspective on melancholy and its cultural implications as it differs from the male perspective.&rdquo; The difference is stark: male melancholy is genius. Female melancholy is madness, or worse, decoration. When a man like Byron is melancholic, he is a brooding genius. When Ophelia is melancholic, she is a beautiful corpse. The sad girl aesthetic of TikTok inherits this exact dynamic: female sadness is permitted only when it is visually appealing, and the <a href="s3-social-aesthetics.dd.html" title="Social Media Aesthetics">S3 deep-dive</a> will show how this filter continues to operate.</p>
  <h3>Precursor to S6</h3>
  <p>This section is necessarily a preface to <a href="s6-who-gets-sad.dd.html" title="Who Gets to Be Sad">S6: Who Gets to Be Sad</a>, which examines the contemporary version of this class dynamic through the lens of race, gender, and access. The core pattern is identical: fashionable sadness is available to those whose suffering is already considered interesting, and invisible for those whose suffering is considered ordinary or expected. What changes across centuries is who counts as &ldquo;interesting&rdquo; and what forms the aesthetic takes.</p>
  <div class="callout">
    <h4>The Class Filter</h4>
    <p>If you were a laborer, you were tired. If you were a poet, you were melancholic. If you were a woman, you were mad. The social position of the sufferer determined whether sadness was interpreted as depth or deficiency.</p>
  </div>`,

  // 06 Detail — Medicalization
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div>
    <h2>The End &mdash; and Its <em>Ghost</em></h2>
  </div>
  <p>The end of fashionable melancholy has a precise historical location: the turn of the 19th century in France. Philippe Pinel, absorbing the contributions of British psychiatry, abandoned both the humoral doctrine and the Renaissance dual character of melancholy. He located melancholy exclusively among forms of mental alienation &mdash; it was now a disease category, not a philosophical position. His student Jean-&Eacute;tienne Dominique Esquirol went further, explicitly refusing to attribute &ldquo;that particular superiority of talent&rdquo; to melancholic patients. The genius-sadness link was, for the first time, officially severed by medical authority.</p>
  <p>This was the beginning of what <a href="s2-medicalization.dd.html" title="The Medicalization Arc">S2</a> will trace in detail: the medicalization of sadness. But the Pinel-Esquirol moment deserves attention here because of what it destroyed. The Springer volume <em>Melancholy Experience in Literature of the Long Eighteenth Century</em> notes that the discarding of melancholy as a diagnostic entity in the 20th century meant that &ldquo;this rich language, unfortunately, also disappeared from the public eye.&rdquo; Over centuries, &ldquo;varied analogies, metaphors, images and ideas amassed around this notion of melancholy, and those suffering from it had powerful means to speak and write about their experiences.&rdquo; When the medical term changed, the experiential vocabulary went with it.</p>
  <h3>The Vocabulary Gap</h3>
  <p>This loss may be one of the most underappreciated consequences of medicalization. The shift from &ldquo;melancholy&rdquo; to &ldquo;depression&rdquo; was not just a terminological update; it was a narrowing of what could be said about the experience. &ldquo;Melancholy&rdquo; carried centuries of philosophical, literary, and spiritual meaning. &ldquo;Depression&rdquo; carries clinical meaning and little else. The word itself is flat &mdash; etymologically, a pressing-down, a deflation. It describes the condition from the outside. &ldquo;Melancholy&rdquo; described it from the inside, with all the ambiguity and richness that entails.</p>
  <p>This vocabulary gap may be part of why the language of fashionable sadness keeps being reinvented. If clinical terminology cannot express the felt experience of suffering, people will find other languages that can &mdash; aesthetic languages, identity languages, meme languages. The sad girl aesthetic, the therapy-speak vocabulary, the diagnostic-identity fusion that Freya India critiques &mdash; all of these can be read as attempts to rebuild the experiential language that medicalization stripped away.</p>
  <h3>The Ghost</h3>
  <p>The &ldquo;ghost&rdquo; of fashionable melancholy is the persistent cultural intuition that suffering should mean something &mdash; that it should signify depth, sensitivity, or truth rather than mere malfunction. Pinel and Esquirol killed the formal link between melancholy and genius, but they could not kill the desire for that link. It persists in every cultural moment where someone performs sadness in hopes of being seen as deep, where a diagnosis becomes a badge rather than a burden, where the aesthetics of suffering generate more engagement than the mechanics of recovery.</p>
  <div class="callout">
    <h4>The Vocabulary Hypothesis</h4>
    <p>When &ldquo;melancholy&rdquo; became &ldquo;depression,&rdquo; centuries of experiential language disappeared. The sad girl aesthetic, therapy-speak, and diagnostic identity may all be attempts to rebuild what medicalization stripped away.</p>
  </div>

  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div>
    <h2>What Sources <em>Disagree</em> On</h2>
  </div>
  <p>Three deep disagreements run through the historical literature. Each maps directly onto tensions in the contemporary debate, which is part of what makes this section the foundation for the rest of the project.</p>
  <h3>Tension 1: Continuity vs. Reinvention</h3>
  <p>Is fashionable sadness one continuous tradition stretching from Aristotle to TikTok, or are there multiple independent inventions that merely look similar? The continuity view holds that each era inherits and modifies the previous one&rsquo;s template: Ficino inherits Aristotle, the Romantics inherit Ficino, Prozac Nation inherits the Romantics, the sad girl aesthetic inherits Prozac Nation. The reinvention view holds that similar social conditions (leisure, literacy, a medium for self-expression, an audience hungry for authenticity) independently produce similar patterns. The answer probably involves both, but it matters: if the tradition is continuous, then understanding Ficino helps us understand TikTok. If each is independent, then historical analysis is illuminating but not predictive.</p>
  <h3>Tension 2: Liberation vs. Glamorization</h3>
  <p>Was Ficino&rsquo;s move liberating (removing the shame of melancholy, allowing sufferers to be seen as human rather than cursed) or destructive (glamorizing suffering, creating incentives for its performance, making the distinction between genuine and affected impossible)? This tension is not resolvable because both effects are real and operate simultaneously. It is precisely the tension that haunts contemporary mental health discourse: destigmatization and romanticization use the same vocabulary, occupy the same platforms, and are often performed by the same people. The historical evidence suggests that you cannot have one without the other &mdash; that every attempt to remove the shame of suffering also creates a market for its performance.</p>
  <h3>Tension 3: Philosophy vs. Pathology</h3>
  <p>Is melancholy a philosophically distinct state &mdash; a way of seeing the world that is accurate even if painful &mdash; or is it just depression with better PR? Keats scholars and Romantic literary critics tend to insist on the distinction: melancholy is creative, generative, epistemologically rich; depression is its pathological shadow, where the capacity for insight collapses into paralysis. Clinical researchers tend to find no meaningful difference. Thomas Pfau&rsquo;s reading of Romantic melancholy as &ldquo;an excess of knowledge that exceeds representation&rdquo; offers a sophisticated version of the philosophical position, but it also risks providing intellectual cover for the refusal of treatment.</p>
  <div class="callout">
    <h4>The Foundational Paradox</h4>
    <p>Every attempt to remove the shame of mental illness also creates a market for its performance. This is not a modern problem. It is 2,400 years old.</p>
  </div>`

  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> CATEGORY · LABEL</div><!-- ← CHANGE -->
        <div class="hero-title">Your Topic <em>Title</em></div><!-- ← CHANGE -->
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Subtitle · Additional Context</span></div><!-- ← CHANGE -->
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
</body>
</html>
