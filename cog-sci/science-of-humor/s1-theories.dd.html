const details = [
  `${dh}Section 01</div><h2><em>Incongruity</em> Theory</h2></div>
  <h3>Historical Development</h3>
  <p>The incongruity tradition is the oldest surviving humor theory with continuous philosophical development. Kant (1790) described humor as &ldquo;the sudden transformation of a strained expectation into nothing&rdquo; &mdash; we build up an expectation and the resolution dissolves it. Schopenhauer (1818) framed it as perceiving a mismatch between a concept and the real objects it was supposed to represent. Kierkegaard added the idea that the comic resides in the <em>contradiction</em> between expected and actual outcomes.</p>
  <h3>Modern Incongruity-Resolution</h3>
  <p>The modern form, developed by Suls (1972) and Shultz (1976), adds a critical second step: not just perceiving incongruity but <strong>resolving</strong> it. A pun works because the listener detects the incongruity (two meanings) and resolves it (the unexpected meaning fits). An absurdist joke works because resolution <em>fails</em> &mdash; the incongruity remains unresolved, and the failure itself is funny. This two-stage model maps neatly onto neuroscience: incongruity detection activates the temporo-parietal junction; resolution activates prefrontal cortex; successful resolution triggers reward circuits.</p>
  <h3>Scope and Limits</h3>
  <p>Incongruity theory has the broadest explanatory scope of any humor theory. It accounts for: puns and wordplay (semantic incongruity), logical jokes (expectation violation), absurdist humor (unresolvable incongruity), observational humor (revealing hidden incongruities in daily life), and most narrative jokes (setup creates expectation, punchline violates it). Its limits are revealing: it struggles with humor that has no cognitive content &mdash; tickling, contagious laughter, slapstick involving pure physicality. These may require different explanatory frameworks entirely, or they may suggest that the &ldquo;incongruity&rdquo; is embodied rather than conceptual.</p>
  <h3>Connection to Neuroscience</h3>
  <p>The two-stage incongruity-resolution model has been largely confirmed by fMRI research. Wattendorf et al. (2023) showed that incongruity detection activates different brain regions than resolution and appreciation<sup class="fn"><a>[6]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/36598783/" target="_blank">Wattendorf et al.: Dorsal vs Ventral Striatum in Humor (2023) &rarr;</a></span></sup>. The model predicts that jokes requiring more cognitive work for resolution should produce stronger reward signals when they succeed &mdash; and this too has been confirmed. The harder the puzzle, the bigger the laugh, up to the point where resolution fails entirely.</p>
  <div class="callout"><h4>Why This Matters</h4><p>Incongruity theory is not just the most popular humor theory &mdash; it is the one with the strongest neuroscientific support. The brain&rsquo;s joke-processing pipeline mirrors the theory&rsquo;s two-stage model almost exactly. This convergence between philosophy and neuroscience suggests the theory has identified something real about the mechanism of humor, even if it cannot explain every instance.</p></div>`,

  `${dh}Section 02</div><h2><em>Superiority</em> Theory</h2></div>
  <h3>From Plato to Hobbes</h3>
  <p>Plato argued in the <em>Philebus</em> that the laughable is a form of self-ignorance &mdash; we laugh at people who do not know themselves. Aristotle saw comedy as the representation of people as worse than average. These observations remained informal until Hobbes crystallized them in <em>Leviathan</em> (1651): laughter is &ldquo;sudden glory arising from some sudden conception of some eminency in ourselves, by comparison with the infirmity of others, or with our own formerly.&rdquo;</p>
  <h3>The Power Dynamic</h3>
  <p>What makes superiority theory uncomfortable is also what makes it honest: much humor <em>does</em> involve laughing at someone. Satire targets the powerful. Mockery targets the pretentious. Schadenfreude is pleasure in others&rsquo; misfortune. Roasts are ritualized public humiliation dressed as affection. The theory is strongest in exactly the situations where humor intersects with social hierarchy and status competition.</p>
  <h3>Self-Deprecation as Counterexample</h3>
  <p>The theory&rsquo;s most obvious failure is self-deprecating humor. When a comedian mocks themselves, the audience laughs <em>with</em> the comedian, not <em>at</em> them. The comedian gains status precisely by demonstrating the confidence to lower it. Some defenders argue this is still superiority &mdash; the audience feels superior to the version of the comedian being mocked &mdash; but this stretches the theory past its natural limits.</p>
  <h3>Modern Relevance</h3>
  <p>The superiority dimension resurfaces in modern debates about &ldquo;punching up&rdquo; versus &ldquo;punching down.&rdquo; The intuition that mocking the powerful is more acceptable than mocking the vulnerable is essentially a refinement of superiority theory: the direction of the power dynamic matters. Benign violation theory absorbs this insight &mdash; punching down is a more severe violation because the target is more vulnerable, making it harder for the violation to seem benign.</p>
  <div class="callout"><h4>Why This Matters</h4><p>Superiority theory identifies something real but partial. It explains the social weapon dimension of humor &mdash; the fact that laughter can wound, exclude, and dominate. Ignoring this dimension (as pure incongruity theory tends to) leaves half the picture missing. The best theories of humor acknowledge both the playful and the aggressive dimensions.</p></div>`,

  `${dh}Section 03</div><h2><em>Relief</em> Theory</h2></div>
  <h3>Spencer&rsquo;s Hydraulic Model</h3>
  <p>Herbert Spencer (1860) proposed a quasi-physiological model: the body accumulates &ldquo;nervous energy&rdquo; that needs discharge, and laughter is one of the discharge mechanisms. When an emotion is aroused and then discovered to be unnecessary (a threat turns out to be harmless), the energy is released as laughter. This hydraulic metaphor is crude but captures something real: the relief of tension is a genuine component of much humor.</p>
  <h3>Freud&rsquo;s Elaboration</h3>
  <p>Freud&rsquo;s <em>Jokes and Their Relation to the Unconscious</em> (1905) is the most sophisticated version of relief theory. Freud distinguished three types of the comic: <strong>jokes</strong> (which save expenditure on inhibition), <strong>the comic</strong> (which saves expenditure on thought), and <strong>humor</strong> (which saves expenditure on emotion). The joke allows expression of what the superego normally forbids &mdash; the &ldquo;forepleasure&rdquo; of the joke&rsquo;s technique bribes the censor into allowing the forbidden thought.</p>
  <h3>Joke-Work and Dream-Work</h3>
  <p>Freud saw deep parallels between how jokes and dreams process content. Both use <strong>condensation</strong> (packing multiple meanings into one image or word), <strong>displacement</strong> (redirecting attention from the real target), and <strong>representation</strong> (expressing abstract ideas through concrete images). The joke-work, like dream-work, is a form of unconscious creativity that disguises its true purpose behind a surface of innocent entertainment.</p>
  <h3>Freud on Humor (1928)</h3>
  <p>In his later essay &ldquo;Humour,&rdquo; Freud offered something more profound. Humor (distinct from jokes) is the triumph of the ego over adversity. The super-ego comforts the ego: &ldquo;Look! Here is the world, which seems so dangerous! It is nothing but a game for children.&rdquo; The gallows humor of the condemned man is not denial but <em>refusal to be diminished</em>. Freud considered this the highest and most mature defense mechanism.</p>
  <h3>Legacy and Critique</h3>
  <p>The hydraulic energy model is outdated &mdash; we no longer think of psychic energy as a fluid that builds up and needs discharge. But the insight that humor serves emotional regulation is well-supported by modern research. Gallows humor reduces cortisol. Laughter after tension does produce measurable relief. The mechanism is different from what Freud proposed, but the observation was correct.</p>
  <div class="callout"><h4>Why This Matters</h4><p>Relief theory identifies the emotional function of humor &mdash; something the purely cognitive theories (incongruity, BVT) tend to neglect. Humor does not just process information; it processes feelings. The ability to laugh at what frightens us is not a trivial entertainment but a genuine psychological tool, as both Freud and modern clinical research recognize.</p></div>`,

  `${dh}Section 04</div><h2><em>Benign</em> Violation Theory</h2></div>
  <h3>The Core Model</h3>
  <p>Peter McGraw and Caleb Warren proposed in 2010 that something is perceived as humorous when three conditions are met simultaneously: (1) there is a <strong>violation</strong> &mdash; something that threatens a person&rsquo;s well-being, identity, or normative belief structure; (2) the violation is <strong>benign</strong> &mdash; it simultaneously seems okay, safe, or acceptable; and (3) both appraisals occur at the <strong>same time</strong>. A violation that is not benign produces negative emotions (disgust, fear, anger). Something benign that is not a violation produces nothing (boring). Only the overlap produces humor.</p>
  <h3>Types of Violations</h3>
  <p>BVT identifies multiple types of violations that can produce humor: <strong>physical</strong> (slapstick, someone falling), <strong>identity-based</strong> (teasing, mockery), <strong>normative</strong> (taboo jokes, transgressive humor), <strong>linguistic</strong> (puns violate semantic expectations), and <strong>social</strong> (breaking social rules, awkward situations). Each type becomes funny when the audience simultaneously perceives it as a violation and as benign.</p>
  <h3>The Distance Mechanism</h3>
  <p>The most powerful insight of BVT is the role of <strong>psychological distance</strong> as a moderator. Distance makes violations seem more benign. McGraw&rsquo;s research program has empirically demonstrated this across multiple dimensions: <strong>temporal</strong> distance (tragedy + time = comedy), <strong>spatial</strong> distance (events far away are funnier), <strong>social</strong> distance (out-group suffering is easier to joke about), and <strong>hypothetical</strong> distance (fiction is funnier than reality). &ldquo;Too soon&rdquo; is precisely when temporal distance has not yet made the violation benign. &ldquo;Too late&rdquo; is when so much distance has accumulated that the violation has faded entirely.</p>
  <h3>Empirical Support</h3>
  <p>Warren and McGraw (2016) tested BVT against alternative theories in five studies<sup class="fn"><a>[7]</a><span class="tip"><a href="https://leeds-faculty.colorado.edu/mcgrawp/pdf/warren.mcgraw.2016.pdf" target="_blank">Warren &amp; McGraw: Differentiating Humorous from Not (2016) &rarr;</a></span></sup>. They found that participants rated scenarios as funnier when they perceived them as both a violation and benign simultaneously. Scenarios that were <em>only</em> violations or <em>only</em> benign were not rated as funny. The severity of the violation and the degree of distance interacted as predicted: more severe violations required more distance to become benign, and violations at just the right distance produced the most humor.</p>
  <h3>Limitations</h3>
  <p>BVT&rsquo;s main limitation is with <strong>pure wordplay</strong> and <strong>silliness</strong>. A clever pun violates semantic expectations, but calling this a &ldquo;violation&rdquo; stretches the term. Non-sequitur humor and absurdism also sit awkwardly within the framework &mdash; what norm is being violated when someone says something random? Defenders argue that linguistic and logical norms are norms too, but critics find this circular.</p>
  <div class="callout"><h4>Why This Matters</h4><p>BVT is among the most prominent candidates for a unified humor theory. It subsumes elements of incongruity theory (violations are incongruous), superiority theory (mockery is a social violation), and relief theory (benign violations release tension). The distance mechanism provides a testable, quantifiable moderator. Whether it can accommodate all forms of humor remains debated, but its empirical support is substantial.</p></div>`,

  `${dh}Section 05</div><h2>The <em>Ha-Ha</em> / A-Ha Connection</h2></div>
  <h3>Hurley, Dennett, and Adams</h3>
  <p>In <em>Inside Jokes: Using Humor to Reverse-Engineer the Mind</em> (2011), Matthew Hurley, Daniel Dennett, and Reginald Adams proposed one of the most comprehensive cognitive theories of humor. Their argument: humor evolved as a <strong>reward mechanism for epistemic vigilance</strong> &mdash; the mind&rsquo;s immune system for catching false beliefs.</p>
  <h3>The Cognitive Debugging Theory</h3>
  <p>The mind constantly generates predictions, assumptions, and tentative beliefs. Most are useful; some are wrong. Wrong beliefs left uncorrected could be catastrophic in evolutionary terms (misidentifying a predator, misjudging a social alliance). Nature&rsquo;s solution: reward the detection of errors with a burst of pleasure. The &ldquo;ha-ha&rdquo; of a joke is, on this account, the same cognitive event as the &ldquo;a-ha&rdquo; of an insight &mdash; both involve the sudden recognition that a previously held assumption is incorrect.</p>
  <h3>Why This Theory Is Distinct</h3>
  <p>While it descends from incongruity theory, the Hurley-Dennett-Adams account adds two critical elements: an <strong>evolutionary rationale</strong> (humor exists because error-detection conferred fitness advantages) and a <strong>reward mechanism</strong> (the pleasure of humor is evolution&rsquo;s payment for cognitive maintenance work). This connects humor to intelligence in a principled way: the same mental machinery that makes us laugh at puns also makes us good at solving puzzles, detecting lies, and updating beliefs.</p>
  <h3>The Cheesecake Objection</h3>
  <p>The authors acknowledge that modern humor has been &ldquo;hijacked&rdquo; far beyond its original adaptive function &mdash; like a cheesecake that exploits taste receptors evolved for detecting ripe fruit. Professional comedy, jokes told purely for entertainment, and humor used for social bonding may all be evolutionary by-products of a mechanism that originally served epistemic hygiene. This is not a weakness of the theory but an honest acknowledgment of the gap between evolutionary origins and current use.</p>
  <h3>Critical Reception</h3>
  <p>The theory has been praised as &ldquo;one of the most complex and sophisticated humor theories ever presented.&rdquo; Critics note that it is heavily cognitive &mdash; it explains the intellectual dimension of humor well but struggles with emotional, social, and physical humor. It also makes predictions that are difficult to test directly: how would you measure whether a joke rewards the detection of a specific false belief?</p>
  <div class="callout"><h4>Why This Matters</h4><p>The ha-ha / a-ha connection may be the deepest insight in humor research. It explains why intelligent people tend to be funnier (they detect more errors), why humor feels rewarding (the reward circuit likely reflects evolutionary selection pressure), and why explaining a joke kills it (you&rsquo;ve removed the error for the listener to detect). It also explains why humor and creativity are correlated: both involve seeing things that others miss.</p></div>`,

  `${dh}Section 06</div><h2><em>Play</em> Theory &amp; Context</h2></div>
  <h3>Morreall&rsquo;s Framework</h3>
  <p>John Morreall, one of the most prolific philosophers of humor, argues that all humor requires a <strong>play frame</strong> &mdash; freedom from practical concern, safety from immediate threat, a context in which violations can be perceived as benign rather than dangerous. The same event (someone slipping on ice) can be terrifying (in a survival context) or hilarious (in a safe context). The frame, not the content, determines the response.</p>
  <h3>The Evolutionary Play Signal</h3>
  <p>Gervais and Wilson (2005) connected play theory to evolutionary biology<sup class="fn"><a>[8]</a><span class="tip"><a href="https://www.journals.uchicago.edu/doi/10.1086/431726" target="_blank">Gervais &amp; Wilson: Evolution of Laughter and Humor (2005) &rarr;</a></span></sup>. Great apes have &ldquo;play faces&rdquo; that signal &ldquo;this is not serious.&rdquo; Human laughter may have evolved from similar play signals &mdash; Duchenne laughter as an honest signal that the current context is safe for play. This explains why we laugh more in groups (we need to signal safety to each other) and why forced laughter fails (non-Duchenne laughter is not an honest safety signal).</p>
  <h3>Context as Master Variable</h3>
  <p>Play theory resolves puzzles that content-based theories cannot. Why is the same joke funny at a comedy club but offensive at a funeral? The content is identical; the context differs. Why can friends tease each other in ways that would be hostile from strangers? The relationship creates a play frame. Why do people laugh at horror movies? The theater is a play frame &mdash; the threat is fictional, so violations are automatically benign.</p>
  <h3>Limitations</h3>
  <p>Play theory is better at explaining <em>when</em> humor happens than <em>what</em> is humorous. It is a necessary condition (no humor without a play frame) but not a sufficient one (a play frame alone does not make something funny). It complements rather than replaces the content-based theories. You need both: something must be incongruous/violating <em>and</em> the context must be safe for the humor to land.</p>
  <div class="callout"><h4>Why This Matters</h4><p>Play theory explains the comedian&rsquo;s most important job: establishing the frame. Before a single joke is told, the comedian must signal to the audience that what follows is play, not threat. The walk to the microphone, the greeting, the body language &mdash; all of it says &ldquo;we are playing now.&rdquo; If the frame is not established, even the best jokes fail.</p></div>`,

  `${dh}Section 07</div><h2>Why <em>No</em> Single Theory Works</h2></div>
  <h3>The Family Resemblance Problem</h3>
  <p>Wittgenstein argued that some concepts are held together not by a single shared feature but by a network of overlapping similarities &mdash; a &ldquo;family resemblance.&rdquo; Humor may be such a concept. A pun, a pratfall, a witty insult, a baby&rsquo;s peek-a-boo game, and a piece of absurdist performance art are all &ldquo;humor&rdquo; &mdash; but finding one thing they all share (beyond triggering laughter) has defeated 2,400 years of philosophy.</p>
  <h3>What Each Theory Captures</h3>
  <p><strong>Incongruity</strong>: the cognitive mechanism (expectation violation and resolution). <strong>Superiority</strong>: the social dynamic (status competition and power display). <strong>Relief</strong>: the emotional function (tension discharge and forbidden expression). <strong>BVT</strong>: the appraisal process (simultaneous violation and benignity). <strong>Inside Jokes</strong>: the adaptive purpose (reward for cognitive error detection). <strong>Play</strong>: the contextual prerequisite (safety frame required). Each theory is a spotlight illuminating one part of the stage while leaving the rest in shadow.</p>
  <h3>Simultaneous Activation</h3>
  <p>Consider a well-crafted joke about a pompous authority figure slipping on a banana peel during a solemn ceremony. It is incongruous (the fall violates the ceremony&rsquo;s expectations). It triggers superiority (the pompous are brought low). It provides relief (the ceremony&rsquo;s tension is broken). It is a benign violation (physical mishap in a safe context). It rewards error detection (the assumption of dignified proceedings was wrong). And it requires a play frame (if the person is seriously injured, it stops being funny). All six theories are correct, simultaneously.</p>
  <h3>The Case Against Unification</h3>
  <p>Perhaps the failure to find a unified theory <em>is</em> the finding. Music has no single theory either &mdash; it involves rhythm, melody, harmony, timbre, emotion, cultural convention, and physical vibration. Reducing music to any one dimension loses the phenomenon. Humor may be similarly multi-dimensional, requiring multiple explanatory frameworks that illuminate different aspects without any one being complete.</p>
  <h3>What Progress Looks Like</h3>
  <p>Rather than a Grand Unified Theory of Funny, progress in humor research looks like better understanding of how the dimensions interact. When does incongruity resolution require superiority to be funny? Under what conditions does relief enhance or undermine a benign violation? How does the play frame interact with psychological distance? These interaction questions are harder than the single-theory questions but more likely to produce genuine insight.</p>
  <div class="callout"><h4>The Meta-Insight</h4><p>The question &ldquo;why is this funny?&rdquo; may have as many correct answers as there are types of humor. Asking for <em>the</em> theory of humor is like asking for <em>the</em> reason people fall in love &mdash; the question assumes a singularity that does not exist. The honest scholarly answer is: it depends. And specifying what it depends on, precisely and with evidence, is what humor research at its best actually does.</p></div>`
