<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Science of Humor — Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}

<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Theories', title: '<em>Theories</em> of Humor' },
  { num: '02', short: 'Neuroscience', title: 'The <em>Neuroscience</em> of Laughter' },
  { num: '03', short: 'Craft', title: '<em>Comedy</em> Structure &amp; Craft' },
  { num: '04', short: 'Dark Humor', title: '<em>Dark</em> Humor &amp; Taboo' },
  { num: '05', short: 'Cultural', title: '<em>Cultural</em> Comedy' },
  { num: '06', short: 'Health', title: 'Humor, <em>Health</em> &amp; Bonding' },
  { num: '07', short: 'AI Humor', title: '<em>AI</em> &amp; Computational Humor' }
];

const summaries = [
  // 01 — Theories of Humor
  `<p>Philosophers have been trying to explain humor since Plato, and they still haven&rsquo;t nailed it &mdash; which is, itself, a little funny. Three classical theories dominate: <strong>incongruity</strong> (Kant, Schopenhauer &mdash; humor arises from violated expectations), <strong>superiority</strong> (Hobbes, Plato &mdash; we laugh at others&rsquo; misfortune), and <strong>relief</strong> (Freud, Spencer &mdash; laughter discharges nervous energy)<sup class="fn"><a>[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Theories_of_humor" target="_blank">Theories of Humor (Wikipedia) &rarr;</a></span></sup>. Each explains some humor and fails on the rest.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">3</div><div class="sl">Classical Theories</div></div>
    <div class="st"><div class="sv">2010</div><div class="sl">BVT Published</div></div>
    <div class="st"><div class="sv">0</div><div class="sl">Unified Theories</div></div>
  </div>
  <p>The most promising modern contender is <strong>Benign Violation Theory</strong> (McGraw &amp; Warren, 2010): something is funny when it simultaneously violates a norm and seems benign<sup class="fn"><a>[2]</a><span class="tip"><a href="https://journals.sagepub.com/doi/abs/10.1177/0956797610376073" target="_blank">McGraw &amp; Warren: Benign Violations (2010) &rarr;</a></span></sup>. Psychological distance &mdash; temporal, spatial, social &mdash; is the key moderator. &ldquo;Too soon&rdquo; is precisely when the violation hasn&rsquo;t yet become benign.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <rect class="node" x="10" y="80" width="110" height="40" rx="4"/>
    <text class="node-text" x="65" y="104" text-anchor="middle">Incongruity</text>
    <rect class="node" x="145" y="80" width="110" height="40" rx="4"/>
    <text class="node-text" x="200" y="104" text-anchor="middle">Superiority</text>
    <rect class="node" x="280" y="80" width="110" height="40" rx="4"/>
    <text class="node-text" x="335" y="104" text-anchor="middle">Relief</text>
    <rect class="node-hi" x="120" y="150" width="160" height="40" rx="4"/>
    <text class="node-text" x="200" y="174" text-anchor="middle">Benign Violation</text>
    <line class="edge-hi" x1="65" y1="120" x2="165" y2="150"/>
    <line class="edge-hi" x1="200" y1="120" x2="200" y2="150"/>
    <line class="edge-hi" x1="335" y1="120" x2="235" y2="150"/>
    <text class="lbl" x="200" y="30" text-anchor="middle">Classical Theories</text>
    <text class="lbl-hi" x="200" y="50" text-anchor="middle">converge in modern synthesis</text>
    <line class="edge" x1="100" y1="55" x2="300" y2="55"/>
  </svg></div>`,

  // 02 — Neuroscience of Laughter
  `<p>When a joke lands, your brain lights up like a pinball machine &mdash; and neuroscientists can now map the sequence. <a href="https://pubmed.ncbi.nlm.nih.gov/14659102/" target="_blank">Mobbs et al. (2003)</a> showed that humor activates the <strong>mesolimbic dopaminergic reward system</strong> &mdash; the same circuitry that fires for food, sex, and drugs<sup class="fn"><a>[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/14659102/" target="_blank">Mobbs et al.: Humor Modulates Reward Centers (2003) &rarr;</a></span></sup>. The funnier the joke, the stronger the signal in the nucleus accumbens.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">30&times;</div><div class="sl">More laughter in groups</div></div>
    <div class="st"><div class="sv">4</div><div class="sl">Processing stages</div></div>
    <div class="st"><div class="sv">46%</div><div class="sl">Speaker laughs more</div></div>
  </div>
  <p><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9489296/" target="_blank">Provine&rsquo;s research</a> revealed that laughter is overwhelmingly social: we laugh 30 times more often in groups than alone, speakers laugh more than listeners, and most conversational laughter follows statements that aren&rsquo;t even funny<sup class="fn"><a>[4]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/10808048/" target="_blank">Provine: Laughter as Scientific Problem (2000) &rarr;</a></span></sup>. Contagious laughter is mediated by mirror neurons &mdash; hearing someone laugh activates your premotor cortex as if you were laughing yourself<sup class="fn"><a>[5]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/25455123/" target="_blank">Scott et al.: Social Life of Laughter (2014) &rarr;</a></span></sup>.</p>
  <h4>Duchenne vs Non-Duchenne Laughter</h4>
  <div class="feat-grid">
    <div class="feat"><h4>Duchenne (Genuine)</h4><p>Involves both mouth (zygomatic major) and eyes (orbicularis oculi). Involuntary pathway via brainstem. The real thing.</p></div>
    <div class="feat"><h4>Non-Duchenne (Social)</h4><p>Mouth only, no eye crinkle. Voluntary pathway via motor cortex. Controllable, strategic, but still socially important.</p></div>
  </div>`,

  // 03 — Comedy Structure & Craft
  `<p>Every joke has a <strong>setup</strong> (the world as you assume it to be) and a <strong>punchline</strong> (the world as it actually is). Everything else is technique. The <strong>rule of three</strong> &mdash; establish, reinforce, surprise &mdash; works because two is the minimum needed to create a pattern that the third can break. It&rsquo;s the smallest possible unit of expectation violation.</p>
  <div class="s-chips">
    <span class="s-chip">Setup-Punch</span>
    <span class="s-chip">Rule of Three</span>
    <span class="s-chip">Callback</span>
    <span class="s-chip">Misdirection</span>
    <span class="s-chip">Act-out</span>
    <span class="s-chip">Tagline</span>
    <span class="s-chip">Tight Five</span>
  </div>
  <p><strong>Timing</strong> is where craft becomes art. Jack Benny built his entire career around what he <em>didn&rsquo;t</em> say. When a robber demands &ldquo;Your money or your life!&rdquo; and Benny pauses for an eternity, the audience completes the joke before he speaks. TIME magazine compared his use of silence to Pinter and Beckett.</p>
  <div class="callout"><h4>Why Explaining a Joke Kills It</h4><p>Humor requires the audience to perform the cognitive resolution themselves. The dopamine reward comes from their own mental leap. When you explain the joke, you do the work for them &mdash; they get the information but not the reward. It&rsquo;s like telling someone the answer to a puzzle they were about to solve.</p></div>`,

  // 04 — Dark Humor & Taboo
  `<p>Freud distinguished &ldquo;tendentious&rdquo; jokes &mdash; those that disguise aggression or desire in socially acceptable form &mdash; from innocent humor<sup class="fn"><a>[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Jokes_and_Their_Relation_to_the_Unconscious" target="_blank">Freud: Jokes and Their Relation to the Unconscious (1905) &rarr;</a></span></sup>. His most profound insight wasn&rsquo;t about dirty jokes, though. It was about <strong>gallows humor</strong>: the condemned man who says &ldquo;Well, this is a good beginning to the week.&rdquo; The mind, Freud argued, asserts its invulnerability &mdash; refuses to let reality impose suffering.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">156</div><div class="sl">Willinger study N</div></div>
    <div class="st"><div class="sv">High IQ</div><div class="sl">= More dark humor</div></div>
    <div class="st"><div class="sv">Low aggression</div><div class="sl">= More appreciation</div></div>
  </div>
  <p><a href="https://pubmed.ncbi.nlm.nih.gov/28101812/" target="_blank">Willinger et al. (2017)</a> found that dark humor appreciation correlates with <em>higher</em> intelligence and <em>lower</em> aggression. The most aggressive group enjoyed dark humor the least. Understanding a multi-layered violation requires cognitive resources; maintaining emotional distance from it requires stability. Dark humor isn&rsquo;t the refuge of the cruel &mdash; it&rsquo;s the tool of the cognitively flexible.</p>
  <h4>The Distance Principle</h4>
  <ul class="s-list">
    <li><strong>Temporal</strong> &mdash; Tragedy + time = comedy. &ldquo;Too soon&rdquo; is when the violation hasn&rsquo;t yet become benign.</li>
    <li><strong>Social</strong> &mdash; Jokes about out-groups land sooner. In-group pain stays raw longer.</li>
    <li><strong>Hypothetical</strong> &mdash; Fictional versions of real horrors become funny faster.</li>
  </ul>`,

  // 05 — Cultural Comedy
  `<p>Humor is universal; jokes are not. Every culture laughs, but what triggers the laughter varies enormously. British comedy favors <strong>dry wit</strong> and understatement &mdash; the humor is in the gap between what&rsquo;s said and what&rsquo;s meant. American comedy tends toward directness, physical comedy, and observational honesty. Japanese <strong>manzai</strong> is a duo format (boke + tsukkomi) with 1,000+ years of tradition, where the language itself becomes the joke<sup class="fn"><a>[7]</a><span class="tip"><a href="https://www.academia.edu/12345" target="_blank">Cross-Cultural Analysis: US and Japan Stand-Up (2015) &rarr;</a></span></sup>.</p>
  <div class="feat-grid">
    <div class="feat"><h4>What Translates</h4><p>Physical comedy, situational humor, status reversal, basic incongruity. The mechanisms are universal.</p></div>
    <div class="feat"><h4>What Doesn&rsquo;t</h4><p>Puns, cultural references, self-deprecation norms, taboo boundaries, comic timing. The content is local.</p></div>
    <div class="feat"><h4>Manzai</h4><p>Boke (funny) + tsukkomi (straight). Quick-exchange wordplay. Audience as overhearers, not addressees. Performers&rsquo; relationship IS the comedy.</p></div>
    <div class="feat"><h4>Internet Memes</h4><p>Possibly the first global humor form. Template-based, collectively created, minimal text + visual. Lifecycle: fresh &rarr; familiar &rarr; stale &rarr; ironic.</p></div>
  </div>
  <div class="callout"><h4>Shifman&rsquo;s Insight</h4><p>Memes are digital content units created with awareness of each other, circulated, imitated, and transformed by many users. They reveal what a culture finds funny at a given moment &mdash; collective humor made visible and measurable.</p></div>`,

  // 06 — Health & Bonding
  `<p>Norman Cousins claimed that 10 minutes of belly laughter gave him 2 hours of pain-free sleep while battling ankylosing spondylitis. His 1979 book <em>Anatomy of an Illness</em> launched a field &mdash; but his evidence was an N of 1. The actual science is more modest and more interesting.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">32&ndash;37%</div><div class="sl">Cortisol reduction</div></div>
    <div class="st"><div class="sv">#1</div><div class="sl">Desired trait in partner</div></div>
    <div class="st"><div class="sv">30&times;</div><div class="sl">More social laughter</div></div>
    <div class="st"><div class="sv">45</div><div class="sl">Studies in meta-analysis</div></div>
  </div>
  <p>A 2022 meta-analysis of 45 studies found laughter interventions produce significant effects on depression, anxiety, and stress<sup class="fn"><a>[8]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S0277953622001472" target="_blank">Efficacy of Laughter-Inducing Interventions (Meta-analysis, 2022) &rarr;</a></span></sup>. Cortisol drops 32&ndash;37%. But evidence quality remains low. The strongest science is in <strong>social bonding</strong>: <a href="https://royalsocietypublishing.org/rstb/article/377/1863/20210175/109006/" target="_blank">Robin Dunbar&rsquo;s research</a> shows social laughter triggers endorphin release, functioning as &ldquo;grooming at a distance&rdquo;<sup class="fn"><a>[9]</a><span class="tip"><a href="https://royalsocietypublishing.org/rstb/article/377/1863/20210175/109006/" target="_blank">Dunbar: Laughter as Social Grooming (2012) &rarr;</a></span></sup> &mdash; allowing bonding with multiple people simultaneously. This may explain why sense of humor is rated the #1 desired trait in a partner across cultures<sup class="fn"><a>[10]</a><span class="tip"><a href="https://abel.mcmaster.ca/publications/pdfs/Bressler%20et%20al..pdf" target="_blank">Bressler et al.: Humor as Sexually Selected Trait (2006) &rarr;</a></span></sup>.</p>
  <h4>Humor and Mate Selection</h4>
  <ul class="s-list">
    <li>Women prefer <strong>humor producers</strong> &mdash; signals intelligence and creativity (<a href="https://abel.mcmaster.ca/publications/pdfs/Bressler%20et%20al..pdf" target="_blank">Bressler et al., 2006</a>)</li>
    <li>Men prefer <strong>humor appreciators</strong> &mdash; signals receptivity</li>
    <li>Humor production correlates with IQ &mdash; it&rsquo;s an honest fitness signal</li>
  </ul>`,

  // 07 — AI & Computational Humor
  `<p>Can machines be funny? The short answer: not really, not yet, and the reasons are instructive. Humor requires the simultaneous integration of theory of mind, cultural knowledge, timing, creative subversion, and self-evaluation<sup class="fn"><a>[11]</a><span class="tip"><a href="https://arxiv.org/html/2502.07981v1" target="_blank">AI Humor Generation: Cognitive, Social and Creative Skills (2025) &rarr;</a></span></sup>. No current AI system does all five. On <a href="https://arxiv.org/html/2507.21476v1" target="_blank">HumorBench-hard</a>, no LLM exceeds 60% accuracy at humor tasks that humans find intuitive<sup class="fn"><a>[12]</a><span class="tip"><a href="https://arxiv.org/html/2507.21476v1" target="_blank">HumorBench: Which LLMs Get the Joke? (2025) &rarr;</a></span></sup>.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">&lt; 60%</div><div class="sl">Best LLM on HumorBench</div></div>
    <div class="st"><div class="sv">5</div><div class="sl">Required capabilities</div></div>
    <div class="st"><div class="sv">2023</div><div class="sl">&ldquo;Fun but not funny&rdquo;</div></div>
  </div>
  <p>The fundamental problem: LLMs predict the most likely next token, but comedy requires the <em>unlikely</em> token that still makes sense. The models are too well-calibrated to be surprising. Ironically, the funniest AI outputs tend to be the <em>unintentional</em> ones &mdash; where the gap between the machine&rsquo;s confident delivery and its output&rsquo;s absurdity creates exactly the kind of incongruity that humor theories describe.</p>
  <div class="callout"><h4>The Comedy Turing Test</h4><p>If an AI can be genuinely, consistently, originally funny, it probably has general intelligence &mdash; because humor requires understanding people, culture, expectations, and surprise simultaneously. No other benchmark tests all four. Humor may be the truest measure of machine understanding.</p></div>`
];

const details = [
  // 01 — Theories Detail
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Theories</em> of Humor</h2></div>
  <h3>Incongruity Theory</h3>
  <p>Kant called humor &ldquo;the sudden transformation of a strained expectation into nothing.&rdquo; Schopenhauer argued it comes from perceiving a mismatch between a concept and its real-world referent. The modern form adds <em>resolution</em>: not just perceiving incongruity, but resolving it in an unexpected way. This theory has the broadest explanatory scope &mdash; most jokes involve some form of violated expectation. It struggles, however, with humor that has no cognitive content: tickling, slapstick, contagious laughter.</p>
  <h3>Superiority Theory</h3>
  <p>Hobbes (1651) defined laughter as &ldquo;sudden glory arising from some sudden conception of some eminency in ourselves.&rdquo; We laugh because we feel momentarily superior. Plato and Aristotle had similar views: comedy represents people as worse than they are. This explains mockery, schadenfreude, roasts, and satire convincingly. It fails entirely on self-deprecating humor (where we mock ourselves), absurdism (where nobody is the target), and puns (where superiority is irrelevant).</p>
  <h3>Relief Theory</h3>
  <p>Spencer proposed that laughter discharges accumulated &ldquo;nervous energy.&rdquo; Freud developed this into a sophisticated theory: jokes allow the expression of forbidden impulses (aggression, sexuality) by disguising them in socially acceptable form. The &ldquo;joke-work&rdquo; parallels &ldquo;dream-work&rdquo; &mdash; both use condensation, displacement, and representation to sneak past the censor. This explains dirty jokes and hostile humor well but has little to say about clean humor.</p>
  <h3>Benign Violation Theory</h3>
  <p>McGraw and Warren (2010) proposed the most promising modern synthesis: something is humorous when it <strong>simultaneously</strong> violates a norm and seems benign. The violation can be physical (slapstick), identity-based (teasing), normative (taboo jokes), or cognitive (incongruity). Benignity comes from psychological distance &mdash; temporal (&ldquo;tragedy + time&rdquo;), spatial, social, or hypothetical. The theory unifies much of what the classical theories explain separately. It predicts that violations that are too severe to seem benign will produce disgust rather than laughter, and that non-violations will produce boredom.</p>
  <h3>The Ha-Ha / A-Ha Connection</h3>
  <p>Hurley, Dennett, and Adams (2011) argued that humor evolved as a reward for <em>epistemic vigilance</em> &mdash; catching errors in our mental models. The &ldquo;ha-ha&rdquo; of a joke and the &ldquo;a-ha&rdquo; of an insight both involve the sudden resolution of incongruity. This connects humor to intelligence: the same cognitive machinery that makes us laugh at a pun is what lets us solve puzzles and catch logical errors. Evolution, on this account, bribed us with pleasure to keep our belief systems clean.</p>
  <h3>Why No Single Theory Works</h3>
  <p>Each theory captures a real aspect of humor: incongruity describes the cognitive mechanism, superiority the social dynamic, relief the emotional function, benign violation the appraisal process, and the cognitive-evolutionary account the adaptive purpose. A single joke can involve all five simultaneously. The theories are not wrong &mdash; they are partial. The search for a single unified theory of humor may be as misguided as the search for a single theory of music.</p>
  <div class="callout"><h4>Key Insight</h4><p>The failure to find one theory of humor is not a failure. It may be the finding. Humor is not one thing &mdash; it is a family of related phenomena that share some features (violated expectations, social context, reward) but diverge in others. The question &ldquo;why is this funny?&rdquo; may have as many answers as there are types of humor.</p></div>`,

  // 02 — Neuroscience Detail
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>The <em>Neuroscience</em> of Laughter</h2></div>
  <h3>How the Brain Processes a Joke</h3>
  <p>The neuroscience of humor processing reveals a surprisingly orderly sequence. During the <strong>setup</strong>, the left hemisphere&rsquo;s language-processing regions build expectations &mdash; the inferior frontal gyrus generates predictions about where the narrative is heading. When the <strong>punchline</strong> arrives, it triggers a cascade: the temporo-parietal junction detects incongruity, the prefrontal cortex attempts resolution, and if resolution succeeds, the ventral striatum and nucleus accumbens fire, releasing dopamine. The &ldquo;getting&rdquo; of a joke is neurochemically the same kind of reward as food or sex. Evolution did not mess around.</p>
  <h3>The Mobbs Study (2003)</h3>
  <p>The landmark fMRI study by <a href="https://pubmed.ncbi.nlm.nih.gov/14659102/" target="_blank">Mobbs et al.</a> at Stanford used a 3-Tesla scanner to watch humor happen in real time. The key finding: the degree of perceived funniness was <em>positively correlated</em> with BOLD signal intensity in the nucleus accumbens. Funnier jokes produced stronger reward signals. This established humor as a legitimate subject for neuroscience &mdash; not a frivolous add-on to cognition but a phenomenon rooted in reward circuitry that evolution preserved for millions of years.</p>
  <h3>Understanding vs. Finding Funny</h3>
  <p>Wattendorf et al. (2023) established a critical dissociation: the <strong>dorsal</strong> striatum activates for <em>comprehension</em> (&ldquo;I get it&rdquo;) while the <strong>ventral</strong> striatum activates for <em>appreciation</em> (&ldquo;that&rsquo;s funny&rdquo;). You can understand a joke without finding it funny, and you can find something funny without fully understanding why. These are different neural processes. This explains the common experience of getting a joke intellectually while feeling nothing &mdash; comprehension without reward.</p>
  <h3>Provine&rsquo;s Sidewalk Neuroscience</h3>
  <p>Robert Provine took a radically different approach: instead of brain scanners, he used observation. His findings overturned assumptions. People laugh <strong>30 times more</strong> in social situations than alone. The <strong>speaker</strong> laughs 46% more than the listener. Most conversational laughter follows statements that <em>aren&rsquo;t even jokes</em>. Laughter punctuates speech at clause boundaries, like a form of verbal punctuation. The implication is profound: laughter is primarily a social signal, not a cognitive response to humor.</p>
  <h3>Contagious Laughter and Mirror Neurons</h3>
  <p>Hearing someone laugh activates your premotor cortex as if you were laughing yourself &mdash; the mirror neuron system at work. Provine (1992) demonstrated experimentally that hearing laughter alone, with no humorous content, is sufficient to trigger laughter. This is why laugh tracks work even when we know they are fake: the social contagion mechanism bypasses conscious evaluation. The effect is stronger for in-group members, weaker for strangers, absent for disliked out-group members.</p>
  <h3>Neurochemistry</h3>
  <p>The chemical cocktail released during laughter is remarkable: <strong>dopamine</strong> (pleasure and reward), <strong>endorphins</strong> (natural opioids, pain relief, bonding), <strong>serotonin</strong> (mood elevation). Simultaneously, <strong>cortisol</strong> decreases by 32&ndash;37% according to recent meta-analyses. Natural killer cell activity increases. The parasympathetic nervous system activates, producing the warm, relaxed feeling after a good laugh. The stress response and genuine laughter appear to be physiologically incompatible, as parasympathetic activation during laughter suppresses the sympathetic arousal underlying stress.</p>
  <div class="callout"><h4>Key Insight</h4><p>The neuroscience reveals something the philosophy misses: humor is not primarily about cognition. The brain processes jokes through reward circuits normally associated with survival needs. That humor activates the same reward circuits as food and sex suggests significant evolutionary selection pressure &mdash; an indication of how important humor may have been to ancestral fitness.</p></div>`,

  // 03 — Comedy Craft Detail
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2><em>Comedy</em> Structure &amp; Craft</h2></div>
  <h3>Setup-Punchline Mechanics</h3>
  <p>The fundamental unit of comedy is the <strong>setup-punchline</strong>. The setup establishes a premise &mdash; the world as the audience assumes it to be. The punchline reveals a reinterpretation &mdash; the world as it actually is. The gap between the assumed and the revealed is where the laughter lives. Everything else in comedy &mdash; the rule of three, callbacks, misdirection &mdash; is technique for widening that gap without the audience seeing it coming.</p>
  <h3>The Rule of Three</h3>
  <p>Tony Allen formalized it as &ldquo;establish, reinforce, surprise.&rdquo; The first item introduces the pattern. The second confirms it. The third breaks it. Three is the magic number because two is the minimum needed to establish a pattern that the third can subvert. One item is a statement. Two is a coincidence. Three is a pattern &mdash; and a pattern broken at the moment of confirmation is the smallest possible unit of comic structure. The rule works at every scale: within a single joke, across a bit, and throughout an entire set.</p>
  <h3>The Art of Misdirection</h3>
  <p>Great comedians control the audience&rsquo;s prediction engine. <strong>Misdirection</strong> means leading the audience toward one interpretation while preparing another. The punchline reframes the setup retroactively &mdash; everything the audience heard was technically accurate, but it meant something different than they assumed. This is why successful misdirection requires the setup to be genuinely plausible on its own terms. The audience must believe they know where the joke is going.</p>
  <h3>Jack Benny and the Pause</h3>
  <p>The most celebrated moment in comedy timing: a mugger demands &ldquo;Your money or your life!&rdquo; and Jack Benny says&hellip; nothing. Just silence. The studio audience begins to laugh &mdash; not because something funny has been said, but because something funny is <em>happening</em>. They know Benny&rsquo;s persona (legendarily cheap) and they complete the joke themselves. When he finally says &ldquo;I&rsquo;m thinking it over!&rdquo; the words merely confirm what the silence already communicated. TIME magazine called Benny &ldquo;the grand master of comic timing&rdquo; and compared him to Pinter and Beckett &mdash; artists who built careers around what was <em>not</em> said.</p>
  <h3>Genre: Stand-Up vs Sketch vs Improv vs Sitcom</h3>
  <p><strong>Stand-up</strong> is the solo performer against the room &mdash; direct address, real-time feedback, maximum vulnerability. The &ldquo;tight five&rdquo; (five minutes of polished material) is the gateway to professional comedy, representing months of development compressed into apparent spontaneity. <strong>Sketch</strong> is premise-based and written (&ldquo;what if this absurd thing were true?&rdquo;). <strong>Improv</strong> is collaborative and unscripted, governed by &ldquo;yes, and&hellip;&rdquo; &mdash; accept what your partner offers and build on it. <strong>Sitcom</strong> is character-based, building humor through familiarity over episodes and seasons, with running gags and callbacks that span years.</p>
  <h3>Why Explaining Kills It</h3>
  <p>This is one of the most cognitively revealing facts about humor. When you explain a joke, you perform the incongruity resolution for the listener. But the <strong>reward</strong> &mdash; the dopamine hit in the nucleus accumbens &mdash; comes from the listener&rsquo;s <em>own</em> cognitive leap. Provide the answer and you provide the information but not the pleasure. This is strong evidence for the cognitive-evolutionary theory: humor is a reward for mental work, and shortcuts eliminate the reward. It also explains why jokes are funnier the first time &mdash; the resolution is already cached.</p>
  <div class="callout"><h4>Key Insight</h4><p>Comedy practitioners know things about humor that no theory captures. The rule of three is not philosophically justified &mdash; it works because pattern + violation is the smallest unit of comic structure. Timing cannot be formalized because it depends on reading the room in real time. The craft tradition is the empirical science of humor, tested nightly in front of live audiences.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Dark</em> Humor &amp; Taboo</h2></div>
  <h3>Freud&rsquo;s Tendentious Jokes</h3>
  <p>In <em>Jokes and Their Relation to the Unconscious</em> (1905), Freud drew a crucial distinction. <strong>Innocent jokes</strong> are funny on their own terms &mdash; wordplay, absurdity, clever construction. <strong>Tendentious jokes</strong> serve a purpose: they disguise aggression or desire in socially acceptable packaging. The joke provides &ldquo;forepleasure&rdquo; &mdash; aesthetic enjoyment that bribes the listener into accepting the forbidden thought. The listener&rsquo;s laughter comes from the psychic energy saved by <em>not</em> having to suppress what the joke openly expresses.</p>
  <h3>Gallows Humor: The Mind Asserts Itself</h3>
  <p>Freud&rsquo;s 1928 essay on humor contains his most psychologically sophisticated observation. The condemned man led to the gallows on Monday who says &ldquo;Well, this is a good beginning to the week&rdquo; is performing something extraordinary: the super-ego comforts the ego, saying in effect, &ldquo;Look, the world that seems so dangerous is nothing but a game for children.&rdquo; Humor, on this account, is not denial. It is a <em>refusal to be diminished</em> &mdash; the healthiest of defense mechanisms.</p>
  <h3>Clinical Evidence for Coping</h3>
  <p>Modern research supports Freud&rsquo;s intuition. Healthcare professionals use dark humor for emotional regulation &mdash; creating professional distance while maintaining empathy. Military veterans use it for trauma processing, facilitating cognitive reappraisal of overwhelming experiences. The key difference from civilian dark humor: occupational dark humor is a <em>necessity</em>, not entertainment. The humor functions as a pressure valve, allowing continued functioning in environments where earnest processing of every horror would be incapacitating.</p>
  <h3>The Willinger Intelligence Study</h3>
  <p><a href="https://pubmed.ncbi.nlm.nih.gov/28101812/" target="_blank">Willinger et al. (2017)</a> found three distinct groups among 156 participants. The group with <strong>highest dark humor appreciation</strong> scored highest on verbal and nonverbal intelligence and <em>lowest</em> on aggression. The group with <strong>highest aggression</strong> appreciated dark humor the <em>least</em>. The implication: processing dark humor requires cognitive resources (to understand the multi-layered violation) and emotional stability (to maintain distance from the violation). Aggression interferes because the aggressive person experiences the violation as real hostility, not play.</p>
  <h3>The Overton Window of Comedy</h3>
  <p>&ldquo;Too soon&rdquo; is a precise concept in the BVT framework: the temporal distance has not yet made the violation benign. But the window is not fixed. Social media accelerates context collapse &mdash; jokes that work in a small group fail when broadcast. Power dynamics matter: &ldquo;punching up&rdquo; (mocking the powerful) is broadly accepted; &ldquo;punching down&rdquo; (mocking the vulnerable) is increasingly contested. The Overton window of comedy is narrower in broadcast than in conversation, narrower in 2026 than in 1976, and narrower for some topics than others.</p>
  <h3>McGraw&rsquo;s Distance Research</h3>
  <p>Peter McGraw&rsquo;s research program has empirically tested the distance principle across multiple studies. Temporal distance makes violations more benign (tragedy + time = comedy). Geographic distance: 9/11 jokes became acceptable sooner outside New York. Social distance: we can joke about out-group suffering before in-group suffering. Hypothetical distance: fiction is funnier than reality. These are not just observations &mdash; they are experimentally confirmed moderators of humor perception.</p>
  <div class="callout"><h4>Key Insight</h4><p>Dark humor is not a pathology. It is a sophisticated cognitive operation that requires intelligence, emotional stability, and the ability to hold two frames simultaneously &mdash; recognizing the horror while refusing to be destroyed by it. The people who enjoy dark humor most are the smartest and least aggressive in the room. The people who enjoy it least are the most hostile.</p></div>`,

  // 05 — Cultural Comedy Detail
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2><em>Cultural</em> Comedy</h2></div>
  <h3>British Dry Wit</h3>
  <p>British humor operates through <strong>understatement, irony, and deadpan delivery</strong>. The humor lives in the gap between what is said and what is meant. Self-deprecation is the default mode &mdash; mocking oneself is not just acceptable but expected, a form of social leveling that keeps pretension in check. The audience must work to decode the humor, and this shared cognitive effort is part of the pleasure. When a Brit says &ldquo;that went well&rdquo; about a catastrophe, the comedy is in the audience&rsquo;s recognition of the gap. Class consciousness runs through British comedy like a spine &mdash; the distance between what people pretend to be and what they are.</p>
  <h3>American Comedy</h3>
  <p>American comedy tends toward <strong>directness, physicality, and observational honesty</strong>. Where British comics understate, Americans amplify. Stand-up comedy became a distinctly American cultural institution &mdash; the solo truth-teller confronting the audience. Self-deprecation exists but is used strategically, not as default. American comedians more often address the audience directly, establishing themselves as the authority on what is funny about the shared experience they are describing.</p>
  <h3>Japanese Manzai</h3>
  <p><strong>Manzai</strong> is a duo comedy format with over 1,000 years of tradition. The <em>boke</em> (funny person) makes absurd statements; the <em>tsukkomi</em> (straight person) corrects them, often with physical punctuation (a slap or retort). The language itself is the mechanism of comedy &mdash; rapid wordplay, puns, and the rhythmic exchange between the pair. Unlike American stand-up, where the comedian addresses the audience directly, manzai positions the audience as <em>overhearers</em> of the duo&rsquo;s conversation. The relationship between the performers IS the comedy.</p>
  <h3>The Untranslatability Problem</h3>
  <p>Puns depend on phonological and semantic overlap unique to each language. A pun in English that hinges on &ldquo;bear&rdquo; meaning both an animal and &ldquo;to carry&rdquo; has no equivalent in most other languages. Cultural references require shared knowledge that does not cross borders. Self-deprecation norms vary: charming in Britain, expected in Japan (in certain contexts), potentially read as weakness elsewhere. Film subtitle translators face an impossible choice: preserve accuracy or preserve funniness. They rarely achieve both.</p>
  <h3>Internet Memes as Global Humor</h3>
  <p>Limor Shifman defines Internet memes as &ldquo;digital content units with common characteristics, created with awareness of each other, and circulated, imitated, and transformed by many users.&rdquo; Memes may be the first genuinely global humor form &mdash; visual templates with minimal text that cross language barriers more easily than verbal jokes. They reveal collective humor in real time: what a culture finds funny at a given moment becomes visible and measurable through meme production and circulation.</p>
  <h3>Self-Deprecation vs Other-Deprecation</h3>
  <p>The direction of humor carries different weight across cultures. <strong>British, Japanese, and Australian</strong> comedy defaults to self-mockery as social leveling. <strong>American</strong> comedy uses self-deprecation selectively. In some cultures, self-deprecation reads as weakness rather than charm. The universal principle beneath the variation: the <em>power dynamic</em> between the joker and the target always matters, even if what counts as &ldquo;punching up&rdquo; and &ldquo;punching down&rdquo; varies.</p>
  <div class="callout"><h4>Key Insight</h4><p>Humor is universal but jokes are not. The mechanisms &mdash; incongruity, violation, surprise &mdash; are shared across all cultures. The specific triggers, targets, styles, and boundaries are culturally determined. Studying what makes different cultures laugh reveals what is deep about humor (the mechanism) and what is surface (the content).</p></div>`,

  // 06 — Health & Bonding Detail
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2>Humor, <em>Health</em> &amp; Bonding</h2></div>
  <h3>Norman Cousins: The Origin Story</h3>
  <p>In 1964, journalist Norman Cousins was diagnosed with ankylosing spondylitis after a stressful trip to the Soviet Union. His doctors gave him months. Cousins prescribed his own therapy: massive doses of vitamin C and liberal helpings of Marx Brothers films and Candid Camera. He claimed 10 minutes of genuine belly laughter produced two hours of pain-free sleep. His 1979 book <em>Anatomy of an Illness</em> became a bestseller and launched the modern interest in humor and health. The problem: it was an N of 1, with concurrent vitamin C treatment, and possible spontaneous remission. The story is more important as cultural catalyst than as evidence.</p>
  <h3>Laughter Yoga</h3>
  <p>Dr. Madan Kataria started Laughter Yoga in a Mumbai park in 1995 with five people. His premise: the body cannot distinguish genuine from simulated laughter. The physical act of laughing &mdash; the diaphragmatic contractions, the exhalation pattern, the facial muscle engagement &mdash; triggers the same neurochemical cascade regardless of whether something is actually funny. This is supported by evidence: voluntary laughter produces measurable cortisol reduction and endorphin release. The 40 foundation exercises use everyday situations rather than jokes, making the practice accessible across cultures and humor preferences.</p>
  <h3>What the Meta-Analyses Actually Show</h3>
  <p>A 2022 meta-analysis of <strong>45 randomized controlled studies</strong> (2,547 participants) found significant positive effects of laughter interventions on mental health, physiological markers, and physical health outcomes. A 2023 meta-analysis found cortisol reductions of <strong>32&ndash;37%</strong> compared to controls. Counterintuitively, <em>non-humorous</em> laughter (laughter yoga) shows <em>higher</em> effect sizes than humorous laughter &mdash; suggesting the physical act matters more than the cognitive experience. However, the field &ldquo;has yet to reach maturity&rdquo;: most studies have small samples, short follow-ups, and no blinding (participants know they&rsquo;re in the laughter group).</p>
  <h3>Dunbar&rsquo;s Social Grooming</h3>
  <p>Robin Dunbar (of &ldquo;Dunbar&rsquo;s number&rdquo; fame) proposed that laughter functions as <strong>&ldquo;grooming at a distance.&rdquo;</strong> In primate societies, grooming is the primary bonding mechanism &mdash; but it requires one-on-one contact and significant time investment. Laughter solves the scaling problem: it bonds multiple individuals simultaneously through shared endorphin release. Social laughter (not solo) triggers endogenous opioid release in brain regions associated with reward. This framework explains why we laugh 30 times more in groups, why humor is valued in every social context, and why shared laughter creates the feeling of intimacy that grooming creates for other primates.</p>
  <h3>Humor and Mate Selection</h3>
  <p><a href="https://abel.mcmaster.ca/publications/pdfs/Bressler%20et%20al..pdf" target="_blank">Bressler et al. (2006)</a> demonstrated that humor functions as a <strong>sexually selected fitness indicator</strong>. Women prefer partners who <em>produce</em> humor (signals intelligence and creativity). Men prefer partners who <em>appreciate</em> their humor (signals receptivity). This sex difference is consistent with the fitness indicator hypothesis: humor production is cognitively expensive, and women (as the choosier sex in terms of mate investment) use it as an honest signal of underlying quality. Sense of humor is rated the <strong>#1 desired trait</strong> in a romantic partner across cultures and studies.</p>
  <h3>Four Humor Styles</h3>
  <p>Rod Martin&rsquo;s Humor Styles Questionnaire (HSQ) identifies four patterns: <strong>affiliative</strong> (humor to bond), <strong>self-enhancing</strong> (humor to cope), <strong>aggressive</strong> (humor to attack), and <strong>self-defeating</strong> (humor at one&rsquo;s own expense for approval). Affiliative and self-enhancing styles predict better relationship outcomes and mental health. Aggressive and self-defeating styles predict worse outcomes. The type of humor matters as much as the amount.</p>
  <div class="callout"><h4>Key Insight</h4><p>The strongest case for humor and health is not the direct clinical evidence (which is real but modest) but the indirect path: humor strengthens social bonds, and social bonds are among the strongest predictors of health and longevity. Dunbar&rsquo;s framework suggests that humor&rsquo;s health benefits are mediated by its social benefits. We do not laugh to be healthy. We laugh to belong &mdash; and belonging keeps us healthy.</p></div>`,

  // 07 — AI Humor Detail
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2><em>AI</em> &amp; Computational Humor</h2></div>
  <h3>Five Requirements for Humor</h3>
  <p>Generating humor requires the simultaneous integration of capabilities that current AI systems possess individually but cannot combine: <strong>(1) Theory of mind</strong> &mdash; knowing what the audience expects, believes, and values. <strong>(2) Cultural knowledge</strong> &mdash; shared references, taboo boundaries, social norms. <strong>(3) Timing</strong> &mdash; not just when to speak but when NOT to speak. <strong>(4) Creative subversion</strong> &mdash; generating something genuinely unexpected. <strong>(5) Evaluation</strong> &mdash; knowing whether the subversion is funny versus merely random. A <a href="https://arxiv.org/html/2502.07981v1" target="_blank">2025 analysis</a> argues that no current system integrates all five.</p>
  <h3>The Prediction Problem</h3>
  <p>Here is the deepest reason LLMs struggle with humor: they are trained to predict the most <strong>likely</strong> next token, but comedy requires the <strong>unlikely</strong> token that still makes sense. The punchline of a joke is, by definition, not what you expected. A well-calibrated language model has been optimized to produce exactly what you expected. These objectives are in direct tension. Making a model more accurate at prediction makes it less capable of genuine surprise &mdash; and surprise is the engine of comedy.</p>
  <h3>The Current State</h3>
  <p>On <a href="https://arxiv.org/html/2507.21476v1" target="_blank">HumorBench-hard</a>, which features examples requiring cultural knowledge or multi-step reasoning, <strong>no LLM exceeds 60% accuracy</strong> &mdash; on tasks that humans find intuitive. &ldquo;<a href="https://arxiv.org/abs/2306.04563" target="_blank">ChatGPT is fun, but it is not funny</a>&rdquo; (2023) found that humor remains challenging even with fine-tuning. However, users rate humor-trained LLM captions &ldquo;nearly on par&rdquo; with top human humor in structured settings &mdash; suggesting that narrow humor (captions, one-liners) is closer to solvable than broad humor (conversation, stand-up).</p>
  <h3>A Brief History of Computational Humor</h3>
  <p>Before LLMs, computational humor research focused on narrow systems: JAPE (automatic pun generation), HAHAcronym (humorous acronym expansion), and similar rule-based approaches. These systems could produce passable wordplay by leveraging knowledge graphs of semantic and phonological relationships. But puns are the lowest form of humor &mdash; and that is not mere snobbery, it is diagnostic. Puns require the fewest cognitive skills: semantic ambiguity plus phonological overlap. Broader humor requires theory of mind, cultural awareness, and creative judgment that no knowledge graph can capture.</p>
  <h3>When AI Is Accidentally Funny</h3>
  <p>The most genuinely funny AI outputs tend to be <strong>unintentional</strong>. An image generator producing a dog with six legs. A chatbot confidently explaining something absurd. A translation tool producing surreal output. The humor in these cases comes from the <em>incongruity between the machine&rsquo;s confident delivery and the output&rsquo;s absurdity</em> &mdash; exactly the kind of violated expectation that humor theories describe. We laugh <em>at</em> AI, not <em>with</em> it. Current AI humor is best understood as a new genre of comedy (machine as unwitting foil) rather than as human-like humor generation.</p>
  <h3>The Comedy Turing Test</h3>
  <p>Thomas Smith and others have argued that humor may be the truest benchmark for machine intelligence. Not because it is the hardest task, but because it requires the <strong>broadest competence</strong>: understanding people, culture, expectations, and surprise simultaneously. No other single benchmark tests all four. If an AI system can be genuinely, consistently, and originally funny &mdash; not template-based puns, but humor that surprises even its creators &mdash; it has probably achieved something close to general intelligence. The gap between current AI humor and human humor is, in this light, precisely the gap between current AI and AGI.</p>
  <div class="callout"><h4>Key Insight</h4><p>The failure of AI humor is not a curiosity &mdash; it is diagnostic. It tells us precisely what is missing from current AI: the ability to hold multiple frames simultaneously and choose the surprising one that still makes sense. A machine that can be genuinely funny has solved theory of mind, cultural understanding, creative subversion, and self-evaluation in one stroke. Until then, the funniest thing about AI humor is that it is not funny.</p></div>`
];

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);

  item.onclick = () => scrollToSection(idx);

});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';

sections.forEach((sec, idx) => {

sections.forEach((sec, idx) => {

  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;
function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}
function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}
function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}
function toggleDetail() {
  if (document.body.classList.contains('detail-open')) closeRight();
  else openDetail(lastDetailIdx);
}
function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact header + scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky title in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
<script>
(function(){
  var MP3 = 'overview.mp3';

  // 1. Inject CSS
  var css = document.createElement('style');
  css.textContent = `
    .audio-bar{display:flex;align-items:center;gap:10px;padding:10px 0 4px;margin-top:6px;max-height:50px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
    .main-head.compact .audio-bar{max-height:0;padding:0;opacity:0;margin:0;pointer-events:none}
    .audio-bar audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    [data-theme="dark"] .audio-bar audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
    .ctrl-btn.audio-ctrl{display:none;position:relative}
    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}
    .audio-bottom audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    .audio-bottom .audio-dismiss{cursor:pointer;color:var(--dim);font-size:13px;padding:4px 8px;border:none;background:none;font-family:var(--sans);letter-spacing:.5px;transition:color .2s}
    .audio-bottom .audio-dismiss:hover{color:var(--accent)}
    [data-theme="dark"] .audio-bottom audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = '<audio id="audio-main" controls preload="none" src="'+MP3+'"></audio>';
  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
