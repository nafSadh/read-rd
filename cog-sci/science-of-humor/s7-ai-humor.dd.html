  `<p>Generating humor requires the simultaneous integration of capabilities that current AI systems possess individually but cannot combine: theory of mind, cultural knowledge, timing, creative subversion, and evaluation<sup class="fn"><a>[1]</a><span class="tip"><a href="https://arxiv.org/html/2502.07981v1" target="_blank">AI Humor Generation: Cognitive, Social and Creative Skills (ArXiv, 2025) &rarr;</a></span></sup>.</p>

const details = [
  \`\${dh}Section 01</div><h2>Five <em>Requirements</em> for Humor</h2></div>
  <h3>Theory of Mind</h3>
  <p>Humor requires knowing what the audience expects, believes, and values. The setup of a joke creates a specific prediction in the listener&rsquo;s mind; the punchline subverts it. To construct this, the joke-teller must <strong>model the listener&rsquo;s mental state</strong> &mdash; what they will assume, where their attention will go, what prediction they will form. LLMs can approximate this through statistical patterns in training data, but they do not truly model other minds.</p>
  <h3>Cultural Knowledge</h3>
  <p>Humor is deeply embedded in cultural context. A joke about tax season, about British weather, about American healthcare &mdash; each requires specific cultural knowledge to parse. LLMs have this knowledge in their training data, but it is not <em>organized for comedic use</em>. Knowing that taxes are complicated and knowing that tax complexity is a source of shared exasperation are different kinds of knowledge.</p>
  <h3>Timing</h3>
  <p>Comedy depends on when things are said and, crucially, when they are <em>not</em> said. Jack Benny&rsquo;s famous pause works because of real-time audience feedback &mdash; the comedian reads the room and extends or shortens the pause accordingly. Text-based LLMs have no concept of real-time audience response. Even in interactive settings, they cannot read the room, sense building tension, or calibrate the moment of delivery.</p>
  <h3>Creative Subversion</h3>
  <p>The punchline must be genuinely <em>unexpected</em> &mdash; something the audience did not predict. But it must also <em>make sense</em> in retrospect. This requires generating something novel that is simultaneously surprising and coherent. LLMs generate by predicting the most likely continuation, which biases them toward the expected. The creative subversion comedy requires is the opposite of what the training objective rewards.</p>
  <h3>Evaluation</h3>
  <p>The joke-teller must be able to assess whether a potential joke is actually funny, as opposed to merely unexpected, confusing, offensive, or random. This evaluative capacity requires something like an aesthetic sense of humor &mdash; an internal model of what produces laughter in others. Models can approximate this through RLHF but cannot experience humor themselves, making genuine evaluation impossible.</p>
  <div class="callout"><h4>The Integration Problem</h4><p>Current AI systems can achieve each of these five capabilities individually, at least partially. The challenge is simultaneous integration. Humor requires all five operating at once, in real time, calibrated to a specific audience. This is not a scaling problem that more parameters will solve &mdash; it is an architecture problem that requires fundamentally different approaches to language and cognition.</p></div>\`,

  \`\${dh}Section 02</div><h2>The <em>Prediction</em> Problem</h2></div>
  <h3>Next-Token Prediction vs Surprise</h3>
  <p>Large language models are trained to predict the next token in a sequence. Given context, they assign probabilities to possible continuations and select the most likely ones. This training objective produces fluent, coherent, contextually appropriate text. It also produces text that is, by design, <strong>unsurprising</strong>. The model has been optimized to produce exactly what you would expect.</p>
  <h3>Comedy as Anti-Prediction</h3>
  <p>Comedy is, in a fundamental sense, anti-prediction. The punchline of a joke is the token that the audience did <em>not</em> predict &mdash; but that, upon delivery, makes perfect sense. It is the unlikely continuation that is also coherent. The comedian&rsquo;s craft is precisely the ability to subvert predictions while maintaining narrative logic. A model optimized for prediction is optimized for the opposite of this.</p>
  <h3>The Temperature Objection</h3>
  <p>One might argue that increasing the &ldquo;temperature&rdquo; parameter (which makes the model sample less-likely tokens more frequently) would produce more surprising and therefore funnier outputs. In practice, higher temperature produces outputs that are more <em>random</em> but not more <em>funny</em>. Randomness is not humor. Humor requires the <strong>specific</strong> unlikely token that creates a meaningful reinterpretation of the setup &mdash; not just any unlikely token.</p>
  <h3>The Swerve Requirement</h3>
  <p>Good comedy predicts correctly and then swerves at the last possible moment. The setup must track the audience&rsquo;s expectations accurately (prediction), and the punchline must violate those expectations precisely (anti-prediction). This requires a model that can simultaneously predict what the audience expects AND generate something different that still makes sense. Current architectures are optimized for the first half; the second half works against their training objective.</p>
  <div class="callout"><h4>The Deeper Problem</h4><p>The prediction problem is not a bug that can be patched &mdash; it is a fundamental tension between the training objective (predict the next token) and the creative objective (surprise the reader). Solving this tension may require architectures that can represent and reason about expectations explicitly, rather than approximating them through statistical patterns.</p></div>\`,

  \`\${dh}Section 03</div><h2><em>HumorBench</em> &amp; Current State</h2></div>
  <h3>HumorBench</h3>
  <p>HumorBench (2025) is the most rigorous current evaluation of LLM humor capabilities. The benchmark includes tasks ranging from joke completion and humor recognition to humor explanation and original humor generation. On the standard subset, leading LLMs perform reasonably well. On <strong>HumorBench-hard</strong> &mdash; examples requiring cultural knowledge, multi-step reasoning, or theory of mind &mdash; no LLM exceeds 60% accuracy on tasks that humans find intuitive.</p>
  <h3>What LLMs Can Do</h3>
  <p>Current LLMs can: recognize joke structures (setup/punchline format), generate jokes that follow templates (puns, knock-knock, format-based humor), explain why jokes are funny (post-hoc analysis), and produce humor-adjacent content that is mildly amusing. In structured settings (caption contests, one-liner generation), users rate humor-trained LLM outputs &ldquo;nearly on par&rdquo; with top human humor. Narrow humor &mdash; working within established formats &mdash; is approaching human performance.</p>
  <h3>What LLMs Cannot Do</h3>
  <p>Current LLMs cannot: generate genuinely surprising, original humor (as opposed to template-based variations), time delivery for maximum effect, read the room (adapt to audience reactions), produce humor that makes someone involuntarily laugh, or be funny <em>about</em> being unfunny (meta-humor requires self-awareness). The gap between narrow humor (templates) and broad humor (conversation, improvisation, stand-up) remains enormous.</p>
  <h3>The Formulaic Problem</h3>
  <p>LLMs tend toward safe, predictable humor &mdash; jokes that are technically well-formed but lack the spark of genuine surprise. They produce humor that is &ldquo;fun, but not funny&rdquo; (as one 2023 paper put it). The outputs feel like jokes assembled from components rather than jokes that emerged from genuine insight or observation. This formulaic quality is a direct consequence of the prediction problem: the model produces what is most likely to be a joke, not what is most likely to be funny.</p>
  <div class="callout"><h4>The Narrow-Broad Gap</h4><p>The distinction between narrow and broad humor may be the most important finding. LLMs can approach human performance in constrained formats (captions, one-liners, puns) but fail dramatically in open-ended humor (conversation, stand-up, improvisation). This suggests that format-constrained humor is a pattern-matching problem (solvable by LLMs) while open-ended humor is a cognitive creativity problem (currently unsolvable).</p></div>\`,

  \`\${dh}Section 04</div><h2><em>Pre-LLM</em> Computational Humor</h2></div>
  <h3>JAPE and Early Systems</h3>
  <p><strong>JAPE</strong> (Joke Analysis and Production Engine) was one of the earliest computational humor systems, designed to generate puns automatically. It worked by identifying words with multiple meanings (semantic ambiguity) and constructing question-answer pairs that exploited the ambiguity. The results were recognizably pun-like but rarely genuinely funny &mdash; they demonstrated that the <em>structure</em> of a pun could be computed while the <em>quality</em> could not.</p>
  <h3>HAHAcronym</h3>
  <p><strong>HAHAcronym</strong> generated humorous acronym expansions by finding unexpected but phonetically plausible word choices. Like JAPE, it could produce outputs that followed the format of humor without achieving the effect. The system demonstrated that certain narrow forms of wordplay &mdash; those depending on systematic linguistic relationships &mdash; are partially computable.</p>
  <h3>The Pun Problem</h3>
  <p>Puns are the one type of humor that is partially computable because they require only three things: semantic ambiguity (a word with multiple meanings), phonological overlap (sounds that match), and unexpected interpretation (the listener resolves the ambiguity in the non-obvious direction). All three can be represented in knowledge graphs and manipulated algorithmically. Puns are sometimes called the &ldquo;lowest form of humor,&rdquo; though this characterization is contested &mdash; some puns require sophisticated semantic processing. What is less debatable is that puns require fewer <em>simultaneous</em> cognitive skills than multi-layered humor forms.</p>
  <h3>Colton&rsquo;s Computational Creativity</h3>
  <p>Simon Colton&rsquo;s Computational Creativity framework attempted to formalize creativity in ways applicable to humor. The framework identifies novelty, surprise, and value as the three components of creative output. Applied to humor: the joke must be <strong>novel</strong> (not a repetition), <strong>surprising</strong> (violating expectations), and <strong>valuable</strong> (actually funny, not just unexpected). Current AI systems can achieve novelty and sometimes surprise but consistently fail at the evaluative component &mdash; determining whether a novel, surprising output is actually funny.</p>
  <div class="callout"><h4>The Historical Lesson</h4><p>Pre-LLM computational humor research established an important principle: the more cognitive skills a form of humor requires, the harder it is to compute. Puns (semantic ambiguity only) are partially computable. Observational humor (cultural knowledge + theory of mind) is not. Stand-up (all five requirements simultaneously) is nowhere close. The hierarchy of computational difficulty maps directly onto the hierarchy of cognitive complexity.</p></div>\`,

  \`\${dh}Section 05</div><h2>When AI Is <em>Accidentally</em> Funny</h2></div>
  <h3>The Uncanny Valley of Comedy</h3>
  <p>The most genuinely funny AI outputs are almost always unintentional. An image generator producing a person with too many fingers. A chatbot confidently asserting something demonstrably absurd. A translation tool producing surreal, dreamlike sentences. The humor in these cases comes from the <em>incongruity between the machine&rsquo;s confident delivery and the output&rsquo;s absurdity</em> &mdash; exactly the kind of violated expectation that humor theories describe.</p>
  <h3>Why Failures Are Funny</h3>
  <p>We laugh at AI failures for the same reason we laugh at malapropisms: the error reveals something. When a person confidently uses the wrong word, the gap between their confidence and their incorrectness is the joke. AI failures work the same way: the model&rsquo;s absolute certainty in its absurd output creates a violation (this is wrong) that seems benign (it is a machine, not a person, so the stakes are low). BVT predicts this perfectly.</p>
  <h3>AI as New Comedy Genre</h3>
  <p>Current AI humor is best understood as a new <strong>genre</strong> of comedy, not as human comedy. The genre is &ldquo;machine as unwitting foil&rdquo; &mdash; we laugh at the machine, not with it. This is comedy <em>about</em> AI, not comedy <em>by</em> AI. The machine is the straight man in a comedy it does not know it is performing. This genre has no pre-computer equivalent, making it one of the genuinely new things in comedy&rsquo;s long history.</p>
  <h3>The Intentional vs Unintentional Gap</h3>
  <p>The gap between AI&rsquo;s unintentional humor (often genuinely funny) and its intentional humor (usually formulaic and flat) is itself diagnostic. It tells us that the cognitive infrastructure needed for humor <em>evaluation</em> (knowing what is funny) lags far behind the infrastructure for humor <em>generation</em> (producing joke-shaped outputs). AI can accidentally create the conditions for humor but cannot reliably identify or reproduce them.</p>
  <div class="callout"><h4>The Meta-Joke</h4><p>There is something deeply ironic about AI humor: the funniest thing about it is that it is not funny. This meta-observation &mdash; that a machine&rsquo;s inability to be funny is itself humorous &mdash; captures everything humor theories say about the human condition. We find meaning in meaninglessness, humor in humorlessness, and comedy in the failure of comedy. No machine can do that.</p></div>\`,

  \`\${dh}Section 06</div><h2>The Comedy <em>Turing Test</em></h2></div>
  <h3>The Argument</h3>
  <p>Thomas Smith and others have argued that humor may be the truest benchmark for machine intelligence. The argument: humor requires understanding <strong>people</strong> (theory of mind), <strong>culture</strong> (shared references and norms), <strong>expectations</strong> (what the audience will predict), and <strong>surprise</strong> (what will violate those expectations delightfully). No other single task requires all four simultaneously. If an AI system can be genuinely, consistently, originally funny, it has probably achieved general intelligence.</p>
  <h3>Why Other Benchmarks Fall Short</h3>
  <p>Language translation tests linguistic knowledge but not social understanding. Mathematical reasoning tests logical ability but not cultural awareness. Creative writing tests language facility but not audience modeling. Chess tests strategic thinking but not theory of mind. Humor is unique in requiring <em>all</em> of these capabilities at once, calibrated to a specific audience in real time. Progress in humor may therefore be the best proxy for progress toward general intelligence.</p>
  <h3>The Counter-Argument</h3>
  <p>The comedy Turing test has critics. Humor is culturally specific &mdash; an AI that is funny in English may not be funny in Japanese. The bar may be lower than it seems: we laugh at many things that are not objectively funny (social laughter, contagious laughter, slapstick). An AI that generates competent puns has not achieved AGI. And much human laughter (Provine&rsquo;s 30x finding) has nothing to do with humor generation at all.</p>
  <h3>The Resolution</h3>
  <p>The counter-arguments identify genuine limitations but do not refute the core claim. Narrow humor (puns, templates) is not a meaningful benchmark. But <strong>broad humor</strong> &mdash; original observational comedy, situational improvisation, humor that surprises its own creator &mdash; does require the kind of cognitive integration that would constitute genuine understanding. The comedy Turing test works if we set the bar at broad humor rather than narrow format-following.</p>
  <div class="callout"><h4>Where We Stand</h4><p>By the comedy Turing test, AI is nowhere close to general intelligence. LLMs can follow humor templates and occasionally produce mildly amusing outputs, but they cannot generate the kind of spontaneous, audience-calibrated, genuinely surprising humor that any competent comedian produces nightly. The gap between current AI humor and human humor is, in this light, precisely the gap between current AI and AGI.</p></div>\`,

  \`\${dh}Section 07</div><h2>Humor as <em>Diagnostic</em></h2></div>
  <h3>What AI Humor Failures Reveal</h3>
  <p>The failure of AI at humor is not a curiosity or an amusing sidebar. It is <strong>diagnostic</strong> &mdash; it tells us precisely what current AI systems lack. The specific ways AI humor fails illuminate the specific cognitive capacities that are missing: genuine theory of mind (not statistical approximation), embodied cultural understanding (not training data patterns), real-time audience modeling (not text prediction), and creative evaluation (not output generation).</p>
  <h3>The Frame-Holding Problem</h3>
  <p>At its deepest level, humor requires the ability to <strong>hold multiple frames simultaneously</strong> and choose the one that produces the most surprising-yet-coherent result. The setup establishes Frame A. The punchline reveals Frame B. The humor comes from the audience&rsquo;s recognition that both frames are valid but only one was expected. This dual-frame processing is cognitively expensive for humans and appears to be architecturally difficult for current AI systems.</p>
  <h3>Implications for AI Development</h3>
  <p>If humor is genuinely diagnostic of general intelligence, then the path to AGI may run through comedy. Not because humor is the hardest problem (it may not be) but because it requires the <strong>broadest integration</strong> of cognitive capabilities. A research program that takes humor seriously as a benchmark would need to address theory of mind, cultural understanding, creative subversion, and aesthetic evaluation simultaneously &mdash; which is arguably what AGI research needs to address regardless.</p>
  <h3>The Current Diagnostic</h3>
  <p>Current AI humor tells us: LLMs have acquired enormous amounts of cultural knowledge but cannot organize it for creative use. They can model expectations statistically but cannot subvert them strategically. They can generate novel outputs but cannot evaluate whether those outputs are good. They can follow templates but cannot transcend them. These are not incremental gaps that more scaling will close &mdash; they may be fundamental limitations of the current paradigm.</p>
  <div class="callout"><h4>The Final Insight</h4><p>The failure of AI humor is the most informative failure in AI research. It tells us exactly what is missing: not knowledge (LLMs have plenty), not fluency (they are remarkably fluent), not even creativity (they can generate novel outputs). What is missing is <em>understanding</em> &mdash; the ability to model what other minds will think, to know what is surprising versus what is merely unlikely, and to evaluate whether a novel output is delightful or just weird. Until machines can be funny, they do not understand us. And that is, perhaps, the funniest thing of all.</p></div>\`
];
