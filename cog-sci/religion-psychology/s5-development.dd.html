<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Intuitive Theism', title: '<em>Kelemen</em>&rsquo;s Intuitive Theism' },
  { num: '02', short: 'God Concepts', title: '<em>Children</em>&rsquo;s God Concepts' },
  { num: '03', short: 'Born Believers', title: '<em>Born</em> Believers' },
  { num: '04', short: 'Identity', title: '<em>Religious</em> Identity Formation' },
  { num: '05', short: 'Deconversion', title: 'The <em>Deconversion</em> Process' },
  { num: '06', short: 'Gen Z', title: '<em>Generation</em> Z &amp; the Future' }
];

const summaries = [
  // 01
  `<p>Deborah Kelemen&rsquo;s<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1111/j.0956-7976.2004.00672.x">[1]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1111/j.0956-7976.2004.00672.x" target="_blank">Kelemen: Are Children Intuitive Theists? (2004) &rarr;</a></span></sup> &ldquo;intuitive theism&rdquo; hypothesis is one of the most influential ideas in developmental psychology of religion. Her research shows that children are &ldquo;promiscuous teleologists&rdquo; &mdash; they default to purpose-based explanations for natural phenomena. Rocks exist &ldquo;for animals to scratch on.&rdquo; Rain falls &ldquo;so plants can drink.&rdquo; By age five, this teleological reasoning, combined with agency detection and Theory of Mind, makes children naturally receptive to religious explanations.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Age 3&ndash;5</div><div class="sl">Promiscuous teleology peaks</div></div>
    <div class="st"><div class="sv">Design</div><div class="sl">Default reasoning stance</div></div>
    <div class="st"><div class="sv">Cross-cultural</div><div class="sl">Confirmed internationally</div></div>
  </div>
  <p>Kelemen&rsquo;s crucial finding: children are not taught teleological reasoning by their parents or religious communities. It emerges spontaneously from the developing cognitive architecture. Even children raised in secular homes attribute purpose to natural objects. The cognitive default is teleological; mechanistic thinking is the culturally acquired overlay.</p>
  <div class="callout"><h4>The Asymmetry of Acquisition</h4><p>Creationism is cognitively natural; evolution is cognitively unnatural. This does not make creationism true or evolution false &mdash; it means that teaching evolution requires working against a deep cognitive default, while creationism merely elaborates one. The educational implications are profound: science education must actively build new cognitive habits, not just present information.</p></div>`,

  // 02
  `<p>Cross-cultural research reveals that children&rsquo;s God concepts are more sophisticated than previously assumed. Even very young children distinguish God from ordinary humans, attributing extraordinary psychological properties (omniscience, immortality of mind) to God while recognizing human cognitive limitations.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Supernatural Psychology</h4><p>Children attribute omniscience, omnipresence, and psychological immortality to God while recognizing that humans have limited knowledge and perspective. This differentiation appears across religious traditions.</p></div>
    <div class="feat"><h4>Physical Limitations</h4><p>Interestingly, young children do not consistently attribute supernatural physical properties to God. They are more willing to say God knows everything than to say God can physically be everywhere. Psychological supernaturalism precedes physical supernaturalism.</p></div>
    <div class="feat"><h4>Parental Influence</h4><p>Saide et al. (2022)<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9544111/">[2]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9544111/" target="_blank">Saide et al.: Parents&rsquo; and Children&rsquo;s Concepts of God (PMC 2022) &rarr;</a></span></sup> found that children&rsquo;s God concepts correspond with their parents&rsquo; concepts, but the relationship is moderated by children&rsquo;s executive functioning. Higher EF children develop more differentiated concepts earlier.</p></div>
    <div class="feat"><h4>Active Construction</h4><p>Children do not passively absorb God concepts from their environment. They actively construct theological understanding using general cognitive tools (ToM, teleology, dualism) applied to culturally available God narratives.</p></div>
  </div>
  <div class="callout"><h4>Not Just a Big Person</h4><p>Lane et al. (2017)<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/28220954/">[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/28220954/" target="_blank">Lane et al.: Is God Just a Big Person? (2017) &rarr;</a></span></sup> showed that across cultures and religious traditions, the youngest children already conceptualize God as categorically different from humans &mdash; not merely a very powerful person. This challenges the Piagetian assumption that children start with anthropomorphic God concepts and gradually abstract them. The supernatural conceptualization may be present from the start.</p></div>`,

  // 03
  `<p>Justin Barrett&rsquo;s &ldquo;born believers&rdquo; thesis synthesizes findings from CSR and developmental psychology: children are cognitively predisposed toward religious thinking not because they are taught it, but because the same cognitive tools that help them understand the physical and social world naturally generate proto-religious concepts.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">Age 0&ndash;2</div><div class="tl-text">Agency detection develops. Infants track agents differently from objects. The cognitive groundwork for perceiving invisible agents is being laid.</div></div>
    <div class="tl-item"><div class="tl-date">Age 2&ndash;4</div><div class="tl-text">Theory of Mind emerges. Children begin attributing mental states to others. They can now conceptualize agents with thoughts, desires, and intentions &mdash; including agents they cannot see.</div></div>
    <div class="tl-item"><div class="tl-date">Age 3&ndash;5</div><div class="tl-text">Promiscuous teleology peaks. Children see purpose everywhere. Combined with agency detection and ToM, this creates fertile ground for design-based theology.</div></div>
    <div class="tl-item"><div class="tl-date">Age 4&ndash;6</div><div class="tl-text">Intuitive dualism solidifies. Children distinguish mind from body and can conceive of disembodied minds. Souls, ghosts, and spirits become conceptually possible.</div></div>
    <div class="tl-item"><div class="tl-date">Age 5&ndash;7</div><div class="tl-text">God concepts differentiate from human concepts. Children attribute superhuman psychological properties to God. Cultural elaboration begins to shape specific theological content.</div></div>
    <div class="tl-item"><div class="tl-date">Age 7+</div><div class="tl-text">Abstract reasoning enables both more sophisticated theology and the first genuine doubts. The cognitive infrastructure is in place; culture now determines which direction development takes.</div></div>
  </div>`,

  // 04
  `<p>Religious identity formation follows general identity development patterns but with unique features. Religious identity is distinctive because it combines belief (cognitive), practice (behavioral), community (social), and meaning (existential) dimensions simultaneously. Losing religious identity means losing all four at once.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Childhood Absorption</h4><p>Young children absorb religious identity largely through participation: rituals, stories, community belonging. Belief follows practice, not the reverse. The felt sense of belonging is primary.</p></div>
    <div class="feat"><h4>Adolescent Questioning</h4><p>Abstract thinking enables genuine evaluation of inherited beliefs. Peer influence competes with family influence. Religious identity becomes a matter of choice rather than inheritance.</p></div>
    <div class="feat"><h4>Emerging Adulthood</h4><p>Ages 18&ndash;25 are the peak period for religious identity exploration, commitment, or abandonment. College exposure to diversity and intellectual challenge often catalyzes reevaluation.</p></div>
    <div class="feat"><h4>Identity Foreclosure</h4><p>Some individuals commit to religious identity without genuine exploration (Marcia&rsquo;s identity foreclosure). This can produce stable but rigid identity that is vulnerable to later disruption.</p></div>
  </div>`,

  // 05
  `<p>Deconversion &mdash; the process of leaving a religious identity &mdash; has become one of the most active research areas in psychology of religion. Hardy and Taylor&rsquo;s 2024 literature review<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/00846724241235176">[4]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/00846724241235176" target="_blank">Hardy &amp; Taylor: Religious Deconversion in Adolescence (2024) &rarr;</a></span></sup> synthesizes what we know about this increasingly common experience.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">74%</div><div class="sl">Left before age 17</div></div>
    <div class="st"><div class="sv">26%</div><div class="sl">Left before teen years</div></div>
    <div class="st"><div class="sv">Multi-stage</div><div class="sl">Process, not event</div></div>
  </div>
  <p>The deconversion process follows a predictable multi-stage pattern:</p>
  <ul class="s-list">
    <li><strong>Pre-exit strain:</strong> Accumulating doubts, moral conflicts with doctrine, intellectual challenges, or negative experiences with religious community. This phase can last months or years.</li>
    <li><strong>Turning point:</strong> A specific event, realization, or accumulation that tips the balance. Often involves a catalytic experience: encountering evolution, discovering hypocrisy, experiencing unanswered prayer during crisis.</li>
    <li><strong>Exit and anomie:</strong> The actual departure from religious identity. Characterized by identity confusion, loss of social network, grief, and existential disorientation. The world loses its meaning framework.</li>
    <li><strong>Reconstruction:</strong> Building a new identity, meaning system, and social world. Some retain spiritual beliefs without institutional affiliation. Others adopt secular identities. Some experience lasting identity disruption.</li>
  </ul>
  <p>Recent 2024&ndash;2025 research adds nuance: Bleidorn et al. (2024)<sup class="fn"><a href="https://onlinelibrary.wiley.com/doi/full/10.1111/jopy.12881">[5]</a><span class="tip"><a href="https://onlinelibrary.wiley.com/doi/full/10.1111/jopy.12881" target="_blank">Bleidorn et al.: Psychological Change Before/After Conversion and Deconversion (2024) &rarr;</a></span></sup> found that personality changes both precede and follow deconversion &mdash; openness to experience increases before exit, emotional stability decreases immediately after, then recovers. Polish adolescents (2025)<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/10508619.2025.2497132">[6]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/10508619.2025.2497132" target="_blank">Deconversion from Catholicism &mdash; Polish Adolescents (2025) &rarr;</a></span></sup> show deconversion as peer community integration combined with rejection of religious constraints.</p>
  <div class="security-box"><h4>The Cost of Leaving</h4><p>Deconversion from high-demand religious communities carries significant psychological costs: loss of meaning system, social network, family relationships, and daily routine simultaneously. The grief response often mimics bereavement. Religious exiters report fears of stigma, diminished social support, and challenges to established self-perceptions. Clinicians working with deconverts need to recognize this as a legitimate form of grief and identity disruption, not merely a change of opinion.</p></div>`,

  // 06
  `<p>Generation Z (born roughly 1997&ndash;2012) is the least religiously affiliated generation in American history. Approximately 34% identify as religiously unaffiliated (&ldquo;nones&rdquo;). Among young adults aged 18&ndash;29 who left religion, 74% did so before age 17<sup class="fn"><a href="https://www.americansurveycenter.org/research/generation-z-future-of-faith/">[7]</a><span class="tip"><a href="https://www.americansurveycenter.org/research/generation-z-future-of-faith/" target="_blank">American Survey Center: Gen Z and Future of Faith (2024) &rarr;</a></span></sup> &mdash; earlier than any previous generation.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">34%</div><div class="sl">Gen Z unaffiliated</div></div>
    <div class="st"><div class="sv">Earlier</div><div class="sl">Age of exit vs. prior generations</div></div>
    <div class="st"><div class="sv">Spiritual</div><div class="sl">But not religious</div></div>
  </div>
  <p>The reasons Gen Z cites for leaving religion form a consistent pattern: perceived irrelevance to daily life, perceived conflict with science, moral disagreements (particularly around LGBTQ+ issues and gender), and negative experiences with religious institutions or leaders. But &ldquo;no religion&rdquo; does not mean &ldquo;no spirituality.&rdquo; Many Gen Z &ldquo;nones&rdquo; retain beliefs in something beyond the material while rejecting organized religious affiliation.</p>
  <div class="callout"><h4>The Institutional Problem</h4><p>The developmental trajectory of Gen Z suggests not the death of the religious impulse &mdash; cognitive science shows that impulse is deeply rooted in human cognition &mdash; but its detachment from organized religion. Young people are not becoming less spiritual; they are becoming less institutional. They want meaning, community, and transcendence, but they want it on their own terms, unmediated by religious authority. Whether secular substitutes can provide what religion once offered at scale remains an open question.</p></div>`
];

  const rightInner = document.querySelector('.right-inner');
  const mainHead = document.querySelector('.main-head');

  function selectSection(idx) {
