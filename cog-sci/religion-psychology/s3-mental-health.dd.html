<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Pargament', title: '<em>Pargament</em>&rsquo;s Coping Framework' },
  { num: '02', short: 'Positive', title: '<em>Positive</em> Religious Coping' },
  { num: '03', short: 'Negative', title: '<em>Negative</em> Religious Coping' },
  { num: '04', short: 'Scrupulosity', title: '<em>Scrupulosity</em> &amp; Religious OCD' },
  { num: '05', short: 'Trauma', title: '<em>Religious</em> Trauma Syndrome' },
  { num: '06', short: 'Meditation', title: '<em>Prayer</em>, Meditation &amp; the Brain' },
  { num: '07', short: 'Publication Bias', title: '<em>Publication</em> Bias &amp; Methodology' },
  { num: '08', short: 'Clinical', title: '<em>Clinical</em> Implications' }
];

const summaries = [
  // 01
  `<p>Kenneth Pargament<sup class="fn"><a href="https://www.guilford.com/books/The-Psychology-of-Religion-and-Coping/Kenneth-Pargament/9781572306646/reviews">[1]</a><span class="tip"><a href="https://www.guilford.com/books/The-Psychology-of-Religion-and-Coping/Kenneth-Pargament/9781572306646/reviews" target="_blank">Pargament: Psychology of Religion and Coping (1997) &rarr;</a></span></sup>, Professor Emeritus at Bowling Green State University, developed the most influential framework for understanding how religion affects mental health. His central insight: religion is not uniformly helpful or harmful. The critical variable is the <em>style</em> of religious coping, not the fact of being religious. Positive religious coping predicts resilience; negative religious coping predicts distress.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">PARGAMENT&rsquo;S RELIGIOUS COPING MODEL</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5"/>
    <rect x="180" y="40" width="140" height="35" class="node" rx="3"/>
    <text x="250" y="62" text-anchor="middle" class="node-text" font-size="11">Stressful Event</text>
    <line x1="200" y1="75" x2="120" y2="100" stroke="var(--green)" stroke-width="1"/>
    <line x1="300" y1="75" x2="380" y2="100" stroke="var(--red)" stroke-width="1"/>
    <rect x="40" y="100" width="160" height="45" rx="3" fill="none" stroke="var(--green)" stroke-width="1"/>
    <text x="120" y="118" text-anchor="middle" font-size="10" fill="var(--green)" font-weight="500">Positive Coping</text>
    <text x="120" y="133" text-anchor="middle" class="node-sub">God as supportive partner</text>
    <rect x="300" y="100" width="160" height="45" rx="3" fill="none" stroke="var(--red)" stroke-width="1"/>
    <text x="380" y="118" text-anchor="middle" font-size="10" fill="var(--red)" font-weight="500">Negative Coping</text>
    <text x="380" y="133" text-anchor="middle" class="node-sub">God as punisher</text>
  </svg></div>
  <p>Pargament&rsquo;s framework was validated during the COVID-19 pandemic: a 2024 critical review<sup class="fn"><a href="https://link.springer.com/article/10.1007/s10943-024-02136-y">[2]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s10943-024-02136-y" target="_blank">Abu-Raiya &amp; Pargament: Religious Coping &mdash; COVID-19 Critical Review (2024) &rarr;</a></span></sup> confirmed that positive religious coping predicted resilience while negative religious coping predicted distress, independent of other variables. The framework has been tested across Christianity, Islam, Judaism, Hinduism, and Buddhism with consistent results.</p>`,

  // 02
  `<p>Positive religious coping involves appraising stressful events through a benevolent divine lens and drawing on religious resources for support. The mechanisms are not mysterious: they overlap substantially with what secular psychology identifies as effective coping strategies &mdash; meaning-making, social support, and emotional regulation &mdash; but with a sacred framing.</p>
  <ul class="s-list pro">
    <li><strong>Benevolent reappraisal:</strong> Viewing suffering as a divine test, growth opportunity, or part of a larger plan. This creates a meaning structure that absorbs the randomness of adversity.</li>
    <li><strong>Community support:</strong> Religious congregations provide social networks, practical assistance, and emotional validation. The &ldquo;casserole effect&rdquo; is real: religious communities mobilize around members in crisis.</li>
    <li><strong>Collaborative coping:</strong> Viewing God as an active partner in problem-solving rather than a passive observer. This creates a sense of not being alone in adversity.</li>
    <li><strong>Sacred meaning:</strong> Finding sacred significance in everyday activities and relationships. This creates a sense of purpose that secular meaning-making sometimes struggles to match.</li>
    <li><strong>Suicide protection:</strong> Large epidemiological studies consistently find lower suicide rates among religiously active populations, likely mediated by community belonging, moral prohibition, and meaning.</li>
  </ul>
  <div class="callout"><h4>The Effect Size Question</h4><p>Large reviews<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8462234/">[3]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8462234/" target="_blank">Garssen et al.: Spirituality, Religiousness, Mental Health (PMC 2021) &rarr;</a></span></sup> find religion is associated with lower depression and anxiety, but the effect sizes are small to moderate (typically r = .10&ndash;.20). Publication bias is a documented concern: studies finding positive effects of religion are more likely to be published. The honest summary is that religion helps, on average, modestly &mdash; and the benefits concentrate among those who practice positive coping in supportive communities.</p></div>`,

  // 03
  `<p>Negative religious coping involves interpreting adversity as divine punishment, questioning God&rsquo;s power or love, and experiencing spiritual struggle. It is consistently associated with worse mental health outcomes &mdash; increased anxiety, depression, and even mortality risk in medical patients.</p>
  <ul class="s-list con">
    <li><strong>Punishing God reappraisal:</strong> Believing that suffering is God&rsquo;s punishment for sin. This transforms adversity from merely painful to existentially threatening.</li>
    <li><strong>Divine abandonment:</strong> Feeling that God has withdrawn support or turned away. This is particularly devastating for those whose entire meaning system depends on divine presence.</li>
    <li><strong>Spiritual discontent:</strong> Questioning God&rsquo;s power, love, or existence in the face of suffering. While doubt can be growthful, unresolved spiritual struggle predicts distress.</li>
    <li><strong>Interpersonal religious discontent:</strong> Feeling anger toward the religious community, clergy, or institution. This combines spiritual pain with social isolation.</li>
    <li><strong>Mortality risk:</strong> Studies of hospitalized patients found that negative religious coping predicted increased mortality risk even after controlling for severity of illness and other covariates.</li>
  </ul>
  <div class="callout"><h4>The Sacred Loss</h4><p>Pargament introduced the concept of &ldquo;sacred loss&rdquo; &mdash; the experience of losing something one has invested with sacred meaning (a marriage, a vocation, health, faith itself). Sacred losses produce uniquely intense grief because they challenge not just worldly arrangements but the entire meaning system. When God feels absent precisely when needed most, the resulting crisis is existential, not merely psychological.</p></div>`,

  // 04
  `<p>Scrupulosity is a form of OCD in which the sufferer&rsquo;s primary anxiety centers on religious, moral, or ethical failure.<sup class="fn"><a href="https://iocdf.org/faith-ocd/what-is-ocd-scrupulosity/">[4]</a><span class="tip"><a href="https://iocdf.org/faith-ocd/what-is-ocd-scrupulosity/" target="_blank">IOCDF: What is OCD &amp; Scrupulosity? (2023) &rarr;</a></span></sup> It affects up to a third of OCD patients (some scrupulous symptoms) and is the primary presentation in approximately 5%. It is one of the most treatment-resistant OCD subtypes and occurs across all major religious traditions.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">~33%</div><div class="sl">OCD patients with scrupulous symptoms</div></div>
    <div class="st"><div class="sv">5%</div><div class="sl">Primary scrupulosity</div></div>
    <div class="st"><div class="sv">CBT+ERP</div><div class="sl">Primary treatment</div></div>
  </div>
  <div class="feat-grid">
    <div class="feat"><h4>Obsessions</h4><p>Intrusive thoughts about blasphemy, unforgivable sin, inadequate prayer, sexual impropriety, or moral failure. The sufferer experiences these thoughts as evidence of spiritual corruption.</p></div>
    <div class="feat"><h4>Compulsions</h4><p>Excessive prayer, confession, ritual repetition, reassurance-seeking from clergy, avoidance of religious contexts that trigger anxiety, mental reviewing of past actions for sin.</p></div>
    <div class="feat"><h4>Treatment Challenge</h4><p>CBT with Exposure and Response Prevention is the gold standard<sup class="fn"><a href="https://link.springer.com/article/10.1007/s12144-024-06040-2">[5]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s12144-024-06040-2" target="_blank">Scrupulosity Psychotherapies Systematic Review (2024) &rarr;</a></span></sup>, but scrupulosity requires culturally sensitive adaptation. Exposures that challenge religious beliefs can feel blasphemous to the patient.</p></div>
    <div class="feat"><h4>Cross-Cultural Presence</h4><p>A 2025 study in Kashmir<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/13674676.2025.2451905">[6]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/13674676.2025.2451905" target="_blank">Scrupulosity in Kashmir &mdash; OCD, Religiosity, Guilt (2025) &rarr;</a></span></sup> found similar scrupulosity patterns in Muslim patients: recurrent doubts, excessive prayer as compulsion, association with guilt and OCD severity. The cognitive mechanism is universal; the content is culturally shaped.</p></div>
  </div>
  <div class="security-box"><h4>Distinguishing Scrupulosity from Devout Practice</h4><p>The boundary between scrupulosity and sincere religious devotion is clinically critical. The distinguishing features are ego-dystonic intrusions (the thoughts feel unwanted and distressing, not spiritually meaningful), functional impairment, and the compulsive quality of the religious behavior. A devout person prays because they want to; a scrupulous person prays because they are terrified of what will happen if they do not.</p></div>`,

  // 05
  `<p>Religious trauma syndrome (RTS), first described by Marlene Winell in 2011, refers to the psychological harm caused by authoritarian, high-demand, or abusive religious environments. A 2024 PMC review<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC11553601/">[7]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC11553601/" target="_blank">Religious Trauma Syndrome &mdash; Futile Fate of Faith (PMC 2024) &rarr;</a></span></sup> documented the mechanisms: indoctrination, coercive control, spiritual abuse, and the devastating social consequences of leaving closed religious communities.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Authoritarian Control</h4><p>Demand for absolute obedience to religious leaders. Independent thinking is framed as rebellion against God. Decision-making capacity is systematically undermined.</p></div>
    <div class="feat"><h4>Shame-Based Sexuality</h4><p>Purity culture, abstinence-only education, and framing natural desires as sinful produce lasting sexual dysfunction, body shame, and relationship difficulties.</p></div>
    <div class="feat"><h4>Apocalyptic Anxiety</h4><p>Imminent end-times theology creates chronic hypervigilance, existential terror, and difficulty planning for the future. Children raised with apocalyptic beliefs show elevated anxiety.</p></div>
    <div class="feat"><h4>Social Shunning</h4><p>Religious communities that practice shunning, disfellowshipping, or excommunication create devastating social losses for those who leave. The threat of losing all relationships is a powerful tool of coercive control.</p></div>
    <div class="feat"><h4>Spiritual Abuse</h4><p>A 2025 study on Hong Kong Christian communities<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/13674676.2025.2527255">[8]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/13674676.2025.2527255" target="_blank">Spiritual Abuse &mdash; Hong Kong Christian Communities (2025) &rarr;</a></span></sup> documented the intersection of spiritual abuse and sexual trauma: coercive control via Scripture misuse, victim-blaming through religious frameworks, and community retraumatization.</p></div>
    <div class="feat"><h4>Recovery Challenges</h4><p>Recovery from religious trauma is complicated by the loss of meaning system, social network, and identity simultaneously. Secular therapy may miss the spiritual dimensions; religious therapy may inadvertently reinforce the source of harm.</p></div>
  </div>`,

  // 06
  `<p>The most consistently positive mental health findings in religion research come from contemplative practices: meditation, contemplative prayer, and mindfulness. Neuroimaging shows that these practices produce measurable brain changes &mdash; reduced default mode network activity, increased executive control connectivity &mdash; that correlate with reduced anxiety and improved emotional regulation.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">DMN</div><div class="sl">Reduced default mode activity</div></div>
    <div class="st"><div class="sv">PFC</div><div class="sl">Increased prefrontal activation</div></div>
    <div class="st"><div class="sv">~Same</div><div class="sl">Secular vs. religious meditators</div></div>
  </div>
  <p>A critical finding: secular meditators and contemplative monks show similar neural signatures. The mental health benefits appear to come from the practice of sustained attention and emotional regulation, not from the religious belief content that frames the practice. This suggests that the health benefits often attributed to &ldquo;religion&rdquo; may be more accurately attributed to &ldquo;contemplative practice that religion happens to promote.&rdquo;</p>
  <div class="callout"><h4>The Practice-Belief Distinction</h4><p>This finding has implications for the entire religion-mental-health literature. If the benefits come from practice rather than belief, then the question &ldquo;Is religion good for mental health?&rdquo; may be asking the wrong thing. The right question may be: &ldquo;Which practices promoted by religious traditions are beneficial, and can they be accessed without the religious framework?&rdquo; Mindfulness-based therapy suggests the answer is yes.</p></div>`,

  // 07
  `<p>The religion-mental-health literature has significant methodological problems that temper its conclusions:</p>
  <ul class="s-list">
    <li><strong>Publication bias:</strong> Studies finding positive religion-health associations are more likely to be published. Meta-analyses that account for this find smaller effect sizes.</li>
    <li><strong>Confounding variables:</strong> Religious people differ from non-religious people in many ways (social network size, health behaviors, socioeconomic status). Isolating the independent effect of religion is extremely difficult.</li>
    <li><strong>Self-selection:</strong> Healthier, more socially connected people may be more likely to attend religious services. The direction of causation is often ambiguous.</li>
    <li><strong>Measurement inconsistency:</strong> &ldquo;Religiosity&rdquo; is measured differently across studies &mdash; attendance, belief, prayer frequency, self-identification. These measure different things and produce different results.</li>
    <li><strong>WEIRD samples:</strong> Most research is conducted in Western, predominantly Christian contexts. The findings may not generalize to other religious traditions or cultural settings.</li>
    <li><strong>Positive framing bias:</strong> Much of the research has been conducted by researchers sympathetic to religion, sometimes funded by religious institutions. This does not invalidate the findings but introduces systematic perspective bias.</li>
  </ul>`,

  // 08
  `<p>The clinical implications of the religion-mental-health research are nuanced. The evidence does not support either &ldquo;religion is medicine&rdquo; or &ldquo;religion is poison&rdquo; &mdash; it supports &ldquo;religion is a powerful psychological force that can be deployed in helpful or harmful directions.&rdquo;</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Clinical Recommendations</h4>
      <ul>
        <li>Assess religious coping style, not just religious affiliation</li>
        <li>Incorporate patients&rsquo; spiritual resources into treatment when positive</li>
        <li>Refer to clergy who are trained in recognizing mental health issues</li>
        <li>Recommend contemplative practices regardless of belief framework</li>
      </ul>
    </div>
    <div class="v-col con">

      <ul>
        <li>Do not assume religion is beneficial for a given patient</li>
        <li>Screen for scrupulosity in OCD patients with religious involvement</li>
        <li>Recognize religious trauma as a legitimate clinical presentation</li>
        <li>Be prepared for grief responses in deconversion that mimic bereavement</li>
      </ul>
    </div>
  </div>
  <div class="callout"><h4>Newberg&rsquo;s 2025 Clinical Framework</h4><p>Andrew Newberg&rsquo;s 2025 publication<sup class="fn"><a href="https://link.springer.com/article/10.1007/s11920-024-01584-3">[9]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s11920-024-01584-3" target="_blank">Newberg: Neurotheology &mdash; Practical Applications for Integrative Psychiatry (2025) &rarr;</a></span></sup> on neurotheology and integrative psychiatry argues for a clinical approach that takes patients&rsquo; spiritual lives seriously &mdash; not as pathology to be treated or belief to be endorsed, but as a dimension of human experience with neurological correlates and psychological consequences that clinicians ignore at their patients&rsquo; expense.</p></div>`
];
