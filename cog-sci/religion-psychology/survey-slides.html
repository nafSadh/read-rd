<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Religion Through Cognitive Science &amp; Psychology — Slides</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#9b7aed;--accent-soft:#2e6ab408;
  --green:#2e6e3e;--red:#8b2020;--teal:#0ea5e9;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;
  --green:#4ee8a8;--red:#e87090;--teal:#4ee8d0;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;transition:background .4s,color .3s}

.deck{height:100vh;width:100vw;position:relative;overflow:hidden}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 80px;opacity:0;pointer-events:none;transition:opacity .4s ease,transform .4s ease;transform:translateX(40px)}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.slide.prev{opacity:0;transform:translateX(-40px)}

/* Slide typography */
.slide .badge{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.slide .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.slide h1{font-family:var(--sans);font-size:48px;font-weight:500;color:var(--bright);letter-spacing:.5px;line-height:1.15;text-align:center;max-width:800px}
.slide h1 em{font-style:italic;font-family:var(--serif);color:var(--accent);font-weight:400}
.slide h2{font-family:var(--sans);font-size:32px;font-weight:500;color:var(--bright);letter-spacing:.3px;line-height:1.3;text-align:center;max-width:750px;margin-bottom:24px}
.slide h2 em{font-style:italic;font-family:var(--serif);color:var(--accent);font-weight:400}
.slide p{font-family:var(--serif);font-size:22px;line-height:1.8;text-align:center;max-width:650px;letter-spacing:.2px;margin-bottom:16px}
.slide p em{color:var(--bright)}
.slide .small{font-size:16px;color:var(--dim);line-height:1.7}
.slide .mono{font-family:var(--mono);font-size:14px;color:var(--dim);letter-spacing:.5px}

.slide .quote{font-family:var(--serif);font-size:26px;font-style:italic;color:var(--bright);line-height:1.7;max-width:650px;border-left:3px solid var(--accent);padding-left:24px;text-align:left}
.slide .quote-attr{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:1px;margin-top:12px;text-transform:uppercase}

.slide .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:750px;width:100%;margin-top:16px}
.slide .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;max-width:800px;width:100%;margin-top:16px}
.slide .card{padding:24px;border:1px solid var(--border);text-align:left}
.slide .card h3{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.slide .card p{font-size:16px;text-align:left;line-height:1.7;margin:0}

.slide .stat-row{display:flex;gap:0;border:1px solid var(--border);max-width:650px;width:100%;margin:16px 0}
.slide .stat{flex:1;padding:16px 10px;text-align:center;border-right:1px solid var(--border)}
.slide .stat:last-child{border-right:none}
.slide .stat .val{font-family:var(--mono);font-size:22px;color:var(--bright);font-weight:500;display:block}
.slide .stat .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans);margin-top:4px;display:block}

.slide .tension{border-left:3px solid var(--accent2);padding:12px 20px;max-width:650px;width:100%;margin-bottom:12px;text-align:left;background:var(--accent-soft)}
.slide .tension strong{color:var(--bright)}
.slide .tension p{text-align:left;font-size:17px;margin:0;line-height:1.7}

.slide .diagram-wrap{margin:16px 0;padding:16px;background:var(--bg3);border:1px solid var(--border);max-width:520px;width:100%}
.slide .diagram-wrap svg{width:100%;height:auto}
.slide .diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}

/* Progress bar */
.progress{position:fixed;bottom:0;left:0;height:3px;background:var(--accent);transition:width .3s ease;z-index:100}

/* Controls */
.controls{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2)}
.ctrl-btn{width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);transition:all .2s;font-family:var(--sans)}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}

.slide-counter{position:fixed;bottom:24px;left:24px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px;z-index:100}

@media(max-width:800px){
  .slide{padding:40px 24px}
  .slide h1{font-size:32px}
  .slide h2{font-size:24px}
  .slide p{font-size:18px}
  .slide .quote{font-size:20px}
  .slide .grid-2,.slide .grid-3{grid-template-columns:1fr;gap:16px}
  .slide .stat-row{flex-wrap:wrap}
  .slide .stat{min-width:45%}
}
</style></head>
<body data-theme="light">

<div class="deck" id="deck"></div>
<div class="progress" id="progress"></div>
<div class="slide-counter" id="counter"></div>
<div class="controls">
  <button class="ctrl-btn" onclick="prev()">&larr;</button>
  <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn"></button>
  <button class="ctrl-btn" onclick="next()">&rarr;</button>
</div>

<script>
const slides = [
  // 0 — Title
  `<div class="badge"><span class="dot"></span> COGNITIVE SCIENCE &middot; PSYCHOLOGY &middot; SURVEY</div>
   <h1>Religion Through the Lens of <em>Cognitive Science &amp; Psychology</em></h1>
   <p class="mono" style="margin-top:24px">52 SOURCES &middot; 6 DIMENSIONS &middot; 6 TENSIONS</p>
   <p class="small" style="margin-top:12px">Why humans believe, how belief forms, and what it does to us</p>`,

  // 1 — Central thesis
  `<div class="badge"><span class="dot"></span> THESIS</div>
   <h2>Religion Is Cognitively <em>Natural</em></h2>
   <p>The human mind &mdash; through agency detection, Theory of Mind, teleological reasoning, and dualism intuition &mdash; naturally produces religious ideas without explicit instruction.</p>
   <p class="small">But <em>cognitively natural</em> does not mean <em>true</em>. And it does not mean <em>false</em>.</p>
   <div class="stat-row">
     <div class="stat"><span class="val">52</span><span class="lbl">Sources</span></div>
     <div class="stat"><span class="val">6</span><span class="lbl">Dimensions</span></div>
     <div class="stat"><span class="val">2024&ndash;25</span><span class="lbl">Latest Research</span></div>
   </div>`,

  // 2 — S1: CSR Standard Model
  `<div class="badge"><span class="dot"></span> S1 &middot; COGNITIVE SCIENCE OF RELIGION</div>
   <h2>The Standard <em>Model</em></h2>
   <div class="grid-2">
     <div class="card"><h3>HADD (Barrett)</h3><p>Hyperactive Agency Detection Device. Over-detect agents from minimal cues. False positive &lt; false negative. Applied to invisible agents &rarr; gods.</p></div>
     <div class="card"><h3>MCI (Boyer)</h3><p>Minimally counterintuitive concepts. Violate one ontological expectation while preserving others. Memorable + transmittable &rarr; religious memes.</p></div>
     <div class="card"><h3>Theory of Mind</h3><p>Transforms detected agents into supernatural persons with beliefs, desires, intentions. Makes gods into moral agents.</p></div>
     <div class="card"><h3>Teleology (Kelemen)</h3><p>Children are &ldquo;promiscuous teleologists.&rdquo; Purpose-based reasoning as cognitive default. Design stance &rarr; creationism natural, evolution unnatural.</p></div>
   </div>`,

  // 3 — S1: HADD Crisis
  `<div class="badge"><span class="dot"></span> S1 &middot; THE HADD PROBLEM</div>
   <h2>HADD Has <em>No Evidence</em></h2>
   <p>The field&rsquo;s most popular mechanism has <em>no compelling empirical support</em> after ~30 years of research (Lisdorf). Multiple null findings.</p>
   <div class="grid-2">
     <div class="card"><h3>2025 Alternative</h3><p>Supernatural agents arise from <em>effortful</em> mental state reasoning, not automatic detection. Inverts HADD&rsquo;s core claim.</p></div>
     <div class="card"><h3>Enactivist Critique</h3><p>LeRon Shults et al. (2024): CSR&rsquo;s entire cognitivist framework is contested. Embodied approach to religious cognition.</p></div>
   </div>
   <p class="small" style="margin-top:16px">The broader claim that religion is cognitively natural survives through alternative pathways.</p>`,

  // 4 — S2: Willard-Norenzayan
  `<div class="badge"><span class="dot"></span> S2 &middot; PSYCHOLOGY OF BELIEF</div>
   <h2>The Bias &rarr; Belief <em>Path Model</em></h2>
   <p>Four cognitive biases independently predict religious belief (Willard &amp; Norenzayan 2013, replicated cross-culturally):</p>
   <div class="stat-row">
     <div class="stat"><span class="val">Mentalizing</span><span class="lbl">via dualism</span></div>
     <div class="stat"><span class="val">Dualism</span><span class="lbl">mind-body split</span></div>
     <div class="stat"><span class="val">Teleology</span><span class="lbl">purpose bias</span></div>
     <div class="stat"><span class="val">Anthropo.</span><span class="lbl">projection</span></div>
   </div>
   <p class="small" style="margin-top:16px">CRT inverse correlation: atheists score 18.7% higher on analytic thinking (50K+ participants, 16 countries).<br>But the effect varies dramatically across cultures &mdash; in some, it disappears entirely.</p>`,

  // 5 — S3: Mental Health
  `<div class="badge"><span class="dot"></span> S3 &middot; RELIGION &amp; MENTAL HEALTH</div>
   <h2>The Pargament <em>Framework</em></h2>
   <div class="quote">The question is not whether religion helps or hurts. The question is <em>which kind of religious coping</em>.<div class="quote-attr">Pargament, 1997</div></div>
   <div class="grid-2" style="margin-top:24px">
     <div class="card"><h3>Positive Coping</h3><p>Benevolent reappraisal, collaborative coping, sacred meaning-making, community support. Predicts resilience.</p></div>
     <div class="card"><h3>Negative Coping</h3><p>Punishing God reappraisal, sacred loss, divine abandonment. Predicts distress, existential crisis.</p></div>
   </div>
   <p class="small" style="margin-top:16px">Effect sizes: small to moderate (r &asymp; .15 self-report). Publication bias concern.</p>`,

  // 6 — S3: Dark Side
  `<div class="badge"><span class="dot"></span> S3 &middot; THE DARK SIDE</div>
   <h2>Scrupulosity &amp; Religious <em>Trauma</em></h2>
   <div class="stat-row">
     <div class="stat"><span class="val">~33%</span><span class="lbl">OCD patients w/ scrupulosity</span></div>
     <div class="stat"><span class="val">5%</span><span class="lbl">Primary scrupulosity</span></div>
     <div class="stat"><span class="val">Cross-cultural</span><span class="lbl">Kashmir 2025 confirms</span></div>
   </div>
   <div class="grid-2" style="margin-top:16px">
     <div class="card"><h3>Scrupulosity</h3><p>Religious OCD. Intrusive blasphemous thoughts, excessive ritual as compulsion. One of the most difficult OCD subtypes. CBT+ERP treatment.</p></div>
     <div class="card"><h3>Religious Trauma</h3><p>Authoritarian religion &rarr; anxiety, depression, sexual dysfunction. Mechanisms: indoctrination, coercive control, spiritual abuse, shunning.</p></div>
   </div>`,

  // 7 — S3: Meditation Exception
  `<div class="badge"><span class="dot"></span> S3 &middot; THE EXCEPTION</div>
   <h2>The Meditation <em>Exception</em></h2>
   <p>The most consistent positive findings come from contemplative practices. Secular meditators and contemplative monks show <em>identical</em> default mode network signatures.</p>
   <p>Benefits are <em>practice-dependent</em>, not belief-dependent.</p>
   <p class="small">&ldquo;Religion helps&rdquo; may really mean &ldquo;contemplative practice helps.&rdquo;</p>`,

  // 8 — S4: The Meta-Analysis
  `<div class="badge"><span class="dot"></span> S4 &middot; MORAL PSYCHOLOGY</div>
   <h2>Does Religion Make People <em>Moral?</em></h2>
   <p>Kelly &amp; Kramer (2024) &mdash; the largest meta-analysis ever conducted:</p>
   <div class="stat-row">
     <div class="stat"><span class="val">701</span><span class="lbl">Effects</span></div>
     <div class="stat"><span class="val">811,663</span><span class="lbl">Participants</span></div>
     <div class="stat"><span class="val">r = .13</span><span class="lbl">Overall</span></div>
     <div class="stat"><span class="val">r = .06</span><span class="lbl">Behavioral</span></div>
   </div>
   <p style="margin-top:16px">Religious people <em>believe</em> they are more moral (r = .15 self-report) but barely <em>behave</em> more morally (r = .06). Less than 2% of variance explained.</p>`,

  // 9 — S4: Parochial
  `<div class="badge"><span class="dot"></span> S4 &middot; PAROCHIAL PROSOCIALITY</div>
   <h2>Religion Binds and <em>Blinds</em></h2>
   <div class="grid-2">
     <div class="card"><h3>Haidt&rsquo;s Framework</h3><p>Secular liberals weight Care + Fairness. Religious conservatives weight all five foundations: Care, Fairness, Loyalty, Authority, Sanctity. Religion makes people moral in a <em>group-binding</em> sense.</p></div>
     <div class="card"><h3>Priming Collapse</h3><p>2025 Bayesian analysis: NO significant priming effect. Supports absence of effect. Publication bias inflated earlier estimates. Religious generosity flows within networks, not outward.</p></div>
   </div>
   <p class="small" style="margin-top:16px">Most secular societies (Scandinavia, Japan) are among the world&rsquo;s most peaceful and cooperative.</p>`,

  // 10 — S5: Born Believers
  `<div class="badge"><span class="dot"></span> S5 &middot; DEVELOPMENTAL PSYCHOLOGY</div>
   <h2>Born <em>Believers</em></h2>
   <p>The developmental trajectory:</p>
   <div class="stat-row">
     <div class="stat"><span class="val">0&ndash;2</span><span class="lbl">Agency detection</span></div>
     <div class="stat"><span class="val">2&ndash;4</span><span class="lbl">Theory of Mind</span></div>
     <div class="stat"><span class="val">3&ndash;5</span><span class="lbl">Teleology peaks</span></div>
     <div class="stat"><span class="val">5&ndash;7</span><span class="lbl">God concepts</span></div>
   </div>
   <p style="margin-top:16px">Cognitive infrastructure for religion is in place <em>before</em> any formal religious teaching.</p>
   <p class="small">Children attribute supernatural psychological properties (omniscience) before physical properties (invisibility), cross-culturally.</p>`,

  // 11 — S5: Deconversion
  `<div class="badge"><span class="dot"></span> S5 &middot; DECONVERSION</div>
   <h2>The Gen Z <em>Exodus</em></h2>
   <div class="stat-row">
     <div class="stat"><span class="val">74%</span><span class="lbl">Left before 17</span></div>
     <div class="stat"><span class="val">34%</span><span class="lbl">Gen Z unaffiliated</span></div>
     <div class="stat"><span class="val">26%</span><span class="lbl">Left before teens</span></div>
   </div>
   <div class="grid-2" style="margin-top:16px">
     <div class="card"><h3>Process</h3><p>Pre-exit strain &rarr; turning point &rarr; anomie &rarr; reconstruction. Grief response mimics bereavement.</p></div>
     <div class="card"><h3>Bleidorn (2024)</h3><p>Personality changes <em>precede</em> deconversion. Openness &uarr; before the break. Stability &darr; after, then recovers.</p></div>
   </div>
   <p class="small" style="margin-top:12px">&ldquo;No religion&rdquo; &ne; &ldquo;no spirituality&rdquo; &mdash; the impulse may be detaching from institutions, not disappearing.</p>`,

  // 12 — S6: Neuroscience
  `<div class="badge"><span class="dot"></span> S6 &middot; NEUROSCIENCE</div>
   <h2>The Distributed <em>Network</em></h2>
   <p>No &ldquo;God spot.&rdquo; Religious experience involves multiple networks:</p>
   <div class="grid-2">
     <div class="card"><h3>Prayer / Devotion</h3><p>Prefrontal cortex &uarr; (focused intention). Theory of Mind network (attributing intentions to God). Narrative processing in temporal lobes.</p></div>
     <div class="card"><h3>Mystical States</h3><p>Parietal lobe &darr; (self-other boundary dissolves). DMN disruption. Claustrum suppression &rarr; ego dissolution.</p></div>
   </div>
   <p class="small" style="margin-top:16px">Newberg&rsquo;s neurotheology: the brain mediates spiritual experience &mdash; it does not explain it away.</p>`,

  // 13 — S6: Psilocybin
  `<div class="badge"><span class="dot"></span> S6 &middot; PSILOCYBIN</div>
   <h2>The Hopkins <em>Program</em></h2>
   <div class="stat-row">
     <div class="stat"><span class="val">67%</span><span class="lbl">Rated top-5 life experience</span></div>
     <div class="stat"><span class="val">14 mo</span><span class="lbl">Persistence</span></div>
     <div class="stat"><span class="val">$55M</span><span class="lbl">Research center</span></div>
   </div>
   <p style="margin-top:16px">Psilocybin reliably produces mystical experiences (Griffiths 2006). Combined with meditation, it generates lasting prosocial changes and increased Openness (2018).</p>
   <p class="small">Beyond mystical experience: emotional breakthrough, insight, connectedness (Yaden 2024). Cancer patients show substantial, lasting decreases in depression and anxiety.</p>`,

  // 14 — S6: Practice over belief
  `<div class="badge"><span class="dot"></span> S6 &middot; DMN &amp; MEDITATION</div>
   <h2>Practice Over <em>Belief</em></h2>
   <div class="quote">Secular and religious meditators show the same neural signatures. Benefits are practice-dependent, not belief-dependent.<div class="quote-attr">Brewer et al. 2011, PNAS</div></div>
   <p class="small" style="margin-top:24px">Experienced meditators: reduced DMN activity across all types. Increased DMN&ndash;executive control connectivity. Long-term practitioners show differences even at rest &mdash; a state-to-trait transition.</p>
   <p class="small">God Helmet (Persinger): failed double-blind replication. Effect attributable to suggestion, not magnetic fields.</p>`,

  // 15 — Tensions
  `<div class="badge"><span class="dot"></span> SIX TENSIONS</div>
   <h2>Where the Evidence <em>Disagrees</em></h2>
   <div class="tension"><p><strong>T1:</strong> HADD has no evidence after ~30 years &mdash; yet religion is cognitively natural through other pathways.</p></div>
   <div class="tension"><p><strong>T2:</strong> Religion helps (positive coping) AND hurts (scrupulosity, trauma). The variable is coping style, not religiosity.</p></div>
   <div class="tension"><p><strong>T3:</strong> r = .13 overall, r = .06 behavioral. Religious people believe they&rsquo;re moral but barely behave more morally.</p></div>
   <div class="tension"><p><strong>T4:</strong> If religion is cognitively natural, why is Gen Z the least religious generation? Born believers vs. institutional exodus.</p></div>
   <div class="tension"><p><strong>T5:</strong> Neural correlates tell us nothing about meaning. The hard problem remains. Neuroscience can map but not adjudicate.</p></div>
   <div class="tension"><p><strong>T6:</strong> Byproduct or adaptation? Maybe both: cognitive accident origins, cultural adaptive elaboration.</p></div>`,

  // 16 — Conclusion
  `<div class="badge"><span class="dot"></span> SYNTHESIS</div>
   <h2>What the Evidence <em>Actually Shows</em></h2>
   <p>Not a single verdict on religion &mdash; helpful or harmful, true or false &mdash; but an account of a cognitive system whose outputs depend on <em>coping style</em>, <em>cultural context</em>, <em>developmental stage</em>, and <em>individual variation</em>.</p>
   <p class="small" style="margin-top:16px">We know less than textbooks suggest but more than skeptics admit.</p>`,

  // 17 — Colophon
  `<div class="badge"><span class="dot"></span> COLOPHON</div>
   <h1>Religion &amp; the <em>Mind</em></h1>
   <p class="mono" style="margin-top:16px">52 SOURCES &middot; 6 DIMENSIONS &middot; 6 TENSIONS</p>
   <p class="small" style="margin-top:24px">Part of <em>read:rd</em> · <a href="https://read.sadh.app" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--dim)">read.sadh.app</a> Part of <em>read:rd</em> &mdash; Religion Through the Lens of Cognitive Science &amp; Psychologymdash; Religion Through the Lens of Cognitive Science &amp; Psychology<br><a href="survey-paper.html" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--dim)">Survey Paper</a> &middot; <a href="index.html" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--dim)">Project Index</a></p>`
];

// Build slides
const deck = document.getElementById('deck');
slides.forEach((html, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.innerHTML = html;
  deck.appendChild(div);
});

let current = 0;
const total = slides.length;
const allSlides = document.querySelectorAll('.slide');

function go(idx) {
  if (idx < 0 || idx >= total) return;
  const oldCurrent = current;
  allSlides[current].classList.remove('active');
  allSlides[current].classList.add(idx > current ? 'prev' : '');
  current = idx;
  allSlides[current].classList.remove('prev');
  allSlides[current].classList.add('active');
  setTimeout(() => allSlides[oldCurrent].classList.remove('prev'), 400);
  document.getElementById('progress').style.width = ((current / (total - 1)) * 100) + '%';
  document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
}

function next() { go(current + 1); }
function prev() { go(current - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(total - 1); }
});

// Touch support
let touchStartX = 0;
deck.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
deck.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
});

function toggleTheme() {
  const b = document.body;
  const c = b.getAttribute('data-theme');
  const n = c === 'light' ? 'dark' : 'light';
  b.setAttribute('data-theme', n);
  localStorage.setItem('rp-slides-theme', n);
  document.getElementById('theme-btn').textContent = n === 'dark' ? '\u2600' : '\u263D';
}
