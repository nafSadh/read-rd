<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Meta-Analysis', title: 'The <em>2024</em> Meta-Analysis' },
  { num: '02', short: 'Self-Report Gap', title: 'The <em>Self-Report</em> Gap' },
  { num: '03', short: 'Moral Foundations', title: '<em>Haidt</em>&rsquo;s Moral Foundations' },
  { num: '04', short: 'Religious Priming', title: '<em>Religious</em> Priming Effects' },
  { num: '05', short: 'Parochial', title: '<em>Parochial</em> Prosociality' },
  { num: '06', short: 'Supernatural Watch', title: '<em>Supernatural</em> Monitoring' },
  { num: '07', short: 'Secular Morality', title: '<em>Secular</em> Moral Reasoning' },
  { num: '08', short: 'Verdict', title: 'Does Religion <em>Make</em> People Moral?' }
];

const summaries = [
  // 01
  `<p>Kelly and Kramer&rsquo;s 2024 meta-analysis<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/38407059/">[1]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/38407059/" target="_blank">Kelly &amp; Kramer: Religiosity Predicts Prosociality &mdash; Meta-Analysis (2024) &rarr;</a></span></sup> is the most comprehensive ever conducted on religion and prosociality: 701 effect sizes from 237 samples encompassing 811,663 participants across nearly 60 years of research. The headline finding: religiosity predicts prosociality at r = .13 overall. But the devil is in the moderators.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">701</div><div class="sl">Effect sizes</div></div>
    <div class="st"><div class="sv">237</div><div class="sl">Samples</div></div>
    <div class="st"><div class="sv">811K</div><div class="sl">Participants</div></div>
    <div class="st"><div class="sv">~60yr</div><div class="sl">Research span</div></div>
  </div>
  <p>The overall correlation of r = .13 is statistically significant but practically small. It means religiosity accounts for less than 2% of the variance in prosocial behavior. By comparison, the correlation between height and weight is about r = .70. The religion-prosociality link exists, but it is far weaker than most people assume.</p>
  <div class="callout"><h4>The Headline vs. The Data</h4><p>When this meta-analysis is reported in media, the headline is usually something like &ldquo;Religion makes people more generous.&rdquo; The actual finding is closer to: &ldquo;Being religious is very slightly correlated with saying you are generous, and barely correlated with actually being generous.&rdquo; The gap between the headline and the data is the story.</p></div>`,

  // 02
  `<p>The most important finding in the meta-analysis is the measurement moderation: religiosity correlated r = .15 with self-reported prosociality but only r = .06 with behaviorally measured prosociality. This gap &mdash; between what religious people say they do and what they actually do &mdash; is the central puzzle of the field.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">THE SELF-REPORT GAP</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5"/>
    <text x="50" y="55" font-size="9" class="lbl">Self-report (r = .15)</text>
    <rect x="50" y="60" width="250" height="20" rx="2" fill="var(--accent)" opacity="0.2" stroke="var(--accent)" stroke-width="0.8"/>
    <text x="50" y="100" font-size="9" class="lbl">Behavioral (r = .06)</text>
    <rect x="50" y="105" width="100" height="20" rx="2" fill="var(--cyan)" opacity="0.2" stroke="var(--cyan)" stroke-width="0.8"/>
    <text x="400" y="75" text-anchor="middle" font-size="8" class="lbl">2.5x larger effect</text>
    <text x="400" y="88" text-anchor="middle" font-size="8" class="lbl">for self-reports</text>
  </svg></div>
  <p>Three competing interpretations exist: (a) lab-based behavioral measures fail to capture real-world religious prosociality like volunteering and charitable giving; (b) religious self-enhancement inflates self-reported virtue; or (c) both religiosity and self-reported prosociality share a common cause in favorable self-presentation tendency. The data cannot definitively distinguish among these interpretations.</p>`,

  // 03
  `<p>Jonathan Haidt&rsquo;s<sup class="fn"><a href="https://www.edge.org/conversation/jonathan_haidt-moral-psychology-and-the-misunderstanding-of-religion">[2]</a><span class="tip"><a href="https://www.edge.org/conversation/jonathan_haidt-moral-psychology-and-the-misunderstanding-of-religion" target="_blank">Haidt: Moral Psychology and the Misunderstanding of Religion (2007) &rarr;</a></span></sup> moral foundations theory proposes that human morality rests on (at least) five innate foundations: Care/Harm, Fairness/Cheating, Loyalty/Betrayal, Authority/Subversion, and Sanctity/Degradation. His key insight for the religion debate: secular liberals primarily weight Care and Fairness, while religious conservatives weight all five foundations more equally.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Care / Harm</h4><p>Sensitivity to suffering. Compassion, protection. Weighted heavily by both religious and secular moral systems.</p></div>
    <div class="feat"><h4>Fairness / Cheating</h4><p>Justice, rights, equality. Weighted heavily by secular liberals; also present in religious morality but framed differently (divine justice).</p></div>
    <div class="feat"><h4>Loyalty / Betrayal</h4><p>Group cohesion, patriotism, sacrifice for the collective. Heavily weighted in religious morality. Religion binds groups.</p></div>
    <div class="feat"><h4>Authority / Subversion</h4><p>Respect for hierarchy, tradition, social order. Religious institutions are fundamentally hierarchical; obedience is a core virtue.</p></div>
    <div class="feat"><h4>Sanctity / Degradation</h4><p>Purity, sacredness, disgust sensitivity. The most distinctively religious foundation. Body as temple, sacred spaces, ritual purity.</p></div>
    <div class="feat"><h4>Liberty / Oppression</h4><p>Added later. Resistance to domination. Both libertarians and religious dissenters activate this foundation, but in opposite directions.</p></div>
  </div>
  <div class="callout"><h4>Religion Binds and Blinds</h4><p>Haidt argues that religion is not primarily about belief in the supernatural &mdash; it is about binding groups together through shared moral foundations, particularly loyalty, authority, and purity. Religion makes groups cohesive and cooperative internally, but at the cost of reduced openness to outsiders. It binds and blinds simultaneously.</p></div>`,

  // 04
  `<p>Religious priming studies test whether merely activating religious concepts (reading words like &ldquo;God,&rdquo; &ldquo;sacred,&rdquo; &ldquo;spirit&rdquo;) increases prosocial behavior. The early results were impressive: a meta-analysis of 93 studies and 11,653 participants found robust priming effects.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/25673322/">[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/25673322/" target="_blank">Shariff et al.: Religious Priming Meta-Analysis (2016) &rarr;</a></span></sup> But the field has encountered serious replication problems.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">93</div><div class="sl">Studies in meta-analysis</div></div>
    <div class="st"><div class="sv">Robust</div><div class="sl">Original finding</div></div>
    <div class="st"><div class="sv">2025</div><div class="sl">Bayesian null result</div></div>
  </div>
  <p>A critical moderator: religious priming only works on religious participants. Non-religious people are unaffected. This suggests the mechanism is not supernatural monitoring per se, but the activation of culturally transmitted religious norms and identity. If you have internalized the norm &ldquo;God wants me to be generous,&rdquo; being reminded of God activates that norm. If you haven&rsquo;t, the prime is inert.</p>
  <p>A 2025 study<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/00846724241309923">[4]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/00846724241309923" target="_blank">Chhabra et al.: Prime and Punishment &mdash; Religious Priming (2025) &rarr;</a></span></sup> using Bayesian analysis found no significant prosocial effect of religious priming at all, with the Bayesian analysis specifically supporting the absence of an effect (not merely failing to detect one). This raises concerns about publication bias in the earlier literature: the &ldquo;file drawer problem&rdquo; where null results go unpublished.</p>
  <div class="security-box"><h4>The Replication Problem</h4><p>Religious priming may be joining a long list of social psychology findings that looked robust in meta-analyses of published studies but weaken or disappear when pre-registered replications are conducted. The original effects were likely inflated by publication bias, small samples, and researcher degrees of freedom. The field is in the process of recalibrating.</p></div>`,

  // 05
  `<p>Even when religious prosociality is real, it is consistently parochial: it favors coreligionists over outsiders. Religious generosity flows primarily within the religious in-group. This is the central finding that complicates the &ldquo;religion makes people moral&rdquo; narrative.</p>
  <ul class="s-list">
    <li><strong>Ingroup favoritism:</strong> God priming enhances cooperation with fellow believers but has weaker or no effect on cooperation with outsiders.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5114877/">[5]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5114877/" target="_blank">Religious Priming &mdash; Ingroup vs. Outgroup Prosocial Behavior (PMC 2016) &rarr;</a></span></sup></li>
    <li><strong>Self-report mismatch:</strong> Religious people report being universally generous, but behavioral measures show parochial patterns.<sup class="fn"><a href="https://labs.psychology.illinois.edu/pramlab/Papers/Religious_Prosociality_Chapter.pdf">[7]</a><span class="tip"><a href="https://labs.psychology.illinois.edu/pramlab/Papers/Religious_Prosociality_Chapter.pdf" target="_blank">Illinois PramLab: Religious Prosociality Chapter (2015) &rarr;</a></span></sup> The subjective experience of universal generosity may mask behavioral particularism.</li>
    <li><strong>Denominational boundaries:</strong> Religious charity often flows within denominational networks: Mormons give to Mormon causes, Catholics to Catholic charities, evangelicals to evangelical missions.</li>
    <li><strong>The reputation channel:</strong> Prosocial behavior in religious communities may be driven less by internalized virtue and more by reputation management within a monitoring community.</li>
    <li><strong>Historical pattern:</strong> Religion has historically motivated extraordinary acts of both charity and exclusion &mdash; the same community that feeds the poor may also ostracize the heretic. Both behaviors are consistent with parochial prosociality.</li>
  </ul>
  <div class="callout"><h4>The Sunday Effect Revisited</h4><p>The &ldquo;Sunday effect&rdquo; &mdash; the observation that religious people behave more prosocially on days associated with religious practice &mdash; may reflect social monitoring rather than genuine moral transformation. People behave better when they believe they are being watched, whether by God or by their congregation. Remove the audience and the effect diminishes.</p></div>`,

  // 06
  `<p>The supernatural monitoring hypothesis (Norenzayan &amp; Shariff)<sup class="fn"><a href="https://www.sciencedirect.com/science/article/abs/pii/S2352250X20301780">[6]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/abs/pii/S2352250X20301780" target="_blank">Norenzayan &amp; Shariff: Prosociality and Religion (2021) &rarr;</a></span></sup> proposes that belief in an omniscient, morally concerned God promotes honesty and cooperation by creating the sense of constant surveillance. If God is always watching, cheating becomes risky even when no human observers are present.</p>
  <div class="feat-grid">
    <div class="feat"><h4>The Mechanism</h4><p>Belief in supernatural monitoring activates the same cognitive systems that respond to human observation: self-consciousness, reputation concern, and social evaluation anxiety. God functions as an invisible audience.</p></div>
    <div class="feat"><h4>The Big Gods Thesis</h4><p>Norenzayan argues in &ldquo;Big Gods&rdquo; (2013) that the cultural evolution of moralizing high gods enabled the scaling of human cooperation beyond small kin groups. Big gods watching big societies solved the free-rider problem.</p></div>
    <div class="feat"><h4>Empirical Support</h4><p>Experimental evidence shows that religious reminders reduce cheating in economic games, at least among believers. The &ldquo;eyes effect&rdquo; (images of watching eyes reduce dishonesty) operates through similar mechanisms.</p></div>
    <div class="feat"><h4>The Secular Substitute</h4><p>Modern secular institutions (police, contracts, surveillance cameras) may have replaced supernatural monitoring. This could partly explain why secularizing societies do not collapse morally: institutional monitoring substitutes for divine monitoring.</p></div>
  </div>`,

  // 07
  `<p>If religion makes people moral, are secular people immoral? The evidence says no. Secular moral reasoning is different from religious moral reasoning &mdash; it weights different moral foundations and draws on different justifications &mdash; but it is not absent or deficient.</p>
  <ul class="s-list">
    <li><strong>Comparable prosociality:</strong> When behavioral measures (rather than self-reports) are used, the difference between religious and secular people&rsquo;s prosocial behavior is minimal (r = .06).</li>
    <li><strong>Secular moral foundations:</strong> Secular people weight Care and Fairness most heavily. They may be less loyal to in-groups but more universalist in their moral concern.</li>
    <li><strong>Secular societies:</strong> The most secular societies (Scandinavia, Japan, Czech Republic) are among the most peaceful, egalitarian, and cooperative. Secularization does not produce moral collapse.</li>
    <li><strong>Philosophical ethics:</strong> Secular moral philosophy (utilitarianism, deontology, virtue ethics, care ethics) provides robust frameworks for moral reasoning without supernatural foundations.</li>
    <li><strong>The autonomy advantage:</strong> Secular moral reasoning may be more flexible and responsive to new moral challenges (animal rights, environmental ethics, digital ethics) because it is not constrained by fixed scriptural interpretations.</li>
  </ul>`,

  // 08
  `<p>Does religion make people moral? The honest, evidence-based answer:</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>What Religion Does</h4>
      <ul>
        <li>Binds communities through shared moral identity and cooperative norms</li>
        <li>Provides a powerful framework for meaning-making that motivates sacrifice and service</li>
        <li>Creates supernatural monitoring that reduces in-group cheating</li>
        <li>Motivates charitable giving and volunteering within religious networks</li>
        <li>Teaches moral narratives that shape character development in children</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>What Religion Does Not Do</h4>
      <ul>
        <li>Make people measurably more prosocial in behavioral (vs. self-report) terms</li>
        <li>Produce universal rather than parochial moral concern</li>
        <li>Prevent or reduce intergroup hostility (may exacerbate it)</li>
        <li>Create a monopoly on moral motivation &mdash; secular people are comparably moral</li>
        <li>Guarantee moral behavior &mdash; religious people can and do act immorally</li>
      </ul>
    </div>
  </div>
  <div class="callout"><h4>The Binding Paradox</h4><p>Religion&rsquo;s greatest moral strength and its greatest moral limitation are the same thing: it binds. It creates intense moral communities with powerful cooperative norms, shared sacrifice, and collective identity. But binding has a shadow: it creates boundaries. The charity stops at the group border. The empathy runs out at the doctrinal line. Religion makes people moral in a specific, bounded, tribal sense &mdash; not in the universal sense that either its advocates or its critics typically claim.</p></div>`
];
