<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Religion Through the Lens of Cognitive Science &amp; Psychology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}

.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

a{color:var(--dim);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--dim),transparent 50%);transition:color .2s,border-color .2s}
a:hover{color:var(--accent);border-bottom-color:var(--accent);border-bottom-style:solid}

sup{font-size:11px;line-height:0;vertical-align:super}sup.fn{position:relative;cursor:pointer;font-family:var(--sans)}sup.fn>a{color:var(--accent);font-weight:600;text-decoration:none;border-bottom:none}sup.fn:hover>a{color:var(--bright)}sup.fn .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:400;color:var(--text);white-space:normal;max-width:480px;min-width:200px;z-index:50;pointer-events:auto;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.15)}sup.fn .tip a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}sup.fn .tip a:hover{color:var(--bright);border-bottom-style:solid}sup.fn:hover .tip,sup.fn .tip:hover{display:block}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'CSR', title: '<em>Cognitive</em> Science of Religion' },
  { num: '02', short: 'Belief', title: 'The Psychology of <em>Belief</em>' },
  { num: '03', short: 'Mental Health', title: 'Religion &amp; <em>Mental</em> Health' },
  { num: '04', short: 'Morality', title: '<em>Moral</em> Psychology &amp; Religion' },
  { num: '05', short: 'Development', title: '<em>Developmental</em> Psychology of Religion' },
  { num: '06', short: 'Neuroscience', title: 'The <em>Neuroscience</em> of Religious Experience' }
];

const summaries = [
  // 01 — Cognitive Science of Religion
  `<p>Why are humans religious? The cognitive science of religion (CSR) argues that religious belief is a natural byproduct of ordinary cognitive mechanisms that evolved for non-religious purposes.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Cognitive_science_of_religion">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Cognitive_science_of_religion" target="_blank">Wikipedia: Cognitive Science of Religion &rarr;</a></span></sup> Agency detection, Theory of Mind, and a preference for minimally counterintuitive concepts make the human mind fertile ground for supernatural beliefs &mdash; even without explicit teaching.</p>

  <div class="s-stat">
    <div class="st"><div class="sv">HADD</div><div class="sl">Agency Detection</div></div>
    <div class="st"><div class="sv">ToM</div><div class="sl">Theory of Mind</div></div>
    <div class="st"><div class="sv">MCI</div><div class="sl">Counterintuitive Concepts</div></div>
    <div class="st"><div class="sv">~30yr</div><div class="sl">No empirical support for HADD</div></div>
  </div>

  <div class="diagram-wrap"><svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">CSR: WHY MINDS PRODUCE GODS</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5" class="edge"/>
    <rect x="20" y="45" width="130" height="55" class="node" rx="4"/>
    <text x="85" y="68" text-anchor="middle" class="node-text" font-size="11">Agency Detection</text>
    <text x="85" y="82" text-anchor="middle" class="node-sub">HADD (Barrett)</text>
    <rect x="185" y="45" width="130" height="55" class="node" rx="4"/>
    <text x="250" y="68" text-anchor="middle" class="node-text" font-size="11">Theory of Mind</text>
    <text x="250" y="82" text-anchor="middle" class="node-sub">Intentional agents</text>
    <rect x="350" y="45" width="130" height="55" class="node" rx="4"/>
    <text x="415" y="68" text-anchor="middle" class="node-text" font-size="11">MCI Concepts</text>
    <text x="415" y="82" text-anchor="middle" class="node-sub">Boyer&rsquo;s templates</text>
    <path d="M85 100 L85 130 Q85 140 95 140 L240 140 Q250 140 250 150 L250 165" class="edge-hi" fill="none"/>
    <path d="M250 100 L250 165" class="edge-hi" fill="none"/>
    <path d="M415 100 L415 130 Q415 140 405 140 L260 140 Q250 140 250 150 L250 165" class="edge-hi" fill="none"/>
    <rect x="185" y="155" width="130" height="35" class="node-hi" rx="4"/>
    <text x="250" y="177" text-anchor="middle" class="node-text" font-size="11">Religious Belief</text>
  </svg></div>

  <h4>Key Researchers</h4>
  <div class="s-chips">
    <span class="s-chip">Pascal Boyer</span>
    <span class="s-chip">Justin Barrett</span>
    <span class="s-chip">Scott Atran</span>
    <span class="s-chip">Deborah Kelemen</span>
    <span class="s-chip">Jesse Bering</span>
  </div>

  <div class="callout"><h4>The HADD Problem</h4><p>Barrett&rsquo;s Hyperactive Agency Detection Device has been the flagship theory of CSR for nearly three decades. But a 2025 review<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/2153599X.2025.2584792">[2]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/2153599X.2025.2584792" target="_blank">Belief as Explanation &mdash; Alternative to HADD (2025) &rarr;</a></span></sup> finds no compelling empirical evidence for a bias toward detecting agents &mdash; and substantial null findings. The alternative: supernatural agent beliefs may arise from effortful mental state reasoning, not automatic detection. The field&rsquo;s most popular theory may rest on an untested assumption.</p></div>`,

  // 02 — Psychology of Belief
  `<p>Why do people believe? Not because they are irrational, but because cognitive biases that serve us well in everyday life &mdash; pattern recognition, teleological reasoning, mind-body dualism, and anthropomorphism &mdash; naturally incline the human mind toward religious conclusions. The question is not why some people believe, but why anyone manages not to.</p>

  <div class="s-stat">
    <div class="st"><div class="sv">r = .13</div><div class="sl">Mentalizing &rarr; Belief</div></div>
    <div class="st"><div class="sv">18.7%</div><div class="sl">Atheist analytic advantage</div></div>
    <div class="st"><div class="sv">50K+</div><div class="sl">Participants (16 countries)</div></div>
  </div>

  <div class="feat-grid">
    <div class="feat"><h4>Pattern Recognition</h4><p>Humans detect patterns even in random noise. Seeing faces in clouds, finding meaning in coincidence &mdash; the same machinery that kept our ancestors alive also generates beliefs in divine signs and omens.</p></div>
    <div class="feat"><h4>Teleological Thinking</h4><p>Children (and adults under cognitive load) default to purpose-based explanations. Rocks exist &ldquo;for animals to scratch on.&rdquo; This promiscuous teleology makes design-based God concepts feel intuitively right.</p></div>
    <div class="feat"><h4>Dualism Intuition</h4><p>Humans naturally separate mind from body. We intuit that consciousness is distinct from the physical brain &mdash; making souls, afterlives, and disembodied spirits feel plausible even without instruction.</p></div>
    <div class="feat"><h4>Anthropomorphism</h4><p>We project human minds onto non-human entities. This tendency, combined with agency detection, makes it natural to infer that invisible agents have intentions, desires, and plans for us.</p></div>
  </div>

  <div class="callout"><h4>System 1 Meets Theology</h4><p>Dual-process theory suggests religious belief is a System 1 (fast, intuitive) product that System 2 (slow, analytical) can override but rarely does. People who score higher on the Cognitive Reflection Test<sup class="fn"><a href="https://www.cambridge.org/core/journals/judgment-and-decision-making/article/cognitive-reflection-and-religious-belief-a-test-of-two-models/5EFE1B122D8D4DC44CF2F0F330D50C0B">[3]</a><span class="tip"><a href="https://www.cambridge.org/core/journals/judgment-and-decision-making/article/cognitive-reflection-and-religious-belief-a-test-of-two-models/5EFE1B122D8D4DC44CF2F0F330D50C0B" target="_blank">Pennycook et al.: Cognitive Reflection and Religious Belief (2012) &rarr;</a></span></sup> tend to be less religious &mdash; but the correlation is modest and varies dramatically across cultures. Analytical thinking does not inevitably lead to atheism; it leads to questioning whatever beliefs are locally dominant.</p></div>`,

  // 03 — Religion & Mental Health
  `<p>Does religion help or hurt mental health? The honest answer: both, and the direction depends on how religion is practiced. Decades of research show that positive religious coping &mdash; finding meaning, community support, and sacred purpose &mdash; is associated with better outcomes. But negative religious coping, scrupulosity, and religious trauma can cause severe psychological harm.</p>

  <div class="s-stat">
    <div class="st"><div class="sv">+ Coping</div><div class="sl">Lower depression/anxiety</div></div>
    <div class="st"><div class="sv">&minus; Coping</div><div class="sl">Higher distress</div></div>
    <div class="st"><div class="sv">~33%</div><div class="sl">OCD patients with scrupulosity</div></div>
    <div class="st"><div class="sv">5%</div><div class="sl">Primary scrupulosity</div></div>
  </div>

  <div class="verdict">
    <div class="v-col pro">
      <h4>When Religion Helps</h4>
      <ul>
        <li>Sense of meaning and purpose under adversity</li>
        <li>Social support from religious communities</li>
        <li>Lower suicide rates among religiously active</li>
        <li>Meditation and contemplative prayer reduce anxiety</li>
        <li>Positive reappraisal of suffering as spiritually meaningful</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>When Religion Hurts</h4>
      <ul>
        <li>Scrupulosity: religious OCD with excessive guilt and compulsive prayer</li>
        <li>Negative religious coping: feeling punished or abandoned by God</li>
        <li>Religious trauma syndrome: anxiety, depression from authoritarian religion</li>
        <li>Spiritual abuse: coercive control via Scripture and authority</li>
        <li>Shame-based sexual ethics causing lasting dysfunction</li>
      </ul>
    </div>
  </div>

  <div class="callout"><h4>Pargament&rsquo;s Framework</h4><p>Kenneth Pargament&rsquo;s<sup class="fn"><a href="https://www.guilford.com/books/The-Psychology-of-Religion-and-Coping/Kenneth-Pargament/9781572306646/reviews">[4]</a><span class="tip"><a href="https://www.guilford.com/books/The-Psychology-of-Religion-and-Coping/Kenneth-Pargament/9781572306646/reviews" target="_blank">Pargament: Psychology of Religion and Coping (1997) &rarr;</a></span></sup> positive/negative religious coping distinction is the field&rsquo;s most replicated finding. Validated during COVID-19: people who saw God as supportive showed resilience; people who felt divinely punished showed increased distress. The variable that matters is not whether someone is religious, but how they are religious.</p></div>`,

  // 04 — Moral Psychology & Religion
  `<p>Does religion make people moral? The largest meta-analysis ever conducted<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/38407059/">[5]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/38407059/" target="_blank">Kelly &amp; Kramer: Religiosity Predicts Prosociality &mdash; Meta-Analysis (2024) &rarr;</a></span></sup> (2024: 701 effects, 811,663 participants) found a correlation of r = .13 between religiosity and prosociality. But when researchers measured actual behavior rather than self-reports, the correlation dropped to r = .06 &mdash; barely above zero. Religious people believe they are more moral. The behavioral evidence is far less clear.</p>

  <div class="s-stat">
    <div class="st"><div class="sv">r = .13</div><div class="sl">Overall correlation</div></div>
    <div class="st"><div class="sv">r = .15</div><div class="sl">Self-report prosociality</div></div>
    <div class="st"><div class="sv">r = .06</div><div class="sl">Behavioral prosociality</div></div>
    <div class="st"><div class="sv">811K</div><div class="sl">Participants in meta-analysis</div></div>
  </div>

  <div class="diagram-wrap"><svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">RELIGIOUS PROSOCIALITY: SELF-REPORT vs. BEHAVIOR</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5" class="edge"/>
    <rect x="30" y="45" width="200" height="30" rx="3" fill="var(--accent)" opacity="0.15" stroke="var(--accent)" stroke-width="0.8"/>
    <text x="40" y="65" font-size="10" class="lbl-hi">Self-report: r = .15</text>
    <rect x="30" y="85" width="80" height="30" rx="3" fill="var(--cyan)" opacity="0.15" stroke="var(--cyan)" stroke-width="0.8"/>
    <text x="40" y="105" font-size="10" class="lbl-hi">Behavioral: r = .06</text>
    <text x="300" y="65" font-size="9" class="lbl">Religious people say they are more generous,</text>
    <text x="300" y="78" font-size="9" class="lbl">helpful, and honest than non-religious people.</text>
    <text x="300" y="105" font-size="9" class="lbl">Lab measures of actual prosocial behavior</text>
    <text x="300" y="118" font-size="9" class="lbl">show almost no difference.</text>
    <line x1="30" y1="140" x2="460" y2="140" stroke="currentColor" stroke-width="0.3" class="edge" stroke-dasharray="4,4"/>
    <text x="250" y="158" text-anchor="middle" font-size="9" class="lbl">Key question: Is the gap self-enhancement bias, or do lab tasks miss real-world prosociality?</text>
  </svg></div>

  <h4>Haidt&rsquo;s Moral Foundations</h4>
  <p>Jonathan Haidt argues that religion activates moral foundations &mdash; loyalty, authority, and purity &mdash; that secular liberals tend to underweight. Religion doesn&rsquo;t make people moral in a universal sense; it makes them moral in a binding, group-cohesive sense. The prosociality is real but parochial: it favors the in-group.</p>

  <div class="callout"><h4>The Parochial Problem</h4><p>Religious priming increases generosity &mdash; but primarily toward fellow believers. A 2025 study<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/00846724241309923">[6]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/00846724241309923" target="_blank">Chhabra et al.: Prime and Punishment &mdash; Religious Priming (2025) &rarr;</a></span></sup> using Bayesian analysis found no significant prosocial effect of religious priming at all. The &ldquo;Sunday effect&rdquo; may be less about God making people good and more about social monitoring making people compliant.</p></div>`,

  // 05 — Developmental Psychology of Religion
  `<p>Children are not blank slates when it comes to religion. By age five, they are what Deborah Kelemen<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1111/j.0956-7976.2004.00672.x">[7]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1111/j.0956-7976.2004.00672.x" target="_blank">Kelemen: Are Children Intuitive Theists? (2004) &rarr;</a></span></sup> calls &ldquo;promiscuous teleologists&rdquo; &mdash; inclined to see purpose and design everywhere. They distinguish God from ordinary humans, attributing supernatural psychological (but not physical) properties. Religious belief, from the developmental perspective, is not taught from scratch but cultivated from pre-existing cognitive tendencies.</p>

  <div class="s-stat">
    <div class="st"><div class="sv">Age 5</div><div class="sl">Promiscuous teleology peaks</div></div>
    <div class="st"><div class="sv">74%</div><div class="sl">Left religion before 17</div></div>
    <div class="st"><div class="sv">26%</div><div class="sl">Left before teen years</div></div>
  </div>

  <div class="timeline">
    <div class="tl-item"><div class="tl-date">Age 3&ndash;5</div><div class="tl-text">Children display promiscuous teleology: rocks exist &ldquo;for animals to scratch on,&rdquo; clouds exist &ldquo;for raining.&rdquo; They apply design-based reasoning even to natural phenomena, making creationist narratives intuitively appealing.</div></div>
    <div class="tl-item"><div class="tl-date">Age 5&ndash;7</div><div class="tl-text">God concepts begin to differentiate from human concepts. Children attribute omniscience and omnipresence to God while recognizing human limitations. Parental God concepts shape but do not determine children&rsquo;s theology.</div></div>
    <div class="tl-item"><div class="tl-date">Age 10&ndash;14</div><div class="tl-text">Abstract thinking enables more sophisticated theology &mdash; but also the first serious doubts. Religious identity becomes tied to social identity and peer group membership.</div></div>
    <div class="tl-item"><div class="tl-date">Age 15&ndash;25</div><div class="tl-text">Peak period for deconversion. Religiosity decreases across adolescence in Western cultures. Reasons: perceived irrelevance, science conflicts, moral disagreements, and peer community integration.</div></div>
    <div class="tl-item"><div class="tl-date">Post-exit</div><div class="tl-text">Deconversion follows a multi-stage pattern: pre-exit strain, turning point, anomie, and reconstruction. Emotional intensity is high initially but diminishes over time. Some report spiritual growth; others report lasting identity disruption.</div></div>
  </div>

  <div class="callout"><h4>The Deconversion Wave</h4><p>Among young adults aged 18&ndash;29, roughly three-quarters report leaving their formative religion by age 17.<sup class="fn"><a href="https://www.americansurveycenter.org/research/generation-z-future-of-faith/">[8]</a><span class="tip"><a href="https://www.americansurveycenter.org/research/generation-z-future-of-faith/" target="_blank">American Survey Center: Gen Z and Future of Faith (2024) &rarr;</a></span></sup> The reasons are diverse &mdash; irrelevance, anti-science perception, moral disagreement &mdash; but the psychological process follows predictable patterns of identity disruption and reconstruction. Recent 2024&ndash;2025 research shows personality changes both precede and follow deconversion.</p></div>`,

  // 06 — Neuroscience of Religious Experience

    <h2><em>Cognitive</em> Science of Religion</h2>
  </div>
  <p>The cognitive science of religion (CSR) emerged in the 1990s as researchers from cognitive psychology, evolutionary biology, and anthropology converged on a striking claim: religious belief is not a cultural accident or a pathological delusion, but a natural and predictable output of the ordinary human cognitive architecture.</p>
  <h3>The Byproduct Hypothesis</h3>
  <p>The dominant model in CSR &mdash; sometimes called the &ldquo;Standard Model&rdquo; &mdash; treats religion as an evolutionary byproduct. Just as moths fly into flames because their navigation system, evolved for moonlight, misfires around artificial light, humans generate religious beliefs because cognitive systems evolved for survival &mdash; agency detection, causal reasoning, social cognition &mdash; misfire when applied to existential questions.</p>
  <p>Pascal Boyer&rsquo;s<sup class="fn"><a href="https://www.amazon.com/Religion-Explained-Evolutionary-Origins-Religious/dp/0465006965">[11]</a><span class="tip"><a href="https://www.amazon.com/Religion-Explained-Evolutionary-Origins-Religious/dp/0465006965" target="_blank">Boyer: Religion Explained (2001) &rarr;</a></span></sup> formulation emphasizes minimally counterintuitive (MCI) concepts: ideas that violate one ontological expectation while preserving others. A tree that listens (violation: plants don&rsquo;t have minds) is memorable precisely because it departs from expectations in a limited, attention-grabbing way. Religious concepts &mdash; invisible persons, immortal beings, omniscient agents &mdash; sit in this cognitive sweet spot.</p>
  <h3>Agency Detection: The HADD Controversy</h3>
  <p>Justin Barrett&rsquo;s Hyperactive Agency Detection Device (HADD) has been the most widely cited mechanism in CSR. The idea: our ancestors survived by over-detecting agents (predators, rivals). This bias, applied beyond its original domain, makes us detect invisible agents &mdash; gods, spirits, ancestors &mdash; behind natural events.</p>
  <p>But HADD faces a growing credibility problem. A 2025 review finds no compelling empirical evidence for a tendency to hyperactively detect agents after nearly 30 years of research. Multiple experiments have produced null findings. The proposed alternative: supernatural agent beliefs arise not from automatic detection but from effortful mental state reasoning &mdash; using Theory of Mind to explain phenomena beyond current causal understanding.</p>
  <h3>The Adaptation Alternative</h3>
  <p>Against the byproduct view, some researchers argue religion is an adaptation &mdash; that it evolved because it provides real fitness benefits, particularly through group cohesion, cooperation, and costly signaling. The debate remains unresolved, though recent years have seen a shift toward more nuanced positions that acknowledge both byproduct and adaptive elements.</p>`,

    <h2>The Psychology of <em>Belief</em></h2>
  </div>
  <p>Willard and Norenzayan&rsquo;s 2013 path model<sup class="fn"><a href="https://www.sciencedirect.com/science/article/abs/pii/S0010027713001492">[12]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/abs/pii/S0010027713001492" target="_blank">Willard &amp; Norenzayan: Cognitive Biases Explain Religious Belief (2013) &rarr;</a></span></sup> was a watershed: they showed that individual differences in mentalizing, dualism intuition, teleological thinking, and anthropomorphism independently predict religious belief, with dualism mediating the mentalizing-belief relationship. This was replicated cross-culturally in Czech and Slovak samples, confirming that cognitive biases are not merely Western correlates of belief.</p>
  <h3>Dual-Process Theory and Belief</h3>
  <p>Daniel Kahneman&rsquo;s System 1 / System 2 framework maps elegantly onto religious cognition. Religious beliefs feel true because they are generated by fast, intuitive System 1 processes: pattern completion, agent detection, teleological inference. System 2 analytical thinking can interrogate these intuitions &mdash; and people who habitually engage System 2 (as measured by the Cognitive Reflection Test) tend to be less religious.</p>
  <p>But the &ldquo;analytic atheist&rdquo; finding is more fragile than it first appeared. The correlation between analytical thinking and non-belief varies dramatically across cultures. In some countries, the correlation disappears entirely. What analytical thinking predicts is not atheism per se, but willingness to question whatever beliefs are locally dominant.</p>
  <h3>Teleological Reasoning</h3>
  <p>Deborah Kelemen showed that children are &ldquo;promiscuous teleologists&rdquo; &mdash; they default to purpose-based explanations for everything. Adults under cognitive load revert to teleological reasoning. Even professional scientists endorse teleological statements when forced to respond quickly. This deep cognitive bias makes design-based theological arguments &mdash; &ldquo;the universe was made for a purpose&rdquo; &mdash; feel intuitively compelling in a way that mechanistic explanations do not.</p>
  <h3>The Motivated Reasoning Layer</h3>
  <p>Cognitive biases explain why religious ideas are <em>intuitive</em>, but motivated reasoning explains why they are <em>maintained</em>. People selectively attend to evidence that confirms their existing beliefs (confirmation bias), attribute positive outcomes to divine intervention while explaining away negative ones (attribution bias), and resist updating beliefs tied to social identity (identity-protective cognition).</p>`,

  // 03 — Religion & Mental Health details
  `<div class="detail-header">

    <h2>Religion &amp; <em>Mental</em> Health</h2>
  </div>
  <p>The relationship between religion and mental health is one of the most studied and most misrepresented topics in psychology. Large reviews consistently find that religious involvement is associated with lower depression and anxiety &mdash; but the effect sizes are small to moderate, and publication bias is a documented concern. The critical insight from Pargament&rsquo;s work is that it is not religiosity per se that matters, but the style of religious coping.</p>
  <h3>Positive Religious Coping</h3>
  <p>Positive coping involves viewing suffering through a benevolent divine lens: &ldquo;God is testing me,&rdquo; &ldquo;This is part of a larger plan,&rdquo; or seeking support from a faith community. This style is consistently associated with better adjustment, post-traumatic growth, and resilience. The mechanism is likely meaning-making: religion provides a narrative framework for suffering that purely secular frameworks sometimes struggle to match.</p>
  <h3>Negative Religious Coping and When Religion Hurts</h3>
  <p>Negative coping involves feeling punished, abandoned, or betrayed by God. It is associated with increased anxiety, depression, and even mortality risk in medical patients. Scrupulosity &mdash; a form of religious OCD characterized by excessive guilt, compulsive prayer, and fear of divine punishment &mdash; affects up to a third of OCD patients and is among the most treatment-resistant subtypes.</p>
  <p>Religious trauma syndrome, identified by Marlene Winell, describes the psychological damage caused by authoritarian religious environments: perfectionism-driven anxiety, shame-based sexuality, apocalyptic hypervigilance, and the devastating social losses that accompany leaving a closed religious community. A 2024 PMC review documented the mechanisms through which indoctrination, coercive control, and spiritual abuse produce lasting psychological harm.</p>
  <h3>The Meditation Exception</h3>
  <p>Contemplative practices show the most consistent positive effects. Meditation reduces default mode network activity (the brain&rsquo;s &ldquo;rumination circuit&rdquo;), and the benefits appear independent of religious belief content. A secular meditator and a contemplative monk show similar neural signatures. This suggests the mental health benefits of religion may be partly attributable to the practice of sustained attention and emotional regulation, not to belief per se.</p>`,

    <h2><em>Moral</em> Psychology &amp; Religion</h2>
  </div>
  <p>The 2024 meta-analysis by Kelly and Kramer is the most comprehensive examination of religion and prosociality to date: 701 effect sizes, 237 samples, 811,663 participants across nearly 60 years of research. Their finding &mdash; r = .13 overall, but only r = .06 for behavioral measures versus r = .15 for self-report &mdash; encapsulates the central puzzle of religious morality research.</p>
  <h3>The Self-Enhancement Hypothesis</h3>
  <p>Three interpretations of the self-report/behavior gap compete: (a) lab-based methods fail to capture genuine religious prosociality that manifests in real-world volunteering, charitable giving, and community support; (b) religious self-enhancement bias inflates self-reported virtue; or (c) both religiosity and self-reported prosociality are driven by a shared underlying tendency toward favorable self-presentation.</p>
  <h3>Haidt&rsquo;s Moral Foundations</h3>
  <p>Jonathan Haidt&rsquo;s moral foundations theory offers a framework for understanding why religious morality feels so different from secular morality. Secular moral reasoning tends to weight care and fairness most heavily. Religious moral reasoning also incorporates loyalty, authority, and purity &mdash; foundations that bind groups together at the cost of openness to outsiders. Religion doesn&rsquo;t make people moral in a universal sense; it makes them moral in a tribal, community-binding sense.</p>
  <h3>Religious Priming: Declining Effects</h3>
  <p>Early studies suggested that merely activating religious concepts (reading words like &ldquo;God,&rdquo; &ldquo;sacred,&rdquo; &ldquo;divine&rdquo;) increased prosocial behavior. A meta-analysis of 93 studies confirmed this effect &mdash; but only for religious participants. And a 2025 Bayesian analysis found no significant priming effect at all, raising concerns about publication bias in the earlier literature.</p>
  <h3>The Parochial Problem</h3>
  <p>Religious prosociality is consistently parochial: it favors coreligionists over outsiders. The &ldquo;supernatural monitoring&rdquo; hypothesis suggests that belief in an omniscient God promotes honesty and cooperation &mdash; but primarily within the community of believers. The monitoring only works if you believe the monitor cares about your specific group&rsquo;s norms. This helps explain religion&rsquo;s historical role in both remarkable acts of charity and extraordinary acts of exclusion.</p>`,

  // 05 — Developmental Psychology details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div>
    <h2><em>Developmental</em> Psychology of Religion</h2>
  </div>
  <p>Deborah Kelemen&rsquo;s &ldquo;intuitive theism&rdquo; hypothesis argues that children are cognitively predisposed toward religious thinking &mdash; not because they are taught it, but because the same cognitive tendencies that help them understand the physical and social world (purpose attribution, agent detection, mind-body distinction) naturally generate proto-religious concepts. Barrett calls children &ldquo;born believers.&rdquo;</p>
  <h3>Children&rsquo;s God Concepts</h3>
  <p>Cross-cultural research shows that even very young children distinguish God from ordinary humans: they attribute extraordinary psychological capacities (omniscience, immortality of mind) to God while recognizing human limitations. These attributions appear across religious traditions, suggesting they reflect something about how young minds naturally conceptualize powerful agents rather than specific doctrinal teaching.</p>
  <p>Parental God concepts shape children&rsquo;s theology, but the relationship is not simple transmission. Children&rsquo;s executive functioning moderates the correspondence: children with stronger cognitive control develop more differentiated God concepts earlier, suggesting an active constructive process rather than passive absorption.</p>
  <h3>The Deconversion Process</h3>
  <p>Deconversion &mdash; leaving a religious identity &mdash; has become one of the most active research areas in developmental psychology of religion. Among young adults (18&ndash;29) in the United States, approximately 74% of those who left religion did so before age 17. The process follows a multi-stage model: pre-exit strain (doubts, moral conflicts), a turning point (often a specific event or realization), immediate anomie (loss of community, identity confusion), and gradual reconstruction.</p>
  <p>Recent 2024&ndash;2025 longitudinal research shows that personality changes both precede and follow deconversion: openness to experience increases before exit, while emotional stability decreases in the immediate aftermath before recovering. The emotional intensity of deconversion is high but transient. Polish adolescents show deconversion as a process of peer community integration combined with rejection of religious constraints.</p>
  <h3>Gen Z and the Future</h3>
  <p>Generation Z is the least religious generation in American history. Roughly 34% identify as religiously unaffiliated. But &ldquo;no religion&rdquo; does not mean &ldquo;no spirituality&rdquo;: many retain belief in something beyond the material while rejecting institutional religious affiliation. The developmental trajectory suggests not the death of the religious impulse but its detachment from organized religion.</p>`,

  `<div class="detail-header">

    <h2>The <em>Neuroscience</em> of Religious Experience</h2>
  </div>
  <p>The neuroscience of religion has progressed from the early &ldquo;God spot&rdquo; hypothesis &mdash; the idea that a single brain region generates religious experience &mdash; to a distributed network model. Religious cognition involves the prefrontal cortex (intentionality, moral reasoning), the temporal lobes (narrative, self-transcendence), the parietal lobes (self-other boundary), and the default mode network (self-referential processing).</p>
  <h3>Newberg&rsquo;s Neurotheology Program</h3>
  <p>Andrew Newberg at Thomas Jefferson University has conducted the most systematic neuroimaging studies of spiritual practice. His SPECT imaging shows that during intense prayer and meditation, the prefrontal cortex (associated with focused attention) becomes more active while the superior parietal lobe (associated with spatial orientation and self-other distinction) becomes less active. Newberg interprets the parietal deactivation as the neural basis of the &ldquo;dissolution of self&rdquo; reported in mystical experience.</p>
  <p>In 2025, Newberg published on the practical clinical applications of neurotheology, arguing that understanding the neuroscience of spiritual experience can improve integrative psychiatry by incorporating patients&rsquo; spiritual lives into treatment planning.</p>
  <h3>The Psilocybin Revolution</h3>
  <p>The Johns Hopkins Center for Psychedelic and Consciousness Research &mdash; backed by $55 million in funding &mdash; has produced some of the most striking findings in the field. Roland Griffiths&rsquo; landmark studies showed that psilocybin can reliably occasion mystical-type experiences that participants rate as among the most spiritually significant events of their lives, with effects persisting at 14-month follow-up.</p>
  <p>Neuroimaging reveals that psilocybin suppresses the claustrum &mdash; a thin sheet of neurons believed to coordinate attention-switching &mdash; correlating with the subjective experience of ego dissolution. The default mode network, which normally maintains the sense of a continuous self, is disrupted. Recent 2024 work by Yaden and colleagues at Hopkins has expanded the focus beyond mystical experience to other clinically relevant subjective effects: emotional breakthrough, insight, and connectedness.</p>
  <h3>Temporal Lobe Epilepsy</h3>
  <p>The link between temporal lobe epilepsy (TLE) and religious experience has fascinated neuroscientists since Geschwind described the interictal personality syndrome in the 1970s. Between 0.4% and 3.1% of partial epilepsy patients report ictal religious experiences &mdash; a sense of divine presence, auditory or visual hallucinations of God, or ecstatic states. Right temporal lobe predominance is noted in these cases.</p>
  <p>But the TLE-religion link is frequently overinterpreted. Most TLE patients do not develop hyperreligiosity. Seizure-induced religious experiences are unusual, not typical. And the famous cases (Dostoevsky, possibly Paul of Tarsus) are retrospective diagnoses that may reflect more about our desire for neurological explanations than about the patients themselves.</p>
  <h3>What Brain Imaging Does and Does Not Show</h3>
  <p>The neuroscience of religion faces a persistent philosophical challenge: finding that prayer activates the prefrontal cortex no more explains prayer than finding that looking at art activates the visual cortex explains aesthetic experience. Every subjective experience has a neural correlate. The question of whether the neural correlate is the cause, the consequence, or merely the physical substrate of religious experience remains outside neuroscience&rsquo;s current methodological reach.</p>`

}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>

<script>
(function(){
  var MP3 = 'overview.mp3';

  // 1. Inject CSS
  var css = document.createElement('style');
  css.textContent = `
    .audio-bar{display:flex;align-items:center;gap:10px;padding:10px 0 4px;margin-top:6px;max-height:50px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
    .main-head.compact .audio-bar{max-height:0;padding:0;opacity:0;margin:0;pointer-events:none}
    .audio-bar audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    [data-theme="dark"] .audio-bar audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
    .ctrl-btn.audio-ctrl{display:none;position:relative}
    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}
    .audio-bottom audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    .audio-bottom .audio-dismiss{cursor:pointer;color:var(--dim);font-size:13px;padding:4px 8px;border:none;background:none;font-family:var(--sans);letter-spacing:.5px;transition:color .2s}
    .audio-bottom .audio-dismiss:hover{color:var(--accent)}
    [data-theme="dark"] .audio-bottom audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = '<audio id="audio-main" controls preload="none" src="'+MP3+'"></audio>';
  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
</body>
</html>
