<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Neurotheology', title: '<em>Newberg</em>&rsquo;s Neurotheology' },
  { num: '02', short: 'God Spot', title: 'The &<em>ldquo</em>;God Spot&rdquo; Debate' },
  { num: '03', short: 'Psilocybin', title: '<em>Psilocybin</em> &amp; Mystical Experience' },
  { num: '04', short: 'TLE', title: '<em>Temporal</em> Lobe Epilepsy' },
  { num: '05', short: 'Meditation', title: '<em>Meditation</em> &amp; the Default Mode' },
  { num: '06', short: 'God Helmet', title: '<em>Persinger</em>&rsquo;s God Helmet' },
  { num: '07', short: 'Limits', title: 'What <em>Brain</em> Imaging Cannot Show' },
  { num: '08', short: 'Clinical', title: '<em>Clinical</em> Neurotheology' }
];

const summaries = [
  // 01
  `<p>Andrew Newberg<sup class="fn"><a href="https://cup.columbia.edu/book/neurotheology/9780231179058/">[1]</a><span class="tip"><a href="https://cup.columbia.edu/book/neurotheology/9780231179058/" target="_blank">Newberg: Neurotheology (Columbia UP, 2016) &rarr;</a></span></sup>, director of research at the Marcus Institute of Integrative Health at Thomas Jefferson University, has conducted the most systematic neuroimaging studies of spiritual practice. His SPECT (single-photon emission computed tomography) imaging reveals consistent neural signatures during prayer and meditation across religious traditions.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">SPECT</div><div class="sl">Primary imaging modality</div></div>
    <div class="st"><div class="sv">PFC &uarr;</div><div class="sl">Prefrontal activation</div></div>
    <div class="st"><div class="sv">SPL &darr;</div><div class="sl">Parietal deactivation</div></div>
    <div class="st"><div class="sv">2025</div><div class="sl">Clinical applications paper</div></div>
  </div>
  <p>The core finding: during intense prayer and meditation, the prefrontal cortex (associated with focused attention and intentionality) becomes more active, while the superior parietal lobe (associated with spatial orientation and the sense of self-other boundary) becomes less active. Newberg interprets the parietal deactivation as the neural correlate of the &ldquo;dissolution of self&rdquo; commonly reported in mystical experience &mdash; the feeling of unity with the divine or with all existence.</p>
  <div class="callout"><h4>Not Reductive</h4><p>Newberg explicitly insists that neurotheology is not reductive. Finding neural correlates of spiritual experience does not mean that spiritual experience is &ldquo;nothing but&rdquo; neural activity. His position: the brain is the instrument through which spiritual experience is mediated, not the explanation that explains it away. The relationship between neural correlate and subjective experience remains philosophically open.</p></div>`,

  // 02
  `<p>The early hope of neuro-religious research was to find a &ldquo;God spot&rdquo; &mdash; a single brain region responsible for religious experience. This hypothesis has been definitively rejected.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Neuroscience_of_religion">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Neuroscience_of_religion" target="_blank">Wikipedia: Neuroscience of Religion &rarr;</a></span></sup> Religious cognition is distributed across multiple brain networks, not localized in any single area.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">DISTRIBUTED NETWORK MODEL OF RELIGIOUS COGNITION</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5"/>
    <rect x="30" y="45" width="120" height="45" class="node-hi" rx="3"/>
    <text x="90" y="65" text-anchor="middle" class="node-text" font-size="9">Prefrontal Cortex</text>
    <text x="90" y="78" text-anchor="middle" class="node-sub" font-size="8">Intentionality, prayer</text>
    <rect x="190" y="45" width="120" height="45" class="node" rx="3"/>
    <text x="250" y="65" text-anchor="middle" class="node-text" font-size="9">Temporal Lobes</text>
    <text x="250" y="78" text-anchor="middle" class="node-sub" font-size="8">Narrative, meaning</text>
    <rect x="350" y="45" width="120" height="45" class="node" rx="3"/>
    <text x="410" y="65" text-anchor="middle" class="node-text" font-size="9">Parietal Lobes</text>
    <text x="410" y="78" text-anchor="middle" class="node-sub" font-size="8">Self-other boundary</text>
    <rect x="110" y="120" width="120" height="45" class="node" rx="3"/>
    <text x="170" y="140" text-anchor="middle" class="node-text" font-size="9">Default Mode</text>
    <text x="170" y="153" text-anchor="middle" class="node-sub" font-size="8">Self-reference, mind-wandering</text>
    <rect x="270" y="120" width="120" height="45" class="node" rx="3"/>
    <text x="330" y="140" text-anchor="middle" class="node-text" font-size="9">ToM Network</text>
    <text x="330" y="153" text-anchor="middle" class="node-sub" font-size="8">Attributing intentions to God</text>
    <text x="250" y="190" text-anchor="middle" font-size="9" class="lbl">No single &ldquo;God spot&rdquo; &mdash; religious experience emerges from network interactions</text>
  </svg></div>
  <p>Different religious activities activate different networks: prayer activates prefrontal and language areas; meditation deactivates the default mode network; mystical experience involves parietal deactivation; moral reasoning about God activates the Theory of Mind network. Religion is not one neural thing; it is many neural things unified by a common cultural and experiential category.</p>`,

  // 03
  `<p>The Johns Hopkins Center for Psychedelic and Consciousness Research, backed by $55 million in funding, has produced the most striking findings linking pharmacology to mystical experience. Roland Griffiths&rsquo; landmark studies<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/16826400/">[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/16826400/" target="_blank">Griffiths et al.: Psilocybin Occasions Mystical Experiences (2006) &rarr;</a></span></sup> demonstrated that psilocybin can reliably occasion mystical-type experiences phenomenologically identical to spontaneous ones.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">2006</div><div class="tl-text">Griffiths publishes landmark paper: psilocybin occasions mystical experiences with sustained personal meaning and spiritual significance. 67% rated it among the top 5 most spiritually significant experiences of their lives.</div></div>
    <div class="tl-item"><div class="tl-date">2008</div><div class="tl-text">14-month follow-up confirms persistence: mystical experiences maintained spiritual significance. No adverse psychological effects in controlled setting.</div></div>
    <div class="tl-item"><div class="tl-date">2011</div><div class="tl-text">Personality effects documented: psilocybin-occasioned mystical experience produces lasting increases in Openness to Experience &mdash; a personality dimension typically stable in adulthood.</div></div>
    <div class="tl-item"><div class="tl-date">2016</div><div class="tl-text">Cancer anxiety study: psilocybin produces substantial decreases in depression and anxiety in patients with life-threatening cancer, mediated by mystical experience quality.</div></div>
    <div class="tl-item"><div class="tl-date">2018</div><div class="tl-text">Psilocybin combined with meditation and spiritual practices produces enduring positive changes<sup class="fn"><a href="https://journals.sagepub.com/doi/full/10.1177/0269881117731279">[4]</a><span class="tip"><a href="https://journals.sagepub.com/doi/full/10.1177/0269881117731279" target="_blank">Griffiths et al.: Psilocybin + Meditation + Spiritual Practices (2018) &rarr;</a></span></sup> in prosocial attitudes and psychological functioning.</div></div>
    <div class="tl-item"><div class="tl-date">2024</div><div class="tl-text">Yaden et al.<sup class="fn"><a href="https://pure.johnshopkins.edu/en/publications/clinically-relevant-acute-subjective-effects-of-psychedelics-beyo/">[5]</a><span class="tip"><a href="https://pure.johnshopkins.edu/en/publications/clinically-relevant-acute-subjective-effects-of-psychedelics-beyo/" target="_blank">Yaden et al.: Clinically Relevant Subjective Effects Beyond Mystical Experience (2024) &rarr;</a></span></sup> expand focus beyond mystical experience to other clinically relevant subjective effects: emotional breakthrough, insight, and connectedness.</div></div>
  </div>
  <div class="callout"><h4>The Neural Mechanism</h4><p>Brain imaging reveals that psilocybin suppresses the claustrum (an attention-switching hub) and disrupts the default mode network (the self-referential &ldquo;narrative self&rdquo; circuit). The subjective result: ego dissolution, feelings of unity, and the sense that boundaries between self and world are illusory. The mystical experience appears to be what happens when the brain&rsquo;s self-model temporarily collapses.</p></div>
  <div class="security-box"><h4>Methodological Cautions</h4><p>Psilocybin research faces significant methodological challenges. Blinding is difficult: participants usually know whether they received an active substance, introducing expectancy effects. Self-selection bias is pervasive: volunteers for psychedelic studies tend to be psychologically open and positively predisposed toward mystical experience. Sample sizes remain small by clinical trial standards. The 67% &ldquo;top-5 experience&rdquo; finding, while striking, comes from a self-selected population in a supportive clinical setting &mdash; generalizability to broader populations is uncertain.</p></div>`,

  // 04
  `<p>The relationship between temporal lobe epilepsy (TLE) and religious experience has fascinated neuroscientists since Geschwind described the interictal personality syndrome in the 1970s. Between 0.4% and 3.1% of partial epilepsy patients report ictal religious experiences<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4550801/">[6]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4550801/" target="_blank">Isolated Hyperreligiosity in Temporal Lobe Epilepsy (PMC 2015) &rarr;</a></span></sup>: a sense of divine presence, auditory or visual hallucinations of God, or ecstatic states.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Right Temporal Predominance</h4><p>Ictal religious experiences show right temporal lobe predominance. The right hemisphere is associated with holistic processing, emotional meaning, and self-transcendent experience.</p></div>
    <div class="feat"><h4>Hyperreligiosity Syndrome</h4><p>A small subset of TLE patients develop hyperreligiosity<sup class="fn"><a href="https://www.mdpi.com/2673-4087/7/1/4">[7]</a><span class="tip"><a href="https://www.mdpi.com/2673-4087/7/1/4" target="_blank">MDPI: Neural Pathways of Faith &mdash; Hyperreligiosity in Epilepsy (2026) &rarr;</a></span></sup>: sudden intense religiosity, conversion experiences, or conviction of divine communication. Case reports document sudden religious conviction following seizures.</p></div>
    <div class="feat"><h4>Famous Historical Cases</h4><p>Dostoevsky described ecstatic auras before seizures. Paul of Tarsus&rsquo;s conversion on the road to Damascus has been retrospectively attributed to TLE. These are speculative but illustrative.</p></div>
    <div class="feat"><h4>The Rarity Problem</h4><p>Most TLE patients do NOT develop hyperreligiosity. Seizure-induced religious experiences are unusual, not typical. The TLE-religion link is frequently overinterpreted in popular science.</p></div>
  </div>
  <div class="security-box"><h4>Retrospective Diagnosis Fallacy</h4><p>Attributing religious experiences of historical figures to neurological conditions is methodologically suspect. We cannot diagnose Paul, Joan of Arc, or Muhammad from texts written centuries ago. These retrospective diagnoses may say more about our desire to medicalize religious experience than about the actual neurology of historical individuals. The TLE research is valuable for what it reveals about the neural substrates of ecstatic states; it is unreliable when used to debunk specific historical religious claims.</p></div>`,

  // 05
  `<p>The most robust neuroimaging findings in the field come from meditation research. Experienced meditators show reduced default mode network (DMN) activity &mdash; the brain&rsquo;s self-referential &ldquo;wandering mind&rdquo; circuit &mdash; and increased connectivity between the DMN and executive control networks.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">DMN &darr;</div><div class="sl">Reduced self-referential activity</div></div>
    <div class="st"><div class="sv">PFC-DMN</div><div class="sl">Increased connectivity</div></div>
    <div class="st"><div class="sv">mPFC</div><div class="sl">Medial prefrontal changes</div></div>
  </div>
  <p>Brewer et al. (2011, PNAS)<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.1112029108">[8]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.1112029108" target="_blank">Brewer et al.: Meditation and Default Mode Network (PNAS 2011) &rarr;</a></span></sup> showed that experienced meditators have reduced DMN activity across all meditation types &mdash; concentration, loving-kindness, and choiceless awareness. The main DMN nodes (medial prefrontal and posterior cingulate cortices) were relatively deactivated. This suggests a common neural mechanism underlying diverse contemplative practices: quieting the self-referential narrative.</p>
  <p>From state to trait: long-term meditators show DMN differences even at rest, not just during meditation. The practice appears to produce lasting reconfiguration of self-referential brain networks. This is one of the strongest pieces of evidence that contemplative practice produces durable neural changes, not merely transient states.</p>
  <div class="callout"><h4>Secular and Sacred, Same Brain</h4><p>Crucially, secular mindfulness meditators and contemplative monks show similar DMN signatures. The neural effects appear to come from the practice of sustained attention and non-reactive awareness, not from the religious belief content. This is perhaps the most important finding for the religion-health debate: whatever benefits meditation provides, they are practice-dependent, not belief-dependent.</p></div>`,

  // 06
  `<p>Michael Persinger&rsquo;s &ldquo;God Helmet&rdquo; &mdash; a device that applies weak magnetic fields to the temporal lobes &mdash; generated enormous popular interest when Persinger claimed it could induce &ldquo;sensed presence&rdquo; experiences similar to religious visions. But the scientific evidence is deeply contested.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Persinger&rsquo;s Claim</h4><p>Weak transcranial magnetic stimulation of the temporal lobes induces &ldquo;sensed presence&rdquo; &mdash; the feeling that an invisible entity is nearby. Persinger claimed this explained religious experience as temporal lobe activation.</p></div>
    <div class="feat"><h4>The Replication Failure</h4><p>A double-blind replication attempt by Granqvist et al. found that the &ldquo;sensed presence&rdquo; effect was attributable to suggestion and personality variables, not to the magnetic field itself. Sham stimulation produced similar effects.</p></div>
    <div class="feat"><h4>The Dawkins Visit</h4><p>Richard Dawkins famously tried the God Helmet and reported feeling nothing. Susan Blackmore reported a strong experience. Individual differences in suggestibility appear to matter more than the magnetic fields.</p></div>
    <div class="feat"><h4>Scientific Status</h4><p>The God Helmet is generally regarded as a failed experiment in the neuroscience community. It illustrates the danger of over-interpreting preliminary findings and the importance of double-blind controls in experience research.</p></div>
  </div>`,

  // 07
  `<p>The neuroscience of religion faces a persistent philosophical limitation that no amount of better imaging can resolve:</p>
  <ul class="s-list">
    <li><strong>The correlation-causation gap:</strong> Finding that prayer activates the prefrontal cortex no more explains prayer than finding that looking at art activates the visual cortex explains aesthetic experience. Neural correlates describe; they do not explain.</li>
    <li><strong>The hard problem:</strong> Neuroscience can map the neural signatures of religious experience but cannot bridge the gap between objective brain states and subjective phenomenal experience. Why does parietal deactivation feel like unity with God?</li>
    <li><strong>The direction problem:</strong> Does belief cause the neural activity, or does the neural activity cause the belief? Or are they simply two descriptions of the same underlying event? Brain imaging cannot answer this.</li>
    <li><strong>The inference gap:</strong> Religious experience is richly textured &mdash; awe, reverence, surrender, unity, meaning, love. fMRI provides blob-on-a-brain images. The gap between the richness of experience and the crudeness of current measurement is vast.</li>
    <li><strong>The meaning question:</strong> Neuroscience can show that religious states are real brain states. It cannot determine whether those brain states are responses to something genuinely transcendent or merely interesting neural patterns. That question lies outside its methodological reach.</li>
  </ul>
  <div class="callout"><h4>Every Experience Has a Neural Correlate</h4><p>The fact that religious experience has neural correlates is not surprising or informative by itself. Love has neural correlates. Music appreciation has neural correlates. Moral outrage has neural correlates. Having a neural correlate is the minimum requirement for any conscious experience. The interesting question is not whether religious experience is in the brain (of course it is), but what the specific patterns of neural activity reveal about the nature and function of these experiences.</p></div>`,

  // 08
  `<p>Newberg&rsquo;s 2025 publication<sup class="fn"><a href="https://link.springer.com/article/10.1007/s11920-024-01584-3">[9]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s11920-024-01584-3" target="_blank">Newberg: Neurotheology &mdash; Practical Applications for Integrative Psychiatry (2025) &rarr;</a></span></sup> on neurotheology and integrative psychiatry represents the field&rsquo;s maturation from pure research toward clinical application. The argument: understanding the neuroscience of spiritual experience can improve psychiatric care by incorporating patients&rsquo; spiritual lives into treatment.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Spiritual Assessment</h4><p>Clinicians should assess patients&rsquo; spiritual lives as routinely as they assess sleep, diet, and exercise. Spiritual experience has measurable neural correlates and real psychological consequences.</p></div>
    <div class="feat"><h4>Meditation Prescription</h4><p>Given the robust evidence for meditation&rsquo;s effects on brain networks and mental health, contemplative practices can be recommended as evidence-based interventions regardless of the patient&rsquo;s religious affiliation.</p></div>
    <div class="feat"><h4>Psychedelic-Assisted Therapy</h4><p>The Hopkins psilocybin program has moved toward FDA approval for treatment-resistant depression. The mystical experience component appears to be therapeutically important, not merely a side effect.</p></div>
    <div class="feat"><h4>Scrupulosity-Aware Practice</h4><p>Understanding the neuroscience of religious experience helps clinicians distinguish between healthy spiritual practice and pathological religious obsession. The boundary between devotion and scrupulosity has neural markers.</p></div>
  </div>
  <div class="callout"><h4>The Integration Challenge</h4><p>The frontier of clinical neurotheology is integration: bringing together what we know about the brain, what patients experience spiritually, and what helps them heal. This requires clinicians who can navigate between scientific evidence and spiritual sensitivity &mdash; taking the brain seriously without reducing the person to it, and taking spiritual experience seriously without abandoning empirical standards. It is a difficult balance, but the evidence increasingly suggests it is a necessary one.</p></div>`
];
