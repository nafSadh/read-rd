</head>
<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'HADD', title: 'The <em>Agency</em> Detection Hypothesis' },
  { num: '02', short: 'Theory of Mind', title: '<em>Theory</em> of Mind &amp; Supernatural Agents' },
  { num: '03', short: 'MCI Concepts', title: '<em>Minimally</em> Counterintuitive Concepts' },
  { num: '04', short: 'Byproduct', title: '<em>Byproduct</em> vs. Adaptation' },
  { num: '05', short: 'HADD Critique', title: 'The <em>Empirical</em> Critique of HADD' },
  { num: '06', short: 'Enactivist Turn', title: 'The <em>Enactivist</em> Turn in CSR' },
  { num: '07', short: 'Key Figures', title: 'Key <em>Researchers</em> &amp; Works' },
  { num: '08', short: 'Open Questions', title: '<em>Open</em> Questions' }
];

const summaries = [
  // 01 — HADD
  `<p>Justin Barrett<sup class="fn"><a href="https://secularfrontier.infidels.org/2011/10/justin-barretts-hyperactive-agency-detection-device-hadd/">[1]</a><span class="tip"><a href="https://secularfrontier.infidels.org/2011/10/justin-barretts-hyperactive-agency-detection-device-hadd/" target="_blank">Barrett: Why Would Anyone Believe in God? (2004) &rarr;</a></span></sup> proposed that humans possess a Hyperactive Agency Detection Device (HADD) &mdash; a cognitive module biased toward detecting agents from minimal cues. The evolutionary logic: our ancestors who over-detected predators and rivals survived more often than those who under-detected them. False positives (seeing a predator when there is none) are cheap; false negatives (missing a real predator) are fatal.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1990s</div><div class="sl">HADD first proposed</div></div>
    <div class="st"><div class="sv">~30yr</div><div class="sl">Without strong empirical support</div></div>
    <div class="st"><div class="sv">2025</div><div class="sl">Major critique published</div></div>
  </div>
  <p>When HADD fires in ambiguous situations &mdash; hearing a noise in the dark, seeing patterns in nature &mdash; it generates the inference that an intentional agent is present. When combined with Theory of Mind (the ability to attribute beliefs, desires, and intentions to others), this agent inference is elaborated into a full supernatural agent: a god, spirit, or ancestor with plans and purposes. Barrett called this process &ldquo;naturally religious&rdquo; cognition.<sup class="fn"><a href="https://mindandculture.org/5-key-concepts-from-cognitive-science-of-religion/">[2]</a><span class="tip"><a href="https://mindandculture.org/5-key-concepts-from-cognitive-science-of-religion/" target="_blank">Center for Mind and Culture: 5 Key CSR Concepts (2023) &rarr;</a></span></sup></p>
  <div class="callout"><h4>The Error Management Logic</h4><p>HADD draws on error management theory: when the costs of different errors are asymmetric, natural selection favors the cheaper error. Detecting a tiger that isn&rsquo;t there costs a moment of fear; failing to detect one that is there costs your life. The same logic, applied to invisible agents, generates gods. Elegant &mdash; but as we shall see, empirically unconfirmed.</p></div>`,

  // 02 — Theory of Mind
  `<p>Theory of Mind (ToM) &mdash; the ability to attribute mental states to others &mdash; is the cognitive engine that transforms detected agents into full supernatural persons.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Cognitive_science_of_religion">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Cognitive_science_of_religion" target="_blank">Wikipedia: Cognitive Science of Religion &rarr;</a></span></sup> When HADD detects an unseen agent, ToM fills in the agent&rsquo;s psychology: What does it want? Is it angry? Can it be appeased? This is how a rustling bush becomes an ancestor spirit with intentions.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Intentional Stance</h4><p>Daniel Dennett&rsquo;s concept: humans default to interpreting behavior in terms of beliefs and desires, applying this stance not only to people but to animals, storms, and even machines. Religious agents are the ultimate intentional entities.</p></div>
    <div class="feat"><h4>Strategic Information</h4><p>Gods are typically attributed &ldquo;strategic knowledge&rdquo; &mdash; they know about morally relevant actions. This is not random omniscience but targeted awareness of the information that matters for social cooperation.</p></div>
    <div class="feat"><h4>Developmental Evidence</h4><p>Children develop ToM around age 3&ndash;5, and this is also when they begin to form concepts of invisible agents. The developmental co-emergence suggests a shared cognitive basis.</p></div>
    <div class="feat"><h4>Autism Spectrum Research</h4><p>Some studies suggest that individuals with reduced ToM capacity (on the autism spectrum) show lower rates of religious belief. This is consistent with ToM as a necessary ingredient for religious cognition, though the evidence is mixed.</p></div>
  </div>`,

  // 03 — MCI Concepts
  `<p>Pascal Boyer&rsquo;s<sup class="fn"><a href="https://www.amazon.com/Religion-Explained-Evolutionary-Origins-Religious/dp/0465006965">[4]</a><span class="tip"><a href="https://www.amazon.com/Religion-Explained-Evolutionary-Origins-Religious/dp/0465006965" target="_blank">Boyer: Religion Explained (2001) &rarr;</a></span></sup> most influential contribution to CSR is the concept of Minimally Counterintuitive (MCI) concepts. Religious ideas, Boyer argued, are not random fantasies but are specifically structured to be memorable: they violate exactly one ontological expectation while preserving all others. A tree that listens. A person who walks through walls. A being that exists without a body.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">THE MCI SWEET SPOT</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5" class="edge"/>
    <text x="60" y="55" font-size="9" class="lbl">Intuitive</text>
    <text x="250" y="55" text-anchor="middle" font-size="9" class="lbl-hi">Minimally Counterintuitive</text>
    <text x="430" y="55" text-anchor="end" font-size="9" class="lbl">Maximally Bizarre</text>
    <rect x="50" y="65" width="100" height="60" class="node" rx="3"/>
    <text x="100" y="85" text-anchor="middle" class="node-text" font-size="10">Ordinary rock</text>
    <text x="100" y="100" text-anchor="middle" class="node-sub" font-size="8">Forgettable</text>
    <text x="100" y="115" text-anchor="middle" class="node-sub" font-size="8">Not transmitted</text>
    <rect x="195" y="65" width="110" height="60" class="node-hi" rx="3"/>
    <text x="250" y="85" text-anchor="middle" class="node-text" font-size="10">Weeping statue</text>
    <text x="250" y="100" text-anchor="middle" class="lbl-hi" font-size="8">Memorable</text>
    <text x="250" y="115" text-anchor="middle" class="lbl-hi" font-size="8">Culturally transmitted</text>
    <rect x="350" y="65" width="100" height="60" class="node" rx="3"/>
    <text x="400" y="85" text-anchor="middle" class="node-text" font-size="10">Singing number</text>
    <text x="400" y="100" text-anchor="middle" class="node-sub" font-size="8">Too bizarre</text>
    <text x="400" y="115" text-anchor="middle" class="node-sub" font-size="8">Not transmitted</text>
    <text x="250" y="155" text-anchor="middle" font-size="9" class="lbl">Religious concepts survive cultural transmission because they sit in the cognitive sweet spot.</text>
  </svg></div>
  <p>MCI concepts activate existing inference systems while adding a single attention-grabbing violation. A bodiless person still triggers our person-reasoning systems (goals, beliefs, social obligations) while the violation (no body) demands attention and encoding. This is why religious concepts are both intuitively graspable and cognitively &ldquo;sticky.&rdquo;</p>
  <div class="callout"><h4>Beyond Boyer</h4><p>Subsequent research has confirmed that MCI concepts are better remembered in recall experiments, especially by children. But critics note that memorability is not the same as believability. Many MCI concepts (talking animals, invisible friends) are remembered without being believed. The gap between cultural transmission and sincere belief remains under-theorized.</p></div>`,

  // 04 — Byproduct vs Adaptation
  `<p>The central debate in evolutionary approaches to religion: Is religion an adaptation (evolved because it provides fitness benefits) or a byproduct (a side effect of cognitive systems that evolved for other purposes)?<sup class="fn"><a href="https://www.journals.uchicago.edu/doi/full/10.1093/bjps/axr035">[5]</a><span class="tip"><a href="https://www.journals.uchicago.edu/doi/full/10.1093/bjps/axr035" target="_blank">Powell &amp; Clarke: Byproduct Hypothesis Critique (2012) &rarr;</a></span></sup> The &ldquo;Standard Model&rdquo; of CSR favors the byproduct view, but recent years have seen a shift.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Byproduct Arguments</h4>
      <ul>
        <li>Religion activates pre-existing cognitive modules (agency detection, ToM, MCI) that evolved for non-religious functions<sup class="fn"><a href="https://philpapers.org/rec/ATRIGW">[6]</a><span class="tip"><a href="https://philpapers.org/rec/ATRIGW" target="_blank">Atran: In Gods We Trust (2002) &rarr;</a></span></sup></li>
        <li>Religious beliefs are highly variable across cultures, unlike genuine adaptations which tend toward universality</li>
        <li>Religion is costly (time, resources, conflict) without clear individual fitness benefit</li>
        <li>Analogous to moths flying into flames: navigation system misfiring</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Adaptation Arguments</h4>
      <ul>
        <li>Religion promotes group cohesion, cooperation, and collective action (group selection)</li>
        <li>Costly signaling (ritual, sacrifice) solves free-rider problems in cooperation</li>
        <li>Belief in supernatural monitoring reduces cheating</li>
        <li>Religious groups historically outcompete non-religious groups in intergroup competition</li>
      </ul>
    </div>
  </div>
  <div class="callout"><h4>Beyond the Binary</h4><p>Recent scholarship suggests the byproduct/adaptation debate may be a false dichotomy. Religion may have originated as a cognitive byproduct but subsequently been co-opted by cultural evolution for group-functional purposes. The cognitive foundations are byproducts; the cultural elaboration is adaptive. Both sides are partially correct.</p></div>`,

  // 05 — HADD Critique
  `<p>Despite its ubiquity in textbooks and popular science writing, HADD has never been empirically validated. Lisdorf&rsquo;s review<sup class="fn"><a href="http://www.csr-arc.com/files/5/ARC-4-What_s_HIDD_n_in_the_HADD.pdf">[7]</a><span class="tip"><a href="http://www.csr-arc.com/files/5/ARC-4-What_s_HIDD_n_in_the_HADD.pdf" target="_blank">Lisdorf: What&rsquo;s HIDD&rsquo;n in the HADD? (2007) &rarr;</a></span></sup> and a 2025 peer-reviewed article<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/2153599X.2025.2584792">[8]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/2153599X.2025.2584792" target="_blank">Belief as Explanation &mdash; Alternative to HADD (2025) &rarr;</a></span></sup> document that after nearly 30 years, there is no compelling evidence for a tendency to hyperactively detect agents, and substantial null findings suggest no such bias exists.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">0</div><div class="sl">Confirmed empirical studies</div></div>
    <div class="st"><div class="sv">Multiple</div><div class="sl">Null findings published</div></div>
    <div class="st"><div class="sv">2025</div><div class="sl">Alternative theory proposed</div></div>
  </div>
  <ul class="s-list con">
    <li>No experiments have demonstrated that humans preferentially detect agents over non-agents in ambiguous stimuli</li>
    <li>Studies attempting to measure agency over-detection have produced null results</li>
    <li>The theory was proposed as a just-so evolutionary story without being subjected to rigorous experimental testing</li>
    <li>HADD may be unfalsifiable as originally formulated: any agent-related cognition can be attributed to it post hoc</li>
  </ul>
  <p>The proposed alternative: supernatural agent beliefs arise from effortful mental state reasoning (using Theory of Mind to explain phenomena beyond current causal understanding), not from automatic, hyperactive detection. This is a non-automatic, cognitively effortful process &mdash; the opposite of what HADD predicts.</p>
  <div class="security-box"><h4>A Field Built on Sand?</h4><p>If HADD is not empirically supported, then the most widely cited mechanism in CSR &mdash; the one that appears in virtually every textbook and popular account &mdash; may be a theoretical edifice built on assumption rather than evidence. This does not invalidate CSR as a field, but it does require significant theoretical revision. The other pillars (ToM, MCI concepts, teleological bias) have stronger empirical foundations.</p></div>`,

  // 06 — Enactivist Turn
  `<p>A 2024 publication by LeRon Shults and colleagues<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/2153599X.2024.2378168">[9]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/2153599X.2024.2378168" target="_blank">LeRon Shults et al.: Embodied CSR (2024) &rarr;</a></span></sup> argues for reconstructing CSR along enactivist lines. The critique: seminal CSR work relies on a cognitivist model (mind as information processor, modular cognition) that is increasingly contested in cognitive science itself. If the underlying model of mind is wrong, the theories built on it may need revision.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Cognitivist CSR</h4><p>Mind as modular computer: separate modules for agency detection, ToM, causal reasoning. Religion emerges when modules &ldquo;misfire.&rdquo; Disembodied, culture-independent cognitive architecture.</p></div>
    <div class="feat"><h4>Enactivist CSR</h4><p>Mind as embodied, embedded, enacted, and extended. Religious cognition emerges from the dynamic interaction of brain, body, and cultural environment. No strict module boundaries. Context-dependent.</p></div>
  </div>
  <p>The enactivist approach does not reject CSR&rsquo;s core question (why are humans religious?) but reframes it: religious cognition is not a modular malfunction but an emergent property of how embodied agents navigate meaning in their social and material environments. This resolves some standing problems (like the culture-variability of religious forms) but makes the science harder to do (fewer clean experimental predictions).</p>`,

  // 07 — Key Figures
  `<h4>Foundational Researchers</h4>
  <div class="feat-grid">
    <div class="feat"><h4>Pascal Boyer</h4><p>Cognitive anthropologist. &ldquo;Religion Explained&rdquo; (2001). Minimally counterintuitive concepts. Religion as byproduct of domain-specific inference systems. The brain generates religious ideas; culture selects among them.</p></div>
    <div class="feat"><h4>Justin Barrett</h4><p>Psychologist, Fuller Seminary. HADD hypothesis. &ldquo;Why Would Anyone Believe in God?&rdquo; (2004). &ldquo;Born Believers&rdquo; (2012). Children as naturally religious. Devout Christian doing cognitive science of religion.</p></div>
    <div class="feat"><h4>Scott Atran</h4><p>Cognitive anthropologist, CNRS/Michigan. &ldquo;In Gods We Trust&rdquo; (2002). Evolutionary landscape approach. Religion as byproduct of modular cognition. Fieldwork with jihadists and sacred values.</p></div>
    <div class="feat"><h4>Deborah Kelemen</h4><p>Developmental psychologist, Boston University. &ldquo;Promiscuous teleology&rdquo; in children. &ldquo;Intuitive theism&rdquo; hypothesis. Children default to purpose-based reasoning that makes creationism cognitively natural.</p></div>
    <div class="feat"><h4>Jesse Bering</h4><p>Evolutionary psychologist. &ldquo;The Belief Instinct&rdquo; (2011). Theory of Mind as basis for afterlife beliefs. Humans cannot help attributing mental states to the dead.</p></div>
    <div class="feat"><h4>Ara Norenzayan</h4><p>Social psychologist, UBC. &ldquo;Big Gods&rdquo; (2013). Prosocial religion hypothesis. Supernatural monitoring enables large-scale cooperation. Cross-cultural experimental work.</p></div>
  </div>`,

  // 08 — Open Questions
  `<p>The cognitive science of religion has made remarkable progress in explaining why religious ideas are <em>intuitive</em> and <em>memorable</em>. But several fundamental questions remain unresolved:</p>
  <ul class="s-list">
    <li><strong>From intuition to commitment:</strong> Why do some people go from finding religious ideas plausible to organizing their entire lives around them? Cognitive naturalness explains prevalence, not depth of commitment.</li>
    <li><strong>Individual variation:</strong> If the cognitive foundations of religion are universal, why do some people in every culture remain non-religious? What cognitive, personality, or environmental factors predict religious skepticism?</li>
    <li><strong>Cultural elaboration:</strong> How do simple cognitive biases become elaborate theological systems with doctrines, hierarchies, and institutions? The gap between cognitive seed and cultural tree is enormous.</li>
    <li><strong>The secularization puzzle:</strong> If religion is cognitively natural, why are some of the most educated, prosperous societies becoming rapidly secular? What overrides the natural cognitive pull?</li>
    <li><strong>Methodology:</strong> Much CSR evidence comes from Western undergraduate samples. How well do findings generalize to non-WEIRD populations where religion takes very different forms?</li>
    <li><strong>The replication question:</strong> Which CSR findings will survive the replication crisis? HADD appears to be failing. What else might not replicate?</li>
  </ul>
  <div class="callout"><h4>The Deepest Question</h4><p>Cognitive science can explain why religious ideas are natural for human minds. What it cannot answer is whether the naturalness of religious cognition counts as evidence for or against the truth of religious claims. Barrett, a devout Christian, argues that God designed minds to detect him. Dennett, a committed atheist, argues the same evidence shows religion is a cognitive illusion. The science is compatible with both interpretations.</p></div>`
];

const details = summaries.map((s, i) => `<div class="detail-header"><div class="num">SECTION ${sections[i].num}</div><h2>${sections[i].title}</h2></div>${s}`);

document.addEventListener('DOMContentLoaded', function() {
  const shell = document.querySelector('.shell');
  const sidebarNav = document.querySelector('.sidebar-nav');
  const mainScroll = document.querySelector('.main-scroll');
  const right = document.querySelector('.right');
  const rightInner = document.querySelector('.right-inner');
  const mainHead = document.querySelector('.main-head');

  sections.forEach((sec, idx) => {
    const item = document.createElement('div');
    item.className = `sidebar-item${idx === 0 ? ' active' : ''}`;
    item.innerHTML = `<div class="sidebar-num">${sec.num}</div><div class="sidebar-label">${sec.short}</div>`;
    item.addEventListener('click', () => selectSection(idx));
    sidebarNav.appendChild(item);
  });

  function selectSection(idx) {
    document.querySelectorAll('.sidebar-item').forEach(it => it.classList.remove('active'));
    document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
    const sec = sections[idx];
    mainHead.innerHTML = `<div class="main-head-inner"><div class="hero-badge"><span class="dot"></span>SECTION ${sec.num}</div><h1 class="hero-title">${sec.title}</h1><div class="masthead-rule"></div></div>`;
    mainScroll.innerHTML = `<div class="main-scroll-inner">${summaries[idx]}</div>`;
  }

  function showDetail(idx) {
    rightInner.innerHTML = details[idx];
    const d = rightInner.querySelector('.detail-header + *');
    if(d) d.style.display = 'block';
    right.classList.remove('closed');
    document.body.classList.add('detail-open');
  }

  document.querySelector('.detail-btn').addEventListener('click', () => {
    if (document.body.classList.contains('detail-open')) {
      right.classList.add('closed');
      document.body.classList.remove('detail-open');
    } else {
      const activeIdx = Array.from(document.querySelectorAll('.sidebar-item')).findIndex(it => it.classList.contains('active'));
      showDetail(activeIdx);
    }
  });

  document.querySelector('.theme-btn').addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme') || 'light';
    document.body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  });

  mainScroll.addEventListener('scroll', function() {
    mainHead.classList.toggle('compact', this.scrollTop > 20);
  });

  selectSection(0);
});
</script>

    <div class="main-head"><div class="main-head-inner">
      <div class="hero-badge"><span class="dot"></span>SECTION 1 &middot; COGNITIVE SCIENCE</div>
      <h1 class="hero-title"><em>Cognitive</em> Science of Religion</h1>
      <div class="masthead-rule"></div>
    </div></div>
    <div class="main-scroll"><div class="main-scroll-inner"></div></div>
  </div>
  <div class="right closed"><div class="right-topbar"><div class="sticky-title"></div></div><div class="right-inner"></div></div>

    <button class="ctrl-btn detail-btn"><svg class="icon-open" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h14v14H1z"></path><path d="M8.5 4v8M6 6.5h5"></path></svg><svg class="icon-close" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l14 14M15 1L1 15"></path></svg></button>
    <button class="ctrl-btn theme-btn"></button>
  </div>
</div>
