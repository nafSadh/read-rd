<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Path Model', title: 'The <em>Willard-Norenzayan</em> Path Model' },
  { num: '02', short: 'Teleology', title: '<em>Promiscuous</em> Teleology' },
  { num: '03', short: 'Dualism', title: '<em>Intuitive</em> Dualism' },
  { num: '04', short: 'Dual Process', title: '<em>Dual-Process</em> Theory &amp; Belief' },
  { num: '05', short: 'CRT Studies', title: 'The <em>Cognitive</em> Reflection Test' },
  { num: '06', short: 'Motivated', title: '<em>Motivated</em> Reasoning' },
  { num: '07', short: 'Cross-Cultural', title: '<em>Cross-Cultural</em> Variation' },
  { num: '08', short: 'Limits', title: '<em>Limits</em> of the Cognitive Account' }
];

const summaries = [
  // 01
  `<p>Willard and Norenzayan (2013)<sup class="fn"><a href="https://www.sciencedirect.com/science/article/abs/pii/S0010027713001492">[1]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/abs/pii/S0010027713001492" target="_blank">Willard &amp; Norenzayan: Cognitive Biases Explain Religious Belief (2013) &rarr;</a></span></sup> built the first comprehensive path model testing how multiple cognitive biases jointly predict religious belief. Their model measured four biases &mdash; mentalizing (tendency to attribute minds), dualism (mind-body separation), teleological thinking (purpose attribution), and anthropomorphism (projecting human traits onto non-human entities) &mdash; and traced their independent and interactive effects on belief in God.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">WILLARD-NORENZAYAN PATH MODEL (2013)</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5" class="edge"/>
    <rect x="20" y="50" width="100" height="40" class="node" rx="3"/>
    <text x="70" y="74" text-anchor="middle" class="node-text" font-size="10">Mentalizing</text>
    <rect x="20" y="110" width="100" height="40" class="node" rx="3"/>
    <text x="70" y="134" text-anchor="middle" class="node-text" font-size="10">Teleology</text>
    <rect x="190" y="50" width="110" height="40" class="node-hi" rx="3"/>
    <text x="245" y="74" text-anchor="middle" class="node-text" font-size="10">Dualism</text>
    <rect x="190" y="110" width="110" height="40" class="node" rx="3"/>
    <text x="245" y="128" text-anchor="middle" class="node-text" font-size="10">Anthropo-</text>
    <text x="245" y="140" text-anchor="middle" class="node-text" font-size="10">morphism</text>
    <rect x="370" y="80" width="110" height="40" class="node-hi" rx="3"/>
    <text x="425" y="104" text-anchor="middle" class="node-text" font-size="10">Belief in God</text>
    <line x1="120" y1="70" x2="190" y2="70" class="edge" stroke-width="1.5"/>
    <line x1="300" y1="70" x2="370" y2="95" class="edge" stroke-width="1.5"/>
    <line x1="120" y1="130" x2="370" y2="105" class="edge" stroke-width="0.8"/>
    <line x1="300" y1="130" x2="370" y2="105" class="edge" stroke-width="0.8"/>
    <text x="155" y="62" font-size="8" class="lbl-hi">mediates</text>
  </svg></div>
  <p>The key finding: dualism mediates the mentalizing-belief link. People who are high mentalizers believe in God partly because mentalizing fosters the intuition that minds are separate from bodies &mdash; and if minds are separate from bodies, then disembodied minds (God, spirits, souls) become conceivable. The Czech-Slovak replication (Willard et al. 2020)<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1948550619841629">[2]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1948550619841629" target="_blank">Willard, Cingl &amp; Norenzayan: Czech/Slovak Replication (2020) &rarr;</a></span></sup> confirmed the anthropomorphism path cross-culturally.</p>`,

  // 02
  `<p>Deborah Kelemen<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1111/j.0956-7976.2004.00672.x">[3]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1111/j.0956-7976.2004.00672.x" target="_blank">Kelemen: Are Children Intuitive Theists? (2004) &rarr;</a></span></sup> showed that children default to teleological explanations &mdash; attributing purpose to natural phenomena. Rocks exist &ldquo;for animals to scratch on.&rdquo; Rain happens &ldquo;so plants can drink.&rdquo; This &ldquo;promiscuous teleology&rdquo; peaks around age 5 but never fully disappears: adults under cognitive load, and even professional scientists responding quickly, endorse teleological statements about nature.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Age 5</div><div class="sl">Peak teleological reasoning</div></div>
    <div class="st"><div class="sv">Adults</div><div class="sl">Revert under cognitive load</div></div>
    <div class="st"><div class="sv">Scientists</div><div class="sl">Endorse teleology under time pressure</div></div>
  </div>
  <p>Teleological thinking makes design-based theological arguments &mdash; &ldquo;the universe was created for a purpose&rdquo; &mdash; feel intuitively right in a way that mechanistic explanations do not. The cognitive deck is stacked: rejecting teleology requires active System 2 intervention against a deep System 1 default. This is one reason why creationist arguments are intuitively appealing even to people who intellectually accept evolution.</p>
  <div class="callout"><h4>Teleology and Life Events</h4><p>Banerjee and Bloom (2014)<sup class="fn"><a href="https://www.sciencedirect.com/science/article/abs/pii/S0010027714001358">[4]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/abs/pii/S0010027714001358" target="_blank">Banerjee &amp; Bloom: Why Did This Happen to Me? (2014) &rarr;</a></span></sup> showed that both believers and non-believers tend toward teleological reasoning about life events (&ldquo;this happened for a reason&rdquo;) especially under cognitive load. The tendency to see purpose in events is not exclusively religious &mdash; it is a deep cognitive default that religion elaborates but does not create.</p></div>`,

  // 03
  `<p>Humans naturally separate mind from body, intuiting that conscious experience is fundamentally different from the physical brain. This &ldquo;intuitive dualism&rdquo; (Bloom, 2004) makes a range of religious ideas feel natural: souls, afterlives, ghosts, reincarnation, and disembodied divine minds. If the mind feels separate from the body, then survival of the mind after bodily death feels plausible.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Developmental Evidence</h4><p>Children as young as 4 distinguish between the mind and the body, saying that thoughts cannot be physically touched. They readily accept that mental life could continue after physical death.</p></div>
    <div class="feat"><h4>The Hard Problem Connection</h4><p>Intuitive dualism maps onto philosophy&rsquo;s &ldquo;hard problem of consciousness.&rdquo; The subjective feeling that consciousness is non-physical is not just philosophical speculation &mdash; it is a deep cognitive intuition that religion exploits.</p></div>
    <div class="feat"><h4>Cross-Cultural Universality</h4><p>Afterlife beliefs appear in virtually every known culture. While their specific form varies, the underlying intuition &mdash; that something mental survives physical death &mdash; appears to be a human cognitive universal.</p></div>
    <div class="feat"><h4>The Mediating Role</h4><p>In the Willard-Norenzayan model, dualism mediates the relationship between mentalizing and belief. High mentalizers are more dualistic, and more dualistic people are more likely to believe in God and afterlife.</p></div>
  </div>`,

  // 04
  `<p>Daniel Kahneman&rsquo;s System 1 / System 2 framework<sup class="fn"><a href="https://en.wikipedia.org/wiki/Dual_process_theory">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Dual_process_theory" target="_blank">Dual Process Theory &mdash; System 1 / System 2 &rarr;</a></span></sup> &mdash; fast intuitive thinking versus slow analytical thinking &mdash; maps naturally onto the psychology of religious belief. Religious ideas are generated by System 1: pattern completion, agent detection, teleological inference, and dualism intuition all operate automatically. System 2 analytical thinking can interrogate these intuitions, but it requires effort and is not the default mode.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">DUAL-PROCESS MODEL OF BELIEF</text>
    <line x1="40" y1="28" x2="460" y2="28" stroke="currentColor" stroke-width="0.5" class="edge"/>
    <rect x="30" y="45" width="180" height="55" class="node-hi" rx="3"/>
    <text x="120" y="65" text-anchor="middle" class="node-text" font-size="11">System 1 (Intuitive)</text>
    <text x="120" y="80" text-anchor="middle" class="node-sub">Agent detection, teleology,</text>
    <text x="120" y="90" text-anchor="middle" class="node-sub">dualism, pattern-finding</text>
    <rect x="290" y="45" width="180" height="55" class="node" rx="3"/>
    <text x="380" y="65" text-anchor="middle" class="node-text" font-size="11">System 2 (Analytical)</text>
    <text x="380" y="80" text-anchor="middle" class="node-sub">Logic, evidence evaluation,</text>
    <text x="380" y="90" text-anchor="middle" class="node-sub">hypothesis testing</text>
    <text x="120" y="125" text-anchor="middle" font-size="9" class="lbl-hi">Generates religious intuitions</text>
    <text x="380" y="125" text-anchor="middle" font-size="9" class="lbl">Can override &mdash; but often doesn&rsquo;t</text>
    <text x="250" y="150" text-anchor="middle" font-size="9" class="lbl">Most people most of the time rely on System 1 for existential questions</text>
  </svg></div>
  <p>The dual-process account explains why analytic thinkers tend toward lower religiosity and why inducing analytical thinking (even through subtle primes like showing images of Rodin&rsquo;s &ldquo;The Thinker&rdquo;) temporarily decreases religious endorsement. But the relationship between analytical thinking and non-belief is far more complex than early studies suggested.</p>`,

  // 05
  `<p>The Cognitive Reflection Test (CRT) measures the tendency to override intuitive (System 1) responses with reflective (System 2) responses.<sup class="fn"><a href="https://www.cambridge.org/core/journals/judgment-and-decision-making/article/cognitive-reflection-and-religious-belief-a-test-of-two-models/5EFE1B122D8D4DC44CF2F0F330D50C0B">[6]</a><span class="tip"><a href="https://www.cambridge.org/core/journals/judgment-and-decision-making/article/cognitive-reflection-and-religious-belief-a-test-of-two-models/5EFE1B122D8D4DC44CF2F0F330D50C0B" target="_blank">Pennycook et al.: Cognitive Reflection and Religious Belief (2012) &rarr;</a></span></sup> Classic item: &ldquo;A bat and a ball cost $1.10. The bat costs $1.00 more than the ball. How much does the ball cost?&rdquo; (Intuitive answer: 10 cents. Correct answer: 5 cents.) Higher CRT scores consistently correlate with lower religiosity.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">18.7%</div><div class="sl">Atheist CRT advantage</div></div>
    <div class="st"><div class="sv">50K+</div><div class="sl">Participants across 16 countries</div></div>
    <div class="st"><div class="sv">Modest</div><div class="sl">Effect size</div></div>
  </div>
  <p>Pennycook et al. found that self-identified atheists scored 18.7% higher than religiously affiliated individuals on composite analytic thinking measures. But the effect is modest in absolute terms and shows significant cross-cultural variation: in some countries, the CRT-religiosity correlation disappears entirely. Analytical thinking may predict willingness to question local norms rather than atheism specifically.</p>
  <div class="security-box"><h4>Methodological Caution</h4><p>The &ldquo;analytic atheist&rdquo; finding has faced replication concerns. The CRT is a brief measure of one narrow aspect of cognition. It cannot capture the full complexity of why people believe or disbelieve. Highly analytical people can be devoutly religious; highly intuitive people can be staunch atheists. The correlation is real but explains only a small fraction of the variance in belief.</p></div>`,

  // 06
  `<p>Cognitive biases explain why religious ideas feel <em>intuitive</em>. Motivated reasoning explains why they are <em>maintained</em> against countervailing evidence. Once religious beliefs become part of a person&rsquo;s identity and social world, a suite of reasoning biases kicks in to protect them.<sup class="fn"><a href="https://www.academia.edu/125289808/Review_of_Luke_Galen_A_Social_Cognition_Perspective_of_the_Psychology_of_Religion_Why_God_Thinks_Like_You">[7]</a><span class="tip"><a href="https://www.academia.edu/125289808/Review_of_Luke_Galen_A_Social_Cognition_Perspective_of_the_Psychology_of_Religion_Why_God_Thinks_Like_You" target="_blank">Galen: Social Cognition Perspective on Psychology of Religion (2024) &rarr;</a></span></sup></p>
  <ul class="s-list">
    <li><strong>Confirmation bias:</strong> Selectively attending to evidence that supports existing beliefs. Answered prayers are remembered; unanswered ones are explained away or forgotten.</li>
    <li><strong>Attribution bias:</strong> Positive outcomes are attributed to divine intervention; negative outcomes are framed as &ldquo;tests&rdquo; or &ldquo;mysterious ways.&rdquo; The framework is unfalsifiable by design.</li>
    <li><strong>Identity-protective cognition:</strong> When beliefs are tied to social identity (community membership, family bonds, moral framework), challenging them feels like a threat to the self.</li>
    <li><strong>Cognitive dissonance reduction:</strong> When faced with contradictions between belief and evidence, people adjust their interpretation of evidence rather than their beliefs.</li>
    <li><strong>Social reinforcement:</strong> Belief is maintained through community consensus, ritual participation, and the social costs of doubt.</li>
  </ul>
  <div class="callout"><h4>The Asymmetry</h4><p>Motivated reasoning is not unique to religious belief &mdash; it operates on political, scientific, and personal beliefs alike. What makes religious motivated reasoning distinctive is the stakes: religious beliefs are often tied to meaning, mortality, social belonging, and moral identity simultaneously, creating unusually strong motivation to maintain them.</p></div>`,

  // 07
  `<p>The cognitive bias account of religious belief has been tested across cultures with varying results.<sup class="fn"><a href="https://www.sciencedirect.com/science/article/abs/pii/S2352250X20301950">[8]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/abs/pii/S2352250X20301950" target="_blank">Lindeman &amp; Aarnio: Cognitive Styles and Religion (2021) &rarr;</a></span></sup> The core finding &mdash; that mentalizing, teleology, and dualism predict belief &mdash; replicates in Czech and Slovak samples (Willard et al. 2020). But the strength of specific pathways varies significantly across cultural contexts.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Western Samples</h4><p>Strong CRT-religiosity correlation. Analytical thinking predicts lower belief. But these samples are WEIRD (Western, Educated, Industrialized, Rich, Democratic) and may not generalize.</p></div>
    <div class="feat"><h4>East Asian Evidence</h4><p>The CRT-religiosity link is weaker or absent in some East Asian samples, where religious practice often coexists with analytical thinking traditions (e.g., Buddhist philosophy).</p></div>
    <div class="feat"><h4>The Czech Anomaly</h4><p>Czech Republic has one of the world&rsquo;s lowest religiosity rates despite average cognitive reflection scores. Cultural history (communist atheism, Hussite tradition) matters as much as individual cognition.</p></div>
    <div class="feat"><h4>Muslim-Majority Contexts</h4><p>Scrupulosity research in Kashmir shows religious OCD patterns similar to Western samples, suggesting some cognitive mechanisms are universal while cultural content varies.</p></div>
  </div>
  <div class="callout"><h4>The Culture Problem</h4><p>Cognitive biases may be necessary but not sufficient for religious belief. Cultural context &mdash; what beliefs are locally available, socially rewarded, and institutionally supported &mdash; determines which cognitive potentials are actualized. Individual cognition explains variation within cultures; cultural history explains variation between them.</p></div>`,

  // 08
  `<p>The cognitive bias account of religious belief is powerful but has clear limits. It explains why religious ideas are <em>intuitive</em> but struggles with several deeper questions:</p>
  <ul class="s-list">
    <li><strong>The commitment gap:</strong> Finding something intuitive is different from organizing your life around it. Cognitive biases explain prevalence, not depth of commitment, sacrifice, or religious experience.</li>
    <li><strong>The content problem:</strong> Cognitive biases predict that humans will be religious, not what they will believe. Why Christianity rather than Buddhism? Why monotheism rather than animism? Content comes from culture, not cognition.</li>
    <li><strong>The sophisticated believer:</strong> Many deeply religious people are highly analytical, educated, and aware of cognitive biases. The model predicts they shouldn&rsquo;t believe, but they do. Belief can be reflective, not just intuitive.</li>
    <li><strong>The experiential dimension:</strong> Religious experience &mdash; mystical states, conversion moments, feelings of divine presence &mdash; is poorly captured by the bias model. These are not cognitive errors but altered states of consciousness with their own phenomenology.</li>
    <li><strong>The meaning question:</strong> Cognitive science can explain the mechanisms of belief but not whether beliefs are true or false. Showing that a belief is cognitively natural says nothing about its truth value.</li>
  </ul>
  <div class="callout"><h4>Maps and Territory</h4><p>The cognitive bias account is a map of the cognitive terrain on which religious belief grows. It is a good map &mdash; detailed, empirically grounded, increasingly cross-cultural. But a map of the terrain is not the terrain itself. Religion is also community, practice, experience, meaning, and identity &mdash; dimensions that the cognitive account acknowledges but cannot fully capture.</p></div>`
];
