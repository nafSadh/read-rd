    <h2>From Letting Go to <em>Continuing</em></h2>
  </div>
  <p>The history of grief theory is, in many ways, a history of telling people to stop loving the dead. Freud&rsquo;s 1917 essay &ldquo;Mourning and Melancholia&rdquo; established the framework: healthy mourning requires &ldquo;grief work&rdquo; &mdash; the systematic withdrawal of emotional energy (libido) from the lost object. Those who don&rsquo;t let go are stuck. Bowlby&rsquo;s attachment theory, while more nuanced, similarly emphasized that the final stage of grief was &ldquo;reorganization&rdquo; &mdash; forming new attachments, not maintaining old ones.</p>

  <h3>The Continuing Bonds Revolution</h3>
  <p>In the early 1990s, three researchers independently observed the same thing: bereaved people who maintained connections with their lost loved ones were not stuck. They were coping. Dennis Klass studied bereaved parents. Phyllis Silverman studied bereaved children. Steven Nickman studied adoptees. All found that the living continued to include the dead in their lives &mdash; through conversation, through ritual, through dreams &mdash; and this inclusion was associated with adjustment, not pathology.</p>
  <p>Their 1996 anthology, <em>Continuing Bonds: New Understandings of Grief</em>, fundamentally changed the field. The message was radical for its time: you do not need to &ldquo;get over&rdquo; the person. You need to find a new form for the relationship. The bond continues &mdash; it just transforms.</p>

  <h3>Cultural Precedent</h3>
  <p>The Western psychological model was an outlier. Ancient Roman <em>parentalia</em> festivals, Egyptian ancestor cults, medieval All Souls&rsquo; Day, Victorian hair jewelry and death photography &mdash; cultures throughout history maintained active relationships with the dead. The 20th-century insistence on severing bonds was historically anomalous, not normative.</p>

  <h3>Implications for Divorce Grief</h3>
  <p>The application is not straightforward: continuing bonds theory was developed for bereavement &mdash; loss through death. Divorce is a different animal. The person is alive. The bond was severed by choice (or by the other person&rsquo;s choice), not by fate. The dreamer may be simultaneously grieving the lost relationship and building a new one. The continuing bond cannot simply transform into a comfortable, internalized presence when the ex-partner still exists in the world and can be contacted, encountered, or compared to. The persistence of the ex&rsquo;s voice in dreams may represent the psyche&rsquo;s attempt to do continuing-bond work in a situation where the usual frameworks &mdash; designed for the dead &mdash; don&rsquo;t quite fit.</p>

    <h2>How <em>Common</em> Are Grief Dreams?</h2>
  </div>
  <p>Joshua Black has become the leading researcher on grief dreams, driven by a personal experience: a dream of his deceased father that transformed his own grief and redirected his career from elementary education to research psychology.</p>

  <h3>The Numbers</h3>
  <p>Black and colleagues (2024) analyzed data from 268 adults who had lost a romantic partner and 199 who had lost a pet. The prevalence figures are striking: 73.5% of partner mourners reported dreaming of the deceased within the past month. For spousal loss specifically, 86% dream of the lost partner within the first year. And half &mdash; 50.7% &mdash; also report waking experiences: seeing, hearing, or feeling the deceased while awake.</p>
  <p>The correlation between dreaming and waking experiences is significant. Those who dream of the deceased are substantially more likely to also report waking encounters. This suggests a general &ldquo;openness to connection&rdquo; &mdash; a cognitive-emotional style that maintains the bond across both states of consciousness.</p>

  <h3>Content Patterns</h3>
  <p>Black&rsquo;s content analysis reveals that 92% of spousal grief dreams are positive &mdash; the deceased appears healthy, happy, and reassuring. Initial grief dreams tend to offer reassurance. When the deceased keeps returning over time, it provides a sense of continuity. Toward end of life, the deceased may appear to help ease the dying person&rsquo;s transition. Negative dreams are more common when the loss was sudden, violent, or accompanied by unresolved conflict.</p>
  <p>Dreams also change over time. In a longitudinal analysis of a dream journal following father loss, Black found that content and themes evolved as the dreamer healed. Early dreams focused on the grief itself. Later dreams used the deceased as a character in other contexts &mdash; giving advice, appearing in everyday situations. This mirrors Cartwright&rsquo;s finding about divorce dreams: the dream relationship transforms from intense to casual as processing occurs.</p>

  <h3>A Gap: Divorce Prevalence</h3>
  <p>No equivalent prevalence studies exist for divorce/separation grief dreams. The bereavement literature dominates. It can be inferred from the attachment literature that dreaming of a former partner is common (it&rsquo;s a standard attachment function scale item), but the 86% and 92%-positive figures are specific to death-related loss. Divorce grief dreams may show different prevalence and valence patterns because the person is alive, the loss was not universally legitimized, and the social context of the grief is more ambiguous.</p>

    <h2>Three <em>Functions</em> of Grief Dreams</h2>
  </div>
  <p>Black et al.&rsquo;s (2020) three-function model is the most comprehensive framework for understanding grief dreams. Studying 216 individuals who had lost a romantic partner, they found that different types of dreams serve different purposes &mdash; and that the same dreamer may experience all three types at different stages.</p>

  <h3>Function 1: Trauma Processing</h3>
  <p>When the loss was sudden, violent, or traumatic, dreams may replay distressing elements. These are closer to trauma dreams or nightmares than to the comforting visitation pattern. They are associated with PTSD symptoms and may represent the brain&rsquo;s attempt to habituate to the traumatic material &mdash; the same desensitization process that PTSD nightmare treatments try to facilitate. These dreams are more common with anxious attachment styles and externalized bonds.</p>

  <h3>Function 2: Continuing Bond</h3>
  <p>The majority pattern: the deceased appears healthy, happy, communicative. The dreamer may receive comfort, advice, or simply enjoy the person&rsquo;s presence. These dreams are associated with internalized continuing bonds &mdash; the dreamer has integrated the lost person into their ongoing inner world. They provide what the waking world can no longer: direct contact. For many dreamers, these experiences are the most healing aspect of their grief process.</p>

  <h3>Function 3: Emotion Regulation</h3>
  <p>Dreams where the deceased appears in a neutral, casual, or distant context. The emotional charge is reduced. These dreams mark the transition from acute grief to adapted grief &mdash; the dream relationship is metabolizing from intense to ordinary. Cartwright&rsquo;s work on divorce dreams specifically identified this: when the ex-spouse appears casually rather than intensely, recovery is underway.</p>

  <p>Black et al.&rsquo;s work is valuable but the framework assumes grief dreams contain the lost person as a <em>character</em>. What about dreams where the person doesn&rsquo;t appear but their words do? Where the grief manifests not as a visitation but as a vocabulary? This is a fourth category the model doesn&rsquo;t account for: <strong>incorporation dreams</strong> &mdash; where the bond expresses itself through absorbed language rather than through character appearance.</p>

    <h2><em>Divorce</em> Dreams &amp; Recovery</h2>
  </div>
  <p>Rosalind Cartwright&rsquo;s work at Rush Medical Center is the most directly relevant research for understanding dreams after marital separation. She designed a study to test whether people depressed from a recent breakup would adjust more rapidly if they could construct and recall emotionally rich dreams &mdash; and whether dreams featuring the ex-spouse, as they became less frequent and less negative, would predict depression remission.</p>

  <h3>The Recovery Trajectory</h3>
  <p>Cartwright found that emotional dream content follows a predictable trajectory in divorce recovery. Initially, dreams of the ex-spouse are intense, frequent, and often negative &mdash; replaying conflict, loss, or abandonment scenarios. Over time, in those who recover, the ex begins to appear more casually: in the background, in an incidental role, or in a neutral context. The relationship in the dream world metabolizes from central to peripheral.</p>
  <p>Crucially, those whose dreams remained intensely negative &mdash; whose ex-spouse continued to dominate dream content with high emotional charge &mdash; showed less recovery from depression. The dream pattern was not just a reflection of waking mood; it was a predictor of future adjustment. This suggests dreams play an active role in the emotional metabolism of loss, not just a passive one.</p>

  <h3>Divorce vs. Death: Different Grief, Different Dreams</h3>
  <p>Divorce grief has distinctive features that shape dream content differently from bereavement. The person is alive and may be encountered. The loss may not be socially legitimized (&ldquo;disenfranchised grief&rdquo;). There may be ongoing legal, financial, or logistical entanglement. And there is often ambivalence &mdash; anger coexisting with love, relief coexisting with loss &mdash; that pure bereavement may not carry.</p>
  <p>Dream content reflects this complexity. Divorce dreams often feature: struggling or inability to reach a destination (metaphorical processing of difficulty), the ex-spouse appearing ill or dying (processing the &ldquo;death&rdquo; of the relationship), being in love with someone new (permission-seeking), or environments that are familiar but distorted (identity disruption).</p>

  <div class="callout">
    <h4>The Low Hum</h4>
    <p>Cartwright&rsquo;s research supports what many divorced people describe: the ex doesn&rsquo;t appear in dreams as a dramatic visitation but as a persistent background presence &mdash; a low hum rather than a sharp note. The voice, the phrases, the emotional texture of the marriage persists in the dream world long after the waking relationship has ended. This is not pathology. It is the dream doing its job: slowly, over months and years, metabolizing the bond from acute to ambient.</p>
  </div>

    <h2>The Bond That <em>Persists</em></h2>
  </div>
  <p>Bowlby (1980) wrote that after attachment figure loss, &ldquo;the acute state of mourning will subside, but we also know we shall remain inconsolable and will never find a substitute. No matter what may fill the gap, even if it be filled completely, it nevertheless remains something else.&rdquo; Modern attachment research confirms this: the bond does not sever.</p>

  <h3>Non-Zero Attachment</h3>
  <p>Research using attachment function scales shows that people maintain a non-zero level of attachment-directed behavior toward former partners indefinitely after separation. This does not mean they are &ldquo;not over it&rdquo; &mdash; it means that the attachment system, once activated toward a specific person, does not fully deactivate. The intensity diminishes but the baseline never reaches zero. &ldquo;I have dreams about this person&rdquo; is a standard item on these scales, and it consistently scores above floor.</p>

  <h3>Internalized vs. Externalized Bonds</h3>
  <p>The systematic review of continuing bonds (2023, 79 studies) identified a critical distinction. Internalized bonds &mdash; positive memories, integrated identity aspects, dreams as connection &mdash; are generally associated with adaptive outcomes. Externalized bonds &mdash; yearning, searching, compulsive possession-keeping &mdash; are associated with distress, complicated grief, and poorer adjustment. The type of bond matters more than the presence of the bond.</p>
  <p>Dreams occupy an interesting position: they can be either. A comforting dream of the ex-partner is an internalized bond &mdash; the person is integrated into the dreamer&rsquo;s inner world. A dream characterized by searching, yearning, or inability to reach the person may be an externalized bond expression &mdash; the attachment system in pursuit mode, seeking what it cannot find.</p>

  <h3>New Attachments Don&rsquo;t Replace Old Ones</h3>
  <p>Attachment theory predicts that new romantic bonds do not erase old ones. They exist in parallel. A person forming a new attachment can simultaneously maintain a continuing bond with a former partner &mdash; not as competition but as layers. The dreaming brain, processing both high-intensity streams (new excitement, old grief), may produce dreams that juxtapose or interleave both. Falling asleep thinking about someone new and dreaming about someone old is not contradiction; it is concurrent processing.</p>

    <h2>The Ex&rsquo;s <em>Voice</em></h2>
  </div>
  <p>Here we reach the phenomenon that existing frameworks don&rsquo;t fully capture: the continuing bond expressing itself not through the ex-partner&rsquo;s image but through their language. Not a visitation but an inhabitation &mdash; the dreamer speaking in the other person&rsquo;s emotional vocabulary at the moment of distress.</p>

  <h3>Beyond Visitation</h3>
  <p>The grief dream literature (Black, Cartwright, Garfield) categorizes dreams primarily by character presence: does the deceased/ex appear? What do they look like? What do they say? But there is a category of grief dream where the lost person does not appear as a character at all. Instead, their presence is carried by something more intimate: their specific phrases, their way of expressing pain, their emotional vocabulary. The dreamer is alone in the dream, struggling, and when they finally speak, they speak in someone else&rsquo;s words.</p>

  <h3>How This Happens: A Synthesis</h3>
  <p>Drawing together the threads from S1 (Incorporation):</p>
  <p>The phrase was spoken during a high-intensity emotional experience (separation). The continuity hypothesis predicts it will enter dream content. The hippocampal recombination engine fragments the episodic memory &mdash; detaching the phrase from the face, the room, the context. Inner speech mechanisms make it available as the dreamer&rsquo;s own utterance. Without executive sourcing (the prefrontal cortex is offline), there is no automatic mechanism to tag it as &ldquo;someone else&rsquo;s words.&rdquo;</p>
  <p>The result: the dreamer speaks the phrase as if it were their own expression of their own pain. Which, at this point, it may be. Through repeated incorporation, through emotional resonance, through the continuing bond, the ex-partner&rsquo;s vocabulary for suffering has become the dreamer&rsquo;s vocabulary for suffering. The borrowing is complete.</p>

  <h3>The Recognition Moment</h3>
  <p>And then something unusual happens: the dreamer becomes lucid enough to recognize the source. &ldquo;That&rsquo;s something she said.&rdquo; This is a metacognitive act of extraordinary precision &mdash; source monitoring of inner speech during sleep, a function that normally requires prefrontal activation. The recognition simultaneously accomplishes two things: it confirms the continuing bond (the words are still alive, still resonant) and it re-establishes the self/other boundary (this is <em>her</em> pain, not mine, or at least not <em>only</em> mine). This recognition is the subject of S3.</p>

  <div class="callout">
    <h4>The Question That Remains</h4>
    <p>Is speaking in someone else&rsquo;s words a sign that the grief is unresolved? Or is it a sign that the incorporation is so complete that the other person&rsquo;s emotional vocabulary has genuinely become part of the dreamer&rsquo;s own? The literature doesn&rsquo;t answer this. Cartwright would say: watch where it goes. If the phrase recedes over time &mdash; if future dreams find the dreamer&rsquo;s own words for the pain &mdash; that is recovery. If the phrase persists unchanged, that is stasis. The dream trajectory, not any single dream, is what matters.</p>
  </div>
