const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.01 &mdash; Details</div><h2>The <em>Suppression-Reappraisal</em> Collapse</h2></div>
  <p>The most dangerous feature of toxic Stoicism is its invisibility. From the outside, cognitive reappraisal and expressive suppression look identical: the person appears calm, composed, and unflustered. The difference is entirely internal. The reappraiser has genuinely modulated their emotional response through cognitive engagement. The suppressor is still experiencing full emotional distress while masking it behaviorally.</p>
  <p>Pop Stoicism collapses this distinction by removing the cognitive work. When advice is reduced to "just don't let it affect you" or "control your emotions," the mechanism that distinguishes healthy reappraisal from harmful suppression is absent. The listener, lacking philosophical training, defaults to the easier strategy: suppression. They learn to hide their emotions rather than examine their judgments.</p>
  <h3>Why the Collapse Happens</h3>
  <p>Reappraisal is hard. It requires identifying the specific judgment generating the emotion, evaluating whether that judgment is accurate, generating alternative interpretations, and sustaining the new interpretation. This takes time, effort, and practice. Suppression is easy &mdash; just clamp down on the expression. Social media, which rewards simplicity and brevity, systematically selects for the suppression message because it's simpler to convey in 60 seconds.</p>
  <div class="callout"><h4>Key Insight</h4><p>The reappraisal-suppression collapse is the mechanism through which authentic Stoicism becomes toxic "stoicism." Any intervention that fails to teach the cognitive examination step &mdash; the actual work of inspecting impressions &mdash; will default to suppression regardless of the philosophical language used to describe it.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.02 &mdash; Details</div><h2><em>Broicism</em>: Manosphere Meets Marcus</h2></div>
  <p>The term "broicism" captures a specific cultural phenomenon: the manosphere's selective appropriation of Stoic philosophy to reinforce a narrow masculine identity centered on emotional suppression, endurance, and dominance. The appropriation is systematic &mdash; it takes precisely the elements that serve the manosphere's agenda and discards everything that would challenge it.</p>
  <p>Figures like Andrew Tate, "Sigma Male" content creators, and RedPill community influencers use Stoic language &mdash; emotional discipline, self-control, resilience &mdash; while ignoring Stoic substance. The Stoics taught that virtue (arete) is the sole good, that all humans share equal moral worth (cosmopolitanism), that we have duties to our communities, and that compassion is a rational response to shared humanity. None of this survives the broicist filter.</p>
  <h3>What Gets Kept</h3>
  <p>Endurance without purpose. Emotional suppression labeled as discipline. Individual dominance disguised as self-mastery. Indifference to others' suffering rebranded as detachment. Rigid self-reliance that precludes vulnerability and connection.</p>

  <p>Virtue ethics &mdash; the core of Stoic philosophy. Cosmopolitan compassion. Social duty and justice. The careful cognitive work of examining impressions. Self-knowledge through honest self-examination. Humility before the limits of human wisdom.</p>
  <div class="security-box"><h4>The Inversion</h4><p>Broicism is not a simplified version of Stoicism. It is an inversion. The Stoics taught that unexamined emotions lead to destructive behavior. Broicism uses Stoic language to justify exactly that: unexamined anger, pride, and dominance dressed up as self-control and resilience. The <em>Meditations</em> repeatedly identify unexamined anger, pride, and the desire for dominance as paradigmatic examples of the false judgments Stoic practice aims to correct.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.03 &mdash; Details</div><h2>The <em>TikTok</em> Distortion</h2></div>
  <p>A search for "Stoicism" on TikTok yields approximately 257,000 videos with a combined 2.5 billion views. The Paideia Institute's analysis of this content found that these posts lack precision, validity, and reliability. A professor of Greek philosophy concluded that TikTok promotes disinformation about Stoicism, often referencing different philosophical traditions or presenting particular interpretations as universal truths.</p>
  <p>The platform's format exacerbates the problem. Sixty-second videos cannot convey the cognitive work required for genuine Stoic practice. They can only convey the conclusion ("be unaffected") without the method ("examine your impressions through careful reasoning"). The algorithm rewards emotional engagement and controversy, selecting for provocative misstatements over careful accuracy.</p>

  <div class="callout"><h4>Key Insight</h4><p>TikTok's format is structurally incapable of conveying authentic Stoic practice because the practice requires cognitive engagement that cannot be transmitted in a 60-second video. The platform systematically selects for the suppression message over the reappraisal message because suppression is simpler to convey.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.04 &mdash; Details</div><h2><em>Emotional</em> Bypassing: When Stoicism Becomes Avoidance</h2></div>
  <p>Emotional bypassing occurs when philosophical or spiritual language is used to avoid confronting genuine emotional pain. In the context of Stoicism, it sounds like: "A Stoic wouldn't be upset about this," "I'm focusing on what I can control," or "Emotions are just judgments &mdash; I choose not to judge." These phrases can reflect genuine Stoic practice, or they can be sophisticated avoidance disguised in philosophical clothing.</p>
  <p>The distinction is subtle but clinically important. Authentic Stoic practice involves engaging with the emotional experience, examining the underlying judgment, and arriving at a more accurate interpretation through cognitive work. Emotional bypassing skips the engagement entirely, using Stoic concepts as a shield against experiences that need to be processed.</p>
  <h3>Clinical Consequences</h3>
  <p>Therapists report seeing clients who use Stoic language to resist therapeutic engagement. The Stoic framework, misapplied, can rationalize avoidance of painful but necessary therapeutic work: processing trauma memories, sitting with grief, acknowledging vulnerability. When a client says "Epictetus would say this isn't up to me" about their emotional response to childhood abuse, they may be using philosophy to avoid the processing that would actually help them heal.</p>
  <div class="callout"><h4>Key Insight</h4><p>The difference between Stoic practice and emotional bypassing is whether the person has actually done the cognitive work. If they have examined their impressions and arrived at a considered judgment, that is Stoicism. If they have used Stoic language to skip the examination entirely, that is avoidance with philosophical decoration.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.05 &mdash; Details</div><h2><em>Grief</em> Suppression vs. Stoic Processing</h2></div>
  <p>The pop interpretation that "a Stoic doesn't grieve" is one of the most harmful distortions. The historical record directly contradicts it. Seneca wrote three extended consolation letters addressing grief, and he explicitly acknowledged that grief in response to the death of loved ones is wholly natural for a period. Chrysippus composed texts of philosophical consolation. The Stoic approach to grief was not denial but processing through cognitive examination.</p>
  <p>Seneca's approach has a clear structure: acknowledge the grief, allow its natural expression for a time, then gradually apply reason to the judgments that sustain it beyond its natural course. He distinguished between grief as a natural first response (acceptable) and grief sustained by false beliefs about what we have lost (to be examined). This is remarkably close to modern cognitive processing therapy for complicated grief.</p>
  <h3>The Critics' Point</h3>
  <p>Philosophers Robert Solomon and Martha Nussbaum have argued that even authentic Stoicism treats emotions too negatively &mdash; as pathos (potentially pathological) that should be minimized. This critique has merit: there may be value in grief beyond what the Stoics acknowledged. Grief as an expression of love, grief as social connection, grief as meaning-making in the face of loss. The Stoic framework may be too quick to classify these as irrational simply because they involve attachment to things "not up to us."</p>
  <div class="callout"><h4>Key Insight</h4><p>The Stoic position on grief is nuanced and processual &mdash; acknowledge it, sit with it briefly, then examine the judgments sustaining it. This is closer to modern grief therapy than to the pop dismissal "just don't be sad." But the critics may be right that even authentic Stoicism undervalues grief's positive functions.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.06 &mdash; Details</div><h2><em>Dichotomy</em> of Control as Victim-Blaming</h2></div>
  <p>The dichotomy of control is the most widely cited and potentially the most dangerous Stoic principle when misapplied. Properly understood, it directs energy toward what one can influence while cultivating acceptance of what one cannot. Improperly applied, it becomes a tool for dismissing legitimate grievances about systemic injustice.</p>
  <p>The misuse sounds like: "You can't control racism, so stop complaining and focus on your attitude." "Poverty is outside your control, so accept it and work harder." "Your boss's harassment isn't up to you &mdash; only your response is." In each case, the dichotomy of control is used to redirect attention from systemic problems (which require collective action) to individual psychology (which can be managed alone). This effectively absolves oppressive systems of responsibility.</p>
  <h3>What the Stoics Actually Advocated</h3>
  <p>Marcus Aurelius emphasized social duty and community justice as central Stoic virtues. The Stoics taught cosmopolitanism &mdash; the conviction that all humans share equal moral worth and that we have obligations to the broader human community. The dichotomy of control was never meant to preclude working for justice; it was meant to focus that work on actions within your power rather than outcomes you cannot guarantee. <a href="https://modernstoicism.com/what-many-people-misunderstand-about-the-stoic-dichotomy-of-control-by-michael-tremblay/" target="_blank">Michael Tremblay</a>,<sup class="fn"><a>[6]</a><span class="tip"><a href="https://modernstoicism.com/what-many-people-misunderstand-about-the-stoic-dichotomy-of-control-by-michael-tremblay/" target="_blank">TX8 Tremblay: Dichotomy Misunderstandings &rarr;</a></span></sup> writing for Modern Stoicism, has addressed how common misreadings strip the dichotomy of its activist potential.</p>
  <div class="callout"><h4>Key Insight</h4><p>The dichotomy of control, properly understood, complements social justice activism: you can't control outcomes, but you can control your efforts to advocate for change. The misuse inverts this: it uses the philosophical framework to silence advocacy by reclassifying systemic injustice as individual psychological failure.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.07 &mdash; Details</div><h2><em>Masculinity</em> Norms &amp; Stoic Identity</h2></div>
  <p>A 2025 systematic review in PMC documented the health consequences of traditional masculinity norms that emphasize emotional stoicism (lowercase), self-reliance, and toughness. The findings are unambiguous: these norms are directly linked to risky coping behaviors as substitutes for emotional processing, significantly reduced willingness to seek mental health support, and worse psychological outcomes across multiple measures.</p>
  <p>The connection to Stoic philosophy is both semantic and cultural. The English word "stoic" (lowercase) has come to mean emotionally inexpressive, tough, and uncomplaining &mdash; which is how many men interpret the philosophy. When a young man encounters Stoic content on social media and already holds traditional masculinity norms, the philosophy appears to validate what he already believes: that real men don't show emotions, don't ask for help, and endure suffering silently.</p>
  <h3>The Tragic Irony</h3>
  <p>The irony is profound. The Stoic philosophers taught that unexamined emotions drive destructive behavior and that wisdom requires careful self-examination, honest acknowledgment of one's own limitations, and engagement with a community of fellow learners. Traditional masculinity norms &mdash; disguised in Stoic language &mdash; produce exactly the opposite: unexamined emotions, denial of limitations, and isolation from support. The philosophy is being used to justify the very pathology it was designed to cure.</p>
  <div class="security-box"><h4>Clinical Concern</h4><p>Mental health practitioners working with men should be alert to the use of Stoic language as justification for emotional avoidance and help-seeking resistance. The therapeutic response is not to dismiss Stoicism but to distinguish between the philosophy (which supports emotional examination) and the cultural appropriation (which enforces emotional suppression).</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.08 &mdash; Details</div><h2>What the <em>Stoics</em> Actually Said About Emotions</h2></div>
  <p>The Stoics drew a careful distinction between two categories of emotional experience that is almost entirely absent from popular presentations. Pathos (plural: pathe) referred to destructive passions &mdash; emotional responses based on false judgments about what is good, bad, or indifferent. Eupatheiai referred to appropriate emotional responses arising from correct judgments about the world. The goal was never emotional flatness but emotional accuracy.</p>
  <h3>The Three Eupatheiai</h3>
  <p>The Stoics identified three categories of healthy emotional response: rational joy (chara) in response to genuine goods (virtue, wisdom, justice); appropriate caution (eulabeia) regarding genuine threats to virtue; and virtuous wish (boulesis) directed toward genuine goods for oneself and others. These are not suppressed emotions &mdash; they are cultivated ones.</p>
  <h3>Apatheia: Freedom From, Not Absence Of</h3>
  <p>Apatheia, the Stoic ideal, means freedom from destructive passions (pathe), not the absence of all emotional experience. A person who has achieved apatheia still feels joy, concern, and fellow-feeling &mdash; but these arise from accurate judgments rather than from false beliefs. Seneca wept when friends died. Marcus Aurelius expressed deep affection for his teachers. The Stoic sage is not a robot but a person whose emotions are aligned with reality.</p>
  <div class="callout"><h4>Key Insight</h4><p>The claim that "the Stoics taught not to have emotions" is incorrect. The Stoics taught the cultivation of accurate emotional responses (eupatheiai) and the moderation of destructive ones (pathe). The popular conflation of Stoicism with emotional suppression is a failure of cultural transmission, not a feature of the philosophy.</p></div>`
