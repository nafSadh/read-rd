const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.01 &mdash; Details</div><h2><em>Robertson</em>&rsquo;s Bridge: Philosophy Meets Clinic</h2></div>
  <p>Donald Robertson occupies a unique position in modern Stoicism: he is both a credentialed cognitive-behavioral psychotherapist and a serious scholar of Stoic philosophy. This dual expertise allows him to bridge the gap between ancient philosophy and clinical psychology with a precision that neither philosophers nor therapists alone could achieve.</p>
  <p>His book <em>The Philosophy of Cognitive-Behavioural Therapy</em> (2010, 2nd edition 2019) is the definitive scholarly treatment of the Stoicism-CBT connection. It goes beyond noting historical parallels to systematically mapping specific Stoic exercises to specific therapeutic protocols. For each Stoic practice, Robertson identifies the corresponding CBT technique, the psychological mechanism, and the evidence base. The <a href="https://learn.donaldrobertson.name/p/stoic-therapy-toolkit" target="_blank">Stoic Therapy Toolkit</a><sup class="fn"><a>[8]</a><span class="tip"><a href="https://learn.donaldrobertson.name/p/stoic-therapy-toolkit" target="_blank">IC2 Robertson: Stoic Therapy Toolkit &rarr;</a></span></sup> provides practical clinical resources for practitioners who want to integrate Stoic elements into their therapeutic work.</p>
  <h3>The Philosophy-of-Life Advantage</h3>
  <p>Robertson's most provocative argument: Stoicism may be more effective than standard CBT for long-term outcomes because it provides a philosophy of life, not merely a set of coping techniques. Standard CBT teaches skills during a bounded therapeutic relationship. When therapy ends, skills can atrophy without practice. Stoicism, by contrast, offers an identity, a worldview, and a community. Someone who identifies as a Stoic practitioner has integrated the techniques into their self-concept. The practice persists because it is who they are, not something they learned to do in therapy.</p>
  <div class="callout"><h4>Key Insight</h4><p>Robertson's integration work demonstrates that Stoicism-CBT bridging can be done with scholarly rigor. His identity-integration hypothesis &mdash; that philosophy-of-life approaches may outperform technique-only approaches for long-term maintenance &mdash; is the most important testable prediction in empirical Stoicism.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.02 &mdash; Details</div><h2>The <em>Stockdale</em> Test</h2></div>
  <p>James Bond Stockdale, born in 1923, was a highly decorated U.S. Navy vice admiral who became the most extreme real-world test case for Stoic philosophy in modern history. As a 38-year-old graduate student at Stanford, he encountered Epictetus's <em>Enchiridion</em> and was deeply influenced. Seven years later, on September 9, 1965, his A-4 Skyhawk was shot down over North Vietnam. He was captured and imprisoned in the Hoa Lo Prison &mdash; the notorious "Hanoi Hilton."</p>
  <p>For seven and a half years, Stockdale endured conditions that would destroy most human beings: four years in isolation, two years in leg irons, tortured fifteen times in a manner he described as not unlike crucifixion. Throughout, he drew on Epictetus's teachings to maintain psychological coherence. He adapted the Stoic principle: "lameness is an impediment to the leg but not to the will" &mdash; a resonant echo from the formerly enslaved philosopher whose physical suffering Stockdale now shared.</p>
  <h3>Leadership Through Stoic Principles</h3>
  <p>Stockdale did not merely survive. He led. He organized prisoner resistance, established a code of conduct for his fellow POWs, and created communication systems that sustained morale and cohesion under extreme duress. His leadership was explicitly grounded in Stoic philosophy: distinguish what you can control (your conduct, your dignity, your choices) from what you cannot (your captors' behavior, your physical condition, the war's outcome), and invest everything in the former.</p>
  <h3>The Paradox</h3>
  <p>Stockdale later described what he called the "Stockdale Paradox": the optimists died first, because when their optimistic predictions (home by Christmas, home by Easter) failed, they died of broken hearts. The survivors combined acceptance of the brutal reality of their situation (genuine Stoic acceptance of what cannot be controlled) with faith that they would ultimately prevail (Stoic commitment to virtue and endurance). This is not suppression &mdash; it is the deepest form of cognitive reappraisal applied to the most extreme circumstances imaginable.</p>
  <div class="callout"><h4>Key Insight</h4><p>Stockdale's experience is not a clinical trial. It is a single case study under conditions no ethics board would approve. But it demonstrates something that clinical trials cannot: Stoic philosophy, genuinely practiced, can sustain a human being through years of torture, isolation, and captivity. No amount of suppression could achieve that.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.03 &mdash; Details</div><h2><em>Military</em> Resilience: Epictetus to Fort Bragg</h2></div>
  <p>The U.S. Army's Comprehensive Soldier Fitness (CSF) program, launched in 2009 at a cost of $145 million, represents the largest institutional investment in psychological resilience training in history. While not explicitly Stoic, its underlying framework draws heavily on the same positive psychology and cognitive-behavioral principles that trace their lineage to Stoic philosophy.</p>
  <p>The Master Resilience Training (MRT) course &mdash; a 10-day program that trains sergeants to teach resilience skills to their soldiers &mdash; is the operational backbone of CSF. The curriculum, developed by the University of Pennsylvania's Positive Psychology Center, teaches cognitive reappraisal, optimistic attribution styles, problem-solving, and mental toughness. Contrary to traditional military approaches that address trauma after the fact, MRT is proactive: building resilience before exposure to stress.</p>
  <h3>Explicit Stoic Connections</h3>
  <p>The Center for Junior Officers at the U.S. Army explicitly cites Stoic philosophy as a resource for building military readiness. The connection is direct: Epictetus's dichotomy of control helps soldiers focus on their training and conduct rather than on outcomes they cannot determine. Marcus Aurelius's self-examination practices support after-action reviews. Seneca's approach to adversity frames hardship as training for virtue.</p>
  <h3>Criticism</h3>
  <p>Critics have raised concerns about the militarization of philosophy: reducing an ethical system to a tool for combat effectiveness. The Stoics emphasized courage and endurance, but within an ethical framework that included justice, compassion, and cosmopolitan duty. Using Stoic principles solely to create more effective soldiers, without the ethical framework, risks the same distortion seen in the pop pipeline &mdash; technique stripped of moral context.</p>
  <div class="callout"><h4>Key Insight</h4><p>Military resilience programs demonstrate institutional-scale adoption of Stoic-adjacent principles. The CSF/MRT programs provide natural experiments for studying resilience training outcomes. The question is whether adding explicit Stoic philosophical content to these programs would improve their effectiveness beyond the current positive-psychology framework.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.04 &mdash; Details</div><h2><em>Anxiety</em>: Reappraising Fear</h2></div>
  <p>Stoic approaches to anxiety leverage three mechanisms that align with evidence-based anxiety treatment. First, premeditatio malorum functions as a form of controlled exposure: deliberately imagining feared outcomes, in a structured and time-limited way, reduces their emotional impact through habituation. This parallels imaginal exposure in CBT for anxiety disorders.</p>
  <p>Second, the dichotomy of control narrows the scope of anxiety by separating controllable concerns (my preparation, my effort, my conduct) from uncontrollable ones (others' judgments, external outcomes, circumstances). Research on worry shows that much anxious rumination focuses on uncontrollable future events. Redirecting attention to controllable aspects reduces the cognitive fuel for anxiety.</p>
  <p>Third, cognitive reappraisal of threat &mdash; the core Stoic practice of examining impressions &mdash; directly targets the catastrophic interpretations that maintain anxiety. The Stoic question "Is this impression accurate?" maps to the CBT technique of examining evidence for and against anxious predictions.</p>
  <div class="callout"><h4>Key Insight</h4><p>Stoic anxiety management is essentially CBT anxiety management with a philosophical framework. The techniques are identical because CBT borrowed them from Stoicism. The potential advantage of the Stoic packaging is that it provides a motivational and identity framework for maintaining practice beyond the clinical setting.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.05 &mdash; Details</div><h2><em>Anger</em>: Seneca&rsquo;s Protocol</h2></div>
  <p>Seneca's treatise <em>De Ira</em> (On Anger) is the most detailed ancient analysis of anger and its management, and it reads remarkably like a modern anger management protocol. Seneca analyzed anger as arising from a judgment that one has been wronged and that retaliation is appropriate. His intervention targets both components: the initial judgment (is the wrong real or imagined?) and the retaliatory impulse (is retaliation virtuous or destructive?).</p>
  <h3>Seneca's Steps</h3>
  <p>First, recognize the initial impulse. Seneca distinguished between the involuntary first movement (a flush of anger when insulted) and the assent to that impression (deciding the insult is intolerable and demands response). The first movement is natural and unavoidable. The assent is where Stoic practice intervenes.</p>
  <p>Second, delay the response. Seneca explicitly advised waiting before acting on anger. This maps directly to the modern anger management technique of "time out" or cognitive delay. The delay creates space for prefrontal engagement before the amygdala-driven impulse translates to behavior.</p>
  <p>Third, reappraise the provocation through perspective-taking. Seneca recommended considering the offender's circumstances, motivations, and ignorance. This maps to the CBT technique of cognitive restructuring for anger: generating alternative explanations for the provocative behavior.</p>
  <div class="callout"><h4>Key Insight</h4><p>Seneca's anger protocol is the most direct ancient precursor to modern CBT anger management. The steps are structurally identical: recognize, delay, reappraise, choose virtuous response. Two thousand years of clinical development have refined the technique but not fundamentally changed the approach.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.06 &mdash; Details</div><h2><em>Grief</em>: Consolation, Not Suppression</h2></div>
  <p>The Stoic approach to grief is one of the most frequently distorted aspects of the philosophy. Pop presentations suggest Stoics don't grieve. The historical record shows the opposite: the Stoics developed an extensive consolation tradition specifically designed to help people process grief through philosophical reflection.</p>
  <p>Seneca wrote three major consolation letters. To Marcia, he offered comfort after the death of her son. To Helvia, his mother, he addressed his own exile. To Polybius, he addressed the death of a brother. In each, he acknowledged grief's natural reality while offering philosophical tools for moving through it. His approach is processual: allow the initial response, then gradually apply reason to the judgments that sustain grief beyond its natural course.</p>
  <h3>The Stoic Grief Process</h3>
  <p>The process has identifiable steps. First, acknowledge the loss and the natural emotional response. Seneca explicitly wrote that grief in response to death is wholly natural. Second, sit with the grief for a period without trying to reason it away. Third, gradually begin examining the judgments sustaining the grief: Am I grieving the person's death, or my own loss? Am I assuming the deceased would want me to suffer indefinitely? Am I treating an external event as if it were a harm to my virtue? Fourth, find meaning in the relationship and the loss through philosophical reflection.</p>
  <div class="callout"><h4>Key Insight</h4><p>The Stoic consolation tradition is closer to modern grief therapy (cognitive processing of loss) than to the pop Stoic dismissal ("just don't be sad"). Seneca would have been horrified by the suggestion that Stoics don't grieve. He wrote thousands of words specifically to help people grieve well.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.07 &mdash; Details</div><h2>The <em>Clinical</em> Evidence Gap</h2></div>
  <p>Despite the strong clinical framework Robertson has built, and the promising Stoic Week data, a significant evidence gap remains between Stoic-informed therapy and evidence-based therapy in the strict clinical sense. No randomized controlled trial has tested a Stoic-specific therapeutic protocol against either a waitlist control or an active comparison condition (such as standard CBT or ACT).</p>
  <p>The gap matters because clinical credibility requires more than plausible mechanisms and promising observational data. Health systems, insurance companies, and clinical practice guidelines rely on RCT evidence. Without it, Stoic-informed approaches remain in the category of "theoretically grounded but empirically unproven" &mdash; a category that limits their clinical adoption regardless of their philosophical merit.</p>
  <h3>What Currently Exists</h3>
  <p>Robertson's detailed clinical mapping provides the therapeutic protocol. The SABS provides the measurement instrument. Stoic Week provides 13 years of observational data showing consistent positive effects. The SMRT program collects structured outcome data from extended practice. Military resilience programs provide institutional-scale implementation. All of these contribute to the evidence base, but none meets the gold standard of a pre-registered RCT with randomization, active controls, and follow-up assessment.</p>
  <div class="security-box"><h4>The Honest Position</h4><p>Stoic-informed therapy is plausible, mechanistically supported, and observationally promising. It is not yet evidence-based in the strict clinical sense. The distinction between "promising" and "established" is not pedantic &mdash; it determines whether clinicians can ethically recommend Stoic-specific approaches as alternatives to validated treatments.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.08 &mdash; Details</div><h2>What <em>Comes</em> Next: The Research Agenda</h2></div>
  <p>The field of empirical Stoicism is at an inflection point. The measurement tools exist (SABS). The clinical frameworks exist (Robertson's mapping). The observational data is promising (Stoic Week). The neuroscience supports the mechanisms (reappraisal literature). What's missing is the clinical trials that would establish Stoic practice as an evidence-based intervention in its own right, not merely as a philosophical ancestor of CBT.</p>
  <h3>The Research Priorities</h3>
  <p>First priority: at least one pre-registered randomized controlled trial comparing three conditions &mdash; a complete Stoic practice program (extended SMRT or equivalent), standard CBT of equivalent duration, and a waitlist or active control. The SABS should be administered at baseline, post-treatment, and 3/6/12-month follow-up. This would establish whether the Stoic packaging adds value beyond the CBT techniques it shares.</p>
  <p>Second priority: longitudinal follow-up of Stoic Week and SMRT participants to assess maintenance of gains over time. Robertson's identity-integration hypothesis predicts better maintenance for Stoic practitioners than for standard CBT participants. This is testable with existing data if follow-up assessments are added.</p>
  <p>Third priority: neuroimaging studies of experienced Stoic practitioners, comparable to the meditation fMRI literature. Do long-term Stoic practitioners show enhanced prefrontal-amygdala connectivity? Altered default mode network activity? These studies would provide neural evidence for the cumulative effects of Stoic practice.</p>
  <p>Fourth priority: studies of individual Stoic exercises as distinct interventions. Does negative visualization, specifically, reduce anxiety? Does the evening review, specifically, improve self-regulation? Does the dichotomy of control, specifically, increase psychological flexibility? Component analysis would identify which practices drive the observed benefits.</p>
  <div class="callout"><h4>Key Insight</h4><p>The research agenda for empirical Stoicism is clear, the tools exist, and the hypotheses are testable. What is needed is funding, institutional commitment, and researchers willing to apply clinical trial methodology to a philosophical tradition. The field is one well-designed RCT away from a fundamentally different evidence base.</p></div>`
