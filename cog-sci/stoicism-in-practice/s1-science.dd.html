-medium-weight)}.security-box p:last-child{margin-bottom:0}@media(max-width:1000px){.sidebar{display:none}.ctrl-group{top:10px;right:10px}.ctrl-btn{width:32px;height:32px;font-size:14px}.shell{display:block;position:relative}.main{height:100vh;width:100%}.main-head{padding:20px 20px 0}.hero-title{font-size:28px!important;letter-spacing:0!important}.masthead-sub{flex-direction:column;gap:2px}.main-head.compact{padding:0 20px;height:44px}.main-head.compact .hero-title{font-size:18px!important}.main-scroll{padding:0 20px 80px}.section-block{padding:28px 8px}.right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}.right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}.right:not(.closed){transform:translateX(0)}.right-inner{padding:0 20px 80px}.right-topbar{padding:10px 20px 0;height:44px}.detail-header h2{font-size:26px!important}.feat-grid,.verdict{grid-template-columns:1fr}.feat{border-left:none!important;padding-left:0!important}.feat:nth-child(2n){padding-left:0}.v-col{padding:16px 0!important}.v-col:last-child{border-left:none!important;padding-left:0!important}.tl-item{flex-direction:column!important;gap:4px}.tl-date{min-width:unset!important}.detail p{font-size:16px}.detail pre{font-size:12px;padding:14px 16px}.section-block .s-stat{flex-wrap:wrap}.section-block .s-stat .st{min-width:45%}}

<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Stoic Week', title: '<em>Stoic</em> Week: Design &amp; Data' },
  { num: '02', short: 'SABS', title: 'The <em>SABS</em>: First Validated Measure' },
  { num: '03', short: 'Reflection', title: '<em>Morning</em> &amp; Evening Reflection' },
  { num: '04', short: 'Visualization', title: '<em>Negative</em> Visualization' },
  { num: '05', short: 'View Above', title: 'The <em>View</em> from Above' },
  { num: '06', short: 'Control', title: '<em>Dichotomy</em> of Control in Daily Life' },
  { num: '07', short: 'SMRT', title: '<em>SMRT</em>: Longer-Term Training' },
  { num: '08', short: 'Limits', title: '<em>Limitations</em> &amp; What&rsquo;s Missing' }
];

const summaries = [
  `<p>Stoic Week has been run annually by the <a href="https://modernstoicism.com/research/" target="_blank">Modern Stoicism organization</a><sup class="fn"><a>[1]</a><span class="tip"><a href="https://modernstoicism.com/research/" target="_blank">SP1 Modern Stoicism: Research &rarr;</a></span></sup> since 2012, making it the longest-running empirical study of Stoic practice. Participants follow a structured daily program while completing validated psychological measures. The <a href="https://stoicismtoday.substack.com/p/stoic-week-2025-report-well-being" target="_blank">2025 iteration</a><sup class="fn"><a>[2]</a><span class="tip"><a href="https://stoicismtoday.substack.com/p/stoic-week-2025-report-well-being" target="_blank">SP2 Stoic Week 2025 Report &rarr;</a></span></sup> saw 1,424 completers from 3,650 signups, with the thirteenth consecutive year of positive results.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">13</div><div class="sl">Years Running</div></div>
    <div class="st"><div class="sv">1,424</div><div class="sl">2025 Completers</div></div>
    <div class="st"><div class="sv">~25%</div><div class="sl">Completion Rate</div></div>
    <div class="st"><div class="sv">7 days</div><div class="sl">Duration</div></div>
  </div>`,

  `<p>The <a href="https://link.springer.com/article/10.1007/s10608-025-10635-9" target="_blank">Stoic Attitudes and Behaviours Scale</a><sup class="fn"><a>[3]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s10608-025-10635-9" target="_blank">SP4 LeBon et al. (2025) &rarr;</a></span></sup>, published in Cognitive Therapy and Research (2025), is the first psychometrically validated instrument for measuring philosophical Stoicism. It draws a critical line between Stoic philosophy and colloquial "being stoic" &mdash; these predict <em>opposite</em> psychological outcomes.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">8,000+</div><div class="sl">Participants</div></div>
    <div class="st"><div class="sv">116</div><div class="sl">Countries</div></div>
    <div class="st"><div class="sv">7</div><div class="sl">Factors</div></div>
    <div class="st"><div class="sv">40</div><div class="sl">Items (Final)</div></div>
  </div>`,

  `<p>The Stoic daily practice of prosoche (morning attention) and Seneca's nightly self-examination form a bookend structure for the day. Morning reflection sets intentions around what is "up to me"; evening review assesses what went well and what could improve. These map to well-studied psychological constructs: implementation intentions and self-monitoring.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Morning (Prosoche)</h4><p>Set intentions for the day. Identify what is within your control. Prepare for difficulties using premeditatio.</p></div>
    <div class="feat"><h4>Evening (Seneca's Review)</h4><p>Three questions: What went well? What went poorly? What can improve? Non-judgmental self-examination.</p></div>
  </div>`,

  `<p>Premeditatio malorum &mdash; deliberately imagining worst-case scenarios &mdash; is perhaps the most counterintuitive Stoic practice. Research suggests it works through two mechanisms: exposure-based habituation to feared outcomes and emotional contrasting that improves appreciation of current circumstances.<sup class="fn"><a>[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Negative_visualization" target="_blank">SP8 Wikipedia: Negative Visualization &rarr;</a></span></sup> But excessive practice risks rumination.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">&uarr;</div><div class="sl">Satisfaction After Practice</div></div>
    <div class="st"><div class="sv">&uarr;</div><div class="sl">Coping Capacity</div></div>
    <div class="st"><div class="sv">Sparse</div><div class="sl">Direct Research</div></div>
  </div>`,

  `<p>The "view from above" exercise &mdash; imagining yourself from progressively greater distances until you see the whole Earth &mdash; is a perspective-taking practice that maps to the psychological construct of self-distancing. Research on decentering and psychological distancing shows these practices reduce emotional reactivity and improve decision-making.</p>`,

  `<p>Epictetus's dichotomy of control is the most widely known Stoic concept and the most commonly practiced. Applied daily, it involves sorting situations into what you can influence (your judgments, intentions, efforts) and what you cannot (others' behavior, outcomes, external events). Research on locus of control and acceptance-based coping supports its psychological benefits.</p>`,

  `<p>The Stoic Mindfulness and Resilience Training (SMRT) program, developed by the Modern Stoicism team, extends Stoic practice beyond a single week into a multi-week structured course. It collects more robust outcome data than Stoic Week and represents the most serious attempt to create a Stoic-specific training protocol with empirical evaluation.</p>`,

  `<p>An honest assessment of the evidence reveals significant limitations. Most research supporting Stoic practices comes from adjacent fields &mdash; CBT, gratitude research, reappraisal studies &mdash; rather than from studies of Stoicism itself. Stoic Week lacks control groups and randomization. No dedicated RCT has tested a complete Stoic practice program. The SABS provides the measurement tool; what's needed now are the clinical trials.</p>
  <div class="verdict">
    <div class="v-col pro"><h4>What Exists</h4><ul>
      <li>13 years of consistent Stoic Week data</li>
      <li>Validated measurement tool (SABS)</li>
      <li>Strong mechanistic evidence (reappraisal)</li>
      <li>CBT lineage as indirect validation</li>
    </ul></div>
    <div class="v-col con"><h4>What Is Missing</h4><ul>
      <li>Randomized controlled trials</li>
      <li>Active control comparisons</li>
      <li>Long-term follow-up data</li>
      <li>Studies of individual exercises</li>
    </ul></div>
  </div>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.01 &mdash; Details</div><h2><em>Stoic</em> Week: Design &amp; Data</h2></div>
  <p>Stoic Week began in 2012 as a collaboration between philosophers, psychotherapists, and psychologists at the Modern Stoicism organization. The design is straightforward: participants sign up online, receive daily Stoic exercises and readings, and complete validated psychological questionnaires at the start and end of the week. The exercises cover the core Stoic practices &mdash; morning reflection (prosoche), evening self-examination (Seneca's review), negative visualization (premeditatio malorum), the dichotomy of control, and the view from above.</p>
  <p>The data is remarkably consistent across years. In the <a href="https://modernstoicism.com/are-stoics-still-happier-stoic-week-2018-report-part-2-of-4-by-tim-lebon/" target="_blank">2017 and 2018 iterations</a><sup class="fn"><a>[5]</a><span class="tip"><a href="https://modernstoicism.com/are-stoics-still-happier-stoic-week-2018-report-part-2-of-4-by-tim-lebon/" target="_blank">SP7 LeBon: Stoic Week 2018 &rarr;</a></span></sup>, approximately 1,500 participants who completed the full questionnaire battery reported an average 14% reduction in negative emotions, a 10% increase in positive emotions, and a 13% increase in life satisfaction. The 2025 iteration saw 1,424 completers from 3,650 signups (a roughly 25% completion rate, consistent with online program norms), with overall Stoicism scores on the SABS increasing markedly over the week.</p>
  <h3>Methodological Strengths</h3>
  <p>The program uses validated measures, not custom questionnaires. The sample sizes are large by psychological standards. The consistency across 13 years provides a form of replication that few interventions can claim. The SABS now allows researchers to measure whether improvements in well-being are actually accompanied by changes in Stoic attitudes.</p>
  <h3>Methodological Limitations</h3>
  <p>Self-selection bias is severe: people who sign up for "Stoic Week" are already interested in and positively disposed toward Stoicism. There is no control group &mdash; improvements could reflect expectancy effects, social engagement, or simply the structure of a daily practice (any daily practice). The 25% completion rate means we only hear from the most engaged participants. And one week is too short to assess lasting change. These are acknowledged openly by the research team, but they constrain what the data can tell us.</p>
  <div class="callout"><h4>Key Insight</h4><p>Stoic Week provides the strongest available evidence for Stoic practice effectiveness, but it is evidence at the "promising" level, not the "established" level. The consistent positive results across 13 years justify investment in rigorous RCTs, but they do not themselves constitute RCT-level evidence.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.02 &mdash; Details</div><h2>The <em>SABS</em>: First Validated Measure</h2></div>
  <p>Before the SABS, researchers faced a fundamental problem: scales purporting to measure "stoicism" actually measured colloquial emotional suppression (lowercase 's'), not philosophical Stoicism (uppercase 'S'). These scales consistently found that "stoic" attitudes predicted worse health outcomes &mdash; because they were measuring something closer to emotional avoidance than to Epictetus's cognitive examination of impressions.</p>
  <p>The SABS development process was deliberately interdisciplinary.<sup class="fn"><a>[3]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s10608-025-10635-9" target="_blank">SP4 LeBon et al. (2025) &rarr;</a></span></sup> Philosophy and psychotherapy experts iteratively developed five versions, identifying six core Stoic dimensions. The final 60-item version was administered to over 8,000 participants across 116 countries. Exploratory graph analysis and confirmatory factor analysis converged on a seven-factor, 40-item solution with good internal consistency.</p>
  <h3>The Seven Factors</h3>
  <p>The factors reflect authentic Stoic dimensions: beliefs about happiness (eudaimonia as virtue-dependent, not pleasure-dependent), virtue as necessary and sufficient for the good life, benevolence and compassion toward others, ethical development as a lifelong practice, acceptance of what cannot be controlled, engagement with the world (not withdrawal), and rational self-examination. Notably, emotional suppression is NOT one of the factors &mdash; it is precisely what the SABS distinguishes authentic Stoicism from.</p>
  <h3>Validation Findings</h3>
  <p>SABS scores correlate positively with flourishing, resilience, and positive affect, and negatively with anger and negative emotions. This is the opposite pattern from colloquial "stoicism" scales. The implication is that measuring philosophical Stoicism requires a philosophically informed instrument &mdash; generic questionnaires conflate the philosophy with its cultural distortion and produce misleading results.</p>
  <div class="callout"><h4>Key Insight</h4><p>The SABS is the most important methodological development in empirical Stoicism. Without it, studies cannot distinguish between people practicing genuine Stoic philosophy and people practicing emotional suppression using Stoic language. The fact that these predict opposite outcomes makes the distinction not just academic but clinically critical.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.03 &mdash; Details</div><h2><em>Morning</em> &amp; Evening Reflection</h2></div>
  <p>The Stoic daily bookend structure is ancient. Marcus Aurelius wrote his <em>Meditations</em> as a morning journal &mdash; reminding himself of Stoic principles before engaging with the day. Seneca described his nightly practice of self-examination: reviewing the day's events, assessing where he acted in accordance with virtue and where he fell short. These practices map onto well-established psychological mechanisms.</p>
  <h3>Morning Reflection (Prosoche)</h3>
  <p>Prosoche, or attention, involves beginning the day by identifying what is within your control and setting intentions accordingly. In psychological terms, this maps to implementation intentions &mdash; if-then plans that have been extensively studied and shown to increase goal attainment. The morning practice also involves brief premeditatio: anticipating the day's challenges and preparing responses. This reduces the shock of adversity and pre-loads cognitive reappraisal strategies.</p>
  <h3>Evening Review (Seneca's Three Questions)</h3>
  <p>Seneca's nightly review asks three questions: What did I do well today? Where did I fall short? What could I improve tomorrow? This maps to self-monitoring, a core component of CBT and behavioral change programs. Research consistently shows that self-monitoring improves behavior change outcomes by increasing awareness and creating feedback loops. The non-judgmental framing is critical: Seneca specifically instructs examining oneself as a student learning, not as a prosecutor condemning.</p>
  <h3>Journaling as Vehicle</h3>
  <p>Marcus Aurelius's <em>Meditations</em> is literally the world's most famous Stoic journal. Meta-analytic evidence supports journaling efficacy broadly: <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8935176/" target="_blank">68% of journaling interventions</a><sup class="fn"><a>[6]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8935176/" target="_blank">EB10 Journaling Meta-Analysis &rarr;</a></span></sup> show effective outcomes across mental health domains. Gratitude writing, which overlaps with the Stoic practice of appreciating what you have, is associated with <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC10393216/" target="_blank">6.86% higher life satisfaction and 7.76% lower anxiety symptoms</a>.<sup class="fn"><a>[7]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC10393216/" target="_blank">EB9 Gratitude Meta-Analysis &rarr;</a></span></sup></p>
  <div class="callout"><h4>Key Insight</h4><p>The Stoic daily reflection practice contains two empirically supported mechanisms: implementation intentions (morning) and self-monitoring (evening). The evidence for these mechanisms is strong, even though it comes from CBT and behavioral research rather than Stoicism-specific studies.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.04 &mdash; Details</div><h2><em>Negative</em> Visualization</h2></div>
  <p>Premeditatio malorum &mdash; pre-studying bad futures &mdash; is the most counterintuitive Stoic practice. The instruction is to deliberately imagine losing what you value: your health, your loved ones, your possessions, your life. The purpose is not to produce despair but to reduce the shock of loss, increase appreciation for what you currently have, and prepare cognitive coping strategies before they're needed under emotional duress.</p>
  <h3>Psychological Mechanisms</h3>
  <p>Research supports at least two mechanisms. First, exposure-based habituation: repeatedly imagining a feared outcome reduces its emotional impact, similar to how exposure therapy reduces phobic responses. Second, emotional contrasting: studies show that people who imagine losing possessions report higher satisfaction with those items afterward. The contrast between imagined loss and present reality produces gratitude that mere possession does not.</p>
  <h3>The Rumination Risk</h3>
  <p>The critical caveat: excessive negative visualization can become rumination. When someone repeatedly imagines failures, losses, and catastrophes, the practice shifts from cognitive preparation to anxious preoccupation. Research on mental contrasting shows that the key differentiator is intentionality and structure. Premeditatio works as a deliberate, time-limited exercise. When it becomes an ongoing mental habit, it produces exactly the anxiety it was designed to prevent. The ancient Stoics themselves seem to have practiced it occasionally, not obsessively &mdash; a few times per year, not daily.</p>
  <div class="callout"><h4>Key Insight</h4><p>Negative visualization is the Stoic practice with the most complex dose-response relationship. In moderation, it builds resilience and gratitude. In excess, it becomes rumination. The ancient Stoics appear to have understood this intuitively; modern research confirms it empirically.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.05 &mdash; Details</div><h2>The <em>View</em> from Above</h2></div>
  <p>Marcus Aurelius described an exercise of imagining yourself seen from progressively greater heights &mdash; from your room to your city, to the continent, to the entire Earth, to the cosmos. The purpose is to reduce emotional attachment to immediate concerns by placing them in a vast context. An office conflict, a financial worry, a social embarrassment &mdash; seen from orbit, these shrink to their appropriate proportions.</p>
  <h3>Self-Distancing Research</h3>
  <p>Psychological research on self-distancing (Kross et al.) shows that viewing personal experiences from a detached perspective reduces emotional reactivity, improves decision-making, and decreases rumination. When people adopt a "fly on the wall" perspective, they process negative events with less distress than when immersed in the first-person viewpoint. The view from above is an extreme version of this self-distancing technique.</p>
  <h3>Decentering in Clinical Practice</h3>
  <p>In mindfulness-based cognitive therapy (MBCT), decentering &mdash; observing thoughts and feelings as passing events rather than as central to identity &mdash; is a core therapeutic mechanism. The view from above accomplishes something similar through spatial rather than temporal metaphor. Both reduce the tendency to fuse with momentary emotional states.</p>
  <div class="callout"><h4>Key Insight</h4><p>The view from above maps to self-distancing research, which has strong experimental support. The mechanism is the same: creating psychological distance from emotional events reduces their impact and improves rational processing. This is one of the Stoic practices with the clearest modern research parallel.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.06 &mdash; Details</div><h2><em>Dichotomy</em> of Control in Daily Life</h2></div>
  <p>Epictetus opens the Enchiridion with the most famous line in Stoic philosophy: some things are in our power, and some things are not. In our power: our opinions, impulses, desires, aversions &mdash; in short, whatever is our own doing. Not in our power: our body, our property, reputation, office &mdash; whatever is not our own doing. Applied daily, this becomes a practice of constantly sorting experience into the controllable and the uncontrollable, then directing attention and energy accordingly.</p>
  <h3>Locus of Control Research</h3>
  <p>Julian Rotter's locus of control construct (1966) provides the closest psychological parallel. People with an internal locus of control &mdash; who believe their actions significantly influence outcomes &mdash; show better psychological adjustment, higher achievement, and greater resilience than those with an external locus. The dichotomy of control trains internal locus of control for things within your agency while training acceptance for things outside it. This combination avoids both helplessness (everything is out of my control) and grandiosity (everything is my responsibility).</p>
  <h3>Acceptance and Commitment</h3>
  <p>ACT explicitly incorporates the dichotomy of control as acceptance of what cannot be changed combined with committed action toward chosen values. The therapeutic mechanism is psychological flexibility: the ability to contact the present moment, accept internal experiences, and take values-directed action even in the presence of pain. This is arguably the most widely validated therapeutic application of a Stoic principle.</p>
  <div class="callout"><h4>Key Insight</h4><p>The dichotomy of control is the Stoic practice with the strongest therapeutic pedigree, via its incorporation into ACT. Research on psychological flexibility demonstrates that the combination of acceptance (for the uncontrollable) and committed action (for the controllable) produces measurable improvements in anxiety, depression, and quality of life.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.07 &mdash; Details</div><h2><em>SMRT</em>: Longer-Term Training</h2></div>
  <p>Recognizing that one week is insufficient to establish lasting change, the Modern Stoicism team developed the Stoic Mindfulness and Resilience Training (SMRT) course. This multi-week program provides a more structured and extended engagement with Stoic practice, collecting more robust psychological outcome data than the single-week format allows. The program represents the most serious attempt to create a Stoic-specific training protocol with empirical evaluation.</p>
  <h3>Program Structure</h3>
  <p>SMRT extends the daily practice structure of Stoic Week across multiple weeks, adding progressive complexity. Participants engage with increasingly challenging Stoic exercises while maintaining the core daily practices. The extended duration allows for habit formation and deeper integration of Stoic principles into daily life.</p>
  <h3>Research Potential</h3>
  <p>Robertson has argued that the very fact that Stoicism is "bigger and deeper than CBT" in its aim to provide a philosophy of life gives reason to believe its benefits may be more lasting than those of existing CBT-based resilience training programs. People who study Stoicism tend to embrace it as part of their identity rather than viewing it merely as a set of coping techniques. If this hypothesis is correct, SMRT should show better maintenance of gains over time than technique-only approaches. This is testable but not yet tested at RCT standards.</p>
  <div class="callout"><h4>Key Insight</h4><p>SMRT represents the bridge between Stoic Week's promising but limited data and the rigorous clinical trials the field needs. Its multi-week format allows for more meaningful outcome measurement, and its identity-integration hypothesis is one of the most interesting predictions in empirical Stoicism.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.08 &mdash; Details</div><h2><em>Limitations</em> &amp; What&rsquo;s Missing</h2></div>
  <p>Intellectual honesty requires acknowledging what the evidence does <em>not</em> show. The current state of empirical Stoicism has several significant gaps that limit the conclusions that can be drawn.</p>
  <h3>No Dedicated RCTs</h3>
  <p>No randomized controlled trial has tested a complete Stoic practice program against either a waitlist control or an active comparison (such as standard CBT). Without randomization, we cannot exclude selection effects, expectancy effects, or regression to the mean as explanations for Stoic Week improvements. This is the single largest gap in the evidence base.</p>
  <h3>Borrowed Evidence</h3>
  <p>Most evidence supporting Stoic practices actually comes from adjacent research domains: cognitive reappraisal (not labeled as "Stoic"), gratitude journaling (not framed as "Stoic"), self-distancing (not called "view from above"), acceptance-based coping (not described as "dichotomy of control"). The mechanistic evidence is strong, but it is evidence for the components, not for the Stoic integration of those components. The whole may be more than the sum of parts &mdash; or it may be less. We don't know yet.</p>
  <h3>Self-Selection and Attrition</h3>
  <p>Stoic Week participants are self-selected (already interested in Stoicism), predominantly English-speaking, and disproportionately educated. The 25% completion rate means 75% of participants don't provide end-of-week data. The completers may differ systematically from the dropouts in motivation, openness, or initial distress levels.</p>
  <h3>What's Needed</h3>
  <p>The SABS provides the measurement infrastructure. What the field needs now: (1) at least one pre-registered RCT comparing Stoic practice to CBT and waitlist control; (2) longitudinal follow-up of Stoic Week/SMRT participants at 3, 6, and 12 months; (3) fMRI studies of experienced Stoic practitioners comparable to the meditation neuroimaging literature; (4) studies of individual Stoic exercises as distinct interventions.</p>
  <div class="security-box"><h4>Honest Assessment</h4><p>Stoic practice is promising but not yet evidence-based in the strict clinical sense. The mechanisms are validated. The outcomes data is encouraging. The measurement tools now exist. What's missing is the experimental rigor that would move Stoicism from "plausible" to "established." Until those trials happen, researchers should be candid about what is known and what remains uncertain.</p></div>`
];
