const summaries = [
  `<p><a href="https://pubmed.ncbi.nlm.nih.gov/12916575/" target="_blank">Gross and John (2003)</a><sup class="fn"><a>[1]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/12916575/" target="_blank">CM3 Gross &amp; John (2003) &rarr;</a></span></sup> identified two fundamentally different strategies for managing emotions. Cognitive reappraisal &mdash; what the Stoics actually taught &mdash; changes how you think about a situation <em>before</em> the emotional response consolidates. Expressive suppression &mdash; what pop "stoicism" teaches &mdash; hides the emotional expression <em>after</em> it forms. The outcomes are opposite: reappraisers thrive; suppressors suffer.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">&uarr;</div><div class="sl">Reappraisal: Positive Emotion</div></div>
    <div class="st"><div class="sv">&darr;</div><div class="sl">Reappraisal: Negative Emotion</div></div>
    <div class="st"><div class="sv">&darr;</div><div class="sl">Suppression: Positive Emotion</div></div>
    <div class="st"><div class="sv">&uarr;</div><div class="sl">Suppression: Negative Emotion</div></div>
  </div>`,

  `<p>The neural architecture of emotion regulation is centered on interactions between the prefrontal cortex (control) and the amygdala (threat detection). During reappraisal, prefrontal regions actively modulate amygdala reactivity through top-down control pathways. The strength of this coupling predicts individual differences in regulation success.</p>`,

  `<p><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4193464/" target="_blank">Buhle et al. (2014)</a><sup class="fn"><a>[2]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4193464/" target="_blank">CM1 Buhle et al. fMRI Meta-Analysis &rarr;</a></span></sup> conducted a landmark meta-analysis of 48 neuroimaging studies of cognitive reappraisal. The results were consistent: reappraisal activates dorsolateral, ventrolateral, and dorsomedial prefrontal cortex while attenuating bilateral amygdala activation. Importantly, reappraisal does NOT activate ventromedial PFC, separating it from extinction-based processes.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">48</div><div class="sl">fMRI Studies</div></div>
    <div class="st"><div class="sv">dlPFC</div><div class="sl">Key Activation</div></div>
    <div class="st"><div class="sv">&darr;</div><div class="sl">Bilateral Amygdala</div></div>
  </div>`,

  `<p>In 2023, researchers used <a href="https://www.jneurosci.org/content/43/34/6046" target="_blank">combined transcranial magnetic stimulation and functional MRI</a><sup class="fn"><a>[3]</a><span class="tip"><a href="https://www.jneurosci.org/content/43/34/6046" target="_blank">CM5 TMS-fMRI Reappraisal &rarr;</a></span></sup> to establish causal evidence for the reappraisal circuit. Stimulating the ventrolateral PFC enhanced reappraisal performance, increased vlPFC and vmPFC activity, and attenuated amygdala and insula responses &mdash; moving beyond correlation to causation.</p>`,

  `<p>Each core Stoic practice maps to a specific cognitive mechanism with identifiable neural substrates. The dichotomy of control engages attentional deployment and acceptance circuits. Morning reflection activates goal-directed regulation. Evening review drives self-monitoring and error correction. These are not metaphors &mdash; they are testable neuropsychological predictions.</p>
  <div class="feat-grid">
    <div class="feat"><h4>"Examine your impressions"</h4><p>Cognitive reappraisal: dlPFC/vlPFC modulating amygdala reactivity</p></div>
    <div class="feat"><h4>Premeditatio malorum</h4><p>Predictive processing and expectation adjustment: dmPFC, anterior insula</p></div>
    <div class="feat"><h4>View from above</h4><p>Psychological distancing and decentering: dmPFC, temporoparietal junction</p></div>
    <div class="feat"><h4>Dichotomy of control</h4><p>Attentional deployment + acceptance: anterior cingulate cortex, vlPFC</p></div>
  </div>`,

  `<p>Research consistently shows that expressive suppression fails on its own terms. Suppressors hide the behavioral expression but the internal emotional experience persists or intensifies. The amygdala continues firing. Social costs accumulate &mdash; suppression disrupts relationships, increases partner blood pressure during interaction, and produces feelings of inauthenticity.</p>
  <ul class="s-list con">
    <li>Amygdala activation persists &mdash; only behavioral output is masked</li>
    <li>Less positive emotion AND more negative emotion experienced</li>
    <li>Feelings of inauthenticity in social relationships</li>
    <li>Partner blood pressure increases during suppressed interactions</li>
    <li>Lower social support, less closeness, lower satisfaction</li>
  </ul>`,

  `<p>Not everyone regulates emotions the same way. Gross and John found stable individual differences in habitual use of reappraisal versus suppression, with distinct correlates for well-being, social functioning, and cognitive style. Amygdala-OFC and amygdala-dmPFC coupling strength predicts how effectively a given person can downregulate negative affect.</p>`,

  `<p>The critical practical implication of the neuroscience: you cannot skip the cognitive work. Reappraisal requires active, effortful engagement with the emotional stimulus &mdash; examining the impression, questioning the interpretation, generating alternative framings. When pop Stoicism reduces this to "just don't let it affect you," it removes the mechanism that produces the benefit.</p>
  <div class="callout">
    <h4>The Bottom Line</h4>
    <p>The difference between authentic and toxic Stoicism is the difference between doing the cognitive work (reappraisal) and merely hiding the output (suppression). The neural evidence is unambiguous. Both look calm on the outside. Only one produces well-being on the inside.</p>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.01 &mdash; Details</div><h2><em>Two</em> Pathways: Reappraisal vs. Suppression</h2></div>
  <p>James Gross and Oliver John's 2003 study established the foundational framework for understanding why Stoicism and "stoicism" produce opposite outcomes. Their research identified two emotion regulation strategies that people habitually employ: cognitive reappraisal (changing how you think about a situation) and expressive suppression (inhibiting the outward expression of emotion).</p>
  <p>In six studies involving undergraduates, Gross and John found that these two strategies are largely independent &mdash; people high in one are not necessarily low in the other. But their consequences are profoundly different. Habitual reappraisers reported greater positive emotion, less negative emotion, better interpersonal functioning, and higher well-being. Habitual suppressors reported less positive emotion, more negative emotion, feelings of inauthenticity, worse interpersonal outcomes, and lower well-being.</p>
  <h3>Why This Matters for Stoicism</h3>
  <p>When Epictetus wrote that we should examine our impressions before assenting to them, he was prescribing cognitive reappraisal. The Stoic practice is fundamentally about changing the interpretation &mdash; the judgment about the event &mdash; before the emotional response fully consolidates. This is early-stage intervention in the emotion generation process.</p>
  <p>When someone tells a grieving person to "be stoic about it" or a teenage boy to "man up," they are prescribing expressive suppression. The instruction is: feel the emotion but don't show it. This is late-stage intervention that addresses only the behavioral output while leaving the internal experience unchanged or worsened.</p>
  <div class="callout"><h4>Key Insight</h4><p>The Gross and John framework provides the scientific explanation for why philosophical Stoicism (SABS-measured) correlates with well-being while colloquial "stoicism" correlates with harm. They are targeting different points in the emotion generation process, producing opposite outcomes.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.02 &mdash; Details</div><h2>The <em>Prefrontal-Amygdala</em> Circuit</h2></div>
  <p>The neural architecture underlying emotion regulation centers on the interaction between two systems: the prefrontal cortex (PFC), which mediates cognitive control, planning, and deliberate reasoning, and the amygdala, which provides rapid threat detection and emotional salience signaling. During cognitive reappraisal, PFC regions exert top-down modulation over amygdala reactivity.</p>
  <p>A <a href="https://www.sciencedirect.com/science/article/pii/S002839322100018X" target="_blank">2021 meta-analysis of amygdala-prefrontal connectivity</a><sup class="fn"><a>[4]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S002839322100018X" target="_blank">CM2 Amygdala-PFC Meta-Analysis &rarr;</a></span></sup> during emotion regulation found convergent functional connectivity between the amygdala and the left ventrolateral PFC, driven primarily by studies implementing reappraisal. Activity in dorsolateral, dorsal medial, anterior cingulate, and orbital frontal cortex covaries with amygdala activity during reappraisal, with coupling strength predicting the degree of negative affect attenuation.</p>
  <h3>Clinical Implications</h3>
  <p>In depression, anxiety, and PTSD, functional connectivity between prefrontal cortex and amygdala is diminished. The regulatory circuit is weakened. Cognitive-behavioral therapies &mdash; including Stoic-informed approaches &mdash; can be understood as training programs for this circuit: practicing reappraisal strengthens the prefrontal control pathway, just as physical exercise strengthens muscles.</p>
  <div class="callout"><h4>Key Insight</h4><p>The prefrontal-amygdala circuit is the neural substrate of Stoic practice. When this circuit functions well, people can examine their impressions (PFC engagement) and modulate their emotional responses (amygdala attenuation). When it is disrupted, emotions overwhelm judgment &mdash; exactly what the Stoics sought to prevent.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.03 &mdash; Details</div><h2><em>fMRI</em> Evidence: What Reappraisal Looks Like</h2></div>
  <p>Buhle and colleagues' 2014 meta-analysis of 48 fMRI studies is the most comprehensive neuroimaging review of cognitive reappraisal to date. The findings are remarkably consistent across studies, providing robust evidence for a specific neural signature of reappraisal.</p>
  <h3>Activations During Reappraisal</h3>
  <p>Reappraisal consistently activates three prefrontal regions: the dorsolateral prefrontal cortex (dlPFC), involved in working memory and cognitive control; the ventrolateral prefrontal cortex (vlPFC), involved in selecting and implementing reappraisal strategies; and the dorsomedial prefrontal cortex (dmPFC), involved in mentalizing and self-referential processing. Additionally, lateral temporal cortex activation reflects semantic processing &mdash; the brain is literally generating new meanings for the emotional stimulus.</p>
  <h3>Amygdala Attenuation</h3>
  <p>Bilateral amygdala activation is consistently reduced during reappraisal compared to passive viewing of emotional stimuli. This is the neural correlate of what the Stoics described as achieving equanimity through reason &mdash; the threat detection system is downregulated by deliberate cognitive engagement.</p>
  <h3>What Reappraisal Is NOT</h3>
  <p>Importantly, reappraisal does not activate ventromedial PFC, which is associated with extinction learning and habituation. This means reappraisal is a distinct process from simply getting used to emotional stimuli through repeated exposure. It requires active cognitive work each time, which aligns with the Stoic emphasis on persistent practice and vigilance.</p>
  <div class="callout"><h4>Key Insight</h4><p>The 48-study meta-analysis establishes that cognitive reappraisal has a specific, replicable neural signature: PFC activation plus amygdala attenuation. This is what happens in the brain when someone genuinely practices what the Stoics taught. And it is fundamentally different from what happens during suppression.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.04 &mdash; Details</div><h2><em>Causal</em> Evidence: TMS Studies</h2></div>
  <p>A critical limitation of fMRI studies is that they show correlation, not causation. The prefrontal cortex activates during reappraisal, but does it <em>cause</em> the reappraisal, or merely co-occur with it? In 2023, researchers answered this question using combined transcranial magnetic stimulation (TMS) and fMRI.</p>
  <p>TMS uses focused magnetic pulses to temporarily enhance or disrupt activity in specific brain regions. By stimulating the ventrolateral PFC during an emotion regulation task, researchers could test whether enhancing PFC activity causally improves reappraisal. The results were clear: TMS-induced vlPFC facilitation led to enhanced activity in both vlPFC and vmPFC, attenuated activity in the amygdala and insula, and improved behavioral measures of emotion regulation.</p>
  <h3>From Correlation to Causation</h3>
  <p>This is the strongest evidence to date that the prefrontal cortex does not merely correlate with successful reappraisal but actively drives it. The PFC is not a bystander &mdash; it is the mechanism. When you strengthen PFC engagement (through TMS in the lab, or through Stoic practice in daily life), you enhance the capacity for emotion regulation.</p>
  <div class="callout"><h4>Key Insight</h4><p>The TMS-fMRI study moves Stoic neuroscience from "these brain regions are associated with reappraisal" to "strengthening these brain regions causally improves reappraisal." This provides a mechanistic justification for the Stoic emphasis on regular practice &mdash; you are literally training a neural circuit.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.05 &mdash; Details</div><h2><em>Mapping</em> Stoic Practices to Mechanisms</h2></div>
  <p>Each core Stoic practice can be mapped to specific psychological mechanisms with identifiable neural substrates. These mappings are not post-hoc rationalizations &mdash; they generate testable predictions about what brain regions should be engaged during each practice.</p>
  <h3>The Map</h3>
  <p>Epictetus's "examine your impressions before assenting" maps directly to cognitive reappraisal, engaging dlPFC and vlPFC to modulate amygdala reactivity. Premeditatio malorum (negative visualization) maps to predictive processing and expectation adjustment, engaging dmPFC and anterior insula in simulation of future scenarios. The view from above maps to psychological distancing and decentering, engaging dmPFC and the temporoparietal junction (TPJ), the same regions activated during third-person perspective-taking.</p>
  <p>The dichotomy of control maps to attentional deployment (focusing on controllables) combined with acceptance (releasing attachment to uncontrollables), engaging the anterior cingulate cortex for attentional control and vlPFC for acceptance-based regulation. Morning intention-setting maps to goal-directed regulation and executive control via dlPFC and ACC. Evening self-examination maps to self-monitoring and error correction via dmPFC and ACC.</p>
  <div class="callout"><h4>Key Insight</h4><p>These mappings suggest that Stoic practice is not a single exercise but a multi-circuit training program. Different practices engage different regulatory pathways. This may explain why the complete Stoic practice package could outperform any single technique &mdash; it trains the full regulatory architecture.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.06 &mdash; Details</div><h2>Why <em>Suppression</em> Fails</h2></div>
  <p>The research on expressive suppression explains why "being stoic" (lowercase) produces worse outcomes than practicing Stoicism (uppercase). Suppression intervenes late in the emotion generation process &mdash; after the emotional response has already been generated. It targets the behavioral output (facial expressions, vocal tone, body language) while leaving the internal experience untouched or amplified.</p>
  <h3>The Internal Costs</h3>
  <p>Gross and John found that habitual suppressors experience less positive emotion &mdash; suppression dampens the good along with the bad. They also experience more negative emotion, not less, because the amygdala continues firing even when the expression is inhibited. The internal experience of distress persists while the capacity to signal distress to others (and thereby receive social support) is blocked.</p>
  <h3>The Social Costs</h3>
  <p><a href="https://psycnet.apa.org/record/2003-02341-008" target="_blank">Butler and colleagues (2003)</a><sup class="fn"><a>[5]</a><span class="tip"><a href="https://psycnet.apa.org/record/2003-02341-008" target="_blank">CM4 Butler et al. Social Consequences &rarr;</a></span></sup> demonstrated that suppression disrupts social interactions. When one partner suppresses during a conversation, the other partner's blood pressure increases &mdash; the inauthenticity is physiologically detected even when it's not consciously perceived. A <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4141473/" target="_blank">study of the college transition</a><sup class="fn"><a>[6]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4141473/" target="_blank">CM8 Social Costs: College Transition &rarr;</a></span></sup> found that habitual suppression predicted lower social support, less closeness to others, and lower social satisfaction. People who suppress are perceived as less genuine and less likeable.</p>
  <h3>Feelings of Inauthenticity</h3>
  <p>Perhaps the most insidious cost: suppressors report feeling inauthentic in their relationships. They know they are hiding their true emotional state, and this awareness creates a gap between their inner experience and their social presentation that erodes self-concept and relationship quality over time.</p>
  <div class="security-box"><h4>Clinical Warning</h4><p>When someone uses Stoic language to justify chronic emotional suppression &mdash; "I'm just being rational" or "Emotions are irrational, I'm above that" &mdash; they are not practicing Stoicism. They are practicing a strategy that research consistently associates with worse mental health, worse relationships, and reduced well-being. The Stoics would have called this a failure of wisdom.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.07 &mdash; Details</div><h2><em>Individual</em> Differences in Regulation</h2></div>
  <p>People differ substantially in their capacity for cognitive reappraisal, and these differences have neural correlates. Research using fMRI during emotion regulation tasks finds that the strength of functional connectivity between the amygdala and specific prefrontal regions predicts how effectively an individual can downregulate negative affect.</p>
  <p>Specifically, <a href="https://academic.oup.com/scan/article/12/4/569/2739707" target="_blank">amygdala coupling with orbitofrontal cortex (OFC) and dorsomedial prefrontal cortex</a><sup class="fn"><a>[7]</a><span class="tip"><a href="https://academic.oup.com/scan/article/12/4/569/2739707" target="_blank">CM6 Amygdala-PFC Connectivity &rarr;</a></span></sup> predicts the extent of negative affect attenuation during reappraisal. Individuals with stronger amygdala-PFC connectivity show greater success at reducing distress through reappraisal. This suggests that the "muscle" metaphor for Stoic practice has neurological validity &mdash; the regulatory circuit can be stronger or weaker across individuals.</p>
  <h3>Implications for Training</h3>
  <p>If reappraisal capacity varies across individuals and has neural substrates, then practice should strengthen it &mdash; just as physical training strengthens muscles. This is the neuroscience case for the Stoic emphasis on daily practice: morning reflection, evening review, and constant examination of impressions are training exercises for the prefrontal-amygdala regulatory circuit.</p>
  <div class="callout"><h4>Key Insight</h4><p>Individual differences in emotion regulation capacity have measurable neural correlates. This means Stoic practice is not equally easy for everyone, but also that the regulatory circuit can be trained. The Stoics' insistence on daily practice is neurologically justified.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.08 &mdash; Details</div><h2>The <em>Cognitive</em> Work Requirement</h2></div>
  <p>The most important practical takeaway from the neuroscience of emotion regulation: reappraisal is effortful. It requires engaging with the emotional stimulus, questioning the initial interpretation, generating alternative framings, and sustaining the new interpretation. This is cognitive <em>work</em>. It costs executive resources. It requires attention and practice.</p>
  <p>This is precisely what the Stoics described. Epictetus's "examine your impressions" is an instruction to do cognitive work &mdash; to pause before the automatic emotional response, inspect the judgment that's generating it, and evaluate whether that judgment is accurate. Marcus Aurelius's <em>Meditations</em> are the record of someone doing this work daily, sometimes struggling with it, sometimes succeeding.</p>
  <h3>What Happens Without the Work</h3>
  <p>When pop Stoicism reduces the practice to slogans &mdash; "just don't let it affect you," "control what you can control," "this too shall pass" &mdash; it removes the cognitive engagement that produces the benefit. Without examining the impression, there is no reappraisal. Without reappraisal, the PFC does not modulate the amygdala. The person is left with two options: feel the distress and show it (normal emotional responding) or feel the distress and hide it (suppression). Neither is Stoicism.</p>
  <div class="callout"><h4>Key Insight</h4><p>There is no shortcut to Stoic practice. The cognitive work IS the practice. The PFC engagement that produces emotional regulation requires active effort. This is why Stoicism cannot be reduced to motivational quotes &mdash; the quotes without the cognitive work are empty slogans that produce, at best, nothing and at worst, suppression.</p></div>`
];
