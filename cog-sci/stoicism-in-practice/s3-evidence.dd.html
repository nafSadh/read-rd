const summaries = [
  `<p>The most evidence-based psychotherapy in existence has explicit Stoic roots. <a href="https://thewalledgarden.com/albert-ellis-stoicism-as-the-root-of-cbt/" target="_blank">Albert Ellis built REBT on Epictetus</a>.<sup class="fn"><a>[1]</a><span class="tip"><a href="https://thewalledgarden.com/albert-ellis-stoicism-as-the-root-of-cbt/" target="_blank">EB1 Ellis: Stoicism as Root of CBT &rarr;</a></span></sup> <a href="https://bigthink.com/neuropsych/cbt-stoicism/" target="_blank">Aaron Beck quoted Marcus Aurelius</a><sup class="fn"><a>[2]</a><span class="tip"><a href="https://bigthink.com/neuropsych/cbt-stoicism/" target="_blank">EB2 Big Think: Ancient Roots &rarr;</a></span></sup> in his treatment manual. This is not a retrospective claim &mdash; both founders acknowledged the debt directly.</p>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.01 &mdash; Details</div><h2>The <em>Lineage</em>: Epictetus &rarr; Ellis &rarr; Beck</h2></div>
  <p>The connection between Stoicism and cognitive-behavioral therapy is not a retrospective claim by modern Stoic enthusiasts. It was acknowledged by the founders of CBT themselves. Albert Ellis and Aaron Beck both explicitly cited Stoic philosophy as a direct influence on their therapeutic approaches, making CBT the most well-validated indirect evidence for Stoic effectiveness.</p>
  <p>The philosophical principle is simple and powerful: our emotional responses are determined not by events themselves but by our interpretations of events. Epictetus stated this in the 1st century CE. Ellis restated it as the ABC model (Activating event, Beliefs, Consequences) in 1955. Beck operationalized it as the cognitive triad in the 1960s. Each reformulation added clinical precision while preserving the Stoic core.</p>
  <div class="callout"><h4>Key Insight</h4><p>CBT's evidence base is, indirectly, evidence for the Stoic principle that cognitive interpretation mediates emotional response. Hundreds of randomized controlled trials validate this mechanism. What we lack is evidence that the specifically Stoic packaging of this principle adds value beyond standard CBT.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.02 &mdash; Details</div><h2>What <em>Ellis</em> Borrowed</h2></div>
  <p>Albert Ellis developed Rational Emotive Behavior Therapy in 1955-56, making it the first form of cognitive therapy. Ellis was explicit about his debt to Stoicism, stating that some of the central principles of REBT were "originally discovered and stated" by the Stoics, particularly Epictetus and Marcus Aurelius.</p>
  <p>The core REBT principle &mdash; that emotional disturbance arises from irrational beliefs about events rather than from events themselves &mdash; is a direct translation of Epictetus's Enchiridion. Ellis added clinical precision by categorizing common irrational beliefs (demandingness, catastrophizing, low frustration tolerance) and developing techniques for disputing them. But the underlying insight is Stoic.</p>
  <h3>Beyond Simple Translation</h3>
  <p>Ellis did more than merely restate Epictetus. He operationalized the Stoic principle into a therapeutic protocol: identify the activating event, uncover the irrational belief, dispute the belief using evidence and logic, and arrive at a more rational interpretation. This ABC-DE model provided the clinical structure that Stoic philosophy lacked &mdash; a systematic method for helping people change their cognitive habits.</p>
  <div class="callout"><h4>Key Insight</h4><p>REBT shows how Stoic philosophy can be translated into clinical practice. Ellis preserved the Stoic core while adding therapeutic structure. The evidence base for REBT is the strongest available evidence for the Stoic approach to emotional regulation.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.03 &mdash; Details</div><h2>What <em>Beck</em> Built</h2></div>
  <p>Aaron Beck developed Cognitive Therapy in the 1960s, building on both Ellis's work and his own clinical observations. Beck's original treatment manual for depression explicitly states that the philosophical origins of cognitive therapy can be traced back to the Stoic philosophers. He liked to quote Marcus Aurelius on the primacy of judgment over circumstance.</p>
  <p>Beck's contribution was to systematize the cognitive approach further than Ellis had, developing specific protocols for depression, anxiety, and personality disorders that could be tested in randomized controlled trials. The result is the most extensively validated form of psychotherapy in existence &mdash; with hundreds of RCTs across dozens of disorders demonstrating its efficacy.</p>
  <h3>The Cognitive Triad</h3>
  <p>Beck's cognitive triad for depression &mdash; negative views of self, world, and future &mdash; maps to what the Stoics would have recognized as false judgments about one's character, circumstances, and prospects. The therapeutic intervention &mdash; identifying and challenging these negative automatic thoughts &mdash; is structurally identical to the Stoic practice of examining impressions before assenting to them.</p>
  <div class="callout"><h4>Key Insight</h4><p>Beck transformed Stoic philosophy into the most evidence-based psychotherapy in history. Every RCT that validates CBT for depression, anxiety, or PTSD is indirect evidence for the Stoic principle that cognitive interpretation drives emotional response.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.04 &mdash; Details</div><h2><em>ACT</em>: The Third-Wave Connection</h2></div>
  <p>Acceptance and Commitment Therapy, developed by Steven Hayes in the 1980s, represents the third wave of cognitive-behavioral therapies. ACT explicitly integrates insights from multiple philosophical traditions, including Stoicism, Buddhism, and Daoism. From Stoicism, it takes the dichotomy of control and values-based living. From Buddhism, it takes acceptance and mindfulness.</p>
  <p>The core construct of ACT &mdash; psychological flexibility &mdash; is the ability to contact the present moment fully, accept internal experiences (thoughts, emotions, sensations) without defense, and take committed action toward chosen values even in the presence of pain. This parallels the Stoic virtue of wisdom as the capacity to discern what is within one's control, accept what is not, and act virtuously regardless of circumstances.</p>
  <h3>A Crucial Difference</h3>
  <p>ACT departs from traditional Stoicism in an important way: it explicitly states that we cannot always control our thoughts and emotions, nor should we aim to. Where classical Stoicism sometimes implies that a fully wise person achieves complete cognitive mastery, ACT takes a more psychologically realistic position &mdash; the goal is not to eliminate unwanted thoughts and feelings but to change one's relationship to them. This is arguably a more effective therapeutic stance, even if it is less philosophically ambitious than the Stoic ideal.</p>
  <div class="callout"><h4>Key Insight</h4><p>ACT demonstrates that the Stoic dichotomy of control can be integrated with other philosophical traditions to create effective therapy. Its evidence base provides indirect support for Stoic principles while also suggesting that the pure Stoic emphasis on cognitive mastery may benefit from the Buddhist addition of acceptance.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.05 &mdash; Details</div><h2><em>Robertson</em>&rsquo;s Integration</h2></div>
  <p>Donald Robertson is a Scottish cognitive-behavioral psychotherapist who has done more than anyone to systematically bridge ancient Stoic philosophy and modern clinical psychology. His book <em><a href="https://www.routledge.com/The-Philosophy-of-Cognitive-Behavioural-Therapy-CBT-Stoic-Philosophy-as-Rational-and-Cognitive-Psychotherapy/Robertson/p/book/9780367219147" target="_blank">The Philosophy of Cognitive-Behavioural Therapy</a></em><sup class="fn"><a>[7]</a><span class="tip"><a href="https://www.routledge.com/The-Philosophy-of-Cognitive-Behavioural-Therapy-CBT-Stoic-Philosophy-as-Rational-and-Cognitive-Psychotherapy/Robertson/p/book/9780367219147" target="_blank">EB4 Robertson: Philosophy of CBT &rarr;</a></span></sup> (2010, 2nd edition 2019) provides a scholarly, detailed mapping of Stoic exercises to CBT protocols.</p>
  <p>Robertson's central argument goes beyond noting the historical connection. He contends that Stoicism is "bigger and deeper than CBT" because it provides a philosophy of life &mdash; an integrated worldview, ethical framework, and community of practice &mdash; rather than merely a set of therapeutic techniques. Standard CBT teaches skills for managing specific symptoms. Stoicism offers an identity.</p>
  <h3>The Identity Integration Hypothesis</h3>
  <p>Robertson suggests that this identity dimension may explain why Stoic practice could produce more lasting effects than standard CBT. When therapy ends, CBT skills can atrophy without practice. But someone who identifies as a Stoic practitioner has integrated the techniques into their self-concept and daily routine. The practice persists because it is who they are, not merely what they do during therapy sessions.</p>
  <p>This hypothesis is testable: compare long-term maintenance of gains between standard CBT participants and participants in Stoic-informed programs. If Robertson is correct, the Stoic group should show better relapse prevention. This trial has not yet been conducted, but the SABS now makes it feasible.</p>
  <div class="callout"><h4>Key Insight</h4><p>Robertson's work bridges the gap between Stoic philosophy and clinical evidence. His identity integration hypothesis &mdash; that Stoicism may outperform CBT for long-term adherence because it offers a philosophy of life, not just techniques &mdash; is the most interesting testable prediction in empirical Stoicism.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.06 &mdash; Details</div><h2><em>Stoic</em> Journaling: Ancient Practice, Modern Evidence</h2></div>
  <p>Marcus Aurelius's <em>Meditations</em> is the world's most famous philosophical journal &mdash; a record of a Roman emperor practicing Stoic self-examination, morning intention-setting, and evening review. Nearly two millennia later, meta-analytic evidence validates the psychological mechanisms underlying his practice.</p>
  <p>A systematic review and meta-analysis of journaling for mental illness management (PMC 2022) found that 68% of intervention outcomes were effective, with significant differences between control and intervention groups. The evidence supports journaling as a broadly effective intervention across mental health conditions.</p>
  <h3>The Stoic Bookend Structure</h3>
  <p>The specifically Stoic contribution is the morning-evening bookend: set intentions in the morning (what is up to me today, how will I act virtuously) and self-examine in the evening (what went well, what fell short, what can improve). In psychological terms, the morning practice maps to implementation intentions &mdash; specific if-then plans that increase goal attainment. The evening practice maps to self-monitoring &mdash; a core behavioral change technique that improves outcomes by increasing awareness and creating feedback loops.</p>
  <div class="callout"><h4>Key Insight</h4><p>The Stoic daily journal combines two empirically supported mechanisms: implementation intentions (morning) and self-monitoring (evening). Marcus Aurelius's practice was psychologically sophisticated, even if he understood it through philosophical rather than psychological language.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.07 &mdash; Details</div><h2><em>Gratitude</em> &amp; Negative Visualization Evidence</h2></div>
  <p>Two Stoic practices have particularly strong research parallels. Gratitude &mdash; appreciating what one has, central to Stoic contentment &mdash; has been extensively studied. And negative visualization (premeditatio malorum), while less directly researched, maps to emotional contrasting and exposure-based mechanisms.</p>
  <h3>Gratitude Research</h3>
  <p>A comprehensive meta-analysis of gratitude interventions (PMC 2023) found significant effects: participants showed 4% higher gratitude scores, 6.86% higher life satisfaction, 5.8% better mental health, 7.76% lower anxiety, and 6.89% lower depression compared to controls. Brief gratitude writing interventions decreased stress significantly even in healthcare workers during high-demand periods. Gratitude is among the most effective positive psychological interventions available.</p>
  <h3>Negative Visualization Parallels</h3>
  <p>Direct research on premeditatio malorum as a distinct practice is sparse, but the mechanisms it engages are well-studied. Imagining loss increases appreciation (emotional contrasting). Mental rehearsal of difficulties builds coping capacity (stress inoculation). Repeated imagining of feared outcomes reduces their emotional impact (exposure-based habituation). The Stoics appear to have intuitively arrived at techniques that modern psychology validates through different frameworks.</p>
  <div class="callout"><h4>Key Insight</h4><p>Gratitude practices have the strongest evidence base among Stoic-adjacent exercises. Negative visualization's mechanisms are supported through adjacent research fields. Together, they suggest the Stoics identified psychologically effective practices through philosophical reasoning alone.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.08 &mdash; Details</div><h2>The <em>Evidence</em> Gap: Components vs. Package</h2></div>
  <p>Intellectual honesty requires acknowledging a significant gap in the evidence for Stoicism. Most research supports individual <em>components</em> of Stoic practice &mdash; cognitive reappraisal, gratitude, journaling, self-distancing, acceptance-based coping, values clarification &mdash; rather than the integrated Stoic package. The evidence shows that the parts work. It does not yet show that the whole is greater than, equal to, or (conceivably) less than the sum of those parts.</p>
  <h3>What Would Close the Gap</h3>
  <p>The field needs at least one pre-registered randomized controlled trial comparing three conditions: (1) a complete Stoic practice program (e.g., extended SMRT), (2) standard CBT of equivalent duration, and (3) a waitlist or active control. The SABS should be administered at baseline, post-treatment, and follow-up to measure whether Stoic attitude change mediates outcome improvement. The primary hypothesis to test: does the integrated Stoic package &mdash; with its philosophical framework, identity component, and community dimension &mdash; produce better long-term outcomes than technique-focused CBT?</p>
  <p>Until such trials are conducted, the honest position is: Stoic practice is supported by strong mechanistic evidence and promising but methodologically limited outcome data. It is plausible that it works as well as or better than CBT. But it is not yet proven at clinical trial standards. Claiming otherwise is premature.</p>
  <div class="security-box"><h4>Honest Assessment</h4><p>Evidence-based Stoicism currently means: the mechanisms underlying Stoic practices are empirically validated through CBT and emotion regulation research. It does not yet mean: Stoic practice programs have been independently validated in randomized controlled trials. The distinction matters for clinical credibility.</p></div>`
];
