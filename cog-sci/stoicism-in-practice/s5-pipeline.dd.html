const summaries = [
  `<p><a href="https://en.wikipedia.org/wiki/Ryan_Holiday" target="_blank">Ryan Holiday</a><sup class="fn"><a>[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Ryan_Holiday" target="_blank">PP4 Ryan Holiday (Wikipedia) &rarr;</a></span></sup> built the most commercially successful Stoicism brand in history through the Daily Stoic books, podcast, email newsletter, and merchandise. The New York Times noted it sounds "more entrepreneurial than philosophic." The Guardian described it as putting Stoicism through a blender. At Stoicon 2016, some philosophy professors responded: "that's not Stoicism."</p>`,

  `<p>Ancient Stoicism was a complete system with three integrated pillars: physics (understanding nature), logic (reasoning correctly), and ethics (living virtuously). The pop pipeline strips them sequentially. Physics and logic disappear first. Ethics narrows from virtue to productivity. Cosmopolitan brotherhood vanishes in favor of individual optimization.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Physics</div><div class="sl">Gone First</div></div>
    <div class="st"><div class="sv">Logic</div><div class="sl">Gone Second</div></div>
    <div class="st"><div class="sv">Ethics</div><div class="sl">Narrowed to Productivity</div></div>
    <div class="st"><div class="sv">Community</div><div class="sl">Replaced by Self</div></div>
  </div>`,

  `<p>Philosophy reduced to quote cards, 60-second reels, and motivational overlays on sunset photos. The algorithm rewards engagement over accuracy. Different traditions get mixed freely under "Stoicism." Content creators optimize for virality, not philosophical fidelity. The result: billions of impressions conveying distorted versions of ancient thought.</p>`,

  `<p><a href="https://qz.com/866030/stoicism-silicon-valley-tech-workers-are-reading-ryan-holiday-to-use-an-ancient-philosophy-as-a-life-hack" target="_blank">Quartz</a><sup class="fn"><a>[2]</a><span class="tip"><a href="https://qz.com/866030/stoicism-silicon-valley-tech-workers-are-reading-ryan-holiday-to-use-an-ancient-philosophy-as-a-life-hack" target="_blank">PP3 Quartz: Silicon Valley &rarr;</a></span></sup> described it as tech workers using an ancient philosophy designed for Greek slaves as a life hack. The appeal: sense of control in chaotic industries, emotional detachment for decision-making, individual agency narrative. What's missing: Stoic critique of excessive wealth, emphasis on communal good, virtue over success.</p>`,

  `<p>Ron Purser's <em><a href="https://link.springer.com/article/10.1007/s12671-019-01264-x" target="_blank">McMindfulness</a></em><sup class="fn"><a>[3]</a><span class="tip"><a href="https://link.springer.com/article/10.1007/s12671-019-01264-x" target="_blank">PP5 Purser: McMindfulness &rarr;</a></span></sup> (2019) documented how Buddhist mindfulness became a $4B+ industry stripped of its ethical core. The pattern maps directly to Stoicism: rigorous practice becomes clinical tool becomes popular book becomes social media content becomes cultural appropriation. Same mechanism, same trajectory of harm.</p>
  <ul class="s-list">
    <li><strong>Mindfulness:</strong> Rigorous practice &rarr; MBSR/MBCT &rarr; Headspace/Calm &rarr; Corporate wellness &rarr; $4B+ industry</li>

  </ul>`,

  `<p>Academic Stoics (<a href="https://en.wikipedia.org/wiki/Massimo_Pigliucci" target="_blank">Pigliucci</a>,<sup class="fn"><a>[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Massimo_Pigliucci" target="_blank">PP8 Pigliucci (Wikipedia) &rarr;</a></span></sup> Robertson, Sellars, Becker) maintain philosophical rigor but reach thousands. Popular Stoics (Holiday, Ferriss, influencers) reach millions but distort. Pigliucci's "How to Be a Stoic" shows that accessibility and accuracy are not mutually exclusive, but commercial incentives favor simplification.</p>`,

  `<p>The strongest counter-argument: Holiday has introduced millions to Stoicism who would never read Epictetus directly. Some fraction will go deeper. The pipeline acts as a funnel, with shallow engagement at the top and genuine practice at the bottom. The question is whether the ratio of authentic practitioners to distorted practitioners makes the pipeline net-positive.</p>`,

  `<p>The pipeline cannot be eliminated &mdash; commercial incentives are too strong. But it may be fixable through: (1) accessible but accurate popular content, (2) clear labeling of what is and isn't Stoicism, (3) emphasis on the cognitive work requirement, (4) partnership between academics and popularizers, (5) empirical Stoicism (SABS, RCTs) providing an evidence benchmark.</p>
  <div class="callout">
    <h4>The Bottom Line</h4>
    <p>The inverse relationship between philosophical rigor and cultural reach is not inevitable. It is a consequence of commercial incentives that reward simplification. The antidote is not gatekeeping but creating accessible content that maintains intellectual honesty about what Stoicism actually requires.</p>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.01 &mdash; Details</div><h2>The <em>Daily</em> Stoic Empire</h2></div>
  <p>Ryan Holiday, a former marketing strategist and media consultant, has built the most commercially successful Stoicism brand in history. The Daily Stoic ecosystem includes multiple bestselling books (<em>The Obstacle is the Way</em>, <em>Ego is the Enemy</em>, <em>The Daily Stoic</em>), a daily podcast, an email newsletter, coin collections, leather journals, and online courses. The commercial success is undeniable &mdash; millions of copies sold, a devoted audience, mainstream cultural penetration.</p>
  <p>The critical reception is divided. The New York Times observed that Holiday's approach sounds more entrepreneurial than philosophic. The Guardian's Zoe Williams described the method as putting Stoicism through a blender until the only remaining building block is the alphabet. At the 2016 Stoicon conference, philosophy professor Massimo Pigliucci noted that some attendees responded to Holiday's presentation by saying "that's not Stoicism." Goodreads reviewers have described the commentary as shallow, noting that Holiday's view is rooted in financial and personal gain &mdash; antithetical to a philosophy that identified virtue, not success, as the sole good.</p>
  <h3>The Marketing Lens</h3>
  <p>Holiday's background in marketing is relevant. His approach to Stoicism applies the same principles he used in media consulting: identify what sells (resilience, self-control, productivity), package it attractively (daily quotes, actionable advice), and build a brand ecosystem around it. This is effective marketing. Whether it is effective philosophy is a different question. The Stoics would have viewed the pursuit of commercial success through philosophy as a fundamental confusion about what philosophy is for.</p>
  <div class="callout"><h4>Key Insight</h4><p>Holiday's commercial success is itself evidence of the demand for Stoic-adjacent content. The question is not whether people want what he's selling but whether what he's selling is actually Stoicism or a motivational product wearing Stoic clothing.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.02 &mdash; Details</div><h2>What <em>Gets</em> Lost: Physics, Logic, Ethics</h2></div>
  <p>Ancient Stoicism was a complete philosophical system with three integrated pillars that the Stoics compared to an egg: physics (the yolk), logic (the shell), and ethics (the white). They insisted these could not be separated without losing the whole. The pop pipeline separates them ruthlessly, keeping only what sells.</p>
  <h3>Physics: First to Go</h3>
  <p>Stoic physics included a comprehensive cosmology: the universe as a living, rational organism (the logos), deterministic providence, the conflagration (ekpyrosis), and the pneuma that pervades all matter. Nobody reads Ryan Holiday for Stoic cosmology. This material disappears entirely from popular presentations, even though the Stoics considered it foundational to understanding one's place in the natural order.</p>
  <h3>Logic: Second to Go</h3>
  <p>The Stoics made significant contributions to formal logic, including propositional logic, the theory of conditionals, and dialectical reasoning. Their emphasis on clear thinking and argumentative rigor was central to the philosophical practice. None of this survives in popular Stoicism. The irony: the Stoics considered logic the tool by which one examines impressions &mdash; the very skill that prevents the reappraisal-suppression collapse.</p>
  <h3>Ethics: Narrowed Beyond Recognition</h3>
  <p>Stoic ethics survives in popular form, but radically narrowed. The full ethical system included: virtue (arete) as the sole good; preferred and dispreferred indifferents; cosmopolitan duty to all humans; justice, courage, temperance, and wisdom as the four cardinal virtues; living "according to nature" as a rational social being. What survives: "control what you can control" and "be resilient." The ethical framework shrinks from a comprehensive vision of the good life to a productivity optimization technique.</p>
  <div class="callout"><h4>Key Insight</h4><p>The pop pipeline does not merely simplify Stoicism. It dismembers it. The Stoics insisted that physics, logic, and ethics form an inseparable whole. What remains after the pipeline &mdash; decontextualized quotes and the dichotomy of control &mdash; is not a simpler version of Stoicism but a different thing entirely, wearing the same name.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.03 &mdash; Details</div><h2>The <em>Instagram-ification</em> of Philosophy</h2></div>
  <p>Philosophy on social media follows the same content optimization dynamics as every other domain: brevity over depth, emotion over reason, provocation over accuracy. Stoicism is particularly vulnerable because it has superficially quotable source material. Marcus Aurelius wrote in aphoristic fragments. Epictetus was recorded in pithy exchanges. Seneca composed elegant letters. These formats translate easily to quote cards and reels &mdash; but the translation strips the cognitive context that gives them meaning.</p>
  <p>A Marcus Aurelius quote on a sunset background conveys the aesthetic of wisdom without requiring any cognitive work. The viewer feels wise for having encountered it, shares it with their network, and moves on. The algorithm registers engagement and serves more similar content. At no point does anyone examine their impressions, question their judgments, or practice cognitive reappraisal. The philosophy is consumed as entertainment, not practiced as a discipline.</p>
  <h3>The Mixing Problem</h3>
  <p>Social media Stoicism freely mixes different philosophical traditions under a single label. Buddhist concepts (non-attachment, mindfulness), Epicurean ideas (pleasure management), generic self-help advice (positive thinking, hustle culture), and authentic Stoic principles get blended into an undifferentiated philosophical smoothie. The consumer has no way to distinguish the Stoic ingredients from the rest, and no incentive to try.</p>
  <div class="callout"><h4>Key Insight</h4><p>Social media optimizes for engagement, not accuracy. Since simplified, decontextualized philosophy generates more engagement than careful philosophical exposition, the platform systematically selects for distortion. This is not a failure of individual creators but a structural feature of the medium.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.04 &mdash; Details</div><h2><em>Silicon</em> Valley Stoicism</h2></div>
  <p>The tech industry's adoption of Stoicism reveals the reductive impulse at its most transparent. Quartz reported in 2016 on the phenomenon of tech workers using an ancient philosophy &mdash; originally developed by and for people with far less power and privilege &mdash; as a productivity optimization tool. The appeal maps perfectly to tech culture: individual agency over collective action, rational optimization of emotional responses, self-reliance in competitive environments, and the seductive belief that the right mental framework can solve any problem.</p>
  <p>What gets preserved: the dichotomy of control (useful for managing startup uncertainty), emotional regulation (useful for high-stakes decisions), morning routines (Silicon Valley loves optimized routines), and resilience (useful for the inevitable pivot). What gets discarded: the Stoic critique of excessive wealth accumulation, the emphasis on communal good over private success, the insistence that virtue &mdash; not wealth, status, or power &mdash; is the sole good.</p>
  <h3>The Irony of the Slave's Philosophy</h3>
  <p>Epictetus was a slave. He developed his philosophy from a position of radical powerlessness. His dichotomy of control was a survival strategy for someone who literally could not control his external circumstances. When a tech billionaire adopts the same framework to manage the stress of deciding between competing acquisition offers, the philosophy is being used in a context that inverts its original meaning. The powerful using the powerless person's coping strategy, while ignoring the ethical obligations that same philosophy places on the powerful.</p>
  <div class="callout"><h4>Key Insight</h4><p>Silicon Valley Stoicism reveals the most sophisticated form of the pop pipeline's distortion: the philosophy of the powerless is adopted by the powerful, stripped of its ethical demands, and used to optimize the pursuit of exactly what the Stoics considered indifferent to human flourishing.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.05 &mdash; Details</div><h2>The <em>McMindfulness</em> Parallel</h2></div>
  <p>Ron Purser's <em>McMindfulness</em> (2019) documented how Buddhist mindfulness was transformed from a rigorous contemplative practice embedded in an ethical framework into a $4 billion industry stripped of that framework. The parallel to Stoicism is almost exact, and examining the mindfulness trajectory provides a predictive model for where Stoicism is headed.</p>
  <h3>The Mindfulness Trajectory</h3>
  <p>Stage 1: Rigorous Buddhist practice with ethical precepts, community (sangha), and teacher guidance. Stage 2: Jon Kabat-Zinn develops MBSR, secularizing mindfulness for clinical use while maintaining therapeutic integrity. Stage 3: Headspace, Calm, and other apps package mindfulness as a consumer product. Stage 4: Corporate wellness programs adopt mindfulness to reduce employee stress without addressing the working conditions causing it. Stage 5: Mindfulness becomes a buzzword, marketed for everything from weight loss to productivity, with minimal connection to its origins.</p>
  <h3>The Stoicism Trajectory (In Progress)</h3>
  <p>Stage 1: Academic Stoicism (Pigliucci, Robertson) maintains philosophical rigor. Stage 2: Modern Stoicism org develops evidence-based programs (Stoic Week, SMRT). Stage 3: Holiday packages Stoicism as a consumer product (books, podcast, merchandise). Stage 4: Social media atomizes Stoicism into quote cards and reels. Stage 5 (emerging): Manosphere appropriates Stoic language for purposes antithetical to Stoic ethics.</p>
  <h3>The Common Mechanism</h3>
  <p>In both cases, the ethical core is stripped first because it constrains the commercial applications. Buddhist ethics limits what mindfulness can be used for (not weapons training). Stoic ethics limits what the philosophy supports (not wealth accumulation as a primary goal). Remove the ethics, and the practice becomes available for any purpose &mdash; including purposes the founders would have rejected.</p>
  <div class="callout"><h4>Key Insight</h4><p>Purser's McMindfulness critique applies almost directly to the Stoicism industry. The mechanism is identical: ethical practice becomes technique, technique becomes product, product becomes brand, brand becomes cultural appropriation. The antidote in both cases is restoring the ethical framework that gives the practice its meaning.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.06 &mdash; Details</div><h2><em>Academic</em> vs. Popular: The Quality Gap</h2></div>
  <p>The gap between academic and popular Stoicism is not primarily a gap of intelligence or intention. It is a gap created by different incentive structures. Academic philosophers and clinical psychologists are rewarded for accuracy, nuance, and intellectual honesty. Popular writers and social media creators are rewarded for engagement, simplicity, and emotional resonance. These incentive structures systematically produce different kinds of content.</p>
  <p>Massimo Pigliucci (CCNY philosophy professor) demonstrates that the gap can be narrowed. His <em>How to Be a Stoic</em> is accessible, engaging, and philosophically careful. It introduces readers to Stoic practice through a conversational format while maintaining historical and philosophical accuracy. Critics note even Pigliucci's "pick-and-choose attitude to Stoicism" &mdash; his secular interpretation leaves out Stoic theology &mdash; but the philosophical substance is solid.</p>
  <h3>The Reach Problem</h3>
  <p>Academic Stoics reach thousands. Popular Stoics reach millions. The quality gap means that for every person exposed to careful philosophical Stoicism, hundreds or thousands are exposed to distorted versions. The question is whether the small number of genuinely engaged practitioners produced by the pipeline justifies the large number of people practicing suppression-as-Stoicism.</p>
  <div class="callout"><h4>Key Insight</h4><p>The quality gap is a structural problem, not a character problem. Different incentive structures reward different kinds of content. Closing the gap requires either changing the incentives (unlikely) or creating content that satisfies both accuracy and engagement requirements (possible but difficult).</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.07 &mdash; Details</div><h2>The <em>Democratization</em> Defense</h2></div>
  <p>The strongest counter-argument to pipeline criticism is the democratization defense: popular writers have introduced Stoicism to millions of people who would never have encountered Epictetus, Seneca, or Marcus Aurelius through academic channels. Some fraction of these millions will pursue deeper engagement. The pipeline functions as a funnel, with shallow engagement at the wide top and genuine practice at the narrow bottom.</p>
  <p>This argument has merit. Before Holiday's books, Stoicism was largely confined to philosophy departments and small communities of practitioners. After them, millions of people have at least a passing familiarity with Stoic concepts. Modern Stoicism's Stoic Week has grown in part because of this increased cultural awareness. Robertson's clinical work reaches more people because potential clients already know the word "Stoicism."</p>
  <h3>The Counter-Counter-Argument</h3>
  <p>The question is one of ratios. If the pipeline produces 100 genuine practitioners and 100,000 people practicing emotional suppression under a Stoic label, is that a net positive? The genuine practitioners benefit. But the 100,000 may be actively harmed &mdash; and they associate their harm with "Stoicism," poisoning the well for anyone who might have arrived at authentic practice through other routes. Moreover, the cultural distortion makes it harder for genuine practitioners to explain what they actually do.</p>
  <div class="callout"><h4>Key Insight</h4><p>The democratization defense is valid but incomplete. It accounts for the benefits at the bottom of the funnel while ignoring the harms at the top. A complete assessment requires measuring both. Currently, neither side has the data to settle the question empirically.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.08 &mdash; Details</div><h2>Can the <em>Pipeline</em> Be Fixed?</h2></div>
  <p>The pipeline cannot be eliminated because the commercial incentives driving it are too strong. But it may be possible to improve the signal-to-noise ratio through several strategies.</p>
  <h3>Strategies</h3>
  <p>First, accessible but accurate popular content. Pigliucci's <em>How to Be a Stoic</em> proves this is possible. More philosophers and psychologists could write for general audiences while maintaining intellectual integrity. Second, clear labeling. Distinguishing "Stoic-inspired self-help" from "Stoic philosophy" would help consumers understand what they're getting. Third, emphasis on the cognitive work requirement. Any presentation of Stoicism that fails to teach the examination of impressions &mdash; the actual cognitive work &mdash; should be flagged as incomplete.</p>
  <p>Fourth, partnership between academics and popularizers. Rather than attacking Holiday, academic Stoics could work with popular channels to improve content quality. Fifth, empirical benchmarking. The SABS and future RCTs provide an evidence-based standard against which popular claims can be measured. "Does this teaching increase SABS scores?" is a testable question that cuts through marketing noise.</p>
  <div class="callout"><h4>Key Insight</h4><p>The pipeline is a distribution problem, not an unsolvable one. The mindfulness community has begun addressing McMindfulness through "trauma-informed" and "ethics-integrated" programs. Stoicism could follow a similar path: acknowledge the commercialization problem, develop quality standards, and create accessible content that maintains philosophical and empirical integrity.</p></div>`
];
