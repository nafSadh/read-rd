const sections = [

const summaries = [
  `<p>Stephen LaBerge, a Stanford psychophysiologist, transformed lucid dreaming from dismissed anecdote to measurable science.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Stephen_LaBerge">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Stephen_LaBerge" target="_blank">Wikipedia: Stephen LaBerge &rarr;</a></span></sup> His PhD research (1980) established the eye-signal paradigm and developed the MILD technique, achieving a personal rate of 18-26 lucid dreams per month.<sup class="fn"><a href="https://dreslerlab.org/laberge/">[2]</a><span class="tip"><a href="https://dreslerlab.org/laberge/" target="_blank">Dresler Lab: LaBerge Lucid Dreaming &rarr;</a></span></sup> He founded the Lucidity Institute and developed the DreamLight device for external cue delivery.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1980</div><div class="sl">Stanford PhD</div></div>
    <div class="st"><div class="sv">21.5/mo</div><div class="sl">LD Frequency</div></div>
    <div class="st"><div class="sv">4/night</div><div class="sl">Peak Rate</div></div>
  </div>`,

  `<p>The eye-signal paradigm exploited a crucial neuroanatomical fact: during REM, voluntary muscles are paralyzed except for the extraocular muscles and the diaphragm. A lucid dreamer who knows they are dreaming can perform a pre-arranged pattern of deliberate left-right eye movements that appears on the electrooculogram (EOG), providing real-time communication from inside the dream.</p>
  <div class="callout">
    <h4>Communication Across Consciousness</h4>
    <p>The eye-signal paradigm achieved something remarkable: two-way communication between waking experimenters and dreaming subjects. Researchers could pose questions (via external cues) and receive answers (via eye signals) from a person inside a dream &mdash; bridging the gap between two states of consciousness in real time.</p>
  </div>`,

  `<p>Brain imaging reveals that lucid dreaming is a genuine hybrid state, combining features of both waking and REM sleep.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC6451677/">[3]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC6451677/" target="_blank">PMC: Cognitive Neuroscience of Lucid Dreaming (2019) &rarr;</a></span></sup> Increased prefrontal cortex activity (metacognition, self-awareness) appears atop normal REM patterns. Gamma oscillations at approximately 40Hz emerge in frontotemporal regions. Voss et al. showed that external 40Hz tACS stimulation during REM induced lucidity in 77% of trials.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Prefrontal Reactivation</h4><p>Dorsolateral PFC, normally silent in REM, becomes active &mdash; restoring metacognitive awareness within the dream.</p></div>
    <div class="feat"><h4>40Hz Gamma</h4><p>Characteristic gamma oscillations in frontotemporal cortex distinguish lucid from non-lucid REM.</p></div>
    <div class="feat"><h4>tACS Induction</h4><p>Voss et al. (2014): external 40Hz stimulation during REM induced lucidity in 77% of subjects.</p></div>
    <div class="feat"><h4>Hybrid EEG</h4><p>EEG pattern distinct from both normal REM and full waking &mdash; a genuinely novel state of consciousness.</p></div>
  </div>`,

  `<p>Several techniques have been developed for inducing lucid dreams, with varying degrees of scientific validation. The most studied is LaBerge&rsquo;s MILD (Mnemonic Induction of Lucid Dreams), which uses prospective memory &mdash; the ability to remember to perform a future action &mdash; to set an intention to recognize the dream state.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">MILD</div><div class="tl-text">Wake after 5h, set intention to recognize dreaming, fall back asleep during REM rebound. Most validated technique.</div></div>
    <div class="tl-item"><div class="tl-date">WILD</div><div class="tl-text">Maintain consciousness through sleep-onset transition. Difficult but produces immediate, vivid lucidity.</div></div>
    <div class="tl-item"><div class="tl-date">WBTB</div><div class="tl-text">Wake Back To Bed: 5-6h sleep, stay awake 20-60 min, return to sleep. Often combined with MILD.</div></div>
    <div class="tl-item"><div class="tl-date">Reality Testing</div><div class="tl-text">Habitual waking checks (hand inspection, text reading) transfer as dream habits triggering awareness.</div></div>
    <div class="tl-item"><div class="tl-date">External Cues</div><div class="tl-text">Light/sound devices (DreamLight, NovaDreamer) deliver stimuli during REM that trained dreamers recognize.</div></div>
    <div class="tl-item"><div class="tl-date">tACS</div><div class="tl-text">40Hz transcranial alternating current stimulation. Laboratory-only. 77% induction rate (Voss 2014).</div></div>
  </div>`,

  `<p>Lucid dreaming therapy has progressed from clinical observation to randomized controlled trials.<sup class="fn"><a href="https://medicalxpress.com/news/2026-02-lucid-mental-health-therapy.html">[4]</a><span class="tip"><a href="https://medicalxpress.com/news/2026-02/lucid-mental-health-therapy.html" target="_blank">MedicalXpress: Lucid Dreaming for Mental Health Therapy (2026) &rarr;</a></span></sup> The 30-year track record for nightmare treatment has now been extended to full PTSD treatment. An IONS study found 85% of participants no longer met PTSD criteria post-intervention,<sup class="fn"><a href="https://www.ptsduk.org/lucid-dreaming-study/">[5]</a><span class="tip"><a href="https://www.ptsduk.org/lucid-dreaming-study/" target="_blank">PTSD UK: Lucid Dreaming Study (2024) &rarr;</a></span></sup> and a 2025 RCT confirmed sustained reductions in PTSD symptoms and nightmare distress at one-month follow-up.<sup class="fn"><a href="https://www.sciencedirect.com/science/article/pii/S2468749925000122">[6]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S2468749925000122" target="_blank">ScienceDirect: Decreased PTSD Symptoms Following Lucid Dreaming Workshop (2025) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">85%</div><div class="sl">PTSD Resolution</div></div>
    <div class="st"><div class="sv">30+ yr</div><div class="sl">Nightmare Treatment</div></div>
    <div class="st"><div class="sv">2025</div><div class="sl">RCT Confirmed</div></div>
    <div class="st"><div class="sv">38</div><div class="sl">Studies Analyzed</div></div>
  </div>`,

  `<p>Lucid dreaming challenges the binary between conscious and unconscious states. If awareness can exist within a dream, consciousness is not a switch but a spectrum. This has implications for Descartes&rsquo; dream argument, theories of consciousness (global workspace, IIT, higher-order), and fundamental questions about the relationship between subjective experience and brain state.</p>
  <ul class="s-list">
    <li>Consciousness as spectrum, not binary (wake/sleep)</li>
    <li>Descartes: How do you know you&rsquo;re not dreaming now?</li>
    <li>Global workspace theory must account for partial workspace access</li>
    <li>IIT must explain how phi changes within REM when lucidity emerges</li>
    <li>Higher-order theories: metacognition can emerge within an altered state</li>
  </ul>`,

  `<p>Despite promising results, lucid dreaming research faces significant limitations. Not everyone can learn to lucid dream. Clinical trial sample sizes remain small. The long-term effects of regular lucid dreaming on sleep quality and architecture are unknown. External induction methods need more replication. The field is at an early stage of clinical translation.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Strong Evidence</h4>
      <ul>
        <li>Eye-signal paradigm robustly replicated</li>
        <li>Distinct neural signature confirmed</li>
        <li>Nightmare treatment well-established</li>
        <li>PTSD applications showing RCT promise</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Limitations</h4>
      <ul>
        <li>Not universally learnable</li>
        <li>Small clinical trial samples</li>
        <li>Long-term sleep effects unknown</li>
        <li>tACS needs independent replication</li>
      </ul>
    </div>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>LaBerge</em>&rsquo;s Revolution</h2></div>
  <p>Before Stephen LaBerge, lucid dreaming existed in an awkward scientific limbo. Reports of dream awareness appeared in writings from Aristotle onward, and the term itself was coined by Dutch psychiatrist Frederik van Eeden in 1913. But mainstream sleep science dismissed it as impossible, fantasy, or at best a brief awakening mistaken for dreaming. LaBerge's genius was to design an experimental paradigm that made the phenomenon undeniable.</p>
  <h3>The Stanford Years</h3>
  <p>LaBerge began his PhD research at Stanford University's Sleep Research Center under William Dement. His first challenge was developing the MILD technique (Mnemonic Induction of Lucid Dreams) to reliably produce lucid dreams in a laboratory setting. The technique leverages prospective memory: the dreamer wakes briefly after a REM period, rehearses the intention to recognize the next dream, and falls back asleep during the subsequent REM rebound. In LaBerge's personal practice, this produced 18 to 26 lucid dreams per month, with up to 4 in a single night.</p>
  <h3>Beyond the Laboratory</h3>
  <p>After completing his PhD in 1980, LaBerge founded the Lucidity Institute and developed consumer products for lucid dream induction, including the DreamLight and NovaDreamer devices that deliver light cues during detected REM periods. While these devices had mixed success in independent testing, they established the principle that external stimulation during REM could promote lucidity. LaBerge also published "Lucid Dreaming" (1985) and "Exploring the World of Lucid Dreaming" (1990), reaching a popular audience and inspiring a generation of researchers.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>The <em>Eye-Signal</em> Proof</h2></div>
  <p>The eye-signal paradigm was the critical experimental innovation. LaBerge realized that during REM sleep, the body's voluntary muscles are paralyzed by brainstem-mediated atonia &mdash; but the extraocular muscles are spared because they are controlled by cranial nerves, not spinal motor neurons. This meant that a sleeping person who became aware they were dreaming could voluntarily move their eyes in a pre-agreed pattern, and this signal would appear on the laboratory's electrooculogram.</p>
  <h3>The Protocol</h3>
  <p>Before sleep, the subject and experimenter agreed on a specific eye-movement signal &mdash; typically a sequence like "left-right-left-right" repeated at an unusual pace. The subject was then monitored with full polysomnography (EEG, EOG, EMG). When the experimenter detected the pre-arranged eye signal occurring during verified REM sleep (confirmed by EEG and EMG), this constituted proof that the subject was simultaneously dreaming (in REM) and consciously aware (able to execute the pre-arranged signal).</p>
  <h3>Implications</h3>
  <p>The paradigm's implications extend far beyond proving lucid dreaming exists. It established that dream time roughly corresponds to real time (the eye movements happen at the speed intended by the dreamer), that dreamers can access pre-sleep memories (remembering the agreed signal), and that voluntary action is possible within the dream state. Subsequent researchers used the paradigm to study dream perception, dream time, and even dream sexual responses, all verified through the eye-signal method.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>The <em>Neuroscience</em></h2></div>
  <p>Neuroimaging studies of lucid dreaming have revealed a state that is genuinely distinct from both normal REM sleep and waking consciousness. The key finding: lucid dreaming involves reactivation of specific prefrontal and parietal regions atop an otherwise normal REM background, producing a hybrid neurological state.</p>
  <h3>Prefrontal Reactivation</h3>
  <p>During normal REM sleep, the dorsolateral prefrontal cortex (dlPFC) is substantially deactivated &mdash; this is why dreamers lack critical thinking and accept impossible events. During lucid dreaming, the dlPFC shows significantly increased activation, restoring metacognitive capacity. The dreamer can reflect on the fact that they are dreaming, make plans, and exert some degree of volitional control over dream content, while the rest of the brain remains in REM mode.</p>
  <h3>Gamma Oscillations</h3>
  <p>Voss and colleagues (2009) demonstrated that lucid dreaming is accompanied by increased gamma-band oscillations at approximately 40Hz in frontotemporal regions. Gamma oscillations are associated with conscious awareness, binding of perceptual features, and working memory in waking states. Their emergence during lucid dreaming suggests that the transition to lucidity involves engaging the same neural mechanisms that support conscious awareness during waking, but within the context of ongoing REM sleep.</p>
  <h3>External Induction</h3>
  <p>In a dramatic follow-up, Voss et al. (2014) applied transcranial alternating current stimulation (tACS) at 40Hz to sleeping subjects during REM, inducing lucidity in 77% of stimulation trials. This established a causal link between frontal gamma oscillations and dream awareness, moving beyond correlation to demonstration. However, independent replication has been limited, and the practical applicability of tACS for clinical use remains uncertain.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Induction</em> Techniques</h2></div>
  <p>Multiple techniques for inducing lucid dreams have been developed, with varying levels of scientific validation. The most effective approaches combine cognitive training with strategic sleep timing to maximize the probability of achieving awareness during REM sleep.</p>
  <h3>MILD: The Gold Standard</h3>
  <p>LaBerge's Mnemonic Induction of Lucid Dreams remains the best-validated cognitive technique. After sleeping 5-6 hours, the practitioner wakes briefly, recalls a recent dream, identifies a dream sign (an impossible or unusual element), rehearses the intention "Next time I'm dreaming, I will realize I'm dreaming," and visualizes returning to the recalled dream while maintaining this intention. The technique exploits two factors: the natural REM rebound that occurs in late-morning sleep, and prospective memory (the cognitive ability to remember to do something in the future).</p>
  <h3>Combination Approaches</h3>
  <p>Research suggests that combining techniques is more effective than any single method. The combination of WBTB (providing the sleep-interruption timing) with MILD (providing the cognitive intention) consistently outperforms either technique alone. Adding reality testing during waking hours further increases success rates. The key insight is that lucid dreaming is a learnable skill, not an innate talent &mdash; though some individuals have a natural predisposition, anyone with normal REM sleep can potentially develop the ability with practice.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2><em>Therapeutic</em> Applications</h2></div>
  <p>The therapeutic application of lucid dreaming has evolved from clinical anecdote through controlled studies to randomized controlled trials, with the most compelling evidence in nightmare treatment and PTSD.</p>
  <h3>Nightmare Treatment</h3>
  <p>Lucid dreaming has been used to treat chronic nightmares for over thirty years. The mechanism is intuitive: if a patient can become aware that a nightmare is a dream, they gain the ability to confront or change the threatening content rather than being a passive victim of the experience. This breaks the cycle of helpless re-experiencing that characterizes chronic nightmares and represents a fundamentally different approach from other nightmare interventions like imagery rehearsal therapy (IRT), which requires waking visualization of altered dream content.</p>
  <h3>PTSD Breakthrough</h3>
  <p>The extension to full PTSD treatment represents a significant advance. The IONS study (2024) used a structured lucid dreaming workshop to train PTSD sufferers in dream awareness techniques. Results were striking: 85% of participants no longer met diagnostic criteria for PTSD after the intervention, with effects sustained at four-week follow-up. A separate 2025 RCT confirmed these findings, showing significant reductions in both PTSD symptoms and nightmare distress compared to a control group, with improvements maintained at one-month follow-up.</p>
  <h3>Mechanism</h3>
  <p>The therapeutic mechanism likely involves multiple pathways: breaking the passive re-experiencing cycle (gaining agency within the dream), emotional re-processing (confronting and modifying traumatic content in a safe context), and cognitive restructuring (the experience of controlling a nightmare may generalize to increased sense of control over PTSD symptoms during waking). A 2026 review of 38 peer-reviewed studies confirmed the therapeutic potential while noting that all included studies used objective verification (EEG or eye signals) of lucid dreaming.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>Philosophical</em> Implications</h2></div>
  <p>Lucid dreaming is not merely a curiosity of sleep science; it raises fundamental questions about the nature of consciousness, the reliability of experience, and the boundaries between mental states.</p>
  <h3>Consciousness as Spectrum</h3>
  <p>The existence of lucid dreaming demolishes the simple binary model of consciousness (awake = conscious, asleep = unconscious). If a person can be simultaneously dreaming (in verified REM sleep) and self-aware (capable of metacognitive reflection and voluntary action), then consciousness exists on a spectrum with multiple dimensions. Lucid dreaming occupies a genuine middle ground: the dreamer has some waking-type awareness (they know they are dreaming) without having full waking-type consciousness (they remain in the dream, the body is paralyzed, the external world is absent).</p>
  <h3>Descartes Revisited</h3>
  <p>Ren&eacute; Descartes' dream argument asked: how can you be certain, at any given moment, that you are not dreaming? Lucid dreaming provides an empirical answer: you can sometimes know you are dreaming from within the dream. But this raises a deeper puzzle &mdash; if reality testing works within dreams, what makes us confident our waking "reality tests" are reliable? The lucid dreamer's certainty about dreaming is itself occurring within an altered state, raising questions about the epistemic foundations of any state of consciousness.</p>
  <h3>The Privacy Question</h3>
  <p>As dream engineering advances (Section 6), lucid dreaming raises questions about the last private space of human consciousness. If external stimulation can influence dream content, and if future technologies can detect or decode dream content, dreams may cease to be the purely internal, unobserved experiences they have been throughout human history. This has implications for privacy, autonomy, and the ethics of consciousness technology that are only beginning to be explored.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2><em>Limitations</em> &amp; Questions</h2></div>
  <p>For all its promise, lucid dreaming research faces significant challenges that temper enthusiasm with appropriate caution.</p>
  <h3>The Accessibility Problem</h3>
  <p>Not everyone can learn to lucid dream. While surveys suggest that approximately 55% of people have had at least one spontaneous lucid dream, the ability to achieve lucidity reliably and on demand is much rarer. Even with dedicated training, some individuals never achieve lucidity. This creates a fundamental problem for clinical application: a therapy that works only for some patients requires a way to predict or improve accessibility. The factors that determine lucid dreaming aptitude (personality traits, cognitive style, sleep architecture) are not yet well understood.</p>
  <h3>Sleep Quality Concerns</h3>
  <p>Most lucid dreaming induction techniques involve sleep disruption: waking in the middle of the night (WBTB, MILD), performing cognitive tasks during the night, or receiving external stimulation during REM. Whether regular use of these techniques degrades sleep quality or architecture over time is unknown. There is a legitimate concern that the pursuit of lucidity could come at the cost of the restorative functions that natural, uninterrupted sleep provides.</p>
  <h3>Replication Challenges</h3>
  <p>The most dramatic finding &mdash; Voss et al.'s 77% induction rate via 40Hz tACS &mdash; has not been robustly replicated by independent groups. The PTSD treatment studies, while promising, involve relatively small samples. The field needs larger, multi-site trials with standardized protocols to establish the reliability and generalizability of both induction methods and therapeutic applications.</p>`
];
