  `<p>A landmark 2024 Cell paper identified the specific mechanism driving glymphatic clearance.<sup class="fn"><a href="https://www.cell.com/cell/fulltext/S0092-8674(24)01343-6">[5]</a><span class="tip"><a href="https://www.cell.com/cell/fulltext/S0092-8674(24)01343-6" target="_blank">Cell: Norepinephrine-Mediated Slow Vasomotion Drives Glymphatic Clearance (2024) &rarr;</a></span></sup> During deep sleep, the brainstem releases waves of norepinephrine approximately every 50 seconds. These trigger blood vessel contraction, creating rhythmic pulsations that pump CSF through brain tissue. Zolpidem (Ambien) suppresses these oscillations, showing that pharmacological sedation does not equal natural sleep for waste clearance.</p>

  `<p>Giulio Tononi and Chiara Cirelli proposed the synaptic homeostasis hypothesis (SHY): waking experience strengthens synapses, increasing their total weight until saturation.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/14638388/">[6]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/14638388/" target="_blank">Tononi &amp; Cirelli: Sleep and Synaptic Homeostasis (2003) &rarr;</a></span></sup> During NREM sleep, slow waves globally downscale synaptic strength back to a sustainable baseline, preserving only the fittest circuits. Sleep is the price the brain pays for plasticity.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC3921176/">[7]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC3921176/" target="_blank">PMC: Sleep and the Price of Plasticity (2014) &rarr;</a></span></sup></p>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Hippocampal</em> Replay</h2></div>
  <p>The discovery that the hippocampus replays waking experiences during sleep was one of the most important findings in memory neuroscience. Wilson and McNaughton (1994) recorded from place cells in rat hippocampus during maze navigation and subsequent sleep, finding that the same sequential firing patterns recurred during NREM sleep at dramatically compressed timescales.</p>
  <h3>Mechanism</h3>
  <p>Replay occurs primarily during sharp-wave ripple events &mdash; brief (50-100ms) high-frequency (150-250 Hz) oscillations in the hippocampus. These ripples are temporally coupled with cortical slow oscillations and thalamocortical spindles, creating a three-way coordination: the slow oscillation provides the timing frame, the spindle creates the transfer window, and the ripple delivers the content. This triple coupling is now understood as the fundamental mechanism of sleep-dependent memory consolidation.</p>
  <h3>Beyond Rodents</h3>
  <p>Replay has been demonstrated in humans using fMRI decoding, showing reactivation of learning-related patterns during NREM sleep. Targeted memory reactivation (TMR) experiments exploit this by presenting learning-associated cues during sleep, enhancing replay and improving subsequent recall. The finding has also been extended to emotional memories, procedural skills, and spatial navigation in humans.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>Sleep <em>Spindles</em></h2></div>
  <p>Sleep spindles are among the most studied electrophysiological phenomena in sleep research. These brief oscillatory bursts at 12-16 Hz represent coordinated activity between the thalamic reticular nucleus and the cerebral cortex, and they serve as both a protective mechanism (gating sensory input) and a functional tool (facilitating memory consolidation).</p>
  <h3>Generation and Types</h3>
  <p>Spindles are generated when GABAergic neurons in the thalamic reticular nucleus inhibit thalamocortical relay neurons in a rhythmic burst pattern. Two types have been identified: fast spindles (13-16 Hz, centroparietal) associated with hippocampal memory processing, and slow spindles (9-12 Hz, frontal) more closely linked to cortical reorganization. Both types increase in density following intensive learning.</p>
  <h3>The Spindle-Intelligence Connection</h3>
  <p>Multiple studies have found correlations between spindle characteristics and cognitive ability. Individuals who produce more spindles, or spindles with greater power and duration, tend to show better overnight memory improvement, higher IQ scores, and greater learning capacity. This has led some researchers to propose spindles as a biomarker for cognitive reserve, though the causal direction remains debated.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>The <em>Glymphatic</em> System</h2></div>
  <p>Maiken Nedergaard's discovery of the glymphatic system in 2012 provided the first mechanistic explanation for why sleep deprivation might increase dementia risk. The system is named as a portmanteau of "glial" (because it depends on astrocytic endfeet) and "lymphatic" (because it performs a waste-clearance function analogous to the body's lymphatic system).</p>
  <h3>How It Works</h3>
  <p>During sleep, the interstitial space between brain cells expands by approximately 60% due to shrinkage of glial cells. This expansion allows cerebrospinal fluid (CSF) to flow along perivascular channels &mdash; the spaces surrounding blood vessels &mdash; and permeate brain tissue, flushing metabolic waste into perivenous drainage pathways. The process depends on aquaporin-4 (AQP4) water channels on astrocytic endfeet that line the perivascular space. In AQP4-knockout mice, glymphatic clearance is dramatically reduced.</p>

  <h3>The Alzheimer's Connection</h3>
  <p>Amyloid-beta, the protein that forms plaques in Alzheimer's disease, is cleared by the glymphatic system during sleep. Studies show that even a single night of sleep deprivation increases amyloid-beta levels in the brain. This creates a hypothesized vicious cycle: poor sleep reduces amyloid clearance, amyloid accumulation further disrupts sleep, and the cycle accelerates toward dementia. While compelling, this causal chain is not yet proven in humans.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2>The <em>Norepinephrine</em> Pump</h2></div>
  <p>The 2024 Cell paper by Nedergaard's group identified the precise mechanism that drives glymphatic clearance during sleep, resolving a long-standing question about what creates the flow. The answer is elegant: synchronized norepinephrine oscillations from the brainstem's locus coeruleus.</p>
  <h3>The Mechanism</h3>
  <p>During NREM sleep, the locus coeruleus releases waves of norepinephrine approximately every 50 seconds. These waves cause smooth muscle cells surrounding brain arterioles to contract, producing slow vasomotion &mdash; rhythmic expansions and contractions of blood vessels. As vessels contract, they squeeze interstitial fluid outward; as they relax, CSF flows inward. This pumping action drives the bulk flow of CSF through brain tissue that constitutes glymphatic clearance.</p>
  <h3>The Zolpidem Problem</h3>
  <p>Researchers found that zolpidem (Ambien), one of the most commonly prescribed sleep medications, suppresses these norepinephrine oscillations and significantly reduces glymphatic flow. This finding is clinically profound: it means that pharmacologically induced sleep may not provide the brain-cleaning benefits of natural sleep. Patients taking sleep medications may be unconscious but not receiving the full restorative benefits of sleep. This distinction between "being asleep" and "sleep function" may transform how clinicians think about sleep medication.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2><em>Synaptic</em> Homeostasis</h2></div>
  <p>The synaptic homeostasis hypothesis (SHY), proposed by Giulio Tononi and Chiara Cirelli, offers an elegant explanation for why sleep is necessary at the cellular level. The core insight: learning during waking is energetically expensive, and the brain needs periodic downscaling to remain efficient.</p>
  <h3>The Problem of Saturation</h3>
  <p>Every experience during waking potentially strengthens synaptic connections through long-term potentiation (LTP). Over the course of a typical day, the net effect is increased total synaptic weight across the brain. This is energetically costly (synapses consume a large fraction of the brain's energy budget), takes up physical space in gray matter, and eventually approaches a ceiling where further strengthening becomes impossible &mdash; saturation. The brain needs a mechanism to selectively reduce synaptic weight while preserving important information.</p>
  <h3>Sleep as Selective Pruning</h3>
  <p>SHY proposes that during NREM slow-wave sleep, cortical slow oscillations globally downscale synaptic strength. The mechanism is selective: synapses belonging to circuits that were strengthened repeatedly during waking, or that are well-integrated with existing memory networks, are more likely to survive the pruning. Weak, noisy, or redundant connections are preferentially eliminated. The result is a brain that wakes up with a smaller number of stronger, more efficient connections &mdash; ready for another day of learning.</p>
  <h3>Evidence and Predictions</h3>
  <p>SHY makes testable predictions: synaptic markers should be higher after waking than after sleep. This has been confirmed using molecular markers (GluA1 receptor levels), structural imaging (dendritic spine density), and electrophysiological measures (cortical excitability). The hypothesis also predicts that sleep deprivation should impair learning by preventing the synaptic reset &mdash; consistent with extensive behavioral data.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>REM</em> Paralysis</h2></div>
  <p>The active paralysis of voluntary muscles during REM sleep is one of neuroscience's most remarkable phenomena. It is not passive relaxation but an active inhibitory process initiated by the brainstem to prevent the body from acting out the vivid motor commands generated during dreams.</p>
  <h3>The Atonia Circuit</h3>
  <p>REM atonia is initiated by the sublaterodorsal nucleus in the pons, which activates inhibitory interneurons in the ventral medulla. These neurons release glycine and GABA onto alpha motor neurons in the spinal cord, effectively disconnecting the brain's motor commands from the body's muscles. The circuit is highly specific: cranial motor neurons controlling the eyes and the phrenic nerve controlling the diaphragm are spared, allowing rapid eye movements and continued breathing.</p>
  <h3>When Atonia Fails</h3>
  <p>In REM Behavior Disorder (RBD), this inhibitory mechanism partially or completely fails. Patients physically act out their dreams, often violently &mdash; punching, kicking, leaping from bed. RBD is especially clinically significant because up to 80% of patients eventually develop alpha-synucleinopathies (Parkinson's disease, Lewy body dementia, multiple system atrophy), often decades after RBD onset. The sublaterodorsal nucleus is one of the earliest sites affected by alpha-synuclein pathology, making RBD one of the strongest known prodromal markers for neurodegeneration.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2>The <em>Controversy</em></h2></div>
  <p>The glymphatic system, despite being one of the most exciting discoveries in sleep neuroscience, remains a subject of active scientific debate. Not everyone is convinced that the specific mechanism Nedergaard proposed is correct, even if the general finding &mdash; enhanced waste clearance during sleep &mdash; appears robust.</p>
  <h3>Points of Contention</h3>
  <p>Critics have questioned several aspects: whether perivascular bulk flow is the primary clearance mechanism or whether diffusion plays a larger role; whether the 60% interstitial space expansion figure, derived from mouse studies, translates to humans; and whether AQP4 channels are truly essential, given conflicting results from different AQP4-knockout mouse models. A 2025 report from The Transmitter documented how new imaging methods are producing results that challenge some of Nedergaard's original claims.</p>
  <h3>The Human Evidence Gap</h3>
  <p>The most significant limitation is that the vast majority of glymphatic research has been conducted in mice. The first human demonstration, published in 2024-2025, involved only 5 patients undergoing brain surgery who happened to receive MRI at two time points. While this confirmed the presence of perivascular networks in the human brain, the sample is far too small for definitive conclusions about glymphatic function during natural sleep. Large-scale human studies using non-invasive imaging are urgently needed.</p>
  <div class="callout">
    <h4>Science in Progress</h4>
    <p>The glymphatic debate is a healthy example of science working as it should: a bold discovery is challenged, refined, and gradually constrained by subsequent evidence. The core insight &mdash; that sleep facilitates brain waste removal &mdash; is likely to survive even if the specific perivascular mechanism is modified. What will change is the precision of our understanding.</p>
