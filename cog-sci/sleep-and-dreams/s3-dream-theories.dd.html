  `<p>The most sophisticated modern framework applies Karl Friston&rsquo;s free energy principle.<sup class="fn"><a href="https://www.federicoferrarese.co.uk/2024/03/12/decoding-the-secrets-of-dreaming-a-neuroscientific-approach/">[4]</a><span class="tip"><a href="https://www.federicoferrarese.co.uk/2024/03/12/decoding-the-secrets-of-dreaming-a-neuroscientific-approach/" target="_blank">Ferrarese: Hobson-Friston Predictive Processing Model (2024) &rarr;</a></span></sup> During REM, sensory input is minimal yet the prediction machinery continues operating. Without sensory correction, the brain relies entirely on internal high-level predictions, producing vivid but unconstrained experiences. This explains both the felt reality of dreams and their logical incoherence.</p>
  <div class="callout">
    <h4>Why Dreams Feel Real</h4>
    <p>The predictive processing framework explains the most puzzling feature of dreams: they feel absolutely real while experiencing them. The brain&rsquo;s prediction system treats its own outputs as genuine sensory input. Without the error-correction signals that sensory data normally provides, there is no mechanism to flag the experience as internally generated.</p>

  `<p>The default mode network (DMN) &mdash; active during mind-wandering, daydreaming, and self-referential thought during waking &mdash; is also highly active during REM sleep. This has led to the proposal that dreams are the sleeping version of spontaneous thought: the same network producing the same kind of self-generated mental content, but without the constraints imposed by external attention demands.</p>

  `<p>A 2025 paper introduced the Associative-Rehearsal &amp; Reframing Model (ARRM), attempting to unify adaptive and computational approaches.<sup class="fn"><a href="https://philarchive.org/archive/YADCDT">[5]</a><span class="tip"><a href="https://philarchive.org/archive/YADCDT" target="_blank">PhilArchive: Cognitive Dream Theory &mdash; ARRM (2025) &rarr;</a></span></sup> ARRM proposes that dreams arise from spontaneous neural activation selectively integrated into symbolic, autobiographical, and affective simulations. Dreaming is framed as a structured, adaptive process facilitating memory abstraction, emotional integration, and creative problem-solving.</p>
  <div class="chips">

  `<p>The deepest question about dreams is not why they occur but why there is subjective experience during sleep at all. During REM, the prefrontal cortex is deactivated, removing executive function and logical reasoning. Yet the experience is vivid, emotional, and phenomenally rich. Dreams present a version of the hard problem of consciousness: how does the brain generate experience in a state designed for unconsciousness?</p>

  </div>`,

  `<p>The continuity hypothesis &mdash; supported by substantial recent research &mdash; proposes that dream content reflects waking concerns, emotional preoccupations, and daily experiences rather than being purely random or deeply symbolic.<sup class="fn"><a href="https://courses.lumenlearning.com/suny-hvcc-psychology-1/chapter/reading-dreams/">[6]</a><span class="tip"><a href="https://courses.lumenlearning.com/suny-hvcc-psychology-1/chapter/reading-dreams/" target="_blank">Lumen Learning: Dreams and Dreaming &rarr;</a></span></sup> Dreams are not messages from the unconscious (Freud) or noise from the brainstem (Hobson), but a continuation of the mind&rsquo;s ongoing work in a different processing mode.</p>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Freud</em>&rsquo;s Wish Fulfillment</h2></div>
  <p>Sigmund Freud published "The Interpretation of Dreams" in 1900, establishing the first systematic theory of dream function. His central claim was that dreams represent the disguised fulfillment of repressed unconscious wishes &mdash; desires too threatening or socially unacceptable to be consciously acknowledged.</p>
  <h3>The Dream-Work</h3>
  <p>Freud proposed that dreams have two levels of content. The manifest content is what the dreamer remembers &mdash; the surface narrative. The latent content is the hidden meaning &mdash; the repressed wish. The transformation from latent to manifest occurs through four mechanisms of "dream-work": condensation (multiple ideas compressed into a single image), displacement (emotional significance shifted from important to trivial elements), symbolization (abstract ideas represented by concrete symbols), and secondary revision (the waking mind's attempt to make the dream coherent when recalled).</p>
  <h3>Why Freud Was Wrong (and Right)</h3>
  <p>Modern neuroscience has largely rejected Freud's specific mechanisms. There is no evidence for a censorship system that disguises wish content, no reliable symbolic dictionary, and the discovery that REM sleep is driven by brainstem activity undermines the idea that dreams originate from psychological conflict. However, Freud's broader insights have been partially vindicated: dreams are not random noise (contra early activation-synthesis), they do incorporate emotional concerns, and they can involve wish-related themes. Mark Solms has argued that dreaming is generated not by the brainstem but by dopaminergic circuits in the ventral tegmental area &mdash; a reward/motivation system that resonates more with Freud's motivational theory than with Hobson's random-activation model.</p>
  <div class="callout">
    <h4>The Solms Revision</h4>
    <p>Neuropsychoanalyst Mark Solms demonstrated that brainstem lesions eliminating REM sleep do not eliminate dreaming, while forebrain lesions in the ventral tegmental area can abolish dreams entirely. This suggests that dreaming is driven by motivational/reward circuits, not by random brainstem activity &mdash; a finding more consistent with Freud&rsquo;s motivational theory than with Hobson&rsquo;s activation-synthesis.</p>
  </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2><em>Activation-Synthesis</em></h2></div>
  <p>J. Allan Hobson and Robert McCarley published their activation-synthesis hypothesis in 1977, presenting a direct neurobiological challenge to Freud. Where Freud saw meaningful psychological content requiring interpretation, Hobson and McCarley saw the brain's attempt to make sense of random neural noise.</p>
  <h3>The Original Model</h3>
  <p>During REM sleep, cholinergic neurons in the pontine brainstem generate bursts of ponto-geniculo-occipital (PGO) spikes that activate visual cortex, motor cortex, and limbic structures in essentially random patterns. The forebrain, receiving this chaotic input without the moderating influence of aminergic neurotransmitters (norepinephrine and serotonin are suppressed during REM), attempts to synthesize a coherent narrative. Dreams, on this view, are the brain's best effort at sense-making from noise. Dream bizarreness is not disguise but degraded signal processing.</p>
  <h3>Evolution to the AIM Model</h3>
  <p>Hobson later refined the theory into the AIM model, which maps brain states along three dimensions: Activation (overall brain activation level), Input-output gating (whether the brain is processing external or internal signals), and chemical Modulation (the balance between aminergic and cholinergic neurotransmitters). The model positions dreaming as a state of high activation, internally gated input, and cholinergic dominance &mdash; a more nuanced framework than simple random activation.</p>
  <h3>Criticism</h3>
  <p>The activation-synthesis model has been criticized for being too reductionist. Dreams often show emotional coherence, thematic continuity, and meaningful relationship to waking concerns &mdash; features poorly explained by random noise. Furthermore, Solms demonstrated that dreaming can occur without REM and without brainstem PGO activity, undermining the model's neurological foundation.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2><em>Threat</em> Simulation</h2></div>
  <p>Finnish neuroscientist Antti Revonsuo proposed the threat simulation theory (TST) in 2000, offering the first explicitly evolutionary account of dream function. The core argument: dreaming evolved as an offline simulation system for rehearsing responses to threatening situations, providing a survival advantage in ancestral environments.</p>
  <h3>The Evolutionary Logic</h3>
  <p>In ancestral environments, threats from predators, hostile humans, natural disasters, and social conflicts were constant. An organism that could rehearse threat responses during sleep &mdash; without the real-world costs of failure &mdash; would have a survival advantage. TST predicts several features of dreaming that are empirically confirmed: dreams are biased toward negative emotions (approximately 65% of dream emotions are negative), frequently involve pursuit and aggression, and incorporate recent threatening experiences preferentially.</p>
  <h3>Strengths and Limitations</h3>
  <p>TST elegantly explains the negativity bias in dreams, the prevalence of chase/escape scenarios, and why traumatized individuals often dream about threat-related content. However, it struggles with several observations: many dreams are mundane (walking, talking, eating) with no obvious threat content; some dreams are positive or pleasurable; and the theory doesn't explain why dream logic is so poor &mdash; if dreams were genuinely rehearsing threat responses, one would expect them to operate with realistic physics and logical causation, which they manifestly do not.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Predictive</em> Processing</h2></div>
  <p>The predictive processing framework, developed through the collaboration of Allan Hobson and Karl Friston, applies the free energy principle to dreaming. This is arguably the most theoretically sophisticated current account of why dreams have the particular qualities they do &mdash; vivid, emotionally intense, yet logically incoherent.</p>
  <h3>The Free Energy Framework</h3>
  <p>In the predictive processing account, the brain continuously generates hierarchical predictions about incoming sensory data. Waking perception is a controlled hallucination: the brain's predictions are constantly corrected by sensory prediction errors (the difference between what was predicted and what was received). During REM sleep, sensory input is minimal (the body is paralyzed, the eyes are closed, thalamic gating reduces external signals). Yet the hierarchical prediction system continues operating. Without sensory correction, the brain's predictions run unconstrained &mdash; generating vivid experiences that feel real because the prediction system treats its own outputs as genuine data.</p>
  <h3>Why Dreams Are Bizarre</h3>
  <p>The logical incoherence of dreams follows naturally from this framework. During waking, prediction errors force the brain to update its models &mdash; if you predict a door and encounter a wall, the error signal corrects the prediction. During dreaming, there are no error signals. If the predictive model generates a door that suddenly becomes a lake, there is no sensory data to flag this as an error. The brain's narrative system simply continues, treating each prediction as reality. Emotional content is intense because the limbic system (particularly the amygdala) is highly active during REM, infusing predictions with emotional valence that has no sensory check.</p>

    <svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg">

      <path class="edge" d="M375,110 L300,150" stroke-dasharray="4,4"/>
    </svg>
  </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2><em>Default</em> Mode Network</h2></div>
  <p>The default mode network (DMN) is a set of brain regions that are most active when a person is not focused on external tasks &mdash; during mind-wandering, daydreaming, thinking about others, remembering the past, and imagining the future. The discovery that this same network is highly active during REM sleep has suggested a deep connection between waking spontaneous thought and dreaming.</p>
  <h3>The Network</h3>
  <p>The DMN includes the medial prefrontal cortex, posterior cingulate cortex, angular gyrus, and medial temporal lobes. During focused external attention, these regions are suppressed. During rest, they become the dominant active network. Their activation during REM sleep suggests that dreaming may be the sleeping brain's version of the same spontaneous, internally-generated mental activity that produces daydreams and mind-wandering during waking.</p>
  <h3>Implications for Dream Function</h3>
  <p>If dreaming is fundamentally the same process as mind-wandering &mdash; just occurring in a different neurochemical context (without aminergic modulation) and without competing external input &mdash; then the question of "why do we dream" becomes a subset of "why does the brain engage in spontaneous thought." This reframing suggests that dreaming may not have a unique adaptive function but rather reflects the brain's default mode of operation when not engaged with the external world, extended into sleep.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2>The <em>ARRM</em> Unification</h2></div>
  <p>The Associative-Rehearsal and Reframing Model (ARRM), published in 2025, represents the most ambitious recent attempt to unify the fragmented landscape of dream theories. Rather than choosing between competing frameworks, ARRM proposes that they each capture different aspects of a single, multi-layered process.</p>
  <h3>The Three Components</h3>
  <p>ARRM proposes that dreaming involves three interrelated processes: <em>Associative activation</em> (spontaneous neural activity reactivates memory traces and their associative networks, similar to activation-synthesis but not random), <em>Rehearsal</em> (the activated memories are replayed and consolidated, consistent with memory consolidation theories and threat simulation), and <em>Reframing</em> (the replayed memories are re-contextualized and emotionally reprocessed, producing the symbolic and narrative transformations that Freud attributed to dream-work and that predictive processing attributes to unconstrained prediction).</p>
  <h3>Significance</h3>
  <p>If ARRM succeeds, it would resolve the decades-long fragmentation of dream theory by showing that Freud, Hobson, Revonsuo, and the predictive processing theorists were all partially right &mdash; each describing one component of a unified process. The model frames dreaming as structured and adaptive (contra pure activation-synthesis noise) but grounded in neural mechanisms (contra Freudian psychology). Early reception has been cautious; the model is ambitious but needs empirical testing.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2>The <em>Hard</em> Problem</h2></div>
  <p>The hard problem of dream consciousness is a variant of the general hard problem: why is there subjective experience during sleep? A brain that needed to consolidate memory, clear waste, and recalibrate synapses could presumably do so without generating the vivid phenomenal experiences we call dreams. The existence of dream consciousness requires explanation.</p>
  <h3>The Prefrontal Paradox</h3>
  <p>During REM sleep, the dorsolateral prefrontal cortex &mdash; the region most associated with executive function, logical reasoning, critical thinking, and metacognition &mdash; is substantially deactivated. This explains why dreamers typically accept bizarre events uncritically: the neural machinery for questioning reality is offline. Yet the subjective experience is extraordinarily vivid and emotionally intense. This dissociation between logical capacity and experiential richness challenges theories of consciousness that link subjective experience to cognitive complexity or self-reflective capability.</p>
  <h3>Implications for Theories of Consciousness</h3>
  <p>Dreams challenge every major theory of consciousness. Global Workspace Theory predicts consciousness requires widespread cortical broadcasting &mdash; but during REM, cortical connectivity is reduced. Integrated Information Theory (IIT) would predict that the level of consciousness (phi) corresponds to the degree of integrated information &mdash; but dreams are vivid despite reduced integration. Higher-Order Theories require metacognitive monitoring for consciousness &mdash; but dreamers lack this monitoring (except in lucid dreams). The existence of rich phenomenal experience during a state of reduced cognitive function remains one of the deepest puzzles in consciousness science.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 &mdash; Details</div><h2>The <em>Continuity</em> Hypothesis</h2></div>
  <p>The continuity hypothesis proposes that dream content is continuous with waking thought, reflecting the same concerns, preoccupations, and emotional themes that occupy the mind during the day. This has become one of the best-supported empirical findings in dream research, though it functions more as a descriptive generalization than a mechanistic theory.</p>
  <h3>Evidence</h3>
  <p>Multiple large-scale dream content analyses have confirmed that dreams incorporate recent experiences ("day residue"), reflect ongoing emotional concerns, and track personality characteristics and life circumstances. People who worry about work dream about work; people experiencing relationship conflict dream about relationships; people who recently learned new skills dream about practicing those skills. The correlation is not perfect &mdash; dreams are not simple replays &mdash; but the thematic continuity is strong enough to challenge purely random or symbolic theories.</p>
  <h3>What Continuity Doesn&rsquo;t Explain</h3>
  <p>The continuity hypothesis describes what dreams are about but does not explain why they take the form they do. Why is waking thought experienced as logical and sequential while dream thought is experienced as vivid but bizarre? Why are emotions amplified? Why does the dreamer accept impossible events as normal? These questions require a complementary mechanistic account &mdash; which is where predictive processing, neurochemistry, and the prefrontal deactivation findings come in.</p>
  <div class="callout">
    <h4>Toward Integration</h4>
    <p>The strongest current position may be a combination: dream content is continuous with waking concerns (continuity hypothesis), processed through an unconstrained predictive system (predictive processing), within a neurochemical context that amplifies emotion and suppresses logic (activation-synthesis contributions), with possible adaptive value for threat rehearsal and emotional regulation (evolutionary theories). No single theory captures the full picture.</p>
  </div>`
];
