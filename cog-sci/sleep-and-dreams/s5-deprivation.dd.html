const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2>The <em>Gardner</em> Experiment</h2></div>
  <p>Randy Gardner's 11-day wake-a-thon began as a San Diego high-school science fair project in December 1963 and became one of the most cited experiments in sleep science &mdash; not because of its experimental rigor (it had little) but because of the vivid clinical picture it produced under the observation of Stanford sleep researcher William Dement.</p>
  <h3>The Deterioration Cascade</h3>
  <p>The progression was remarkably orderly. In the first 24-48 hours, Gardner experienced irritability and difficulty concentrating. By day 2, visual hallucinations appeared &mdash; he mistook a street sign for a person. Days 3-4 brought more complex hallucinations, paranoid ideation, and emotional lability. By day 5, Gardner experienced a delusional episode in which he believed he was a famous football player. The final days produced an expressionless affect, slurred monotone speech, attention span of seconds, and near-complete inability to perform simple cognitive tasks. On a serial-sevens test on day 11, he managed only five subtractions before stopping entirely.</p>
  <h3>Recovery and Aftermath</h3>
  <p>After 264.4 hours awake, Gardner slept for 14 hours and 40 minutes and appeared largely recovered. This rapid restoration was initially interpreted optimistically &mdash; suggesting that sleep debt could be paid off quickly. However, more careful analysis showed that Gardner's recovery sleep was dramatically altered in architecture, with massive rebounds in both slow-wave sleep and REM sleep, suggesting these stages were preferentially restored. More significantly, Gardner himself reported chronic insomnia problems for decades afterward, and the Guinness Book of World Records eventually stopped recognizing sleep deprivation records due to the health risks involved.</p>`,

  <p>The cognitive effects of sleep deprivation have been mapped with considerable precision through decades of controlled laboratory studies. The results are consistent and alarming: virtually every cognitive function deteriorates, and the deterioration follows predictable patterns.</p>
  <h3>The 0.1% BAC Equivalence</h3>
  <p>The comparison between 24 hours of sleep deprivation and legal intoxication is based on standardized performance tests. After 17-19 hours awake (a normal long day for many workers), performance on reaction time, vigilance, and tracking tasks degrades to levels equivalent to a blood alcohol concentration of 0.05%. After 24 hours, the equivalence reaches 0.1% &mdash; above the legal driving limit in every US state. The comparison is useful for public communication but somewhat misleading: alcohol and sleep deprivation impair different cognitive functions in different patterns.</p>
  <h3>The Metacognitive Blindspot</h3>
  <p>Perhaps the most dangerous effect of sleep deprivation is its impact on self-assessment. Subjective sleepiness (how tired a person feels) plateaus after approximately 48 hours, even though objective performance continues deteriorating for as long as deprivation continues. This means that the more sleep-deprived a person becomes, the less accurate their self-assessment becomes &mdash; they feel no more tired on day 3 than day 2, despite being significantly more impaired. This metacognitive blindspot is a primary mechanism in sleep-related accidents and errors.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2><em>Sleep-Related</em> Disasters</h2></div>
  <p>The connection between sleep deprivation and industrial disasters is not speculative &mdash; it is documented in accident investigation reports. Each of the major incidents occurred during the circadian nadir (roughly 2-6am) and involved operators or decision-makers with documented sleep deficits.</p>
  <h3>Pattern Recognition</h3>
  <p>These disasters share a common pattern: a complex system requires sustained attention and good judgment at a time when circadian biology makes both nearly impossible. The Chernobyl operators were performing a safety test in the early morning hours when their circadian alertness was at its lowest point. The Exxon Valdez third mate was making navigation decisions after sleeping only 6 hours in the previous 48. The Challenger managers were evaluating engineering data on O-ring performance after getting less than 2 hours of sleep. In each case, the humans were asked to perform at their worst while the stakes were at their highest.</p>
  <h3>Systemic Solutions</h3>
  <p>These are not stories of individual failure but of systemic design that ignores human biology. Industries that operate 24/7 &mdash; aviation, medicine, transportation, energy &mdash; need fatigue risk management systems that treat sleep deprivation as seriously as they treat alcohol intoxication. Some progress has been made (airline pilot duty-time regulations, medical resident work-hour limits), but implementation remains inconsistent and enforcement is weak.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Blue</em> Light &amp; Screens</h2></div>
  <p>The blue light narrative has become one of the most widely discussed topics in popular sleep science, but the reality is more nuanced than the headlines suggest. While blue light's effect on melatonin is real and well-documented, the practical impact on sleep quality involves multiple factors beyond spectral composition alone.</p>
  <h3>The Melatonin Mechanism</h3>
  <p>Light in the 460-480 nanometer (blue) range is the most potent suppressor of melatonin secretion because it preferentially activates melanopsin-containing intrinsically photosensitive retinal ganglion cells (ipRGCs). These cells project directly to the suprachiasmatic nucleus, suppressing melatonin production from the pineal gland. Two to three hours of evening screen exposure at typical brightness can delay dim-light melatonin onset (DLMO) by approximately 90 minutes, effectively shifting the biological night later.</p>
  <h3>The Nuance</h3>
  <p>Meta-analyses of blue-light-blocking glasses show mixed results for sleep outcomes, suggesting that blue light may not be the primary mechanism through which screens disrupt sleep. The cognitive and emotional stimulation of screen content &mdash; social media, news, gaming &mdash; may be equally or more important than the light itself. Additionally, daytime blue light exposure is actually beneficial for circadian alignment, alertness, and mood. The problem is not blue light per se but blue light at the wrong time.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2>The <em>Caffeine</em> Trap</h2></div>
  <p>Caffeine is the world's most widely consumed psychoactive substance, and its interaction with sleep physiology creates a self-reinforcing cycle that traps hundreds of millions of people in a pattern of chronic partial sleep deprivation.</p>
  <h3>Pharmacology</h3>
  <p>Caffeine works by competitively binding to adenosine A1 and A2A receptors in the brain. Adenosine is the neurochemical that implements Process S (homeostatic sleep pressure) &mdash; it accumulates during waking and signals the need for sleep. By occupying adenosine receptors without activating them, caffeine blocks the sleepiness signal. Critically, this does not reduce adenosine levels; it merely prevents the brain from detecting them. When caffeine is metabolized, the full accumulated adenosine hits at once, producing the characteristic "crash."</p>
  <h3>The Half-Life Problem</h3>
  <p>With a mean half-life of 5 hours (ranging from 1.5 to 9.5 hours depending on genetics, liver enzyme activity, smoking status, and medication use), afternoon caffeine consumption has predictable consequences for nighttime sleep. A cup of coffee at 2pm still has half its caffeine active at 7pm and a quarter at midnight. Even if the person falls asleep, the remaining caffeine reduces sleep depth, particularly slow-wave sleep, and may fragment sleep architecture in ways the individual doesn't consciously notice but that accumulate over time.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2>The <em>Adolescent</em> Problem</h2></div>
  <p>The mismatch between adolescent biology and institutional scheduling represents one of the most straightforward evidence-to-policy failures in public health. The science is clear, the solution is simple, and yet implementation remains the exception rather than the rule.</p>
  <h3>The Biological Shift</h3>
  <p>During puberty, the circadian system undergoes a well-documented shift toward later timing. Melatonin secretion onset delays by 1-3 hours, driven by changes in reproductive hormones (estrogen and testosterone influence SCN function). The circadian period may lengthen slightly. The result is that an adolescent who naturally fell asleep at 9pm and woke at 7am before puberty now naturally falls asleep at 11pm or midnight and needs to sleep until 8-9am. This is not a behavioral choice but a neuroendocrine event that occurs in every mammalian species studied during their analogous developmental period.</p>
  <h3>The School Start Time Problem</h3>
  <p>When school starts at 7:30am, a teenager who cannot fall asleep before 11pm gets at most 7.5 hours of sleep &mdash; substantially less than the 8-10 hours recommended by the American Academy of Pediatrics. More importantly, the first hours of school occur during the adolescent's circadian nadir, when alertness, learning capacity, and emotional regulation are at their lowest. The American Academy of Pediatrics recommends that middle and high schools start no earlier than 8:30am, supported by evidence showing that later start times improve academic performance, attendance, mental health, and reduce car accidents among teen drivers.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2><em>Shift</em> Work Hazards</h2></div>
  <p>Shift work affects 15-20% of the workforce in industrialized nations and represents a natural experiment in chronic circadian disruption. The health consequences are extensive, well-documented, and increasingly recognized as a significant occupational health issue.</p>
  <h3>The Biological Cost</h3>
  <p>Night-shift workers must be alert during the circadian nadir and attempt to sleep during the circadian peak of alertness &mdash; the opposite of their biology's programming. Even with years of experience, most night workers never fully adapt their circadian rhythms. The result is chronic sleep restriction (getting 1-4 hours less than needed), fragmented sleep during daytime attempts, and constant misalignment between internal biology and external demands. This misalignment affects virtually every physiological system.</p>
  <h3>Health Consequences</h3>
  <p>The health effects of chronic shift work are documented across multiple organ systems. Cardiovascular risk increases through mechanisms including chronic inflammation, disrupted cortisol rhythms, and autonomic nervous system imbalance. Metabolic syndrome (obesity, insulin resistance, dyslipidemia) reflects disrupted meal timing and hormonal cycling. The International Agency for Research on Cancer (IARC) classifies shift work involving circadian disruption as a "probable carcinogen" (Group 2A), based on epidemiological evidence linking night work to breast, prostate, and colorectal cancer. Mental health effects include elevated rates of depression, burnout, and anxiety that emerge with the onset of shift work and often persist.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 &mdash; Details</div><h2>The Sleep <em>Economy</em></h2></div>
  <p>The $585 billion global sleep economy is both a marker of how seriously society now takes sleep and a source of legitimate concern about the commodification of a basic biological need.</p>
  <h3>Market Segments</h3>
  <p>The sleep economy encompasses traditional products (mattresses, pillows, bedding), pharmaceutical interventions (prescription and OTC sleep aids), sleep technology (wearable trackers, smart rings, sleep apps, white noise machines), supplements (melatonin, magnesium, CBD, L-theanine), professional services (sleep coaching, sleep clinics, CBT-I delivery), and emerging categories (weighted blankets, sleep retreats, sleep-optimized environments). The sleep tech devices segment alone is projected to grow from $24.85 billion in 2024 to $134.6 billion by 2034, representing a CAGR of 18.5%.</p>
  <h3>The Orthosomnia Paradox</h3>
  <p>The phenomenon of orthosomnia &mdash; a term coined in 2017 by researchers at Rush University &mdash; describes patients who become so anxious about optimizing their sleep data that the anxiety itself disrupts their sleep. Wearable sleep trackers that assign nightly "sleep scores" can transform a natural process into a performance metric, creating the very problem they claim to solve. This reflects a broader tension: raising awareness about sleep's importance is valuable, but the line between awareness and anxiety-producing optimization culture is thin.</p>
  <div class="callout">
    <h4>The Irony</h4>
    <p>Modern society created the sleep crisis (through electricity, shift work, blue light, caffeine culture, always-on connectivity) and is now selling the solution back to consumers at $585 billion per year. The most effective sleep interventions &mdash; consistent schedule, dark room, limited evening screen time, exercise &mdash; are free. The sleep economy is largely built on selling convenience and technology to compensate for lifestyle problems that could be addressed through behavioral change.</p>
