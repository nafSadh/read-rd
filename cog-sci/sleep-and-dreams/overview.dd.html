<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep &amp; Dreams — A Survey of Sleep Science and Dream Research</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Why Sleep', title: 'Why <em>We</em> Sleep' },
  { num: '02', short: 'Brain', title: 'The <em>Sleeping</em> Brain' },
  { num: '03', short: 'Dreams', title: 'Dream <em>Theories</em>' },
  { num: '04', short: 'Lucid', title: '<em>Lucid</em> Dreaming' },
  { num: '05', short: 'Deprivation', title: 'Sleep <em>Deprivation</em> &amp; Modern Life' },
  { num: '06', short: 'Disorders', title: 'Sleep <em>Disorders</em> &amp; Frontiers' }
];

const summaries = [
  // 01 — Why We Sleep
  `<p>Every animal with a nervous system sleeps.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9670796/">[1]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9670796/" target="_blank">PMC: Sleep Function &mdash; An Evolutionary Perspective (2022) &rarr;</a></span></sup> Even jellyfish show sleep-like states. Yet sleep makes organisms unconscious, immobile, and vulnerable to predation &mdash; a staggering evolutionary cost. The two-process model (homeostatic pressure + circadian rhythm) describes <em>when</em> we sleep,<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/6128309/">[2]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/6128309/" target="_blank">Borb&eacute;ly (1982): Two-Process Model &rarr;</a></span></sup> but the question of <em>why</em> remains one of biology's deepest puzzles. Walker's framework maps it as reception (wake), reflection (NREM), and integration (REM).</p>
  <div class="s-stat">
    <div class="st"><div class="sv">90 min</div><div class="sl">Sleep Cycle</div></div>
    <div class="st"><div class="sv">4&ndash;5</div><div class="sl">Cycles / Night</div></div>
    <div class="st"><div class="sv">~24.2h</div><div class="sl">Circadian Period</div></div>
    <div class="st"><div class="sv">100%</div><div class="sl">Species That Sleep</div></div>
  </div>
  <h4>Sleep Architecture</h4>
  <div class="diagram-wrap">
    <svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg">
      <text class="lbl" x="10" y="20">Wake</text>
      <text class="lbl" x="10" y="55">REM</text>
      <text class="lbl" x="10" y="90">N1</text>
      <text class="lbl" x="10" y="125">N2</text>
      <text class="lbl" x="10" y="160">N3</text>
      <line class="edge" x1="50" y1="30" x2="550" y2="30"/>
      <line class="edge" x1="50" y1="65" x2="550" y2="65"/>
      <line class="edge" x1="50" y1="100" x2="550" y2="100"/>
      <line class="edge" x1="50" y1="135" x2="550" y2="135"/>
      <line class="edge" x1="50" y1="170" x2="550" y2="170"/>
      <polyline class="edge-hi" fill="none" points="60,30 80,100 100,135 140,160 170,135 190,65 210,100 240,135 270,160 290,135 310,65 340,100 360,135 380,135 400,65 420,100 440,135 450,65 470,100 480,65 500,100 510,65 530,30" stroke-dasharray="none"/>
      <text class="lbl-hi" x="120" y="190">NREM-heavy</text>
      <text class="lbl-hi" x="420" y="190">REM-heavy</text>
      <text class="lbl" x="250" y="190">|</text>
    </svg>
  </div>`,

  // 02 — The Sleeping Brain
  `<p>Far from inactive, the sleeping brain performs at least three critical operations: memory consolidation through hippocampal replay and sleep spindles, metabolic waste clearance via the glymphatic system (Nedergaard's landmark discovery),<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4636982/">[3]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4636982/" target="_blank">PMC: Glymphatic System Beginner&rsquo;s Guide (2015) &rarr;</a></span></sup> and synaptic recalibration through Tononi &amp; Cirelli's homeostasis hypothesis.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/14638388/">[4]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/14638388/" target="_blank">Tononi &amp; Cirelli: Sleep and Synaptic Homeostasis (2003) &rarr;</a></span></sup> A 2024 Cell paper revealed that norepinephrine oscillations every 50 seconds drive the brain's waste-flushing pump.<sup class="fn"><a href="https://www.cell.com/cell/fulltext/S0092-8674(24)01343-6">[5]</a><span class="tip"><a href="https://www.cell.com/cell/fulltext/S0092-8674(24)01343-6" target="_blank">Cell: NE-Mediated Slow Vasomotion Drives Glymphatic Clearance (2024) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">60%</div><div class="sl">Brain Space Expansion</div></div>
    <div class="st"><div class="sv">~50s</div><div class="sl">NE Oscillation Period</div></div>
    <div class="st"><div class="sv">12&ndash;16 Hz</div><div class="sl">Sleep Spindle Freq</div></div>
    <div class="st"><div class="sv">2012</div><div class="sl">Glymphatic Discovery</div></div>
  </div>
  <h4>Key Processes</h4>
  <div class="feat-grid">
    <div class="feat"><h4>Hippocampal Replay</h4><p>Day's experiences replayed at compressed timescales during NREM, transferring from hippocampus to neocortex for long-term storage.</p></div>
    <div class="feat"><h4>Glymphatic Clearance</h4><p>CSF flows through perivascular channels, clearing amyloid-beta and metabolic waste. Interstitial space expands 60% during sleep.</p></div>
    <div class="feat"><h4>Synaptic Homeostasis</h4><p>Waking strengthens synapses until saturation. Sleep's slow waves globally downscale, preserving only the fittest circuits.</p></div>
    <div class="feat"><h4>REM Atonia</h4><p>Brainstem actively paralyzes voluntary muscles during REM via glycine and GABA. Only eyes and diaphragm are spared.</p></div>
  </div>`,

  // 03 — Dream Theories
  `<p>Six competing frameworks explain why we dream, and none clearly dominates. From Freud's wish fulfillment<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5216045/">[6]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5216045/" target="_blank">PMC: On Dreams and Motivation &mdash; Freud vs. Hobson (2017) &rarr;</a></span></sup> (debunked but foundational) through Hobson's activation-synthesis<sup class="fn"><a href="https://www.semanticscholar.org/paper/The-brain-as-a-dream-state-generator:-an-hypothesis-Hobson-McCarley/f1af886bfac2ee058ddaf1a6fb61dabe08e19b08">[7]</a><span class="tip"><a href="https://www.semanticscholar.org/paper/The-brain-as-a-dream-state-generator:-an-hypothesis-Hobson-McCarley/f1af886bfac2ee058ddaf1a6fb61dabe08e19b08" target="_blank">Hobson &amp; McCarley: Activation-Synthesis (1977) &rarr;</a></span></sup> (too reductionist) to modern predictive processing models, the field reflects a fundamental uncertainty: are dreams functional or epiphenomenal? The 2025 ARRM model attempts unification, framing dreams as structured adaptive processes for memory abstraction and emotional integration.<sup class="fn"><a href="https://philarchive.org/archive/YADCDT">[8]</a><span class="tip"><a href="https://philarchive.org/archive/YADCDT" target="_blank">PhilArchive: Cognitive Dream Theory &mdash; ARRM (2025) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">6+</div><div class="sl">Competing Theories</div></div>
    <div class="st"><div class="sv">~65%</div><div class="sl">Negative Dream Emotions</div></div>
    <div class="st"><div class="sv">1900</div><div class="sl">Freud's Interpretation</div></div>
    <div class="st"><div class="sv">1977</div><div class="sl">Activation-Synthesis</div></div>
  </div>
  <h4>Theories at a Glance</h4>
  <ul class="s-list">
    <li><strong>Wish Fulfillment</strong> (Freud) &mdash; Repressed desires expressed in disguised form. Debunked as science, foundational as idea.</li>
    <li><strong>Activation-Synthesis</strong> (Hobson &amp; McCarley) &mdash; Random brainstem firing, forebrain imposes narrative. Influential but incomplete.</li>
    <li><strong>Threat Simulation</strong> (Revonsuo) &mdash; Evolutionary rehearsal of dangerous scenarios. Explains negativity bias, not mundane dreams.</li>
    <li><strong>Predictive Processing</strong> (Hobson &amp; Friston) &mdash; Brain's prediction engine runs without sensory correction during REM.</li>
    <li><strong>Default Mode Network</strong> &mdash; Dreams as sleeping version of spontaneous thought and mind-wandering.</li>
    <li><strong>ARRM</strong> (2025) &mdash; Associative-Rehearsal &amp; Reframing: unified model of memory abstraction + emotional integration.</li>
  </ul>`,

  // 04 — Lucid Dreaming
  `<p>Stephen LaBerge proved in 1980 what had been dismissed as impossible: awareness within dreams.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Stephen_LaBerge">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Stephen_LaBerge" target="_blank">Wikipedia: Stephen LaBerge &rarr;</a></span></sup> Using pre-arranged eye-signal protocols, he demonstrated that lucid dreamers could communicate from inside REM sleep. The neuroscience reveals a genuine hybrid state &mdash; increased prefrontal activity and 40Hz gamma oscillations atop normal REM.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC6451677/">[10]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC6451677/" target="_blank">PMC: Cognitive Neuroscience of Lucid Dreaming (2019) &rarr;</a></span></sup> Therapeutic applications are now backed by RCTs showing 85% PTSD resolution.<sup class="fn"><a href="https://www.ptsduk.org/lucid-dreaming-study/">[11]</a><span class="tip"><a href="https://www.ptsduk.org/lucid-dreaming-study/" target="_blank">PTSD UK: Lucid Dreaming Study (2024) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">1980</div><div class="sl">LaBerge's PhD</div></div>
    <div class="st"><div class="sv">40 Hz</div><div class="sl">Gamma Oscillations</div></div>
    <div class="st"><div class="sv">85%</div><div class="sl">PTSD Resolution</div></div>
    <div class="st"><div class="sv">21.5/mo</div><div class="sl">Trained LD Frequency</div></div>
  </div>
  <h4>Induction Techniques</h4>
  <div class="feat-grid">
    <div class="feat"><h4>MILD</h4><p>Mnemonic Induction: wake after 5h, set intention to recognize dreaming, fall back asleep. LaBerge's original method.</p></div>
    <div class="feat"><h4>WILD</h4><p>Wake-Initiated: maintain consciousness through sleep-onset transition. Difficult but produces vivid, immediate lucidity.</p></div>
    <div class="feat"><h4>Reality Testing</h4><p>Habitual waking checks (hand inspection, finger-through-palm) transfer as dream habits that trigger awareness.</p></div>
    <div class="feat"><h4>External Cues</h4><p>Light/sound devices (DreamLight) and 40Hz tACS stimulation during REM. Voss et al. achieved 77% induction rate.</p></div>
  </div>`,

  // 05 — Sleep Deprivation & Modern Life
  `<p>Randy Gardner stayed awake for 11 days in 1964 and experienced hallucinations, delusions, and severe cognitive collapse.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Randy_Gardner_sleep_deprivation_experiment">[12]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Randy_Gardner_sleep_deprivation_experiment" target="_blank">Wikipedia: Randy Gardner Sleep Deprivation Experiment &rarr;</a></span></sup> After just 24 hours without sleep, cognitive impairment equals legal intoxication.<sup class="fn"><a href="https://www.psychiatrictimes.com/view/sleep-deprivation-psychosis-and-mental-efficiency">[13]</a><span class="tip"><a href="https://www.psychiatrictimes.com/view/sleep-deprivation-psychosis-and-mental-efficiency" target="_blank">Psychiatric Times: Sleep Deprivation and Psychosis &rarr;</a></span></sup> Sleep deprivation has been implicated in the Exxon Valdez, Chernobyl, and Challenger disasters. Modern life systematically undermines sleep through blue light, caffeine culture, and shift work &mdash; creating a $585 billion industry to treat the problem it helped create.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">264h</div><div class="sl">Gardner Record</div></div>
    <div class="st"><div class="sv">0.1% BAC</div><div class="sl">24h Awake Equiv.</div></div>
    <div class="st"><div class="sv">$585B</div><div class="sl">Sleep Economy</div></div>
    <div class="st"><div class="sv">~5h</div><div class="sl">Caffeine Half-Life</div></div>
  </div>
  <h4>Key Risk Factors</h4>
  <ul class="s-list con">
    <li>Blue light exposure (460-480nm) suppresses melatonin, delays sleep onset by ~90 minutes</li>
    <li>Caffeine blocks adenosine receptors &mdash; masks sleep debt without eliminating it</li>
    <li>Shift work increases insomnia prevalence from 6% to 29-38%, raises cancer risk</li>
    <li>Adolescent chronotype shifts 1-3 hours later at puberty, conflicting with school start times</li>
    <li>Orthosomnia: anxiety about sleep optimization paradoxically worsens sleep quality</li>
  </ul>`,

  // 06 — Sleep Disorders & Frontiers
  `<p>From insomnia affecting 30% of adults to fatal familial insomnia killing within 18 months,<sup class="fn"><a href="https://www.ncbi.nlm.nih.gov/books/NBK482208/">[14]</a><span class="tip"><a href="https://www.ncbi.nlm.nih.gov/books/NBK482208/" target="_blank">StatPearls: Fatal Familial Insomnia (2024) &rarr;</a></span></sup> sleep disorders span the mundane to the extraordinary. CBT-I outperforms medication for insomnia but remains under-prescribed.<sup class="fn"><a href="https://aasm.org/2025-in-review-top-sleep-research-in-the-journal-of-clinical-sleep-medicine/">[15]</a><span class="tip"><a href="https://aasm.org/2025-in-review-top-sleep-research-in-the-journal-of-clinical-sleep-medicine/" target="_blank">AASM: Top Sleep Research 2025 &rarr;</a></span></sup> The 1998 discovery of hypocretin/orexin transformed narcolepsy understanding.<sup class="fn"><a href="https://onlinelibrary.wiley.com/doi/pdf/10.1002/brb3.70984">[16]</a><span class="tip"><a href="https://onlinelibrary.wiley.com/doi/pdf/10.1002/brb3.70984" target="_blank">Wiley: Orexin Deficiency in Narcolepsy (2025) &rarr;</a></span></sup> Sleep apnea affects 936 million globally with 2x cardiovascular mortality.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC12562078/">[17]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC12562078/" target="_blank">PMC: Sleep Apnea &mdash; Cardiovascular Risk Factor (2025) &rarr;</a></span></sup> The frontier: targeted memory reactivation and dream engineering move sleep medicine from repair to enhancement.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">30%</div><div class="sl">Chronic Insomnia</div></div>
    <div class="st"><div class="sv">936M</div><div class="sl">Sleep Apnea Cases</div></div>
    <div class="st"><div class="sv">18 mo</div><div class="sl">FFI Duration</div></div>
    <div class="st"><div class="sv">70-80%</div><div class="sl">CBT-I Success Rate</div></div>
  </div>
  <h4>Disorder Landscape</h4>
  <div class="feat-grid">
    <div class="feat"><h4>Insomnia</h4><p>CBT-I (sleep restriction, stimulus control, cognitive restructuring) is first-line. Most patients still receive pills due to access gaps.</p></div>
    <div class="feat"><h4>Sleep Apnea</h4><p>Airway collapse during sleep. 2x cardiovascular risk. CPAP standard; hypoglossal nerve stimulation (Genio) FDA approved 2025.</p></div>
    <div class="feat"><h4>Narcolepsy</h4><p>Autoimmune destruction of orexin neurons. Cataplexy = inappropriate REM atonia while awake. Orexin agonists in trials.</p></div>
    <div class="feat"><h4>Fatal Familial Insomnia</h4><p>PRNP prion mutation. Progressive insomnia, autonomic dysfunction, death. Proves sleep is necessary for survival.</p></div>
    <div class="feat"><h4>Parasomnias</h4><p>Hybrid states: sleepwalking (NREM), REM behavior disorder (acting out dreams). RBD often precedes Parkinson's.</p></div>
    <div class="feat"><h4>Dream Engineering</h4><p>Targeted memory reactivation, Dormio device for hypnagogic dream guidance. The last frontier of consciousness manipulation.</p></div>
  </div>`
];

const details = [
  // 01 — Why We Sleep
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div>
    <h2>Why <em>We</em> Sleep</h2>
  </div>
  <p>Sleep occupies roughly a third of every human life. It renders us unconscious, immobile, and vulnerable to predation. It prevents foraging, mating, and parenting. From a cold evolutionary calculus, sleep should have been eliminated millions of years ago. That it persists universally &mdash; from jellyfish to elephants, from fruit flies to humans &mdash; tells us the benefits must be enormous, even if we cannot yet fully articulate them.</p>
  <h3>Sleep Architecture</h3>
  <p>A single night of sleep is not a uniform state but a carefully orchestrated sequence. Sleep cycles every approximately 90 minutes through distinct stages: NREM Stage 1 (light transition, minutes), Stage 2 (sleep spindles and K-complexes, 45-55% of total sleep), and Stage 3 (deep slow-wave sleep, delta waves, 15-25%). REM sleep, characterized by rapid eye movements and vivid dreaming, constitutes roughly 20-25% of the night. Critically, the composition shifts across the night: early cycles are dominated by deep NREM (restoration), while later cycles are REM-heavy (integration and dreaming).</p>
  <h3>The Two-Process Model</h3>
  <p>Alexander Borb&eacute;ly's 1982 two-process model remains the most influential framework for understanding sleep regulation. Process S (homeostatic sleep pressure) accumulates during waking as adenosine builds in the brain &mdash; the longer you are awake, the stronger the drive to sleep. Process C (circadian rhythm) is governed by the suprachiasmatic nucleus, a tiny cluster of neurons in the hypothalamus that maintains an approximately 24.2-hour internal clock entrained by light exposure. The interaction of these two processes determines both the timing and the intensity of sleep. Caffeine works by blocking adenosine receptors, temporarily masking Process S without reducing actual sleep debt.</p>
  <h3>The Evolutionary Puzzle</h3>
  <p>Every animal with a nervous system sleeps, and many organisms without brains (jellyfish, nematodes) show sleep-like behavioral states. Sleep amounts vary enormously across species: elephants sleep less than 2 hours per day while bats and koalas sleep up to 20 hours. This variation itself is informative &mdash; it suggests sleep serves functions that can be fulfilled more or less efficiently depending on ecological niche. Several adaptive hypotheses compete: energy conservation (reduced metabolic rate), predation avoidance (enforced inactivity during dangerous periods), ecological niche optimization, and active restoration (tissue repair, immune function, waste clearance). No single theory accounts for all observations, and most sleep researchers now accept that sleep serves multiple independent functions.</p>
  <div class="callout">
    <h4>The Walker Controversy</h4>
    <p>Matthew Walker's "Why We Sleep" (2017) brought sleep science to millions but has been criticized by Alexey Guzey and others for factual errors and overstatement. The core findings Walker reports are largely sound, but specific claims (sleep loss and cancer risk magnitudes, the claim that no biological function survives sleep deprivation) are presented more strongly than the evidence supports. The book remains a useful entry point if held with appropriate skepticism.</p>
  </div>
  <h3>Walker's Framework</h3>
  <p>Walker organizes sleep function into three modes mapped to waking states. Waking is reception: taking in new information. NREM sleep is reflection: consolidating and strengthening the day's learning, with sleep spindles serving as the file-transfer mechanism from short-term hippocampal storage to long-term neocortical memory. REM sleep is integration: connecting newly stored information with existing knowledge structures, building creative associations and emotional understanding. The framework is intuitive, though the reality is likely more nuanced, with these functions overlapping across sleep stages rather than cleanly separating.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Established</h4>
      <ul>
        <li>Sleep is universal across animal kingdom</li>
        <li>Two-process model accurately predicts sleep timing</li>
        <li>NREM and REM serve different memory functions</li>
        <li>Sleep deprivation impairs cognition reliably</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Still Debated</h4>
      <ul>
        <li>Whether a single "core function" exists</li>
        <li>Why sleep amounts vary so dramatically across species</li>
        <li>Whether sleep debt can be fully repaid</li>
        <li>The relative importance of each adaptive hypothesis</li>
      </ul>
    </div>
  </div>`,

  // 02 — The Sleeping Brain
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div>
    <h2>The <em>Sleeping</em> Brain</h2>
  </div>
  <p>The sleeping brain is not resting &mdash; it is working. Three major processes happen during sleep that cannot occur effectively during waking: memory consolidation through coordinated hippocampal replay, metabolic waste clearance through the glymphatic system, and synaptic recalibration through the homeostasis mechanism. Each represents a different level of analysis, and together they explain why sleep deprivation has such widespread cognitive and health consequences.</p>
  <h3>Memory Consolidation</h3>
  <p>During NREM sleep, the hippocampus replays experiences from the preceding day at compressed timescales &mdash; events that took minutes play back in seconds. This replay is coordinated with cortical slow oscillations (0.5-1 Hz) and thalamocortical sleep spindles (12-16 Hz bursts). The precise coupling of these three oscillations creates windows for memory transfer from hippocampus (temporary storage) to neocortex (long-term storage). Sleep spindles in particular have been identified as file-transfer mechanisms, and their density correlates with learning ability. People who generate more spindles tend to perform better on post-sleep memory tests.</p>
  <h3>The Glymphatic System</h3>
  <p>In 2012, Maiken Nedergaard at the University of Rochester discovered a brain-wide waste clearance pathway she named the glymphatic system (a portmanteau of "glial" and "lymphatic"). During sleep, the interstitial space between brain cells expands by approximately 60%, allowing cerebrospinal fluid to flow through perivascular channels and flush metabolic waste, including amyloid-beta &mdash; the protein that accumulates in Alzheimer's disease. This discovery provided the first mechanistic explanation for why sleep deprivation might increase dementia risk.</p>

  <h3>2024 Breakthrough</h3>
  <p>A landmark 2024 paper in Cell revealed the specific mechanism driving glymphatic clearance. During deep sleep, the brainstem releases tiny waves of norepinephrine approximately every 50 seconds. These waves cause blood vessels to contract rhythmically, creating slow pulsations that pump cerebrospinal fluid through the brain's interstitial spaces. Critically, the sleep aid zolpidem (Ambien) was shown to suppress these oscillations &mdash; meaning that pharmacological sedation is not equivalent to natural sleep for brain waste clearance. This finding has implications for how we think about sleep quality versus sleep quantity.</p>
  <h3>Synaptic Homeostasis (Tononi &amp; Cirelli)</h3>
  <p>The synaptic homeostasis hypothesis (SHY) proposes that the fundamental purpose of sleep is synaptic recalibration. During waking, learning and experience continually strengthen synapses, increasing their overall weight. This is energetically expensive and eventually approaches saturation. During NREM sleep, slow waves globally downscale synaptic strength back toward a sustainable baseline. Not all synapses are affected equally: the fittest circuits &mdash; those strengthened repeatedly or well-integrated with existing memory networks &mdash; are selectively preserved. Sleep, on this view, is not about adding information but about subtracting noise while retaining signal.</p>
  <h3>Ongoing Controversy</h3>
  <p>The glymphatic system remains an active area of scientific debate. While the basic phenomenon (enhanced clearance during sleep) is well-established in animal models, some researchers question the specific perivascular flow mechanism and whether it translates directly to humans. A 2025 report noted that new imaging methods are challenging some of the original claims, though the core finding &mdash; that sleep facilitates brain waste removal &mdash; appears robust. The first human demonstrations (2024-2025) involved only 5 surgical patients, and larger studies are needed.</p>
  <div class="security-box">
    <h4>Clinical Note</h4>
    <p>The glymphatic findings suggest that disrupted sleep may contribute to neurodegenerative disease through impaired waste clearance. However, the causal chain from poor sleep to Alzheimer's is not yet proven in humans. Sleep optimization is sensible preventive medicine, but claims about "cleaning your brain" should be held with appropriate caution.</p>
  </div>`,

  // 03 — Dream Theories
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div>
    <h2>Dream <em>Theories</em></h2>
  </div>
  <p>Dreams have fascinated humans since antiquity, but scientific understanding remains remarkably fragmented. At least six major theories compete to explain why we dream, and the field has not converged on a consensus. This reflects a deeper problem: dreams are subjective experiences occurring during states of altered consciousness, making them extraordinarily difficult to study with the tools of empirical science.</p>
  <h3>Freud: The Unconscious Speaks</h3>
  <p>Sigmund Freud's "The Interpretation of Dreams" (1900) established the first systematic theory: dreams are the disguised fulfillment of repressed wishes. The dream-work transforms unacceptable unconscious desires into acceptable manifest content through condensation, displacement, and symbolization. While Freud's specific mechanisms are widely rejected by modern neuroscience, his core insight &mdash; that dreams are meaningful psychological events rather than random noise &mdash; has been partially vindicated. Dreams do incorporate emotional concerns and are not purely random, even if the mechanism is not Freudian repression.</p>
  <h3>Activation-Synthesis (Hobson &amp; McCarley, 1977)</h3>
  <p>In a direct challenge to Freud, Hobson and McCarley proposed that dreams originate from random neural activity in the pontine brainstem during REM sleep. Ponto-geniculo-occipital (PGO) spikes activate visual and motor cortex chaotically, and the forebrain (specifically the cortex) attempts to synthesize a coherent narrative from this random input. Dream bizarreness is not disguise but noise: the result of aminergic demodulation and prefrontal deactivation. The later AIM model added dimensions of activation level, input-output gating, and chemical modulation. The theory is influential but criticized for being too reductionist &mdash; it cannot explain why dreams often have emotional coherence and thematic continuity.</p>
  <h3>Threat Simulation Theory (Revonsuo, 2000)</h3>
  <p>Antti Revonsuo proposed an explicitly evolutionary framework: dreaming evolved as a mechanism to simulate threatening events in a safe environment, improving an organism's ability to respond to real-world dangers. The theory predicts that dreams should be biased toward negative emotional content &mdash; and empirically, roughly 65% of dream emotions are negative (anxiety, fear, confusion). Critics note that many dreams are mundane or positive, and that the theory struggles to explain non-threatening dream content. It may describe one function of dreaming without being the complete explanation.</p>
  <h3>Predictive Processing</h3>
  <p>The most sophisticated modern framework applies Karl Friston's free energy principle to dreaming. During waking, the brain continuously generates predictions about incoming sensory data and updates its models based on prediction errors. During REM sleep, sensory input is minimal (the body is paralyzed, eyes are closed), yet the hierarchical prediction system continues operating. Without sensory correction, the brain relies entirely on its internal, high-level predictions to generate experience &mdash; producing the vivid but unconstrained "hallucinations" we call dreams. This framework explains both the felt reality of dreams (the prediction system treats its outputs as real) and their logical incoherence (without sensory correction, errors compound).</p>

  <h3>The Hard Problem of Dream Consciousness</h3>
  <p>Perhaps the deepest question is not why we dream but why there is any subjective experience during sleep at all. During REM, the prefrontal cortex &mdash; responsible for executive function, logical reasoning, and metacognition &mdash; is largely deactivated. This explains why dreamers typically accept bizarre events uncritically. Yet the experience is vivid, emotional, and phenomenally rich. Dreams thus present a version of the hard problem of consciousness: how does the brain generate subjective experience, and why does it continue to do so in a state that seems designed to be unconscious? Lucid dreaming (Section 04) complicates this further by demonstrating that metacognitive awareness can re-emerge within the dream state.</p>
  <div class="callout">
    <h4>The Continuity Hypothesis</h4>
    <p>Recent research supports the continuity hypothesis: dream content reflects waking concerns, emotional preoccupations, and daily experiences rather than being purely random or symbolic. Dreams are not messages from the unconscious (Freud) or noise from the brainstem (Hobson), but a continuation of the mind's ongoing work in a different mode of processing.</p>
  </div>`,

  // 04 — Lucid Dreaming
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div>
    <h2><em>Lucid</em> Dreaming</h2>
  </div>
  <p>Lucid dreaming &mdash; the state of being aware that one is dreaming while the dream continues &mdash; was dismissed as fantasy by mainstream science until Stephen LaBerge devised an elegantly simple proof. Since REM atonia paralyzes the body but spares the eye muscles, a sleeping dreamer who knows they are dreaming can perform pre-arranged eye movement signals detectable on an EOG. This simple protocol transformed lucid dreaming from anecdote to measurable phenomenon.</p>
  <h3>LaBerge's Revolution</h3>
  <p>Stephen LaBerge began researching lucid dreaming as a Stanford PhD student in psychophysiology, receiving his degree in 1980. His key innovation was the eye-signal paradigm: subjects agreed to perform a specific pattern of deliberate left-right eye movements when they became lucid in a dream. These signals appeared on the electrooculogram during verified REM sleep, providing the first objective evidence that conscious awareness could exist within a dreaming brain. Using his MILD technique, LaBerge achieved a remarkable personal frequency of 18-26 lucid dreams per month, with up to 4 in a single night.</p>
  <h3>The Neuroscience: A Hybrid State</h3>
  <p>Brain imaging studies reveal that lucid dreaming is neither normal REM sleep nor waking &mdash; it is a genuinely novel state of consciousness. Compared to ordinary REM sleep, lucid dreaming shows increased activation in the dorsolateral prefrontal cortex (responsible for metacognition and self-awareness) and heightened gamma oscillations at approximately 40Hz in frontotemporal regions. This has been confirmed by Voss and colleagues, who showed that external 40Hz transcranial alternating current stimulation (tACS) during REM could induce lucidity in 77% of subjects. The finding supports the interpretation that lucid dreaming is a hybrid state: the dreaming brain plus reactivated executive function.</p>
  <h3>Therapeutic Applications</h3>
  <p>The therapeutic potential of lucid dreaming has progressed from clinical observation to randomized controlled trials. Lucid dreaming has been used to treat chronic nightmares for over three decades, with the basic mechanism being straightforward: if you know you are dreaming, you can confront or change the nightmare content rather than being a helpless victim. More recently, research has extended to full PTSD treatment. A landmark study by the Institute of Noetic Sciences found that 85% of participants no longer met PTSD criteria after a lucid dreaming intervention, with effects sustained at four-week follow-up. A 2025 RCT confirmed significant reductions in PTSD symptoms and nightmare distress.</p>

  <h3>Philosophical Implications</h3>
  <p>Lucid dreaming raises profound questions about the nature of consciousness. If you can be aware within a dream &mdash; capable of reflection, decision-making, and even signal communication &mdash; then consciousness is not a simple binary between "awake" and "asleep." It suggests consciousness exists on a spectrum, with lucid dreaming occupying a genuine middle ground. This has implications for theories of consciousness: global workspace theory, integrated information theory, and higher-order theories all must account for a state that has some but not all features of waking awareness. It also connects to Descartes' ancient dream argument: how can we be certain at any moment that we are not dreaming?</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Strong Evidence</h4>
      <ul>
        <li>Eye-signal verification is robust and replicated</li>
        <li>Distinct neural signature confirmed by EEG/fMRI</li>
        <li>Therapeutic benefit for nightmares well-established</li>
        <li>PTSD applications showing promising RCT results</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Limitations</h4>
      <ul>
        <li>Not everyone can learn to lucid dream</li>
        <li>Clinical trial sample sizes remain small</li>
        <li>Long-term effects on sleep quality unknown</li>
        <li>External induction (tACS) needs more replication</li>

    </div>
  </div>`,

  // 05 — Sleep Deprivation & Modern Life
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div>
    <h2>Sleep <em>Deprivation</em> &amp; Modern Life</h2>
  </div>
  <p>The twentieth century's most famous sleep experiment began as a high-school science project. In December 1963, seventeen-year-old Randy Gardner decided to stay awake for as long as possible, eventually remaining conscious for 11 days and 24 minutes. The experiment demonstrated, under observation by Stanford researcher William Dement, just how rapidly and completely sleep deprivation destroys cognitive function. Six decades later, modern life has created a society-wide experiment in chronic, partial sleep deprivation &mdash; with consequences we are only beginning to understand.</p>
  <h3>The Gardner Experiment</h3>
  <p>Gardner's 264-hour ordeal produced a cascading series of cognitive failures. Hallucinations appeared by day 2 (a street sign seemed to be a person). By day 4, delusions and paranoia emerged. By day 11, Gardner was expressionless, his speech slurred and monotone, his attention span nearly zero. On a serial subtraction test, he could manage only five subtractions before stopping. Yet remarkably, after sleeping just 14 hours and 40 minutes, his cognitive function appeared largely restored. This rapid recovery raised questions about the nature of "sleep debt" that remain unresolved. However, Gardner himself reported lifelong insomnia problems afterward. Guinness subsequently stopped tracking the record due to health risks.</p>
  <h3>Cognitive Impairment</h3>
  <p>Controlled studies have established that 24 hours of sleep deprivation produces cognitive impairment equivalent to a blood alcohol concentration of 0.1% &mdash; above the legal driving limit in every US state. The impairment is not limited to reaction time: judgment, emotional regulation, creative problem-solving, and risk assessment all deteriorate. Perhaps most dangerously, sleep-deprived individuals consistently underestimate their own impairment. The prefrontal cortex loses its ability to regulate the amygdala, producing heightened emotional reactivity and impaired decision-making &mdash; a combination implicated in several of the twentieth century's worst industrial disasters.</p>
  <h3>Sleep-Related Disasters</h3>
  <p>The Exxon Valdez oil spill (1989) occurred when the third mate, who had slept only 6 hours in the previous 48, failed to execute a course correction in Prince William Sound. The Chernobyl nuclear disaster (1986) involved operators working through early morning hours when circadian alertness is at its nadir. The Challenger shuttle disaster (1986) involved key decision-makers who had slept less than 2 hours the night before making the fatal launch decision. These are not coincidences but predictable consequences of a society that treats sleep as optional.</p>

  <h3>Blue Light and Screens</h3>
  <p>Blue light in the 460-480 nanometer range is the most potent suppressor of melatonin, the hormone that signals nighttime to the circadian system. Two to three hours of evening screen exposure can delay melatonin onset by approximately 90 minutes. Research shows that 60-80% of students report poor sleep quality linked to evening blue light exposure, with more than 4 hours of daily device use predicting worse sleep outcomes. However, the blue-light-as-villain narrative requires nuance: meta-analyses of blue-light-blocking glasses show mixed results, and daytime blue light exposure actually improves alertness and mood. The problem is timing, not the light itself.</p>
  <h3>Caffeine's Hidden Cost</h3>
  <p>Caffeine has a mean half-life of approximately 5 hours, meaning that a coffee consumed at 2pm still has half its caffeine circulating at 7pm and a quarter at midnight. Caffeine works by blocking adenosine receptors &mdash; the same adenosine that drives Process S (homeostatic sleep pressure). This creates a pernicious cycle: caffeine masks sleepiness without reducing actual sleep debt, enabling continued functioning during the day but degrading subsequent sleep quality, which increases the need for more caffeine the next morning. The half-life varies significantly with genetics, smoking status (30-50% shorter in smokers), and oral contraceptive use (approximately doubled).</p>
  <h3>The Adolescent Chronotype Problem</h3>
  <p>During puberty, biological changes shift the circadian clock 1-3 hours later, creating a natural preference for later bedtimes and wake times. This is not laziness but endocrinology: pubertal hormones alter melatonin secretion timing. Yet most school start times (7-8am) directly conflict with this biology, forcing adolescents to function during their circadian nadir. The American Academy of Pediatrics recommends starting middle and high school no earlier than 8:30am, but most schools ignore this evidence. The result is chronic sleep deprivation during a critical period of brain development.</p>
  <h3>The Sleep Economy</h3>
  <p>The global sleep economy reached an estimated $585 billion in 2024, encompassing mattresses, supplements, apps, wearables, sleep coaching, weighted blankets, and pharmacological interventions. Sleep tech devices alone are projected to grow from $24.85 billion in 2024 to $134.6 billion by 2034. This represents both a genuine response to the sleep crisis and its potential commodification. The phenomenon of orthosomnia &mdash; obsessive monitoring of sleep data that paradoxically worsens sleep quality through anxiety &mdash; illustrates the tension between awareness and overoptimization.</p>`,

  // 06 — Sleep Disorders & Frontiers
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div>
    <h2>Sleep <em>Disorders</em> &amp; Frontiers</h2>
  </div>
  <p>Sleep disorders range from the ubiquitous to the vanishingly rare, and understanding them illuminates normal sleep function through the logic of pathology: what breaks tells us what was working. Insomnia affects a third of adults; sleep apnea afflicts nearly a billion people; fatal familial insomnia kills fewer than 100 families worldwide but proves, through its terrible natural experiment, that sleep is not optional for survival.</p>
  <h3>Insomnia and CBT-I</h3>
  <p>Chronic insomnia affects 10-30% of adults and is the most common sleep complaint in medical practice. The treatment landscape is marked by a striking gap between evidence and practice. Cognitive Behavioral Therapy for Insomnia (CBT-I) is recommended by every major medical organization as first-line treatment &mdash; ahead of any medication. Its components include sleep restriction (reducing time in bed to increase sleep efficiency), stimulus control (bed only for sleep, not scrolling), cognitive restructuring (addressing catastrophic thinking about sleep), relaxation training, and sleep hygiene education. CBT-I produces improvement in 70-80% of patients, with effects that persist long after treatment ends &mdash; unlike medications, which work only as long as they are taken. Yet the majority of insomnia patients still receive hypnotic prescriptions rather than CBT-I, largely due to provider shortages, cost barriers, and the speed of writing a prescription versus delivering an 8-session therapy.</p>
  <h3>Sleep Apnea: The Hidden Cardiovascular Threat</h3>
  <p>Obstructive sleep apnea (OSA) is characterized by repeated airway collapse during sleep, causing breathing interruptions that fragment sleep and reduce oxygen saturation. An estimated 936 million adults aged 30-69 are affected globally, with the highest prevalence in the US, China, Brazil, and India. The cardiovascular consequences are severe: meta-analyses link OSA to nearly twice the risk of cardiovascular disease, stroke, and all-cause mortality. In cardiovascular clinics, OSA prevalence reaches 40-80% among patients with hypertension, heart failure, or atrial fibrillation. Despite this, up to 80% of moderate-to-severe cases remain undiagnosed. CPAP remains the standard treatment, with newer options including the Genio hypoglossal nerve stimulator (FDA approved 2025).</p>
  <h3>Narcolepsy and the Hypocretin Discovery</h3>
  <p>The 1998 discovery of the neuropeptide hypocretin (simultaneously discovered and called orexin by another group) transformed narcolepsy from a mysterious syndrome into a disease with a clear molecular mechanism. Narcolepsy Type 1 results from the autoimmune destruction of the approximately 70,000 hypocretin-producing neurons in the lateral hypothalamus. Without hypocretin to stabilize the wake-sleep boundary, patients experience sudden intrusions of REM sleep phenomena into waking: excessive daytime sleepiness, cataplexy (sudden loss of muscle tone triggered by emotion &mdash; essentially REM atonia activated while awake), sleep paralysis, and hypnagogic hallucinations. Narcolepsy thus provides a natural lesion study that reveals how the brain normally maintains the sharp boundary between waking and sleep. The therapeutic frontier is promising: oveporexton, an oral orexin receptor 2-selective agonist, showed significant improvements in wakefulness and cataplexy in phase 2 trials.</p>
  <h3>Fatal Familial Insomnia</h3>
  <p>FFI is caused by a mutation (D178N) in the prion protein gene PRNP, combined with methionine at codon 129. The resulting misfolded prion protein accumulates primarily in the thalamus &mdash; the brain's relay station for sensory information and a critical regulator of sleep-wake transitions. As the thalamus degenerates, patients lose the ability to sleep. The disease progresses relentlessly: insomnia gives way to autonomic dysfunction (tachycardia, hyperhidrosis, hypertension), then cognitive decline, hallucinations, and eventually death &mdash; typically within 18 months of onset. A sporadic form (sFI) occurs without family history. FFI is currently incurable and serves as the most powerful proof that sleep is a biological necessity: remove it, and the organism dies.</p>

  <h3>Parasomnias</h3>
  <p>Parasomnias are hybrid states that blend features of waking and sleep. NREM parasomnias (sleepwalking, sleep terrors, sleep eating) occur during deep slow-wave sleep and involve complex behaviors without conscious awareness or dream recall. REM Behavior Disorder (RBD) involves the failure of normal REM atonia, allowing patients to physically act out their dreams &mdash; often violently. RBD is especially significant because it frequently precedes the development of neurodegenerative diseases: up to 80% of RBD patients eventually develop Parkinson's disease or Lewy body dementia, often decades after RBD onset. This makes RBD one of the strongest known prodromal markers for neurodegeneration.</p>
  <h3>The Frontier: Engineering Sleep</h3>
  <p>The cutting edge of sleep science is moving from treating disorders to actively enhancing sleep function. Targeted Memory Reactivation (TMR) presents sensory cues during sleep that were associated with learning during waking &mdash; a rose scent presented during study and then during deep sleep enhances recall of the studied material. The Dormio device from MIT Media Lab delivers audio cues during hypnagogia (the transition into sleep) to guide dream themes, a technique called dream incubation. These approaches raise ethical questions: is it appropriate to engineer the content of dreams &mdash; perhaps the last truly private space of human consciousness? The potential applications range from therapeutic (nightmare modification, skill rehearsal) to commercial (marketing during sleep), making the governance conversation urgent.</p>
  <div class="callout">
    <h4>Where Sleep Medicine Is Heading</h4>
    <p>The next decade will likely see orexin agonists transform narcolepsy treatment, TMR move from laboratory to clinical application, and digital CBT-I become the default insomnia intervention. The bigger question is whether sleep engineering &mdash; the deliberate modification of what happens during sleep &mdash; will remain therapeutic or become another optimization frontier.</p>

<script>
(function(){

  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar

  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');

  var isCompact = false, dismissed = false;

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
