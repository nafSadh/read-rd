  <h3>Secure Attachment</h3>
  <p>The child uses the caregiver as a secure base for exploration. Distressed by separation, comforted by return. In adults: comfortable with intimacy and independence, able to communicate needs, tolerate conflict, repair ruptures. The &ldquo;gold standard&rdquo; &mdash; though critics note that calling one style &ldquo;secure&rdquo; and the others &ldquo;insecure&rdquo; encodes a value judgment into what should be a descriptive taxonomy.</p>

  <h3>Avoidant / Dismissive</h3>
  <p>The child appears indifferent to the caregiver&rsquo;s departure and return. Ainsworth &amp; Bell hypothesized this was a &ldquo;mask for distress&rdquo; &mdash; heart rate studies later confirmed elevated stress despite calm exterior. In adults: values independence, uncomfortable with emotional closeness, suppresses attachment needs, withdraws under stress. <strong>Key critique:</strong> Kagan argued this is temperament, not attachment &mdash; less reactive children simply don&rsquo;t cry easily.</p>

  <h3>Anxious / Preoccupied</h3>
  <p>The child is intensely distressed by separation and ambivalent on return &mdash; seeking contact but resisting comfort. In adults: hypervigilant about rejection, needs constant reassurance, may monitor partner&rsquo;s availability obsessively. The protest behavior (anger, clinging, testing) is understood as a conditional strategy for maintaining caregiver availability.</p>

  <h3>Disorganized / Fearful-Avoidant</h3>
  <p>Added by Main &amp; Solomon (1986) for children who showed contradictory behaviors &mdash; approaching while looking away, freezing mid-movement. Often linked to caregivers who are simultaneously source of comfort and source of fear. In adults: oscillates between craving closeness and fearing it. The most consistently associated with trauma histories.</p>

  <div class="security-box"><h4>The Categorical Problem</h4><p>Taxometric analyses (Fraley &amp; Spieker, 2003; Fraley et al., 2015) consistently find that attachment is dimensional, not categorical. People don&rsquo;t fall into discrete &ldquo;types&rdquo; &mdash; they sit on continuous spectrums of anxiety and avoidance. The four-style model persists because it&rsquo;s easy to communicate, not because it&rsquo;s how the data actually cluster. This is the first place where attachment theory starts to resemble MBTI: clean categories imposed on messy continuums.</p></div>`,

  <h3>The Hazan-Shaver Bridge</h3>
  <p>In their original study, Hazan and Shaver simply asked adults to choose which of three paragraphs best described their romantic experience &mdash; essentially self-selecting into Secure, Avoidant, or Anxious categories. The distribution roughly matched infant data: ~56% secure, ~25% avoidant, ~19% anxious. This was taken as strong evidence for continuity. But self-report attachment measures and interview-based measures (like the Adult Attachment Interview) are only weakly correlated with each other (Roisman et al., 2007) &mdash; raising the question of what exactly is being measured.</p>

  <h3>The Anxious-Avoidant Dance</h3>
  <p>One of the theory&rsquo;s most resonant clinical observations: anxious and avoidant individuals often end up in relationships together. The anxious partner&rsquo;s pursuit triggers the avoidant partner&rsquo;s withdrawal, which amplifies the anxious partner&rsquo;s protest behavior, creating a self-reinforcing cycle. This &ldquo;pursue-withdraw&rdquo; dynamic is well-documented in couples therapy research (Gottman, Johnson) and is arguably the theory&rsquo;s strongest clinical contribution.</p>

  <h3>Stability: The Inconvenient Data</h3>
  <p>A core claim of attachment theory is that early patterns persist. The data is more complicated. Fraley&rsquo;s (2002) meta-analysis found only moderate stability (r&asymp;.30) across the first 19 years of life. In a 4,000-person longitudinal study (Fraley et al., 2021), half of major life events caused immediate changes in attachment style, but most people reverted to baseline. Only about a quarter of events produced lasting change. The picture: there&rsquo;s a &ldquo;prototype&rdquo; tendency, but it&rsquo;s far from destiny. Life events, relationships, and deliberate effort can all shift attachment patterns &mdash; more than the pop psychology version acknowledges, less than the &ldquo;just choose secure&rdquo; self-help version claims.</p>

  <div class="callout"><h4>Different Across Relationships</h4><p>Research consistently shows that people can have different attachment styles in different relationships &mdash; secure with a best friend, avoidant with a partner, anxious with a parent. This contradicts the idea of a single &ldquo;attachment style&rdquo; as a global trait and supports the dimensional, context-dependent view. You are not one style. You are a distribution across relationships.</p></div>`,

  <h3>Polyvagal Theory (Porges, 1994)</h3>
  <p>Stephen Porges proposed that the mammalian autonomic nervous system has three hierarchical states, mediated by the vagus nerve:</p>

  <h3>Neuroception</h3>
  <p>Porges coined &ldquo;neuroception&rdquo; for the nervous system&rsquo;s subconscious threat detection &mdash; below the level of conscious perception. The idea is that your body decides whether someone is safe or dangerous before your mind forms an opinion. This maps compellingly onto attachment: a child whose caregiver was unpredictable develops a neuroception calibrated for threat, which persists into adulthood.</p>

  <h3>Somatic Storage of Trauma</h3>
  <p>The clinical claim: trauma doesn&rsquo;t just live in memory &mdash; it lives in the body. Bessel van der Kolk&rsquo;s work, Peter Levine&rsquo;s Somatic Experiencing, and sensorimotor psychotherapy all build on this premise. EMDR (Eye Movement Desensitization and Reprocessing) uses bilateral stimulation to help the brain reprocess memories that got &ldquo;stuck&rdquo; in their raw somatic form rather than being filed as narrative.</p>

  <div class="security-box"><h4>PVT&rsquo;s Own Scientific Problems</h4><p>Polyvagal theory is itself scientifically controversial. Neuroanatomists (Neuhuber &amp; Berthoud, 2022) argue that PVT&rsquo;s phylogenetic claims don&rsquo;t withstand scrutiny. The Wikipedia article on PVT notes it is &ldquo;widely criticized for being at odds with known science.&rdquo; The core insight &mdash; that the nervous system has a hierarchy of threat responses and that safety is a physiological state &mdash; has clinical utility. The specific evolutionary and anatomical claims are more contested. As with attachment theory itself: useful framework, shaky science.</p></div>`,

  <h3>1. The Temperament Confound (Kagan)</h3>
  <p>Harvard&rsquo;s Jerome Kagan, the 22nd most eminent psychologist of the 20th century (per APA), argued that what Ainsworth measured in the Strange Situation was temperament, not attachment. Children with an irritable temperament cry more and can&rsquo;t be soothed easily &mdash; they get classified as &ldquo;insecure.&rdquo; Less reactive children don&rsquo;t cry much and get classified as &ldquo;secure.&rdquo; The SSP conflates two different things. Kagan predicted attachment theory would become a &ldquo;historical footnote&rdquo; within 10-15 years.<sup class="fn"><a>[1]</a><span class="tip"><a href="https://www.fatherly.com/health/attachment-theory-wrong-attachment-styles-dont-matter" target="_blank">C1 Fatherly: Kagan Interview &rarr;</a></span></sup></p>

  <h3>2. The Stability Problem</h3>
  <p>A central claim is that early attachment predicts adult relationship patterns. The longitudinal data shows only moderate stability (r&asymp;.30 over 10 years in childhood). Secure attachment in year one does <em>not</em> protect against later anxiety and depression. People change attachment styles across relationships and across time. The &ldquo;prototype&rdquo; model (Fraley, 2002)<sup class="fn"><a>[2]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1207/S15327957PSPR0602_03" target="_blank">A1 Fraley (2002): Stability Meta-Analysis &rarr;</a></span></sup> finds a stable underlying factor, but it&rsquo;s modest &mdash; not the deterministic narrative that pop psychology sells.</p>

  <h3>3. Cultural WEIRD Bias</h3>
  <p>The &ldquo;normative&rdquo; distribution of attachment styles comes from American middle-class samples. A Northern German study found 52% avoidant (vs. 20-25% in US). Japanese samples found zero avoidant children &mdash; only resistant. These aren&rsquo;t measurement errors; they reflect genuine cultural differences in child-rearing. The theory pathologizes non-American patterns as &ldquo;insecure.&rdquo; As Keller (2021) argued, attachment theory has &ldquo;conceptually fuzzy concepts&rdquo; that assume Western independence norms as the healthy baseline.<sup class="fn"><a>[3]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/14616734.2022.2030132" target="_blank">C5 Thompson et al. (2022) &rarr;</a></span></sup></p>

  <h3>4. The Mother-Blame Problem</h3>
  <p>From its inception, attachment theory was criticized for being &ldquo;single factor&rdquo; &mdash; focusing almost entirely on the mother&rsquo;s sensitivity. Judith Rich Harris (2009) argued the theory &ldquo;underestimates the child&rdquo; and overestimates parental influence relative to peers, social class, genes, and culture. Bowlby&rsquo;s original framework essentially blamed mothers for insecure children &mdash; a claim now softened but not fully abandoned.</p>

  <h3>5. The Pop Psychology Distortion</h3>
  <p>The book <em>Attached</em> (Levine &amp; Heller, 2010) and its Instagram aftermath represent the worst version of attachment theory: a framework that assigns fixed types to people, pathologizes avoidance, glamorizes &ldquo;secure&rdquo; as the only healthy option, and encourages armchair diagnosis of romantic partners. This is where attachment theory most resembles MBTI and zodiac &mdash; clean categories that feel like insight but function as confirmation bias. The subreddits and TikToks diagnose exes as &ldquo;avoidant&rdquo; with the same certainty that astrology assigns Scorpio traits.</p>

  <h3>6. The &ldquo;Era of Exhaustion&rdquo;</h3>
  <p>In a 2022 special issue of <em>Attachment &amp; Human Development</em>, Roisman and Groh described the field as in an &ldquo;era of exhaustion,&rdquo; with theoretical and methodological rigidity limiting advances. Mesman (2021) noted proneness to confirmation bias among attachment researchers. After 50+ years, fundamental questions remain unresolved: What exactly are internal working models? How do they transmit from infant to adult? Why is the infant-adult correlation so weak?</p>

  <div class="callout"><h4>The Honest Assessment</h4><p>Attachment theory is not pseudoscience in the way astrology is &mdash; there is real research, real longitudinal data, and the pursue-withdraw dynamic in couples is empirically robust. But it is oversold, overcategorized, and culturally biased in ways that the pop psychology version completely ignores. The most honest framing: attachment patterns are one lens among many (temperament, social class, culture, genes, current context) for understanding relational behavior. They describe tendencies, not essences. They are &ldquo;useful rather than true.&rdquo;</p></div>`,

  // 06 — Earned Security
  `<p>Despite the critiques, one of the most hopeful findings from attachment research is that styles <em>can</em> change. The concept of &ldquo;earned secure attachment&rdquo; &mdash; developed by Mary Main &mdash; describes people who had insecure childhoods but developed secure adult patterns through relationships, therapy, and self-awareness.</p>

  <h3>What the Research Actually Shows</h3>
  <p>Fraley et al.&rsquo;s longitudinal work (2021) found that about 25% of major life events produce <em>lasting</em> changes in attachment patterns. The strongest predictors of movement toward security: new romantic relationships (initially), therapy (sustained), and the way people construe their experiences. Importantly, it&rsquo;s not just the event &mdash; it&rsquo;s whether you interpret it positively or negatively. This is where agency enters the otherwise deterministic framework.</p>

  <h3>Corrective Relational Experiences</h3>
  <p>The therapeutic mechanism most supported by research: experiencing a relationship (therapeutic or otherwise) where your attachment needs are met consistently enough to revise your expectations. A secure partner who doesn&rsquo;t withdraw when you pursue. A therapist who stays present when you shut down. A friend who checks in without being asked. Each positive experience that contradicts the old template creates incremental revision.</p>

  <h3>Somatic Approaches</h3>
  <p>For trauma-based attachment patterns, cognitive insight alone is often insufficient. EMDR, Somatic Experiencing, and sensorimotor psychotherapy work at the body level &mdash; helping the nervous system complete threat responses that got frozen. The evidence for EMDR in treating PTSD is strong (Shapiro, 2018; WHO recommendation). Somatic Experiencing has a growing but smaller evidence base. The theoretical rationale is sound: if the pattern is encoded in the nervous system, the intervention needs to reach the nervous system.</p>

  <div class="callout"><h4>The Three-Layer Model</h4><p>A useful clinical framing: healing works at three layers. The <strong>narrative layer</strong> (talk therapy, poetry, journaling) builds a coherent story. The <strong>somatic layer</strong> (EMDR, SE, movement) processes what the body holds. The <strong>relational layer</strong> (secure friendships, therapeutic alliance, healthy partnerships) provides the corrective experience. Most people need work at all three levels. Narrative alone is necessary but insufficient &mdash; the body has its own memory.</p></div>`,

  // 07 — Personal Lens
  `<p>Frameworks are tools. They&rsquo;re useful when they illuminate, dangerous when they rigidify. The question isn&rsquo;t &ldquo;what is my attachment style&rdquo; &mdash; it&rsquo;s &ldquo;what patterns do I notice, where did they come from, and how do I want to change?&rdquo;</p>

  <h3>When the Framework Helps</h3>
  <p>Attachment language gives vocabulary to previously unnamed patterns. Recognizing a pursue-withdraw dynamic can break the cycle. Understanding that avoidance often masks distress (not indifference) creates compassion &mdash; for yourself and for others. The &ldquo;earned secure&rdquo; concept is genuinely hopeful: you are not your childhood. The framework&rsquo;s clinical applications in couples therapy (EFT, developed by Sue Johnson) have strong empirical support.</p>

  <h3>When the Framework Hurts</h3>
  <p>When you diagnose an ex as &ldquo;avoidant&rdquo; and stop there. When you use your attachment style as an excuse rather than an observation. When the label becomes identity: &ldquo;I&rsquo;m anxious-attached&rdquo; instead of &ldquo;I notice anxious patterns in this relationship.&rdquo; When the framework absorbs all the explanatory weight that should be distributed across temperament, culture, current stress, class, neurodivergence, and just the specific dynamics of a specific relationship with a specific person.</p>

  <h3>What Actually Matters</h3>
  <p>The evidence-supported takeaways, stripped of the theoretical baggage:</p>
  <ul>
    <li>Early experiences influence (but don&rsquo;t determine) adult relational patterns</li>
    <li>People vary on continuous dimensions of relational anxiety and avoidance</li>
    <li>Trauma can encode in the nervous system, not just in narrative memory</li>
    <li>Patterns change through relationships, therapy, and deliberate self-awareness</li>
    <li>The pursue-withdraw cycle in couples is real and breakable</li>
    <li>Your body&rsquo;s sense of safety matters as much as your mind&rsquo;s analysis</li>
  </ul>

  <div class="callout"><h4>Hold It Loosely</h4><p>The best way to use attachment theory is the way you might use a map of a city you&rsquo;re visiting for the first time: helpful for orientation, wrong about some details, and no substitute for actually walking the streets. Don&rsquo;t mistake the map for the territory. Don&rsquo;t mistake the label for the person.</p></div>`,

<script>
(function(){

  // 1. Inject CSS
  var css = document.createElement('style');
  css.textContent = `
    .audio-bar{display:flex;align-items:center;gap:10px;padding:10px 0 4px;margin-top:6px;max-height:50px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}

    .ctrl-btn.audio-ctrl{display:none;position:relative}
    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}

  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');

  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');

          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
