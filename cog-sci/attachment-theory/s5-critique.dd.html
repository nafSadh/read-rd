*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

.ctrl-btn:last-child{border-right:none}.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'\263D'}[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'\2600'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}

.sidebar-item:hover{background:var(--bg3)}.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}

.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}

.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}

.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}.section-block:last-child{border-bottom:none}

[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}

.section-block .s-list li:last-child{border-bottom:none}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}

.right::-webkit-scrollbar{width:4px}.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

<script>
const sections = [
  { num: '01', short: 'Temperament', title: 'The <em>Temperament</em> Confound' },
  { num: '02', short: 'Stability', title: 'The <em>Stability</em> Problem' },
  { num: '03', short: 'WEIRD Bias', title: '<em>Cultural</em> WEIRD Bias' },
  { num: '04', short: 'Mother-Blame', title: 'The <em>Mother-Blame</em> Problem' },
  { num: '05', short: 'Pop Psych', title: 'The <em>Pop</em> Psychology Distortion' },
  { num: '06', short: 'Exhaustion', title: 'The <em>Era</em> of Exhaustion' },
  { num: '07', short: 'MBTI Parallel', title: 'The <em>MBTI</em> Parallel' },
  { num: '08', short: 'Honest Take', title: 'The <em>Honest</em> Assessment' }
];

const summaries = [
  `<p>Jerome Kagan, the 22nd most eminent psychologist of the 20th century (per APA), mounted the most fundamental challenge to attachment theory:<sup class="fn"><a>[1]</a><span class="tip"><a href="https://www.fatherly.com/health/attachment-theory-wrong-attachment-styles-dont-matter" target="_blank">C1 Fatherly: Kagan Interview &rarr;</a></span></sup> what Ainsworth measured in the Strange Situation was temperament, not attachment quality. Children with an irritable temperament cry more and resist soothing &mdash; and get classified as &ldquo;insecure.&rdquo;</p>
  <div class="s-stat">
    <div class="st"><div class="sv">#22</div><div class="sl">APA eminence rank</div></div>
    <div class="st"><div class="sv">~50%</div><div class="sl">temperament heritability</div></div>
    <div class="st"><div class="sv">WEAK</div><div class="sl">AT-temperament separation</div></div>
  </div>
  <p>Kagan predicted attachment theory would become a historical footnote. The prediction was wrong about timing but captures a real vulnerability: the SSP conflates relational quality with individual reactivity, and no study has cleanly separated these two signals.</p>`,

  `<p>A central claim of attachment theory is that early patterns persist into adulthood. The longitudinal data tells a more complicated story. Fraley&rsquo;s (2002) meta-analysis<sup class="fn"><a>[2]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1207/S15327957PSPR0602_03" target="_blank">A1 Fraley (2002): Stability Meta-Analysis &rarr;</a></span></sup> found moderate stability at best: <code>r&asymp;.30</code> over 10 years in childhood, rising to <code>r&asymp;.50</code> in adulthood.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">r=.30</div><div class="sl">childhood 10yr stability</div></div>
    <div class="st"><div class="sv">r=.50</div><div class="sl">adult 10yr stability</div></div>
    <div class="st"><div class="sv">25%</div><div class="sl">events cause lasting change</div></div>
  </div>
  <p>In Fraley et al.&rsquo;s 4,000-person longitudinal study (2021), half of major life events caused immediate changes in attachment style, but most people reverted. Only about 25% of events produced lasting change. There is a prototype, but it is far from destiny.</p>`,

  `<p>The normative distribution of attachment styles was established on American middle-class samples. Cross-cultural studies shattered the universality claim:<sup class="fn"><a>[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Attachment_theory" target="_blank">C7 Wikipedia: Attachment Theory &rarr;</a></span></sup> a Northern German study found 52% avoidant (vs. 20-25% in US samples), while Japanese samples found zero avoidant children.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">52%</div><div class="sl">avoidant (N. Germany)</div></div>
    <div class="st"><div class="sv">0%</div><div class="sl">avoidant (Japan)</div></div>
    <div class="st"><div class="sv">65%</div><div class="sl">secure (US baseline)</div></div>
  </div>
  <p>These are not measurement errors &mdash; they reflect genuine cultural differences in child-rearing. Keller (2021) argued that attachment theory encodes Western independence norms as the healthy baseline, pathologizing collectivist child-rearing practices as &ldquo;insecure.&rdquo;</p>`,

  `<p>From its inception, attachment theory was criticized for placing overwhelming explanatory weight on the mother&rsquo;s sensitivity. Bowlby&rsquo;s 1951 WHO report on maternal deprivation was used politically to argue against daycare and working mothers. Judith Rich Harris argued the theory underestimates children and overestimates parental influence relative to peers, genes, and culture.<sup class="fn"><a>[4]</a><span class="tip"><a href="https://www.theswaddle.com/psyched-up-we-re-probably-getting-attachment-styles-all-wrong" target="_blank">C6 The Swaddle &rarr;</a></span></sup></p>
  <div class="feat-grid">
    <div class="feat"><h4>Bowlby&rsquo;s Claim</h4><p>Maternal sensitivity is the primary determinant of attachment security.</p></div>
    <div class="feat"><h4>Harris Counter</h4><p>Peers, genes, social class, and culture are equal or greater predictors of child outcomes.</p></div>
    <div class="feat"><h4>Vicedo&rsquo;s Analysis</h4><p>The SSP primarily evaluates caregiving quality, not infant behavior &mdash; value judgments encoded in the instrument.</p></div>
    <div class="feat"><h4>Modern Nuance</h4><p>Multiple attachment figures recognized, but mother-centrism persists in practice and popular understanding.</p></div>
  </div>`,

  `<p>The book <em>Attached</em> (Levine &amp; Heller, 2010) and its social media aftermath represent attachment theory at its worst:<sup class="fn"><a>[5]</a><span class="tip"><a href="https://www.refinery29.com/en-us/2023/10/11559769/attachment-theory-problems" target="_blank">C3 Refinery29: Problems with AT &rarr;</a></span></sup> fixed types assigned to people, avoidance pathologized, &ldquo;secure&rdquo; glamorized as the only healthy option, and armchair diagnosis of romantic partners encouraged.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="400" height="200" fill="rgba(0,0,0,0.025)" rx="6"/>
    <text x="200" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">THE SCIENCE-TO-FOLK PIPELINE</text>
    <line x1="30" y1="28" x2="370" y2="28" stroke="currentColor" class="border" stroke-width="0.5"/>
    <rect x="20" y="40" width="70" height="36" class="node-hi" rx="3"/>
    <text x="55" y="57" text-anchor="middle" class="node-text" font-size="8">Ainsworth</text>
    <text x="55" y="68" text-anchor="middle" class="node-sub" font-size="7">SSP data</text>
    <path class="edge-hi" d="M90,58 L110,58"/>
    <rect x="110" y="40" width="70" height="36" class="node" rx="3"/>
    <text x="145" y="57" text-anchor="middle" class="node-text" font-size="8">Main</text>
    <text x="145" y="68" text-anchor="middle" class="node-sub" font-size="7">4 types</text>
    <path class="edge-hi" d="M180,58 L200,58"/>
    <rect x="200" y="40" width="70" height="36" class="node" rx="3"/>
    <text x="235" y="57" text-anchor="middle" class="node-text" font-size="8">Hazan</text>
    <text x="235" y="68" text-anchor="middle" class="node-sub" font-size="7">adult ext.</text>
    <path class="edge-hi" d="M270,58 L290,58"/>
    <rect x="290" y="40" width="90" height="36" class="node" rx="3"/>
    <text x="335" y="57" text-anchor="middle" class="node-text" font-size="8">Attached</text>
    <text x="335" y="68" text-anchor="middle" class="node-sub" font-size="7">pop psych</text>
    <text x="200" y="100" text-anchor="middle" class="lbl" font-size="8">At each step: nuance lost, certainty gained</text>
    <rect x="40" y="115" width="320" height="70" fill="rgba(232,112,144,0.06)" rx="4"/>
    <text x="200" y="135" text-anchor="middle" font-size="8" class="lbl">TikTok / Reddit / Instagram</text>
    <text x="200" y="150" text-anchor="middle" font-size="7" class="lbl">Dimensional becomes categorical. Contextual becomes global.</text>
    <text x="200" y="165" text-anchor="middle" font-size="7" class="lbl">Descriptive becomes prescriptive. Labels become identities.</text>
    <text x="200" y="178" text-anchor="middle" font-size="7" class="lbl-hi">Exes diagnosed as avoidant with zodiac-level certainty.</text>
  </svg></div>`,

  `<p>In a 2022 special issue of <em>Attachment &amp; Human Development</em>, Roisman and Groh described the field as in an &ldquo;era of exhaustion.&rdquo;<sup class="fn"><a>[6]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/14616734.2022.2030132" target="_blank">C5 Thompson et al. (2022) &rarr;</a></span></sup> Thompson et al.&rsquo;s nine fundamental questions exposed deep unresolved problems after 50+ years of research.</p>
  <div class="chips">
    <span class="chip">confirmation bias</span>
    <span class="chip">fuzzy constructs</span>
    <span class="chip">methodological rigidity</span>
    <span class="chip">weak transmission gap</span>
    <span class="chip">IWM undefined</span>
  </div>
  <p>Mesman (2021) documented proneness to confirmation bias among attachment researchers. Keller (2021) argued the field&rsquo;s core concepts are too fuzzy for rigorous testing. The transmission gap &mdash; how exactly infant attachment becomes adult attachment &mdash; remains the field&rsquo;s central unsolved problem.</p>`,

  `<p>Attachment theory occupies a specific position on the spectrum of scientific rigor: better than MBTI, worse than the Big Five. The comparison is instructive because MBTI follows the same science-to-folk pipeline and the same categorical fallacy.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="400" height="160" fill="rgba(0,0,0,0.025)" rx="6"/>
    <text x="200" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5">SPECTRUM OF SCIENTIFIC RIGOR</text>
    <line x1="30" y1="28" x2="370" y2="28" stroke="currentColor" class="border" stroke-width="0.5"/>
    <line x1="40" y1="60" x2="360" y2="60" stroke="currentColor" class="border" stroke-width="1"/>
    <text x="40" y="50" font-size="7" class="lbl">MORE EVIDENCE</text>
    <text x="360" y="50" text-anchor="end" font-size="7" class="lbl">LESS EVIDENCE</text>
    <rect x="30" y="70" width="80" height="30" fill="rgba(20,150,110,0.06)" stroke="#14966e" stroke-width="0.8" rx="3"/>
    <text x="70" y="88" text-anchor="middle" font-size="7" fill="#14966e">Big Five</text>
    <rect x="120" y="70" width="80" height="30" fill="rgba(91,91,214,0.06)" stroke="#5b5bd6" stroke-width="0.8" rx="3"/>
    <text x="160" y="88" text-anchor="middle" font-size="7" fill="#5b5bd6">Attachment</text>
    <rect x="210" y="70" width="80" height="30" fill="rgba(232,200,112,0.08)" stroke="#8a6e1e" stroke-width="0.8" rx="3"/>
    <text x="250" y="88" text-anchor="middle" font-size="7" fill="#8a6e1e">MBTI</text>
    <rect x="300" y="70" width="70" height="30" fill="rgba(232,112,144,0.08)" stroke="#e87090" stroke-width="0.8" rx="3"/>
    <text x="335" y="88" text-anchor="middle" font-size="7" fill="#e87090">Zodiac</text>
    <rect x="40" y="115" width="320" height="35" fill="rgba(0,0,0,0.03)" rx="3"/>
    <text x="200" y="133" text-anchor="middle" font-size="7" class="lbl">Both MBTI and attachment impose clean categories on continuous dimensions.</text>
    <text x="200" y="143" text-anchor="middle" font-size="7" class="lbl-hi">Useful for conversation. Misleading as science.</text>
  </svg></div>`,

  `<p>Attachment theory is not pseudoscience &mdash; there is real research, real longitudinal data, and the pursue-withdraw dynamic in couples is empirically robust. But it is oversold, overcategorized, and culturally biased in ways that pop psychology ignores entirely.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>What Holds Up</h4>
      <ul>
        <li>Pursue-withdraw cycle in couples</li>
        <li>Dimensional anxiety/avoidance model</li>
        <li>Therapy relationships as corrective experiences</li>
        <li>Early experience influences (not determines) adult patterns</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>What Does Not</h4>
      <ul>
        <li>Four discrete types as real categories</li>
        <li>Infant-to-adult determinism</li>
        <li>Cultural universality of secure baseline</li>
        <li>SSP as pure measure of relationship quality</li>
        <li>Pop-psychology diagnostic use</li>
      </ul>
    </div>
  </div>
  <div class="callout"><h4>The Core Framing</h4><p>Attachment patterns are one lens among many &mdash; temperament, social class, culture, genes, current context &mdash; for understanding relational behavior. They describe tendencies, not essences. They are useful rather than true.</p></div>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01</div><h2>The <em>Temperament</em> Confound</h2></div>
  <p>Jerome Kagan&rsquo;s critique strikes at the foundation of attachment theory&rsquo;s methodology. His argument is simple but devastating:<sup class="fn"><a>[1]</a><span class="tip"><a href="https://www.fatherly.com/health/attachment-theory-wrong-attachment-styles-dont-matter" target="_blank">C1 Fatherly: Kagan Interview &rarr;</a></span></sup> the Strange Situation Procedure does not measure what it claims to measure. When a twelve-month-old is placed in an unfamiliar room, separated from their mother, and then reunited, their reaction depends not just on the quality of their attachment relationship but on their inborn temperamental reactivity. A child with high negative emotionality will cry intensely and resist soothing regardless of how sensitive their caregiver is. That child gets classified as insecure. A temperamentally placid child barely registers distress. That child gets classified as secure. The SSP, Kagan argued, is measuring the child&rsquo;s nervous system, not the mother&rsquo;s parenting.</p>
  <h3>The Empirical Challenge</h3>
  <p>Kagan&rsquo;s critique was not merely theoretical. He drew on decades of his own longitudinal research at Harvard on behavioral inhibition &mdash; the tendency of some infants to react with distress to novel stimuli. He showed that this trait is approximately 50% heritable, stable across development, and maps onto exactly the behavioral patterns Ainsworth used to classify attachment. Highly reactive infants become anxiously attached children become socially anxious adults &mdash; not because of their mothers, but because of their genes. The transmission is temperamental, not relational. Attachment researchers responded that physiological measures (heart rate, cortisol) show that avoidant infants are stressed despite their calm exterior, suggesting the SSP does capture something beyond temperament. But this rebuttal actually strengthens Kagan&rsquo;s point in one regard: if the outward behavior and the internal state diverge, then classifying children by outward behavior in the SSP is even more problematic than Kagan initially argued.</p>
  <h3>Why Attachment Researchers Resist</h3>
  <p>The attachment research community has largely acknowledged the temperament confound without fully resolving it. The standard response is that temperament and attachment are partially independent constructs &mdash; that maternal sensitivity explains variance in attachment above and beyond temperament. This is probably true, but the effect sizes are small. Van IJzendoorn&rsquo;s (1995) meta-analysis found that maternal sensitivity accounts for only about 24% of the variance in attachment classification. That leaves 76% unexplained &mdash; and temperament, along with other factors, is likely responsible for a substantial portion. The field&rsquo;s reluctance to fully engage with Kagan&rsquo;s critique may reflect a kind of institutional self-preservation: if temperament explains most of what the SSP measures, the entire measurement infrastructure of attachment research is compromised.</p>
  <h3>Cross-Reference: Measurement Problems</h3>
  <p>This critique connects directly to the <a href="s2-taxonomy.dd.html">taxonomy and measurement debate (S2)</a>. The taxometric evidence showing that attachment is dimensional rather than categorical partly addresses the temperament concern &mdash; dimensions allow for the possibility that temperament and attachment quality both contribute to where someone falls on the anxiety and avoidance spectrums. But it also means that the clean four-category system, which is what actually propagated into pop psychology, was never a good representation of the underlying data. The categorical model&rsquo;s persistence is a social phenomenon, not a scientific one.</p>
  <div class="callout"><h4>The Unresolved Core</h4><p>After fifty years, no study has cleanly separated temperament from attachment in the SSP. The two constructs are partially confounded in the primary measurement instrument, and this confound propagates through every finding built on SSP classifications. Kagan&rsquo;s prediction that attachment theory would become a historical footnote was wrong about timing but identified a genuine structural weakness that the field has managed rather than resolved.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02</div><h2>The <em>Stability</em> Problem</h2></div>
  <p>The stability question is where attachment theory&rsquo;s strongest empirical claims meet their most inconvenient data. The pop psychology version tells a simple story: one&rsquo;s attachment style was set in infancy and determines adult relationships. The actual longitudinal evidence supports a much weaker claim: there is a modest tendency toward stability, heavily moderated by life events, with substantial change being the norm rather than the exception.</p>
  <h3>Fraley&rsquo;s Meta-Analytic Findings</h3>
  <p>R. Chris Fraley&rsquo;s (2002) meta-analysis remains the definitive quantitative summary. Across multiple longitudinal studies, the correlation between attachment measured in infancy and attachment measured in late adolescence or early adulthood was approximately r=.30. To put this in perspective: knowing a child&rsquo;s attachment classification at age one explains about 9% of the variance in adult attachment. That is a real signal, but it is a far cry from the deterministic narrative that most people encounter when they first learn about attachment theory. The prediction is roughly comparable to the correlation between childhood IQ and adult IQ measured with different instruments &mdash; real but modest, and easily overwhelmed by intervening factors.</p>
  <h3>The Stable Instability Paradox</h3>
  <p>Fraley et al.&rsquo;s (2021) landmark study of over 4,000 adults followed over multiple years introduced the concept of stable instability. Their key finding: when people experience significant life events (relationship formation, breakup, job loss, parenthood), about 50% show immediate changes in self-reported attachment style. But most of these changes are transient. People tend to drift back toward their baseline. Only about 25% of life events produce changes that persist beyond two years. The pattern is one of a flexible system with a set point &mdash; a person can be pushed away from baseline, but there is a gravitational pull back. This supports what Fraley calls the prototype model: there is an underlying stable factor, but it operates more like a weak attractor than a fixed trait.</p>
  <h3>Context-Dependence vs. Trait Models</h3>
  <p>Research consistently demonstrates that people can have different attachment orientations in different relationships. An individual might be secure with a close friend, avoidant with a romantic partner, and anxious with a parent. This finding is deeply problematic for the single-trait model that dominates pop psychology. If attachment is relationship-specific rather than global, then the question shifts from the classic formulation &mdash; what is your attachment style? &mdash; to a much more contextual one: what attachment patterns do you tend to activate in what kinds of relationships, and how do those patterns shift under stress? The dimensional model (<a href="s2-taxonomy.dd.html">S2</a>) handles this better than the categorical model, but even dimensional scores vary across relationship targets.</p>
  <h3>Implications for the Pop Psychology Narrative</h3>
  <p>The stability data fundamentally undermines the most common way attachment theory is used in popular culture: as a diagnostic framework for labeling yourself and others. If attachment patterns are only moderately stable, heavily context-dependent, and responsive to life events and deliberate effort, then the phrase &ldquo;I am anxiously attached&rdquo; is at best a snapshot and at worst a self-fulfilling prophecy. The data supports a much less dramatic but more useful framing: people have attachment tendencies that were influenced (not determined) by early experience, that vary across relationships, and that can change through new relational experiences and therapeutic work. This connects to the <a href="s6-healing.dd.html">earned security concept (S6)</a>.</p>
  <div class="callout"><h4>The Key Number</h4><p>r=.30 over ten years in childhood. That is the real stability of attachment, empirically measured. Everything built on top of that number &mdash; the type labels, the partner diagnoses, the infant-determines-adult narrative &mdash; is constructed on a foundation that explains about 9% of the variance. The remaining 91% is everything else: temperament, life events, other relationships, culture, genes, effort, and luck.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03</div><h2><em>Cultural</em> WEIRD Bias</h2></div>
  <p>The cross-cultural data is where attachment theory&rsquo;s claim to universality breaks down most visibly. The foundational studies were conducted on white, middle-class American families, and the normative distribution of attachment styles reflects the child-rearing practices of that specific population. When the SSP was administered in other cultures, the results were dramatic enough to challenge the entire framework.</p>
  <h3>The German and Japanese Evidence</h3>
  <p>Grossmann et al.&rsquo;s Northern German study<sup class="fn"><a>[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Attachment_theory" target="_blank">C7 Wikipedia: Attachment Theory &rarr;</a></span></sup> found that 52% of infants were classified as avoidant &mdash; more than double the American rate. In the German cultural context, early independence is valued. Mothers who respond too quickly to infant distress are considered overprotective. The German children were not inadequately parented; they were parented according to cultural norms that emphasize self-reliance. By Ainsworth&rsquo;s criteria, the majority of well-adjusted German infants were insecure. Miyake&rsquo;s Japanese study produced the opposite anomaly: zero avoidant children and a high proportion classified as anxious-resistant. In the Japanese context, mothers and infants are rarely separated, so the SSP represents a much more extreme stressor than it does for American infants who experience routine separations. The apparent anxiety was a rational response to an abnormal situation, not evidence of insecure attachment.</p>
  <h3>Keller&rsquo;s Systematic Critique</h3>
  <p>Heidi Keller&rsquo;s (2021) critique goes beyond individual study anomalies to challenge the theoretical framework itself. She argues that attachment theory encodes a specific Western ideal &mdash; the autonomous, emotionally expressive individual who forms exclusive dyadic bonds &mdash; as the definition of psychological health. In collectivist cultures where multiple caregivers are the norm, where emotional restraint is valued, and where the group takes precedence over the dyad, the entire attachment framework is culturally inappropriate. What the theory labels secure is really culturally American. What it labels insecure is often culturally different. Keller&rsquo;s argument is not that attachment processes do not exist cross-culturally, but that the specific taxonomy and its implicit value hierarchy are culture-bound.</p>
  <h3>The Methodological Problem</h3>
  <p>The SSP was designed for a specific cultural context: American families where mother-infant separation is routine and moderate. In cultures where separation is rare (Japan) or where it occurs much earlier and more completely (some Northern European contexts), the SSP&rsquo;s stressor is miscalibrated. It is either too mild to elicit meaningful variation or too extreme to represent normal experience. This is not a minor methodological quibble &mdash; it means that the primary measurement instrument of attachment theory is not cross-culturally valid. The distributions it produces in non-American samples are artifacts of the procedure&rsquo;s cultural specificity, not reflections of genuine attachment differences. Vicedo&rsquo;s analysis of Ainsworth&rsquo;s original observational records adds another layer: even within the original American studies, the SSP was primarily evaluating caregiving quality through a culturally specific lens, not measuring an objective property of the infant.</p>
  <h3>Why This Matters Beyond Academia</h3>
  <p>The WEIRD bias in attachment theory has real-world consequences. Attachment-based parenting advice, widely disseminated through books and social media, implicitly promotes a specific cultural model of child-rearing as universal best practice. Parents in non-Western cultures who follow local traditions may encounter attachment-informed professionals who pathologize their practices. Within diverse Western societies, immigrant families may receive parenting assessments that evaluate them against a culturally specific standard of secure attachment that does not reflect their values or goals. This connects to the <a href="s1-origins.dd.html">historical origins (S1)</a>: Bowlby&rsquo;s original work was shaped by post-war British and American cultural anxieties, and those cultural assumptions were baked into the theory from the start.</p>
  <div class="security-box"><h4>The Distribution Problem</h4><p>If 52% of well-adjusted German infants are avoidant and zero Japanese infants are avoidant, then the category avoidant is measuring something different from what attachment theory claims. Either the categories are culture-specific behavioral descriptions rather than universal psychological types, or the SSP is not measuring attachment in any meaningful universal sense. The cross-cultural data does not refine attachment theory. It destabilizes its foundations.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04</div><h2>The <em>Mother-Blame</em> Problem</h2></div>
  <p>Attachment theory was born with a political problem it has never fully resolved. John Bowlby&rsquo;s original formulation placed the mother at the center of the child&rsquo;s emotional development and treated her sensitivity (or lack of it) as the primary determinant of attachment security. This was not incidental to the theory &mdash; it was its defining claim. And it arrived at a historical moment when women&rsquo;s entry into the workforce was a live political controversy, making the theory immediately useful to those who wanted to argue that mothers should stay home.</p>
  <h3>The WHO Report and Its Political Afterlife</h3>
  <p>Bowlby&rsquo;s 1951 WHO report on maternal deprivation was a landmark document that drew attention to the genuine suffering of institutionalized children. But its conclusions extended far beyond institutional settings. Bowlby wrote that continuous care from a mother was essential for mental health, and that even brief separations could have lasting damage. This was seized upon as scientific evidence against daycare, maternal employment, and any arrangement that separated infants from their biological mothers. The report&rsquo;s political utility was enormous precisely because it dressed cultural preferences in scientific language. Later researchers, including Michael Rutter, showed that Bowlby had confused the effects of institutional deprivation (lack of any consistent caregiver) with the effects of normal maternal employment (presence of multiple caregivers). The damage was not from separation per se but from the absence of any reliable attachment figure &mdash; a much narrower claim.</p>
  <h3>Harris and the Nurture Assumption</h3>
  <p>Judith Rich Harris&rsquo;s <em>The Nurture Assumption</em> (1998, revised 2009) mounted the most comprehensive challenge to the mother-centrism of developmental psychology generally and attachment theory specifically. Harris argued, drawing on behavioral genetics and socialization research, that parenting style accounts for remarkably little variance in children&rsquo;s personality and life outcomes once you control for shared genes. Peers, not parents, are the primary environmental influence. Harris did not deny that severe neglect or abuse has consequences, but she argued that within the normal range of parenting, the specific style of attachment matters far less than attachment theory claims. The attachment research community largely dismissed Harris, but her core point &mdash; that the effect of parenting within the normal range is small &mdash; has been repeatedly supported by behavioral genetics research.</p>
  <h3>Vicedo&rsquo;s Archival Analysis</h3>
  <p>Marga Vicedo&rsquo;s historical scholarship adds a critical layer. Having examined Ainsworth&rsquo;s original observational records, Vicedo argues that the SSP was designed not as a neutral measurement of infant behavior but as an instrument for evaluating maternal caregiving. The coding categories embed assumptions about what good mothering looks like &mdash; responsive, emotionally available, attuned to the infant&rsquo;s signals &mdash; and classify departures from this ideal as producing insecurity. The instrument is not value-neutral. It is a culturally specific judgment about maternal behavior disguised as a measurement of infant attachment. This connects to the <a href="s3-adult.dd.html">adult attachment extension (S3)</a>: if the foundational measurement encodes cultural values, then everything built on top of it inherits those values.</p>
  <h3>The Modern Partial Retreat</h3>
  <p>Contemporary attachment researchers have partially retreated from Bowlby&rsquo;s mother-centrism. Multiple attachment figures are now recognized. The emphasis has shifted from exclusive maternal care to the quality of any primary caregiving relationship. But the retreat is incomplete. The SSP is still administered primarily with mothers. Most attachment research still focuses on the mother-child dyad. And the popular understanding of attachment theory remains firmly mother-centric. The theory&rsquo;s political DNA &mdash; its origins in an era that wanted scientific justification for keeping women at home &mdash; continues to shape how it is understood and applied.</p>
  <div class="callout"><h4>The Inheritance of Blame</h4><p>The mother-blame problem is not merely a historical curiosity. It shapes how attachment theory is applied in clinical settings, family courts, and parenting advice. When a child shows insecure attachment, the implicit question is: what did the mother do wrong? This framework of maternal responsibility persists even as the evidence points to a much more complex picture involving genetics, temperament, multiple relationships, culture, and socioeconomic context.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05</div><h2>The <em>Pop</em> Psychology Distortion</h2></div>
  <p>The trajectory from Ainsworth&rsquo;s careful behavioral observations to TikTok attachment quizzes is one of the most instructive case studies in how science becomes folk theory. At each stage of the pipeline, complexity is stripped away and certainty is added, until the end product bears almost no resemblance to the original research. Understanding this pipeline is important not just for attachment theory but for any scientific finding that enters popular culture.</p>
  <h3>The Pipeline in Detail</h3>
  <p>Stage one: Ainsworth observes that infants show different behavioral patterns during separation and reunion. This is a careful empirical observation about behavior in a specific context. Stage two: the behaviors are classified into discrete types. This is a taxonomic decision, not a discovery &mdash; the data could have been described dimensionally from the start. Stage three: Main adds a fourth category and develops the Adult Attachment Interview, extending the framework to internal representations. Stage four: Hazan and Shaver extend to adult romantic relationships using self-report questionnaires that bear little methodological resemblance to the SSP or AAI. Stage five: Levine and Heller publish <em>Attached</em>, which translates the dimensional, context-dependent, moderately stable research findings into a system of fixed personality types that can be identified through simple quizzes and used to evaluate romantic partners.</p>
  <h3>What Gets Lost</h3>
  <p>The pop psychology version loses nearly everything that makes the science interesting. The dimensional nature of attachment (a point on two continuous spectrums) becomes categorical (one of four types). The context-dependence (a person can be secure in one relationship and anxious in another) becomes global (one attachment style). The moderate stability (r=.30 in childhood) becomes deterministic (childhood set the style). The multiple influences (temperament, culture, genes, peers, socioeconomic status) become single-factor (the mother). And the descriptive framework (these patterns exist) becomes prescriptive (secure is healthy, avoidant is broken, find a secure partner). Each of these transformations makes the theory more immediately useful and dramatically less accurate.</p>
  <h3>The Social Media Amplification</h3>
  <p>Social media has accelerated the distortion by orders of magnitude. Attachment style quizzes circulate on Instagram and TikTok. Reddit communities diagnose partners based on brief behavioral descriptions. The language of attachment has become a tool for labeling and pathologizing others rather than for understanding relational patterns. The phrase they are avoidant functions in contemporary dating culture much as astrological signs do &mdash; as an explanatory shortcut that feels like insight but actually prevents deeper understanding. This is arguably worse than astrology because it carries the authority of science. When someone diagnoses an ex as avoidant, they are implicitly claiming the backing of Bowlby, Ainsworth, and decades of longitudinal research. But the version in circulation has been distorted beyond recognition.</p>
  <h3>The Commodification Problem</h3>
  <p>Attachment theory has become a significant commercial enterprise. Books, courses, quizzes, coaching programs, and therapy brands are built on the attachment framework. This creates an economic incentive to maintain the categorical, type-based version of the theory even as the science moves toward dimensional models. The market rewards simplicity and certainty &mdash; exactly the qualities that make the pop version inaccurate. Sequeira and other critics have noted that attachment-style content on social media is primarily produced by coaches and influencers, not by researchers, and that the commercial incentive is to make the categories feel as real and as applicable as possible. This connects to the broader pattern described in the <a href="s3-adult.dd.html">adult attachment section (S3)</a>: self-report measures that form the basis of most online quizzes correlate only weakly with interview-based measures, meaning the attachment style discovered through a quiz may not correspond to what a trained clinician would assess.</p>
  <div class="security-box"><h4>The Harm Question</h4><p>Is the pop psychology version of attachment theory actually harmful? Arguably yes, in several ways. It encourages people to identify with a label rather than examine contextual patterns. It pathologizes avoidance, which may be a healthy adaptation in some contexts. It promotes the idea that one can diagnose another person&rsquo;s attachment style from their behavior, which is both clinically inaccurate and relationally destructive. And it creates a framework of blame &mdash; the partner is avoidant, the mother caused the anxiety &mdash; that substitutes labeling for genuine understanding.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06</div><h2>The <em>Era</em> of Exhaustion</h2></div>
  <p>The most damning critique of attachment theory comes not from outsiders like Kagan but from within the field itself. In a 2022 special issue of <em>Attachment &amp; Human Development</em>, some of the most prominent researchers in the field acknowledged that the enterprise was in crisis. Roisman and Groh&rsquo;s characterization of the field as being in an era of exhaustion was striking precisely because it came from researchers deeply invested in the framework.</p>
  <h3>Thompson&rsquo;s Nine Questions</h3>
  <p>Thompson et al.&rsquo;s (2022) paper<sup class="fn"><a>[6]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/14616734.2022.2030132" target="_blank">C5 Thompson et al. (2022) &rarr;</a></span></sup> posed nine fundamental questions that remain unresolved after more than fifty years of research. Among the most consequential: What exactly are internal working models, and how do they develop? The concept of the internal working model (IWM) is central to attachment theory&rsquo;s claim that early relational experience is internalized as a mental template. But the IWM has never been operationally defined with sufficient precision to be falsifiable. It functions more as a metaphor than a scientific construct. Different researchers mean different things by it &mdash; cognitive schemas, procedural memory, neural patterns, narrative structures &mdash; and this conceptual fuzziness makes it impossible to test the core transmission mechanism of the theory.</p>
  <h3>The Confirmation Bias Problem</h3>
  <p>Mesman&rsquo;s (2021) contribution to the special issue<sup class="fn"><a>[6]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/14616734.2022.2030132" target="_blank">C5 Thompson et al. (2022) &rarr;</a></span></sup> documented systematic confirmation bias in attachment research. Researchers tend to interpret ambiguous findings as supporting attachment theory, design studies that are more likely to confirm than disconfirm, and underweight contradictory evidence. This is not unique to attachment research &mdash; it is a pervasive problem in psychology &mdash; but it is particularly concerning in a field that has been remarkably resistant to updating its core claims in response to challenging data. The temperament confound, the cross-cultural anomalies, and the weak stability coefficients have all been acknowledged but not integrated into a revised theoretical framework. Instead, they tend to be treated as boundary conditions or methodological limitations rather than as evidence that the theory needs substantial revision.</p>
  <h3>The Transmission Gap</h3>
  <p>Perhaps the most fundamental unresolved problem is what attachment researchers themselves call the transmission gap. The theory predicts that parental sensitivity should predict infant attachment security. Meta-analyses confirm this relationship, but the effect size is modest (r=.24 in Van IJzendoorn&rsquo;s 1995 meta-analysis). That means maternal sensitivity explains about 6% of the variance in infant attachment. The remaining 94% is unexplained &mdash; the transmission gap. If the primary mechanism proposed by the theory accounts for only 6% of the outcome it is supposed to explain, then either the theory is missing crucial mechanisms or the measurement is inadequate. After 50 years, neither possibility has been resolved.</p>
  <h3>Methodological Rigidity</h3>
  <p>The field has also been criticized for methodological conservatism. The SSP, developed in the 1960s, remains the gold standard for infant attachment measurement despite its known cultural limitations. The AAI, while more sophisticated, is extremely labor-intensive and requires extensive training, limiting the scope of studies that can use it. Self-report measures like the ECR are easier to administer but measure something different from the AAI, and the correlation between the two is weak (r=.09 to .14 per Roisman et al., 2007). The field has, in effect, two measurement traditions that do not converge, and this measurement problem undermines confidence in almost every empirical claim built on either tradition.</p>
  <div class="callout"><h4>A Field in Crisis?</h4><p>The era of exhaustion framing suggests something stronger than the normal ebb and flow of scientific interest. It implies that the field has reached the limits of what its current conceptual and methodological tools can deliver, and that further progress requires either fundamental theoretical revision or new measurement approaches. Whether attachment research undergoes this renewal or gradually fades in influence remains an open question.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07</div><h2>The <em>MBTI</em> Parallel</h2></div>
  <p>The comparison between attachment theory and the Myers-Briggs Type Indicator is more than a rhetorical device &mdash; it illuminates a shared structural pattern that explains why both frameworks persist despite scientific weaknesses. Understanding the parallel helps clarify what attachment theory is (a useful but imprecise descriptive framework) and what it is not (a validated personality science on par with the Big Five).</p>
  <h3>Shared Structural Features</h3>
  <p>Both MBTI and attachment theory take continuous dimensions and impose categorical boundaries. MBTI takes the introversion-extraversion spectrum and creates two discrete types. Attachment theory takes the anxiety and avoidance spectrums and creates four discrete styles. In both cases, the categories are more memorable and communicable than the underlying dimensions, which is exactly why they propagate. But in both cases, the categories are scientific fictions &mdash; convenient partitions of continuous space, not natural kinds. People near the category boundaries (which is most people) are forced into one box or another by arbitrary cutoffs, and then treated as if the box represents a stable, meaningful type.</p>
  <h3>The Validation Gap</h3>
  <p>The crucial difference between attachment theory and MBTI is the degree of empirical support. MBTI has essentially zero predictive validity beyond the introversion-extraversion dimension (which it borrowed from the Big Five). Attachment theory has real longitudinal data, meta-analyses, and the pursue-withdraw dynamic in couples, which is well-established. The Big Five, by contrast, has extensive predictive validity across life outcomes, cross-cultural replication, and biological correlates. Attachment theory sits between these two: more grounded than MBTI, less rigorous than the Big Five. On the spectrum from validated science to folk psychology, it is closer to the middle than either end &mdash; which is precisely what makes it so confusing and so easily misused.</p>
  <h3>Why Categories Persist</h3>
  <p>The persistence of categorical thinking in both frameworks has more to do with human cognition than with science. Categories are cognitively efficient. They provide clear labels for fuzzy experiences. They make abstract psychological dimensions feel concrete and personal. And they serve social functions: they give people a vocabulary for discussing differences and a framework for understanding conflict. The statement I am anxiously attached does real work in conversations &mdash; it conveys something meaningful about relational tendencies, invites empathy, and provides a shared frame of reference. The problem is not that the category is useless but that it is reified &mdash; treated as a fixed property of the person rather than a crude summary of a context-dependent pattern on a continuous spectrum.</p>
  <h3>The Self-Fulfilling Prophecy Risk</h3>
  <p>Both MBTI and attachment types carry a self-fulfilling prophecy risk that the Big Five, being less culturally salient, largely avoids. When a person identifies as an introvert (MBTI) or as anxiously attached (attachment theory), the label begins to shape behavior. Confirming evidence is noticed and disconfirming evidence discounted. The person may unconsciously behave in ways that confirm the label. Partners and friends may also begin to interpret your behavior through the lens of the label, creating a social feedback loop. This is the horoscope comparison that both critics and defenders of attachment theory have invoked &mdash; not because attachment theory is as unfounded as astrology, but because the mechanisms of identity-formation and confirmation bias operate similarly regardless of whether the underlying framework has empirical support.</p>
  <div class="callout"><h4>The Useful Middle Ground</h4><p>The honest positioning for attachment theory is between Big Five and MBTI: real but overextended, empirically grounded but categorically distorted, clinically useful but scientifically incomplete. Understanding this positioning protects against both dismissal (it is all just horoscopes) and overconfidence (it is settled science). The framework has genuine value when held loosely and genuine danger when held tightly.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08</div><h2>The <em>Honest</em> Assessment</h2></div>
  <p>After surveying the full range of critiques &mdash; from Kagan&rsquo;s temperament challenge to Keller&rsquo;s cultural critique to the field&rsquo;s own acknowledgment of exhaustion &mdash; what is the honest summary? Not the pop psychology version, not the dismissive version, but the one that actually reflects the evidence?</p>
  <h3>What the Evidence Supports</h3>
  <p>Several claims from attachment theory have survived scrutiny. First, the observation that infants show different behavioral patterns in response to separation and reunion is robust and replicable. Second, adults vary on dimensions of relational anxiety and avoidance, and these dimensions predict relationship behaviors in meaningful ways. Third, the pursue-withdraw dynamic in couples is one of the best-established findings in relationship research, and attachment theory provides a coherent explanation for it. Fourth, therapeutic relationships can function as corrective attachment experiences, and the therapeutic alliance is consistently the strongest predictor of therapy outcome across modalities. Fifth, the concept of earned security &mdash; that insecure patterns can be revised through new relational experiences (<a href="s6-healing.dd.html">S6</a>) &mdash; is supported by both AAI data and clinical evidence.</p>
  <h3>What the Evidence Does Not Support</h3>
  <p>Equally important: several core claims do not hold up. The four-style categorical model is a convenient fiction &mdash; the data is dimensional, not categorical (<a href="s2-taxonomy.dd.html">S2</a>). The infant-to-adult determinism narrative is dramatically overstated by the stability data. The cultural universality claim is contradicted by cross-cultural SSP studies. The mother-as-primary-determinant claim is both empirically weak and politically problematic. And the pop psychology application &mdash; diagnosing yourself and others into fixed types &mdash; has no scientific basis and may be actively harmful.</p>
  <h3>The Framework vs. The Theory</h3>
  <p>A useful distinction: attachment theory as a framework (a vocabulary for discussing relational patterns) is more valuable than attachment theory as a theory (a set of falsifiable claims about how early experience determines adult relating). The framework gives us words like secure base, protest behavior, earned security, and pursue-withdraw that genuinely illuminate relational dynamics. The theory&rsquo;s claims about transmission mechanisms, stability, universality, and categorical types are much weaker. Holding this distinction &mdash; using the language while questioning the science &mdash; is the honest way to engage with attachment theory.</p>
  <h3>Practical Implications</h3>
  <p>The practical implication of this critical survey is not that attachment theory should be discarded but that it should be held loosely. The vocabulary illuminates when used descriptively; the labels rigidify when used as identities. A person is not one style but a distribution across relationships and contexts. The r=.30 stability figure means early experience influences but does not determine adult patterns. The pop psychology version is a dramatic distortion of the science. And as the <a href="s1-origins.dd.html">historical context (S1)</a> shows, the theory emerged from specific cultural anxieties and carries their imprint. The most honest framing remains the one that gives this project its title: attachment theory is useful rather than true.</p>
  <div class="callout"><h4>The One-Sentence Summary</h4><p>Attachment theory identifies real patterns (relational anxiety, avoidance, the pursue-withdraw cycle) but packages them in a framework (four fixed types, infant determinism, cultural universality) that does not withstand scrutiny &mdash; and the pop psychology version strips away every caveat the science actually requires.</p></div>`

      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">A<em>t</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Attachment Theory &middot; Section 5</div>
        <div class="hero-title">The <em>Critique</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Where pop psychology diverges from the science</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;
  mainInner.appendChild(block);
});

const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) { closeRight(); } else { openDetail(lastDetailIdx); } }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
