<body>
<script>
(function(){const s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s);else document.documentElement.setAttribute('data-theme',window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')})();

const sections=[
  {num:'01',short:'SST',title:'<em>Socioemotional</em> Selectivity Theory'},
  {num:'02',short:'Shrinkage',title:'Network Size Across the <em>Lifespan</em>'},
  {num:'03',short:'Decay',title:'How Relationships <em>Decay</em>'},
  {num:'04',short:'Health',title:'Social Isolation &amp; <em>Health</em>'},
  {num:'05',short:'Decisions',title:'Social Options as <em>Decision</em> Constraint'},
  {num:'06',short:'Primates',title:'<em>Evolutionary</em> Roots of Selectivity'},
  {num:'07',short:'Tensions',title:'What Sources <em>Disagree</em> On'}
];

const summaries=[
  `<p><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8599276/" target="_blank">Socioemotional selectivity theory</a>, developed by Stanford psychologist Laura Carstensen, proposes that the perception of future time horizon fundamentally shapes social goals. When future time feels open-ended (as in youth), people prioritize knowledge-acquisition goals: expanding networks, gathering information, building new relationships. When time horizons shrink (with age, illness, or perceived endings), people shift to emotional-regulation goals: deepening existing relationships, maximizing emotional meaning, pruning peripheral ties.</p>
  <p>The theory&rsquo;s core prediction is that social network contraction in aging is not merely involuntary loss &mdash; it is adaptive reconfiguration. Older adults select for quality over quantity. But whether a given narrowing is adaptive (strategic pruning) or maladaptive (involuntary loss) is not always distinguishable from the outside &mdash; or from the inside.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Peak</div><div class="sl">Network size: young adult</div></div>
    <div class="st"><div class="sv">↓ Steady</div><div class="sl">Decline through midlife</div></div>
    <div class="st"><div class="sv">Smallest</div><div class="sl">Network: oldest adults</div></div>
    <div class="st"><div class="sv">Quality</div><div class="sl">Prioritized over quantity</div></div>
  </div>`,

  `<p>The empirical evidence for age-related network shrinkage is robust. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7122684/" target="_blank">Research on age differences in reported social networks</a> consistently finds that network size peaks in young adulthood and declines steadily across the lifespan, with older adults having the smallest networks. This is not primarily a function of bereavement &mdash; though loss of peers accelerates the process &mdash; but of active selection and maintenance effort reduction.</p>
  <p>Crucially, network size and subjective loneliness do not track together. Smaller networks do not always produce more loneliness, because the remaining relationships are typically higher-quality and more emotionally satisfying. The social decision space narrows, but the remaining options are curated for value.</p>`,

  `<p>Relationships decay through non-maintenance in exactly the structural way that skills decay through non-use. The mechanisms are parallel: initial investment (formation effort) creates a connection; continued investment (contact, disclosure, reciprocity) maintains it; cessation of investment produces decay toward eventual dissolution.</p>
  <p>Unlike skill decay, relationship decay is bidirectional — both parties must invest for the relationship to persist. A relationship can decay even when one party would prefer to maintain it, because the other party has reduced their investment. This makes social atrophy less controllable than skill atrophy: you can practice a skill unilaterally, but you cannot unilaterally maintain a relationship.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Active Maintenance</h4><p>Contact frequency, mutual disclosure, shared activity. All must continue for the relationship to survive.</p></div>
    <div class="feat"><h4>Context Anchors</h4><p>Many relationships are anchored in shared contexts (school, work, neighborhood). When the context ends, the relationship typically follows.</p></div>
    <div class="feat"><h4>Asymmetric Decay</h4><p>If one party reduces investment, the other may not immediately notice the decay. Relationships degrade quietly before they break.</p></div>
    <div class="feat"><h4>Network Holes</h4><p>Lost connections are rarely replaced. The holes in the network accumulate, and the surviving network becomes increasingly homogeneous.</p></div>
  </div>`,

  `<p>The health consequences of social network atrophy are among the most replicated findings in epidemiology. The <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7437541/" target="_blank">National Academies review</a> documents: social isolation is associated with a 50% increased risk of developing dementia, a 30% increased risk of coronary artery disease or stroke, and a 26% increased risk of all-cause mortality.</p>
  <p>These are not merely statistical associations. Loneliness activates stress response systems, elevates cortisol and inflammatory markers, disrupts sleep, and impairs immune function. The health effects of social atrophy are mediated through the same biological pathways as other forms of chronic stress.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">+50%</div><div class="sl">Dementia risk</div></div>
    <div class="st"><div class="sv">+30%</div><div class="sl">Coronary/stroke risk</div></div>
    <div class="st"><div class="sv">+26%</div><div class="sl">All-cause mortality</div></div>
    <div class="st"><div class="sv">↑</div><div class="sl">Inflammatory markers</div></div>
  </div>`,

  `<p>The decision-making implications of social network atrophy follow from a basic fact about how adult decisions are made: they are almost never made alone. People consult friends, partners, colleagues, and mentors when facing significant choices. The social network is the deliberative infrastructure for major life decisions.</p>
  <p>When the network atrophies, this infrastructure degrades. The available deliberative partners become fewer, less diverse, and more homogeneous. Decisions that would once have been made with input from 15 distinct relationships are now made with input from 4. The option space reflected back through the social network &mdash; what is normal, what is possible, what others have done &mdash; narrows with the network.</p>`,

  `<p>The <a href="https://theconversation.com/macaque-monkeys-shrink-their-social-networks-as-they-age-research-suggests-evolutionary-roots-of-a-pattern-seen-in-elderly-people-too-196862" target="_blank">finding that macaque monkeys show the same social network shrinkage with age</a> as humans provides important evolutionary context. SST is not just a theory about human culture or modern aging &mdash; it describes a social behavioral trajectory that appears across primate evolution.</p>
  <p>The adaptive interpretation: as reproductive and knowledge-acquisition imperatives decline with age, the cost-benefit calculus of maintaining peripheral social relationships shifts. Energy devoted to maintaining a large network returns less. Quality over quantity becomes the rational strategy. The atrophy of the social network is, in evolutionary terms, not pathology &mdash; it is optimization.</p>`,

  `<p>Three tensions in the social atrophy literature bear directly on the project&rsquo;s central argument.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Adaptive vs. Involuntary</h4><p>SST predicts adaptive selectivity. But bereavement, mobility decline, and cognitive changes also reduce networks involuntarily. The same outcome can arise from very different processes.</p></div>
    <div class="feat"><h4>Quality vs. Quantity</h4><p>Smaller networks are associated with better emotional outcomes in old age. But small networks also mean less exposure to diverse perspectives, information, and opportunities &mdash; potentially constraining decisions in ways the agent does not experience as constraining.</p></div>
    <div class="feat"><h4>Loneliness Paradox</h4><p>Network size and loneliness diverge: people with tiny networks can be satisfied; people with large networks can be lonely. This complicates the atrophy-as-decision-constraint argument if the agent is not aware of constraint.</p></div>
    <div class="feat"><h4>Structural vs. Individual</h4><p>Social atrophy in some populations (poor, geographically isolated, disabled) reflects structural conditions more than personal history. The individual atrophy lens may obscure systemic causes.</p></div>
  </div>`
];

const details=[
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Socioemotional</em> Selectivity Theory</h2></div>
  <p>Socioemotional selectivity theory is one of the most empirically tested life-span theories in social psychology. <a href="https://pubmed.ncbi.nlm.nih.gov/10199217/" target="_blank">Carstensen&rsquo;s original 1999 paper</a> in <em>American Psychologist</em> proposed that the perception of future time &mdash; not chronological age per se &mdash; drives shifts in social goal priorities. This distinction is crucial: it predicts that young people facing terminal illness should show the same goal shifts as older adults, and they do.</p>
  <p>The mechanism works through two classes of social motive. Knowledge-acquisition motives drive behavior when time horizons are open: expand your network, gather information, learn from new people, prepare for a future that stretches ahead. Emotional-regulation motives come to the fore as time horizons close: invest in relationships that provide emotional meaning, prune connections that are emotionally costly or merely instrumental, prioritize depth over breadth.</p>
  <h3>The Goal Shift and Decision Change</h3>
  <p>The goal shift from knowledge-acquisition to emotional regulation has direct consequences for decision-making. When knowledge-acquisition goals dominate, decisions are made in a frame of expansion: what can I learn from this, how does it position me for the future, what new options does it open? When emotional-regulation goals dominate, decisions are made in a frame of consolidation: does this feel meaningful, does it deepen existing connections, does it require investment that won&rsquo;t be returned in the time available?</p>
  <p>The result is that older adults&rsquo; decisions are systematically more conservative, more focused on existing commitments, and less oriented toward novel options &mdash; not because of cognitive decline (SST effects are distinct from cognitive aging effects), but because the goal structure that generates decisions has changed. The atrophy of future-time horizon reshapes the entire decision-making architecture.</p>
  <div class="callout"><h4>The Time Horizon Effect</h4><p>What changes in aging is not just who you know but what you want from knowing them. The shift from information-seeking to meaning-seeking fundamentally narrows the range of social options that feel relevant.</p></div>
  <h3>Extensions and Evidence</h3>
  <p>The <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8599276/" target="_blank">2021 Annual Review paper</a> by Carstensen reviews 30 years of SST research. The evidence base is extensive: cross-cultural studies (SST effects replicate in diverse national contexts), studies of young people with HIV or other life-limiting conditions (show old-age-like social selectivity), and longitudinal studies (track the shift in social goals over the lifespan). One robust finding: when older adults are asked to imagine their time horizon as open-ended, they revert to young-adult social preferences. Time perception, not age, is the causal variable.</p>

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>Network Size Across the <em>Lifespan</em></h2></div>
  <p>The empirical trajectory of social network size across the lifespan is well-established. Peak network size occurs in young adulthood — roughly the late 20s — when people are completing education, entering careers, forming romantic partnerships, and maximally motivated by knowledge-acquisition goals. From this peak, network size declines gradually through midlife and more steeply in late adulthood.</p>
  <p>The PMC review of <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7122684/" target="_blank">age differences in social networks and well-being</a> documents this trajectory consistently across datasets and countries. What is less consistent is the relationship between network size and subjective well-being. Small networks are not necessarily worse networks, and large networks are not necessarily better. The quality, emotional valence, and functional support provided by relationships are more predictive of well-being than network size per se.</p>
  <h3>The Homogenization Problem</h3>
  <p>As networks shrink, they also tend to become less diverse. The peripheral ties that are pruned first are typically the weak ties &mdash; distant acquaintances, professional contacts, relationships from former life stages. These weak ties are often the source of novel information, alternative perspectives, and non-redundant social resources. Their loss leaves the surviving network richer in emotional meaning but narrower in informational scope.</p>
  <p>The consequence for decision-making: the social infrastructure for making decisions shifts from one that provides access to diverse information and perspectives to one that provides emotional validation and reinforcement of existing choices. The shrinking network does not just reduce the number of advisors available &mdash; it systematically changes the kind of advice available.</p>
  <div class="callout"><h4>Weak Ties Are Decision Infrastructure</h4><p>The weak ties that are pruned first in social atrophy are precisely the connections most likely to introduce novel information, diverse viewpoints, and unexpected options. Their loss leaves the agent better supported emotionally but more constrained informationally.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>How Relationships <em>Decay</em></h2></div>
  <p>The structural mechanics of relationship decay parallel the mechanics of skill decay with two important differences: relationships are bidirectional (both parties must invest), and relationship decay is often contextually triggered rather than purely time-based.</p>
  <p>The most common mechanism of relationship decay is context dissolution. Many adult friendships are anchored in shared contexts &mdash; school, university, workplace, neighborhood, parenthood cohort. When the shared context ends (graduation, job change, move, children leaving home), the relationship loses its structural maintenance mechanism. Without active effort to maintain contact outside the original context, the relationship begins to decay. Studies of friendship post-relocation find that most friendships fail to survive major geographical moves, not because affection disappears but because maintenance effort cannot sustain what context previously provided for free.</p>
  <h3>The Decay Timeline</h3>
  <p>Research on friendship maintenance suggests that the critical period for relationship survival post-context-change is roughly the first six months. Relationships that survive this period with active maintenance effort tend to stabilize. Those that do not tend to decay to acquaintanceship within two years and functional dissolution within five. The implication: the window for preventing social atrophy is narrow, and most people miss it because the cost of maintaining relationships across contexts is not felt until after the connection has already substantially degraded.</p>
  <div class="callout"><h4>The Maintenance Illusion</h4><p>People believe they are maintaining relationships that are already substantially decayed. The subjective sense of connection persists long after the functional relationship has atrophied. The decision to rely on a connection that no longer exists at its former strength is a decision made from a false map.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2>Social Isolation &amp; <em>Health</em></h2></div>
  <p>The health consequence literature for social isolation is among the largest in epidemiology. The <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7437541/" target="_blank">National Academies review</a> synthesizes findings across hundreds of studies. The effect sizes are substantial: social isolation is associated with dementia risk increases comparable to smoking, physical inactivity, and heavy alcohol use. The mechanisms include HPA axis dysregulation (chronic cortisol elevation), inflammatory pathway activation (elevated IL-6, CRP), sleep disruption, and behavioral risk factors (reduced exercise, worse diet, higher substance use) that accumulate in isolated individuals.</p>
  <p>These health effects matter for the decision-making story because they represent biological atrophy caused by social atrophy. Social network contraction triggers a cascade that eventually reaches the biological substrate of decision-making: the brain. The chapter connections run from social isolation in S3 through motivational atrophy in <a href="s4-motivational-atrophy.dd.html">S4</a> to the biological substrate changes in <a href="s6-biological-substrate.dd.html">S6</a>. Social atrophy is not merely one form of atrophy &mdash; it is a precipitant of others.</p>
  <h3>The Surgeon General&rsquo;s Framing</h3>
  <p>The 2023 US Surgeon General&rsquo;s advisory on loneliness placed social connection as a public health priority comparable to the tobacco campaigns of the 1960s. The framing matters: loneliness and isolation are not personal failures or individual misfortunes. They are structural conditions shaped by urban design, workplace culture, institutional design, and economic precarity. Whether the individual or structural lens is more appropriate for the atrophy thesis is discussed in the tensions section.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2>Social Options as <em>Decision</em> Constraint</h2></div>
  <p>The most direct connection between social atrophy and decision-making is through what might be called the social option set: the range of decisions that are available because of who you know. Career decisions depend on who can vouch for you, introduce you to opportunities, or model a path you might take. Residential decisions depend on who you have relationships with in different locations. Relationship decisions depend on who remains accessible in your social circle. Health decisions depend on who you can consult, who will support recovery, who will provide information.</p>
  <p>As the network atrophies, the social option set contracts. This is not metaphorical &mdash; it is structural. A person with a network of 5 people in their city genuinely has fewer job options available than one with a network of 50, regardless of their individual qualifications. The atrophy of social capital directly reduces the quality and quantity of decisions available.</p>
  <h3>The Echo Chamber Effect</h3>
  <p>Beyond the quantitative reduction in options, social atrophy produces qualitative homogenization. The surviving network in late adulthood tends to be age-homogeneous, geographically concentrated, and value-convergent. This means the social infrastructure that informs decisions reflects a narrower range of experience, knowledge, and possibility than the original, diverse network would have. The agent is not merely choosing from fewer options &mdash; they are choosing from a mentally modeled option space that has been shaped by a homogeneous, atrophied social environment.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>Evolutionary</em> Roots of Selectivity</h2></div>
  <p>The macaque finding reported in <a href="https://theconversation.com/macaque-monkeys-shrink-their-social-networks-as-they-age-research-suggests-evolutionary-roots-of-a-pattern-seen-in-elderly-people-too-196862" target="_blank">The Conversation</a> is significant because it removes the cultural interpretation of SST as a uniquely human response to modern aging. Macaque monkeys, who share approximately 93% of human DNA, show the same pattern: as they age, they invest less in peripheral social bonds and more in high-value, established relationships. They become more selective, more protective of existing ties, and less exploratory in their social behavior.</p>
  <p>The evolutionary logic is clear. Older animals have established their reproductive contributions; the cost-benefit of maintaining large, diverse networks shifts as reproductive imperatives decline and physical energy becomes more constrained. Quality relationships with kin and long-established allies provide better return on social investment than the exploratory networking that made sense when future time was long.</p>
  <h3>What Evolutionary Framing Does and Does Not Imply</h3>
  <p>The evolutionary argument for adaptive social selectivity does not imply that all forms of social atrophy are adaptive, or that intervention is unwarranted. It establishes that the basic trajectory &mdash; from broad to selective social engagement across the lifespan &mdash; has deep evolutionary roots. But evolutionary adaptations can be maladaptive in modern contexts (the stress response is the classic example), and the question of whether a given instance of social atrophy is helping or harming a specific individual remains an empirical one.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2>What Sources <em>Disagree</em> On</h2></div>
  <p>The social atrophy literature contains more genuine disagreement than the skill decay literature, and the disagreements are theoretically important.</p>
  <h3>Adaptive Selection vs. Involuntary Loss</h3>
  <p>SST predicts strategic pruning of peripheral ties. Bereavement research documents involuntary loss of important ties. Both processes occur, and from the outside they look identical. The same 70-year-old with a network of 5 may be a strategic selector or a bereaved, mobility-limited person who has lost friends without replacement. The atrophy thesis applies more cleanly to the latter; the adaptive version of social selectivity complicates the argument that atrophy is governing agency rather than expressing it.</p>
  <h3>The Weak Tie Question</h3>
  <p>The literature is divided on how much the loss of weak ties matters. Granovetter&rsquo;s classic work on the strength of weak ties argues that weak ties are the source of novel information and bridging social capital &mdash; and their loss should be significant. But some SST research suggests that what people lose in weak ties they gain in the depth and quality of strong ties. Whether the trade-off is net positive depends heavily on what kinds of decisions the person faces.</p>
  <h3>Individual vs. Structural</h3>
  <p>Perhaps the most important tension: social isolation and network atrophy are heavily structured by income, geography, disability, and institutional design. The individual atrophy lens &mdash; describing what happens to a person&rsquo;s social network across their lifespan &mdash; can obscure the extent to which the trajectory is determined by structural conditions outside the person&rsquo;s control. A person in precarious employment, without stable housing, or with chronic illness does not face the same social atrophy trajectory as a comfortably resourced person who makes deliberate choices about their social investments.</p>`
];
