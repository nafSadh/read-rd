  'Seligman\'s three-deficit model — motivational, cognitive, and emotional — describes how uncontrollable aversive experience leads to passivity, including the structural degradation of the capacity to terminate deliberation with action.',
  'DRN serotonin and vmPFC circuits mediate the shift from active coping to passive helplessness — this is not metaphor, it has documented neuroscience.',

`<div class="detail-header"><div class="d-num">Section 01</div><h2><em>Learned</em> Helplessness — The Three-Deficit Model</h2></div>
<p><a href="https://psycnet.apa.org/record/1975-09390-001" target="_blank">Seligman's</a> foundational work identified three distinct deficits that emerge from exposure to uncontrollable aversive events — a taxonomy that has proved more durable than any single experiment in the learned helplessness literature. Understanding each deficit separately clarifies why LH is not simply "giving up" but a structured reorganization of cognition, motivation, and affect.</p>
<h3>The Motivational Deficit</h3>
<p>The first deficit is the most visible: organisms exposed to inescapable shock subsequently fail to escape escapable shock, even when escape is trivially available. Seligman's original shuttle-box experiments showed that dogs who had experienced uncontrollable shock simply lay down when escape became possible — they had lost the initiatory impulse to try. In human terms, this maps onto the failure to initiate goal-directed behavior. People who have repeatedly encountered uncontrollable outcomes stop generating behavioral options. They don't choose passivity; the motivational machinery that generates alternatives has been deactivated.</p>
<h3>The Cognitive Deficit</h3>
<p>The second deficit is subtler: even when a helpless organism does attempt response, it fails to learn that those responses are now effective. This is a learning-to-learn problem. Normal organisms, after a few successful escapes, rapidly generalize the lesson "my responses matter here." Helpless organisms don't. They have acquired a cognitive set — what Seligman called a "noncontingency expectation" — that is resistant to disconfirmation. New evidence of efficacy doesn't update the model. The expectation that responses are futile functions as a prior so strong that positive feedback can't revise it.</p>
<div class="callout"><p>The cognitive deficit explains why learned helplessness is not corrected by success alone. Experience of efficacy doesn't undo the expectation of non-contingency — it bounces off it.</p></div>
<h3>The Affective Deficit</h3>
<p>The third deficit is emotional: helpless organisms show reduced affect, anhedonia, and what Seligman described as "emotional blunting." In humans, this manifests as depressed mood, diminished pleasure from ordinarily reinforcing experiences, and reduced reactivity to both positive and negative events. The affective deficit is clinically relevant because it makes the motivational deficit self-reinforcing — an organism that takes less pleasure from success has less incentive to try again even after successful outcomes.</p>

  <text x="200" y="179" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl">Fewer perceived options, default preference</text>
  <rect x="60" y="200" width="280" height="14" fill="rgba(0,0,0,0.03)" rx="3"/>
  <text x="200" y="210" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl">All three deficits converge on reduced behavioral range</text>
</svg></div>
<p>The three-deficit model's importance for decision-making is that each deficit operates on a different part of the decision process. The motivational deficit reduces option generation. The cognitive deficit impairs learning from outcomes. The affective deficit reduces the experienced value of alternatives. Together they produce a decision space that is not just narrower but distorted — systematically biased toward inaction and defaults.</p>
<p>A fourth implication runs deeper than the three-deficit taxonomy: helplessness is the motivational atrophy of the <em>commitment circuit</em>. Normal deliberation has a termination condition — a forcing function that converts deliberative capacity into a committed choice. What the motivational deficit erodes is not merely the willingness to act but the structural capacity to close deliberation. The organism can continue to reason indefinitely about options it cannot bring itself to choose. This is not passivity as lack of thought; it is passivity as the failure of the neural and motivational machinery that converts deliberation into decision. Learned helplessness, on this reading, is not just motivational depletion — it is the atrophy of the commitment architecture itself.</p>`,

`<div class="detail-header"><div class="d-num">Section 02</div><h2>Neural <em>Substrates</em> of Learned Helplessness</h2></div>
<p>For decades, learned helplessness was treated as a behavioral and cognitive phenomenon — important, but ultimately a black-box description of what organisms do after uncontrollable aversive experience. The past twenty years have changed that. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4920136/" target="_blank">A 2016 PMC review marking fifty years of LH research</a> consolidates what is now known about the underlying neuroscience: LH has identifiable circuit-level substrates, and passive helpless behavior is not the absence of neural activity but the presence of a specific neural state.</p>
<h3>The Dorsal Raphe Nucleus (DRN) and Serotonin</h3>
<p>The DRN is a midbrain structure that releases serotonin broadly throughout the forebrain. Normally, serotonin is associated with mood regulation and — importantly — active coping. But under conditions of prolonged inescapable stress, the DRN shifts into a high-firing state that actually suppresses active behavior. This is counterintuitive: more serotonin from the DRN produces more passivity, not less. The mechanism is that DRN serotonergic output to the amygdala and to the basal ganglia suppresses the circuits responsible for behavioral initiation. The organism isn't "too calm" to act — it's in an active neural state whose output is behavioral inhibition.</p>
<h3>The vmPFC and the Active Coping Circuit</h3>
<p>The ventromedial prefrontal cortex (vmPFC) is the critical controller. Under controllable stress, the vmPFC activates and suppresses the DRN — it tells the brainstem "I have control here, stay in active-coping mode." Under uncontrollable stress, the vmPFC fails to activate. This failure has two consequences: the DRN enters its high-firing inhibitory state, and the organism loses access to the executive resources that would otherwise support active problem-solving.</p>
<div class="callout"><p>LH is not passivity through resignation. It is passivity through the active suppression of behavioral initiation circuitry — a neural state that mimics what would be adaptive quietism in a genuinely uncontrollable environment.</p></div>
<h3>Relevance to Normal Aging and Stress Accumulation</h3>
<p>The significance for the atrophy thesis is this: vmPFC function declines with age. Gray matter loss in the prefrontal cortex is among the most consistent findings in neuroimaging studies of aging (see <a href="s6-biological-substrate.dd.html" title="Biological Substrate">S6</a>). If the vmPFC is the active-coping controller, and if vmPFC volume and function decline, then the threshold for entering a learned-helplessness-like neural state decreases over time. Older individuals don't need more uncontrollable experiences to reach the same level of motivational deficit; they reach it with less. The atrophy of the neural substrate of active coping is itself a form of motivational atrophy.</p>

`<div class="detail-header"><div class="d-num">Section 03</div><h2><em>Motivational</em> Changes Across the Lifespan</h2></div>
<p>Motivation does not decline uniformly with age — it reorganizes. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC3753654/" target="_blank">A PMC review of aging and motivation</a> synthesizes evidence that older adults pursue fewer goals, invest more intensely in those they do pursue, and prioritize emotionally meaningful over knowledge-seeking or exploratory goals. On one reading, this is adaptive selectivity. On another, it is motivational atrophy dressed in adaptive language.</p>
<h3>Goal Selection Narrows With Age</h3>
<p>Older adults reliably report fewer "possible selves" — the repertoire of futures they can imagine themselves inhabiting. They generate fewer goals in free-listing tasks, and the goals they generate tend to cluster around existing commitments rather than new domains. This narrowing is partly volitional (deliberate prioritization) and partly capacity-constrained (fewer cognitive resources for maintaining multiple goal hierarchies in parallel). The two mechanisms are difficult to separate in practice, which is one reason the adaptive interpretation is hard to confirm or refute.</p>
<h3>The SOC Framework</h3>
<p>Paul Baltes's Selection, Optimization, and Compensation (SOC) model offers the dominant adaptive account. As resources diminish, the theory holds, older adults strategically select fewer goals, optimize performance within those goals, and compensate for losses in other domains. Arthur Rubinstein's reported change in piano performance provides the canonical anecdote: fewer concerts, more practice on performed pieces, slower tempo before fast passages to make them seem faster. The SOC model predicts that goal narrowing produces better outcomes within the selected domain — the motivational equivalent of cognitive habit automaticity (see <a href="s1-cognitive-defaults.dd.html" title="Cognitive Atrophy &amp; Decision Defaults">S1</a>).</p>
<div class="callout"><p>The SOC model's prediction is testable: if narrowing is adaptive, people with more focused goal structures should report higher well-being and performance. Evidence here is mixed — the relationship depends heavily on whether the narrowing is chosen or imposed.</p></div>
<h3>Imposed vs. Chosen Narrowing</h3>
<p>The NIA background paper on motivation and older adults draws a sharp distinction between strategic withdrawal (chosen narrowing, consistent with SOC) and structural withdrawal (imposed narrowing due to health loss, bereavement, or institutional constraints). Strategic withdrawal correlates with maintained or improved well-being. Structural withdrawal — the kind driven by atrophy — correlates with depression and worse health outcomes. The problem is that from the outside, both look like the same reduced motivational footprint. And from the inside, it may be difficult to correctly classify one's own narrowing.</p>

`<div class="detail-header"><div class="d-num">Section 04</div><h2><em>Hedonic</em> Adaptation and the Narrowing Baseline</h2></div>
<p>Hedonic adaptation — the tendency of humans to return to a baseline level of affect after positive or negative events — is among the most replicated findings in well-being research. <a href="https://www.sciencedirect.com/science/article/pii/S0749597803000198" target="_blank">Loewenstein and Frederick's foundational work</a> on adaptation and affective forecasting showed that people consistently overestimate how long emotional responses to both positive events (promotions, windfalls) and negative events (disability, bereavement) will persist. The mechanism that makes humans resilient to tragedy also makes them incapable of sustained satisfaction.</p>
<h3>Adaptation as Motivational Decay</h3>
<p>The motivational implication of hedonic adaptation is severe and underappreciated. If the affective signal associated with achieving a goal decays rapidly — within weeks or months for most major life events — then the motivational force generated by anticipating that goal also decays with experience. The first time someone anticipates a promotion, the anticipated pleasure is vivid. After several cycles of promotion-then-adaptation, the anticipated pleasure is substantially discounted, because the person now has experiential data that the pleasure won't last. Repeated adaptation teaches the organism to devalue future goal states.</p>
<h3>The Set-Point Problem</h3>
<p>Research on hedonic set-points (the baseline to which individuals return after adaptation) shows that set-points are not fixed. Longitudinal data from the German Socio-Economic Panel Study, analyzed by Richard Lucas and colleagues, found that major negative life events — disability, unemployment, bereavement — can permanently lower the hedonic set-point. The person doesn't just adapt back to the old baseline; they adapt back to a new, lower baseline. Each major negative event that produces lasting set-point reduction effectively resets the motivational landscape: the achievable positive states are now less positive relative to the new lower set-point. Motivation toward positive outcomes is discounted not because the outcomes are objectively less valuable, but because the internal reference point has shifted downward.</p>
<div class="callout"><p>Set-point reduction after negative life events means that motivation doesn't just return to normal after adaptation — it returns to a normal that is more negative than before. Repeated across a lifetime, this produces systematic motivational narrowing.</p></div>
<h3>Age, Adaptation, and the Positivity Effect</h3>
<p>Carstensen's socioemotional selectivity theory (see <a href="s3-social-atrophy.dd.html" title="Social Network Atrophy">S3</a>) predicts that older adults preferentially attend to positive over negative stimuli — the "positivity effect." This has been interpreted as adaptive emotional regulation. But hedonic adaptation data complicate this picture. If adaptation is faster or more complete in older adults (a disputed claim), then the positivity effect might reflect not enhanced positive emotion but rather greater attenuation of negative emotion — a difference in adaptation asymmetry rather than genuinely elevated positive affect. The motivational implications differ: the first scenario predicts maintained approach motivation; the second predicts maintained mood through avoidance of negative stimuli rather than pursuit of positive ones.</p>`,

`<div class="detail-header"><div class="d-num">Section 05</div><h2>Anhedonia, <em>Apathy</em>, and Reward Anticipation</h2></div>
<p>Anhedonia — the inability to experience pleasure — is the defining symptom of major depression, but subclinical anhedonia and its milder cousin, apathy, are far more prevalent and less studied. <a href="https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0107380" target="_blank">A PLOS One study on learned helplessness and anhedonia</a> examines the overlap between the two constructs, finding that helplessness experiences reliably induce anhedonia even in nonclinical populations — and that the anhedonia, unlike the helplessness, persists longer after the inducing conditions are removed.</p>
<h3>Anticipatory vs. Consummatory Anhedonia</h3>
<p>The key distinction in contemporary anhedonia research is between anticipatory anhedonia (reduced wanting) and consummatory anhedonia (reduced liking). These dissociate in ways that are motivationally consequential. Anticipatory anhedonia — the diminished capacity to generate desire and motivation toward future rewarding states — is measurable even when consummatory pleasure remains intact. A person can still enjoy music, food, or conversation when they arrive, but generate no drive to seek them out in advance. This means that decision-making — which is almost entirely a forward-looking process that requires anticipatory motivation — can be severely compromised even when hedonic capacity itself is relatively preserved.</p>
<h3>Apathy as Subclinical Variant</h3>
<p>Apathy is defined as diminished motivation without the mood disturbance of depression. It is distinct from sadness or anhedonia, though it co-occurs with both. Crucially, apathy correlates with worse decision quality in aging populations — not because of cognitive impairment, but because apathetic individuals generate fewer options, invest less cognitive effort in evaluation, and default to habitual or minimal-effort responses. The decision cost of apathy is not reduced capacity but reduced investment of available capacity.</p>
<div class="callout"><p>Anticipatory anhedonia is decision-relevant anhedonia. The inability to generate desire for future states reduces the motivational fuel for option generation — decisions contract not because fewer options exist but because fewer options are desired.</p></div>

`<div class="detail-header"><div class="d-num">Section 06</div><h2>Decisions <em>Under</em> Learned Helplessness</h2></div>
<p>The decision-theoretic implications of learned helplessness are poorly studied relative to its well-characterized behavioral and neural features. Yet the connection is straightforward: if LH produces motivational, cognitive, and affective deficits simultaneously, and if these deficits reduce option generation, impair learning from feedback, and flatten the value landscape, then decisions made under LH should be systematically different from baseline decisions — not just worse, but biased in predictable ways.</p>
<h3>Default Preference Amplification</h3>
<p>The most consistent finding in the sparse direct literature is that LH amplifies default-preference behavior. <a href="https://psychology.yale.edu/sites/default/files/psychology-today-helplessness-bios-and-explanatory-style.pdf" target="_blank">Psychology Today's synthesis of LH research and explanatory style</a> notes that helpless individuals show substantially increased sensitivity to how options are framed — particularly to which option is presented as the default. In decision research, default effects are strong in the general population. Under LH conditions, they are stronger still: the motivational deficit reduces the probability of active option search, the cognitive deficit impairs evaluation of non-default alternatives, and the affective deficit reduces the experienced difference between options. Defaults win not because they are better but because the machinery that would select away from defaults has been compromised.</p>
<h3>Effort Discounting</h3>
<p>Effort-based decision-making studies — in which participants choose between a low-effort/low-reward option and a high-effort/high-reward option — consistently find that helpless individuals discount the high-effort option more steeply than controls. This is not simply risk aversion or loss aversion; it is a specific elevation in the subjective cost of behavioral effort. The same objective effort requirement generates more subjective cost after helplessness induction. This means that decisions which require active search, deliberation, or behavioral investment are disproportionately avoided — which, in practice, are exactly the decisions with the highest stakes.</p>
<div class="callout"><p>The most consequential decisions — career changes, relationship choices, health-seeking behavior — require the highest effort investment. LH specifically amplifies effort discounting, so the decisions most affected are the ones that matter most.</p></div>
<h3>Procrastination as Capacity-Depleting Avoidance</h3>
<p>Procrastination compounds decisional atrophy through a mechanism that is doubly self-defeating. <a href="https://psycnet.apa.org/record/2006-23058-004" target="_blank">Steel's (2007) meta-analysis</a> — synthesizing 691 correlations across the procrastination literature — identifies procrastination as quintessential self-regulatory failure, strongly predicted by low self-efficacy, task aversiveness, and impulsiveness. The key finding for the atrophy thesis is that these same variables — particularly low self-efficacy — are downstream effects of learned helplessness. LH creates procrastination; procrastination then deepens helplessness by confirming the expectation of futility.</p>
<p>But the double jeopardy runs further. The deliberative capacity available at time T is not preserved by delay; it decays. A decision deferred is not a decision preserved — the capacity that would have been available for a higher-quality choice at T is depleted by the time the decision is eventually forced at T+n. Procrastination thus generates a negative compound: the agent pays the cost of continued deliberation (sustained cognitive load, rumination, anxiety) while receiving none of the benefits of decisive action, and arrives at forced-choice with less capacity than was available at the optimal decision window. Steel (2007) documents that procrastination reliably predicts worse outcomes, higher stress, and lower well-being — consistent with the hypothesis that it destroys the conditions for good decisions rather than preserving them.</p>
<div class="callout"><p>Procrastination is not decision-preservation. It is capacity destruction dressed as caution. The agent delays in order to decide better, and arrives at decision with less of the resource that "deciding better" requires.</p></div>
<h3>The Explanatory Style Connection</h3>
<p>Seligman's later reformulation of LH theory introduced explanatory style — the habitual way a person explains negative events — as the mediating variable. Internal ("it's my fault"), stable ("it won't change"), and global ("it affects everything") attributions produce generalized helplessness that transfers across domains. Someone with a pessimistic explanatory style who experiences failure in one domain — say, a failed relationship — does not confine the helplessness to that domain. The attribution "I am not capable of sustaining relationships" is stable and global; it migrates. The decision contraction that results is correspondingly broad: not just "I won't try to date" but a generalized reduction in the range of life domains the person will actively pursue.</p>`,

`<div class="detail-header"><div class="d-num">Section 07</div><h2>Analysis Paralysis — Atrophy of the <em>Commitment Circuit</em></h2></div>
<p>Analysis paralysis is commonly described as "too much deliberation" — a cognitive excess that prevents timely choice. This framing is misleading in a way that matters for the atrophy thesis. The problem in analysis paralysis is not the quantity of deliberation but the failure of the mechanism that terminates it. Under the sharpened thesis of this series, deliberation is terminated not by conclusion but by a forcing function: the commitment circuit — the neural and motivational architecture that converts accumulated deliberation into a committed act. Analysis paralysis is what happens when that circuit has atrophied through chronic indecision.</p>
<h3>The Failure of the Forcing Function</h3>
<p>In a normally functioning decision system, deliberation runs until one of two conditions is met: either a satisficing threshold is crossed (the agent judges a candidate option "good enough") or the deliberative capacity floor is reached and the system forces a choice to conserve resources. Analysis paralysis represents the failure of both conditions. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC10149428/" target="_blank">Clinical research on decision paralysis</a> documents that the condition is distinct from ordinary indecision — it involves sustained, effortful deliberation that fails to converge despite substantial investment. The agent is not passive; they are actively deliberating and actively failing to stop.</p>
<p>The neural picture is consistent with commitment-circuit atrophy. The dorsolateral prefrontal cortex (dlPFC) supports the maintenance and evaluation of multiple options simultaneously; its activity during deliberation is associated with good decision quality. But commitment — the act of terminating deliberation with a choice — requires a different process: the suppression of alternative-generating activity and the gating of a single option into action. Research on prefrontal function in decision-making indicates that the ventromedial prefrontal cortex (vmPFC) is critical for this gating operation. An agent with chronically impaired vmPFC function — whether through stress, atrophy, or the accumulated effects of learned helplessness — retains deliberative capacity but loses the ability to close deliberation. The capacity floor arrives; no choice emerges.</p>
<div class="callout"><p>Analysis paralysis is not a cognitive surplus. It is the structural failure of the commitment architecture — the deliberation-termination system has atrophied, leaving the agent stranded in a loop that cannot self-resolve.</p></div>
<h3>Chronic Indecision as Self-Reinforcing Atrophy</h3>
<p>Each episode of failed commitment deepens the atrophy. When an agent deliberates extensively and fails to commit, two things happen: the deliberative capacity invested is depleted (the costs of deliberation are real — they consume working memory, executive function, and affective resources), and the self-efficacy associated with committing declines. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC12438291/" target="_blank">Research on ADHD and decision paralysis</a> shows that chronic indecision correlates with reduced self-efficacy for decision-making specifically — not for deliberation (which may remain intact or even elevated), but for the act of choosing. This is the attentional analogue of the motivational deficit in learned helplessness: the capacity to generate options is present; the capacity to select among them and commit has degraded.</p>
<p>The paradox of choice literature (Schwartz; Iyengar and Lepper's jam study) documents that larger option sets reliably increase decision paralysis in the general population. But the atrophy framework adds a developmental dimension the paradox-of-choice literature underemphasizes: the same objective choice environment produces more paralysis in an agent whose commitment circuit has been weakened through prior chronic indecision. Option overload is not just a feature of the environment — it interacts with the prior state of the agent's commitment architecture. An already-atrophied system encounters even moderate choice sets as overwhelming.</p>

`<div class="detail-header"><div class="d-num">Section 08</div><h2>Pre-Atrophy Wisdom — <em>Committing</em> Before the Floor</h2></div>
<p>The atrophy framework is not solely a pathology narrative. If deliberative capacity is a consumable resource that depletes during deliberation, and if the quality of a committed choice is a function of the capacity available at commitment, then the agent who understands this dynamic has a decision advantage: they can learn to recognize when deliberative capacity is high and commit within that window, before atrophy — within the session, within the day, within the decision-relevant period — has progressed too far. This is the positive counterpart to learned helplessness, and it is a learnable metacognitive skill, not a fixed personality trait.</p>
<h3>The Pre-Mortem as Capacity-Efficient Decision Hygiene</h3>
<p>Gary Klein's pre-mortem technique offers a concrete instantiation of pre-atrophy wisdom. The pre-mortem asks a decision-maker — before commitment — to assume the decision has already been made and has failed spectacularly, then work backward to identify why. Klein's original work, subsequently popularized in McKinsey and strategy contexts, shows that this prospective hindsight technique increases identification of potential failure modes by approximately 30% compared to standard deliberation. The mechanism is relevant: the pre-mortem does not extend deliberation indefinitely — it structures it toward closure. It converts open-ended option evaluation (which depletes capacity) into bounded failure analysis (which uses capacity more efficiently and produces commitment-relevant conclusions).</p>
<p>The pre-mortem is a commitment protocol: it is designed to be done once, quickly, before capacity depletion has advanced, and to produce a decision rather than a further cycle of deliberation. Its structural wisdom lies in recognizing that extended deliberation is not superior to bounded deliberation — beyond a certain point, more deliberation does not improve decision quality and may degrade it by depleting the capacity needed to commit.</p>
<div class="callout"><p>The pre-mortem is not a way to deliberate more. It is a way to deliberate toward closure — a structured exit from the deliberation loop before capacity runs out.</p></div>
<h3>Decision Hygiene as Metacognitive Skill</h3>
<p>Pre-atrophy wisdom has several components that can be cultivated explicitly. First, capacity monitoring: the ability to recognize one's own motivational and cognitive state, and to distinguish high-capacity windows (morning, rested states, low-stress periods) from depleted states. Research on decision fatigue — <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC10149428/" target="_blank">documented in clinical and behavioral settings</a> — shows that judges, physicians, and other professional decision-makers make systematically worse decisions as session length increases. The insight generalizes: there are better and worse times within a deliberative period to commit, and agents who know this can sequence decisions accordingly.</p>
<p>Second, commitment architecture: designing external structures that force closure before the capacity floor is reached. Deadlines, accountability partners, structured decision protocols, and pre-committed decision rules all function as external commitment mechanisms. Their value is not in restricting options — it is in guaranteeing that the deliberation-termination event occurs at a point when capacity is sufficient to act well on it.</p>
<p>Third, the recognition that not committing has costs: the capacity that would have been available for a better decision at the optimal window is not preserved by delay (see Section 06 on procrastination). This knowledge — genuinely internalized, not just acknowledged — changes how delay is experienced. The agent who understands that waiting is capacity consumption, not capacity preservation, has different incentives than one who believes waiting is neutral. The metacognitive shift is from "I am waiting until I have enough information" to "I am depleting the capacity I need to use this information well."</p>

<h3>Trainability and Individual Differences</h3>
<p>Pre-atrophy wisdom is not a fixed trait. The research base for this claim comes from several directions. Structured decision-making training programs — including pre-mortem practice, implementation intention protocols (Gollwitzer), and if-then planning — show reliable improvements in decision follow-through and reduced procrastination in intervention studies. The locus of improvement is not increased deliberative capacity but improved commitment efficiency: participants make decisions of equivalent quality with less deliberative investment and at more appropriate capacity levels. The skill being trained is not "how to deliberate better" but "when and how to stop deliberating and commit" — the metacognitive counterpart to the commitment circuit's neural function.</p>`,

`<div class="detail-header"><div class="d-num">Section 09</div><h2>Key <em>Tensions</em> in Motivational Atrophy Research</h2></div>
<p>Motivational atrophy research sits at the intersection of clinical psychology, developmental psychology, and decision science — fields that don't always agree on their core constructs, let alone their mechanisms. Several tensions run through the literature and directly affect how the evidence should be interpreted.</p>
<h3>Adaptive Quietism vs. Maladaptive Surrender</h3>
<p>The most fundamental tension is whether motivational narrowing is adaptive. The SOC framework says yes: strategic reduction of goal scope to match available resources is intelligent behavior, not failure. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC3753654/" target="_blank">The PMC aging-motivation review</a> supports this: older adults report similar or higher subjective well-being despite narrower goal structures. But LH research says no: motivational deficit is a pathological response to accumulated uncontrollability that produces worse outcomes, not better ones. The tension is not just semantic. It affects what counts as intervention-worthy — if narrowing is adaptive, intervention to expand motivation may actually reduce well-being.</p>
<h3>Individual vs. Structural Determinants</h3>
<p>Much LH research individualizes what is partly a structural phenomenon. If someone repeatedly encounters uncontrollable negative outcomes not because of personal failure but because of structural disadvantage — poverty, discrimination, institutional exclusion — their learned helplessness is a rational updating on genuinely uncontrollable environments. The decision contraction that follows is not a pathology of the individual but an accurate representation of a constrained world. Intervention at the individual level (cognitive therapy, explanatory style retraining) may be less effective than structural change, and may even be epistemically counterproductive if it encourages false beliefs about personal efficacy.</p>
<div class="callout"><p>A person who lives in a genuinely uncontrollable environment and develops learned helplessness is demonstrating accurate environmental modeling, not cognitive distortion. Treating the helplessness without changing the environment is not just ineffective — it may be dishonest.</p></div>
<h3>Domain Specificity vs. Generalization</h3>
<p>The original LH paradigm used total-domain inescapability (inescapable shock). Real-world LH is typically domain-specific — career failure doesn't necessarily produce relationship helplessness, and vice versa. But Seligman's explanatory style research suggests that internalized global attributions can produce cross-domain generalization. The empirical question is: under what conditions does LH stay domain-specific, and under what conditions does it generalize? Age may be a moderator — older adults, with more accumulated domain-specific failures and a longer history of stable-global attribution patterns, may show more generalized LH than younger adults experiencing first-domain failures.</p>
<h3>The Measurement Problem</h3>
<p>Motivational atrophy is notoriously difficult to measure independently from its causes and consequences. Self-reported motivation conflates capacity and desire; behavioral measures conflate motivation with cognitive load and fatigue; neural measures require expensive technology and specific experimental paradigms. This means that the evidence base for motivational atrophy as a driver of decisions is mostly inferential — from behavioral correlates, not direct measurement of motivational capacity. The claim that atrophy drives decisions rather than merely correlating with narrower decisions requires a level of causal identification that current methods struggle to provide.</p>`
];

// ── DOM builder ──────────────────────────────────────────────────────────────
const shell = document.getElementById('shell');
const sidebar = document.getElementById('sidebar');
const sidebarNav = document.getElementById('sidebarNav');
const sidebarLogo = document.getElementById('sidebarLogo');
const mainHead = document.getElementById('mainHead');
const mainScrollInner = document.getElementById('mainScrollInner');
const rightPanel = document.getElementById('rightPanel');
const detailInner = document.getElementById('detailInner');
const sidebarTooltip = document.getElementById('sidebarTooltip');
const themeBtn = document.getElementById('themeBtn');
const detailBtn = document.getElementById('detailBtn');

document.getElementById('heroBadge').innerHTML = HERO_BADGE;
document.getElementById('heroTitle').innerHTML = HERO_TITLE;
document.getElementById('heroSubLeft').textContent = HERO_SUB_LEFT;
document.getElementById('heroSubRight').textContent = HERO_SUB_RIGHT;
sidebarLogo.innerHTML = SIDEBAR_LOGO;

let currentSection = 0;
let detailOpen = false;

sections.forEach((title, i) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (i === 0 ? ' active' : '');
  item.innerHTML = `<span class="sidebar-num">${String(i+1).padStart(2,'0')}</span><span class="sidebar-label">${title}</span>`;
  item.addEventListener('click', () => scrollToSection(i));
  item.addEventListener('mouseenter', e => {
    if (detailOpen) {
      sidebarTooltip.textContent = title;
      const r = item.getBoundingClientRect();
      sidebarTooltip.style.top = r.top + 'px';
      sidebarTooltip.style.height = r.height + 'px';
      sidebarTooltip.style.left = (sidebar.offsetWidth) + 'px';
      sidebarTooltip.classList.add('visible');
    }
  });
  item.addEventListener('mouseleave', () => sidebarTooltip.classList.remove('visible'));
  sidebarNav.appendChild(item);
});

sections.forEach((title, i) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.id = 'section-' + i;
  block.innerHTML = `<div class="s-num"><span>0${i+1}</span><button class="s-detail-btn" title="Open detail">&#9654;</button></div>
    <h2>${title}</h2><p>${summaries[i]}</p>`;
  block.querySelector('.s-detail-btn').addEventListener('click', () => openDetail(i));
  mainScrollInner.appendChild(block);
});

function scrollToSection(idx) {
  const el = document.getElementById('section-' + idx);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function openDetail(idx) {
  currentSection = idx;
  detailInner.innerHTML = details[idx];
  rightPanel.classList.remove('closed');
  shell.classList.add('detail-open');
  detailOpen = true;
  updateSidebarActive(idx);
}

function closeDetail() {
  rightPanel.classList.add('closed');
  shell.classList.remove('detail-open');
  detailOpen = false;
}

detailBtn.addEventListener('click', () => {
  if (detailOpen) closeDetail(); else openDetail(currentSection);
});

function updateSidebarActive(idx) {
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// scroll spy
const mainScroll = document.getElementById('mainScroll');
mainScroll.addEventListener('scroll', () => {
  const scrollTop = mainScroll.scrollTop;
  let active = 0;
  sections.forEach((_, i) => {
    const el = document.getElementById('section-' + i);
    if (el && el.offsetTop - 80 <= scrollTop) active = i;
  });
  updateSidebarActive(active);
  mainHead.classList.toggle('compact', scrollTop > 60);
});

// theme
const savedTheme = localStorage.getItem('rd-theme') || 'dark';
document.body.setAttribute('data-theme', savedTheme);
themeBtn.addEventListener('click', () => {
  const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('rd-theme', t);
});

// ESC
document.addEventListener('keydown', e => { if (e.key === 'Escape' && detailOpen) closeDetail(); });
</script>
