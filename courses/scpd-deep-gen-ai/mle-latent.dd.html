<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLE & Latent Variables — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'MLE Review', title: '<em>Maximum</em> Likelihood Estimation' },
  { num: '02', short: 'Latent Variables', title: '<em>Introducing</em> Latent Variables' },
  { num: '03', short: 'Mixture Models', title: '<em>Gaussian</em> Mixtures & EM' },
  { num: '04', short: 'ELBO', title: '<em>Evidence</em> Lower Bound' },
  { num: '05', short: 'Variational Inference', title: '<em>Variational</em> Inference' },
  { num: '06', short: 'Reparameterization', title: '<em>Reparameterization</em> Trick' },
  { num: '07', short: 'Importance Weighting', title: '<em>Importance</em> Weighting' },
  { num: '08', short: 'Training Deep Models', title: '<em>Training</em> Deep Latent Models' },
  { num: '09', short: 'References', title: 'References & <em>Further</em> Reading' }
];

const summaries = [
  // 01 MLE Review
  `<p>Maximum likelihood estimation (MLE) is the foundation of modern statistical learning. Given observed data, we seek parameters θ that maximize the probability of observing that data: θ* = argmax log p(x|θ). This objective is equivalent to minimizing negative log-likelihood, the principle underlying virtually all supervised learning.</p>
  <p>For complex models, we use gradient-based optimization: compute ∇_θ log p(x|θ) and perform stochastic gradient descent. The gradient points toward regions of higher likelihood. This approach scales to high dimensions and forms the basis of deep learning. Log-likelihood is preferred computationally since products become sums, avoiding numerical underflow.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">log p(x|θ)</div><div class="sl">Likelihood</div></div>
    <div class="st"><div class="sv">∇_θ</div><div class="sl">Gradient Flow</div></div>
    <div class="st"><div class="sv">SGD</div><div class="sl">Optimization</div></div>
    <div class="st"><div class="sv">Scalable</div><div class="sl">To High D</div></div>
  </div>`,

  // 02 Latent Variables
  `<p>Many phenomena are better modeled with hidden variables z that causally generate observed data x. A latent variable model defines p(x|z)p(z), capturing the joint distribution. The key challenge: we never observe z directly. To fit these models, we must marginalize: p(x) = ∫ p(x|z)p(z) dz. This integral is typically intractable for complex models.</p>
  <p>Intractability arises because z may be high-dimensional or the integral lacks closed form. We cannot simply apply MLE because computing log p(x) requires evaluating this intractable integral. This motivates variational inference: instead of exact inference, we approximate the posterior p(z|x) and optimize a lower bound on log p(x).</p>
  <div class="s-stat">
    <div class="st"><div class="sv">p(x,z)</div><div class="sl">Joint</div></div>
    <div class="st"><div class="sv">∫ p(x|z)p(z)</div><div class="sl">Marginal</div></div>
    <div class="st"><div class="sv">p(z|x)</div><div class="sl">Posterior</div></div>
    <div class="st"><div class="sv">Intractable</div><div class="sl">In General</div></div>
  </div>`,

  // 03 Mixture Models
  `<p>Gaussian mixture models (GMMs) exemplify latent variable models. A discrete latent z ∈ {1,...,K} selects which Gaussian component generates x. The joint is p(x,z) = p(x|z)p(z), where p(x|z) = N(x|μ_z, Σ_z) and p(z) is categorical. This factorization is natural: each component explains a distinct data mode.</p>
  <p>The expectation-maximization (EM) algorithm optimizes GMMs by iterating two steps: E-step computes p(z|x) given current parameters, M-step updates parameters given expected sufficient statistics from the posterior. EM is a special case of variational inference where the variational posterior exactly equals the true posterior in the M-step, yielding monotonic likelihood increase.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">K</div><div class="sl">Components</div></div>
    <div class="st"><div class="sv">Discrete z</div><div class="sl">Latent</div></div>
    <div class="st"><div class="sv">EM</div><div class="sl">Algorithm</div></div>
    <div class="st"><div class="sv">Monotonic</div><div class="sl">Increase</div></div>
  </div>`,

  // 04 ELBO
  `<p>The evidence lower bound (ELBO) provides a tractable objective for latent variable models. For any distribution q(z|x), the KL divergence KL(q || p) ≥ 0 implies: log p(x) ≥ E_q[log p(x,z)] - E_q[log q(z|x)]. This is the ELBO. When q(z|x) = p(z|x), the ELBO equals log p(x); tightness measures how well q approximates the true posterior.</p>
  <p>Optimizing the ELBO is equivalent to maximizing likelihood via two mechanisms: the reconstruction term E_q[log p(x|z)] encourages q to place mass on z values that explain x, while the KL term E_q[log p(z)/q(z|x)] regularizes q toward the prior. This decomposition unifies supervised learning (reconstruction) with regularization (KL), providing a principled framework for generative models.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">ELBO</div><div class="sl">Lower Bound</div></div>
    <div class="st"><div class="sv">KL Gap</div><div class="sl">Tightness</div></div>
    <div class="st"><div class="sv">Recon + KL</div><div class="sl">Decomposed</div></div>
    <div class="st"><div class="sv">q(z|x)</div><div class="sl">Approximate</div></div>
  </div>`,

  // 05 Variational Inference
  `<p>Variational inference replaces the intractable posterior p(z|x) with a tractable approximation q(z|x), optimizing the ELBO over q. We choose a function class for q (e.g., diagonal Gaussian, fully factorized) to maintain computational efficiency. The posterior q takes observed x as input, enabling it to adapt to each data point. This design choice is called amortization.</p>
  <p>Amortization is powerful: instead of solving a separate optimization problem per data point, we train a single neural network to compute q parameters. This amortized inference is fast at test time and enables scalable learning. The variational objective becomes: maximize E_q[log p(x|z)] - KL(q(z|x) || p(z)). Both terms are tractable given q's functional form, allowing gradient-based optimization.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">q(z|x)</div><div class="sl">Variational</div></div>
    <div class="st"><div class="sv">Amortized</div><div class="sl">Inference</div></div>
    <div class="st"><div class="sv">KL Divergence</div><div class="sl">Minimization</div></div>
    <div class="st"><div class="sv">Neural Network</div><div class="sl">q-encoder</div></div>
  </div>`,

  // 06 Reparameterization
  `<p>A fundamental challenge in variational inference: backpropagating gradients through the sampling operation. The reparameterization trick solves this by expressing sampling as a deterministic transformation of an auxiliary random variable. For Gaussian q with mean μ and std σ, instead of z ~ q, we write z = μ + σ⊙ε where ε ~ N(0,I). Now gradients flow through the deterministic function μ(x) and σ(x).</p>
  <p>This trick enables end-to-end gradient flow through sampling. Losses like the ELBO become differentiable with respect to q parameters (μ,σ). The gradient estimator has low variance since it uses the deterministic path. This is essential for training variational autoencoders (VAEs), where both encoder q and decoder p are neural networks jointly optimized by gradient descent.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">z = μ + σ⊙ε</div><div class="sl">Reparameterized</div></div>
    <div class="st"><div class="sv">Low Variance</div><div class="sl">Gradient</div></div>
    <div class="st"><div class="sv">Deterministic</div><div class="sl">Path</div></div>
    <div class="st"><div class="sv">End-to-End</div><div class="sl">Differentiable</div></div>
  </div>`,

  // 07 Importance Weighting
  `<p>The ELBO with a single sample can underestimate log p(x). Importance weighting (IWAE) bounds use multiple samples from q to tighten the bound. With M samples {z_1,...,z_M} ~ q(z|x), the IWAE bound is: log p(x) ≥ E[log (1/M) Σ p(x,z_m)/q(z_m|x)]. As M→∞, this converges to log p(x). With M=1, it reduces to the standard ELBO.</p>
  <p>IWAE bounds are tighter than the ELBO for any M≥1, incurring only linear computational overhead. This provides a principled way to trade computation for tighter bounds. The bias-variance tradeoff is key: more samples reduce bias (tighter bound) but increase variance. In practice, modest M (5-50) often suffices. IWAE demonstrates that tightness is a learnable dimension, opening pathways to more effective variational training.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">M Samples</div><div class="sl">IWAE</div></div>
    <div class="st"><div class="sv">Tighter</div><div class="sl">Than ELBO</div></div>
    <div class="st"><div class="sv">log Σ</div><div class="sl">Averaging</div></div>
    <div class="st"><div class="sv">Bias-Variance</div><div class="sl">Tradeoff</div></div>
  </div>`,

  // 08 Training Deep Models
  `<p>Scaling latent variable models to high-dimensional data reveals practical challenges. Posterior collapse occurs when the learned q(z|x) approaches the prior p(z), making the KL term near zero. This happens because the decoder p(x|z) becomes powerful enough to reconstruct x without z, rendering the latent variables unused. The model ignores the bottleneck.</p>
  <p>Addressing posterior collapse requires careful design: (1) use warm-up schedules that gradually weight the KL term, allowing reconstruction to stabilize first; (2) employ more expressive posteriors; (3) strengthen the evidence that z provides. Another challenge is optimization: latent variable models have non-convex objectives with many local minima. Best practices include: careful initialization, batch normalization, appropriate learning rates, and architectural choices that encourage information flow. Understanding these pitfalls is essential for successfully training deep generative models.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Posterior</div><div class="sl">Collapse</div></div>
    <div class="st"><div class="sv">Warm-up</div><div class="sl">Schedule</div></div>
    <div class="st"><div class="sv">β-VAE</div><div class="sl">Weighting</div></div>
    <div class="st"><div class="sv">Stable</div><div class="sl">Training</div></div>
  </div>`,

  // 09 References
  `<p>This section establishes the mathematical foundations connecting maximum likelihood estimation, latent variable models, and variational inference. The references below guide deeper study of these core principles underlying modern generative models.</p>
   <p>From mixture models and expectation-maximization to variational autoencoders, these techniques form the backbone of learning with unobserved structure.</p>`
];

const details = [
  // 01 MLE Review — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01</div>
    <h2><em>Maximum</em> Likelihood Estimation</h2>
  </div>
  <p>MLE seeks parameters θ that maximize the probability assigned to observed data D = {x_1,...,x_N}. The objective is L(θ) = Π_i p(x_i|θ), or equivalently (and more numerically stable) log L(θ) = Σ_i log p(x_i|θ). This is the log-likelihood.</p>
  <p>For differentiable models, we compute the gradient ∇_θ log p(x|θ) and use gradient ascent (or descent on negative log-likelihood). For large datasets, stochastic gradient descent approximates the full gradient using minibatches, making optimization practical for billions of parameters.</p>
  <h3>Gradient-Based Optimization</h3>
  <p>At each step: θ ← θ + α ∇_θ log p(x|θ). The step size α (learning rate) controls update magnitude. Adaptive methods (Adam, RMSprop) scale learning rates per parameter, improving convergence. Modern deep learning frameworks (PyTorch, TensorFlow) automatically differentiate through complex computational graphs, enabling optimization of massive models.</p>
  <h3>Why Log-Likelihood</h3>
  <p>Products Σ_i log p(x_i|θ) become sums, avoiding numerical underflow when p values are small. Mathematically, log is a monotonic transformation, so maximizing log p(x|θ) is equivalent to maximizing p(x|θ). This simplification is essential: multiplying many small probabilities produces values near zero, causing floating-point precision loss.</p>
  <h3>Connection to Deep Learning</h3>
  <p>Supervised learning (e.g., classification) fits p(y|x;θ) via MLE. The cross-entropy loss in classification is precisely -log p(y|x;θ), cementing MLE as the foundation of modern machine learning. Extending MLE to unsupervised and generative settings requires handling unobserved variables—the domain of latent variable models.</p>`,

  // 02 Latent Variables — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02</div>
    <h2><em>Introducing</em> Latent Variables</h2>
  </div>
  <p>A latent variable z is a hidden factor we never directly observe but assume influences x. Examples: the semantic content (topic) of a document, the underlying emotion in an image, the latent factors in matrix factorization. The joint distribution p(x,z) factorizes as p(x|z)p(z), where p(x|z) is the likelihood and p(z) is the prior.</p>
  <p>To fit a latent variable model via MLE, we must marginalize out z: p(x) = ∫ p(x|z)p(z) dz. This marginal likelihood represents the probability of x under the model, averaging over all possible explanations z. For continuous z or discrete z with many states, this integral is often intractable.</p>
  <h3>Intractability and Its Implications</h3>
  <p>Common scenarios: (1) z is high-dimensional, making the integral multidimensional and expensive; (2) p(x|z) and p(z) are neural networks, so no closed form exists; (3) even simple models can yield intractable integrals (e.g., mixture of non-conjugate distributions). Unable to compute log p(x), we cannot directly optimize via MLE.</p>
  <h3>Graphical Model View</h3>
  <p>The latent variable structure is often depicted as a directed graphical model: p(z) → z → p(x|z) → x. This causal interpretation is intuitive: z is generated first (from prior), then x is generated conditioned on z. This structure appears in Bayes nets, Markov chains, and structural causal models.</p>
  <h3>Why Latent Variables Matter</h3>
  <p>Latent variables enable compact representations of complex distributions. A simple prior (e.g., standard normal) combined with a learned decoder can represent multimodal, high-dimensional distributions. Latent models also facilitate interpretability: z often captures semantically meaningful factors. This is why they're central to generative modeling and unsupervised learning.</p>`,

  // 03 Mixture Models — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03</div>
    <h2><em>Gaussian</em> Mixtures & EM</h2>
  </div>
  <p>A Gaussian mixture model (GMM) models p(x) as a weighted sum of K Gaussian components. Latent z ∈ {1,...,K} indicates which component generated x. The joint is p(x,z) = p(z)p(x|z) where p(z=k) = π_k and p(x|z=k) = N(x|μ_k, Σ_k). Marginalizing: p(x) = Σ_k π_k N(x|μ_k, Σ_k).</p>
  <p>GMMs are interpretable (each component is a Gaussian) yet flexible (mixing allows non-Gaussian marginals). Fitting GMMs via direct MLE requires optimizing Σ_k log Σ_k π_k N(x_i|μ_k, Σ_k), a non-convex problem. The expectation-maximization (EM) algorithm provides a principled alternative.</p>
  <h3>The EM Algorithm</h3>
  <p>EM alternates two steps, both tractable: (1) E-step: compute γ_{ik} = p(z_i=k|x_i) (responsibility of component k for x_i) using current parameters; (2) M-step: update π_k, μ_k, Σ_k using weighted data where x_i has weight γ_{ik} in component k. Intuitively, E-step "soft-assigns" data to components, M-step re-estimates component parameters.</p>
  <h3>EM as Variational Inference</h3>
  <p>EM optimizes the ELBO (to be defined later) with a specific variational family: q(z_i|x_i) is a one-hot distribution (deterministic responsibility). The E-step sets q to the true posterior; the M-step maximizes ELBO over parameters. This makes EM a special case of variational EM, revealing connections between classic and modern methods.</p>
  <h3>Guarantees and Limitations</h3>
  <p>EM guarantees monotonic increase in log-likelihood: L(θ^{t+1}) ≥ L(θ^t). However, it converges only to local optima. Initialization matters: poor starting points yield suboptimal solutions. EM also requires knowing K a priori. Model selection (choosing K) typically uses information criteria (BIC, AIC) or cross-validation.</p>`,

  // 04 ELBO — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04</div>
    <h2><em>Evidence</em> Lower Bound</h2>
  </div>
  <p>The ELBO is the heart of modern generative modeling. Start with any distribution q(z|x). Apply Bayes: p(z|x) = p(x|z)p(z) / p(x). Taking logs: log p(x) = log p(x,z) - log p(z|x). Rearrange: log p(x) = log p(x,z) - log p(z|x). Taking expectation under q(z|x): log p(x) = E_q[log p(x,z)] - E_q[log p(z|x)] + E_q[log q(z|x) - log q(z|x)].</p>
  <p>Simplify: log p(x) = E_q[log p(x,z) - log q(z|x)] + KL(q || p). Since KL ≥ 0, we have the ELBO: log p(x) ≥ E_q[log p(x,z) - log q(z|x)] := ELBO(q). Equivalently, ELBO = E_q[log p(x|z)] + E_q[log p(z) - log q(z|x)] = Recon - KL.</p>
  <h3>Decomposition: Reconstruction + Regularization</h3>
  <p>The reconstruction term E_q[log p(x|z)] measures how well z explains x. High reconstruction means placing mass q(z|x) on z values for which p(x|z) is large. The KL term penalizes divergence from the prior: large KL means q(z|x) deviates from p(z), which is costly. This decomposition mirrors classic ML: supervised loss (reconstruction) + regularization (KL).</p>
  <h3>Tightness of the ELBO</h3>
  <p>The gap between log p(x) and ELBO is the KL divergence: log p(x) - ELBO = KL(q || p(z|x)). When q(z|x) = p(z|x) (true posterior), the ELBO is tight (gap = 0). Otherwise, the gap reflects how poorly q approximates the true posterior. Tightness motivates: (1) expressive variational families for q, (2) importance weighting for tighter bounds, (3) iterative refinement of q.</p>
  <h3>Optimization as Likelihood Maximization</h3>
  <p>Optimizing ELBO over q and parameters θ of p(x|z) and p(z) increases a lower bound on log p(x). While not guaranteed to reach the global optimum (the ELBO may have local optima), each step makes progress on a principled objective. This is the foundation of variational autoencoders and modern generative models.</p>`,

  // 05 Variational Inference — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05</div>
    <h2><em>Variational</em> Inference</h2>
  </div>
  <p>Variational inference replaces the true posterior p(z|x) with a tractable approximation q(z|x). We restrict q to a family Q (e.g., diagonal Gaussian, factorized, mixture) ensuring both computational efficiency and differentiability. The goal: find q* ∈ Q minimizing KL(q || p(z|x)), or equivalently, maximizing ELBO_q.</p>
  <p>Unlike EM (which solves a separate posterior for each x), we parameterize q as a function of x: q(z|x; ϕ) where ϕ are neural network weights. This amortization means a single encoder produces posteriors for all data points. Training the encoder (and decoder) jointly via ELBO optimization is scalable and enables end-to-end learning.</p>
  <h3>Amortized Inference</h3>
  <p>Amortization trades off: (1) expressiveness loss (q is restricted relative to true posterior) for (2) computational gain (single forward pass instead of per-example optimization) and (3) generalization (encoder learns patterns applicable to new data). For most applications, this tradeoff is favorable: a learned encoder generalizes better than overfitting per-example posteriors.</p>
  <h3>Variational Families</h3>
  <p>Common choices: (1) Mean-field: q(z|x) = ∏_d q_d(z_d|x), each dimension independent; (2) Gaussian: q(z|x) = N(z|μ(x), diag(σ(x)^2)), with neural network μ, σ; (3) Hierarchical: stacked layers of random variables; (4) Autoregressive: q(z_1|x) q(z_2|z_1,x) ... More expressive families better approximate true posteriors but incur higher computational cost.</p>
  <h3>Connection to Posterior Approximation</h3>
  <p>The KL objective is asymmetric. KL(q || p) places high penalty when q has mass where p has low mass (mode-seeking), while KL(p || q) penalizes missing modes (mode-covering). Modern VI uses KL(q || p), making q underestimate posterior variance (tighter posterior approximation) but potentially missing modes. Importance weighting and other techniques mitigate this.</p>`,

  // 06 Reparameterization Trick — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06</div>
    <h2><em>Reparameterization</em> Trick</h2>
  </div>
  <p>The core challenge: gradients cannot flow through sampling operations z ~ q. Backward differentiation requires z = f(x; ϕ) to be deterministic in ϕ. The reparameterization trick solves this: express sampling as a deterministic transformation of an auxiliary random variable.</p>
  <p>For Gaussian q(z|x) = N(μ(x), σ(x)^2), instead of sampling z directly, sample ε ~ N(0,I) and set z = μ(x) + σ(x) ⊙ ε. Now z depends deterministically on μ, σ through the affine transformation. Gradients ∂z/∂μ = 1 and ∂z/∂σ = ε flow freely through the network to update encoder parameters.</p>
  <h3>Gradient Estimator and Variance</h3>
  <p>The ELBO gradient becomes ∇_ϕ ELBO = E_ε[∇_ϕ log p(x, f(x,ε;ϕ)) - ∇_ϕ log q(f(x,ε;ϕ)|x;ϕ)]. This pathwise gradient estimator (also called score function or Gumbel-Softmax when extended to discrete z) has low variance because it leverages the structure of the transformation. Contrast with score function estimators (REINFORCE), which estimate ∇_ϕ through finite differences—these have high variance.</p>
  <h3>Beyond Gaussians</h3>
  <p>The trick extends to other distributions: (1) Beta: z = F^{-1}(u) where u ~ Uniform(0,1), F is beta CDF; (2) Exponential: z = -log(u)/λ; (3) Discrete (Gumbel-Softmax): sample from continuous approximation, then take argmax for discrete. Even when the CDF is expensive, inverse transform sampling with numerical approximation often works.</p>
  <h3>Impact on Deep Generative Models</h3>
  <p>The reparameterization trick is essential for training VAEs, where encoder and decoder are jointly optimized via gradient descent. Without it, backprop cannot traverse encoder → sample → decoder path. This enables end-to-end learning of complex generative models, from pixel-level VAEs to hierarchical probabilistic models. The trick's simplicity and effectiveness made modern variational generative modeling practical.</p>`,

  // 07 Importance Weighting — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07</div>
    <h2><em>Importance</em> Weighting</h2>
  </div>
  <p>The standard ELBO uses a single sample from q: ELBO ≈ log p(x, z) - log q(z|x) where z ~ q. This estimate is noisy. Importance weighting (IWAE) improves the bound using multiple samples {z_1,...,z_M} ~ q. The estimator is: log p(x) ≥ log E_q[(1/M) Σ_m p(x,z_m) / q(z_m|x)].</p>
  <p>This bound is tighter than the single-sample ELBO for any M ≥ 1. Mathematically, let w_m = p(x,z_m)/q(z_m|x). By Jensen's inequality, log E[Σ_m w_m / M] ≥ E[log(Σ_m w_m / M)]. As M→∞, the bound approaches log p(x) (it becomes tight). The IWAE bound is thus a rigorous way to trade computation for tightness.</p>
  <h3>Bias and Variance Tradeoff</h3>
  <p>With M=1, the ELBO has some bias (gap from true log p(x)). Increasing M reduces bias monotonically. However, the log-of-sum gradient estimator has higher variance than log-of-expectation (single-sample ELBO). In practice, modest M (5-50) often balances bias and variance: enough samples to substantially tighten the bound without excessive variance in gradients.</p>
  <h3>Implementation Considerations</h3>
  <p>Computing log(Σ_m exp(w_m)) numerically requires the log-sum-exp trick to avoid overflow. Gradients through the IWAE bound use pathwise estimators (via reparameterization), making the bound differentiable. Modern implementations parallelize over samples for efficiency. Some work suggests β-weighted combinations (ELBO vs IWAE) during training can accelerate learning.</p>
  <h3>Theoretical Significance</h3>
  <p>IWAE reveals that tightness of variational bounds is a learnable quantity: you can get arbitrarily tight bounds by sampling. This motivates research into other tight bounds (ladder VAEs, hamiltonian VI) and demonstrates that the ELBO, while useful, is just one point on a spectrum of bounds. This perspective has driven recent advances in variational generative modeling.</p>`,

  // 08 Training Deep Models — detailed
  `<div class="detail-header">
    <div class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08</div>
    <h2><em>Training</em> Deep Latent Models</h2>
  </div>
  <p>Scaling to high-dimensional, high-capacity models (e.g., deep convolutional VAE on ImageNet) exposes practical challenges. Posterior collapse is the most notorious: the learned encoder q(z|x) converges to the prior p(z), rendering latents unused. This occurs when the decoder becomes powerful enough to reconstruct x without z information, so the reconstruction term dominates and KL→0.</p>
  <p>Posterior collapse is problematic because: (1) latents carry no information about x; (2) generation from prior p(z) ignores data; (3) the model becomes a deterministic autoencoder, not a generative model. Diagnosis: monitor KL(q||p) during training—if it drops to near zero early, suspect collapse. Remedies: (1) β-VAE weights KL by factor β &lt; 1, reducing decoder power; (2) warm-up schedules gradually increase KL weight; (3) use more expressive posteriors; (4) free bits prevent KL from dropping below threshold.</p>
  <h3>Warm-up Schedules</h3>
  <p>A common strategy: initialize KL weight β=0, gradually increase to 1 over training (e.g., over first 100k steps). Early reconstruction loss stabilizes the decoder; later, KL loss activates latents. This mimics curriculum learning: master simple (reconstruction) before hard (compression). Variants include cyclical warm-up and divergence schedules. Empirically, warm-up significantly improves final model quality and prevents collapse.</p>
  <h3>Optimization Landscape</h3>
  <p>Latent variable models are non-convex with many local minima. Careful initialization helps: warm-starting from a pre-trained autoencoder, orthogonal weight initialization, and batch normalization stabilize training. Adaptive optimizers (Adam) with proper learning rates (typically 1e-3 to 1e-4) outperform vanilla SGD. Some architectures (residual connections, skip connections) improve gradient flow.</p>
  <h3>Model-Specific Insights</h3>
  <p>For VAEs on images, architectural choices matter: (1) downsampling reduces spatial dimensions, concentrating information in channels—helps decoder; (2) skip connections in encoder/decoder preserve details; (3) larger latent dimension d increases KL but improves reconstruction. β-VAE with β&lt;1 increases disentanglement (latent factors correspond to interpretable attributes), though at reconstruction cost. Choice of β is problem-dependent; commonly β=0.1-0.5 for image data.</p>`,

  const item = e.target.closest('.sidebar-item');
  if (!item) {

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {

  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();

});
