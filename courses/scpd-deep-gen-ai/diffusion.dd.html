<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diffusion Models — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:16px 0;border:1px solid var(--border)}
.price-card{border-right:1px solid var(--border);padding:18px 12px;text-align:center;background:none;border-radius:0}
.price-card:last-child{border-right:none}.price-card.hl{background:var(--accent-soft)}
.price-card h4{font-size:var(--price-h4-size);font-weight:var(--body-weight);color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--price-h4-ls);font-family:var(--sans)}
.price-card .price{font-family:var(--serif);font-size:var(--price-val-size);color:var(--bright);font-weight:var(--heading-weight);font-style:italic;letter-spacing:var(--price-val-ls)}
.price-card .pn{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--sans)}

@media(max-width:1000px){
  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}
  .ctrl-btn{width:32px;height:32px;font-size:14px}
  .shell{display:block;position:relative}
  .main{height:100vh;width:100%}
  .main-head{padding:20px 20px 0}
  .hero-title{font-size:28px!important;letter-spacing:0!important}
  .masthead-sub{flex-direction:column;gap:2px}
  .main-head.compact{padding:0 20px;height:44px}
  .main-head.compact .hero-title{font-size:18px!important}
  .main-scroll{padding:0 20px 80px}
  .section-block{padding:28px 8px}
  .right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}
  .right:not(.closed){transform:translateX(0)}
  .right-inner{padding:0 20px 80px}
  .right-topbar{padding:10px 20px 0;height:44px}
  .detail-header h2{font-size:26px!important}
  .feat-grid,.verdict,.price-grid{grid-template-columns:1fr}
  .feat{border-left:none!important;padding-left:0!important}
  .feat:nth-child(2n){padding-left:0}
  .v-col{padding:16px 0!important}
  .v-col:last-child{border-left:none!important;padding-left:0!important}
  .price-card{border-right:none!important;border-bottom:1px solid var(--border)}.price-card:last-child{border-bottom:none}
  .tl-item{flex-direction:column!important;gap:4px}
  .tl-date{min-width:unset!important}
  .detail p{font-size:16px}
  .detail pre{font-size:12px;padding:14px 16px}
  .section-block .s-stat{flex-wrap:wrap}
  .section-block .s-stat .st{min-width:45%}
}

<body data-theme="light">

<script>
const sections = [
  {num:'01',short:'Forward Process',title:'<em>Forward</em> Process — q(x<sub>t</sub>|x<sub>t−1</sub>)'},
  {num:'02',short:'DDPM',title:'DDPM — Denoising Diffusion Probabilistic Models'},
  {num:'03',short:'Noise Prediction',title:'Noise Prediction — ε-prediction & U-Net'},
  {num:'04',short:'Reverse Process',title:'<em>Reverse</em> Process — p<sub>θ</sub>(x<sub>t−1</sub>|x<sub>t</sub>)'},
  {num:'05',short:'Training Objective',title:'Training Objective — Variational Bound & MSE Loss'},
  {num:'06',short:'Sampling Acceleration',title:'Sampling Acceleration — DDIM, DPM-Solver & Distillation'},
  {num:'07',short:'Conditional Generation',title:'Conditional Generation — Classifier & Classifier-Free Guidance'},
  {num:'08',short:'State of the Art',title:'State of the Art — Stable Diffusion, DALL-E, Imagen'},
  {num:'09',short:'References',title:'References & <em>Further</em> Reading'}
];

const summaries = [
  `<p>The forward process gradually adds Gaussian noise to data over <em>T</em> timesteps, transforming clean samples into pure noise via a Markov chain. Each step applies a small amount of noise controlled by variance schedule β<sub>t</sub>, which determines signal-to-noise ratio at each timestep.</p>
   <p>The process is deterministic given x₀ and defines <em>q</em>(x<sub>t</sub>|x<sub>t−1</sub>) = 𝒩(x<sub>t</sub>; √(1−β<sub>t</sub>)x<sub>t−1</sub>, β<sub>t</sub><strong>I</strong>). This tractable marginal q(x<sub>t</sub>|x₀) allows efficient loss computation without iterating the chain, using accumulated product α̅<sub>t</sub> = ∏ᵢ(1−β<sub>i</sub>).</p>`,

  `<p>DDPM (Ho et al., 2020) frames image generation as learning the reverse of the forward diffusion process. By iteratively denoising a Gaussian sample, the model recovers data without explicit likelihood computation or adversarial training, offering stability and mode coverage.</p>
   <p>The simplified MSE objective trains the model to predict noise, yielding strong empirical results on image benchmarks. DDPM demonstrated that diffusion could compete with GANs and VAEs, launching the modern era of diffusion-based generative models with applications across image, audio, and video synthesis.</p>`,

  `<p>Instead of predicting the mean directly, the model learns to predict the noise ε added at each step. This <em>ε-prediction</em> reparameterization simplifies the loss and improves sample quality compared to predicting variance. U-Net architecture with skip connections and multi-scale feature extraction dominates diffusion model backbones.</p>
   <p>U-Net designs employ downsampling, self-attention layers, and time embeddings to condition the network on timestep. Residual connections and layer normalization stabilize training. Cross-attention blocks enable conditioning on text prompts (as in Stable Diffusion) or other modalities, making the architecture flexible for guided generation tasks.</p>`,

  `<p>The reverse process learns p<sub>θ</sub>(x<sub>t−1</sub>|x<sub>t</sub>) to map noise back to data. The posterior mean and variance are derived analytically from the forward process, so the model learns only the mean, predicting it as a function of x<sub>t</sub> and timestep <em>t</em>. Sampling iterates from x<sub>T</sub> ∼ 𝒩(0, <strong>I</strong>) down to x₀.</p>
   <p>Variance scheduling (e.g., linear, cosine) controls the denoising trajectory. Learned variance with separate heads can improve likelihood, though fixed schedules work well empirically. The Markov structure enables efficient sequential sampling, making generation tractable despite <em>T</em> being large (typically 50–1000 steps).</p>`,

  `<p>The training objective is the variational lower bound (ELBO), which decomposes into multiple terms. The dominant term is reconstruction error at different noise levels, capturing how well the model predicts the noise distribution.</p>
   <p>The simplified MSE loss L_simple ignores coefficient schedules and trains on uniform timesteps, making optimization simpler while maintaining effectiveness. Connection to score matching reveals that the diffusion objective is equivalent to learning the score ∇<sub>x</sub> log p(x) under a noise-perturbed distribution, providing theoretical grounding in statistical physics and unifying with energy-based models.</p>`,

  `<p>Sampling <em>T</em> forward diffusion steps is slow. DDIM (Denoising Diffusion Implicit Models) skips steps by using a deterministic reverse process, reducing steps from 1000 to 20–50 while maintaining quality. DPM-Solver and other ODE-based methods use numerical solvers on the probability flow ODE, further accelerating sampling.</p>
   <p>Knowledge distillation transfers a large teacher model to a compact student, enabling real-time generation. Consistency models learn to map any noise level directly to clean data in a single step, trading accuracy for speed. Progressive acceleration, latent-space diffusion (operating in compressed VAE embeddings), and model caching all reduce computational cost, making diffusion practical for deployment.</p>`,

  `<p>Classifier guidance trains a separate model on noisy images to predict class labels, then uses gradients to steer the diffusion trajectory toward high-probability regions. This trade-off between fidelity and diversity is controlled by a scale parameter <em>w</em>. Higher <em>w</em> gives sharper, more class-aligned samples at the cost of reduced variety.</p>
   <p>Classifier-free guidance eliminates the need for a separate classifier by training the diffusion model conditionally (with and without labels). At inference, the model output is interpolated between unconditional and conditional predictions, achieving similar steering without extra parameters. This approach powers text-to-image models like Stable Diffusion, where text embeddings replace explicit class labels.</p>`,

  `<p>Stable Diffusion (Latent Diffusion) operates in VAE latent space, reducing computational cost while maintaining quality. DALL-E 3 and Imagen use diffusion for text-to-image synthesis at scale. Cascaded models first generate low-resolution images, then super-resolve with diffusion, improving efficiency and coherence.</p>
   <p>Diffusion extends to video (frame-by-frame or frame-interpolation), 3D (point clouds, meshes, NeRFs), and discrete data (text, graphs) via discrete diffusion or multinomial diffusion. Diffusion-based models now achieve state-of-the-art results across modalities, with applications in inpainting, editing, super-resolution, and beyond. The field continues to evolve with advances in speed, control, and multimodal synthesis.</p>`,

  `<p>Diffusion models have emerged as the dominant paradigm for generative modeling in the 2020s. This section compiles foundational papers, key methods, and resources for understanding forward and reverse processes, training objectives, and modern applications that have achieved state-of-the-art results across multiple domains.</p>
   <p>From DDPM to Stable Diffusion and beyond, these materials document the rapid evolution and widespread adoption of diffusion-based generative models.</p>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>Forward Process</h2></div>
   <p>The forward diffusion process is the cornerstone of all diffusion models. It progressively corrupts clean data by adding carefully scheduled Gaussian noise. This Markov chain is designed to be mathematically tractable and reversible in principle, providing the foundation for learning a reverse denoising process.</p>
   <p><strong>Variance Schedule.</strong> The process is governed by a noise schedule β₁, β₂, ..., β<sub>T</sub>, where each β<sub>t</sub> ∈ (0, 1) controls the amount of noise added at step <em>t</em>. Common schedules include linear (β<sub>t</sub> = β_min + (β_max − β_min)t/T), cosine (designed to keep signal-to-noise ratio smooth), and learned schedules. The cumulative product α̅<sub>t</sub> = ∏ᵢ₌₁^t (1 − β<sub>i</sub>) determines the signal retention at step <em>t</em>.</p>
   <p><strong>Marginal Distribution.</strong> Given x₀ ∼ p_data, the noisy version at step <em>t</em> satisfies:</p>
   <div class="diagram-wrap"><svg viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg"><text x="30" y="80" class="node-text">x_t = √(ᾱ_t) x_0 + √(1 − ᾱ_t) ε</text><text x="30" y="110" class="node-sub">where ε ~ N(0, I) is standard Gaussian</text><text x="30" y="140" class="node-sub">This reparameterization allows sampling x_t directly from x_0 without iteration</text></svg></div>
   <p><strong>Information Decay.</strong> As <em>t</em> increases, α̅<sub>t</sub> decreases exponentially, so the signal x₀ contribution shrinks. At <em>t</em> = <em>T</em>, we have α̅<sub>T</sub> ≈ 0, and x<sub>T</sub> is nearly pure Gaussian noise. The schedule is typically chosen such that q(x<sub>T</sub>) ≈ 𝒩(0, <strong>I</strong>), making sampling straightforward.</p>
   <p><strong>Posterior Distribution.</strong> The posterior q(x<sub>t−1</sub>|x<sub>t</sub>, x₀) is also Gaussian with mean and variance that depend on α̅ values. This closed-form posterior is crucial: it lets us compute the training target (what the reverse process should approximate) without sampling the entire chain during training.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Linear Schedule</h4><p>Simple to implement; starts slow, accelerates noise addition. Works well in practice for many datasets but can be suboptimal for high-resolution data.</p></div>
     <div class="feat"><h4>Cosine Schedule</h4><p>Keeps SNR (signal-to-noise ratio) decreasing smoothly. Often produces better sample quality than linear, especially for complex images.</p></div>
     <div class="feat"><h4>Learned Schedule</h4><p>Optimize β values during training. Rarely needed in practice; pre-defined schedules usually suffice and are more stable.</p></div>
     <div class="feat"><h4>Logarithmic Schedule</h4><p>Alternative smooth decay. Used in some models; trade-off between linear and cosine in terms of SNR profile.</p></div>
   </div>
   <h3>Signal-to-Noise Ratio</h3>
   <p>SNR<sub>t</sub> = α̅<sub>t</sub> / (1 − α̅<sub>t</sub>) measures the relative strength of signal vs. noise. Early steps have high SNR (mostly signal), late steps have low SNR (mostly noise). The schedule's monotonic decay ensures a smooth curriculum from easy (noisy) to hard (clean) denoising tasks during training. Understanding SNR helps tune schedules and interpret model behavior across timesteps.</p>`,

  `<div class="detail-header"><div class="num">02</div><h2>DDPM — Denoising Diffusion Probabilistic Models</h2></div>
   <p>DDPM, introduced by Ho, Jain, and Abbeel (2020), established diffusion models as a competitive generative approach. The key insight is that learning to reverse the forward diffusion process recovers a powerful generative model without adversarial training or explicit likelihood computation.</p>
   <p><strong>Model Formulation.</strong> The model learns p<sub>θ</sub>(x<sub>t−1</sub>|x<sub>t</sub>) as a Gaussian with fixed or learned variance. The posterior mean from the forward process provides the training target. The loss simplifies to predicting the noise ε added during the forward process, making optimization straightforward.</p>
   <p><strong>Simplified Objective.</strong> The original ELBO decomposes into three parts: (1) reconstruction loss at <em>t</em>=1, (2) forward KL divergences, and (3) constant terms. The simplified loss L_simple(θ) = 𝔼<sub>t,x₀,ε</sub>[||ε − ε<sub>θ</sub>(x<sub>t</sub>, t)||²] drops weighting coefficients and samples uniformly over <em>t</em>. This surprising simplification works because the coefficients approximately balance out, and uniform sampling avoids overfitting to early steps.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Simplicity</h4><p>No adversarial losses, no likelihood-free estimates. Training is stable and reliable, with fewer hyperparameters than GANs or autoregressive models.</p></div>
     <div class="feat"><h4>Mode Coverage</h4><p>Diffusion naturally covers all modes in the data distribution. Unlike GANs, mode collapse is not an issue, making diverse generation accessible.</p></div>
     <div class="feat"><h4>Flexibility</h4><p>Easily extended to conditional generation, controllable synthesis, and other tasks through conditioning mechanisms. No need for separate decoder networks.</p></div>
     <div class="feat"><h4>Computational Cost</h4><p>Requires many sampling steps (typically 1000) during inference, making generation slow compared to GANs. Acceleration techniques are essential for practical deployment.</p></div>
   </div>
   <h3>Empirical Results</h3>
   <p>DDPM achieved state-of-the-art Inception Scores and FID (Fréchet Inception Distance) on CIFAR-10 and CelebA, matching or exceeding GANs on these benchmarks. The quality-diversity trade-off (sample quality vs. variety) is smooth, controllable through the diffusion variance schedule and number of steps. Subsequent work showed that DDPM's simplicity and stability made it a natural foundation for scaling to high resolution and complex datasets.</p>`,

  `<div class="detail-header"><div class="num">03</div><h2>Noise Prediction — ε-prediction & U-Net Architecture</h2></div>
   <p>The core of most modern diffusion models is learning a neural network that predicts the noise ε added at each timestep. This reparameterization is mathematically equivalent to predicting the mean μ(x<sub>t</sub>, t) but empirically more stable and flexible.</p>
   <p><strong>Parameterization Choices.</strong> Three main options: (1) <em>x-prediction</em> (directly predict x₀ from x<sub>t</sub> and t), (2) <em>ε-prediction</em> (predict noise), (3) <em>v-prediction</em> (predict velocity in a transformed space). Each has trade-offs. ε-prediction is most common because it's numerically stable and works well with different noise schedules. x-prediction can improve early-step quality but may be less stable for high noise levels.</p>
   <div class="diagram-wrap"><svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">
     <text x="30" y="40" class="node-text" font-weight="bold">Noise Prediction Reparameterization</text>
     <text x="30" y="70" class="node-sub">Given x_t = √(ᾱ_t) x_0 + √(1 − ᾱ_t) ε:</text>
     <text x="30" y="100" class="node-sub">ε-prediction: ε_θ(x_t, t) learns to recover the noise</text>
     <text x="30" y="130" class="node-sub">x-prediction: x_θ(x_t, t) learns to recover x_0 = (x_t − √(1−ᾱ_t) ε_θ) / √(ᾱ_t)</text>
     <text x="30" y="160" class="node-sub">v-prediction: v_θ(x_t, t) learns direction in signal-noise space</text>
     <text x="30" y="190" class="node-sub">All are equivalent; choice affects optimization landscape and sample quality</text>
   </svg></div>
   <p><strong>U-Net Architecture.</strong> The standard backbone is a U-Net with skip connections, enabling multi-scale feature extraction. Key components: (1) downsampling blocks with convolutions and attention layers, (2) bottleneck at lowest resolution, (3) upsampling blocks that concatenate downsampling features via skip connections, (4) time embeddings injected into each block via sinusoidal positional encoding and linear projections, (5) optional cross-attention for conditioning on text or other modalities.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Skip Connections</h4><p>Directly pass high-resolution details from encoder to decoder, crucial for reconstructing fine spatial information and avoiding gradient vanishing.</p></div>
     <div class="feat"><h4>Self-Attention</h4><p>Captures long-range dependencies. Applied at reduced spatial resolution to save computation; enables the model to correlate distant spatial regions.</p></div>
     <div class="feat"><h4>Time Embedding</h4><p>Sinusoidal encoding (like transformers) projects timestep t into a fixed-dimensional vector, fused with features via normalization or concatenation.</p></div>
     <div class="feat"><h4>Cross-Attention</h4><p>Allows conditioning on external signals (text, class labels, images). Keys/values come from condition; queries from features. Essential for text-to-image models.</p></div>
   </div>
   <h3>Design Variations</h3>
   <p>Modern architectures explore alternatives: Vision Transformers (replacing convolutions with pure attention), DiT (Diffusion Transformer), and hybrid designs. Depth, width, attention resolution, and conditional fusion strategies vary by application. Architectural choices directly impact sample quality, training time, and memory usage. Most models still use convolution-based U-Nets for efficiency, though pure transformer backbones are increasingly competitive.</p>`,

  `<div class="detail-header"><div class="num">04</div><h2>Reverse Process — p<sub>θ</sub>(x<sub>t−1</sub>|x<sub>t</sub>)</h2></div>
   <p>The reverse diffusion process is the inverse of the forward corruption. Given a sample x<sub>t</sub> (noisy data) and a timestep <em>t</em>, the model predicts the one-step denoising distribution p<sub>θ</sub>(x<sub>t−1</sub>|x<sub>t</sub>). Chaining these steps from noise (t=T) to clean data (t=1) yields the final sample.</p>
   <p><strong>Learned Distribution.</strong> The reverse distribution is a Gaussian with mean μ<sub>θ</sub>(x<sub>t</sub>, t) and covariance Σ<sub>θ</sub>(x<sub>t</sub>, t). The mean is learned via the neural network (using noise prediction or x-prediction). The variance can be fixed (following the forward process schedule) or learned via an additional head. Fixed variance is simpler and empirically sufficient; learned variance adds parameters but rarely improves results significantly.</p>
   <p><strong>Denoising Step.</strong> One sampling step: x<sub>t−1</sub> = μ<sub>θ</sub>(x<sub>t</sub>, t) + √Σ<sub>θ</sub>(x<sub>t</sub>, t) z, where z ∼ 𝒩(0, <strong>I</strong>). At t=1 (the final step), no noise is added, giving deterministic x₀. A typical forward pass samples T steps, each reducing noise according to the learned schedule.</p>
   <div class="diagram-wrap"><svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg">
     <rect x="50" y="40" width="120" height="60" class="node"/><text x="110" y="75" class="node-text" text-anchor="middle">x_T ~ N(0,I)</text>
     <line x1="170" y1="70" x2="210" y2="70" class="edge-hi"/><text x="190" y="60" class="lbl-hi">t=T</text>
     <rect x="210" y="40" width="120" height="60" class="node"/><text x="270" y="75" class="node-text" text-anchor="middle">p_θ(x_{T-1}|x_T)</text>
     <line x1="330" y1="70" x2="370" y2="70" class="edge-hi"/><text x="350" y="60" class="lbl-hi">Step</text>
     <rect x="370" y="40" width="120" height="60" class="node"/><text x="430" y="75" class="node-text" text-anchor="middle">x_{T-1}</text>
     <text x="50" y="140" class="node-sub">...</text>
     <rect x="50" y="160" width="120" height="60" class="node"/><text x="110" y="195" class="node-text" text-anchor="middle">x_1</text>
     <line x1="170" y1="190" x2="210" y2="190" class="edge-hi"/><text x="190" y="180" class="lbl-hi">t=1</text>
     <rect x="210" y="160" width="120" height="60" class="node"/><text x="270" y="195" class="node-text" text-anchor="middle">p_θ(x_0|x_1)</text>
     <line x1="330" y1="190" x2="370" y2="190" class="edge-hi"/><text x="350" y="180" class="lbl-hi">Final</text>
     <rect x="370" y="160" width="120" height="60" class="node-hi"/><text x="430" y="195" class="node-text" text-anchor="middle">x_0 (sample)</text>
   </svg></div>
   <p><strong>Variance Schedule.</strong> The reverse variance is derived from the forward process. A simple choice is Σ<sub>θ</sub> = σ²<sub>t</sub> <strong>I</strong>, where σ²<sub>t</sub> is either fixed (using forward process variance) or learned via a separate network output. Fixed variance (σ²<sub>t</sub> = (1 − α<sub>t</sub>)/(1 − α̅<sub>t</sub>) β<sub>t</sub>) works surprisingly well and avoids overparameterization.</p>
   <p><strong>Sampling Trade-offs.</strong> More steps (larger T) give higher quality but slower generation. Fewer steps speed up inference but reduce quality (addressed by acceleration techniques like DDIM). The number of steps is a free hyperparameter that can be tuned per application. Early steps (low t) require precision (high SNR); later steps (high t) are more forgiving of errors.</p>`,

  `<div class="detail-header"><div class="num">05</div><h2>Training Objective — Variational Bound & MSE Loss</h2></div>
   <p>Diffusion models are trained to maximize a variational lower bound (ELBO) on the data log-likelihood. The bound decomposes into interpretable terms, each corresponding to a specific learning objective. Understanding this decomposition reveals the connection to score matching and energy-based models.</p>
   <p><strong>ELBO Decomposition.</strong> For a single data point x₀:</p>
   <div class="diagram-wrap"><svg viewBox="0 0 700 160" xmlns="http://www.w3.org/2000/svg">
     <text x="30" y="50" class="node-text">log p(x₀) ≥ 𝔼_q[−log q(x_T|x_0) + Σ_t log(p_θ(x_{t−1}|x_t)/q(x_t|x_{t−1},x_0))]</text>
     <text x="30" y="90" class="node-sub">Rearranging gives three terms:</text>
     <text x="30" y="120" class="node-sub">L_T (KL to prior) + Σ_t L_t (forward KL) + L_0 (reconstruction)</text>
   </svg></div>
   <p><strong>Simplified Loss.</strong> The full ELBO includes weighting coefficients for each term. DDPM's key insight is that the unweighted L_simple loss (MSE over noise prediction) is nearly equivalent to the full ELBO but much simpler:</p>
   <p class="callout"><strong>L_simple = 𝔼<sub>t,x₀,ε</sub>[||ε − ε<sub>θ</sub>(x<sub>t</sub>, t)||²]</strong></p>
   <p>This objective trains on uniform timesteps without special weighting. The coefficients in the full ELBO approximately cancel out across timesteps, making uniform weighting effective in practice. The simplification enabled stable scaling of diffusion models.</p>
   <h3>Connection to Score Matching</h3>
   <p>The diffusion objective is equivalent to learning the score function ∇<sub>x</sub> log p<sub>t</sub>(x), i.e., the gradient of the log-density of x<sub>t</sub>. Under a noise-perturbed distribution p<sub>t</sub>(x) = 𝔼[p(x₀)𝒩(x; √(ᾱ<sub>t</sub>) x₀, (1−ᾱ<sub>t</sub>)<strong>I</strong>)], the score ∇<sub>x</sub> log p<sub>t</sub>(x) is proportional to ε<sub>t</sub> / √(1−ᾱ<sub>t</sub>). Score matching minimizes 𝔼<sub>x~p<sub>t</sub></sub>[||∇ log p<sub>t</sub>(x) − ∇ log p<sub>θ</sub>(x)||²], which is equivalent to the diffusion loss under a change of variables. This connection unifies diffusion models with score-based generative models and energy-based approaches.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Interpretation</h4><p>Learning noise is equivalent to learning gradients of log-likelihood. Reveals deep connection between diffusion and statistical physics.</p></div>
     <div class="feat"><h4>Theoretical Grounding</h4><p>Score matching provides probabilistic interpretation. Diffusion is not just a heuristic but derived from principled objectives (variational inference, Langevin dynamics).</p></div>
     <div class="feat"><h4>Stability</h4><p>Uniform MSE loss is more stable than explicit KL terms. No need for importance weighting or curriculum learning (though they help).</p></div>
     <div class="feat"><h4>Scalability</h4><p>Simple loss enables efficient training on large datasets and models without careful coefficient tuning or special numerical tricks.</p></div>
   </div>
   <h3>Alternative Objectives</h3>
   <p>Some variants use weighted losses emphasizing different timesteps (e.g., focusing on SNR schedules), learned noise schedules, or auxiliary losses for likelihood bounds. These refinements rarely improve results significantly over L_simple, underscoring the robustness of the simplified objective. The simplicity of diffusion training is one reason for its widespread adoption over alternatives.</p>`,

  `<div class="detail-header"><div class="num">06</div><h2>Sampling Acceleration — DDIM, DPM-Solver & Distillation</h2></div>
   <p>Generating samples requires T forward passes (typically 50–1000 steps), making diffusion slow compared to one-shot generation like GANs. Multiple acceleration strategies trade quality for speed, enabling real-time or near-real-time generation.</p>
   <p><strong>DDIM (Denoising Diffusion Implicit Models).</strong> DDIM removes the noise injection from the reverse process, making it deterministic. Instead of the stochastic denoising step, DDIM uses a deterministic update that exactly reconstructs the DDPM trajectory at select timesteps. By skipping steps (sampling every k-th step), DDIM achieves 20–50x speedup with minimal quality loss. The trick is that the trajectory in x-space is nearly deterministic, so stochasticity is less important than solving the ODE accurately.</p>
   <div class="diagram-wrap"><svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
     <text x="30" y="50" class="node-text">DDPM vs. DDIM Sampling</text>
     <rect x="50" y="70" width="140" height="40" class="node"/><text x="120" y="95" class="node-text" text-anchor="middle">DDPM: Stochastic</text>
     <text x="50" y="130" class="node-sub">T steps, adds noise each step</text>
     <text x="50" y="150" class="node-sub">Quality depends on all steps</text>
     <text x="50" y="170" class="node-sub">Typical: T=1000 steps</text>
     <rect x="350" y="70" width="140" height="40" class="node"/><text x="420" y="95" class="node-text" text-anchor="middle">DDIM: Deterministic</text>
     <text x="350" y="130" class="node-sub">Skip steps, no noise injection</text>
     <text x="350" y="150" class="node-sub">Fast convergence in x-space</text>
     <text x="350" y="170" class="node-sub">Typical: T=20–50 steps</text>
   </svg></div>
   <p><strong>ODE-Based Solvers.</strong> The reverse process can be viewed as solving the probability flow ODE: dx/dt = f(x, t)θ − ½g(t)²∇<sub>x</sub> log p<sub>t</sub>(x). DPM-Solver and higher-order methods (RK45, exponential integration) solve this ODE with fewer function evaluations than naive steps. DPM-Solver matches DDPM quality with ~25 steps, a major speedup with no retraining needed.</p>
   <p><strong>Consistency Models.</strong> A newer approach trains a model to directly map any noise level x<sub>t</sub> to clean data x₀ in a single step. This requires solving a consistency constraint (the model's output must be the same regardless of the path in x-space). One-shot generation is possible, though quality is lower than iterative refinement. Combining consistency with iterative refinement (consistency training) balances speed and quality.</p>
   <div class="feat-grid">
     <div class="feat"><h4>DDIM</h4><p>Simple to implement; works with existing DDPM models. ~50x speedup; quality drops ~10–20% compared to full DDPM.</p></div>
     <div class="feat"><h4>DPM-Solver</h4><p>Higher-order ODE solver; ~25–30 steps match DDPM quality. Requires understanding the ODE; slightly more complex implementation.</p></div>
     <div class="feat"><h4>Consistency Models</h4><p>One-shot generation potential. Requires special training; current quality lags iterative methods, but improving. Promising for real-time applications.</p></div>
     <div class="feat"><h4>Latent Diffusion</h4><p>Operate in compressed VAE latent space (4x–8x smaller). Reduces computation without explicit step acceleration. Foundation of Stable Diffusion.</p></div>
   </div>
   <h3>Knowledge Distillation</h3>
   <p>Transfer a large teacher model to a compact student via supervised learning or reinforcement learning. The student learns to generate high-quality samples in fewer steps. Progressive distillation (halving steps per stage) is effective but requires careful tuning. Distillation enables deployment on edge devices, making diffusion practical for mobile and real-time applications.</p>`,

  `<div class="detail-header"><div class="num">07</div><h2>Conditional Generation — Classifier & Classifier-Free Guidance</h2></div>
   <p>Controlling the generation process is crucial for practical applications. Guidance techniques steer the diffusion trajectory toward high-probability regions of a desired class or condition, trading diversity for fidelity.</p>
   <p><strong>Classifier Guidance.</strong> A separate classifier p<sub>ψ</sub>(y|x<sub>t</sub>, t) predicts class label y from noisy image x<sub>t</sub>. During sampling, the reverse process is modified to ascend the gradient ∇<sub>x_t</sub> log p<sub>ψ</sub>(y|x<sub>t</sub>, t). This gradient steers x<sub>t</sub> toward regions where the classifier is confident about the target class.</p>
   <div class="diagram-wrap"><svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
     <text x="30" y="50" class="node-text">Classifier Guidance</text>
     <text x="30" y="85" class="node-sub">x_{t−1} = μ_θ(x_t, t) + σ_t z + s ∇_{x_t} log p_ψ(y|x_t, t)</text>
     <text x="30" y="115" class="node-sub">where s is the guidance scale (typical: s = 7.5)</text>
     <text x="30" y="145" class="node-sub">Higher s: stronger class alignment, lower diversity</text>
     <text x="30" y="175" class="node-sub">s = 0: unconditional; s → ∞: degenerate samples</text>
   </svg></div>
   <p><strong>Quality vs. Diversity Trade-off.</strong> The guidance scale s controls the strength. s = 0 gives unconditional diversity; s ≈ 7.5 balances class alignment and variety; s > 10 produces sharp but potentially unrealistic samples. The trade-off is smooth and tunable, unlike GANs where controlling diversity is harder. Different scales suit different applications (e.g., high s for product design, low s for creative generation).</p>
   <p><strong>Classifier-Free Guidance.</strong> Instead of training a separate classifier, the diffusion model itself is trained with occasional unconditional inputs (dropping the label/condition). At inference, the model output is interpolated between unconditional and conditional predictions:</p>
   <p class="callout"><strong>ẽ<sub>θ</sub> = e<sub>θ</sub>(x<sub>t</sub>, t, ∅) + s [e<sub>θ</sub>(x<sub>t</sub>, t, y) − e<sub>θ</sub>(x<sub>t</sub>, t, ∅)]</strong></p>
   <p>This achieves similar steering without extra parameters. The interpolation (controlled by s) blends unconditional and conditional predictions. Classifier-free guidance is the standard in text-to-image models (Stable Diffusion, DALL-E 3) due to its simplicity and effectiveness.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Classifier-Free Advantage</h4><p>No separate model needed; condition dropout is simple to implement. Works with any conditional diffusion model.</p></div>
     <div class="feat"><h4>Scale Interpretation</h4><p>s is a continuous parameter; users tune it for desired quality-diversity trade-off. Intuitive and flexible.</p></div>
     <div class="feat"><h4>Text Conditioning</h4><p>Replace class label with text embedding (from CLIP, etc.). Text-to-image generation is natural, enabling complex compositional descriptions.</p></div>
     <div class="feat"><h4>Multi-Modal Conditioning</h4><p>Combine text + class label + style embeddings. Multiple guidance scales (one per condition) provide fine-grained control.</p></div>
   </div>
   <h3>Advanced Guidance Strategies</h3>
   <p>Regional guidance (inpainting, editing): condition on parts of the image, regenerating others. Spatial guidance: steer specific image regions toward classes or attributes. Semantic guidance: using CLIP similarity or other semantic measures to guide generation toward linguistic descriptions. Negation ("avoid red") via negative guidance scales. The flexibility of diffusion's iterative structure enables rich conditioning without retraining.</p>`,

  `<div class="detail-header"><div class="num">08</div><h2>State of the Art — Stable Diffusion, DALL-E, Imagen, Video & Discrete Diffusion</h2></div>
   <p>Diffusion models have achieved state-of-the-art results across image, video, audio, and discrete data synthesis. Practical systems like Stable Diffusion and DALL-E demonstrate the maturity and scalability of the approach.</p>
   <p><strong>Stable Diffusion.</strong> Operates in the latent space of a pre-trained VAE, reducing computation 4–8x compared to pixel-space diffusion. Uses a U-Net conditioned on text embeddings (from CLIP) via cross-attention. Classifier-free guidance with s ≈ 7.5 balances quality and diversity. Its open-source release enabled widespread adoption, democratizing text-to-image generation. Key: latent space diffusion is crucial for handling 512×512 images efficiently.</p>
   <p><strong>DALL-E 3 & Imagen.</strong> DALL-E 3 combines diffusion with autoregressive decoding and advanced prompting techniques. Imagen (Google) uses a cascaded approach: generate low-resolution image via diffusion, then super-resolve to high resolution with additional diffusion models. Cascading improves efficiency (each stage handles smaller spatial dimensions) and coherence (high-res refinement respects content from low-res).</p>
   <div class="feat-grid">
     <div class="feat"><h4>Latent Diffusion (Stable)</h4><p>VAE compression reduces spatial resolution, enabling high-res synthesis. Trade-off: quality depends on VAE; rare artifacts if VAE reconstruction is imperfect.</p></div>
     <div class="feat"><h4>Text Conditioning</h4><p>CLIP embeddings capture semantic meaning. Long text descriptions work well; guidance strength controls photorealism vs. stylization.</p></div>
     <div class="feat"><h4>Cascaded Models</h4><p>Multi-stage (4×→64×→256×→1024×) generation. Faster and more coherent than single-stage; each stage can be optimized independently.</p></div>
     <div class="feat"><h4>Negative Prompts</h4><p>Specify what to avoid ("no watermark, no low quality"). Implemented via negative guidance scale; effective for filtering unwanted attributes.</p></div>
   </div>
   <h3>Video & 3D Diffusion</h3>
   <p>Video diffusion extends the model to the temporal domain. Approaches include (1) frame-by-frame generation with temporal consistency mechanisms, (2) 3D convolutions treating video as a spatial-temporal volume, (3) latent video diffusion (VAE → latent → diffusion → decode). Frame interpolation diffusion fills in between keyframes. 3D diffusion generates point clouds, meshes, and NeRFs, with applications in 3D asset creation and scene understanding.</p>
   <p><strong>Discrete Diffusion.</strong> For text, graphs, or other discrete data, multinomial diffusion or masked language models replace Gaussian noise. The forward process gradually corrupts data by randomly replacing tokens. The reverse process predicts the original token at each position. Discrete diffusion enables generative modeling of non-continuous modalities, extending the paradigm beyond images.</p>
   <h3>Current Capabilities & Limitations</h3>
   <p>Strengths: high-quality image synthesis, flexible conditioning, stable training, diverse output. Weaknesses: slow sampling (mitigated by acceleration), inability to generate very fine details in some cases (e.g., small text), sensitivity to prompt phrasing. Ongoing research addresses these: better schedulers, architectural improvements (transformers), distillation for speed, and hybrid approaches combining diffusion with other generative models (e.g., autoregressive refinement).</p>
   <p>Diffusion models are now the dominant approach for generative modeling across modalities. Their simplicity, scalability, and quality have made them the de facto standard for text-to-image, image editing, video generation, and beyond. The field continues to evolve rapidly, with advances in speed, control, and multimodal synthesis pushing boundaries toward more capable and efficient generation systems.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 09</div><h2>References & <em>Further</em> Reading</h2></div>
   <h3>Foundational Papers</h3>
   <ul>
    <li><a href="https://arxiv.org/abs/2006.11239" target="_blank">Denoising Diffusion Probabilistic Models (Ho et al, 2020)</a> — DDPM, the seminal work on practical diffusion models</li>
    <li><a href="https://arxiv.org/abs/2011.13456" target="_blank">Generative Modeling by Estimating Gradients of the Data Distribution (Song et al, 2020)</a> — Score-based view of diffusion</li>
   </ul>
   <h3>Key Concepts</h3>
   <ul>
    <li><strong>Forward Process</strong> — Markovian noise addition schedule transforming data to Gaussian noise</li>
    <li><strong>Reverse Process</strong> — Learned denoising network that inverts the forward process</li>
    <li><strong>Noise Prediction</strong> — Predicting noise component ε for efficient training</li>
    <li><strong>Variance Schedule</strong> — Controlling signal-to-noise ratio across timesteps</li>
    <li><strong>Evidence Lower Bound (ELBO)</strong> — Principled training objective derived from variational inference</li>
   </ul>
   <h3>Acceleration & Efficiency</h3>
   <ul>
    <li><strong>DDIM (Denoising Diffusion Implicit Models)</strong> — Faster sampling via non-Markovian reverse process</li>
    <li><strong>DPM-Solver</strong> — High-order numerical solvers for diffusion ODEs</li>
    <li><strong>Latent Diffusion</strong> — Diffusion in VAE latent space for computational efficiency</li>
    <li><strong>Distillation</strong> — Compressing T-step sampling to fewer steps via knowledge distillation</li>
   </ul>
   <h3>Conditioning & Control</h3>
   <ul>
    <li><strong>Classifier Guidance</strong> — Using class gradients to steer generation</li>
    <li><strong>Classifier-Free Guidance</strong> — Training conditional without explicit classifier</li>
    <li><strong>Cross-Attention Conditioning</strong> — Text embeddings in U-Net attention layers</li>
    <li><strong>ControlNet</strong> — Spatial control via auxiliary conditioning networks</li>
   </ul>
   <h3>Modern Applications</h3>
   <ul>
    <li><strong>Stable Diffusion</strong> — Latent diffusion with text-to-image conditioning</li>
    <li><strong>DALL-E 3 & Imagen</strong> — State-of-the-art text-to-image synthesis</li>
    <li><strong>Video Diffusion</strong> — Extending to temporal coherence and motion</li>
    <li><strong>Discrete Diffusion</strong> — Generative modeling for text and graphs</li>
   </ul>
   <h3>Learning Resources</h3>
   <ul>
    <li><a href="https://lilianweng.github.io/posts/2021-07-11-diffusion-models/" target="_blank">Lilian Weng: What are Diffusion Models?</a></li>
    <li><a href="https://deepgenerativemodels.github.io/" target="_blank">CS236: Deep Generative Models</a></li>
   </ul>`

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';

});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {

    topbar.classList.add('scrolled');

});

// ESC closes detail panel
