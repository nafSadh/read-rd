<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy-Based Models — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Energy Functions', title: '<em>Energy</em> Functions' },
  { num: '02', short: 'Boltzmann Distribution', title: '<em>Boltzmann</em> Distribution' },
  { num: '03', short: 'Training EBMs', title: '<em>Training</em> EBMs' },
  { num: '04', short: 'MCMC Sampling', title: '<em>MCMC</em> Sampling' },
  { num: '05', short: 'Restricted Boltzmann', title: '<em>Restricted</em> Boltzmann Machines' },
  { num: '06', short: 'Deep Boltzmann', title: 'Deep <em>Boltzmann</em> Machines' },
  { num: '07', short: 'Modern EBMs', title: '<em>Modern</em> EBMs' },
  { num: '08', short: 'EBM Connections', title: '<em>EBM</em> Connections' },
  { num: '09', short: 'References', title: 'References & <em>Further</em> Reading' }
];

const summaries = [
  // 01 Energy Functions
  `<p>Energy-based models (EBMs) define probability distributions through an energy function E(x). The probability of a data point x is proportional to the exponential negative energy: p(x) ∝ exp(−E(x)). This elegant formulation allows us to specify complex, unnormalized densities by designing energy functions that assign low energy to probable data and high energy to improbable data.</p>
  <p>The partition function Z normalizes the distribution: p(x) = exp(−E(x)) / Z, where Z = ∑_x exp(−E(x)). Computing Z is generally intractable for continuous high-dimensional spaces, which is why EBMs are often left unnormalized in practice. Energy functions can be learned as neural networks, transforming the model from probabilistic to implicit, enabling flexible density modeling without explicit likelihood evaluation.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">p(x) ∝ exp(−E(x))</div><div class="sl">Core Relation</div></div>
    <div class="st"><div class="sv">Z = ∑ exp(−E)</div><div class="sl">Partition Function</div></div>
    <div class="st"><div class="sv">Intractable</div><div class="sl">Normalization</div></div>
    <div class="st"><div class="sv">Implicit Models</div><div class="sl">NN-Parameterized</div></div>
  </div>`,

  // 02 Boltzmann Distribution
  `<p>The Boltzmann distribution originates from statistical mechanics, where energy E(x) is related to system states at thermal equilibrium. The distribution p(x) = exp(−E(x)/T) / Z depends on temperature T: as T → 0, probability concentrates on low-energy states; as T → ∞, all states become equally likely. This temperature parameter enables annealing strategies in sampling and provides an intuitive physical interpretation of model behavior.</p>
  <p>Free energy F(x) = −T log p(x) = E(x) − T log Z represents the thermodynamic cost of a state. Minimizing free energy corresponds to maximizing likelihood in machine learning. The Boltzmann framework connects probabilistic modeling to physics, allowing researchers to leverage decades of statistical mechanics insights. Temperature plays a crucial role in controlling the sharpness of the distribution and aids in escaping local minima during training.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Temperature Scaling</h4>
      <p>Higher T smooths distribution; lower T concentrates mass on modes. Enables simulated annealing.</p>
    </div>
    <div class="feat">
      <h4>Free Energy</h4>
      <p>F = E − T log Z unifies energy and entropy. Minimal free energy maximizes likelihood.</p>
    </div>
    <div class="feat">
      <h4>Thermal Equilibrium</h4>
      <p>System reaches stationary distribution; corresponds to optimal model fit given energy.</p>
    </div>
    <div class="feat">
      <h4>Physical Interpretation</h4>
      <p>Statistical mechanics provides intuition for training dynamics and model behavior.</p>
    </div>
  </div>`,

  // 03 Training EBMs
  `<p>Training EBMs is challenging because the partition function Z is intractable. Contrastive divergence (CD) approximates the gradient of log Z by running MCMC for a few steps from data samples, then correcting the bias. This speeds up training dramatically compared to exact likelihood estimation. Score matching provides an alternative: matching the score function ∇_x log p(x) directly without computing Z, sidestepping normalization entirely.</p>
  <p>Noise contrastive estimation (NCE) and its variants reformulate density estimation as classification: distinguishing data from noise. Modern approaches like noise contrastive estimation with exponential families and other divergence measures (f-divergence, Wasserstein) have been developed. Each method trades off computational cost, bias, and convergence properties. Practitioners often use contrastive divergence for its simplicity, though score matching and NCE offer theoretical advantages in certain settings.</p>
  <div class="callout">
    <h4>Key Training Methods</h4>
    <p>Contrastive divergence: fast approximation via short MCMC chains. Score matching: match gradients, avoid partition function. Noise contrastive estimation: reframe as classification task. Each balances tractability with statistical efficiency.</p>
  </div>
  <div class="s-stat">
    <div class="st"><div class="sv">Contrastive Divergence</div><div class="sl">Fast, Practical</div></div>
    <div class="st"><div class="sv">Score Matching</div><div class="sl">Gradient-Based</div></div>
    <div class="st"><div class="sv">Noise Contrastive</div><div class="sl">Classification</div></div>
    <div class="st"><div class="sv">Divergence Estimates</div><div class="sl">Flexible</div></div>
  </div>`,

  // 04 MCMC Sampling
  `<p>Sampling from EBMs requires Markov chain Monte Carlo (MCMC) because we cannot directly draw samples. Langevin dynamics use the score function (gradient of log-density) to guide a random walk: x_{t+1} = x_t + (ε/2) ∇_x log p(x_t) + √ε · z_t, where ε is step size and z_t is Gaussian noise. This converges to the target distribution as ε → 0 and t → ∞. Hamiltonian Monte Carlo (HMC) augments state with momentum, enabling larger steps and faster mixing, crucial for high-dimensional problems.</p>
  <p>Mixing time—how quickly MCMC forgets initialization—and burn-in (discarding initial samples) are critical practical concerns. Slow mixing can make sampling prohibitively expensive. Advanced techniques like parallel tempering, reversible jump, and replica-exchange methods accelerate mixing. Practitioners must diagnose convergence carefully via diagnostics (autocorrelation, Gelman–Rubin statistic). Understanding MCMC properties is essential for reliable EBM use, as poor sampling corrupts training and evaluation.</p>
  <div class="timeline">
    <div class="tl-item">
      <div class="tl-date">Initialization</div>
      <div class="tl-text">Start from arbitrary x₀; run MCMC for burn-in steps.</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Langevin Dynamics</div>
      <div class="tl-text">Gradient-guided random walk; converges for small step size.</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Hamiltonian MC</div>
      <div class="tl-text">Momentum-based; larger steps, faster mixing than Langevin.</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Diagnostics</div>
      <div class="tl-text">Check convergence; assess effective sample size post-burn-in.</div>
    </div>
  </div>`,

  // 05 Restricted Boltzmann Machines
  `<p>Restricted Boltzmann machines (RBMs) are bipartite graphical models with visible units v and hidden units h. The energy function E(v,h) = −v^T W h − b^T v − c^T h couples visible and hidden variables through weight matrix W, while lacking intra-layer connections. This bipartite structure is key: given visible units, hidden units are conditionally independent, and vice versa. p(h|v) and p(v|h) factor into independent Bernoulli distributions, enabling efficient block Gibbs sampling.</p>
  <p>RBMs serve as building blocks for deeper models and as standalone density models. Training uses contrastive divergence: sample h from p(h|v_data), then sample v' from p(v|h), then h' from p(h|v'). The weight update is proportional to v_data ⊗ h − v' ⊗ h', contrasting data-driven and model-driven statistics. While largely superseded by modern deep learning, RBMs remain pedagogically important and are still used in some applications, especially when interpretability of latent structure is valued.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Strengths</h4>
      <ul>
        <li>Tractable conditional distributions; fast sampling.</li>
        <li>Interpretable latent features in hidden layer.</li>
        <li>Solid theoretical foundation; well-studied dynamics.</li>
        <li>Useful for pre-training deep networks (if training needed).</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Limitations</h4>
      <ul>
        <li>Bipartite structure limits expressiveness.</li>
        <li>Contrastive divergence introduces bias.</li>
        <li>Limited by discrete units; extension to continuous non-trivial.</li>
        <li>Fewer parameters than modern neural networks.</li>
      </ul>
    </div>
  </div>`,

  // 06 Deep Boltzmann Machines
  `<p>Deep Boltzmann machines (DBMs) stack multiple layers of hidden units, forming a fully-connected hierarchical structure. Unlike DBNs (deep belief networks with directed connections), DBMs are undirected. The energy function couples all layers: E = −v^T W^(1) h^(1) − h^(1,T) W^(2) h^(2) − .... Inference becomes intractable: conditioning on visible units does not marginalize hidden-layer dependencies. Variational inference uses mean-field approximations, treating each hidden unit's posterior as an independent Bernoulli with parameters updated iteratively.</p>
  <p>Training DBMs is complex: greedy pre-training followed by variational EM. Mean-field updates iterate until convergence at each training step, adding computational overhead. Despite advantages in learning hierarchical representations, DBMs have fallen out of favor compared to deep autoencoders and variational autoencoders due to training difficulty and similar expressiveness. However, they offer theoretical insights into hierarchical probabilistic modeling and remain relevant for understanding energy-based deep learning.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Undirected Hierarchy</div><div class="sl">Fully Connected</div></div>
    <div class="st"><div class="sv">Mean-Field Inference</div><div class="sl">Variational</div></div>
    <div class="st"><div class="sv">Greedy Pre-Training</div><div class="sl">Initialization</div></div>
    <div class="st"><div class="sv">Complex Training</div><div class="sl">High Computation</div></div>
  </div>`,

  // 07 Modern EBMs
  `<p>Modern EBMs leverage neural networks as flexible energy function approximators. Instead of explicit latent structures (RBM/DBM), the energy E_θ(x) is a learnable neural network, often a CNN or ResNet. This enables implicit generative modeling: sample via MCMC without a tractable posterior. Stochastic gradient Langevin dynamics (SGLD) adds noise to gradient updates, allowing samples to be drawn efficiently from a mini-batch without full dataset MCMC.</p>
  <p>Joint energy models (JEM) unify discriminative (classification) and generative (density) modeling in a single framework. The same energy function supports both: E_θ(x, y) guides classification via −∇_x E(x|y), while ∇_x E(x) supports generation. Recent work explores connections to score-based models (diffusion models), where the score function ∇_x log p(x) is directly learned via score matching, avoiding explicit energy function design. Auto-regressive flows and other neural density estimators provide complementary approaches, though EBMs offer unique advantages in flexible density specification and control via energy design.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Implicit Generative Models</h4>
      <p>Neural network energy functions; sample via MCMC Langevin dynamics.</p>
    </div>
    <div class="feat">
      <h4>SGLD Sampling</h4>
      <p>Stochastic gradient Langevin dynamics; mini-batch compatible, noise-stabilized.</p>
    </div>
    <div class="feat">
      <h4>Joint Energy Models</h4>
      <p>Unified discriminative and generative; same energy for both tasks.</p>
    </div>
    <div class="feat">
      <h4>Score-Based Models</h4>
      <p>Learn ∇_x log p directly via score matching; connection to diffusion.</p>
    </div>
  </div>`,

  // 08 EBM Connections
  `<p>Energy-based models connect deeply to score-based generative models: the score function ∇_x log p(x) is the gradient of the log energy. Denoising score matching trains a neural network to predict ∇_x log p(x) by matching the score under added noise. Diffusion models learn scores at multiple noise scales, effectively learning a trajectory backward through noise. The connection reveals that diffusion models are implicitly learning energy landscapes across scales, bridging EBMs and modern generative AI.</p>
  <p>Classifier guidance (conditional generation) leverages classifier gradients to shape the energy landscape. A classifier score ∇_x log p(y|x) can be combined with unconditional scores to steer sampling toward desired classes. Score-based models have achieved state-of-the-art generation quality, suggesting energy-based thinking remains central to deep generative modeling. Future directions include better understanding MCMC sampling for high-dimensional EBMs, hybrid approaches combining explicit energy functions with learned scores, and applications to structured prediction and reasoning tasks where explicit energy design provides interpretability advantages.</p>
  <div class="callout">
    <h4>Theoretical Unification</h4>
    <p>EBMs, diffusion models, and score-based approaches are fundamentally aligned: all learn probability distributions through energy or score functions. Modern generative AI extensively leverages these principles, emphasizing the enduring importance of energy-based thinking for understanding deep learning.</p>
  </div>
  <div class="s-stat">
    <div class="st"><div class="sv">Score Functions</div><div class="sl">∇_x log p</div></div>
    <div class="st"><div class="sv">Denoising Score Match</div><div class="sl">Training Signal</div></div>
    <div class="st"><div class="sv">Diffusion Models</div><div class="sl">Noisy Schedules</div></div>
    <div class="st"><div class="sv">Classifier Guidance</div><div class="sl">Conditional Control</div></div>
  </div>`,

  // 09 References
  `<p>Energy-based models provide a powerful framework connecting statistical physics, probabilistic inference, and modern deep learning. This section compiles key references for understanding energy functions, Boltzmann machines, and recent resurgence of EBMs in generative modeling.</p>
   <p>From foundational theory to contemporary applications, these materials document how EBMs complement and connect to VAEs, diffusion models, and score-based approaches.</p>`
];

const details = [
  // 01 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 01</div>
    <h2><em>Energy</em> Functions</h2>
  </div>
  <p>Energy-based models define a probability distribution implicitly through an energy function E(x). The core principle is the Boltzmann relation: p(x) ∝ exp(−E(x)). This means high-probability regions correspond to low-energy configurations, and vice versa. The unnormalized form sidesteps the partition function Z, which is generally intractable to compute or estimate.</p>
  <p>Formally, the normalized distribution is p(x) = exp(−E(x)) / Z where Z = ∫ exp(−E(x)) dx (or ∑ for discrete x). Computing Z requires integrating (or summing) over all possible states, which is exponentially hard in dimension. For high-dimensional continuous spaces, this is almost always infeasible, making EBMs inherently unnormalized.</p>
  <p>Energy functions can be arbitrary differentiable mappings. A simple quadratic form E(x) = ½ x^T Σ^{−1} x recovers a Gaussian density. More complex energies capture multi-modal, heavy-tailed, or otherwise intricate distributions. When parameterized by neural networks E_θ(x), the model becomes implicit: we specify no explicit generative process, only an energy landscape. Sampling then requires MCMC, making generation slower than autoregressive or flow-based models but offering flexibility in density design.</p>
  <p>The key challenge is training: how do we adjust θ to fit data p_data(x)? The maximum likelihood gradient ∇_θ log p(x_data) = −∇_θ E_θ(x_data) + 𝔼_{p_θ}[∇_θ E_θ(x)]. The first term pushes energy down on data; the second involves expectations under the model, requiring sampling. This sample-dependency makes training fundamentally different from supervised learning and motivates techniques like contrastive divergence, score matching, and NCE to approximate these gradients efficiently.</p>
  <h3>Energy Design Principles</h3>
  <p>Design energy functions to be smooth, avoiding sharp discontinuities that complicate sampling. Ensure the energy landscape has a minimum-energy solution that represents the target distribution. Add regularization (e.g., L2 on weights) to prevent unbounded energy scaling. When using neural networks, architecture (depth, width, skip connections) affects expressiveness and optimization landscape.</p>
  <h3>Computational Considerations</h3>
  <p>Forward pass (computing E(x)) is typically fast (single neural network evaluation). The bottleneck is sampling: MCMC chains must mix well. For high-dimensional data (images, text), poor mixing means expensive training. Pre-training or better initialization helps. Hybrid approaches combining learned energy with auxiliary latent variables (e.g., variational EBMs) can accelerate both training and sampling.</p>`,

  // 02 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 02</div>
    <h2><em>Boltzmann</em> Distribution</h2>
  </div>
  <p>The Boltzmann distribution p(x) = exp(−E(x)/T) / Z stems from equilibrium statistical mechanics. In this context, E is a physical energy, T is absolute temperature, and the distribution describes the probability of microstates at thermal equilibrium. The factor 1/T controls how sharply the distribution concentrates on low-energy states: as T → 0, probability mass accumulates at the global minimum; as T → ∞, all states become nearly equiprobable.</p>
  <p>Setting T = 1 (without loss of generality in probabilistic models) recovers our standard form. But temperature is useful conceptually: during simulated annealing, we start with high T (broad, exploratory distribution) and gradually decrease T, sharpening toward the mode. This helps escape local minima in both sampling and optimization. Temperature also appears in tempering methods for MCMC, where parallel chains at different temperatures exchange information to improve mixing.</p>
  <p>Free energy F(x) = −T log p(x) = E(x) − T log Z captures the thermodynamic cost of a state. Minimizing F with respect to x at fixed T is equivalent to maximum likelihood under p_θ. The entropy term T log Z reflects the statistical complexity: more probable states have lower free energy. This framework unifies machine learning (maximize likelihood = minimize free energy) with physics, providing intuition and enabling transfer of techniques from statistical mechanics to deep learning.</p>
  <p>Variational Bayes and mean-field methods use free energy to derive tractable approximations. The KL divergence between an approximate and true posterior is related to a variational free energy bound. Many modern machine learning algorithms (VAE, belief propagation) minimize variational bounds on free energy. This deep connection means understanding Boltzmann distributions strengthens intuition for probabilistic inference generally.</p>
  <h3>Temperature and Phase Transitions</h3>
  <p>In some models, varying T reveals phase transitions: qualitative changes in the distribution's structure. The critical temperature marks transitions between behaviors (e.g., order-disorder in spin systems). While less prominent in deep learning models, phase transitions in neural networks have been observed, highlighting complex energy landscapes shaped by network architecture and data.</p>
  <h3>Connection to Thermodynamic Limit</h3>
  <p>Statistical mechanics studies limits as system size N → ∞. Free energy per unit F/N becomes well-defined (self-averaging). In machine learning, this perspective suggests studying how learned distributions behave as data dimension and model capacity grow. Large-N limits often exhibit rich behavior: critical phenomena, emergent structure, robustness properties.</p>`,

  // 03 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 03</div>
    <h2><em>Training</em> EBMs</h2>
  </div>
  <p>The fundamental challenge in EBM training is the intractable partition function. The maximum likelihood gradient is ∇_θ log p_θ(x) = −∇_θ E_θ(x) + 𝔼_{p_θ}[∇_θ E_θ(x)]. The second term requires sampling from the model p_θ, which is expensive. Exact sampling is infeasible, so we use MCMC approximations, introducing bias that must be managed or explicitly corrected.</p>
  <p>Contrastive divergence (CD) sidesteps this by running MCMC for just k steps from data (k-step CD, typically k=1). Start with x ~ p_data, run k MCMC steps to get x', then update weights as if the MCMC chain has converged. This introduces bias (the chain is undersampled), but the bias becomes small for short chains and smooth energy landscapes. CD is fast and practical, making it the de facto standard for RBM and early EBM training. Variants like persistent CD maintain a chain across iterations, further reducing bias.</p>
  <p>Score matching avoids sampling by directly learning the score function ∇_x log p(x). Minimizing 𝔼_x[‖∇_x log p_θ(x) − ∇_x log p_data(x)‖²] requires access to the true score, often estimated via finite differences or using a pre-trained kernel. Denoising score matching adds noise to data and matches the score under noisy distribution, circumventing the need for true score estimation. This approach naturally connects to diffusion models and has proven highly effective in modern generative modeling.</p>
  <p>Noise contrastive estimation (NCE) reformulates density estimation as binary classification: discriminate data from noise samples. Given a noise distribution p_n, NCE maximizes 𝔼_data[log σ(E_θ(x))] + 𝔼_noise[log(1 − σ(E_θ(x)))], where σ is sigmoid. Under certain conditions, this recovers a consistent estimator of p(x). Variants using different divergences (f-divergence, Wasserstein) have been proposed, offering flexibility in training objectives.</p>
  <h3>Mini-Batch Training with Replay Buffer</h3>
  <p>In practice, MCMC chains are expensive to restart from scratch each iteration. A replay buffer maintains a pool of samples from previous iterations, initialized once and reused. New samples are drawn from the buffer, MCMC-updated a few steps, then returned to buffer. This amortizes computational cost and improves stability by maintaining diverse samples across batches.</p>
  <h3>Divergence and Regularization</h3>
  <p>Without regularization, energy can scale arbitrarily (e.g., E_θ(x) → −∞ for all x). Add L2 regularization on weights, entropy regularization on the energy, or normalize energy magnitudes. Some methods use constrained optimization to keep energy bounded. Proper regularization is crucial for stability and preventing mode collapse in EBM training.</p>`,

  // 04 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 04</div>
    <h2><em>MCMC</em> Sampling</h2>
  </div>
  <p>Sampling from an unnormalized EBM p(x) ∝ exp(−E(x)) requires Markov chain Monte Carlo. MCMC constructs a reversible chain whose stationary distribution is p(x). The Metropolis-Hastings algorithm is general: propose a new state via a proposal distribution q(x' | x), then accept with probability min(1, p(x') q(x|x') / (p(x) q(x'|x))). Rejected proposals stay at current state, preserving the chain's Markovian property.</p>
  <p>For EBMs with continuous state spaces and smooth energies, Langevin dynamics is highly effective. The update is x_{t+1} = x_t + (ε/2) ∇_x log p(x_t) + √ε · z_t, where z_t ~ N(0, I) and ε is step size. As ε → 0 and t → ∞, the chain converges to p(x) (under mild conditions). Langevin is computationally efficient: only one energy evaluation and gradient per step. The gradient ∇_x E(x) points downhill; noise enables exploration and prevents modes from fully attracting chains.</p>
  <p>Hamiltonian Monte Carlo (HMC) augments state with auxiliary momentum variables, enabling larger steps and faster mixing. The dynamics follow Hamiltonian equations, combining potential energy E(x) and kinetic energy K(p) = ½ p^T M^{−1} p. A leapfrog integrator discretizes dynamics with step size ε. Proposals are accepted via Metropolis-Hastings. HMC is more complex than Langevin but mixes much faster (fewer correlated samples), critical for high-dimensional problems.</p>
  <p>Mixing time is how quickly the chain forgets initialization. Fast mixing (low autocorrelation) means shorter burn-in and higher effective sample size. Slow mixing (high autocorrelation) wastes samples and can make sampling prohibitively expensive. Diagnosing mixing requires autocorrelation plots, effective sample size computation, and multiple-chain diagnostics (Gelman–Rubin ̂R statistic). Poor mixing often signals model problems (ill-specified energy, wrong temperature) or algorithmic issues (step size too small).</p>
  <h3>Parallel Tempering and Replica Exchange</h3>
  <p>Run multiple chains at different temperatures T_1 < T_2 < ... < T_K (hot chains have smoother, flatter energy landscapes). Periodically exchange states between adjacent chains; hotter chains mix faster and can help colder chains escape local minima. This dramatically improves effective mixing, especially for multimodal distributions. Replica exchange methods are more general and apply to other sampling algorithms.</p>
  <h3>Burn-In and Equilibration</h3>
  <p>Initial samples depend on starting point and should be discarded (burn-in phase). Adaptive methods adjust step size during burn-in to achieve optimal acceptance rates. In Langevin, step sizes are often tuned to achieve ~50% acceptance (though optimal is higher). Properly configured burn-in is essential for valid inference; underbilled burn-in biases estimates toward initial conditions.</p>`,

  // 05 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 05</div>
    <h2><em>Restricted</em> Boltzmann Machines</h2>
  </div>
  <p>Restricted Boltzmann machines are bipartite graphical models: visible units v ∈ {0,1}^n and hidden units h ∈ {0,1}^m. The energy function is E(v,h) = −v^T W h − b^T v − c^T h, where W is an n × m weight matrix, b and c are biases. The restriction: no connections within layers (no v_i − v_j or h_i − h_j edges). This bipartite structure ensures a critical property: given visible units, hidden units are conditionally independent, and vice versa.</p>
  <p>The conditional distributions factor: p(h|v) = ∏_i p(h_i|v), p(v|h) = ∏_j p(v_j|h). Each p(h_i = 1|v) = σ(c_i + ∑_j W_{ij} v_j) and p(v_j = 1|h) = σ(b_j + ∑_i W_{ij} h_i), where σ is sigmoid. These conditionals are Bernoulli, computable in O(n + m) time. Block Gibbs sampling—alternately resampling all h given v, then all v given h—is efficient and provides a tractable sampling algorithm.</p>
  <p>Training RBMs uses contrastive divergence with block Gibbs. Start with v_data from training set. (1) Sample h ~ p(h|v_data). (2) Sample v' ~ p(v|h). (3) Sample h' ~ p(h|v'). Weight update: ΔW ∝ v_data ⊗ h − v' ⊗ h' (and analogously for biases). This contrasts statistics under the data distribution (v_data ⊗ h) with model statistics (v' ⊗ h'). The update drives weights to increase model probability on data and decrease it elsewhere.</p>
  <p>RBMs were pivotal in the deep learning renaissance (Hinton et al., 2006). Stacking RBMs greedily (training each layer using hidden units of the previous as visible units) provided a pre-training strategy for deep networks, addressing the vanishing gradient problem of the time. While modern techniques (batch norm, ReLU, skip connections) have obviated the need for RBM pre-training in many applications, RBMs remain theoretically important and useful when interpretability of latent features is desired.</p>
  <h3>Gaussian RBMs and Extensions</h3>
  <p>Extending RBMs to continuous visible units (Gaussian RBMs) involves modifying conditionals: v follows a Gaussian, h remains Bernoulli. The energy becomes E(v,h) = ½ v^T Λ^{−1} v − v^T W h − b^T v − c^T h. Training procedure is similar but requires handling Gaussian variables. More complex extensions (mixed Bernoulli-Gaussian, spike-and-slab) increase expressiveness but complicate inference and training.</p>
  <h3>Applications and Modern View</h3>
  <p>Modern use of RBMs: collaborative filtering (Netflix Prize context), feature learning for downstream tasks, anomaly detection, and theoretical study. They serve as building blocks in energy-based models, often paired with other techniques. The RBM literature is rich with insights on graphical models, sampling, and probabilistic inference that generalize beyond RBMs themselves.</p>`,

  // 06 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 06</div>
    <h2>Deep <em>Boltzmann</em> Machines</h2>
  </div>
  <p>Deep Boltzmann machines extend RBMs to multiple layers of hidden units. Energy function: E = −v^T W^(1) h^(1) − h^(1,T) W^(2) h^(2) − ... − h^(K−1,T) W^(K) h^(K) − b^T v − ∑_k c_k^T h^(k). Unlike RBMs (which have two layers) or DBNs (directed hierarchy), DBMs are fully undirected. All coupling is through weight matrices; no intra-layer edges.</p>
  <p>Inference in DBMs is intractable: p(h|v) does not factor simply. Marginalize hidden units: p(h^(k)|v, h^(−k)) involves expectations over other hidden layers, creating dependencies. Variational inference approximates the posterior using a mean-field assumption: q(h|v) = ∏_k ∏_i q(h_i^(k)|v). Each q(h_i^(k) = 1|v) = σ(updates), where updates depend on layer-specific messages. Iterative updates (mean-field messages) propagate until convergence, approximating the true posterior.</p>
  <p>Training uses variational EM: E-step computes mean-field approximation of posterior over all hidden units; M-step updates weights to maximize expected complete-data likelihood. Each M-step requires gradient computation, and the E-step is iterative, making training slow. Pre-training each layer as an RBM (greedy layer-wise pre-training) provides initialization. Despite slower training, DBMs can learn hierarchical representations where higher layers capture abstract, increasingly invariant features.</p>
  <p>DBMs have been applied to image generation, feature learning, and modeling complex dependencies. However, they have largely been eclipsed by alternatives: VAEs offer stable training, autoregressive models and flows provide tractable likelihoods, and diffusion models achieve state-of-the-art sample quality. Nevertheless, DBMs offer unique theoretical insights: they show how to stack energy-based layers, the importance of mean-field approximation in inference, and tradeoffs between model expressiveness and training tractability.</p>
  <h3>Pre-Training and Initialization</h3>
  <p>Greedy pre-training: train DBM layer 1 (v, h^(1)) as RBM, then treat h^(1) as visible and train (h^(1), h^(2)) as RBM, etc. This initialization avoids poor local minima and accelerates convergence. However, it's computationally expensive and must be coordinated carefully to ensure coherence across layers. Modern deep learning usually skips pre-training in favor of better optimizers and architectures.</p>
  <h3>Relation to Other Hierarchical Models</h3>
  <p>DBNs (deep belief networks) are partly directed, partly undirected, offering a middle ground. Autoencoders and VAEs provide deterministic or variational hierarchies with explicit encoder-decoder structure. Normalizing flows stack invertible transformations. Each approach trades off tractability (compute likelihood?), expressiveness, and interpretability (can we visualize learned features?).</p>`,

  // 07 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 07</div>
    <h2><em>Modern</em> EBMs</h2>
  </div>
  <p>Modern EBMs use neural networks E_θ(x) as flexible energy function approximators, without explicit latent structure (unlike RBMs/DBMs). The network output is a scalar energy. For images, architectures like ResNets or U-Nets capture spatial structure. The model remains implicit: no sampling mechanism is built in; sampling requires MCMC. Inference (both training and generation) involves Langevin dynamics or HMC, scaling these algorithms to high dimensions via learned energy parametrizations.</p>
  <p>Stochastic gradient Langevin dynamics (SGLD) extends Langevin to mini-batch training. On each iteration, sample a mini-batch, compute ∇_x E_θ(x_t) on that batch (biased estimate of full gradient), then apply x_{t+1} = x_t − (ε/2) ∇_x E_θ(x_t) + √ε · z_t. The noise term is crucial: it compensates for mini-batch bias, ensuring the chain converges to the correct distribution (under conditions). SGLD is practical for large-scale data and has been applied to image generation, achieving reasonable quality with deep ResNets as energy functions.</p>
  <p>Joint Energy Models (JEMs) unify discriminative and generative objectives. A single energy function E_θ(x, y) describes both: for discriminative tasks, compute log p(y|x) = E_θ(x, y=0) − E_θ(x, y=1) (relative energy difference); for generative tasks, sample from p(x) via Langevin on ∇_x E_θ(x). Training combines supervised classification loss (with data labels) and unsupervised density matching (with generated samples). JEMs achieve reasonable classification and generation without separate architectures, though performance is typically worse than specialized models.</p>
  <p>Connections to modern generative modeling abound. Diffusion models learn score functions ∇_x log p_t(x) at multiple noise scales via score matching. This is equivalent to learning energy landscapes {E_t}. Noise-conditional score networks (trained to predict noise given corrupted image) implicitly learn scaled energies. The connection reveals that diffusion—a dominant modern approach—is inherently energy-based, learning probability densities through energy (or score) functions. This unification suggests future directions: hybrids of EBMs and diffusion, conditional EBMs for structured prediction, and using energy design for interpretability in deep generative models.</p>
  <h3>Why Neural Network Energies?</h3>
  <p>Parametric energies offer flexibility: design a network for your data structure (CNN for images, Transformer for sequences). Neural networks are universal approximators; with enough capacity, any energy landscape can be learned. This contrasts with hand-crafted energies (e.g., Ising model form), which are rigid but interpretable. The tradeoff: flexibility vs. interpretability.</p>
  <h3>Computational Bottlenecks</h3>
  <p>MCMC sampling is slow, especially for high-resolution images or long sequences. Techniques to address this: (1) Better initialization (start from previous samples or noise in replay buffer). (2) Hybrid approaches (combine with learned denoiser). (3) Better MCMC (HMC, parallel tempering, ensemble methods). (4) Approximations (few Langevin steps, approximate gradients). Each trades off sample quality for speed.</p>`,

  // 08 Details
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 5 10 11 1"></polyline></svg> Section 08</div>
    <h2><em>EBM</em> Connections</h2>
  </div>
  <p>The score function ∇_x log p(x) is fundamentally an energy gradient: ∇_x log p(x) = −∇_x E(x) (up to constants). Learning the score is equivalent to learning the energy landscape's shape. Score matching minimizes 𝔼_x[‖∇_x log p_θ(x) − ∇_x log p_data(x)‖²], directly fitting score functions. Denoising score matching corrupts data with noise σ, trains a network to predict ∇_x log p_data(x + noise | noise), then uses this to approximate the true score. This clever trick sidesteps the need for true data scores.</p>
  <p>Diffusion models train score networks at multiple noise scales. Start with data, progressively add Gaussian noise over T timesteps, then reverse the process by learning ∇_x log p_t(x) at each scale t. The reverse diffusion process (removing noise iteratively) samples from p(x). Since each step is a slight perturbation, sampling is stable. Deep generative models based on diffusion (DDPM, EDM, etc.) have achieved state-of-the-art sample quality, suggesting score-based approaches are highly effective.</p>
  <p>The connection: diffusion models are learning energy landscapes across noise scales. The score ∇_x log p_t(x) at scale t encodes the direction of maximum likelihood under noisy distribution p_t. The sequence {∇_x log p_t} as t decreases from T to 0 forms a gradient field guiding samples from noise toward data. This is precisely energy-based thinking applied across scales: use energy/score information to navigate high-dimensional spaces.</p>
  <p>Classifier guidance leverages classifier score gradients to shape generation. If we have a classifier p(y|x), its score ∇_x log p(y|x) indicates regions where class y is probable. Combining unconditional score ∇_x log p(x) with classifier guidance ∇_x log p(y|x) yields ∇_x log(p(x) p(y|x)^τ), focusing samples on x that are both realistic and likely to belong to class y. The guidance strength τ controls conditioning strength. This technique has proven powerful for conditional generation in diffusion models, further validating energy/score-based approaches.</p>
  <h3>Hybrid Approaches: EBMs + Diffusion</h3>
  <p>Combining explicit energy functions with diffusion-based sampling: train an energy network E_θ(x), then use SGLD or similar at different noise scales to generate samples. Alternatively, distill diffusion model gradients into an energy function for faster sampling. Such hybrids leverage strengths of both: energy design provides interpretability and control, diffusion provides stable training and sampling.</p>
  <h3>Future Directions</h3>
  <p>Applications to structured prediction (learn energy over both inputs and outputs, use optimization at test time to find best output). Interpretability (design energies for domain knowledge, e.g., enforcing constraints). Continual learning and adaptation (adjust energy function as new data arrives). Combining with symbolic reasoning (energy-based models for logic, planning). The enduring principle—specify distributions through energy or score functions—will likely remain central to generative modeling and beyond.</p>`,

  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
</body>
</html>
