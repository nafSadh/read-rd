<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Introduction to Generative Models — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

    <h2>What Are <em>Generative</em> Models</h2>
   </div>
   <p>A generative model <code>p_θ(x)</code> estimates the probability distribution of observed data. Unlike discriminative models that learn <code>p(y|x)</code>, generative models learn the full joint distribution, enabling both inference and sample synthesis. This fundamental difference opens entire research directions unavailable to supervised learning alone.</p>

    <h2><em>Taxonomy</em> of Approaches</h2>
   </div>
   <p>Generative modeling comprises several architectural families, each making distinct choices about tractability and expressiveness. Understanding this landscape prevents wasted effort on mismatched approaches and clarifies why certain architectures dominate specific domains.</p>
   <p>The taxonomy's axes are tractability (explicit vs. implicit likelihood) and conditioning (autoregressive, latent-variable, flow-based). Each combination yields models with characteristic strengths—some train easily but sample slowly; others sample quickly but train unpredictably.</p>
   <h3>Autoregressive Models</h3>
   <p>Autoregressive models factor joint distributions as products of conditionals: <code>p(x) = ∏ p(x_i | x_{<i})</code>. Transformers, PixelCNN, and WaveNet exemplify this approach. Likelihood is tractable—just sum log-conditionals—but sampling requires sequential generation, slowing inference.</p>
   <p>Autoregressive remains the workhorse for text (transformers), audio (WaveNet), and increasingly images (ViT-based models). Sequential generation means each token depends on previous tokens, capturing long-range dependencies through attention mechanisms.</p>
   <h3>Latent Variable Models</h3>
   <p>Latent variable models introduce unobserved variables <code>z</code> to explain data: <code>p(x) = ∫ p(x|z)p(z) dz</code>. VAEs use learned inference networks to approximate posterior <code>q(z|x)</code>; GANs skip inference, learning only generator <code>p_θ(x|z)</code>. This flexibility enables powerful expressiveness.</p>
   <p>The cost: posteriors become intractable, requiring approximation (VAE) or abandoning likelihood (GAN). Training stabilizes compared to GANs through principled ELBO bounds, but typically underperforms newer approaches on likelihood benchmarks.</p>
   <h3>Flow-Based Models</h3>
   <p>Normalizing flows transform simple distributions through invertible functions. <code>x = f_θ(z), z ~ p(z)</code> where <code>f_θ</code> is invertible. Likelihoods become tractable via change-of-variables: <code>log p_θ(x) = log p(z) - ∑ log |det ∂f/∂z_i|</code>. Sampling remains fast (one forward pass).</p>
   <p>Flows trade expressiveness for tractability—computing Jacobian determinants constrains architectures. Real NVP, Glow, and flow matching represent successful instantiations, excelling in low-dimensional problems and molecular design where Jacobian computation remains feasible.</p>
   <h3>Score-Based & Diffusion Models</h3>
   <p>Diffusion models reverse noise corruption: iteratively denoise corrupted data back to clean samples. Score-based models learn gradients of log-density; diffusion models learn denoising functions directly. Both reframe sampling as Markov chain traversal through a reverse schedule.</p>
   <p>These models have emerged as state-of-the-art for image generation (DDPM, EDM, Consistency Models). Sampling requires many steps but achieves unprecedented quality-diversity tradeoffs. Training is stable and unsupervised, avoiding GAN instability and VAE approximation gaps.</p>
   <h3>Implicit Models (GANs)</h3>
   <p>Implicit models define distributions through sampling procedures rather than explicit densities. GANs pit generator against discriminator in an adversarial game. No likelihood computation, but expressiveness remains unmatched—generators learn highly realistic distributions.</p>
   <p>Training instability and mode collapse plagued early GANs. Architectural advances (Spectral Normalization, Progressive Growing, StyleGAN) and alternative objectives (Wasserstein distance, relativistic loss) stabilized training but didn't eliminate sensitivity to hyperparameters.</p>

  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 03</div>
    <h2><em>Maximum</em> Likelihood Principle</h2>
   </div>
   <p>Maximum likelihood estimation drives modern generative modeling. Given data <code>D = {x_1, ..., x_n}</code>, we maximize <code>L(θ) = ∑_i log p_θ(x_i)</code>. This simple objective has profound implications: it minimizes KL divergence from data to model, grounding MLE in information-theoretic principles.</p>
   <p>The KL divergence identity <code>D_KL(p_data || p_θ) = -E_x[log p_θ(x)] + H(p_data)</code> shows that minimizing negative likelihood equals pushing the model toward the data distribution. The constant entropy term irrelevant for optimization but important conceptually.</p>
   <h3>KL Divergence Equivalence</h3>
   <p>KL divergence measures distributional distance: <code>D_KL(P||Q) = E_p[log(p/q)]</code>. Unlike symmetric distances, forward KL <code>D_KL(data||model)</code> penalizes regions where data has high probability but model doesn't (mode-seeking). Reverse KL in VAEs penalizes the opposite (mode-covering).</p>
   <p>This asymmetry matters profoundly. Forward KL forces the model to cover data modes; reverse KL encourages ignoring low-probability regions. VAE's ELBO optimizes reverse KL on the posterior, creating the characteristic "fuzzy" generations compared to forward-KL-trained GANs.</p>
   <h3>Why MLE Dominates</h3>
   <p>MLE's dominance stems from four properties: first, principled grounding in information theory; second, computational tractability (works with standard autodiff); third, established statistical guarantees; fourth, compatibility with virtually all architectures.</p>
   <p>Alternative divergences and losses exist. Wasserstein distances suit high-dimensional spaces where KL becomes uninformative. Chi-squared divergences handle rare events. Yet MLE's combination of simplicity, principled justification, and empirical success keeps it standard across domains.</p>

    <h2><em>Sampling</em> & Generation</h2>
   </div>
   <p>Sampling draws from learned distributions to generate novel data. Three main families exist: ancestral sampling follows conditional chains; rejection sampling accepts/rejects proposals; MCMC iteratively refines samples through Markov transitions. Each trades off computational cost, mixing time, and sample quality.</p>
   <p>Modern generative modeling emphasizes different sampling regimes. Autoregressive models sample sequentially but deterministically given previous tokens. Diffusion models reverse noise through iterative denoising. Flow models sample in one forward pass. GANs define distributions implicitly through generator networks.</p>
   <h3>Ancestral Sampling</h3>
   <p>Ancestral sampling leverages factorization: sample <code>x_1 ~ p(x_1)</code>, then <code>x_2 ~ p(x_2|x_1)</code>, etc. For autoregressive models, this is the natural procedure. Transformers sampling text follow this: sample first token, then next token given prefix, iterating until stopping token.</p>
   <p>This approach guarantees correctness—samples exactly follow the model distribution. But it's sequential: generating N-dimensional vectors requires N forward passes. For large N (e.g., 1024×1024 images), this becomes prohibitively slow. Top-k and nucleus sampling modify this to improve speed and quality tradeoffs.</p>
   <h3>Rejection Sampling</h3>
   <p>Rejection sampling accepts proposals <code>x ~ q(x)</code> with probability <code>min(1, p(x)/q(x))</code>. Efficient when proposal closely matches target. For simple targets, this generates exact samples. But for high-dimensional distributions, acceptance rates plummet—most proposals get rejected.</p>
   <p>Rarely used in modern deep learning due to poor scaling. Important theoretically: shows how to convert samples from simple distributions to complex ones. Variants like importance sampling and Metropolis-Hastings remain valuable in Bayesian inference.</p>
   <h3>Markov Chain Monte Carlo</h3>
   <p>MCMC samples through iterative refinement: <code>x_{t+1} ~ T(x_{t+1}|x_t)</code> where <code>T</code> is transition kernel with stationary distribution <code>p(x)</code>. Metropolis-Hastings, Gibbs sampling, Hamiltonian MC exemplify this. After burn-in period, samples approximately follow target distribution.</p>
   <p>MCMC enables sampling from distributions we can only evaluate (not sample). High-dimensional posteriors in Bayesian inference rely on MCMC. But mixing time—iterations until convergence—grows exponentially with dimension in naive implementations, limiting practical applicability.</p>
   <h3>Diffusion Model Sampling</h3>
   <p>Diffusion models reframe generation as reversing a noise schedule. Forward process: <code>q(x_t) = √(1-β_t)x_{t-1} + √(β_t)ε</code> gradually corrupts data. Reverse process: <code>p_θ(x_{t-1}|x_t)</code> denoises iteratively. Starting from pure noise, successive denoising recovers high-probability data.</p>
   <p>This converts a hard sampling problem into tractable denoising. Neural network learns <code>ε_θ(x_t, t)</code>, predicting noise to remove. During sampling, simply iterate: <code>x_{t-1} = (x_t - √(β_t)ε_θ(x_t,t))/√(1-β_t)</code>. Fast sampling through distillation is an active research area.</p>

   <p>Evaluating generative models requires multiple perspectives: computational metrics (likelihood, bits/dim) measure model fit; perceptual metrics (FID, IS) capture visual quality; sample-level metrics (precision, recall) assess diversity and fidelity balance. No single metric suffices.</p>
   <p>Log-likelihood alone ignores sample quality—a model assigning uniform probability everywhere has decent likelihood but generates gibberish. FID alone misses coverage—models that memorize training images achieve perfect FID on training data but fail to generalize. Comprehensive evaluation combines metrics.</p>
   <h3>Log-Likelihood & Bits/Dimension</h3>
   <p>Log-likelihood <code>L = ∑_i log p_θ(x_i)</code> measures model fit directly. Normalized per-dimension, "bits/dimension" (bpd) is <code>-log₂ p_θ(x) / D</code>, interpreting likelihood through information-theoretic lens. Lower bpd is better. MNIST achieves ~0.3 bpd with modern models; CIFAR-10 ~3.5 bpd.</p>
   <p>Likelihood has blind spots. Models can achieve good likelihood while generating poor samples (VAE mode-covering posterior). Conversely, implicit models (GANs) may generate excellent samples without tractable likelihoods. Likelihood benchmarks matter for researchers but less for practitioners judging sample quality.</p>
   <h3>Fréchet Inception Distance (FID)</h3>
   <p>FID measures similarity between generated and real distributions in ImageNet-pretrained feature space. Extract activations from generated and real images, compute Fréchet distance between multivariate Gaussians fitted to distributions: <code>FID = ||μ_real - μ_gen||² + Tr(Σ_real + Σ_gen - 2(Σ_real Σ_gen)^{1/2})||</code>.</p>
   <p>FID correlates reasonably with human perception, makes evaluation computationally tractable, and doesn't require training separate classifiers. Limitations: depends on feature extractor choice, favors models trained on ImageNet, struggles with out-of-distribution domains. Yet it's become standard for image generation benchmarking.</p>
   <h3>Inception Score (IS) & Precision/Recall</h3>
   <p>Inception Score <code>IS = exp(E_x[KL(p(y|x) || p(y))])</code> rewards confident, diverse predictions. Generated images should yield high-confidence predictions in different classes. Precision-Recall curves measure quality-diversity tradeoff directly: precision = % of generated images in training manifold; recall = coverage of training manifold.</p>
   <p>IS has fallen out of favor due to GameSAT-style hacking (models learning to fool classifiers without realistic content). Precision-Recall offers more nuanced evaluation but requires defining manifold boundaries. Together, they reveal complementary information about generation quality.</p>
   <h3>Sample Quality Metrics</h3>
   <p>Human evaluation remains gold standard but is expensive and subjective. Mechanical Turk studies aggregate human judgments on sample realism, diversity, and correctness. Inter-rater agreement often surprisingly low, highlighting evaluation difficulty. Cost limits sample size and metric diversity.</p>
   <p>Automated proxies include LPIPS (learned perceptual metric using pretrained networks), CLIP similarity (learned vision-language embeddings), and domain-specific metrics (BLEU for text, mel-cepstral distance for audio). Each introduces biases but enables rapid iteration.</p>
   <div class="callout">
    <h4>Evaluation Principle</h4>
    <p>No single metric captures generation quality comprehensively. Likelihood, sample fidelity, and coverage offer different perspectives. Compare models across multiple metrics and modalities; aggregate human evaluation for final validation.</p>

   <p>Every generative model faces fundamental tradeoffs between exact and approximate likelihood, tractable and intractable posteriors, training efficiency and inference speed. Recognizing these tensions explains architectural choices and guides method selection.</p>
   <p>The central tension: models with tractable likelihoods typically have restrictions limiting expressiveness. Models with flexible expressiveness often sacrifice likelihood tractability. Understanding this spectrum—from fully tractable autoregressive to fully implicit GANs—prepares practitioners for principled design choices.</p>
   <h3>Exact vs. Approximate Likelihood</h3>
   <p>Autoregressive models achieve exact likelihood through factorization: <code>p(x) = ∏ p(x_i|x_{<i})</code>. Flows achieve exact likelihood via change-of-variables but require invertible architectures. VAEs optimize ELBO lower bound rather than exact likelihood. GANs have no explicit likelihood.</p>
   <p>Exact likelihood enables proper statistical interpretation and direct likelihood-ratio testing. But architectural constraints to achieve exactness (autoregressive, invertible) may limit expressiveness. The tradeoff often favors approximate methods when expressiveness matters more than interpretability.</p>
   <h3>Tractable vs. Intractable Posteriors</h3>
   <p>Latent variable models introduce unobserved variables <code>z</code>. In VAEs, posterior <code>q(z|x)</code> is intractable; we learn approximate inference network. GANs skip posteriors entirely. This intractability enables flexible generator-encoder pairs but sacrifices posterior interpretability and principled uncertainty quantification.</p>
   <p>Flow models maintain tractable posteriors but this constrains architectural flexibility. Autoregressive models over jointly distributed variables implicitly tractable posteriors (though might be uninteresting). Different architectures make different posterior-expressiveness tradeoffs visible.</p>

   <p>Autoregressive models train efficiently with standard supervised learning: each conditional is a standard classification/regression problem. Diffusion models train denoising networks, straightforward with standard losses. GANs train competitively, balancing generator-discriminator. VAEs train with standard variational bounds.</p>

   <p>Autoregressive models require sequential generation—one forward pass per generated token. For 1024-token sequences, 1024 forward passes. Flows sample in single pass. Diffusion requires iterative denoising (50-1000 steps typically). GANs sample in one forward pass.</p>
   <p>This creates practical application boundaries. Real-time applications (voice, interactive generation) favor single-pass methods (flows, GANs, autoregressive with speculative decoding). Batch applications (offline image generation) tolerate iterative approaches if quality improves enough to justify latency.</p>

   <p>Modern generative modeling stands on decades of foundational work. Boltzmann machines and RBMs pioneered energy-based approaches; deep belief networks unified supervised and unsupervised learning; VAEs and GANs democratized neural generative models; transformers and diffusion models now dominate. Each era discovered principles still guiding research.</p>
   <p>Understanding history prevents reinventing wheels and highlights which challenges are fundamental vs. incidental to specific architectures. The struggle to train deep nets (solved by pretraining and layer normalization), the balance between likelihood and generation quality (fundamental to KL divergence), and adversarial training instability (partly architectural, partly inherent) echo across decades.</p>
   <h3>Energy-Based Models Era (1980s-2000s)</h3>
   <p>Boltzmann machines modeled distributions through energy functions: <code>p(x) ∝ exp(-E_θ(x))</code>. Hopfield networks, restricted Boltzmann machines (RBMs), deep belief networks followed. Training via Gibbs sampling and contrastive divergence was computationally expensive but theoretically principled.</p>
   <p>RBMs enabled pretraining deep networks layer-by-layer (Hinton's 2006 breakthrough). Though pretraining became less necessary after better initialization and normalization, energy-based principles remain valuable. Modern score-based models directly learn energy gradients.</p>
   <h3>Deep Learning Revolution (2010s Early)</h3>
   <p>Deep learning enabled training deeper networks directly. Convolutional networks, RNNs, and attention mechanisms transformed discriminative modeling. For generation, autoregressive models (PixelCNN, WaveNet) and autoencoders emerged. Variational Autoencoders (2014) combined deep learning with principled probabilistic inference.</p>
   <p>VAEs introduced reparameterization trick—representing posteriors through invertible transformations enabling backpropagation through stochastic nodes. This unified deep learning with Bayesian inference, creating tractable approximate likelihood through ELBO. Limitations: posterior collapse, blurry reconstructions, but foundational for subsequent work.</p>
   <h3>Adversarial Training & GANs (2014-2018)</h3>
   <p>GANs (Goodfellow et al., 2014) introduced adversarial training: pit generator against discriminator in minimax game. Elegant formulation, powerful results, but training instability and mode collapse plagued early versions. Wasserstein GANs, spectral normalization, progressive growing, and StyleGAN progressively stabilized training.</p>
   <p>GANs achieved unprecedented sample quality on high-resolution image generation. Yet implicit models (no tractable likelihood) complicated evaluation and theoretical analysis. The adversarial game creates instability absent in supervised learning, a tension unresolved despite architectural improvements.</p>
   <h3>Attention & Transformer Era (2017-2019)</h3>
   <p>Transformers (Vaswani et al., 2017) revolutionized NLP through attention mechanisms and self-supervised pretraining. For generation, autoregressive transformers (GPT series) dominated text; Vision Transformers extended to images. Attention's ability to capture long-range dependencies suited sequential generation.</p>
   <p>Transformers also enabled hybrid approaches: BERT-style pretraining, decoder-only models, multimodal models. For generative modeling specifically, autoregressive transformers remain standard for text despite diffusion models' recent image-generation dominance.</p>
   <h3>Score-Based & Diffusion Resurgence (2019-2022)</h3>
   <p>Diffusion models (DDPM, 2020) emerged from score-based generative modeling. Key insight: reversing Markovian noise corruption yields tractable sampling and stable training. Denoising score matching (Song & Ermon, 2019) connected to diffusion, clarifying the landscape.</p>

   <p>Throughout this history, certain principles persist. Likelihood-based models face tractability-expressiveness tradeoffs (visible in RBMs→VAEs→Flows). Generative quality improves with model capacity and data, but overfitting requires regularization (seen across all eras). Scalability demands hierarchical approaches—from Hinton's layer-wise pretraining to Latent Diffusion Models' learned autoencoders.</p>

   <p>Key question for Weeks 1-2: What does it mean to learn a distribution? Why is MLE natural despite being nonconvex? How do we evaluate models without human judgment? Answering these deeply prepares for understanding specific architectures.</p>
   <h3>Weeks 3-4: Autoregressive & VAEs</h3>
   <p>Autoregressive models form the foundation for modern NLP. Week 3 covers PixelCNN/WaveNet and transformers for generation. VAEs (Week 4) introduce latent variables and approximate inference—the ELBO, reparameterization trick, posterior collapse. You'll implement both and recognize their complementary strengths.</p>
   <p>Hands-on goal: generate text with autoregressive transformers; generate images with VAEs. Compare quality, speed, likelihood. Why is VAE output blurry while transformers produce sharper but slower samples? These empirical observations ground theoretical understanding.</p>
   <h3>Weeks 5-6: Flows & Diffusion Models</h3>
   <p>Normalizing flows (Week 5) achieve exact likelihood through invertible transformations. Real NVP, Glow, and flow matching exemplify different approaches. Diffusion models (Week 6) reverse noise through iterative denoising—DDPM, improved schedulers, conditioning mechanisms.</p>
   <p>Hands-on goal: implement Real NVP for density estimation; implement DDPM for image generation. Observe diffusion's stability compared to GANs, exact likelihood compared to implicit models. Which domains favor which approaches?</p>
   <h3>Weeks 7-8: GANs, Synthesis & Applications</h3>
   <p>Generative adversarial networks (Week 7) pit generator-discriminator pairs. Wasserstein GANs address earlier instability; spectral normalization and progressive training enable high-resolution generation. StyleGAN illustrates modern hybrid approaches. Week 8 integrates: conditional generation, multimodal models, domain adaptation.</p>
   <p>Hands-on goal: implement WGAN with spectral normalization; understand mode collapse and training dynamics empirically. By course end, you'll recognize when each architecture suits problems and how to combine them for novel applications.</p>
   <h3>Key Concepts Throughout</h3>
   <p>Likelihood vs. Generation Quality: likelihood doesn't guarantee sample quality; implicit models achieve quality without likelihoods. Factorization enables tractability: autoregressive factorizes conditionals; flows use invertibility; VAEs use learned inference networks. Sampling-Training Tradeoff: Some models train easily but sample slowly (autoregressive); others sample fast but train unpredictably (GANs); modern approaches (diffusion, flows) balance both.</p>
   <p>Each week builds on previous understanding. Early weeks teach why specific objectives (MLE, ELBO, adversarial loss) make sense. Later weeks show how different architectures implement these objectives with distinct tradeoffs. Final weeks synthesize: combining architectures (diffusion in VAE latent space), conditioning mechanisms (text-to-image), and applications.</p>

sections.forEach((sec, idx) => {

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
