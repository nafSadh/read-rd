<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generative Adversarial Networks — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:16px 0;border:1px solid var(--border)}
.price-card{border-right:1px solid var(--border);padding:18px 12px;text-align:center;background:none;border-radius:0}
.price-card:last-child{border-right:none}.price-card.hl{background:var(--accent-soft)}
.price-card h4{font-size:var(--price-h4-size);font-weight:var(--body-weight);color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--price-h4-ls);font-family:var(--sans)}
.price-card .price{font-family:var(--serif);font-size:var(--price-val-size);color:var(--bright);font-weight:var(--heading-weight);font-style:italic;letter-spacing:var(--price-val-ls)}
.price-card .pn{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--sans)}

@media(max-width:1000px){
  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}
  .ctrl-btn{width:32px;height:32px;font-size:14px}
  .shell{display:block;position:relative}

  .right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}

  .right-inner{padding:0 20px 80px}
  .right-topbar{padding:10px 20px 0;height:44px}
  .detail-header h2{font-size:26px!important}
  .feat-grid,.verdict,.price-grid{grid-template-columns:1fr}
  .feat{border-left:none!important;padding-left:0!important}

  .v-col{padding:16px 0!important}
  .v-col:last-child{border-left:none!important;padding-left:0!important}
  .price-card{border-right:none!important;border-bottom:1px solid var(--border)}.price-card:last-child{border-bottom:none}
  .tl-item{flex-direction:column!important;gap:4px}

const summaries = [
  `<p>Generative Adversarial Networks pit two neural networks in a min-max game: a generator G creates synthetic data from noise, while a discriminator D attempts to distinguish real from fake. This adversarial process drives both networks toward an equilibrium where the generator produces indistinguishable samples.</p>
   <p>The framework formulates unsupervised learning as a competition. As D improves at detection, G is forced to generate more realistic samples. The Nash equilibrium represents the optimal solution where D cannot improve further.</p>`,

  `<p>The GAN objective function V(G, D) balances two log-likelihood terms: maximizing D's ability to identify real samples and minimizing D's ability to identify fake ones. The generator minimizes the probability of being detected, creating a zero-sum game dynamic.</p>
   <p>The optimal discriminator D* has a closed form: it outputs the probability that a sample is real given the data. This theoretical insight guides practical training, even though computing D* exactly is intractable. The minimax formulation defines a theoretical global optimum where real and generated distributions align; however, practical optimization with gradient-based methods does not guarantee convergence to this point and often faces challenges such as mode collapse and training instability.</p>`,

  `<p>Training GANs requires alternating gradient updates: D is updated to maximize classification accuracy, while G is updated to fool D. Instability arises from this sequential optimization—when one network is overparameterized, training can diverge or collapse to trivial solutions.</p>
   <p>Mode collapse occurs when G learns to generate only a subset of the data distribution's modes, evading D's discrimination while avoiding the complexity of full coverage. Non-convergence is endemic: theoretical guarantees are weak, and practice shows oscillation between network improvements rather than stable equilibrium. Careful hyperparameter tuning, architectural choices, and training protocols are essential.</p>`,

  `<p>Wasserstein GANs address training instability by replacing the divergence metric. Instead of KL or JS divergence, WGAN uses Earth Mover's distance, which provides a smoother gradient landscape. Weight clipping constrains the discriminator to be 1-Lipschitz, ensuring the loss is a valid metric on the space of distributions.</p>
   <p>Spectral normalization and gradient penalty further stabilize training by controlling discriminator gradients. Wasserstein loss provides a meaningful training signal even when distributions are disjoint, enabling mode coverage and more reliable convergence. These techniques have become standard practice in modern GAN training.</p>`,

  `<p>Conditional GANs inject class labels into both generator and discriminator, enabling controlled generation. The class information guides G to generate samples from a specific class, while D learns to discriminate both on authenticity and class consistency. This extends GANs from unsupervised to semi-supervised learning.</p>
   <p>Pix2pix applies cGANs to image-to-image translation: paired images condition the generator to learn fine-grained transformations like sketch-to-photograph or day-to-night. The discriminator becomes a "patch discriminator," evaluating local realism rather than global authenticity, improving fine detail synthesis.</p>`,

  `<p>Progressive GANs grow the network architecture layer-by-layer during training, starting with low resolution and gradually adding detail. This accelerates convergence and improves stability by allowing the generator to first learn coarse structure before refining details. StyleGAN extends this with a mapping network that translates latent codes into style parameters.</p>
   <p>StyleGAN uses adaptive instance normalization (AdaIN) to inject style information at multiple scales, decoupling content from style. Latent interpolation in the intermediate style space produces smooth, high-quality transitions. These architectural innovations enable stable training of high-resolution image generation, exemplified by face synthesis at 1024×1024.</p>`,

  `<p>Evaluating GANs is challenging because they lack explicit likelihood models. Inception Score (IS) measures sample diversity and quality using a pre-trained classifier, but is sensitive to mode collapse. Fréchet Inception Distance (FID) compares feature distributions between real and generated samples, providing more robust evaluation.</p>
   <p>Precision and recall metrics directly measure mode coverage: precision quantifies the fraction of generated samples within the data manifold, while recall measures the fraction of data modes captured by the generator. Together with FID, these metrics provide comprehensive evaluation of both quality and diversity in generated samples.</p>`,

  `<p>GANs lack a likelihood-based training objective, making theoretical analysis difficult. However, the minimax framework guarantees convergence under restrictive assumptions (continuous distributions, sufficient capacity, infinite optimization). In practice, these assumptions rarely hold, and networks exhibit oscillation rather than convergence.</p>
   <p>The diversity-quality tradeoff is fundamental: generating highly realistic samples requires fine-tuning to a narrow distribution, while maintaining diversity requires exploring the full data manifold. Truncation tricks trade diversity for quality by sampling latent codes from a restricted region. Understanding these limitations guides proper application: GANs excel at high-quality synthesis but require careful validation of mode coverage and diversity.</p>`,

  `<p>Generative Adversarial Networks introduced a paradigm shift through adversarial training. This section gathers foundational papers, improvements, and resources for understanding the GAN framework from theory to modern applications in image generation and beyond.</p>
   <p>From the original formulation to conditional variants and architectural innovations, these materials trace the evolution and impact of adversarial training in deep generative modeling.</p>`

  `<div class="detail-header">
     <div class="num"><span>01</span></div>
     <h2><em>Adversarial</em> Framework</h2>
   </div>
   <p>A GAN consists of two competing neural networks. The generator G maps a noise vector z from a simple prior (uniform or Gaussian) to a sample in the data space. The discriminator D evaluates whether a sample is from the real data or generated by G. This two-player game drives mutual improvement.</p>
   <p>The generator's objective is to produce samples indistinguishable from real data. The discriminator's objective is perfect classification. As the game progresses, G generates increasingly realistic samples to fool D, while D becomes more adept at detection. The process reaches Nash equilibrium when further improvement by either player is impossible.</p>
   <p>The min-max formulation describes a system where G and D have opposing objectives, yet they improve together. G cannot observe real data directly—it only receives feedback through D's gradients. D must learn to extract discriminative features that capture the essence of the data distribution.</p>
   <h3>Generator and Discriminator Architectures</h3>
   <p>The generator is typically a deep convolutional transpose network that progressively upsample latent vectors to high-dimensional samples. Early layers capture coarse structure, while later layers refine details. Skip connections and batch normalization stabilize training.</p>
   <p>The discriminator mirrors this architecture: a convolutional network that progressively downsamples images to a binary classification. Unlike standard classifiers, the discriminator must learn features that distinguish real from fake, not classify into semantic categories. This unsupervised feature learning is a significant characteristic of GANs.</p>
   <p>Architectural choices profoundly affect training dynamics. Networks with imbalanced capacity—one much larger than the other—lead to dominance by the larger network and training collapse. Symmetric architectures with careful scaling promote stable, balanced improvement.</p>
   <h3>Nash Equilibrium and Theoretical Convergence</h3>
   <p>The Nash equilibrium of the GAN game is achieved when the discriminator cannot improve (always outputs 0.5 probability) and the generator distribution matches the real data distribution. At this point, the generator has solved the learning problem.</p>
   <p>However, reaching Nash equilibrium is non-trivial. The alternating optimization of separate networks does not guarantee convergence to equilibrium, even theoretically. In practice, networks exhibit cyclic behavior: G improves, then D adapts, leading to oscillation rather than stable equilibrium.</p>

  `<div class="detail-header">
     <div class="num"><span>02</span></div>
     <h2><em>GAN</em> Objective & Loss</h2>
   </div>
   <p>The fundamental GAN objective is: min_G max_D V(G,D) = E_x[log D(x)] + E_z[log(1 - D(G(z)))]. The discriminator maximizes this value (correctly classifying real and fake), while the generator minimizes it (fooling the discriminator). This zero-sum formulation creates the adversarial dynamic.</p>
   <p>The first term measures the discriminator's accuracy on real samples: D(x) should be close to 1. The second term measures its accuracy on fake samples: D(G(z)) should be close to 0, so 1 - D(G(z)) is close to 1. High V indicates strong discriminator performance; low V indicates successful deception by the generator.</p>
   <p>In practice, the generator's loss is often reformulated. The original objective can lead to vanishing gradients when D(G(z)) is near 0, providing weak training signals. An alternative is max_G E_z[log D(G(z))], which provides stronger gradients by rewarding the generator for being detected as fake.</p>
   <h3>Optimal Discriminator</h3>
   <p>For a fixed generator G, the optimal discriminator D* can be derived in closed form. Taking the functional derivative of V with respect to D yields: D*(x) = p_data(x) / (p_data(x) + p_G(x)). The optimal discriminator outputs the posterior probability that a sample is real.</p>
   <p>This theoretical result defines the "ground truth" discriminator, even though computing it exactly is intractable (as p_data or p_G are typically unknown). However, the formula guides intuition: an effective discriminator learns to estimate the ratio of real to total samples, which is essential for distinguishing real data from generated samples.</p>
   <p>At Nash equilibrium, D* = 0.5 everywhere (all samples equally likely to be real or fake), and p_G = p_data (generator matches reality). Computing the optimal D for any finite, discrete dataset involves empirical probability estimation from samples.</p>
   <h3>Divergence Interpretations</h3>
   <p>The GAN objective can be rewritten as minimizing the Jensen-Shannon divergence between p_data and p_G. This connects GANs to information-theoretic principles: the discriminator implicitly estimates divergence, and the generator minimizes it by moving closer to the data distribution.</p>
   <p>Different GAN variants use different divergences: Wasserstein GANs minimize Earth Mover's distance, f-GANs minimize f-divergences. Each choice affects training dynamics, gradient quality, and convergence behavior. Divergence choice is a design decision with practical consequences.</p>
   <div class="diagram-wrap">
     <svg viewBox="0 0 500 300" style="max-width: 100%;">

       <text x="280" y="110" class="lbl" style="font-size: 12px;">real samples</text>
       <text x="30" y="145" class="lbl" style="font-size: 12px;">+ E_z[log(1-D(G(z)))]</text>
       <text x="280" y="145" class="lbl" style="font-size: 12px;">fake samples</text>
       <rect x="20" y="190" width="460" height="80" fill="none" stroke="#2e6ab4" stroke-width="1.5" stroke-dasharray="3,2"/>
       <text x="40" y="215" class="lbl-hi" style="font-size: 11px;">Optimal Discriminator at Equilibrium:</text>
       <text x="40" y="240" class="lbl" style="font-size: 11px; font-family: monospace;">D*(x) = p_data(x) / (p_data(x) + p_G(x))</text>
       <text x="40" y="260" class="lbl" style="font-size: 11px;">When G = p_data, D*(x) = 0.5 everywhere</text>
     </svg>
   </div>`,

  `<div class="detail-header">
     <div class="num"><span>03</span></div>
     <h2><em>Training</em> Dynamics</h2>
   </div>
   <p>Training alternates between discriminator and generator updates. Each iteration updates D for k steps (to improve classification), then updates G for 1 step (to improve generation). The choice of k and the step sizes profoundly affects convergence. Excessive D training can overpower G; insufficient training leaves it poorly informed.</p>
   <p>The gradient flow from D to G carries classification information: large losses indicate unrealistic samples, guiding G toward improvement. However, this feedback is often noisy and non-stationary as D constantly changes, making G optimization unstable.</p>
   <p>Batch normalization is critical for stability. It normalizes activations to zero mean and unit variance, reducing internal covariate shift. In GANs, batch norm in D and layer norm in G (rather than batch norm) prevent information leakage between batches of real and fake samples during training.</p>
   <h3>Mode Collapse</h3>
   <p>Mode collapse is a significant and frequently discussed failure mode: G learns to generate only a narrow subset of the data distribution. For example, a GAN trained on MNIST might generate only images of the digits 0 and 3, completely ignoring other classes. From D's perspective, this is effective deception; from the perspective of learning, it represents a severe limitation in achieving the learning objective of modeling the full data distribution.</p>
   <p>Mode collapse arises from the optimization dynamics. Once G finds a region in data space that fools D, improving D only teaches G to refine that region rather than explore others. There is no mechanism forcing G to cover the full distribution. Diversity penalties, unrolled discriminators, and mixture models partially mitigate this.</p>
   <p>Theoretical analysis shows that for Wasserstein distance and other proper metrics, mode collapse is less likely because the loss provides a continuous gradient even when distributions are completely disjoint. However, it can still occur in practice due to capacity limitations.</p>
   <h3>Non-Convergence and Oscillation</h3>
   <p>Unlike supervised learning with a fixed target distribution, GAN training is inherently non-stationary: the target (real/fake boundary) moves as D changes. This creates a moving target problem. G can appear to improve (producing more realistic samples) while D simultaneously improves (detecting more effectively).</p>
   <p>Empirically, well-trained GANs exhibit cyclic behavior: G generates improving samples, D adapts, then cycles restart. True convergence in the theoretical sense (Nash equilibrium) is rarely achieved. Instead, practitioners use inception scores, FID, or manual inspection to determine when to stop training based on sample quality.</p>
   <p>Early stopping based on validation metrics is standard. Checkpointing throughout training and selecting the best checkpoint (not the final one) often yields better results than waiting for convergence that may never arrive.</p>
   <h3>Hyperparameter Sensitivity</h3>
   <p>GANs exhibit high sensitivity to hyperparameters. Learning rates too high cause oscillation and divergence; too low cause slow, unstable training. The ratio of discriminator to generator learning rates matters significantly. Architecture choices (layer norm vs batch norm, activation functions, capacity ratios) heavily influence stability.</p>
   <p>Initialization is critical: poor initialization can prevent the generator from even receiving useful gradients from the discriminator early in training. Spectral normalization on the discriminator provides automatic regularization, improving training stability across hyperparameter ranges.</p>`,

  `<div class="detail-header">
     <div class="num"><span>04</span></div>
     <h2><em>Wasserstein</em> GAN</h2>
   </div>
   <p>Wasserstein GANs address fundamental training instability by replacing KL/JS divergence with Wasserstein distance (Earth Mover's distance). The Wasserstein distance between distributions p and q is the minimum cost of transporting mass from p to q. Geometrically, it measures how much "earth" must be moved and how far.</p>
   <p>A key characteristic is that Wasserstein distance provides meaningful gradients even when two distributions are completely disjoint (zero overlap). In contrast, KL and JS divergence are flat (give no gradient) outside the support of both distributions. When p_data and p_G are disjoint—common early in training—standard GANs provide nearly zero gradients. The Wasserstein distance mitigates this issue.</p>
   <p>The WGAN objective becomes: min_G max_D E_x[D(x)] - E_z[D(G(z))], where D is constrained to be 1-Lipschitz (its gradients are bounded). This is the dual form of the Wasserstein distance. The discriminator (now called a critic) outputs a real-valued score rather than a probability, interpreting V directly as the distance between distributions.</p>
   <h3>Weight Clipping and Spectral Normalization</h3>
   <p>To enforce the 1-Lipschitz constraint, original WGANs used weight clipping: clip all weight matrices to [-0.01, 0.01]. While straightforward, this method effectively enforces the constraint. However, clipping drives many weights to the clipping boundaries, harming optimization. Spectral normalization is an alternative method that addresses these limitations: normalize weights by their largest singular value, ensuring Lipschitz constant of 1 while preserving gradient flow.</p>
   <p>Spectral normalization computes the largest singular value of weight matrices efficiently using power iteration. It adds limited computational overhead and becomes standard in modern GANs. Combined with appropriate learning rate scheduling and architecture design, it enables stable training for high-resolution image synthesis.</p>
   <p>Gradient penalty is another approach: add a regularization term L_gp = lambda * E[(||∇_x D(x)||_2 - 1)^2], which encourages gradient norm 1 and is more flexible than hard clipping. Different penalty formulations exist; gradient penalty with interpolated samples (between real and fake) is empirically effective.</p>
   <h3>Improved Training Stability</h3>
   <p>WGAN training exhibits greater stability than standard GANs. The loss curves are meaningful: decreasing loss corresponds to improving generation quality. Generator collapse is less frequent because the distance metric continues to provide feedback even when G generates mode-collapsed samples.</p>
   <p>The improved signal allows increased training frequency: G can be updated multiple times per D update, or vice versa, without immediate collapse. Hyperparameter tuning is less sensitive. These properties make WGAN and its variants (WGAN-GP, spectral normalization) practical enhancements widely adopted in industry.</p>

       <rect x="20" y="50" width="460" height="60" fill="none" stroke="#9b7aed" stroke-width="1.5"/>
       <text x="40" y="75" class="lbl" style="font-size: 12px;">Standard GAN: V = E[log D(x)] + E[log(1-D(G(z)))]</text>
       <text x="40" y="100" class="lbl" style="font-size: 12px;">WGAN: V = E[D(x)] - E[D(G(z))] with 1-Lipschitz constraint</text>
       <rect x="20" y="130" width="460" height="100" fill="none" stroke="#2e6ab4" stroke-width="1.5" stroke-dasharray="3,2"/>
       <text x="40" y="155" class="lbl-hi" style="font-size: 11px;">Key Advantages:</text>
       <text x="50" y="175" class="lbl" style="font-size: 11px;">• Meaningful gradients even when distributions disjoint</text>
       <text x="50" y="195" class="lbl" style="font-size: 11px;">• Training loss correlates with sample quality</text>
       <text x="50" y="215" class="lbl" style="font-size: 11px;">• Spectral normalization stabilizes without clipping</text>

  `<div class="detail-header">
     <div class="num"><span>05</span></div>
     <h2><em>Conditional</em> GANs</h2>
   </div>
   <p>Conditional GANs (cGANs) inject class information into both generator and discriminator. The generator receives both a latent code z and a condition c (class label, image, etc.) and generates samples from the conditional distribution p(x|c). The discriminator evaluates both authenticity and condition consistency.</p>
   <p>This extension enables controlled generation: given a class label, the generator produces samples of that class. The discriminator learns to enforce consistency: detecting not just fake samples, but also real samples misaligned with their label. This semi-supervised learning setup improves both generator quality and discriminator features.</p>
   <p>Mathematically, cGANs optimize: min_G max_D E_x[log D(x,c)] + E_z[log(1 - D(G(z,c), c))]. The discriminator now takes both sample and condition, enabling joint evaluation. Class information can be concatenated to latent vectors, injected as multiple layers, or added via more sophisticated mechanisms.</p>
   <h3>Pix2Pix and Image-to-Image Translation</h3>
   <p>Pix2pix applies cGANs to paired image-to-image translation: sketch-to-photograph, day-to-night, semantic segmentation map-to-image, etc. The condition is a source image, and the generator learns to translate it to a target domain while preserving spatial structure.</p>
   <p>The key innovation is the patch discriminator: instead of classifying the entire image as real/fake, it evaluates 70x70 patches independently, then averages the results. This local evaluation forces the generator to produce fine-grained detail at multiple scales, avoiding the "blurry average" problem of global discriminators.</p>
   <p>Pix2pix adds a reconstruction loss (L1 or L2 distance between generated and ground truth) to the adversarial loss. This hybrid objective constrains the generator to remain faithful to the source image while achieving photorealism. The balance between adversarial and reconstruction losses is a key design choice.</p>
   <h3>Class-Conditional Generation</h3>
   <p>In class-conditional GANs trained on MNIST or ImageNet, each class induces its own subregion in the data manifold. The generator learns these regions and can generate samples on-demand from any class. The latent space z controls variation within a class, while c controls class identity.</p>
   <p>This separation enables interesting operations: interpolating between latent codes within a class produces smooth transitions; interpolating class codes produces class-blending effects. Disentanglement between z and c is often incomplete in practice, leading to some class information encoded in z and vice versa.</p>
   <p>Class information is typically injected via concatenation with latent vectors, or more sophisticatedly via embedding layers and attention mechanisms. The choice affects how tightly class identity is enforced versus how much freedom z has to modulate style and details.</p>
   <h3>Additional Conditioning Mechanisms</h3>
   <p>Beyond class labels and source images, GANs can be conditioned on text descriptions (text-to-image synthesis), audio (speech-to-video), semantic layouts, depth maps, or any structured input. Each conditioning modality requires appropriate encoding (embeddings for discrete, CNNs for images, etc.).</p>
   <p>Multi-modal conditioning is also possible: generating high-resolution faces from low-resolution faces and a text description. The generator must learn to reconcile potentially conflicting conditions and produce coherent outputs. This is more challenging but enables richer, more controllable generation.</p>`,

  `<div class="detail-header">
     <div class="num"><span>06</span></div>
     <h2><em>Progressive</em> & Style GANs</h2>
   </div>
   <p>Progressive GANs accelerate and stabilize training by growing the network architecture gradually. Training begins with low-resolution generation (e.g., 4x4 images). After convergence, new layers are added to both generator and discriminator, progressively increasing resolution (8x8, 16x16, ..., 1024x1024). New layers start with small weights, smoothly fading in as training progresses.</p>
   <p>This approach has multiple benefits: low-resolution training converges quickly and is stable; adding layers is like progressive regularization; the network learns hierarchical features naturally. High-frequency detail is learned only after coarse structure is solid, mirroring human perception and natural image statistics.</p>
   <p>Progressive growth uses fade-in: new layers are added at small scale with a mixing coefficient alpha that grows from 0 to 1 over several iterations. This smooth transition prevents sharp changes in the loss landscape that would destabilize training. Progressive training requires careful coordination but yields superior convergence and quality.</p>
   <h3>StyleGAN and Style Injection</h3>
   <p>StyleGAN introduces a mapping network that transforms latent codes z (from a standard normal) to an intermediate latent space w. This intermediate space is more disentangled: interpolating in w corresponds to style changes (hair, pose, identity), while different z in the same w region modulate fine details. The separation of high-level and low-level variation is explicit.</p>
   <p>Style is injected via adaptive instance normalization (AdaIN) at each layer: normalize the convolutional output to zero mean/unit variance, then scale and shift by style vectors derived from w. This mechanism allows precise control: style from deep layers affects large structures, while shallow layers control fine texture.</p>
   <p>StyleGAN's loss remains adversarial, but the architecture and training procedure enable a high degree of control. Interpolation in w-space produces smooth, semantic transitions. Mixing styles (using different w for different layers) creates realistic variation. Truncation in w-space trades diversity for quality by restricting the range of w.</p>
   <h3>Advanced Architecture Components</h3>
   <p>StyleGAN uses several architectural innovations: learnable constant input (all generators start from the same constant, not noise), skip connections, minibatch standard deviation (adding a statistic to help D evaluate realism), and careful layer normalization placement. These architectural innovations accumulate to substantial improvements in quality and stability.</p>
   <p>StyleGAN2 further improved training with path length regularization (encouraging smooth gradients in w-space), lazy regularization (computing regularization terms less frequently), and rotational equivariance in the discriminator. These enhancements enable even higher fidelity and better disentanglement.</p>

  `<div class="detail-header">
     <div class="num"><span>07</span></div>
     <h2><em>Evaluation</em> Metrics</h2>
   </div>
   <p>Evaluating GANs is challenging because they lack tractable likelihood. Standard metrics for generative models (perplexity, log-likelihood) do not apply. Instead, evaluation typically focuses on two separate aspects: sample quality (realism) and sample diversity (mode coverage). No single metric captures both, requiring multiple complementary measures.</p>
   <p>Inception Score (IS) uses a pre-trained ImageNet classifier to evaluate quality and diversity. A good generative sample should be classified confidently into one class (high entropy reduction), and the overall distribution should cover many classes (high entropy across samples). IS = exp(E[KL(p(y|x) || p(y))]) combines these criteria.</p>
   <p>IS has limitations: it depends on classifier capacity and bias, it cannot detect out-of-distribution (unrealistic) samples if they fool the classifier, and it is sensitive to the number of samples. Despite these flaws, it is widely reported and enables historical comparison.</p>
   <h3>Fréchet Inception Distance</h3>
   <p>Fréchet Inception Distance (FID) compares feature distributions between real and generated samples using a pre-trained Inception network. Samples are embedded into a feature space (typically the penultimate layer), and FID computes the Wasserstein distance between the empirical Gaussian distributions fit to real and generated features.</p>
   <p>FID = ||mu_r - mu_g||^2 + Tr(Sigma_r + Sigma_g - 2(Sigma_r Sigma_g)^(1/2)) where mu and Sigma are mean and covariance. Lower FID indicates closer distributions, interpreted as higher quality. FID is more robust than IS: it doesn't require high classification confidence, and it detects distribution mismatch more reliably.</p>
   <p>FID correlates well with human perception of image quality and is now standard in papers and benchmarks. It is more stable than IS and less sensitive to the specific classifier. However, it still relies on an ImageNet-trained network, which may have domain-specific biases.</p>
   <h3>Precision and Recall</h3>
   <p>Precision measures the fraction of generated samples that lie on the real data manifold. High precision means the generator produces realistic samples; low precision means it generates out-of-distribution hallucinations. Precision is computed by checking if generated samples have nearest neighbors in the real data with distance below a threshold.</p>
   <p>Recall measures the fraction of real data modes captured by the generator. High recall means comprehensive coverage; low recall means mode collapse. These metrics directly address the quality-diversity tradeoff: one GAN might achieve high precision (realistic samples, limited diversity) while another achieves high recall (comprehensive mode coverage, lower average quality).</p>
   <p>Precision and recall require defining a threshold distance in feature space. Different thresholds give different values, so reporting multiple thresholds is common. These metrics offer a clear conceptual framework but are computationally expensive (requiring nearest neighbor search over large sample sets).</p>
   <h3>Other Evaluation Approaches</h3>
   <p>Human evaluation is considered a gold standard but is expensive and subjective. User studies comparing generated samples to real samples yield ground-truth quality assessments. However, these are expensive to conduct and difficult to standardize across research groups.</p>
   <p>Task-specific metrics are also employed: for super-resolution, PSNR and SSIM measure pixel-level fidelity; for segmentation-guided generation, IoU measures mask accuracy. For text-to-image synthesis, CLIP score measures alignment with descriptions. While not universally applicable, these metrics provide clear insights within their specific application domains.</p>`,

  `<div class="detail-header">
     <div class="num"><span>08</span></div>
     <h2><em>GAN</em> Theory & Limitations</h2>
   </div>
   <p>GANs have no explicit likelihood-based training objective. While this enables flexible, unsupervised learning, it makes theoretical analysis difficult. Standard information theory and convergence guarantees don't directly apply. The minimax formulation provides some theoretical grounding, but assumptions (continuous distributions, infinite capacity, infinite optimization) are rarely satisfied in practice.</p>
   <p>Goodfellow et al. proved that GANs converge under strong assumptions: if both networks have sufficient capacity, if the discriminator can be optimized to convergence in each iteration, and if the distributions are continuous. In practice, these conditions fail: networks are finite, optimization is incomplete, and discrete datasets violate continuity. Theoretical convergence guarantees are weak.</p>
   <p>However, empirical convergence is frequently observed. When properly trained (good architectures, hyperparameters, regularization), GANs do learn meaningful distributions. The theory-practice gap suggests that implicit regularization and architecture constraints implicitly satisfy sufficient conditions for convergence, even when formal theorems don't apply.</p>
   <h3>Implicit Density and Mode Coverage</h3>
   <p>GANs model the data distribution implicitly: the generator defines a density p_G through its transformations, but this density is never computed explicitly. This characteristic offers advantages (flexibility, scalability) and presents challenges (difficulty analyzing the learned representations of the generator). Unlike VAEs with explicit likelihood, GANs cannot compute p_G(x) for a given sample.</p>
   <p>Implicit density creates a fundamental challenge: assessing mode coverage. The generator might ignore entire regions of the data space without any signal to correct it. Precision/recall metrics detect this post-hoc, but during training, there is no continuous "pressure" to maintain diversity. Some modes are simply never explored.</p>
   <p>This contrasts with likelihood-based models (VAEs, autoregressive models) which have a continuous incentive to model all regions of the data: low-probability regions incur high likelihood loss. GANs lack this property—once a region is adequately fooling D, G has no incentive to improve there or explore elsewhere.</p>
   <h3>Truncation Trick and Quality-Diversity Tradeoff</h3>
   <p>The truncation trick samples latent codes from a restricted region (e.g., z ~ N(0, sigma^2) with sigma < 1 rather than sigma = 1). This biases the generator toward the mode of its learned distribution, trading diversity for quality. Highly truncated samples often exhibit high fidelity but demonstrate reduced variety.</p>
   <p>This tradeoff is fundamental to GANs. Achieving both maximum diversity and maximum quality appears impossible: the generator's optimal strategy to fool D is to specialize in high-density regions of the data. Exploring low-density regions (rare classes, unusual variations) reduces average realism.</p>
   <p>Modern GANs try to mitigate this by carefully balancing spectral normalization, gradient penalties, and training duration. However, the underlying tradeoff remains. Practitioners must choose: use full truncation for publication-quality results (with limited diversity), or relax truncation for better mode coverage (with lower average quality).</p>
   <h3>Distinguishability and the Fundamental Limit</h3>
   <p>At Nash equilibrium, the discriminator achieves D*(x) = 0.5 everywhere: all samples are equally likely to be real or fake. At this point, the generator distribution exactly matches the real data. However, this outcome is unachievable if the true data is high-dimensional and complex.</p>
   <p>Binnacle et al. showed that unless the generator has infinite capacity and is trained to convergence, achieving perfect indistinguishability is impossible. The discriminator can always find some feature that distinguishes real from fake, leading to perpetual pressure on the generator to improve.</p>
   <p>In practice, sufficient indistinguishability is achieved: samples are perceived as realistic by human observers, pass standard metrics, and are useful for applications. Perfect equilibrium is neither necessary nor achievable. The goal is sufficient alignment of distributions for the intended use case.</p>
