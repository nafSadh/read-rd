<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kernel Methods — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

/* Grain texture overlay */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

/* Gradient background blobs */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

/* CONTROL GROUP (top-right, moves to center in detail-open mode) */
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

/* SIDEBAR */
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}

/* Sidebar tooltip appears on hover in detail-open mode */
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

/* MAIN CONTENT AREA */
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}

/* Main header (hero section) */
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}

.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}

.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}

.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}

/* Compact header (when scrolled down) */
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Main scrollable content */
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

/* Section blocks */
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}

.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}

.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}

.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}

.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}

.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}

.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}

.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

/* RIGHT PANEL (Details) */
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}

/* Ghost overlay behind right panel */
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}

.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}

.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}

.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}

.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}

.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Detail header with section number SVG and title */
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

/* Detail prose */
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}

.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}

.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

/* Feature grid */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

/* Verdict grid */
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}
.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

/* Diagram wrapper for SVG diagrams */
.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}
.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}
.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}
.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

/* Timeline */
.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

/* Callout boxes */
.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

/* Security boxes */
.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}
.security-box p:last-child{margin-bottom:0}

/* RESPONSIVE */
@media(max-width:1000px){
  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}
  .ctrl-btn{width:32px;height:32px;font-size:14px}
  .shell{display:block;position:relative}
  .main{height:100vh;width:100%}
  .main-head{padding:20px 20px 0}
  .hero-title{font-size:28px!important;letter-spacing:0!important}
  .masthead-sub{flex-direction:column;gap:2px}
  .main-head.compact{padding:0 20px;height:44px}
  .main-head.compact .hero-title{font-size:18px!important}
  .main-scroll{padding:0 20px 80px}
  .section-block{padding:28px 8px}
  .right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}
  .right:not(.closed){transform:translateX(0)}
  .right-inner{padding:0 20px 80px}
  .right-topbar{padding:10px 20px 0;height:44px}
  .detail-header h2{font-size:26px!important}
  .feat-grid,.verdict{grid-template-columns:1fr}
  .feat{border-left:none!important;padding-left:0!important}
  .feat:nth-child(2n){padding-left:0}
  .v-col{padding:16px 0!important}
  .v-col:last-child{border-left:none!important;padding-left:0!important}
  .tl-item{flex-direction:column!important;gap:4px}
  .tl-date{min-width:unset!important}
  .detail p{font-size:16px}
  .detail pre{font-size:12px;padding:14px 16px}
  .section-block .s-stat{flex-wrap:wrap}
  .section-block .s-stat .st{min-width:45%}
}

const sections = [
  { num: '01', short: 'Feature Map', title: 'The <em>Feature</em> Map Idea' },
  { num: '02', short: 'Kernel Trick', title: 'The <em>Kernel</em> Trick' },
  { num: '03', short: 'Common Kernels', title: '<em>Common</em> Kernels' },
  { num: '04', short: 'Mercer', title: 'Mercer\'s Theorem &amp; <em>Validity</em>' },
  { num: '05', short: 'SVM', title: '<em>Kernel</em> SVM' },
  { num: '06', short: 'Beyond', title: '<em>Beyond</em> SVMs' },

  { num: '08', short: 'Sources', title: '<em>Sources</em> & References' }
];

const summaries = [
  // 01 Feature Map
  `<p>The fundamental insight behind kernel methods is that linear classifiers become far more powerful when applied to nonlinearly transformed data. If we map input points x from their original space to a higher-dimensional feature space via φ(x), linear separation becomes possible for problems that are impossible in the original space.</p>
  <p>Classical example: the XOR problem. Two classes are perfectly separable in 2D by a circle, but no linear boundary works. However, map the points to 3D via φ(x) = (x₁, x₂, x₁·x₂), and the classes separate via a plane. The cost is the explicit computation and storage of these higher-dimensional features—yet the kernel trick eliminates this overhead.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">x ∈ ℝᵈ</div><div class="sl">Original Space</div></div>
    <div class="st"><div class="sv">φ(x) ∈ ℝᴰ</div><div class="sl">Feature Space</div></div>
    <div class="st"><div class="sv">D ≫ d</div><div class="sl">Often Exponential</div></div>
    <div class="st"><div class="sv">O(D)</div><div class="sl">Naive Cost</div></div>
  </div>`,

  // 02 Kernel Trick
  `<p>Many algorithms in machine learning depend only on inner products ⟨x, y⟩ between data points. The kernel trick exploits this: instead of explicitly computing φ(x) and φ(y), define K(x, y) = ⟨φ(x), φ(y)⟩, a kernel function that directly computes the inner product in feature space without materializing the features.</p>
  <p>Practical example: polynomial kernel K(x, y) = (⟨x, y⟩ + c)ᵈ implicitly maps to all monomials of degree ≤ d. For 100D input and d=3, this represents ~171,700 features, yet K is computed in O(100) time. The kernel acts as a similarity function: K(x, y) measures closeness in feature space, encoding the geometry of the problem.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">K(x,y)</div><div class="sl">Similarity</div></div>
    <div class="st"><div class="sv">φ(x)·φ(y)</div><div class="sl">Inner Product</div></div>
    <div class="st"><div class="sv">O(D)→O(d)</div><div class="sl">Complexity Gain</div></div>
    <div class="st"><div class="sv">≈171k</div><div class="sl">Implicit Features</div></div>
  </div>`,

  // 03 Common Kernels
  `<p>Several kernels appear repeatedly in practice. The <strong>linear kernel</strong> K(x, y) = ⟨x, y⟩ requires no feature map. The <strong>polynomial kernel</strong> K(x, y) = (⟨x, y⟩ + c)ᵈ encodes polynomial features up to degree d, controlled by offset c and degree d.</p>
  <p>The <strong>RBF (Gaussian) kernel</strong> K(x, y) = exp(−γ·‖x − y‖²) is the most widely used. It implicitly maps to infinite-dimensional space, making it remarkably flexible. The parameter γ controls bandwidth: small γ gives high-variance (wiggly) boundaries; large γ produces simpler, smoother fits. String kernels and graph kernels extend the framework to structured data.</p>
  <div class="s-chips">
    <span class="s-chip">Linear: K(x,y) = ⟨x,y⟩</span>
    <span class="s-chip">Polynomial: (⟨x,y⟩+c)ᵈ</span>
    <span class="s-chip">RBF: exp(−γ‖x−y‖²)</span>
    <span class="s-chip">Sigmoid: tanh(κ⟨x,y⟩+θ)</span>
  </div>`,

  // 04 Mercer
  `<p>Not all symmetric functions are valid kernels. Mercer's theorem states: a symmetric function K is a valid kernel if and only if it is positive semi-definite. This means for any finite set of points x₁,...,xₙ, the Gram matrix G with entries Gᵢⱼ = K(xᵢ, xⱼ) has all non-negative eigenvalues.</p>
  <p>Mercer's theorem guarantees the existence of a feature space and feature map φ such that K(x, y) = ⟨φ(x), φ(y)⟩. This is the theoretical foundation: valid kernels are precisely those that correspond to some (possibly infinite-dimensional) Hilbert space. New kernels can be constructed from old ones: sums, products, and compositions of valid kernels yield valid kernels.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">PSD</div><div class="sl">Gram Matrix</div></div>
    <div class="st"><div class="sv">λᵢ ≥ 0</div><div class="sl">All Eigenvalues</div></div>
    <div class="st"><div class="sv">Σ + K</div><div class="sl">Valid Combo</div></div>
    <div class="st"><div class="sv">K₁·K₂</div><div class="sl">Valid Product</div></div>
  </div>`,

  // 05 SVM
  `<p>Support Vector Machines are the canonical kernel method. The SVM finds the maximum-margin hyperplane that separates two classes. In the dual form, the optimization depends only on inner products K(xᵢ, xⱼ) between training points, never on φ explicitly.</p>
  <p>The soft-margin SVM allows misclassification via slack variables, controlled by regularization parameter C. The decision boundary is a weighted combination of kernel evaluations at support vectors: f(x) = Σᵢ αᵢ·yᵢ·K(xᵢ, x) + b. Support vectors are the critical points near the boundary; in many cases, only a small fraction are nonzero, enabling efficient prediction.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">α, b</div><div class="sl">Dual Variables</div></div>
    <div class="st"><div class="sv">max-margin</div><div class="sl">Objective</div></div>
    <div class="st"><div class="sv">f(x)=ΣαᵢyᵢK</div><div class="sl">Decision Rule</div></div>
    <div class="st"><div class="sv">O(n³)</div><div class="sl">Training Cost</div></div>
  </div>`,

  // 06 Beyond
  `<p>The kernel trick applies to any algorithm relying solely on inner products. <strong>Kernel PCA</strong> performs principal component analysis in feature space, extracting nonlinear components. <strong>Kernel ridge regression</strong> applies ridge regression post-φ, achieving flexible nonlinear regression with closed-form solutions.</p>
  <p><strong>Gaussian Processes</strong> treat K as a covariance function, enabling probabilistic inference with automatic uncertainty quantification. <strong>Kernel k-means</strong> and kernel CCA extend classical methods to nonlinear settings. These generalizations demonstrate the kernel trick's universality: it's not specific to SVMs but a general framework for nonlinear learning.</p>
  <div class="s-chips">
    <span class="s-chip">Kernel PCA</span>
    <span class="s-chip">Kernel Ridge Regression</span>
    <span class="s-chip">Gaussian Processes</span>
    <span class="s-chip">Kernel k-Means</span>
    <span class="s-chip">Kernel CCA</span>
  </div>`,

  // 07 Limitations
  `<p>Kernel methods' greatest strength becomes a limitation at scale. Computing and storing the n×n Gram matrix costs O(n²) memory; inverting it costs O(n³) time. For datasets with millions of points, this is prohibitive. Modern alternatives include random Fourier features (approximating kernels via random projections) and neural networks.</p>
  <p>Recent theory reveals a deep connection: neural tangent kernels (NTKs) link infinitely-wide neural networks to kernel methods. Deep learning succeeds by implicitly discovering useful feature maps. The future likely combines both: kernels for interpretability and theory, deep learning for scale and flexibility. Kernels remain indispensable for structured data, small-to-medium problems, and domains requiring uncertainty quantification.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">O(n²)</div><div class="sl">Memory</div></div>
    <div class="st"><div class="sv">O(n³)</div><div class="sl">Inversion</div></div>
    <div class="st"><div class="sv">RFF</div><div class="sl">Approximation</div></div>
    <div class="st"><div class="sv">NTK</div><div class="sl">Deep ↔ Kernels</div></div>
  </div>`,
  `<p>References and sources for further study on the topics covered in this deep dive.</p>`
];

const details = [
  // 01 Feature Map Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 — Details</div>
    <h2>The <em>Feature</em> Map Idea</h2>
  </div>
  <p>Linear classifiers are fundamentally limited: they can only learn hyperplane decision boundaries. In the original feature space, many natural problems require nonlinear boundaries. The key insight is that the same data, when mapped to a higher-dimensional space via a nonlinear transformation φ, may become linearly separable.</p>
  <h3>Why Feature Maps Help</h3>
  <p>Consider the XOR problem: (0,0) and (1,1) belong to class +1; (0,1) and (1,0) belong to class −1. No linear boundary in 2D works. But apply φ(x₁, x₂) = (x₁, x₂, x₁·x₂). The new points are φ(0,0)=(0,0,0), φ(1,1)=(1,1,1), φ(0,1)=(0,1,0), φ(1,0)=(1,0,0). Now a linear boundary in 3D (e.g., the plane x₃ = 0.5) separates them perfectly.</p>
  <p>Generalizing: if data is not linearly separable in ℝᵈ, map it to ℝᴰ with D > d via a nonlinear φ. Many classical nonlinear methods follow this pattern—training a linear classifier in φ-space.</p>
  <h3>The Computational Problem</h3>
  <p>The cost of this approach: you must compute φ(xᵢ) for every training point and every test point. If the feature space is high-dimensional (or infinite), this becomes prohibitive. For polynomial features of degree d in d input dimensions, the feature space size is O(dᵈ)—exponential. Storing and working with these features is infeasible for realistic problems.</p>
  <p>Enter the kernel trick: it avoids this computation entirely by working implicitly in feature space.</p>`,

  // 02 Kernel Trick Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Details</div>
    <h2>The <em>Kernel</em> Trick</h2>
  </div>
  <p>The kernel trick is remarkably simple: recognize that many learning algorithms depend only on pairwise inner products between points. In the context of feature maps, this means they need ⟨φ(xᵢ), φ(xⱼ)⟩ for all i, j. Define a kernel function K(x, y) = ⟨φ(x), φ(y)⟩ that computes this inner product directly, without ever computing φ explicitly.</p>
  <h3>Worked Example: Polynomial Kernel</h3>
  <p>Consider the polynomial kernel K(x, y) = (⟨x, y⟩ + c)ᵈ. This kernel implicitly computes inner products in a feature space of all monomials up to degree d. For d=2, c=0, and x, y ∈ ℝ², the expansion is: K(x,y) = (x₁y₁ + x₂y₂)² = x₁²y₁² + x₂²y₂² + 2x₁y₁x₂y₂. This corresponds to the 3D feature map φ(x) = (x₁², √2·x₁x₂, x₂²). The kernel evaluates the inner product in this lifted space in O(d) time without materializing φ.</p>
  <h3>RBF Kernel and Infinite Dimensions</h3>
  <p>The Gaussian (RBF) kernel K(x, y) = exp(−γ‖x − y‖²) implicitly maps to infinite-dimensional space. Despite this, the kernel evaluation takes only O(d) time. The expansion K(x, y) = Σₖ (γᵏ/k!) · Pk(x, y), where Pk involves high-order polynomial terms. This is why RBF kernels are so powerful—they harness infinite complexity without computation cost.</p>`,

  // 03 Common Kernels Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 — Details</div>
    <h2><em>Common</em> Kernels</h2>
  </div>
  <p>In practice, a small set of kernels covers most applications. Understanding their properties—implicit feature spaces, hyperparameters, computational costs—is essential for applying kernel methods effectively.</p>
  <h3>Linear Kernel</h3>
  <p>K(x, y) = ⟨x, y⟩ + c (often c = 0). No implicit feature map; operates in the original space. Useful when the problem is already well-separable linearly, or when interpretability is paramount. Computationally lightest and often surprisingly effective.</p>
  <h3>Polynomial Kernel</h3>
  <p>K(x, y) = (⟨x, y⟩ + c)ᵈ. Hyperparameters: offset c (usually 0 or 1) and degree d. Larger d captures higher-order interactions but risks overfitting. The feature space contains all monomials of degree ≤ d. On 100D input with d=3, this is ~171K features computed in O(100) operations.</p>
  <h3>RBF (Gaussian) Kernel</h3>
  <p>K(x, y) = exp(−γ·‖x − y‖²), where γ > 0 controls bandwidth. γ = 1/(2σ²) in standard notation. Small γ: wide, smooth basis functions; the boundary becomes very flexible and prone to overfitting. Large γ: narrow, localized basis; risk of underfitting. The RBF kernel is the default choice when problem structure is unknown. It's universal in the sense that it can approximate any continuous function on compact sets with enough training data.</p>
  <h3>Sigmoid Kernel</h3>
  <p>K(x, y) = tanh(κ·⟨x, y⟩ + θ). Resembles a neural network activation. Not always positive semi-definite, so use with caution (though often works in practice).</p>
  <h3>Kernels on Structured Data</h3>
  <p>String kernels count common substrings between sequences. Graph kernels measure structural similarity. Kernel methods extend naturally to any domain where you can define a sensible notion of similarity K(x, y).</p>`,

  // 04 Mercer Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 — Details</div>
    <h2><em>Mercer's</em> Theorem &amp; Validity</h2>
  </div>
  <p>A kernel function K is not arbitrary. Mercer's theorem characterizes exactly which symmetric functions correspond to valid inner products in some Hilbert space. This is the theoretical bedrock of kernel methods.</p>
  <h3>Statement</h3>
  <p>A continuous symmetric function K on [a,b] × [a,b] can be expressed as K(x, y) = Σᵢ λᵢ·φᵢ(x)·φᵢ(y) with λᵢ ≥ 0 if and only if K is positive semi-definite: for all finite sets of points {x₁,...,xₙ} and coefficients {c₁,...,cₙ}, we have ΣᵢΣⱼ cᵢ·cⱼ·K(xᵢ,xⱼ) ≥ 0.</p>
  <h3>Positive Semi-Definiteness Test</h3>
  <p>Compute the Gram matrix G with Gᵢⱼ = K(xᵢ, xⱼ). If all eigenvalues are non-negative, K is valid. This provides a practical check for candidate kernels. Note: if K fails this test on a finite sample, it's not a valid kernel.</p>
  <h3>Building New Kernels</h3>
  <p>If K₁ and K₂ are valid kernels, so are: K₁ + K₂, α·K₁ (α > 0), K₁·K₂, and K₁ ∘ K₂ (composition). This allows designing problem-specific kernels by combining simpler, validated kernels. For example, kernel sum K = K_linear + K_RBF creates a hybrid capturing both linear and nonlinear structures.</p>`,

  // 05 SVM Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 — Details</div>
    <h2><em>Kernel</em> SVM</h2>
  </div>
  <p>Support Vector Machines are the canonical application of the kernel trick. They find the maximum-margin separator between two classes, and when kernels are applied, they solve this problem in the implicit feature space φ(x).</p>
  <h3>The Dual Formulation</h3>
  <p>The primal SVM problem minimizes (1/2)‖w‖² + C·Σᵢ ξᵢ subject to yᵢ(⟨w, φ(xᵢ)⟩ + b) ≥ 1 − ξᵢ. The dual problem is: maximize Σᵢ αᵢ − (1/2)·ΣᵢΣⱼ αᵢ·αⱼ·yᵢ·yⱼ·K(xᵢ,xⱼ) subject to 0 ≤ αᵢ ≤ C and Σᵢ αᵢ·yᵢ = 0. Notice: the dual depends only on K(xᵢ,xⱼ), never on φ explicitly.</p>
  <h3>Decision Boundary and Support Vectors</h3>
  <p>The decision function is f(x) = Σᵢ αᵢ·yᵢ·K(xᵢ,x) + b. Typically, only a subset of αᵢ are nonzero; these correspond to support vectors—the critical points near or on the boundary. For large datasets, the number of support vectors is often much smaller than n, enabling efficient prediction despite O(n) evaluation in principle.</p>
  <h3>Hyperparameter Tuning</h3>
  <p>The regularization parameter C controls the trade-off between margin and misclassification. Small C: wider margin, more errors. Large C: narrow margin, fewer errors. Kernel-specific parameters (e.g., γ for RBF) also require tuning via cross-validation. Grid search or Bayesian optimization is standard.</p>`,

  // 06 Beyond Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 — Details</div>
    <h2><em>Beyond</em> SVMs</h2>
  </div>
  <p>The kernel trick is not an SVM-specific concept. Any algorithm that depends solely on pairwise inner products can be "kernelized." This universality makes kernel methods a general framework for nonlinear learning.</p>
  <h3>Kernel PCA</h3>
  <p>Classical PCA finds the top d directions of maximum variance in the data. Kernel PCA performs the same computation in feature space φ(x). The covariance matrix in feature space is (1/n)·ΣᵢΣⱼ φ(xᵢ)·φ(xⱼ)ᵀ, which depends only on the Gram matrix K. This enables nonlinear dimensionality reduction and visualization.</p>
  <h3>Kernel Ridge Regression</h3>
  <p>Ridge regression minimizes ‖y − Xβ‖² + λ‖β‖². The solution is β* = (XᵀX + λI)⁻¹Xᵀy. Kernelizing: replace X with Φ (the feature matrix), and the solution becomes β* = Σᵢ αᵢ·φ(xᵢ), where α solves (K + λnI)α = y. Prediction on new x is ŷ = Σᵢ αᵢ·K(xᵢ,x).</p>
  <h3>Gaussian Processes</h3>
  <p>A Gaussian Process defines a prior over functions via a covariance kernel K. Given data, the posterior distribution provides both predictions and uncertainty estimates. The kernel encodes assumptions about function smoothness and structure. GPs are particularly valuable in Bayesian optimization and active learning.</p>
  <h3>Kernel k-Means</h3>
  <p>Replace the Euclidean distance in k-means with kernel-induced distance: d²ₖ(x, y) = K(x,x) + K(y,y) − 2K(x,y). This enables nonlinear clustering where tight circular clusters in input space become separable in feature space.</p>`,

  // 07 Limitations Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 — Details</div>
    <h2><em>Limitations</em> &amp; Modern Context</h2>
  </div>
  <p>Despite their elegance and theoretical appeal, kernel methods face practical limitations in the era of large-scale data and deep learning. Understanding these constraints is essential for choosing the right tool.</p>
  <h3>Computational Scalability</h3>
  <p>The kernel matrix is n × n, requiring O(n²) memory. Inverting it (as in kernel ridge regression or kriging) costs O(n³). For n = 1 million, this is prohibitive. Kernel SVM training via quadratic programming scales roughly as O(n² to n³) depending on the solver. Approximations exist—low-rank decompositions, Nyström methods, random features—but add complexity.</p>
  <h3>Kernel Selection and Interpretability</h3>
  <p>Choosing the right kernel is an art. There are no principled rules; practitioners rely on cross-validation and intuition. Once trained, kernel models offer limited interpretability compared to decision trees or linear models. The "black box" nature can be problematic in domains requiring explainability.</p>
  <h3>Random Fourier Features</h3>
  <p>One scalability solution: approximate a kernel K via random projections. For RBF kernels, sample random frequencies ω ~ P and map x to cos(⟨ω, x⟩) and sin(⟨ω, x⟩). Inner products of these random features approximate K(x, y). This trades off accuracy for computational efficiency, enabling linear methods on large datasets.</p>
  <h3>Neural Tangent Kernels and Deep Learning</h3>
  <p>Recent theory (Jacot et al., 2019) reveals that infinitely-wide neural networks in lazy training regime behave as kernel machines with the Neural Tangent Kernel (NTK). This deep learning ↔ kernel connection is profound: it explains why deep networks generalize and suggests kernels aren't obsolete, but rather kernels and neural networks are two perspectives on the same phenomenon.</p>
  <h3>When Kernels Remain Essential</h3>
  <p>Kernels excel on structured data (strings, graphs, molecules) where hand-crafted kernels encode domain knowledge. They provide uncertainty estimates naturally (via Gaussian Processes). They're invaluable for small-to-medium datasets where generalization matters more than computational speed. For theoreticians, kernels offer a clean, interpretable framework for nonlinear learning.</p>`,
  `<div class="detail-header"><div class="num">08 · Sources</div><h2><em>Sources</em> & References</h2></div>
<h3>Foundational Papers & Textbooks</h3>
<p><a href="https://www.kernelmethods.org/" target="_blank">Scholkopf & Smola — Learning with Kernels</a> — Comprehensive monograph on kernel methods theory and applications.</p>
<p><a href="https://cs229.stanford.edu/" target="_blank">Stanford CS229 — Lecture Notes on Kernel Methods</a> — Official course materials covering kernels, Mercer's theorem, and kernel machines.</p>
<h3>Core Concepts & Proofs</h3>
<p><a href="https://en.wikipedia.org/wiki/Kernel_method" target="_blank">Wikipedia: Kernel Methods</a> — Overview of kernel tricks, kernel matrices, and the relationship between kernels and feature spaces.</p>
<p><a href="https://en.wikipedia.org/wiki/Reproducing_kernel_Hilbert_space" target="_blank">Wikipedia: Reproducing Kernel Hilbert Space (RKHS)</a> — Mathematical foundations underlying all kernel methods.</p>
<p><a href="https://en.wikipedia.org/wiki/Positive-definite_matrix" target="_blank">Wikipedia: Positive-Definite Matrices</a> — Mathematical foundations of positive semi-definite matrices and their role in characterizing valid kernels via Mercer's theorem.</p>

// Build UI
function initUI() {
  const shell = document.createElement('div');
  shell.className = 'shell';

  // Sidebar
  const sidebar = document.createElement('div');
  sidebar.className = 'sidebar';
  sidebar.innerHTML = `
    <div class="sidebar-head">
      <div class="sidebar-logo">K<em>M</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  `;

  const nav = sidebar.querySelector('#sidebar-nav');
  sections.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (i === 0 ? ' active' : '');
    item.setAttribute('data-label', s.short);
    item.innerHTML = `<span class="sidebar-num">${s.num}</span><span class="sidebar-label">${s.short}</span>`;
    item.onclick = () => showSection(i);
    nav.appendChild(item);
  });

  // Sidebar hover tooltip
  const sidebarTip = document.createElement('div');
  sidebarTip.className = 'sidebar-tooltip';
  document.body.appendChild(sidebarTip);
  const sidebarEl = sidebar;
  let tipActive = false;
  nav.addEventListener('mouseleave', () => {
    tipActive = false;
    sidebarTip.classList.remove('visible');
  });
  nav.addEventListener('mousemove', (e) => {
    if (!document.body.classList.contains('detail-open')) {
      if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
      return;
    }
    const item = e.target.closest('.sidebar-item');
    if (!item) {
      if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
      return;
    }
    const rect = item.getBoundingClientRect();
    const sRight = sidebarEl.getBoundingClientRect().right;
    sidebarTip.textContent = item.getAttribute('data-label');
    sidebarTip.style.left = (sRight - 1) + 'px';
    sidebarTip.style.top = rect.top + 'px';
    sidebarTip.style.height = rect.height + 'px';
    if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
  });

  // Main area
  const main = document.createElement('div');
  main.className = 'main';

  // Header
  const mainHead = document.createElement('div');
  mainHead.className = 'main-head';
  mainHead.innerHTML = `
    <div class="main-head-inner">
      <div class="hero-badge"><span class="dot"></span>SCPD ML Course</div>
      <div class="hero-title">Kernel <em>Methods</em></div>
      <div class="masthead-rule"></div>
      <div class="masthead-sub">
        <span>The Kernel Trick &amp; Beyond · Seven Sections</span>
      </div>
    </div>
  `;

  // Scroll area
  const mainScroll = document.createElement('div');
  mainScroll.className = 'main-scroll';
  mainScroll.innerHTML = '<div class="main-scroll-inner" id="main-scroll-inner"></div>';

  const scrollInner = mainScroll.querySelector('#main-scroll-inner');
  sections.forEach((s, i) => {
    const block = document.createElement('div');
    block.className = 'section-block' + (i === 0 ? '' : ' hidden');
    block.style.display = i === 0 ? 'block' : 'none';
    block.id = `section-${i}`;
    block.innerHTML = `
      <div class="s-num">
        <span>Section ${s.num}</span>
        <button class="s-detail-btn" data-idx="${i}">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M10 4l2 2m0 0l2 2m-2-2l-2 2m2-2l2-2" class="icon-open"/>
            <path d="M6 12l-2-2m0 0l-2-2m2 2l2-2m-2 2l-2 2" class="icon-close" style="display:none"/>
          </svg>
        </button>
      </div>
      <h2>${s.title}</h2>
      <div class="s-content">${summaries[i]}</div>
    `;
    scrollInner.appendChild(block);
  });

  main.appendChild(mainHead);
  main.appendChild(mainScroll);

  // Right panel
  const right = document.createElement('div');
  right.className = 'right closed';
  right.innerHTML = `
    <div class="right-topbar">
      <div class="sticky-title" id="sticky-title"></div>
    </div>
    <div class="right-inner" id="right-inner"></div>
  `;

  sections.forEach((s, i) => {
    const detailEl = document.createElement('div');
    detailEl.className = 'detail';
    detailEl.id = `detail-${i}`;
    detailEl.style.display = i === 0 ? 'block' : 'none';
    detailEl.innerHTML = details[i];
    right.querySelector('#right-inner').appendChild(detailEl);
  });

  shell.appendChild(sidebar);
  shell.appendChild(main);
  shell.appendChild(right);
  document.body.appendChild(shell);

  // Controls
  const ctrlGroup = document.createElement('div');
  ctrlGroup.className = 'ctrl-group';
  ctrlGroup.innerHTML = `
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" onclick="toggleDetail()">
      <svg class="icon-open" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="12" height="12" rx="2"/><line x1="3" y1="9" x2="15" y2="9"/><line x1="9" y1="3" x2="9" y2="15"/>
      </svg>
      <svg class="icon-close" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="3" x2="15" y2="15"/><line x1="15" y1="3" x2="3" y2="15"/>
      </svg>
    </button>
  `;
  document.body.appendChild(ctrlGroup);

  // Event handlers
  document.addEventListener('click', (e) => {
    const detailBtn = e.target.closest('.s-detail-btn');
    if (detailBtn) {
      const idx = parseInt(detailBtn.dataset.idx);
      showDetail(idx);
      e.stopPropagation();
    }
  });

  mainScroll.addEventListener('scroll', () => {
    const isCompact = mainScroll.scrollTop > 20;
    mainHead.classList.toggle('compact', isCompact);
  });

  right.addEventListener('scroll', () => {
    const rightTopbar = right.querySelector('.right-topbar');
    const sticky = right.querySelector('.sticky-title');
    if (right.scrollTop > 10) {
      rightTopbar.classList.add('scrolled');
      sticky.classList.add('visible');
    } else {
      rightTopbar.classList.remove('scrolled');
      sticky.classList.remove('visible');
    }
  });
}

function showSection(idx) {
  document.querySelectorAll('.section-block').forEach((el, i) => {
    el.style.display = i === idx ? 'block' : 'none';
  });
  document.querySelectorAll('.detail').forEach((el, i) => {
    el.style.display = i === idx ? 'block' : 'none';
  });
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.getElementById('sticky-title').textContent = sections[idx].title.replace(/<[^>]*>/g, '');
  closeDetail();
}

function showDetail(idx) {
  document.body.classList.add('detail-open');
  document.querySelector('.right').classList.remove('closed');
  showSection(idx);
}

function closeDetail() {
  document.body.classList.remove('detail-open');
  document.querySelector('.right').classList.add('closed');
}

function toggleDetail() {
  const isOpen = document.body.classList.contains('detail-open');
  if (isOpen) closeDetail();
  else {
    const idx = Array.from(document.querySelectorAll('.sidebar-item')).findIndex(e => e.classList.contains('active'));
    showDetail(idx);
  }
}

function toggleTheme() {
  const theme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
  document.body.dataset.theme = theme;
  localStorage.setItem('kernel-theme', theme);
}

document.addEventListener('DOMContentLoaded', () => {
  initUI();
  const saved = localStorage.getItem('kernel-theme') || 'light';
  document.body.dataset.theme = saved;
});
</script>

</body>
</html>
