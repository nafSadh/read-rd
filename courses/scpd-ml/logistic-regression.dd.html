<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logistic Regression — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Binary Classification', title: '<em>Binary</em> Classification Problem' },
  { num: '02', short: 'Logistic Function', title: 'The <em>Sigmoid</em> Function' },
  { num: '03', short: 'Maximum Likelihood', title: '<em>Maximum</em> Likelihood Estimation' },
  { num: '04', short: 'Gradient Ascent', title: '<em>Gradient</em> Update Rule' },
  { num: '05', short: 'Perceptron', title: 'The <em>Perceptron</em> Algorithm' },
  { num: '06', short: 'Multi-class', title: '<em>Multi-class</em> Softmax Regression' },
  { num: '07', short: "Newton's Method", title: "<em>Newton's</em> Method & Hessian" },
  { num: '08', short: 'Decision Boundaries', title: '<em>Linear</em> & Nonlinear Boundaries' }
,
  { num: '09', short: 'References', title: 'References & <em>Further</em> Reading' }];

const summaries = [
  // 01 Binary Classification
  `<p>Binary classification extends regression to predict discrete labels: 0 or 1, negative or positive class. Unlike regression where we predict continuous values, classification requires discrete outputs and a natural threshold at probability 0.5. The central challenge arises because linear regression can produce values outside [0,1], making it unsuitable for probability predictions.</p>
  <p>The decision boundary—the separating surface where the classifier transitions from predicting class 0 to class 1—is fundamental to classification geometry. In logistic regression, this boundary is linear in the feature space, enabling efficient learning while maintaining interpretability. Classification accuracy depends critically on feature engineering and the separability of the two classes.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Binary</div><div class="sl">Output Space</div></div>
    <div class="st"><div class="sv">Threshold</div><div class="sl">At 0.5</div></div>
    <div class="st"><div class="sv">Linear</div><div class="sl">Decision Boundary</div></div>
    <div class="st"><div class="sv">XCS229</div><div class="sl">Week 2</div></div>
  </div>`,

  // 02 Logistic Function
  `<p>The sigmoid function σ(z) = 1/(1+e^(-z)) elegantly maps all real numbers to the interval [0,1], making it ideal for probability estimation. The sigmoid is monotonically increasing, differentiable everywhere, and asymptotically approaches 0 and 1 at the extremes. Its S-shaped curve reflects the intuitive behavior of decision-making: uncertain predictions near z=0, confident predictions far from zero.</p>
  <p>Logistic regression applies the sigmoid to the linear predictor: P(y=1|x) = σ(θᵀx). This probabilistic interpretation allows Bayesian reasoning and principled uncertainty quantification. The decision boundary occurs where σ(θᵀx) = 0.5, equivalently where θᵀx = 0, making classification geometrically equivalent to linear separation in the original feature space.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Sigmoid Properties</h4>
      <p>Monotonic, differentiable, squashes all reals to [0,1], with σ'(z) = σ(z)(1−σ(z)).</p>
    </div>
    <div class="feat">
      <h4>Probabilistic View</h4>
      <p>Output represents P(y=1|x,θ), enabling Bayesian interpretation and uncertainty estimates.</p>
    </div>
    <div class="feat">
      <h4>Decision Boundary</h4>
      <p>Occurs at σ(θᵀx) = 0.5, equivalent to linear boundary θᵀx = 0 in feature space.</p>
    </div>
    <div class="feat">
      <h4>Gradient Friendly</h4>
      <p>Smooth derivative enables efficient gradient-based optimization without discrete jumps.</p>
    </div>
  </div>`,

  // 03 Maximum Likelihood
  `<p>Maximum likelihood estimation frames logistic regression as finding parameters that maximize the probability of observing the training data. For binary classification with Bernoulli labels, the likelihood is L(θ) = ∏ᵢ P(yᵢ|xᵢ,θ), where P(y=1|x) = σ(θᵀx) and P(y=0|x) = 1−σ(θᵀx). This can be rewritten as a single expression: P(y|x) = σ(θᵀx)^y · (1−σ(θᵀx))^(1−y).</p>
  <p>Taking logarithms transforms the product into a sum: ℓ(θ) = Σᵢ [yᵢ log σ(θᵀxᵢ) + (1−yᵢ) log(1−σ(θᵀxᵢ))]. This is the log-likelihood or cross-entropy loss. Maximizing log-likelihood is equivalent to minimizing cross-entropy error, providing the objective function for optimization. The gradient ∂ℓ/∂θ = Σᵢ (yᵢ − σ(θᵀxᵢ)) xᵢ has an elegant form that suggests gradient ascent.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Bernoulli</div><div class="sl">Label Distribution</div></div>
    <div class="st"><div class="sv">Log-likelihood</div><div class="sl">Objective</div></div>
    <div class="st"><div class="sv">Cross-entropy</div><div class="sl">Loss Equiv.</div></div>
    <div class="st"><div class="sv">y ∈ {0,1}</div><div class="sl">Output Space</div></div>
  </div>`,

  // 04 Gradient Update
  `<p>The gradient ascent update rule for logistic regression closely resembles the least-mean-squares (LMS) rule from linear regression: θ := θ + α Σᵢ (yᵢ − hθ(xᵢ)) xᵢ. However, here hθ(x) = σ(θᵀx) rather than θᵀx, making this a nonlinear optimization problem despite the linear decision boundary. Each iteration moves parameters in the direction of increasing likelihood, with step size α controlling convergence speed.</p>
  <p>Stochastic gradient ascent updates on individual examples: θ := θ + α (yᵢ − σ(θᵀxᵢ)) xᵢ. This variant converges faster in practice and handles large datasets efficiently. The algorithm terminates when the gradient norm falls below a threshold or after a fixed number of iterations. Unlike the closed-form solution for linear regression, logistic regression requires iterative optimization, but convergence is guaranteed for convex objectives like log-likelihood.</p>
  <div class="callout">
    <h4>Key Insight</h4>
    <p>The update rule closely mirrors LMS, but the sigmoid nonlinearity makes this a harder optimization problem that generally requires iterative methods rather than closed-form solutions.</p>
  </div>
  <div class="s-chips">
    <span class="s-chip">Convex objective</span>
    <span class="s-chip">Guaranteed convergence</span>
    <span class="s-chip">Stochastic variant</span>
    <span class="s-chip">Differentiable everywhere</span>
  </div>`,

  // 05 Perceptron
  `<p>The perceptron algorithm predates logistic regression and uses a simple classification rule: predict 1 if θᵀx ≥ 0, else predict 0. During training, update parameters only when misclassifications occur: θ := θ + y xᵢ when y(θᵀx) ≤ 0. This greedy approach has provable convergence guarantees when the data is linearly separable, formalized in the perceptron convergence theorem.</p>
  <p>The perceptron's strength lies in simplicity and geometric interpretation: it finds any separating hyperplane when one exists. However, it produces no probabilistic output, provides no natural measure of classification confidence, and guarantees nothing when data isn't linearly separable. Logistic regression extends perceptron ideas by outputting probabilities and optimizing a principled loss function, making it more robust and interpretable than the perceptron.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Strengths</h4>
      <ul>
        <li>Convergence guaranteed on separable data</li>
        <li>Simple geometric interpretation</li>
        <li>Efficient training with no hyperparameters</li>
        <li>Linear decision boundary</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Weaknesses</h4>
      <ul>
        <li>No probabilistic output</li>
        <li>Fails on non-separable data</li>
        <li>No confidence estimates</li>
        <li>Solution non-unique on separable data</li>
      </ul>
    </div>
  </div>`,

  // 06 Multi-class
  `<p>Extending classification to K classes (K > 2) requires replacing the binomial Bernoulli distribution with the multinomial distribution. Softmax regression outputs a K-dimensional probability vector where each component represents P(y=k|x) = exp(θₖᵀx) / Σⱼ exp(θⱼᵀx). The softmax function normalizes K scores into valid probabilities summing to 1, generalizing the sigmoid which is softmax for binary (K=2) classes.</p>
  <p>The multinomial log-likelihood extends naturally: ℓ(θ) = Σᵢ Σₖ 𝟙[yᵢ=k] log P(y=k|xᵢ). This is also called categorical cross-entropy loss, the fundamental objective for multi-class classification. The gradient and optimization follow the same principled approach as binary logistic regression. One-vs-all (OVA) offers an alternative: train K independent binary classifiers and predict argmax of the K scores, though softmax is more principled.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <polygon points="0 0, 10 3, 0 6" fill="#2e6ab4"></polygon>
        </marker>
      </defs>
      <rect x="20" y="20" width="80" height="160" class="node" rx="4"></rect>
      <text x="60" y="110" class="node-text" text-anchor="middle">Features</text>
      <line x1="100" y1="50" x2="150" y2="50" class="edge" marker-end="url(#arrowhead)"></line>
      <line x1="100" y1="110" x2="150" y2="110" class="edge" marker-end="url(#arrowhead)"></line>
      <line x1="100" y1="170" x2="150" y2="170" class="edge" marker-end="url(#arrowhead)"></line>
      <rect x="150" y="30" width="70" height="40" class="node" rx="3"></rect>
      <text x="185" y="60" class="node-text" font-size="10" text-anchor="middle">Score₁</text>
      <rect x="150" y="90" width="70" height="40" class="node" rx="3"></rect>
      <text x="185" y="120" class="node-text" font-size="10" text-anchor="middle">Score₂</text>
      <rect x="150" y="150" width="70" height="40" class="node" rx="3"></rect>
      <text x="185" y="180" class="node-text" font-size="10" text-anchor="middle">Score₃</text>
      <line x1="220" y1="50" x2="270" y2="50" class="edge-hi" marker-end="url(#arrowhead)"></line>
      <line x1="220" y1="110" x2="270" y2="110" class="edge-hi" marker-end="url(#arrowhead)"></line>
      <line x1="220" y1="170" x2="270" y2="170" class="edge-hi" marker-end="url(#arrowhead)"></line>
      <rect x="270" y="30" width="70" height="40" class="node-hi" rx="3"></rect>
      <text x="305" y="60" class="node-text" font-size="10" text-anchor="middle">P(Y=1)</text>
      <rect x="270" y="90" width="70" height="40" class="node-hi" rx="3"></rect>
      <text x="305" y="120" class="node-text" font-size="10" text-anchor="middle">P(Y=2)</text>
      <rect x="270" y="150" width="70" height="40" class="node-hi" rx="3"></rect>
      <text x="305" y="180" class="node-text" font-size="10" text-anchor="middle">P(Y=3)</text>
      <text x="370" y="30" class="lbl" font-size="10">Softmax</text>
    </svg>
  </div>`,

  // 07 Newton's Method
  `<p>Newton's method is a second-order optimization technique that converges faster than gradient descent by incorporating curvature information via the Hessian matrix H, where H_ij = ∂²ℓ/∂θᵢ∂θⱼ. The update rule is θ := θ + H⁻¹ ∇ℓ(θ). For logistic regression, the Hessian is H = −XᵀD(σ(Xθ))X where D is a diagonal matrix of sigmoid derivatives, making H positive definite and the objective strictly convex.</p>
  <p>Newton's method typically converges in far fewer iterations than gradient ascent, often achieving Newton-level quadratic convergence near the optimum. However, computing and inverting the Hessian scales as O(d³) in dimension d, making it expensive for high-dimensional problems. In practice, quasi-Newton methods like BFGS approximate the Hessian efficiently. For logistic regression on moderate-sized datasets, Newton's method and its variants are standard in optimization libraries due to superior convergence speed.</p>
  <div class="callout">
    <h4>Convergence Benefit</h4>
    <p>Newton's method exhibits quadratic convergence (error squared each iteration), vastly faster than the linear convergence of gradient ascent. The trade-off is higher cost per iteration due to Hessian computation.</p>
  </div>`,

  // 08 Decision Boundaries
  `<p>The decision boundary of logistic regression is linear: the set {x : θᵀx = 0}. This linear boundary directly corresponds to the geometry where σ(θᵀx) = 0.5, the natural classification threshold. Linear boundaries are geometrically interpretable and computationally efficient, but they lack expressiveness for data with complex, nonlinear separation patterns.</p>
  <p>Nonlinear boundaries arise by feature engineering: applying nonlinear transformations φ(x) before classification. For example, adding polynomial features like x₁², x₁x₂, x₂² to a 2D input creates a 5D feature space where logistic regression can learn curved boundaries in the original space. This approach preserves the convexity and efficient optimization of logistic regression while gaining expressiveness. Deep neural networks generalize this idea, learning hierarchical feature transformations automatically, though at the cost of losing the convexity guarantee.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="20" class="lbl" font-weight="600" font-size="12">Linear Boundary</text>
      <circle cx="70" cy="90" r="30" class="node" stroke-width="2" fill="none"></circle>
      <circle cx="140" cy="130" r="25" class="node" stroke-width="2" fill="none"></circle>
      <line x1="80" y1="50" x2="130" y2="140" class="edge" stroke-width="2"></line>
      <circle cx="150" cy="80" r="8" fill="#2e6ab4" opacity="0.6"></circle>
      <circle cx="180" cy="120" r="8" fill="#8b2020" opacity="0.6"></circle>
      <text x="380" y="20" class="lbl" font-weight="600" font-size="12">Nonlinear Boundary</text>
      <circle cx="360" cy="90" r="35" class="node" stroke-width="2" fill="none"></circle>
      <circle cx="440" cy="90" r="20" class="node" stroke-width="2" fill="none"></circle>
      <path d="M 330 60 Q 390 30, 450 50" class="edge" stroke-width="2" fill="none"></path>
      <path d="M 330 120 Q 390 150, 450 130" class="edge" stroke-width="2" fill="none"></path>
      <circle cx="345" cy="75" r="8" fill="#2e6ab4" opacity="0.6"></circle>
      <circle cx="435" cy="100" r="8" fill="#8b2020" opacity="0.6"></circle>
    </svg>
  </div>`
,

  // 09 References & Further Reading
  `<p><strong>Key References:</strong></p>
<ul style="font-size: 14px; line-height: 1.8;">
  <li><a href="https://cs229.stanford.edu/" target="_blank">CS229: Machine Learning Course Homepage</a></li>
  <li><a href="https://cs229.stanford.edu/" target="_blank">Stanford Engineering Everywhere - CS229 Materials</a></li>
  <li><a href="https://hastie.su.domains/ElemStatLearn/" target="_blank">Hastie et al. - The Elements of Statistical Learning (Ch. 4)</a></li>
  <li><a href="https://en.wikipedia.org/wiki/Logistic_regression" target="_blank">Logistic Regression - Wikipedia</a></li>
  <li><a href="https://en.wikipedia.org/wiki/Sigmoid_function" target="_blank">Sigmoid Function - Wikipedia</a></li>
  <li><a href="https://arxiv.org/abs/0810.4521" target="_blank">Ng & Jordan - Discriminative vs. Generative Classifiers</a></li>
</ul>`];

const details = [
  // 01 Binary Classification Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Binary Classification</div>
    <h2>Why <em>Linear</em> Regression Fails</h2>
  </div>
  <p>Linear regression predicts unbounded real values hθ(x) = θᵀx, which is fundamentally incompatible with classification where we need discrete outputs. When applied naively to binary classification, linear regression often produces predictions well outside [0,1], making probability interpretation impossible. A threshold like "predict 1 if hθ(x) ≥ 0.5" is arbitrary and lacks principled justification.</p>
  <p>Consider the geometric interpretation: linear regression minimizes squared error between predictions and labels {0,1}. This loss function is symmetric and unbounded, driving predictions toward extremes. Outliers in one class push the decision boundary far from the natural separation between classes. An input far from the training data might receive predictions like −10 or +50, nonsensical probabilities.</p>
  <h3>Decision Boundaries and Geometry</h3>
  <p>The decision boundary is the set of points where the classifier transitions between predictions. For logistic regression with P(y=1|x) = σ(θᵀx), the natural boundary is where σ(θᵀx) = 0.5. Since the sigmoid is monotonic, this occurs exactly where θᵀx = 0, a d-dimensional hyperplane in feature space. This linear boundary has elegant geometric properties: it's determined by only d parameters, interpretable as the normal vector indicating the direction of increasing probability.</p>
  <p>Separability and margins determine classification difficulty. Data is linearly separable if a hyperplane perfectly divides the classes, enabling perceptron convergence and logistic regression with zero training error. When classes overlap, no linear boundary perfectly separates them, but logistic regression still learns the best linear boundary in maximum likelihood sense. The margin—minimum distance from decision boundary to training points—quantifies robustness: larger margins indicate more confident, generalizable classifiers.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Class Imbalance</h4>
      <p>Unequal class frequencies bias optimization toward the majority class. Cost-sensitive learning or weighted loss functions correct this imbalance.</p>
    </div>
    <div class="feat">
      <h4>Feature Scaling</h4>
      <p>Gradient ascent convergence depends on feature scales. Normalization to unit variance accelerates optimization and stabilizes learning.</p>
    </div>
    <div class="feat">
      <h4>Regularization</h4>
      <p>L1 (Lasso) and L2 (Ridge) penalties prevent overfitting by constraining parameter magnitudes. L1 enables feature selection.</p>
    </div>
    <div class="feat">
      <h4>Confidence Calibration</h4>
      <p>Logistic regression outputs should reflect true probabilities. Platt scaling or Isotonic regression improves calibration post-hoc.</p>
    </div>
  </div>`,

  // 02 Sigmoid Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Sigmoid Function</div>
    <h2>σ(z) = 1/(1+e<sup>−z</sup>)</h2>
  </div>
  <p>The sigmoid function σ(z) = 1/(1+e⁻ᶻ) is defined for all real z and outputs values in (0,1), making it ideal for modeling probabilities. Algebraically, it satisfies the identity 1 − σ(z) = σ(−z), a symmetry useful in derivations. The sigmoid is bounded, monotonic, and smooth—properties essential for reliable optimization.</p>
  <p>Differentiating the sigmoid yields σ'(z) = σ(z)(1−σ(z)), a remarkably clean form. This derivative is positive everywhere, confirming monotonicity, and reaches maximum 0.25 at z=0, where uncertainty is highest. The derivative depends only on σ(z), enabling efficient computation without re-evaluating the exponential. This mathematical elegance makes sigmoid the canonical choice for binary classification.</p>

      <text x="490" y="250" class="lbl">z</text>
      <text x="20" y="20" class="lbl">σ(z)</text>
      <text x="30" y="270" class="lbl" font-size="11">−4</text>
      <text x="190" y="270" class="lbl" font-size="11">0</text>
      <text x="350" y="270" class="lbl" font-size="11">4</text>

      <text x="200" y="165" class="lbl">σ(0)=0.5</text>
    </svg>
  </div>
  <h3>Historical Context and Motivation</h3>
  <p>The sigmoid emerges naturally from multiple perspectives. In information theory, it's the canonical link function for Bernoulli distributions in generalized linear models (GLMs), meaning it connects linear predictors to class probabilities optimally under maximum likelihood. In neuroscience, it approximates the activation function of biological neurons, bounded between resting and firing rates. These foundations explain why sigmoid is ubiquitous across machine learning and deep learning.</p>
  <p>Alternatives like the hyperbolic tangent tanh(z) = (eᶻ − e⁻ᶻ)/(eᶻ + e⁻ᶻ) produce outputs in (−1,1) and are sometimes used in neural networks. The logit function logit(p) = log(p/(1−p)) is the inverse sigmoid, converting probabilities to unbounded scores. These related functions share the sigmoid's smoothness and mathematical convenience, though sigmoid dominates binary classification due to its direct probabilistic interpretation.</p>

    <span class="s-chip">σ'(z) = σ(z)(1−σ(z))</span>
    <span class="s-chip">Symmetric: 1−σ(z)=σ(−z)</span>
  </div>`,

  // 03 Maximum Likelihood Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Maximum Likelihood</div>
    <h2><em>Bernoulli</em> Log-Likelihood</h2>
  </div>
  <p>Maximum likelihood estimation (MLE) selects parameters that maximize the probability of observing the training data. For binary classification, assuming each label yᵢ is drawn independently from Bernoulli(σ(θᵀxᵢ)), the likelihood is L(θ) = ∏ᵢ P(yᵢ|xᵢ,θ). This product expands to L(θ) = ∏ᵢ σ(θᵀxᵢ)^yᵢ · (1−σ(θᵀxᵢ))^(1−yᵢ).</p>
  <p>Taking logarithms converts the intractable product into a tractable sum: ℓ(θ) = log L(θ) = Σᵢ [yᵢ log σ(θᵀxᵢ) + (1−yᵢ) log(1−σ(θᵀxᵢ))]. This is the log-likelihood. Equivalently, we minimize the negative log-likelihood (NLL) or cross-entropy loss J(θ) = −ℓ(θ). Cross-entropy measures the divergence between the predicted distribution σ(θᵀxᵢ) and the true distribution yᵢ, motivating the name.</p>
  <h3>Deriving the Gradient</h3>
  <p>To optimize, we compute ∂ℓ/∂θ = Σᵢ [yᵢ · σ'(θᵀxᵢ)xᵢ/σ(θᵀxᵢ) − (1−yᵢ) · σ'(θᵀxᵢ)xᵢ/(1−σ(θᵀxᵢ))]. Substituting σ'(z) = σ(z)(1−σ(z)) and simplifying yields ∂ℓ/∂θ = Σᵢ (yᵢ − σ(θᵀxᵢ)) xᵢ. This elegant gradient has a clear interpretation: update proportional to the error (yᵢ − prediction), weighted by the input xᵢ. Large errors drive large updates; zero errors stop updates.</p>
  <p>The objective ℓ(θ) is strictly concave in θ (for logistic regression), guaranteeing a unique global optimum. This convexity is a major advantage over many ML models: any local optimum found by gradient ascent is the global optimum. Combined with the smooth gradient everywhere, this ensures reliable, well-behaved optimization without saddle points or multiple local minima to confuse learning algorithms.</p>
  <div class="callout">
    <h4>Convexity Guarantee</h4>
    <p>The log-likelihood objective is strictly concave, ensuring any local optimum is global. Gradient ascent reliably converges to the unique best solution.</p>
  </div>
  <div class="timeline">
    <div class="tl-item">
      <div class="tl-date">Step 1</div>
      <div class="tl-text">Define Bernoulli model P(y|x,θ) = σ(θᵀx)^y (1−σ(θᵀx))^(1−y)</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Step 2</div>
      <div class="tl-text">Form likelihood L(θ) = ∏ᵢ P(yᵢ|xᵢ,θ)</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Step 3</div>
      <div class="tl-text">Take logarithm: ℓ(θ) = Σᵢ log P(yᵢ|xᵢ,θ)</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Step 4</div>
      <div class="tl-text">Compute gradient: ∇ℓ(θ) = Σᵢ (yᵢ − σ(θᵀxᵢ)) xᵢ</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Step 5</div>
      <div class="tl-text">Optimize via gradient ascent with guaranteed convergence</div>
    </div>
  </div>`,

  // 04 Gradient Update Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Gradient Ascent Update</div>
    <h2>θ := θ + α∇ℓ(θ)</h2>
  </div>
  <p>The gradient ascent algorithm iteratively moves parameters in the direction of increasing likelihood. Starting from an initial θ₀ (often zero), repeatedly apply θₜ₊₁ := θₜ + α ∇ℓ(θₜ). The learning rate α controls step size: too large risks divergence, too small causes slow convergence. For convex objectives like log-likelihood, careful choice of α ensures convergence to the optimum.</p>
  <p>Stochastic gradient ascent (SGA) updates on mini-batches or single examples: θ := θ + α(yᵢ − σ(θᵀxᵢ))xᵢ. This variant introduces noise but converges faster in practice, requires less memory, and scales to massive datasets. Modern implementations use adaptive learning rates (Adam, RMSprop) that adjust α per parameter based on gradient history, further accelerating convergence without careful manual tuning.</p>
  <h3>Convergence Analysis</h3>
  <p>Batch gradient ascent on convex, L-smooth objectives converges at rate O(1/t), meaning error decreases inversely with iterations. With diminishing step sizes αₜ = 1/t, convergence is guaranteed. Accelerated methods like Nesterov momentum achieve O(1/t²) rates. For strictly convex objectives like logistic regression, convergence to the unique global optimum is guaranteed for any positive α smaller than 2/L where L is the Lipschitz constant of ∇ℓ.</p>
  <p>In practice, algorithms detect convergence when ||∇ℓ(θ)|| < ε for small ε, or after a fixed iteration budget. For large datasets, stochastic variants with warm-start initialization (using a model trained on a subset) provide excellent practical performance. The challenge in production systems is often not convergence but avoiding overfitting through regularization and validation.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Batch Update</h4>
      <p>θ := θ + α Σᵢ (yᵢ − σ(θᵀxᵢ)) xᵢ accumulates gradients over all examples, stable but slow on huge datasets.</p>
    </div>
    <div class="feat">
      <h4>Stochastic Update</h4>
      <p>θ := θ + α(yᵢ − σ(θᵀxᵢ)) xᵢ updates per-example, noisy but faster and more memory-efficient.</p>
    </div>
    <div class="feat">
      <h4>Mini-Batch</h4>
      <p>Process B examples per update, balancing stability of batch and speed of stochastic methods. B ∈ [32,256] is typical.</p>
    </div>
    <div class="feat">
      <h4>Early Stopping</h4>
      <p>Monitor validation error and stop if it increases, preventing overfitting without explicit regularization penalty.</p>
    </div>
  </div>`,

  // 05 Perceptron Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Perceptron Algorithm</div>
    <h2><em>Threshold</em> Decision Rule</h2>
  </div>
  <p>The perceptron, introduced by Rosenblatt in 1958, is the simplest linear classifier. It outputs a discrete prediction: hθ(x) = 1 if θᵀx ≥ 0, else hθ(x) = 0. During training, parameters update only on misclassifications: if hθ(xᵢ) ≠ yᵢ, apply θ := θ + yᵢ xᵢ (where y ∈ {−1,+1} or equivalently offset by 1). This greedy update moves the decision boundary directly toward misclassified points.</p>
  <p>The perceptron convergence theorem states that if data is linearly separable (exists θ* with yᵢ(θ*ᵀxᵢ) > 0 for all i), the perceptron algorithm terminates with a separating hyperplane in O(1/γ²) iterations, where γ is the margin of θ*. This is a remarkable guarantee: finite convergence without probabilistic assumptions, just linear separability. However, the theorem says nothing about non-separable data—the algorithm loops forever if no perfect separator exists.</p>
  <h3>Perceptron vs. Logistic Regression</h3>
  <p>Logistic regression improves upon the perceptron by outputting probabilities and optimizing a principled loss function over all examples, not just misclassifications. This principled approach enables several advantages: probabilistic predictions for uncertainty quantification, robust performance on non-separable data, direct optimization of a global objective rather than local greedy updates, and superior generalization through regularization. Logistic regression effectively combines the geometric appeal of perceptrons with the statistical rigor of maximum likelihood.</p>
  <p>Modern deep learning has revived interest in perceptron-like architectures: neural networks are essentially nested perceptrons with nonlinear activations. The perceptron's simplicity also makes it useful for understanding fundamental concepts in learning theory, such as the VC dimension, linear separability, and generalization bounds. For practical classification, however, logistic regression and gradient-boosted trees dominate due to superior performance and robustness.</p>
  <div class="s-chips">
    <span class="s-chip">Rosenblatt 1958</span>
    <span class="s-chip">Finite convergence</span>
    <span class="s-chip">Linear separator</span>
    <span class="s-chip">No probabilities</span>
    <span class="s-chip">Discrete output</span>
  </div>`,

  // 06 Multi-class Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Softmax Regression</div>
    <h2><em>K-Class</em> Multinomial Classification</h2>
  </div>
  <p>Softmax regression generalizes logistic regression to K ≥ 2 classes via the softmax function. Given K score vectors θ₁,...,θₖ ∈ ℝᵈ, the predicted probabilities are P(y=k|x) = exp(θₖᵀx) / Σⱼ exp(θⱼᵀx). The softmax normalizes K scores into a valid probability distribution (summing to 1, each ∈ [0,1]). For binary classification (K=2), softmax reduces to logistic regression via the equivalence P(y=1|x) = σ(θ₁ᵀx).</p>
  <p>The multinomial log-likelihood is ℓ(θ) = Σᵢ log P(yᵢ|xᵢ) = Σᵢ θ_{yᵢ}ᵀxᵢ − Σᵢ log Σⱼ exp(θⱼᵀxᵢ). This objective is convex, enabling globally optimal solutions via gradient-based optimization. The gradient ∂ℓ/∂θₖ = Σᵢ xᵢ (𝟙[yᵢ=k] − P(y=k|xᵢ)) parallels binary logistic regression: update based on prediction error for class k.</p>
  <h3>One-vs-All Alternative</h3>
  <p>An older approach, one-vs-all (OVA), trains K independent binary classifiers: one for each class against all others. During prediction, output the class with highest score. OVA is simpler to implement and parallelize but lacks principled probabilistic interpretation. The K classifiers optimize independently without enforcing that predictions sum to 1. Softmax is theoretically superior and now standard due to better probabilities and unified optimization, though OVA remains pragmatically useful when training many binary models is easier than joint optimization.</p>
  <p>Softmax generalizes further in neural networks as the output layer for multi-class problems. Combined with cross-entropy loss, it provides excellent calibration (output probabilities reflect true class frequencies). Numerical stability is crucial: directly computing softmax risks overflow/underflow. The standard trick is to subtract max(scores) before exponentiation: softmax(s) = softmax(s − max(s)), maintaining numerical precision.</p>
  <div class="callout">
    <h4>Numerical Stability</h4>
    <p>Compute softmax(scores) = exp(scores − max(scores)) / sum(exp(scores − max(scores))) to avoid overflow on large scores and underflow on small scores.</p>
  </div>
  <div class="s-stat">
    <div class="st"><div class="sv">K classes</div><div class="sl">Output Space</div></div>

  </div>`,

  // 07 Newton's Method Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Newton's Method</div>
    <h2><em>Second-Order</em> Optimization</h2>
  </div>
  <p>Newton's method is a classical optimization algorithm that uses both first-order (gradient) and second-order (Hessian) information. The update rule is θ := θ − H⁻¹∇ℓ(θ), where H is the Hessian matrix Hᵢⱼ = ∂²ℓ/∂θᵢ∂θⱼ. Geometrically, Newton's method fits a quadratic approximation to the objective at the current point and jumps directly to its optimum. For quadratic objectives, this reaches the optimum in one step; for general objectives, it converges rapidly near the solution.</p>
  <p>For logistic regression, the Hessian is H = −XᵀDX where D is a diagonal matrix with entries Dᵢᵢ = σ(θᵀxᵢ)(1−σ(θᵀxᵢ)). Since D is positive definite and X has full rank, H is negative definite, confirming the objective is strictly concave. The Newton step direction H⁻¹∇ℓ(θ) is guaranteed to be an ascent direction, and the step size is automatically appropriate (no learning rate tuning).</p>
  <h3>Convergence Rates and Computational Cost</h3>
  <p>Newton's method exhibits quadratic convergence: in a neighborhood of the optimum, the error squares each iteration, resulting in exponential convergence. Gradient descent has linear convergence (error multiplied by constant < 1). For a target error ε, Newton's method needs O(log log(1/ε)) iterations vs. O(log(1/ε)) for gradient descent—a dramatic improvement. However, each Newton iteration requires computing and inverting the d×d Hessian, costing O(d³) operations. For d > 1000, this is prohibitive.</p>
  <p>Quasi-Newton methods like BFGS and L-BFGS approximate the Hessian using gradient information, reducing cost to O(d²) per iteration while maintaining superlinear convergence. L-BFGS, limited-memory BFGS, further reduces memory from O(d²) to O(d), making it practical for high-dimensional problems. In practice, modern solvers for logistic regression (sklearn, statsmodels, TensorFlow) use L-BFGS or stochastic variants, balancing convergence speed and computational feasibility.</p>

  // 08 Decision Boundaries Details
  `<div class="detail-header">
    <div class="num"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Decision Boundaries</div>
    <h2><em>Linear</em> &amp; Nonlinear Separation</h2>
  </div>
  <p>The decision boundary of logistic regression applied to features x is the hyperplane {x : θᵀx = 0}. This linear boundary directly corresponds to the threshold σ(θᵀx) = 0.5. The normal vector θ points in the direction of increasing probability; moving along θ increases σ(θᵀx). The distance from a point x to the boundary is |θᵀx| / ||θ||, related to the margin in support vector machine terminology.</p>
  <p>Linear boundaries are geometrically interpretable and computationally efficient—just d parameters to store and O(d) to evaluate. However, they lack expressiveness for data with complex separation patterns. XOR is the canonical example: in 2D, no line separates {(0,0), (1,1)} from {(0,1), (1,0)}, so linear classifiers fail. Nonlinear boundaries solve this via feature engineering.</p>
  <h3>Nonlinear Boundaries via Feature Engineering</h3>
  <p>Applying nonlinear feature transformations φ(x) before logistic regression enables curved decision boundaries in the original space. For example, adding polynomial features φ(x) = [x₁, x₂, x₁², x₁x₂, x₂²]ᵀ to 2D input creates a 5D space where logistic regression can learn curves. Kernel methods like support vector machines implicitly apply infinite-dimensional feature maps. Deep neural networks learn feature hierarchies automatically, progressively transforming raw inputs into linearly separable representations.</p>
  <p>The trade-off is critical: feature engineering preserves convexity and efficient optimization (logistic regression remains convex), but manual feature design is labor-intensive and requires domain expertise. Neural networks remove this burden but sacrifice convexity, introducing local minima and convergence challenges. In practice, the choice depends on data size (small: engineered features; large: deep learning) and problem domain (images/text: deep learning; tabular: both viable).</p>

  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">X<em>229</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> STANFORD XCS229 · MACHINE LEARNING</div>
        <div class="hero-title">Logistic <em>Regression</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Week 2 · Classification & Maximum Likelihood</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>

</body>
</html>
