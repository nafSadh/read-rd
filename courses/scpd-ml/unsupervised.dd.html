<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsupervised Learning — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<script>
const sections = [
  { num: '01', short: 'K-Means', title: '<em>K-Means</em> Clustering' },
  { num: '02', short: 'Gaussian Mix', title: '<em>Mixture</em> of Gaussians' },
  { num: '03', short: 'Jensen\'s Ineq.', title: 'Jensen\'s <em>Inequality</em>' },
  { num: '04', short: 'EM Algorithm', title: 'The <em>EM</em> Algorithm' },
  { num: '05', short: 'EM Framework', title: '<em>General</em> EM Framework' },
  { num: '06', short: 'Factor Analysis', title: '<em>Factor</em> Analysis' },

,
  { num: '09', short: 'References', title: 'References & <em>Further</em> Reading' }];

const summaries = [
  // 01 K-Means
  `<p>K-Means is a simple yet powerful algorithm for unsupervised partitioning of data into k clusters. The algorithm iteratively assigns each point to the nearest cluster centroid, then recomputes centroids as the mean of assigned points. This coordinate-wise optimization minimizes the within-cluster distortion, or sum of squared distances from points to their assigned centroids.</p>
  <p>Convergence is guaranteed due to the non-increasing distortion objective: in each iteration, either assignment improves (lower distortion) or centroids move to lower-distortion positions. Initialization matters significantly—k-means++ seeds initial centers by probabilistically selecting points that are far from existing centers, greatly improving solution quality and convergence speed. Although k-means finds local optima rather than global optima, careful initialization mitigates this limitation.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">O(nkd)</div><div class="sl">Per Iteration</div></div>
    <div class="st"><div class="sv">Convex</div><div class="sl">Subproblems</div></div>
    <div class="st"><div class="sv">k-means++</div><div class="sl">Better Init</div></div>
    <div class="st"><div class="sv">Local Min</div><div class="sl">Guaranteed</div></div>
  </div>`,

  // 02 Mixture of Gaussians
  `<p>The Gaussian Mixture Model (GMM) extends k-means by treating cluster assignment probabilistically. Rather than hard assignments (point belongs to cluster k), GMM computes soft responsibilities—the posterior probability that a point was generated by each Gaussian component. Each component has its own mean μ_k, covariance Σ_k, and mixing weight π_k that sums to one.</p>
  <p>GMM is a latent variable model where cluster identity z is unobserved; the likelihood marginalizes over z. Maximizing this likelihood requires the EM algorithm since there is no closed-form solution. The soft assignments naturally handle ambiguity in cluster membership and provide uncertainty estimates. When covariances collapse to spherical and equal, EM becomes equivalent to k-means, showing the fundamental connection between hard and soft clustering.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Soft Assignments</h4>
      <p>Each point has a probability distribution over clusters, not a single discrete label. Reflects uncertainty in cluster membership naturally.</p>
    </div>
    <div class="feat">
      <h4>Probabilistic Framework</h4>
      <p>Well-defined likelihood model with explicit assumptions on data generation. Enables model selection via AIC/BIC.</p>
    </div>
    <div class="feat">
      <h4>Covariance Structure</h4>
      <p>Different shapes and sizes per cluster. Generalizes k-means spherical assumption to full covariance matrices.</p>
    </div>
    <div class="feat">
      <h4>EM Optimization</h4>
      <p>Expectation-Maximization provides guaranteed convergence to local maximum of marginal likelihood.</p>
    </div>
  </div>`,

  // 03 Jensen's Inequality
  `<p>Jensen's Inequality is the mathematical foundation of the EM algorithm. For a concave function f and random variable X, it states E[f(X)] ≤ f(E[X]). The proof uses the definition of concavity: a concave function lies above its tangent line. In the context of EM, applying Jensen's Inequality to the log function (which is concave) creates a lower bound on the log-likelihood—the Evidence Lower Bound or ELBO.</p>
  <p>The ELBO is key: log p(x) = log Σ_z p(x, z) ≥ Σ_z q(z) log(p(x,z)/q(z)), where q(z) is any distribution over latent variables z. Equality holds when q(z) = p(z|x), the true posterior. This insight drives EM: the E-step optimizes q to match the posterior (making the bound tight), and the M-step optimizes model parameters θ to increase the ELBO. Monotonically improving the ELBO guarantees convergence.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Concave</div><div class="sl">Requirement</div></div>
    <div class="st"><div class="sv">ELBO</div><div class="sl">Lower Bound</div></div>
    <div class="st"><div class="sv">Equality</div><div class="sl">At Posterior</div></div>
    <div class="st"><div class="sv">Gap</div><div class="sl">KL(q||p)</div></div>
  </div>`,

  // 04 EM Algorithm
  `<p>The Expectation-Maximization algorithm solves maximum likelihood problems with latent variables. In the E-step, we compute the posterior distribution over latent variables z given observed data x and current parameters θ: γ_nk = p(z_n = k | x_n, θ). For GMM, this is the soft responsibility of component k for point n. In the M-step, we maximize the expected complete-data log-likelihood, treating responsibilities as fixed weights.</p>
  <p>For GMM, the M-step updates are intuitive: π_k becomes the average responsibility, μ_k becomes the responsibility-weighted mean of points, and Σ_k becomes the responsibility-weighted covariance. Each update has a closed form. The algorithm alternates E and M steps, monotonically increasing the marginal likelihood until convergence (typically a few dozen iterations). EM avoids the direct optimization of the intractable marginal likelihood by decomposing it into tractable expectations and parameter optimization.</p>
  <div class="timeline">
    <div class="tl-item">
      <div class="tl-date">E-Step</div>
      <div class="tl-text">Compute γ_nk = p(z_n = k | x_n, θ^(t)). Responsibility of component k for data point n.</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">M-Step</div>
      <div class="tl-text">Maximize Q(θ,θ^(t)) = E_z[log p(x,z|θ)]. Update π_k, μ_k, Σ_k with closed-form solutions.</div>
    </div>
    <div class="tl-item">
      <div class="tl-date">Convergence</div>
      <div class="tl-text">Repeat until log p(x|θ) or parameters change by less than threshold ε.</div>
    </div>
  </div>`,

  // 05 General EM Framework
  `<p>EM is a general framework applicable to any latent variable model, not just GMM. The key insight is coordinate ascent on the ELBO in two steps. The E-step finds the q(z) that maximizes ELBO for fixed θ, yielding q(z) = p(z|x, θ). The M-step finds θ that maximizes ELBO for fixed q, equivalent to maximizing Σ_z q(z) log p(x, z | θ). Crucially, this is a guaranteed improvement because we first make the bound tight, then increase it.</p>
  <p>EM exhibits monotonic improvement: L(θ^(t)) ≤ L(θ^(t+1)) where L is the marginal likelihood. However, EM finds local maxima, not global ones—initialization matters. The gap between ELBO and true likelihood is KL(q(z)||p(z|x,θ)), minimized to zero by the E-step. In practice, running EM multiple times from different initializations and selecting the best can improve solutions. The framework extends beyond clustering: it powers latent factor models, missing-data imputation, and mixed-effect models.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Strengths</h4>
      <ul>
        <li>Guaranteed monotonic improvement in likelihood</li>
        <li>Handles missing data and latent variables naturally</li>
        <li>Closed-form M-step for exponential families</li>
        <li>Principled probabilistic framework</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Limitations</h4>
      <ul>
        <li>Finds local maxima, not global optima</li>
        <li>Can be slow (many E-M iterations)</li>
        <li>Initialization sensitivity</li>
        <li>May overfit if not regularized</li>
      </ul>
    </div>
  </div>`,

  // 06 Factor Analysis
  `<p>Factor Analysis is a latent variable model for continuous hidden factors. Unlike GMM's discrete cluster assignments, Factor Analysis assumes each observation x ∈ ℝ^d is generated from a low-dimensional latent factor z ∈ ℝ^k (k << d) via a linear transformation: x = Λz + ε, where Λ is a d × k loading matrix and ε ~ N(0, Ψ) is diagonal noise. This assumes x has a low-rank covariance structure Σ = ΛΛ^T + Ψ, useful when d >> n (more features than samples).</p>
  <p>The model assumes z ~ N(0, I) and ε is diagonal, so each observed dimension's variance decomposes into shared factor variance (captured by Λz) and independent noise (ε). EM fits Factor Analysis by alternating: E-step computes posterior over z given x, M-step updates Λ and Ψ. Unlike PCA (which uses SVD on centered data), Factor Analysis is probabilistic and provides uncertainty estimates for factor values. It's essential in psychometrics, finance (factor models), and domains with high-dimensional data where interpretable latent factors are valued.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Low-Rank</div><div class="sl">Covariance</div></div>
    <div class="st"><div class="sv">Σ = ΛΛ^T+Ψ</div><div class="sl">Structure</div></div>
    <div class="st"><div class="sv">Continuous</div><div class="sl">Latent z</div></div>
    <div class="st"><div class="sv">Diagonal Ψ</div><div class="sl">Assumption</div></div>
  </div>`,

  // 07 Variational Inference
  `<p>Variational Inference generalizes EM by parameterizing the posterior distribution q(z|x) as a flexible distribution from a family Q, then optimizing over Q to minimize KL(q||p(z|x)). Unlike EM's E-step which computes the exact posterior (only tractable for certain models), variational inference trades accuracy for tractability. A common approach is mean-field approximation: q(z) = ∏_i q_i(z_i), assuming conditional independence among latent variables. This factorization enables efficient updates: optimize each q_i while holding others fixed.</p>
  <p>Variational Autoencoders (VAEs) combine variational inference with deep neural networks: the encoder q_φ(z|x) and decoder p_θ(x|z) are neural networks parameterized by φ and θ. The ELBO decomposes as E_q[log p(x|z)] - KL(q_φ||p(z)), combining reconstruction loss and a regularizer pushing q toward the prior. VAEs enable scalable learning on high-dimensional data and generative modeling. The reparameterization trick allows backpropagation through stochastic nodes, making end-to-end training feasible. Variational methods are foundational in modern deep generative modeling.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Mean-Field Approximation</h4>
      <p>Factorizes posterior into independent factors. Computationally tractable but may underestimate posterior variance (q too sharp).</p>
    </div>
    <div class="feat">
      <h4>KL Minimization</h4>
      <p>Minimizes reverse KL: q close to true posterior. Direct optimization of variational objective avoids EM iterations.</p>
    </div>
    <div class="feat">
      <h4>Neural Network Parameterization</h4>
      <p>Use neural networks to parameterize q and p, enabling scalability to large datasets and complex distributions.</p>
    </div>
    <div class="feat">
      <h4>Reparameterization Trick</h4>
      <p>z = μ + σ ⊙ ε allows gradient flow through stochastic sampling. Essential for end-to-end deep learning.</p>
    </div>
  </div>`,

  // 08 Practical Clustering
  `<p>Choosing the number of clusters k is crucial but non-trivial. The elbow method plots distortion or inertia versus k and looks for a "kink"—beyond which increasing k yields diminishing improvements. Silhouette coefficient measures how similar each point is to points in its own cluster versus other clusters (range [-1,1]; higher is better). These heuristics are intuitive but subjective. For GMM, information criteria like BIC (Bayesian Information Criterion) and AIC trade likelihood against model complexity, providing principled model selection. Cross-validation can estimate generalization performance on held-out data.</p>
  <p>Beyond k-means and GMM, spectral clustering exploits the eigendecomposition of the similarity matrix to uncover non-convex clusters. It first constructs a graph where edge weights encode similarity, then performs graph Laplacian eigendecomposition, and applies k-means to the embedded points. Spectral methods are robust to elongated clusters and non-spherical shapes. Hierarchical clustering (agglomerative or divisive) builds a dendrogram showing how clusters merge, useful for exploring structure at multiple scales. Density-based methods like DBSCAN find clusters of arbitrary shape by grouping points with many neighbors. Practical clustering requires domain knowledge, multiple evaluations, and iterative refinement.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg">
      <!-- Elbow plot -->
      <g id="elbow">
        <text x="80" y="20" class="lbl">Elbow Method</text>

        <!-- Line -->

        <path d="M 130 95 L 165 112" stroke="var(--accent)" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>

      <!-- Spectral clustering example -->

        <circle cx="255" cy="42" r="2" class="node" fill="var(--cyan)"/>
        <circle cx="247" cy="48" r="2" class="node" fill="var(--cyan)"/>

,

  // 09 References & Further Reading
  `<p><strong>Key References:</strong></p>
<ul style="font-size: 14px; line-height: 1.8;">
  <li><a href="https://cs229.stanford.edu/" target="_blank">CS229: Machine Learning Course Homepage</a></li>

const details = [
  // 01 K-Means Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 1</span><h2><em>K-Means</em> Clustering</h2></div>
  <p>K-Means is formulated as minimizing the within-cluster sum of squares (WCSS), also called distortion: J = Σ_n Σ_k r_nk ||x_n - μ_k||^2, where r_nk is 1 if point n is assigned to cluster k, and 0 otherwise. The algorithm alternates two steps: (1) Assignment: for each point, find the nearest centroid and assign it there; (2) Update: recompute each centroid as the mean of its assigned points.</p>
  <p>This coordinate descent on the non-convex objective guarantees that distortion decreases or stays constant in each iteration. The algorithm terminates when assignments stabilize. However, k-means has notable limitations: it finds local optima depending on initialization, assumes spherical clusters of similar size, and requires specifying k beforehand.</p>
  <p>Initialization via k-means++ works as follows: choose the first center uniformly at random from data, then iteratively add k-1 more centers, each chosen with probability proportional to its squared distance from the nearest existing center. This "spreading out" initialization dramatically reduces the chance of poor local optima and accelerates convergence. Empirically, k-means++ often gives solutions within 2x of optimal, whereas random initialization can be arbitrarily bad.</p>
  <p>A key variant is mini-batch k-means: instead of scanning the full dataset in each iteration, draw a random subset and update only the affected centroids. This reduces per-iteration cost from O(nkd) to O(bkd) where b is the batch size, enabling scalability to massive datasets. Trade-off: results are slightly noisier than full-batch, but often sufficient for exploratory clustering.</p>

  // 02 GMM Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 2</span><h2><em>Mixture</em> of Gaussians</h2></div>
  <p>A Gaussian Mixture Model is defined by π_k (mixing weights, Σπ_k = 1), μ_k (component means), and Σ_k (component covariances). The marginal likelihood of a single point is p(x_n) = Σ_k π_k N(x_n | μ_k, Σ_k). Each component contributes proportionally to the total likelihood; this weighted combination is more flexible than a single Gaussian.</p>
  <p>The posterior responsibility—the probability that observation x_n came from component k given the parameters—is γ_nk = π_k N(x_n | μ_k, Σ_k) / Σ_j π_j N(x_n | μ_j, Σ_j). These responsibilities are soft assignments: a point can have non-negligible probability of belonging to multiple clusters. In the limit where responsibilities become 0 or 1 (hard assignments), GMM reduces to k-means.</p>
  <p>The complete-data likelihood p(X, Z | θ) where Z are cluster assignments is tractable, but the marginal likelihood p(X | θ) requires summing over all 2^n possible Z configurations—intractable. EM elegantly sidesteps this by treating Z as missing and imputing its expected value in the E-step. The algorithm leverages Jensen's Inequality to construct a lower bound (ELBO) on the marginal likelihood, then optimizes this bound.</p>
  <p>GMM is particularly useful when cluster uncertainty matters. In medical diagnosis, for example, soft assignments allow a patient to have fractional probability of multiple disease subtypes. The model also naturally extends to time series (mixture of HMMs) and other structured data. Full-covariance GMM is more expressive than spherical or diagonal covariance, but requires more data to fit reliably—there's a trade-off between model complexity and generalization.</p>
  <div class="callout">
    <h4>Geometric Intuition</h4>
    <p>In 2D, each Gaussian component is an ellipse. Mixing different ellipses creates contours with multiple modes. High responsibility at a point indicates that the point lies in the high-density region of that component's ellipse.</p>
  </div>`,

  // 03 Jensen's Inequality Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 3</span><h2><em>Jensen's</em> Inequality</h2></div>
  <p>For a concave function f and random variable X with distribution q, Jensen's Inequality states: E_q[f(X)] ≤ f(E_q[X]). Geometrically, a concave function bows downward, so averaging values of f(X) is less than f of the average. Examples: ln(x) is concave, so E[ln(X)] ≤ ln(E[X]); this is used in deriving the ELBO.</p>
  <p>Proof intuition: any concave function at a point a can be underestimated by its tangent line at another point b: f(a) ≥ f(b) + f'(b)(a - b). Rearranging and taking expectations over a ∼ q yields the inequality. The tangent line is the "tightest" linear lower bound; applying this for the optimal tangent (which corresponds to the posterior distribution) makes the bound as tight as possible.</p>
  <p>Application to EM: log p(X) = log Σ_z p(X, Z) = log Σ_z q(Z) · [p(X,Z) / q(Z)] ≥ Σ_z q(Z) log[p(X,Z) / q(Z)] = ELBO(q, θ). The inequality uses the concavity of log. The gap ELBO(q, θ) - log p(X | θ) equals KL(q(Z) || p(Z | X, θ)). When q = p(Z | X, θ), the gap is zero (perfect) and ELBO equals the true likelihood. Thus, the E-step is optimal.</p>
  <p>Why care? Direct optimization of log p(X | θ) might be intractable due to the sum over z. But optimizing the ELBO—which factors into a data-independent expectation (E-step) and a parameter optimization (M-step)—is tractable. This clever use of inequalities converts an impossible problem into a sequence of easy problems.</p>

  // 04 EM Algorithm Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 4</span><h2>The <em>EM</em> Algorithm</h2></div>
  <p>EM iteration t consists of two steps. E-step: compute γ_nk^(t) = p(z_n = k | x_n, θ^(t)), the responsibility of component k for data point n. This is the posterior over the latent cluster assignment. M-step: update parameters to maximize the expected complete-data log-likelihood: θ^(t+1) = argmax_θ Σ_n Σ_k γ_nk^(t) log p(x_n, z_n = k | θ).</p>
  <p>For GMM, the M-step updates have closed forms. The mixing weights become π_k^(t+1) = (Σ_n γ_nk^(t)) / n, the average responsibility. The mean becomes μ_k^(t+1) = (Σ_n γ_nk^(t) x_n) / (Σ_n γ_nk^(t)), a responsibility-weighted mean. The covariance becomes Σ_k^(t+1) = (Σ_n γ_nk^(t) (x_n - μ_k)(x_n - μ_k)^T) / (Σ_n γ_nk^(t)), a responsibility-weighted sample covariance. Each update is intuitive: points with high responsibility contribute more.</p>
  <p>A key property: the log-likelihood is non-decreasing: log p(X | θ^(t)) ≤ log p(X | θ^(t+1)). Why? Because ELBO(q, θ^(t+1)) ≥ ELBO(q^(t), θ^(t)) ≥ log p(X | θ^(t)). The E-step makes the first inequality tight (q^(t) = posterior). The M-step improves θ (second inequality). Combined, likelihood increases. This monotonic improvement guarantees convergence to a local maximum or saddle point.</p>
  <p>Convergence is typically measured as: stop when log-likelihood change < ε or when |θ^(t+1) - θ^(t)| < ε. In practice, 10-100 iterations suffice for moderate-sized datasets. Each E-step and M-step are O(nkd), so full complexity is O(T · nkd) where T is the number of iterations. For very large n, stochastic EM variants sample mini-batches in the M-step, reducing cost.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>E-Step: Responsibilities</h4>
      <p>Compute soft assignments γ_nk using Bayes' rule. These weights encode the model's current belief about cluster membership.</p>
    </div>
    <div class="feat">
      <h4>M-Step: MLE</h4>
      <p>Solve a weighted maximum likelihood problem, treating responsibilities as fixed. Closed-form solution for exponential families.</p>
    </div>
    <div class="feat">
      <h4>Monotonic Improvement</h4>
      <p>Likelihood never decreases between iterations. Convergence guaranteed to local optimum (possibly saddle point).</p>
    </div>
    <div class="feat">
      <h4>Probabilistic Interpretation</h4>
      <p>Well-defined generative model. Can compute log-likelihood, BIC, AIC for model selection and validation.</p>
    </div>
  </div>`,

  // 05 EM Framework Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 5</span><h2><em>General</em> EM Framework</h2></div>
  <p>EM generalizes beyond GMM to any model with latent variables Z, observed data X, and parameters θ. The goal: maximize the marginal log-likelihood log p(X | θ) = log Σ_Z p(X, Z | θ). The challenge: the sum over Z (or integral if Z is continuous) is often intractable. EM converts this into an optimization of the ELBO, which is tractable.</p>
  <p>ELBO(q, θ) = Σ_Z q(Z) log[p(X, Z | θ) / q(Z)] ≤ log p(X | θ). E-step: maximize over q for fixed θ. The optimal q is p(Z | X, θ^(t)). Importance: this makes the gap (KL divergence) zero, so the bound is tight. M-step: maximize over θ for fixed q^(t). This is equivalent to maximizing Σ_Z q^(t)(Z) log p(X, Z | θ), a weighted likelihood. The key insight: even though the original problem is intractable, each step of EM is tractable.</p>
  <p>Why alternating? Because ELBO(q^(t+1), θ^(t)) ≥ ELBO(q^(t), θ^(t)) (E-step, improving q) and ELBO(q^(t+1), θ^(t+1)) ≥ ELBO(q^(t+1), θ^(t)) (M-step, improving θ). Together: log p(X | θ^(t+1)) ≥ ELBO(...) ≥ log p(X | θ^(t)), showing the likelihood improves. This is coordinate ascent on the ELBO, a principled optimization strategy.</p>
  <p>Beyond GMM, EM applies to: latent factor models (factor analysis), mixture of regression models, mixture of topic models (latent Dirichlet allocation), hidden Markov models, and missing-data problems. In general, the E-step requires computing posterior q(Z | X, θ^(t)), which can be expensive if done exactly. Approximate EM variants (e.g., stochastic EM, variational EM) approximate q to reduce cost. The framework unifies a huge class of models under one elegant principle.</p>
  <div class="callout">
    <h4>Intuition: Two-Level Optimization</h4>
    <p>Level 1 (ELBO): use Jensen's Inequality to create a lower bound on the intractable likelihood. Level 2 (Alternating): optimize this bound by alternating between tightening it (E-step) and improving parameters (M-step).</p>
  </div>`,

  // 06 Factor Analysis Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 6</span><h2><em>Factor</em> Analysis</h2></div>
  <p>Factor Analysis assumes: x = Λz + μ + ε, where z ~ N(0, I_k) are k latent factors, Λ is a d × k loading matrix, μ is the mean, and ε ~ N(0, Ψ) is diagonal noise. The key assumption: diagonal Ψ means that conditional on z, the observed dimensions are independent. All correlation in x is captured by the shared latent factors z.</p>
  <p>The marginal distribution of x is: p(x) = ∫ p(x | z) p(z) dz = N(μ, ΛΛ^T + Ψ). The covariance is Σ = ΛΛ^T + Ψ: a sum of a low-rank matrix (ΛΛ^T) and diagonal matrix (Ψ). This structure is useful when d >> n (more dimensions than samples), as it constrains the covariance to have rank k, reducing parameters from d(d+1)/2 to kd + d.</p>
  <p>The posterior over latent factors given a single observation is: p(z | x) = N(Λ^T(Λ Λ^T + Ψ)^(-1) (x - μ), (I + Λ^T Ψ^(-1) Λ)^(-1)). This posterior provides the "factor scores"—the coordinates of x in the latent factor space. EM alternates: E-step computes the posterior; M-step updates Λ and Ψ using weighted regression and covariance estimates.</p>
  <p>Key distinction from PCA: Factor Analysis is probabilistic and has a defined likelihood, enabling model selection and hypothesis testing. It also provides uncertainty estimates for factor scores (posterior covariance). PCA, by contrast, is a deterministic technique with no probabilistic model. When k << d, both methods provide dimensionality reduction; Factor Analysis is preferred when uncertainty matters. Applications: psychometrics (underlying traits from test scores), finance (factor models for assets), genomics (identifying latent biological factors).</p>

  // 07 Variational Inference Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 7</span><h2><em>Variational</em> Inference</h2></div>
  <p>Variational Inference replaces exact posterior inference (which is often intractable) with optimization over a tractable family of distributions Q. The goal: find q ∈ Q minimizing KL(q || p(z | x, θ)), or equivalently, maximizing ELBO(q, θ) = E_q[log p(x, z | θ)] - KL(q || p(z)). Unlike EM where the E-step computes the exact posterior (which requires marginalizing likelihood), VI parameterizes q and optimizes it.</p>
  <p>Mean-field approximation: factorize q as q(z) = ∏_i q_i(z_i), assuming conditional independence. This is often a poor assumption for the true posterior, leading to KL divergence minimization giving high variance estimates. However, the computational gain is huge: coordinate ascent in q_i updates each factor in closed form. For exponential families, the optimal q_i is in the same family as the likelihood. This makes mean-field VI scalable and practical.</p>
  <p>Variational Autoencoders (VAEs) are neural networks trained on ELBO(q_φ, p_θ). The encoder q_φ(z | x) (inference network) outputs parameters of an approximate posterior, usually Gaussian. The decoder p_θ(x | z) (generative network) outputs likelihood parameters. The ELBO is E_q_φ[log p_θ(x | z)] - β · KL(q_φ(z|x) || p(z)), where β trades off reconstruction and regularization. The reparameterization trick z = μ(x) + σ(x) ⊙ ε allows backprop through the sampling operation, enabling end-to-end training.</p>
  <p>VAEs enable: (1) learning latent representations of high-dimensional data (e.g., images), (2) generating new samples by sampling z from the prior, (3) interpolation in latent space. Extensions: β-VAE increases β to encourage disentangled factors; hierarchical VAEs add layers of latent variables; conditional VAEs condition the decoder on class labels. VAEs revolutionized unsupervised deep learning and generative modeling, bridging probabilistic modeling and deep neural networks.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Mean-Field VI</h4>
      <p>Factorized posterior q. Simple updates but may underestimate posterior variance. Good for scalability when exact inference is intractable.</p>
    </div>
    <div class="feat">
      <h4>Reparameterization Trick</h4>
      <p>z = f_φ(x, ε) with ε ~ N(0,I) allows computing ∇_φ E_z[...]. Essential for gradient-based optimization of VAEs.</p>
    </div>
    <div class="feat">
      <h4>Neural Parameterization</h4>
      <p>Use networks for q_φ and p_θ. Scales to millions of parameters and high-dimensional data (images, text).</p>
    </div>
    <div class="feat">
      <h4>Generative & Inference</h4>
      <p>Simultaneous learning of generative model (decoder) and inference model (encoder). Natural for unsupervised learning.</p>
    </div>
  </div>`,

  // 08 Practical Clustering Details
  `<div class="detail-header"><span class="num"><svg width="14" height="14" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="5"/></svg> Section 8</span><h2><em>Practical</em> Clustering</h2></div>
  <p>Choosing k is non-trivial. The elbow method: plot distortion vs k; k is a good choice where the curve "elbows" (diminishing returns). Problem: the elbow is often ambiguous, making this heuristic subjective. Silhouette score: for each point, compute how similar it is to its own cluster vs the next-nearest cluster. High silhouette = good clustering; aggregate silhouette across all points ranges [-1, 1], with higher better. Advantage: single number, but still somewhat heuristic.</p>
  <p>For probabilistic models (GMM, Factor Analysis), information criteria provide principled model selection. BIC = -2 log L + p log n penalizes model complexity; lower BIC is better. AIC = -2 log L + 2p also penalizes complexity but less aggressively. These criteria assume the true model is in the candidate set. Cross-validation: train on a subset, evaluate on held-out data, and average across folds. This estimates generalization error but is computationally expensive.</p>
  <p>Spectral clustering leverages the eigenstructure of similarity matrices. Construct a graph where edge weights w_ij reflect similarity between points i and j. The Laplacian is L = D - W where D is the degree matrix. The eigenvectors corresponding to the k smallest eigenvalues embed the graph into ℝ^k; applying k-means to this embedding yields clusters. Spectral methods excel at non-convex shapes and are robust to non-euclidean geometries. The intuition: spectral clustering in the lower-dimensional embedded space often reveals structure invisible in the original space.</p>
  <p>Hierarchical clustering builds a dendrogram showing cluster merges at different scales. Agglomerative (bottom-up) starts with each point as its own cluster, then merges the nearest pairs. Linkage criteria define "nearest": single (minimum distance), complete (maximum distance), average, or Ward (minimize within-cluster variance). Dendrograms are interpretable and reveal multi-scale structure. DBSCAN is density-based: clusters are maximal connected sets of points where each has ≥ min_samples neighbors within ε distance. It finds clusters of arbitrary shapes and naturally identifies outliers (noise points). Unlike k-means, DBSCAN doesn't require specifying k—just ε and min_samples, which have intuitive interpretations.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Best Practices</h4>
      <ul>
        <li>Try multiple k values; use domain knowledge</li>
        <li>Combine metrics (elbow, silhouette, BIC)</li>
        <li>Validate results via downstream tasks</li>
        <li>Use spectral/DBSCAN for non-convex data</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Common Pitfalls</h4>
      <ul>
        <li>Ignoring initialization; run multiple times</li>
        <li>Choosing k from single metric only</li>
        <li>Assuming spherical clusters with k-means</li>
        <li>Over-interpreting noise as meaningful</li>
      </ul>
    </div>
  </div>`
,

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `

    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
