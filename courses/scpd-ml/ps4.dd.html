<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XCS229 Problem Set 4 — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

const summaries = [
  // 01 PS4 Overview
  `<p>Problem Set 4 represents the most substantial assignment in XCS229, totaling 50 points across four interconnected problems. This problem set synthesizes material from weeks 5–7, covering advanced topics in information theory, deep learning, and generalization phenomena. Students engage with theoretical foundations alongside empirical implementations, deepening understanding of how machine learning systems learn and generalize.</p>
  <p>The assignment progresses logically from foundational information-theoretic concepts through practical neural network implementation on real-world datasets, concluding with exploration of surprising empirical phenomena. Each problem builds on prior knowledge while introducing novel complexity that mirrors research-level challenges. The heaviest weighting encourages thorough engagement with deep learning fundamentals and their mathematical underpinnings.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">50 pts</div><div class="sl">Total Weight</div></div>
    <div class="st"><div class="sv">4</div><div class="sl">Problems</div></div>
    <div class="st"><div class="sv">Weeks 5–7</div><div class="sl">Coverage</div></div>
    <div class="st"><div class="sv">MNIST</div><div class="sl">Dataset</div></div>
  </div>`,

  // 02 KL Divergence
  `<p>Kullback-Leibler (KL) divergence, denoted D_KL(P||Q), quantifies the difference between two probability distributions. Unlike symmetric distance metrics, KL divergence is fundamentally asymmetric: D_KL(P||Q) ≠ D_KL(Q||P). This asymmetry reflects an important interpretation: KL divergence measures the information loss when using distribution Q to approximate the true distribution P.</p>
  <p>The mathematical definition D_KL(P||Q) = Σ_x P(x) log(P(x)/Q(x)) reveals that KL divergence is always non-negative, equaling zero if and only if P and Q are identical. This fundamental property emerges from Gibbs' inequality and connects deeply to information theory. KL divergence appears throughout machine learning: in the Evidence Lower Bound (ELBO) of variational inference, as the connection between maximum likelihood estimation and cross-entropy loss, and in understanding model mismatch penalties.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Definition & Properties</h4>
      <p>Non-negativity, asymmetry, equality condition P = Q, connection to relative entropy, measurability implications.</p>
    </div>
    <div class="feat">
      <h4>Intuition</h4>
      <p>Quantifies surprise or information loss when using approximation Q instead of true P. Asymmetry reflects directional interpretation.</p>
    </div>
    <div class="feat">
      <h4>Mathematical Foundation</h4>
      <p>Emerges from Gibbs inequality, relates to mutual information, connects to Jensen's inequality via log concavity.</p>
    </div>
    <div class="feat">
      <h4>Practical Significance</h4>
      <p>Central to variational inference, maximum likelihood estimation, and cross-entropy loss derivations in neural networks.</p>
    </div>
  </div>`,

  // 03 KL Applications
  `<p>The connection between KL divergence and maximum likelihood estimation reveals why cross-entropy loss is ubiquitous in deep learning. Minimizing KL divergence D_KL(P_data||P_model) is equivalent to maximizing the log-likelihood of the model on observed data. This equivalence explains why cross-entropy loss L = -Σ_i y_i log(ŷ_i) emerges naturally as the objective for classification tasks.</p>
  <p>In variational inference, KL divergence provides the mathematical foundation for the Evidence Lower Bound (ELBO). The ELBO = E_q[log p(x,z)] - E_q[log q(z|x)] decomposes into a reconstruction term and a KL regularizer: E_q[log p(x|z)] - D_KL(q(z|x)||p(z)). This decomposition guides many modern generative models, including Variational Autoencoders (VAEs). The KL term encourages the learned posterior q(z|x) to stay close to the prior p(z), balancing expressivity with regularization. Understanding these connections enables deeper insights into why these loss functions work and how they relate to fundamental information-theoretic principles.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">MLE</div><div class="sl">Minimizes KL</div></div>
    <div class="st"><div class="sv">Cross-Entropy</div><div class="sl">NLL Connection</div></div>
    <div class="st"><div class="sv">ELBO</div><div class="sl">VAE Foundation</div></div>
    <div class="st"><div class="sv">Regularization</div><div class="sl">KL Penalty</div></div>
  </div>`,

  // 04 MNIST Neural Network
  `<p>The MNIST problem—classifying handwritten digits into 10 categories—serves as the canonical deep learning benchmark. The problem involves training a neural network on 60,000 labeled training images of 28×28 pixels, with a test set of 10,000 unseen images. Successful implementations require thoughtful choices about network architecture, activation functions, optimization hyperparameters, and regularization strategies.</p>
  <p>Architecture design involves decisions about layer width, depth, and non-linearities. A simple feedforward network with one or two hidden layers of 128–512 units often suffices for MNIST, though the problem admits interesting explorations of deeper networks. ReLU activations typically outperform sigmoid/tanh, providing better gradient flow and faster training. Hyperparameter tuning—learning rate, batch size, weight decay—significantly impacts convergence speed and final accuracy. Batch normalization can stabilize training and allow higher learning rates. The training loop requires careful implementation of forward passes, loss computation, backpropagation, and parameter updates, often using frameworks like PyTorch or TensorFlow that automate differentiation.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Architecture Choices</h4>
      <p>Layer widths (128–512), depth (1–3 hidden layers), activation functions (ReLU preferred), batch normalization.</p>
    </div>
    <div class="feat">
      <h4>Training Loop</h4>
      <p>Forward pass, cross-entropy loss, backpropagation, SGD or Adam optimization, learning rate schedules.</p>
    </div>
    <div class="feat">
      <h4>Hyperparameters</h4>
      <p>Learning rate (0.001–0.01), batch size (32–128), epochs (10–50), weight decay for L2 regularization.</p>
    </div>
    <div class="feat">
      <h4>Implementation Details</h4>
      <p>Input normalization (pixel values 0–255 → 0–1), random initialization, validation/test split, checkpoint saving.</p>
    </div>
  </div>`,

  // 05 MNIST Analysis
  `<p>After training, systematic evaluation requires detailed accuracy analysis and interpretation of failure modes. On MNIST, well-trained networks achieve 97–99% test accuracy. However, aggregate accuracy masks important patterns: certain digit pairs (e.g., 4 vs 9, 3 vs 8) are frequently confused, while others (0 vs 1) are rarely misclassified. Confusion matrices reveal these patterns, exposing which digits the model struggles with and which confusions occur systematically.</p>
  <p>Misclassification analysis uncovers deeper insights. Examining images the network misclassifies reveals that some errors are genuinely ambiguous (handwritten digits with unusual stroke patterns), while others reflect real weaknesses (systematic confusion of morphologically similar digits). Per-class accuracy metrics show which digit categories the model masters and which remain challenging. These analyses inform data collection strategies, augmentation approaches, and whether additional architectural modifications might help. Visualization of learned features—examining convolutional filters or hidden activations—reveals that early layers learn edge detectors while deeper layers build digit-specific shape detectors, confirming expected hierarchical feature learning.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">97–99%</div><div class="sl">Test Accuracy</div></div>
    <div class="st"><div class="sv">10</div><div class="sl">Digit Classes</div></div>
    <div class="st"><div class="sv">100</div><div class="sl">Confusion Pairs</div></div>
    <div class="st"><div class="sv">Per-Class</div><div class="sl">Metrics</div></div>
  </div>`,

  // 06 Spam Classification
  `<p>Spam detection demonstrates machine learning on text data, comparing Naive Bayes and logistic regression approaches. Both models treat documents as vectors of word frequencies (bag-of-words representation), ignoring word order but capturing presence and frequency of informative terms. Naive Bayes assumes conditional independence of features given the class, while logistic regression learns discriminative decision boundaries without independence assumptions.</p>
  <p>Naive Bayes offers interpretability: examining log-odds log(P(spam)/P(ham)) for each word reveals which terms most strongly indicate spam (e.g., "viagra," "click," "free") versus legitimate email. Logistic regression learns similar patterns but through discriminative optimization, often achieving slightly better accuracy by fitting the decision boundary directly. Feature engineering impacts both models: lemmatization, stop word removal, and tf-idf weighting improve performance. The tradeoff between model simplicity (Naive Bayes) and accuracy (logistic regression) depends on dataset size, sparsity, and computational constraints. Both models achieve 95%+ accuracy on standard benchmarks, making them practical baselines for production systems.</p>
  <div class="feat-grid">
    <div class="feat">
      <h4>Naive Bayes</h4>
      <p>Generative model, conditional independence assumption, interpretable word-class associations, efficient training.</p>
    </div>
    <div class="feat">
      <h4>Logistic Regression</h4>
      <p>Discriminative model, no independence assumption, better calibration, linear decision boundary in feature space.</p>
    </div>
    <div class="feat">
      <h4>Feature Engineering</h4>
      <p>Bag-of-words representation, lemmatization, stop word removal, tf-idf weighting, vocabulary pruning.</p>
    </div>
    <div class="feat">
      <h4>Evaluation</h4>
      <p>Accuracy, precision/recall (false positive cost), ROC curves, calibration assessment, dataset balance considerations.</p>
    </div>
  </div>`,

  // 07 Double Descent
  `<p>The double descent phenomenon contradicts classical statistical theory, which predicts that test error decreases as model complexity increases up to an interpolation threshold, then increases monotonically due to overfitting. Double descent reveals a second descent: test error initially increases beyond interpolation (as expected), but then decreases again as model complexity continues to increase. This surprising U-shaped curve with a second descent challenges traditional bias-variance tradeoff intuition.</p>
  <p>This phenomenon emerges in neural networks trained to zero training error, particularly with early stopping removed. The interpolation threshold—where training error reaches zero—represents the critical transition point. Beyond this threshold, classical theory predicts increasing overfitting, yet empirically test error improves. Understanding double descent requires careful analysis of implicit regularization from stochastic gradient descent (SGD). Even without explicit regularization (dropout, weight decay), SGD's stochastic sampling provides regularization, preventing pathological overfitting. The phenomenon reflects that extremely high-capacity models trained to interpolation often generalize better than moderately-sized models, challenging conventional wisdom about the bias-variance tradeoff. This benign overfitting—interpolation without degradation—has profound implications for understanding deep learning's success.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">2</div><div class="sl">Descent Phases</div></div>
    <div class="st"><div class="sv">Interpolation</div><div class="sl">Threshold</div></div>
    <div class="st"><div class="sv">SGD</div><div class="sl">Regularization</div></div>
    <div class="st"><div class="sv">Benign</div><div class="sl">Overfitting</div></div>
  </div>`,

  // 08 Key Takeaways
  `<p>Problem Set 4 bridges theory and practice, revealing how information-theoretic principles ground modern machine learning. The KL divergence foundation explains why cross-entropy loss emerges naturally from maximum likelihood, connecting abstract mathematics to practical loss functions. This theoretical understanding deepens when implementing neural networks on MNIST, where the training process becomes concrete: forward passes compute likelihoods, backpropagation optimizes the cross-entropy objective, and regularization prevents overfitting by penalizing model complexity.</p>
  <p>The assignment culminates in double descent, a phenomenon that simultaneously humbles classical theory and inspires deeper analysis. By exploring how model complexity, implicit regularization, and training dynamics interact, students develop sophisticated mental models of machine learning. The spam classification problem reinforces that generative (Naive Bayes) and discriminative (logistic regression) paradigms offer complementary perspectives, each with distinct advantages. Together, these problems illustrate that deep learning's success emerges not from any single principle but from careful interplay of architecture, optimization, regularization, and understanding the fundamental limits and surprises of high-dimensional statistics.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Strengths & Insights</h4>
      <ul>
        <li>Information theory grounds practical machine learning loss functions</li>
        <li>Empirical exploration challenges classical statistical intuitions</li>
        <li>Multiple modeling paradigms illuminate complementary aspects</li>
        <li>Deep understanding of generalization emerges from careful analysis</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Challenges & Open Questions</h4>
      <ul>
        <li>Intuition for why benign overfitting occurs remains incomplete</li>
        <li>Scaling insights from MNIST to real-world images is non-trivial</li>
        <li>Feature engineering for text remains partially art, not science</li>
        <li>Understanding implicit regularization in SGD requires deep theory</li>
      </ul>
    </div>
  </div>`,

  // 09 References
  `<p>Essential resources for KL divergence, information theory, neural networks, and modern generalization phenomena. Stanford CS229 lectures cover information theory and loss functions weeks 5-7. Papers on double descent (Belkin et al., Bartlett et al.) are foundational. Murphy's textbook provides intuitive coverage of all topics. ESL remains invaluable for statistical learning theory and classical baselines.</p><p>Wikipedia articles quickly establish definitions and intuitions for KL divergence, cross-entropy, neural networks, and backpropagation. The MNIST dataset documentation and PyTorch/TensorFlow tutorials provide implementation guidance. For double descent, consult modern deep learning papers and surveys on implicit regularization in SGD.</p>`
];

const details = [
  // 01 PS4 Overview Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 — Details</div>
    <h2><em>PS4</em> Overview & Problem Structure</h2>
  </div>
  <p>Problem Set 4 stands as the longest and most conceptually dense assignment in XCS229, reflecting the complexity of modern machine learning. With 50 total points distributed across four problems, the weightings vary: problem 1 (KL divergence) carries 10 points, problem 2 (MNIST) carries 15 points, problem 3 (spam classification) carries 12 points, and problem 4 (double descent) carries 13 points. This distribution emphasizes deep learning and empirical phenomena exploration equally with theoretical foundations.</p>
  <p>The problems connect logically: theoretical understanding of KL divergence explains the cross-entropy loss used in MNIST training; MNIST neural network experience provides context for understanding generalization phenomena in double descent; Naive Bayes and logistic regression on spam offer alternative perspectives on optimization and generalization. Students are expected to implement non-trivial code, including neural network training loops and careful empirical analysis, making this assignment computation-intensive. Typical submissions include 500+ lines of code, numerous visualizations, and detailed written analysis. The assignment requires engagement with probability theory, optimization, implementation skills, and experimental methodology simultaneously.</p>
  <h3>Learning Objectives</h3>
  <p>By completing PS4, students should: (1) Understand KL divergence as fundamental to information theory and machine learning, (2) Implement and train neural networks on real data, (3) Evaluate models systematically using confusion matrices and per-class metrics, (4) Compare generative and discriminative approaches to text classification, (5) Explore the double descent phenomenon empirically and develop intuition for implicit regularization. The assignment balances theory with practice, encouraging students to verify mathematical predictions through experiments.</p>`,

  // 02 KL Divergence Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Details</div>
    <h2><em>KL</em> Divergence Properties & Proofs</h2>
  </div>
  <p>The formal definition of Kullback-Leibler divergence is D_KL(P||Q) = Σ_x P(x) log(P(x)/Q(x)). This can be rewritten as D_KL(P||Q) = E_x~P[log(P(x)/Q(x))] or D_KL(P||Q) = E_x~P[log P(x)] - E_x~P[log Q(x)], separating into an entropy term and a cross-entropy term. For continuous distributions, the sum becomes an integral: D_KL(P||Q) = ∫ p(x) log(p(x)/q(x)) dx.</p>
  <p>Proving non-negativity requires Gibbs' inequality: E_x~P[log(Q(x)/P(x))] ≤ 0, which follows from Jensen's inequality applied to the concave function log. This yields D_KL(P||Q) = -E_x~P[log(Q(x)/P(x))] ≥ 0, with equality if and only if P(x) = Q(x) almost everywhere. The asymmetry D_KL(P||Q) ≠ D_KL(Q||P) reflects distinct interpretations: D_KL(P||Q) penalizes regions where P(x) is large but Q(x) is small (miss-mass), while D_KL(Q||P) penalizes regions where Q(x) is large but P(x) is small (hallucination).</p>
  <h3>Information-Theoretic Interpretation</h3>
  <p>KL divergence quantifies the expected surprise or information loss when assuming distribution Q while true distribution is P. If you assign probability Q(x) to events with true probability P(x), the expected number of extra bits needed is D_KL(P||Q) / ln(2). This interpretation explains why minimizing KL divergence appears throughout machine learning: you want your model distribution to match the data distribution as closely as possible in expectation.</p>
  <h3>Relationship to Mutual Information</h3>
  <p>Mutual information I(X;Y) = D_KL(P(x,y)||P(x)P(y)) measures dependence between X and Y. Conditional KL divergence D_KL(P(y|x)||Q(y|x)) = E_x~P[D_KL(P(y|x)||Q(y|x))] generalizes to conditional distributions. These relationships connect KL divergence to information-theoretic measures of independence and dependence, foundational for understanding variational inference and information-theoretic aspects of learning.</p>`,

  // 03 KL Applications Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 — Details</div>
    <h2><em>KL</em> Applications in Inference & Generative Models</h2>
  </div>
  <p>The connection to maximum likelihood estimation emerges from the fundamental relationship: minimizing D_KL(P_data||P_θ) is equivalent to maximizing E_x~P_data[log P_θ(x)], the log-likelihood of the model under observed data. This equivalence explains why cross-entropy loss L = -Σ_i y_i log(ŷ_i) appears ubiquitously: it is the negative log-likelihood (NLL) of the model, equivalent to KL divergence between empirical and learned distributions.</p>
  <p>In variational inference, KL divergence constrains the learned approximation q(z|x) to stay close to the prior p(z), preventing posterior collapse and ensuring meaningful latent representations. The Evidence Lower Bound (ELBO) = E_q[log p(x|z)] - D_KL(q(z|x)||p(z)) naturally decomposes into reconstruction loss and a KL regularizer. When D_KL(q||p) is too large, training prioritizes matching the prior over reconstructing data; when too small, the model may ignore the latent variable entirely. Balancing this tradeoff via the β-VAE formulation E_q[log p(x|z)] - β D_KL(q(z|x)||p(z)) allows practitioners to tune the model's behavior.</p>
  <h3>Cross-Entropy Loss Derivation</h3>
  <p>For classification with true labels from empirical distribution P_data (one-hot vectors y_i) and model distribution P_θ (softmax outputs), KL divergence is D_KL(P_data||P_θ) = -H(P_data) + E_x~P_data[-log P_θ(y_i|x)] = -log(1) + E[-log P_θ] = E[-log P_θ]. Since entropy of one-hot distribution is zero, minimizing KL reduces to minimizing cross-entropy, the standard classification loss.</p>
  <h3>Variational Inference Framework</h3>
  <p>The ELBO also decomposes as ELBO = log p(x) - D_KL(q(z|x)||p(z|x)), showing that ELBO lower bounds the marginal likelihood p(x), with gap equal to the divergence between learned and true posterior. Maximizing ELBO simultaneously maximizes marginal likelihood and minimizes posterior approximation error, providing a principled objective for learning both encoder and decoder in generative models.</p>`,

  // 04 MNIST Neural Network Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 — Details</div>
    <h2><em>MNIST</em> Neural Network Implementation & Training</h2>
  </div>
  <p>Implementing a neural network for MNIST requires careful attention to preprocessing, architecture design, and training mechanics. Input preprocessing normalizes pixel values from [0,255] to [0,1] or standardizes to zero mean and unit variance. This normalization stabilizes gradients and accelerates convergence. Some practitioners flatten 28×28 images to 784-dimensional vectors for fully-connected networks; others reshape to 1×28×28 for convolutional architectures.</p>
  <p>A baseline architecture consists of two hidden layers with 128–256 units each, using ReLU activations σ(x) = max(0,x), followed by a softmax output layer. The ReLU choice matters: compared to sigmoid σ(x) = 1/(1+e^{-x}) or tanh(x), ReLU avoids vanishing gradients in deep networks and trains faster. The forward pass computes hidden activations h₁ = σ(W₁x + b₁), h₂ = σ(W₂h₁ + b₂), and logits z = W₃h₂ + b₃, with softmax probabilities ŷ_i = exp(z_i)/Σ_j exp(z_j).</p>
  <h3>Training Loop Structure</h3>
  <p>The training loop repeats for multiple epochs: (1) Sample a mini-batch of examples, (2) Forward pass to compute logits and softmax probabilities, (3) Compute cross-entropy loss L = -(1/n)Σ_i Σ_k y_ik log(ŷ_ik), (4) Backward pass via backpropagation to compute gradients ∂L/∂w, (5) Update parameters via gradient descent w := w - α∇L. With momentum or Adam optimization, updates incorporate accumulated gradients or adaptive learning rates per parameter.</p>
  <h3>Hyperparameter Tuning</h3>
  <p>Learning rate α typically ranges 0.001–0.01; too large causes oscillation, too small causes slow convergence. Batch size 32–128 provides good gradient estimates without excessive memory. Weight decay λ (L2 regularization) of 0.0001–0.001 prevents overfitting. Dropout with probability 0.2–0.5 randomly deactivates units during training, acting as an ensemble method. Early stopping monitors validation loss and halts training when validation performance ceases improving, preventing overfitting. Typical training requires 10–50 epochs to converge on MNIST.</p>`,

  // 05 MNIST Analysis Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 — Details</div>
    <h2><em>MNIST</em> Analysis & Error Characterization</h2>
  </div>
  <p>After training, evaluation begins with computing overall test accuracy: the fraction of test examples the model classifies correctly. Well-trained networks achieve 97–99% accuracy, but this single number obscures important patterns. Per-class accuracy reveals that the model achieves 98–99% on some digits (0, 1) while achieving only 95–96% on others (4, 9). Creating a 10×10 confusion matrix C where C_ij counts predictions of digit j when true label is i reveals systematic confusion patterns: digit 4 is frequently misclassified as 9, digit 3 as 8.</p>
  <p>Examining misclassified examples provides qualitative insights. Some misclassifications are genuinely ambiguous: a badly-written 4 can resemble 9, and vice versa. Others reveal true weaknesses: the model consistently mistakes certain digit styles. Visualizing learned features—the first-layer weight matrix or convolutional filters—shows that early layers learn edge and texture detectors (horizontal, vertical, diagonal edges), while deeper layers learn digit-specific shape detectors. This hierarchy reflects the network's bottom-up feature construction.</p>
  <h3>Error Analysis Techniques</h3>
  <p>Hard negative mining identifies examples that the model struggles with consistently. Creating separate accuracy metrics for clean vs. noisy data reveals robustness. Examining calibration—comparing predicted probabilities to actual accuracy—shows whether the model's confidence correlates with correctness. Adversarial example generation (small perturbations that flip predictions) reveals surprising brittleness, highlighting that MNIST accuracy is partly misleading about true robustness.</p>
  <h3>Feature Visualization</h3>
  <p>Visualizing hidden layer activations for specific test examples shows which units activate for which digits. Inverting network weights to generate optimal stimuli (the digit maximizing a neuron's activation) reveals what features each unit has learned to detect. Saliency maps highlighting pixels contributing to the model's prediction identify which image regions drive decisions. These interpretability techniques deepen understanding of what the network has learned.</p>`,

  // 06 Spam Classification Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 — Details</div>
    <h2><em>Spam</em> Classification: Naive Bayes vs Logistic Regression</h2>
  </div>
  <p>Spam classification exemplifies text classification on a practical problem where avoiding false positives (marking legitimate email as spam) is critical. The bag-of-words representation treats each document as a vector of word frequencies, ignoring word order and syntax but capturing informative vocabulary differences. Building a vocabulary of V words creates V-dimensional feature vectors x ∈ ℝ^V where x_j counts or indicates presence of word j.</p>
  <p>Naive Bayes models P(y|x) = P(x|y)P(y)/P(x) by factorizing P(x|y) = ∏_j P(x_j|y), assuming conditional independence of features given the class. With multinomial likelihood, P(x_j|y) = θ_{j,y}^{x_j} where θ_{j,y} are word-given-class probabilities estimated via maximum likelihood with Laplace smoothing. The decision rule is argmax_y P(y|x) = argmax_y log P(y) + Σ_j x_j log θ_{j,y}.</p>
  <h3>Logistic Regression Approach</h3>
  <p>Logistic regression models P(y=1|x) = σ(w^T x + b) where σ is the sigmoid function. Unlike Naive Bayes, it makes no independence assumptions, learning weights w directly via maximum likelihood. The loss function is L = -(1/n)Σ_i[y_i log ŷ_i + (1-y_i) log(1-ŷ_i)], optimized via gradient descent. Decision boundary is the line w^T x + b = 0 in the original feature space.</p>
  <h3>Feature Engineering & Preprocessing</h3>
  <p>Raw text requires preprocessing: tokenization (splitting into words), lowercasing, removing punctuation, lemmatization (reducing words to base forms), and stop word removal (eliminating common but uninformative words like "the," "a"). TF-IDF weighting assigns weights w_j = tf_j × idf_j where tf_j is term frequency and idf_j = log(N/n_j) is inverse document frequency, down-weighting words appearing in many documents and upweighting rare informative words.</p>
  <h3>Model Comparison & Deployment</h3>
  <p>Both models achieve 95%+ accuracy on standard benchmarks, but with tradeoffs: Naive Bayes trains very quickly, interprets easily (word-specific log-odds clearly indicate spam indicators), but may underfit with limited data due to independence assumptions. Logistic regression requires more computation but fits the boundary more flexibly, achieving marginal accuracy gains. In production, precision-recall tradeoffs matter: adjusting decision threshold to minimize false positives (legitimate emails marked spam) may accept more false negatives (spam reaching inbox), prioritizing user experience.</p>`,

  // 07 Double Descent Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 — Details</div>
    <h2><em>Double</em> Descent Phenomenon & Benign Overfitting</h2>
  </div>
  <p>The classical bias-variance tradeoff predicts test error decreases as model complexity increases (variance decreases), reaching minimum near the interpolation threshold where training error becomes zero, then increases as overfitting dominates. Empirically, deep neural networks often violate this prediction: beyond the interpolation threshold, test error initially rises but then descends again, creating a double-descent risk curve with two minima.</p>
  <p>The interpolation threshold occurs when model capacity equals effective number of parameters, allowing the model to fit all training data perfectly. In neural networks, this threshold depends on network width, depth, and dataset size. The classic U-shaped bias-variance curve predicts catastrophic overfitting beyond this point, yet double descent shows improvement. This phenomenon reflects implicit regularization: SGD's stochasticity acts as regularization, preventing pathological memorization even when training error is zero. The second descent indicates that higher-capacity models actually generalize better, seeming to contradict classical theory.</p>
  <h3>Implicit Regularization via SGD</h3>
  <p>Stochastic gradient descent, despite using no explicit regularization, exhibits implicit regularization properties. The stochastic noise from mini-batch sampling effectively regularizes solutions, selecting among multiple solutions fitting the training data the one with properties favorable for generalization (e.g., solutions with small norm). This implicit regularization explains benign overfitting: the model fits all training data while still generalizing well because SGD guides it toward solutions that generalize despite achieving zero training error.</p>
  <h3>Benign vs Harmful Overfitting</h3>
  <p>Benign overfitting occurs when the model achieves zero training error yet maintains good test performance—the new normal in deep learning. Harmful overfitting, the classical concern, occurs when training error is zero but test error is high due to fitting noise. The double descent phenomenon suggests that with sufficient model capacity and proper optimization, benign overfitting becomes the typical regime. This explains why modern deep networks with millions of parameters often generalize well despite vastly exceeding training set size.</p>
  <h3>Empirical Verification</h3>
  <p>Exploring double descent requires training networks of increasing width on fixed training sets, plotting test error vs. width. Clear visualization shows the classical U-shape (descent to interpolation threshold, then increase) giving way to the second descent at higher widths. The peak of the double descent—maximum test error—represents the most dangerous regime where the model is complex enough to overfit but not regularized enough to recover. Understanding this phenomenon guides practitioners toward either models complex enough to achieve the second descent or explicit regularization preventing entry into the high-error interpolation region.</p>`,

  // 08 Key Takeaways Detail
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 — Details</div>
    <h2>Key <em>Takeaways</em> & Synthesis</h2>
  </div>
  <p>Problem Set 4 integrates theory and practice, demonstrating that modern machine learning rests on solid mathematical foundations. KL divergence is not merely academic abstraction but grounds the cross-entropy loss ubiquitous in deep learning. When implementing MNIST training loops, students directly optimize cross-entropy, experiencing first-hand the connection between information-theoretic principles and algorithmic practice. This concrete experience deepens mathematical understanding far more effectively than theory alone.</p>
  <p>The comparative study of Naive Bayes and logistic regression on spam data illuminates fundamental machine learning dichotomies: generative vs. discriminative modeling, parametric distributions vs. learned boundaries, interpretability vs. accuracy. Neither approach dominates universally; the choice depends on data characteristics, interpretability requirements, and computational constraints. This flexibility reflects how mature machine learning practice involves toolkit mastery rather than universal principles.</p>
  <h3>Challenging Conventional Wisdom</h3>
  <p>Double descent is perhaps the most intellectually valuable outcome, challenging the classical bias-variance intuition that shapes much of machine learning pedagogy. That highly complex models can generalize better than moderately sized ones contradicts age-old wisdom and forces reconsideration of how we think about overfitting and regularization. The realization that implicit regularization from SGD prevents pathological overfitting suggests that algorithm design matters as much as model selection.</p>
  <h3>Practical Implications</h3>
  <p>Understanding these concepts has immediate practical value: (1) Recognizing when models interpolate training data yet generalize well, (2) Choosing between generative and discriminative approaches based on problem structure, (3) Implementing neural networks correctly with proper optimization and evaluation, (4) Interpreting model failures through confusion matrices and feature analysis. These skills transfer broadly to any machine learning application.</p>
  <h3>Future Directions</h3>
  <p>The phenomena explored in PS4 connect to active research: implicit bias of gradient descent, generalization bounds in high-dimensional settings, understanding when interpolation succeeds, and optimal model complexity selection. Students completing this assignment successfully have achieved sophisticated understanding suitable for advanced coursework, research, or professional practice in machine learning.</p>`,

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
