<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoencoders — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}

.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}

.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}

.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}

.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}

.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}

.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}

.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}

.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}

.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}

.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}

.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}

.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}

.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}

[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}

.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}

.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}

.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}

.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}

.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}

.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}

.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}

     <h2>The <em>Autoencoder</em> Idea</h2>
   </div>
   <p>The autoencoder is built on an elegant principle: compress information through a bottleneck, then reconstruct. This forces the network to learn a dense representation of the data's essential structure. Hinton and Salakhutdinov's 2006 paper, "Reducing the Dimensionality of Data with Neural Networks," showed that deep autoencoders could learn better representations than PCA by leveraging the nonlinear expressiveness of neural networks.</p>
   <h3>The Information Bottleneck</h3>
   <p>An autoencoder cannot simply copy its input through the layers. The bottleneck—a hidden layer with fewer units than the input—acts as an information filter. To minimize reconstruction error despite this constraint, the network must learn which aspects of the data are essential and which are noise. This is where generalization emerges: the bottleneck prevents overfitting by forcing a low-rank approximation.</p>
   <p>The trade-off between compression and fidelity is fundamental. A very narrow bottleneck preserves only the broadest structure; a wide one allows near-perfect reconstruction but learns little. The optimal width depends on the data's intrinsic dimensionality and the downstream task.</p>
   <h3>Feature Learning vs. Compression</h3>
   <p>Autoencoders serve two purposes. As feature extractors, the learned encoder provides representations useful for downstream classification or clustering. As generative models, the decoder samples from the latent space to create new data. These roles can conflict: maximum compression may discard task-relevant details. Balancing this requires careful design of the bottleneck size and the loss function.</p>
   <h3>Historical Context</h3>
   <p>Before 2006, dimensionality reduction meant PCA: linear, efficient, well-understood. Deep autoencoders were expensive to train (layer-by-layer pretraining was required), but they learned richer nonlinear manifolds. The 2012 ImageNet breakthrough vindicated deep learning, and autoencoders evolved from a pretraining tool into a powerful primitive for unsupervised learning. Today, VAEs and diffusion models build directly on autoencoder principles.</p>

  `<div class="detail-header">
     <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Details</div>
     <h2><em>Vanilla</em> Autoencoders</h2>
   </div>
   <p>The vanilla autoencoder is conceptually simple: an encoder network reduces input dimensionality, a bottleneck layer holds the latent code, and a decoder reconstructs the input. Both are trained jointly to minimize reconstruction error. No probabilistic assumptions, no adversarial loss—just pure reconstruction.</p>
   <h3>Architecture Overview</h3>
   <p>For MNIST (28×28 grayscale images, 784 pixels), a typical architecture progresses as: Input (784) → FC 512 (ReLU) → FC 256 (ReLU) → FC 32 (bottleneck, linear or ReLU) → FC 256 (ReLU) → FC 512 (ReLU) → Output (784, sigmoid for pixel probabilities). The architecture mirrors itself: what goes down must come up. Some variants use untied weights (separate parameters for encoder and decoder); others share weights across the symmetry, reducing parameters and imposing structural constraints.</p>
   <div class="diagram-wrap">
     <svg width="100%" height="200" viewBox="0 0 600 200" preserveAspectRatio="xMidYMid meet">

   <h3>Loss Functions</h3>
   <p>For continuous-valued data (e.g., normalized images), mean squared error (MSE) is standard: L = ||x - x̂||². For binary data (e.g., binarized MNIST), binary cross-entropy is more appropriate: L = -Σ(x·log(x̂) + (1-x)·log(1-x̂)). The choice reflects the data distribution assumed by the output layer. MSE assumes Gaussian noise in the reconstruction; cross-entropy assumes Bernoulli outputs.</p>
   <p>Other losses exist: L1 (mean absolute error) encourages sparsity in the reconstruction residuals; contrastive losses compare reconstructions of similar inputs. The fundamental principle remains: the decoder must minimize the discrepancy between input and output.</p>
   <h3>Training Through the Bottleneck</h3>
   <p>A tight bottleneck can create training challenges. Gradients flowing backward through a 32-dimensional layer in a 784-dimensional space compress information severely, potentially leading to vanishing gradients. Batch normalization, careful learning rate scheduling, and sometimes deeper bottleneck architectures (e.g., using multiple small layers instead of one wide layer) help. Modern autoencoders often use convolutional layers for image data, which naturally preserve spatial structure and enable training of much deeper networks.</p>
   <h3>Worked Example: MNIST</h3>
   <p>Training a vanilla autoencoder on MNIST for 10 epochs with batch size 128 and Adam optimizer (lr=0.001) yields reconstruction error (MSE) of ~0.01–0.02. Individual digits are recognizable but slightly blurred, as the 32-dimensional bottleneck discards fine details. Early stopping based on validation loss is crucial; continuing training can cause overfitting, where the network learns to map the training set perfectly, capturing noise.</p>`,
  `<div class="detail-header">
     <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 — Details</div>
     <h2><em>Sparse</em> & Denoising Variants</h2>
   </div>
   <p>Vanilla autoencoders can fail to learn rich representations if the bottleneck is too wide or the model is overparameterized. Sparse and denoising autoencoders add inductive biases to force more meaningful learning.</p>
   <h3>Sparse Autoencoders</h3>
   <p>A sparse autoencoder constrains activations in the bottleneck layer to be sparse. The loss becomes: L = MSE(x, x̂) + λ·KL(ρ || ρ̂), where ρ is a target sparsity (e.g., 5% of neurons active) and ρ̂ is the actual average activation. The KL divergence penalty encourages activations to match the target distribution. This forces individual neurons to specialize: each fires only for a specific pattern in the data.</p>
   <p>Alternatively, L1 regularization directly penalizes the sum of absolute activations: L = MSE(x, x̂) + λ·Σ|h|, where h is the bottleneck activation. This simpler approach also encourages sparsity, though it doesn't precisely control the sparsity level.</p>
   <h3>Denoising Autoencoders</h3>
   <p>A denoising autoencoder (DAE) takes corrupted input and reconstructs clean output. During training, the input is corrupted by adding Gaussian noise, salt-and-pepper noise, or masking. The decoder learns to map noisy x to clean x. This forces the encoder to extract noise-invariant features. The surprising result: denoising autoencoders generalize better than vanilla ones, even when evaluated on clean inputs.</p>
   <p>Why does this work? Noise acts as a form of regularization, preventing the network from learning trivial identity mappings. The decoder must reason about which parts of the input are signal and which are noise, learning a more robust representation. DAEs naturally extend to score matching and diffusion models, where the network learns to predict the gradient of the log-probability (score) at each noise level.</p>
   <h3>Contractive Autoencoders</h3>
   <p>Contractive autoencoders (CAE) penalize the Frobenius norm of the encoder's Jacobian matrix: L = MSE(x, x̂) + λ·||J||_F², where J = ∂h/∂x. This penalty encourages the mapping to be locally contractive: small perturbations in input space lead to small changes in the hidden representation. Unlike denoising, this doesn't require explicit noise injection; instead, it encourages learned invariance to input variations.</p>

     <h2><em>Variational</em> Autoencoders</h2>
   </div>
   <p>Variational Autoencoders (VAEs) reframe autoencoders as generative models. Instead of encoding to a point, the encoder outputs the parameters of a probability distribution over latent codes. The decoder learns p(x|z), and training maximizes the evidence lower bound (ELBO), which balances reconstruction fidelity and prior regularization.</p>
   <h3>Generative Model Perspective</h3>
   <p>A VAE assumes a hierarchical generative process: p(x) = ∫ p(x|z)p(z) dz. The prior p(z) is typically a standard Gaussian N(0, I). The decoder parameterizes p(x|z). To fit this model, we'd need to marginalize over z—intractable for complex distributions. Instead, VAE introduces a variational posterior q(z|x), also Gaussian, parameterized by the encoder. The ELBO becomes:</p>
   <p>log p(x) ≥ E_q[log p(x|z)] - KL(q(z|x) || p(z))</p>
   <p>The first term is reconstruction loss; the second regularizes the latent distribution toward the prior. Maximizing ELBO is tractable: both expectations are over Gaussians, tractable for reparameterization.</p>
   <h3>The Reparameterization Trick</h3>
   <p>Sampling from q(z|x) naively breaks backpropagation: gradients can't flow through a sampling operation. The reparameterization trick sidesteps this. Instead of z ~ q(z|x), write z = μ(x) + σ(x) ⊙ ε, where ε ~ N(0, I) is a fixed noise variable and ⊙ is element-wise multiplication. Now gradients flow through μ and σ (the encoder outputs), while ε remains constant during backprop. This enables end-to-end training of the entire VAE.</p>

   <h3>ELBO Components</h3>
   <p>The first term, E_q[log p(x|z)], is reconstruction loss (negative). For Gaussian decoder with fixed variance, this is MSE. For Bernoulli, binary cross-entropy. The second term, KL(q||p), regularizes the latent distribution: it's zero when q matches p (standard Gaussian) and grows as q diverges. In practice, the KL term is often much smaller than reconstruction during early training, but becomes significant as training progresses. This is intentional: balance fidelity and constraint.</p>
   <h3>β-VAE and Disentanglement</h3>
   <p>A hyperparameter β scales the KL term: ELBO = E[log p(x|z)] - β·KL(...). When β=1, this is the standard VAE. β>1 increases the regularization, pushing the latent space toward the prior and improving sample quality. The trade-off: stronger β reduces reconstruction fidelity. β-VAE (Higgins et al., 2017) showed that β=4 empirically encourages disentangled representations, where latent factors encode independent variations (e.g., color, rotation, identity).</p>`,

     <h2>The <em>Latent</em> Space</h2>
   </div>
   <p>The latent space learned by an autoencoder is far more than a storage mechanism—it's a learned manifold that encodes the data's intrinsic structure. For VAEs, this manifold is regularized to be smooth and normally distributed. For vanilla autoencoders, it can be more irregular but still meaningful.</p>
   <h3>Interpolation and Smoothness</h3>
   <p>VAE latent spaces enable linear interpolation between data points. Given two images x₁ and x₂, encode them to z₁ = encoder(x₁) and z₂ = encoder(x₂). Sample intermediate codes z_t = (1-t)z₁ + tz₂ for t ∈ [0,1], then decode: x_t = decoder(z_t). The resulting sequence shows a smooth transformation between x₁ and x₂. For vanilla autoencoders trained on good data, this often works; for VAEs, it's theoretically justified because the prior N(0,I) encourages smooth transitions.</p>
   <h3>Disentangled Representations</h3>
   <p>Ideally, latent factors encode independent, interpretable attributes. A VAE trained on CelebA (face images) might learn factors for age, gender, expression, lighting. Disentanglement is not automatic; it requires careful design. β-VAE, Factor-VAE, and β-TCVAE are methods that explicitly encourage independence. The insight: if you increase β (or an analogue), the model trades reconstruction fidelity for more independent factors. This makes sense: to match a standard Gaussian prior while capturing many independent modes, latent factors must align with separable data variations.</p>
   <h3>Latent Arithmetic</h3>
   <p>Given a VAE trained on faces, encode representative examples: man, woman, bald man. In latent space, compute z_result = z_woman - z_man + z_bald_man. Decode z_result to generate a "bald woman" face. This arithmetic works because VAEs learn compositional representations: gender as one direction, baldness as another, and they're approximately independent. This property is rarely perfect but often surprisingly effective, demonstrating that VAEs capture interpretable structure.</p>

     <h2><em>Modern</em> Variants</h2>
   </div>
   <p>Since VAEs emerged in 2013, researchers have developed numerous extensions addressing limitations and enabling new capabilities. These variants push autoencoders toward state-of-the-art generative modeling.</p>
   <h3>Vector Quantized VAE (VQ-VAE)</h3>
   <p>VQ-VAE (van den Oord et al., 2017) replaces the continuous Gaussian latent distribution with discrete codes from a learned codebook. The encoder outputs indices into a codebook of learned embeddings. This is a clever hybrid: the discretization adds a structural prior (there are only K possible codes), enabling high-fidelity generation and facilitating next-token prediction (like language models for images). The codebook size is a hyperparameter; typical values are 512–4096. VQ-VAE enables autoregressive sampling: given the latent codes, predict the next code and decode incrementally.</p>
   <h3>Conditional VAE (CVAE)</h3>
   <p>CVAE (Sohn et al., 2015) conditions both encoder and decoder on side information (class labels, attributes, etc.). The encoder becomes q(z|x,y) and decoder p(x|z,y). This enables controlled generation: encode an image and a target class, sample from the latent distribution, decode, and generate a plausible image in the target class. Applications include image-to-image translation, inpainting (conditioning on the known regions), and multi-modal generation (sampling multiple diverse outputs for a single input).</p>
   <h3>Adversarial Autoencoders (AAE)</h3>
   <p>AAE (Makhzani et al., 2015) adds a GAN loss to match the empirical distribution q(z|x) to the prior p(z). The discriminator's job: distinguish samples from q (encoder) and p (prior). This improves sample quality and produces sharper images. The trade-off: GAN training is notoriously unstable. AAE requires careful tuning but can yield impressive results, especially for image generation.</p>
   <h3>Hierarchical VAE (NVAE)</h3>
   <p>NVAE (Vahdat & Kautz, 2020) uses a multi-scale hierarchy of latent variables, with residual blocks and careful variance weighting. z_1 encodes low-level detail, z_2 mid-level structure, z_3 high-level semantics. The decoder samples from z_3 (coarse) down to z_1 (fine), leveraging the hierarchy for efficient sampling. NVAE achieves remarkable sample quality on ImageNet, demonstrating that autoencoders can compete with diffusion and GAN models when properly designed.</p>

     <h2><em>Real-World</em> Applications</h2>
   </div>
   <p>Autoencoders excel in settings where unsupervised learning is valuable and generative modeling is helpful. Their applications span anomaly detection, image restoration, drug discovery, and representation learning.</p>
   <h3>Dimensionality Reduction and Representation Learning</h3>
   <p>PCA was the gold standard for decades. Autoencoders generalize PCA to nonlinear manifolds, learning richer representations. For tabular data with complex structure, a 5-layer autoencoder often outperforms PCA. A pretrained autoencoder provides a frozen encoder for downstream tasks: train a classifier on encoded features. This transfer learning approach is especially valuable when labeled data is scarce.</p>
   <h3>Anomaly Detection</h3>
   <p>Train an autoencoder on normal data. At test time, reconstruction error signals anomalies: objects unlike the training distribution have high error. This is simple, scalable, and interpretable. For credit card fraud, network intrusion detection, and manufacturing defects, reconstruction-based anomaly detection is industry-standard. The threshold (what error level signals an anomaly) is a hyperparameter tuned on validation data.</p>
   <h3>Image Inpainting and Restoration</h3>
   <p>Given a corrupted image with masked regions, train a denoising autoencoder on clean images. At test time, masked pixels are iteratively refined: encode the corrupted image, decode, replace unmasked pixels with originals, repeat. Or, for VAEs, condition on unmasked pixels and sample the latent space. Inpainting enables image restoration, object removal, and completion tasks. Modern diffusion models supersede autoencoders here, but the principle is the same.</p>
   <h3>Drug Discovery and Molecular Generation</h3>
   <p>Represent molecules as graphs or SMILES strings. Train an autoencoder on chemical databases. The latent space encodes molecular properties; sampling generates novel molecules. Autoencoders for chemistry learn to generate valid, druglike compounds. Combining with a predictor (toxicity, efficacy) enables optimization: search the latent space for molecules maximizing desired properties. This is vastly faster than physical synthesis or computational chemistry alone.</p>
   <h3>Style Transfer and Domain Adaptation</h3>
   <p>Given two domains (e.g., photos and paintings), train separate autoencoders. Extract encodings from domain A, decode with domain B's decoder, generate domain-shifted output. Or train a single autoencoder on both domains simultaneously, learning domain-invariant representations. Shared encoders with domain-specific decoders enable unsupervised translation, useful for adapting models across domains.</p>
   <h3>Feature Disentanglement for Interpretability</h3>
   <p>β-VAE and variants discover interpretable factors of variation. In medical imaging, a β-VAE might learn to disentangle disease severity from imaging noise. In video, one factor controls camera motion, another character pose. This interpretability is invaluable for understanding what models learn and debugging failures.</p>`,

     <h2>From <em>Autoencoders</em> to Diffusion</h2>
   </div>
   <p>Diffusion probabilistic models (DDPM, 2020) and related approaches have become the dominant generative paradigm. Their connection to autoencoders reveals a deep insight: diffusion is the limit of hierarchical, multi-scale denoising autoencoders.</p>
   <h3>Denoising to Diffusion</h3>
   <p>A denoising autoencoder learns to remove one level of noise. A diffusion model extends this: the encoder progressively adds noise over many timesteps (forward process), the decoder (score network) learns to reverse it (reverse process). Mathematically, DDPM defines a Markov chain x₀ → x₁ → ... → x_T where x_T ≈ pure noise. Training minimizes the loss at each timestep. The key insight: this is equivalent to training a sequence of denoising autoencoders, each specialized for a noise level.</p>
   <h3>Hierarchical VAE to Diffusion</h3>
   <p>Hierarchical VAE learns z₁ ← z₂ ← z₃ with independent Gaussians at each level. Diffusion models generalize this: they have infinitely many levels, with an infinitesimal step size. The limiting behavior of a hierarchical VAE with many layers and decreasing variance at each level converges to a diffusion process. This theoretical connection shows that diffusion models are extreme hierarchical autoencoders.</p>
   <h3>Score Matching Perspective</h3>
   <p>Autoencoders and diffusion models both learn gradients (scores) of log-probabilities. A denoising autoencoder predicts x from corrupted x+ε, which is equivalent to learning ∇_x log p(x|x+ε). Diffusion models learn ∇_{x_t} log p(x_t), the score at each noise level. This unifies two seemingly different approaches: both are score-matching objectives.</p>
   <h3>The Modern Pipeline</h3>
   <p>Today, autoencoders are often used as building blocks in larger systems. In latent diffusion (Stable Diffusion), a VAE encodes images to a low-dimensional latent space, diffusion operates there, then the VAE decoder generates high-resolution output. This is much cheaper than diffusion in pixel space. VQ-VAE enables discrete latent codes, enabling transformer-based generation with quantized tokens. Autoencoders are no longer the frontier but remain essential infrastructure.</p>
   <h3>Future Directions</h3>
   <p>Open questions persist: Can autoencoders match diffusion in sample quality without adversarial training? How do we learn truly disentangled representations at scale? Can we combine discrete (VQ) and continuous latent codes efficiently? Autoencoders will likely remain relevant as long as unsupervised representation learning and efficient compression matter. Their simplicity and interpretability are enduring strengths.</p>

sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
</body>
</html>
