<html lang="en">
<head>

  <title>KV Cache in LLM Inference - Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* Root element & base theming */
    html {
      background: var(--bg);
      color: var(--text);
      scroll-behavior: smooth;
    }

    /* Light theme */
    [data-theme="light"]{
      --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;

      --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
      --serif:'EB Garamond',Georgia,serif;
      --sans:'Jost',-apple-system,sans-serif;
      --mono:'IBM Plex Mono',monospace;
      --body-font:var(--sans);--body-weight:400;
      --heading-weight:500;--label-weight:600;
      --heading-ls:.5px;--label-ls:2.5px;
      --grad1:#7c3aed06;--grad2:#9b7aed04;
      --sidebar-bg:var(--bg2);
      --right-bg:var(--bg2);
      --grain-opacity:0.015;
      --callout-p-style:italic;--callout-p-weight:400;
      --callout-p-size:17px;--callout-p-color:var(--bright);
      --security-bg:none;
      --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
      --edge-dim-w:.8;--edge-hi-w:1.5;
      --dash-speed:1s;
      --close-text:"✕";
      --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
      --feat-h4-size:17px;--feat-h4-ls:0px;
      --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
      --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

      --close-size:17px;--close-ls:1px;--close-weight:300;
      --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
      --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
      --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
      --code-weight:400;--medium-weight:400;
      --topbar-glow:#7c3aed15;
    }

    [data-theme="light"] body {
      text-align: justify;
      line-height: 1.7;
    }

    [data-theme="light"] ul {
      list-style-type: disc;
      margin-left: 1.5em;
    }

    [data-theme="light"] .callout {
      border-left: 4px solid var(--accent);
    }

    /* Dark theme */
    [data-theme="dark"]{
      --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
      --border:#1c2440;--border-hi:#283558;
      --text:#8490aa;--dim:#546080;--bright:#dce0ec;
      --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
      --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
      --serif:'EB Garamond',Georgia,serif;
      --sans:'Jost',-apple-system,sans-serif;
      --mono:'IBM Plex Mono',monospace;
      --body-font:var(--sans);--body-weight:400;
      --heading-weight:500;--label-weight:600;
      --heading-ls:.5px;--label-ls:2.5px;
      --grad1:#9b7aed06;--grad2:#4ee8d004;
      --sidebar-bg:var(--bg);
      --right-bg:var(--bg2);
      --grain-opacity:0.02;
      --callout-p-style:italic;--callout-p-weight:400;
      --callout-p-size:17px;--callout-p-color:var(--bright);
      --security-bg:none;
      --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
      --edge-dim-w:.5;--edge-hi-w:1;
      --dash-speed:1.5s;
      --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
      --feat-h4-size:17px;--feat-h4-ls:0px;
      --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
      --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

      --close-size:17px;--close-ls:1px;--close-weight:300;
      --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
      --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
      --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
      --code-weight:400;--medium-weight:400;
      --topbar-glow:#9b7aed10;
    }

    [data-theme="dark"] body {
      text-align: left;
      line-height: 1.7;
    }

    [data-theme="dark"] ul {
      list-style-type: none;
    }

    [data-theme="dark"] ul li::before {
      content: "— ";
      color: var(--dim);
      margin-right: 0.5em;
    }

    [data-theme="dark"] .callout {
      border-top: 3px solid var(--accent);
      border-left: none;
    }

    [data-theme="dark"] hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--green) 100%);
      margin: 2em 0;
    }

    /* Base styles */
    body {
      font-family: "EB Garamond", serif;
      font-size: 17px;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
      opacity: var(--grain-opacity);
      pointer-events: none;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      margin: 1.2em 0 0.6em;
    }

    code, pre {
      font-family: "IBM Plex Mono", monospace;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
    }

    a:hover {
      opacity: 0.8;
    }

    /* Layout */
    .shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 180px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      transition: width 0.3s ease;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .right {
      width: 0;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      transition: width 0.3s ease;
      flex-shrink: 0;
    }

    .detail-open .sidebar {
      width: 52px;
    }

    .detail-open .sidebar .sidebar-label {
      opacity: 0;
      width: 0;
    }

    .detail-open .sidebar .sidebar-item {
      justify-content: center;
    }

    .detail-open .right {
      width: 50%;
    }

    [data-theme="light"] .right.closed::before{opacity:0}
    [data-theme="dark"] .right.closed::before{opacity:0}

    /* Sidebar */
    .sidebar-head {
      padding: 1.5em;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .logo {
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .sidebar-nav {
      padding: 0.5em 0;
    }

    .sidebar-item {
      padding: 1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.8em;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
      color: var(--dim);
    }

    .sidebar-item:hover {
      background: var(--bg3);
    }

    .sidebar-item.active {
      border-left-color: var(--accent);
      background: var(--accent-soft);
      color: var(--text);
    }

    .sidebar-num {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .sidebar-label {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 12px;
      font-weight: 500;
      transition: opacity 0.3s ease;
    }

    .sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
    .sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

    /* Main panel */
    .main-head {
      padding: 2em 3em;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 35vh;
      overflow-y: auto;
    }

    .hero-badge {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.5em 1em;
      border-radius: 4px;
      margin-bottom: 0.8em;
    }

    .hero-title {
      font-size: 2.5em;
      margin: 0.3em 0 1em;
      line-height: 1.2;
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }

    .masthead-rule {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.2em 0;
    }

    .masthead-subtitle {
      font-size: 1.1em;
      color: var(--dim);
      margin: 0.8em 0 1.5em;
    }

    .tab-bar {
      display: flex;
      gap: 2em;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      font-family: "IBM Plex Sans", sans-serif;
      background: none;
      border: none;
      padding: 0.8em 0;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover, .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .main-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .section-block {
      padding: 40px 8px;
      border-bottom: 1px solid var(--border);
    }

    .section-block:last-child {
      border-bottom: none;
    }

    .s-num {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 0.5em;
    }

    .section-block h2 {
      font-size: 1.8em;
      margin: 0 0 1em 0;
      line-height: 1.3;
    }

    .section-block h2 em {
      font-style: italic;
      color: var(--accent);
    }

    .section-block p {
      margin: 0.8em 0;
      color: var(--text);
    }

    .s-open {
      display: inline-block;
      margin-top: 1.2em;
      padding: 0.6em 1.2em;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 4px;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .s-open:hover {
      background: var(--bg3);
    }

    /* Right panel */
    .right-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1em;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg2);
      z-index: 10;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.9em;
      padding: 0.5em 0.8em;
      transition: color 0.2s ease;
    }

    .close-btn:hover {
      color: var(--text);
    }

    .close-btn.mobile {
      display: none;
    }

    .right-inner {
      padding: 2em 2em;
    }

    .detail {
      margin-bottom: 3em;
    }

    .detail-header {
      display: flex;
      align-items: baseline;
      gap: 1em;
      margin-bottom: 1.5em;
    }

    .detail-header .num {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .detail-header h2 {
      font-size: 1.6em;
      margin: 0;
      flex: 1;
    }

    .detail-label {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.4em 0.8em;
      border-radius: 3px;
      margin-bottom: 1.2em;
    }

    /* Content components */
    .s-list {
      list-style-position: outside;
      margin-left: 1.5em;
      padding: 0;
    }

    .s-list li {
      margin: 0.6em 0;
      position: relative;
    }

    .s-list.pro li::before {
      content: "● ";
      color: var(--green);
      margin-right: 0.5em;
    }

    .s-list.con li::before {
      content: "● ";
      color: var(--red);
      margin-right: 0.5em;
    }

    [data-theme="dark"] .s-list.pro li::before {
      content: "— ";
    }

    [data-theme="dark"] .s-list.con li::before {
      content: "— ";
    }

    .s-stat {
      display: flex;
      gap: 2em;
      margin: 1.5em 0;
      flex-wrap: wrap;
    }

    .st {
      flex: 1;
      min-width: 150px;
      padding: 1.2em;
      background: var(--bg3);
      border-radius: 4px;
      text-align: center;
    }

    .sv {
      font-family: "IBM Plex Mono", monospace;
      font-size: 1.8em;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.3em;
    }

    .sl {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.85em;
      color: var(--dim);
    }

    .s-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8em;
      margin: 1.2em 0;
    }

    .s-chip {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.8em;
      padding: 0.5em 1em;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      white-space: nowrap;
    }

    .feat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5em;
      margin: 1.5em 0;
    }

    .feat {
      padding: 1.2em;
      background: var(--bg3);
      border-radius: 4px;
    }

    .feat h4 {
      margin: 0 0 0.5em 0;
      font-size: 1em;
      color: var(--text);
    }

    .feat p {
      margin: 0;
      font-size: 0.95em;
      color: var(--dim);
    }

    .verdict {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5em;
      margin: 1.5em 0;
    }

    .v-col {
      padding: 1.5em;
      border-radius: 4px;
    }

    .v-col.pro {
      background: rgba(46, 110, 62, 0.1);
      border-left: 3px solid var(--green);
    }

    .v-col.con {
      background: rgba(139, 32, 32, 0.1);
      border-left: 3px solid var(--red);
    }

    .v-col h4 {
      margin: 0 0 0.8em 0;
      font-size: 1em;
    }

    .v-col.pro h4 {
      color: var(--green);
    }

    .v-col.con h4 {
      color: var(--red);
    }

    .v-col ul {
      margin: 0;
      padding-left: 1.2em;
    }

    .timeline {
      margin: 1.5em 0;
      padding-left: 1.5em;
      border-left: 2px solid var(--border);
    }

    .tl-item {
      margin-bottom: 1.5em;
      position: relative;
      padding-left: 1em;
    }

    .tl-item::before {
      content: "";
      position: absolute;
      left: -0.75em;
      top: 0.3em;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .tl-date {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.9em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.2em;
    }

    .tl-text {
      color: var(--text);
    }

    .callout {
      padding: 1.2em;
      margin: 1.5em 0;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 2px;
    }

    .callout h4 {
      margin: 0 0 0.5em 0;
      font-size: 1em;
      color: var(--accent);
    }

    .callout p {
      margin: 0;
      color: var(--text);
    }

    .callout p em {
      font-style: italic;
      color: var(--text);
    }

    .diagram-wrap {
      margin: 1.5em 0;
      padding: 1em;
      background: var(--bg3);
      border-radius: 4px;
      overflow: auto;
    }

    .diagram-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .node rect {
      fill: var(--bg3);
      stroke: var(--border);
      stroke-width: 1.5;
    }

    .node-hi rect {
      fill: var(--accent-soft);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .node-text {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 12px;
      font-weight: 600;
      fill: var(--text);
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node-sub {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      fill: var(--dim);
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .edge {
      stroke: var(--dim);
      stroke-width: 1.5;
      fill: none;
    }

    .edge-hi {
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 5, 5;
      animation: dash 20s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -10;
      }
    }

    .lbl {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      fill: var(--dim);
      text-anchor: middle;
    }

    .lbl-hi {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      fill: var(--accent);
      text-anchor: middle;
      font-weight: 600;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      bottom: 2em;
      right: 2em;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--accent-soft);
      border: 2px solid var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      z-index: 100;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-head {
        padding: 1.5em;
      }

      .section-block {
        padding: 1.5em;
      }

      .hero-title {
        font-size: 1.8em;
      }

      .feat-grid, .verdict {
        grid-template-columns: 1fr;
      }

      .close-btn.mobile {
        display: block;
      }

      .close-btn.desktop {
        display: none;
      }
    }
  </style>
</head>
<body data-theme="light">
  <div class="shell">
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="logo">KV CACHE</div>
      </div>
      <nav class="sidebar-nav"></nav>
    </div>

    <div class="main">
      <div class="main-head">
        <div class="hero-badge">LLM Inference</div>
        <h1 class="hero-title">
          <em>KV Cache</em> in LLM Inference
        </h1>
        <hr class="masthead-rule">
        <p class="masthead-subtitle">
          A comprehensive exploration of how key-value caching optimizes autoregressive token generation, from fundamental memory tradeoffs to production-scale systems.
        </p>
        <div class="tab-bar">
          <button class="tab-btn active">Overview</button>
          <button class="tab-btn">Details</button>

      <p>In transformer self-attention, the model computes three matrices from input: Queries (Q), Keys (K), and Values (V). The attention output for position <em>t</em> depends on scores computed from Q<sub>t</sub> against all K and V from positions 1 to <em>t</em>.</p>

      </div>
      <h3>Attention Sink Phenomenon</h3>
      <p>Empirical finding: The first token(s) in a sequence (typically BOS or padding tokens) receive high attention scores in <em>all</em> layers and positions. These "sinks" are critical to model function but represent a tiny fraction of the sequence. Techniques that identify and preserve sinks while evicting others achieve dramatic cache reduction.</p>
      <h3>Sliding Window Attention</h3>
      <p>Mistral's approach: attention computed only over recent N tokens (e.g., 4096), ignoring older history. Reduces cache to constant size regardless of total sequence length.</p>
      <div class="s-stat">

      <h3>Speculative Decoding with Cache</h3>
      <p>Speculative decoding uses a draft model to generate candidates, then verifies with the main model. Both require caches. The draft model (smaller) needs less cache, but total cache is 1.5-2× baseline. Requires careful memory budgeting and synchronization of cache states.</p>`,

      `<h3>Traditional KV Cache Allocation Problem</h3>
      <p>Typical allocation: Preallocate contiguous cache buffer for each request's entire maximum length. If request terminates early or generation is shorter than max, that space is wasted and inaccessible to other requests.</p>
      <div class="feat-grid">
        <div class="feat">
          <h4>Request A (max 8K)</h4>
          <p>Actually generates 2K tokens. 6K slots wasted.</p>
        </div>
        <div class="feat">
          <h4>Request B (max 8K)</h4>
          <p>Cannot reuse A's wasted space due to contiguous requirement.</p>
        </div>
        <div class="feat">
          <h4>Request C (max 4K)</h4>
          <p>Allocated but competes with A&B for remaining contiguous space.</p>
        </div>
        <div class="feat">
          <h4>GPU Memory</h4>
          <p>60-80% of total cache allocated is unused but blocked from other requests.</p>
        </div>
      </div>
      <h3>PagedAttention Solution</h3>
      <p>Inspired by OS virtual memory: KV cache divided into fixed-size physical blocks (e.g., 16K tokens per block). Each request has a logical block table that maps to physical blocks. As requests extend their cache, new physical blocks are allocated non-contiguously.</p>
      <div class="callout">
        <h4>Key Mechanism</h4>
        <p><em>Logical blocks decoupled from physical blocks enable fragmentation-free allocation. Multiple requests can share physical blocks; compute kernels perform block-table lookup during attention.</em></p>
      </div>
      <h3>Block Table Architecture</h3>
      <div class="diagram-wrap">
        <svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">

            <rect x="50" y="50" width="200" height="60" rx="4"/>
            <text class="node-text" x="150" y="75">Logical Blocks</text>
            <text class="node-sub" x="150" y="100">[0, 1, 2, 3]</text>
          </g>
          <line x1="250" y1="80" x2="300" y2="80" marker-end="url(#arrowhead)"/>

          <g class="node node-hi">
            <rect x="300" y="50" width="200" height="60" rx="4"/>
            <text class="node-text" x="400" y="75">Block Table</text>
            <text class="node-sub" x="400" y="100">[Phys0, Phys5, Phys7, Phys2]</text>
          </g>
          <line x1="500" y1="80" x2="550" y2="80" marker-end="url(#arrowhead)"/>

          <g class="node">
            <rect x="550" y="50" width="200" height="60" rx="4"/>
            <text class="node-text" x="650" y="75">GPU Memory</text>
            <text class="node-sub" x="650" y="100">Fragmented blocks</text>
          </g>

          <text x="50" y="160" class="node-text" font-weight="bold" font-size="14px">Request 2</text>
          <g class="node">
            <rect x="50" y="180" width="200" height="60" rx="4"/>
            <text class="node-text" x="150" y="205">Logical Blocks</text>
            <text class="node-sub" x="150" y="230">[0, 1]</text>
          </g>
          <line x1="250" y1="210" x2="300" y2="210" marker-end="url(#arrowhead)"/>

          <g class="node node-hi">
            <rect x="300" y="180" width="200" height="60" rx="4"/>
            <text class="node-text" x="400" y="205">Block Table</text>
            <text class="node-sub" x="400" y="230">[Phys3, Phys8]</text>
          </g>

          <text x="50" y="300" class="node-text" font-size="12px">Each request indexes cached K,V via its block table, not contiguous memory.</text>
          <text x="50" y="325" class="node-text" font-size="12px">Enables arbitrary fragmentation without performance loss.</text>
        </svg>
      </div>
      <h3>Copy-On-Write & Prefix Caching</h3>
      <p>If multiple requests share the same prompt (e.g., system prompt for many users), PagedAttention can share the prefix's cached blocks. When a request diverges (e.g., different user input after system prompt), it copies only the diverging portion. This saves significant memory when many requests share context.</p>
      <div class="s-stat">
        <div class="st">
          <div class="sv">2-4×</div>
          <div class="sl">Throughput improvement</div>
        </div>
        <div class="st">
          <div class="sv">60% → 5%</div>
          <div class="sl">Memory fragmentation</div>
        </div>
        <div class="st">
          <div class="sv">~10-20%</div>
          <div class="sl">Compute overhead (block table)</div>
        </div>
      </div>
      <h3>vLLM Implementation</h3>
      <p>vLLM uses PagedAttention in its core execution model. Each request tracks a block table. During prefill, new blocks are allocated. During decode, the block table is indexed to gather K,V for attention. When a request completes, its blocks are returned to the free pool and can be reused immediately.</p>
      <p>Integration with continuous batching: requests enter/leave the batch independently. New requests can immediately utilize freed blocks from completed requests. No synchronization between prefill/decode or between requests—maximum GPU utilization.</p>
      <h3>Performance Impact</h3>
      <p>Real vLLM deployments see:</p>
      <ul class="s-list pro">
        <li>2-4× improvement in requests/second</li>
        <li>Batch sizes 4-8× larger at same latency SLO</li>
        <li>Memory efficiency: ~80-85% cache utilization vs ~20% with traditional allocation</li>
        <li>Prefix caching: additional 1.5-2× improvement when many requests share prompts</li>
      </ul>`,

      `<h3>Cross-Request KV Cache Sharing</h3>
      <p>LMCache project: external distributed KV store for cross-request cache sharing. Multiple model replicas can query a shared cache backend for previously computed K,V tensors. Enables:</p>
      <ul class="s-list">
        <li>Cache reuse across different users' requests with same prompt</li>
        <li>Amortization of expensive prefill across many requests</li>
        <li>Significant throughput gains for repetitive workloads (e.g., chatbots with fixed system prompts)</li>
      </ul>
      <div class="callout">
        <h4>Emerging Pattern</h4>
        <p><em>Cache-as-a-service: Treat KV cache as a first-class distributed resource, not just per-request GPU memory.</em></p>
      </div>
      <h3>Disaggregated Inference</h3>
      <p>Future architecture: separate clusters for prefill and decode phases:</p>
      <ul class="s-list">
        <li><strong>Prefill cluster:</strong> Optimized for throughput. Heavy parallelism. Large batch sizes.</li>
        <li><strong>Decode cluster:</strong> Optimized for latency. Smaller batches. Specialized hardware (e.g., TPU pods).</li>
        <li><strong>KV Store:</strong> Centralized cache between clusters. Enables asynchronous prefill without waiting for decode capacity.</li>
      </ul>
      <p>Benefit: Independent scaling of prefill and decode workloads. If decode becomes bottleneck, add more decode nodes without reprovisioning prefill. Enables resource efficiency and elasticity.</p>
      <h3>Speculative Decoding & KV Cache</h3>
      <p>Speculative decoding generates multiple candidate tokens in parallel, then verifies with the main model. KV cache interaction:</p>
      <ul class="s-list">
        <li>Draft model maintains its own KV cache (smaller, faster)</li>
        <li>Main model maintains separate KV cache for verification</li>
        <li>If draft prediction correct: main model's cache extended</li>
        <li>If draft prediction wrong: rollback and retry with fewer candidates</li>
      </ul>
      <p>Total cache footprint: 1.5-2× baseline due to dual caches. But token generation speed can improve 2-3× if draft model has high correctness.</p>
      <h3>Multi-Tier Storage (Future)</h3>
      <p>Research direction: KV cache tiering across heterogeneous storage:</p>
      <div class="timeline">

    // Initialize
    function buildDOM() {
      // Sidebar
      const sidebarNav = document.querySelector(".sidebar-nav");
      sections.forEach((sec, i) => {
        const item = document.createElement("div");
        item.className = "sidebar-item" + (i === 0 ? " active" : "");
        item.innerHTML = `
          <span class="sidebar-num">${sec.num}</span>
          <span class="sidebar-label">${sec.title}</span>
        `;
        item.addEventListener("click", () => scrollToSection(i));
        sidebarNav.appendChild(item);
      });

      // Sidebar hover tooltip — floating div
      const sidebarTip = document.createElement('div');
      sidebarTip.className = 'sidebar-tooltip';
      document.body.appendChild(sidebarTip);
      const sidebarEl = document.querySelector('.sidebar');
      let tipActive = false;
      sidebarNav.addEventListener('mouseleave', () => {
        tipActive = false;
        sidebarTip.classList.remove('visible');
      });
      sidebarNav.addEventListener('mousemove', (e) => {
        if (!document.body.classList.contains('detail-open')) {
          if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
          return;
        }
        const item = e.target.closest('.sidebar-item');
        if (!item) {
          if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
          return;
        }
        const rect = item.getBoundingClientRect();
        const sRight = sidebarEl.getBoundingClientRect().right;
        sidebarTip.textContent = item.querySelector('.sidebar-label')?.textContent || '';
        sidebarTip.style.left = (sRight - 1) + 'px';
        sidebarTip.style.top = rect.top + 'px';
        sidebarTip.style.height = rect.height + 'px';
        if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
      });


      // Main content
      const mainScroll = document.querySelector(".main-scroll");
      sections.forEach((sec, i) => {
        const block = document.createElement("div");
        block.className = "section-block";
        block.dataset.index = i;
        block.innerHTML = `
          <span class="s-num">${sec.num}</span>
          <h2>${sec.title}</h2>
          ${summaries[i]}
          <button class="s-open" onclick="openDetail(${i})">Read deep dive</button>
        `;
        mainScroll.appendChild(block);
      });

      // Right panel
      const rightInner = document.querySelector(".right-inner");
      sections.forEach((sec, i) => {
        const detail = document.createElement("div");
        detail.className = "detail";
        detail.innerHTML = `
          <div class="detail-header">
            <span class="num">${sec.num}</span>
            <h2>${sec.title}</h2>
          </div>
          <span class="detail-label">Deep Dive</span>
          ${details[i]}
        `;
        rightInner.appendChild(detail);
      });
    }

    function openDetail(index) {
      const shell = document.querySelector(".shell");
      document.body.classList.add("detail-open");

      document.querySelectorAll(".sidebar-item").forEach((item, i) => {
        item.classList.toggle("active", i === index);
      });

      const details = document.querySelectorAll(".detail");
      setTimeout(() => {
        details[index]?.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 50);
    }

    function closeRight() {
      const shell = document.querySelector(".shell");
      document.body.classList.remove("detail-open");

      document.querySelectorAll(".sidebar-item").forEach(item => {
        item.classList.remove("active");
      });
    }

    function scrollToSection(index) {
      const blocks = document.querySelectorAll(".section-block");
      blocks[index]?.scrollIntoView({ behavior: "smooth", block: "start" });
      openDetail(index);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute("data-theme");
      const newTheme = currentTheme === "light" ? "dark" : "light";
      html.setAttribute("data-theme", newTheme);

      const icon = document.getElementById("theme-icon");
      icon.textContent = newTheme === "light" ? "🌙" : "☀️";

      localStorage.setItem("theme", newTheme);
    }

    // Load theme preference
    function loadTheme() {
      const saved = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", saved);
      const icon = document.getElementById("theme-icon");
      icon.textContent = saved === "light" ? "🌙" : "☀️";
    }

    // Initialize
    loadTheme();
    buildDOM();
  </script>
