<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XCS229 Problem Set 1 — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:16px 0;border:1px solid var(--border)}
.price-card{border-right:1px solid var(--border);padding:18px 12px;text-align:center;background:none;border-radius:0}
.price-card:last-child{border-right:none}.price-card.hl{background:var(--accent-soft)}
.price-card h4{font-size:var(--price-h4-size);font-weight:var(--body-weight);color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--price-h4-ls);font-family:var(--sans)}
.price-card .price{font-family:var(--serif);font-size:var(--price-val-size);color:var(--bright);font-weight:var(--heading-weight);font-style:italic;letter-spacing:var(--price-val-ls)}

<body data-theme="light">
<script>
// Data
const sections = [
  {num:'1',short:'PS1 Overview',title:'<em>Problem</em> Set 1 Overview'},
  {num:'2',short:'GLM Convexity Setup',title:'<em>GLM</em> Convexity Setup'},
  {num:'3',short:'Proving Convexity',title:'<em>Proving</em> Convexity'},
  {num:'4',short:'Feature Maps Problem',title:'<em>Feature</em> Maps Problem'},
  {num:'5',short:'Feature Map Analysis',title:'<em>Feature</em> Map Analysis'},
  {num:'6',short:'Stability of Learning',title:'<em>Stability</em> of Learning'},
  {num:'7',short:'Stability Analysis',title:'<em>Stability</em> Analysis'},
  {num:'8',short:'Key Takeaways',title:'Key <em>Takeaways</em>'},
  {num:'9',short:'References',title:'References & <em>Further</em> Reading'}
];

const summaries = [
  `<p>This problem set covers three fundamental concepts in machine learning: generalized linear models, feature representations, and algorithmic stability. Across 25 points and 3 problems, you'll explore the mathematical foundations that connect probabilistic modeling, kernel methods, and generalization theory. Each problem builds on core week 1-2 concepts from XCS229, creating a cohesive understanding of supervised learning.</p><p>The problems span theoretical proofs, computational implementations, and conceptual connections. Work through each section carefully, as the insights from earlier problems illuminate the later ones. Focus on building intuition alongside rigorous mathematics.</p>`,

  `<p>Generalized linear models (GLMs) form the foundation for supervised learning. The key insight is that the negative log-likelihood (NLL) of GLMs exhibits a convex structure, enabling efficient optimization. This section establishes the mathematical setup: understanding the exponential family, the link function, and how the Hessian matrix determines convexity properties.</p><p>The problem asks you to prove that for any GLM, the negative log-likelihood is a convex function of the parameters. This requires understanding the relationship between the second derivative (Hessian) and positive semi-definiteness, ultimately connecting to the information matrix of the exponential family.</p>`,

  `<p>Proving convexity involves demonstrating that the Hessian of the NLL is positive semi-definite. For exponential family distributions, this follows from the structure of the sufficient statistics and the log-partition function. The proof strategy combines calculus, linear algebra, and properties specific to exponential families.</p><p>Key techniques include: taking derivatives of the NLL with respect to parameters, recognizing the Hessian as a variance-covariance-like matrix, and showing that it can be written as X^T D X where D is diagonal with positive entries. This establishes not just convexity but also strict convexity for most GLMs.</p>`,

  `<p>Feature maps transform raw inputs into a higher-dimensional representation where linear models become more expressive. This problem explores explicit feature maps and their computational implications. You'll work with polynomial kernels, computing feature representations that correspond to polynomial features in the original space.</p><p>The central question: how do we efficiently represent polynomial features, and what computational cost does this entail? By understanding explicit feature maps, you gain insight into why the kernel trick exists—as a computational shortcut for high-dimensional feature representations.</p>`,

  `<p>Analyzing feature maps requires comparing dimensionality, computational cost, and representational power. For polynomial degree d features in d-dimensional input space, the feature map dimension grows polynomially. This analysis motivates kernel methods: computing inner products in feature space without explicitly constructing features.</p><p>The kernel trick exploits the fact that certain inner products in feature space can be computed efficiently in input space. Understanding this connection bridges explicit representations and implicit kernel methods, showing how mathematical structure enables computational efficiency in machine learning.</p>`,

  `<p>Stability of learning algorithms quantifies how much the learned hypothesis changes when one training example is perturbed or removed. This concept connects directly to generalization bounds: stable algorithms generalize well from finite samples. Algorithmic stability provides a framework for understanding why regularization works and how sample complexity relates to model complexity.</p><p>Uniform stability—the strongest notion—requires that removing any single example changes the learned function by at most a small amount. This property ensures that the algorithm's performance on unseen data closely matches its training performance, establishing generalization guarantees independent of model class assumptions.</p>`,

  `<p>Analyzing stability involves computing how the leave-one-out error relates to the training error, and connecting this to regularization strength. For learning algorithms like regularized linear regression, stability can be explicitly quantified in terms of the regularization parameter. The leave-one-out cross-validation error provides an empirical measure of stability.</p><p>The deep connection emerges: stable algorithms have low generalization gaps. This explains why regularization (ridge regression, LASSO) works—it enforces stability by preventing the algorithm from fitting too closely to any particular training example. The relationship between stability and regularization parameter strength is fundamental to understanding overfitting and generalization.</p>`,

  `<p>This problem set synthesizes three core machine learning concepts. Convexity enables efficient optimization of GLMs. Feature maps and kernels provide flexible representations while managing computational complexity. Stability theory explains generalization and justifies regularization. Together, they form the mathematical and conceptual foundation for supervised learning.</p><p>As you complete this problem set, recognize how these concepts interlock: convex optimization finds efficient solutions, feature representations enable expressivity, and stability theory guarantees that these solutions generalize. These three pillars—optimization, representation, and generalization—define modern machine learning practice.</p>`,

  `<p>To deepen your understanding of the concepts covered in Problem Set 1, refer to these key resources. The Stanford CS229 course materials provide comprehensive lectures on GLMs, kernels, and generalization. Lecture notes on exponential families and convexity are essential for Problem 1. For feature maps and kernel methods, review the supervised learning lectures. Stability theory is covered in advanced generalization lectures.</p><p>The Elements of Statistical Learning (ESL) is an authoritative reference for practical machine learning theory. Murphy's Machine Learning textbook provides excellent intuitions alongside mathematics. For rigorous proofs and advanced topics, consult survey papers on convex optimization and algorithmic stability.</p>`
];

const details = [
  `<div class="detail-header"><span class="num">Section 1</span><h2><em>PS1</em> Overview</h2></div><h3>Problem Set Structure</h3><p>Problem Set 1 contains three problems worth 25 total points, distributed across weeks 1-2 material from XCS229. Each problem targets a distinct learning area but builds toward a unified understanding of supervised learning foundations.</p><p><strong>Problem 1 (GLM Convexity):</strong> Theoretical—prove that the negative log-likelihood of any GLM is convex. This problem emphasizes mathematical rigor and understanding exponential family distributions. Expect to work with Hessians, positive semi-definite matrices, and properties of the log-partition function.</p><p><strong>Problem 2 (Feature Maps):</strong> Mixed—implement explicit feature maps for polynomial kernels, compare computational costs, and explain the kernel trick. This problem bridges theory and implementation, requiring both mathematical insight and coding ability.</p><p><strong>Problem 3 (Stability):</strong> Theoretical/computational—prove uniform stability bounds for regularized learning, compute leave-one-out errors, and connect stability to generalization. This problem requires understanding algorithmic stability and its implications for generalization.</p><h3>Key Themes</h3><p>All three problems emphasize <em>why</em> we use particular techniques in machine learning. Convexity explains why we can optimize GLMs efficiently. Feature maps show how to build expressive models while managing dimensionality. Stability theory justifies regularization and predicts generalization.</p><div class="callout"><h4>Time Management</h4><p>Allocate your time strategically. Problem 1 is the most theoretical—allow sufficient time for careful proofs. Problem 2 combines theory and coding—test your implementations thoroughly. Problem 3 requires connecting abstract concepts to concrete algorithms.</p></div>`,

  `<div class="detail-header"><span class="num">Section 2</span><h2><em>GLM</em> Convexity Setup</h2></div><h3>Exponential Family Distributions</h3><p>GLMs are built on exponential family distributions, which have the canonical form: p(y|x,θ) = b(y) exp(θ^T T(y) - A(θ)) where T(y) is the sufficient statistic, A(θ) is the log-partition function, and b(y) is the base measure.</p><p>For supervised learning, we parameterize θ as a linear function of the input: θ = θ(w,x) = w^T φ(x) for some feature map φ. The log-likelihood for a single example becomes log p(y|x,w) = log b(y) + w^T φ(x) T(y) - A(w^T φ(x)).</p><h3>Negative Log-Likelihood</h3><p>The NLL for a single example is: ℓ(w) = -log p(y|x,w) = -log b(y) - w^T φ(x) T(y) + A(w^T φ(x)). For a dataset of n examples, the total NLL is the sum: L(w) = Σ ℓ_i(w).</p><p>The structure of the NLL is key: it's the log-partition function A(w^T φ(x)) minus a linear term. The log-partition function is always convex for exponential families, and the linear term doesn't affect convexity. Therefore, the NLL is convex.</p><h3>Hessian Analysis</h3><p>To prove convexity rigorously, compute the Hessian ∇²ℓ(w). For a single example: ∇²ℓ(w) = ∇² A(w^T φ(x)) = A''(w^T φ(x)) φ(x) φ(x)^T. Here, A''(w^T φ(x)) is the second derivative of the log-partition function with respect to its argument.</p><p>The key fact: A''(η) = Var[T(y)|η] ≥ 0 for any exponential family. This variance term is always non-negative, making ∇²ℓ(w) = A''(w^T φ(x)) φ(x) φ(x)^T a positive semi-definite matrix (outer product scaled by a non-negative scalar).</p><div class="callout"><h4>Proof Strategy</h4><p>Your proof should: (1) Write the NLL for a GLM, (2) Compute the Hessian, (3) Recognize it as a variance-weighted outer product, (4) Conclude positive semi-definiteness and thus convexity. Connect each step to exponential family properties.</p></div>`,

  `<div class="detail-header"><span class="num">Section 3</span><h2><em>Proving</em> Convexity</h2></div><h3>Convexity Definition</h3><p>A function f is convex if for all x, y and λ ∈ [0,1]: f(λx + (1-λ)y) ≤ λf(x) + (1-λ)f(y). Equivalently, for twice-differentiable f: the Hessian ∇²f(x) is positive semi-definite for all x.</p><p>For the NLL of a GLM, we use the Hessian criterion. Compute ∇²L(w) where L(w) = Σ ℓ_i(w) is the total NLL. The Hessian is a sum of individual Hessians: ∇²L(w) = Σ ∇²ℓ_i(w).</p><h3>Step-by-Step Proof Outline</h3><p><strong>Step 1:</strong> Write the single-example NLL: ℓ_i(w) = -w^T φ(x_i) T(y_i) + A(w^T φ(x_i)). The first term is linear in w (Hessian is 0). The second term's Hessian is what matters.</p><p><strong>Step 2:</strong> Differentiate once: ∇ℓ_i(w) = -φ(x_i) T(y_i) + A'(w^T φ(x_i)) φ(x_i). Here, A'(η) = E[T(y)|η] is the expected sufficient statistic.</p><p><strong>Step 3:</strong> Differentiate again: ∇²ℓ_i(w) = A''(w^T φ(x_i)) φ(x_i) φ(x_i)^T. Recognize φ(x_i) φ(x_i)^T as an outer product (positive semi-definite for any vector).</p><p><strong>Step 4:</strong> Note that A''(η) = Var[T(y)|η] ≥ 0. This is a fundamental property of log-partition functions: they're convex, so their second derivative is non-negative.</p><p><strong>Step 5:</strong> Conclude: ∇²ℓ_i(w) = A''(w^T φ(x_i)) φ(x_i) φ(x_i)^T is a non-negative scalar times a positive semi-definite matrix, hence positive semi-definite.</p><p><strong>Step 6:</strong> The total Hessian ∇²L(w) = Σ ∇²ℓ_i(w) is a sum of positive semi-definite matrices, hence positive semi-definite. Therefore L(w) is convex.</p><h3>Key Insights</h3><p>The proof hinges on the exponential family property that A''(η) = Var[T(y)|η]. This variance is always non-negative, which is why all GLMs have convex loss functions. This guarantees that any local minimum is a global minimum, enabling efficient optimization via gradient descent.</p><div class="callout"><h4>Common Mistakes</h4><p>Don't confuse the Hessian of A(η) with the Hessian of the NLL. The NLL involves A(w^T φ(x)), so you need to apply chain rule: the Hessian of the composition is A''(w^T φ(x)) φ(x) φ(x)^T, not just A''(w^T φ(x)). Pay careful attention to matrix calculus.</p></div>`,

  `<div class="detail-header"><span class="num">Section 4</span><h2><em>Feature</em> Maps Problem</h2></div><h3>Explicit vs. Implicit Representations</h3><p>A feature map φ: ℝ^d → ℝ^m maps input vectors to higher-dimensional feature vectors. For example, the polynomial degree-2 feature map on ℝ^2 is φ(x) = [x_1, x_2, x_1², x_1 x_2, x_2²]^T, producing a 5-dimensional output.</p><p>The explicit feature map approach: compute φ(x) directly, then apply a linear model w^T φ(x). The kernel method: implicitly work in feature space by computing inner products ⟨φ(x), φ(x')⟩ without explicitly constructing φ(x).</p><h3>Polynomial Kernels</h3><p>The polynomial kernel of degree d is: K(x, x') = (⟨x, x'⟩ + 1)^d. This kernel implicitly corresponds to a feature map that includes all monomials of degree ≤ d. For d=2 in ℝ^2: K(x,x') = (x_1x_1' + x_2x_2' + 1)² expands to exactly the inner product of explicit features [1, x_1, x_2, x_1², √2 x_1 x_2, x_2²].</p><p>In this problem, you'll work with explicit polynomial features, computing the feature dimension and the computational cost of evaluating features and their inner products.</p><h3>Computational Analysis</h3><p>For a degree-d polynomial feature map on d-dimensional inputs, the number of features (feature dimension) is (d+d choose d) = O(d^d), which grows very quickly. For d=10 input features and degree 3, this becomes thousands of features.</p><p>The kernel trick avoids constructing these features explicitly. Instead, compute K(x_i, x_j) = (⟨x_i, x_j⟩ + 1)^d directly in input space. For each pair of examples, this takes O(d) time (computing the inner product) plus O(d) time (raising to power d), versus O(d^d) time to construct both feature vectors explicitly.</p><div class="callout"><h4>Implementation Hint</h4><p>When implementing polynomial features, use recursive definitions or combinatorial generation to construct all monomials systematically. Compute feature vectors explicitly for small examples to verify correctness, then time the operations and compare to kernel method timings.</p></div>`,

  `<div class="detail-header"><span class="num">Section 5</span><h2><em>Feature</em> Map Analysis</h2></div><h3>Dimensionality Growth</h3><p>The number of polynomial features of degree exactly d (not ≤ d) in p dimensions is the number of ways to choose d items from p with replacement: (p+d-1 choose d) ≈ p^d / d! for fixed p as d grows. For all features of degree ≤ d, sum over all degrees: ≈ O((p+d choose p)).</p><p>For concrete example: 10 input features, polynomial degree 3 gives (10+3 choose 3) = 286 features. Degree 4 gives (10+4 choose 4) = 1001 features. Degree 5 gives 2002 features. This rapid growth is why explicit feature maps become impractical for high-degree polynomials.</p><h3>Computational Cost Comparison</h3><p><strong>Explicit approach:</strong> Construct feature vector for one example: O(number of features). For n examples, building the feature matrix is O(n × number of features). Training a linear model is O(n × m²) where m is number of features.</p><p><strong>Kernel method:</strong> Computing the kernel matrix is O(n² × d) where d is input dimension. Training using kernel methods (e.g., kernel ridge regression) is O(n³) for solving the normal equations. The advantage: d is small and fixed, while the number of features can be huge.</p><h3>The Kernel Trick</h3><p>The key insight: many learning algorithms depend only on inner products between examples, not on the examples themselves. If you can compute ⟨φ(x_i), φ(x_j)⟩ efficiently (via a kernel function), you never need to construct φ explicitly.</p><p>For polynomial features, K(x,x') = (⟨x, x'⟩ + 1)^d computes the inner product in feature space in O(d) time instead of O(d^d) time. This is the computational breakthrough that makes kernel methods practical.</p><h3>When Explicit vs. Implicit?</h3><p>Use explicit features when: the feature dimension is moderate (< 1000), you want interpretable features, or you're using algorithms that don't depend only on inner products. Use kernels when: the feature dimension would be very large, you're using SVMs or kernel ridge regression, or you want to use non-polynomial kernels (RBF, etc.).</p><div class="callout"><h4>Analysis Checklist</h4><p>Your analysis should quantify: the exact feature dimension for polynomial degree d and input dimension p, the time to compute one feature vector, the time for n feature vectors, and compare to kernel method timing. Include actual numbers for a concrete example.</p></div>`,

  `<div class="detail-header"><span class="num">Section 6</span><h2><em>Stability</em> of Learning</h2></div><h3>Algorithmic Stability Concept</h3><p>An algorithm A is stable if small changes to the training set cause small changes to the learned hypothesis. Formally, uniform stability requires: for all training sets S and S' differing in one example, and all test examples z, |A(S)(z) - A(S')(z)| ≤ β for some small β.</p><p>Stable algorithms generalize well: if training error equals test error on average (which stability ensures), then low training error implies low test error. This is why regularization works—it enforces stability by preventing overfitting to particular training examples.</p><h3>Leave-One-Out Cross-Validation</h3><p>Compute the leave-one-out error: for each training example (x_i, y_i), remove it from the training set, train on the remaining n-1 examples, and measure error on the held-out example. The leave-one-out error is an empirical estimate of test error and reveals how stable the algorithm is.</p><p>For a stable algorithm, leave-one-out error ≈ training error. For an unstable algorithm (e.g., memorizing the training set), leave-one-out error >> training error. This reveals overfitting and suggests increasing regularization.</p><h3>Stability-Generalization Connection</h3><p>Theorem (informal): If an algorithm is uniformly stable with stability parameter β, then with high probability over random training sets, test error ≤ training error + O(β√(log(1/δ)/n)). This bound depends on stability β and sample size n, not directly on model complexity.</p><p>This is remarkable: instead of bounding complexity via VC dimension or Rademacher complexity, we bound generalization via algorithmic properties. This explains why regularization (which increases stability) improves generalization even for high-complexity model classes.</p><div class="callout"><h4>Why Stability Matters</h4><p>Stability connects optimization, regularization, and generalization. Convex objectives (from earlier in this problem set!) enable stable optimization. Regularization increases stability. Stability guarantees generalization. This forms the complete picture of supervised learning: optimize a convex, stable objective to achieve good generalization.</p></div>`,

  `<div class="detail-header"><span class="num">Section 7</span><h2><em>Stability</em> Analysis</h2></div><h3>Uniform Stability in Regularized Learning</h3><p>For regularized linear regression: w = (X^T X + λI)^(-1) X^T y. Uniform stability can be proved by analyzing how this solution changes when one example is removed. The key is the matrix inversion lemma and properties of regularization.</p><p><strong>Proof sketch:</strong> When example i is removed, the solution changes by Δw = (X^T X + λI)^(-1) x_i e_i where e_i is the residual. The magnitude of this change is bounded by (1/λ) × ||x_i|| × |e_i|. The bound holds uniformly across all examples, establishing stability.</p><h3>Regularization Parameter and Stability</h3><p>Larger λ (stronger regularization) leads to smaller stability parameter β. This makes intuitive sense: stronger regularization makes the solution less sensitive to individual examples. In the limit λ → ∞, the algorithm ignores the data (very stable but high bias). The optimal λ balances stability and fitting.</p><p>The leave-one-out error for ridge regression has a closed form: LOO error = Σ (y_i - ŷ_i)² / (1 - H_ii)² where H_ii is the i-th diagonal of the hat matrix X(X^T X + λI)^(-1) X^T. Examples with high H_ii (high leverage) contribute more to LOO error, revealing which examples most affect stability.</p><h3>Computing Stability Bounds</h3><p><strong>For ridge regression:</strong> The uniform stability parameter is β = O(||x||²_max / λ). This makes the dependency explicit: stability improves (β decreases) with stronger regularization and decreases with larger input norms.</p><p><strong>Generalization bound:</strong> With stability β, the generalization error is at most training error + O(β√log(1/δ)/n) with probability 1-δ. For ridge regression with λ proportional to √n, this gives a bound of O(1/√n), which matches standard generalization rates.</p><h3>Practical Implications</h3><p>Use leave-one-out error or cross-validation to estimate stability empirically. If LOO error >> training error, the algorithm is unstable—increase regularization. If LOO error ≈ training error, the algorithm is stable. This test is more direct than model complexity arguments and works for any learning algorithm.</p><div class="callout"><h4>Verification Strategy</h4><p>Compute leave-one-out error for small datasets with different λ values. Observe how LOO error decreases as λ increases, then increases again (bias-variance tradeoff). The optimal λ minimizes LOO error, revealing the stability-bias balance.</p></div>`,

  `<div class="detail-header"><span class="num">Section 8</span><h2>Key <em>Takeaways</em></h2></div><h3>The Three Pillars of Supervised Learning</h3><p><strong>Optimization:</strong> GLMs have convex loss functions, enabling efficient gradient-based optimization to global optima. This isn't specific to GLMs—convex objectives are central to machine learning because they guarantee optimal solutions can be found efficiently.</p><p><strong>Representation:</strong> Feature maps (explicit or implicit via kernels) provide flexible expressivity while managing computational complexity. The kernel trick bridges high-dimensional feature spaces with efficient input-space computation, enabling powerful non-linear learning.</p><p><strong>Generalization:</strong> Stability theory explains why regularized learning generalizes. By making the algorithm less sensitive to individual training examples, regularization ensures that training error reflects test error. This provides a unified view of why regularization works across different models.</p><h3>Connections Across Problems</h3><p><strong>From Problem 1 to Problem 2:</strong> Convex optimization of GLMs is only useful if you can represent the data effectively. Feature maps let you build expressive models while maintaining the convexity that enables efficient optimization.</p><p><strong>From Problem 2 to Problem 3:</strong> Expressive models risk overfitting. Stability theory explains how regularization controls expressivity—by enforcing stability, regularization ensures that more flexible models don't sacrifice generalization. This explains the bias-variance tradeoff from a stability perspective.</p><p><strong>Unified View:</strong> Start with a flexible model class (features). Make the loss convex (GLMs). Add regularization for stability (generalization). Optimize efficiently (gradient descent on convex objectives). This recipe, grounded in theory, is how modern machine learning works.</p><h3>Advanced Connections</h3><p><strong>Kernels and Stability:</strong> Kernel methods inherit stability from the learning algorithm. RBF kernels with regularization are stable because they're used with regularized learning algorithms. The expressivity of the kernel (controlled by bandwidth parameter) trades off with stability.</p><p><strong>Neural Networks and Stability:</strong> Deep learning doesn't always use convex objectives or explicit stability analysis, yet it generalizes. This remains an open area of research. Some hypotheses: implicit regularization from SGD provides stability, the overparameterized regime has implicit stability properties, or margin-based stability arguments apply.</p><p><strong>Beyond Supervised Learning:</strong> The three pillars extend to other settings. In unsupervised learning, optimization and representation remain key, while stability takes different forms (e.g., robustness to perturbations). Understanding these foundations prepares you for advanced machine learning research.</p><div class="callout"><h4>Synthesis Challenge</h4><p>Write a page explaining how a regularized GLM (e.g., logistic regression with L2 regularization) instantiates all three pillars: why its loss is convex (optimization), what feature map it implicitly uses (representation), and how regularization provides stability (generalization). This synthesis demonstrates mastery of Problem Set 1.</p></div>`,

  `<div class="detail-header"><span class="num">Section 9</span><h2>References & <em>Further</em> Reading</h2></div><h3>Stanford CS229 Course Materials</h3><p><a href="https://cs229.stanford.edu/" target="_blank">Stanford CS229: Machine Learning</a> — Official course page with lecture notes, problem sets, and syllabus. Essential resource for all topics covered in this problem set.</p><p><a href="https://cs229.stanford.edu/section/" target="_blank">CS229 Lecture Notes & Sections</a> — Comprehensive notes on supervised learning, covering exponential families, GLMs, kernels, and generalization theory. Weeks 1-2 notes are directly relevant to this problem set.</p><h3>Core Concepts: GLMs and Convexity</h3><p><a href="https://en.wikipedia.org/wiki/Generalized_linear_model" target="_blank">Wikipedia: Generalized Linear Models</a> — Overview of GLM framework, exponential family parameterization, and link functions.</p><p><a href="https://en.wikipedia.org/wiki/Exponential_family" target="_blank">Wikipedia: Exponential Family</a> — Mathematical foundations of exponential families, sufficient statistics, and log-partition functions essential for understanding GLM convexity.</p><h3>Feature Maps and Kernels</h3><p><a href="https://en.wikipedia.org/wiki/Kernel_method" target="_blank">Wikipedia: Kernel Methods</a> — Introduction to kernel tricks, feature maps, and kernel matrices. Explains the connection between explicit and implicit feature representations.</p><p><a href="https://en.wikipedia.org/wiki/Polynomial_kernel" target="_blank">Wikipedia: Polynomial Kernel</a> — Specific coverage of polynomial kernels and their corresponding feature maps.</p><h3>Stability and Generalization</h3><p><a href="https://en.wikipedia.org/wiki/Algorithmic_stability" target="_blank">Wikipedia: Algorithmic Stability</a> — Introduction to stability definitions and connections to generalization bounds.</p><p><a href="https://hastie.su.domains/ElemStatLearn/" target="_blank">The Elements of Statistical Learning (ESL) - Free PDF</a> — Comprehensive reference for convex optimization, regularization, kernel methods, and generalization theory. Chapters 2-4 and Chapter 12 (Unsupervised Learning) are particularly relevant.</p><h3>Advanced References</h3><p><a href="https://en.wikipedia.org/wiki/Convex_function" target="_blank">Wikipedia: Convex Functions</a> — Mathematical foundations of convexity, Hessian analysis, and positive semi-definiteness.</p><p><a href="https://en.wikipedia.org/wiki/Hessian_matrix" target="_blank">Wikipedia: Hessian Matrix</a> — Detailed treatment of Hessian matrices and their role in determining function properties.</p><div class="callout"><h4>How to Use These References</h4><p>Start with the Stanford CS229 course page and relevant lecture notes for your problem area. Use Wikipedia for quick refreshers on mathematical concepts. Consult ESL for rigorous proofs and practical context. As you work through each problem, cross-reference the relevant sections to deepen understanding and verify your approach.</p></div>`

// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">X<em>229</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Stanford XCS229 · Problem Set 1</div>
        <div class="hero-title">PS1: GLM <em>Convexity</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>25 Points · Convexity, Features & Stability</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
</body>
</html>
