<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S1: Geopolitics of Climate Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

  `<div class="detail-header"><span class="d-num">01</span><h2>The US <em>Withdrawal</em> Cascade</h2></div>
  <h3>Day-One Demolition</h3>
  <p>On January 20, 2025, hours after his inauguration, Donald Trump signed Executive Order 14162, "Putting America First in International Environmental Agreements." The order directed the US Ambassador to the UN to immediately notify the Secretary-General of withdrawal from the Paris Agreement and any similar UNFCCC commitments. Unlike his first-term withdrawal — which was delayed by the Agreement's four-year lock-in period — this time the exit takes effect within one year.</p>
  <p>But the executive order went far beyond Paris. It instructed the Secretary of State and Treasury Secretary to immediately cease or revoke all financial commitments under the UNFCCC. The US International Climate Finance Plan was rescinded. The Office of Management and Budget was ordered to issue guidance rescinding frozen funds within 10 days. This was not a symbolic gesture — it was the systematic unwinding of America's climate finance architecture.</p>

  <h3>The Compounding Effect</h3>
  <p>What makes this withdrawal qualitatively different from the 2017 version is the broader fiscal environment. In 2017, European donors ramped up commitments to fill the gap. In 2025, they're doing the opposite. Ten major European donors are cutting ODA by $18 billion in 2025 compared to 2023. The OECD projects total ODA will drop between 9% and 17% from 2024 to 2025 — on top of a 7.1% real decline already recorded in 2024.</p>
  <p>This convergent retreat is not coincidence. Domestic politics in donor countries — austerity pressures, populist skepticism of foreign aid, defense spending surges from Ukraine — create permission structures for cuts. The US withdrawal provides additional cover: if the world's largest economy isn't paying, why should we?</p>

  <div class="callout">The US withdrawal has created political cover for austerity rather than catalyzing compensatory increases. This is the opposite of 2017, when European donors ramped up in response to Trump's first exit.</div>

  <h3>What This Means for the NCQG</h3>
  <p>The $300 billion NCQG target agreed at COP29 was already contested as insufficient. Without the US at the table — and with European donors cutting rather than growing — the pathway to $300 billion by 2035 narrows sharply. The <a href="https://www.nrdc.org/bio/joe-thwaites/how-deliver-new-climate-finance-goal" target="_blank">NRDC's model</a> shows that if current MDB reform trajectories hold and bilateral contributions grow at historical rates, $300 billion is reachable — but that assumed the US remains engaged. Without it, the annual growth rate needed from other contributors rises from 6.3% to double digits.</p>
  <p>The Baku-to-Belém Roadmap to $1.3 trillion, agreed alongside the NCQG, was meant to chart the path. But its credibility depends on whether the remaining contributors can demonstrate enough momentum to maintain trust — and whether developing country contributors like China step in to count their South-South financing.</p>`,

  // 02 — China
  `<div class="detail-header"><span class="d-num">02</span><h2>China's Strategic <em>Ambiguity</em></h2></div>
  <h3>The Triple Identity</h3>
  <p>No actor better illustrates the contradictions of the current climate finance regime than China. It is the world's largest annual emitter of greenhouse gases — responsible for more warming than the entire EU combined, as <a href="https://www.carbonbrief.org" target="_blank">Carbon Brief</a> has documented. It is simultaneously the world's largest investor in renewable energy, deploying more solar, wind, and battery capacity than any other nation. And it is a substantial provider of climate-related finance to developing countries, though it rejects the label "donor" and resists any obligation to contribute to the NCQG.</p>
  <p>At COP29, China announced it had provided and mobilized RMB 177 billion (approximately $24.5 billion) in climate finance for developing countries since 2016. That's an average of roughly $3.1 billion per year — a figure that would place it among the top bilateral providers if counted. But it wasn't counted toward the previous $100 billion goal, and whether it will be counted toward the $300 billion remains China's choice. The NCQG text leaves it to developing countries to "voluntarily decide" whether their South-South financing counts.</p>

  <h3>Rare Earths as Leverage</h3>
  <p>In October 2025, Beijing expanded export controls on rare earths and related technologies. The new rules include an extraterritorial licensing requirement for any foreign product containing 0.1% or more Chinese-origin rare earth content. This extends control over magnets, oxides, alloys, production equipment, and process know-how. The metals that enable the green transition — the materials inside every wind turbine, EV motor, and battery — can also be instruments of power.</p>
  <p>The US has responded with its own protectionism. The IRA's domestic content requirements exclude Chinese-sourced critical minerals from EV tax credits starting 2025. The EU's Critical Raw Materials Act similarly targets supply chain diversification away from China. This creates a three-way trade tension at the heart of the clean energy transition: each bloc wants to lead green manufacturing while reducing dependency on the others.</p>

  <h3>Competition as Climate Accelerant?</h3>
  <p>The <a href="https://www.weforum.org/stories/2025/11/from-rivalry-to-resilience-geopolitics-in-the-green-transition/" target="_blank">WEF Global Future Councils</a> offered a striking reframe: rivalry between the superpowers has already driven an extraordinary acceleration in clean energy manufacturing. Competition has catalyzed investment in critical minerals, reshored green industry, and sharpened the focus on resilience and innovation. The question is whether this competitive acceleration can persist without cooperative guardrails.</p>
  <p>But for the Global South, the concern is different. A three-way subsidy race between the US, EU, and China primarily benefits those blocs' domestic industries. The $369 billion IRA, the EU Green Deal Industrial Plan, and China's massive state-led investment all have local content requirements or implicit preferences that may exclude developing country firms from the value chain. The Global South risks being squeezed between great powers competing over green industrial dominance while receiving insufficient finance for its own transition.</p>

  <div class="callout">The green transition's materials are concentrated in a handful of countries — many of them in the Global South. Whether critical mineral-rich nations can leverage this into genuine partnership rather than extraction depends on governance frameworks that don't yet exist.</div>`,

  // 03 — EU
  `<div class="detail-header"><span class="d-num">03</span><h2>EU: Rhetoric vs. <em>Resources</em></h2></div>
  <h3>The Credibility Gap</h3>
  <p>Commission President Ursula von der Leyen's response to the US withdrawal was immediate and forceful: the Paris Agreement remains "the best hope for all humanity," and Europe would "stay the course." EU Climate Commissioner Wopke Hoekstra and Council President António Costa made similar declarations. The European Parliament held a first debate on geopolitical implications in January 2025.</p>
  <p>But the data tells a different story. France's bilateral grants dropped in 2024, offset only by an increase in bilateral loans — a distinction that matters enormously when 58% of adaptation finance already arrives as debt. Germany's $9.2 billion ODA cut is the largest single-country reduction. The UK continues to retreat from its 0.7% GNI target. And the EU's own 2024 ODA figures show that while institutional spending (largely via EU Institutions at $19.6 billion) remains substantial, bilateral flows from member states are under severe pressure.</p>

  <h3>The Green Industrial Competition</h3>
  <p>The EU Green Deal Industrial Plan was explicitly framed as a response to the US Inflation Reduction Act. Where the IRA offers $369 billion in subsidies with local content requirements, the EU relaxed state aid rules and set a political target of 40% local production for net-zero technologies by 2030. China views both as protectionist.</p>
  <p>This three-way green industrial competition has important implications for climate finance. When domestic green subsidies absorb political capital and fiscal space, international climate finance competes for the remainder. The EU's pivot toward "strategic autonomy" in clean energy supply chains means resources flow inward — toward European manufacturing resilience — rather than outward toward developing country transitions.</p>

  <h3>Article 6 Outsourcing Risk</h3>
  <p>Perhaps most concerning for climate finance integrity is the EU's consideration of Article 6 carbon credits to meet its 2040 climate target. <a href="https://carbonmarketwatch.org/2025/08/07/are-article-6-carbon-market-rules-fit-for-purpose/" target="_blank">Carbon Market Watch</a> has called this outsourcing domestic emissions reduction rather than taking responsibility. If the world's wealthiest bloc can purchase credits instead of cutting its own emissions, the signal to other parties is corrosive.</p>

  <div class="callout">The EU's climate leadership is real in terms of regulatory ambition and institutional commitment. But its credibility increasingly depends on whether it can sustain financial contributions while simultaneously managing austerity, defense spending, and industrial competition. So far, the financial trajectory is downward.</div>`,

  // 04 — Global South
  `<div class="detail-header"><span class="d-num">04</span><h2>Global South <em>Coalitions</em></h2></div>
  <h3>From Recipients to Shapers</h3>
  <p>The most significant structural shift in climate finance geopolitics is the Global South's growing capacity to shape outcomes. This isn't new — the Alliance of Small Island States (AOSIS) has been a moral force since the UNFCCC's inception. But the coordination, strategic sophistication, and material leverage of developing country blocs has qualitatively changed.</p>
  <p>At COP29, the unified rejection of the initial NCQG proposals — India's "paltry sum," SIDS' "we are literally sinking," Bolivia and Nigeria's "insultingly low" — nearly derailed the conference. The walkout by least developed countries and AOSIS representatives forced developed nations back to the table. This negotiating power comes from the consensus requirement: every nation must agree to every word.</p>

  <h3>The Bridgetown Initiative</h3>
  <p>Barbados Prime Minister Mia Mottley's Bridgetown Initiative has been the most influential developing country policy platform since the Paris Agreement. It calls for reform of the international financial architecture — MDB capital adequacy, SDR rechanneling, debt restructuring mechanisms, and climate-resilient debt clauses — rather than simply asking for more aid. The initiative has placed MDB reform on the G20 agenda and influenced the World Bank's Evolution Roadmap.</p>
  <p>Debt-for-climate swaps, a key Bridgetown proposal, have gained real traction. Since 2021, Belize, Barbados, Ecuador, Gabon, Bahamas, and El Salvador have all executed swaps. Ecuador's $1.6 billion Galápagos swap was the world's largest. These deals don't replace the need for grant financing — they're small relative to the debt burden — but they demonstrate that developing countries can innovate financial instruments, not just receive them.</p>

  <h3>South-South Cooperation</h3>
  <p>Nations exporting renewable energy know-how, forest management expertise, and early-stage climate finance are shifting the narrative from dependency to capability. Regional experimentation is accelerating: a Southeast Asian climate data grid, an East African soil-restoration corridor, a Latin American carbon credit alliance. These platforms can pilot governance and finance models that later expand outward.</p>
  <p>The <a href="https://odi.org/en/insights/the-year-ahead-in-global-risks-foresight-for-a-world-in-transition-2026/" target="_blank">ODI</a> notes that in a brittle global system, regional platforms become testbeds for scalable innovation. This is both a response to the failure of centralized frameworks and an assertion of agency. The Global South is not waiting for the North to deliver on promises.</p>

  // 05 — Crowding Out
  `<div class="detail-header"><span class="d-num">05</span><h2>Great-Power Competition <em>Crowding</em> Out Climate</h2></div>
  <h3>The Attention Economy of Geopolitics</h3>
  <p><a href="https://www.e3g.org/news/trends-in-climate-and-geopolitics-for-2025/" target="_blank">E3G</a> identifies a persistent pattern: short-term geopolitical crises sideline long-term climate action. In 2024 and 2025, the global agenda was dominated by Russia's war in Ukraine, escalating Middle East conflicts, US-China trade tensions, and a worldwide surge in defense spending. The data confirms it: 2024 was the hottest year on record, with floods alone causing over $120 billion in damages, yet climate action was consistently deprioritized.</p>
  <p>This crowding-out effect is structural, not temporary. <a href="https://www.wellington.com/en/insights/geopolitics-in-2026-risks-and-opportunities-were-watching" target="_blank">Wellington Management</a> notes that geopolitical cycles last 80-100 years, and the current structural shift toward national security prioritization is likely to persist for years. Multiple countries raised defense budgets above 2% of GDP; Germany proposed raising NATO's collective target to 5%. Every dollar spent on defense is a dollar not available for climate adaptation.</p>

  <h3>Fiscal Space Compression</h3>
  <p>The <a href="https://perryworldhouse.upenn.edu/app/uploads/2025/12/Executive-Summary_Global-Climate-Trends-Report.pdf" target="_blank">Penn/PICO Global Climate Trends Report</a> captures the cascading fiscal dynamics. Public debt exceeds 100% of GDP in more than 80 countries. Interest rates have remained above 3% for six consecutive quarters. Governments face explicit trade-offs between servicing debt and investing in resilience and energy transition. Aging populations in developed countries further strain public finance and reshape labor markets.</p>
  <p>For climate finance, this means the $300 billion NCQG target is competing not just with defense and debt service, but with healthcare, pensions, education, and infrastructure. The "fiscal space" for international climate transfers is being compressed from every direction simultaneously. And the countries making the deepest cuts — Germany, France, UK — are among the largest bilateral providers of climate finance.</p>

  <h3>Climate as Threat Multiplier</h3>
  <p>Paradoxically, while geopolitical crises crowd out climate action, climate change intensifies every other crisis. E3G documents how climate acts as a threat multiplier: migration, conflict, nutrition, health crises all worsen with extreme weather. The global cost of extreme weather surged in 2024 — US climate losses alone exceeded $100 billion. These accumulating financial system risks may become more acute in 2025-2026 if combined with economic shocks.</p>
  <p>The Penn/PICO report adds that soil and forest carbon sinks are weakening; tropical forests and boreal regions are shifting from sinks to sources. Crop yields for staples have declined globally, estimated 4-13% lower than without climate change. The feedback loops between climate damage and fiscal capacity are tightening — the countries that most need adaptation investment are losing productive capacity to the climate impacts they can't afford to adapt to.</p>

  <div class="callout">Climate finance doesn't operate in isolation — it competes with every other claim on shrinking fiscal space. The structural shift toward national security spending may persist for a decade or more, compressing the window for scaled-up international climate transfers.</div>`,

  // 06 — Diplomacy Evolution
  `<div class="detail-header"><span class="d-num">06</span><h2><em>Evolving</em> Climate Diplomacy</h2></div>
  <h3>From Targets to Delivery</h3>
  <p>2025 marks the 10th anniversary of the Paris Agreement — and as <a href="https://www.e3g.org/news/trends-in-climate-and-geopolitics-for-2025/" target="_blank">E3G notes</a>, the focus of climate diplomacy is already shifting from setting targets to implementing and delivering results. Countries submitted new NDCs in 2025, demonstrating increased ambition on paper. But the gap between ambition and delivery remains enormous.</p>
  <p>COP29 demonstrated that climate diplomacy must be more sophisticated. The Baku outcome required engagement across political and technical levels and across departments — not only climate ministries but also finance, foreign affairs, and trade. The lesson from Baku is that trust between parties is dangerously low, and rebuilding it requires earlier bridge-building and more inclusive negotiation processes.</p>

  <h3>The COP Progression</h3>
  <p>The three most recent COPs have each delivered major structural outcomes: COP27 established the Loss & Damage Fund, COP28 agreed on fossil fuel transition language and operationalized the FRLD, and COP29 delivered the NCQG and Article 6 carbon market rules. COP30 in Belém focused on the Baku-to-Belém Roadmap to $1.3 trillion and the FRLD's first call for proposals.</p>
  <p>But there's a growing question about whether the COP model itself is adequate. Simon Stiell's acknowledgment that "no country got everything they wanted" is diplomatic understatement — the NCQG was achieved only after developing country walkouts and marathon overtime sessions. Each successive COP requires more political energy to produce outcomes that fall further short of scientific requirements.</p>

  <h3>The Biennial Transparency Framework</h3>
  <p>One genuinely significant development is the Enhanced Transparency Framework (ETF), which requires all parties to submit Biennial Transparency Reports (BTRs) starting in 2024. Thirteen parties submitted their first BTRs at COP29 — a small start, but the framework elicits more granular climate finance data than previous reporting mechanisms. Over time, this could reduce the definitional ambiguity that has plagued climate finance accounting — what "counts" and who's counting it.</p>

  <div class="callout">The Enhanced Transparency Framework may prove more important than any individual COP outcome. If all parties report granular, comparable data on climate finance flows, the definitional games that currently allow both over-reporting and under-reporting will gradually become harder to sustain.</div>`,

  // 07 — Fragmentation Paradox
  `<div class="detail-header"><span class="d-num">07</span><h2>The <em>Fragmentation</em> Paradox</h2></div>
  <h3>Cooperation Without Harmony</h3>
  <p>The <a href="https://www.weforum.org/stories/2025/11/from-rivalry-to-resilience-geopolitics-in-the-green-transition/" target="_blank">WEF</a> frames the central paradox plainly: just as cooperation is needed most, the geopolitical system seems least capable of delivering it. Wars have redrawn energy maps, carbon-intensive arms racing threatens to reverse carbon reductions, and a populist backlash against climate policy has gained momentum in the world's most powerful democracy. Yet the physical clock keeps ticking.</p>
  <p>But the conclusion from the Nature and Climate Output Lab in Dubai — implicit or stated — was that the green transition cannot wait for perfect harmony. It must advance through the messy realities of power, not around them. The measure of success will not be consensus but durability — a world able to sustain progress even when politics splinters.</p>

  <h3>Multiple Tracks, Not One</h3>
  <p>If the centralized UNFCCC process delivers less than needed — which it has, consistently, since Copenhagen — the question becomes whether decentralized and regional action can compensate. The evidence is mixed but instructive.</p>
  <p>US states like California continue to implement regulatory programs regardless of federal policy. The EU's regulatory ambition (CBAM, corporate sustainability reporting, emissions trading) creates de facto global standards that other jurisdictions adopt. China's state-led deployment of renewables has driven the cost of solar panels down 99% over two decades. Regional platforms in the Pacific, Caribbean, and Africa are piloting approaches to loss and damage, adaptation, and carbon markets that may prove more responsive than global frameworks.</p>
  <p>The risk, as <a href="https://www.sei.org/features/three-trends-that-will-shape-2026/" target="_blank">SEI</a> warns, is that private finance faces growing pressure to deliver on sustainable development just as public funding shrinks. The transition from public-led to private-led climate finance is happening not because it's optimal but because public resources are disappearing. And private finance gravitates toward mitigation in middle-income countries — exactly the segment that needs it least urgently — rather than adaptation in the most vulnerable states.</p>

  <h3>What We Don't Know</h3>
  <p>The honest edges of this analysis are where the deepest uncertainty lies. We don't know whether the US withdrawal is permanent or cyclical — the Taylor & Francis paper argues for permanence; the precedent suggests otherwise. We don't know whether China will choose to count its South-South finance, a decision that would simultaneously fill part of the NCQG gap and implicitly accept donor obligations. We don't know whether the EU can sustain its regulatory ambition when its own members are cutting the financing that makes implementation possible.</p>
  <p>Most fundamentally, we don't know whether the decentralized, multi-track model of climate action is adequate to the scale of the crisis. The science requires halving emissions by 2030 and reaching net zero by mid-century. The current geopolitical architecture is optimized for incremental progress, not transformation. That mismatch — between what physics demands and what politics delivers — is the defining tension of international climate finance.</p>

  <div class="callout">The green transition cannot wait for perfect geopolitical alignment. The next phase of global cooperation will depend less on consensus than on convergence — a world able to sustain progress even when politics splinters.</div>`
];

  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});

</script>
</body>
</html>
