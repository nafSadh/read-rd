<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Achilles', title: '<em>Achilles</em> &amp; the Tortoise' },
  { num: '02', short: 'Dichotomy', title: 'The <em>Dichotomy</em>' },
  { num: '03', short: 'Arrow', title: 'The <em>Arrow</em>' },
  { num: '04', short: 'Sorites', title: 'The <em>Sorites</em> Paradox' },
  { num: '05', short: 'Epimenides', title: '<em>Epimenides</em> the Cretan' },
  { num: '06', short: 'Resolution', title: 'The <em>Long</em> Resolution' },
  { num: '07', short: 'Legacy', title: '<em>Legacy</em> &amp; Influence' }
];

const summaries = [
  `<p>Achilles, the fastest runner in Greece, races a tortoise that has a 100-meter head start.<sup class="fn"><a href="https://plato.stanford.edu/entries/paradox-zeno/">[1]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradox-zeno/" target="_blank">Zeno's Paradoxes &mdash; Stanford Encyclopedia of Philosophy &rarr;</a></span></sup> Achilles must first reach the tortoise's starting point; by then the tortoise has moved 10 meters. He must reach that point; the tortoise has moved 1 meter. The sequence never terminates. How can Achilles ever catch the tortoise if he must complete an infinite number of tasks?</p>
  <div class="s-stat">
    <div class="st"><div class="sv">&infin;</div><div class="sl">Steps required</div></div>
    <div class="st"><div class="sv">Finite</div><div class="sl">Total distance</div></div>
    <div class="st"><div class="sv">~450 BCE</div><div class="sl">Date proposed</div></div>
  </div>`,

  `<p>Before a runner can reach the finish line, they must first reach the halfway point. Before reaching halfway, they must reach the quarter point. Before that, the eighth point. The runner must complete infinitely many steps before taking the first step&mdash;so the race can never begin. This is the regressive form. In the progressive form, the runner reaches half, then three-quarters, then seven-eighths&mdash;but never arrives.</p>
  <div class="s-chips">
    <span class="s-chip">1/2</span><span class="s-chip">1/4</span><span class="s-chip">1/8</span><span class="s-chip">1/16</span><span class="s-chip">1/32</span><span class="s-chip">...</span><span class="s-chip">&rarr; 0</span>
  </div>`,

  `<p>Consider an arrow in flight. At any single instant, the arrow occupies a space exactly equal to its length. At that instant it is not moving (it occupies a fixed space). If at every instant the arrow is at rest, and time is composed of instants, then the arrow is always at rest. Motion is impossible. The paradox targets the assumption that time is composed of dimensionless instants.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">0</div><div class="sl">Velocity at instant</div></div>
    <div class="st"><div class="sv">&infin;</div><div class="sl">Instants in flight</div></div>
    <div class="st"><div class="sv">0 &times; &infin;</div><div class="sl">Total motion?</div></div>
  </div>`,

  `<p>A heap of sand contains 10,000 grains. Removing one grain doesn't change it from a heap to a non-heap. But repeated application of this principle means one grain is a heap&mdash;or zero grains is a heap. The Sorites exposes the problem of vague predicates:<sup class="fn"><a href="https://plato.stanford.edu/entries/sorites-paradox/">[2]</a><span class="tip"><a href="https://plato.stanford.edu/entries/sorites-paradox/" target="_blank">Sorites Paradox &mdash; Stanford Encyclopedia of Philosophy &rarr;</a></span></sup> words like "tall," "bald," "rich," "heap" that have no sharp boundary. Unlike Zeno's paradoxes, this one targets language and logic, not space and time.</p>
  <ul class="s-list">
    <li><strong>Fuzzy logic</strong> &mdash; Replace binary truth with degrees of truth (0.7 "heapness")</li>
    <li><strong>Supervaluationism</strong> &mdash; A vague statement is true if true under all admissible sharpenings</li>
    <li><strong>Epistemicism</strong> &mdash; There is a sharp boundary; we just can't know where it is</li>
  </ul>`,

  `<p>Epimenides of Crete declared: "All Cretans are liars."<sup class="fn"><a href="https://en.wikipedia.org/wiki/Epimenides_paradox">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Epimenides_paradox" target="_blank">Epimenides Paradox &mdash; Wikipedia &rarr;</a></span></sup> Since Epimenides himself is a Cretan, is his statement true or false? If true, then he (a Cretan) is a liar, so the statement is false. If false, then not all Cretans are liars, which is consistent. The paradox is not quite a true paradox (it can simply be false), but it planted the seed for the genuine Liar Paradox: "This sentence is false."</p>
  <div class="s-stat">
    <div class="st"><div class="sv">~600 BCE</div><div class="sl">Epimenides</div></div>
    <div class="st"><div class="sv">~400 BCE</div><div class="sl">Eubulides' Liar</div></div>
    <div class="st"><div class="sv">1931</div><div class="sl">G&ouml;del's version</div></div>
  </div>`,

  `<p>Zeno's motion paradoxes persisted for over two thousand years because they required mathematical tools that didn't yet exist. Aristotle's distinction between potential and actual infinity was philosophically insightful but couldn't resolve the mathematics. The resolution came in stages: Newton and Leibniz (calculus, 1680s), Cauchy (rigorous limits, 1820s), Weierstrass (epsilon-delta, 1860s), Dedekind and Cantor (real numbers and set theory, 1870s).</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">~350 BCE</div><div class="tl-text">Aristotle distinguishes potential from actual infinity</div></div>
    <div class="tl-item"><div class="tl-date">1680s</div><div class="tl-text">Newton and Leibniz develop calculus with infinitesimals</div></div>
    <div class="tl-item"><div class="tl-date">1820s</div><div class="tl-text">Cauchy formalizes limits and convergent series</div></div>
    <div class="tl-item"><div class="tl-date">1860s</div><div class="tl-text">Weierstrass provides epsilon-delta definitions</div></div>
    <div class="tl-item"><div class="tl-date">1870s</div><div class="tl-text">Dedekind cuts and Cantor's set theory complete the picture</div></div>
  </div>`,

  `<p>The ancient paradoxes shaped the development of calculus, real analysis, set theory, and mathematical logic. Zeno's paradoxes drove the rigorous formalization of infinity, limits, and continuity. The Sorites paradox spawned fuzzy logic, supervaluationism, and entire research programs in vagueness. Epimenides' self-reference became the structural template for Russell's paradox, G&ouml;del's incompleteness theorems, and Turing's halting problem.</p>
  <div class="s-chips">
    <span class="s-chip">Calculus</span><span class="s-chip">Set Theory</span><span class="s-chip">Real Analysis</span><span class="s-chip">Fuzzy Logic</span><span class="s-chip">G&ouml;del</span><span class="s-chip">Turing</span>
  </div>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Achilles</em> &amp; the Tortoise</h2></div>
  <p>This is perhaps the most famous paradox in Western philosophy. Zeno constructed it as a defense of his teacher Parmenides, who argued that all change and plurality are illusions.<sup class="fn"><a href="https://plato.stanford.edu/entries/paradox-zeno/">[1]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradox-zeno/" target="_blank">Zeno's Paradoxes &mdash; Stanford Encyclopedia of Philosophy &rarr;</a></span></sup> The paradox is not about whether Achilles can empirically catch the tortoise&mdash;of course he can. It is about whether our mathematical description of continuous motion is coherent.</p>
  <h3>The Infinite Regression</h3>
  <p>Achilles must traverse an infinite sequence of diminishing intervals: 100m, 10m, 1m, 0.1m, and so on. The total distance is a geometric series: 100 + 10 + 1 + 0.1 + ... = 111.111... meters, which converges to 1000/9 meters. The total time similarly converges. The modern resolution says: an infinite number of tasks can be completed in finite time, because the tasks themselves become infinitely small. This is the theory of convergent series, formalized by Cauchy in the 1820s.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 580 120" xmlns="http://www.w3.org/2000/svg">
      <line x1="30" y1="60" x2="550" y2="60" class="edge"/>
      <circle cx="50" cy="60" r="10" class="node-hi"/><text x="50" y="45" text-anchor="middle" class="lbl-hi" font-size="9">A</text>
      <line x1="150" y1="50" x2="150" y2="70" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="150" y="85" text-anchor="middle" class="lbl" font-size="8">100m</text>
      <line x1="250" y1="52" x2="250" y2="68" stroke="var(--accent)" stroke-width="1.2"/>
      <text x="250" y="85" text-anchor="middle" class="lbl" font-size="8">+10m</text>
      <line x1="310" y1="54" x2="310" y2="66" stroke="var(--accent)" stroke-width="1"/>
      <text x="310" y="85" text-anchor="middle" class="lbl" font-size="8">+1m</text>
      <line x1="340" y1="55" x2="340" y2="65" stroke="var(--border-hi)" stroke-width=".8"/>
      <line x1="358" y1="56" x2="358" y2="64" stroke="var(--border-hi)" stroke-width=".6"/>
      <circle cx="380" cy="60" r="6" class="node"/><text x="380" y="45" text-anchor="middle" class="lbl" font-size="9">T</text>
      <text x="450" y="64" class="lbl-hi" font-size="11">Catch point: 111.1m</text>
      <text x="300" y="110" text-anchor="middle" class="lbl" font-size="10">Sum = 100(1 + 1/10 + 1/100 + ...) = 1000/9 &asymp; 111.1m</text>
    </svg>
  </div>
  <h3>Why Aristotle's Answer Was Insufficient</h3>
  <p>Aristotle distinguished between "potential infinity" (a process that can always continue) and "actual infinity" (a completed infinite collection). He argued that Achilles traverses a potentially infinite sequence of distances, not an actually infinite one. This was philosophically sophisticated but mathematically imprecise. It couldn't explain <em>how</em> the infinite sequence sums to a finite result&mdash;only that it does.</p>
  <h3>The Modern Resolution</h3>
  <p>The modern answer comes from the epsilon-delta formalization of limits. The infinite series 1/2 + 1/4 + 1/8 + ... has a limit of 1. This means: for any error margin epsilon &gt; 0, there exists a finite number of terms after which the partial sum differs from 1 by less than epsilon. Achilles catches the tortoise not "after infinitely many steps" but at the finite point where the series converges. The infinity is in the description, not in the physical process.</p>
  <div class="callout"><h4>The Deep Question</h4><p>Even with calculus, a philosophical puzzle remains: does physical space actually consist of a continuum of points, or is that just our mathematical model? If space is discrete at the Planck scale, Zeno's paradoxes dissolve for a different reason&mdash;the infinite sequence simply doesn't exist.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>The <em>Dichotomy</em></h2></div>
  <p>The Dichotomy is the Achilles paradox turned inward. Instead of two runners, there is one runner and a finish line. Before reaching the end, the runner must reach the midpoint. Before the midpoint, the quarter-point. Before that, the eighth-point. The sequence has no first element&mdash;so the runner can never start.</p>
  <h3>Progressive vs Regressive Forms</h3>
  <p>In the progressive form, the runner reaches 1/2, then 3/4, then 7/8, approaching but never reaching 1. In the regressive form, the runner must complete an infinite sequence in reverse order before taking the first step. The progressive form is handled by convergent series. The regressive form is more troubling: it requires completing a supertask&mdash;an infinite number of actions with no first action.</p>
  <h3>Supertasks and Thomson's Lamp</h3>
  <p>James Thomson (1954) sharpened the problem with his lamp thought experiment: a lamp is switched on at 1 minute, off at 1/2 minute, on at 1/4 minute, and so on. After 2 minutes, is it on or off? The mathematical series converges, but the physical state is undefined. This shows that convergent series resolve Zeno's paradox mathematically but leave open questions about the physical completion of infinite processes.</p>
  <div class="callout"><h4>Connection to Computation</h4><p>The Dichotomy's regressive form is structurally similar to an infinite loop with no base case. In computer science, every recursive function needs a base case to terminate. Zeno's runner has no base case&mdash;there is always a smaller distance to traverse first.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>The <em>Arrow</em></h2></div>
  <p>The Arrow paradox attacks motion from a different angle than Achilles and the Dichotomy. Those paradoxes exploit the infinite divisibility of space. The Arrow exploits the nature of time instants.</p>
  <h3>The Argument</h3>
  <p>At any single instant, an arrow in flight occupies a space exactly equal to its own length. At that instant, it is indistinguishable from an arrow at rest in that same space. If at every instant the arrow is at rest, and if the flight of the arrow is composed of instants, then the arrow is always at rest. Motion is impossible.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 580 120" xmlns="http://www.w3.org/2000/svg">
      <rect x="40" y="40" width="80" height="12" rx="2" class="node-hi"/>
      <text x="80" y="70" text-anchor="middle" class="lbl" font-size="9">t = 0</text>
      <rect x="160" y="40" width="80" height="12" rx="2" class="node-hi"/>
      <text x="200" y="70" text-anchor="middle" class="lbl" font-size="9">t = 1</text>
      <rect x="280" y="40" width="80" height="12" rx="2" class="node-hi"/>
      <text x="320" y="70" text-anchor="middle" class="lbl" font-size="9">t = 2</text>
      <rect x="400" y="40" width="80" height="12" rx="2" class="node"/>
      <text x="440" y="70" text-anchor="middle" class="lbl" font-size="9">t = 3</text>
      <text x="300" y="100" text-anchor="middle" class="lbl-hi" font-size="10">At each instant: arrow occupies fixed space = at rest</text>
    </svg>
  </div>
  <h3>The Calculus Resolution</h3>
  <p>The modern resolution distinguishes between being "at a position" at an instant and being "at rest" at an instant. An object at position x(t) has instantaneous velocity dx/dt, which is defined as the limit of (x(t+h) - x(t))/h as h approaches 0. The arrow can be at a definite position at each instant while having a nonzero instantaneous velocity. The arrow's "occupying a space equal to itself" at an instant does not imply zero velocity&mdash;velocity is a property of the function x(t), not of a single point.</p>
  <h3>Quantum Echoes</h3>
  <p>Quantum mechanics introduces a strange resonance with Zeno's Arrow. The Quantum Zeno Effect (named deliberately) shows that frequent measurement of a quantum system can freeze its evolution&mdash;a watched quantum pot never boils. The arrow's "motionlessness at each instant" finds an unexpected physical counterpart in the quantum realm, where observation itself affects dynamics.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2>The <em>Sorites</em> Paradox</h2></div>
  <p>The Sorites (from Greek <em>soros</em>, "heap") was attributed by Diogenes Laertius to Eubulides of Miletus, a contemporary of Aristotle and a member of the Megarian school.<sup class="fn"><a href="https://plato.stanford.edu/entries/sorites-paradox/">[2]</a><span class="tip"><a href="https://plato.stanford.edu/entries/sorites-paradox/" target="_blank">Sorites Paradox &mdash; Stanford Encyclopedia of Philosophy &rarr;</a></span></sup> Unlike Zeno's paradoxes, which concern space and time, the Sorites concerns language and the boundaries of concepts.</p>
  <h3>The Core Argument</h3>
  <p>Premise 1: 10,000 grains of sand make a heap. Premise 2: If N grains make a heap, then N-1 grains also make a heap. Conclusion: 1 grain is a heap (and 0 grains is a heap). Both premises seem obviously true, classical logic is applied correctly, yet the conclusion is absurd. Something must give.</p>
  <h3>Four Families of Response</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Fuzzy Logic</h4><p>Replace binary truth values (true/false) with a continuum [0, 1]. "This is a heap" has a truth value of 0.95 for 10,000 grains and 0.01 for 1 grain. Developed by Lotfi Zadeh (1965). Widely used in engineering but philosophically controversial.</p></div>
    <div class="feat"><h4>Supervaluationism</h4><p>A vague statement is "super-true" if true under all admissible ways of making it precise. "10,000 is a heap" is super-true; "47 is a heap" is neither super-true nor super-false. Preserves classical logic but admits truth-value gaps.</p></div>
    <div class="feat"><h4>Epistemicism</h4><p>There really is a sharp boundary where "heap" stops applying&mdash;say, at exactly 37 grains&mdash;but we can't know where it is. Defended by Timothy Williamson. Philosophically bold but counterintuitive: how can the meaning of a word be unknowable?</p></div>
    <div class="feat"><h4>Contextualism</h4><p>The boundary shifts depending on context, speaker, and conversation. "Heap" is heap-ish in casual conversation and precise in a courtroom. The paradox arises from treating a context-dependent concept as context-free.</p></div>
  </div>
  <h3>Practical Consequences</h3>
  <p>Sorites-type reasoning affects law (when does a fetus become a person?), ethics (when does assistance become coercion?), and everyday language (when does "warm" become "hot"?). Every legal bright line&mdash;18 years old, 0.08 BAC, 65 mph&mdash;is an arbitrary sharpening of a fundamentally vague concept, legislated into existence precisely because the Sorites shows that natural language provides no sharp boundary.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2><em>Epimenides</em> the Cretan</h2></div>
  <p>Around the 6th century BCE, Epimenides of Crete reportedly declared that all Cretans are liars.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Epimenides_paradox">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Epimenides_paradox" target="_blank">Epimenides Paradox &mdash; Wikipedia &rarr;</a></span></sup> Since he was himself a Cretan, his statement creates a loop: if true, he is a liar, so it is false. If false, not all Cretans are liars, which is perfectly consistent&mdash;Epimenides might simply be a Cretan who lied in this instance while other Cretans tell the truth.</p>
  <h3>Not Quite a True Paradox</h3>
  <p>Strictly, Epimenides' statement is not genuinely paradoxical. It can be straightforwardly false without contradiction. The genuine Liar Paradox, attributed to Eubulides of Miletus (c. 400 BCE), is: "This sentence is false." <em>That</em> sentence cannot be consistently assigned either truth value. If true, then it is false. If false, then it is true. No resolution via simple falsehood is available.</p>
  <h3>The Genealogy of Self-Reference</h3>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">~600 BCE</div><div class="tl-text">Epimenides: "All Cretans are liars" &mdash; proto-paradox, not genuinely self-defeating</div></div>
    <div class="tl-item"><div class="tl-date">~400 BCE</div><div class="tl-text">Eubulides: "This sentence is false" &mdash; the true Liar Paradox, genuinely insoluble</div></div>
    <div class="tl-item"><div class="tl-date">1323</div><div class="tl-text">Buridan: "Every statement in this box is false" (written inside a box)</div></div>
    <div class="tl-item"><div class="tl-date">1901</div><div class="tl-text">Russell's Paradox: the set-theoretic Liar</div></div>
    <div class="tl-item"><div class="tl-date">1931</div><div class="tl-text">G&ouml;del: "This statement is not provable" &mdash; Liar as mathematical theorem</div></div>
    <div class="tl-item"><div class="tl-date">1936</div><div class="tl-text">Turing: the Halting Problem &mdash; Liar as computational impossibility</div></div>
  </div>
  <h3>The Biblical Connection</h3>
  <p>The Apostle Paul quotes Epimenides in his Epistle to Titus (1:12): "One of Crete's own prophets has said it: 'Cretans are always liars, evil brutes, lazy gluttons.'" Paul appears to endorse the statement as true, apparently not noticing (or caring about) its self-referential structure. The passage has provided logicians with amusement for centuries.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2>The <em>Long</em> Resolution</h2></div>
  <p>The resolution of Zeno's motion paradoxes was not a single insight but a 2,200-year collaborative project spanning Greek philosophy, medieval scholasticism, early modern physics, and 19th-century mathematical analysis.</p>
  <h3>Aristotle's Framework</h3>
  <p>Aristotle rejected actual infinity but accepted potential infinity: the natural numbers have no greatest member, but there is no actually infinite number. For Achilles, this meant the infinite division of space is potential (we could always divide further) but never actual (Achilles doesn't have to complete infinitely many steps in any real sense). This satisfied most thinkers for two millennia, but it couldn't explain how infinite subdivisions sum to a finite result.</p>
  <h3>The Calculus Revolution</h3>
  <p>Newton's fluxions and Leibniz's infinitesimals (1680s) provided computational tools for handling continuous change but used logically questionable "infinitely small quantities." Bishop Berkeley's famous critique ("the ghosts of departed quantities") highlighted the foundational gap.</p>
  <h3>Rigorous Analysis</h3>
  <p>Cauchy (1821) defined limits precisely: the sum of 1/2 + 1/4 + 1/8 + ... equals 1 because for any positive epsilon, a finite number of terms brings the partial sum within epsilon of 1. Weierstrass (1860s) completed the epsilon-delta framework, removing all reference to infinitesimals. Dedekind (1872) constructed the real numbers via "cuts," providing the continuum that Zeno's paradoxes implicitly demanded. Cantor showed that the continuum has a higher cardinality than the integers, making rigorous the distinction between countable and uncountable infinity.</p>
  <div class="callout"><h4>The Philosophical Residue</h4><p>Mathematics has resolved the paradoxes within its own framework, but the deeper question persists: does physical space actually instantiate a mathematical continuum? If space is quantized at the Planck scale (approximately 10^-35 meters), then Zeno's infinite subdivisions don't correspond to physical reality&mdash;the paradox would be dissolved rather than resolved.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2><em>Legacy</em> &amp; Influence</h2></div>
  <p>The ancient paradoxes are not museum pieces. Their influence runs through the core of modern mathematics, logic, physics, computer science, and philosophy of language. Every field that grapples with infinity, continuity, self-reference, or vagueness has roots in problems first articulated in ancient Greece.</p>
  <h3>On Mathematics</h3>
  <p>Zeno's paradoxes are the reason we have rigorous real analysis. Without the need to explain how an infinite series can have a finite sum, there would have been less urgency to formalize the concept of a limit. The entire edifice of calculus, as rebuilt by Cauchy and Weierstrass, is in part a response to a 5th-century BCE Eleatic philosopher.</p>
  <h3>On Logic and Computer Science</h3>
  <p>The Epimenides/Liar lineage led directly to G&ouml;del's incompleteness theorems and Turing's proof that the halting problem is undecidable. Both use diagonal self-reference&mdash;the same structural trick Eubulides discovered with "This sentence is false." Every computer science student who encounters the halting problem is unknowingly wrestling with a 2,400-year-old Greek paradox.</p>
  <h3>On Philosophy of Language</h3>
  <p>The Sorites paradox remains unsolved and active. It underlies contemporary debates in epistemology (what counts as "knowledge"?), ethics (when does a cluster of cells become a person?), and law (where to draw bright lines in regulation). Fuzzy logic, born from the Sorites, is used in control systems worldwide, from washing machines to subway braking systems.</p>
  <div class="verdict">
    <div class="v-col pro"><h4>Resolved</h4><ul><li>Achilles catches the tortoise (convergent series)</li><li>The Arrow moves (instantaneous velocity)</li><li>The Dichotomy runner finishes (limits)</li></ul></div>
    <div class="v-col con"><h4>Unresolved</h4><ul><li>Is physical space actually continuous?</li><li>What is a heap? (Sorites)</li><li>Can supertasks be completed?</li><li>How does self-reference work in natural language?</li></ul></div>
  </div>`
];
