<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Thesis', title: 'Paradoxes as <em>Boundary</em> Markers' },
  { num: '02', short: 'Self-Reference', title: 'The <em>Self-Reference</em> Pattern' },
  { num: '03', short: 'Infinity', title: '<em>Infinity</em> and Its Discontents' },
  { num: '04', short: 'Resolutions', title: 'A <em>Taxonomy</em> of Resolutions' },
  { num: '05', short: 'Tensions', title: '<em>Unresolved</em> Tensions' },
  { num: '06', short: 'Conclusion', title: 'What Paradoxes <em>Teach</em> Us' }
];

const summaries = [
  `<p>A paradox is not a mistake. It is a boundary marker&mdash;a signal that a conceptual system has reached its limits. This survey maps paradoxes across seven domains and 2,500 years of intellectual history: ancient philosophy,<sup class="fn"><a href="https://plato.stanford.edu/entries/paradox-zeno/">[1]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradox-zeno/" target="_blank">Zeno's Paradoxes &mdash; SEP &rarr;</a></span></sup> formal logic,<sup class="fn"><a href="https://plato.stanford.edu/entries/russell-paradox/">[2]</a><span class="tip"><a href="https://plato.stanford.edu/entries/russell-paradox/" target="_blank">Russell's Paradox &mdash; SEP &rarr;</a></span></sup> mathematics,<sup class="fn"><a href="https://www.quantamagazine.org/how-a-mathematical-paradox-allows-infinite-cloning-20210826/">[3]</a><span class="tip"><a href="https://www.quantamagazine.org/how-a-mathematical-paradox-allows-infinite-cloning-20210826/" target="_blank">Banach-Tarski &mdash; Quanta &rarr;</a></span></sup> physics,<sup class="fn"><a href="https://plato.stanford.edu/entries/qt-epr/">[4]</a><span class="tip"><a href="https://plato.stanford.edu/entries/qt-epr/" target="_blank">EPR Paradox &mdash; SEP &rarr;</a></span></sup> decision theory,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Newcomb%27s_problem">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Newcomb%27s_problem" target="_blank">Newcomb's Problem &mdash; Wikipedia &rarr;</a></span></sup> personal identity,<sup class="fn"><a href="https://plato.stanford.edu/entries/chinese-room/">[6]</a><span class="tip"><a href="https://plato.stanford.edu/entries/chinese-room/" target="_blank">Chinese Room &mdash; SEP &rarr;</a></span></sup> and visual art.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Strange_loop">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Strange_loop" target="_blank">Strange Loop &mdash; Wikipedia &rarr;</a></span></sup> The unifying themes are self-reference, infinity, and the gap between formal systems and the reality they model.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">7</div><div class="sl">Domains</div></div>
    <div class="st"><div class="sv">54</div><div class="sl">Sources</div></div>
    <div class="st"><div class="sv">2,500 yr</div><div class="sl">Span</div></div>
    <div class="st"><div class="sv">3</div><div class="sl">Unifying themes</div></div>
  </div>`,

  `<p>The deepest cross-cutting pattern in this survey is self-reference: a system that refers to, represents, or models itself. From Epimenides' declaration that all Cretans are liars<sup class="fn"><a href="https://en.wikipedia.org/wiki/Epimenides_paradox">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Epimenides_paradox" target="_blank">Epimenides Paradox &mdash; Wikipedia &rarr;</a></span></sup> through Russell's set that contains itself iff it does not,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Russell%27s_paradox">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Russell%27s_paradox" target="_blank">Russell's Paradox &mdash; Wikipedia &rarr;</a></span></sup> to Godel's sentence that asserts its own unprovability,<sup class="fn"><a href="https://tomrocksmaths.com/2023/11/08/mathematical-philosophy-russell-godel-and-incompleteness/">[10]</a><span class="tip"><a href="https://tomrocksmaths.com/2023/11/08/mathematical-philosophy-russell-godel-and-incompleteness/" target="_blank">Russell, Godel and Incompleteness &mdash; Tom Rocks Maths &rarr;</a></span></sup> to Escher's hands that draw each other<sup class="fn"><a href="https://en.wikipedia.org/wiki/Impossible_object">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Impossible_object" target="_blank">Impossible Object &mdash; Wikipedia &rarr;</a></span></sup>&mdash;the same structural trick produces paradox, impossibility, art, and possibly consciousness.</p>
  <h4>The diagonal argument</h4>
  <ul class="s-list">
    <li><strong>Cantor (1891)</strong> &mdash; Proves the reals are uncountable by constructing a number that differs from every listed number</li>
    <li><strong>Russell (1901)</strong> &mdash; Constructs a set that differs from every set in its self-membership property</li>
    <li><strong>Godel (1931)</strong> &mdash; Constructs a sentence that differs from every provable sentence by being true but unprovable</li>
    <li><strong>Turing (1936)</strong> &mdash; Constructs a program that defeats any would-be halting detector by doing the opposite</li>
  </ul>`,

  `<p>Infinity appears in every domain of this survey. Zeno's infinite subdivisions of space,<sup class="fn"><a href="https://iep.utm.edu/zenos-paradoxes/">[12]</a><span class="tip"><a href="https://iep.utm.edu/zenos-paradoxes/" target="_blank">Zeno's Paradoxes &mdash; IEP &rarr;</a></span></sup> Hilbert's infinite hotel,<sup class="fn"><a href="https://en.wikipedia.org/wiki/Hilbert%27s_paradox_of_the_Grand_Hotel">[13]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Hilbert%27s_paradox_of_the_Grand_Hotel" target="_blank">Hilbert's Hotel &mdash; Wikipedia &rarr;</a></span></sup> the Banach-Tarski decomposition,<sup class="fn"><a href="https://www.cambridge.org/core/books/banachtarski-paradox/9C1FEAACF5EF6EB51C99F67136C8FCCB">[14]</a><span class="tip"><a href="https://www.cambridge.org/core/books/banachtarski-paradox/9C1FEAACF5EF6EB51C99F67136C8FCCB" target="_blank">Banach-Tarski &mdash; Cambridge UP &rarr;</a></span></sup> the St. Petersburg game's infinite expected value,<sup class="fn"><a href="https://plato.stanford.edu/entries/paradox-stpetersburg/">[15]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradox-stpetersburg/" target="_blank">St. Petersburg Paradox &mdash; SEP &rarr;</a></span></sup> the Droste effect's infinite recursion. The ancient Greeks recognized infinity's troublesome nature but lacked the mathematical tools to manage it. Modern mathematics domesticated infinity through set theory, measure theory, and topology, but philosophical puzzles remain.</p>
  <div class="s-chips">
    <span class="s-chip">Actual vs. potential</span><span class="s-chip">Countable vs. uncountable</span><span class="s-chip">Convergent series</span><span class="s-chip">Non-measurable sets</span>
  </div>`,

  `<p>Across seven domains, six distinct strategies for responding to paradoxes emerge. No single strategy works everywhere, and some paradoxes resist resolution entirely.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Mathematical Formalization</h4><p>Convergent series resolve Achilles. The epsilon-delta framework eliminates infinitesimals. Cauchy and Weierstrass provide rigorous foundations. Effective for motion paradoxes.</p></div>
    <div class="feat"><h4>Restriction of Scope</h4><p>ZFC restricts set formation to avoid Russell's paradox.<sup class="fn"><a href="https://plato.stanford.edu/entries/paradoxes-contemporary-logic/">[16]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradoxes-contemporary-logic/" target="_blank">Paradoxes and Contemporary Logic &mdash; SEP &rarr;</a></span></sup> Tarski's hierarchy separates object-language from meta-language. Type theory stratifies the universe. These manage self-reference without eliminating it.</p></div>
    <div class="feat"><h4>Accept the Counterintuitive</h4><p>Banach-Tarski is true. Hilbert's Hotel works. Monty Hall switching wins 2/3.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Monty_Hall_problem">[17]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Monty_Hall_problem" target="_blank">Monty Hall Problem &mdash; Wikipedia &rarr;</a></span></sup> Sometimes the paradox IS the answer: mathematical truth and physical intuition diverge.</p></div>
    <div class="feat"><h4>Empirical Discovery</h4><p>Bell's theorem confirms nonlocality. Maxwell's Demon reveals that information is physical.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Maxwell%27s_demon">[18]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Maxwell%27s_demon" target="_blank">Maxwell's Demon &mdash; Wikipedia &rarr;</a></span></sup> Olbers' paradox predicted the Big Bang. Physics paradoxes drive discovery.</p></div>
    <div class="feat"><h4>Dissolution</h4><p>Parfit dissolves the teletransporter by arguing that personal identity is not what matters.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Teletransportation_paradox">[19]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Teletransportation_paradox" target="_blank">Teletransportation Paradox &mdash; Wikipedia &rarr;</a></span></sup> The question is malformed. Dissolving the question IS the answer.</p></div>
    <div class="feat"><h4>No Consensus</h4><p>Newcomb's Problem, the Sorites,<sup class="fn"><a href="https://plato.stanford.edu/entries/sorites-paradox/">[20]</a><span class="tip"><a href="https://plato.stanford.edu/entries/sorites-paradox/" target="_blank">Sorites Paradox &mdash; SEP &rarr;</a></span></sup> the Chinese Room<sup class="fn"><a href="https://iep.utm.edu/chinese-room-argument/">[21]</a><span class="tip"><a href="https://iep.utm.edu/chinese-room-argument/" target="_blank">Chinese Room &mdash; IEP &rarr;</a></span></sup> remain genuinely unsolved after decades or centuries of debate. These are structural features of reasoning, not puzzles awaiting a clever answer.</p></div>
  </div>`,

  `<p>Six fundamental tensions run through the survey, each representing a genuine disagreement about the nature of paradoxes and their resolution.</p>
  <ul class="s-list">
    <li><strong>Are Zeno's paradoxes solved?</strong> Mathematicians say yes (convergent series). Philosophers say the metaphysical puzzle of continuity persists beyond the mathematics.</li>
    <li><strong>Is the Axiom of Choice acceptable?</strong> Most mathematicians accept it as standard. Constructivists say Banach-Tarski is a reductio ad absurdum of the axiom.<sup class="fn"><a href="https://arxiv.org/abs/2206.13512">[22]</a><span class="tip"><a href="https://arxiv.org/abs/2206.13512" target="_blank">Banach-Tarski survey &mdash; arXiv &rarr;</a></span></sup></li>
    <li><strong>Does the Chinese Room refute strong AI?</strong> Searle says syntax never produces semantics.<sup class="fn"><a href="https://www.britannica.com/topic/Chinese-room-argument">[23]</a><span class="tip"><a href="https://www.britannica.com/topic/Chinese-room-argument" target="_blank">Chinese Room Argument &mdash; Britannica &rarr;</a></span></sup> Dennett and Hofstadter say the system as a whole understands.</li>
    <li><strong>Is Newcomb's Problem solved?</strong> One-boxers (evidential decision theory) and two-boxers (causal decision theory) have argued for 50+ years with no resolution.<sup class="fn"><a href="https://brilliant.org/wiki/newcombs-paradox/">[24]</a><span class="tip"><a href="https://brilliant.org/wiki/newcombs-paradox/" target="_blank">Newcomb's Paradox &mdash; Brilliant &rarr;</a></span></sup></li>
    <li><strong>Are paradoxes failures or features?</strong> Logical positivists say linguistic confusion. Hofstadter says the mechanism of consciousness.</li>
    <li><strong>Is personal identity real?</strong> Parfit says no further fact&mdash;identity is conventional. Common sense says of course you are you.</li>
  </ul>`,

  `<p>Paradoxes are not intellectual dead ends. They are the points where our conceptual systems reveal their own architecture&mdash;the places where the rules turn back on themselves and expose what they cannot handle. Each domain has its own paradoxes, but the structural patterns recur: self-reference, infinity, the gap between model and reality, the failure of aggregation.</p>
  <div class="callout"><h4>The Central Lesson</h4><p>The most important paradoxes are not the ones that get solved. They are the ones that reveal permanent features of formal reasoning. Godel's incompleteness is not a problem to be fixed but a fact about the structure of mathematics. Arrow's impossibility is not a flaw in voting systems but a constraint on any aggregation of preferences. The Liar Paradox is not a puzzle awaiting a clever solution but a consequence of any language powerful enough to talk about its own truth. Understanding these limits&mdash;accepting that they are limits and not defects&mdash;is itself a form of intellectual progress.</p></div>
  <div class="s-chips">
    <span class="s-chip">54 sources</span><span class="s-chip">7 domains</span><span class="s-chip">2,500 years</span><span class="s-chip">Self-reference</span><span class="s-chip">Infinity</span><span class="s-chip">Boundary markers</span>
  </div>`
];

const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
