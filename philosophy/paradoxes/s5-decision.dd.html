const sections = [
  { num: '01', short: 'Prisoner', title: 'The <em>Prisoner&rsquo;s</em> Dilemma' },
  { num: '02', short: 'Newcomb', title: '<em>Newcomb&rsquo;s</em> Problem' },
  { num: '03', short: 'Trolley', title: 'The <em>Trolley</em> Problem' },
  { num: '04', short: 'Arrow', title: '<em>Arrow&rsquo;s</em> Impossibility' },
  { num: '05', short: 'St. Petersburg', title: '<em>St. Petersburg</em>' },
  { num: '06', short: 'Braess', title: '<em>Braess&rsquo;s</em> Paradox' },
  { num: '07', short: 'Thread', title: 'The <em>Common</em> Thread' }
];

const summaries = [
  `<p>Two prisoners, each choosing to cooperate or defect. Defection dominates individually (always better no matter what the other does), but mutual defection is worse than mutual cooperation for both. Nash equilibrium is collectively suboptimal. Extends to arms races, climate change, and the tragedy of the commons.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1950</div><div class="sl">Formalized</div></div>
    <div class="st"><div class="sv">Defect</div><div class="sl">Nash equilibrium</div></div>
    <div class="st"><div class="sv">Cooperate</div><div class="sl">Optimal outcome</div></div>
  </div>`,

  `<p>A near-perfect predictor places $1M in Box B if it predicts you will take only B; $0 if it predicts you will take both A and B. Box A always contains $1,000.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Newcomb%27s_problem">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Newcomb%27s_problem" target="_blank">Newcomb's Problem &mdash; Wikipedia &rarr;</a></span></sup> Two-boxers say take both (dominant strategy). One-boxers say take only B (almost always get $1M). After 50+ years, no consensus.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1969</div><div class="sl">Published</div></div>
    <div class="st"><div class="sv">$1M</div><div class="sl">One-box expected</div></div>
    <div class="st"><div class="sv">$1K</div><div class="sl">Two-box typical</div></div>
  </div>`,

  `<p>Philippa Foot (1967): a trolley will kill five people. You can divert it to a side track where it will kill one. Most say yes, divert. Thomson&rsquo;s variant: push a large man off a bridge to stop the trolley. Most say no. Same outcome (1 dies to save 5), different moral intuitions. Reveals that moral reasoning is not purely consequentialist.</p>
  <div class="s-chips">
    <span class="s-chip">Consequentialism</span><span class="s-chip">Deontology</span><span class="s-chip">Means vs. ends</span><span class="s-chip">Moral intuition</span>
  </div>`,

  `<p>No ranked voting system for three or more candidates can simultaneously satisfy: non-dictatorship, Pareto efficiency, and independence of irrelevant alternatives.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Arrow%27s_impossibility_theorem">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Arrow%27s_impossibility_theorem" target="_blank">Arrow's Impossibility Theorem &mdash; Wikipedia &rarr;</a></span></sup> This is a mathematical theorem, not an empirical observation. Perfect democratic voting is provably impossible.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1951</div><div class="sl">Arrow&rsquo;s proof</div></div>
    <div class="st"><div class="sv">3</div><div class="sl">Conditions</div></div>
    <div class="st"><div class="sv">Impossible</div><div class="sl">All satisfied</div></div>
  </div>`,

  `<p>Flip a coin until heads. Pay 2^n dollars for first heads on flip n. Expected value: 1 + 1 + 1 + ... = infinity. But nobody would pay $1,000 to play.<sup class="fn"><a href="https://plato.stanford.edu/entries/paradox-stpetersburg/">[3]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradox-stpetersburg/" target="_blank">St. Petersburg Paradox &mdash; SEP &rarr;</a></span></sup> Bernoulli&rsquo;s solution: people maximize expected utility (logarithmic), not expected value. But the paradox can be reconstructed with any unbounded utility function.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1713</div><div class="sl">N. Bernoulli</div></div>
    <div class="st"><div class="sv">&infin;</div><div class="sl">Expected value</div></div>
    <div class="st"><div class="sv">~$10</div><div class="sl">Willingness to pay</div></div>
  </div>`,

  `<p>Adding a road to a network can increase everyone&rsquo;s travel time. Each driver optimizes individually, but the new route creates congestion patterns that worsen the whole network. Seoul removed a highway in 2005 and traffic improved. Extends beyond traffic: adding options to any network with selfish agents can decrease global efficiency.</p>
  <div class="s-chips">
    <span class="s-chip">Network effects</span><span class="s-chip">Selfish routing</span><span class="s-chip">Seoul 2005</span><span class="s-chip">Price of anarchy</span>
  </div>`,

  `<p>These paradoxes share a theme: individual rationality does not aggregate into collective rationality. The Prisoner&rsquo;s Dilemma shows this for strategic interaction. Arrow shows it for voting. Braess shows it for networks. Newcomb shows that even individual rationality may be incoherent, splitting into competing definitions that give opposite answers.</p>
  <div class="s-chips">
    <span class="s-chip">Rationality</span><span class="s-chip">Aggregation failure</span><span class="s-chip">Structural impossibility</span>
  </div>`
];

const dIcon = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>';

const details = [
  `<div class="detail-header"><div class="num">${dIcon}Section 01 &mdash; Details</div><h2>The <em>Prisoner&rsquo;s</em> Dilemma</h2></div>
  <p>Merrill Flood and Melvin Dresher at RAND Corporation formalized this game in 1950; Albert Tucker named it. Two prisoners are interrogated separately. Each can cooperate (stay silent) or defect (betray the other). If both cooperate, each gets a light sentence. If both defect, each gets a moderate sentence. If one defects and the other cooperates, the defector goes free and the cooperator gets the heaviest sentence.</p>
  <h3>The Payoff Matrix</h3>
  <div class="diagram-wrap">
    <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
      <text x="250" y="20" text-anchor="middle" class="lbl-hi" font-size="11">Player B</text>
      <text x="30" y="110" text-anchor="middle" class="lbl-hi" font-size="11" transform="rotate(-90,30,110)">Player A</text>
      <text x="200" y="45" text-anchor="middle" class="lbl" font-size="10">Cooperate</text>
      <text x="350" y="45" text-anchor="middle" class="lbl" font-size="10">Defect</text>
      <text x="85" y="95" text-anchor="middle" class="lbl" font-size="10">Cooperate</text>
      <text x="85" y="150" text-anchor="middle" class="lbl" font-size="10">Defect</text>
      <rect x="140" y="60" width="120" height="50" class="node-hi"/><text x="200" y="90" text-anchor="middle" class="node-text" font-size="11">-1, -1</text>
      <rect x="290" y="60" width="120" height="50" class="node"/><text x="350" y="90" text-anchor="middle" class="node-text" font-size="11">-10, 0</text>
      <rect x="140" y="120" width="120" height="50" class="node"/><text x="200" y="150" text-anchor="middle" class="node-text" font-size="11">0, -10</text>
      <rect x="290" y="120" width="120" height="50" class="node"/><text x="350" y="150" text-anchor="middle" class="node-text" font-size="11">-5, -5</text>
      <text x="250" y="192" text-anchor="middle" class="lbl-hi" font-size="9">Nash equilibrium: (-5,-5). Optimal: (-1,-1). Rational choice is collectively irrational.</text>
    </svg>
  </div>
  <h3>The Iterated Game</h3>
  <p>In Robert Axelrod&rsquo;s famous 1984 tournaments, the strategy "tit-for-tat" (cooperate first, then copy the opponent&rsquo;s last move) outperformed all competitors. Cooperation can emerge from repeated interaction, reputation, and the shadow of the future. The one-shot Prisoner&rsquo;s Dilemma is tragic; the iterated version is hopeful.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 02 &mdash; Details</div><h2><em>Newcomb&rsquo;s</em> Problem</h2></div>
  <p>Robert Nozick published this problem in 1969, attributing it to physicist William Newcomb. A superintelligent predictor offers you two boxes. Box A is transparent and contains $1,000. Box B is opaque. The predictor has already placed $1M in Box B if it predicted you would take only Box B, and $0 if it predicted you would take both boxes. The predictor is 99% accurate.</p>
  <h3>The Two Schools</h3>
  <div class="verdict">
    <div class="v-col pro"><h4>One-Boxing (Evidential)</h4><ul><li>One-boxers almost always get $1M</li><li>Two-boxers almost always get $1,000</li><li>Choose the act that correlates with the best outcome</li><li>The predictor&rsquo;s accuracy makes this rational</li></ul></div>
    <div class="v-col con"><h4>Two-Boxing (Causal)</h4><ul><li>The money is already placed; your choice cannot change it</li><li>Taking both boxes dominates: you get $1,000 more regardless</li><li>Rational agents maximize based on causal effects, not correlations</li></ul></div>
  </div>
  <div class="callout"><h4>Why It Matters</h4><p>Newcomb&rsquo;s Problem reveals that "rationality" is not a single concept. Causal decision theory and evidential decision theory are both internally consistent but give opposite answers. After more than 50 years of debate, neither side has conceded. The problem may be genuinely undecidable within our current framework of rational choice.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 03 &mdash; Details</div><h2>The <em>Trolley</em> Problem</h2></div>
  <p>Philippa Foot introduced the basic trolley problem in 1967. Judith Jarvis Thomson introduced the footbridge variant in 1985. Together, they have generated one of the most productive research programs in moral philosophy.</p>
  <h3>Two Variants</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Switch</h4><p>A trolley is heading toward five people. You can flip a switch to divert it to a side track where it will kill one person. Most people (approximately 90% in surveys) say this is morally permissible.</p></div>
    <div class="feat"><h4>Footbridge</h4><p>A trolley is heading toward five people. You can push a large man off a bridge; his body will stop the trolley but he will die. Most people (approximately 90%) say this is morally impermissible.</p></div>
  </div>
  <h3>What It Reveals</h3>
  <p>The outcome is identical in both cases: one person dies to save five. But our moral intuitions diverge sharply. The switch case feels like redirecting an existing threat; the footbridge case feels like using a person as a means to an end. This distinction maps roughly onto the consequentialist/deontological divide in moral philosophy, and suggests that human moral reasoning relies on multiple, sometimes conflicting, systems.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 04 &mdash; Details</div><h2><em>Arrow&rsquo;s</em> Impossibility</h2></div>
  <p>Kenneth Arrow proved in 1951 that no ranked voting system for three or more candidates can simultaneously satisfy three seemingly reasonable conditions: (1) Non-dictatorship: no single voter determines the outcome regardless of others&rsquo; preferences. (2) Pareto efficiency: if every voter prefers A to B, the group must prefer A to B. (3) Independence of irrelevant alternatives: the group&rsquo;s preference between A and B depends only on individual preferences between A and B, not on preferences involving C.</p>
  <h3>Consequences</h3>
  <p>Arrow&rsquo;s theorem is not an empirical observation that existing voting systems are flawed; it is a mathematical proof that ALL ranked voting systems must violate at least one of these conditions. Every voting system (plurality, ranked choice, Borda count, etc.) has known failure modes. The Gibbard-Satterthwaite theorem extends this: all non-trivial voting systems are also strategically manipulable.</p>
  <div class="callout"><h4>Beyond Voting</h4><p>Arrow&rsquo;s result applies to any aggregation of individual preferences into a group preference. It limits social choice theory, welfare economics, and any system that tries to fairly combine individual rankings. Perfect fairness in aggregation is mathematically impossible.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 05 &mdash; Details</div><h2><em>St. Petersburg</em> Paradox</h2></div>
  <p>Nicolas Bernoulli formulated this problem around 1713, and his cousin Daniel Bernoulli proposed the first resolution in 1738. A fair coin is flipped repeatedly until it comes up heads. If the first heads appears on flip n, you receive 2^n dollars. The expected value of the game is: 1 + 1 + 1 + 1 + ... = infinity. Yet no rational person would pay more than about $10 to play.</p>
  <h3>Bernoulli&rsquo;s Resolution</h3>
  <p>Daniel Bernoulli proposed that people do not maximize expected monetary value but expected utility, where utility is a concave function of wealth (diminishing marginal utility). With logarithmic utility, the expected utility converges. This insight launched the entire field of expected utility theory.</p>
  <h3>The Problem Persists</h3>
  <p>Bernoulli&rsquo;s solution works for logarithmic utility, but the paradox can be reconstructed for ANY unbounded utility function (the "super-St. Petersburg paradox"). Even with bounded utility, the philosophical question remains: what justifies discounting outcomes with infinite expected value?</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 06 &mdash; Details</div><h2><em>Braess&rsquo;s</em> Paradox</h2></div>
  <p>Dietrich Braess showed in 1968 that adding a new road to a traffic network can increase the total travel time for all drivers, even though each driver is choosing their individually optimal route. The paradox occurs because the new road creates a shortcut that everyone uses, causing congestion that makes the entire network slower.</p>
  <h3>Real-World Examples</h3>
  <p>Seoul, South Korea, removed the Cheonggyecheon highway in 2005 and replaced it with a park. Traffic flow in the surrounding area improved. Stuttgart, New York, and other cities have observed similar effects. The paradox extends beyond traffic to any network with selfish agents: adding capacity to an electrical grid, adding links to a computer network, or adding options to a supply chain can all decrease overall performance.</p>
  <h3>The Price of Anarchy</h3>
  <p>Braess&rsquo;s paradox is formalized in the concept of the "price of anarchy": the ratio between the worst-case Nash equilibrium and the socially optimal outcome. In some networks, selfish routing can be arbitrarily worse than centrally coordinated routing. The paradox demonstrates that individual optimization and system optimization are fundamentally different problems.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 07 &mdash; Details</div><h2>The <em>Common</em> Thread</h2></div>
  <p>All the decision and game theory paradoxes in this section share a deep structural feature: individual rationality fails to produce collectively rational outcomes. This is not a contingent fact about particular games; it is a structural feature of rational choice under strategic interaction.</p>
  <h3>The Aggregation Problem</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Prisoner&rsquo;s Dilemma</h4><p>Individual best response (defect) produces a collectively suboptimal outcome. Cooperation requires enforcement, repetition, or trust.</p></div>
    <div class="feat"><h4>Arrow&rsquo;s Theorem</h4><p>Individual preference orderings cannot be consistently aggregated into a group ordering under minimal fairness conditions.</p></div>
    <div class="feat"><h4>Braess&rsquo;s Paradox</h4><p>Individually optimal routing choices produce collectively suboptimal network performance.</p></div>
    <div class="feat"><h4>Newcomb&rsquo;s Problem</h4><p>Even INDIVIDUAL rationality may be incoherent: two valid frameworks for rational choice give opposite answers.</p></div>
  </div>
  <div class="callout"><h4>The Lesson</h4><p>Rationality is not a simple, unified concept. It fractures under strategic interaction (PD), aggregation (Arrow), network effects (Braess), and self-reference (Newcomb). These paradoxes are not puzzles waiting for a clever solution; they are structural features of rational choice that any complete theory must accommodate.</p></div>`
];

// === DOM BUILDING ===
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>5</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Section 05 &middot; Decision &amp; Game Theory</div>
        <div class="hero-title">Decision &amp; Game <em>Theory</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Prisoner&rsquo;s Dilemma, Newcomb, Arrow, St. Petersburg &middot; 1713&ndash;1969 &middot; 7 sources</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => { const item = document.createElement('div'); item.className = 'sidebar-item' + (idx === 0 ? ' active' : ''); item.setAttribute('data-label', sec.short); item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`; item.onclick = () => scrollToSection(idx); sidebarNav.appendChild(item); });
const sidebarTip = document.createElement('div'); sidebarTip.className = 'sidebar-tooltip'; document.body.appendChild(sidebarTip); const sidebarEl = document.querySelector('.sidebar'); let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => { if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const item = e.target.closest('.sidebar-item'); if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const rect = item.getBoundingClientRect(); const sRight = sidebarEl.getBoundingClientRect().right; sidebarTip.textContent = item.getAttribute('data-label'); sidebarTip.style.left = (sRight - 1) + 'px'; sidebarTip.style.top = rect.top + 'px'; sidebarTip.style.height = rect.height + 'px'; if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); } });
const mainScroll = document.getElementById('main-scroll'); const mainInner = document.createElement('div'); mainInner.className = 'main-scroll-inner'; mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`; mainInner.appendChild(block); });
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => { const d = document.createElement('div'); d.className = 'detail'; d.id = `detail-${idx}`; d.innerHTML = details[idx]; rightInner.appendChild(d); });
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let ai = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) ai = i; }); items.forEach((item, i) => item.classList.toggle('active', i === ai)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const ad = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!ad) return; const h2 = ad.querySelector('.detail-header h2') || ad.querySelector('h2'); if (!h2) return; const r = h2.getBoundingClientRect(); const pr = rightPanelOuter.getBoundingClientRect(); const tb = document.querySelector('.right-topbar'); if (r.bottom < pr.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); tb.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); tb.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
