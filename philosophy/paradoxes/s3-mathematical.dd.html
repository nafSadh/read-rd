<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Banach-Tarski', title: '<em>Banach-Tarski</em>' },
  { num: '02', short: 'Gabriel', title: '<em>Gabriel&rsquo;s</em> Horn' },
  { num: '03', short: 'Hilbert', title: '<em>Hilbert&rsquo;s</em> Hotel' },
  { num: '04', short: 'Birthday', title: 'The <em>Birthday</em> Paradox' },
  { num: '05', short: 'Monty Hall', title: '<em>Monty</em> Hall' },
  { num: '06', short: 'Simpson', title: '<em>Simpson&rsquo;s</em> Paradox' }
];

const summaries = [
  `<p>A solid sphere can be decomposed into finitely many pieces and reassembled into two spheres identical to the original.<sup class="fn"><a href="https://www.quantamagazine.org/how-a-mathematical-paradox-allows-infinite-cloning-20210826/">[1]</a><span class="tip"><a href="https://www.quantamagazine.org/how-a-mathematical-paradox-allows-infinite-cloning-20210826/" target="_blank">Banach-Tarski: Infinite Cloning &mdash; Quanta Magazine &rarr;</a></span></sup> Five pieces suffice. The pieces are non-measurable sets&mdash;impossible to physically construct. The theorem depends on the Axiom of Choice. Constructivists reject it as a reductio ad absurdum of that axiom.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1924</div><div class="sl">Proved</div></div>
    <div class="st"><div class="sv">5</div><div class="sl">Pieces needed</div></div>
    <div class="st"><div class="sv">&infin;</div><div class="sl">Points per piece</div></div>
  </div>`,

  `<p>Evangelista Torricelli discovered in 1643 that the surface of revolution of y = 1/x from x = 1 to infinity has infinite surface area but finite volume (&pi; cubic units). You can fill it with paint but never paint its surface. The paradox is resolved by recognizing that volume and surface area involve different integrals with different convergence properties.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1643</div><div class="sl">Discovered</div></div>
    <div class="st"><div class="sv">&pi;</div><div class="sl">Volume</div></div>
    <div class="st"><div class="sv">&infin;</div><div class="sl">Surface area</div></div>
  </div>`,

  `<p>A hotel with infinitely many rooms, all occupied. A new guest arrives: move each guest from room n to room n+1, freeing room 1.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Hilbert%27s_paradox_of_the_Grand_Hotel">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Hilbert%27s_paradox_of_the_Grand_Hotel" target="_blank">Hilbert's Paradox of the Grand Hotel &mdash; Wikipedia &rarr;</a></span></sup> Need to accommodate countably many guests? Move each from n to 2n, freeing all odd rooms. Demonstrates that a countably infinite set has the same cardinality as one of its proper subsets.</p>
  <div class="s-chips">
    <span class="s-chip">Room n &rarr; n+1</span><span class="s-chip">Room n &rarr; 2n</span><span class="s-chip">&alef;&#8320; = &alef;&#8320;</span>
  </div>`,

  `<p>In a room of 23 people, there is a greater than 50% chance that two share a birthday. At 70 people, it is 99.9%. Counterintuitive because we conflate "a match with any pair" with "a match with a specific person." The number of pairs grows quadratically: C(23,2) = 253 pairs, each independently capable of matching.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">23</div><div class="sl">People for 50%</div></div>
    <div class="st"><div class="sv">253</div><div class="sl">Pairs checked</div></div>
    <div class="st"><div class="sv">70</div><div class="sl">People for 99.9%</div></div>
  </div>`,

  `<p>Three doors, one car, two goats. You pick a door. The host opens another door revealing a goat. Should you switch? Yes: switching wins 2/3 of the time.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Monty_Hall_problem">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Monty_Hall_problem" target="_blank">Monty Hall Problem &mdash; Wikipedia &rarr;</a></span></sup> Marilyn vos Savant published the correct answer in 1990 and received thousands of angry letters from PhD mathematicians insisting she was wrong.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1/3</div><div class="sl">Stay wins</div></div>
    <div class="st"><div class="sv">2/3</div><div class="sl">Switch wins</div></div>
    <div class="st"><div class="sv">1990</div><div class="sl">Controversy</div></div>
  </div>`,

  `<p>A trend present in every subgroup can reverse when the groups are combined. UC Berkeley&rsquo;s 1973 admissions appeared to favor men overall, but every department favored women or was neutral. Women applied disproportionately to more competitive departments. The paradox is a practical threat to any data analysis that aggregates across confounding variables.</p>
  <div class="s-chips">
    <span class="s-chip">Aggregation bias</span><span class="s-chip">Confounding</span><span class="s-chip">Berkeley 1973</span><span class="s-chip">Medicine</span><span class="s-chip">Policy</span>
  </div>`
];

const dIcon = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>';

const details = [
  `<div class="detail-header"><div class="num">${dIcon}Section 01 &mdash; Details</div><h2><em>Banach-Tarski</em></h2></div>
  <p>In 1924, Stefan Banach and Alfred Tarski proved one of the most counterintuitive results in all of mathematics: a solid sphere can be decomposed into a finite number of non-overlapping pieces, which can then be put back together using only rotations and translations to yield two spheres, each identical in size to the original.<sup class="fn"><a href="https://www.cambridge.org/core/books/banachtarski-paradox/9C1FEAACF5EF6EB51C99F67136C8FCCB">[1]</a><span class="tip"><a href="https://www.cambridge.org/core/books/banachtarski-paradox/9C1FEAACF5EF6EB51C99F67136C8FCCB" target="_blank">The Banach-Tarski Paradox &mdash; Cambridge UP &rarr;</a></span></sup></p>
  <h3>How It Works</h3>
  <p>The key is that the "pieces" are not ordinary geometric shapes. They are non-measurable sets&mdash;collections of points so pathologically scattered that they have no well-defined volume. The construction exploits the fact that a sphere contains uncountably many points, and the Axiom of Choice allows selecting from uncountably many non-empty sets simultaneously to create these bizarre decompositions.</p>
  <h3>The Axiom of Choice Debate</h3>
  <div class="verdict">
    <div class="v-col pro"><h4>Accept It</h4><ul><li>Standard in modern mathematics</li><li>Equivalent to Zorn&rsquo;s Lemma (widely used)</li><li>Non-measurable sets exist but cannot be constructed</li></ul></div>
    <div class="v-col con"><h4>Reject It</h4><ul><li>Banach-Tarski is a reductio ad absurdum</li><li>Constructivists: if you cannot exhibit a set, it does not exist</li><li>Violates physical intuition about volume</li></ul></div>
  </div>
  <div class="callout"><h4>Physical Reality</h4><p>Banach-Tarski is not a physical paradox. The pieces cannot be physically constructed because matter is discrete (made of atoms), not continuous. The paradox lives in the gap between the mathematical continuum and physical reality.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 02 &mdash; Details</div><h2><em>Gabriel&rsquo;s</em> Horn</h2></div>
  <p>Evangelista Torricelli, a student of Galileo, discovered in 1643 that the solid of revolution formed by rotating the curve y = 1/x (for x &ge; 1) around the x-axis has a finite volume of &pi; cubic units but an infinite surface area.</p>
  <h3>The Mathematics</h3>
  <p>Volume = &pi; &int; (1/x&sup2;) dx from 1 to &infin; = &pi;. This integral converges. Surface area = 2&pi; &int; (1/x) &radic;(1 + 1/x&sup4;) dx from 1 to &infin; &ge; 2&pi; &int; (1/x) dx = &infin;. This integral diverges. The apparent paradox&mdash;you can fill it with paint but never paint its surface&mdash;dissolves when you realize that "filling" and "painting" involve different mathematical operations.</p>
  <h3>Resolution</h3>
  <p>The paint analogy misleads because physical paint has thickness. A mathematical "coat of paint" has zero thickness, so an infinite surface area requires infinite paint. But the interior volume is finite because the cross-sectional area shrinks faster than the length grows. The paradox is really about the different rates at which 1/x&sup2; (volume integrand) and 1/x (surface integrand) approach zero.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 03 &mdash; Details</div><h2><em>Hilbert&rsquo;s</em> Hotel</h2></div>
  <p>David Hilbert introduced this thought experiment in a 1924 lecture to illustrate the counterintuitive properties of infinite sets. A hotel with a countably infinite number of rooms, all occupied, can still accommodate any finite or countably infinite number of new guests.</p>
  <h3>Three Scenarios</h3>
  <div class="feat-grid">
    <div class="feat"><h4>One New Guest</h4><p>Move each guest from room n to room n+1. Room 1 is now free. This works because &alef;&#8320; + 1 = &alef;&#8320;.</p></div>
    <div class="feat"><h4>Countably Many Guests</h4><p>Move each guest from room n to room 2n. All odd-numbered rooms are now free. This works because &alef;&#8320; + &alef;&#8320; = &alef;&#8320;.</p></div>
    <div class="feat"><h4>Countably Many Buses</h4><p>Each bus has countably many passengers. Use a prime-power encoding: bus k, seat n goes to room p_k^n. Still works.</p></div>
    <div class="feat"><h4>Uncountably Many Guests</h4><p>This FAILS. Cantor&rsquo;s diagonal argument shows that no scheme can accommodate uncountably many guests in countably many rooms.</p></div>
  </div>
  <div class="callout"><h4>The Defining Property</h4><p>Hilbert&rsquo;s Hotel illustrates the Dedekind definition of infinity: a set is infinite if and only if it can be put in one-to-one correspondence with a proper subset of itself. Finite sets cannot do this; infinite sets always can.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 04 &mdash; Details</div><h2>The <em>Birthday</em> Paradox</h2></div>
  <p>The Birthday Paradox is not a true logical paradox but a striking failure of human probability intuition. Most people estimate that you need about 183 people (half of 365) for a 50% chance of a shared birthday. The actual number is 23.</p>
  <h3>The Calculation</h3>
  <p>For n people, the probability that NO two share a birthday is: P(no match) = (365/365) &times; (364/365) &times; (363/365) &times; ... &times; ((365-n+1)/365). For n = 23, this equals approximately 0.4927, so P(match) &gt; 50%. The key insight: we are not asking "does someone share MY birthday" (which requires ~253 people for 50%) but "do ANY two people share A birthday." The number of pairs grows as n(n-1)/2, which is quadratic.</p>
  <h3>Applications</h3>
  <p>The birthday paradox has practical implications in cryptography (birthday attacks on hash functions), quality control (collision probabilities), and DNA profiling (random match probability). Any system that assumes collisions are unlikely in a small sample is vulnerable to birthday-paradox reasoning.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 05 &mdash; Details</div><h2><em>Monty</em> Hall</h2></div>
  <p>The Monty Hall problem, named after the host of the TV show Let&rsquo;s Make a Deal, became one of the most famous probability puzzles in history after Marilyn vos Savant published the correct solution in her Parade magazine column in 1990.</p>
  <h3>Why Switching Wins</h3>
  <p>Your initial pick is correct with probability 1/3. The remaining 2/3 probability is split between the other two doors. When the host opens a door showing a goat (which he always can, because he knows where the car is), the entire 2/3 probability collapses onto the single remaining unopened door. Switching gives you 2/3; staying gives you 1/3.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 580 140" xmlns="http://www.w3.org/2000/svg">
      <rect x="40" y="20" width="100" height="70" rx="6" class="node-hi"/>
      <text x="90" y="50" text-anchor="middle" class="node-text" font-size="11">Door 1</text>
      <text x="90" y="68" text-anchor="middle" class="lbl-hi" font-size="9">Your pick</text>
      <rect x="180" y="20" width="100" height="70" rx="6" class="node"/>
      <text x="230" y="50" text-anchor="middle" class="node-text" font-size="11">Door 2</text>
      <text x="230" y="68" text-anchor="middle" class="lbl" font-size="9">Host opens</text>
      <rect x="320" y="20" width="100" height="70" rx="6" class="node-hi"/>
      <text x="370" y="50" text-anchor="middle" class="node-text" font-size="11">Door 3</text>
      <text x="370" y="68" text-anchor="middle" class="lbl-hi" font-size="9">Switch here</text>
      <path d="M140 55 Q230 110 320 55" class="edge-hi" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>
      <text x="90" y="110" text-anchor="middle" class="lbl" font-size="10">P = 1/3</text>
      <text x="370" y="110" text-anchor="middle" class="lbl-hi" font-size="10">P = 2/3</text>
      <text x="230" y="130" text-anchor="middle" class="lbl" font-size="9">Host&rsquo;s informed action concentrates probability</text>
    </svg>
  </div>
  <h3>Why It Fooled Everyone</h3>
  <p>The key misconception: people assume the host&rsquo;s action is random. It is not. The host ALWAYS opens a door with a goat, which means his action carries information. If your initial pick was wrong (probability 2/3), the host&rsquo;s action tells you exactly where the car is. The informed nature of the host&rsquo;s choice is what makes switching advantageous.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 06 &mdash; Details</div><h2><em>Simpson&rsquo;s</em> Paradox</h2></div>
  <p>Simpson&rsquo;s paradox occurs when a trend that appears in several groups of data reverses when the groups are combined. It is not merely a statistical curiosity; it is a genuine threat to data-driven decision-making in medicine, law, and public policy.<sup class="fn"><a href="http://www.infocobuild.com/education/audio-video-courses/mathematics/Statistics110-Harvard/lecture-06.html">[2]</a><span class="tip"><a href="http://www.infocobuild.com/education/audio-video-courses/mathematics/Statistics110-Harvard/lecture-06.html" target="_blank">Simpson&rsquo;s Paradox &mdash; Harvard Statistics 110 &rarr;</a></span></sup></p>
  <h3>The Berkeley Admissions Case</h3>
  <p>In 1973, UC Berkeley&rsquo;s graduate admissions appeared to discriminate against women: men were admitted at a higher overall rate. But when examined department by department, women were admitted at equal or higher rates in nearly every department. The reversal occurred because women applied disproportionately to the most competitive departments (humanities), while men applied more to less competitive departments (engineering, sciences) with higher admission rates.</p>
  <h3>Why It Matters</h3>
  <p>Simpson&rsquo;s paradox is dangerous precisely because the aggregate data and the disaggregated data tell opposite stories. A drug may appear effective overall but harmful in every subgroup (or vice versa). A treatment may appear to help men and help women separately but hurt the combined population. The paradox arises from an unobserved confounding variable that affects both the grouping and the outcome.</p>
  <div class="callout"><h4>The Lesson</h4><p>Never draw causal conclusions from aggregate data without considering potential confounders. Simpson&rsquo;s paradox is not a mathematical curiosity&mdash;it is a standing warning against naive data analysis.</p></div>`
];

const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `

      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>3</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Section 03 &middot; Mathematical Paradoxes</div>
        <div class="hero-title">Mathematical <em>Paradoxes</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Banach-Tarski, Hilbert, Monty Hall, Simpson &middot; 1643&ndash;1973 &middot; 7 sources</span></div>
      </div>

  </div>

    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;
  mainInner.appendChild(block);
});

const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const d = document.createElement('div');
  d.className = 'detail';
  d.id = `detail-${idx}`;
  d.innerHTML = details[idx];
  rightInner.appendChild(d);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let ai = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) ai = i; }); items.forEach((item, i) => item.classList.toggle('active', i === ai)); });
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const ad = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!ad) return; const h2 = ad.querySelector('.detail-header h2') || ad.querySelector('h2'); if (!h2) return; const r = h2.getBoundingClientRect(); const pr = rightPanelOuter.getBoundingClientRect(); const tb = document.querySelector('.right-topbar'); if (r.bottom < pr.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); tb.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); tb.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
