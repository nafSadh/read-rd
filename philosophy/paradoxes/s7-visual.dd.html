<script>
const sections = [
  { num: '01', short: 'Penrose', title: 'The <em>Penrose</em> Triangle' },
  { num: '02', short: 'Escher', title: 'M.C. <em>Escher</em>' },
  { num: '03', short: 'Magritte', title: '<em>Magritte&rsquo;s</em> Pipe' },
  { num: '04', short: 'Hofstadter', title: '<em>Strange</em> Loops' },
  { num: '05', short: 'Droste', title: 'The <em>Droste</em> Effect' },
  { num: '06', short: 'Domains', title: 'Self-Reference <em>Across</em> Domains' }
];

const summaries = [
  `<p>Three bars connected at right angles forming a closed triangle. Each corner is a valid 3D joint. The whole figure cannot exist as a 3D object.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Penrose_triangle">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Penrose_triangle" target="_blank">Penrose Triangle &mdash; Wikipedia &rarr;</a></span></sup> Created independently by Oscar Reutersvard (1934) and Lionel and Roger Penrose (1958). Penrose described it as impossibility in its purest form.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1934</div><div class="sl">Reutersvard</div></div>
    <div class="st"><div class="sv">1958</div><div class="sl">Penrose</div></div>
    <div class="st"><div class="sv">Local</div><div class="sl">Consistency</div></div>
    <div class="st"><div class="sv">Global</div><div class="sl">Impossibility</div></div>
  </div>`,

  `<p>M.C. Escher was deeply influenced by the Penroses. His staircases ascend forever in Ascending and Descending (1960). Water flows uphill in Waterfall (1961). Two hands draw each other into existence in Drawing Hands (1948). Escher used rigorous mathematical structure&mdash;tessellations, hyperbolic geometry&mdash;to create visual paradoxes that are locally coherent but globally impossible.</p>
  <div class="s-chips">
    <span class="s-chip">Ascending and Descending</span><span class="s-chip">Waterfall</span><span class="s-chip">Drawing Hands</span><span class="s-chip">Relativity</span>
  </div>`,

  `<p>"Ceci n&rsquo;est pas une pipe." A painting of a pipe is not a pipe.<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Treachery_of_Images">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Treachery_of_Images" target="_blank">The Treachery of Images &mdash; Wikipedia &rarr;</a></span></sup> Magritte (1929) exposes the gap between representation and reality&mdash;the map is not the territory. Foucault analyzed this as an "unraveled calligram" that disrupts the assumed alignment between words, images, and things.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1929</div><div class="sl">Painted</div></div>
    <div class="st"><div class="sv">1968</div><div class="sl">Foucault&rsquo;s essay</div></div>
    <div class="st"><div class="sv">Urgent</div><div class="sl">In the deepfake era</div></div>
  </div>`,

  `<p>Douglas Hofstadter argues in GEB (1979) and I Am a Strange Loop (2007) that Godel, Escher, and Bach all instantiate the same phenomenon: the strange loop.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Strange_loop">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Strange_loop" target="_blank">Strange Loop &mdash; Wikipedia &rarr;</a></span></sup> A system moves through hierarchical levels and unexpectedly returns to its starting level. Hofstadter&rsquo;s deepest claim: consciousness itself is a strange loop.</p>
  <div class="s-chips">
    <span class="s-chip">GEB</span><span class="s-chip">Tangled hierarchy</span><span class="s-chip">Self-model</span><span class="s-chip">Consciousness</span>
  </div>`,

  `<p>Named after a Dutch cocoa brand (1904) whose tin showed a woman holding the same tin. Visual recursion: an image contains a smaller copy of itself, which contains a smaller copy, ad infinitum. Mathematically related to fractals. A playful visual version of Godel&rsquo;s insight: a system containing a representation of itself.</p>
  <div class="s-chips">
    <span class="s-chip">Recursion</span><span class="s-chip">Fractals</span><span class="s-chip">Self-similarity</span><span class="s-chip">1904</span>
  </div>`,

  `<p>The same structural pattern&mdash;a system that refers to itself&mdash;produces paradox in logic, incompleteness in mathematics, undecidability in computation, impossible objects in art, a representation gap in language, and possibly consciousness in the brain. Self-reference is the deepest cross-cutting theme of the entire paradox survey.</p>
  <div class="s-chips">
    <span class="s-chip">Logic</span><span class="s-chip">Mathematics</span><span class="s-chip">Computation</span><span class="s-chip">Art</span><span class="s-chip">Language</span><span class="s-chip">Consciousness</span>
  </div>`
];

const dIcon = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>';

const details = [
  `<div class="detail-header"><div class="num">${dIcon}Section 01 &mdash; Details</div><h2>The <em>Penrose</em> Triangle</h2></div>
  <p>The Penrose triangle (or tribar) was first created by Swedish artist Oscar Reutersvard in 1934 and independently devised by mathematician Roger Penrose and his father Lionel Penrose in 1958.<sup class="fn"><a href="https://www.labrujulaverde.com/en/2024/06/the-penrose-triangle-an-impossible-object-that-defies-euclidean-geometry-and-inspired-escher/">[1]</a><span class="tip"><a href="https://www.labrujulaverde.com/en/2024/06/the-penrose-triangle-an-impossible-object-that-defies-euclidean-geometry-and-inspired-escher/" target="_blank">The Penrose Triangle &mdash; La Brujula Verde &rarr;</a></span></sup></p>
  <h3>Why It Works</h3>
  <p>The human visual system interprets 2D line drawings as projections of 3D objects. Each corner of the Penrose triangle is a valid 3D corner: three bars meeting at right angles. But the three corners, taken together, are geometrically impossible in 3D Euclidean space. The drawing exploits the gap between local consistency (each part looks right) and global consistency (the whole is impossible).</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
      <polygon points="200,30 370,320 30,320" class="node" fill="none" stroke-width="2"/>
      <polygon points="200,80 340,300 60,300" class="node-hi" fill="none" stroke-width="1.5"/>
      <line x1="200" y1="30" x2="200" y2="80" class="edge-hi" stroke-width="1.5"/>
      <line x1="370" y1="320" x2="340" y2="300" class="edge-hi" stroke-width="1.5"/>
      <line x1="30" y1="320" x2="60" y2="300" class="edge-hi" stroke-width="1.5"/>
      <text x="200" y="340" text-anchor="middle" class="lbl-hi" font-size="10">Each corner valid. Whole figure impossible.</text>
    </svg>
  </div>
  <h3>Other Impossible Objects</h3>
  <p>The Penrose triangle belongs to a family of impossible figures including the Penrose stairs (ascending endlessly, used by Escher in Ascending and Descending), the impossible cube (Necker cube variant), and the blivet or devil&rsquo;s tuning fork (three prongs that merge into two). All exploit the same principle: local 3D consistency with global 3D impossibility.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 02 &mdash; Details</div><h2>M.C. <em>Escher</em></h2></div>
  <p>Maurits Cornelis Escher (1898&ndash;1972) was strongly influenced by the Penrose triangle and stairs, which he discovered through a 1958 article by Lionel and Roger Penrose. He transformed these mathematical ideas into works of art that remain iconic.</p>
  <h3>Key Works</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Ascending and Descending (1960)</h4><p>Monks climb a staircase that forms a closed loop. They are always ascending yet never getting higher. Based on the Penrose stairs.</p></div>
    <div class="feat"><h4>Waterfall (1961)</h4><p>Water flows along a channel that incorporates two Penrose triangles, ending up two stories higher than where it started, driving a watermill perpetually.</p></div>
    <div class="feat"><h4>Drawing Hands (1948)</h4><p>A left hand draws a right hand which draws the left hand. Mutual creation with no origin&mdash;a visual causal loop, the artistic analog of self-reference.</p></div>
    <div class="feat"><h4>Relativity (1953)</h4><p>Three gravitational orientations coexist in a single architectural space. Figures walk on walls and ceilings as naturally as on floors.</p></div>
  </div>
  <div class="callout"><h4>Mathematics and Art</h4><p>Escher was not a mathematician, but he engaged deeply with mathematical structures: tessellations (regular division of the plane), hyperbolic geometry (Circle Limit series), and topology (Mobius strips). His work demonstrates that mathematical impossibility can be made visually compelling&mdash;and that the impossible, when locally coherent, is strangely beautiful.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 03 &mdash; Details</div><h2><em>Magritte&rsquo;s</em> Pipe</h2></div>
  <p>Rene Magritte painted The Treachery of Images in 1929.<sup class="fn"><a href="https://www.britannica.com/topic/The-Treachery-of-Images">[2]</a><span class="tip"><a href="https://www.britannica.com/topic/The-Treachery-of-Images" target="_blank">The Treachery of Images &mdash; Britannica &rarr;</a></span></sup> It depicts a realistic pipe with the caption "Ceci n&rsquo;est pas une pipe" ("This is not a pipe"). He was correct: it is not a pipe. It is a painting of a pipe. You cannot fill it with tobacco. You cannot smoke it.</p>
  <h3>Foucault&rsquo;s Analysis</h3>
  <p>Michel Foucault wrote a 1968 essay analyzing the painting as an "unraveled calligram"&mdash;a text-image that disrupts the assumed alignment between words, pictures, and things. In a calligram, text and image reinforce each other. Magritte separates them: the image says "pipe" while the text says "not a pipe." The disruption forces the viewer to confront the difference between representation and reality.</p>
  <h3>Contemporary Relevance</h3>
  <p>In the age of deepfakes, AI-generated imagery, and social media, Magritte&rsquo;s point is urgent. We habitually treat images as transparent windows onto reality. They are not. They are representations, constructed and selected, that create an appearance of direct access to the thing itself. The image is not the thing, and our habit of confusing them has political, social, and epistemic consequences.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 04 &mdash; Details</div><h2><em>Strange</em> Loops</h2></div>
  <p>Douglas Hofstadter introduced the concept of the strange loop in Godel, Escher, Bach: An Eternal Golden Braid (1979) and developed it further in I Am a Strange Loop (2007). A strange loop occurs when movement through the levels of a hierarchical system unexpectedly returns to the starting level.</p>
  <h3>Three Instantiations</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Godel</h4><p>A formal sentence refers to its own provability, ascending from the object level to the meta-level and back. The self-referential sentence cannot be proved, creating an incompleteness at the heart of the system.</p></div>
    <div class="feat"><h4>Escher</h4><p>Stairs ascend through all levels and return to the starting level. Water flows uphill and drives a watermill. The visual hierarchy loops back on itself.</p></div>
    <div class="feat"><h4>Bach</h4><p>The Canon per Tonos from The Musical Offering modulates upward through all keys and returns to the original key. The listener has ascended yet arrived where they started.</p></div>
    <div class="feat"><h4>Consciousness</h4><p>Hofstadter&rsquo;s deepest claim: the "I" is a self-referential symbol in the brain. Consciousness is what happens when a sufficiently complex system models itself. The strange loop of self-reference IS the mechanism of subjective experience.</p></div>
  </div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 05 &mdash; Details</div><h2>The <em>Droste</em> Effect</h2></div>
  <p>The Droste effect is named after a Dutch chocolate brand whose 1904 packaging showed a nurse carrying a tray with a cup and a box of Droste chocolate&mdash;which itself showed the same image, recursively. The effect is visual self-reference: an image that contains a smaller version of itself, which contains a still smaller version, ad infinitum.</p>
  <h3>Mathematical Connections</h3>
  <p>The Droste effect is mathematically related to fractals&mdash;structures that exhibit self-similarity at every scale. The Mandelbrot set, Koch snowflake, and Sierpinski triangle all contain copies of themselves at smaller scales. In 2003, mathematicians Hendrik Lenstra and Bart de Smit used conformal mapping to fill the "hole" in Escher&rsquo;s Print Gallery, revealing a Droste-like recursive structure at the heart of the lithograph.</p>
  <div class="callout"><h4>Recursion Everywhere</h4><p>The Droste effect is the visual analog of mathematical recursion: a function defined in terms of itself. It connects to Godel&rsquo;s self-referential sentences, to recursive functions in computer science, and to Hofstadter&rsquo;s strange loops. Self-reference&mdash;a system containing a representation of itself&mdash;appears to be a fundamental structural pattern that transcends any single domain.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 06 &mdash; Details</div><h2>Self-Reference <em>Across</em> Domains</h2></div>
  <p>The deepest theme of this entire paradox survey is self-reference: a system that refers to, represents, or models itself. The same structural pattern appears in every domain we have studied, producing different results depending on the medium.</p>
  <h3>The Universal Pattern</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Logic</h4><p>"This sentence is false" &rarr; paradox. Self-reference + negation = contradiction. No consistent truth assignment possible.</p></div>
    <div class="feat"><h4>Mathematics</h4><p>"This statement is not provable" &rarr; incompleteness. Godel&rsquo;s self-referential sentence reveals the inherent limits of formal systems.</p></div>
    <div class="feat"><h4>Computation</h4><p>"Does this program halt on itself?" &rarr; undecidability. Turing&rsquo;s diagonal applied to programs produces an unsolvable problem.</p></div>
    <div class="feat"><h4>Visual Art</h4><p>Stairs that return to start &rarr; impossible objects. Escher&rsquo;s local coherence + global self-reference = visual impossibility.</p></div>
    <div class="feat"><h4>Language</h4><p>"This is not a pipe" &rarr; representation gap. Magritte&rsquo;s self-referential caption disrupts the image-reality assumption.</p></div>
    <div class="feat"><h4>Consciousness</h4><p>Brain modeling itself &rarr; strange loops. Hofstadter: the "I" is the system&rsquo;s self-model, and this recursive self-reference may be consciousness itself.</p></div>
  </div>
  <div class="callout"><h4>The Unity of Paradoxes</h4><p>From Epimenides to Godel to Escher to Hofstadter, one structural pattern recurs: a system that attempts to refer to itself creates either paradox, impossibility, art, or consciousness. Self-reference is not a bug in our conceptual systems; it is a fundamental feature of any sufficiently complex system. Understanding it&mdash;or accepting that it cannot be fully understood&mdash;is the central lesson of 2,500 years of paradox.</p></div>`
];

const shell = document.createElement('div'); shell.className = 'shell';
shell.innerHTML = `<div class="ctrl-group" id="ctrl-group"><button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button><button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()"><span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span><span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span></button></div>
  <nav class="sidebar" id="sidebar"><div class="sidebar-head"><div class="sidebar-logo">S<em>7</em></div></div><div class="sidebar-nav" id="sidebar-nav"></div></nav>
  <div class="main" id="main"><div class="main-head"><div class="main-head-inner"><div class="hero-badge"><span class="dot"></span> Section 07 &middot; Visual &amp; Self-Reference</div><div class="hero-title">Visual &amp; <em>Self-Reference</em></div><div class="masthead-rule"></div><div class="masthead-sub"><span>Penrose, Escher, Magritte, Hofstadter &middot; 1929&ndash;2007 &middot; 7 sources</span></div></div></div><div class="main-scroll" id="main-scroll"></div></div>
  <div class="right closed" id="right"><div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div><div class="right-inner" id="right-inner"></div></div>`;
document.body.appendChild(shell);
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => { const item = document.createElement('div'); item.className = 'sidebar-item' + (idx === 0 ? ' active' : ''); item.setAttribute('data-label', sec.short); item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`; item.onclick = () => scrollToSection(idx); sidebarNav.appendChild(item); });
const sidebarTip = document.createElement('div'); sidebarTip.className = 'sidebar-tooltip'; document.body.appendChild(sidebarTip); const sidebarEl = document.querySelector('.sidebar'); let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => { if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const item = e.target.closest('.sidebar-item'); if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const rect = item.getBoundingClientRect(); const sRight = sidebarEl.getBoundingClientRect().right; sidebarTip.textContent = item.getAttribute('data-label'); sidebarTip.style.left = (sRight - 1) + 'px'; sidebarTip.style.top = rect.top + 'px'; sidebarTip.style.height = rect.height + 'px'; if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); } });
const mainScroll = document.getElementById('main-scroll'); const mainInner = document.createElement('div'); mainInner.className = 'main-scroll-inner'; mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`; mainInner.appendChild(block); });
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => { const d = document.createElement('div'); d.className = 'detail'; d.id = `detail-${idx}`; d.innerHTML = details[idx]; rightInner.appendChild(d); });
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let ai = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) ai = i; }); items.forEach((item, i) => item.classList.toggle('active', i === ai)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const ad = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!ad) return; const h2 = ad.querySelector('.detail-header h2') || ad.querySelector('h2'); if (!h2) return; const r = h2.getBoundingClientRect(); const pr = rightPanelOuter.getBoundingClientRect(); const tb = document.querySelector('.right-topbar'); if (r.bottom < pr.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); tb.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); tb.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
