<script>
const sections = [
  { num: '01', short: 'Ship', title: '<em>Ship</em> of Theseus' },
  { num: '02', short: 'Teletransporter', title: 'The <em>Teletransporter</em>' },
  { num: '03', short: 'Swampman', title: '<em>Swampman</em>' },
  { num: '04', short: 'Chinese Room', title: 'The <em>Chinese</em> Room' },
  { num: '05', short: 'AI Relevance', title: '<em>AI</em> Relevance' }
];

const summaries = [
  `<p>Plutarch recorded that the Athenians preserved the ship of Theseus, replacing each plank as it decayed. Is it the same ship after every plank has been replaced? Hobbes added a twist: if someone builds a second ship from the removed planks, which is the "real" Ship of Theseus? Neither answer is free of problems.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1st c.</div><div class="sl">Plutarch</div></div>
    <div class="st"><div class="sv">2</div><div class="sl">Competing ships</div></div>
    <div class="st"><div class="sv">Unsolved</div><div class="sl">Status</div></div>
  </div>`,

  `<p>Derek Parfit (1984): a machine scans your body, destroys it, transmits the data to Mars, and builds a perfect replica. Is the Mars person you?<sup class="fn"><a href="https://en.wikipedia.org/wiki/Teletransportation_paradox">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Teletransportation_paradox" target="_blank">Teletransportation Paradox &mdash; Wikipedia &rarr;</a></span></sup> Now suppose the machine malfunctions and does not destroy the original. There are two of you. Which is the real you? Parfit&rsquo;s radical answer: the question has no answer because personal identity is not what matters.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1984</div><div class="sl">Parfit</div></div>

  `<p>Donald Davidson (1987): lightning simultaneously kills Davidson and creates a molecule-for-molecule duplicate from swamp matter. Swampman walks to Davidson&rsquo;s office, gives his lectures, kisses his wife. Does Swampman have beliefs? Davidson says no: Swampman&rsquo;s brain states lack the causal history that connects them to the world.</p>
  <div class="s-chips">

  </div>`,

  `<p>Searle (1980): a person in a room receives Chinese characters, follows an English rulebook, and outputs appropriate Chinese responses. The room passes the Turing test. Does the room understand Chinese?<sup class="fn"><a href="https://plato.stanford.edu/entries/chinese-room/">[2]</a><span class="tip"><a href="https://plato.stanford.edu/entries/chinese-room/" target="_blank">Chinese Room Argument &mdash; SEP &rarr;</a></span></sup> Searle says no: syntax is never sufficient for semantics. Following rules is not understanding.</p>

const details = [
  `<div class="detail-header"><div class="num">${dIcon}Section 01 &mdash; Details</div><h2><em>Ship</em> of Theseus</h2></div>
  <p>Plutarch recorded this problem in the 1st century CE: the Athenians preserved the legendary ship of Theseus, replacing each plank as it rotted. Over the centuries, every original plank was replaced. Was the result still the Ship of Theseus?</p>
  <h3>Hobbes&rsquo;s Twist</h3>
  <p>Thomas Hobbes sharpened the paradox: suppose someone collects all the removed planks and assembles them into a second ship. Now there are two candidates for the title. The maintained ship has spatiotemporal continuity (it has been the "Ship of Theseus" at every moment). The reassembled ship has material continuity (it is made of the original materials). Which one is the Ship of Theseus?</p>
  <h3>Two Views of Identity</h3>
  <div class="verdict">
    <div class="v-col pro"><h4>Functional Continuity</h4><ul><li>The maintained ship is the real one</li><li>Identity tracks continuous existence in space and time</li><li>We do this with people: you are the same person despite cell replacement</li></ul></div>
    <div class="v-col con"><h4>Material Continuity</h4><ul><li>The reassembled ship is the real one</li><li>Identity tracks physical composition</li><li>A perfect copy is still a copy</li></ul></div>
  </div>
  <div class="callout"><h4>Everyday Application</h4><p>Your body replaces its cells continuously. Over 7-10 years, most of your atoms have been replaced. Are you the same person? The Ship of Theseus forces us to clarify what we mean by "same" before we can answer.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 02 &mdash; Details</div><h2>The <em>Teletransporter</em></h2></div>
  <p>Derek Parfit introduced this thought experiment in <em>Reasons and Persons</em> (1984),<sup class="fn"><a href="https://www.scienceme.com/the-teleporter-thought-experiment/">[1]</a><span class="tip"><a href="https://www.scienceme.com/the-teleporter-thought-experiment/" target="_blank">The Teleporter Thought Experiment &mdash; ScienceMe &rarr;</a></span></sup> building on earlier discussions by Bernard Williams and others.</p>
  <h3>Case 1: Destruction + Reconstruction</h3>
  <p>The machine scans your body at the molecular level, destroys the original, transmits the data to Mars, and builds an exact replica. The Mars person has all your memories, personality traits, beliefs, and intentions. Most people, after reflection, accept that this IS you. You have been teletransported.</p>
  <h3>Case 2: The Malfunction</h3>
  <p>The machine builds the Mars replica but fails to destroy the Earth original. Now there are two people with identical memories, personalities, and beliefs. Which one is you? Both have equal claim. Parfit&rsquo;s radical conclusion: the question is malformed. Personal identity is not what matters. What matters is psychological continuity (Relation R): memory connections, personality, intentions, character. Relation R can hold between you and multiple future persons, or to degrees. Identity is not a binary, all-or-nothing property.</p>
  <div class="callout"><h4>The Buddhist Connection</h4><p>Parfit acknowledged the parallel with Buddhist philosophy: the self is a conventional label, not an ultimate reality. What exists is a stream of causally connected experiences, not an enduring subject. This convergence between analytical philosophy and Buddhist metaphysics is one of the most remarkable parallels in intellectual history.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 03 &mdash; Details</div><h2><em>Swampman</em></h2></div>
  <p>Donald Davidson introduced this thought experiment in 1987. Lightning simultaneously kills Davidson in a swamp and, by a cosmic coincidence, rearranges swamp molecules into a molecule-for-molecule duplicate of Davidson. Swampman emerges from the swamp, walks to Davidson&rsquo;s office, gives his scheduled lecture, greets his colleagues by name, and goes home to Davidson&rsquo;s wife.</p>
  <h3>Davidson&rsquo;s Surprising Answer</h3>
  <p>Davidson, who invented the thought experiment, concluded that Swampman does NOT have beliefs, desires, or thoughts with genuine content. Why? Because Swampman&rsquo;s brain states have no causal history connecting them to the world. Swampman has never SEEN a tree; his brain states that we would describe as "tree-thoughts" were not caused by encounters with trees but by a lightning strike. On Davidson&rsquo;s externalist theory of mental content, mental states get their meaning from their causal connections to the world. No causal history means no genuine content.</p>
  <h3>The Internalism/Externalism Debate</h3>
  <p>Most philosophers find Davidson&rsquo;s conclusion counterintuitive: Swampman is physically identical to Davidson and behaves identically. How can he lack beliefs? The thought experiment sharply divides internalists (mental content is determined by brain states alone) from externalists (mental content depends on causal relations to the environment). The debate remains unresolved and connects directly to questions about AI consciousness.</p>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 04 &mdash; Details</div><h2>The <em>Chinese</em> Room</h2></div>
  <p>John Searle published this thought experiment in 1980.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Chinese_room">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Chinese_room" target="_blank">Chinese Room &mdash; Wikipedia &rarr;</a></span></sup> Imagine Searle locked in a room with a comprehensive rulebook for manipulating Chinese characters. Chinese speakers pass questions under the door; Searle follows the rulebook and passes back answers. From outside, the room passes the Turing test. But Searle does not understand Chinese. He is manipulating symbols according to syntactic rules without any semantic understanding.</p>
  <h3>Major Objections</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Systems Reply</h4><p>Searle doesn&rsquo;t understand, but the SYSTEM (Searle + rulebook + room) does. Understanding is a property of the whole system, not of any individual component.</p></div>
    <div class="feat"><h4>Robot Reply</h4><p>The room lacks embodiment. Put the program in a robot that can see, touch, and interact with the world, and understanding might emerge from grounded interaction.</p></div>
    <div class="feat"><h4>Brain Simulator Reply</h4><p>What if the rulebook simulates a Chinese speaker&rsquo;s brain neuron by neuron? If we deny understanding to this system, we deny it to the brain itself.</p></div>
    <div class="feat"><h4>Other Minds Reply</h4><p>How do you know ANYONE understands? We attribute understanding based on behavior. The room produces the right behavior. By what criterion do we deny it understanding?</p></div>
  </div>
  <div class="callout"><h4>Searle&rsquo;s Response</h4><p>Searle insists that none of these replies add anything beyond syntax. Computation is defined syntactically; no amount of syntactic manipulation can produce genuine semantic understanding. The deep claim: there is something it is like to understand, and symbol manipulation alone never produces that something.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 05 &mdash; Details</div><h2><em>AI</em> Relevance</h2></div>
  <p>The identity and mind paradoxes are not academic curiosities. They bear directly on some of the most urgent questions in AI and neuroscience.</p>
  <h3>Direct Connections</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Chinese Room &rarr; LLMs</h4><p>Does GPT understand language or just manipulate tokens? The systems reply is arguably stronger for LLMs than for Searle&rsquo;s room, but the core question persists. If understanding requires grounding, LLMs may lack it.</p></div>
    <div class="feat"><h4>Teletransporter &rarr; Brain Uploading</h4><p>If we scan a brain and run it on silicon, is the result the same person? Parfit would say: wrong question. Right question: does Relation R (psychological continuity) hold?</p></div>
    <div class="feat"><h4>Ship of Theseus &rarr; Gradual Integration</h4><p>Replace neurons one by one with silicon chips. At what point, if any, does the person stop being the same person? The Ship suggests the answer depends on whether we track function or substrate.</p></div>
    <div class="feat"><h4>Swampman &rarr; AI Beliefs</h4><p>If an AI&rsquo;s internal states have no causal history in the human sense, can it have genuine beliefs? Davidson&rsquo;s externalism says no; internalists say if the states are functionally identical, yes.</p></div>
  </div>
  <div class="callout"><h4>The Stakes</h4><p>How we answer these questions matters for ethics and policy. If AI systems can genuinely understand (contra Searle), they may deserve moral consideration. If personal identity survives uploading (contra skeptics), digital copies may have rights. The paradoxes of identity are becoming engineering questions.</p></div>`
];
