<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Liar', title: 'The <em>Liar</em> Paradox' },
  { num: '02', short: 'Russell', title: '<em>Russell&rsquo;s</em> Paradox' },
  { num: '03', short: 'Crisis', title: 'The <em>Foundational</em> Crisis' },
  { num: '04', short: 'Curry', title: '<em>Curry&rsquo;s</em> Paradox' },
  { num: '05', short: 'Grelling', title: '<em>Grelling-Nelson</em>' },
  { num: '06', short: 'Berry', title: '<em>Berry&rsquo;s</em> Paradox' },
  { num: '07', short: 'Diagonal', title: 'The <em>Diagonal</em> Pattern' }
];

const summaries = [
  `<p>"This sentence is false." If true, it&rsquo;s false. If false, it&rsquo;s true. No consistent truth assignment is possible.<sup class="fn"><a href="https://plato.stanford.edu/entries/paradoxes-contemporary-logic/">[1]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradoxes-contemporary-logic/" target="_blank">Paradoxes and Contemporary Logic &mdash; SEP &rarr;</a></span></sup> Attributed to Eubulides of Miletus (~400 BCE), this simple construction shows that self-reference combined with negation creates contradiction in any language that can talk about its own truth.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">~400 BCE</div><div class="sl">Eubulides</div></div>
    <div class="st"><div class="sv">0</div><div class="sl">Consistent truth values</div></div>
    <div class="st"><div class="sv">2,400 yr</div><div class="sl">Still debated</div></div>
  </div>`,

  `<p>Consider the set R of all sets that do not contain themselves. Is R a member of R?<sup class="fn"><a href="https://plato.stanford.edu/entries/russell-paradox/">[2]</a><span class="tip"><a href="https://plato.stanford.edu/entries/russell-paradox/" target="_blank">Russell's Paradox &mdash; SEP &rarr;</a></span></sup> If yes, then by definition it is not. If no, then by definition it is. Russell communicated this to Frege in 1902, destroying the logical foundations Frege had spent his career building. Frege&rsquo;s response, appended to his own book, remains one of the most honest admissions of defeat in intellectual history.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1901</div><div class="sl">Discovered</div></div>
    <div class="st"><div class="sv">1902</div><div class="sl">Letter to Frege</div></div>
    <div class="st"><div class="sv">1908</div><div class="sl">ZFC response</div></div>
  </div>`,

  `<p>Russell and Whitehead spent a decade writing Principia Mathematica (1910&ndash;1913), attempting to derive all of mathematics from logic. It took 362 pages to prove 1+1=2. Then G&ouml;del showed in 1931 that any consistent system powerful enough for arithmetic is necessarily incomplete&mdash;it contains true statements that cannot be proved within the system.<sup class="fn"><a href="https://tomrocksmaths.com/2023/11/08/mathematical-philosophy-russell-godel-and-incompleteness/">[3]</a><span class="tip"><a href="https://tomrocksmaths.com/2023/11/08/mathematical-philosophy-russell-godel-and-incompleteness/" target="_blank">Russell, G&ouml;del and Incompleteness &mdash; Tom Rocks Maths &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">1910&ndash;13</div><div class="sl">Principia</div></div>
    <div class="st"><div class="sv">362</div><div class="sl">Pages for 1+1=2</div></div>
    <div class="st"><div class="sv">1931</div><div class="sl">G&ouml;del&rsquo;s proof</div></div>
  </div>`,

  `<p>"If this sentence is true, then Santa Claus exists." If we have a self-referential conditional X where X = (X &rarr; Y), we can prove Y for any Y.<sup class="fn"><a href="https://plato.stanford.edu/entries/curry-paradox/">[4]</a><span class="tip"><a href="https://plato.stanford.edu/entries/curry-paradox/" target="_blank">Curry's Paradox &mdash; SEP &rarr;</a></span></sup> Unlike the Liar, Curry&rsquo;s paradox does not require negation&mdash;just a self-referential conditional. This matters because some proposed solutions to the Liar restrict negation; Curry shows the problem runs deeper.</p>
  <div class="s-chips">
    <span class="s-chip">No negation needed</span><span class="s-chip">Self-referential conditional</span><span class="s-chip">Proves anything</span>
  </div>`,

  `<p>"Autological" describes words that describe themselves: "short" is short, "English" is English. "Heterological" describes words that don&rsquo;t describe themselves: "long" is not long.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Grelling%E2%80%93Nelson_paradox">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Grelling%E2%80%93Nelson_paradox" target="_blank">Grelling-Nelson Paradox &mdash; Wikipedia &rarr;</a></span></sup> Is "heterological" heterological? If yes, it describes itself, so it is autological. If no, it does not describe itself, so it IS heterological. Same diagonal structure as Russell&rsquo;s, applied to adjectives instead of sets.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1908</div><div class="sl">Formulated</div></div>
    <div class="st"><div class="sv">Same</div><div class="sl">Structure as Russell</div></div>
  </div>`,

  `<p>"The smallest positive integer not definable in fewer than sixty letters." This sentence defines that number in fewer than sixty letters&mdash;contradiction. Berry&rsquo;s paradox reveals that "definability" is a treacherous concept when applied self-referentially. It shows that the notion of linguistic definability cannot be made mathematically precise without careful restrictions.</p>
  <div class="s-chips">
    <span class="s-chip">Self-reference</span><span class="s-chip">Definability</span><span class="s-chip">Natural language</span><span class="s-chip">Meta-mathematics</span>
  </div>`,

  `<p>All these paradoxes share Cantor&rsquo;s diagonal structure: construct an object that differs from every item in a list by differing from the nth item in its nth position.<sup class="fn"><a href="https://plato.stanford.edu/entries/paradoxes-contemporary-logic/">[6]</a><span class="tip"><a href="https://plato.stanford.edu/entries/paradoxes-contemporary-logic/" target="_blank">Paradoxes and Contemporary Logic &mdash; SEP &rarr;</a></span></sup> G&ouml;del and Turing formalized this pattern, showing it generates fundamental impossibility results rather than mere puzzles. The diagonal argument is the deepest structural pattern in logic.</p>
  <div class="s-chips">
    <span class="s-chip">Cantor</span><span class="s-chip">G&ouml;del</span><span class="s-chip">Turing</span><span class="s-chip">Self-reference</span><span class="s-chip">Diagonalization</span>
  </div>`
];

const dIcon = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>';

const details = [
  `<div class="detail-header"><div class="num">${dIcon}Section 01 &mdash; Details</div><h2>The <em>Liar</em> Paradox</h2></div>
  <p>The Liar is the oldest and most fundamental of the logical paradoxes. Eubulides of Miletus formulated it around 400 BCE, though the idea has roots in Epimenides&rsquo; earlier claim that all Cretans are liars. The genuine Liar&mdash;"This sentence is false"&mdash;admits no consistent truth value. If we assign it "true," then what it says obtains, so it is false. If we assign it "false," then it is not the case that it is false, so it is true.</p>
  <h3>Responses to the Liar</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Tarski&rsquo;s Hierarchy</h4><p>Separate object-language from meta-language. "True" at level N can only be predicated of sentences at level N-1. The Liar sentence, which tries to predicate truth of itself, is ill-formed.</p></div>
    <div class="feat"><h4>Kripke&rsquo;s Fixed Points</h4><p>Allow truth-value gaps: some sentences are neither true nor false. The Liar is "ungrounded"&mdash;its truth value depends on itself and cannot be determined.</p></div>
    <div class="feat"><h4>Dialetheism</h4><p>Accept that the Liar is both true and false. Graham Priest&rsquo;s paraconsistent logic tolerates controlled contradictions without explosion (ex contradictione quodlibet).</p></div>
    <div class="feat"><h4>Revision Theory</h4><p>Truth is not a static property but a process. The Liar cycles: true &rarr; false &rarr; true &rarr; false, never stabilizing. The cycling itself is the "answer."</p></div>
  </div>
  <div class="callout"><h4>The Deep Lesson</h4><p>The Liar shows that any sufficiently expressive language&mdash;one that can talk about its own truth&mdash;will contain sentences that resist consistent truth-value assignment. This is not a defect of natural language; it is a structural feature of self-referential systems.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 02 &mdash; Details</div><h2><em>Russell&rsquo;s</em> Paradox</h2></div>
  <p>In 1901, Bertrand Russell discovered that Gottlob Frege&rsquo;s system of naive set theory&mdash;which allowed the construction of any set definable by a property&mdash;was inconsistent.<sup class="fn"><a href="https://lawrencecpaulson.github.io/2024/01/31/Russells_Paradox.html">[1]</a><span class="tip"><a href="https://lawrencecpaulson.github.io/2024/01/31/Russells_Paradox.html" target="_blank">Russell's Paradox: Myth and Fact &mdash; Paulson 2024 &rarr;</a></span></sup> The paradox: consider R = {x : x &notin; x}. Is R &isin; R? Both answers lead to contradiction.</p>
  <h3>The Letter to Frege</h3>
  <p>Russell communicated his discovery to Frege in June 1902, just as Frege was completing the second volume of his <em>Grundgesetze der Arithmetik</em>. Frege acknowledged the problem in a famous appendix. The discovery sent shockwaves through the foundations of mathematics and launched what became known as the foundational crisis.</p>
  <h3>Responses</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Russell&rsquo;s Type Theory</h4><p>Stratify the universe into types. Sets of individuals are type 1, sets of sets are type 2, and so on. No set can contain itself because it would need to be of a higher type than itself.</p></div>
    <div class="feat"><h4>Zermelo-Fraenkel (ZFC)</h4><p>Restrict set formation. Not every property defines a set. The axiom schema of separation allows forming subsets, but not the universal set or the Russell set.</p></div>
  </div>
  <div class="diagram-wrap">
    <svg viewBox="0 0 580 140" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="290" cy="70" rx="200" ry="50" class="node-hi" fill="none"/>
      <text x="290" y="30" text-anchor="middle" class="lbl-hi" font-size="10">R = { x : x &notin; x }</text>
      <text x="180" y="75" text-anchor="middle" class="node-text" font-size="11">R &isin; R?</text>
      <text x="180" y="95" text-anchor="middle" class="lbl" font-size="9">&rArr; R &notin; R</text>
      <text x="400" y="75" text-anchor="middle" class="node-text" font-size="11">R &notin; R?</text>
      <text x="400" y="95" text-anchor="middle" class="lbl" font-size="9">&rArr; R &isin; R</text>
      <path d="M230 80 Q290 120 350 80" class="edge-hi" stroke-width="1.5" fill="none"/>
      <path d="M350 80 Q290 40 230 80" class="edge-hi" stroke-width="1.5" fill="none"/>
      <text x="290" y="130" text-anchor="middle" class="lbl-hi" font-size="10">Infinite loop: no consistent membership</text>
    </svg>
  </div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 03 &mdash; Details</div><h2>The <em>Foundational</em> Crisis</h2></div>
  <p>The period from 1900 to 1931 was the most turbulent in the history of mathematical foundations. Russell&rsquo;s paradox shattered naive set theory; the race was on to rebuild mathematics on solid ground.</p>
  <h3>Principia Mathematica</h3>
  <p>Russell and Whitehead attempted to derive all of mathematics from pure logic, using type theory to avoid paradoxes. The result, published in three volumes from 1910 to 1913, was monumental in ambition but unwieldy in practice. The proof of 1+1=2 spans 362 pages and arrives only in Volume II.</p>
  <h3>G&ouml;del&rsquo;s Incompleteness Theorems (1931)</h3>
  <p>Kurt G&ouml;del proved two devastating results. The First Incompleteness Theorem: any consistent formal system powerful enough to express basic arithmetic contains true statements that cannot be proved within the system. The Second: no such system can prove its own consistency. The method is a formal version of the Liar&mdash;G&ouml;del constructed a sentence G that says "G is not provable." If G is provable, the system is inconsistent. If G is not provable, it is true but unprovable.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">1901</div><div class="tl-text">Russell discovers the paradox of the set of all non-self-membered sets</div></div>
    <div class="tl-item"><div class="tl-date">1908</div><div class="tl-text">Zermelo publishes axiomatic set theory, avoiding Russell&rsquo;s paradox</div></div>
    <div class="tl-item"><div class="tl-date">1910&ndash;13</div><div class="tl-text">Principia Mathematica attempts to ground all of mathematics in logic</div></div>
    <div class="tl-item"><div class="tl-date">1931</div><div class="tl-text">G&ouml;del proves that completeness and consistency are incompatible</div></div>
    <div class="tl-item"><div class="tl-date">1936</div><div class="tl-text">Turing proves the halting problem undecidable&mdash;the diagonal strikes again</div></div>
  </div>
  <div class="callout"><h4>Why It Matters</h4><p>G&ouml;del did not destroy mathematics. He showed it has inherent limits. Every sufficiently powerful formal system is either incomplete (there are truths it cannot prove) or inconsistent (it proves falsehoods). This is not a failure of mathematics but a fundamental fact about the structure of formal reasoning.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 04 &mdash; Details</div><h2><em>Curry&rsquo;s</em> Paradox</h2></div>
  <p>Haskell Curry discovered in 1942 that self-referential conditionals, even without negation, produce paradoxes. Consider a sentence X defined as "If X is true, then Y" (for any statement Y).<sup class="fn"><a href="https://plato.stanford.edu/entries/curry-paradox/">[2]</a><span class="tip"><a href="https://plato.stanford.edu/entries/curry-paradox/" target="_blank">Curry's Paradox &mdash; SEP &rarr;</a></span></sup></p>
  <h3>The Derivation</h3>
  <p>Assume X is true. Then "If X, then Y" is true. Since X is true and X implies Y, by modus ponens, Y is true. We have proved: if X is true, then Y. But that IS X. So X is true. Therefore Y is true. We have proved any statement Y from the mere existence of the self-referential conditional.</p>
  <h3>Why Curry Is Deeper Than the Liar</h3>
  <p>Many proposed solutions to the Liar paradox restrict the use of negation or the truth predicate. Curry&rsquo;s paradox shows that the problem is not negation but self-reference combined with certain inference rules (contraction, modus ponens). Any solution must address the structural issue of self-reference itself, not just its interaction with negation.</p>
  <div class="callout"><h4>In Programming</h4><p>Curry&rsquo;s paradox has a direct analog in type theory: unrestricted recursion in type systems allows programs that inhabit any type, undermining type safety. This is why programming languages require termination checking or restrict recursive types.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 05 &mdash; Details</div><h2><em>Grelling-Nelson</em> Paradox</h2></div>
  <p>Kurt Grelling and Leonard Nelson published this paradox in 1908, the same period as the foundational crisis. It applies Russell&rsquo;s diagonal structure to natural language rather than set theory.</p>
  <h3>The Setup</h3>
  <p>Call a word "autological" if it describes itself. "Short" is short (five letters). "English" is English (an English word). "Polysyllabic" is polysyllabic. Call a word "heterological" if it does not describe itself. "Long" is not long (four letters). "French" is not French (it&rsquo;s an English word). "Monosyllabic" is not monosyllabic.</p>
  <h3>The Paradox</h3>
  <p>Is "heterological" heterological? If yes: it describes itself, meaning it IS self-describing, meaning it is autological&mdash;contradiction. If no: it does not describe itself, meaning it IS not self-describing, meaning it IS heterological&mdash;contradiction. The structure is identical to Russell&rsquo;s: substitute "does not describe itself" for "does not contain itself."</p>
  <div class="verdict">
    <div class="v-col pro"><h4>Shared Structure</h4><ul><li>Diagonal self-reference</li><li>Binary classification</li><li>The classifier applied to itself</li></ul></div>
    <div class="v-col con"><h4>No Clean Resolution</h4><ul><li>Cannot simply ban the word</li><li>Natural language resists formal restriction</li><li>Reveals limits of semantic classification</li></ul></div>
  </div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 06 &mdash; Details</div><h2><em>Berry&rsquo;s</em> Paradox</h2></div>
  <p>Berry&rsquo;s paradox, communicated by G.G. Berry to Bertrand Russell around 1906, targets the concept of definability. Consider the phrase: "The smallest positive integer not definable in fewer than sixty letters." Count the letters in that phrase. It has fewer than sixty. So the phrase defines, in fewer than sixty letters, a number that supposedly cannot be defined in fewer than sixty letters.</p>
  <h3>What Goes Wrong</h3>
  <p>The paradox reveals that "definable in English" is not a mathematically precise concept. Natural language definitions involve ambiguity, context-dependence, and self-reference in ways that resist formalization. The lesson: not every well-formed English phrase picks out a well-defined mathematical object.</p>
  <h3>Richard&rsquo;s Paradox (1905)</h3>
  <p>A closely related paradox by Jules Richard: enumerate all real numbers definable by finite English expressions. Use Cantor&rsquo;s diagonal argument to construct a number that differs from the nth number in its nth digit. This new number is definable by the expression we just used&mdash;but it was supposed to be absent from the enumeration. The paradox sharpened the distinction between formal and informal definability that G&ouml;del would later exploit.</p>
  <div class="callout"><h4>Connection to G&ouml;del</h4><p>G&ouml;del&rsquo;s proof of the incompleteness theorem formalizes the intuition behind Berry&rsquo;s paradox. Where Berry exploits "definable in English," G&ouml;del replaces it with "provable in a formal system"&mdash;a concept precise enough to generate a rigorous impossibility result rather than a mere puzzle.</p></div>`,

  `<div class="detail-header"><div class="num">${dIcon}Section 07 &mdash; Details</div><h2>The <em>Diagonal</em> Pattern</h2></div>
  <p>Georg Cantor&rsquo;s 1891 diagonal argument proved that the real numbers are uncountable: no list of real numbers can be complete, because you can always construct a new number that differs from the nth number in its nth digit. This same structural pattern underlies every paradox in this section.</p>
  <h3>The Pattern Across Domains</h3>
  <div class="feat-grid">
    <div class="feat"><h4>Cantor (1891)</h4><p>Diagonal construction proves the reals are uncountable. The constructed number differs from every listed number.</p></div>
    <div class="feat"><h4>Russell (1901)</h4><p>The set R differs from every set in the "list" (the universe of sets) in its self-membership property.</p></div>
    <div class="feat"><h4>G&ouml;del (1931)</h4><p>The sentence G differs from every provable sentence by being true but unprovable. Constructed via diagonal self-reference.</p></div>
    <div class="feat"><h4>Turing (1936)</h4><p>The halting-detection machine H fails on the program that asks "Does H halt on itself?" Diagonal applied to computation.</p></div>
  </div>
  <div class="diagram-wrap">
    <svg viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="40" y="20" width="120" height="36" rx="4" class="node-hi"/>
      <text x="100" y="42" text-anchor="middle" class="node-text" font-size="10">Cantor 1891</text>
      <rect x="180" y="20" width="120" height="36" rx="4" class="node-hi"/>
      <text x="240" y="42" text-anchor="middle" class="node-text" font-size="10">Russell 1901</text>
      <rect x="320" y="20" width="120" height="36" rx="4" class="node-hi"/>
      <text x="380" y="42" text-anchor="middle" class="node-text" font-size="10">G&ouml;del 1931</text>
      <rect x="460" y="20" width="100" height="36" rx="4" class="node-hi"/>
      <text x="510" y="42" text-anchor="middle" class="node-text" font-size="10">Turing 1936</text>
      <path d="M160 38 L180 38" class="edge-hi"/>
      <path d="M300 38 L320 38" class="edge-hi"/>
      <path d="M440 38 L460 38" class="edge-hi"/>
      <rect x="140" y="90" width="300" height="40" rx="4" class="node"/>
      <text x="290" y="115" text-anchor="middle" class="node-text" font-size="11">Diagonal Self-Reference</text>
      <line x1="290" y1="56" x2="290" y2="90" class="edge-hi" stroke-dasharray="4,3"/>
      <text x="290" y="150" text-anchor="middle" class="lbl-hi" font-size="10">Same structural trick, increasing mathematical precision</text>
    </svg>
  </div>
  <div class="callout"><h4>The Deepest Pattern</h4><p>The diagonal argument is not just a proof technique&mdash;it is the structural skeleton of self-reference itself. Whenever a system tries to completely classify or enumerate its own objects, the diagonal constructs an object that escapes the classification. This is why complete self-knowledge is impossible for sufficiently powerful formal systems.</p></div>`
];

const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>

  <nav class="sidebar" id="sidebar">

    <div class="main-head">

        <div class="masthead-rule"></div>

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;

});

sections.forEach((sec, idx) => {
  const d = document.createElement('div');
  d.className = 'detail';
  d.id = `detail-${idx}`;
  d.innerHTML = details[idx];
  rightInner.appendChild(d);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let ai = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) ai = i; }); items.forEach((item, i) => item.classList.toggle('active', i === ai)); });
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const ad = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!ad) return; const h2 = ad.querySelector('.detail-header h2') || ad.querySelector('h2'); if (!h2) return; const r = h2.getBoundingClientRect(); const pr = rightPanelOuter.getBoundingClientRect(); const tb = document.querySelector('.right-topbar'); if (r.bottom < pr.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); tb.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); tb.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
