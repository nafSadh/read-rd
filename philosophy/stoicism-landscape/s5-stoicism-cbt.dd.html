@media(max-width:1000px){.sidebar{display:none}.ctrl-group{top:10px;right:10px}.ctrl-btn{width:32px;height:32px;font-size:14px}.shell{display:block;position:relative}.main{height:100vh;width:100%}.main-head{padding:20px 20px 0}.hero-title{font-size:28px!important;letter-spacing:0!important}.masthead-sub{flex-direction:column;gap:2px}.main-head.compact{padding:0 20px;height:44px}.main-head.compact .hero-title{font-size:18px!important}.main-scroll{padding:0 20px 80px}.section-block{padding:28px 8px}.right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}.right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}.right:not(.closed){transform:translateX(0)}.right-inner{padding:0 20px 80px}.right-topbar{padding:10px 20px 0;height:44px}.detail-header h2{font-size:26px!important}.feat-grid,.verdict{grid-template-columns:1fr}.feat{border-left:none!important;padding-left:0!important}.feat:nth-child(2n){padding-left:0}.v-col{padding:16px 0!important}.v-col:last-child{border-left:none!important;padding-left:0!important}.detail p{font-size:16px}.section-block .s-stat{flex-wrap:wrap}.section-block .s-stat .st{min-width:45%}}

</head>
<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Chain', title: 'The <em>Historical</em> Chain' },
  { num: '02', short: 'Ellis', title: 'Albert <em>Ellis</em> &amp; Epictetus' },
  { num: '03', short: 'Beck', title: 'Aaron <em>Beck</em> &amp; Cognitive Therapy' },
  { num: '04', short: 'Parallels', title: 'Specific <em>Parallels</em>' },
  { num: '05', short: 'What Drops', title: 'What CBT <em>Drops</em>' },
  { num: '06', short: 'Evidence', title: 'Modern <em>Evidence</em>' },
  { num: '07', short: 'Third Wave', title: 'The <em>Third</em> Wave' },
  { num: '08', short: 'Consensus', title: 'What Sources <em>Agree</em> On' }
];

const summaries = [
  `<p>The connection between Stoicism and CBT is one of the most well-documented cases of ancient philosophy directly influencing modern science. The chain is historically direct, not metaphorical.<span class="cite">[1]<span class="cite-tip">CB-01: Robertson, &ldquo;Stoic Philosophy as a Cognitive-Behavioral Therapy&rdquo; (2019).</span></span></p><div class="timeline"><div class="tl-item"><div class="tl-date">c. 55 CE</div><div class="tl-text">Epictetus: &ldquo;It is not things that disturb us, but our judgments about things&rdquo;</div></div><div class="tl-item"><div class="tl-date">1955&ndash;57</div><div class="tl-text">Albert Ellis develops REBT, explicitly drawing on Epictetus</div></div><div class="tl-item"><div class="tl-date">1960s</div><div class="tl-text">Aaron Beck develops Cognitive Therapy, acknowledges Stoic origins</div></div><div class="tl-item"><div class="tl-date">2010</div><div class="tl-text">Robertson documents 18 specific Stoic-CBT parallels</div></div></div>`,
  `<p>Ellis read the Roman Stoics in his youth and referenced them throughout his career. His key innovation was the <strong>ABC model</strong>: Activating event, Beliefs, Consequences &mdash; a direct formalization of Epictetus&rsquo;s teaching.<span class="cite">[2]<span class="cite-tip">CB-02: The Walled Garden, &ldquo;Albert Ellis: Stoicism as the Root of CBT&rdquo; (2023).</span></span></p><div class="s-stat"><div class="st"><div class="sv">1955</div><div class="sl">REBT published</div></div><div class="st"><div class="sv">ABC</div><div class="sl">core model</div></div><div class="st"><div class="sv">Enchiridion 5</div><div class="sl">source principle</div></div></div>`,
  `<p>Beck&rsquo;s original treatment manual for depression explicitly states that the philosophical origins of cognitive therapy can be traced back to the Stoic philosophers. His influence was mainly indirect &mdash; through exposure to Ellis&rsquo;s REBT writings.<span class="cite">[3]<span class="cite-tip">CB-03: Jules Evans, &ldquo;RIP Aaron Beck, Founder of CBT and Reviver of the Stoics&rdquo; (2021).</span></span></p>`,
  `<p>Robertson&rsquo;s 2010 book documents <strong>18 specific parallels</strong> between Stoic practices and CBT techniques:<span class="cite">[4]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span></p><div class="feat-grid"><div class="feat"><h4>Impressions &rarr; Monitoring</h4><p>Stoic examination of impressions maps to cognitive monitoring and thought records.</p></div><div class="feat"><h4>Assent &rarr; Distancing</h4><p>Withholding assent from false impressions maps to cognitive distancing/defusion.</p></div><div class="feat"><h4>Premeditatio &rarr; Exposure</h4><p>Negative visualization maps to decatastrophizing and worry exposure.</p></div><div class="feat"><h4>Journaling &rarr; Homework</h4><p>Marcus Aurelius&rsquo;s Meditations style maps to CBT homework and journaling.</p></div></div>`,
  `<p>CBT borrows Stoic techniques but detaches them from the comprehensive ethical framework:</p><ul class="s-list con"><li><strong>No virtue ethics</strong> &mdash; CBT aims to reduce symptoms, not cultivate character</li><li><strong>No cosmic perspective</strong> &mdash; CBT is agnostic about metaphysics</li><li><strong>No lifelong practice</strong> &mdash; CBT is time-limited (12&ndash;20 sessions)</li><li><strong>No community</strong> &mdash; Stoicism is communal; CBT is individual therapy</li></ul>`,
  `<p>Research validates several Stoic-derived practices. Stoic Week data (40,000 participants) provides population-level evidence: 15% reduction in negative emotions, 14% increase in life satisfaction.<span class="cite">[5]<span class="cite-tip">CB-09: Psychology Today, &ldquo;The Science Behind Stoicism&rdquo; (2025).</span></span></p>`,
  `<p>Third-wave CBT approaches incorporate elements that parallel additional Stoic practices:<span class="cite">[6]<span class="cite-tip">CB-06: Springer, &ldquo;The Lineage of Positive Psychology and CBT&rdquo; (2024).</span></span></p><div class="chips"><span class="chip">ACT</span><span class="chip">MBCT</span><span class="chip">DBT</span><span class="chip">Positive Psychology</span></div>`,
  `<ul class="s-list pro"><li>The Stoicism-CBT connection is historically genuine, not a retroactive projection</li><li>Ellis explicitly and directly drew on Epictetus</li><li>Beck acknowledged Stoic origins in his treatment manuals</li><li>Robertson&rsquo;s 2010 book is the definitive scholarly treatment<span class="cite">[4]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span></li><li>CBT&rsquo;s effectiveness provides indirect empirical support for Stoic psychological claims</li></ul>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The <em>Historical</em> Chain</h2></div><p>The connection between Stoicism and CBT is one of the most well-documented cases of ancient philosophy directly influencing modern science. Robertson calls Stoicism &ldquo;the clearest example of a system of psychotherapy in ancient Greek or Roman philosophy.&rdquo;<span class="cite">[1]<span class="cite-tip">CB-01: Robertson, &ldquo;Stoic Philosophy as a Cognitive-Behavioral Therapy&rdquo; (2019).</span></span></p><h3>The Influence Chain</h3><div class="timeline"><div class="tl-item"><div class="tl-date">c. 55 CE</div><div class="tl-text">Epictetus teaches the principle that judgments, not events, cause disturbance (Enchiridion 5)</div></div><div class="tl-item"><div class="tl-date">1955&ndash;57</div><div class="tl-text">Albert Ellis develops REBT, explicitly drawing on Epictetus. First form of cognitive therapy.</div></div><div class="tl-item"><div class="tl-date">1960s</div><div class="tl-text">Aaron Beck develops Cognitive Therapy for depression. Acknowledges Stoic origins in treatment manuals.</div></div><div class="tl-item"><div class="tl-date">1980s</div><div class="tl-text">REBT and CT merge into the broader CBT framework.</div></div><div class="tl-item"><div class="tl-date">2010</div><div class="tl-text">Robertson publishes The Philosophy of CBT, documenting 18 specific Stoic-CBT parallels.</div></div><div class="tl-item"><div class="tl-date">2000s&ndash;present</div><div class="tl-text">Third-wave CBT (ACT, MBCT, DBT) incorporates additional Stoic-parallel elements.</div></div></div><p>The techniques map directly to Stoic practices: cognitive restructuring is examination of impressions; behavioral activation is Stoic askesis; Socratic questioning is Stoic dialectic.<span class="cite">[7]<span class="cite-tip">CB-04: Big Think, &ldquo;The Ancient Roots of Psychotherapy Matter Now&rdquo; (2023).</span></span></p>`,
  `<div class="detail-header"><div class="num">02</div><h2>Albert <em>Ellis</em> &amp; Epictetus</h2></div><p>Ellis read the Roman Stoics (Epictetus, Seneca, Marcus Aurelius) early in his youth and referenced them throughout his career.<span class="cite">[2]<span class="cite-tip">CB-02: The Walled Garden, &ldquo;Albert Ellis: Stoicism as the Root of CBT&rdquo; (2023).</span></span></p><h3>The ABC Model</h3><div class="feat-grid"><div class="feat"><h4>A &mdash; Activating Event</h4><p>Something happens in the world. An external event occurs.</p></div><div class="feat"><h4>B &mdash; Beliefs</h4><p>Our interpretation of what happened (rational or irrational). This is where disturbance originates.</p></div><div class="feat"><h4>C &mdash; Consequences</h4><p>Emotional and behavioral responses follow from our beliefs, not from the event itself.</p></div><div class="feat"><h4>The Stoic Source</h4><p>This is a direct formalization of Epictetus&rsquo;s teaching in the Enchiridion.</p></div></div><p>Ellis acknowledged that some of the central principles of REBT were &ldquo;originally discovered and stated&rdquo; by the Stoics. REBT was published in 1955&ndash;57, predating Beck&rsquo;s work by nearly a decade.</p>`,
  `<div class="detail-header"><div class="num">03</div><h2>Aaron <em>Beck</em> &amp; Cognitive Therapy</h2></div><p>Beck&rsquo;s original treatment manual for depression explicitly states that the philosophical origins of cognitive therapy can be traced back to the Stoic philosophers. His influence from Stoicism was mainly indirect &mdash; through exposure to Ellis&rsquo;s REBT writings rather than direct reading of ancient texts.<span class="cite">[3]<span class="cite-tip">CB-03: Jules Evans, &ldquo;RIP Aaron Beck, Founder of CBT and Reviver of the Stoics&rdquo; (2021).</span></span></p><h3>Beck&rsquo;s Cognitive Model</h3><p>Beck&rsquo;s model identifies automatic thoughts (rapid, habitual interpretations), cognitive distortions (systematic errors like catastrophizing, black-and-white thinking, mind-reading), and core beliefs (deep assumptions about self, world, and future).</p><p>The process of identifying and challenging cognitive distortions is functionally identical to the Stoic practice of examining impressions (phantasiai) before giving assent (synkatathesis).</p>`,
  `<div class="detail-header"><div class="num">04</div><h2>Specific <em>Parallels</em></h2></div><p>Robertson&rsquo;s 2010 book documents 18 specific parallels between Stoic practices and CBT techniques.<span class="cite">[4]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span></p><h3>Key Mappings</h3><div class="feat-grid"><div class="feat"><h4>Examination of Impressions</h4><p>Stoic prosoche (attention) maps to cognitive monitoring and thought records in CBT.</p></div><div class="feat"><h4>Withholding Assent</h4><p>Refusing to assent to false impressions maps to cognitive distancing and defusion techniques.</p></div><div class="feat"><h4>Premeditatio Malorum</h4><p>Stoic negative visualization maps to decatastrophizing and worry exposure therapy.</p></div><div class="feat"><h4>View from Above</h4><p>The Stoic cosmic perspective maps to perspective-taking and cognitive reappraisal.</p></div><div class="feat"><h4>Stoic Journaling</h4><p>Marcus Aurelius&rsquo;s meditative writing maps to CBT homework and therapeutic journaling.</p></div><div class="feat"><h4>Evening Review</h4><p>Seneca&rsquo;s nightly self-examination maps to self-monitoring and daily review practices.<span class="cite">[8]<span class="cite-tip">CB-05: PMC/NIH, &ldquo;The Western Origins of Mindfulness Therapy in Ancient Rome&rdquo; (2023).</span></span></p></div></div>`,
  `<div class="detail-header"><div class="num">05</div><h2>What CBT <em>Drops</em></h2></div><p>CBT borrows Stoic techniques but detaches them from the Stoic ethical framework. Robertson argues this is a loss &mdash; the techniques work better within a coherent philosophical worldview.<span class="cite">[9]<span class="cite-tip">CB-07: VA Counseling, &ldquo;Stoicism and CBT: Is Therapy a Philosophical Pursuit?&rdquo; (2024).</span></span></p><div class="verdict"><div class="v-col pro"><h4>What CBT Keeps</h4><ul><li>Cognitive restructuring (examining impressions)</li><li>Behavioral activation (Stoic askesis)</li><li>Socratic questioning (Stoic dialectic)</li><li>Self-monitoring (Stoic prosoche)</li></ul></div><div class="v-col con"><h4>What CBT Drops</h4><ul><li>Virtue ethics &mdash; no character cultivation</li><li>Cosmic perspective &mdash; metaphysical agnosticism</li><li>Lifelong practice &mdash; time-limited treatment</li><li>Community &mdash; individual therapy only</li></ul></div></div><p>CBT without philosophical grounding becomes mere symptom management. The ethical framework provides motivation, meaning, and a comprehensive worldview within which the techniques operate.</p>`,
  `<div class="detail-header"><div class="num">06</div><h2>Modern <em>Evidence</em></h2></div><p>Research validates several Stoic-derived practices:<span class="cite">[5]<span class="cite-tip">CB-09: Psychology Today, &ldquo;The Science Behind Stoicism&rdquo; (2025).</span></span></p><div class="feat-grid"><div class="feat"><h4>Cognitive Restructuring</h4><p>Large evidence base for reducing anxiety, depression, and anger. Directly maps to Stoic examination of impressions.</p></div><div class="feat"><h4>Behavioral Activation</h4><p>Strong evidence for depression treatment. Maps to Stoic askesis (exercise) and daily practices.</p></div><div class="feat"><h4>Journaling</h4><p>Marcus Aurelius-style journaling shows therapeutic benefits comparable to standard CBT journaling.</p></div><div class="feat"><h4>Negative Visualization</h4><p>Premeditatio malorum reduces anxiety through systematic exposure to feared outcomes.</p></div></div><p>The Stoic Week data (40,000 participants, 15% reduction in negative emotions) provides population-level evidence, though without randomized controlled trial methodology.</p>`,
  `<div class="detail-header"><div class="num">07</div><h2>The <em>Third</em> Wave</h2></div><p>Third-wave CBT approaches incorporate elements that parallel additional Stoic practices. The lineage is not always acknowledged, but the conceptual parallels are striking.<span class="cite">[6]<span class="cite-tip">CB-06: Springer, &ldquo;The Lineage of Positive Psychology and CBT&rdquo; (2024).</span></span></p><div class="feat-grid"><div class="feat"><h4>ACT</h4><p>Acceptance and Commitment Therapy: acceptance of difficult thoughts/feelings, value-guided action. Close to Stoic acceptance and virtue-directed living.</p></div><div class="feat"><h4>MBCT</h4><p>Mindfulness-Based Cognitive Therapy: mindful attention to present experience. Parallels Stoic prosoche (attention).</p></div><div class="feat"><h4>DBT</h4><p>Dialectical Behavior Therapy: emotional regulation through mindfulness and distress tolerance.</p></div><div class="feat"><h4>Positive Psychology</h4><p>Seligman/Peterson&rsquo;s character strengths directly parallel the four Stoic cardinal virtues.</p></div></div>`,
  `<div class="detail-header"><div class="num">08</div><h2>What Sources <em>Agree</em> On</h2></div><p>Across 9 sources, six points of convergence:</p><div class="feat-grid"><div class="feat"><h4>Historically Genuine</h4><p>The Stoicism-CBT connection is a documented historical influence, not a retroactive projection.</p></div><div class="feat"><h4>Ellis Was Direct</h4><p>Ellis explicitly and directly drew on Epictetus when developing REBT in the 1950s.</p></div><div class="feat"><h4>Beck Acknowledged It</h4><p>Beck acknowledged Stoic origins in his treatment manuals for depression.</p></div><div class="feat"><h4>Shared Core Principle</h4><p>The cognitive principle &mdash; judgments, not events, cause disturbance &mdash; is genuinely shared.</p></div></div><h3>Where Sources Disagree</h3><p>Whether CBT loses something essential by dropping the ethical framework. Whether Stoic practices should be formalized as standalone therapy. How much of CBT&rsquo;s effectiveness comes from Stoic-derived elements vs. other components. Whether the third-wave connection is genuine or coincidental.</p>`
];

// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>5</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Section 5 of 6</div>
        <div class="hero-title">Stoicism &amp; <em>CBT</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Ellis, Beck, Robertson &mdash; The Historical Chain</span><span>9 sources</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => { const item = document.createElement('div'); item.className = 'sidebar-item' + (idx === 0 ? ' active' : ''); item.setAttribute('data-label', sec.short); item.innerHTML = '<span class="sidebar-num">' + sec.num + '</span><span class="sidebar-label">' + sec.short + '</span>'; item.onclick = () => scrollToSection(idx); sidebarNav.appendChild(item); });
const sidebarTip = document.createElement('div'); sidebarTip.className = 'sidebar-tooltip'; document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar'); let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => { if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const item = e.target.closest('.sidebar-item'); if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const rect = item.getBoundingClientRect(); const sRight = sidebarEl.getBoundingClientRect().right; sidebarTip.textContent = item.getAttribute('data-label'); sidebarTip.style.left = (sRight - 1) + 'px'; sidebarTip.style.top = rect.top + 'px'; sidebarTip.style.height = rect.height + 'px'; if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); } });
const mainScroll = document.getElementById('main-scroll'); const mainInner = document.createElement('div'); mainInner.className = 'main-scroll-inner'; mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = '<div class="s-num"><span>' + sec.num + '</span><button class="s-detail-btn" onclick="openDetail(' + idx + ')"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>' + sec.title + '</h2>' + summaries[idx]; mainInner.appendChild(block); });
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => { const detailDiv = document.createElement('div'); detailDiv.className = 'detail'; detailDiv.id = 'detail-' + idx; detailDiv.innerHTML = details[idx]; rightInner.appendChild(detailDiv); });
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById('detail-' + idx).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return; const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return; const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar'); if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
