<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Abstract', title: '<em>Abstract</em>' },
  { num: '02', short: 'System vs Fragments', title: 'The System vs. The <em>Fragments</em>' },
  { num: '03', short: 'Practical Turn', title: 'The <em>Practical</em> Turn' },
  { num: '04', short: 'Three Streams', title: 'Three <em>Streams</em> of Revival' },
  { num: '05', short: 'CBT Connection', title: 'The <em>CBT</em> Connection' },
  { num: '06', short: 'Five Fractures', title: 'Five <em>Fractures</em>' },
  { num: '07', short: 'Consensus', title: 'What Everyone <em>Agrees</em> On' },
  { num: '08', short: 'Conclusion', title: '<em>Conclusion</em>' }
];

const summaries = [
  `<p>This synthesis draws on 58 sources across six dimensions of Stoic philosophy &mdash; ancient foundations, Roman practice, core doctrines, the modern revival, the CBT connection, and critiques &mdash; to map the discourse landscape. The most valuable findings are not the consensus points but the fractures: five places where serious interpreters, looking at the same tradition, reach opposite conclusions.</p><div class="s-stat"><div class="st"><div class="sv">58</div><div class="sl">sources surveyed</div></div><div class="st"><div class="sv">6</div><div class="sl">dimensions</div></div><div class="st"><div class="sv">5</div><div class="sl">fractures identified</div></div><div class="st"><div class="sv">2,300</div><div class="sl">years of history</div></div></div>`,

  `<p>The most striking tension in studying Stoicism is between the comprehensiveness of the original system and the fragmentary evidence we have for it. Zeno, Cleanthes, and Chrysippus built a complete philosophical system &mdash; logic, physics, ethics &mdash; where each part depended on the others.<span class="cite">[1]<span class="cite-tip">AF-01: SEP, &ldquo;Stoicism&rdquo; (rev. 2023).</span></span> Chrysippus alone wrote 705 books.<span class="cite">[2]<span class="cite-tip">AF-09: The Stoic App Blog, &ldquo;Chrysippus: The Second Founder&rdquo; (2024).</span></span> Yet virtually none survives intact.<span class="cite">[3]<span class="cite-tip">AF-02: IEP, &ldquo;Stoicism&rdquo; &mdash; only fragments from the Early Stoa.</span></span></p><p>The complete texts we have are all Roman: Seneca&rsquo;s letters and essays, Epictetus&rsquo;s Discourses (transcribed by Arrian<span class="cite">[4]<span class="cite-tip">RS-01: SEP, &ldquo;Epictetus&rdquo; (rev. 2023).</span></span>), and Marcus Aurelius&rsquo;s Meditations.<span class="cite">[5]<span class="cite-tip">RS-02: SEP, &ldquo;Marcus Aurelius&rdquo; (rev. 2022).</span></span> This creates a systematic distortion: the Stoicism most people encounter is Roman moral philosophy, not the rigorous three-part system the founders built.</p>`,

  `<p>Roman Stoicism represents a genuine philosophical shift, not just a loss of texts. Greek Stoics wrote technical treatises for fellow philosophers. Roman Stoics wrote letters, handbooks, and private meditations for practical moral guidance.<span class="cite">[6]<span class="cite-tip">RS-06: WCU Thesis, &ldquo;The Evolution of Stoicism&rdquo; (2019).</span></span></p><p>This practical turn is what makes Stoicism uniquely available for modern revival. Unlike most ancient philosophy, the Roman Stoics produced texts that read as direct moral advice &mdash; no specialist training required. But this accessibility comes at the cost of philosophical depth. The modern revival amplifies this distortion: virtually no popular Stoic author discusses Chrysippus&rsquo;s propositional logic<span class="cite">[7]<span class="cite-tip">AF-04: SEP, &ldquo;Ancient Logic&rdquo; (rev. 2020).</span></span> or Stoic cosmology.<span class="cite">[8]<span class="cite-tip">AF-07: Pigliucci, &ldquo;From Ancient to New Stoicism: I &mdash; Stoic Physics&rdquo; (2020).</span></span></p>`,

  `<p>The revival is not monolithic. At least three distinct streams are visible:<span class="cite">[9]<span class="cite-tip">MR-09: Jules Evans, &ldquo;The Big, Messy Tent of Modern Stoicism&rdquo; (2015).</span></span></p><div class="feat-grid"><div class="feat"><h4>Academic / Philosophical</h4><p>Pigliucci, Sellars, Gill. Rigorous engagement with ancient texts, willing to update metaphysics while preserving the ethical core.<span class="cite">[10]<span class="cite-tip">MR-04: Pigliucci, How to Be a Stoic (2017).</span></span></p></div><div class="feat"><h4>Therapeutic</h4><p>Robertson, LeBon. CBT practitioners integrating Stoic philosophy. Evidence-based, focused on measurable wellbeing outcomes.<span class="cite">[11]<span class="cite-tip">MR-05: Robertson, Wikipedia + Personal Site.</span></span></p></div><div class="feat"><h4>Popular / Self-Help</h4><p>Holiday, Irvine. Mass-market accessibility. Holiday&rsquo;s 10M+ copies sold have spread Stoic awareness further than any academic publication.<span class="cite">[12]<span class="cite-tip">MR-02: Holiday, Wikipedia + Daily Stoic.</span></span></p></div><div class="feat"><h4>The Tension</h4><p>Pigliucci has explicitly criticized Silicon Valley Stoicism for emphasizing wealth-as-indifferent while ignoring virtue-as-the-only-good.<span class="cite">[13]<span class="cite-tip">MR-08: Pigliucci, &ldquo;Silicon Valley Style Stoicism&rdquo; (2019).</span></span></p></div></div>`,

  `<p>The connection between Stoicism and cognitive behavioral therapy is not a loose analogy &mdash; it is a documented historical lineage.<span class="cite">[14]<span class="cite-tip">CB-01: Robertson, &ldquo;Stoic Philosophy as a CBT&rdquo; (2019).</span></span> Albert Ellis explicitly drew on Epictetus when creating REBT in the 1950s.<span class="cite">[15]<span class="cite-tip">CB-02: The Walled Garden, &ldquo;Albert Ellis: Stoicism as the Root of CBT&rdquo; (2023).</span></span> Aaron Beck acknowledged Stoic origins in his treatment manuals.<span class="cite">[16]<span class="cite-tip">CB-03: Evans, &ldquo;RIP Aaron Beck&rdquo; (2021).</span></span> Robertson documents 18 specific parallels.<span class="cite">[17]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span></p><p>What CBT drops is the comprehensive ethical framework. Robertson argues this is a loss &mdash; that the techniques work better within a coherent philosophical worldview, and that CBT without philosophical grounding becomes mere symptom management.<span class="cite">[18]<span class="cite-tip">CB-07: VA Counseling, &ldquo;Stoicism and CBT: Is Therapy a Philosophical Pursuit?&rdquo; (2024).</span></span></p>`,

  `<p>The most productive findings in this survey are the contradictions &mdash; places where equally credible interpreters reach opposite conclusions.</p><ul class="s-list"><li><strong>Metaphysics vs. ethics:</strong> Can Stoic ethics survive without Stoic physics? Pigliucci says update the metaphysics<span class="cite">[10]<span class="cite-tip">MR-04: Pigliucci, How to Be a Stoic (2017).</span></span>; traditionalists say the system loses coherence without the cosmic logos.</li><li><strong>Emotions:</strong> Nussbaum says apatheia dehumanizes<span class="cite">[19]<span class="cite-tip">CL-01: Nussbaum, The Therapy of Desire (1994) + Upheavals of Thought (2001).</span></span>; Pigliucci says she attacks a straw-man<span class="cite">[20]<span class="cite-tip">CL-10: Pigliucci, Reply to Nussbaum on Stoicism (2019).</span></span>; Robertson says CBT validates Stoic psychology empirically.</li><li><strong>Politics:</strong> Critics say Stoicism breeds quietism<span class="cite">[21]<span class="cite-tip">CL-04: New Statesman, &ldquo;The Problem with Stoicism&rdquo; (2007).</span></span>; defenders point to Cato, the Stoic Opposition, Marcus Aurelius.<span class="cite">[22]<span class="cite-tip">CL-06: Aeon, &ldquo;When Stoicism Is a Political Virtue&rdquo; (2019).</span></span></li><li><strong>Pop vs. philosophy:</strong> Is Ryan Holiday good for Stoicism or bad for it? Most academics acknowledge the gateway effect while worrying about dilution.<span class="cite">[23]<span class="cite-tip">CL-09: American Conservative, &ldquo;Silicon-Valley Stoicism Can Point to the Real Stuff&rdquo; (2019).</span></span></li><li><strong>Gender:</strong> Is modern Stoicism&rsquo;s male skew intrinsic to the philosophy or to the marketing?<span class="cite">[24]<span class="cite-tip">CL-08: Forward Pathway, &ldquo;The Modern Revival of Stoicism &mdash; Critical Reflections&rdquo; (2024).</span></span> The ancient Stoics were among the most egalitarian thinkers of their time.</li></ul>`,

  `<p>Across all 58 sources and perspectives, six points of genuine convergence emerge:</p><ul class="s-list pro"><li>The Stoics made a permanent contribution to Western ethics with the concept of virtue as the sole constitutive good<span class="cite">[25]<span class="cite-tip">AF-03: IEP, &ldquo;Stoic Ethics&rdquo; &mdash; virtue as the sole good.</span></span></li><li>The dichotomy of control remains a powerful practical framework<span class="cite">[26]<span class="cite-tip">CD-01: Philosophy Break, &ldquo;The Dichotomy of Control&rdquo; (2023).</span></span></li><li>Stoic cosmopolitanism anticipated modern universalism<span class="cite">[27]<span class="cite-tip">CD-06: Stoic Ethics and Political Citizenship (2023).</span></span></li><li>The CBT connection is historically genuine, not a retroactive projection<span class="cite">[17]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span></li><li>The modern revival has made Stoicism more accessible than at any point since antiquity<span class="cite">[28]<span class="cite-tip">MR-06: Stoic Week Research Results (2012&ndash;2025).</span></span></li><li>Pop-Stoicism risks distorting the tradition if it remains detached from the philosophical foundations</li></ul>`,

  `<p>Stoicism&rsquo;s 2,300-year survival is itself remarkable. Few philosophical traditions have been so thoroughly lost, so dramatically recovered, and so widely adopted in such different forms. The ancient system was comprehensive; the medieval transmission was fragmentary; the modern revival is practical.</p><p>The five fractures identified in this survey reflect ongoing scholarly debate. A tradition with live disagreements is one that continues to attract serious engagement. What makes the Stoic discourse worth mapping is precisely that serious interpreters, reading the same texts, continue to reach different conclusions about what Stoicism demands.</p><p>The most important finding may be the simplest: Stoicism is not settled. The ancient questions &mdash; about the relationship between physics and ethics, between acceptance and engagement, between emotional transformation and emotional suppression &mdash; remain genuinely open. The modern revival has added new questions &mdash; about popularization, about gender, about the relationship between ancient philosophy and modern therapy &mdash; that the founders could not have anticipated.</p><div class="callout"><h4>Final Note</h4><p>The best map of a discourse is one that shows where the disagreements are, not one that pretends they have been resolved. This survey attempts to be that kind of map.</p></div>`
];

const mainScroll = document.getElementById('main-scroll'); const mainInner = document.createElement('div'); mainInner.className = 'main-scroll-inner'; mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = '<div class="s-num">' + sec.num + '</div><h2>' + sec.title + '</h2>' + summaries[idx]; mainInner.appendChild(block); });
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
