@media(max-width:1000px){.sidebar{display:none}.ctrl-group{top:10px;right:10px}.ctrl-btn{width:32px;height:32px;font-size:14px}.shell{display:block;position:relative}.main{height:100vh;width:100%}.main-head{padding:20px 20px 0}.hero-title{font-size:28px!important;letter-spacing:0!important}.masthead-sub{flex-direction:column;gap:2px}.main-head.compact{padding:0 20px;height:44px}.main-head.compact .hero-title{font-size:18px!important}.main-scroll{padding:0 20px 80px}.section-block{padding:28px 8px}.right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}.right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}.right:not(.closed){transform:translateX(0)}.right-inner{padding:0 20px 80px}.right-topbar{padding:10px 20px 0;height:44px}.detail-header h2{font-size:26px!important}.feat-grid,.verdict{grid-template-columns:1fr}.feat{border-left:none!important;padding-left:0!important}.feat:nth-child(2n){padding-left:0}.v-col{padding:16px 0!important}.v-col:last-child{border-left:none!important;padding-left:0!important}.detail p{font-size:16px}.section-block .s-stat{flex-wrap:wrap}.section-block .s-stat .st{min-width:45%}}

</head>
<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Origins', title: 'The Revival&rsquo;s <em>Origins</em>' },
  { num: '02', short: 'Figures', title: 'Key <em>Figures</em>' },
  { num: '03', short: 'Stoic Week', title: 'Stoicon &amp; <em>Stoic Week</em>' },
  { num: '04', short: 'Silicon Valley', title: 'The <em>Silicon Valley</em> Phenomenon' },
  { num: '05', short: 'Three Streams', title: 'Three <em>Streams</em>' },
  { num: '06', short: 'Tensions', title: '<em>Tensions</em> Within the Movement' },
  { num: '07', short: 'Scale', title: 'Scale &amp; <em>Impact</em>' },
  { num: '08', short: 'Consensus', title: 'What Sources <em>Agree</em> On' }
];

const summaries = [
  `<p>The modern Stoicism revival has intellectual roots in Pierre Hadot&rsquo;s work on philosophy as a way of life. The institutional origin is the founding of <strong>Modern Stoicism, Ltd</strong> in 2012.<span class="cite">[1]<span class="cite-tip">MR-01: Modern Stoicism Organization (modernstoicism.com).</span></span></p>`,
  `<p>Four figures have shaped the revival most significantly:</p><div class="feat-grid"><div class="feat"><h4>Massimo Pigliucci</h4><p>Philosophy professor (CUNY). How to Be a Stoic (2017). Advocates &ldquo;Stoicism 2.0&rdquo; with updated metaphysics.<span class="cite">[2]<span class="cite-tip">MR-04: Pigliucci, How to Be a Stoic (2017) + Blog of the APA Interview.</span></span></p></div><div class="feat"><h4>Ryan Holiday</h4><p>10M+ copies sold. The Obstacle Is the Way, The Daily Stoic. Adopted by NFL teams, LL Cool J.<span class="cite">[3]<span class="cite-tip">MR-02: Holiday, Wikipedia + Daily Stoic.</span></span></p></div><div class="feat"><h4>William Irvine</h4><p>A Guide to the Good Life (2009). Introduced negative visualization, proposed trichotomy of control.<span class="cite">[4]<span class="cite-tip">MR-03: Irvine, A Guide to the Good Life (OUP, 2009).</span></span></p></div><div class="feat"><h4>Donald Robertson</h4><p>Scottish CBT therapist. The Philosophy of CBT (2010). How to Think Like a Roman Emperor (2019).<span class="cite">[5]<span class="cite-tip">MR-05: Robertson, Wikipedia + Personal Site.</span></span></p></div></div>`,
  `<p>Since 2012, approximately <strong>40,000 people</strong> have participated in Stoic Week. Results: 15% reduction in negative emotions, 14% increase in life satisfaction after just one week.<span class="cite">[6]<span class="cite-tip">MR-06: Stoic Week Research Results, Modern Stoicism + Royal Holloway (2012&ndash;2025).</span></span></p><div class="s-stat"><div class="st"><div class="sv">40K</div><div class="sl">participants</div></div><div class="st"><div class="sv">15%</div><div class="sl">fewer negative emotions</div></div><div class="st"><div class="sv">14%</div><div class="sl">higher life satisfaction</div></div><div class="st"><div class="sv">94%</div><div class="sl">would recommend</div></div></div>`,
  `<p>Stoicism gained particular traction in Silicon Valley after Tim Ferriss promoted Ryan Holiday&rsquo;s books. Holiday spoke at Google and connected with Jack Dorsey, Kevin Rose, and Brad Feld.<span class="cite">[7]<span class="cite-tip">MR-07: Quartz, &ldquo;Silicon Valley tech workers are using an ancient philosophy...&rdquo; (2017).</span></span></p><p>The appeal: Stoicism as an <strong>operating system for high-stress environments</strong>.</p>`,
  `<p>The revival is not monolithic. At least three distinct streams coexist in productive but real tension:<span class="cite">[8]<span class="cite-tip">MR-09: Jules Evans, &ldquo;The Big, Messy Tent of Modern Stoicism&rdquo; (2015).</span></span></p><ul class="s-list"><li><strong>Academic/philosophical</strong> &mdash; Pigliucci, Sellars, Gill. Rigorous engagement with ancient texts</li><li><strong>Therapeutic</strong> &mdash; Robertson, LeBon. CBT practitioners, evidence-based</li><li><strong>Popular/self-help</strong> &mdash; Holiday, Irvine. Mass-market accessibility</li></ul>`,
  `<p>Pigliucci has explicitly criticized Silicon Valley Stoicism for emphasizing wealth-as-indifferent while ignoring virtue-as-the-only-good.<span class="cite">[9]<span class="cite-tip">MR-08: Pigliucci, &ldquo;Silicon Valley Style Stoicism&rdquo; (2019).</span></span></p><p>The fundamental question: <strong>can Stoicism survive without its metaphysics?</strong></p>`,
  `<div class="s-stat"><div class="st"><div class="sv">10M+</div><div class="sl">Holiday books sold</div></div><div class="st"><div class="sv">40K</div><div class="sl">Stoic Week participants</div></div><div class="st"><div class="sv">40+</div><div class="sl">languages translated</div></div></div><p>Stoicism is arguably more widely practiced today than at any point since the Roman Empire.</p>`,
  `<ul class="s-list pro"><li>The revival is real and significant in scale</li><li>Holiday&rsquo;s popularization has been the largest single driver of awareness</li><li>The academic-popular tension is genuine and productive</li><li>Stoic Week research shows measurable wellbeing benefits</li><li>Silicon Valley adoption accelerated mainstream interest</li></ul>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The Revival&rsquo;s <em>Origins</em></h2></div><p>The modern Stoicism revival has intellectual roots in Pierre Hadot&rsquo;s influential work on philosophy as a way of life, which argued that ancient philosophy was primarily a set of spiritual exercises rather than theoretical system-building. This reframing made Stoicism especially attractive: its Roman practitioners had already translated philosophical principles into daily practices.</p><p>The institutional origin is the founding of Modern Stoicism, Ltd in 2012, initially as a collaboration between academic philosophers (Christopher Gill, John Sellars), CBT therapists (Donald Robertson, Tim LeBon), and public intellectuals (Massimo Pigliucci, Jules Evans).<span class="cite">[1]<span class="cite-tip">MR-01: Modern Stoicism Organization (modernstoicism.com).</span></span></p><p>Pigliucci traces the revival through a broader trajectory in an academic paper: from Hadot&rsquo;s reframing through the founding of Modern Stoicism to the pop-Stoicism explosion, proposing &ldquo;Stoicism 2.0&rdquo; that updates physics and logic while preserving ethics.<span class="cite">[10]<span class="cite-tip">MR-10: Pigliucci, &ldquo;Stoicism for the 21st Century&rdquo; (Academia.edu, 2024).</span></span></p>`,
  `<div class="detail-header"><div class="num">02</div><h2>Key <em>Figures</em></h2></div><h3>Massimo Pigliucci</h3><p>Philosophy professor at City College of New York. Published How to Be a Stoic (2017). Runs the blog &ldquo;Figs in Winter.&rdquo; Argues for &ldquo;Stoicism 2.0&rdquo; &mdash; updating the metaphysics (replace logos with laws of nature, drop eternal recurrence) while preserving the ethical core. Key advocate for distinguishing rigorous Stoic philosophy from pop-Stoicism dilution.<span class="cite">[2]<span class="cite-tip">MR-04: Pigliucci, How to Be a Stoic (2017) + Blog of the APA Interview.</span></span></p><h3>Ryan Holiday</h3><p>Former marketing director, turned author and popularizer. Books have sold over 10 million copies in 40+ languages. The Obstacle Is the Way (2014) was adopted by NFL teams (New England Patriots, Seattle Seahawks), the Chicago Cubs. The Daily Stoic (2016): 2M+ English copies. Runs the Daily Stoic website, email list (millions of subscribers), podcast, and bookstore.<span class="cite">[3]<span class="cite-tip">MR-02: Holiday, Wikipedia + Daily Stoic.</span></span></p><h3>William Irvine</h3><p>Philosophy professor at Wright State University. A Guide to the Good Life (2009) was the first systematic modern guide to Stoic practice. Introduced negative visualization as the central technique and proposed the trichotomy of control. Criticized by scholars for departing from ancient sources, but widely recommended as an accessible entry point.<span class="cite">[4]<span class="cite-tip">MR-03: Irvine, A Guide to the Good Life (OUP, 2009).</span></span></p><h3>Donald Robertson</h3><p>Scottish CBT therapist. Co-founder of Modern Stoicism. The Philosophy of Cognitive-Behavioural Therapy (2010) is the definitive academic treatment of the Stoicism-CBT connection. How to Think Like a Roman Emperor (2019) became a #1 philosophy bestseller in 18 languages. Founded Plato&rsquo;s Academy Centre in Greece.<span class="cite">[5]<span class="cite-tip">MR-05: Robertson, Wikipedia + Personal Site.</span></span></p>`,
  `<div class="detail-header"><div class="num">03</div><h2>Stoicon &amp; <em>Stoic Week</em></h2></div><p>Stoicon is the largest annual gathering of Stoics worldwide, held since 2013 (online since 2020). Features academic talks, workshops, and community discussions.</p><h3>Stoic Week Research</h3><p>Stoic Week is a 7-day experiment in living like a Stoic, with daily readings and exercises. Since 2012, approximately 40,000 people have participated.<span class="cite">[6]<span class="cite-tip">MR-06: Stoic Week Research Results, Modern Stoicism + Royal Holloway (2012&ndash;2025).</span></span></p><p>Results have been consistently positive: on average, a 15% reduction in negative emotions and a 14% increase in life satisfaction after just one week.</p><h3>The SABS Scale</h3><p>The Stoic Attitudes and Behaviours Scale (SABS) developed through this research identifies 7 key dimensions of Stoic practice. High SABS scores are linked to greater resilience, lower anger, and higher life satisfaction. 94% of participants reported they would recommend Stoicism as useful life guidance.</p><div class="callout"><h4>Evidence Caveat</h4><p>The Stoic Week data provides population-level evidence for wellbeing benefits but lacks randomized controlled trial methodology. Participants are self-selecting, which creates inherent bias. The results are suggestive rather than conclusive.</p></div>`,
  `<div class="detail-header"><div class="num">04</div><h2>The <em>Silicon Valley</em> Phenomenon</h2></div><p>Stoicism gained particular traction in Silicon Valley after Tim Ferriss promoted Ryan Holiday&rsquo;s books and podcast. Holiday has spoken at Google and connected with Jack Dorsey (Twitter), Kevin Rose (Digg), Brad Feld (VC), and other tech figures.<span class="cite">[7]<span class="cite-tip">MR-07: Quartz, &ldquo;Silicon Valley tech workers are using an ancient philosophy...&rdquo; (2017).</span></span></p><p>The appeal: Stoicism as an &ldquo;operating system for high-stress environments.&rdquo; The dichotomy of control maps naturally to startup culture, where outcomes are uncertain but effort and attitude are controllable.</p><h3>The Critique</h3><p>Pigliucci has explicitly criticized this strain of adoption: Silicon Valley Stoicism emphasizes wealth as indifferent but ignores virtue as the only good. It focuses on individual resilience for financial gain, not character development. It ignores community and justice &mdash; antithetical to Zeno&rsquo;s cosmopolitanism.<span class="cite">[9]<span class="cite-tip">MR-08: Pigliucci, &ldquo;Silicon Valley Style Stoicism&rdquo; (2019).</span></span></p>`,
  `<div class="detail-header"><div class="num">05</div><h2>Three <em>Streams</em></h2></div><p>The modern movement is not monolithic. Jules Evans describes it as a &ldquo;big, messy tent&rdquo; with productive but real tensions between scholarly fidelity and popular accessibility.<span class="cite">[8]<span class="cite-tip">MR-09: Jules Evans, &ldquo;The Big, Messy Tent of Modern Stoicism&rdquo; (2015).</span></span></p><div class="feat-grid"><div class="feat"><h4>Academic / Philosophical</h4><p>Pigliucci, Sellars, Gill. Rigorous engagement with ancient texts. Willing to update metaphysics while preserving the ethical core. The Modern Stoicism organization sits here.</p></div><div class="feat"><h4>Therapeutic</h4><p>Robertson, LeBon. CBT practitioners who see Stoicism as a complementary framework. Evidence-based, focused on measurable wellbeing outcomes (Stoic Week data).</p></div><div class="feat"><h4>Popular / Self-Help</h4><p>Holiday, Irvine. Mass-market accessibility. Enormous reach but variable philosophical depth. Holiday&rsquo;s 10M+ copies have done more to spread awareness than any academic publication.</p></div><div class="feat"><h4>The Overlap</h4><p>Robertson bridges therapeutic and academic. Pigliucci engages with popular audiences. The boundaries are permeable, but the tensions are real.</p></div></div>`,
  `<div class="detail-header"><div class="num">06</div><h2><em>Tensions</em> Within the Movement</h2></div><p>The fundamental question: can Stoicism survive without its metaphysics?</p><div class="verdict"><div class="v-col pro"><h4>Pigliucci (Yes)</h4><ul><li>Replace logos with laws of nature</li><li>Drop eternal recurrence and conflagration</li><li>The ethical framework stands on its own</li><li>&ldquo;Stoicism 2.0&rdquo; for the modern world</li></ul></div><div class="v-col con"><h4>Traditionalists (Worried)</h4><ul><li>Ethics explicitly depends on physics</li><li>&ldquo;Living according to nature&rdquo; requires the cosmic logos</li><li>The system loses coherence without the three-part structure</li><li>Most modern practitioners are implicitly Pigliuccian without knowing it</li></ul></div></div>`,
  `<div class="detail-header"><div class="num">07</div><h2>Scale &amp; <em>Impact</em></h2></div><p>The scale of the modern Stoicism revival is unprecedented in the history of Western philosophy.</p><div class="feat-grid"><div class="feat"><h4>Holiday&rsquo;s Books</h4><p>10M+ copies sold in 40+ languages. #1 NYT bestseller series on the four Stoic virtues.</p></div><div class="feat"><h4>Daily Stoic</h4><p>Newsletter reaching millions. Podcast, bookstore, and social media ecosystem.</p></div><div class="feat"><h4>Stoic Week</h4><p>~40,000 participants since 2012. Consistent wellbeing improvements across all cohorts.</p></div><div class="feat"><h4>Digital Footprint</h4><p>Google Trends shows 5&ndash;10x growth in &ldquo;Stoicism&rdquo; search interest since 2014. Massive TikTok and YouTube content ecosystem.</p></div></div><p>Stoicism is arguably more widely practiced today than at any point since the Roman Empire.</p>`,
  `<div class="detail-header"><div class="num">08</div><h2>What Sources <em>Agree</em> On</h2></div><p>Across 10 sources, five points of convergence:</p><div class="feat-grid"><div class="feat"><h4>Scale is Real</h4><p>The revival is genuine and significant in scale &mdash; not a fad but a sustained cultural phenomenon.</p></div><div class="feat"><h4>Holiday&rsquo;s Impact</h4><p>Holiday&rsquo;s popularization has been the single largest driver of awareness, regardless of scholarly concerns.</p></div><div class="feat"><h4>Productive Tension</h4><p>The academic-popular tension is genuine and mostly productive &mdash; it keeps both sides honest.</p></div><div class="feat"><h4>Measurable Benefits</h4><p>Stoic Week research shows measurable wellbeing benefits from even brief Stoic practice.</p></div></div><h3>Where Sources Disagree</h3><p>Whether Holiday helps or harms the tradition (gateway vs. dilution). Whether Stoicism can survive without its metaphysics. Whether Silicon Valley Stoicism is genuine or a distortion. Whether the movement&rsquo;s male skew reflects the philosophy or the marketing.</p>`
];

// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>4</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Section 4 of 6</div>
        <div class="hero-title">The Modern <em>Revival</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Pigliucci, Holiday, Robertson, Stoic Week</span><span>10 sources</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => { const item = document.createElement('div'); item.className = 'sidebar-item' + (idx === 0 ? ' active' : ''); item.setAttribute('data-label', sec.short); item.innerHTML = '<span class="sidebar-num">' + sec.num + '</span><span class="sidebar-label">' + sec.short + '</span>'; item.onclick = () => scrollToSection(idx); sidebarNav.appendChild(item); });
const sidebarTip = document.createElement('div'); sidebarTip.className = 'sidebar-tooltip'; document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar'); let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => { if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const item = e.target.closest('.sidebar-item'); if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const rect = item.getBoundingClientRect(); const sRight = sidebarEl.getBoundingClientRect().right; sidebarTip.textContent = item.getAttribute('data-label'); sidebarTip.style.left = (sRight - 1) + 'px'; sidebarTip.style.top = rect.top + 'px'; sidebarTip.style.height = rect.height + 'px'; if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); } });
const mainScroll = document.getElementById('main-scroll'); const mainInner = document.createElement('div'); mainInner.className = 'main-scroll-inner'; mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = '<div class="s-num"><span>' + sec.num + '</span><button class="s-detail-btn" onclick="openDetail(' + idx + ')"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>' + sec.title + '</h2>' + summaries[idx]; mainInner.appendChild(block); });
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => { const detailDiv = document.createElement('div'); detailDiv.className = 'detail'; detailDiv.id = 'detail-' + idx; detailDiv.innerHTML = details[idx]; rightInner.appendChild(detailDiv); });
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById('detail-' + idx).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return; const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return; const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar'); if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
