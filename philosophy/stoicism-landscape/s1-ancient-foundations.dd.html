<script>

const summaries = [
  `<p>Zeno of Citium (c. 334&ndash;262 BCE) was a Phoenician merchant from Cyprus who, according to tradition, was shipwrecked near Athens and turned to philosophy. He studied under Crates the Cynic, then at Plato&rsquo;s Academy and the Megarian School. Around 301 BCE he began teaching at the Stoa Poikile (Painted Porch) in the Athenian Agora.</p><p>Zeno divided philosophy into three interconnected parts: <strong>logic, physics, and ethics</strong>. This tripartite structure was the Stoics&rsquo; own innovation and remained definitive throughout the tradition&rsquo;s five-century history.<span class="cite">[1]<span class="cite-tip">AF-01: SEP, &ldquo;Stoicism&rdquo; (rev. 2023).</span></span></p><div class="s-stat"><div class="st"><div class="sv">c. 301 BCE</div><div class="sl">school founded</div></div><div class="st"><div class="sv">3</div><div class="sl">parts of philosophy</div></div><div class="st"><div class="sv">Cynic</div><div class="sl">primary influence</div></div></div>`,
  `<p>Cleanthes of Assos succeeded Zeno as head of the school. A former boxer and manual laborer (he worked as a water-carrier at night to fund his studies), Cleanthes was primarily known for his devotion to Zeno&rsquo;s teachings and for his contributions to Stoic theology.</p><p>His <strong>Hymn to Zeus</strong> is the longest surviving fragment from the Early Stoa &mdash; a poem identifying Zeus with the cosmic logos that governs all things. Cleanthes absorbed Zeno&rsquo;s system faithfully, serving as a bridge between founder and systematizer.</p>`,
  `<p>Chrysippus of Soli (c. 279&ndash;206 BCE) was called &ldquo;the second founder&rdquo; of the school. According to Diogenes Laertius: <em>&ldquo;Without Chrysippus, there would have been no Stoa.&rdquo;</em></p><p>He wrote an extraordinary <strong>705 books</strong> (none survive complete).<span class="cite">[2]<span class="cite-tip">AF-09: The Stoic App Blog, &ldquo;Chrysippus: The Second Founder&rdquo; (2024).</span></span> He systematized Stoic doctrine in all three branches, defended it against the Academic Skeptics, and developed innovations in logic that would not be fully appreciated for two millennia.</p><div class="s-stat"><div class="st"><div class="sv">705</div><div class="sl">books written</div></div><div class="st"><div class="sv">0</div><div class="sl">survive complete</div></div><div class="st"><div class="sv">2,000 yr</div><div class="sl">until logic recognized</div></div></div>`,
  `<p>The scope of Stoic &ldquo;logic&rdquo; (logike) was much wider than the modern term, encompassing epistemology, rhetoric, grammar, and formal logic. Chrysippus developed the <strong>first formal system of propositional logic</strong> in Western philosophy.<span class="cite">[3]<span class="cite-tip">AF-04: SEP, &ldquo;Ancient Logic&rdquo; (rev. 2020).</span></span></p><p>Five indemonstrable syllogisms served as axioms. Four inference rules (themata) reduced complex arguments. He also developed the phantasia-synkatathesis-katalepsis epistemological sequence, the theory of lekta (sayables), and worked on the Liar paradox and the Sorites.</p><div class="chips"><span class="chip">propositional logic</span><span class="chip">epistemology</span><span class="chip">rhetoric</span><span class="chip">philosophy of language</span><span class="chip">paradoxes</span></div>`,
  `<p>Stoic physics is <strong>materialist monism</strong>: everything that exists is corporeal.<span class="cite">[4]<span class="cite-tip">AF-06: Wikipedia, &ldquo;Stoic Physics.&rdquo;</span></span> Two principles: active (logos/God/Nature &mdash; intelligent fire or aether) and passive (matter). The active principle pervades all matter as <em>pneuma</em> (vital breath) in four gradations:</p><ul class="s-list"><li><strong>Hexis</strong> (cohesion) &mdash; holds inanimate objects together</li><li><strong>Physis</strong> (nature) &mdash; enables growth in plants</li><li><strong>Psyche</strong> (soul) &mdash; enables sensation and impulse in animals</li><li><strong>Logos</strong> (reason) &mdash; enables rational thought in humans and the cosmos</li></ul>`,
  `<p>Ethics was the culmination of the system: physics tells us how the world works, logic gives us tools to reason about it, ethics tells us how to live in it. <strong>Virtue (arete) is the sole good</strong>; vice the sole evil; everything else is &ldquo;indifferent.&rdquo;</p><p>The sage (sophos) is a normative ideal &mdash; a perfectly virtuous person who never errs. Progress toward virtue (prokope) is the realistic goal. Core doctrines (dichotomy of control, cosmopolitanism, preferred indifferents) are treated in depth in <a href="s3-core-doctrines.dd.html">Section 3</a>.</p>`,
  `<p>A crucial methodological point: we have <strong>virtually no complete texts from the Early Stoa</strong>. Our knowledge comes from fragments and quotations (often in hostile sources like Plutarch or Sextus Empiricus), doxographic summaries (Diogenes Laertius, Stobaeus), and later Stoic texts that reference earlier doctrines.</p><p>This means our picture of Early Stoicism is a scholarly <em>reconstruction</em>, not a direct reading. The system we attribute to Zeno and Chrysippus is real but mediated through centuries of secondary transmission.</p>`,
  `<ul class="s-list pro"><li>Stoicism was a comprehensive philosophical system, not just an ethical code</li><li>Chrysippus&rsquo;s contributions to logic were original and anticipate modern propositional logic</li><li>The three-part structure (logic, physics, ethics) was integral &mdash; each part supported the others</li><li>The fragment problem means we know Early Stoicism only through reconstruction</li></ul>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>Zeno</em> &amp; the Founding</h2></div><p>When Zeno of Citium began teaching at the Painted Porch around 300 BCE, he established not just a school of ethics but a comprehensive philosophical system. A Phoenician merchant who according to tradition was shipwrecked near Athens, Zeno studied under Crates the Cynic, then at Plato&rsquo;s Academy and the Megarian School, absorbing influences from multiple traditions before synthesizing them into something new.</p><h3>The Three Parts</h3><p>Zeno divided philosophy into three interconnected parts &mdash; logic, physics, and ethics &mdash; each supporting and depending on the others. This tripartite structure was the Stoics&rsquo; own innovation, not borrowed from other schools. Various Stoics used analogies to express the unity: philosophy is like an egg (logic is the shell, physics the white, ethics the yolk) or a fertile field (logic is the fence, physics the soil, ethics the fruit).</p><h3>Key Innovations</h3><p>Zeno was responsible for elevating virtue and duty as the supreme goals of life. He preoccupied himself mostly with ethics, although he laid the foundations of logic and physics at the Stoa. His most radical claims: virtue is the only good, vice the only evil, everything else is indifferent. These positions would define the school for centuries.</p><div class="callout"><h4>Historical Context</h4><p>Zeno founded his school in the aftermath of Alexander the Great&rsquo;s conquests, which had shattered the Greek city-state model. The cosmopolitan worldview of Stoicism &mdash; we are citizens of the cosmos, not just our city &mdash; responded directly to this new political reality.</p></div>`,
  `<div class="detail-header"><div class="num">02</div><h2><em>Cleanthes</em>: The Faithful Successor</h2></div><p>Cleanthes of Assos succeeded Zeno as the second head (scholarch) of the Stoic school. His background was unusual for a philosopher: he had been a boxer and earned his living as a water-carrier at night so he could attend lectures during the day. His endurance and dedication became proverbial.</p><h3>The Hymn to Zeus</h3><p>Cleanthes&rsquo;s most significant surviving work is the Hymn to Zeus, the longest continuous fragment from the Early Stoa. It identifies Zeus with the cosmic logos &mdash; the rational principle governing all things &mdash; and expresses the Stoic vision of a providentially ordered universe in which humans find their proper place through rational virtue.</p><h3>Contribution to the School</h3><p>Cleanthes absorbed all of Zeno&rsquo;s lectures and could observe firsthand how Stoicism gradually shaped into a coherent framework. He was faithful to Zeno&rsquo;s core doctrines but contributed particularly to Stoic theology and the connection between physics and ethics. He served as a bridge between the founding generation and Chrysippus, who would systematize everything.</p>`,
  `<div class="detail-header"><div class="num">03</div><h2><em>Chrysippus</em>: The Second Founder</h2></div><p>Chrysippus of Soli (c. 279&ndash;206 BCE) was the most important Stoic thinker after Zeno. His systematic codification of Stoic doctrine earned him the title &ldquo;the second founder&rdquo; of the school. According to Diogenes Laertius, he wrote 705 books &mdash; none survive complete, but fragments and summaries reveal an intellect of extraordinary range.</p><h3>Defending Against the Skeptics</h3><p>One of Chrysippus&rsquo;s key contributions was defending Stoicism against the powerful attacks of the Academic Skeptics (Arcesilaus, Carneades). The Skeptics challenged the Stoic epistemological claim that certain impressions (kataleptikai phantasiai) can be reliably distinguished as true. Chrysippus developed sophisticated responses that sharpened Stoic epistemology.</p><h3>The Theory of Lekta</h3><p>Chrysippus developed the theory of lekta (sayables/meanings) &mdash; an early form of propositional content theory that distinguished between the physical utterance, the thing referred to, and the meaning expressed. This was a remarkable anticipation of modern philosophy of language.</p><div class="callout"><h4>Scale of Loss</h4><p>Chrysippus wrote over 300 books on logic alone, covering speech act theory, sentence analysis, indexicals, existential propositions, sentential connectives, negations, disjunctions, conditionals, modal logic, tense logic, epistemic logic, and logical paradoxes. The scale of this textual loss is among the largest in the history of ancient philosophy.</p></div>`,
  `<div class="detail-header"><div class="num">04</div><h2><em>Stoic</em> Logic</h2></div><p>Chrysippus developed the first formal system of propositional logic in Western philosophy. Where Aristotle&rsquo;s term logic analyzed relations between terms, Stoic logic analyzed relations between whole propositions.</p><h3>Five Indemonstrable Syllogisms</h3><p>Chrysippus identified five basic argument forms (indemonstrables) that served as axioms, with four inference rules (themata) for reducing complex arguments to these basic forms. This created a complete deductive system for propositional reasoning.</p><h3>Epistemology</h3><p>The Stoic epistemological sequence: phantasia (impression) strikes the mind; we choose whether to give synkatathesis (assent); correct assent to a cognitive impression produces katalepsis (cognitive grasp). The sage never gives assent to false impressions. This sequence would later become the foundation of CBT&rsquo;s model of thoughts triggering emotions.</p><h3>Historical Significance</h3><p>It was not until the 20th century, with advances in modern propositional calculus, that it became clear Stoic logic constituted a genuinely significant achievement. For nearly two millennia, Aristotelian term logic dominated, and Chrysippus&rsquo;s innovations were treated as curiosities rather than breakthroughs.</p>`,
  `<div class="detail-header"><div class="num">05</div><h2><em>Stoic</em> Physics</h2></div><p>Stoic physics is materialist monism: everything that exists is corporeal. Only bodies can act or be acted upon, which means even the soul and God (logos) are physical entities &mdash; a position that scandalized Platonists but gave Stoic philosophy remarkable internal consistency.</p><h3>Two Principles</h3><p>The active principle (logos/God/Nature) is intelligent fire or aether that pervades and animates the entire universe. The passive principle is matter itself. These two are never separated. This makes Stoic physics a form of pantheism: God is not separate from the world but identical with the rational order of nature.</p><h3>Pneuma and Its Gradations</h3><p>The active principle manifests as pneuma in four levels: hexis holds inanimate objects together; physis enables growth in plants; psyche enables sensation in animals; logos enables reason in humans and in the cosmos as a whole.</p><h3>Determinism and Compatibilism</h3><p>Everything happens through antecedent causes. But Chrysippus distinguished determinism from fatalism. His cylinder analogy: when pushed, a cylinder rolls because of its shape (internal cause) combined with the push (external cause). Our character is itself a cause. This makes the Stoics the first compatibilists in Western philosophy.</p><div class="callout"><h4>Modern Relevance</h4><p>Pigliucci proposes replacing Stoic logos with the laws of nature and dropping eternal recurrence. Whether this substitution preserves or undermines the system is one of the central debates in modern Stoicism.</p></div>`,
  `<div class="detail-header"><div class="num">06</div><h2><em>Stoic</em> Ethics in Brief</h2></div><p>Ethics was the culmination of the Stoic system. Physics tells us how the world works. Logic gives us tools to reason correctly. Ethics tells us how to live: in accordance with nature, which means in accordance with reason.</p><h3>The Radical Claim</h3><p>Virtue is the only genuine good. Vice is the only genuine evil. Everything else is &ldquo;indifferent.&rdquo; A person can be fully happy while sick, poor, and enslaved, if they are virtuous.</p><h3>The Sage</h3><p>The Stoic sage is a normative ideal: a perfectly virtuous person who never gives assent to false impressions and possesses all four cardinal virtues as a unified disposition. The Stoics acknowledged the sage may never have existed. Progress toward virtue (prokope) is the realistic goal.</p>`,
  `<div class="detail-header"><div class="num">07</div><h2>The <em>Fragment</em> Problem</h2></div><p>Our knowledge of Early Stoicism faces a fundamental methodological challenge: virtually no complete texts survive from the founders.</p><h3>Sources of Knowledge</h3><div class="feat-grid"><div class="feat"><h4>Hostile Witnesses</h4><p>Plutarch, Sextus Empiricus quoted Stoic doctrines to attack them. Their accounts may distort what Stoics actually said.</p></div><div class="feat"><h4>Doxographers</h4><p>Diogenes Laertius, Stobaeus compiled summaries. Useful but often superficial.</p></div><div class="feat"><h4>Later Stoics</h4><p>Epictetus and others reference earlier doctrines through Roman-era concerns.</p></div><div class="feat"><h4>Modern Reconstruction</h4><p>Von Arnim&rsquo;s SVF (1903&ndash;05) collects fragments. Long &amp; Sedley (1987) is the modern standard.</p></div></div><p>The system we attribute to Zeno and Chrysippus is real but mediated. Every claim carries an implicit caveat about the limits of surviving evidence.</p>`,
  `<div class="detail-header"><div class="num">08</div><h2>What Sources <em>Agree</em> On</h2></div><p>Across 10 sources, four points of strong convergence emerge:</p><div class="feat-grid"><div class="feat"><h4>Comprehensive System</h4><p>Stoicism was a complete philosophical system (logic + physics + ethics), not just an ethical code.</p></div><div class="feat"><h4>Chrysippus&rsquo;s Logic</h4><p>Genuinely original, anticipating modern developments by two millennia.</p></div><div class="feat"><h4>Integral Structure</h4><p>The three parts were not organizational convenience but philosophical necessity.</p></div><div class="feat"><h4>Fragment Problem</h4><p>We know Early Stoicism only through reconstruction. A real limitation.</p></div></div><h3>Where Sources Disagree</h3><p>How much of the system is Zeno&rsquo;s vs. Chrysippus&rsquo;s. Whether Stoic physics can be updated for modern science. How seriously to take determinism and eternal recurrence.</p>`
];

sections.forEach((sec, idx) => { const item = document.createElement('div'); item.className = 'sidebar-item' + (idx === 0 ? ' active' : ''); item.setAttribute('data-label', sec.short); item.innerHTML = '<span class="sidebar-num">' + sec.num + '</span><span class="sidebar-label">' + sec.short + '</span>'; item.onclick = () => scrollToSection(idx); sidebarNav.appendChild(item); });
const sidebarTip = document.createElement('div'); sidebarTip.className = 'sidebar-tooltip'; document.body.appendChild(sidebarTip);

sidebarNav.addEventListener('mousemove', (e) => { if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const item = e.target.closest('.sidebar-item'); if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; } const rect = item.getBoundingClientRect(); const sRight = sidebarEl.getBoundingClientRect().right; sidebarTip.textContent = item.getAttribute('data-label'); sidebarTip.style.left = (sRight - 1) + 'px'; sidebarTip.style.top = rect.top + 'px'; sidebarTip.style.height = rect.height + 'px'; if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); } });
const mainScroll = document.getElementById('main-scroll'); const mainInner = document.createElement('div'); mainInner.className = 'main-scroll-inner'; mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = '<div class="s-num"><span>' + sec.num + '</span><button class="s-detail-btn" onclick="openDetail(' + idx + ')"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>' + sec.title + '</h2>' + summaries[idx]; mainInner.appendChild(block); });
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => { const detailDiv = document.createElement('div'); detailDiv.className = 'detail'; detailDiv.id = 'detail-' + idx; detailDiv.innerHTML = details[idx]; rightInner.appendChild(detailDiv); });

function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById('detail-' + idx).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return; const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return; const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar'); if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
