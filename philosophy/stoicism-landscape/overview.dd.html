*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

.detail-open .ctrl-btn.detail-btn .icon-close{display:block}

.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}

.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}

.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}

.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}

.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}

.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail h3::before{display:none}

.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}

<script>
const sections = [

const summaries = [
  `<p>Stoicism began around 300 BCE when Zeno of Citium founded a school at the Painted Porch (Stoa Poikile) in Athens.<span class="cite">[1]<span class="cite-tip">AF-01: Stanford Encyclopedia of Philosophy, &ldquo;Stoicism&rdquo; (rev. 2023).</span></span> But what Zeno built was not just an ethical code &mdash; it was a <strong>complete philosophical system</strong> encompassing logic, physics, and ethics, each part interlocking with the others.</p>
   <p>Chrysippus (c. 279&ndash;206 BCE), the &ldquo;second founder,&rdquo; systematized the doctrine so thoroughly that he wrote 705 books<span class="cite">[2]<span class="cite-tip">AF-09: The Stoic App Blog, &ldquo;Chrysippus: The Second Founder Who Systematized Stoicism&rdquo; (2024).</span></span> and developed propositional logic two millennia before it was recognized.<span class="cite">[3]<span class="cite-tip">AF-04: SEP, &ldquo;Ancient Logic&rdquo; (rev. 2020).</span></span> The irony: virtually none of the Early Stoa&rsquo;s texts survive. What we know comes from fragments and hostile quotations.<span class="cite">[4]<span class="cite-tip">AF-02: IEP, &ldquo;Stoicism&rdquo; &mdash; only fragments survive from the Early Stoa.</span></span></p>
   <div class="s-stat">
     <div class="st"><div class="sv">c. 300 BCE</div><div class="sl">school founded</div></div>
     <div class="st"><div class="sv">705</div><div class="sl">books by Chrysippus</div></div>
     <div class="st"><div class="sv">3</div><div class="sl">parts: logic, physics, ethics</div></div>
     <div class="st"><div class="sv">0</div><div class="sl">complete early texts survive</div></div>
   </div>`,

  `<p>The Stoicism most people encounter is Roman, not Greek. Only three ancient Stoics survive in complete books: <strong>Seneca</strong> (letters and moral essays), <strong>Epictetus</strong> (discourses transcribed by his student Arrian<span class="cite">[5]<span class="cite-tip">RS-01: SEP, &ldquo;Epictetus&rdquo; (rev. 2023).</span></span>), and <strong>Marcus Aurelius</strong> (private meditations never intended for publication<span class="cite">[6]<span class="cite-tip">RS-02: SEP, &ldquo;Marcus Aurelius&rdquo; (rev. 2022).</span></span>).</p>
   <p>Roman Stoicism shifted from system-building to <em>soul therapy</em> &mdash; practical moral philosophy in epistolary, handbook, and journal form.<span class="cite">[7]<span class="cite-tip">RS-06: WCU Thesis, &ldquo;The Evolution of Stoicism&rdquo; (2019).</span></span> This practical turn is what makes Stoicism uniquely available for modern revival: the texts read as direct moral advice, no specialist training required.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Seneca</h4><p>Advisor to Nero. 124 Letters to Lucilius on practical ethics. Forced suicide in 65 CE.</p></div>
     <div class="feat"><h4>Epictetus</h4><p>Born a slave. Founded school at Nicopolis. More popular than Plato in his time.</p></div>
     <div class="feat"><h4>Marcus Aurelius</h4><p>Emperor 161&ndash;180 CE. Private journal of self-examination during frontier wars.</p></div>
     <div class="feat"><h4>The Shift</h4><p>Technical treatises gave way to letters, handbooks, and meditations for practical living.</p></div>
   </div>`,

  `<p>The philosophical claims of Stoicism are more radical than most popular treatments suggest. <strong>Virtue is the only good.</strong><span class="cite">[8]<span class="cite-tip">AF-03: IEP, &ldquo;Stoic Ethics&rdquo; &mdash; virtue as the sole good (monistic theory).</span></span> Health, wealth, reputation, even life itself, are &ldquo;indifferent&rdquo; to happiness.<span class="cite">[9]<span class="cite-tip">CD-05: Routledge Encyclopedia, &ldquo;Stoicism &mdash; The Indifferents.&rdquo;</span></span> The dichotomy of control directs effort inward.<span class="cite">[10]<span class="cite-tip">CD-01: Philosophy Break, &ldquo;The Dichotomy of Control&rdquo; (2023).</span></span> Cosmopolitanism demands concern for all humanity.</p>
   <p>The Stoic theory of emotions is particularly sophisticated: emotions are not irrational forces but <em>false judgments</em> &mdash; specifically, assent to false impressions about what is good or bad. The goal (apatheia) is not emotional suppression but freedom from destructive passions, while cultivating positive emotions: joy, rational wish, and caution.<span class="cite">[11]<span class="cite-tip">CD-07: Pigliucci, &ldquo;From Ancient to New Stoicism: III &mdash; Stoic Ethics&rdquo; (2020).</span></span></p>
   <div class="s-stat">
     <div class="st"><div class="sv">4</div><div class="sl">cardinal virtues</div></div>
     <div class="st"><div class="sv">1</div><div class="sl">good: virtue</div></div>
     <div class="st"><div class="sv">1</div><div class="sl">evil: vice</div></div>
     <div class="st"><div class="sv">&infin;</div><div class="sl">indifferents</div></div>
   </div>`,

  `<p>Stoicism is arguably more widely practiced today than at any point since the Roman Empire. Ryan Holiday&rsquo;s books have sold <strong>over 10 million copies</strong> in 40+ languages.<span class="cite">[12]<span class="cite-tip">MR-02: Ryan Holiday, Wikipedia + Daily Stoic &mdash; 10M+ copies in 40+ languages.</span></span> The Modern Stoicism organization hosts annual conferences (Stoicon) and runs Stoic Week experiments with ~40,000 participants showing measurable wellbeing gains.<span class="cite">[13]<span class="cite-tip">MR-06: Stoic Week Research Results, Modern Stoicism + Royal Holloway (2012&ndash;2025).</span></span></p>
   <p>But the revival is not monolithic. Three distinct streams &mdash; academic (Pigliucci, Sellars), therapeutic (Robertson, LeBon), and popular (Holiday, Irvine) &mdash; coexist in productive but real tension.<span class="cite">[14]<span class="cite-tip">MR-09: Jules Evans, &ldquo;The Big, Messy Tent of Modern Stoicism&rdquo; (2015).</span></span> Silicon Valley&rsquo;s adoption has raised pointed questions about whether resilience-for-profit is actually Stoicism at all.<span class="cite">[15]<span class="cite-tip">MR-08: Pigliucci, &ldquo;Silicon Valley Style Stoicism&rdquo; (2019).</span></span></p>
   <div class="s-stat">
     <div class="st"><div class="sv">10M+</div><div class="sl">Holiday books sold</div></div>
     <div class="st"><div class="sv">40K</div><div class="sl">Stoic Week participants</div></div>
     <div class="st"><div class="sv">15%</div><div class="sl">drop in negative emotions</div></div>
     <div class="st"><div class="sv">14%</div><div class="sl">rise in life satisfaction</div></div>
   </div>`,

  `<p>The connection between Stoicism and cognitive behavioral therapy is not a loose analogy &mdash; it is a <strong>documented historical lineage</strong>. Albert Ellis explicitly drew on Epictetus when creating REBT in the 1950s.<span class="cite">[16]<span class="cite-tip">CB-02: The Walled Garden, &ldquo;Albert Ellis: Stoicism as the Root of CBT&rdquo; (2023).</span></span> Aaron Beck acknowledged Stoic origins in his treatment manuals for depression.<span class="cite">[17]<span class="cite-tip">CB-03: Jules Evans, &ldquo;RIP Aaron Beck, Founder of CBT and Reviver of the Stoics&rdquo; (2021).</span></span> Robertson documents 18 specific parallels between Stoic techniques and CBT interventions.<span class="cite">[18]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span></p>
   <p>The shared core principle: emotional disturbance comes from our <em>judgments</em> about events, not from events themselves. This maps directly from Epictetus&rsquo;s Enchiridion to Beck&rsquo;s cognitive model. What CBT drops is the comprehensive ethical framework &mdash; it borrows techniques while detaching them from Stoic values.<span class="cite">[19]<span class="cite-tip">CB-01: Robertson, &ldquo;Stoic Philosophy as a Cognitive-Behavioral Therapy&rdquo; (2019).</span></span></p>
   <div class="feat-grid">
     <div class="feat"><h4>Epictetus &rarr; Ellis</h4><p>REBT (1955): &ldquo;It&rsquo;s not things that upset us but our judgments about them.&rdquo; Direct from the Enchiridion.</p></div>
     <div class="feat"><h4>Ellis &rarr; Beck</h4><p>Beck&rsquo;s Cognitive Therapy (1960s) acknowledged Stoic origins. Influence mainly through REBT.</p></div>
     <div class="feat"><h4>CBT &rarr; Third Wave</h4><p>ACT, MBCT, DBT incorporate mindfulness elements with additional Stoic parallels.</p></div>
     <div class="feat"><h4>Evidence Base</h4><p>Stoic Week: 15% fewer negative emotions, 14% higher life satisfaction after 7 days.</p></div>
   </div>`,

  `<p>The most serious critiques of Stoicism target its emotional philosophy, its political implications, and its modern popularization. Martha Nussbaum argues that extirpating emotions like grief, anger, and love leads to a &ldquo;shallow and dehumanizing psychology.&rdquo;<span class="cite">[20]<span class="cite-tip">CL-01: Nussbaum, The Therapy of Desire (1994) + Upheavals of Thought (2001).</span></span> Critics charge that acceptance-of-what-you-can&rsquo;t-control shades into political quietism.<span class="cite">[21]<span class="cite-tip">CL-04: New Statesman, &ldquo;The Problem with Stoicism&rdquo; (2007).</span></span></p>
   <p>The sharpest historical critique: ancient Stoics never questioned the institution of slavery, despite cosmopolitan principles that should have demanded it.<span class="cite">[22]<span class="cite-tip">CL-05: Philosophy Now, &ldquo;The Stoic&rsquo;s Lacuna&rdquo; (2021).</span></span> The sharpest contemporary critique: pop-Stoicism in its Silicon Valley variant markets emotional repression as masculine strength, co-opted by the &ldquo;manosphere&rdquo; in ways the ancient Stoics would not recognize.<span class="cite">[23]<span class="cite-tip">CL-08: Forward Pathway, &ldquo;The Modern Revival of Stoicism &mdash; Critical Reflections&rdquo; (2024).</span></span></p>
   <ul class="s-list con">
     <li>Emotional suppression charge &mdash; apatheia misread as emotional flatness</li>
     <li>Political quietism &mdash; acceptance-of-fate as acceptance-of-injustice</li>
     <li>Slavery silence &mdash; humanitarian principles without institutional critique</li>
     <li>Pop-Stoicism dilution &mdash; philosophy reduced to productivity hacks</li>
     <li>Gender skew &mdash; modern movement&rsquo;s overwhelmingly male audience</li>
   </ul>`,

  `<p>The most valuable findings in any philosophical survey are the contradictions &mdash; places where credible interpreters, looking at the same tradition, reach opposite conclusions. Five fractures define the Stoic discourse today.</p>
   <ul class="s-list">
     <li><strong>Metaphysics vs. ethics:</strong> Can Stoic ethics survive without Stoic physics? Pigliucci says update the metaphysics; traditionalists say the system loses coherence.</li>
     <li><strong>Emotions:</strong> Nussbaum says apatheia dehumanizes. Pigliucci says she attacks a straw-man. Robertson says CBT validates Stoic psychology empirically.</li>
     <li><strong>Politics:</strong> Critics say Stoicism breeds quietism. Defenders point to Cato, the Stoic Opposition, Marcus Aurelius the philosopher-king.</li>
     <li><strong>Pop vs. philosophy:</strong> Is Ryan Holiday good for Stoicism or bad for it? Academics grudgingly acknowledge the gateway effect while worrying about dilution.</li>
     <li><strong>Gender:</strong> Is modern Stoicism&rsquo;s male skew intrinsic to the philosophy or to the marketing? The ancient Stoics were among the most egalitarian thinkers of their time.</li>
   </ul>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>Ancient</em> Foundations</h2></div>
   <p>When Zeno of Citium began teaching at the Painted Porch around 300 BCE, he established not just a school of ethics but a comprehensive philosophical system that would endure for five centuries.<span class="cite">[1]<span class="cite-tip">AF-01: SEP, &ldquo;Stoicism&rdquo; (rev. 2023).</span></span> The Stoics divided philosophy into three interconnected parts &mdash; logic, physics, and ethics &mdash; each supporting and depending on the others.</p>
   <h3>The Three Founders</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Zeno of Citium</h4><p>Phoenician merchant, shipwrecked near Athens, studied under Crates the Cynic. Founded the school c. 301 BCE. Laid foundations of logic, physics, and ethics. Elevated virtue and duty as supreme goals.</p></div>
     <div class="feat"><h4>Cleanthes of Assos</h4><p>Former boxer and water-carrier. Succeeded Zeno as scholarch. Known for religious devotion and the Hymn to Zeus &mdash; identifying Zeus with the cosmic logos. Faithful bridge between founder and systematizer.</p></div>
     <div class="feat"><h4>Chrysippus of Soli</h4><p>The &ldquo;second founder.&rdquo; Wrote 705 books (none survive complete). Systematized all three branches. Defended Stoicism against Academic Skeptics. Developed propositional logic.</p></div>
     <div class="feat"><h4>The Fragment Problem</h4><p>Virtually no complete texts survive from the Early Stoa. Knowledge comes from fragments, hostile quotations (Plutarch, Sextus Empiricus), and doxographic summaries (Diogenes Laertius).</p></div>
   </div>
   <h3>Stoic Logic</h3>
   <p>Chrysippus developed the first formal system of propositional logic in Western philosophy &mdash; analyzing relations between whole propositions rather than terms.<span class="cite">[3]<span class="cite-tip">AF-04: SEP, &ldquo;Ancient Logic&rdquo; (rev. 2020).</span></span> Five indemonstrable syllogisms served as axioms, with four inference rules (themata) for reducing complex arguments. He also worked on epistemology (the phantasia-synkatathesis-katalepsis sequence), philosophy of language (the theory of lekta), and paradoxes (the Liar, the Sorites).<span class="cite">[24]<span class="cite-tip">AF-05: Wikipedia, &ldquo;Stoic Logic.&rdquo;</span></span> This achievement was not fully recognized until 20th-century propositional calculus revealed its significance.</p>
   <h3>Stoic Physics</h3>
   <p>Stoic physics is materialist monism: everything that exists is corporeal.<span class="cite">[25]<span class="cite-tip">AF-06: Wikipedia, &ldquo;Stoic Physics.&rdquo;</span></span> Two principles operate: the active (logos/God/Nature &mdash; intelligent fire or aether) and the passive (matter). The active principle pervades all matter as pneuma in four gradations: hexis (cohesion in inanimate objects), physis (growth in plants), psyche (sensation in animals), and logos (reason in humans and the cosmos).<span class="cite">[26]<span class="cite-tip">AF-07: Pigliucci, &ldquo;From Ancient to New Stoicism: I &mdash; Stoic Physics&rdquo; (2020).</span></span> The Stoics were determinists but also the first compatibilists &mdash; Chrysippus distinguished between determinism and fatalism, arguing that our responses remain &ldquo;up to us&rdquo; even within causal necessity.</p>
   <div class="callout"><h4>Key Insight</h4><p>The three-part structure was not organizational convenience but philosophical necessity. Ethics tells you how to live, but you need physics to understand the world you live in, and logic to reason correctly about both. This is why modern Stoicism&rsquo;s focus on ethics alone troubles traditionalists.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2>The <em>Roman</em> Stoics</h2></div>
   <p>The shift from Greek to Roman Stoicism was not merely a loss of texts but a genuine philosophical transformation. Where Greek Stoics built systems, Roman Stoics practiced therapy of the soul &mdash; and their literary forms (letters, discourses, private journals) reflect this change in purpose.</p>
   <h3>Seneca (c. 4 BCE &ndash; 65 CE)</h3>
   <p>Born in Cordoba, educated in Rome, Seneca became tutor and advisor to Emperor Nero. His 124 Letters to Lucilius cover friendship, grief, anger, the shortness of life, and the proper use of time &mdash; the most widely read Stoic text in the 17th century.<span class="cite">[27]<span class="cite-tip">RS-07: Mises Institute, &ldquo;Wisdom of the Stoics.&rdquo;</span></span> His great tension: preaching simplicity while amassing wealth under Nero. Stoic defenders note that wealth is a &ldquo;preferred indifferent&rdquo; &mdash; not evil, just not constitutive of happiness &mdash; and that Seneca acknowledged his own imperfection. Forced to commit suicide by Nero in 65 CE.</p>
   <h3>Epictetus (c. 50 &ndash; c. 135 CE)</h3>
   <p>Born as a slave (his name literally means &ldquo;acquired&rdquo;). Studied under Musonius Rufus. Freed after Nero&rsquo;s death. Banished from Rome under Domitian, he founded a school at Nicopolis.<span class="cite">[5]<span class="cite-tip">RS-01: SEP, &ldquo;Epictetus&rdquo; (rev. 2023).</span></span> More popular in his own time than Plato (according to Origen).<span class="cite">[28]<span class="cite-tip">RS-04: Britannica, &ldquo;Epictetus.&rdquo;</span></span> His Discourses and Enchiridion were transcribed by his student Arrian &mdash; Epictetus wrote nothing himself. He maintained the closest connection to Chrysippus&rsquo;s original Stoic doctrine of any Late Stoic.<span class="cite">[29]<span class="cite-tip">RS-03: IEP, &ldquo;Epictetus&rdquo; &mdash; completely free of eclecticism.</span></span></p>
   <h3>Marcus Aurelius (121 &ndash; 180 CE)</h3>
   <p>Roman Emperor who wrote the Meditations as private spiritual exercises during military campaigns on the Danube frontier. Never intended for publication. Written in Greek. Heavily influenced by Epictetus, whom he cites repeatedly.<span class="cite">[6]<span class="cite-tip">RS-02: SEP, &ldquo;Marcus Aurelius&rdquo; (rev. 2022).</span></span> Represents the unique case of a philosopher-king &mdash; the figure Plato envisioned but never saw realized &mdash; practicing Stoicism at the highest level of political power.<span class="cite">[30]<span class="cite-tip">RS-05: Study.com, &ldquo;Roman Stoicism &mdash; Overview, Beliefs &amp; Virtues.&rdquo;</span></span></p>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">c. 4 BCE</div><div class="tl-text">Seneca born in Cordoba, Spain</div></div>
     <div class="tl-item"><div class="tl-date">c. 50 CE</div><div class="tl-text">Epictetus born as a slave in Hierapolis</div></div>
     <div class="tl-item"><div class="tl-date">65 CE</div><div class="tl-text">Seneca forced to suicide by Nero</div></div>
     <div class="tl-item"><div class="tl-date">93 CE</div><div class="tl-text">Epictetus banished from Rome; founds school at Nicopolis</div></div>
     <div class="tl-item"><div class="tl-date">121 CE</div><div class="tl-text">Marcus Aurelius born in Rome</div></div>
     <div class="tl-item"><div class="tl-date">161&ndash;180 CE</div><div class="tl-text">Marcus Aurelius reigns as emperor, writes the Meditations</div></div>
   </div>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Core</em> Doctrines</h2></div>
   <p>The philosophical substance of Stoicism is more radical than most popular treatments convey. These are not self-help tips dressed in ancient robes &mdash; they are rigorous philosophical claims about the nature of the good, the structure of emotions, and the scope of moral concern.</p>
   <h3>The Dichotomy of Control</h3>
   <p>Epictetus, Enchiridion 1: some things are within our power (opinion, motivation, desire, aversion) and others are not (body, property, reputation, office). This is not passive acceptance but a framework for directing effort &mdash; the Stoic invests emotional energy only in their own judgments and choices, not in outcomes. William Irvine&rsquo;s modification into a &ldquo;trichotomy&rdquo; has been criticized by scholars for departing from the ancient sources without philosophical justification.</p>
   <h3>Virtue as the Sole Good</h3>
   <p>The most radical claim: virtue (arete) is the only genuine good; vice the only genuine evil; everything else is &ldquo;indifferent&rdquo; with respect to happiness. The four cardinal virtues &mdash; wisdom, courage, justice, temperance &mdash; are unified: you cannot possess one without the others. The sage (sophos) is a normative ideal, not a realistic expectation. Progress toward virtue (prokope) is the realistic goal.</p>
   <h3>Preferred Indifferents</h3>
   <p>The Stoics anticipated the obvious objection to calling health and wealth &ldquo;indifferent.&rdquo; Their response: indifferents have &ldquo;selective value&rdquo; (axia). Health is &ldquo;preferred&rdquo; and sickness &ldquo;dispreferred&rdquo; &mdash; in normal circumstances, choose health. But happiness does not depend on getting it. A person can be fully happy while sick, poor, and enslaved &mdash; if they are virtuous. This is the claim critics find most difficult to accept.</p>
   <h3>The Theory of Emotions</h3>
   <p>Emotions (pathe) are false judgments &mdash; assent to false impressions about what is good or bad. Four primary passions: appetite, fear, pleasure, distress. The Stoic goal (apatheia) is freedom from these destructive passions, NOT emotional suppression. Positive emotions (eupatheiai) are preserved: joy (rational elation), wish (rational desire), caution (rational aversion). This is the doctrine most commonly misunderstood.</p>

   </svg></div>`,

  `<div class="detail-header"><div class="num">04</div><h2>The <em>Modern</em> Revival</h2></div>
   <p>The modern Stoicism revival is a phenomenon without clear parallel in the history of Western philosophy: an ancient school of thought achieving genuine mass adoption 2,300 years after its founding, driven by bestselling books, international conferences, psychological research, and digital media.</p>
   <h3>Three Streams</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Academic</h4><p>Pigliucci, Sellars, Gill. Rigorous engagement with ancient texts. Modern Stoicism organization. Proposes &ldquo;Stoicism 2.0&rdquo; &mdash; updated metaphysics, preserved ethics.</p></div>
     <div class="feat"><h4>Therapeutic</h4><p>Robertson, LeBon. CBT practitioners integrating Stoic philosophy. Evidence-based: Stoic Week data shows measurable wellbeing improvements.</p></div>
     <div class="feat"><h4>Popular</h4><p>Holiday, Irvine. Mass-market accessibility. 10M+ copies sold. Daily Stoic newsletter, podcast, and bookstore reaching millions.</p></div>
     <div class="feat"><h4>Silicon Valley</h4><p>Tech sector adoption accelerated mainstream interest. But critics charge it distorts the tradition: resilience for profit, not virtue for its own sake.</p></div>
   </div>
   <h3>The Evidence</h3>
   <p>The Stoic Week experiment, running since 2012 with approximately 40,000 participants, has produced consistent results: a 15% reduction in negative emotions and a 14% increase in life satisfaction after just one week of Stoic practice. The SABS (Stoic Attitudes and Behaviours Scale) identifies seven dimensions of Stoic practice, with high scores linked to greater resilience, lower anger, and higher life satisfaction. 94% of participants would recommend Stoicism as useful life guidance.</p>
   <h3>The Tension</h3>
   <p>Pigliucci has explicitly criticized Silicon Valley Stoicism for emphasizing wealth-as-indifferent while ignoring virtue-as-the-only-good. Jules Evans describes the movement as a &ldquo;big, messy tent.&rdquo; The fundamental question: can Stoicism survive without its metaphysics? Pigliucci says yes (replace logos with laws of nature). Traditionalists worry the ethical system loses coherence without the cosmic framework.</p>`,

  `<div class="detail-header"><div class="num">05</div><h2>Stoicism &amp; <em>CBT</em></h2></div>
   <p>The relationship between Stoic philosophy and cognitive behavioral therapy is one of the most well-documented cases of ancient thought directly informing modern clinical practice.<span class="cite">[18]<span class="cite-tip">CB-08: Robertson, The Philosophy of CBT (Karnac, 2010).</span></span> It is not a metaphor or a loose parallel &mdash; it is a documented chain of influence that the founders of CBT explicitly acknowledged.</p>
   <h3>The Historical Chain</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">c. 55 CE</div><div class="tl-text">Epictetus teaches: &ldquo;It is not things that disturb us, but our judgments about things&rdquo; (Enchiridion 5)</div></div>
     <div class="tl-item"><div class="tl-date">1955&ndash;57</div><div class="tl-text">Albert Ellis develops REBT, explicitly drawing on Epictetus. First form of cognitive therapy.</div></div>
     <div class="tl-item"><div class="tl-date">1960s</div><div class="tl-text">Aaron Beck develops Cognitive Therapy for depression. Acknowledges Stoic origins.</div></div>
     <div class="tl-item"><div class="tl-date">1980s</div><div class="tl-text">REBT and CT merge into the broader CBT framework.</div></div>
     <div class="tl-item"><div class="tl-date">2010</div><div class="tl-text">Robertson publishes The Philosophy of CBT, documenting 18 specific Stoic-CBT parallels.</div></div>
     <div class="tl-item"><div class="tl-date">2000s&ndash;present</div><div class="tl-text">Third-wave CBT (ACT, MBCT, DBT) incorporates additional Stoic-parallel elements.</div></div>
   </div>
   <h3>Key Parallels</h3>
   <p>Examination of impressions maps to cognitive monitoring and thought records. Withholding assent from false impressions maps to cognitive distancing. Premeditatio malorum maps to decatastrophizing. The view from above maps to perspective-taking. Stoic journaling maps to CBT homework. The dichotomy of control maps to distinguishing controllable from uncontrollable factors.</p>
   <h3>What CBT Drops</h3>
   <p>CBT borrows Stoic techniques but detaches them from the comprehensive ethical framework. No virtue ethics, no cosmic perspective, no lifelong practice, no community dimension. Robertson argues this is a loss &mdash; the techniques work better within a coherent philosophical worldview. CBT without philosophical grounding becomes mere symptom management.</p>
   <div class="callout"><h4>The Core Shared Principle</h4><p>Emotional disturbance comes from our judgments about events, not from events themselves. This single insight connects Epictetus in the 1st century CE to every CBT therapist practicing today.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>Critiques</em> &amp; Limitations</h2></div>
   <p>Any tradition that has endured for 2,300 years has accumulated serious and substantive criticism. The best critiques of Stoicism are not dismissals but engagements &mdash; they take the philosophy seriously enough to argue with it on its own terms.</p>
   <h3>Nussbaum on Emotions</h3>
   <p>Martha Nussbaum accepts the Stoic cognitive theory (emotions are judgments) but rejects the conclusion (eliminate destructive ones).<span class="cite">[20]<span class="cite-tip">CL-01: Nussbaum, The Therapy of Desire (1994) + Upheavals of Thought (2001).</span></span> She argues that grief, anger, and love are forms of moral perception that should be cultivated, not extirpated. Important human goods &mdash; love, friendship, bodily integrity, political participation &mdash; necessarily expose us to risk and loss.<span class="cite">[31]<span class="cite-tip">CL-02: Nussbaum interview, Philosophy for Life / History of Emotions Blog (2012).</span></span> Stoic invulnerability neglects what people reasonably value. Pigliucci responds that Nussbaum attacks a straw-man: apatheia is freedom from destructive passions, not emotional flatness. The Stoics recognized positive emotions (eupatheiai).<span class="cite">[32]<span class="cite-tip">CL-10: Pigliucci, Reply to Nussbaum on Stoicism (2019).</span></span></p>
   <h3>Political Quietism</h3>
   <p>The charge that Stoicism breeds political passivity is complicated by historical evidence. Multiple Stoics were executed or exiled for resistance: Cato opposed Caesar, Seneca confronted Nero, the Stoic Opposition resisted the Flavians.<span class="cite">[33]<span class="cite-tip">CL-06: Aeon, &ldquo;When Stoicism Is a Political Not Just a Personal Virtue&rdquo; (2019).</span></span> But the philosophical framework does emphasize acceptance of externals, which can shade into acceptance of injustice. The slavery silence is the sharpest version: Stoics argued for humane treatment of slaves but never called for abolition.<span class="cite">[34]<span class="cite-tip">CL-07: Robertson, &ldquo;Did Stoicism Condemn Slavery?&rdquo; (2017).</span></span></p>
   <h3>The Pop-Stoicism Problem</h3>
   <div class="verdict">
     <div class="v-col pro"><h4>Gateway Argument</h4>
       <ul><li>Most Holiday readers eventually read Epictetus</li><li>Better watered-down Stoicism than no Stoicism</li><li>Mass awareness creates a funnel to deeper engagement</li></ul>
     </div>
     <div class="v-col con"><h4>Distortion Argument</h4>
       <ul><li>Emotional suppression marketed as strength</li><li>Resilience for profit, not virtue for its own sake</li><li>&ldquo;Manosphere&rdquo; co-optation of Stoic language</li></ul>
     </div>
   </div>`,

  `<div class="detail-header"><div class="num">07</div><h2>Where the <em>Discourse</em> Fractures</h2></div>
   <p>The most productive tensions in the study of Stoicism are not between Stoics and their critics but between equally serious interpreters who read the same tradition and reach different conclusions.</p>
   <h3>Five Fractures</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Metaphysics vs. Ethics</h4><p>Can Stoic ethics survive without Stoic physics? Pigliucci: yes, update the metaphysics. Traditionalists: the system loses coherence without the cosmic logos.</p></div>
     <div class="feat"><h4>Emotions</h4><p>Nussbaum: apatheia dehumanizes. Pigliucci: she attacks a straw-man. Robertson: CBT validates Stoic psychology empirically.</p></div>
     <div class="feat"><h4>Politics</h4><p>Critics: Stoicism breeds quietism. Defenders: Cato, the Stoic Opposition, Marcus Aurelius as philosopher-king.</p></div>
     <div class="feat"><h4>Pop vs. Philosophy</h4><p>Is Ryan Holiday good for Stoicism (gateway) or bad for it (dilution)? Most academics acknowledge both effects.</p></div>
   </div>
   <h3>The Gender Question</h3>
   <p>Modern Stoicism&rsquo;s audience skews heavily male. The &ldquo;manosphere&rdquo; has adopted Stoic language to market emotional repression as masculine virtue. Yet the ancient Stoics were among the most egalitarian thinkers of their era &mdash; Musonius Rufus explicitly argued that women should study philosophy. Is the male skew intrinsic to the philosophy or a product of modern marketing? The question remains genuinely open.</p>
   <div class="callout"><h4>The Meta-Question</h4><p>What does it mean that a 2,300-year-old philosophy is more popular today than at any point since the Roman Empire? Is the revival a sign that ancient wisdom endures &mdash; or that modern life creates the same conditions of uncertainty and powerlessness that drove Roman elites to the Stoa?</p></div>`
];

// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">Stoic<em>ism</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Philosophy Survey &middot; March 2026</div>
        <div class="hero-title">Stoicism <em>Overview</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>Ancient Foundations to Modern Revival</span><span>58 sources &middot; 6 dimensions</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = '<span class="sidebar-num">' + sec.num + '</span><span class="sidebar-label">' + sec.short + '</span>';
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = '<div class="s-num"><span>' + sec.num + '</span><button class="s-detail-btn" onclick="openDetail(' + idx + ')"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>' + sec.title + '</h2>' + summaries[idx];
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = 'detail-' + idx;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;
function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}
function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById('detail-' + idx).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}
function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}
function toggleDetail() {
  if (document.body.classList.contains('detail-open')) closeRight();
  else openDetail(lastDetailIdx);
}
function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
