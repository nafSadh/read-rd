    <h2>Why <em>AI</em> Changes Everything</h2>

  <p>Persuasion is not new. Rhetoric goes back to Aristotle. Propaganda enabled empires and genocides. Advertising shaped post-war consumerism. Yet all of these—despite their power—operated under constraints: they required human effort to create, targeted broadly or through crude segmentation, and demanded centralized control. The person doing the persuading was identifiable. The message was static. The feedback was delayed.</p>

  <h3>Why This Matters for Governance</h3>

  </ul>

  <h3>What Works Very Well</h3>
  <p>Conversely, some approaches show strong effects:</p>

  <ul class="s-list">
    <li><strong>Interactive dialogue:</strong> 150%+ boost over static messages</li>
    <li><strong>Personalized framing:</strong> Presenting the same argument in the target's preferred moral frame increases persuasion</li>
    <li><strong>Handling objections:</strong> Models that anticipate and defuse counterarguments are significantly more persuasive</li>
    <li><strong>Building false consensus:</strong> Mentioning that "many people agree" increases credibility and persuasion</li>
  </ul>

  <h3>The Scale Question: Does It Matter If Effect Sizes Are Small?</h3>
  <p>At the population level, even small effects compound. If 51% of voters see 1,000 AI-generated persuasive messages, and each shifts opinion by d = 0.3 standard deviations, the aggregate effect on the population is real. And if only 51% are exposed but they're swing voters in a close election, the effect is decisive.</p>

  <p>In other words: small effect sizes + large scale + strategic targeting of marginally-swayable people = large societal impact.</p>

  <h3>Critical Limitations</h3>
  <p>The evidence base also has gaps:</p>

  <ul class="s-list">
    <li><strong>External validity:</strong> Most studies recruit from online platforms (Amazon Mechanical Turk, Prolific). These samples are not representative of the general population.</li>
    <li><strong>Outcome measures:</strong> Most studies measure stated opinion shifts immediately after exposure. They don't measure behavior change or opinion persistence weeks later.</li>
    <li><strong>Real-world deployment:</strong> Lab settings don't capture the noise, competing messages, and existing beliefs of real elections or public discourse.</li>
    <li><strong>Adversarial robustness:</strong> It remains unknown how persuasive AI systems perform against users who know they are interacting with a machine.</li>
  </ul>

  <div class="verdict">
    <div class="v-col pro">
      <h4>The Optimistic Read</h4>
      <ul>
        <li>Effect sizes are modest, not catastrophic</li>
        <li>Counter-arguments and skepticism still work</li>
        <li>People are not infinitely malleable</li>
        <li>Transparency and media literacy offer defenses</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>The Concerning Read</h4>
      <ul>
        <li>Modest effects become massive at scale</li>
        <li>Dialogue multiplies effects significantly</li>
        <li>Targeting marginally-swayable people is decisive</li>
        <li>Attacker has speed and cost advantage</li>
      </ul>
    </div>
  </div>

  <h3>The Verdict on Evidence</h3>
  <p>The evidence is clear: LLMs are persuasive, interactive dialogue is a multiplier, and the threat is quantifiable. But the threat is not apocalyptic—it's structural. The risk is not that AI will make everyone believe false things, but that AI will give determined actors (campaigns, fraudsters, propagandists) the ability to shift populations at scale with minimal cost. That's enough to destabilize elections, markets, and trust. It doesn't require certainty; it requires probability and scale. And those we have.</p>`
];

// Detail panel
let currentDetail = 0;
function viewDetail(idx) {
  currentDetail = idx;
  document.body.classList.add('detail-open');
  const mainHead = document.querySelector('.main-head');
  mainHead.classList.add('compact');
  updateDetails();
  document.getElementById('right').classList.remove('closed');
  updateRightScroll();
}

function toggleDetail() {
  document.body.classList.toggle('detail-open');
  document.querySelector('.main-head').classList.toggle('compact');
  document.getElementById('right').classList.toggle('closed');
  if(!document.body.classList.contains('detail-open')) {
    currentDetail = 0;
  }
  updateDetails();
}

function updateDetails() {
  const details = document.querySelectorAll('.detail');
  details.forEach(d => d.style.display = 'none');
  details[currentDetail].style.display = 'block';
}

// Sidebar scrolling
function scrollToSection(idx) {
  currentDetail = idx;
  const blocks = document.querySelectorAll('.section-block');
  blocks[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.sidebar-item').forEach((item, i) => {
    item.classList.toggle('active', i === idx);
  });
}

// Right panel scroll
const rightPanel = document.getElementById('right');
const rightTopbar = document.querySelector('.right-topbar');
const stickyTitle = document.getElementById('right-sticky-title');
const detailEls = document.querySelectorAll('.detail');

function updateRightScroll() {
  if(rightPanel.scrollTop > 20) {
    rightTopbar.classList.add('scrolled');
    stickyTitle.classList.add('visible');
    stickyTitle.textContent = sections[currentDetail].short;
  } else {
    rightTopbar.classList.remove('scrolled');
    stickyTitle.classList.remove('visible');
  }
}

rightPanel.addEventListener('scroll', updateRightScroll);

// Sidebar hover
let sidebarHoverTimeout;
document.addEventListener('mousemove', (e) => {
  const item = e.target.closest('.sidebar-item');
  if(item && document.body.classList.contains('detail-open')) {
    const label = item.getAttribute('data-label');
    clearTimeout(sidebarHoverTimeout);
    sidebarTip.classList.add('visible');
    sidebarTip.textContent = label;
    const rect = item.getBoundingClientRect();
    sidebarTip.style.top = (rect.top + rect.height/2 - 12) + 'px';
    sidebarTip.style.left = (rect.right + 12) + 'px';
  } else {
    sidebarHoverTimeout = setTimeout(() => {
      sidebarTip.classList.remove('visible');
    }, 100);
  }
});
