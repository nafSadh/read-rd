<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revolution & Reaction | Sophie's World Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}

  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}

  `<div class="detail-header"><span class="num">01</span><h2>Romanticism & Schelling</h2></div>
   <p>Romanticism represented a decisive reaction against Enlightenment rationalism. Where the Enlightenment celebrated reason's power to illumine all domains of knowledge, Romanticism insisted that feeling, imagination, and aesthetic experience provided pathways to truth unreachable by pure reason. This was not anti-rational so much as supra-rational.</p>
   <h3>Schelling's Nature Philosophy</h3>
   <p>Friedrich Schelling developed the most systematic Romantic philosophy. Unlike Descartes's mechanical universe and Newton's clockwork cosmos, Schelling saw nature as a living, organic whole animated by a universal World Spirit. Mind and nature were not fundamentally opposed; rather, they were manifestations of the same underlying reality—the Absolute. This identity philosophy profoundly influenced later German Idealism, particularly Hegel.</p>
   <p>For Schelling, there is a fundamental gap between nature and human freedom. Nature expresses the Absolute unconsciously; humans alone achieve conscious self-realization. Art becomes the highest expression of truth, synthesizing scientific understanding with poetic imagination. A great artwork resolves the tension between nature and freedom, particular and universal, conscious and unconscious.</p>

  `<div class="detail-header"><span class="num">02</span><h2>Hegel's Dialectic & Absolute Idealism</h2></div>
   <p><a href="https://plato.stanford.edu/entries/hegel/" target="_blank">Georg Wilhelm Friedrich Hegel</a> constructed the most comprehensive philosophical system of the 19th century. His central innovation was the dialectical method: reality develops through contradiction. A thesis encounters its opposite (antithesis); their conflict generates a synthesis that transcends both while preserving their insights. This process repeats at ever-higher levels, driving history toward the realization of freedom and rationality.</p>
   <h3>The Dialectic in Motion</h3>
   <p>Consider the master-slave dialectic (which influenced Marxism and existentialism). Two self-consciousnesses meet; each demands recognition. The resulting struggle for recognition creates a hierarchy: one becomes master, the other slave. But this resolution is unstable. The master depends on the slave for recognition, while the slave, through labor and creativity, achieves true self-consciousness. The dialectic is not static but perpetually generating new contradictions.</p>
   <p><strong>Sublation (Aufhebung):</strong> Hegel's concept of overcoming contradictions is subtle. Aufhebung means simultaneously to negate, preserve, and elevate. The synthesis does not merely reject the thesis and antithesis but preserves their valid insights at a higher level. This distinguishes Hegel from simple negation or compromise.</p>
   <h3>World Spirit and History</h3>
   <p>For Hegel, Absolute Spirit (Geist) is ultimate reality. It achieves self-consciousness through human history and civilization. Different peoples and epochs represent stages in Spirit's self-realization. World History is therefore rational, moving inexorably toward freedom and self-understanding.</p>
   <p>This teleological view—that history has a predetermined endpoint—invites criticism. Does insisting history aims at freedom and reason impose meaning retrospectively? Do we distort past epochs by viewing them merely as steps toward the present?</p>
   <h3>Reception and Critique</h3>
   <p><strong>Marx's Inversion:</strong> Marx accepted Hegel's dialectical method but rejected Absolute Idealism. Material conditions, not Spirit, drive history. The dialectic operates in economic relations and class struggle, not abstract ideas.</p>
   <p><strong>Kierkegaard's Existential Critique:</strong> Actual human existence—concrete, particular, anxious—escapes Hegel's universal concepts. Philosophy's abstraction cannot capture the lived reality of individual choice.</p>
   <p><strong>Contemporary Rehabilitation:</strong> Some contemporary philosophers (Houlgate, Stern, Westphal) defend Hegel against traditional misreadings. They argue Hegel does not claim absolute knowledge from a transcendent standpoint but develops knowledge through historical experience.</p>

  `<div class="detail-header"><span class="num">03</span><h2>Kierkegaard: Existence & the Leap of Faith</h2></div>
   <p><a href="https://plato.stanford.edu/entries/kierkegaard/" target="_blank">Søren Kierkegaard</a> attacked Hegelian philosophy as fundamentally abstract and ahistorical. Hegel's system, Kierkegaard argued, treats the individual as merely a moment in universal historical development. But actual human existence is irreducibly particular. I am not a logical concept but a choosing, anxious, responsible individual. This insight—that existence precedes and exceeds essence—became foundational for 20th-century existentialism.</p>
   <h3>The Three Stages of Existence</h3>
   <p><strong>The Aesthetic Stage:</strong> Life devoted to immediate pleasure, beauty, sensory enjoyment. The aesthetic individual pursues happiness through diverse experiences. Yet this life is ultimately shallow and self-defeating; variety breeds boredom; pleasure dissipates.</p>
   <p><strong>The Ethical Stage:</strong> Recognition that universal moral principles bind us. The ethical individual acts from duty, not pleasure. Commitment to another person (marriage) and to society (law, convention) creates meaning. Yet pure ethics remains abstract; it does not address the ultimate meaninglessness of human existence.</p>
   <p><strong>The Religious Stage:</strong> Absolute commitment to transcendent truth (God). This cannot be rationally justified; it requires a "leap of faith"—a passionate, irrational commitment beyond rational calculation. Paradoxically, faith is truth for me precisely because it is absurd and cannot be rationalized.</p>
   <h3>Key Concepts</h3>
   <p><strong>Subjectivity as Truth:</strong> For Kierkegaard, "truth is subjectivity." This shocking claim means that truth is not objective knowledge but passionate, inward commitment. The Christian is true not because Christian doctrine is objectively proven but because one commits absolutely to it.</p>
   <p><strong>Anxiety (Angst):</strong> The fundamental condition of human freedom. Confronting my radical freedom—my ability to choose my essence through my choices—creates anxiety. This is not mere psychological fear but existential dread.</p>
   <p><strong>Authenticity:</strong> Authentic existence requires acknowledging my freedom and responsibility. Inauthentic existence ("bad faith," in Sartre's later term) denies my freedom by pretending to be determined by roles, society, or human nature.</p>
   <h3>Influence on Existentialism</h3>
   <p>Kierkegaard's emphasis on existence over essence, individual choice over universal concepts, and the irreducibility of subjective experience became the skeleton key for 20th-century existentialism. Yet Kierkegaard differs from later atheistic existentialists: his "leap" is toward God, not toward absurdity.</p>

  `<div class="detail-header"><span class="num">04</span><h2>Marx: Historical Materialism & Class Struggle</h2></div>
   <p><a href="https://plato.stanford.edu/entries/marx/" target="_blank">Karl Marx</a> transformed Hegelian dialectics from idealism to materialism. Where Hegel saw history as Spirit achieving self-consciousness, Marx saw history as the development of material productive forces and the resulting class conflicts. Consciousness does not determine reality; material conditions determine consciousness. This historical materialism became the theoretical foundation for revolutionary socialism.</p>
   <h3>Base and Superstructure</h3>
   <p>Marx distinguished the economic base (the mode of production—the means by which society produces material goods) from the ideological superstructure (law, politics, religion, philosophy). The base determines the superstructure. In capitalism, the base consists of capitalists owning means of production and workers selling their labor. This arrangement generates ideologies justifying the system while obscuring exploitation.</p>
   <p><strong>Ideology:</strong> Not false consciousness in a psychological sense but systematically distorted ideas that serve ruling-class interests. Capitalist ideology presents wage labor as "free exchange" and profit as a "natural result" of capital, hiding the mechanism of exploitation (surplus value extraction).</p>
   <h3>Capitalism and Exploitation</h3>
   <p>Workers produce commodities worth more than their wages. This difference—surplus value—becomes capitalist profit. The system compels constant capital accumulation, driving technological innovation and expansion. Yet capitalism contains internal contradictions: falling profit rates, periodic crises of overproduction, and concentration of wealth in fewer hands. These contradictions will eventually destroy capitalism, opening the way for a socialist revolution.</p>
   <p><strong>Alienation:</strong> Under capitalism, workers are alienated from their labor (they do not control their work), from the products they create (which are sold to enrich others), from their humanity (reduced to labor-power), and from each other (competition replaces solidarity).</p>
   <h3>Contemporary Status</h3>
   <p>The collapse of communist regimes seemed to refute Marx's predictions. However, contemporary Marxist scholars note that Soviet communism was not authentic Marxism and that socialism never genuinely replaced capitalism. Marx's analytical tools for understanding capitalism, class, ideology, and power remain influential in sociology, history, literary criticism, and cultural studies. His critique of capitalism's internal contradictions resurged after the 2008 financial crisis.</p>

  `<div class="detail-header"><span class="num">05</span><h2>Darwin: Evolution & Philosophy of Nature</h2></div>
   <p>Charles Darwin's theory of evolution through natural selection revolutionized not only biology but philosophy itself. The Origin of Species (1859) displaced teleological explanations that had dominated Western thought for millennia. Nature is no longer a designed machine requiring an intelligent creator; instead, the apparent design of organisms emerges from blind, purposeless processes of mutation and selection acting over vast timescales.</p>
   <h3>Natural Selection</h3>
   <p>Organisms vary in their traits. Some variations are heritable. Organisms with traits enhancing survival in their environment are more likely to reproduce, passing those traits to offspring. Over many generations, advantageous traits become more common; disadvantageous ones disappear. This process—natural selection—requires no intention, planning, or foresight. It is entirely mechanical, yet it produces organisms of exquisite apparent design.</p>
   <p><strong>Common Descent:</strong> All living organisms share common ancestors. Life is a branching tree, not a fixed hierarchy. Humans are not specially created but evolved from earlier primate ancestors. This places humanity within nature, subject to the same evolutionary processes as beetles, whales, and bacteria.</p>
   <h3>Philosophical Implications</h3>
   <p><strong>Against Teleology:</strong> Design arguments that had supported theism seemed undermined. The complexity of life could be explained without invoking purpose or intelligence. The "argument from design" lost its force.</p>
   <p><strong>Chance and Contingency:</strong> Evolution depends on random mutations. Life is not the inevitable unfolding of a predetermined plan but the contingent product of chance events filtered by selection. This challenged the rationalist view that the universe is fundamentally orderly and comprehensible.</p>
   <p><strong>Struggle and Competition:</strong> Darwin emphasized the "struggle for existence" and "survival of the fittest." Nature is a realm of competition, not harmony. This vision influenced social philosophy and (disastrously) social Darwinism.</p>
   <h3>Social Darwinism: A Cautionary Tale</h3>
   <p>Evolution was misappropriated to justify ruthless capitalism, racism, and imperialism. If nature selects the "fittest," perhaps society should do likewise. This reasoning is doubly fallacious: it mistakes a biological description for a moral prescription (the is-ought problem), and it misunderstands evolution, which does not necessarily favor strength or aggression but reproductive success in specific environments.</p>
   <h3>Contemporary Philosophy of Biology</h3>
   <p>Evolution remains foundational to modern biology, yet philosophical questions persist. How much does evolution depend on chance vs. deterministic selection? Can natural selection be rigorously defined? Do genes, organisms, or groups constitute the primary unit of selection? How do we explain altruism and cooperation in an evolutionary framework? These remain live debates in philosophy of biology.</p>

  `<div class="detail-header"><span class="num">06</span><h2>Nietzsche: Beyond Good and Evil</h2></div>
   <p><a href="https://plato.stanford.edu/entries/nietzsche/" target="_blank">Friedrich Nietzsche</a> (whom Gaarder omits but who is crucial to modernity) diagnosed the central crisis of modern culture: the death of God. Not that people stopped believing in God (though many did), but that the metaphysical foundations of Western morality collapsed. Traditional values—Christian morality, Enlightenment rationalism, democratic equality—all depended on transcendent justifications that modernity destroyed. Faced with nihilism, humanity must create new values.</p>
   <h3>Will to Power</h3>
   <p>Nietzsche proposed that will to power, not survival or pleasure-seeking, is the fundamental drive animating all reality. This is not mere domination but the dynamic will to create, overcome, and transform. Even knowledge-seeking expresses will to power—we interpret the world according to our drives and perspectives. There is no view from nowhere; all knowledge is perspectival.</p>
   <p><strong>Perspectivism:</strong> Nietzsche rejected the notion that truth is objective and universal. Instead, truth is always from some perspective. This does not reduce to relativism; some perspectives are richer, deeper, more life-affirming than others. But there is no transcendent standpoint from which we judge.</p>
   <h3>Master-Slave Morality</h3>
   <p>Conventional morality, Nietzsche argued, inverts natural values. Strong, creative individuals who affirm life, create values, and dominate in authentic ways are labeled "evil" by weaker masses who resent them. The weak created slave morality—valuing humility, suffering, self-denial—to condemn strength and assuage their resentment. Christianity is the perfection of slave morality, turning earthly suffering into virtue.</p>
   <h3>The Übermensch</h3>
   <p>The Übermensch (often mistranslated as "superman") is the ideal human who transcends conventional morality. The Übermensch creates new values, affirms life in its entirety, and accepts eternal recurrence. (Terrifyingly, the Nazis perverted this concept into racism and genocide.)</p>
   <h3>Eternal Recurrence</h3>
   <p>Imagine your life repeating exactly, infinitely. Would you affirm it? Eternal recurrence is not a cosmological claim but a test of life-affirmation. It asks whether one's commitments and values are worth living eternally. For Nietzsche, this is the highest value.</p>
   <h3>Contemporary Influence</h3>
   <p>Nietzsche profoundly influenced 20th-century philosophy, from existentialism to poststructuralism. Foucault, Derrida, and others drew on Nietzsche's genealogical method (tracing how values and knowledge emerged historically) and his perspectivism. Nietzsche remains controversial: his ideas are both philosophically powerful and dangerously misappropriated.</p>

  `<div class="detail-header"><span class="num">07</span><h2>Freud: The Unconscious Mind</h2></div>
   <p><a href="https://plato.stanford.edu/entries/freud/" target="_blank">Sigmund Freud</a> revolutionized psychology by revealing the unconscious as a vast realm influencing behavior outside awareness. The mind is not the transparent, rational agent Descartes imagined. Beneath consciousness lies a dynamic unconscious containing repressed desires, traumatic memories, and instinctual drives that shape thought and behavior.</p>
   <h3>The Tripartite Psyche</h3>
   <p><strong>The Id:</strong> The unconscious reservoir of instinctual drives, primarily sexual (libido) and aggressive. The id operates on the pleasure principle, seeking immediate gratification regardless of reality or morality.</p>
   <p><strong>The Ego:</strong> The conscious mediator between id impulses and external reality. The ego operates on the reality principle, delaying gratification and navigating social constraints. It is the "I" that experiences conscious thought.</p>
   <p><strong>The Superego:</strong> The internalized voice of parental authority and social morality. The superego judges the ego, generating guilt and shame. It is partly unconscious, which is why we feel guilty for thoughts we did not even consciously entertain.</p>
   <h3>Repression and the Return of the Repressed</h3>
   <p>The ego represses id impulses that conflict with moral standards or social norms. Yet repressed material does not disappear; it returns in disguised form: dreams, slips of the tongue, neurotic symptoms. A patient's neurotic anxiety might express repressed childhood trauma or forbidden desire.</p>
   <p><strong>Dreams:</strong> For Freud, dreams are "the royal road to the unconscious." While conscious and seemingly nonsensical, dreams express repressed wishes in symbolic form. Analyzing dreams reveals unconscious conflicts.</p>
   <h3>Childhood Determinism</h3>
   <p>Freud famously argued that adult personality and pathology are shaped by childhood experiences. The psychosexual stages (oral, anal, phallic, latency, genital) map childhood development. Fixation at any stage leads to characteristic adult neuroses.</p>
   <p><strong>The Oedipal Complex:</strong> In the phallic stage, the child desires the opposite-sex parent and views the same-sex parent as a rival. Resolving the Oedipus complex (identifying with the same-sex parent) is crucial for normal development. Failure to resolve it leads to neurosis.</p>
   <h3>Psychoanalytic Method</h3>
   <p>Freud's therapeutic technique involves free association: the patient speaks without censorship, revealing unconscious material. The analyst interprets these associations and resistances. Through this talking cure, unconscious conflicts become conscious, allowing resolution.</p>
   <h3>Contemporary Critique and Legacy</h3>
   <p>Most of Freud's specific theories have been rejected by contemporary psychology. The Oedipal complex, psychosexual stages, penis envy, and female passivity are unsupported by evidence. His theory was often misogynistic and reductive.</p>
   <p>Yet Freud's core insight—that the unconscious mind influences behavior, that early experiences shape development, that symbolic meaning pervades mental life—remains influential. Modern neuroscience investigates the unconscious, though in different terms than Freud. Psychoanalysis has evolved (modern attachment theory, relational psychoanalysis) while abandoning Freud's most problematic claims.</p>
   <p>In literary criticism, film theory, and cultural studies, Freudian concepts remain useful for interpretation, even if empirically unsupported. His historical significance in founding psychology as a discipline is undeniable.</p>

  `<div class="detail-header"><span class="num">08</span><h2>What Gaarder Missed: Philosophy Beyond 1950</h2></div>
   <p>Gaarder's *Sophie's World* ends with Sartrean existentialism, capturing philosophy circa 1950. Yet enormous developments occurred afterward. The philosophical landscape has shifted dramatically, and several crucial thinkers were absent from the novel.</p>
   <h3>Nietzsche: The Absent Prophet</h3>
   <p>Nietzsche is widely regarded as one of the most influential 19th-century philosophers. His critique of values, perspectivism, and genealogical method profoundly shaped 20th-century thought, particularly existentialism, poststructuralism, and contemporary continental philosophy. Gaarder's omission is a notable gap.</p>
   <h3>Pragmatism: An American Alternative</h3>
   <p>While Gaarder focuses on European rationalism and empiricism, American pragmatism offered a different path. William James, John Dewey, and C. S. Peirce rejected the correspondence theory of truth (truth as matching reality). Instead, true beliefs are those that work—that guide successful action and enrich experience. Pragmatism remains influential in contemporary philosophy, philosophy of science, and social theory.</p>
   <h3>Phenomenology: Husserl's Revolution</h3>
   <p>Edmund Husserl inaugurated phenomenology—the rigorous, systematic study of consciousness and experience. Phenomenology became foundational for continental philosophy. Heidegger, Merleau-Ponty, Sartre (himself a phenomenologist), and later thinkers built on Husserlian foundations. Phenomenology remains a vital philosophical method.</p>
   <h3>Poststructuralism and Deconstruction</h3>
   <p>After 1960, thinkers like Jacques Derrida and Michel Foucault challenged the very foundations Gaarder took for granted. Derrida's deconstruction questioned presence, identity, and meaning. Foucault showed how power, knowledge, and discourse constitute subjects. These movements are controversial but widely influential.</p>
   <h3>Feminist Philosophy</h3>
   <p>Gaarder's history is largely male. Feminist philosophers recovered women thinkers (Hypatia, Émilie du Châtelet, Mary Somerville, Harriet Taylor Mill), critiqued male bias in philosophical tradition, and developed feminist epistemology, metaphysics, and ethics. Gender is now recognized as fundamental to philosophical categories.</p>
   <h3>Philosophy of Mind and Consciousness</h3>
   <p>The mind-body problem—central since Descartes—remains unsolved. Contemporary philosophy of mind, informed by neuroscience and cognitive science, grapples with consciousness, qualia, intentionality, and artificial intelligence. Some defend dualism; others embrace physicalism, emergentism, or panpsychism.</p>
   <h3>Environmental Philosophy</h3>
   <p>Climate change and ecological crisis have made environmental philosophy urgent. Philosophers debate intrinsic value of nature, animal rights, intergenerational justice, and humanity's place in an interconnected biosphere.</p>
   <h3>A Philosophical Conversation Without End</h3>
   <p>Rather than reaching a conclusion, philosophy continues evolving. Contemporary philosophers engage historical texts while addressing new problems (artificial intelligence, virtual reality, genetic engineering). The tradition is alive, contested, and generative. A complete philosophical education requires not just understanding history but participating in ongoing debates.</p>
   <div class="feat-grid">
   <div class="feat"><h4>Developments Post-1950</h4><p>Poststructuralism, deconstruction, phenomenology, feminist philosophy, philosophy of mind, environmental philosophy, and pragmatism's revival have transformed the philosophical landscape.</p></div>
   <div class="feat"><h4>Ongoing Philosophical Problems</h4><p>Consciousness, free will, justice, meaning, truth, knowledge, and ethics remain contested. Contemporary philosophers offer diverse answers, often incompatible, reflecting philosophy's essential pluralism.</p></div>

    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Section navigation
const sectionNav = document.createElement('div');
sectionNav.className = 'section-nav';
sectionNav.innerHTML = `
  <a href="s4-modern.dd.html" class="nav-link nav-prev">&larr; S4: The Modern Turn</a>
  <a href="index.html" class="nav-link nav-index">All Sections</a>
  <a href="s6-existentialism.dd.html" class="nav-link nav-next">S6: Existentialism &amp; Beyond &rarr;</a>
`;
mainInner.appendChild(sectionNav);

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>

</body>
</html>
