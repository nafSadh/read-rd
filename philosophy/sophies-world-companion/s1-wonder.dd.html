<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S1: The Cradle of Wonder — Pre-Socratic Philosophy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}

<body data-theme="light">
<script>
// DATA ARRAYS

const sections = [
  { num: '01', short: 'The Garden', title: 'The Garden of Eden' },
  { num: '02', short: 'Wonder', title: 'From Myth to Reason' },
  { num: '03', short: 'Milesians', title: 'The Milesians' },
  { num: '04', short: 'Being', title: 'Change & Permanence' },
  { num: '05', short: 'Plurality', title: 'The Pluralists' },
  { num: '06', short: 'Atoms', title: 'The Atomists' },
  { num: '07', short: 'Beyond', title: 'What Gaarder Missed' }
];

const summaries = [
  // Section 01: The Garden of Eden
  `<p>Philosophy begins with wonder. Sophie's World opens not with abstract definitions, but with the most fundamental human questions: <em>Who am I? Where does the world come from? Why do I exist?</em> These are not idle curiosities—they are questions that arise naturally when consciousness awakens to itself and to the cosmos.</p>
  <p>Gaarder frames philosophy as a faculty, not a discipline. The capacity to wonder at existence is native to childhood. A child sees the world as miraculous until habituation dulls the perception. Philosophers are those who resist this dulling, who remain awake to the strangeness of being.</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <h4>Core Questions</h4>
  <ul class="s-list">
    <li>What is the nature of consciousness and selfhood?</li>
    <li>How does mortality shape our understanding of existence?</li>
    <li>What distinguishes philosophy from mere daydreaming?</li>
  </ul>
  </div>`,

  // Section 02: From Myth to Reason
  `<p>For millennia, humans explained the world through mythology. Stories of gods and supernatural forces provided narrative frameworks that made sense of thunder, seasons, harvest, and death. These were not naive superstitions but sophisticated responses to natural phenomena without the tools of empirical science.</p>
  <p>The watershed came in ancient Greece when thinkers began to propose <em>natural explanations</em> for natural phenomena. This shift from myth to reason marked the birth of philosophy and eventually science. Xenophanes (c. 570 BCE) criticized anthropomorphic gods—if oxen could paint, he observed, they would paint their gods as oxen.</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <h4>The Transition</h4>
  <div class="section-block" style="padding: 14px 0 0; border: none;">
  <div class="feat-grid">
    <div class="feat">
      <h4>Mythological</h4>
      <p>Gods explain events; ritual propitiation influences nature</p>
    </div>
    <div class="feat">
      <h4>Natural</h4>
      <p>Universal laws govern phenomena; reason and observation suffice</p>
    </div>
  </div>
  </div>
  </div>`,

  // Section 03: The Milesians
  `<p>The first philosophers emerged in Miletus, a Greek colony in Asia Minor around 600 BCE. These "natural philosophers" asked: <em>What is the basic substance underlying all things?</em> Thales proposed water, Anaximenes proposed air, and Anaximander proposed the boundless. Though their answers differed, they shared a revolutionary conviction: nature is governed by principles that reason can discover.</p>
  <p>Thales observed that life originates in and returns to water—seeds are moist, organisms require moisture. Anaximander made a conceptual leap: the fundamental substance must be boundless (apeiron), transcending ordinary physical categories, because created things are finite. These early attempts to find unity beneath diversity established philosophy's core project.</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <h4>The Early Systems</h4>
  <div class="s-stat">
    <div class="st"><div class="sv">Thales</div><div class="sl">Water</div></div>
    <div class="st"><div class="sv">Anaximenes</div><div class="sl">Air</div></div>
    <div class="st"><div class="sv">Anaximander</div><div class="sl">Boundless</div></div>
  </div>
  </div>`,

  // Section 04: Change & Permanence
  `<p>A fundamental tension emerged: <em>How can anything change if a basic substance is eternal and unchanging?</em> Parmenides argued from pure logic that change is impossible. Nothing can come from nothing; what exists eternally cannot cease. Therefore, sensory perception of change must be illusion. Heraclitus rejected this reasoning entirely: <em>everything flows</em>. Reality is constant transformation. The river you step into is never the same river.</p>
  <p>This conflict between permanence (Parmenides) and flux (Heraclitus) drove later philosophy to seek resolution. How could both perspectives hold truth? The answer required reconceptualizing the problem itself.</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <div class="verdict">
    <div class="v-col pro">
      <h4>Parmenides: Being (Permanence)</h4>
      <ul>
        <li>Reason transcends mere sensation</li>
        <li>Eternal substances cannot change</li>
        <li>Logic can reveal reality's true structure</li>
      </ul>
    </div>
    <div class="v-col con">
      <h4>Heraclitus: Becoming (Flux)</h4>
      <ul>
        <li>Experience reveals constant change</li>
        <li>Opposites in tension generate reality</li>
        <li>Universal logos underlies chaos</li>
      </ul>
    </div>
  </div>
  </div>`,

  // Section 05: The Pluralists
  `<p>Empedocles (c. 490–430 BCE) proposed a synthesis: neither single substance nor pure change, but four unchanging elements—earth, air, fire, water—in varying combinations. This solved the logical deadlock: elements themselves don't change; combinations do. He introduced forces distinct from substance: love (attraction) and strife (repulsion) cause elements to mix and separate. Anaxagoras added infinite "seeds" of matter guided by nous (mind/intelligence) as the ordering principle. Both preserved reason's authority while explaining observable diversity.</p>
  <p>Empedocles' insight—that substance and force are distinct principles—mirrors modern physics. His model explains perception: like perceives like. The eye contains fire; fire in the eye perceives external fire. This materialist approach to consciousness was revolutionary.</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <h4>Key Concepts</h4>
  <div class="s-chips">
    <div class="s-chip">Four Elements</div>
    <div class="s-chip">Love & Strife</div>
    <div class="s-chip">Infinite Seeds</div>
    <div class="s-chip">Nous (Mind)</div>
  </div>
  </div>`,

  // Section 06: The Atomists
  `<p>Democritus (c. 460–370 BCE) completed the pre-Socratic revolution with atomism. Reality consists of atoms—indivisible, eternal particles—moving in void. Atoms differ in shape, size, and weight; their mechanical collisions and combinations produce all phenomena. Nothing comes from nothing; everything reduces to atoms and void. Perception occurs when atom-effluences from objects penetrate the eye.</p>
  <p>Crucially, Democritus applied this mechanics to the soul itself: the soul comprises special round, smooth atoms dispersed at death. This is materialism—mind is matter. There is no immortal soul, no divine design, only necessity and mechanical law. Future philosophers will wrestle with this implication for millennia: can consciousness arise purely from material processes?</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <h4>The Atomic Model</h4>
  <div class="section-block" style="padding: 14px 0 0; border: none;">
  <div class="feat-grid">
    <div class="feat">
      <h4>Atoms</h4>
      <p>Eternal, indivisible, unchanging particles with shape and weight</p>
    </div>
    <div class="feat">
      <h4>Void</h4>
      <p>Empty space where atoms move and combine; enables change without contradiction</p>
    </div>
    <div class="feat">
      <h4>Mechanics</h4>
      <p>Collision and combination produce all phenomena; necessity governs all</p>
    </div>
    <div class="feat">
      <h4>Materialism</h4>
      <p>Only matter exists; soul is atomic; no design or purpose</p>
    </div>
  </div>
  </div>
  </div>`,

  // Section 07: What Gaarder Missed
  `<p>Gaarder's narrative is elegant but incomplete. Three thinkers deserve emphasis: Pythagoras developed number theory and influenced Plato; Zeno of Elea posed paradoxes of motion and infinity that challenge mechanism; Xenophanes critiqued both mythology and over-confident rationalism. Moreover, Gaarder glosses over the fact that these early philosophers weren't simply "wrong"—modern science has vindicated surprising elements of their thought.</p>
  <p>Democritus predicted atoms centuries before Dalton. Anaxagoras's "seed of everything in everything" echoes DNA's holographic structure. Heraclitus's logos anticipates both Stoic pantheism and modern concepts of universal law. The pre-Socratics weren't primitive ancestors but perennial interlocutors. Their questions about substance, change, mind, and causation remain live philosophical problems.</p>
  <div class="section-block" style="padding: 16px 0 0; border: none;">
  <h4>Missing Voices</h4>
  <ul class="s-list">
    <li><strong>Pythagoras:</strong> Numbers as fundamental reality; music-mathematics harmony</li>
    <li><strong>Zeno:</strong> Paradoxes of motion; critique of infinite divisibility</li>
    <li><strong>Leucippus:</strong> Co-originator of atom theory; often eclipsed by Democritus</li>
    <li><strong>Xenophanes:</strong> Critic of anthropomorphism; champion of empirical epistemology</li>
  </ul>
  </div>`
];

const details = [
  // Detail 01: The Garden of Eden
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="5"/><path d="M 6 2 L 6 10"/><path d="M 2 6 L 10 6"/></svg> Section 01</div>
    <h2>The <em>Garden</em> of Eden</h2>
  </div>
  <p>Gaarder begins Sophie's World not with a definition of philosophy but with a question that cannot be escaped: <em>Who are you?</em> This is philosophy in its most elementary form—not a specialized discipline but an awakening of consciousness to its own existence.</p>
  <p>The genius of Gaarder's opening is pedagogical. He doesn't argue that Sophie <em>should</em> wonder about existence. He shows that wonder is already happening. A child sees her reflection in the mirror and asks, "Who is that?" The question doesn't arise from external instruction; it emerges from the confrontation between self-awareness and the mystery of selfhood. Philosophy is what happens when this question cannot be dismissed.</p>

  <h3>The Faculty of Wonder</h3>
  <p>According to ancient tradition (likely Aristotle), philosophy begins in wonder—thaumazein in Greek. But Gaarder inverts this. Wonder is not something philosophers develop; it is something they preserve. Children possess it naturally. The philosophical crisis is not the absence of wonder but its loss. Most humans exchange wonder for habituation. Adults see a dog and think, "That's a dog. Nothing remarkable." A child sees the same dog and experiences bottomless astonishment at the sheer existence of dog-ness.</p>
  <p>This analysis deepens existentially in Chapter 1 when Sophie's grandmother falls ill. The grandmother remarks, "I've only now realized how rich life is." Illness strips away the taken-for-grantedness of health, revealing the miraculous ordinariness of being alive. Mortality awareness sharpens perception. Once you truly acknowledge that you will die, the fact that you are alive now becomes urgent and extraordinary.</p>

  <h3>The Questions Philosophy Cannot Escape</h3>
  <p>Gaarder lists them: Who am I? Where does the world come from? What am I for? Is there life after death? These are not optional riddles. They are necessarily posed once consciousness awakens. You cannot un-ask them through distraction or rationalization. You can only suppress the awareness that they are being asked.</p>
  <p>Note what these questions presuppose: selfhood, cosmological origination, purpose, and transcendence. They cannot be answered by accumulating facts (though facts may be relevant). They require interpretation, meaning-making, wrestling with finitude and possibility. This is why Sophie's World is a novel, not a textbook. Philosophy happens in lived experience, not in abstract theory.</p>

  <h3>What Is Missing</h3>
  <p>Gaarder's account is powerful but lacks epistemological grounding. He shows that we <em>pose</em> these questions but not how we might <em>answer</em> them. He emphasizes the psychological fact of wonder but doesn't distinguish between wonder as aesthetic experience, intellectual curiosity, spiritual yearning, and metaphysical anguish. Later philosophers—Heidegger especially—will argue that wonder (at existence itself) is philosophy's proper emotional-intellectual foundation, but this requires a theory of Being that Gaarder only foreshadows.</p>
  <p>Additionally, Gaarder doesn't ask: Why do these particular questions arise for Sophie but not for the rabbit she observes? Is philosophy a specifically human faculty? Does consciousness in itself necessarily entail these questions, or are they culturally conditioned? These are live questions Gaarder poses implicitly.</p>`,

  // Detail 02: From Myth to Reason
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="5"/><path d="M 6 2 L 6 10"/><path d="M 2 6 L 10 6"/></svg> Section 02</div>
    <h2>From <em>Myth</em> to Reason</h2>
  </div>
  <p>Gaarder uses mythology—particularly Norse cosmology with Thor and the giants—to show that myths are not primitive delusions but sophisticated explanatory systems. They answer the same questions philosophy addresses: Why does thunder occur? Why do seasons change? What causes fertility or famine? Myths integrate explanation, ritual, and moral teaching into coherent narratives.</p>
  <p>What changes with Greek philosophy is the <em>type</em> of explanation offered. Myths explain phenomena by reference to divine agency and supernatural causes. Natural philosophers explain phenomena by reference to observable materials and mechanical processes. Thunder is not Mjolnir; it is the collision of hot and cold air. Seasons do not reflect Freyja's moods; they reflect celestial mechanics.</p>

  <h3>Xenophanes and Anthropomorphism</h3>
  <p>Xenophanes (c. 570 BCE) is philosophy's first debunker of false consciousness. His critique is simple but devastating: humans imagine gods in human form—blue-eyed if they are Thracian, dark if they are Ethiopian, with bodies and clothes and language like humans. But why should the divine resemble the mortal? If oxen could paint, they would paint gods as oxen.</p>
  <p>This is not atheism but iconoclasm. Xenophanes doesn't deny divinity; he denies that divinity wears human masks. His point is epistemological: we project our own forms onto the unknown, and then mistake our projections for truth. This insight will echo through Western philosophy—Marx's "religion as opium," Feuerbach's "anthropomorphism of the divine," Nietzsche's "human, all-too-human" origins of morality.</p>

  <h3>Why the Transition Occurred</h3>
  <p>Gaarder notes that this shift happened in ancient Greece, not universally. Why Greece? Several factors converge: city-states with leisure time for philosophical speculation; maritime trade bringing contact with other cosmologies (Egyptian, Babylonian knowledge); alphabetic literacy enabling written texts that could be scrutinized and critiqued; democratic debate as cultural norm. Myth survives best in oral tradition where each telling is unique. Writing standardizes myth and opens it to contradiction and critique.</p>
  <p>Additionally, once myth is written down (Homer, Hesiod), it becomes literalized. A myth that was perhaps symbolically true is now read as factually false. This creates the space for natural philosophy—a search for explanations that don't require supernatural intervention.</p>

  <h3>Persistence and Integration</h3>
  <p>A subtle point Gaarder underdevelops: even after natural philosophy emerges, mythological thinking persists. Philosophers continue to use myth—Plato's allegory of the cave, Aristotle's unmoved mover. Moreover, mythology and natural explanation coexist. The Greeks didn't simply replace myth with reason; they learned to integrate them. Zeus becomes a metaphor for cosmic order. The oracle becomes a voice of accumulated wisdom rather than supernatural prophecy.</p>
  <p>This suggests that the myth-reason dichotomy, while useful pedagogically, is not historically absolute. Humans appear constitutionally drawn to narrative, symbol, and metaphor even when empirical explanation is available. The question philosophy must then face is whether narrative and reason can be integrated or whether they compete for the same cognitive space.</p>`,

  // Detail 03: The Milesians
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="5"/><path d="M 6 2 L 6 10"/><path d="M 2 6 L 10 6"/></svg> Section 03</div>
    <h2>The <em>Milesians</em></h2>
  </div>
  <p>Miletus, a Greek settlement on the coast of Asia Minor, was the birthplace of philosophy. It was a prosperous merchant city with access to Egyptian and Babylonian knowledge. Here, around 600 BCE, <a href="https://plato.stanford.edu/entries/thales/" target="_blank">Thales</a>—the first known philosopher—proposed that water is the fundamental substance of all things. He was followed by <a href="https://plato.stanford.edu/entries/anaximander/" target="_blank">Anaximander</a> and <a href="https://plato.stanford.edu/entries/anaximenes/" target="_blank">Anaximenes</a>, each offering refinements to the question: <em>What is basic?</em></p>
  <p>What unites these three is not their answers but their method. They reject supernatural explanation and seek natural principles. They assume that reason can grasp reality's underlying structure. They work within a monistic framework: all diversity reduces to one primal substance in different states.</p>

  <h3>Thales and Water</h3>
  <p>Thales's conjecture that water is fundamental seems odd to modern ears until you consider his observations: all organisms require moisture; seeds are moist; heat comes from damp (semen); decay occurs in wetness. Water appears in three states—solid (ice), liquid (water), and vapor (air)—suggesting it underlies all material transformation. Life itself originates in aqueous medium.</p>
  <p>What matters is not whether Thales was correct but that he <em>reasoned</em> from observation to a general principle. He didn't say, "Poseidon commands the waters." He said, "Water explains the phenomena." This shift from agency to mechanism is the dawn of natural science.</p>

  <h3>Anaximander's Boundless</h3>
  <p>Anaximander advanced the argument. If water is fundamental, what is water made of? And how can water become earth? Both are determinate, limited substances. Anaximander proposed that the fundamental reality must be boundless (apeiron)—not literally infinite but indefinite, transcending any single physical form. From the boundless, hot and cold separate out, generating all perceptible things.</p>
  <p>This is a conceptual leap. Anaximander recognizes that the basic substance cannot itself be one of the manifest elements (water, air, earth, fire) because those are limited and appear to transform into each other. The underlying reality must be more fundamental—something without definite shape or quality from which all qualities emerge. This prefigures later concepts of prime matter and potentiality.</p>

  <h3>Anaximenes and Compression</h3>
  <p>Anaximenes returned to a determinate element—air—but proposed a mechanism: condensation and rarefaction. Compressed air becomes earth and water; rarefied air becomes fire. Thus he achieved both Thales's specificity and Anaximander's explanatory power. The processes of compression and expansion could explain meteorological phenomena, life cycles, and cosmic processes.</p>

  <h3>The Limits of Milesian Monism</h3>
  <p>All three Milesians faced a fundamental problem: if everything is ultimately one substance, how do we account for the manifest diversity of things? How does water become both stone and flesh? The Milesians had no satisfactory mechanical model of transformation. They could name the basic substance but not explain how it differentiates into countless forms. This problem will drive later philosophers to pluralism and, eventually, to atomic theory.</p>

    <h2><em>Change</em> & Permanence</h2>
  </div>
  <p>The Milesian project faces a logical crisis. <a href="https://plato.stanford.edu/entries/parmenides/" target="_blank">Parmenides</a> (c. 540–480 BCE), a philosopher from Elea in southern Italy, posed it starkly: <em>How can anything change?</em> His argument is deceptively simple: assume change occurs. Something comes into being that did not exist before. But something cannot come from nothing—that is contradictory. And something cannot come from something else, because then the original thing would cease to be. Therefore, change is impossible. What we perceive as change is illusion; sensory perception deceives. Only reason reveals the truth: being is eternal, unchanging, homogeneous. Change is a trick of the senses.</p>
  <p>Parmenides is philosophy's first rationalist absolutist—he privileges logical necessity over empirical experience and concludes that reality contradicts appearance. This is intellectually audacious and deeply troubling. Either reason is wrong about change, or our senses are systematically deceiving us.</p>

  <h3>Heraclitus: Everything Flows</h3>
  <p><a href="https://plato.stanford.edu/entries/heraclitus/" target="_blank">Heraclitus</a> (c. 540–480 BCE), Parmenides's near-contemporary, drew the opposite conclusion. <em>Everything flows</em> (panta rhei). Nothing is stable; permanence is the illusion. You cannot step twice in the same river. The river flows; you change; the world churns in constant transformation. What remains constant is not substance but the underlying structure—the logos, or universal reason, that governs the dance of opposites. Fire and cold, wet and dry, war and peace—opposites in tension generate all phenomena.</p>
  <p>Heraclitus trusts sensory experience. The eye that perceives change is not deceived; it is perceiving something real. What is real is process, not static being. The apparent identity of things (the river remains "the river" though its waters change) reflects the constancy of the logos, not the permanence of substance.</p>

  <h3>The Deadlock and Its Resolution</h3>
  <p>Parmenides and Heraclitus seem to reach opposite conclusions from first principles. Yet Gaarder astutely notes that both can't simply be wrong. Parmenides revealed something true: change seems to violate logic. Heraclitus revealed something equally true: change is undeniable. The solution requires reconceptualizing the problem itself.</p>
  <p>Later philosophers (Empedocles, Anaxagoras, Democritus) will propose that both permanence and change can coexist if we distinguish between different levels: unchanging elements in varying combinations; eternal atoms in motion; seeds of all things recombining infinitely. This is the genius of pluralism—it dissolves the apparent contradiction by introducing multiplicity where Parmenides saw only unity.</p>

  <h3>Rational vs. Empirical Epistemology</h3>
  <p>Beneath the metaphysical debate lies an epistemological choice: Can reason override sensory experience? For Parmenides, yes—reason knows better than the senses. For Heraclitus, no—senses reveal reality, and reason should be interpreted to align with experience. Later philosophy will inherit this tension. Platonism will side with Parmenides (eternal Forms beyond change). Aristotelism will seek integration (potentiality and actuality accommodate both change and stability). Empiricism will champion Heraclitus (experience is primary). The Parmenides-Heraclitus debate never fully resolves; it recurs as the rationalism-empiricism conflict.</p>

  // Detail 05: The Pluralists
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="5"/><path d="M 6 2 L 6 10"/><path d="M 2 6 L 10 6"/></svg> Section 05</div>
    <h2>The <em>Pluralists</em></h2>
  </div>
  <p>The deadlock between Parmenides and Heraclitus stimulated a brilliant reconceptualization. Instead of seeking a single fundamental substance, philosophers proposed <em>multiple</em> unchanging elements in varying combinations. <a href="https://plato.stanford.edu/entries/empedocles/" target="_blank">Empedocles</a> (c. 490–430 BCE) proposed four: earth, air, fire, and water. <a href="https://plato.stanford.edu/entries/anaxagoras/" target="_blank">Anaxagoras</a> (500–428 BCE) proposed infinite "seeds" of all things mixed in all things. Both preserved Parmenidean logic (elements themselves don't change) while accommodating Heraclitean observation (combinations change constantly).</p>

  <h3>Empedocles and the Four Elements</h3>
  <p>Empedocles's model is elegant. The four elements are eternal and unchanging. But they combine and separate under the influence of two forces: love (attraction) and strife (repulsion). This is crucial—Empedocles distinguishes between <em>substance</em> (the four elements) and <em>force</em> (love and strife). Gaarder notes that modern physics preserves this distinction. We no longer believe in earth, air, fire, and water as fundamental, but we still recognize that substance and force are different categories.</p>
  <p>Empedocles also proposed a theory of perception: like perceives like. The eye contains all four elements; each element in the eye perceives corresponding elements in external objects. Fire perceives fire; earth perceives earth. This is proto-materialist philosophy of mind—perception is physical interaction, not mystical knowing. The theory is false, but the framework—that consciousness can be explained physically—is foundational for later materialism.</p>

  <h3>Anaxagoras and Nous</h3>
  <p>Anaxagoras refined pluralism further. Instead of four elements, he posited infinite particles—"seeds" of all things. Every substance contains particles of all others, but in different proportions. Flesh contains particles of bone, blood, sinew, and gold; gold contains particles of flesh, bone, and blood. This is expressed in the famous phrase: "In everything there is something of everything else."</p>
  <p>Crucially, Anaxagoras introduced nous—mind or intelligence—as a cosmic principle. Nous is not itself matter but operates on matter to impose order. This represents a shift from purely mechanical materialism toward something approaching design. Nous orders chaos; it separates like from like; it generates structure and form. Modern readers might compare this to DNA (present in every cell, containing the blueprint for all forms) or to information as distinct from but shaping matter.</p>
  <p>Aristotle later criticized Anaxagoras for introducing nous but not fully explaining how it works. But Anaxagoras deserves credit for recognizing that mechanical principles alone cannot account for the organization and teleology apparent in nature. Mind must play a role—though what kind of mind and how it operates remained unclear.</p>

  // Detail 06: The Atomists
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="5"/><path d="M 6 2 L 6 10"/><path d="M 2 6 L 10 6"/></svg> Section 06</div>
    <h2>The <em>Atomists</em></h2>
  </div>
  <p><a href="https://plato.stanford.edu/entries/leucippus/" target="_blank">Leucippus</a> and <a href="https://plato.stanford.edu/entries/democritus/" target="_blank">Democritus</a> (c. 460–370 BCE) completed the pre-Socratic revolution. Reality consists of atoms (atomos = uncuttable) and void (empty space). Atoms are eternal, indivisible, homogeneous particles varying only in shape, size, and weight. They move eternally in void, colliding and combining to form all perceptible things. Perception itself is physical: atom-images stream from objects, penetrate organs, and interact with atomic configurations in the perceiver's body.</p>
  <p>This is mechanistic materialism in its purest form. Nothing exists but matter in motion. All phenomena—color, taste, sound, thought—reduce to atomic configurations and collisions. There is no supernatural causation, no final purpose, no divine design. Only necessity: atoms follow mechanical laws blindly. Yet this mechanical determinism raises a troubling question: if everything is determined by atomic mechanics, what becomes of human freedom?</p>

  <h3>Why Atoms Solve the Problem</h3>
  <p>Democritus's atoms accomplish what Parmenides demanded: unchanging, eternal fundamental constituents. But unlike Parmenides's single being, atoms are multiple and differentiated (by shape and size). Unlike naive materialism, atoms can account for apparent diversity through combination. And unlike Heraclitus's pure flux, the atoms themselves don't change; only their arrangements do. Democritus thus reconciles permanence and change: the substratum is permanent; combinations are transient.</p>
  <p>The void is essential but conceptually troubling. Parmenides argued that nothing exists; therefore void is impossible. But Democritus needs void for atoms to move and combine. He redefines void not as absolute nothingness but as space—a real container in which atoms move. This is a subtle but profound shift. It makes space itself part of reality rather than mere absence.</p>

  <h3>Materialism and the Soul</h3>
  <p>The most radical aspect of Democritus's philosophy is his treatment of mind and soul. The soul is not immaterial; it is atomic. It consists of special smooth, round atoms more mobile and fire-like than ordinary matter. Perception occurs when external atoms strike these soul-atoms, causing sensation. Thought is atomic interaction. And crucially: at death, soul-atoms disperse. There is no immortal soul, no afterlife, no divine judgment.</p>
  <p>This is materialism's hard edge. If consciousness is atomic configuration, then consciousness cannot exist without matter. The implications are stark: no immortality, no transcendent meaning, no purpose to the universe. Only atoms and necessity. Later philosophers will be deeply troubled by this. Can materialism account for consciousness? Can mechanical process generate subjective experience? This is the "hard problem" of consciousness in ancient form.</p>

  <h3>Determinism and Freedom</h3>
  <p>Gaarder notes that Democritus's determinism raises the question of human freedom. If all atomic motions follow mechanical necessity, then future states of the universe are determined by present conditions. There is no room for human choice. Yet Democritus seems to assert human freedom elsewhere in his writings. This tension between determinism and freedom will haunt mechanistic philosophy forever. How can atoms in motion freely choose? The question remains unresolved.</p>

  <h3>Legacy and Vindication</h3>
  <p>Remarkably, atomism was largely forgotten in the ancient world after Aristotle rejected it. It reemerged in the 17th century with Gassendi and Descartes, and was finally vindicated by 19th-century chemistry (Dalton) and 20th-century physics. Democritus's atoms were indeed the building blocks of matter—though not indivisible (electrons, protons, neutrons, quarks proved divisible). His insight—that complexity emerges from simple, eternal constituents—anticipates modern physics and even molecular biology.</p>`,

  // Detail 07: What Gaarder Missed
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="5"/><path d="M 6 2 L 6 10"/><path d="M 2 6 L 10 6"/></svg> Section 07</div>
    <h2>What <em>Gaarder</em> Missed</h2>
  </div>
  <p>Gaarder's narrative of pre-Socratic philosophy is elegant and pedagogically powerful, but it selects among available figures and omits important voices. Three thinkers demand recovery: Pythagoras, Zeno of Elea, and Xenophanes. Each challenges or deepens the story Gaarder tells.</p>

  <h3>Pythagoras: Number as Reality</h3>
  <p><a href="https://plato.stanford.edu/entries/pythagoras/" target="_blank">Pythagoras</a> (c. 570–490 BCE) is famous for his mathematical theorem, but he was primarily a spiritual teacher and metaphysician. His revolutionary insight was that <em>number is fundamental reality</em>. Not numbers as abstract concepts but as the very structure of being. Harmonious proportions (musical ratios, geometric patterns) govern cosmos. This was profoundly influential on Plato's theory of Forms and on the entire Western mathematical tradition.</p>
  <p>Gaarder mentions Pythagoras only briefly, yet he deserves prominence for introducing mathematics into ontology. The Pythagorean vision—that reality is fundamentally numerical/rational—will echo through Plato, Descartes, Newton, and Einstein. Gaarder's focus on material substance (water, air, atoms) overshadows the Pythagorean recognition that form and mathematics might be more fundamental than matter.</p>

  <h3>Zeno of Elea: Paradoxes of Motion and Infinity</h3>
  <p><a href="https://plato.stanford.edu/entries/zeno-elea/" target="_blank">Zeno</a> (c. 490–430 BCE), Parmenides's student, posed paradoxes defending his master's denial of change and multiplicity. The most famous: Achilles and the tortoise. If the tortoise starts ahead, Achilles must first reach the tortoise's starting point, then cover half the remaining distance, then half of that, and so on infinitely. Since an infinite sequence cannot be completed, Achilles can never overtake the tortoise—yet clearly he does.</p>
  <p>This seems merely paradoxical, but Zeno's point is profound. He reveals that motion and infinity are conceptually problematic. If space and time are infinitely divisible, then any finite distance contains infinite segments, and motion seems impossible. This isn't mere puzzle-play; it's epistemological critique. Zeno shows that both change (Heraclitus) and infinite divisibility create logical difficulties that require resolution. His paradoxes motivate both atomism (stop infinite divisibility) and later mathematics (infinite series converge).</p>

  <h3>Xenophanes: Epistemological Humility</h3>
  <p><a href="https://plato.stanford.edu/entries/xenophanes/" target="_blank">Xenophanes</a> (c. 570–475 BCE) is sometimes grouped with the Milesians, but his contribution is different. He critiqued anthropomorphism (gods as human projections) but also advocated empirical epistemology and honest acknowledgment of human limitation. "No man has ever, nor ever will, know the truth about the gods and all the things of which I speak. For even if he should succeed in saying what is absolutely the case, he would still not know it. For all is but conjecture."</p>
  <p>This is philosophical wisdom. Xenophanes recognizes that knowledge of the transcendent or ultimate is likely beyond human capacity. Yet humans naturally form opinions and beliefs. The path of wisdom is humble inquiry, not dogmatic assertion. Gaarder could have emphasized this as a counterbalance to pre-Socratic confidence in reason's power. The question "Can reason know reality?" admits of the honest answer: "Perhaps, but we should be cautious."</p>

  <h3>What Modern Scholarship Adds</h3>
  <p>Contemporary pre-Socratic scholarship emphasizes what Gaarder's pedagogical frame overshadows: the continuity of mythological and philosophical thinking. Pre-Socratic thinkers didn't simply replace myth with reason; they integrated them. Heraclitus used myth to express philosophical truth. Parmenides presented his philosophy as a vision revealed by a goddess. Philosophy emerged from myth, not in opposition to it.</p>
  <p>Additionally, modern scholars recognize that Gaarder's "natural philosophers" were not proto-scientists. They were metaphysicians. They sought fundamental principles through rational argument, not systematic experiment. The scientific method—hypothesis, experiment, verification—is much later. Pre-Socratics were doing ontology, not empirical science, though their methods prefigured science.</p>

  <h3>Modern Vindication of Pre-Socratic Insight</h3>
  <p><strong>Democritus on atoms:</strong> Modern chemistry confirmed atomic structure. Though atoms proved divisible, Democritus's logic (something must be indivisible) remains sound.</p>
  <p><strong>Heraclitus on process:</strong> Process philosophy (Whitehead) and quantum mechanics (observer-dependent reality) vindicate flux over static being.</p>
  <p><strong>Anaxagoras on holography:</strong> DNA contains the template for entire organism; every cell contains whole blueprint. This echoes "something of everything in everything."</p>
  <p><strong>Pythagoras on mathematics:</strong> Modern physics reveals mathematical structure as fundamental. Symmetries, equations, ratios govern all phenomena. Number is indeed fundamental.</p>
  <p>These vindications suggest that the pre-Socratics were not primitive proto-scientists but deep thinkers who grasped enduring structures of reality. Their questions remain our questions. Their methods—careful reasoning about fundamental principles—remain philosophical method itself.</p>

  <ul class="s-list">
    <li><a href="https://plato.stanford.edu/entries/presocratics/" target="_blank">Presocratic Philosophy</a> — Stanford Encyclopedia of Philosophy</li>
    <li><a href="https://iep.utm.edu/presocratics/" target="_blank">Presocratic Philosophy</a> — Internet Encyclopedia of Philosophy</li>
    <li><a href="https://plato.stanford.edu/entries/thales/" target="_blank">Thales of Miletus</a> — SEP</li>
    <li><a href="https://plato.stanford.edu/entries/heraclitus/" target="_blank">Heraclitus</a> — SEP</li>
    <li><a href="https://plato.stanford.edu/entries/democritus/" target="_blank">Democritus</a> — SEP</li>
    <li><a href="https://plato.stanford.edu/entries/pythagoras/" target="_blank">Pythagoras</a> — SEP</li>
  </ul>
  </div>`
];

// ════════════════════════════════════════════════
// DOM BUILDER — Do not modify below this line
// ════════════════════════════════════════════════

const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">S<em>W</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> SOPHIE'S WORLD COMPANION · SECTION 01</div>
        <div class="hero-title">The Cradle of <em>Wonder</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>From Myth to Reason · The Pre-Socratic Revolution · 600–400 BCE</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Section navigation
const sectionNav = document.createElement('div');
sectionNav.className = 'section-nav';
sectionNav.innerHTML = `
  <a href="index.html" class="nav-link nav-index">All Sections</a>
  <a href="s2-athens.dd.html" class="nav-link nav-next">S2: The Athenian Triad &rarr;</a>
`;
mainInner.appendChild(sectionNav);

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;

function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
</body>
