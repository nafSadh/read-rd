<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Numbers', title: 'The <em>Numbers</em>' },
  { num: '02', short: 'Plateau', title: 'The <em>Plateau</em> Question' },
  { num: '03', short: 'Belief', title: '<em>Belief</em> Without Belonging' },
  { num: '04', short: 'Why Leave', title: 'Why <em>People</em> Leave' },
  { num: '05', short: 'Generations', title: 'The <em>Generational</em> Gap' },
  { num: '06', short: 'Taxonomy', title: '<em>Atheism</em>, Agnosticism, Apatheism' },
  { num: '07', short: 'Global', title: 'The <em>Global</em> Picture' }
];

const summaries = [
  `<p>29% of US adults are religiously unaffiliated: atheist (5%), agnostic (6%), and "nothing in particular" (19%).<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "Religious 'Nones' in America," Jan 2024</span></sup> They are the largest single "religious" category, surpassing any denomination.<sup class="fn"><a>[2]</a><span class="tip">PRRI, "Religiously Unaffiliated Is Fastest Growing Religious Category," 2024</span></sup> Growth trajectory: 2% (1948) &rarr; 16% (2007) &rarr; 29% (2024). Globally, the unaffiliated grew from 1.6B to 1.9B between 2010 and 2020.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">29%</div><div class="sl">US unaffiliated</div></div>
    <div class="st"><div class="sv">5%</div><div class="sl">Atheist</div></div>
    <div class="st"><div class="sv">6%</div><div class="sl">Agnostic</div></div>
    <div class="st"><div class="sv">19%</div><div class="sl">Nothing in particular</div></div>
  </div>`,

  `<p>After explosive growth, the nones appear to have plateaued. Pew's 2023-24 Religious Landscape Study: Christian decline has "slowed, may have leveled off."<sup class="fn"><a>[3]</a><span class="tip">Pew Research Center, 2023-24 Religious Landscape Study, Feb 2025</span></sup> Religion Unplugged argues a structural ceiling has been reached<sup class="fn"><a>[4]</a><span class="tip">Religion Unplugged, "The Plateau of the Religious Nones Continues," Apr 2025</span></sup> &mdash; the "easy switchers" already left. The remaining religious population has stronger commitment and deeper ties.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
      <text class="lbl-hi" x="10" y="20" font-size="10" text-anchor="start">US RELIGIOUSLY UNAFFILIATED (%)</text>
      <line class="edge" x1="50" y1="30" x2="50" y2="140"/>
      <line class="edge" x1="50" y1="140" x2="480" y2="140"/>
      <text class="lbl" x="40" y="135" text-anchor="end" font-size="9">0%</text>
      <text class="lbl" x="40" y="85" text-anchor="end" font-size="9">16%</text>
      <text class="lbl" x="40" y="45" text-anchor="end" font-size="9">30%</text>
      <circle class="node-hi" cx="80" cy="137" r="4" fill="var(--accent)"/><text class="lbl" x="80" y="150" text-anchor="middle" font-size="8">1948</text>
      <circle class="node-hi" cx="200" cy="85" r="4" fill="var(--accent)"/><text class="lbl" x="200" y="150" text-anchor="middle" font-size="8">2007</text>
      <circle class="node-hi" cx="350" cy="47" r="4" fill="var(--accent)"/><text class="lbl" x="350" y="150" text-anchor="middle" font-size="8">2024</text>
      <circle cx="450" cy="47" r="4" fill="var(--dim)" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,2"/><text class="lbl" x="450" y="150" text-anchor="middle" font-size="8">2026?</text>
      <path class="edge-hi" d="M80,137 Q140,110 200,85 Q275,60 350,47 L450,47" stroke-dasharray="none"/>
      <text class="lbl-hi" x="90" y="130" font-size="9">2%</text>
      <text class="lbl-hi" x="210" y="78" font-size="9">16%</text>
      <text class="lbl-hi" x="360" y="40" font-size="9">29%</text>
      <text class="lbl" x="460" y="40" font-size="9">plateau?</text>
    </svg>
  </div>`,

  `<p>The most important finding: the nones are NOT atheists. Most believe in God or a higher power. 78% say they can be moral without religion. 54% say they don't need religion to be spiritual.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "Religious 'Nones' in America," Jan 2024</span></sup> Pew's global study confirms that many nones worldwide retain belief in God, afterlife, and spiritual forces.<sup class="fn"><a>[5]</a><span class="tip">Pew Research Center, "Many Religious Nones Around the World Hold Spiritual Beliefs," Sep 2025</span></sup> This is dis-institutionalization, not desacralization.</p>
  <div class="feat-grid">
    <div class="feat"><h4>78% moral without religion</h4><p>The vast majority say ethical life doesn't require religious foundation.</p></div>
    <div class="feat"><h4>54% spiritual without religion</h4><p>Over half explicitly claim spiritual identity outside institutional frameworks.</p></div>
    <div class="feat"><h4>Belief persists</h4><p>Most nones believe in God, higher power, afterlife, or spiritual forces.</p></div>
    <div class="feat"><h4>Global phenomenon</h4><p>"Spiritual but not religious" found worldwide, not just in American context.</p></div>
  </div>`,

  `<p>67% left because they stopped believing in the teachings.<sup class="fn"><a>[6]</a><span class="tip">Pew Research Center, "Why Americans Leave, Stay in Their Childhood Religion," Dec 2025</span></sup> 20% dislike organized religion, citing corruption, clergy abuse, anti-LGBTQ stances.<sup class="fn"><a>[7]</a><span class="tip">NPR/Pew, "People say they're leaving religion because of anti-LGBTQ teachings and abuse," Mar 2024</span></sup> Pull factors: moral autonomy, modern worldview, meaningful alternatives. 40 million Americans stopped attending worship in the past 25 years.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">67%</div><div class="sl">Stopped believing</div></div>
    <div class="st"><div class="sv">20%</div><div class="sl">Dislike institution</div></div>
    <div class="st"><div class="sv">40M</div><div class="sl">Left in 25 years</div></div>
  </div>`,

  `<p>Gen Z: 18% atheist/agnostic (9% each) vs 4% Silent Generation &mdash; a 4.5x gap.<sup class="fn"><a>[8]</a><span class="tip">Barna Group, "Tracking the Rise of Atheism," 2024</span></sup> Only 33% of adults 18-29 say religion is very important.<sup class="fn"><a>[9]</a><span class="tip">American Survey Center, "Generation Z and the Future of Faith," 2024</span></sup> Generational replacement is the primary growth mechanism for the nones, not individual deconversion during adulthood.</p>
  <div class="price-grid">
    <div class="price-card"><h4>Silent Gen</h4><div class="price">4%</div><div class="pn">atheist/agnostic</div></div>
    <div class="price-card"><h4>Boomers</h4><div class="price">9%</div><div class="pn">atheist/agnostic</div></div>
    <div class="price-card"><h4>Millennials</h4><div class="price">14%</div><div class="pn">atheist/agnostic</div></div>
    <div class="price-card hl"><h4>Gen Z</h4><div class="price">18%</div><div class="pn">atheist/agnostic</div></div>
  </div>`,

  `<p>The nones are not homogeneous. Atheists (5%): active disbelief, philosophically committed. Agnostics (6%): uncertainty, intellectually engaged. "Nothing in particular" (19%): religious indifference &mdash; apatheism. The category that drove most growth isn't committed non-belief but simple indifference to the question.</p>
  <div class="chips">
    <span class="chip">Atheist: 5% &mdash; active disbelief</span>
    <span class="chip">Agnostic: 6% &mdash; uncertainty</span>
    <span class="chip">Nothing in particular: 19% &mdash; apatheism</span>
  </div>`,

  `<p>Gallup International (2024): globally, religious self-identification fell from 68% (2005) to 56% (2024). Convinced atheists rose from 6% to 10%.<sup class="fn"><a>[10]</a><span class="tip">Gallup International, "Two Decades of Change: Global Religiosity Declines While Atheism Rises," 2024</span></sup> But the decline is concentrated in wealthy nations. Pew's global study of nones confirms: many worldwide retain spiritual beliefs after leaving institutions. The story is institutional departure, not metaphysical abandonment.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">68%&rarr;56%</div><div class="sl">Global religious (2005-24)</div></div>
    <div class="st"><div class="sv">6%&rarr;10%</div><div class="sl">Convinced atheists</div></div>
    <div class="st"><div class="sv">1.9B</div><div class="sl">Unaffiliated worldwide</div></div>
  </div>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.01 &mdash; Details</div><h2>The <em>Numbers</em></h2></div>
  <p>The religiously unaffiliated now constitute 29% of the American adult population according to Pew Research Center's 2023-24 Religious Landscape Study<sup class="fn"><a>[3]</a><span class="tip">Pew Research Center, 2023-24 Religious Landscape Study, Feb 2025</span></sup>, making them the largest single "religious" category in the country. This surpasses any individual denomination &mdash; including Catholics (21%) and evangelical Protestants (24%).</p>
  <p>The internal composition of this 29% matters enormously: only 5% identify as atheist and 6% as agnostic. The vast majority &mdash; 19% &mdash; describe themselves as "nothing in particular." This is not a nation of committed skeptics; it's a nation of people who have simply stopped thinking about religious identity as important to their self-understanding.</p>
  <h3>The Growth Trajectory</h3>
  <p>The trajectory has been extraordinary. In 1948, just 2% of Americans reported no religious affiliation. By 2007, that had grown to 16%. By 2024, 29%. PRRI reports the figure may have reached 24% using slightly different methodology.<sup class="fn"><a>[2]</a><span class="tip">PRRI, "Religiously Unaffiliated Is Fastest Growing Religious Category," 2024</span></sup> Either way, the shift from 2% to nearly 30% in seven decades represents one of the most dramatic cultural transformations in American history &mdash; and it happened with remarkably little organized effort or institutional leadership.</p>
  <p>Globally, the unaffiliated population grew from 1.6 billion to 1.9 billion between 2010 and 2020, making it the third-largest "religious" category worldwide after Christianity and Islam. The growth is concentrated in East Asia (especially China and Japan), Europe, North America, and Oceania.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.02 &mdash; Details</div><h2>The <em>Plateau</em> Question</h2></div>
  <p>After more than a decade of explosive growth, the religiously unaffiliated appear to have reached a ceiling. Pew's 2023-24 Religious Landscape Study<sup class="fn"><a>[3]</a><span class="tip">Pew Research Center, 2023-24 Religious Landscape Study, Feb 2025</span></sup> found that the decline of Christianity in the United States has "slowed, may have leveled off." The nones' share has been essentially stable at 28-30% for several years.</p>
  <p>Analysis from Religion Unplugged<sup class="fn"><a>[4]</a><span class="tip">Religion Unplugged, "The Plateau of the Religious Nones Continues," Apr 2025</span></sup> argues this is not just a temporary pause but a genuine structural plateau. The reasoning: the people most likely to leave religion &mdash; those with weak institutional ties, progressive social views, limited personal religious experience, and few social connections to religious communities &mdash; have already left. The remaining religious population has stronger commitment, deeper community bonds, and more robust theological conviction. They are harder to dislodge.</p>
  <h3>The Open Question</h3>
  <p>The key uncertainty is whether this plateau is permanent or temporary. Arguments for permanence: the remaining religious core is genuinely committed, not culturally religious. Arguments for continued growth: as Gen Z ages into full adulthood and becomes the dominant generation, their much higher unaffiliation rates (35% of 18-29) could push the national figure higher through generational replacement alone, even if no additional individuals deconvert.</p>
  <div class="callout"><h4>The Parallel</h4><p>Religion experienced a similar brief stabilization in the late 1990s before the next wave of decline in the 2000s-2010s. Whether we are looking at a genuine equilibrium or another temporary pause before resumed decline is one of the most important open questions in American religious demography.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.03 &mdash; Details</div><h2><em>Belief</em> Without Belonging</h2></div>
  <p>The most important finding about the nones is what they are not: they are not secular in the Enlightenment sense. Pew Research Center's landmark study of religious nones in America<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "Religious 'Nones' in America," Jan 2024</span></sup> (January 2024) reveals that most nones believe in God or another higher power, though very few attend any kind of religious service. Seventy-eight percent say they can be moral without religion. Fifty-four percent say they don't need religion to be spiritual.</p>
  <p>Pew's global study<sup class="fn"><a>[5]</a><span class="tip">Pew Research Center, "Many Religious Nones Around the World Hold Spiritual Beliefs," Sep 2025</span></sup> (September 2025) confirms this is not uniquely American: many religiously unaffiliated people worldwide retain belief in God, afterlife, and spiritual forces. The "spiritual but not religious" identity is found across cultures and continents. What people are leaving is not the sacred &mdash; it's the institution. This is dis-institutionalization, not desacralization.</p>
  <h3>The Sociological Significance</h3>
  <p>Grace Davie's famous formulation &mdash; "believing without belonging" &mdash; captures what's happening. People retain private spiritual beliefs, practices, and experiences while withdrawing from public institutional participation. Religion becomes personal, customized, and invisible to survey instruments that measure only institutional affiliation. The sacred doesn't disappear; it goes underground, becoming harder to measure but no less real to those who experience it.</p>
  <p>This has profound implications for how we think about secularization. If we define it as declining institutional participation, secularization is clearly happening. If we define it as declining belief in the transcendent, the evidence is much less clear. The definition determines the diagnosis.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.04 &mdash; Details</div><h2>Why <em>People</em> Leave</h2></div>
  <p>Pew Research Center's December 2025 study on why Americans leave or stay in their childhood religion provides the most detailed picture of deconversion motivations. The primary reason, cited by about two-thirds (67%), is intellectual: they stopped believing in the religion's teachings. Rational thought, scientific literacy, and critical examination of doctrinal claims are the dominant factors.</p>
  <p>About 20% left because they dislike organized religion itself &mdash; not necessarily its beliefs, but its institutional expressions: corruption, social division, clergy sex abuse scandals, and anti-LGBTQ stances. This distinction matters: some people leave because they no longer believe; others leave because they still hold moral convictions that their institution has violated.</p>
  <h3>Push and Pull Factors</h3>
  <p>Researchers distinguish between "push" factors (negative experiences that drive people away) and "pull" factors (positive alternatives that attract them). Push factors include religious trauma, institutional hypocrisy, and political alignment of churches with positions the individual finds unacceptable. Pull factors include the desire for moral autonomy, having more meaningful alternatives for Sunday mornings, and the ability to embrace a modern worldview without institutional constraints.</p>
  <p>The deeper pattern: progressive cultural shift outpacing religious institutional adaptation. Individuals are becoming more ideologically progressive on issues of gender, sexuality, race, and science, while many religious institutions remain static or actively regress on these issues. The gap between personal values and institutional positions becomes untenable.</p>
  <p>The scale of departure is staggering: 40 million Americans have stopped attending worship services in the past 25 years alone. Jim Davis and Michael Graham documented this in "The Great Dechurching," calling it the largest and fastest religious shift in American history.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.05 &mdash; Details</div><h2>The <em>Generational</em> Gap</h2></div>
  <p>The generational gap in religious identity is the single most powerful predictor of future religious landscape change. The American Survey Center reports that 35% of adults aged 18-29 have no religious identity, and only 33% say religion is very important to them. Among adults 65 and older, just 14% are unaffiliated.</p>
  <p>The Barna Group provides more granular data: 18% of Gen Z identify as atheist or agnostic (9% each), compared to just 4% of the Silent Generation. This is a 4.5-fold increase across four generations. The growth of committed non-belief, not just indifference, is concentrated in the youngest cohort.</p>
  <h3>Generational Replacement as Mechanism</h3>
  <p>Generational replacement &mdash; younger, less religious cohorts entering adulthood while older, more religious cohorts pass away &mdash; is a more powerful driver of secularization than individual deconversion during adulthood. Even if no additional person ever left religion, the nones' share would continue growing for decades simply through demographic turnover.</p>
  <p>Barna attributes the Gen Z shift to several factors: entering adulthood in a culture where non-belief is normalized, internet access providing exposure to secular arguments and alternative communities, delayed marriage reducing a major trigger for religious engagement, and growing up in an era of institutional distrust that extends well beyond religion.</p>
  <h3>The Countertrend</h3>
  <p>One intriguing countertrend deserves attention: some studies find Gen Z men and highly educated individuals showing unexpected signs of religious or philosophical interest. This isn't traditional churchgoing but rather intellectual engagement with religion, meaning-making, and existential questions &mdash; often through podcasts, YouTube, and online communities centered on figures like Jordan Peterson, Jonathan Pageau, or Bishop Robert Barron. Whether this represents genuine religious renewal or merely cultural curiosity remains to be seen.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.06 &mdash; Details</div><h2><em>Atheism</em>, Agnosticism, Apatheism</h2></div>
  <p>The religiously unaffiliated are routinely treated as a monolithic group, but the internal diversity matters enormously for understanding the phenomenon and predicting its trajectory.</p>
  <h3>Three Categories</h3>
  <p>Atheists (5% of US adults) actively disbelieve in God or any supernatural reality. They tend to be philosophically committed, often having arrived at their position through deliberate reasoning. Many are engaged in secularist advocacy and identify non-belief as central to their worldview.</p>
  <p>Agnostics (6%) maintain uncertainty about God's existence. They tend to be intellectually engaged with the question but unwilling to commit to either belief or disbelief. Many are open to spiritual experience while skeptical of specific theological claims.</p>
  <p>"Nothing in particular" (19%) is the largest and most significant category. These are people who simply don't think about religious identity much. This is closer to what philosophers call "apatheism" &mdash; not the rejection of God, but indifference to the question. They don't actively disbelieve; they just don't care enough to form a position.</p>
  <h3>Why the Distinction Matters</h3>
  <p>The category that drove most of the growth in the nones is "nothing in particular," not committed atheism. Indifference is harder to organize politically or culturally than active disbelief. Atheists join organizations, attend conferences, and form communities. The apathetically unaffiliated simply live their lives. This means the "rise of the nones" is less a secularist revolution and more a quiet withdrawal from institutional religion by people who never found it particularly compelling in the first place.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S2.07 &mdash; Details</div><h2>The <em>Global</em> Picture</h2></div>
  <p>The rise of the nones is not exclusively American, though the US has the best data. Gallup International's 2024 global survey (43,250 people, 42 countries) shows that worldwide, the proportion identifying as "religious" declined from 68% in 2005 to 56% in 2024. "Not religious" rose from 21% to 28%. Convinced atheists: 6% to 10%.</p>
  <p>The geographic pattern mirrors the secularization thesis: atheism is most prevalent in high-income settings (14%) versus low-income countries (3%). Japan, Germany, Sweden, and the Netherlands lead the secularization trend. Pakistan, India, Bangladesh, and sub-Saharan African nations remain strongly religious.</p>
  <h3>The Global Nones</h3>
  <p>Pew's September 2025 global study of the religiously unaffiliated reveals a consistent pattern across cultures: many nones worldwide retain spiritual beliefs even after leaving institutional religion. Belief in God, afterlife, spiritual forces, and moral purpose persists. The story everywhere is the same: institutional departure, not metaphysical abandonment.</p>
  <div class="callout"><h4>The Bottom Line</h4><p>The rise of the nones is a story about institutions, not about the sacred. People are leaving buildings, not leaving transcendence. The question for organized religion is not whether people still hunger for meaning, community, and connection to something larger than themselves &mdash; they clearly do &mdash; but whether existing institutions can provide it in forms that contemporary people find credible, relevant, and life-giving.</p></div>`
];
