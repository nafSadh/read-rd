<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Wellness', title: 'The <em>Wellness</em>-Religion Convergence' },
  { num: '02', short: 'Digital', title: 'Digital <em>Religion</em>: AI in the Pulpit' },
  { num: '03', short: 'AI Faith', title: '<em>AI</em> and Faith' },

  { num: '05', short: 'TikTok', title: '<em>TikTok</em> Spirituality' },

];

const summaries = [
  `<p>The global wellness economy reached $6.8 trillion in 2024, growing 7.9% annually.<sup class="fn"><a>[1]</a><span class="tip">Global Wellness Institute, "Global Wellness Economy Monitor," Nov 2025</span></sup> Meditation/mindfulness: 18.9% CAGR. Spiritual wellness apps: $2.16B market heading toward $4.84B by 2030.<sup class="fn"><a>[2]</a><span class="tip">Grand View Research, "Spiritual Wellness Apps Market," 2024</span></sup> Wellness has absorbed functions historically associated with religion &mdash; community, ritual, and meaning-making &mdash; typically without theological frameworks and through consumer-product delivery models.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">$6.8T</div><div class="sl">Wellness economy</div></div>
    <div class="st"><div class="sv">18.9%</div><div class="sl">Meditation CAGR</div></div>
    <div class="st"><div class="sv">$2.16B</div><div class="sl">Spiritual apps</div></div>
    <div class="st"><div class="sv">$298B</div><div class="sl">Mental wellness (2032)</div></div>
  </div>`,

  `<p>91% of church leaders welcome AI in ministry (up 80% YoY). 45% actively use AI. But less than 25% use it for theological content.<sup class="fn"><a>[3]</a><span class="tip">Subsplash, "Church Tech Trends 2026," 2025</span></sup> Bible apps (59%), podcasts (33%), TikTok (25% of young people). 10 million more Americans read Scripture outside church, driven by digital access. Millennials grew 9% in Bible engagement 2024-2025.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">91%</div><div class="sl">Churches welcome AI</div></div>
    <div class="st"><div class="sv">45%</div><div class="sl">Actively use AI</div></div>
    <div class="st"><div class="sv">+10M</div><div class="sl">Digital Scripture readers</div></div>
  </div>`,

  `<p>AI chatbots offer spiritual guidance: Text With Jesus, Bible.ai, Hallow, Abide. Way of the Future: first AI-worshipping church (revived 2023). But 73% of Americans say AI should play no role in faith.<sup class="fn"><a>[4]</a><span class="tip">aicompetence.org, "The Rise of AI-Based Religions and Digital Faiths," 2024</span></sup> Catholic Church and Eastern Orthodox leaders issued joint warnings (2024) that AI should never replace divine authority.</p>`,

  `<p>The Johns Hopkins clergy study (published 2025) gave psilocybin to clergy from multiple traditions.<sup class="fn"><a>[5]</a><span class="tip">Johns Hopkins, Psilocybin Clergy Study, published 2025</span></sup> Key finding: spiritual experiences were profound, but metaphysical beliefs "almost or entirely unchanged." No conversions. However, the study faced "serious non-compliance" findings from the IRB. Novel psychedelic spiritual communities (NPSCs) are emerging with distinct theologies.<sup class="fn"><a>[6]</a><span class="tip">Harvard Divinity School, Psychedelic Intersections Conference, 2025-26</span></sup></p>`,

  `<p>TikTok has created spaces for spiritual exploration that previous generations couldn't access. 25% of young people engage with spiritual content on TikTok. Ancient wisdom meets modern storytelling. This democratizes access but fragments authority &mdash; anyone can be a spiritual teacher. Quality control mechanisms that institutions provided (training, ordination, peer review) are absent.</p>`,

  `<p>Despite predictions of its demise, New Age spirituality persists and evolves: crystal healing, astrology apps, tarot reading, sound healing. What was fringe in the 1990s is mainstream in the 2020s, powered by social media distribution and a generation hungry for meaning but suspicious of institutions.</p>
  <div class="chips">
    <span class="chip">Co-Star: 25M+ downloads</span>
    <span class="chip">Crystal healing mainstream</span>
    <span class="chip">Sound healing studios</span>
    <span class="chip">Tarot on TikTok</span>
  </div>`,

  `<h4>What everyone agrees on</h4>
  <ul class="s-list pro">
    <li>The wellness economy is absorbing religious functions at scale ($6.8T)</li>
    <li>Digital religion expands even as institutional attendance declines</li>
    <li>Psychedelic spirituality is moving from fringe to mainstream research</li>
    <li>Young people are spiritually curious but institutionally allergic</li>
    <li>AI in ministry is growing fast but concentrated in administration</li>
  </ul>
  <h4>Where the discourse fractures</h4>
  <ul class="s-list con">
    <li>Is wellness "religion lite" (beneficial) or "religion hollow" (missing what matters)?</li>
    <li>Does digital religion strengthen or weaken faith?</li>
    <li>Are psychedelics a legitimate spiritual technology or a shortcut?</li>
    <li>Can AI provide genuine pastoral care, or is it category error?</li>
    <li>Is the unbundling of religion creative transformation or slow death?</li>
  </ul>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.01 &mdash; Details</div><h2>The <em>Wellness</em>-Religion Convergence</h2></div>
  <p>The Global Wellness Institute<sup class="fn"><a>[1]</a><span class="tip">Global Wellness Institute, "Global Wellness Economy Monitor," Nov 2025</span></sup> reports the wellness economy reached $6.8 trillion in 2024, growing at 7.9% annually and projected to approach $10 trillion by 2029. Within it, the meditation and mindfulness segment grows at 18.9% CAGR. Mental wellness: $168 billion heading toward $298 billion by 2032. Spiritual wellness apps alone constitute a $2.16 billion market.<sup class="fn"><a>[2]</a><span class="tip">Grand View Research, "Spiritual Wellness Apps Market," 2024</span></sup></p>
  <h3>What Wellness Absorbed</h3>
  <p>Wellness has absorbed many functions historically provided exclusively by religion: community (yoga studios, retreat centers), ritual (morning meditation, breathwork sessions), meaning-making (coaching, self-help), moral framework (mindful living, intentional consumption), and group identity (wellness culture). The critical difference: no theology, no transcendent referent, and a consumer-product delivery model.</p>
  <p>McKinsey notes<sup class="fn"><a>[7]</a><span class="tip">McKinsey, "The $2 trillion global wellness market gets a millennial and Gen Z glow-up," 2024</span></sup> that millennials and Gen Z are driving the convergence, blurring the line between wellness and spirituality. Academic attention to the "wellness as religion" thesis is growing. Some scholars characterize this convergence as religion stripped of metaphysics and delivered through a consumer model, though others see it as a genuinely new form of spiritual practice.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.02 &mdash; Details</div><h2>Digital <em>Religion</em>: AI in the Pulpit</h2></div>
  <p>According to the 2025 State of AI in the Church survey,<sup class="fn"><a>[3]</a><span class="tip">Subsplash, "Church Tech Trends 2026," 2025</span></sup> 91% of church leaders say they welcome AI in ministry &mdash; an 80% increase from the previous year. 45% actively use AI. But less than 25% apply it to theological content like sermons or devotionals. Most use it for administration, communication, and discipleship support.</p>
  <h3>The Digital Scripture Revolution</h3>
  <p>Digital scripture engagement is reshaping how people encounter sacred texts: Bible apps (59%), podcasts (33%), and TikTok (25% of young people). Notably, 10 million more Americans read Scripture outside church than a year ago, driven primarily by digital access. Millennials grew 9% in Bible engagement from 2024 to 2025.</p>
  <div class="callout"><h4>The Unbundling Accelerant</h4><p>The paradox: institutional attendance declines while digital religious engagement grows. This may accelerate unbundling &mdash; people consume religious content without institutional belonging. The medium separates the content from the community, the teaching from the teacher, the wisdom from the tradition.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.03 &mdash; Details</div><h2><em>AI</em> and Faith</h2></div>
  <p>AI chatbots now offer spiritual guidance around the clock: Text With Jesus, Bible.ai, EpiscoBot, Hallow, and Abide provide prayer support, Scripture readings, and personalized devotionals. Way of the Future, revived in 2023, claims to be the first AI-worshipping church.<sup class="fn"><a>[4]</a><span class="tip">aicompetence.org, "The Rise of AI-Based Religions and Digital Faiths," 2024</span></sup></p>
  <h3>The Resistance</h3>
  <p>But 73% of Americans say AI should play no role in advising people about their faith. In 2024, the Catholic Church and Eastern Orthodox leaders issued joint warnings that AI should never replace divine authority. The gap between consumer adoption and institutional resistance mirrors broader AI dynamics in every sector: technology moves faster than institutions can adapt, and the question is whether the adaptation will be creative integration or hostile rejection.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.04 &mdash; Details</div><h2><em>Psychedelic</em> Spirituality</h2></div>
  <p>The Johns Hopkins clergy study<sup class="fn"><a>[5]</a><span class="tip">Johns Hopkins, Psilocybin Clergy Study, published 2025</span></sup> &mdash; published in 2025 after a full decade of controversy &mdash; gave psilocybin to clergy from multiple traditions including rabbis, Catholic priests, Protestant ministers, and a Muslim leader. The key finding: participants described profound spiritual experiences, but their core metaphysical beliefs were "almost or entirely unchanged." No conversions occurred. Psilocybin deepened existing spiritual frameworks rather than creating new ones.</p>
  <h3>Ethical Complications</h3>
  <p>However, the study was clouded by an IRB finding of "serious non-compliance" with federal human subject protections, including the involvement of funders in the trial itself. This ethical cloud hangs over the nascent field of psychedelic-spiritual research.</p>
  <h3>Emerging Communities</h3>
  <p>Novel psychedelic spiritual communities (NPSCs) are nonetheless emerging in North America with distinct theologies, ritual practices, and community structures. Oregon and Colorado lead in decriminalization. Harvard Divinity School hosts its fourth annual Psychedelic Intersections conference in April 2026.<sup class="fn"><a>[6]</a><span class="tip">Harvard Divinity School, Psychedelic Intersections Conference, 2025-26</span></sup></p>
  <p>LSE analysis<sup class="fn"><a>[8]</a><span class="tip">LSE, "Psychedelics and religion: A complex relationship," Jan 2025</span></sup> notes that psychedelic experiences share characteristics with religious mystical states. But Christian, Islamic, and Buddhist leaders remain divided. The tension between the therapeutic frame (FDA approval, clinical protocols) and the sacred frame (religious context, communal ritual) defines the field.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.05 &mdash; Details</div><h2><em>TikTok</em> Spirituality</h2></div>
  <p>Platforms like TikTok have created spaces for spiritual exploration that previous generations couldn't access. Ancient wisdom meets modern storytelling. Creative content creators turn complex religious concepts into bite-sized lessons. Online ministries welcome those who would hesitate to enter traditional worship spaces.</p>
  <h3>Democratization and Its Costs</h3>
  <p>This democratizes access but also fragments authority. Anyone can be a spiritual teacher on TikTok. Quality control mechanisms that institutions provided &mdash; training, ordination, peer review, theological accountability &mdash; are absent. The result is a spiritual marketplace where deep tradition and superficial appropriation coexist, where genuine wisdom sits beside misinformation, and where the consumer bears the full burden of discernment.</p>
  <p>Twenty-five percent of young people now engage with spiritual content through TikTok. This represents a fundamental shift in how religious knowledge is transmitted: from vertical authority (teacher to student, clergy to congregation) to horizontal sharing (peer to peer, creator to follower).</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.06 &mdash; Details</div><h2>New <em>Age</em> Persistence</h2></div>
  <p>Despite predictions of its demise, New Age spirituality persists and evolves: crystal healing, astrology apps, tarot reading, sound healing. The astrology app Co-Star has over 25 million downloads. What was fringe in the 1990s is mainstream in the 2020s, powered by social media distribution and a generation hungry for meaning but suspicious of institutions.</p>
  <h3>Why It Persists</h3>
  <p>New Age spirituality offers what many people want from religion &mdash; a sense of enchantment, personal meaning, and connection to something larger &mdash; without what they reject: institutional authority, exclusive truth claims, moral judgment, and communal obligation. It is maximally customizable, infinitely combinable, and carries no social cost. One can be a yoga-practicing, tarot-reading, crystal-carrying astrology enthusiast without joining anything, attending anything, or being accountable to anyone.</p>
  <p>This is religion fully unbundled: each component available as a standalone consumer product, stripped of the theological framework that once gave it coherence. Whether this represents spiritual freedom or spiritual impoverishment depends on whether coherence matters.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S5.07 &mdash; Details</div><h2><em>Consensus</em> &amp; Fractures</h2></div>
  <p>After surveying the evidence across 8 major sources, several points of consensus emerge alongside the deepest question in contemporary religion.</p>
  <h3>Points of Agreement</h3>
  <p>The wellness economy is absorbing religious functions at unprecedented scale ($6.8 trillion and growing). Digital religion is expanding even as institutional attendance declines. Psychedelic spirituality is moving from fringe to mainstream academic research. Young people are spiritually curious but institutionally allergic. AI in ministry is growing fast but remains concentrated in administrative rather than theological functions.</p>
  <h3>The Central Question</h3>
  <p>The deepest fracture concerns the nature of the unbundling itself. Is wellness "religion lite" &mdash; a beneficial adaptation that makes spiritual practices accessible to people who would never enter a church? Or is it "religion hollow" &mdash; missing precisely what makes religion powerful (theology, community obligation, transcendent referent, moral accountability)?</p>
  <div class="verdict">
    <div class="v-col pro"><h4>Creative Transformation</h4><ul><li>Spiritual practices reach millions who'd never join institutions</li><li>Digital access democratizes religious knowledge</li><li>Psychedelic research opens new frontiers</li><li>AI can support (not replace) pastoral care</li></ul></div>
    <div class="v-col con"><h4>Slow Institutional Death</h4><ul><li>Wellness strips theology from practices</li><li>Digital consumption replaces communal belonging</li><li>Authority fragmentation enables misinformation</li><li>Unbundled components may not sustain meaning</li></ul></div>
  </div>`
];

// === DOM BUILDING ===
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>5</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head"><div class="main-head-inner">
      <div class="hero-badge"><span class="dot"></span> Religion Today &middot; Section 5</div>
      <div class="hero-title">New Movements &amp; <em>Spirituality</em></div>
      <div class="masthead-rule"></div>
      <div class="masthead-sub"><span>8 Sources &middot; GWI, McKinsey, Subsplash, Johns Hopkins</span></div>
    </div></div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>`;
document.body.appendChild(shell);

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;
  mainInner.appendChild(block);
});
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const d = document.createElement('div'); d.className = 'detail'; d.id = `detail-${idx}`; d.innerHTML = details[idx]; rightInner.appendChild(d);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return;
  const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
