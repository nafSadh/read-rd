<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Religion Today — An Anthropological Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);transition:background 1s}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}

  // 02 — Rise of the Nones
  `<p>29% of US adults are religiously unaffiliated: 5% atheist, 6% agnostic, 19% "nothing in particular."<sup class="fn"><a>[3]</a><span class="tip">Pew Research Center, "Religious 'Nones' in America," Jan 2024</span></sup> They are now the largest single "religious" category, surpassing any denomination. Growth from 16% (2007) to 29% (2024) appears to have plateaued &mdash; what Religion Unplugged calls the "easy switchers" have already left.</p>
  <div class="s-stat">

    <div class="st"><div class="sv">78%</div><div class="sl">Moral without religion</div></div>
  </div>
  <p>But the nones are NOT atheists. Most believe in God or a higher power. 78% say they can be moral without religion. The phenomenon is dis-institutionalization, not desacralization. People leave the building, not the sacred. 67% left because they stopped believing; 20% cite institutional failings (corruption, abuse, anti-LGBTQ stances).</p>`,

  // 03 — Fundamentalism & Politicization
  `<p>Religion was supposed to retreat into private life. Instead, it has become one of the most potent forces in global politics. Pew surveyed 55,000 people in 36 countries: Indonesia leads in religious nationalism (46%), with the US relatively low (6%).<sup class="fn"><a>[5]</a><span class="tip">Pew Research Center, "Religious Nationalism Around the World," Jan 2025</span></sup> But PRRI finds 32% of Americans hold Christian nationalist beliefs.<sup class="fn"><a>[6]</a><span class="tip">PRRI, "Christian Nationalism Across All 50 States," 2024</span></sup></p>

    <div class="st"><div class="sv">46%</div><div class="sl">Indonesia rel. nationalism</div></div>
    <div class="st"><div class="sv">22%</div><div class="sl">Want official US religion</div></div>

  <p>Three flavors: US Christian nationalism (81% of White evangelicals voted Trump, 22% want Christianity as official religion), Indian Hindu nationalism (BJP governance challenging secularism since 2014), and political Islam (ranging from Indonesia's moderate wasathiyah to theocratic models). The deeper pattern: religion functioning as ethnic identity marker rather than spiritual practice.</p>`,

  // 04 — Religion & Science
  `<p>The "warfare thesis" &mdash; that science and religion are locked in eternal conflict &mdash; has been rejected by historians of science for decades. The actual relationship is captured by the "complexity thesis": cooperative, conflictual, and independent, depending on era and context.<sup class="fn"><a>[7]</a><span class="tip">History for Atheists, "The Conflict Between Science and Religion," Aug 2025</span></sup> Yet popular culture keeps the warfare narrative alive.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Scientists are religious</h4><p>Ecklund's 9,422-scientist survey: >50% religious in India, Italy, Taiwan, Turkey. Only 32% of UK scientists see conflict.</p></div>

    <div class="feat"><h4>New Atheism declined</h4><p>Dawkins/Hitchens movement exhausted by 2025. Replaced by "post-secular" curiosity and nuanced science-religion dialogue.</p></div>

  // 05 — New Movements & Spirituality
  `<p>Religion isn't dying &mdash; it's being unbundled. The $6.8 trillion wellness economy<sup class="fn"><a>[8]</a><span class="tip">Global Wellness Institute, "Global Wellness Economy Monitor," Nov 2025</span></sup> has absorbed meditation, mindfulness, and community from religious traditions, repackaging them as consumer products. Meanwhile, TikTok is a spiritual education platform, AI chatbots offer pastoral counsel, and psychedelic churches hold legal services.</p>
  <div class="s-stat">

    <div class="st"><div class="sv">91%</div><div class="sl">Churches welcome AI</div></div>
    <div class="st"><div class="sv">$2.16B</div><div class="sl">Spiritual apps market</div></div>
    <div class="st"><div class="sv">73%</div><div class="sl">Say no AI in faith</div></div>
  </div>
  <p>Digital religion grows while institutional attendance declines. 91% of church leaders welcome AI (up 80% YoY),<sup class="fn"><a>[9]</a><span class="tip">Subsplash, "Church Tech Trends 2026," 2025</span></sup> but 73% of Americans say AI should play no role in faith.<sup class="fn"><a>[10]</a><span class="tip">aicompetence.org, "The Rise of AI-Based Religions and Digital Faiths," 2024</span></sup> Psychedelic spirituality is moving from fringe to mainstream research (Johns Hopkins clergy study). Novel psychedelic spiritual communities are emerging with distinct theologies.</p>`,

const details = [
  // 01 — Global Religious Landscape
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div>
    <h2>The <em>Global</em> Religious Landscape</h2>
  </div>
  <p>Pew Research Center's 2025 study,<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup> drawing on more than 2,700 data sources including national censuses and large-scale surveys, reveals the most comprehensive picture ever assembled of how the world's religious landscape shifted between 2010 and 2020. The headline finding: Islam grew by 347 million adherents in a single decade, more than all other religions combined, while Christianity added 122 million but fell as a share of the global population.</p>

  <h3>The Demographic Earthquake</h3>
  <p>Christianity shrank as a share of the population in 41 countries &mdash; nearly all in the Americas and Europe. The United States alone saw a 14-point drop. Australia lost 20 points. Meanwhile, Sub-Saharan Africa became home to 30.7% of the world's Christians, surpassing Europe (22%) for the first time in modern history. Latin America holds 24%. The old Christendom &mdash; Europe as the heartland of the faith &mdash; is over.</p>
  <p>Islam's growth is primarily demographic: high fertility rates and young population structures in Sub-Saharan Africa and South/Southeast Asia. Religious switching (conversion) is a relatively minor factor. If current trajectories hold, Islam and Christianity reach population parity around 2070, each at roughly 32% of the world's population.</p>

  <h3>The Secularization Paradox</h3>
  <p>Ronald Inglehart's existential security thesis<sup class="fn"><a>[11]</a><span class="tip">Inglehart, Ronald F., <em>Religion's Sudden Decline</em>, Oxford University Press, 2021</span></sup> offers the most robust explanation for religious decline: as societies become wealthier and more politically stable, individual-choice norms replace traditional authority, fertility declines, and religion weakens. Gallup International's 2024 global survey<sup class="fn"><a>[2]</a><span class="tip">Gallup International, "Two Decades of Change: Global Religiosity Declines While Atheism Rises," 2024</span></sup> (43,250 people, 42 countries) confirms the pattern quantitatively: 14% identify as atheist in high-income countries versus just 3% in low-income ones.</p>
  <p>But the thesis fails dramatically in the Global South. Peter Berger, who once championed secularization theory, famously reversed himself in 1999: the world is "massively religious," with two exceptions &mdash; Western and Central Europe, and an international intellectual class. Pentecostalism alone claims over 600 million adherents worldwide. Church planting movements thrive in Iran, China, and Nepal.</p>

  <div class="callout">
    <h4>The Resolution</h4>
    <p>A 2025 study published in Nature Communications offers a synthesis: religion declines in a predictable sequence tied to existential security, but the sequence hasn't started in most of the world. The decline pattern holds across all major traditions once security thresholds are reached &mdash; but those thresholds are far from universal.</p>
  </div>

  <h3>Buddhism's Unique Decline</h3>
  <p>Buddhism is the only major world religion that literally lost members between 2010 and 2020, dropping by 19 million to 324 million. The decline is driven by demographic contraction in East Asian societies with very low fertility: Japan, South Korea, China. Paradoxically, Buddhist practices &mdash; mindfulness, meditation, contemplation &mdash; have never been more popular globally. They have simply been decoupled from Buddhist institutional identity and absorbed into the wellness economy.</p>

  <h3>What This Means</h3>
  <p>The global religious landscape in 2026 is defined not by a single trajectory but by three simultaneous movements: secularization in wealthy nations, revival in the Global South, and transformation everywhere. Religion is being unbundled &mdash; its components (belief, ritual, community, identity, morality) recombined in new configurations. No single theoretical framework captures this complexity.</p>`,

  // 02 — Rise of the Nones
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div>
    <h2><em>Rise</em> of the Nones</h2>
  </div>
  <p>The religiously unaffiliated &mdash; atheists, agnostics, and the vast majority who describe themselves as "nothing in particular" &mdash; now constitute 29% of the American adult population, making them the largest single "religious" category in the country, surpassing any individual denomination. This represents an extraordinary trajectory: from 2% in 1948 to 16% in 2007 to 29% in 2024.</p>

  <h3>The Composition</h3>
  <p>The "nones" are not a homogeneous group. Within the 29%, only 5% identify as atheist and 6% as agnostic. The vast majority &mdash; 19% &mdash; describe themselves as "nothing in particular," a category closer to religious indifference (sometimes called apatheism) than to committed non-belief. They don't reject God; they simply don't think about the question much. This distinction matters enormously: the rise of the nones is primarily a story of institutional disengagement, not philosophical secularism.</p>

  <h3>The Plateau</h3>
  <p>After a period of explosive growth, the nones appear to have reached a ceiling. Pew's 2023-24 Religious Landscape Study found that the decline of Christianity in the US has "slowed, may have leveled off." Analysis from Religion Unplugged argues this is a structural plateau, not a temporary pause: the people most likely to leave religion &mdash; those with weak institutional ties, progressive social views, and minimal personal religious experience &mdash; have already left. The remaining religious population has stronger commitment, deeper community bonds, and more robust theological conviction.</p>

  <h3>Why They Leave</h3>
  <p>Pew's research identifies a clear hierarchy of reasons. Two-thirds (67%) say they stopped believing in their religion's teachings. Rational thought, scientific literacy, and exposure to alternative worldviews are contributing factors. About 20% left because they dislike organized religion, citing institutional corruption, clergy abuse scandals, and anti-LGBTQ positions. Pull factors include the desire for moral autonomy, attraction to a modern worldview, and access to meaningful alternatives for community and meaning.</p>
  <p>The scale is staggering: 40 million Americans have stopped attending worship services in the past 25 years alone.</p>

  <h3>Generational Dynamics</h3>
  <p>The generational gap is the engine of change. Eighteen percent of Gen Z identify as atheist or agnostic (9% each), compared to just 4% of the Silent Generation &mdash; a 4.5-fold difference. Only 33% of adults aged 18-29 say religion is very important to them. Generational replacement, rather than individual deconversion, is the primary mechanism driving growth of the nones.</p>

  <div class="callout">
    <h4>The Belief Paradox</h4>
    <p>Most nones believe in God or another higher power. Most say they can be spiritual without religion. They have left institutions, not the sacred. This is dis-institutionalization, not desacralization &mdash; and it's a global phenomenon, not just American.</p>
  </div>

  <h3>The Global Picture</h3>
  <p>Pew's global study of the religiously unaffiliated (September 2025) confirms that many nones worldwide hold spiritual beliefs &mdash; belief in God, afterlife, and spiritual forces persists despite leaving organized religion. "Spiritual but not religious" is not just a Western phenomenon; it's a global response to institutional disenchantment combined with persistent spiritual need.</p>`,

  // 03 — Fundamentalism & Politicization
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div>
    <h2><em>Fundamentalism</em> &amp; Politicization</h2>
  </div>
  <p>The Enlightenment predicted religion would retreat into private life as societies modernized. Instead, religion has become one of the most potent political forces of the 21st century. From Hindu nationalism in the world's largest democracy to Christian nationalism in the world's oldest, from political Islam to Buddhist nationalism in Myanmar, the fusion of religious identity and political power defines the contemporary era.</p>

  <h3>Measuring Religious Nationalism</h3>
  <p>Pew Research Center surveyed 55,000 people across 36 countries<sup class="fn"><a>[5]</a><span class="tip">Pew Research Center, "Religious Nationalism Around the World," Jan 2025</span></sup> in early 2024, asking four questions: how important is the historically dominant religion to national identity, how important is the leader's religion, and how much should sacred texts guide laws. Indonesia leads at 46%, Bangladesh at 45%. The US registers only 6% on Pew's strict measure. But PRRI, using a broader cultural-alignment approach, finds 32% of Americans qualify as Christian nationalism Adherents (11%) or Sympathizers (21%). The gap reveals measurement challenges more than different realities.</p>

  <h3>Christian Nationalism in the United States</h3>
  <p>PRRI's survey of 22,260 adults<sup class="fn"><a>[6]</a><span class="tip">PRRI, "Christian Nationalism Across All 50 States," 2024</span></sup> provides the most detailed picture: 81% of White evangelical Protestants voted for Trump in 2024. 85% identify with or lean toward the Republican Party &mdash; a 20-point shift in three decades. 61% of Trump's evangelical backers want government to support religious values, and 22% want Christianity declared the official religion of the United States.</p>
  <p>State-level patterns are striking: Mississippi and Oklahoma lead at 51%, followed by Arkansas (49%) and West Virginia (48%). Support correlates strongly with Trump vote share. White evangelicals (67%) are the only major religious group where a majority holds CN beliefs. Church attendance is the strongest predictor: 54% of weekly attenders qualify as CN sympathizers versus 20% of non-attenders.</p>

  <h3>Hindu Nationalism in India</h3>
  <p>Critics argue that BJP governance since 2014 has eroded India's secular constitutional foundations. The Waqf Amendment Act and Citizenship Amendment Act have been characterized as discriminatory against Muslims. Reports indicate violence against Muslims and Christians has increased. During the 2024 general election, Prime Minister Modi used rhetoric that critics described as Islamophobic, including "love jihad" and "vote jihad" messaging. The March 2025 Nagpur clashes &mdash; Hindu nationalist groups demanding demolition of a Mughal-era Muslim tomb, resulting in communal violence &mdash; illustrate how analysts say religious nationalism has moved into mainstream political life.</p>

  <h3>Political Islam: A Spectrum</h3>
  <p>Islamic fundamentalism is not monolithic. Indonesia, the world's largest Muslim-majority democracy, maintains a moderate tradition (wasathiyah) championed by scholars like Azyumardi Azra. Turkey under the AKP blends Islamist politics with democratic structures, though increasingly authoritarian. Iran's theocratic model faces growing internal pressure from a young, secular-leaning population. Saudi Arabia under MBS intentionally reduces the religious establishment's political power. The diversity of political Islam defies the monolithic image of Western media coverage.</p>

  <div class="security-box">
    <h4>The Violence Connection</h4>
    <p>Research published in the Journal for the Scientific Study of Religion<sup class="fn"><a>[12]</a><span class="tip">Saiya, "Christian Nationalism and Violence Against Religious Minorities," <em>JSSR</em>, 2024</span></sup> (Saiya, 2024) finds that political empowerment of Christian nationalism correlates with physical attacks on religious minorities. The mechanism: exclusive truth claims combined with political power produce dehumanization of out-groups. The findings point to measurable consequences for minority safety.</p>
  </div>

  <h3>Religion as Identity Politics</h3>
  <p>The deeper pattern across all three traditions: religion functions less as a belief system and more as an ethnic or cultural marker. Sociologists such as Perry and Whitehead argue that "Christian" in "Christian nationalism" functions more as a marker of white cultural identity than of theological commitment. Similarly, analysts observe that Hindu nationalism deploys Hinduism as civilizational identity rather than devotional practice. In Durkheimian terms, group boundary-marking matters more than content of belief.</p>`,

  // 04 — Religion & Science
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div>
    <h2>Religion &amp; <em>Science</em></h2>
  </div>
  <p>The idea that science and religion are locked in eternal warfare is one of the most persistent myths of modernity. Created by John William Draper (1874) and Andrew Dickson White (1896), the "conflict thesis" was adopted by popular culture, reinforced by selective cases like Galileo and the Scopes trial, and became the default assumption of educated Westerners. The problem: it's historically wrong, and the global evidence contradicts it.</p>

  <h3>The Warfare Thesis: Debunked</h3>
  <p>Actual historians of science have rejected the Draper-White conflict thesis for decades. The current scholarly consensus is captured by what's called the "complexity thesis": science and religion have had cooperative, conflictual, and independent relationships depending on era, institution, and specific scientific question. The medieval Church funded universities. Islamic scholars preserved and extended Greek mathematics and astronomy. Newton saw his physics as revealing God's design. The relationship is plural, not singular.</p>
  <p>Yet the warfare narrative persists in popular culture, fueled by selective historical memory and the prominence of New Atheist polemicists in the 2000s-2010s. A 2025 article in the journal Sociology of Religion demonstrates that individualized religious expressions are "largely compatible with scientific worldviews" &mdash; the perceived conflict is maintained more by cultural narrative than by evidence.</p>

  <h3>What Scientists Actually Believe</h3>
  <p>Elaine Howard Ecklund's landmark survey<sup class="fn"><a>[13]</a><span class="tip">Ecklund, "Religion among Scientists in International Context (RASIC)," 9,422 scientists, 8 regions, 2016</span></sup> of 9,422 scientists across eight regions (US, UK, France, India, Italy, Taiwan, Turkey, Hong Kong) provides the most comprehensive data. More than half of scientists in India, Italy, Taiwan, and Turkey self-identify as religious. Even in the UK &mdash; one of the most secular countries studied &mdash; only 32% of scientists characterize the science-faith interface as one of conflict. Scientists in Taiwan, Hong Kong, and India are often more religious than their general populations.</p>
  <p>A counterintuitive finding: younger scientists (under 35) are more likely to attend religious services than older baby boomer colleagues, suggesting the trajectory may not be toward universal scientific atheism.</p>

  <h3>Evolution Acceptance: The Global Map</h3>
  <p>Evolution acceptance varies enormously by country. Western Europe exceeds 70%. The US has reached 40% accepting unguided evolution, up from 33% in 2010 &mdash; quiet but steady progress. Turkey, Indonesia, and Malaysia show majority rejection. Education is the strongest predictor across all countries. Crucially, many religious scientists accept evolution without seeing it as contradicting their faith &mdash; the "God vs. Darwin" framing is a false binary promoted by both creationists and New Atheists.</p>

  <h3>The New Atheism and Its Decline</h3>
  <p>The New Atheism movement &mdash; championed by Richard Dawkins, Christopher Hitchens, Sam Harris, and Daniel Dennett &mdash; peaked in the 2000s-2010s and has lost much of its cultural prominence by 2025, though organized atheist communities continue. Hitchens died in 2011. Harris pivoted to meditation and consciousness studies. Dawkins became increasingly controversial on cultural issues. Critics argue the movement's aggressive tone alienated potential allies and that it failed to provide what religion offers: community, ritual, meaning-making, and consolation in the face of suffering and death.</p>
  <p>What's replacing it is more interesting: a "post-secular" curiosity. Public intellectuals like Jordan Peterson, Jonathan Pageau, and Iain McGilchrist defend religion's civilizational role &mdash; not necessarily through personal belief, but through recognition that religious traditions encode wisdom about human nature and social organization that secular modernity struggles to replicate.</p>

  <div class="callout">
    <h4>Even Atheists Prefer Belief</h4>
    <p>A 2025 study published in PNAS<sup class="fn"><a>[14]</a><span class="tip">PNAS, "Even atheists in secular countries show intuitive preferences favoring religious belief," 2025</span></sup> found that even in highly secular countries, atheists intuitively associate religious belief with positive outcomes. Researchers describe this as "belief in belief" &mdash; a deep cognitive default shaped by millennia of religious influence. The implication: complete secularization may hit a biological or cognitive floor that Enlightenment rationalism didn't anticipate.</p>
  </div>`,

  // 05 — New Movements & Spirituality
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div>
    <h2><em>New</em> Movements &amp; Spirituality</h2>
  </div>
  <p>Religion isn't dying &mdash; it's being unbundled. Just as the internet unbundled newspapers (classifieds went to Craigslist, news to Twitter, opinion to blogs), the contemporary spiritual marketplace is unbundling religion. Meditation goes to Headspace. Community goes to CrossFit and yoga studios. Moral framework goes to self-help. Ritual goes to psychedelic ceremonies. Identity goes to wellness culture. What's left is theology &mdash; and many people don't want that part.</p>

  <h3>The Wellness-Religion Convergence</h3>
  <p>The Global Wellness Institute<sup class="fn"><a>[8]</a><span class="tip">Global Wellness Institute, "Global Wellness Economy Monitor," Nov 2025</span></sup> reports the wellness economy reached $6.8 trillion in 2024, growing 7.9% annually and projected to approach $10 trillion by 2029. Within it, the meditation and mindfulness segment grows at 18.9% CAGR. Mental wellness is projected to reach $298 billion by 2032. Spiritual wellness apps alone constitute a $2.16 billion market heading toward $4.84 billion by 2030.</p>
  <p>What does this mean anthropologically? Wellness has absorbed many functions historically provided exclusively by religion: community (yoga studios, retreat centers), ritual (morning meditation, breathwork sessions), meaning-making (coaching, self-help), moral framework (mindful living, intentional consumption), and group identity (wellness culture). The critical difference: no theology, no transcendent referent, and a consumer-product delivery model. Some scholars characterize wellness as religion stripped of metaphysics and delivered through a consumer model.</p>

  <h3>Digital Religion: AI in the Pulpit</h3>
  <p>Ninety-one percent of church leaders say they welcome AI in ministry, according to the 2025 State of AI in the Church survey &mdash; an 80% increase from the previous year. Forty-five percent actively use AI. But less than 25% apply it to theological content like sermons or devotionals. Most use it for administration, communication, and discipleship support.</p>
  <p>Digital scripture engagement is reshaping how people encounter sacred texts: Bible apps (59%), podcasts (33%), and TikTok (25% of young people). Notably, 10 million more Americans read Scripture outside church than a year ago, driven primarily by digital access. The digital medium simultaneously expands access to religious content while accelerating the decoupling of content from institutional context.</p>

  <h3>AI and Faith: The Tension</h3>
  <p>AI chatbots now offer spiritual guidance: Text With Jesus, Bible.ai, EpiscoBot, Hallow, and Abide provide 24/7 prayer support, Scripture readings, and personalized devotionals. Way of the Future, revived in 2023, claims to be the first AI-worshipping church. But 73% of Americans say AI should play no role in advising people about their faith. In 2024, the Catholic Church and Eastern Orthodox leaders issued joint warnings that AI should never replace divine authority. The gap between consumer adoption and institutional resistance mirrors broader AI dynamics in every sector.</p>

  <h3>Psychedelic Spirituality</h3>
  <p>The Johns Hopkins clergy study<sup class="fn"><a>[15]</a><span class="tip">Johns Hopkins, Psilocybin Clergy Study, published 2025</span></sup> &mdash; published in 2025 after a full decade of controversy &mdash; gave psilocybin to clergy from multiple traditions including rabbis, Catholic priests, Protestant ministers, and a Muslim leader. The key finding: participants described profound spiritual experiences, but their core metaphysical beliefs were "almost or entirely unchanged." No conversions occurred. Psilocybin deepened existing spiritual frameworks rather than creating new ones.</p>
  <p>However, the study was clouded by an IRB finding of "serious non-compliance" with federal human subject protections, including the involvement of funders in the trial itself. Novel psychedelic spiritual communities (NPSCs) are nonetheless emerging in North America with distinct theologies, ritual practices, and community structures. Oregon and Colorado lead in decriminalization. Harvard Divinity School hosts its fourth annual Psychedelic Intersections conference in April 2026.</p>

  <div class="callout">
    <h4>The Unbundling Thesis</h4>
    <p>Religion is being unbundled the way media and education have been unbundled. Different components &mdash; belief, ritual, community, identity, morality &mdash; are being recombined in new configurations: wellness for ritual, social media for community, psychedelics for mystical experience, AI for pastoral care. Whether this is creative transformation or slow institutional death depends on whether theology is a feature or the foundation.</p>
  </div>`,

  // 06 — Interfaith & Pluralism
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div>
    <h2><em>Interfaith</em> &amp; Pluralism</h2>
  </div>
  <p>In a world simultaneously experiencing religious nationalism and rapid secularization, the interfaith movement offers a third path: not the retreat of religion into private life (secularism), not the assertion of one religion over all others (nationalism), but the patient, difficult work of learning to live together across irreducible difference. By 2026, this work has moved from fringe idealism to institutional mainstream.</p>

  <h3>Institutional Growth</h3>
  <p>Interfaith dialogue is being institutionalized at unprecedented levels. The Inter-Parliamentary Union organized its second Parliamentary Conference on Interfaith Dialogue in Rome in 2025. The Parliament of Bosnia and Herzegovina hosted a conference of parliamentarians and religious leaders in Sarajevo (February 2024). The 6th Intercultural Dialogue Forum took place in Baku, Azerbaijan (May 2024). The Council of Europe maintains a Committee for Interreligious and Interconvictional Dialogue with a human rights framework for religious coexistence. This represents a qualitative shift: interfaith engagement has moved from NGO-level activity to state-level governance.</p>

  <h3>Two Models for Democracy</h3>
  <p>The key theoretical distinction, articulated in recent scholarship, is between secularism and pluralism as frameworks for managing religion in democratic societies. Secularism seeks to protect politics from religious domination through institutional neutrality and separation &mdash; religion is private, the state is neutral. French la&iuml;cit&eacute; is the archetype. Pluralism emphasizes the coexistence of multiple worldviews in the public sphere through mutual recognition and dialogue &mdash; religion can be public, and the state facilitates rather than forbids engagement.</p>
  <p>Most democracies blend both approaches, but the emphasis matters enormously for how they handle religious diversity, education, and public symbols. Charles Taylor's philosophical work has been profoundly influential in articulating the pluralist position.</p>

  <h3>The Dalai Lama's Model</h3>
  <p>The Dalai Lama's approach to religious pluralism has been enormously influential: Buddhism as "pluralistic religion par excellence." He harmonizes Buddhist and Christian doctrines, emphasizes universal soteriology (paths to liberation) over exclusive dogma, and advocates friendship across traditions rather than theological agreement. His formula &mdash; "one religion per person, many religions for humanity" &mdash; captures the pluralist ideal elegantly.</p>
  <p>But this model works best with Buddhism's non-exclusive theology. Traditions with stronger exclusive truth claims face harder challenges: Christianity ("I am the way, the truth, and the life") and Islam ("There is no god but God") must navigate the tension between affirming other paths and believing their own is uniquely true. Pluralistic theology attempts this navigation, but it remains controversial within both traditions.</p>

  <h3>Religious Literacy as Civic Necessity</h3>
  <p>Religious literacy &mdash; appreciative knowledge of multiple traditions &mdash; is increasingly recognized as essential civic competence, not optional academic interest. Understanding religious motivations is necessary for effective diplomacy, conflict resolution, public health policy, and community building. Interfaith America's model begins with identifying what participants admire in other traditions, building bridges through genuine appreciation rather than superficial tolerance.</p>
  <p>Educational programs focused on religious literacy help combat ignorance, stereotypes, and prejudices, fostering the kind of mutual understanding that makes pluralistic democracy possible. The challenge: schools are often reluctant or legally constrained from teaching about religion in ways that achieve this goal.</p>

  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
</body>
</html>
