</head>
<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Institutional', title: '<em>Institutional</em> Growth' },
  { num: '02', short: 'Two Models', title: 'Two <em>Philosophical</em> Models' },
  { num: '03', short: 'Dalai Lama', title: 'The <em>Dalai Lama</em> Effect' },
  { num: '04', short: 'Literacy', title: 'Religious <em>Literacy</em>' },
  { num: '05', short: 'Inverse', title: 'The Nationalism-Pluralism <em>Inverse</em>' },
  { num: '06', short: 'Models', title: '<em>Coexistence</em> Models' },
  { num: '07', short: 'Consensus', title: '<em>Consensus</em> &amp; Fractures' }
];

const summaries = [
  `<p>Interfaith dialogue is being institutionalized at unprecedented levels. The 2nd Parliamentary Conference on Interfaith Dialogue took place in Rome (2025).<sup class="fn"><a>[1]</a><span class="tip">Inter-Parliamentary Union, "The power of interfaith and intercultural dialogue," 2024-25</span></sup> Bosnia hosted a parliamentary-religious leaders conference (Feb 2024). The 6th Intercultural Dialogue Forum met in Baku (May 2024). This represents a shift from NGO-level to state-level engagement.</p>
  <div class="chips">
    <span class="chip">Rome 2025</span>
    <span class="chip">Sarajevo 2024</span>
    <span class="chip">Baku 2024</span>
    <span class="chip">Council of Europe</span>
  </div>`,

  `<p>The key theoretical distinction:<sup class="fn"><a>[2]</a><span class="tip">Ideals and Identities, "Secularism and Pluralism: Divergent Social Imaginaries," Nov 2025</span></sup> <strong>Secularism</strong> protects politics from religion via neutrality (French la&iuml;cit&eacute;). <strong>Pluralism</strong> emphasizes coexistence via dialogue (Charles Taylor). Most democracies blend both, but the emphasis shapes how they handle diversity, education, and public symbols.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Secularism</h4><p>Religion is private. State is neutral. Can marginalize religious voices. French model.</p></div>
    <div class="feat"><h4>Pluralism</h4><p>Religion can be public. State facilitates engagement. Can privilege majority religions. Taylor's influence.</p></div>
  </div>`,

  `<p>The Dalai Lama advocates Buddhism as "pluralistic religion par excellence."<sup class="fn"><a>[3]</a><span class="tip">The Dalai Lama, Views on Religious Pluralism, ongoing</span></sup> He harmonizes Buddhist-Christian doctrines, emphasizes universal soteriology over dogma. But this works best with non-exclusive theology. Traditions with stronger truth claims face harder pluralism challenges.</p>`,

  `<p>Religious literacy &mdash; appreciative knowledge of multiple traditions &mdash; is increasingly seen as essential civic competence.<sup class="fn"><a>[4]</a><span class="tip">Interfaith America, "2025 Interfaith Leadership Summit: Chords of Democracy," 2025</span></sup> Interfaith America's model: first learn what participants admire in other traditions. Understanding religious motivations is necessary for diplomacy, conflict resolution, and public health.</p>`,

  `<p>Pew's religious nationalism data reveals an inverse relationship:<sup class="fn"><a>[5]</a><span class="tip">Pew Research Center, "Religious Nationalism Around the World," Jan 2025 (cross-ref)</span></sup> countries with high religious nationalism have lower interfaith cooperation. Indonesia leads in both religious nationalism (46%) AND interfaith institutional engagement &mdash; the tension is real and lived, not academic.</p>`,

  `<p>Several working models of coexistence: Singapore (most diverse, managed through law), Bosnia (post-conflict reconstruction), India (constitutional secularism under stress), Northern Ireland (generational bridge-building). Each demonstrates that coexistence requires active work &mdash; it doesn't happen by default.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Singapore</h4><p>Most religiously diverse country. Harmony managed through law, education, cultural norms.</p></div>
    <div class="feat"><h4>Bosnia</h4><p>Post-conflict interfaith reconstruction. Parliamentary engagement. Fragile but functional.</p></div>
    <div class="feat"><h4>India</h4><p>Constitutional secularism under stress from Hindu nationalism. A model whose durability is increasingly debated.</p></div>
    <div class="feat"><h4>N. Ireland</h4><p>Post-conflict interfaith bridge-building. Community-level dialogue. Generational transformation.</p></div>
  </div>`,

  `<h4>What everyone agrees on</h4>
  <ul class="s-list pro">
    <li>Interfaith engagement has moved from fringe to institutional mainstream</li>
    <li>Religious literacy is increasingly seen as civic necessity</li>
    <li>Both secularism and pluralism have strengths and weaknesses</li>
    <li>The Dalai Lama's model is influential but faces limits with exclusivist traditions</li>
    <li>Coexistence requires active work &mdash; it doesn't happen by default</li>
  </ul>
  <h4>Where the discourse fractures</h4>
  <ul class="s-list con">
    <li>Can traditions with incompatible truth claims genuinely embrace pluralism?</li>
    <li>Is secularism the answer to religious conflict, or does it create backlash?</li>
    <li>Does interfaith dialogue change institutions, or remain an elite activity?</li>
    <li>Should the state promote religious literacy or maintain strict neutrality?</li>
  </ul>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.01 &mdash; Details</div><h2><em>Institutional</em> Growth</h2></div>
  <p>Interfaith dialogue is being institutionalized at unprecedented levels.<sup class="fn"><a>[1]</a><span class="tip">Inter-Parliamentary Union, "The power of interfaith and intercultural dialogue," 2024-25</span></sup> The Inter-Parliamentary Union organized its second Parliamentary Conference on Interfaith Dialogue in Rome in 2025. The Parliament of Bosnia and Herzegovina hosted a conference of parliamentarians and religious leaders in Sarajevo (February 2024). The 6th Intercultural Dialogue Forum took place in Baku, Azerbaijan (May 2024).</p>
  <h3>European Frameworks</h3>
  <p>The Council of Europe<sup class="fn"><a>[6]</a><span class="tip">Council of Europe, Committee for Interreligious Dialogue, 2024-25</span></sup> maintains a Committee for Interreligious and Interconvictional Dialogue with a human rights framework for religious coexistence. The focus is on preventing radicalization through dialogue rather than suppression. This represents a qualitative shift: interfaith engagement has moved from NGO-level activity to state-level governance.</p>
  <h3>The American Movement</h3>
  <p>Eboo Patel's Interfaith America<sup class="fn"><a>[4]</a><span class="tip">Interfaith America, "2025 Interfaith Leadership Summit: Chords of Democracy," 2025</span></sup> represents the most developed American model. The 2025 summit theme was "Chords of Democracy" &mdash; treating interfaith literacy as appreciative knowledge of other traditions, focusing on shared values: compassion, mercy, hospitality, and service. The approach begins with admiration rather than tolerance.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.02 &mdash; Details</div><h2>Two <em>Philosophical</em> Models</h2></div>
  <p>Recent scholarship<sup class="fn"><a>[2]</a><span class="tip">Ideals and Identities, "Secularism and Pluralism: Divergent Social Imaginaries," Nov 2025</span></sup> articulates the key theoretical distinction between secularism and pluralism as frameworks for managing religion in democratic societies.</p>
  <h3>Secularism</h3>
  <p>Secularism seeks to protect politics from religious domination through institutional neutrality and separation. Religion is private; the state is neutral. French la&iuml;cit&eacute; is the archetype: the state actively prevents religious expression in public institutions. The strength is clear boundaries; the weakness is that it can marginalize religious voices and deny the public dimension of faith.</p>
  <h3>Pluralism</h3>
  <p>Pluralism emphasizes the coexistence of multiple worldviews in the public sphere through mutual recognition and dialogue. Religion can be public; the state facilitates rather than forbids engagement. Charles Taylor's philosophical work has been profoundly influential. The strength is inclusion; the weakness is that it can privilege majority religions while appearing neutral.</p>
  <p>Most democracies blend both approaches, but the emphasis matters enormously for how they handle religious diversity, education, and public symbols.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.03 &mdash; Details</div><h2>The <em>Dalai Lama</em> Effect</h2></div>
  <p>The Dalai Lama's approach to religious pluralism<sup class="fn"><a>[3]</a><span class="tip">The Dalai Lama, Views on Religious Pluralism, ongoing</span></sup> has been enormously influential globally: Buddhism as "pluralistic religion par excellence." He harmonizes Buddhist and Christian doctrines, emphasizes universal soteriology (paths to liberation) over exclusive dogma, and advocates friendship across traditions rather than theological agreement.</p>
  <h3>The Limits of Non-Exclusive Theology</h3>
  <p>But this model works best with Buddhism's non-exclusive theology. Traditions with stronger exclusive truth claims face harder challenges: Christianity ("I am the way, the truth, and the life") and Islam ("There is no god but God") must navigate the tension between affirming other paths and believing their own is uniquely true. Pluralistic theology attempts this navigation, but it remains controversial within both traditions.</p>
  <div class="callout"><h4>The Ikeda Complement</h4><p>Daisaku Ikeda's philosophy of dialogue as transformative encounter<sup class="fn"><a>[7]</a><span class="tip">MDPI Religions, "Religious Pluralism and Interreligious Dialogue" (Ikeda study), Dec 2024</span></sup> offers a complementary Buddhist-humanist approach: dialogue as method, not just outcome. Education and personal encounter as foundations. Over 12,000 dialogues across traditions demonstrate that the practice of dialogue can itself become a form of spiritual practice.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.04 &mdash; Details</div><h2>Religious <em>Literacy</em></h2></div>
  <p>Religious literacy &mdash; appreciative knowledge of multiple traditions &mdash; is increasingly recognized as essential civic competence, not optional academic interest.<sup class="fn"><a>[8]</a><span class="tip">Moore Liberation Theology, "Promoting Interreligious Harmony in Pluralistic Societies," May 2024</span></sup> Understanding religious motivations is necessary for effective diplomacy, conflict resolution, public health policy, and community building.</p>
  <h3>The Interfaith America Model</h3>
  <p>Interfaith America's approach<sup class="fn"><a>[4]</a><span class="tip">Interfaith America, "2025 Interfaith Leadership Summit: Chords of Democracy," 2025</span></sup> begins with identifying what participants admire in other traditions, building bridges through genuine appreciation rather than superficial tolerance. Educational programs focused on religious literacy help combat ignorance, stereotypes, and prejudices.</p>
  <p>The challenge: schools are often reluctant or legally constrained from teaching about religion in ways that achieve this goal. Religious literacy requires knowledge that many educational systems are ill-equipped to provide, and the line between teaching about religion and teaching religion remains contested.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.05 &mdash; Details</div><h2>The Nationalism-Pluralism <em>Inverse</em></h2></div>
  <p>Pew's religious nationalism data<sup class="fn"><a>[5]</a><span class="tip">Pew Research Center, "Religious Nationalism Around the World," Jan 2025 (cross-ref)</span></sup> (cross-referenced with interfaith engagement indicators) reveals an inverse relationship: countries with high religious nationalism tend to have lower interfaith cooperation. The more a society defines national identity through religion, the less space it creates for genuine engagement with other traditions.</p>
  <h3>Indonesia: The Living Paradox</h3>
  <p>Indonesia presents a notable exception and confirmation simultaneously. It leads globally in religious nationalism (46%) AND in interfaith institutional engagement. The tension is real and lived, not academic. Indonesia's wasathiyah tradition creates space for interfaith work even as religious nationalism strengthens. This suggests that nationalism and pluralism can coexist within a single society &mdash; but the coexistence is contested and fragile.</p>
  <p>The United States presents a miniature of the global pattern: 32% hold Christian nationalist beliefs while interfaith organizations grow. The question is whether these represent different populations or genuine internal tension within communities.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.06 &mdash; Details</div><h2><em>Coexistence</em> Models</h2></div>
  <p>Several societies offer working models of interreligious coexistence, each with distinct mechanisms, strengths, and vulnerabilities.</p>
  <h3>Singapore: Managed Pluralism</h3>
  <p>The world's most religiously diverse country maintains remarkable interreligious harmony through a combination of law (the Maintenance of Religious Harmony Act), education, and cultural norms. This is pragmatic, state-managed pluralism. The strength is stability; the limitation is that harmony is partly enforced rather than organic.</p>
  <h3>Bosnia: Post-Conflict Reconstruction</h3>
  <p>After devastating ethno-religious conflict in the 1990s, Bosnia has pursued interfaith reconstruction through parliamentary engagement and community-level dialogue. The model is fragile but functional, demonstrating that even societies torn apart by religious violence can rebuild across divides.</p>
  <h3>India: A Cautionary Tale</h3>
  <p>India's constitutional secularism was widely regarded as a model for managing enormous religious diversity. Under BJP governance since 2014, critics argue that model has come under significant stress. India illustrates a broader question about whether constitutional frameworks for pluralism can withstand majoritarian religious nationalism that gains power through democratic means.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S6.07 &mdash; Details</div><h2><em>Consensus</em> &amp; Fractures</h2></div>
  <p>After surveying the evidence across 8 major sources, the interfaith and pluralism landscape reveals both remarkable institutional progress and deep philosophical challenges.</p>
  <h3>Points of Agreement</h3>
  <p>Interfaith engagement has moved from fringe idealism to institutional mainstream. Religious literacy is increasingly recognized as civic necessity. Both secularism and pluralism have strengths and weaknesses as frameworks for managing religious diversity. The Dalai Lama's pluralism model is influential but faces inherent limits with exclusivist traditions. And coexistence requires active, sustained work &mdash; it never happens by default.</p>
  <h3>The Deepest Challenge</h3>
  <p>Can traditions with incompatible truth claims genuinely embrace pluralism, or does real pluralism require diluting core beliefs? This is the philosophical heart of interfaith work. If Christianity claims Jesus is the only way, and Islam claims Muhammad is the final prophet, can either tradition genuinely affirm the other's path without abandoning its own core commitment?</p>
  <div class="verdict">
    <div class="v-col pro"><h4>Signs of Progress</h4><ul><li>State-level interfaith engagement growing</li><li>Religious literacy movement expanding</li><li>Working coexistence models exist (Singapore, Bosnia)</li><li>Ikeda's 12,000+ dialogues demonstrate practice</li></ul></div>
    <div class="v-col con"><h4>Persistent Challenges</h4><ul><li>Religious nationalism growing simultaneously</li><li>Exclusive truth claims resist genuine pluralism</li><li>Interfaith dialogue often limited to elites</li><li>India shows how quickly pluralism can erode</li></ul></div>
  </div>`
];

// === DOM BUILDING ===
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>6</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head"><div class="main-head-inner">
      <div class="hero-badge"><span class="dot"></span> Religion Today &middot; Section 6</div>
      <div class="hero-title">Interfaith &amp; <em>Pluralism</em></div>
      <div class="masthead-rule"></div>
      <div class="masthead-sub"><span>8 Sources &middot; IPU, Interfaith America, Dalai Lama, Council of Europe</span></div>
    </div></div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>`;
document.body.appendChild(shell);
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;
  mainInner.appendChild(block);
});
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const d = document.createElement('div'); d.className = 'detail'; d.id = `detail-${idx}`; d.innerHTML = details[idx]; rightInner.appendChild(d);
});
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return;
  const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
