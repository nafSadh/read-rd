<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Snapshot', title: 'The <em>Demographic</em> Snapshot' },
  { num: '02', short: 'Geography', title: 'The <em>Great</em> Geographic Shift' },

  { num: '04', short: 'Secular', title: 'The <em>Secularization</em> Paradox' },

  { num: '06', short: 'Buddhism', title: "<em>Buddhism's</em> Unique Decline" },
  { num: '07', short: 'Diversity', title: 'The <em>Religious</em> Diversity Puzzle' },
  { num: '08', short: 'Consensus', title: '<em>Consensus</em> &amp; Fractures' }
];

const summaries = [
  `<p>As of 2020, Christians number 2.3 billion (28.8% of world population, down 1.8 percentage points from 2010). Muslims: 2.0 billion (25.6%, up 1.8pp). The unaffiliated grew from 1.6 billion to 1.9 billion. Islam grew by 347 million &mdash; more than all other religions combined.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup> Buddhism is the only major religion that lost members.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">2.3B</div><div class="sl">Christians</div></div>
    <div class="st"><div class="sv">2.0B</div><div class="sl">Muslims</div></div>
    <div class="st"><div class="sv">1.9B</div><div class="sl">Unaffiliated</div></div>
    <div class="st"><div class="sv">1.2B</div><div class="sl">Hindus</div></div>
    <div class="st"><div class="sv">324M</div><div class="sl">Buddhists</div></div>
  </div>`,

  `<p>Sub-Saharan Africa now hosts 30.7% of the world's Christians, surpassing Europe (22%) for the first time in modern history.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup> Christianity shrank as a share of the population in 41 countries &mdash; nearly all in the Americas and Europe. The US saw a 14-point drop; Australia lost 20 points.</p>
  <div class="diagram-wrap">
    <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
      <text class="lbl-hi" x="10" y="20" font-size="10" text-anchor="start">CHRISTIANS BY REGION (2020)</text>
      <rect class="node-hi" x="10" y="35" width="153" height="32" rx="2"/><text class="node-text" x="86" y="55" text-anchor="middle" font-size="11">Sub-Saharan Africa</text><text class="lbl-hi" x="173" y="55" font-size="11">30.7%</text>
      <rect class="node" x="10" y="75" width="120" height="32" rx="2"/><text class="node-text" x="70" y="95" text-anchor="middle" font-size="11">Latin America</text><text class="lbl" x="140" y="95" font-size="11">24.3%</text>
      <rect class="node" x="10" y="115" width="110" height="32" rx="2"/><text class="node-text" x="65" y="135" text-anchor="middle" font-size="11">Europe</text><text class="lbl" x="130" y="135" font-size="11">22.0%</text>
      <rect class="node" x="10" y="155" width="80" height="32" rx="2"/><text class="node-text" x="50" y="175" text-anchor="middle" font-size="11">Asia-Pacific</text><text class="lbl" x="100" y="175" font-size="11">14.6%</text>
    </svg>
  </div>`,

  `<p>Muslim growth is driven primarily by fertility rates and young population age structures in Sub-Saharan Africa and South/Southeast Asia.<sup class="fn"><a>[2]</a><span class="tip">NPR, "Islam is the fastest growing religion in the world, Pew study says," Jun 2025</span></sup> Religious switching (conversion) is a relatively minor factor. If current trajectories hold, Islam and Christianity reach population parity around 2070, each at roughly 32% of the world's population.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">+347M</div><div class="sl">Muslim growth (decade)</div></div>
    <div class="st"><div class="sv">~2070</div><div class="sl">Islam-Christianity parity</div></div>
    <div class="st"><div class="sv">32%</div><div class="sl">Each at parity</div></div>
  </div>`,

  `<p>Inglehart's existential security thesis: wealthier, stable societies secularize.<sup class="fn"><a>[3]</a><span class="tip">Inglehart, Ronald F., <em>Religion's Sudden Decline</em>, Oxford University Press, 2021</span></sup> Gallup confirms quantitatively &mdash; 14% atheist in high-income vs 3% low-income countries.<sup class="fn"><a>[4]</a><span class="tip">Gallup International, "Two Decades of Change: Global Religiosity Declines While Atheism Rises," 2024</span></sup> Religious: 68% (2005) to 56% (2024) globally. But Peter Berger reversed his own theory: the Global South is "massively religious."<sup class="fn"><a>[5]</a><span class="tip">Peter Berger, "The Desecularization of the World," 1999</span></sup></p>
  <div class="feat-grid">
    <div class="feat"><h4>Inglehart's thesis</h4><p>Security &rarr; individual-choice norms &rarr; fertility decline &rarr; religious decline. Holds in wealthy nations.</p></div>
    <div class="feat"><h4>Berger's reversal</h4><p>Former secularization champion reversed himself: world is "massively religious" with two exceptions.</p></div>
    <div class="feat"><h4>Nature Comms (2025)</h4><p>Religion declines in a predictable sequence, but the sequence hasn't started in most of the world.</p></div>
    <div class="feat"><h4>Gallup data</h4><p>43,250 people, 42 countries. High-income: 14% atheist. Low-income: 3%. Dramatic income-based split.</p></div>
  </div>`,

  `<p>Within Christianity, the center of gravity has shifted dramatically. 1.4 billion Christians now live in the Global South (majority for first time). 600M+ Pentecostals/charismatics worldwide. Bible translation in 3,400+ languages.<sup class="fn"><a>[6]</a><span class="tip">Lifeway Research, "9 Encouraging Trends for Global Christianity in 2025," Feb 2025</span></sup> The Christianity growing (charismatic, Southern) looks very different from the Christianity declining (mainline, European).</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1.4B</div><div class="sl">Global South Christians</div></div>
    <div class="st"><div class="sv">600M+</div><div class="sl">Pentecostals</div></div>
    <div class="st"><div class="sv">3,400+</div><div class="sl">Translation languages</div></div>
  </div>`,

  `<p>Buddhism is the only major world religion that literally lost members between 2010 and 2020, dropping by 19 million to 324 million.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup> Driven by demographic contraction in East Asia (Japan, South Korea, China). Paradoxically, Buddhist practices &mdash; mindfulness, meditation &mdash; have never been more popular. They've been decoupled from Buddhist identity and absorbed into the wellness economy.</p>`,

  `<p>Pew's Religious Diversity Index reveals that the most religiously diverse countries (Singapore, Taiwan, Vietnam) tend to have lower religious conflict than moderately diverse ones.<sup class="fn"><a>[7]</a><span class="tip">Pew Research Center, "Religious Diversity Around the World as of 2020," Feb 2026</span></sup> The least diverse region &mdash; MENA &mdash; has the highest religious tension. 99% of Hindus and 99% of Buddhists live in Asia-Pacific.</p>
  <div class="chips">
    <span class="chip">Singapore: most diverse</span>
    <span class="chip">MENA: least diverse</span>
    <span class="chip">99% Hindus in Asia-Pacific</span>
    <span class="chip">99% Buddhists in Asia-Pacific</span>
  </div>`,

  `<h4>What everyone agrees on</h4>
  <ul class="s-list pro">
    <li>Islam is the fastest-growing major religion &mdash; demographically driven</li>
    <li>Christianity is rebalancing from North to South</li>
    <li>Wealthy nations secularize; existential security is the mechanism</li>
    <li>The "nones" are growing globally but aren't mostly atheist</li>
    <li>Global religion is NOT disappearing &mdash; it's redistributing</li>
  </ul>
  <h4>Where the discourse fractures</h4>
  <ul class="s-list con">
    <li>Is secularization universal or culturally specific?</li>
    <li>Will Islam's growth continue as Muslim-majority countries develop?</li>
    <li>Does Pentecostal growth represent genuine revival or cultural adaptation?</li>
    <li>Are the "nones" a stable category or a transitional generation?</li>
  </ul>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.01 &mdash; Details</div><h2>The <em>Demographic</em> Snapshot</h2></div>
  <p>Pew Research Center's landmark 2025 study, drawing on more than 2,700 data sources including national censuses, large-scale demographic surveys, general population surveys, and population registers, provides the most comprehensive picture ever assembled of global religious demographics between 2010 and 2020.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup></p>
  <p>Christians remain the world's largest religious group at 2.3 billion, but their share fell from 30.6% to 28.8% &mdash; a decline of 1.8 percentage points in a single decade. Muslims, meanwhile, grew by 347 million people (more than all other religions combined), rising from 23.8% to 25.6% of the global population. The unaffiliated &mdash; those claiming no religious identity &mdash; grew from 1.6 billion to 1.9 billion.</p>
  <p>Hindus number 1.2 billion (15.2%), concentrated almost entirely in South Asia. Folk and traditional religions account for 429 million. Jews number 15.7 million. And Buddhists, uniquely among major world religions, actually lost members: dropping 19 million to reach 324 million in 2020.</p>
  <h3>The Scale of Change</h3>
  <p>These are not subtle shifts. In absolute terms, the Muslim population grew by a number roughly equal to the entire population of the United States in a single decade. Christianity added the equivalent of Japan's population but still fell as a share of humanity. The unaffiliated added nearly the population of Germany and France combined. The demographic plate tectonics of religion are operating at a scale and speed that the slow-moving institutions of organized religion are only beginning to comprehend.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.02 &mdash; Details</div><h2>The <em>Great</em> Geographic Shift</h2></div>
  <p>For the first time in modern history, Sub-Saharan Africa is home to more Christians than any other region: 30.7% of the world's Christians lived there in 2020, up from 24.8% in 2010. Europe, once the unquestioned heartland of Christendom, now hosts just 22%. Latin America holds 24.3%. The old European Christianity &mdash; cathedrals, state churches, cultural Christendom &mdash; is fading into historical memory.</p>
  <p>Christianity shrank as a share of the population in 41 countries, and in all but one case, the direction was downward. The declines ranged from a 5-point drop in Benin to a staggering 14 points in the United States and 20 points in Australia. The driver is consistent across these countries: large numbers of Christians "switching" out of religion to become religiously unaffiliated.</p>
  <h3>What's Growing Where</h3>
  <p>While Christianity retreats in the West, it advances in Africa, parts of Asia, and even in unlikely places. Lifeway Research reports church planting movements in Iran (despite state opposition), China (despite governmental restrictions), and Nepal.<sup class="fn"><a>[6]</a><span class="tip">Lifeway Research, "9 Encouraging Trends for Global Christianity in 2025," Feb 2025</span></sup> The fastest-growing form of Christianity worldwide is Pentecostalism and charismatic worship &mdash; experiential, emotional, and community-oriented, quite different from the intellectual, tradition-bound Christianity of Western decline.</p>
  <div class="callout"><h4>The Implication</h4><p>Global Christianity's center of gravity has crossed the equator. The theological priorities, worship styles, and social concerns of African and Asian Christians &mdash; who now constitute the majority &mdash; will increasingly shape what "Christianity" means worldwide. This is a rebalancing with implications for everything from Vatican politics to evangelical missionary strategy.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.03 &mdash; Details</div><h2><em>Islam's</em> Growth Engine</h2></div>
  <p>Islam's growth is the most significant demographic trend in global religion. The 347 million Muslims added between 2010 and 2020 represent more growth than all other religions combined.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup> The Muslim share of global population rose from 23.8% to 25.6% &mdash; a 1.8 percentage point increase that mirrors Christianity's 1.8 point decline.</p>
  <h3>The Demographic Driver</h3>
  <p>Unlike Christianity's historical spread through colonialism and missionary activity, Islam's current growth is overwhelmingly demographic: higher fertility rates and younger population age structures, particularly in Sub-Saharan Africa and South/Southeast Asia. Religious switching (conversion) plays a relatively minor role. This is birth rates, not evangelism.</p>
  <p>The demographic projections are striking: if current trends continue, Islam and Christianity reach population parity around 2070, each accounting for roughly 32% of humanity. By 2050, Pew projects that the Muslim population will have grown by 73%, compared to 35% growth for Christians. Much of this growth will occur in sub-Saharan Africa, where fertility rates remain far above replacement level.</p>
  <h3>The Open Question</h3>
  <p>The critical question is whether Muslim-majority countries will follow the same secularization sequence as Christian-majority ones as they develop economically. Inglehart's theory predicts they will: as existential security increases, individual-choice norms emerge, and religious adherence weakens. But some scholars argue that Islam's social structure &mdash; its integration of law, community, and identity &mdash; may prove more resistant to secularization than Christianity's more individualized faith model.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.04 &mdash; Details</div><h2>The <em>Secularization</em> Paradox</h2></div>
  <p>The secularization thesis &mdash; the idea that as societies modernize, religion inevitably loses influence &mdash; is one of the most consequential theories in the social sciences. And it is both confirmed and contradicted by contemporary evidence, depending entirely on where you look.</p>
  <h3>Inglehart's Existential Security Theory</h3>
  <p>Ronald Inglehart formalized the mechanism:<sup class="fn"><a>[3]</a><span class="tip">Inglehart, Ronald F., <em>Religion's Sudden Decline</em>, Oxford University Press, 2021</span></sup> as societies achieve economic prosperity and political stability, individuals gain "existential security." This security produces individual-choice norms that undermine the pro-fertility and communal authority structures that sustain traditional religion. The sequence is: security &rarr; individual autonomy &rarr; fertility decline &rarr; religious decline. Gallup International's 2024 survey (43,250 people, 42 countries) confirms the pattern: 14% atheist in high-income countries versus 3% in low-income.<sup class="fn"><a>[4]</a><span class="tip">Gallup International, "Two Decades of Change: Global Religiosity Declines While Atheism Rises," 2024</span></sup> Religious self-identification globally: 68% (2005) &rarr; 56% (2024).</p>
  <h3>Berger's Reversal</h3>
  <p>Peter Berger was once the leading proponent of secularization theory. In 1999, he reversed himself entirely, publishing "The Desecularization of the World."<sup class="fn"><a>[5]</a><span class="tip">Peter Berger, "The Desecularization of the World," 1999</span></sup> His assessment: the world is "massively religious, in some areas more religious than ever." The only exceptions: Western and Central Europe, and an international intellectual class. Pentecostalism in Latin America and Africa, the Islamic revival since the 1970s, Hindu nationalism in India &mdash; all contradicted the thesis that modernity necessarily secularizes.</p>
  <h3>The 2025 Synthesis</h3>
  <p>A study published in Nature Communications<sup class="fn"><a>[8]</a><span class="tip">Nature Communications (U. Lausanne, Oxford, Pew), "Religion Declines in a Predictable Sequence," Aug 2025</span></sup> by researchers at the University of Lausanne, Oxford, and Pew offers what may be the best resolution: religion declines in a predictable sequence, and the sequence holds across all major traditions. But the sequence requires existential security thresholds that most of humanity hasn't reached yet. Secularization is real but conditional &mdash; not inevitable, not universal, but predictable under specific conditions.</p>
  <div class="callout"><h4>The Molteni Refinement</h4><p>Francesco Molteni's 2025 paper in Sociology of Religion<sup class="fn"><a>[9]</a><span class="tip">Molteni, "Rising Security and Religious Decline," <em>Sociology of Religion</em>, 2025</span></sup> adds an important nuance: cultural memory of religion persists even as practice declines. Societies can secularize in behavior while retaining deep religious imprints on language, values, architecture, calendar, and social norms. You can leave religion without religion leaving you.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.05 &mdash; Details</div><h2><em>Christianity's</em> Internal Rebalancing</h2></div>
  <p>The story of Christianity in the 21st century is not simply one of decline. It is a story of radical internal rebalancing &mdash; geographic, theological, and experiential. For the first time in history, the majority of the world's Christians live in the Global South: 1.4 billion people in Africa, Asia, and Latin America.</p>
  <h3>The Pentecostal Revolution</h3>
  <p>Pentecostalism and charismatic Christianity claim over 600 million adherents worldwide, making them collectively the fastest-growing segment of global Christianity. The Pentecostal emphasis on direct spiritual experience, miraculous healing, community solidarity, and emotional worship resonates powerfully in contexts of poverty, social dislocation, and rapid urbanization. It is precisely the aspects of religion that secularization theory said would fade &mdash; the experiential, the miraculous, the communal &mdash; that are fueling growth.</p>
  <h3>Unexpected Growth Centers</h3>
  <p>Lifeway Research identifies church planting movements in countries where Christianity faces active opposition: Iran, China, and Nepal.<sup class="fn"><a>[6]</a><span class="tip">Lifeway Research, "9 Encouraging Trends for Global Christianity in 2025," Feb 2025</span></sup> Bible translation projects now cover 3,400+ languages. The missionary flow has reversed: African and Korean churches now send missionaries to Europe. The Christianity of the Global South is not derivative of Western Christianity &mdash; it develops its own theologies, worship forms, and social engagements.</p>
  <h3>Two Christianities</h3>
  <p>What's emerging is effectively two Christianities: one declining in the wealthy West (mainline Protestant, Catholic in Europe, institutional, intellectualized), and one growing explosively in the Global South (Pentecostal, charismatic, experiential, communal). They share core texts and creeds but differ profoundly in emphasis, practice, and social engagement. The implications for global Christianity's self-understanding are enormous.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.06 &mdash; Details</div><h2><em>Buddhism's</em> Unique Decline</h2></div>
  <p>Buddhism occupies a unique position in the global religious landscape: it is the only major world religion that literally lost adherents between 2010 and 2020. The worldwide Buddhist population dropped by 19 million, falling to 324 million.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "How the Global Religious Landscape Changed from 2010 to 2020," Jun 2025</span></sup> This decline is driven almost entirely by demographic contraction in East Asian societies with very low fertility rates: Japan, South Korea, and China.</p>
  <h3>The Paradox of Buddhist Practices</h3>
  <p>While institutional Buddhism declines, Buddhist practices &mdash; mindfulness meditation, contemplative practice, loving-kindness meditation &mdash; have never been more popular globally. Mindfulness is a $7.34 billion market growing at 18.5% annually. Apps like Headspace and Calm reach tens of millions. Corporate mindfulness programs are standard at Fortune 500 companies.</p>
  <p>But these practices have been decoupled from Buddhist institutional identity and absorbed into the secular wellness economy. You can meditate without being Buddhist, practice mindfulness without understanding the Four Noble Truths, attend a retreat without taking refuge. Buddhism has been unbundled more thoroughly than any other tradition &mdash; its technology of mind has been extracted while its metaphysics, ethics, and community structures are left behind.</p>
  <div class="callout"><h4>The Unbundling Precedent</h4><p>Buddhism's fate may preview what happens to other religions under conditions of extreme secularization: the useful practices are extracted and commodified, while the metaphysical framework is discarded. This raises a question that applies to all traditions: is religion reducible to its practical benefits, or does the framework that gives practices their meaning constitute something irreplaceable?</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.07 &mdash; Details</div><h2>The <em>Religious</em> Diversity Puzzle</h2></div>
  <p>Pew's Religious Diversity Index<sup class="fn"><a>[7]</a><span class="tip">Pew Research Center, "Religious Diversity Around the World as of 2020," Feb 2026</span></sup> measures how religiously varied each country's population is. The findings reveal a counterintuitive pattern: the most religiously diverse countries tend to experience less religious conflict, not more. Singapore, the world's most religiously diverse country, maintains remarkable interreligious harmony through a combination of law (the Maintenance of Religious Harmony Act), education, and cultural norms.</p>
  <h3>Geographic Concentration</h3>
  <p>Despite globalization, religion remains remarkably concentrated geographically. Ninety-nine percent of Hindus live in the Asia-Pacific region. Ninety-nine percent of Buddhists. Ninety percent of folk religion adherents. Judaism is concentrated in Israel and the United States. Only Christianity and Islam are truly global religions in their geographic distribution.</p>
  <p>The Middle East-North Africa region is the least religiously diverse, and also the region with the highest levels of religious tension and conflict. This correlation &mdash; low diversity correlating with high tension &mdash; may reflect the absence of the social mechanisms that diverse societies develop to manage religious difference. When you never encounter the other, you never learn to live with them.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S1.08 &mdash; Details</div><h2><em>Consensus</em> &amp; Fractures</h2></div>
  <p>After surveying the evidence across 10 major sources, several points of consensus emerge alongside persistent disagreements.</p>
  <h3>Points of Agreement</h3>
  <p>Islam is the fastest-growing major religion, and the growth is demographically driven. Christianity is rebalancing from North to South, with the Global South now hosting the majority. Wealthy nations secularize through the existential security mechanism. The religiously unaffiliated are growing but aren't predominantly atheist. Global religion is not disappearing &mdash; it's redistributing geographically and transforming structurally.</p>
  <h3>Points of Disagreement</h3>
  <p>The most important fracture: is secularization universal (just delayed in the Global South) or culturally specific (particular to post-Christian Western societies)? Inglehart's framework implies universality &mdash; once security thresholds are reached, all societies will secularize. Berger's position implies specificity &mdash; some religious traditions may be more resistant than others.</p>
  <p>A second fracture: does Pentecostal growth in the Global South represent genuine religious revival or cultural adaptation to modernity? If Pentecostalism is simply the form Christianity takes during rapid urbanization, it may eventually face the same secularization pressures as mainline Protestantism did in the West. If it represents something genuinely new in religious history &mdash; a form uniquely adapted to modern life &mdash; then secularization theory needs more fundamental revision.</p>
  <div class="verdict">
    <div class="v-col pro"><h4>Secularization Holds</h4><ul><li>Wealthy nations secularize consistently</li><li>Sequence is predictable and cross-traditional</li><li>Gallup data confirms income-religion correlation</li><li>The mechanism (security) is well-understood</li></ul></div>
    <div class="v-col con"><h4>Secularization Fails</h4><ul><li>Global South more religious than ever</li><li>600M+ Pentecostals contradicts decline narrative</li><li>Berger reversed his own theory</li><li>Islam's growth outpaces secularization</li></ul></div>
  </div>`
];
