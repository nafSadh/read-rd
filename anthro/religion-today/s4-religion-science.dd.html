<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Warfare', title: 'The <em>Warfare</em> Thesis' },
  { num: '02', short: 'Scientists', title: 'What <em>Scientists</em> Believe' },
  { num: '03', short: 'Evolution', title: '<em>Evolution</em> Acceptance' },
  { num: '04', short: 'New Atheism', title: 'New <em>Atheism</em> &amp; Its Decline' },
  { num: '05', short: 'Belief', title: 'Even <em>Atheists</em> Prefer Belief' },
  { num: '06', short: 'Dialogue', title: 'The <em>Productive</em> Turn' },
  { num: '07', short: 'Consensus', title: '<em>Consensus</em> &amp; Fractures' }
];

const summaries = [
  `<p>John William Draper (1874) and Andrew Dickson White (1896) created the "conflict thesis." Historians of science have rejected it for decades.<sup class="fn"><a>[1]</a><span class="tip">History for Atheists, "The Conflict Between Science and Religion," Aug 2025</span></sup> The current consensus is the "complexity thesis": science and religion have had cooperative, conflictual, and independent relationships depending on era and context. Individualized religious expressions are largely compatible with scientific worldviews.<sup class="fn"><a>[2]</a><span class="tip">Sociology of Religion, "Sociological Study of Science and Religion," 2025</span></sup></p>`,

  `<p>Ecklund's RASIC study surveyed 9,422 scientists across 8 regions.<sup class="fn"><a>[3]</a><span class="tip">Ecklund, "Religion among Scientists in International Context (RASIC)," 2016</span></sup> More than 50% of scientists in India, Italy, Taiwan, and Turkey self-identify as religious. Even in the UK, only 32% see a science-religion conflict. Younger scientists (&lt;35) are more likely to attend religious services than older colleagues.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">&gt;50%</div><div class="sl">Religious in 4 countries</div></div>
    <div class="st"><div class="sv">32%</div><div class="sl">UK see conflict</div></div>
    <div class="st"><div class="sv">9,422</div><div class="sl">Scientists surveyed</div></div>
  </div>`,

  `<p>Global variation is enormous. Western Europe: &gt;70% accept evolution. US: 40% accept unguided evolution (up from 33% in 2010).<sup class="fn"><a>[4]</a><span class="tip">Gallup International, "Evolution and Creation Beliefs," 2024</span></sup> Turkey, Indonesia, Malaysia: majority reject evolution. Education is the strongest predictor across all countries. Many religious scientists accept evolution without seeing it as contradicting their faith.</p>
  <div class="price-grid">
    <div class="price-card"><h4>W. Europe</h4><div class="price">&gt;70%</div><div class="pn">accept evolution</div></div>
    <div class="price-card hl"><h4>US</h4><div class="price">40%</div><div class="pn">up from 33%</div></div>
    <div class="price-card"><h4>Turkey</h4><div class="price">&lt;40%</div><div class="pn">reject evolution</div></div>
    <div class="price-card"><h4>Predictor</h4><div class="price">Edu.</div><div class="pn">strongest factor</div></div>
  </div>`,

  `<p>The New Atheism movement (Dawkins, Hitchens, Harris, Dennett) peaked in the 2000s-2010s. By 2025, it has largely exhausted itself. Hitchens died (2011), Harris pivoted to meditation. What's replacing it: a "post-secular" curiosity &mdash; public intellectuals defending religion's civilizational role without necessarily personal belief.</p>
  <div class="chips">
    <span class="chip">Dawkins: controversial on culture</span>
    <span class="chip">Harris: meditation pivot</span>
    <span class="chip">Peterson: post-secular defender</span>
    <span class="chip">McGilchrist: wisdom tradition</span>
  </div>`,

  `<p>The PNAS study (2025) is remarkable: even in highly secular countries, atheists intuitively associate religious belief with positive outcomes.<sup class="fn"><a>[5]</a><span class="tip">PNAS, "Even atheists in secular countries show intuitive preferences favoring religious belief," 2025</span></sup> Researchers describe this as "belief in belief" &mdash; a deep cognitive default. Related research suggests humans may have evolved cognitive biases favoring religious belief.<sup class="fn"><a>[6]</a><span class="tip">phys.org, "Did humans evolve to prefer religion?" May 2025</span></sup></p>`,

  `<p>The more interesting frontier isn't conflict or compatibility &mdash; it's active dialogue. Templeton Foundation funding, Vatican Observatory collaborations, Islamic science-faith initiatives. Cabello's pre-print finds scientific literacy reduces dogmatism but not necessarily belief.<sup class="fn"><a>[7]</a><span class="tip">Cabello, "Science and Religious Dogmatism," pre-print, Dec 2024</span></sup> Educated believers hold beliefs more flexibly. Education transforms religion rather than destroying it.</p>`,

  `<h4>What everyone agrees on</h4>
  <ul class="s-list pro">
    <li>The warfare thesis is historically wrong &mdash; complexity thesis is consensus</li>
    <li>Most scientists globally don't see science-religion conflict</li>
    <li>Evolution acceptance varies enormously; education is key predictor</li>
    <li>New Atheism has declined as a movement</li>
    <li>The relationship is context-dependent, not universal</li>
  </ul>
  <h4>Where the discourse fractures</h4>
  <ul class="s-list con">
    <li>Is the "conflict" purely cultural, or does religion impede specific sciences?</li>
    <li>Are religious scientists doing good science despite or because of faith?</li>
    <li>Will the post-secular turn be lasting or temporary?</li>
    <li>Does "belief in belief" support religion or undermine it?</li>
  </ul>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.01 &mdash; Details</div><h2>The <em>Warfare</em> Thesis</h2></div>
  <p>John William Draper (1874) and Andrew Dickson White (1896) created the "conflict thesis" &mdash; the idea that religion is the perpetual enemy of science. This narrative was adopted by popular culture, reinforced by selective cases (Galileo, the Scopes trial), and became the default assumption of educated Westerners.</p>
  <p>Actual historians of science have rejected it for decades.<sup class="fn"><a>[1]</a><span class="tip">History for Atheists, "The Conflict Between Science and Religion," Aug 2025</span></sup> The current consensus is the "complexity thesis": science and religion have had cooperative, conflictual, and independent relationships depending on era, institution, and specific question. The medieval Church funded universities. Islamic scholars preserved and extended Greek mathematics and astronomy. Newton saw his physics as revealing God's design. The relationship is plural, not singular.</p>
  <p>A 2025 paper in Sociology of Religion<sup class="fn"><a>[2]</a><span class="tip">Sociology of Religion, "Sociological Study of Science and Religion," 2025</span></sup> demonstrates that individualized religious expressions are largely compatible with scientific worldviews. The perceived conflict is maintained more by popular culture than by evidence.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.02 &mdash; Details</div><h2>What <em>Scientists</em> Believe</h2></div>
  <p>Ecklund's RASIC study<sup class="fn"><a>[3]</a><span class="tip">Ecklund, "Religion among Scientists in International Context (RASIC)," 9,422 scientists, 8 regions, 2016</span></sup> (9,422 scientists across the US, UK, France, India, Italy, Taiwan, Turkey, and Hong Kong) provides the most comprehensive data on what scientists actually believe about religion. The results demolish the assumption that scientists are uniformly atheist.</p>
  <h3>The Global Picture</h3>
  <p>More than 50% of scientists in India, Italy, Taiwan, and Turkey self-identify as religious. Even in the UK &mdash; one of the most secular countries studied &mdash; only 32% of scientists characterize the science-faith interface as one of conflict. Scientists in Taiwan, Hong Kong, and India are often more religious than their general populations.</p>
  <h3>The Generational Surprise</h3>
  <p>A remarkable finding: younger scientists (under 35) are more likely to attend religious services than older baby boomer colleagues. This contradicts the assumption that scientific training inevitably leads to secularization. The trajectory may not be toward universal scientific atheism but toward a more complex, individualized relationship between scientific practice and personal belief.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.03 &mdash; Details</div><h2><em>Evolution</em> Acceptance</h2></div>
  <p>Evolution acceptance varies enormously by country and represents perhaps the clearest test case for science-religion interaction.<sup class="fn"><a>[4]</a><span class="tip">Gallup International, "Evolution and Creation Beliefs," 2024</span></sup> Western Europe exceeds 70% acceptance. The United States has reached 40% accepting unguided evolution, up from 33% in 2010 &mdash; quiet but steady progress over a decade.</p>
  <h3>The False Binary</h3>
  <p>Turkey, Indonesia, and Malaysia show majority rejection of evolution. Education is the strongest predictor across all countries, regardless of religious tradition. Crucially, many religious scientists accept evolution without seeing it as contradicting their faith. The "God vs. Darwin" framing is a false binary that both New Atheists and creationists promote for their own rhetorical purposes.</p>
  <p>The US trajectory is particularly interesting: acceptance of evolution has grown steadily even as religiosity has remained relatively high. This suggests that evolution acceptance and religious identity are not zero-sum &mdash; both can coexist within individuals and societies.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.04 &mdash; Details</div><h2>New <em>Atheism</em> &amp; Its Decline</h2></div>
  <p>The New Atheism movement &mdash; championed by Richard Dawkins, Christopher Hitchens, Sam Harris, and Daniel Dennett (the "Four Horsemen") &mdash; peaked in the 2000s-2010s and has largely exhausted itself by 2025. Hitchens died in 2011. Harris pivoted to meditation and consciousness studies. Dawkins became increasingly controversial on cultural issues unrelated to religion. Dennett passed away in 2024.</p>
  <h3>Why It Failed</h3>
  <p>The movement's aggressive tone alienated potential allies and, more importantly, failed to provide what religion offers: community, ritual, meaning-making, and consolation in the face of suffering and death. You can disprove a proposition; you cannot disprove a need. New Atheism was intellectually effective but existentially inadequate.</p>
  <h3>The Post-Secular Turn</h3>
  <p>What's replacing New Atheism is more interesting: a "post-secular" curiosity. Public intellectuals like Jordan Peterson, Jonathan Pageau, and Iain McGilchrist defend religion's civilizational role &mdash; not necessarily through personal belief, but through recognition that religious traditions encode deep wisdom about human nature and social organization that secular modernity struggles to replicate.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.05 &mdash; Details</div><h2>Even <em>Atheists</em> Prefer Belief</h2></div>
  <p>The PNAS study (2025)<sup class="fn"><a>[5]</a><span class="tip">PNAS, "Even atheists in secular countries show intuitive preferences favoring religious belief," 2025</span></sup> is perhaps the most provocative finding in contemporary science-religion research: even in highly secular countries, atheists intuitively associate religious belief with positive outcomes. Researchers describe this as "belief in belief" &mdash; a deep cognitive default shaped by millennia of religious influence on human societies.</p>
  <h3>The Evolutionary Dimension</h3>
  <p>Related research reported by phys.org (2025)<sup class="fn"><a>[6]</a><span class="tip">phys.org, "Did humans evolve to prefer religion?" May 2025</span></sup> suggests that humans may have evolved cognitive biases that favor religious belief. Even secular individuals show implicit preferences for belief over non-belief. This is evolutionary psychology of religion, and it challenges the Enlightenment assumption that rationality naturally replaces superstition.</p>
  <div class="callout"><h4>The Implication</h4><p>If "belief in belief" is a deep cognitive default, complete secularization may hit a biological or cognitive floor that Enlightenment rationalism didn't anticipate. Humans may be wired to prefer believing communities, even if they cannot believe themselves. The question is whether this preference is a bug to be overcome or a feature to be understood.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.06 &mdash; Details</div><h2>The <em>Productive</em> Turn</h2></div>
  <p>The more interesting frontier in science-religion interaction isn't conflict or compatibility &mdash; it's active dialogue. Templeton Foundation funding supports research at the intersection. Vatican Observatory collaborations bring astronomers and theologians together. Islamic science-faith initiatives explore how Qur'anic scholarship intersects with contemporary physics and cosmology.</p>
  <h3>Education Transforms Rather Than Destroys</h3>
  <p>Cabello's pre-print (2024)<sup class="fn"><a>[7]</a><span class="tip">Cabello, "Science and Religious Dogmatism," pre-print, Dec 2024</span></sup> provides an important finding: scientific literacy reduces dogmatism but not necessarily belief. Educated believers hold their beliefs more flexibly, with greater tolerance for ambiguity and less insistence on literal interpretation. This suggests that education doesn't destroy religion &mdash; it transforms it, producing a more sophisticated and less rigid form of faith.</p>
  <p>The conversation has moved from "are they compatible?" to "how do different ways of knowing interact?" This is a more productive question, and one that neither warfare-thesis advocates nor religious fundamentalists are well equipped to answer.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S4.07 &mdash; Details</div><h2><em>Consensus</em> &amp; Fractures</h2></div>
  <p>After surveying the evidence across 8 major sources, the science-religion interface reveals strong scholarly consensus alongside persistent public misunderstanding.</p>
  <h3>Points of Agreement</h3>
  <p>The warfare thesis is historically wrong &mdash; the complexity thesis is the scholarly consensus. Most scientists globally do not see a fundamental conflict between science and religion. Evolution acceptance varies enormously by country, with education as the strongest predictor. New Atheism has declined as a cultural movement. The relationship between science and religion is context-dependent, varying by tradition, era, institution, and specific scientific question.</p>
  <h3>Points of Disagreement</h3>
  <p>The deepest fractures concern interpretation. Is the perceived "conflict" purely a cultural construction maintained by popular narrative, or does religion genuinely impede specific sciences such as stem cell research and climate action? Are religious scientists doing good science despite their beliefs, or does faith sometimes complement scientific work through motivation, ethics, and meaning? Will the post-secular turn prove lasting, or is it a temporary cultural reaction? And does the PNAS "belief in belief" finding support religion (we are built to believe) or undermine it (our preferences are not evidence)?</p>
  <div class="verdict">
    <div class="v-col pro"><h4>Compatibility Evidence</h4><ul><li>Majority of scientists globally are religious</li><li>Complexity thesis is scholarly consensus</li><li>Evolution acceptance growing even in religious US</li><li>Education transforms belief, doesn't destroy it</li></ul></div>
    <div class="v-col con"><h4>Tension Persists</h4><ul><li>Public still assumes warfare narrative</li><li>Religion impedes specific policy areas (climate, stem cells)</li><li>Fundamentalism genuinely conflicts with science</li><li>"Belief in belief" may be cognitive bias, not truth</li></ul></div>
  </div>`
];

// === DOM BUILDING ===
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo">S<em>4</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head"><div class="main-head-inner">
      <div class="hero-badge"><span class="dot"></span> Religion Today &middot; Section 4</div>
      <div class="hero-title">Religion &amp; <em>Science</em></div>
      <div class="masthead-rule"></div>
      <div class="masthead-sub"><span>8 Sources &middot; Ecklund, PNAS, Gallup, History for Atheists</span></div>
    </div></div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>`;
document.body.appendChild(shell);

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;
  mainInner.appendChild(block);
});
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const d = document.createElement('div'); d.className = 'detail'; d.id = `detail-${idx}`; d.innerHTML = details[idx]; rightInner.appendChild(d);
});

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('theme', n); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return;
  const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
</html>
