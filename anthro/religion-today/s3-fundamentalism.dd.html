<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Measuring', title: 'Measuring Religious <em>Nationalism</em>' },
  { num: '02', short: 'US CN', title: 'Christian <em>Nationalism</em> in the US' },
  { num: '03', short: 'India', title: 'Hindu <em>Nationalism</em> in India' },
  { num: '04', short: 'Islam', title: 'Political <em>Islam</em>: The Spectrum' },
  { num: '05', short: 'Distinction', title: '<em>Fundamentalism</em> vs. Orthodoxy' },
  { num: '06', short: 'Violence', title: 'The <em>Violence</em> Connection' },
  { num: '07', short: 'Identity', title: 'Religion as <em>Identity</em> Politics' },
  { num: '08', short: 'Consensus', title: '<em>Consensus</em> &amp; Fractures' }
];

const summaries = [
  `<p>Pew surveyed 55,000 people in 36 countries.<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "Religious Nationalism Around the World," Jan 2025</span></sup> Indonesia leads in religious nationalism (46%), Bangladesh (45%). The US registers only 6% on Pew's strict measure. But PRRI, using a broader cultural-alignment approach, finds 32% of Americans hold Christian nationalist beliefs.<sup class="fn"><a>[2]</a><span class="tip">PRRI, "Christian Nationalism Across All 50 States," 2024</span></sup> Israel is the only high-income country where &gt;33% emphasize religion as central to national identity.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">46%</div><div class="sl">Indonesia</div></div>
    <div class="st"><div class="sv">45%</div><div class="sl">Bangladesh</div></div>
    <div class="st"><div class="sv">32%</div><div class="sl">US (PRRI)</div></div>
    <div class="st"><div class="sv">6%</div><div class="sl">US (Pew)</div></div>
  </div>`,

  `<p>PRRI: 32% of Americans qualify as CN Adherents (11%) or Sympathizers (21%). White evangelical Protestants: 67% hold CN beliefs. 81% of White evangelicals voted Trump in 2024.<sup class="fn"><a>[3]</a><span class="tip">Pew Research Center, "Religious Values and the 2024 Election," Jun 2024</span></sup> State pattern: Mississippi/Oklahoma (51%), Arkansas (49%). 22% want Christianity declared official religion.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">81%</div><div class="sl">White evangelicals for Trump</div></div>
    <div class="st"><div class="sv">67%</div><div class="sl">White evan. hold CN</div></div>
    <div class="st"><div class="sv">22%</div><div class="sl">Want official religion</div></div>
  </div>`,

  `<p>According to East Asia Forum, BJP governance since 2014 has eroded secular foundations.<sup class="fn"><a>[4]</a><span class="tip">East Asia Forum, "Hindu nationalism threatens India's secular foundations," May 2025</span></sup> Waqf Amendment Act, Citizenship Amendment Act discriminate against Muslims. Modi's 2024 campaign included Islamophobic rhetoric. Nagpur clashes (March 2025): Hindu nationalist groups demanded demolition of Mughal-era tomb, resulting in communal violence.</p>
  <div class="chips">
    <span class="chip">Waqf Amendment Act</span>
    <span class="chip">Citizenship Amendment Act</span>
    <span class="chip">Nagpur clashes 2025</span>
    <span class="chip">"Love jihad" rhetoric</span>
  </div>`,

  `<p>Islamic fundamentalism is not monolithic. Indonesia champions wasathiyah (moderation).<sup class="fn"><a>[5]</a><span class="tip">Azra, "Islamic Fundamentalism and Wasathiyah," Tandfonline, 2025</span></sup> Turkey blends Islamist politics with democratic structures. Iran's theocratic model faces internal pressure. Saudi Arabia under MBS intentionally reduces religious establishment's political power. The diversity of political Islam defies monolithic Western media framing.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Indonesia</h4><p>Wasathiyah (moderation) tradition. Largest Muslim-majority democracy. Religious nationalism still highest globally.</p></div>
    <div class="feat"><h4>Turkey</h4><p>AKP blending Islamist politics with democratic structures, though increasingly authoritarian.</p></div>
    <div class="feat"><h4>Iran</h4><p>Theocratic model under increasing pressure from young, secular-leaning population.</p></div>
    <div class="feat"><h4>Saudi Arabia</h4><p>MBS modernization intentionally reducing religious establishment's political power.</p></div>
  </div>`,

  `<p>ACT Alliance's distinction is crucial: fundamentalism seeks political power, rejects pluralism, and claims exclusive truth.<sup class="fn"><a>[6]</a><span class="tip">ACT Alliance, "Faith, Power, and Politics: How Religious Fundamentalism Is Fuelling Political Extremism," 2024</span></sup> Orthodoxy maintains traditional beliefs without demanding political dominance. A devout Muslim who prays five times daily is orthodox; one who demands Sharia law for all citizens is fundamentalist.</p>`,

  `<p>Saiya (2024): political empowerment of Christian nationalism correlates with physical attacks on religious minorities.<sup class="fn"><a>[7]</a><span class="tip">Saiya, "Christian Nationalism and Violence Against Religious Minorities," <em>JSSR</em>, 2024</span></sup> Mechanism: dehumanization of out-groups through exclusive truth claims combined with political power. The findings point to measurable consequences for minority safety.</p>`,

  `<p>The deeper pattern: religion functions less as belief system and more as ethnic/cultural marker. Sociologists such as Samuel Perry and Andrew Whitehead argue that "Christian" in "Christian nationalism" functions more as a marker of white cultural identity than of theological commitment. Similarly, Hindu nationalism deploys Hinduism as civilizational rather than devotional identity. In Durkheimian terms, group boundary-marking matters more than content of belief.</p>`,

  `<h4>What everyone agrees on</h4>
  <ul class="s-list pro">
    <li>Religious nationalism is a global phenomenon, not limited to one tradition</li>
    <li>It correlates with democratic erosion where it gains political power</li>
    <li>Fundamentalism is distinct from traditionalism/orthodoxy</li>
    <li>The US, India, and several Muslim-majority states are key theaters</li>
    <li>Religion as identity politics differs from religion as spiritual practice</li>
  </ul>
  <h4>Where the discourse fractures</h4>
  <ul class="s-list con">
    <li>Is Christian nationalism genuinely Christian, or cultural identity using Christian symbols?</li>
    <li>Can Hindu nationalism be distinguished from Hindu cultural pride?</li>
    <li>Is secularism the answer, or does it create the backlash that feeds nationalism?</li>
    <li>Does political Islam inevitably lead to theocracy, or can it coexist with democracy?</li>
  </ul>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.01 &mdash; Details</div><h2>Measuring Religious <em>Nationalism</em></h2></div>
  <p>Pew Research Center surveyed 55,000 people in 36 countries,<sup class="fn"><a>[1]</a><span class="tip">Pew Research Center, "Religious Nationalism Around the World," Jan 2025</span></sup> asking four key questions: how important is the historically dominant religion to national identity, how important is the leader's religion, and how much should sacred texts guide laws. The framework attempts to measure something subtle: the degree to which religious identity becomes fused with national identity.</p>
  <h3>The Global Map</h3>
  <p>Indonesia leads at 46%, Bangladesh at 45%. These are not theocracies &mdash; they are democracies where large majorities see national identity as inseparable from religious identity. Israel stands out as the only high-income country where more than a third emphasize religion as central to national identity. The US registers only 6% on Pew's strict measure.</p>
  <p>But measurement matters enormously. PRRI, using a broader cultural-alignment approach rather than Pew's strict theological questions, finds 32% of Americans qualify as Christian nationalism Adherents (11%) or Sympathizers (21%).<sup class="fn"><a>[2]</a><span class="tip">PRRI, "Christian Nationalism Across All 50 States," 2024</span></sup> The gap between 6% and 32% reflects different measurement frameworks, not different realities. Religious nationalism is partly about explicit ideology, partly about cultural alignment that people may not recognize as "nationalism."</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.02 &mdash; Details</div><h2>Christian <em>Nationalism</em> in the US</h2></div>
  <p>PRRI's survey of 22,260 adults<sup class="fn"><a>[2]</a><span class="tip">PRRI, "Christian Nationalism Across All 50 States," 2024</span></sup> provides the most detailed state-level map of Christian nationalism in America. The findings are striking: Mississippi and Oklahoma lead at 51%, followed by Arkansas (49%) and West Virginia (48%). Support correlates strongly with Trump vote share at the state level.</p>
  <h3>The Evangelical Connection</h3>
  <p>81% of White evangelical Protestants voted Trump in 2024.<sup class="fn"><a>[3]</a><span class="tip">Pew Research Center, "Religious Values and the 2024 Election," Jun 2024</span></sup> 85% identify with or lean toward the Republican Party &mdash; a 20-point shift in three decades. 61% of Trump's evangelical backers want government to support religious values. 22% want Christianity declared the official religion of the United States.</p>
  <p>Church attendance is the strongest predictor: 54% of weekly churchgoers qualify as CN Adherents or Sympathizers versus only 20% of non-attenders.<sup class="fn"><a>[8]</a><span class="tip">PRRI, "Mapping Christian Nationalism Across 50 States" (2025 update)</span></sup> White Christians (46%) are more likely than Christians of color (39%) to hold CN beliefs.</p>
  <h3>The Institutional Expression</h3>
  <p>The Heritage Foundation's Project 2025 represents the institutional expression of Christian nationalism:<sup class="fn"><a>[9]</a><span class="tip">Kettering Foundation, "Project 2025: Blueprint for Christian Nationalist Regime Change," 2024</span></sup> a comprehensive policy blueprint embedding evangelical priorities including traditional gender roles, LGBTQ opposition, and erosion of church-state boundaries. Critics characterize this as a coordinated effort to embed religious priorities into governance, with substantial Republican support.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.03 &mdash; Details</div><h2>Hindu <em>Nationalism</em> in India</h2></div>
  <p>Critics argue that BJP governance since 2014 has eroded India's secular constitutional foundations.<sup class="fn"><a>[4]</a><span class="tip">East Asia Forum, "Hindu nationalism threatens India's secular foundations," May 2025</span></sup> The Waqf Amendment Act and Citizenship Amendment Act discriminate against Muslims. Violence against Muslims and Christians has increased. During the 2024 general election, Prime Minister Modi used Islamophobic rhetoric including "love jihad" and "vote jihad" messaging.</p>
  <h3>Mainstreaming Extremism</h3>
  <p>The March 2025 Nagpur clashes illustrate the dynamic: Hindu nationalist groups demanded the demolition of a Mughal-era Muslim tomb, resulting in communal violence. Analysts note that such activity has moved from the margins to mainstream political life under the ruling party. The Rashtriya Swayamsevak Sangh (RSS), the ideological parent of the BJP, envisions India as a Hindu civilizational state rather than a secular democracy.</p>
  <div class="callout"><h4>The Democratic Paradox</h4><p>India presents a paradox: religious nationalism advancing through democratic means. The BJP wins elections, commands parliamentary majorities, and uses legislative power to reshape the state. The question is whether democratic institutions can survive when the democratically elected government seeks to transform a secular democracy into a civilizational state.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.04 &mdash; Details</div><h2>Political <em>Islam</em>: The Spectrum</h2></div>
  <p>The Western framing of "Islamic fundamentalism" as a monolithic threat obscures enormous internal diversity. Azyumardi Azra's framework<sup class="fn"><a>[5]</a><span class="tip">Azra, "Islamic Fundamentalism and Wasathiyah," Tandfonline, 2025</span></sup> distinguishes between fundamentalism and the wasathiyah (moderation) tradition that has deep roots in Indonesian Islam, the world's largest Muslim-majority democracy.</p>
  <h3>Four Models</h3>
  <p>Indonesia's wasathiyah tradition pushes back against fundamentalism from within Islamic scholarship, grounding moderation in Qur'anic interpretation rather than Western liberal values. Turkey under the AKP blends Islamist politics with democratic structures, though governance has become increasingly authoritarian. Iran's theocratic model faces growing internal pressure from a young, secular-leaning population. Saudi Arabia under MBS intentionally reduces the religious establishment's political power as part of a broader modernization strategy.</p>
  <p>Each represents a different answer to the central question of political Islam: what is the proper relationship between Islamic law, democratic governance, and individual freedom? The spectrum runs from Indonesia's democratic pluralism to Iran's theocratic authority, with no single model representing "real" Islam.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.05 &mdash; Details</div><h2><em>Fundamentalism</em> vs. Orthodoxy</h2></div>
  <p>ACT Alliance's global analysis<sup class="fn"><a>[6]</a><span class="tip">ACT Alliance, "Faith, Power, and Politics: How Religious Fundamentalism Is Fuelling Political Extremism," 2024</span></sup> provides a crucial distinction that is often lost in public discourse: fundamentalism is not the same as orthodoxy, traditionalism, or devout practice. Fundamentalism is specifically defined by three characteristics: the pursuit of political power, the rejection of pluralism, and the claim to exclusive truth that demands imposition on others.</p>
  <h3>The Practical Difference</h3>
  <p>A devout Muslim who prays five times daily, observes Ramadan, and studies the Qur'an is orthodox. A Muslim who demands that Sharia law govern all citizens, including non-Muslims, is fundamentalist. A Christian who believes in the literal truth of Scripture is traditionalist. A Christian who demands that public schools teach creationism and that laws enforce biblical morality is fundamentalist. The difference is whether faith demands political imposition on those who do not share it.</p>
  <p>This distinction applies across all traditions: Christian, Islamic, Hindu, Buddhist (Myanmar), and Jewish. The pattern is consistent: fundamentalism emerges when religious identity becomes fused with political power and cultural anxiety.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.06 &mdash; Details</div><h2>The <em>Violence</em> Connection</h2></div>
  <p>Research published in the Journal for the Scientific Study of Religion by Saiya (2024)<sup class="fn"><a>[7]</a><span class="tip">Saiya, "Christian Nationalism and Violence Against Religious Minorities," <em>JSSR</em>, 2024</span></sup> establishes a measurable correlation between the political empowerment of Christian nationalism and physical attacks on religious minorities. The study presents this as a cross-national empirical finding.</p>
  <h3>The Mechanism</h3>
  <p>The mechanism operates through dehumanization: when a group claims exclusive truth and gains political power, those outside the group become not merely different but threatening. Exclusive truth claims combined with political authority produce laws that marginalize, rhetoric that dehumanizes, and conditions in which physical violence becomes normalized as "defense" of the nation's identity.</p>
  <div class="security-box">
    <h4>Measured Consequences</h4>
    <p>Saiya's findings indicate the correlation between CN political power and minority attacks is not limited to the United States but appears across countries where religious nationalism gains institutional power. The research suggests that where religious nationalism achieves political dominance, measurable consequences for the physical safety of religious minorities follow.</p>
  </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.07 &mdash; Details</div><h2>Religion as <em>Identity</em> Politics</h2></div>
  <p>The deeper pattern across all three major theaters of religious nationalism &mdash; American Christian nationalism, Indian Hindu nationalism, and political Islam &mdash; reveals that religion functions less as a belief system and more as an ethnic or cultural marker. Sociologists such as Perry and Whitehead argue that "Christian" in "Christian nationalism" functions more as a marker of white cultural identity than of theological commitment. Similarly, analysts observe that Hindu nationalism deploys Hinduism as civilizational identity rather than devotional practice.</p>
  <h3>Durkheim vs. Weber</h3>
  <p>This is religion as Durkheimian social glue: the content of belief matters less than the function of group boundary-marking. The sacred object is not God but the nation. The rituals are not prayer but political rallies. The clergy are not priests but politicians. The heretics are not theological dissenters but cultural outsiders. Religious nationalism represents a fundamental transformation of religion's social function &mdash; from personal salvation to collective identity.</p>
  <div class="callout"><h4>An Internal Critique</h4><p>Critics within these traditions point to a tension: religious nationalism can conflict with core ethical teachings of the faiths it invokes. Theologians note that Christian nationalism's hostility toward immigrants sits uneasily with Gospel teachings on the stranger, and that Hindu nationalism's communal violence stands in tension with ahimsa. Adherents, however, dispute these characterizations, arguing their political engagement is consistent with faithfully defending their traditions.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>S3.08 &mdash; Details</div><h2><em>Consensus</em> &amp; Fractures</h2></div>
  <p>After surveying the evidence across 9 major sources, several points of consensus emerge alongside persistent disagreements about the nature and trajectory of religious nationalism.</p>
  <h3>Points of Agreement</h3>
  <p>Religious nationalism is a global phenomenon, not limited to one tradition or region. It correlates with democratic erosion where it gains political power. Fundamentalism is analytically distinct from traditionalism and orthodox practice. The United States, India, and several Muslim-majority states are the key contemporary theaters. And religion functioning as identity politics represents something categorically different from religion as spiritual practice.</p>
  <h3>Points of Disagreement</h3>
  <p>The deepest fracture: is Christian nationalism genuinely Christian, or is it a cultural identity formation that uses Christian symbols for non-theological purposes? Can Hindu nationalism be distinguished from Hindu cultural pride? Is secularism the solution to religious nationalism, or does forced secularization create the backlash that feeds it? And can political Islam coexist with democratic governance, as the Turkish and Indonesian models suggest, or does it inevitably tend toward theocracy?</p>
  <div class="verdict">
