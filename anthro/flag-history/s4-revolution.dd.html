const sections = [

  { num: '02', short: 'French Rev', title: 'The <em>French</em> Revolution' },
  { num: '03', short: 'Tricolor Spreads', title: 'The <em>Tricolor</em> Spreads' },

];

const summaries = [
  `<p>The Netherlands' <a href="https://en.wikipedia.org/wiki/Flag_of_the_Netherlands">Prinsenvlag</a> (1572) was technically the world's first tricolor, created during the Dutch revolt against Spain.<span class="cite">[1]<span class="cite-tip">R-01: Wikipedia, &ldquo;Flag of the Netherlands.&rdquo; Prinsenvlag (1572), first tricolor, orange to red transition.</span></span> Originally orange-white-blue (the colors of William of Orange), it later shifted to red-white-blue. But it was a practical naval convenience, not a revolutionary statement. The transformative moment came two centuries later.</p>
   <div class="s-stat"><span class="sv">1572</span><span class="sl">First Tricolor</span></div>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Stripes</span></div>
   <p>The Dutch contribution to vexillology was the <em>format</em> &mdash; three equal horizontal stripes &mdash; not the ideology. It took the French Revolution to invest three stripes with radical political meaning.</p>`,

  `<p>The <a href="https://en.wikipedia.org/wiki/Flag_of_France">French tricolor</a> combined the blue and red of Paris with the white of the Bourbon monarchy &mdash; a visual compromise that was really a revolution.<span class="cite">[2]<span class="cite-tip">R-02: Wikipedia, &ldquo;Flag of France.&rdquo; French Revolution tricolor (1794), blue-white-red symbolism.</span></span> Three equal vertical stripes declared that the nation belonged to its people, not its king. The design was radical in its simplicity: no coat of arms, no religious symbols, no dynastic heraldry.</p>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" style="max-width:120px" viewBox="0 0 900 600"><path fill="#CE1126" d="M0 0h900v600H0"/><path fill="#fff" d="M0 0h600v600H0"/><path fill="#002654" d="M0 0h300v600H0"/></svg><span class="caption" style="display:block;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:8px">France &mdash; blue-white-red, the most influential flag design in history</span></div>
   <div class="s-stat"><span class="sv">1794</span><span class="sl">Adopted</span></div>
   <div class="s-stat"><span class="sv">40+</span><span class="sl">Nations Influenced</span></div>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Ideals Encoded</span></div>
   <p>Just three colors representing liberty, equality, and fraternity. This was the single most influential flag design in history.</p>`,

  `<p>Within decades of the French Revolution, the tricolor format spread across Europe and Latin America.<span class="cite">[3]<span class="cite-tip">R-03: Wikipedia, &ldquo;Tricolour (flag).&rdquo; Comprehensive list of tricolor-derived national flags (55+ nations).</span></span> Each nation adapted France's template with its own colors: Italy (green-white-red, 1797), Ireland (green-white-orange, 1848), Germany (black-red-gold, 1848), Romania (blue-yellow-red, 1848). Today, 55+ national flags use a tricolor layout.</p>
   <div class="diagram-wrap"><svg class="fig" viewBox="0 0 700 280" width="700" height="280">
<rect x="0" y="0" width="700" height="280" fill="var(--bg)" rx="8"/>
<text x="350" y="24" fill="var(--bright)" font-size="13" font-weight="600" text-anchor="middle" font-family="Jost,sans-serif">The Tricolor Family Tree</text>
<rect x="270" y="38" width="160" height="42" fill="#21468B" rx="6"/><text x="350" y="64" fill="#fff" font-size="11" text-anchor="middle" font-family="Jost,sans-serif">Netherlands (1572)</text>
<line x1="350" y1="80" x2="350" y2="100" stroke="var(--dim)" stroke-width="1.5"/>

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The <em>Dutch</em> Origin</h2></div>
   <h3>The Prinsenvlag</h3>
   <p>The Dutch Revolt against Spanish Habsburg rule (1568-1648) produced the world's first tricolor flag.<span class="cite">[1]<span class="cite-tip">R-01: Wikipedia, &ldquo;Flag of the Netherlands.&rdquo; Prinsenvlag (1572), first tricolor.</span></span> The Prinsenvlag (Prince's Flag) used orange-white-blue &mdash; the livery colors of William of Orange (Willem van Oranje), leader of the revolt. These colors derived from William's coat of arms, making the Prinsenvlag technically a heraldic flag rather than a revolutionary one.</p>
   <h3>Orange to Red</h3>
   <p>At some point in the 17th century (the exact date is debated), the orange stripe was replaced by red. Various explanations have been offered: orange dyes were unstable and faded to red in sunlight; red was more visible at sea; the House of Orange's influence waned after William III's death. Whatever the reason, the red-white-blue tricolor became the enduring Dutch national flag.</p>
   <h3>A Format, Not an Ideology</h3>
   <p>The Dutch tricolor was a practical naval flag, not a philosophical statement. Its three stripes made it easily distinguishable from other maritime flags of the period. The revolutionary content &mdash; the idea that three stripes represent popular sovereignty &mdash; was a French invention, not a Dutch one. The Dutch contribution was the <em>format</em>: the template of three equal horizontal stripes that France would later invest with radical meaning.</p>
   <h3>Influence on Other Flags</h3>
   <p>The Dutch tricolor directly influenced the flags of Russia (Peter the Great reportedly adopted the white-blue-red tricolor after visiting the Netherlands in 1699), France (the blue-white-red arrangement may owe something to Dutch precedent), and through these, dozens of subsequent national flags. The Prinsenvlag is the ancestor of roughly 40% of the world's national flags.</p>
   <div class="callout"><p>The Dutch Prinsenvlag is the most consequential flag design that nobody credits. Its three-stripe format, invented as a naval convenience, became the most copied layout in vexillological history after the French Revolution invested it with revolutionary meaning.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2>The <em>French</em> Revolution</h2></div>
   <h3>The Cockade</h3>
   <p>The French Revolution's flag story begins not with a flag but with a cockade &mdash; a ribbon rosette pinned to a hat. On July 12, 1789, the journalist Camille Desmoulins urged Parisians to wear green cockades as a sign of hope. Within days, the colors shifted: blue and red (the colors of Paris) were adopted, and the Marquis de Lafayette reportedly added white (the color of the Bourbon monarchy) to create a tricolor cockade signaling reconciliation between the people and the king.</p>
   <h3>The Radical Simplicity</h3>
   <p>The French tricolor's design was a deliberate repudiation of heraldic tradition. Where royal flags featured coats of arms, dynastic symbols, fleurs-de-lis, and elaborate ornamentation, the tricolor offered nothing but three colors. This was not simplicity born of laziness but simplicity as ideology: the nation belongs to <em>all</em> its people, and no dynasty, family, or institution should be elevated on its flag.</p>
   <h3>The Formalization (1794)</h3>
   <p>The tricolor went through several versions before being formalized on February 15, 1794, with the current arrangement: blue at the hoist, white in the center, red at the fly. The vertical orientation (rather than the horizontal Dutch model) may have been chosen for better visibility at sea, but it also created a more dramatic visual: three bold vertical bands rather than horizontal stripes.</p>
   <h3>A New Visual Language</h3>
   <p>The French tricolor did not merely represent the revolution; it <em>created</em> a new visual language for political identity. Before 1789, flags identified rulers, dynasties, and territories. After 1789, flags could identify <em>ideas</em>: liberty, equality, fraternity. This conceptual shift &mdash; from flags-as-identity-markers to flags-as-ideology-carriers &mdash; is the French Revolution's most enduring vexillological legacy.</p>
   <div class="callout"><p>The French tricolor's genius is that it simultaneously represents a specific nation (France) and a universal idea (popular sovereignty). This dual function &mdash; particular and universal at once &mdash; is why the tricolor format was adopted by revolutionary movements worldwide: each nation could claim the universal ideal while encoding local identity in its specific color choices.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2>The <em>Tricolor</em> Spreads</h2></div>
   <h3>The Mechanism of Diffusion</h3>
   <p>The tricolor spread through three mechanisms: direct French influence (Napoleon's campaigns carried the tricolor across Europe), ideological inspiration (revolutionary movements adopted the format to signal their politics), and practical imitation (the format was visually effective and easy to manufacture). Each mechanism produced a different relationship between the new flag and the French original.</p>
   <h3>Direct French Influence</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Italy (1797)</h4><p>Napoleon's Cispadane Republic. Green-white-red directly modeled on France's blue-white-red, with colors chosen by the Italians.</p></div>
     <div class="feat"><h4>Belgium (1831)</h4><p>Black-yellow-red. Belgian Revolution against Dutch rule explicitly echoed the French Revolution of 1830.</p></div>
     <div class="feat"><h4>Mexico (1821)</h4><p>Green-white-red with eagle emblem. Plan de Iguala's Three Guarantees encoded in three stripes.</p></div>
     <div class="feat"><h4>Romania (1848)</h4><p>Blue-yellow-red. Wallachian revolutionaries adopted the tricolor during the 1848 revolutions.</p></div>
   </div>
   <h3>Ideological Inspiration</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Ireland (1848)</h4><p>Green-white-orange. Green for Catholics, orange for Protestants, white for peace between them. Format borrowed; meaning entirely local.</p></div>
     <div class="feat"><h4>Germany (1848)</h4><p>Black-red-gold. Student revolutionary colors from the Burschenschaften. The tricolor was an anti-monarchical signal.</p></div>
     <div class="feat"><h4>India (1947)</h4><p>Saffron-white-green. Four versions over 40 years, each encoding shifting political priorities (see S5).</p></div>
     <div class="feat"><h4>Chad (1959)</h4><p>Blue-yellow-red. Pan-African aspiration encoded in tricolor format. Nearly identical to Romania (different histories, same design).</p></div>
   </div>
   <h3>The 55+ Club</h3>
   <p>Today, more than 55 national flags use a tricolor layout (three equal horizontal or vertical stripes). This makes the tricolor the most common flag layout pattern in the world, accounting for roughly 28% of all national flags. The format's dominance is the single most visible legacy of the French Revolution in the modern world.</p>
   <div class="callout"><p>The tricolor's extraordinary diffusion demonstrates that flag formats carry meaning independent of their colors. To adopt a tricolor in the 19th century was to make a political statement: we reject monarchy, we embrace popular sovereignty, we are a modern nation. The format was the message.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>Italian</em> Unification</h2></div>
   <h3>Napoleonic Origins</h3>
   <p>The Italian tricolor was born directly from French influence. In 1797, Napoleon's Cispadane Republic (a French client state in northern Italy) adopted a green-white-red vertical tricolor explicitly modeled on France's blue-white-red. The colors were chosen by Italian delegates: green for hope, white for faith, red for charity (though secular interpretations &mdash; the landscape, the Alps, and blood &mdash; are equally common).</p>
   <h3>Symbol of the Risorgimento</h3>
   <p>During the Italian unification movement (Risorgimento, c. 1815-1871), the tricolor became the rallying symbol for nationalists across the fragmented Italian peninsula. To display the green-white-red was an act of political defiance against the Austrian Empire, the Papal States, and the various monarchies that controlled Italian territory. The flag unified a movement before it unified a nation.</p>
   <h3>Unification (1861)</h3>
   <p>When the Kingdom of Italy was proclaimed in 1861, the tricolor became the national flag with the Savoy dynasty's coat of arms in the center white stripe. The coat of arms was removed when Italy became a republic in 1946, returning the flag to the pure tricolor &mdash; completing the circle back to the format's revolutionary origins.</p>
   <div class="callout"><p>Italy's flag journey &mdash; from Napoleonic imposition to revolutionary symbol to national flag to republican simplification &mdash; illustrates how the same design can accumulate and shed meanings across different political eras while retaining its visual identity.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Latin</em> American Independence</h2></div>
   <h3>Enlightenment Channels</h3>
   <p>Latin American independence movements (c. 1810-1830) were inspired by both the American and French Revolutions, but the French model dominated flag design. The Enlightenment ideas of liberty, equality, and self-governance traveled from France through educated Creole elites who had studied in Europe, and the tricolor format traveled with them.</p>
   <h3>Argentina: Celeste y Blanca</h3>
   <p>Manuel Belgrano created Argentina's flag in 1812 during the war of independence against Spain. The sky-blue (celeste) and white stripes reportedly represented the sky above Buenos Aires during the May Revolution (1810). The Sun of May, added later, represents Inti (the Incan sun god), connecting the flag to pre-Colombian heritage. Argentina's flag influenced those of Uruguay, El Salvador, Honduras, Nicaragua, and Guatemala.</p>
   <h3>Mexico: Three Guarantees</h3>
   <p>Mexico's flag (1821) encoded the Plan de Iguala's Three Guarantees in its three stripes: green for independence, white for the purity of Catholicism, red for union between Europeans and Americans. The eagle on a cactus (from Aztec foundation mythology) in the center connected the new nation to pre-Hispanic identity &mdash; a dual claim to both Enlightenment modernity and indigenous heritage.</p>
   <h3>Gran Colombia</h3>
   <p>Francisco de Miranda designed the yellow-blue-red tricolor that was adopted by Gran Colombia (1819) and subsequently inherited by Venezuela, Colombia, and Ecuador when Gran Colombia dissolved. Miranda reportedly drew inspiration from conversations with Goethe about primary colors. The three nations' flags remain variations on Miranda's original design, using different stripe proportions and added emblems to distinguish themselves.</p>
   <div class="callout"><p>Latin American flags demonstrate that the tricolor format could encode not just European revolutionary ideals but also indigenous heritage, religious identity, and regional solidarity. The format was universal; the meanings were intensely local.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2>The <em>Springtime</em> of Peoples</h2></div>
   <h3>1848: The Explosive Year</h3>
   <p>The wave of revolutions that swept Europe in 1848 produced more new tricolor flags in a single year than any other period in history. In Paris, Berlin, Vienna, Budapest, Milan, Prague, and dozens of other cities, revolutionaries raised tricolored flags as signals of their political ambitions. The format had become so thoroughly associated with popular sovereignty that adopting a tricolor was itself a revolutionary act.</p>
   <h3>Germany</h3>
   <p>The black-red-gold tricolor derived from the uniforms of the <em>Lutzow Free Corps</em> during the Napoleonic Wars and was adopted by student fraternities (Burschenschaften) as an anti-monarchical symbol. In 1848, the Frankfurt Parliament adopted it as the flag of a unified Germany. After the revolution failed, the flag was suppressed but revived for the Weimar Republic (1919) and again for the Federal Republic (1949).</p>
   <h3>Ireland</h3>
   <p>Thomas Francis Meagher presented the Irish tricolor in 1848, directly inspired by the French Revolution. Green represents the Catholic/nationalist tradition, orange the Protestant/unionist tradition, and white the hope for peace between them. It is one of the most explicitly meaning-encoded tricolors: each stripe represents a community, and the central stripe represents their reconciliation.</p>
   <h3>The Meta-Symbol</h3>
   <p>By 1848, the tricolor had transcended its origins to become a <em>meta-symbol</em>: the format itself carried political meaning independent of any specific color combination. To adopt three equal stripes was to declare: we are a people, not subjects; we seek liberty, not tyranny; we are modern, not feudal. This meta-symbolic function explains why the tricolor was adopted simultaneously by movements with vastly different specific goals.</p>
   <div class="callout"><p>The 1848 revolutions demonstrated that flag formats can become ideological statements in their own right. By mid-century, the tricolor format had become synonymous with revolutionary aspiration &mdash; a visual shorthand for popular sovereignty that transcended any specific national context.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2><em>Revolution</em> Timeline</h2></div>
   <h3>Complete Chronology</h3>
   <div class="timeline">
     <div class="tl-item"><span class="tl-date">1572</span><span class="tl-text">Netherlands Prinsenvlag &mdash; first tricolor (orange-white-blue). Naval convenience, not revolutionary statement.</span></div>
     <div class="tl-item"><span class="tl-date">1699</span><span class="tl-text">Russia adopts white-blue-red tricolor &mdash; Peter the Great influenced by Dutch visit.</span></div>
     <div class="tl-item"><span class="tl-date">1789</span><span class="tl-text">French Revolution begins &mdash; blue-red cockade adopted, white added by Lafayette.</span></div>
     <div class="tl-item"><span class="tl-date">1794</span><span class="tl-text">French tricolor formalized as blue-white-red &mdash; the revolutionary flag par excellence.</span></div>
     <div class="tl-item"><span class="tl-date">1797</span><span class="tl-text">Italy (Cispadane Republic) &mdash; first direct French-influenced tricolor adoption.</span></div>
     <div class="tl-item"><span class="tl-date">1812</span><span class="tl-text">Argentina &mdash; celeste y blanca. Latin American independence flags begin.</span></div>
     <div class="tl-item"><span class="tl-date">1819</span><span class="tl-text">Gran Colombia &mdash; Miranda's yellow-blue-red, later inherited by Venezuela, Colombia, Ecuador.</span></div>
     <div class="tl-item"><span class="tl-date">1821</span><span class="tl-text">Mexico &mdash; green-white-red with eagle. Three Guarantees encoded in cloth.</span></div>
     <div class="tl-item"><span class="tl-date">1831</span><span class="tl-text">Belgium &mdash; black-yellow-red. Revolution against Dutch rule.</span></div>
     <div class="tl-item"><span class="tl-date">1848</span><span class="tl-text">"Springtime of Peoples" &mdash; Germany, Ireland, Romania, Hungary adopt tricolors simultaneously.</span></div>
   </div>
   <h3>Cross-References</h3>
   <p>The revolutionary tricolor tradition did not end in 1848. It continued through the decolonization era (<a href="s5-decolonization.dd.html">S5</a>), as newly independent nations adopted tricolor formats to signal their entry into the community of sovereign states. The pan-movement color families (Pan-Arab, Pan-African, Pan-Slavic) are, in one sense, regional adaptations of the tricolor tradition.</p>
   <div class="callout"><p>The tricolor's 450-year journey from Dutch naval flag to universal symbol of popular sovereignty is one of the most remarkable stories in the history of design. No other visual format has been adopted by as many independent polities for as many different purposes.</p></div>`

mainScroll.addEventListener('scroll',()=>{document.querySelector('.main-head').classList.toggle('compact',mainScroll.scrollTop>40);const blocks=mainScroll.querySelectorAll('.section-block');const items=document.querySelectorAll('.sidebar-item');let activeIdx=0;blocks.forEach((b,i)=>{if(b.getBoundingClientRect().top<mainScroll.getBoundingClientRect().top+120)activeIdx=i});items.forEach((item,i)=>item.classList.toggle('active',i===activeIdx))});
const rightPanelOuter=document.getElementById('right');const stickyTitle=document.getElementById('right-sticky-title');rightPanelOuter.addEventListener('scroll',()=>{const activeDetail=rightPanelOuter.querySelector('.detail[style*="display: block"],.detail[style*="display:block"]');if(!activeDetail)return;const h2=activeDetail.querySelector('.detail-header h2')||activeDetail.querySelector('h2');if(!h2)return;const rect=h2.getBoundingClientRect();const panelRect=rightPanelOuter.getBoundingClientRect();const topbar=document.querySelector('.right-topbar');if(rect.bottom<panelRect.top+56){stickyTitle.textContent=h2.textContent;stickyTitle.classList.add('visible');topbar.classList.add('scrolled')}else{stickyTitle.classList.remove('visible');topbar.classList.remove('scrolled')}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeRight()});
</script>
