<script>
const sections = [
  { num: '01', short: 'Overview', title: 'The <em>flags.fyi</em> Dataset' },
  { num: '02', short: 'Categories', title: '<em>Category</em> Breakdown' },
  { num: '03', short: 'Evolution', title: '<em>Evolution</em> Chains' },
  { num: '04', short: 'Egypt', title: '<em>Egypt</em> &mdash; Most Variants' },
  { num: '05', short: 'Afghanistan', title: '<em>Afghanistan</em> &mdash; Most Dramatic' },
  { num: '06', short: 'Germany', title: '<em>Germany</em> &mdash; Identity Through Flags' },
  { num: '07', short: 'Patterns', title: 'What the <em>Data</em> Reveals' },
  { num: '08', short: 'Browse', title: '<em>Explore</em> the Collection' }

const summaries = [
  `<p>The <a href="https://flags.fyi">flags.fyi</a> collection comprises 294 flags spanning roughly 3,000 years of human history.<span class="cite">[1]<span class="cite-tip">C-01: flags.fyi &mdash; Primary dataset. 294 flags, SVG source files, historical metadata.</span></span> Every flag is rendered as a clean SVG with historical metadata, allowing systematic analysis of design patterns, color usage, and symbolic evolution that would be impossible from textual descriptions alone.</p>
   <div class="s-stat"><span class="sv">294</span><span class="sl">Total Flags</span></div>
   <div class="s-stat"><span class="sv">~3000 yr</span><span class="sl">Time Span</span></div>
   <div class="s-stat"><span class="sv">48</span><span class="sl">Evolution Chains</span></div>
   <p>The collection is not merely a gallery but a research instrument. By standardizing flag representation (SVG format, consistent metadata schema), it enables the kind of cross-cutting analysis that reveals the three color families, the tricolor dominance, and the crescent lineage discussed in sections 1&ndash;6.</p>`,

  `<p>The 294 flags divide into seven categories, each revealing different aspects of how humans use cloth to encode identity.<span class="cite">[2]<span class="cite-tip">C-02: flags.fyi Flag Index. Browsable index with all 294 flags.</span></span> Country flags dominate (262), but the smaller categories &mdash; international organizations, pan-movements, pride flags, maritime ensigns &mdash; illuminate functions that national flags alone cannot.</p>
   <div class="s-stat"><span class="sv">262</span><span class="sl">Country Flags</span></div>
   <div class="s-stat"><span class="sv">11</span><span class="sl">International Orgs</span></div>
   <div class="s-stat"><span class="sv">7</span><span class="sl">Pan-Movements</span></div>
   <p>The inclusion of historical variants alongside current flags is what makes the collection analytically powerful. A single snapshot of today's flags would miss the evolutionary dynamics &mdash; the fact that Afghanistan has had 6 flags in 100 years, or that Egypt's flag has changed 10 times since the Fatimid era.</p>`,

  `<p>48 nations in the collection have multiple historical variants, creating "evolution chains" that reveal how national identity transforms over time. These chains range from minor color adjustments (France's shade of blue) to total redesigns (Afghanistan's 6 fundamentally different flags).</p>
   <div class="s-stat"><span class="sv">48</span><span class="sl">Nations with Chains</span></div>
   <div class="s-stat"><span class="sv">10</span><span class="sl">Egypt (Most)</span></div>
   <div class="s-stat"><span class="sv">6</span><span class="sl">Afghanistan</span></div>
   <p>Evolution chains show that flag stability correlates with political stability. Nations that have experienced revolutions, regime changes, or colonial transitions (Egypt, Germany, Afghanistan) have the longest chains, while politically stable nations (Switzerland, Denmark) have barely changed their flags in centuries.</p>`,

  `<p>Egypt leads the collection with 10 historical variants, from the Fatimid Caliphate's green banner through Mamluk, Ottoman provincial, Muhammad Ali dynasty, Kingdom of Egypt, UAR, and modern Republic designs.<span class="cite">[3]<span class="cite-tip">C-04: Wikipedia, &ldquo;Flag of Egypt.&rdquo; 10 historical variants (Fatimid to modern).</span></span> Each flag marks a regime change, making Egypt's flag history a compressed political chronology.</p>
   <div class="s-stat"><span class="sv">10</span><span class="sl">Variants</span></div>
   <div class="s-stat"><span class="sv">~1000 yr</span><span class="sl">Span</span></div>
   <p>Egypt's evolution chain demonstrates that flags are not permanent symbols but living documents that regimes rewrite to assert new legitimacy. Each Egyptian flag explicitly repudiated its predecessor.</p>`,

  `<p>Afghanistan holds the record for the most dramatic flag turnover: 6 fundamentally different designs in approximately 100 years (1919&ndash;present).<span class="cite">[4]<span class="cite-tip">C-03: Wikipedia, &ldquo;Flag of Afghanistan.&rdquo; 6 flags in 100 years, most dramatic turnover.</span></span> Kingdom, republic, Soviet-backed, mujahideen, Taliban (plain white), Islamic Republic, and second Taliban era &mdash; each requiring a completely new flag rather than a modification of the old.</p>
   <div class="s-stat"><span class="sv">6</span><span class="sl">Different Designs</span></div>
   <div class="s-stat"><span class="sv">~100 yr</span><span class="sl">Span</span></div>
   <p>Afghanistan's flags illustrate the extreme case of flags as regime markers: when regime change is total (monarchy to communism to theocracy), continuity with the previous flag is impossible. The Taliban's plain white flag (1996&ndash;2001) was the starkest possible repudiation of everything that came before.</p>`,

  `<p>Germany's 7 historical variants trace the nation's turbulent journey through unification, empire, republic, dictatorship, division, and reunification.<span class="cite">[5]<span class="cite-tip">C-05: Wikipedia, &ldquo;Flag of Germany.&rdquo; 7 variants (Holy Roman Empire to reunification).</span></span> The recurring tension between black-red-gold (democratic) and black-white-red (imperial/authoritarian) makes Germany's flag history a visual argument about national identity.</p>
   <div class="s-stat"><span class="sv">7</span><span class="sl">Variants</span></div>
   <div class="s-stat"><span class="sv">2</span><span class="sl">Color Palettes</span></div>
   <p>When West and East Germany reunified in 1990, the choice of black-red-gold (the democratic tradition) over any new design was itself a political statement: reunified Germany claimed continuity with the Weimar Republic and the 1848 revolutionaries, not with the Kaiserreich or the Third Reich.</p>`,

  `<p>Systematic analysis of all 294 flags reveals statistical patterns invisible to casual observation. The three color families (Pan-Arab, Pan-African, Pan-Slavic) account for roughly 60% of national flags. The tricolor layout appears in 55+ flags. Red is the single most common color (148 flags). These concentrations suggest flag design is far less creative than it appears.</p>
   <div class="s-stat"><span class="sv">~60%</span><span class="sl">Three Families</span></div>
   <div class="s-stat"><span class="sv">55+</span><span class="sl">Tricolors</span></div>
   <div class="s-stat"><span class="sv">148</span><span class="sl">Red Flags</span></div>
   <p>The data reveals that most nations choose from a pre-existing visual vocabulary rather than inventing from scratch. Flag design is a conversation with history, not a blank canvas.</p>`,

  `<p>The complete <a href="https://flags.fyi/flag-index/">flags.fyi flag index</a> is browsable online, with SVG renderings, historical metadata, and categorization for all 294 flags. Each flag can be examined at any resolution without quality loss, making the collection useful for both research and design reference.</p>
   <div class="s-stat"><span class="sv">294</span><span class="sl">SVG Flags</span></div>
   <div class="s-stat"><span class="sv">7</span><span class="sl">Categories</span></div>
   <p>See also: <a href="s1-origins.dd.html">S1: Ancient Origins</a> through <a href="s6-design.dd.html">S6: Design Patterns</a> for the thematic analysis built on this dataset.</p>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The <em>flags.fyi</em> Dataset</h2></div>
   <h3>Scope & Structure</h3>
   <p>The flags.fyi collection aggregates 294 flags from across human history into a single standardized dataset.<span class="cite">[1]<span class="cite-tip">C-01: flags.fyi &mdash; Primary dataset. 294 flags, SVG source files, historical metadata.</span></span> Each flag is rendered as a scalable vector graphic (SVG), ensuring pixel-perfect reproduction at any size. The metadata schema includes: official name, date of adoption, nation or entity, category, colors used, layout pattern, and key symbols.</p>
   <h3>Why SVG Matters</h3>
   <p>Rendering flags as SVG rather than raster images (PNG, JPEG) enables computational analysis that would otherwise be impossible. Colors can be extracted precisely, proportions measured exactly, and design elements cataloged systematically. This is the difference between a flag gallery and a research instrument.</p>
   <h3>Analytical Applications</h3>
   <p>The dataset enabled the cross-cutting analyses presented in sections 1&ndash;6: the identification of three dominant color families, the mapping of the tricolor lineage from Netherlands to 55+ nations, the tracing of the Ottoman crescent to 22+ modern flags, and the statistical analysis of color frequency and layout patterns.</p>
   <div class="callout"><p>A flag collection becomes a research tool when it standardizes representation. The 294 SVGs in flags.fyi, with consistent metadata, enable the systematic pattern analysis that transforms vexillological observation into vexillological knowledge.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2><em>Category</em> Breakdown</h2></div>

   <div class="callout"><p>89% of the flags in the collection are national flags. Despite globalization, international organizations, and transnational movements, the flag remains fundamentally a tool of national identity. The nation-state still owns the flag.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Evolution</em> Chains</h2></div>
   <h3>What Evolution Chains Show</h3>
   <p>48 nations in the collection have two or more historical flag variants, creating diachronic sequences that reveal how national identity transforms over time. These "evolution chains" are the most analytically valuable feature of the dataset because they show flags not as static symbols but as living documents that regimes create, modify, and replace.</p>
   <h3>Chain Length Distribution</h3>
   <div class="feat-grid">

     <div class="feat"><h4>7 variants</h4><p>Germany: Holy Roman Empire through reunification. Two competing color traditions (democratic vs. imperial).</p></div>
     <div class="feat"><h4>6 variants</h4><p>Afghanistan: The most dramatic turnover. 6 fundamentally different designs in ~100 years.</p></div>
     <div class="feat"><h4>4 variants</h4><p>India, Iran, China, France, and others. Moderate evolution reflecting major political transitions.</p></div>

   <h3>Stability Correlates</h3>
   <p>Flag stability strongly correlates with political stability. Denmark has used essentially the same flag for 800 years. Switzerland's flag has been stable since 1841. Japan's Hinomaru has been in use since the 19th century. Conversely, nations with turbulent political histories (Afghanistan, Egypt, Germany) show frequent flag changes, each marking a regime transition.</p>
   <div class="callout"><p>Evolution chains are compressed political histories. A nation's flag timeline is a visual record of every revolution, conquest, independence movement, and regime change it has experienced. Read the flags, and you read the history.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>Egypt</em> &mdash; Most Variants</h2></div>

   <div class="callout"><p>Egypt's 10 flags are not random variations but deliberate repudiations. Each new regime erased its predecessor's flag as surely as it erased its predecessor's policies. The flag was the first thing to change because it was the most visible symbol of who held power.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Afghanistan</em> &mdash; Most Dramatic</h2></div>
   <h3>Six Flags in a Century</h3>

     <div class="feat"><h4>Mujahideen (1992&ndash;1996)</h4><p>Islamic green-white-black. The mujahideen flag represented the anti-Soviet resistance's victory.</p></div>

   <div class="callout"><p>Afghanistan's flag history is an extreme case of flags as regime instruments. When change is total &mdash; monarchy to communism, communism to theocracy &mdash; no element of the previous flag can survive. The Taliban's plain white flag was the ultimate expression: a flag that contained nothing but faith.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>Germany</em> &mdash; Identity Through Flags</h2></div>
   <h3>Two Competing Traditions</h3>
   <p>Germany's flag history is structured around a recurring tension between two color palettes, each carrying distinct political meaning:<span class="cite">[5]<span class="cite-tip">C-05: Wikipedia, &ldquo;Flag of Germany.&rdquo; 7 variants (Holy Roman Empire to reunification).</span></span></p>
   <div class="feat-grid">
     <div class="feat"><h4>Black-Red-Gold</h4><p>Democratic, liberal, republican. Origins: student fraternities (Burschenschaft) and the 1848 revolution. Used by: Weimar Republic, Federal Republic (West Germany), reunified Germany.</p></div>
     <div class="feat"><h4>Black-White-Red</h4><p>Imperial, conservative, authoritarian. Origins: Prussian black-white combined with Hanseatic red-white. Used by: German Empire (1871&ndash;1918), Third Reich (modified with swastika).</p></div>
   </div>
   <h3>The Reunification Choice</h3>
   <p>When Germany reunified in 1990, the choice of flag was itself a political statement. East Germany had used black-red-gold with a communist emblem (hammer-and-compass); West Germany used plain black-red-gold. Reunified Germany adopted the West German flag without modification &mdash; asserting that reunification was not a new beginning but a restoration of the democratic tradition that the 1848 revolutionaries had fought for.</p>
   <div class="callout"><p>Germany's flag history shows that color palettes carry ideological memory. Black-red-gold does not merely look different from black-white-red; it <em>means</em> differently. Every time Germany chose its flag, it was choosing which version of its history to claim.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2>What the <em>Data</em> Reveals</h2></div>
   <h3>Key Statistical Findings</h3>
   <p>Systematic analysis of all 294 flags produces findings that challenge common assumptions about flag design:</p>
   <div class="feat-grid">
     <div class="feat"><h4>60% Three Families</h4><p>Pan-Arab, Pan-African, and Pan-Slavic colors account for roughly 60% of all national flags. Flag design is far less diverse than it appears.</p></div>
     <div class="feat"><h4>Red Dominates</h4><p>Red appears in 148 flags (50.3%). White is close behind at 143. Blue at 107. These three colors alone appear in 80%+ of flags.</p></div>
     <div class="feat"><h4>Tricolor = Default</h4><p>55+ nations use the tricolor layout (horizontal or vertical). The format invented by the Dutch in 1572 and radicalized by France in 1794 remains the default choice.</p></div>
     <div class="feat"><h4>Crescent Lineage</h4><p>22+ flags carry the Ottoman crescent. This is the largest single-symbol lineage in vexillology, and all trace to one source.</p></div>
   </div>
   <h3>The Compressed Vocabulary</h3>
   <p>The most striking finding is the compression: 200+ nations, with vastly different histories and cultures, draw from a design vocabulary of roughly 12 layout patterns, 7 standard colors, and 3 dominant color families. The flags of the world are far more alike than they are different. This is not a failure of creativity but a reflection of how flags work: they must be instantly recognizable as flags, which means they must conform to established conventions even as they assert uniqueness.</p>
   <div class="callout"><p>The flags.fyi collection reveals that flag design is a constrained optimization problem: maximize distinctiveness while conforming to a shared visual grammar. The small vocabulary is not a bug but a feature &mdash; it is what makes flags legible as flags.</p></div>`,
