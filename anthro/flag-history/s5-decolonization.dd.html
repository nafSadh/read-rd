<body>
<script>
const sections = [
  { num: '01', short: 'Three Families', title: 'The <em>Three</em> Color Families' },
  { num: '02', short: 'Pan-Arab', title: '<em>Pan-Arab</em> Colors' },
  { num: '03', short: 'Pan-African', title: '<em>Pan-African</em> Colors' },
  { num: '04', short: 'Pan-Slavic', title: '<em>Pan-Slavic</em> Colors' },
  { num: '05', short: 'India', title: "<em>India's</em> Flag Evolution" },
  { num: '06', short: 'Year of Africa', title: 'The <em>Year</em> of Africa (1960)' },
  { num: '07', short: 'Identity', title: '<em>Flags</em> as Identity Creation' },
  { num: '08', short: 'Timeline', title: '<em>Decolonization</em> Timeline' }
];

const summaries = [
  `<p>Three color vocabularies dominate post-colonial flag design, together accounting for roughly 60% of all national flags. <a href="https://en.wikipedia.org/wiki/Pan-Arab_colors">Pan-Arab</a> (black/white/green/red, 22+ nations), <a href="https://en.wikipedia.org/wiki/Pan-African_colours">Pan-African</a> (green/yellow/red, 30+ nations), and <a href="https://en.wikipedia.org/wiki/Pan-Slavic_colors">Pan-Slavic</a> (blue/white/red, 12+ nations). Each traces to a single source.</p>
   <div class="diagram-wrap"><svg class="fig" viewBox="0 0 700 180" width="700" height="180">
<rect x="0" y="0" width="700" height="180" fill="var(--bg)" rx="8"/>
<text x="350" y="22" fill="var(--bright)" font-size="12" font-weight="600" text-anchor="middle" font-family="Jost,sans-serif">Pan-Movement Color Families</text>
<text x="120" y="48" fill="var(--text)" font-size="10" text-anchor="middle" font-family="Jost,sans-serif" font-weight="500">Pan-Arab</text>
<rect x="40" y="56" width="36" height="26" fill="#000" rx="2"/><rect x="80" y="56" width="36" height="26" fill="#fff" stroke="var(--border)" stroke-width="1" rx="2"/><rect x="120" y="56" width="36" height="26" fill="#007a3d" rx="2"/><rect x="160" y="56" width="36" height="26" fill="#ce1126" rx="2"/>
<text x="120" y="102" fill="var(--dim)" font-size="8" text-anchor="middle" font-family="IBM Plex Mono,monospace">22+ nations &middot; Arab Revolt 1916</text>
<text x="390" y="48" fill="var(--text)" font-size="10" text-anchor="middle" font-family="Jost,sans-serif" font-weight="500">Pan-African</text>
<rect x="320" y="56" width="36" height="26" fill="#078930" rx="2"/><rect x="360" y="56" width="36" height="26" fill="#fcdd09" rx="2"/><rect x="400" y="56" width="36" height="26" fill="#da121a" rx="2"/>
<text x="390" y="102" fill="var(--dim)" font-size="8" text-anchor="middle" font-family="IBM Plex Mono,monospace">30+ nations &middot; Ethiopian tricolor</text>
<text x="600" y="48" fill="var(--text)" font-size="10" text-anchor="middle" font-family="Jost,sans-serif" font-weight="500">Pan-Slavic</text>
<rect x="545" y="56" width="36" height="26" fill="#003893" rx="2"/><rect x="585" y="56" width="36" height="26" fill="#fff" stroke="var(--border)" stroke-width="1" rx="2"/><rect x="625" y="56" width="36" height="26" fill="#d00" rx="2"/>
<text x="600" y="102" fill="var(--dim)" font-size="8" text-anchor="middle" font-family="IBM Plex Mono,monospace">12+ nations &middot; Russian tricolor</text>
<line x1="50" y1="130" x2="650" y2="130" stroke="var(--border)" stroke-width="1"/>
<text x="350" y="155" fill="var(--dim)" font-size="9" text-anchor="middle" font-family="IBM Plex Mono,monospace">Together these 3 color families account for ~60% of all national flags</text>
</svg></div>
   <div class="s-stat"><span class="sv">~60%</span><span class="sl">Flags Covered</span></div>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Color Families</span></div>`,

  `<p>The Pan-Arab colors &mdash; black, white, green, and red &mdash; derive from the flag flown by Sharif Hussein during the 1916 Arab Revolt against Ottoman rule.<span class="cite">[1]<span class="cite-tip">D-01: Wikipedia, &ldquo;Pan-Arab colors.&rdquo; Black/white/green/red from 1916 Arab Revolt, Hashemite origin.</span></span> Each color encodes a dynasty of Islamic history: black (Abbasid Caliphate), white (Umayyad Caliphate), green (Fatimid Caliphate), and red (Hashemite dynasty). These four colors now appear in the flags of 22+ Arab nations.</p>
   <div class="s-stat"><span class="sv">1916</span><span class="sl">Arab Revolt</span></div>
   <div class="s-stat"><span class="sv">22+</span><span class="sl">Nations</span></div>
   <div class="s-stat"><span class="sv">4</span><span class="sl">Dynasties</span></div>
   <p>The flag of Jordan, Iraq, Palestine, UAE, Kuwait, Sudan, Egypt, and Syria all use these colors in various combinations, encoding 1,300 years of Islamic history in their cloth.</p>`,

  `<p>Ethiopia &mdash; the only African nation never colonized (except for a brief Italian occupation 1936&ndash;41) &mdash; became the symbolic source of Pan-African identity.<span class="cite">[2]<span class="cite-tip">D-02: Wikipedia, &ldquo;Pan-African colours.&rdquo; Green/yellow/red from Ethiopian tricolor, 30+ nations.</span></span> Its green-yellow-red tricolor was adopted, with variations, by 30+ sub-Saharan nations. Ghana (1957), the first sub-Saharan colony to gain independence, added a black star to the Ethiopian colors.</p>
   <div class="s-stat"><span class="sv">30+</span><span class="sl">Nations</span></div>
   <div class="s-stat"><span class="sv">1957</span><span class="sl">Ghana First</span></div>
   <div class="s-stat"><span class="sv">17</span><span class="sl">Nations in 1960</span></div>
   <p>Ghana's flag became a template for the wave of independence that followed: 17 nations in 1960 alone, many adopting green-yellow-red with local variations to signal both continental solidarity and national distinctiveness.</p>`,

  `<p>The Pan-Slavic colors &mdash; blue, white, and red &mdash; derive from the Russian tricolor, itself influenced by the Dutch flag (see <a href="s4-revolution.dd.html">S4</a>).<span class="cite">[3]<span class="cite-tip">D-03: Wikipedia, &ldquo;Pan-Slavic colors.&rdquo; Blue/white/red from Russian tricolor, 12+ nations.</span></span> Adopted by 12+ Slavic nations including Russia, Serbia, Czech Republic, Slovakia, Slovenia, and Croatia (with variations), the Pan-Slavic palette signals cultural kinship rooted in shared linguistic and historical heritage.</p>
   <div class="s-stat"><span class="sv">12+</span><span class="sl">Nations</span></div>

  `<p>India's tricolor evolved through four versions over 40 years:<span class="cite">[4]<span class="cite-tip">D-04: Wikipedia, &ldquo;Flag of India.&rdquo; Four-stage evolution: Calcutta 1906 &rarr; Swaraj 1921 &rarr; INC 1931 &rarr; India 1947.</span></span> the Calcutta Flag (1906, red-yellow-green), the Swaraj Flag (1921, white-green-red with spinning wheel), the INC flag (1931, saffron-white-green with Gandhi's charkha), and the final design (1947) replacing the spinning wheel with the Ashoka Chakra &mdash; a 24-spoke wheel from the 3rd-century BCE Ashoka Pillar.</p>

  `<p>1960 was the "Year of Africa" &mdash; 17 nations gained independence in a single year, each requiring a new flag.<span class="cite">[5]<span class="cite-tip">D-06: Wikipedia, &ldquo;Year of Africa (1960).&rdquo; 17 nations gained independence, each designing new flags.</span></span> The speed of decolonization created an unprecedented flag design challenge: how does a nation create a distinctive national symbol when its neighbors are designing theirs simultaneously, using the same Pan-African color palette?</p>
   <div class="s-stat"><span class="sv">17</span><span class="sl">Nations in 1960</span></div>

  `<p>Decolonization flags reveal a pattern in the relationship between flags and national identity: the flag does not merely represent a pre-existing nation but helps <em>create</em> it. A newly independent state needs a flag before it needs a constitution because the flag performs the act of nation-creation. It makes the new state visible, tangible, and real.</p>

  `<p>The decolonization era spans roughly 1916 (Arab Revolt) through the mid-1970s (Portuguese colonial collapse), with the most intense period being 1947&ndash;1968. During this period, the global flag landscape was transformed as dozens of colonial flags were replaced by new national designs.</p>

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The <em>Three</em> Color Families</h2></div>
   <h3>Concentration, Not Diversity</h3>
   <p>One of the most striking findings from analyzing the flags.fyi collection is how <em>concentrated</em> national flag design actually is. Despite having effectively unlimited design options, roughly 60% of national flags draw their color palettes from just three sources: the 1916 Arab Revolt (Pan-Arab), the Ethiopian tricolor (Pan-African), and the Russian tricolor (Pan-Slavic). This concentration suggests that flag design is far less creative than it appears.</p>
   <h3>Why Three Families?</h3>
   <p>Each color family originated in a specific political context but persisted because it solved a real problem: how does a newly independent nation signal its identity? By choosing colors from a recognized family, a new flag simultaneously declares sovereignty (we are independent), solidarity (we belong to this cultural group), and legitimacy (we draw on this historical tradition). Three messages in three colors.</p>
   <h3>The Tension</h3>
   <p>Pan-movement colors create an inherent tension between solidarity and distinctiveness. Using Pan-African green-yellow-red declares "we are African" but makes it harder to answer "which African nation?" This tension is unresolvable because flags simultaneously need to signal group membership and individual identity. The design solutions &mdash; different stripe orientations, added symbols, modified shades &mdash; are all attempts to balance these competing demands.</p>
   <div class="callout"><p>The dominance of three color families across 60% of national flags reveals that flag design is fundamentally a social act, not an artistic one. Nations choose colors that place them within a recognized community, not colors that maximize visual uniqueness. Belonging matters more than distinction.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2><em>Pan-Arab</em> Colors</h2></div>
   <h3>The Arab Revolt Flag</h3>
   <p>The flag flown by Sharif Hussein ibn Ali during the 1916 Arab Revolt against Ottoman rule used four colors, each representing a historical Arab dynasty: black for the Abbasid Caliphate (750-1258), white for the Umayyad Caliphate (661-750), green for the Fatimid Caliphate (909-1171), and red for the Hashemite dynasty (Hussein's own family). The flag encoded 1,300 years of Islamic history in four stripes.</p>
   <h3>Diffusion Pattern</h3>
   <p>Pan-Arab colors spread through two mechanisms: direct Hashemite influence (Jordan, Iraq) and ideological adoption by Arab nationalist movements (Egypt under Nasser, Syria, Libya). The colors were explicitly promoted by pan-Arabist intellectuals as markers of shared Arab identity transcending colonial borders.</p>
   <h3>Modern Distribution</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Four-Color Flags</h4><p>Jordan, Palestine, UAE, Kuwait, Sudan: all four pan-Arab colors present, arranged in different patterns.</p></div>
     <div class="feat"><h4>Three-Color Flags</h4><p>Iraq, Syria, Egypt, Yemen: subsets of pan-Arab colors, often with added emblems (eagles, stars, Quranic text).</p></div>
     <div class="feat"><h4>Modified Palette</h4><p>Libya, Saudi Arabia: green dominant, with pan-Arab associations but distinctive local elements (shahada, sword).</p></div>
     <div class="feat"><h4>Diaspora</h4><p>Pan-Arab colors appear in protest flags, organization banners, and the flags of unrecognized states (Western Sahara).</p></div>
   </div>
   <div class="callout"><p>The Pan-Arab color system is unique in encoding specific historical dynasties in specific colors. Unlike Pan-African or Pan-Slavic colors, which have symbolic or aesthetic rationales, each Pan-Arab color refers to a named caliphate. The flag is a compressed history lesson.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Pan-African</em> Colors</h2></div>
   <h3>The Ethiopian Source</h3>
   <p>Ethiopia's green-yellow-red tricolor served as the symbolic source of Pan-African identity for a simple reason: Ethiopia was the only African nation that was never colonized (the brief Italian occupation of 1936-41 notwithstanding). For African independence movements, Ethiopia's ancient sovereignty and its tricolor represented what Africa could be: self-governing, proud, and free.</p>
   <h3>Ghana: The Template</h3>
   <p>When Ghana became the first sub-Saharan colony to gain independence (1957), Kwame Nkrumah deliberately adopted the Ethiopian colors with one addition: a black star, representing African emancipation and unity. Ghana's flag became the template for the wave of independence that followed, and many newly independent nations adopted variations of green-yellow-red-plus-symbol.</p>
   <h3>The 30+ Nation Family</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Direct Ethiopian</h4><p>Ethiopia, Ghana, Cameroon, Senegal, Mali, Guinea, Guinea-Bissau: green-yellow-red in recognizable form.</p></div>
     <div class="feat"><h4>Modified Order</h4><p>Some nations rearranged the stripe order or changed proportions while keeping the essential palette.</p></div>
     <div class="feat"><h4>Added Symbols</h4><p>Stars (Ghana, Burkina Faso), crescents (Mauritania), eagles (Zimbabwe), machetes (Mozambique).</p></div>
     <div class="feat"><h4>Expanded Palette</h4><p>Some added black (representing the African people) or modified green/red shades for distinction.</p></div>
   </div>
   <h3>Marcus Garvey Alternative</h3>
   <p>A parallel Pan-African color tradition derives from Marcus Garvey's Universal Negro Improvement Association (UNIA, founded 1914), which used red-black-green. These colors appear in several African and Caribbean flags, sometimes overlapping with the Ethiopian tradition. The two traditions share the aspiration but differ in their specific color assignments.</p>
   <div class="callout"><p>Ethiopia's unique status as the only uncolonized African nation made its tricolor the natural symbol of Pan-African aspiration. The green-yellow-red palette became more than a color scheme; it became a declaration of belief in African self-determination.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>Pan-Slavic</em> Colors</h2></div>
   <h3>Russian Origins</h3>
   <p>The Pan-Slavic color palette derives from the Russian tricolor (white-blue-red), which was itself influenced by the Dutch flag when Peter the Great visited the Netherlands in 1699. Notably, the colors that symbolize Slavic identity trace back to a Western European naval flag, filtered through Russian imperial adoption.</p>
   <h3>The Prague Congress (1848)</h3>
   <p>The Pan-Slavic Congress held in Prague in June 1848 formalized the use of blue, white, and red as markers of Slavic cultural identity. The congress took place during the revolutionary wave sweeping Europe, and the adoption of a shared color palette was explicitly modeled on the Pan-German movement's black-red-gold.</p>
   <h3>Modern Distribution</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Direct Russian Model</h4><p>Russia (white-blue-red), Serbia (red-blue-white), Slovakia (white-blue-red with coat of arms): closest to the original.</p></div>
     <div class="feat"><h4>Modified Arrangement</h4><p>Czech Republic (white-red with blue triangle), Slovenia (white-blue-red with coat of arms), Croatia (red-white-blue with checkered shield).</p></div>
     <div class="feat"><h4>Distant Relatives</h4><p>Bulgaria (white-green-red) and others incorporate Pan-Slavic elements while adding distinctive national colors.</p></div>
     <div class="feat"><h4>Non-Slavic Influence</h4><p>The French tricolor's blue-white-red overlaps with Pan-Slavic colors, creating ambiguity for some flags (Luxembourg, Netherlands).</p></div>
   </div>
   <div class="callout"><p>The Pan-Slavic color family is the oldest of the three pan-movement palettes (formalized 1848, vs. 1916 for Pan-Arab and 1957 for Pan-African) and the most internally varied, with each Slavic nation significantly modifying the base palette to assert national distinctiveness within the Slavic family.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>India's</em> Flag Evolution</h2></div>
   <h3>Calcutta Flag (1906)</h3>
   <p>The first Indian national flag, raised in Calcutta (now Kolkata) during the Swadeshi movement, used red, yellow, and green horizontal stripes with religious symbols (lotus, crescent, sun) representing Hinduism, Islam, and Buddhism. The design attempted to represent India's religious diversity but was criticized for being too Hindu-centric in its symbolism.</p>
   <h3>Swaraj Flag (1921)</h3>
   <p>Mahatma Gandhi proposed a new flag with white, green, and red stripes (later changed to saffron-white-green) centered on a spinning wheel (charkha). The charkha represented Gandhian self-sufficiency and the cottage industries movement. The colors evolved from religious representation to secular ideals: saffron for courage, white for truth, green for faith.</p>
   <h3>INC Flag (1931)</h3>
   <p>The Indian National Congress formally adopted the saffron-white-green tricolor with the charkha at its Karachi session in 1931. This flag flew over the independence movement for 16 years, becoming deeply associated with the struggle against British rule.</p>
   <h3>Modern India (1947)</h3>
   <p>At independence, the Constituent Assembly replaced Gandhi's spinning wheel with the Ashoka Chakra &mdash; a 24-spoke wheel of dharma from Emperor Ashoka's 3rd-century BCE pillar at Sarnath. This shift was profoundly symbolic: from Gandhian economic self-sufficiency to ancient Buddhist universalism. The 24 spokes represent the 24 hours of the day (eternal vigilance) or the 24 qualities of dharma.</p>
   <h3>The Symbolic Shift</h3>
   <p>India's flag evolution is the best-documented case of how a national flag can be deliberately redesigned to encode shifting political priorities. Each of the four versions responded to specific political needs: religious unity (1906), economic resistance (1921), independence movement identity (1931), and post-colonial statehood (1947).</p>
   <div class="callout"><p>India's flag journey &mdash; from spinning wheel to Ashoka Chakra &mdash; represents a shift from Gandhian self-sufficiency to ancient Buddhist universalism. The change was subtle but profound: a reframing of national identity from economic resistance to civilizational continuity.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2>The <em>Year</em> of Africa (1960)</h2></div>
   <h3>17 Nations in One Year</h3>
   <p>1960 saw the largest single-year wave of flag creation in history. Seventeen African nations gained independence, each needing a new national flag immediately: Cameroon, Senegal, Togo, Mali, Madagascar, Congo (Leopoldville), Somalia, Benin, Niger, Burkina Faso, Ivory Coast, Chad, Central African Republic, Congo (Brazzaville), Gabon, Mauritania, and Nigeria.</p>
   <h3>The Design Challenge</h3>
   <p>These nations faced a unique vexillological challenge: how does a nation create a distinctive flag when 16 of its neighbors are simultaneously designing flags from the same Pan-African color palette? The solutions reveal remarkable creativity within tight constraints:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Stripe Variation</h4><p>Vertical vs. horizontal stripes, different proportions, different color orders. Mali (vertical green-yellow-red) vs. Guinea (vertical red-yellow-green).</p></div>
     <div class="feat"><h4>Added Symbols</h4><p>Stars, crescents, suns, eagles, trees. Nigeria chose green-white-green (no Pan-African red/yellow).</p></div>
     <div class="feat"><h4>Color Shade</h4><p>Subtle differences in green, yellow, and red shades helped distinguish similar designs.</p></div>
     <div class="feat"><h4>Unique Layouts</h4><p>Some nations broke from the tricolor format entirely: Somalia (blue with white star), Mauritania (green with gold crescent).</p></div>
   </div>
   <h3>Romania-Chad Problem</h3>
   <p>The constraints of limited color palettes created identical or near-identical flags. Chad (1959) and Romania (1848) ended up with virtually indistinguishable blue-yellow-red vertical tricolors, despite having entirely unrelated histories. This collision illustrates the mathematical limits of flag distinctiveness within color family constraints.</p>
   <div class="callout"><p>The Year of Africa was the most intense period of flag creation in human history: 17 new nations, 17 new flags, most drawn from the same three-color palette. The resulting designs are a masterclass in achieving distinctiveness within shared constraints.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2><em>Flags</em> as Identity Creation</h2></div>
   <h3>The Constitutive Thesis</h3>
   <p>The standard view of flags is <em>representational</em>: a nation exists, and its flag represents it. The decolonization experience suggests a more radical thesis: flags are <em>constitutive</em> &mdash; they help create the national identities they supposedly merely represent. Evidence for this thesis includes:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Temporal Priority</h4><p>Independence flags are designed before constitutions, governments, and legal systems. The flag comes first because it performs what documents describe.</p></div>
     <div class="feat"><h4>Emotional Power</h4><p>Seeing a new flag fly for the first time creates a visceral experience of nationhood that no legal document can match.</p></div>
     <div class="feat"><h4>Boundary Drawing</h4><p>Flags define who belongs (under this flag) and who doesn't. Colonial flags imposed alien identity; new flags declared indigenous identity.</p></div>
     <div class="feat"><h4>Mythmaking</h4><p>Flag design involves choosing which historical traditions to claim and which to reject. This selection process actively constructs national narrative.</p></div>
   </div>
   <h3>Pan-Movement Implications</h3>
   <p>Pan-movement colors add another dimension: they create <em>supranational</em> identity. A flag using Pan-African colors doesn't just say "we are Ghana" but also "we are African." The flag constructs multiple nested identities simultaneously: national (Ghana), continental (Africa), and ideological (anti-colonial, self-determined).</p>
   <h3>Regime Change and Flag Change</h3>
   <p>The constitutive thesis explains why regime changes almost always involve flag changes. Afghanistan has had 6 flags in 100 years; Germany 7; Iran 7. Each new flag doesn't merely represent a new regime but helps <em>create</em> it by making the political change visible and tangible. To change the flag is to change the nation.</p>
   <div class="callout"><p>Flags do not merely represent nations; they help create them. This constitutive function &mdash; the flag as an act of nation-creation rather than a symbol of a pre-existing nation &mdash; is a central insight of the decolonization era and a key principle in the study of vexillology.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2><em>Decolonization</em> Timeline</h2></div>
   <h3>Key Dates</h3>
   <div class="timeline">
     <div class="tl-item"><span class="tl-date">1916</span><span class="tl-text">Arab Revolt &mdash; Sharif Hussein's flag establishes Pan-Arab colors (black/white/green/red)</span></div>

     <div class="tl-item"><span class="tl-date">1975</span><span class="tl-text">Portuguese colonies gain independence &mdash; Angola, Mozambique, Guinea-Bissau, Cape Verde</span></div>
     <div class="tl-item"><span class="tl-date">1990</span><span class="tl-text">Namibia &mdash; one of the last African colonies to gain independence</span></div>
   </div>
   <h3>Cross-References</h3>
   <p>The decolonization era's flags were reactions against the colonial flags of the empire period (<a href="s3-empire.dd.html">S3</a>) and continuations of the revolutionary tricolor tradition (<a href="s4-revolution.dd.html">S4</a>). The design patterns they established are analyzed systematically in <a href="s6-design.dd.html">S6: Design Patterns & Symbolism</a>. The flags.fyi collection documents many of these flags with their historical variants (<a href="s7-collection.dd.html">S7</a>).</p>
   <div class="callout"><p>The decolonization era transformed the global flag landscape more profoundly than any other period. In roughly three decades (1947-1975), the flags of approximately 60 nations were replaced, creating the Pan-Arab, Pan-African, and Pan-Slavic color families that account for the majority of the world's national flags today.</p></div>`

function toggleTheme(){const c=document.body.getAttribute('data-theme');document.body.setAttribute('data-theme',c==='light'?'dark':'light');localStorage.setItem('theme',c==='light'?'dark':'light')}
const savedTheme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',savedTheme);
mainScroll.addEventListener('scroll',()=>{document.querySelector('.main-head').classList.toggle('compact',mainScroll.scrollTop>40);const blocks=mainScroll.querySelectorAll('.section-block');const items=document.querySelectorAll('.sidebar-item');let activeIdx=0;blocks.forEach((b,i)=>{if(b.getBoundingClientRect().top<mainScroll.getBoundingClientRect().top+120)activeIdx=i});items.forEach((item,i)=>item.classList.toggle('active',i===activeIdx))});
const rightPanelOuter=document.getElementById('right');const stickyTitle=document.getElementById('right-sticky-title');rightPanelOuter.addEventListener('scroll',()=>{const activeDetail=rightPanelOuter.querySelector('.detail[style*="display: block"],.detail[style*="display:block"]');if(!activeDetail)return;const h2=activeDetail.querySelector('.detail-header h2')||activeDetail.querySelector('h2');if(!h2)return;const rect=h2.getBoundingClientRect();const panelRect=rightPanelOuter.getBoundingClientRect();const topbar=document.querySelector('.right-topbar');if(rect.bottom<panelRect.top+56){stickyTitle.textContent=h2.textContent;stickyTitle.classList.add('visible');topbar.classList.add('scrolled')}else{stickyTitle.classList.remove('visible');topbar.classList.remove('scrolled')}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeRight()});
