<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History &amp; Evolution of Flags — flags.fyi Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:inline-flex;gap:0;margin:4px 4px 4px 0;border:1px solid var(--border);text-align:center;padding:10px 14px;flex-direction:column;vertical-align:top}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls);display:block}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans);display:block}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap .caption{display:block;font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:10px;letter-spacing:.3px;line-height:1.5}
.diagram-wrap svg.fig{width:100%;height:auto}.diagram-wrap svg:not(.fig){max-width:120px;height:auto;flex-shrink:0}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:16px 0;border:1px solid var(--border)}
.price-card{border-right:1px solid var(--border);padding:18px 12px;text-align:center;background:none;border-radius:0}
.price-card:last-child{border-right:none}.price-card.hl{background:var(--accent-soft)}
.price-card h4{font-size:var(--price-h4-size);font-weight:var(--body-weight);color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--price-h4-ls);font-family:var(--sans)}
.price-card .price{font-family:var(--serif);font-size:var(--price-val-size);color:var(--bright);font-weight:var(--heading-weight);font-style:italic;letter-spacing:var(--price-val-ls)}
.price-card .pn{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--sans)}

@media(max-width:1000px){
  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}
  .ctrl-btn{width:32px;height:32px;font-size:14px}
  .shell{display:block;position:relative}
  .main{height:100vh;width:100%}
  .main-head{padding:20px 20px 0}
  .hero-title{font-size:28px!important;letter-spacing:0!important}
  .masthead-sub{flex-direction:column;gap:2px}
  .main-head.compact{padding:0 20px;height:44px}
  .main-head.compact .hero-title{font-size:18px!important}
  .main-scroll{padding:0 20px 80px}
  .section-block{padding:28px 8px}
  .right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}
  .right:not(.closed){transform:translateX(0)}
  .right-inner{padding:0 20px 80px}
  .right-topbar{padding:10px 20px 0;height:44px}
  .detail-header h2{font-size:26px!important}
  .feat-grid,.verdict,.price-grid{grid-template-columns:1fr}
  .feat{border-left:none!important;padding-left:0!important}
  .feat:nth-child(2n){padding-left:0}
  .v-col{padding:16px 0!important}
  .v-col:last-child{border-left:none!important;padding-left:0!important}
  .price-card{border-right:none!important;border-bottom:1px solid var(--border)}.price-card:last-child{border-bottom:none}
  .tl-item{flex-direction:column!important;gap:4px}
  .tl-date{min-width:unset!important}
  .detail p{font-size:16px}
  .detail pre{font-size:12px;padding:14px 16px}
  .section-block .s-stat{margin:3px 3px 3px 0;padding:8px 10px}
}

  /* Links */
  a{color:var(--dim);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--dim),transparent 50%);transition:color .2s,border-color .2s}
  a:hover{color:var(--accent);border-bottom-color:var(--accent);border-bottom-style:solid}
  .detail a{color:var(--text);border-bottom-color:color-mix(in srgb,var(--accent),transparent 60%)}
  .detail a:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .section-block a{color:var(--text);border-bottom-color:color-mix(in srgb,var(--accent),transparent 60%)}
  .section-block a:hover{color:var(--accent);border-bottom-color:var(--accent)}

</head>

  `<p>The oldest known vexilloid—the Shahdad Standard (c. 2400 BCE)—was discovered in Iran in 1975, predating Egyptian standards by over a millennium. Made of copper and leather, it established a pattern: flags began as unique sacred objects, not mass-produced symbols. From Persian standards through Egyptian <em>shedshed</em> poles to the Roman <em>vexillum</em>, ancient flags served military identification before evolving into symbols of sovereign power. Constantine's <em>labarum</em> (312 CE) merged pagan military tradition with Christian symbolism, foreshadowing millennia of flags as ideological statements.</p>

   <p>The Roman <em>aquila</em> (eagle standard) was sacred—losing it in battle was the deepest shame, and legions were dispatched years later to recover captured eagles. The <em>vexillum</em> hung beneath the eagle as the primary battlefield signal, its square cloth shape becoming the ancestor of all modern flags. The Sassanid <em>Derafsh Kaviani</em>, allegedly created by a blacksmith during a revolt, may be history's first revolutionary standard.</p>`,

  `<p>The Crusades (1095–1291) transformed flags from functional military markers into a systematic visual language. Knights in identical armor needed instant identification, spawning heraldic science: strict rules governing color combinations, charge placement, and inheritance. The Kingdom of Jerusalem's flag broke heraldic convention—gold on white (metal on metal)—as a deliberate assertion of divine exception. Pennons (triangular, carried by knights), banners (square, carried by lords), and gonfalons (suspended from crossbars) each signaled different rank and authority.</p>

   <div class="s-stat"><span class="sv">1095</span><span class="sl">First Crusade</span></div>
   <div class="s-stat"><span class="sv">~1200</span><span class="sl">Heraldry Codified</span></div>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Flag Types</span></div>
   <div class="s-stat"><span class="sv">1219</span><span class="sl">Dannebrog Origin</span></div>
   <p>The Danish Dannebrog (1219) is the oldest continuously used national flag. According to legend, it fell from the sky during the Battle of Lyndanisse. In reality, it likely derives from Crusader crosses—but the myth matters as much as the history. The Dannebrog's Nordic cross (offset left) spawned an entire family of Scandinavian flags that persists unchanged today.</p>`,

  `<p>The Ottoman Empire's adoption of the crescent and star on a red field created one of the most influential flag motifs in history. At its peak, Ottoman sovereignty extended across three continents, and the crescent symbol spread to every corner of the Islamic world. Today, 22+ nations carry some form of crescent on their flags—from Turkey and Tunisia to Pakistan and Malaysia. Meanwhile, European colonial powers imposed their own flags across 25% of the globe: the British Union Jack, French Tricolor, Dutch Prinsenvlag, Spanish Cross of Burgundy, and Portuguese coat of arms flew from the Americas to Southeast Asia.</p>

</svg><span class="caption">Ottoman crescent lineage — how one motif shaped 22+ national flags</span></div>`,

  `<p>The French Revolution's blue-white-red tricolor (1794) was arguably the most influential flag design in history. Its three vertical stripes represented a radical new idea: that a nation belongs to its people, not its monarch. Within decades, revolutionary movements worldwide adopted the tricolor format, adapting France's template with their own colors: Italy (green-white-red, 1797), Ireland (green-white-orange, 1848), Romania (blue-yellow-red, 1848), and dozens of Latin American nations. Today, 55+ national flags use a tricolor layout.</p>
   <div class="diagram-wrap" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px;">
     <svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 900 600"><path fill="#CE1126" d="M0 0h900v600H0"/><path fill="#fff" d="M0 0h600v600H0"/><path fill="#002654" d="M0 0h300v600H0"/></svg><span style="font-size:20px;color:var(--dim)">→</span>

     <span class="caption" style="width:100%">France → Italy → Ireland → Romania: the tricolor lineage</span>

   <p>The Netherlands' Prinsenvlag (1572)—the first tricolor—technically preceded France. But it was the French Revolution that transformed three stripes from a Dutch naval convenience into a universal symbol of popular sovereignty and republican ideals.</p>

  `<p>The post-World War II era saw the most rapid expansion of nation-states in history: over 50 nations gained independence between 1945 and 1975, with 17 African nations in 1960 alone. Rather than designing from first principles, most drew upon three established color vocabularies rooted in anti-colonial solidarity. The Pan-Arab colors (black, white, green, red) derive from the flag flown during the 1916 Arab Revolt against Ottoman rule. The Pan-African colors (green, yellow, red) were inspired by Ethiopia's ancient tricolor. The Pan-Slavic colors (blue, white, red) originated from the Russian tricolor.</p>

     <h2><em>Ancient</em> Origins</h2>
   </div>
   <h3>The Shahdad Standard (c. 2400 BCE)</h3>
   <p>Unearthed in 1975 in southeastern Iran, the Shahdad Standard consists of hollow copper pieces soldered together, decorated with what may have been semi-precious stones. Its exact symbolism remains unknown, but its construction speaks to considerable wealth—this was not mass-produced, suggesting it carried profound significance for the ruling elite. Unlike later cloth flags, the Shahdad Standard was a rigid, three-dimensional object, more akin to a scepter than a banner.</p>

   <h3>Egyptian Standards (c. 1500 BCE)</h3>
   <p>Egyptian military and religious processions featured <em>shedshed</em>—tall wooden poles topped with carved symbols of the <em>nomes</em> (provinces). Each of Egypt's 42 nomes had its own distinctive standard, often featuring animals (falcons, jackals, ibises) or abstract symbols. These were carried in pairs during religious processions and military campaigns, serving simultaneously as provincial identification, religious symbols, and military rally points.</p>

   <h3>Roman Military Standards (100 BCE – 312 CE)</h3>
   <p>The Romans brought unprecedented standardization. Every legion carried an <em>aquila</em>—a gilded bronze eagle that was sacred, the spiritual embodiment of the legion itself. To lose the aquila in battle was the deepest shame; Emperor Augustus reportedly banged his head against doorframes crying "give me back my legions" after three legions lost their eagles at Teutoburg Forest (9 CE). Armies were dispatched years later to recover captured eagles.</p>
   <p>Beneath the aquila hung the <em>vexillum</em>, a square or rectangular cloth bearing the unit's numeral. The <em>vexillarius</em> (standard bearer) carried this cloth standard visible at great distance, serving as the primary battlefield signal for troop movements. Fragments have been recovered along the Rhine and Danube frontiers.</p>

   <div class="callout"><p>The word <em>vexillology</em>—the study of flags—derives directly from the Latin <em>vexillum</em>. Coined by Whitney Smith in 1961, it drew flag study into formal academic recognition. The square vexillum shape became the ancestor of all modern national flags.</p></div>

   <h3>Constantine's Labarum (312 CE)</h3>
   <p>Constantine's adoption of the <em>labarum</em> marked the fusion of pagan military tradition with Christian symbolism. The Chi-Rho monogram (☧) surmounted a cross, and the cloth banner bore the first Christian emblem carried into battle. This was the moment flags became ideological: a statement of belief, not just identity.</p>

   <h3>The Derafsh Kaviani (Sassanid Persia)</h3>
   <p>Persian sources describe this as the royal standard from perhaps the 7th century BCE through the Arab conquest of 651 CE. According to legend, it was created by the blacksmith Kaveh during a revolt against tyranny—possibly history's first <em>revolutionary</em> standard. Later Islamic dynasties adopted similar iconography to claim succession to Sassanid legitimacy, establishing the principle that flags carry historical authority.</p>

     <div class="tl-item"><span class="tl-date">c. 100 BCE</span><span class="tl-text">Roman <em>aquila</em> and <em>vexillum</em> standardized across legions</span></div>
     <div class="tl-item"><span class="tl-date">312 CE</span><span class="tl-text">Constantine's <em>labarum</em> — first Christian military standard</span></div>
     <div class="tl-item"><span class="tl-date">c. 651 CE</span><span class="tl-text">Derafsh Kaviani lost to Arab conquest — end of Sassanid standards</span></div>
   </div>`,

  `<div class="detail-header">
     <div class="num">02</div>
     <h2>The <em>Heraldic</em> Age</h2>
   </div>
   <h3>Why Heraldry Was Invented</h3>
   <p>The Crusades created a practical crisis: thousands of armored knights, visually identical, fighting in chaotic melee combat. The solution was heraldry—a codified system of colors, charges (symbols), and divisions applied to shields, surcoats, and flags. By the mid-12th century, heraldic science had developed strict rules: the Rule of Tincture prohibited placing metal on metal (gold on silver) or color on color, ensuring visibility at distance. Every element had meaning, and every combination was unique.</p>

   <h3>The Kingdom of Jerusalem</h3>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 1200 800"><rect width="1200" height="800" fill="#fff"/><rect width="1200" height="800" fill="none" stroke="#ccc" stroke-width="2"/><g transform="translate(600,400)" fill="none" stroke="#ffd700" stroke-width="12"><line x1="0" y1="-180" x2="0" y2="180"/><line x1="-240" y1="0" x2="240" y2="0"/><line x1="-120" y1="-100" x2="-120" y2="100"/><line x1="120" y1="-100" x2="120" y2="100"/><line x1="-60" y1="-100" x2="60" y2="-100"/><line x1="-60" y1="100" x2="60" y2="100"/></g></svg><span class="caption">Kingdom of Jerusalem — gold crosses on white (metal on metal)</span></div>
   <p>The most famous exception to the Rule of Tincture: the Kingdom of Jerusalem's flag placed gold crosses on a white (silver) field—metal on metal, deliberately breaking convention. This was a theological statement: the kingdom's claim to divine legitimacy transcended human heraldic rules. The Jerusalem cross (one large cross surrounded by four smaller crosses) represented Christ and the four gospels, or alternatively the five wounds of Christ.</p>

   <h3>Types of Heraldic Flags</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Pennon</h4><p>Triangular flag carried by individual knights. Pointed, swallow-tailed, or with two tails. Personal arms only.</p></div>
     <div class="feat"><h4>Banner</h4><p>Square or rectangular. Carried by lords and higher nobles. Displayed the full coat of arms.</p></div>
     <div class="feat"><h4>Gonfalon</h4><p>Suspended from a horizontal bar. Often used by cities and religious orders. Multiple tails at bottom.</p></div>
     <div class="feat"><h4>Standard</h4><p>Long tapering flag with multiple elements: national cross at hoist, livery colors, motto, and badge.</p></div>
   </div>

   <h3>The Danish Dannebrog (1219)</h3>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="120" height="91" viewBox="0 0 37 28"><path fill="#c8102e" d="M0,0H37V28H0Z"/><path stroke="#fff" stroke-width="4" d="M0,14h37M14,0v28"/></svg><span class="caption">Denmark's Dannebrog — the world's oldest continuously used national flag</span></div>
   <p>According to legend, a red flag with a white cross fell from the sky during the Battle of Lyndanisse (1219), turning the tide for Danish crusaders. The reality is likely more prosaic—the design probably derives from Crusader crosses—but the myth matters as much as the history. The Dannebrog established the Nordic cross pattern: a cross offset to the hoist side, which would later be adopted by Sweden, Norway, Finland, Iceland, and the Faroe Islands.</p>

   <div class="callout"><p>The Dannebrog (1219) remains in continuous use today—over 800 years. It spawned the entire Nordic cross family, connecting Denmark, Sweden, Norway, Finland, and Iceland through a shared visual grammar that transcends political boundaries.</p></div>`,

  `<div class="detail-header">
     <div class="num">03</div>
     <h2><em>Empire</em> & Conquest</h2>
   </div>
   <h3>The Ottoman Crescent</h3>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 1200 800"><rect width="1200" height="800" fill="#E30A17"/><circle cx="425" cy="400" r="225" fill="#ffffff"/><circle cx="500" cy="400" r="180" fill="#E30A17"/><path fill="#FFFFFF" d="m589 401 72-27 3-77 48 60 74-21-43 64 43 64-74-21-48 60-3-77z"/></svg><span class="caption">Ottoman Empire flag — crescent and star on red, adopted c. 1844</span></div>
   <p>The Ottoman crescent and star, formally adopted on a red field around 1844, became the most influential Islamic flag symbol. The crescent predates Islam—it was associated with the ancient city of Byzantium—but Ottoman adoption made it synonymous with the Islamic world. At the empire's height (16th–17th centuries), Ottoman sovereignty stretched from the gates of Vienna to Yemen, from Algeria to Iraq.</p>

</svg><span class="caption">The Ottoman crescent lineage — how one symbol shaped the flags of 22+ nations</span></div>
   <p>When the Ottoman Empire dissolved after World War I, its successor states and former provinces retained or adapted the crescent. Turkey (1844), Tunisia (1827, predating the formal Ottoman adoption), Algeria (1962), Libya, Pakistan (1947), Malaysia, and many others carry crescents that trace directly or indirectly to Ottoman influence. The variations are telling: Turkey and Tunisia keep the crescent on red; Pakistan and Mauritania place it on green (emphasizing Islam over Ottoman heritage); Azerbaijan combines it with a star on blue.</p>

   <h3>European Colonial Flags</h3>
   <p>Six European powers imposed their flags across roughly 25% of the globe between the 15th and 20th centuries:</p>
   <div class="feat-grid">
     <div class="feat"><h4>British Union Jack</h4><p>Combined the crosses of England, Scotland, and Ireland. Flown across India, Africa, Americas, Oceania.</p></div>
     <div class="feat"><h4>French Tricolor</h4><p>The revolutionary tricolor became a colonial standard across West Africa, Indochina, and the Caribbean.</p></div>
     <div class="feat"><h4>Dutch Prinsenvlag</h4><p>Orange-white-blue (later red-white-blue). Flown in the East Indies, South Africa, the Caribbean.</p></div>
     <div class="feat"><h4>Spanish Burgundy Cross</h4><p>The red saltire on white. Flown across the Americas, Philippines, and Pacific territories.</p></div>
   </div>
   <div class="diagram-wrap" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px;">
     <svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 -30000 90000 60000"><path fill="#e30a17" d="m0-30000h90000v60000H0z"/><path fill="#fff" d="m41750 0 13568-4408-8386 11541V-7133l8386 11541zm925 8021a15000 15000 0 1 1 0-16042 12000 12000 0 1 0 0 16042z"/></svg><svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 9 6"><rect fill="#21468B" width="9" height="6"/><rect fill="#FFF" width="9" height="4"/><rect fill="#AE1C28" width="9" height="2"/></svg><svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 900 600"><path fill="#fff" d="M0 0H900V600H0z"/><path fill="red" d="M0 0H900V300H0z"/></svg>
     <span class="caption" style="width:100%">Turkey (Ottoman successor) · Netherlands (colonial power) · Indonesia (Dutch colony → independence)</span>
   </div>

   <div class="callout"><p>Colonial flags were tools of dominion. When colonies gained independence, the first act was often designing a new flag—a visual declaration that the colonial era was over. Indonesia's simple red-and-white bicolor deliberately rejected the Dutch flag's three stripes.</p></div>`,

  `<div class="detail-header">
     <div class="num">04</div>
     <h2><em>Revolution</em> & the Tricolor</h2>
   </div>
   <h3>The Dutch Origin</h3>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 9 6"><rect fill="#21468B" width="9" height="6"/><rect fill="#FFF" width="9" height="4"/><rect fill="#AE1C28" width="9" height="2"/></svg><span class="caption">Netherlands — the first tricolor (originally orange-white-blue, 1572)</span></div>
   <p>The Netherlands' Prinsenvlag (1572) was technically the world's first tricolor, created during the Dutch revolt against Spain. Originally orange-white-blue (the colors of William of Orange), it later shifted to red-white-blue. But it was a practical naval convenience, not a revolutionary statement. The transformative moment came two centuries later.</p>

   <h3>The French Revolution (1789–1794)</h3>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 900 600"><path fill="#CE1126" d="M0 0h900v600H0"/><path fill="#fff" d="M0 0h600v600H0"/><path fill="#002654" d="M0 0h300v600H0"/></svg><span class="caption">France — blue-white-red, the most influential flag design in history</span></div>
   <p>The French tricolor combined the blue and red of Paris with the white of the Bourbon monarchy—a visual compromise that was really a revolution. Three equal vertical stripes declared that the nation belonged to its people, not its king. The design was radical in its simplicity: no coat of arms, no religious symbols, no dynastic heraldry. Just three colors representing liberty, equality, and fraternity.</p>

   </div>
   <p>Italy adopted its green-white-red tricolor in 1797, directly inspired by France. Ireland's green-white-orange (1848) represented Catholic-peace-Protestant. Germany's black-red-gold (1848) came from student revolutionaries. Romania's blue-yellow-red (1848) combined national colors with tricolor format. Each adapted the French template while encoding local meaning.</p>

   <h3>Latin American Independence</h3>
   <div class="diagram-wrap" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px;">
     <svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 1200 800"><rect width="1200" height="267" fill="#74acdf"/><rect y="267" width="1200" height="266" fill="#ffffff"/><rect y="533" width="1200" height="267" fill="#74acdf"/></svg>
     <span class="caption" style="width:100%">Argentina's celeste y blanca (1812) — sky-blue and white stripes reflecting the May Revolution</span>
   </div>
   <p>Argentina's celeste y blanca (1812) used sky-blue and white to represent the May Revolution. Mexico's green-white-red (1821) represented the Three Guarantees: independence, religion, and unity. Venezuela, Colombia, and Ecuador shared the yellow-blue-red of Gran Colombia. Each flag encoded specific revolutionary promises.</p>

     <div class="tl-item"><span class="tl-date">1848</span><span class="tl-text">"Springtime of Peoples" — Ireland, Germany, Romania adopt tricolors</span></div>
   </div>`,

   <p>India's tricolor evolved through four versions: the Calcutta Flag (1906, red-yellow-green with religious symbols), the Swaraj Flag (1921, white-green-red with a spinning wheel), the INC flag (1931, saffron-white-green with Gandhi's charkha), and the final design (1947) replacing the spinning wheel with the Ashoka Chakra—a 24-spoke wheel of dharma from the 3rd-century BCE Ashoka Pillar. Each transition reflected shifting political priorities.</p>

   <h3>Flags as Compressed History</h3>
   <p>Every flag in the collection encodes a specific historical argument: about who belongs to the nation, what values it claims, and which historical traditions it acknowledges or repudiates. The tricolors declare popular sovereignty. The crescents declare Islamic heritage. The pan-colors declare anti-colonial solidarity. The Nordic crosses declare regional kinship. No flag is ideologically neutral—each is a statement, and the flags.fyi collection documents 294 of them.</p>

  const blocks = document.querySelectorAll('.section-block');

  const target = document.getElementById(window.location.hash.slice(1));

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel

<script>
(function(){
  var MP3 = 'flag-history.mp3';

  // 1. Inject CSS
  var css = document.createElement('style');
  css.textContent = `
    .audio-bar{display:flex;align-items:center;gap:10px;padding:10px 0 4px;margin-top:6px;max-height:50px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
    .main-head.compact .audio-bar{max-height:0;padding:0;opacity:0;margin:0;pointer-events:none}
    .audio-bar audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    [data-theme="dark"] .audio-bar audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
    .ctrl-btn.audio-ctrl{display:none;position:relative}
    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}
    .audio-bottom audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    .audio-bottom .audio-dismiss{cursor:pointer;color:var(--dim);font-size:13px;padding:4px 8px;border:none;background:none;font-family:var(--sans);letter-spacing:.5px;transition:color .2s}
    .audio-bottom .audio-dismiss:hover{color:var(--accent)}
    [data-theme="dark"] .audio-bottom audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = '<audio id="audio-main" controls preload="none" src="'+MP3+'"></audio>';
  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
