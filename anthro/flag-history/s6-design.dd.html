  `<p>Cross designs appear on 30+ national flags, making crosses the most common individual symbol (after stars).<span class="cite">[3]<span class="cite-tip">P-03: Wikipedia, &ldquo;Nordic cross flag.&rdquo; Denmark &rarr; Sweden &rarr; Norway &rarr; Finland &rarr; Iceland family.</span></span> The <a href="https://en.wikipedia.org/wiki/Nordic_cross_flag">Nordic cross</a> family (6 nations), St George's cross (England, Georgia), the saltire (Scotland, Jamaica), and the Swiss cross each represent distinct traditions with different historical origins.</p>

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The <em>NAVA</em> Five Principles</h2></div>
   <h3>The Codification</h3>
   <p>Ted Kaye's <em>Good Flag, Bad Flag</em> (published by NAVA in 2006) distilled centuries of vexillological wisdom into five principles. The booklet was deliberately brief (16 pages) and accessible, designed to be useful for civic groups redesigning their city or state flags. It has since been translated into six languages and has influenced flag design efforts worldwide.</p>
   <div class="feat-grid">
     <div class="feat"><h4>1. Keep It Simple</h4><p>The flag should be so simple that a child can draw it from memory. Complexity fails at distance and defies reproduction. Japan's Hinomaru is the exemplar.</p></div>
     <div class="feat"><h4>2. Use Meaningful Symbolism</h4><p>Every element should represent something specific to the entity. Arbitrary decoration weakens the flag; intentional symbolism strengthens it.</p></div>
     <div class="feat"><h4>3. Use 2-3 Basic Colors</h4><p>Limit the palette to colors that contrast well and are standard in flag-making. The heraldic Rule of Tincture (S2) is the ancestor of this principle.</p></div>
     <div class="feat"><h4>4. No Lettering or Seals</h4><p>Words are illegible at distance and don't translate across languages. Seals designed for documents fail when reproduced on cloth.</p></div>
     <div class="feat"><h4>5. Be Distinctive</h4><p>The flag should be unique and not easily confused with other flags. This is the hardest principle to follow given the limited design vocabulary.</p></div>
   </div>
   <h3>Historical Roots</h3>
   <p>Every NAVA principle has deep historical roots: simplicity echoes heraldic preference for bold charges; meaningful symbolism is as old as Egyptian nome standards; color discipline derives from the Rule of Tincture; the ban on lettering reflects heraldic visual communication; distinctiveness was enforced by medieval heralds who prevented duplicate arms.</p>
   <div class="callout"><p>The NAVA five principles are not modern inventions but formal codifications of design wisdom accumulated over 800 years of heraldic and vexillological practice. Ted Kaye's achievement was making this implicit knowledge explicit and accessible.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2><em>Common</em> Layout Patterns</h2></div>
   <h3>The Twelve Patterns</h3>
   <p>Analysis of all 200+ sovereign national flags reveals twelve recurring layout patterns. Most flags use one primary pattern, often combined with a secondary element (a tricolor with a star, a bicolor with a canton). The patterns are not arbitrary: each has functional and historical origins.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Horizontal Tricolor</h4><p>Three horizontal stripes. Most common pattern (35+ nations). Revolutionary association (S4). Examples: Germany, India, Russia.</p></div>
     <div class="feat"><h4>Vertical Tricolor</h4><p>Three vertical stripes (20+ nations). Strong French Revolution association. Examples: France, Italy, Ireland.</p></div>
     <div class="feat"><h4>Bicolor</h4><p>Two equal sections, usually horizontal (15+ nations). Simplest multi-color design. Examples: Indonesia, Poland, Ukraine.</p></div>
     <div class="feat"><h4>Cross</h4><p>Centered or offset cross (15+ nations). Christian heritage, especially Nordic and Mediterranean. Examples: Denmark, England, Switzerland.</p></div>
     <div class="feat"><h4>Canton + Field</h4><p>Small rectangular section in upper hoist corner (10+ nations). Colonial legacy (Union Jack) or star arrays (USA). Examples: Australia, USA, Tonga.</p></div>
     <div class="feat"><h4>Saltire</h4><p>Diagonal cross (5+ nations). Heraldic origin. Examples: Scotland, Jamaica, Burundi.</p></div>
     <div class="feat"><h4>Disc/Circle</h4><p>Central circle on field (10+ nations). Simplicity exemplar. Examples: Japan, Bangladesh, Palau.</p></div>
     <div class="feat"><h4>Chevron/Triangle</h4><p>Triangle at hoist side (10+ nations). Dynamism and forward motion. Examples: Czech Republic, Philippines, Guyana.</p></div>
   </div>
   <h3>Combinatorics</h3>
   <p>Most flags combine patterns: the USA combines canton + stripes; Turkey combines field + crescent; South Africa combines chevron + horizontal stripes. The twelve base patterns and seven standard colors create a finite but large design space. The mathematical constraint explains why look-alike flags are inevitable.</p>
   <div class="callout"><p>Twelve patterns, seven colors, and a handful of symbols: the vocabulary of flag design is remarkably small. The fact that 200+ distinct national flags can be created from this limited toolkit is a testament to the power of combinatorial design.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Color</em> Semantics</h2></div>
   <h3>The Global Color Code</h3>
   <p>While flag colors can carry any meaning their designers assign, strong statistical patterns emerge across the world's flags:</p>
   <div class="feat-grid">
     <div class="feat"><h4 style="color:#CE1126">Red (148 flags)</h4><p>Courage, revolution, blood sacrifice, military valor. The most common flag color globally. Red appears in the flags of every cultural tradition.</p></div>
     <div class="feat"><h4>White (143 flags)</h4><p>Peace, purity, innocence, surrender. Nearly as common as red. Often serves as the neutral stripe in tricolors or the field for minimal designs (Japan).</p></div>
     <div class="feat"><h4 style="color:#2e6ab4">Blue (107 flags)</h4><p>Freedom, water, sky, loyalty. Strong European and UN associations. Often signals democratic or maritime heritage.</p></div>
     <div class="feat"><h4 style="color:#078930">Green (83 flags)</h4><p>Islam, hope, agriculture, fertility. Dominant in Middle Eastern and sub-Saharan African flags. Pakistan, Saudi Arabia, many Pan-African flags.</p></div>
     <div class="feat"><h4 style="color:#8a6e1e">Yellow/Gold (56 flags)</h4><p>Wealth, sun, natural resources, happiness. Common in African and Latin American flags. Often represents mineral wealth.</p></div>
     <div class="feat"><h4>Black (34 flags)</h4><p>African heritage (Pan-African tradition), determination, the people. Also: mourning, solemnity in European tradition. Uncommon outside Africa and the Middle East.</p></div>
   </div>
   <h3>Regional Patterns</h3>
   <p>Color semantics cluster regionally: green signals Islam across the Middle East but agriculture in Latin America; red means communism in East Asia but courage in Europe; blue means the sky in Central America but loyalty in Scandinavia. Universal color meanings exist, but they are always inflected by regional tradition.</p>
   <div class="callout"><p>Flag color semantics are not arbitrary but not universal either. Red means courage almost everywhere, but green shifts meaning dramatically between Islamic green, agricultural green, and hope green depending on region. Context determines color meaning.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2>The <em>Cross</em> Family</h2></div>
   <h3>Five Cross Types</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Nordic Cross</h4><p>Cross offset to hoist, extending to all edges. Denmark (1219), Sweden, Norway, Finland, Iceland, Faroe Islands. The most cohesive flag family.</p></div>
     <div class="feat"><h4>St George's Cross</h4><p>Red centered cross on white field. England (c. 1190), Georgia (2004). Simple, bold, instantly recognizable.</p></div>
     <div class="feat"><h4>Saltire (St Andrew)</h4><p>Diagonal cross. Scotland (white on blue), Jamaica (gold on green/black), Burundi. Heraldic origin.</p></div>
     <div class="feat"><h4>Swiss Cross</h4><p>White cross on red, not extending to edges. Switzerland (1841), Red Cross (inverted). Unique among cross flags for its bounded form.</p></div>
     <div class="feat"><h4>Combined Crosses</h4><p>The Union Jack layers St George, St Andrew, and St Patrick crosses. Dominica features a cross with a parrot. Tonga uses a red cross in a white canton.</p></div>
     <div class="feat"><h4>Southern Cross</h4><p>Four or five stars in cross formation. Australia, New Zealand, Brazil, Papua New Guinea. Astronomical rather than religious origin.</p></div>
   </div>
   <h3>Christian Heritage</h3>
   <p>Most cross flags trace to Christian traditions, specifically the Crusader era (see <a href="s2-heraldic.dd.html">S2</a>). The Nordic cross family is the most direct lineage from the Crusades; St George's cross was the Crusader cross of England. The Swiss cross derives from the Holy Roman Empire's heraldic tradition.</p>
   <div class="callout"><p>The cross is the most common individual geometric element in flag design (30+ nations), and its persistence traces directly to the Crusader era. The Nordic cross family (6 nations) is the longest-lived and most visually cohesive family of related flags in the world.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Crescents</em> & Stars</h2></div>
   <h3>The Crescent Lineage</h3>
   <p>The crescent-and-star combination on 22+ national flags traces to Ottoman influence (detailed in <a href="s3-empire.dd.html">S3</a>). The crescent predates Islam (Byzantine origin) but is now universally associated with the Islamic world. Variations include: crescent on red (Turkey, Tunisia), crescent on green (Pakistan, Mauritania), and crescent integrated into tricolors (Algeria, Azerbaijan).</p>
   <h3>Stars: The Most Common Symbol</h3>
   <p>Stars appear on more than 50 national flags, making them the single most common symbol in vexillology. The five-pointed star is overwhelmingly dominant, but its meanings vary enormously:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Statehood</h4><p>US stars (one per state), Australian stars (territories), Brazilian stars (states). Each star = one political unit.</p></div>
     <div class="feat"><h4>Socialism</h4><p>China (one large + four small), Vietnam, Cuba, Mozambique. The red star of communism/socialism.</p></div>
     <div class="feat"><h4>Hope/Aspiration</h4><p>Ghana's black star (African emancipation), Ethiopia's pentagram (unity), many African flags. Forward-looking symbolism.</p></div>
     <div class="feat"><h4>Religious</h4><p>Israel's Star of David (six-pointed), Islamic crescent-and-star pairs. Theological symbolism encoded in geometry.</p></div>
   </div>
   <div class="callout"><p>Stars are the Swiss Army knife of flag symbolism: the same five-pointed shape can represent individual states, socialist ideology, national aspiration, or religious identity depending entirely on context. No other symbol carries as many different meanings.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>Animals</em> & Heraldic Charges</h2></div>
   <h3>Eagles</h3>
   <p>The eagle is the most common animal in flag design, appearing on 20+ national flags. Eagle symbolism derives from Roman imperial tradition (the aquila, see <a href="s1-origins.dd.html">S1</a>) and spread through European heraldry. Modern eagle flags include the USA (bald eagle), Germany (federal eagle), Mexico (eagle on cactus from Aztec mythology), Egypt (Eagle of Saladin), and Albania (double-headed eagle).</p>
   <h3>Lions</h3>
   <p>Lions appear on 15+ national flags, representing royal authority and courage. The lion of Judah (Ethiopia's former flag), the Sri Lankan lion (golden lion on crimson), and various European heraldic lions (England, Scotland, Norway) all derive from the heraldic tradition that the lion is the king of beasts and therefore the appropriate symbol for kings.</p>
   <h3>NAVA Tension</h3>
   <p>Animal charges create a tension with NAVA Principle 1 (simplicity). A detailed eagle or lion is harder to draw from memory and reproduce consistently than a simple geometric shape. The most successful animal flags (Albania's double-headed eagle, Sri Lanka's lion) use stylized, high-contrast versions that read clearly at distance. The least successful use realistic, detailed animals that become indistinguishable blurs on a flagpole.</p>
   <div class="callout"><p>Animal charges are the oldest category of flag symbolism (Egyptian nome animals, Roman aquila, heraldic lions), and they persist because they communicate power, authority, and national character more vividly than abstract geometry. The challenge is making them simple enough for a flag.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2>Flag <em>Look-alikes</em></h2></div>
   <h3>The Inevitability Problem</h3>
   <p>With only 12 common layout patterns, 7 standard colors, and the constraint of pan-movement color families, visual collisions between national flags are mathematically inevitable. The surprise is not that look-alike flags exist but that there aren't more of them.</p>
   <h3>Notable Pairs</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Romania &amp; Chad</h4><p>Virtually identical blue-yellow-red vertical tricolors. Romania (1848, Romanian nationalism) and Chad (1959, Pan-African). Different histories, same design.</p></div>
     <div class="feat"><h4>Indonesia &amp; Monaco</h4><p>Identical red-white horizontal bicolors. Indonesia adopted its flag in 1945; Monaco's dates to 1881. The only difference is proportion (Indonesia 2:3, Monaco 4:5).</p></div>
     <div class="feat"><h4>Ireland &amp; Ivory Coast</h4><p>Mirror images: Ireland green-white-orange (hoist to fly), Ivory Coast orange-white-green. Easy to confuse if the flag is reversed by wind.</p></div>
     <div class="feat"><h4>Netherlands &amp; Luxembourg</h4><p>Both red-white-blue horizontal tricolors. Luxembourg's blue is lighter, but the distinction is subtle. The Dutch flag (1572) predates Luxembourg's (1848).</p></div>
   </div>
   <h3>Diplomatic Consequences</h3>
   <p>Flag confusion has real diplomatic consequences: the Romania-Chad similarity has caused flag mix-ups at international events, Chad formally protested to the United Nations in 2004, and sporting organizations have occasionally displayed the wrong flag. These incidents underscore NAVA Principle 5 (distinctiveness) as not merely aesthetic but practically important.</p>
   <div class="callout"><p>Flag look-alikes are the mathematical consequence of designing within tight constraints (limited colors, limited patterns, pan-movement palettes). The Romania-Chad case is the most striking: two nations separated by thousands of miles, with entirely unrelated histories, arrived at visually indistinguishable flags through independent design processes.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2><em>Good</em> Flags, Bad Flags</h2></div>
   <h3>Empirical Confirmation</h3>
   <p>NAVA's 2004 survey of 150 US city flags provided empirical confirmation that the five principles predict flag quality. The highest-ranked city flags (Washington DC, Chicago, Denver, St. Louis) all follow the principles closely: simple designs, bold colors, meaningful symbolism, no text. The lowest-ranked flags are virtually all "seal on a bedsheet" designs: a state or city seal on a blue background.</p>
   <h3>Exemplary Good Flags</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Japan</h4><p>A single red disc on white. Widely cited as one of the most graphically effective national flags. Follows all five principles. Recognizable at any distance.</p></div>
     <div class="feat"><h4>Switzerland</h4><p>White cross on red. One of only two square sovereign flags (the other: Vatican City). Simplicity, symbolism, and distinctiveness achieved simultaneously.</p></div>
     <div class="feat"><h4>Canada</h4><p>Red maple leaf on white between two red bars. Adopted 1965 after extensive design competition. Distinctive, simple, and deeply symbolic.</p></div>
     <div class="feat"><h4>South Africa</h4><p>Six colors, Y-shaped band. Adopted 1994. Complex but coherent: the convergence symbolizes unity after apartheid. A successful rule-breaker.</p></div>
   </div>
   <h3>Flags That Break Rules Successfully</h3>
   <p>Some flags violate NAVA principles yet succeed through boldness or cultural resonance. South Korea's taeguk symbol and trigrams are complex but iconic. Bhutan's dragon is detailed but unforgettable. Saudi Arabia's Arabic script violates Principle 4 (no lettering) but the shahada carries such weight that the violation is justified by the symbolism.</p>
   <div class="callout"><p>The NAVA principles are guidelines, not laws. The best flags follow them; some great flags break them. The key insight is that rule-breaking should be deliberate and meaningful, not accidental. The Kingdom of Jerusalem broke the tincture rule to make a theological statement (S2). Saudi Arabia puts text on its flag because the text is the declaration of faith itself. When the exception has purpose, it can be more powerful than the rule.</p></div>`
];
