  `<p>The Crusades created a practical crisis: thousands of armored knights, visually identical, fighting in chaotic melee combat across the Holy Land. The solution was heraldry &mdash; a codified system of colors, charges (symbols), and divisions applied to shields, surcoats, and flags.<span class="cite">[1]<span class="cite-tip">V-10: Michel Pastoureau, Heraldry: Its Origins and Meaning (1997). Scholarly treatment of heraldic systems.</span></span> By the mid-12th century, heraldic science had developed strict rules ensuring visibility at distance and uniqueness for every noble family.</p>

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>Why <em>Heraldry</em> Was Invented</h2></div>
   <h3>The Identification Crisis</h3>
   <p>The First Crusade (1095-1099) brought together knights from across Western Europe who had never previously needed to coordinate on a battlefield. Unlike Roman legions with their standardized equipment, Crusader forces were assembled from dozens of independent feudal contingents. When battle was joined, commanders had no reliable way to distinguish friend from foe among thousands of armored horsemen.</p>
   <h3>The Heraldic Solution</h3>
   <p>By the mid-12th century, a systematic response emerged: heraldry. Unique combinations of colors and symbols were applied to shields, surcoats (the cloth garment worn over armor, giving us "coat of arms"), horse caparisons, and flags.<span class="cite">[1]<span class="cite-tip">V-10: Michel Pastoureau, Heraldry: Its Origins and Meaning (1997).</span></span> Each combination was registered and inherited, creating a visual identification system that was both individual (each knight unique) and collective (family and feudal relationships visible).</p>
   <h3>Codification</h3>
   <p>By approximately 1200, heraldic science had developed formal rules governing every aspect of design. Heralds &mdash; specialists in this visual language &mdash; maintained rolls of arms, arbitrated disputes over identical or confusingly similar designs, and announced combatants at tournaments. This was the world's first systematic design regulation, and its principles directly inform modern flag design.</p>
   <h3>From Shields to Flags</h3>
   <p>Heraldic designs migrated from shields to flags naturally. A knight's shield design, visible only in close combat, was reproduced on larger cloth standards visible at greater distance. The rules that governed shield design (color contrast, unique combinations) applied equally to flags, creating the first formal flag design system. Every modern flag that follows color contrast rules or avoids confusingly similar designs is working within the tradition heraldry established.</p>
   <div class="callout"><p>Heraldry was not invented for decoration but for survival. When your life depends on distinguishing friend from foe at 200 meters through dust and chaos, systematic visual design becomes a military necessity. The aesthetic beauty of heraldic tradition is a byproduct of combat-driven functional requirements.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2>The <em>Rule</em> of Tincture</h2></div>
   <h3>The Fundamental Principle</h3>
   <p>The Rule of Tincture is the single most important heraldic rule: never place metal on metal (gold on silver) or color on color (red on blue).<span class="cite">[1]<span class="cite-tip">H-01: Michel Pastoureau, Heraldry: Its Origins and Meaning (1997). Rule of Tincture, heraldic charges, Crusader identification systems.</span></span> Metal-on-color or color-on-metal combinations provide maximum contrast visible at distance. This rule emerged from battlefield experience: designs that violated it were literally harder to see, potentially fatal in combat.</p>
   <h3>The Seven Tinctures</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Or (Gold/Yellow)</h4><p>The premier metal. Represents generosity, elevation of the mind. Sun associations.</p></div>
     <div class="feat"><h4>Argent (Silver/White)</h4><p>The second metal. Represents peace, sincerity. Moon associations.</p></div>
     <div class="feat"><h4>Gules (Red)</h4><p>Military strength, warrior's bravery. Most common heraldic color. Mars associations.</p></div>
     <div class="feat"><h4>Azure (Blue)</h4><p>Truth, loyalty. Associated with heaven and the Virgin Mary.</p></div>
     <div class="feat"><h4>Sable (Black)</h4><p>Constancy, prudence, wisdom. Relatively rare in early heraldry.</p></div>
     <div class="feat"><h4>Vert (Green)</h4><p>Hope, joy, loyalty in love. Less common; associated with vegetation.</p></div>
   </div>
   <h3>Practical Optics</h3>
   <p>The rule works because metals (gold, silver) reflect light while colors absorb it. A gold charge on a blue field creates a bright-on-dark contrast visible at extreme distance. Gold on silver, however, creates bright-on-bright with minimal contrast. Medieval heralds understood this intuitively; modern color theory confirms it: the tincture rule maximizes luminance contrast.</p>
   <h3>Modern Parallels</h3>
   <p>Ted Kaye's third principle of flag design &mdash; use 2-3 basic colors from the standard color set &mdash; is a simplified restatement of the tincture system.<span class="cite">[6]<span class="cite-tip">V-04: Ted Kaye, Good Flag, Bad Flag (NAVA, 2006). Five principles of flag design.</span></span> NAVA's guidance against low-contrast color combinations directly descends from the medieval rule. The heraldic insight that <em>visibility is more important than beauty</em> remains the foundation of good flag design.</p>
   <div class="callout"><p>The Rule of Tincture is medieval combat optics encoded as design law. Eight centuries later, NAVA's flag design principles say essentially the same thing in modern language: use high-contrast color combinations that are visible at distance.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Kingdom</em> of Jerusalem</h2></div>
   <h3>The Divine Exception</h3>
   <p>The arms of the <a href="https://en.wikipedia.org/wiki/Kingdom_of_Jerusalem">Kingdom of Jerusalem</a> &mdash; gold (Or) crosses on a white (Argent) field &mdash; deliberately violated the Rule of Tincture by placing metal on metal.<span class="cite">[2]<span class="cite-tip">H-02: Wikipedia, &ldquo;Kingdom of Jerusalem.&rdquo; Gold crosses on white (metal on metal), theological exception to tincture rules.</span></span> This was not ignorance but theological assertion: the Crusader kingdom claimed divine authority that transcended human heraldic convention. The message was clear: this kingdom operates under God's rules, not man's.</p>
   <h3>The Jerusalem Cross</h3>
   <p>The design consists of a large central cross potent (with T-shaped ends) surrounded by four smaller Greek crosses, one in each quadrant. Interpretations of the five crosses include: Christ and the four Evangelists, the five wounds of Christ, or Christ and the four corners of the world. The potent cross form (with squared ends) was distinctive to Jerusalem and not used by other Crusader states.</p>
   <h3>Diplomatic Significance</h3>
   <p>The deliberate tincture violation served a practical diplomatic purpose: it made the Jerusalem arms instantly recognizable and impossible to confuse with any other heraldic design. Since no other coat of arms used metal-on-metal, the Kingdom of Jerusalem's flag was unique by definition. This is an early example of what NAVA would later codify as the fifth principle of flag design: <em>be distinctive</em>.</p>
   <h3>Legacy</h3>
   <p>The Jerusalem cross appears today on the flag of Georgia (the nation), which adopted it after the Rose Revolution (2004). The Vatican City flag and various Catholic organizations also use Jerusalem cross motifs. The principle it established &mdash; that a flag can break rules to make a statement &mdash; recurs throughout vexillological history.</p>
   <div class="callout"><p>Breaking the rules can be the most powerful design choice. The Kingdom of Jerusalem's metal-on-metal violation made its flag unique, memorable, and charged with theological meaning. Sometimes the exception proves the rule by demonstrating what the rule exists to prevent.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>Types</em> of Heraldic Flags</h2></div>
   <h3>The Four Principal Types</h3>
   <p>Medieval heraldry developed a precise typology of flags, each with specific rules about shape, content, and who was entitled to carry them. These distinctions were legally enforced; carrying the wrong type of flag was a serious breach of social order.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Pennon</h4><p>Triangular or swallow-tailed flag carried by individual knights. Displayed personal arms only. Attached to the lance; approximately 3 feet long. The most common battlefield flag.</p></div>
     <div class="feat"><h4>Banner</h4><p>Square or rectangular flag, typically 3 feet square. Carried by lords (barons and above). Displayed the full coat of arms. A knight who captured a banner earned special honor.</p></div>
     <div class="feat"><h4>Gonfalon</h4><p>Suspended vertically from a horizontal bar. Used by cities, religious orders, and the Papacy. Multiple tails at the bottom. Associated with civic rather than military authority.</p></div>
     <div class="feat"><h4>Standard</h4><p>Long tapering flag (6-9 feet). Combined multiple elements: national cross at the hoist, livery colors in the body, the owner's motto, and personal badge at the fly. Marked a commander's position.</p></div>
   </div>
   <h3>The Oriflamme</h3>
   <p>The French royal war flag, the Oriflamme, was a special case: a sacred banner kept at the Abbey of Saint-Denis, carried into battle only by the king or his designated champion. When the Oriflamme was raised, it signaled that no quarter would be given &mdash; making it perhaps the most feared flag in medieval warfare.</p>
   <h3>Modern Descendants</h3>
   <p>The pennon survives in military pennants and guidons. The banner evolved into the modern national flag. The gonfalon persists in Catholic Church processional banners and some Italian civic flags. The standard's multiple-element design influenced the complex flags of some modern nations (like Turkmenistan, whose flag incorporates carpet patterns alongside national symbols).</p>
   <div class="callout"><p>The heraldic flag typology established a principle that modern vexillology still grapples with: the form of a flag (its shape, size, and method of display) carries meaning independent of its content. A square banner and a triangular pennon displaying identical arms conveyed different messages about the bearer's rank and authority.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2>The <em>Dannebrog</em> (1219)</h2></div>
   <h3>The Legend</h3>
   <p>Danish tradition holds that during the <a href="https://en.wikipedia.org/wiki/Flag_of_Denmark">Battle of Lyndanisse</a> (June 15, 1219, in modern-day Estonia), as Danish forces under King Valdemar II were facing defeat against Estonian pagans, a red flag with a white cross fell from the sky.<span class="cite">[4]<span class="cite-tip">H-03: Wikipedia, &ldquo;Flag of Denmark (Dannebrog).&rdquo; Oldest continuously used national flag, Battle of Lyndanisse (1219).</span></span> The Danes rallied around this heaven-sent banner and won the battle. The date, June 15, is celebrated as Valdemar's Day (Valdemarsdag) in Denmark.</p>
   <h3>The Historical Reality</h3>
   <p>The sky-fall legend first appears in written sources only in the 16th century, three centuries after the supposed event. More likely, the Dannebrog derives from Crusader flags bearing the cross of Christ, which Danish crusading forces would have carried in the Baltic Crusades. The red field with white cross is consistent with other Crusader-era flag designs.</p>
   <h3>Why the Myth Matters</h3>
   <p>Whether the Dannebrog fell from heaven is historically irrelevant; what matters is that Danes <em>believe</em> it did. This origin myth grants the flag a divine sanction that no human designer could bestow. Similar divine origin stories attach to other venerated flags (the Oriflamme, various Islamic battle standards), suggesting that societies actively mythologize their flags to elevate their symbolic power.</p>
   <h3>800 Years of Continuity</h3>
   <p>The Dannebrog has been in continuous use since at least the 14th century (when documentary evidence becomes solid), making it the oldest continuously used national flag in the world. Its longevity is partly due to Denmark's relative political stability &mdash; unlike France, Germany, or Russia, Denmark never experienced a revolution that required replacing the national flag.</p>
   <h3>The Nordic Cross Innovation</h3>
   <p>The Dannebrog's most important contribution to vexillology is the Nordic cross: a cross extending to the edges of the flag, with the vertical bar offset to the hoist side. This asymmetric design, which may have originated from the practical consideration that a centered cross looks off-center when the flag flies, became the template for an entire family of Scandinavian flags.</p>
   <div class="callout"><p>The Dannebrog illustrates that a flag's power derives not from its design alone but from the stories told about it. A divine origin myth, eight centuries of continuity, and the spawning of an entire family of related flags make the Dannebrog arguably the most influential single flag design in European history.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2>The <em>Nordic</em> Cross Family</h2></div>
   <h3>Pattern & Principle</h3>
   <p>The Nordic cross (or Scandinavian cross) is defined by two features: the cross extends to all four edges of the flag (unlike a centered Greek cross), and the vertical bar is offset toward the hoist side. This offset distinguishes Nordic crosses from all other cross flags (England's St. George's Cross is centered; Switzerland's cross is centered and doesn't reach the edges).</p>
   <h3>The Family Members</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Denmark (1219)</h4><p>White cross on red field. The original. Red is the oldest documented flag color in Scandinavian tradition.</p></div>
     <div class="feat"><h4>Sweden (c. 1560s, current 1906)</h4><p>Yellow/gold cross on blue field. Colors from the Swedish coat of arms. First documented in the 16th century.</p></div>
     <div class="feat"><h4>Norway (1821)</h4><p>Blue-bordered white cross on red field. Designed after the Napoleonic Wars to assert Norwegian identity distinct from Denmark and Sweden.</p></div>
     <div class="feat"><h4>Finland (1918)</h4><p>Blue cross on white field. Adopted at independence from Russia. Blue represents lakes, white represents snow.</p></div>
     <div class="feat"><h4>Iceland (1915)</h4><p>Red-bordered white cross on blue field. Blue for mountains, white for ice, red for volcanic fire.</p></div>
     <div class="feat"><h4>Faroe Islands (1919)</h4><p>Blue-bordered red cross on white field. Combines Norwegian and Icelandic influence.</p></div>
   </div>
   <h3>Why the Pattern Persists</h3>
   <p>The Nordic cross family demonstrates how flags create regional identity. Each nation's flag is unique, but the shared cross layout instantly signals: this is a Nordic country. The visual grammar transcends political boundaries, creating a sense of cultural kinship that has survived wars, unions, and dissolutions. No other regional flag family is as visually cohesive or as long-lived.</p>
   <h3>Cross-References</h3>
   <p>For the broader analysis of cross patterns in world flags (including St. George's Cross, St. Andrew's Saltire, and the Swiss cross), see <a href="s6-design.dd.html">S6: Design Patterns & Symbolism</a>.</p>
   <div class="callout"><p>The Nordic cross family is the longest-lived and most visually cohesive family of related flags in the world. It demonstrates that shared design elements can create a sense of regional identity more powerful than any treaty or alliance &mdash; a visual grammar of belonging that persists across centuries.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2><em>Heraldic</em> Legacy</h2></div>
   <h3>Five Enduring Principles</h3>
   <p>The heraldic age bequeathed five principles to modern flag design that remain foundational:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Contrast</h4><p>The Rule of Tincture's requirement for metal-on-color combinations survives as the modern principle that flags must be visible at distance.</p></div>
     <div class="feat"><h4>Uniqueness</h4><p>Heraldic registration ensured no two coats of arms were identical. Modern vexillology's emphasis on distinctiveness (NAVA Principle 5) echoes this requirement.</p></div>
     <div class="feat"><h4>Meaning</h4><p>Every heraldic element carried specific symbolism. Modern flag design demands that every color and symbol be meaningful (NAVA Principle 2).</p></div>
     <div class="feat"><h4>Simplicity</h4><p>The most effective heraldic designs were the simplest. Complex arms were harder to reproduce and recognize. NAVA Principle 1 makes this explicit.</p></div>
     <div class="feat"><h4>Family</h4><p>Related houses used related arms (cadency marks). The Nordic cross family, Pan-Arab colors, and Pan-African colors all follow this heraldic principle of visual kinship.</p></div>
   </div>
   <h3>From Heraldry to Nationalism</h3>
   <p>The heraldic age ended not because its principles were rejected but because its <em>subject</em> changed. Heraldry identified families and feudal obligations; nationalism required flags that identified <em>peoples</em> and <em>ideas</em>. The French Revolution's tricolor (<a href="s4-revolution.dd.html">S4</a>) was the rupture point: a flag that deliberately rejected heraldic tradition in favor of simple, abstract stripes representing liberty, equality, and fraternity. But even the tricolor followed heraldic color principles &mdash; you can reject heraldry's content while keeping its design wisdom.</p>

   <div class="timeline">
     <div class="tl-item"><span class="tl-date">c. 1095</span><span class="tl-text">First Crusade creates the identification crisis that spawns heraldry</span></div>
     <div class="tl-item"><span class="tl-date">c. 1150</span><span class="tl-text">Heraldic rules codified; heralds begin maintaining rolls of arms</span></div>
     <div class="tl-item"><span class="tl-date">1219</span><span class="tl-text">Dannebrog origin at Battle of Lyndanisse &mdash; oldest continuously used national flag</span></div>
     <div class="tl-item"><span class="tl-date">c. 1300</span><span class="tl-text">Heraldic system fully mature across Western Europe</span></div>
     <div class="tl-item"><span class="tl-date">1794</span><span class="tl-text">French tricolor rejects heraldic tradition &mdash; the end of heraldry's dominance in flag design</span></div>
   </div>
   <div class="callout"><p>The heraldic age lasted roughly 700 years (c. 1100-1800) and created the design principles that every subsequent flag tradition has either followed or consciously rejected. Understanding heraldry is essential for understanding why modern flags look the way they do.</p></div>`
];
