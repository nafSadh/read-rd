const summaries = [
  `<p>The Ottoman Empire's adoption of the crescent and star on a red field (formalized c. 1844) created one of the most influential flag motifs in history.<span class="cite">[1]<span class="cite-tip">E-01: Wikipedia, &ldquo;Flags of the Ottoman Empire.&rdquo; Crescent and star adoption (c. 1844), pre-Islamic Byzantine origins.</span></span> The crescent predates Islam &mdash; it was associated with the ancient city of Byzantium &mdash; but Ottoman adoption made it synonymous with the Islamic world. At the empire's height, Ottoman sovereignty stretched from the gates of Vienna to Yemen.</p>
   <div class="diagram-wrap"><svg xmlns="http://www.w3.org/2000/svg" style="max-width:120px" viewBox="0 0 1200 800"><rect width="1200" height="800" fill="#E30A17"/><circle cx="425" cy="400" r="225" fill="#ffffff"/><circle cx="500" cy="400" r="180" fill="#E30A17"/><path fill="#FFFFFF" d="m589 401 72-27 3-77 48 60 74-21-43 64 43 64-74-21-48 60-3-77z"/></svg><span class="caption" style="display:block;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:8px">Ottoman Empire &mdash; crescent and star on red</span></div>
   <div class="s-stat"><span class="sv">1453&ndash;1922</span><span class="sl">Ottoman Era</span></div>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Continents</span></div>
   <div class="s-stat"><span class="sv">22+</span><span class="sl">Crescent Nations</span></div>`,

  `<p>When the Ottoman Empire dissolved after World War I, its successor states and former provinces retained or adapted the crescent. Today, 22+ nations carry crescent motifs that trace directly or indirectly to Ottoman influence:<span class="cite">[2]<span class="cite-tip">E-02: flags.fyi analysis. 22+ nations with crescent motifs traced to Ottoman influence.</span></span> <a href="https://flags.fyi">Turkey, Tunisia, Algeria, Pakistan, Malaysia, Azerbaijan</a>, and many others.</p>
   <div class="diagram-wrap"><svg class="fig" viewBox="0 0 700 260" width="700" height="260">
<rect x="0" y="0" width="700" height="260" fill="var(--bg)" rx="8"/>

  `<p>The <a href="https://en.wikipedia.org/wiki/Union_Jack">Union Jack</a> is itself a composite flag, combining the crosses of three patron saints: St George (England, red cross on white), St Andrew (Scotland, white saltire on blue), and St Patrick (Ireland, red saltire on white). This layered design, finalized in 1801, was carried to every corner of the British Empire.</p>

   <p>The Union Jack appeared in the canton (upper-left corner) of colonial flags worldwide, a design pattern still visible in the flags of Australia, New Zealand, Fiji, and Tuvalu. Colonial flags typically combined the Union Jack with a local badge or seal.</p>`,

  `<p>Six European powers imposed their flags across roughly a quarter of the globe between the 15th and 20th centuries.<span class="cite">[3]<span class="cite-tip">E-03: Karen Barkey, Empire of Difference (Cambridge, 2008). Ottoman governance and symbolic repertoire.</span></span> Each colonial flag system operated differently, but all shared a common function: asserting dominion over distant territories through visual symbols of metropolitan authority.</p>

   <p>The British used the Union Jack + local badge pattern. The French flew the tricolor everywhere. The Dutch Prinsenvlag (later red-white-blue) flew across the East Indies. Spain's Cross of Burgundy marked the Americas. Portugal's coat of arms marked Africa and Brazil.</p>`,

  `<p>Beyond Western empires, the Mughal Empire (1526&ndash;1857) in South Asia maintained elaborate banner traditions.<span class="cite">[4]<span class="cite-tip">E-06: A.S. Beveridge (trans.), Baburnama. Mughal military standards and banner traditions.</span></span> Mughal military standards featured lions, suns, and crescent moons &mdash; a visual vocabulary that would influence post-Mughal Indian symbolism. The lion-and-sun motif persisted in Iranian flags through the Pahlavi dynasty.</p>
   <div class="s-stat"><span class="sv">1526&ndash;1857</span><span class="sl">Mughal Era</span></div>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Key Motifs</span></div>
   <p>East Asian empires (China, Japan) developed their own distinct flag traditions, with the Chinese dragon banner and the Japanese imperial chrysanthemum operating independently of Western heraldic systems. See also: <a href="s1-origins.dd.html">S1: Ancient Origins</a> for pre-imperial Persian standards.</p>`,

  `<p>When colonies gained independence, designing a new flag was consistently among the first symbolic acts &mdash; often before writing a constitution. The new flag declared: the colonial era is over. Indonesia's simple red-and-white bicolor deliberately rejected the Dutch flag's three stripes. India's tricolor replaced British colonial symbolism with indigenous meaning.</p>

  `<p>Colonial flags were tools of dominion &mdash; visual instruments that asserted metropolitan authority over distant territories. Flying the Union Jack over Delhi, the tricolor over Saigon, or the Dutch flag over Jakarta was not merely symbolic but performative: it <em>enacted</em> the claim to sovereignty. Removing the colonial flag was therefore not just symbolic resistance but a political act.</p>

const details = [
  `<div class="detail-header"><div class="num">01</div><h2>The <em>Ottoman</em> Crescent</h2></div>
   <h3>Pre-Islamic Origins</h3>
   <p>The crescent symbol predates Islam by millennia. It was associated with the ancient city of Byzantium (later Constantinople, now Istanbul), where the crescent moon was linked to the goddess Diana/Artemis.<span class="cite">[1]<span class="cite-tip">E-01: Wikipedia, &ldquo;Flags of the Ottoman Empire.&rdquo; Pre-Islamic Byzantine crescent symbolism.</span></span> When the Ottomans captured Constantinople in 1453, they adopted many Byzantine symbols, including the crescent. The symbol most associated with Islam worldwide has pagan Greek origins.</p>
   <h3>Ottoman Formalization</h3>
   <p>The crescent and star on a red field was formalized as the Ottoman state flag around 1844 during the Tanzimat reforms, though earlier Ottoman flags had used various designs including solid green and red fields. The red color derived from the Ottoman military tradition (red was the color of the sultan's cavalry), while the white crescent and star provided maximum contrast.</p>
   <h3>Imperial Diffusion</h3>
   <p>At its peak, the Ottoman Empire controlled territories across three continents: southeastern Europe, the Middle East, and North Africa. In every province, the crescent-and-star flag represented Ottoman sovereignty. As provinces gained autonomy or independence, many retained the crescent motif while modifying other elements, creating the crescent lineage visible in 22+ modern flags.</p>
   <h3>The Crescent as Islamic Symbol</h3>
   <p>Through Ottoman dominance of much of the Islamic world, the crescent became so thoroughly associated with Islam that it now appears on flags of nations that were never part of the Ottoman Empire: Pakistan, Malaysia, the Maldives. The symbol transcended its Ottoman context to become a pan-Islamic marker, much as the cross transcended any single Christian state. This transformation from imperial to religious symbol is among the most consequential in vexillological history.</p>
   <div class="callout"><p>The crescent's journey from pagan Byzantium to Ottoman state symbol to global Islamic marker demonstrates how flags accrue and transform meaning across centuries. The Ottomans did not invent the crescent; they adopted, transformed, and propagated it until it became inseparable from the faith they practiced.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2><em>Crescent</em> Legacy in Modern Flags</h2></div>
   <h3>The Turkish Inheritance</h3>
   <p>Turkey's flag (formalized 1844, carried forward after the Republic's founding in 1923) is the most direct Ottoman descendant: white crescent and star on red, virtually unchanged from the late Ottoman design. The Republic could have chosen a new flag but deliberately retained the Ottoman design as a claim to historical continuity.</p>
   <h3>Variations on the Theme</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Red Field Group</h4><p>Turkey, Tunisia, Turkey-influenced: white crescent on red. The most direct Ottoman descendants.</p></div>
     <div class="feat"><h4>Green Field Group</h4><p>Pakistan, Mauritania, Comoros: crescent on green. Green emphasizes Islamic identity over Ottoman heritage.</p></div>
     <div class="feat"><h4>Bicolor/Tricolor</h4><p>Algeria (green-white with red crescent), Azerbaijan (blue-red-green with crescent): crescent integrated into multi-stripe designs.</p></div>
     <div class="feat"><h4>Southeast Asian</h4><p>Malaysia, Brunei: crescent integrated with local design traditions (Malaysian crescent on blue canton, Brunei on yellow field).</p></div>
   </div>
   <h3>Statistical Footprint</h3>
   <p>The crescent appears on the flags of at least 22 sovereign nations: Turkey, Tunisia, Algeria, Libya, Mauritania, Pakistan, Malaysia, Brunei, Maldives, Comoros, Azerbaijan, Turkmenistan, Uzbekistan, and others. If we include sub-national flags and organization flags (the Red Crescent, the Organisation of Islamic Cooperation), the count exceeds 30. This makes the crescent the second most common individual symbol on national flags after the star.</p>
   <div class="callout"><p>The Ottoman crescent lineage is among the most traceable single-symbol families in vexillology. Most of the 22+ nations carrying the crescent can trace it, directly or indirectly, to the Ottoman imperial tradition — a lineage with a documented common origin.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2>The <em>British</em> Union Jack</h2></div>
   <h3>Three Crosses in One</h3>
   <p>The Union Jack is a technically complex heraldic composition, layering three separate cross designs into a single coherent flag:</p>
   <div class="feat-grid">
     <div class="feat"><h4>St George's Cross</h4><p>Red cross on white field. England. The foundation layer, added 1606.</p></div>
     <div class="feat"><h4>St Andrew's Saltire</h4><p>White diagonal cross on blue field. Scotland. Combined with England in 1606.</p></div>
     <div class="feat"><h4>St Patrick's Saltire</h4><p>Red diagonal cross on white field. Ireland. Added in 1801 after the Act of Union.</p></div>
     <div class="feat"><h4>Notable Absence</h4><p>Wales has no representation in the Union Jack. The Welsh dragon is excluded because Wales was already united with England when the flag was designed.</p></div>
   </div>
   <h3>Colonial Deployment</h3>
   <p>The Union Jack became the most widely flown flag in human history. At the British Empire's peak (c. 1920), it flew over roughly 25% of the world's land surface and governed about 25% of the world's population. Colonial flags typically placed the Union Jack in the canton (upper-left quarter) with a local badge or seal on the fly (right side).</p>
   <h3>Post-Imperial Persistence</h3>
   <p>The Union Jack persists in the canton of the flags of Australia, New Zealand, Fiji, and Tuvalu, and in various modified forms in the flags of British overseas territories. Its continued presence is politically charged: periodic campaigns to remove the Union Jack from the Australian and New Zealand flags reflect ongoing debates about colonial legacy and national identity.</p>
   <div class="callout"><p>The Union Jack's persistence in the flags of independent nations raises a fundamental vexillological question: when does a colonial symbol become a national tradition? For Australians and New Zealanders, the Union Jack in the canton is simultaneously a mark of colonial history and a cherished element of national identity.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>European</em> Colonial Flags</h2></div>
   <h3>Six Systems of Visual Dominion</h3>
   <div class="feat-grid">
     <div class="feat"><h4>British Empire</h4><p>Union Jack canton + local badge on blue or red ensign. Most systematic colonial flag program. ~60 distinct colonial flags documented.</p></div>
     <div class="feat"><h4>French Empire</h4><p>French tricolor flown directly (no local modification). Uniform visual assertion: every colony is France. Simpler but more dominating.</p></div>
     <div class="feat"><h4>Dutch Empire</h4><p>Prinsenvlag (later red-white-blue) + VOC monogram for company territories. Commercial and state flags overlapped.</p></div>
     <div class="feat"><h4>Spanish Empire</h4><p>Cross of Burgundy (red saltire on white) across the Americas. Later the bicolor (red-yellow). Religious-military symbolism.</p></div>
     <div class="feat"><h4>Portuguese Empire</h4><p>Royal coat of arms on white or green-red field. Strong heraldic tradition maintained across Africa, Brazil, Asia.</p></div>
     <div class="feat"><h4>Belgian/German</h4><p>Shorter-lived colonial flag systems in Africa. Belgian Congo used the Belgian tricolor; German colonies used the imperial black-white-red with local badges.</p></div>
   </div>
   <h3>The Visual Logic of Colonialism</h3>
   <p>All colonial flag systems shared a common visual logic: the metropolitan flag (or a recognizable derivative) was displayed prominently, while local identity was either absent or subordinated to a small badge. This visual hierarchy encoded the political reality: the colony existed as an extension of the metropole, not as an entity in its own right. Reversing this hierarchy &mdash; placing local symbols over or instead of metropolitan ones &mdash; was an act of rebellion.</p>
   <div class="callout"><p>The six European colonial flag systems collectively imposed visual uniformity on roughly a quarter of the globe. The first act of every independence movement was to design a new flag that reversed the colonial visual hierarchy, placing local symbols at the center.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Mughal</em> & Eastern Empires</h2></div>
   <h3>Mughal Banner Traditions</h3>
   <p>The Mughal Empire (1526-1857) maintained elaborate military standard traditions that drew on both Central Asian Turkic and Persian precedents. Mughal banners featured lions, suns, crescent moons, and elaborate calligraphic inscriptions. The emperor's personal standard was typically green (the color of Islam) with gold or white devices.</p>
   <h3>The Lion and Sun</h3>
   <p>The lion-and-sun motif, which appeared on Mughal and Persian banners, persisted in Iranian flags from the Safavid dynasty (1501-1736) through the Pahlavi dynasty (1925-1979). After the Islamic Revolution of 1979, the lion and sun were replaced by a stylized emblem based on the Arabic word for God (Allah). The deliberate removal of the lion and sun was a revolutionary act comparable to France's rejection of royal heraldry.</p>
   <h3>East Asian Traditions</h3>
   <p>China's imperial dragon banners and Japan's chrysanthemum and rising sun developed independently of Western flag traditions. Japan's Hinomaru (red disc on white) is widely regarded as one of the most graphically effective national flags: a single red circle centered on white, achieving absolute simplicity. China's dragon banners, by contrast, were maximally complex, reflecting different aesthetic and political values.</p>
   <h3>Convergence in the Modern Era</h3>
   <p>As East Asian nations modernized in the 19th century, they adopted rectangular cloth flags following the Western model for international recognition. Japan formalized the Hinomaru in 1870; China adopted its first modern flag (the yellow dragon flag) in 1862. The global adoption of rectangular cloth flags as the universal format for national identification is itself a legacy of European imperial expansion.</p>
   <div class="callout"><p>The global standardization of the rectangular cloth flag as the universal format for national identity is arguably colonialism's most enduring vexillological legacy. Even nations never colonized (Japan, Thailand, Ethiopia) adopted the format for international recognition.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>Colonial</em> Flags to Independence</h2></div>
   <h3>The Flag as First Act</h3>
   <p>Across the decolonizing world, designing a new flag was consistently among the very first acts of independence &mdash; often predating constitutions, formal governments, and international recognition. The Indian National Congress adopted the swaraj flag in 1921, 26 years before independence. Ghana's flag was designed in 1957 simultaneously with its independence declaration.</p>
   <h3>Design Strategies</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Total Rejection</h4><p>Indonesia: red-white bicolor deliberately opposite of the Dutch tricolor. Simple, assertive, new.</p></div>
     <div class="feat"><h4>Pan-Movement Colors</h4><p>Ghana, Tanzania, many African states: adopted Pan-African green-yellow-red as a declaration of continental solidarity.</p></div>
     <div class="feat"><h4>Indigenous Symbols</h4><p>India: Ashoka Chakra replacing colonial symbols. Sri Lanka: lion from pre-colonial Sinhalese kingdoms.</p></div>
     <div class="feat"><h4>Hybrid Retention</h4><p>Australia, New Zealand, Fiji: retained the Union Jack in canton while adding local symbols. Compromise between heritage and identity.</p></div>
   </div>
   <h3>The Constitutive Function</h3>
   <p>The urgency of flag design at independence reveals something important: flags are not merely representations of pre-existing identities but tools for <em>creating</em> identities. A new nation needs a flag before it needs a constitution because the flag performs the act of nation-creation. It makes the new state visible, tangible, and real in a way that legal documents cannot.</p>
   <div class="callout"><p>The flag comes before the constitution because the flag performs what the constitution merely describes. To see a new flag flying is to know, viscerally, that a new nation exists. This constitutive power explains why independence movements universally prioritize flag design.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2><em>Flags</em> as Tools of Dominion</h2></div>
   <h3>Three Functions of Colonial Flags</h3>
   <p>Colonial flags served three overlapping but distinct functions:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Territorial Marking</h4><p>Planting the flag claimed territory for the crown. The physical act of raising a flag transformed uncolonized land into colonial possession. This performative function was legally recognized in international law.</p></div>
     <div class="feat"><h4>Jurisdictional Assertion</h4><p>The flag signaled which legal system applied. Under the Union Jack, British law governed; under the tricolor, French law. Colonial flags were not just symbols but legal instruments.</p></div>
     <div class="feat"><h4>Cultural Projection</h4><p>The flag projected cultural identity: this territory belongs not just to our government but to our civilization. This was the most contested function and the one most explicitly rejected at independence.</p></div>
     <div class="feat"><h4>Commercial Identity</h4><p>Trading companies (VOC, East India Company) flew their own flags, blurring the line between commercial and state sovereignty. These corporate flags governed millions.</p></div>
   </div>
   <h3>The Legacy</h3>
   <p>The empire era established that flags are instruments of power, not merely decorative symbols. Every subsequent use of flags &mdash; at UN headquarters, at Olympic ceremonies, in protest movements &mdash; draws on the understanding, forged during the colonial era, that flags can claim, assert, and transform political reality.</p>

   <div class="timeline">
     <div class="tl-item"><span class="tl-date">1453</span><span class="tl-text">Ottoman conquest of Constantinople &mdash; crescent adopted from Byzantine tradition</span></div>
     <div class="tl-item"><span class="tl-date">1606</span><span class="tl-text">First Union Jack combines England and Scotland crosses</span></div>
     <div class="tl-item"><span class="tl-date">1801</span><span class="tl-text">Current Union Jack adds St Patrick's saltire for Ireland</span></div>
     <div class="tl-item"><span class="tl-date">1844</span><span class="tl-text">Ottoman crescent-and-star formalized on red field</span></div>
     <div class="tl-item"><span class="tl-date">1922</span><span class="tl-text">Ottoman Empire dissolved &mdash; successor states retain crescent motifs</span></div>
     <div class="tl-item"><span class="tl-date">1947</span><span class="tl-text">Indian/Pakistani independence &mdash; British colonial flags replaced</span></div>
     <div class="tl-item"><span class="tl-date">1960</span><span class="tl-text">Year of Africa: 17 nations gain independence, each with new flags</span></div>
   </div>
   <div class="callout"><p>The empire era illustrates a central feature of flags: they are not passive symbols but active instruments. To fly a flag over territory is to claim it. To remove that flag is to contest the claim. Flags do not merely represent power; they enact it.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2><em>Empire</em> Timeline</h2></div>
   <h3>Key Dates</h3>
   <div class="timeline">
     <div class="tl-item"><span class="tl-date">1415</span><span class="tl-text">Portuguese conquest of Ceuta &mdash; first European colonial flag raised in Africa</span></div>
     <div class="tl-item"><span class="tl-date">1453</span><span class="tl-text">Fall of Constantinople to Ottomans &mdash; crescent symbol adopted</span></div>
     <div class="tl-item"><span class="tl-date">1492</span><span class="tl-text">Spanish flags reach the Americas &mdash; Cross of Burgundy planted in the New World</span></div>

     <div class="tl-item"><span class="tl-date">1602</span><span class="tl-text">Dutch East India Company (VOC) founded &mdash; corporate flags govern millions</span></div>
     <div class="tl-item"><span class="tl-date">1606</span><span class="tl-text">First Union Jack created &mdash; England and Scotland crosses combined</span></div>
     <div class="tl-item"><span class="tl-date">1757</span><span class="tl-text">Battle of Plassey &mdash; British East India Company flag flies over Bengal</span></div>
     <div class="tl-item"><span class="tl-date">1844</span><span class="tl-text">Ottoman flag formalized &mdash; crescent and star on red</span></div>
     <div class="tl-item"><span class="tl-date">1884</span><span class="tl-text">Berlin Conference &mdash; European powers partition Africa, each flying their flags</span></div>
     <div class="tl-item"><span class="tl-date">1922</span><span class="tl-text">Ottoman Empire formally dissolved &mdash; successor states create new flags</span></div>
     <div class="tl-item"><span class="tl-date">1947&ndash;1975</span><span class="tl-text">Decolonization wave &mdash; colonial flags replaced across Asia, Africa, Caribbean</span></div>
   </div>
   <h3>Cross-References</h3>
   <p>The empire era's flags created the conditions for two subsequent revolutions in flag design: the revolutionary tricolors (<a href="s4-revolution.dd.html">S4</a>) that challenged monarchical/imperial authority, and the pan-movement flags (<a href="s5-decolonization.dd.html">S5</a>) that challenged colonial authority. Both movements defined themselves <em>against</em> imperial flags.</p>
   <div class="callout"><p>The 500-year empire era shaped more national flags than any other period. The crescent lineage (22+ nations), the colonial reaction flags (40+ nations that replaced colonial designs), and the pan-movement colors (60+ nations) all trace to patterns established or provoked during this period.</p></div>`

const sidebarTip=document.createElement('div');sidebarTip.className='sidebar-tooltip';document.body.appendChild(sidebarTip);const sidebarEl=document.querySelector('.sidebar');let tipActive=false;sidebarNav.addEventListener('mouseleave',()=>{tipActive=false;sidebarTip.classList.remove('visible')});sidebarNav.addEventListener('mousemove',(e)=>{if(!document.body.classList.contains('detail-open')){if(tipActive){tipActive=false;sidebarTip.classList.remove('visible')}return}const item=e.target.closest('.sidebar-item');if(!item){if(tipActive){tipActive=false;sidebarTip.classList.remove('visible')}return}const rect=item.getBoundingClientRect();const sRight=sidebarEl.getBoundingClientRect().right;sidebarTip.textContent=item.getAttribute('data-label');sidebarTip.style.left=(sRight-1)+'px';sidebarTip.style.top=rect.top+'px';sidebarTip.style.height=rect.height+'px';if(!tipActive){tipActive=true;sidebarTip.classList.add('visible')}});
const mainScroll=document.getElementById('main-scroll');const mainInner=document.createElement('div');mainInner.className='main-scroll-inner';mainScroll.appendChild(mainInner);sections.forEach((sec,idx)=>{const block=document.createElement('div');block.className='section-block';block.id=`section-${idx}`;block.innerHTML=`<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`;mainInner.appendChild(block)});
const rightInner=document.getElementById('right-inner');sections.forEach((sec,idx)=>{const d=document.createElement('div');d.className='detail';d.id=`detail-${idx}`;d.innerHTML=details[idx];rightInner.appendChild(d)});
let lastDetailIdx=0;function scrollToSection(idx){const blocks=document.querySelectorAll('.section-block');if(blocks[idx])blocks[idx].scrollIntoView({behavior:'smooth',block:'start'})}
if(window.location.hash){const target=document.getElementById(window.location.hash.slice(1));if(target)setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'start'}),100)}
function openDetail(idx){lastDetailIdx=idx;document.querySelectorAll('.detail').forEach(d=>d.style.display='none');document.getElementById(`detail-${idx}`).style.display='block';document.getElementById('right').classList.remove('closed');document.body.classList.add('detail-open');document.getElementById('right').scrollTop=0;document.getElementById('right-sticky-title').classList.remove('visible')}
function closeRight(){document.getElementById('right').classList.add('closed');document.body.classList.remove('detail-open')}
function toggleDetail(){if(document.body.classList.contains('detail-open'))closeRight();else openDetail(lastDetailIdx)}
function toggleTheme(){const c=document.body.getAttribute('data-theme');document.body.setAttribute('data-theme',c==='light'?'dark':'light');localStorage.setItem('theme',c==='light'?'dark':'light')}
const savedTheme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',savedTheme);
mainScroll.addEventListener('scroll',()=>{document.querySelector('.main-head').classList.toggle('compact',mainScroll.scrollTop>40);const blocks=mainScroll.querySelectorAll('.section-block');const items=document.querySelectorAll('.sidebar-item');let activeIdx=0;blocks.forEach((b,i)=>{if(b.getBoundingClientRect().top<mainScroll.getBoundingClientRect().top+120)activeIdx=i});items.forEach((item,i)=>item.classList.toggle('active',i===activeIdx))});
const rightPanelOuter=document.getElementById('right');const stickyTitle=document.getElementById('right-sticky-title');rightPanelOuter.addEventListener('scroll',()=>{const activeDetail=rightPanelOuter.querySelector('.detail[style*="display: block"],.detail[style*="display:block"]');if(!activeDetail)return;const h2=activeDetail.querySelector('.detail-header h2')||activeDetail.querySelector('h2');if(!h2)return;const rect=h2.getBoundingClientRect();const panelRect=rightPanelOuter.getBoundingClientRect();const topbar=document.querySelector('.right-topbar');if(rect.bottom<panelRect.top+56){stickyTitle.textContent=h2.textContent;stickyTitle.classList.add('visible');topbar.classList.add('scrolled')}else{stickyTitle.classList.remove('visible');topbar.classList.remove('scrolled')}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeRight()});
</script>
