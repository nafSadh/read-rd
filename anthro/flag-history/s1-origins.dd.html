  <style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);transition:background 1s}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'\263D'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'\2600'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}

.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}

.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}

.section-block .s-list{margin:8px 0;padding:0;list-style:none}

.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-stat{display:inline-flex;gap:0;margin:4px 4px 4px 0;border:1px solid var(--border);text-align:center;padding:10px 14px;flex-direction:column;vertical-align:top}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls);display:block}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans);display:block}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}

[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}

.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}

.detail-header{margin-bottom:32px;display:block}

.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}

.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

const summaries = [
  `<p>The oldest known vexilloid, discovered in 1975 in southeastern Iran, consists of hollow copper pieces soldered together, decorated with what may have been semi-precious stones.<span class="cite">[1]<span class="cite-tip">A-01: Archaeological reports on the c. 2400 BCE copper standard discovered in southeastern Iran (1975).</span></span> Dating to approximately 2400 BCE, it predates Egyptian standards by nearly a millennium. Its exact symbolism remains unknown, but its construction speaks to considerable metallurgical skill and suggests it carried profound significance for the ruling elite of the Shahdad civilization.</p>

   <div class="s-stat"><span class="sv">Iran</span><span class="sl">Origin</span></div>
   <p>Unlike later cloth flags, the Shahdad Standard was a rigid, three-dimensional object, more akin to a scepter than a banner. This is significant: the earliest symbols of group identity were not mass-produced but unique, sacred objects that derived their power partly from their irreproducibility.</p>`,

  `<p>Egyptian military and religious processions featured <em>shedshed</em> &mdash; tall wooden poles topped with carved symbols of the <em>nomes</em> (provinces).<span class="cite">[2]<span class="cite-tip">A-02: Encyclopaedia Britannica entries on the 42 nome standards of ancient Egypt.</span></span> Each of Egypt's 42 nomes had its own distinctive standard, often featuring animals: falcons, jackals, ibises, or abstract symbols. These were carried in pairs during religious processions and military campaigns.</p>

   <p>The shedshed served simultaneously as provincial identification, religious symbols, and military rally points &mdash; the earliest evidence of flags performing the triple function that persists in national flags today: identity, belief, and military coordination.</p>`,

  `<p>The Romans brought unprecedented standardization to military symbols. Every legion carried an <em>aquila</em> &mdash; a gilded bronze eagle that was sacred, the spiritual embodiment of the legion itself.<span class="cite">[3]<span class="cite-tip">A-03: Adrian Goldsworthy, The Complete Roman Army (2003). Aquila, vexillum, signa.</span></span> To lose the aquila in battle was the deepest shame; Emperor Augustus reportedly banged his head against doorframes crying "give me back my legions" after three legions lost their eagles at <a href="https://en.wikipedia.org/wiki/Battle_of_the_Teutoburg_Forest">Teutoburg Forest</a> (9 CE).</p>

   <p>Eusebius of Caesarea described the labarum in his <em>Life of Constantine</em>: a long spear overlaid with gold, with a transverse bar forming a cross, and at the summit a wreath of gold and precious stones enclosing the Chi-Rho. The visual program was deliberate: military power sanctified by divine authority.</p>`,

  `<p>Persian sources describe the <em>Derafsh Kaviani</em> as the royal standard of the Sassanid Empire, possibly originating as early as the 7th century BCE and surviving through the Arab conquest of 651 CE. According to <a href="https://en.wikipedia.org/wiki/Shahnameh">Ferdowsi's <em>Shahnameh</em></a>, it was created by the blacksmith Kaveh during a revolt against the tyrant Zahhak.<span class="cite">[5]<span class="cite-tip">A-05: Ferdowsi, Shahnameh (c. 1010 CE). Persian epic describing the legendary blacksmith Kaveh&rsquo;s standard.</span></span></p>
   <div class="s-stat"><span class="sv">~1200 yr</span><span class="sl">Duration</span></div>
   <div class="s-stat"><span class="sv">651 CE</span><span class="sl">Lost</span></div>
   <p>If the legend is true, the Derafsh Kaviani may be history's first <em>revolutionary</em> standard &mdash; a symbol created not by a ruler to assert authority but by a commoner to overthrow tyranny. Later Islamic dynasties adopted similar iconography to claim succession to Sassanid legitimacy, establishing the principle that flags carry historical authority that can be inherited or appropriated.</p>`,

  `<p>The transition from rigid vexilloids (metal, carved wood) to cloth flags represents a technological revolution in human symbolic communication.<span class="cite">[6]<span class="cite-tip">A-06: Wikipedia, &ldquo;Vexillum.&rdquo; Etymology of vexillology, cloth standard descriptions.</span></span> Rigid standards could only be carried by specialists; cloth was lightweight, visible at distance, mass-reproducible, and could encode complex designs through dyeing and weaving. The Roman vexillum (c. 100 BCE) was the pivot point.</p>
   <div class="s-stat"><span class="sv">3</span><span class="sl">Material Eras</span></div>
   <div class="s-stat"><span class="sv">c. 100 BCE</span><span class="sl">Cloth Pivot</span></div>
   <p>This material evolution mirrors a conceptual one: from flags as unique sacred objects (the Shahdad Standard, the aquila) to flags as reproducible symbols of collective identity. Modern flags are still fundamentally this technology &mdash; a rectangular piece of dyed cloth encoding identity &mdash; unchanged in principle for 2,000 years.</p>`,

  `<p>The word <em>vexillology</em> &mdash; the scholarly study of flags &mdash; derives directly from the Latin <em>vexillum</em>. It was coined by <a href="https://en.wikipedia.org/wiki/Whitney_Smith">Whitney Smith</a> in 1961, drawing flag study into formal academic recognition. Smith went on to found the Flag Research Center and organize the first International Congress of Vexillology.</p>
   <div class="s-stat"><span class="sv">1961</span><span class="sl">Term Coined</span></div>
   <div class="s-stat"><span class="sv">27</span><span class="sl">Books by Smith</span></div>
   <p>The ancient origins matter because they established every pattern that persists today: flags as military identification, as religious symbols, as assertions of sovereignty, as revolutionary declarations, and as inherited claims to historical legitimacy. Every modern flag draws, consciously or not, on traditions that began with copper standards in Iran four millennia ago.</p>`,

  `<p>The ancient period spans roughly 2,800 years, from the earliest vexilloids through the fall of the Sassanid Empire to Arab conquest. During this span, flags evolved from unique sacred objects to mass-produced cloth symbols, from purely military markers to ideological statements, and from local totems to imperial standards governing millions.</p>
   <div class="s-stat"><span class="sv">~2800 yr</span><span class="sl">Span</span></div>
   <div class="s-stat"><span class="sv">5</span><span class="sl">Key Traditions</span></div>

const details = [
  `<div class="detail-header">
     <div class="num">01</div>
     <h2>The <em>Shahdad</em> Standard</h2>
   </div>
   <h3>Discovery & Context</h3>
   <p>Unearthed in 1975 in southeastern Iran near the city of Shahdad (Kerman Province), the Shahdad Standard consists of hollow copper pieces soldered together, decorated with what may have been semi-precious stones.<span class="cite">[1]<span class="cite-tip">A-01: Archaeological reports on the c. 2400 BCE copper standard discovered in southeastern Iran (1975).</span></span> It dates to approximately 2400 BCE, placing it in the early Bronze Age, contemporary with the earliest Sumerian city-states and predating the Egyptian Middle Kingdom by several centuries.</p>

   <h3>Construction & Materials</h3>
   <p>The standard's construction speaks to considerable metallurgical sophistication. Hollow copper work of this quality required lost-wax casting techniques that were cutting-edge technology for the period. The soldering of multiple pieces into a coherent whole suggests specialized craftsmen working for a wealthy patron &mdash; this was not mass-produced, and the expense of its creation implies it carried profound political or religious significance.</p>

   <h3>Symbolic Function</h3>
   <p>Without accompanying texts (Shahdad civilization left no readable script), we can only infer the standard's function from comparative archaeology. Its size and form suggest it was mounted on a pole and carried in procession &mdash; a vexilloid in the strict sense. Whether it represented a ruler, a deity, a military unit, or a city remains unknown, but the investment of resources in its creation implies authority claims analogous to those of later flag traditions.</p>

   <h3>Significance for Vexillology</h3>
   <p>The Shahdad Standard matters because it pushes the origin of symbolic standards back nearly a millennium earlier than Egyptian shedshed. It demonstrates that the impulse to create portable symbols of group identity is not a cultural invention that diffused from one source but an independent development in multiple civilizations. The human need to carry identity on a pole appears to be near-universal.</p>

   <div class="callout"><p>The Shahdad Standard predates the earliest Egyptian standards by roughly 900 years. The impulse to create portable symbols of collective identity appears across unconnected civilizations, suggesting it is a deep human need rather than a single cultural invention.</p></div>

   <div class="timeline">
     <div class="tl-item"><span class="tl-date">c. 2400 BCE</span><span class="tl-text">Shahdad Standard created &mdash; earliest known vexilloid</span></div>
     <div class="tl-item"><span class="tl-date">c. 1500 BCE</span><span class="tl-text">Egyptian shedshed in widespread use</span></div>
     <div class="tl-item"><span class="tl-date">c. 500 BCE</span><span class="tl-text">Persian Achaemenid standards across the empire</span></div>
   </div>`,

  `<div class="detail-header">
     <div class="num">02</div>
     <h2><em>Egyptian</em> Standards</h2>
   </div>
   <h3>The Nome System</h3>
   <p>Ancient Egypt was divided into 42 nomes (provinces) &mdash; 22 in Upper Egypt and 20 in Lower Egypt. Each nome had its own distinctive standard, called a <em>shedshed</em>, consisting of a tall wooden pole topped with a carved symbol.<span class="cite">[2]<span class="cite-tip">A-02: Encyclopaedia Britannica entries on the 42 nome standards of ancient Egypt.</span></span> These symbols were typically animals sacred to the nome's patron deity: falcons (Horus nomes), jackals (Anubis nomes), ibises (Thoth nomes), or abstract symbols representing natural features.</p>

   <h3>Triple Function</h3>
   <p>Egyptian standards served three simultaneous purposes that anticipate the functions of modern national flags:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Provincial Identity</h4><p>Each nome's standard was unique, identifying its people and territory. Carried in procession, it declared: we are from this place.</p></div>
     <div class="feat"><h4>Religious Symbol</h4><p>The animal or abstract symbol connected the nome to its patron deity, carrying divine authority and protection.</p></div>
     <div class="feat"><h4>Military Rally</h4><p>In battle, nome standards served as rally points for troops, exactly as Roman vexilla would centuries later.</p></div>
     <div class="feat"><h4>Ceremonial Display</h4><p>Major religious festivals featured processions of all 42 nome standards, a visual assertion of Egyptian unity-in-diversity.</p></div>
   </div>

   <h3>Artistic Evidence</h3>
   <p>We know about shedshed primarily from tomb paintings and temple reliefs. The Narmer Palette (c. 3100 BCE) shows standards in military context, making it one of the earliest depictions of vexilloids in action. Later New Kingdom temple walls at Karnak and Luxor show elaborate standard processions during the Opet Festival.</p>

   <div class="callout"><p>The 42 nome standards of ancient Egypt are the earliest known system of territorial identification through portable symbols &mdash; a proto-flag tradition that anticipated the heraldic systems of medieval Europe by three millennia.</p></div>`,

  `<div class="detail-header">
     <div class="num">03</div>
     <h2><em>Roman</em> Military Standards</h2>
   </div>
   <h3>The Aquila (Eagle Standard)</h3>
   <p>From the reforms of Gaius Marius (107 BCE), each Roman legion carried a single <em>aquila</em> &mdash; a gilded bronze or silver eagle mounted on a pole, regarded as the spiritual embodiment of the legion.<span class="cite">[3]<span class="cite-tip">A-03: Adrian Goldsworthy, The Complete Roman Army (2003). Aquila, vexillum, signa.</span></span> The eagle was sacred: it had its own shrine in the camp, was anointed with perfumed oils, and was guarded by the most senior standard bearer (the <em>aquilifer</em>), a position of immense prestige.</p>

   <h3>The Shame of Losing the Eagle</h3>
   <p>To lose the aquila in battle was the deepest possible military disgrace. When three legions under Varus lost their eagles at the Battle of Teutoburg Forest (9 CE), Emperor Augustus reportedly banged his head against doorframes crying "Quintilius Varus, give me back my legions!" Germanicus launched punitive expeditions into Germania partly to recover the lost eagles &mdash; two were retrieved in 15-16 CE, the third not until 41 CE, more than three decades later.</p>

   <h3>The Vexillum: Birth of the Cloth Flag</h3>
   <p>Beneath the aquila hung the <em>vexillum</em> &mdash; a square or rectangular piece of cloth, usually red or purple, bearing the legion's numeral and sometimes a pictorial device. The <em>vexillarius</em> carried this cloth standard, which was visible at far greater distance than the metallic aquila. This was the critical innovation: the first true cloth flag, directly ancestral to all modern national flags.</p>
   <p>Archaeological fragments of vexilla have been recovered along the Rhine and Danube frontiers. Analysis shows they were typically wool or linen, dyed with madder (for red) or shellfish-derived purple, with numerals and devices applied by sewing or painting.</p>

   <h3>Other Roman Standards</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Signum</h4><p>Century-level standard with stacked discs and a hand or spear point. Identified sub-units within the legion.</p></div>
     <div class="feat"><h4>Imago</h4><p>Portrait of the reigning emperor, carried by the <em>imaginifer</em>. Reminder that soldiers served the emperor personally.</p></div>
     <div class="feat"><h4>Draco</h4><p>Dragon-headed windsock standard adopted from Dacian or Sarmatian enemies. Produced a howling sound in wind.</p></div>
     <div class="feat"><h4>Labarum</h4><p>Adopted by Constantine (312 CE), bearing the Chi-Rho. The Christian transformation of Roman military symbolism.</p></div>
   </div>

   <div class="callout"><p>The Roman military standard system was the most sophisticated vexillological apparatus the ancient world produced. Its hierarchical structure &mdash; aquila for the legion, signa for centuries, vexilla for detachments &mdash; created a visual command-and-control network that would not be surpassed until the heraldic systems of medieval Europe.</p></div>`,

  `<div class="detail-header">
     <div class="num">04</div>
     <h2><em>Constantine's</em> Labarum</h2>
   </div>
   <h3>The Battle of the Milvian Bridge (312 CE)</h3>
   <p>On the eve of the battle that would make him sole ruler of the Western Roman Empire, Constantine reportedly saw a vision &mdash; either a cross of light in the sky with the words "In this sign, conquer" (<em>In hoc signo vinces</em>), or a dream instructing him to mark his soldiers' shields with the Chi-Rho. The next morning, he ordered the creation of a new standard: the labarum.</p>

   <h3>Design & Construction</h3>
   <p>Eusebius of Caesarea, who claims to have seen the original, described it as a long spear overlaid with gold, with a transverse bar forming the shape of a cross.<span class="cite">[4]<span class="cite-tip">A-04: Eusebius, Life of Constantine (c. 339 CE). Primary source for Chi-Rho adoption at Battle of Milvian Bridge.</span></span> At the summit, a wreath of gold and precious stones enclosed the Chi-Rho monogram (the first two letters of <em>Christos</em> in Greek). From the crossbar hung a square purple cloth embroidered with gold, bearing portraits of Constantine and his sons.</p>

   <h3>The Ideological Revolution</h3>
   <p>The labarum's significance extends far beyond military history. For the first time, a major military standard explicitly proclaimed a religious ideology. Previous standards had religious associations (Egyptian nome gods, the Roman aquila's sacred status), but the labarum was different: it was a deliberate, public assertion that the state derived its authority from a specific theological claim.</p>
   <p>This fusion of military and religious symbolism through a flag would become the dominant pattern for the next 1,700 years. The Crusader crosses, Ottoman crescents, and even modern flags bearing religious symbols all trace, conceptually, to Constantine's decision to put the Chi-Rho on a battle standard.</p>

   <h3>Legacy</h3>
   <p>The labarum remained the imperial standard of the Byzantine Empire for over a millennium, though its design evolved. When the last Byzantine emperor, Constantine XI, died defending Constantinople in 1453, the labarum tradition finally ended &mdash; only to be inherited by the cross-bearing flags of European Christendom.</p>

   <div class="callout"><p>The labarum marks the precise historical moment when flags became ideological instruments. Every subsequent flag that carries a religious or political symbol &mdash; from the Crusader cross to the Soviet hammer and sickle &mdash; is working within the paradigm Constantine established in 312 CE.</p></div>`,

  `<div class="detail-header">
     <div class="num">05</div>
     <h2>The <em>Derafsh</em> Kaviani</h2>
   </div>
   <h3>The Legend of Kaveh</h3>
   <p>According to Ferdowsi's <em>Shahnameh</em> (Book of Kings, c. 1010 CE), the blacksmith Kaveh led a revolt against the tyrant Zahhak by raising his leather apron on a spear as a standard.<span class="cite">[5]<span class="cite-tip">A-05: Ferdowsi, Shahnameh (c. 1010 CE). Persian epic describing the legendary blacksmith Kaveh&rsquo;s standard.</span></span> After the revolt succeeded, the apron was decorated with gems and gold by each successive ruler, becoming the royal standard of Iran &mdash; the Derafsh Kaviani ("Banner of Kaveh").</p>

   <h3>Historical Reality</h3>
   <p>Separating legend from history is difficult. The Sassanid dynasty (224-651 CE) certainly used a royal standard they called the Derafsh Kaviani, and it was described by Arab historians after the conquest. Al-Tabari recorded that the standard was captured at the Battle of al-Qadisiyyah (636 CE) and sent to Caliph Umar, who reportedly had its gems stripped and distributed among his soldiers. The cloth itself was burned.</p>

   <h3>Revolutionary Symbolism</h3>
   <p>If the Kaveh legend has any historical basis, it represents possibly the earliest instance of a <em>revolutionary</em> standard &mdash; a symbol created not by a ruler to assert authority but by a commoner to overthrow tyranny. This reversal of flag symbolism (from top-down to bottom-up) anticipates the revolutionary flags of 18th-century France and 20th-century decolonization by millennia.</p>

   <h3>Legacy in Islamic Flags</h3>
   <p>After the Arab conquest, later Islamic dynasties in Iran adopted similar iconographic programs to claim succession to Sassanid legitimacy. The Safavid dynasty (1501-1736) used a lion and sun motif that echoed Sassanid royal imagery. This principle &mdash; that flags carry historical authority which can be inherited, appropriated, or contested &mdash; is one of vexillology's most enduring patterns.</p>

   <div class="callout"><p>The Derafsh Kaviani establishes the principle that flags can be revolutionary symbols. When a blacksmith raises his leather apron against a tyrant, the flag becomes a tool not of authority but of resistance &mdash; a pattern that would recur in every revolutionary movement from France to Ghana.</p></div>`,

  `<div class="detail-header">
     <div class="num">06</div>
     <h2>From <em>Object</em> to Cloth</h2>
   </div>
   <h3>Three Material Eras</h3>
   <p>The history of ancient flags can be divided into three material phases, each with distinct symbolic properties:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Metal (c. 2400-500 BCE)</h4><p>Copper, bronze, gold. Unique, expensive, sacred objects. The Shahdad Standard, the Roman aquila. Authority through irreproducibility.</p></div>
     <div class="feat"><h4>Carved Wood (c. 1500-100 BCE)</h4><p>Egyptian shedshed, various tribal standards. Cheaper than metal but still specialized craft. Regional identity markers.</p></div>
     <div class="feat"><h4>Cloth (c. 100 BCE onward)</h4><p>Roman vexillum, later banners. Lightweight, visible, mass-reproducible. The technology of all modern flags.</p></div>
     <div class="feat"><h4>Hybrid (ongoing)</h4><p>Many ancient standards combined materials: metal finials atop wooden poles with cloth hanging below. The Roman legion used all three simultaneously.</p></div>
   </div>

   <h3>Why Cloth Won</h3>
   <p>Cloth flags triumphed over metal and wood for four practical reasons: they were lighter (a cloth vexillum weighed a fraction of a bronze aquila), more visible (cloth catches wind and movement, attracting the eye), cheaper to produce (enabling every unit to have its own), and more expressive (woven or painted designs could encode complex information). The shift to cloth democratized flag-bearing: from sacred unique objects to reproducible identity markers.</p>

   <h3>The Conceptual Shift</h3>
   <p>The material transition from metal to cloth parallels a conceptual transition from flags as <em>sacred objects</em> (the aquila was literally worshipped) to flags as <em>symbols</em> (the vexillum represented the unit but was not itself sacred). This distinction matters: a symbol can be copied without losing its power, but a sacred object cannot. Modern national flags are symbols in the vexillum tradition, not sacred objects in the aquila tradition &mdash; though some nations treat their flags with quasi-religious reverence.</p>

   <div class="callout"><p>The shift from metal to cloth was not just a technological change but a conceptual revolution: from flags as unique sacred objects to flags as reproducible symbols. This transition, completed by the Romans, is the foundation on which all modern flag culture is built.</p></div>`,

  `<div class="detail-header">
     <div class="num">07</div>
     <h2><em>Vexillology</em> & Legacy</h2>
   </div>
   <h3>Coining of the Term</h3>
   <p><a href="https://en.wikipedia.org/wiki/Whitney_Smith">Whitney Smith</a> coined the term <em>vexillology</em> in 1961, deriving it directly from the Latin <em>vexillum</em>.<span class="cite">[6]<span class="cite-tip">A-06: Wikipedia, &ldquo;Vexillum.&rdquo; Etymology of vexillology, cloth standard descriptions.</span></span> Smith's choice of root word was deliberate: it grounded the new discipline in the ancient tradition of cloth flags rather than the broader category of vexilloids (which includes metal and wooden standards).<span class="cite">[7]<span class="cite-tip">V-01: Whitney Smith, Flags Through the Ages and Across the World (1975). Foundational reference.</span></span> The coinage gave scholarly respectability to what had previously been dismissed as mere hobbyism.</p>

   <h3>Smith's Contributions</h3>
   <p>Smith wrote 27 books on flags, founded the Flag Research Center (1962), established <em>The Flag Bulletin</em> (the first scholarly journal of vexillology), and organized the first International Congress of Vexillology. His archives, transferred to the Dolph Briscoe Center for American History at the University of Texas at Austin, remain the world's largest vexillological research collection.</p>

   <h3>FIAV & International Infrastructure</h3>
   <p>The <a href="https://fiav.org">International Federation of Vexillological Associations (FIAV)</a>, founded in 1969, now coordinates vexillological research worldwide.<span class="cite">[8]<span class="cite-tip">V-05: FIAV. International Congress proceedings, Whitney Smith Award papers.</span></span> Biennial International Congresses of Vexillology have been held since 1965, with proceedings published as the primary scholarly record of the field. FIAV member organizations span every inhabited continent.</p>

   <h3>Ancient Patterns in Modern Flags</h3>
   <p>Every major function established in the ancient period persists in modern flag culture:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Military ID</h4><p>From Egyptian shedshed to NATO force identification flags. 4,000 years of flags marking who fights for whom.</p></div>
     <div class="feat"><h4>Religious Symbol</h4><p>From Constantine's labarum to Saudi Arabia's shahada. Flags as declarations of faith.</p></div>
     <div class="feat"><h4>Sovereignty</h4><p>From Sassanid royal standards to UN member flags. The flag as proof of statehood.</p></div>
     <div class="feat"><h4>Revolution</h4><p>From Kaveh's leather apron to the French tricolor. Flags as tools of resistance and transformation.</p></div>
   </div>

   <div class="callout"><p>The ancient origins matter not as antiquarian curiosity but because they established every paradigm modern flags operate within. When a new nation designs its flag, it is working with patterns first established by copper-smiths in Iran and standard-bearers on the banks of the Nile.</p></div>`,

  `<div class="detail-header">
     <div class="num">08</div>
     <h2><em>Ancient</em> Timeline</h2>
   </div>
   <h3>Complete Chronology</h3>
   <p>The ancient period of vexillological history spans from the earliest evidence of symbolic standards through the end of the classical and Sassanid civilizations. This timeline traces the major developments across approximately 3,000 years.</p>

   <div class="timeline">
     <div class="tl-item"><span class="tl-date">c. 2400 BCE</span><span class="tl-text">Shahdad Standard created in southeastern Iran &mdash; earliest known vexilloid (copper and semi-precious stones)</span></div>
     <div class="tl-item"><span class="tl-date">c. 3100 BCE</span><span class="tl-text">Narmer Palette depicts standards in military context &mdash; earliest artistic evidence of vexilloids in use</span></div>
     <div class="tl-item"><span class="tl-date">c. 1500 BCE</span><span class="tl-text">Egyptian <em>shedshed</em> (nome standards) in widespread use during New Kingdom &mdash; 42 provincial standards with animal totems</span></div>
     <div class="tl-item"><span class="tl-date">c. 500 BCE</span><span class="tl-text">Persian Achaemenid Empire uses elaborate royal standards across vast territory from Anatolia to India</span></div>
     <div class="tl-item"><span class="tl-date">107 BCE</span><span class="tl-text">Marian reforms establish the <em>aquila</em> as sole standard for each Roman legion, replacing earlier variety of animal standards</span></div>
     <div class="tl-item"><span class="tl-date">c. 100 BCE</span><span class="tl-text">Roman <em>vexillum</em> (cloth standard) comes into widespread use &mdash; the first true cloth flag</span></div>
     <div class="tl-item"><span class="tl-date">9 CE</span><span class="tl-text">Three Roman legions lose their eagles at Teutoburg Forest &mdash; recovery missions launched for decades afterward</span></div>
     <div class="tl-item"><span class="tl-date">312 CE</span><span class="tl-text">Constantine adopts the <em>labarum</em> with Chi-Rho monogram &mdash; first explicitly ideological military standard</span></div>
     <div class="tl-item"><span class="tl-date">636 CE</span><span class="tl-text">Derafsh Kaviani captured by Arab forces at al-Qadisiyyah &mdash; gems stripped, cloth burned</span></div>
     <div class="tl-item"><span class="tl-date">651 CE</span><span class="tl-text">Fall of Sassanid Empire to Arab conquest &mdash; end of ancient Persian standard tradition</span></div>
   </div>

   <h3>Cross-References</h3>
   <p>The ancient standard traditions did not disappear; they were transformed. The Roman military standard system was inherited by the Byzantine Empire and evolved into the heraldic systems of the Crusades (<a href="s2-heraldic.dd.html">S2: The Heraldic Age</a>). The Ottoman crescent may derive from Byzantine Constantinople's patron symbol (<a href="s3-empire.dd.html">S3: Empire & Conquest</a>). The Derafsh Kaviani's revolutionary symbolism echoes through the French tricolor (<a href="s4-revolution.dd.html">S4: Revolution & the Tricolor</a>).</p>

   <div class="callout"><p>The ancient period established the five functions that all flags serve to this day: military identification, religious declaration, sovereign authority, revolutionary resistance, and territorial identity. Every subsequent era of flag history builds on these foundations.</p></div>`
];

<script>
// DOM BUILDER
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head"><div class="sidebar-logo"><em>S1</em></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> SECTION 1 &middot; VEXILLOLOGY</div>
        <div class="hero-title">Ancient <em>Origins</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>c. 2400 BCE &ndash; 651 CE &middot; 8 subsections &middot; <a href="index.html" style="color:inherit;border:none">project index</a></span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.id = `section-${idx}`;
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

let lastDetailIdx = 0;
function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}
if (window.location.hash) {
  const target = document.getElementById(window.location.hash.slice(1));
  if (target) setTimeout(() => target.scrollIntoView({behavior:'smooth',block:'start'}), 100);
}
function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}
function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}
function toggleDetail() {
  if (document.body.classList.contains('detail-open')) closeRight();
  else openDetail(lastDetailIdx);
}
function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  document.body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  localStorage.setItem('theme', current === 'light' ? 'dark' : 'light');
}
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
