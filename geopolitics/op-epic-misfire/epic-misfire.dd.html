<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operation Epic Misfire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;

  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}


.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}
.v-col.pro h4{color:var(--green)}.v-col.con h4{color:var(--red)}
.v-col ul{list-style:none;padding:0}
.v-col li{font-size:14px;padding:4px 0;position:relative;line-height:1.7;font-family:var(--serif);padding-left:16px;font-weight:var(--medium-weight)}
.v-col.pro li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:12px;font-family:var(--sans)}
.v-col.con li::before{content:'✗';position:absolute;left:0;color:var(--red);font-size:12px;font-family:var(--sans)}

.diagram-wrap{margin:20px 0;padding:20px;background:var(--bg);border:1px solid var(--border);overflow-x:auto}
.diagram-wrap svg{width:100%;height:auto}.diagram-wrap svg text{font-family:'IBM Plex Mono',monospace}
.diagram-wrap svg .node{fill:var(--node-fill);stroke:var(--border);stroke-width:1}
.diagram-wrap svg .node-hi{fill:var(--node-hi-fill);stroke:var(--accent);stroke-width:1.5}
.diagram-wrap svg .edge{stroke:var(--border-hi);stroke-width:var(--edge-dim-w);fill:none}
.diagram-wrap svg .edge-hi{stroke:var(--accent);stroke-width:var(--edge-hi-w);fill:none;stroke-dasharray:6,3;animation:dash var(--dash-speed) linear infinite}
@keyframes dash{to{stroke-dashoffset:-9}}
.diagram-wrap svg .lbl{fill:var(--dim);font-size:11px}.diagram-wrap svg .lbl-hi{fill:var(--accent);font-size:11px}
.diagram-wrap svg .node-text{fill:var(--bright);font-size:12px;font-weight:500}.diagram-wrap svg .node-sub{fill:var(--dim);font-size:10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.chip{font-family:var(--mono);font-size:var(--chip-size);color:var(--dim);display:inline-block;border:1px solid var(--border);padding:4px 12px;font-weight:var(--body-weight);letter-spacing:var(--chip-ls)}

.timeline{margin:18px 0;padding:0;border-left:1px solid var(--accent)}
.tl-item{padding:12px 0 12px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-3px;top:18px;width:5px;height:5px;background:var(--accent);border-radius:50%}
.tl-item:last-child{border-bottom:none}
.tl-date{font-family:var(--sans);font-size:var(--tl-date-size);color:var(--accent);font-weight:var(--label-weight);letter-spacing:var(--tl-date-ls);text-transform:var(--tl-date-transform)}
.tl-text{font-size:15px;line-height:1.7;font-family:var(--serif)}

.callout{border:none;border-left:3px solid var(--accent);padding:16px 0 16px 20px;margin:20px 0;background:none}
.callout h4{color:var(--accent);font-size:10px;margin-bottom:8px;font-family:var(--sans);text-transform:uppercase;letter-spacing:var(--label-ls);font-weight:var(--label-weight)}
.callout p{font-size:var(--callout-p-size);margin:0;line-height:1.9;font-family:var(--serif);font-style:var(--callout-p-style);color:var(--callout-p-color);font-weight:var(--callout-p-weight)}

.security-box{border:none;border-left:3px solid var(--red);padding:16px 0 16px 20px;margin:20px 0;background:var(--security-bg)}
.security-box h4{color:var(--red);font-size:10px;font-weight:var(--label-weight);letter-spacing:var(--label-ls);text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)}
.security-box p{font-size:15.5px;line-height:1.9;margin-bottom:10px;font-family:var(--serif);font-weight:var(--medium-weight)}.security-box p:last-child{margin-bottom:0}

.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:16px 0;border:1px solid var(--border)}
.price-card{border-right:1px solid var(--border);padding:18px 12px;text-align:center;background:none;border-radius:0}
.price-card:last-child{border-right:none}.price-card.hl{background:var(--accent-soft)}
.price-card h4{font-size:var(--price-h4-size);font-weight:var(--body-weight);color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--price-h4-ls);font-family:var(--sans)}
.price-card .price{font-family:var(--serif);font-size:var(--price-val-size);color:var(--bright);font-weight:var(--heading-weight);font-style:italic;letter-spacing:var(--price-val-ls)}
.price-card .pn{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--sans)}

@media(max-width:1000px){
  .sidebar{display:none}
  .ctrl-group{top:10px;right:10px}
  .ctrl-btn{width:32px;height:32px;font-size:14px}
  .shell{display:block;position:relative}
  .main{height:100vh;width:100%}
  .main-head{padding:20px 20px 0}
  .hero-title{font-size:28px!important;letter-spacing:0!important}
  .masthead-sub{flex-direction:column;gap:2px}
  .main-head.compact{padding:0 20px;height:44px}
  .main-head.compact .hero-title{font-size:18px!important}
  .main-scroll{padding:0 20px 80px}
  .section-block{padding:28px 8px}
  .right{position:fixed;top:0;left:0;width:100%!important;height:100vh!important;z-index:100;border-left:none;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .right.closed{transform:translateX(100%);width:100%!important;overflow:hidden}
  .right:not(.closed){transform:translateX(0)}
  .right-inner{padding:0 20px 80px}
  .right-topbar{padding:10px 20px 0;height:44px}
  .detail-header h2{font-size:26px!important}
  .feat-grid,.verdict,.price-grid{grid-template-columns:1fr}
  .feat{border-left:none!important;padding-left:0!important}
  .feat:nth-child(2n){padding-left:0}
  .v-col{padding:16px 0!important}
  .v-col:last-child{border-left:none!important;padding-left:0!important}
  .price-card{border-right:none!important;border-bottom:1px solid var(--border)}.price-card:last-child{border-bottom:none}
  .tl-item{flex-direction:column!important;gap:4px}
  .tl-date{min-width:unset!important}
  .detail p{font-size:16px}
  .detail pre{font-size:12px;padding:14px 16px}
  .section-block .s-stat{flex-wrap:wrap}
  .section-block .s-stat .st{min-width:45%}
}

  /* Links */
  a{color:var(--dim);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--dim),transparent 50%);transition:color .2s,border-color .2s}
  a:hover{color:var(--accent);border-bottom-color:var(--accent);border-bottom-style:solid}
  .detail a{color:var(--text);border-bottom-color:color-mix(in srgb,var(--accent),transparent 60%)}
  .detail a:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .section-block a{color:var(--text);border-bottom-color:color-mix(in srgb,var(--accent),transparent 60%)}
  .section-block a:hover{color:var(--accent);border-bottom-color:var(--accent)}

  
  </style>
</head>
<body data-theme="light">
<script>

const sections = [
  { num: '01', short: 'The Concession', title: 'Iran Is <em>Real</em>' },
  { num: '02', short: 'Beneficiaries', title: 'The <em>Beneficiaries</em> Scoreboard' },
  { num: '03', short: 'Petroyuan', title: 'The <em>Petroyuan</em> Toll Booth' },
  { num: '04', short: 'The Losers', title: 'Who <em>Pays</em>' },
  { num: '05', short: 'Structural Trap', title: 'The <em>Structural</em> Trap' },
  { num: '06', short: 'The Alternative', title: 'Deterrence Through <em>Obsolescence</em>' }
];

const summaries = [
  '<p>This is not a pacifist argument. Military force has its place in statecraft — and Iran’s nuclear ambitions, proxy networks, and massacre of its own protesters represent genuine threats. The hawks were not wrong about the diagnosis.</p><p>They were wrong about the treatment. Sun Tzu warned that the supreme art of war is to subdue the enemy without fighting. Churchill understood that economic warfare, blockades, and strategic patience could accomplish what frontal assaults could not. The question is never whether a threat is real. It is whether the chosen response makes you stronger or weaker.</p><div class="s-stat"><div class="st"><div class="sv">3,000+</div><div class="sl">Protesters Killed by Regime</div></div><div class="st"><div class="sv">Near</div><div class="sl">Nuclear Breakout</div></div><div class="st"><div class="sv">Decades</div><div class="sl">Proxy Networks</div></div><div class="st"><div class="sv">Real</div><div class="sl">Threat</div></div></div><p>We grant the hawk premise entirely. Then we show that Operation Epic Fury has been a strategic gift to every adversary it was supposed to deter.</p>',
  '<p>The strategic ledger one month into Operation Epic Fury: Russia is the clearest winner, China the most consequential, and Iran — the target — has discovered leverage it didn’t know it had. The war is strengthening every adversary it was supposed to weaken.</p><div class="feat-grid"><div class="feat"><h4>Russia: $45–151B</h4><p>Additional budget revenues from the oil windfall, per the KSE Institute. Enough to erase its entire 2025 fiscal deficit and sustain the Ukraine war for years.</p></div><div class="feat"><h4>China: Intel Bonanza</h4><p>Observing U.S. carrier ops, intercept patterns, and logistics in real time — free Taiwan planning data worth more than any espionage operation.</p></div><div class="feat"><h4>Iran: Hormuz as Weapon</h4><p>$10B defense budget holding the $100T global economy hostage. Tehran is now monetizing the strait in yuan. The lesson is permanent.</p></div><div class="feat"><h4>Axis Hardening</h4><p>Russia providing satellite intel to Iran. China supplying components. What was loose coordination is becoming structured alignment under common threat.</p></div></div><p>As the Centre for European Reform concluded: Russia is likely the biggest winner. The Peterson Institute asked the right question: why would Moscow or Beijing interrupt a war where the U.S. is getting stuck in an expensive quagmire?</p>',
  '<p>The petrodollar system — America’s most strategically valuable financial architecture — is under direct assault. Not from a rival currency bloc. From the war itself.</p><div class="s-stat"><div class="st"><div class="sv">¥2+</div><div class="sl">Ships Paid in Yuan</div></div><div class="st"><div class="sv">26</div><div class="sl">IRGC-Vetted Transits</div></div><div class="st"><div class="sv">1974</div><div class="sl">Petrodollar Born</div></div><div class="st"><div class="sv">2026</div><div class="sl">Petroyuan Tested</div></div></div><p>Deutsche Bank warned this week that the conflict “could be the catalyst for erosion in petrodollar dominance and the beginnings of the petroyuan.” Lloyd’s List confirmed yuan-settled transit fees at Hormuz. Iran’s parliament is drafting toll legislation. The architecture of non-dollar oil trade is being built in real time — at a chokepoint America is supposedly defending.</p>',
  '<p>The accounting is brutal across the entire Western alliance and beyond. The war’s costs are not limited to the $200 billion Pentagon ask — they cascade through energy markets, health care systems, supply chains, and diplomatic relationships.</p><div class="feat-grid"><div class="feat"><h4>United States</h4><p>$200B ask, $1B/day burn rate, 37% presidential approval, health care cuts to fund it, SPR depleted, 60%+ public disapproval of the war.</p></div><div class="feat"><h4>Europe</h4><p>Second energy crisis in four years. ECB postponed rate cuts. Gas storage at 30%. Germany and Italy facing recession. UK inflation expected to breach 5%.</p></div><div class="feat"><h4>Gulf States</h4><p>Oil exports bottled up. Tourism collapsed (Dubai airport traffic down 25–30%). Desalination plants struck. The GCC economic model in systemic collapse.</p></div><div class="feat"><h4>Global South</h4><p>Philippines state of emergency. Pakistan, Bangladesh, Nigeria fuel crises. Fertilizer prices up 30%. No reserves, no alternatives, no voice in the decision.</p></div></div><p>At home, Republicans are exploring ACA cost-sharing cuts to offset the war — saving $30 billion by making 300,000 more Americans uninsured. The war costs the country abroad and its citizens their health care at home.</p>',
  '<p>Grant the hawks their best case: every nuclear site destroyed, IRGC degraded, regime collapses. Even then, the war does not solve the underlying problem. The lesson of Hormuz is now proven and permanent.</p><div class="s-stat"><div class="st"><div class="sv">106:1</div><div class="sl">Interceptor-to-Drone Cost</div></div><div class="st"><div class="sv">$10B</div><div class="sl">Iran Defense Budget</div></div><div class="st"><div class="sv">20%</div><div class="sl">Global Oil Offline</div></div><div class="st"><div class="sv">Permanent</div><div class="sl">Lesson Learned</div></div></div><p>A state with a $10 billion defense budget has demonstrated it can hold the $100 trillion global economy hostage through a narrow waterway. This vulnerability is structural — it exists because the world runs on fuel that must ship through physical chokepoints. No regime change in Tehran changes that geometry. The next adversary to close a strait might not even be Iran.</p>',
  '<p>Half the war’s cost — $100 billion — in renewable energy would not just save money. It would devalue the weapon Iran just discovered. Deterrence through obsolescence: make the chokepoint irrelevant.</p><div class="s-stat"><div class="st"><div class="sv">100+ GW</div><div class="sl">New Solar Capacity</div></div><div class="st"><div class="sv">575K</div><div class="sl">Jobs Created</div></div><div class="st"><div class="sv">25–30 yr</div><div class="sl">Asset Lifespan</div></div><div class="st"><div class="sv">$3–$8</div><div class="sl">Return per $1</div></div></div><p>Every gigawatt of renewable capacity is a gigawatt that does not depend on tankers navigating a war zone. Since the war began, existing solar and wind worldwide have avoided 330 TWh of gas generation, saving $40 billion. China — which invested massively in clean power — is better cushioned than any Western economy. Beijing saw this coming. Washington did not.</p><div class="s-chips"><span class="s-chip">solar $28–117/MWh</span><span class="s-chip">onshore wind 3–5¢/kWh</span><span class="s-chip">73% of clean mfg in GOP states</span></div>'
];

const details = [
  '<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01</div><h2>Iran Is <em>Real</em></h2></div><p>The Islamic Republic massacred between 3,117 (official) and over 30,000 (unofficial) of its own citizens during the December 2025–January 2026 protests. It has spent decades funding Hezbollah, Hamas, and Houthi militias. Its ballistic missile program was expanding. It was inching toward nuclear breakout capability. These are not inventions of hawkish fantasy.</p><h3>The Case for Force</h3><p>Military power is a legitimate instrument of statecraft. No serious strategic thinker has argued otherwise. The question — the only question that matters — is whether a given application of force achieves its objectives at acceptable cost. Clausewitz defined war as the continuation of politics by other means. He also warned that war has its own grammar but not its own logic — the political objective must govern the military instrument, not the reverse.</p><h3>The Art of Other Weapons</h3><p>Sun Tzu wrote that the supreme art of war is to subdue the enemy without fighting — not because fighting is immoral, but because it is expensive and uncertain. The highest victory is the one that leaves your own strength intact. Churchill, hardly a pacifist, understood this viscerally. He championed the naval blockade of Germany in both world wars — an economic weapon that strangled the enemy’s capacity to fight without expending British lives in frontal assaults. He invested in radar, intelligence, and code-breaking as force multipliers that made conventional military power dramatically more effective.</p><div class="callout"><h4>The Strategic Question</h4><p>The issue is not whether Iran posed a threat. The issue is whether Operation Epic Fury — at $200 billion and counting, with the Strait of Hormuz closed, oil at $120, the petroyuan emerging, and Russia’s war chest overflowing — has made the United States stronger or weaker relative to its adversaries. By that measure, the operation has misfired.</p></div><h3>The Hawk’s Best Case</h3><p>The strongest pro-war argument comes from the Foundation for Defense of Democracies: delaying wars often leads to costlier ones later, and WWII is the canonical example. Hawks like Jason Brodsky argue the regime was a “paper tiger” and that this was the window. Defense Secretary Hegseth framed it as finally drawing a line after 47 years of Iranian belligerence. The Atlantic Council notes that the U.S. has destroyed 92% of Iran’s largest ships and over two-thirds of its missile and drone production facilities.</p><p>The counter: that paper tiger took 20% of global oil supply offline with a defense budget 1% the size of America’s. It discovered a weapon — Hormuz — that costs almost nothing to deploy and holds the entire global economy hostage. The 106:1 interceptor-to-drone cost ratio alone tells the story of who is winning the resource war.</p>',
  '<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02</div><h2>The <em>Beneficiaries</em> Scoreboard</h2></div><p>The Peterson Institute for International Economics published a devastating analysis titled “How Russia and China Are Winning the War in Iran.” Its central observation: both powers are sitting on the sidelines not because they lack the capacity to intervene, but because restraint is the optimal strategy. Why interrupt an adversary’s self-inflicted wound?</p><h3>Russia: The Windfall</h3><p>Moscow built its 2026 federal budget on oil at $60/barrel. Brent surged past $120. The KSE Institute modeled three scenarios. In the optimistic case (six-week war, fast recovery), Russia earns an additional $84 billion in export earnings and $45 billion in budget revenues. In the central scenario (three-month war), the windfall reaches $161 billion in additional export revenues — roughly $0.5 billion per day — with $97 billion in extra budget revenues. In the pessimistic six-month scenario, Russia could run a budget surplus and replenish its sovereign wealth fund.</p><p>This is not a side effect. It is a direct, measurable transfer of economic power from the United States and its allies to Russia, mediated through the oil price. American munitions expended over Tehran are, through this mechanism, financing Russian artillery shells fired at Kharkiv.</p><div class="callout"><h4>The Intelligence Dimension</h4><p>Russia is also providing Iran with satellite imagery on U.S. warship and aircraft positions. Iran’s foreign minister has confirmed that military cooperation with Russia and China continues during the conflict. The Toda Peace Institute concluded that what was once cautious coordination is hardening into structured alignment.</p></div><h3>China: The Patient Winner</h3><p>China’s gains operate on multiple timelines simultaneously. In the immediate term, Beijing holds 104 days of strategic oil reserves and has maintained its position as Iran’s largest customer. Chinese-linked tankers have moved at least 11.7 million barrels through Hormuz since the war began, many with transponders off.</p><p>Strategically, the PIIE analysis noted that observing U.S. naval operations in the Gulf — carrier movements, missile intercept patterns, logistics flows — is invaluable for Chinese military planning around Taiwan. The Washington Institute confirmed that China is benefiting from the diversion of U.S. military assets and has no incentive to behave differently.</p><p>China’s massive prior investments in clean power are also cushioning it from gas market volatility, as BloombergNEF noted. Beijing prepared for exactly this kind of disruption. Washington did not.</p><h3>Iran: Asymmetric Victory</h3><p>Bloomberg Economics’ Dina Esfandiary observed that Tehran has been “a little taken aback by how successful its Hormuz strategy has been — by how cheap and comparatively easy it is to hold the global economy hostage.” Iran’s defense budget is less than $10 billion. The U.S. interceptor-to-drone cost ratio runs 106:1. The asymmetry is the point: Iran is forcing America to spend orders of magnitude more to defend than Iran spends to attack.</p><p>The war has also consolidated domestic support for the regime. Protesters who were in the streets in January are now under foreign bombardment — historically a dynamic that rallies populations around their government, not against it.</p>',
  '<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03</div><h2>The <em>Petroyuan</em> Toll Booth</h2></div><p>The petrodollar was born from crisis. In 1974, after the Arab oil embargo shattered confidence in dollar-gold convertibility, Saudi Arabia agreed to price all oil exports in U.S. dollars and recycle surpluses into American assets. In exchange, Washington guaranteed the kingdom’s security — including free navigation through the Strait of Hormuz. This arrangement underpins dollar reserve status, keeps U.S. borrowing costs low, and gives Washington outsized sanctions leverage.</p><p>The Iran war is stress-testing every pillar of that bargain simultaneously.</p><h3>The Security Umbrella Fails</h3><p>The U.S. security guarantee for Gulf infrastructure has been visibly punctured. Iranian missiles have struck UAE oil facilities, desalination plants in the Gulf, and U.S. bases across the region. The maritime security promise at Hormuz has failed — 20% of global oil supply is offline. Deutsche Bank’s strategist Mallika Sachdeva wrote that the conflict “may expose further fault lines, by challenging the US security umbrella for Gulf infrastructure and the maritime security for global trade in oil.”</p><p>Gulf states that built their economic models on the security-for-oil-pricing arrangement are watching the security side collapse. Deutsche warned that “damage to Gulf economies could encourage an unwind in their foreign asset savings held largely in dollars.”</p><h3>The Yuan at the Gate</h3><p>Lloyd’s List confirmed that at least two vessels have paid transit fees in Chinese yuan, brokered by a Chinese maritime services company. Twenty-six vessel transits have followed an IRGC “toll booth” system requiring operators to submit vessel details, crew manifests, IMO numbers, and cargo documentation. An IRGC naval boat then escorts approved ships through Iranian territorial waters. Ships that fail the screening are turned back.</p><p>Iran’s parliament is now drafting legislation to formalize the toll system. An official stated: “Just as in other corridors, when goods pass through a country, duties are paid. The Strait of Hormuz is also a corridor.” Meanwhile, Iran has explicitly granted Chinese vessels preferential passage and demanded that other oil cargoes be traded in yuan.</p><div class="security-box"><h4>The Deutsche Bank Warning</h4><p>Deutsche Bank’s note concluded: “The conflict could be remembered as a key catalyst for erosion in petrodollar dominance, and the beginnings of the petroyuan.” This is not a fringe analysis. It is a major Western bank’s FX strategy desk warning that the war is damaging the financial architecture it was supposed to protect. The Asia Times captured it precisely: Hormuz is becoming a laboratory for converting control over a physical chokepoint into leverage over the currency of trade itself.</p></div><h3>The Deeper Irony</h3><p>Fortune noted that there’s an even bigger threat to dollar dominance than the yuan: a permanent shift away from globally traded oil and gas. In other words, the best long-term defense of the petrodollar is not a war to keep oil flowing — it is an energy transition that makes the oil irrelevant. The war is accelerating the petroyuan. Renewables would have prevented it.</p>',
  '<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04</div><h2>Who <em>Pays</em></h2></div><p>The Pentagon’s $200 billion supplemental request is unprecedented for a single appropriation. CSIS estimated $3.7 billion in the first 100 hours. The Penn Wharton Budget Model projects direct costs of $40–$95 billion with total economic impact reaching $210 billion. Rep. Thomas Massie asked the question no one has answered: “How long do they plan to be there? What are the goals? Is this the first $200 billion? Does this turn into a trillion?”</p><h3>The Health Care Trade</h3><p>House Budget Chair Jodey Arrington is pushing to attach war funding to a reconciliation bill, offset by cuts to health care. The primary target: eliminating ACA cost-sharing reductions that help low-income Americans afford deductibles and copays. The CBO estimates this saves $30 billion while raising premiums 11% and increasing the uninsured by 300,000 through 2034. This comes atop nearly $1 trillion in Medicaid cuts already enacted. Since ACA premium tax credits expired, Americans are paying $780 more per year, with costs doubling for 22 million people.</p><p>Sen. Rand Paul opposes both the war and funding it. Rep. Chip Roy demands articulated victory conditions. Rep. Lauren Boebert has declared a flat no. Even within the GOP, the bill is toxic.</p><h3>Europe’s Second Energy Crisis</h3><p>European gas storage entered the conflict at just 30% capacity after a harsh winter. Dutch TTF gas benchmarks nearly doubled to over €60/MWh by mid-March. The ECB postponed planned rate reductions and cut GDP growth projections. The Centre for European Reform warned that energy-dependent economies face high risk of technical recession if the blockade persists through summer refill season. Shell issued a warning that Europe could face fuel shortages as early as April.</p><h3>Supply Chain Cascade</h3><p>The damage extends far beyond fuel. The Hormuz closure has choked helium supplies — a byproduct of natural gas critical to semiconductor fabrication and MRI machines. Pharmaceutical supply chains dependent on petrochemicals face price spikes. An Iran-linked cyberattack crippled Stryker’s medical device manufacturing. Fertilizer prices surged 30%, threatening food security across import-dependent economies. The Philippines declared a state of emergency. Pakistan, Bangladesh, Nigeria, and Vietnam face severe fuel shortages.</p><div class="security-box"><h4>The Compounding Failure</h4><p>The war is simultaneously degrading health care funding at home and disrupting health care supply chains globally. Helium shortages affect MRI diagnostics. Pharmaceutical costs are rising. Medical device production is compromised by cyberattacks. Cutting health care budgets to fund the war that is damaging health care infrastructure is not a trade-off. It is a compounding failure.</p></div>',
  '<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05</div><h2>The <em>Structural</em> Trap</h2></div><p>Sun Tzu taught that the wise general wins by understanding the terrain — not by throwing force against it. The terrain here is not Iranian geography. It is the global economy’s structural dependence on fossil fuels shipped through physical chokepoints. No amount of military spending changes that geometry.</p><h3>The Asymmetric Math</h3><p>Iran’s defense budget is less than $10 billion — roughly 1% of America’s. Yet with naval mines, coastal missile batteries, and drone swarms, Tehran has taken 20% of global oil supply offline. The interceptor-to-drone cost ratio runs approximately 106:1: each cheap Iranian drone is destroyed by missiles costing orders of magnitude more. Jennifer Kavanagh of Defense Priorities estimated the U.S. spent over $10 billion on air-defense systems in the first 48 hours alone.</p><p>This is the asymmetry Sun Tzu described: strike where the enemy is weak, avoid where they are strong. Iran cannot match U.S. firepower. It doesn’t need to. It only needs to threaten the narrow waterway through which the global economy’s lifeblood flows.</p><h3>The Contradiction</h3><p>The U.S. military cannot simultaneously project force against a country and guarantee the commercial safety of the waterways adjacent to that country. The Strait of Hormuz is both the battlefield and the supply line. You cannot bomb Iran and keep its shipping lanes open at the same time. This is not a failure of execution. It is a contradiction embedded in the strategic logic itself.</p><p>A Virginia Tech economist noted that what makes this crisis structurally distinct from the 1973 or 1979 oil shocks is the simultaneous disruption of oil, LNG, fertilizer, helium, and pharmaceutical supply chains. The more complex the global economy becomes, the more devastating fossil fuel chokepoint disruptions get.</p><div class="callout"><h4>The Permanent Lesson</h4><p>Even if the war succeeds completely — regime change, nuclear program eliminated, IRGC dismantled — the lesson is permanent. Every state on Earth now knows that a narrow waterway plus cheap drones equals global economic leverage. The next actor to exploit this might be a non-state group, a different regime, or a future Iranian government. Churchill understood that you cannot un-teach an enemy a successful tactic. You can only make the tactic irrelevant.</p></div><h3>The Counter-Counterargument</h3><p>One hawkish op-ed argued that Russia is also a loser because its multipolar vision “looks astonishingly weak” when Moscow could only offer condolences as U.S. allies fell. This misreads the ledger. Russia doesn’t need to project power to win — it needs high oil prices and U.S. attention diverted from Ukraine. Both are being delivered. The PIIE’s analysis is definitive: even in the most optimistic scenario, Russia earns an additional $84 billion. Weakness in rhetoric, windfall in revenue.</p>',
  '<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06</div><h2>Deterrence Through <em>Obsolescence</em></h2></div><p>Churchill’s greatest strategic insight was not about the application of force. It was about the application of alternatives to force. He championed radar because it multiplied the effectiveness of existing aircraft. He invested in code-breaking because it turned intelligence into a weapon as powerful as any battleship. He understood that the most durable victories come from changing the terms of the contest — not from winning it on the enemy’s terms.</p><p>The renewable energy case is precisely this kind of strategic reframing. It does not argue against military power. It argues for making the chokepoint irrelevant — so that military power is not required to defend it.</p><h3>The Capacity Math</h3><p>At current prices ($0.80–1.00/watt installed, all-in), $100 billion buys approximately 100–125 GW of new utility-scale solar capacity. For context, the entire United States installed 36 GW of solar in 2024. One hundred billion dollars would triple annual additions overnight. Combined with wind and battery storage, it would be the single largest clean energy investment in history.</p><p>In 2025, the world added a record 814 GW of new solar and wind — enough to generate 1,046 TWh annually. That single year’s additions displace more than one-seventh of global gas generation and save roughly $138 billion per year in gas import costs. The infrastructure pays for itself.</p><h3>The Security Argument</h3><p>This is not a climate argument. It is a security argument. Domestic solar, wind, and batteries have no supply chain running through contested straits. They cannot be blockaded, torpedoed, or held hostage by an IRGC toll booth. A nation that generates its electricity from its own sun and wind is a nation whose economy cannot be crashed by closing a waterway 6,000 miles away.</p><p>Ember’s data makes this concrete: since the war began, all installed solar and wind worldwide has avoided approximately 330 TWh of gas-fired generation, saving over $40 billion. China’s massive prior investment in clean power is cushioning it from the gas market volatility this war has caused. BloombergNEF’s managing director noted: “China has pulled all these triggers in the last few years to be prepared for a moment like this.”</p><div class="callout"><h4>The Deutsche Bank Coda</h4><p>Deutsche Bank’s petroyuan note ended with a quietly devastating observation: the biggest long-term threat to dollar dominance is not the yuan. It is a permanent shift away from globally traded oil and gas. A world less dependent on oil is a world where Hormuz doesn’t matter, where the petrodollar question is moot, and where $200 billion wars of choice become unnecessary. The best defense of American financial architecture is not military — it is energetic.</p></div><h3>The Strategic Contrast</h3><p>$200 billion in war spending produces munitions consumed on use, infrastructure destroyed, and geopolitical instability that lingers. It has no residual economic value and no exit strategy. $100 billion in renewables builds infrastructure that generates returns for 25–30 years, creates 575,000+ jobs (73% in Republican-voting states), and returns $3–$8 per dollar invested according to IRENA. One spending category is a consumable. The other is a productive asset. One makes you dependent on the next war. The other makes the next war unnecessary.</p><p>The measure of strategy is not whether you can destroy a threat. It is whether your response leaves you stronger or weaker. Operation Epic Fury is weakening America by every metric that matters — financial, diplomatic, structural, and strategic. The chokepoint is being defended. The question is: defended for whom?</p>'
];

const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach(function(sec, idx) {
  var item = document.createElement('div');

});

var sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
var sidebarEl = document.querySelector('.sidebar');
var tipActive = false;
sidebarNav.addEventListener('mouseleave', function() {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', function(e) {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  var item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  var rect = item.getBoundingClientRect();
  var sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

var lastDetailIdx = 0;

function scrollToSection(idx) {
  var blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}

function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(function(d) { d.style.display = 'none'; });
  document.getElementById('detail-' + idx).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}

function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}

function toggleDetail() {
  if (document.body.classList.contains('detail-open')) {
    closeRight();
  } else {
    openDetail(lastDetailIdx);
  }
}

function toggleTheme() {
  var current = document.body.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
}

document.body.setAttribute('data-theme', 'dark');

mainScroll.addEventListener('scroll', function() {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  var blocks = mainScroll.querySelectorAll('.section-block');
  var items = document.querySelectorAll('.sidebar-item');
  var activeIdx = 0;
  blocks.forEach(function(b, i) {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach(function(item, i) { item.classList.toggle('active', i === activeIdx); });
});

var rightPanelOuter = document.getElementById('right');
var stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', function() {
  var activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  var h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  var rect = h2.getBoundingClientRect();
  var panelRect = rightPanelOuter.getBoundingClientRect();
  var topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeRight();
