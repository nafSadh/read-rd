<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pages with Images — read:rd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--amber:#8a6e1e;
  --grain-opacity:0.015;--grad1:#7c3aed06;--grad2:#9b7aed04;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--amber:#e8c870;
  --grain-opacity:0.02;--grad1:#9b7aed06;--grad2:#4ee8d004;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Jost',-apple-system,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .5s,color .4s}
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,var(--grad1),transparent),radial-gradient(ellipse 60% 50% at 85% 75%,var(--grad2),transparent);transition:background 1s}

.shell{max-width:900px;margin:0 auto;padding:48px 24px 100px;position:relative;z-index:1}
.head{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:32px;display:flex;align-items:baseline;justify-content:space-between}
.head h1{font-family:'EB Garamond',Georgia,serif;font-size:32px;font-weight:500;color:var(--bright);letter-spacing:.5px}
.head h1 em{font-style:italic;color:var(--accent);font-weight:400}
.head-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
.ctrl-btn{width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);background:transparent;border:1px solid var(--border);transition:color .2s,background .2s}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}

.topic{margin-bottom:40px}
.topic-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;font-weight:600}
.topic-title{font-family:'EB Garamond',Georgia,serif;font-size:24px;color:var(--bright);font-weight:500;letter-spacing:.3px;margin-bottom:16px}
.topic-title em{font-style:italic;color:var(--accent);font-weight:400}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:all .25s;text-decoration:none;display:block}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px #9b7aed10}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3)}
.card-body{padding:10px 14px}
.card-name{font-family:'Jost',sans-serif;font-size:13px;color:var(--bright);font-weight:500}
.card-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.card-style{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:1px 6px;border-radius:2px;margin-top:4px}
.card-style.sketch{color:var(--accent);border:1px solid var(--accent);background:var(--accent-soft)}
.card-style.photo{color:var(--cyan);border:1px solid var(--cyan);background:transparent}

.back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);text-decoration:none;letter-spacing:1px;transition:color .2s}
.back:hover{color:var(--accent)}

@media(max-width:600px){
  .cards{grid-template-columns:1fr}
  .head h1{font-size:24px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div>
      <h1>Pages with <em>Images</em></h1>
      <div class="head-meta">37 nano banana images &middot; 22 pages &middot; 6 topics</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="index.html" class="back">&larr; home</a>
      <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn"></button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
const topics = [
  {
    label: 'Craft',
    title: 'The Art of <em>Typography</em>',
    style: 'sketch',
    pages: [
      { name: 'Overview', sub: '7 images', href: 'craft/art-of-typography/overview.dd.html', img: 'craft/art-of-typography/img/hero.png' },
      { name: 'S1: History of Type', sub: '3 images', href: 'craft/art-of-typography/s1-history.dd.html', img: 'craft/art-of-typography/img/s1-hero.png' },
    ]
  },
  {
    label: 'Anthropology',
    title: 'History of <em>Flags</em>',
    style: 'photo',
    pages: [
      { name: 'Overview', sub: '1 image', href: 'anthro/flag-history/flag-history.dd.html', img: 'anthro/flag-history/img/hero.png' },
      { name: 'S1: Ancient Origins', sub: '2 images', href: 'anthro/flag-history/s1-origins.dd.html', img: 'anthro/flag-history/img/s1-hero.png' },
      { name: 'S2: Heraldic Age', sub: '2 images', href: 'anthro/flag-history/s2-heraldic.dd.html', img: 'anthro/flag-history/img/s2-hero.png' },
      { name: 'S3: Empire', sub: '1 image', href: 'anthro/flag-history/s3-empire.dd.html', img: 'anthro/flag-history/img/s3-hero.png' },
      { name: 'S4: Revolution', sub: '1 image', href: 'anthro/flag-history/s4-revolution.dd.html', img: 'anthro/flag-history/img/s4-hero.png' },
      { name: 'S5: Decolonization', sub: '1 image', href: 'anthro/flag-history/s5-decolonization.dd.html', img: 'anthro/flag-history/img/s5-hero.png' },
      { name: 'S6: Design', sub: '1 image', href: 'anthro/flag-history/s6-design.dd.html', img: 'anthro/flag-history/img/s6-hero.png', style: 'sketch' },
    ]
  },
  {
    label: 'Craft',
    title: 'Constructed <em>Languages</em>',
    style: 'sketch',
    pages: [
      { name: 'Overview', sub: '2 images', href: 'craft/constructed-languages/overview.dd.html', img: 'craft/constructed-languages/img/hero.png' },
    ]
  },
  {
    label: 'Physics',
    title: 'The <em>Cosmos</em> & Physics of Time',
    style: 'sketch',
    pages: [
      { name: 'The Cosmos: Overview', sub: '2 images', href: 'physics/the-cosmos/overview.dd.html', img: 'physics/the-cosmos/img/hero.png' },
      { name: 'The Cosmos: S1 Scales', sub: '1 image', href: 'physics/the-cosmos/s1-scales.dd.html', img: 'physics/the-cosmos/img/s1-hero.png' },
      { name: 'Block Universe', sub: '1 image', href: 'physics/block-universe.dd.html', img: 'physics/img/block-universe-hero.png' },
      { name: 'Nonlinear Time', sub: '1 image', href: 'sci-fi-te/nonlinear-time.dd.html', img: 'physics/img/nonlinear-time-hero.png' },
      { name: 'Retrocausal Emotion', sub: '1 image', href: 'sci-fi-te/retrocausal-emotion/overview.dd.html', img: 'sci-fi-te/retrocausal-emotion/img/hero.png' },
      { name: 'Time Travel in Fiction', sub: '1 image', href: 'sci-fi-te/time-travel-fiction/overview.dd.html', img: 'sci-fi-te/time-travel-fiction/img/hero.png' },
    ]
  },
  {
    label: 'Hiking',
    title: 'Bay Area <em>Trails</em>',
    style: 'sketch',
    pages: [
      { name: 'S1: Nature', sub: '2 images', href: 'hiking/bay-area/s1-nature.dd.html', img: 'hiking/bay-area/img/s1-hero.png' },
      { name: 'S2: Water', sub: '1 image', href: 'hiking/bay-area/s2-water.dd.html', img: 'hiking/bay-area/img/s2-hero.png' },
      { name: 'S3: Views', sub: '1 image', href: 'hiking/bay-area/s3-views.dd.html', img: 'hiking/bay-area/img/s3-hero.png' },
      { name: 'S4: Adventure', sub: '1 image', href: 'hiking/bay-area/s4-adventure.dd.html', img: 'hiking/bay-area/img/s4-hero.png' },
      { name: 'S5: Special', sub: '1 image', href: 'hiking/bay-area/s5-special.dd.html', img: 'hiking/bay-area/img/s5-hero.png' },
    ]
  },
  {
    label: 'Craft',
    title: 'Project Hail <em>Mary</em>',
    style: 'photo',
    pages: [
      { name: 'Deep Dive', sub: '3 images', href: 'craft/project-hail-mary.dd.html', img: 'craft/img/hail-mary-hero.png' },
    ]
  },
];

const content = document.getElementById('content');
topics.forEach(t => {
  const div = document.createElement('div');
  div.className = 'topic';
  div.innerHTML = `<div class="topic-label">${t.label}</div><div class="topic-title">${t.title}</div>`;
  const grid = document.createElement('div');
  grid.className = 'cards';
  t.pages.forEach(p => {
    const s = p.style || t.style;
    grid.innerHTML += `<a class="card" href="${p.href}">
      <img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${p.sub}</div>
        <span class="card-style ${s}">${s}</span>
      </div>
    </a>`;
  });
  div.appendChild(grid);
  content.appendChild(div);
});

// Theme
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  localStorage.setItem('theme', html.getAttribute('data-theme'));
}
const saved = localStorage.getItem('theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
