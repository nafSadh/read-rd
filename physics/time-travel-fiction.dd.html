<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before Einstein: Time Travel in Literature & Words Fiction Gave Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================
   LIGHT THEME (Academic)
   ============================================ */
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#2e6ab4;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}

/* ============================================
   DARK THEME (Luxury, violet/cyan)
   ============================================ */
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),
    radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),
    radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);
  transition:background 1s}

.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}

.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}

.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}

.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}

.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}

.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}

.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}

.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}

.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}

.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}

  `<p>Long before any physicist theorized about the malleability of time, storytellers were already bending it. The earliest examples stretch back thousands of years, across civilizations that had no concept of relativity but intuited that time might not behave the way it feels.</p>

  // 03 — The Time Machine
  `<p>H.G. Wells published <em>The Time Machine</em> in 1895, ten years before Einstein's special relativity. The novel's opening chapter is essentially a physics lecture: the Time Traveller argues that time is the "Fourth Dimension" of space, a mathematical concept Wells borrowed from contemporary geometers, not physicists.</p>
  <p>Wells was not a physicist. He was a student of T.H. Huxley ("Darwin's Bulldog") and brought a biologist's imagination to questions of time. His genius was translating an abstract geometric idea — that time could be treated as a dimension — into a visceral narrative about a man who actually moves through it.</p>

  <p>Notably, the novel predates relativity by a decade. Wells intuited that time could be navigated — not as mysticism, but as engineering. The Time Traveller builds a machine. That shift from magic to mechanism changed everything.</p>`,

  <p>Gaspar's machine is a massive iron vessel, powered by electricity, that carries a group of passengers backward through time. The novel includes remarkably prescient details: a fluid called "Garcia's Electrified" that prevents the passengers from aging backward as the machine reverses time. It's a mechanical solution to a narrative paradox — the kind of logical rigor we associate with later hard sci-fi.</p>

  // 05 — Words Made Real

  // 07 — Fiction → Science
  `<p>The most striking pattern in this history is not that fiction predicted science — it's that fiction directly influenced it. Scientists read novels, and novels shaped what scientists decided to build.</p>
  <p>Hungarian physicist Leó Szilárd read Wells's <em>The World Set Free</em> and was allegedly inspired to conceive the nuclear chain reaction in 1933. Motorola named its first flip phone the StarTAC after the Star Trek communicator. Kip Thorne's work on traversable wormholes was literally commissioned by Carl Sagan for his novel <em>Contact</em>.</p>

  <p>This lineage runs unbroken through the 20th century and into the present: Heinlein's "All You Zombies" (1959), Vonnegut's <em>Slaughterhouse-Five</em> (1969), Ted Chiang's "Story of Your Life" (1998), the Netflix series <em>Dark</em> (2017), and Nolan's <em>Tenet</em> (2020). Each inherits the grammar that Wells, Dickens, Gaspar, and their predecessors invented.</p>

  // 01 Detail — Ancient Roots
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 — Deep Dive</div>
    <h2><em>Ancient</em> Roots of Time Travel</h2>
  </div>
  <p>The Mahabharata's story of King Kakudmi (also called Revati) is arguably the oldest time travel narrative in world literature. Kakudmi travels to the celestial realm of Brahma to seek advice about his daughter's marriage. When he arrives, Brahma is listening to a musical performance and asks Kakudmi to wait. When the performance ends and Kakudmi poses his question, Brahma laughs — explaining that during the brief time Kakudmi spent in the celestial realm, many ages had passed on Earth. Everyone he knew is long dead.</p>
  <p>This is not metaphor. The story explicitly describes differential time passage between two reference frames — one moving at the pace of the gods, one at the pace of mortals. It maps almost perfectly onto the relativistic concept of time dilation, where time passes at different rates depending on gravitational fields or relative velocity.</p>
  <h3>The Chinese Precedent</h3>
  <p>In Dong Yue's 1640 novel <em>A Supplement to the Journey to the West</em>, the character Sun Wukong travels through magical mirrors and jade gateways that connect different points in time. He visits the "World of the Ancients" (the Qin dynasty) and the "World of the Future" (the Song dynasty). The twist: the entire journey takes place inside an illusory dream world created by a villain to trap him. It's time travel nested inside a simulation — a structure that wouldn't reappear in Western fiction for centuries.</p>
  <h3>Urashima Taro</h3>
  <p>The Japanese folk tale of Urashima Taro, recorded in the Nihon Shoki (720 CE), tells of a fisherman who rescues a turtle and is rewarded with a visit to the Dragon Palace beneath the sea. He spends what feels like a few days there, but when he returns home, he discovers that 300 years have passed. He is given a jeweled box and warned never to open it. He opens it, and instantly ages to his true chronological age and dies.</p>
  <p>The structural elements here are strikingly modern: a bounded domain where time passes differently, a physical token that bridges the two temporal frames, and an irreversible consequence for the traveler. These are the same ingredients that would later power stories from Rip Van Winkle to Interstellar.</p>
  <div class="callout">
    <h4>The Pattern</h4>
    <p>Every ancient time travel story involves the same emotional core: a traveler leaves home, returns to find everything changed, and must confront the grief of temporal displacement. The physics may be mythological, but the human truth is precise.</p>
  </div>`,

  // 02 Detail — Before Einstein
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 — Deep Dive</div>
    <h2>The <em>Pre-Einstein</em> Canon</h2>
  </div>
  <p>What distinguishes the pre-Einstein period is not merely that authors imagined time travel — but that they developed increasingly sophisticated mechanisms and paradoxes without any supporting physics. Each generation of authors built on the last, evolving the grammar of temporal fiction from magical transport to mechanical engineering.</p>
  <h3>Samuel Madden (1733)</h3>
  <p>Madden's <em>Memoirs of the Twentieth Century</em> is a series of letters purportedly written by British ambassadors in 1997 and 1998, conveyed back in time to the year 1728 by a guardian angel. The literary scholar Paul Alkon has argued that this guardian angel is the first time traveler in English literature. Madden's goal wasn't to explore time — it was political satire. But by choosing a temporal mechanism (angelic courier) rather than a simple framing device, he created the genre's first prototype.</p>
  <h3>Dickens's Structural Innovation</h3>
  <p>When Dickens wrote <em>A Christmas Carol</em> in 1843, he achieved something no prior author had: bidirectional time travel within a single narrative. Scrooge visits the past (with the Ghost of Christmas Past), observes the present from an outside perspective (Ghost of Christmas Present), and sees a possible future (Ghost of Christmas Yet to Come) — then returns to the present to act on what he learned. This is the complete time travel narrative structure: past observation, future consequence, present agency. Every time travel story since has been a variation on this architecture.</p>
  <h3>Edward Page Mitchell</h3>
  <p>Mitchell's 1881 story "The Clock That Went Backward" is among the earliest mechanical time travel narratives. Published anonymously in the New York Sun, it describes a mysterious clock owned by an elderly Dutch woman. When the clock runs backward, it carries the protagonists into 16th-century Leiden during the Dutch revolt against Spain. The clock is not a device the characters built — it's a found object with unexplained powers — but it represents an important shift: time travel as a property of a physical mechanism, not a spiritual experience.</p>
  <h3>Mark Twain's Violence</h3>
  <p>Twain's <em>A Connecticut Yankee in King Arthur's Court</em> (1889) deserves attention not just for its time travel mechanism (a blow to the head) but for what happens when the time traveler arrives. Hank Morgan doesn't just observe the past — he industrializes it. He introduces electric fencing, Gatling guns, and telephone lines into 6th-century England. The novel's climax, where 25,000 knights are massacred by machine guns, has been read by critics as a prophecy of World War I trench warfare, written 25 years before the fact. Twain used time travel not as wonder but as critique: modernity is not liberation, it's carnage with better tools.</p>

    <h2><em>Wells</em> & The Time Machine</h2>
  </div>
  <p>The opening chapter of <em>The Time Machine</em> is one of the most consequential passages in the history of fiction. The Time Traveller gathers his friends in a drawing room and delivers what amounts to a lecture on four-dimensional geometry. He argues that time is simply the fourth dimension — that any real body must extend in four directions (length, breadth, thickness, and duration) and that our inability to move freely along the time axis is a limitation of perception, not physics.</p>
  <p>This was not Einstein's idea. Einstein's 1905 paper on special relativity was still a decade away. Wells drew from a different tradition: the mathematical exploration of higher-dimensional spaces by thinkers like Charles Howard Hinton, who had written about the fourth dimension in the 1880s, and the popular reception of Edwin Abbott's <em>Flatland</em> (1884), which used dimensional analogy as social satire.</p>
  <h3>The Crucial Move</h3>
  <p>Wells's genius was not the fourth dimension concept itself — that was in the mathematical air. His genius was translating it into mechanism. The Time Traveller doesn't dream or sleep or pray his way through time. He builds a machine. He sits in a saddle, pushes a lever, and accelerates along the temporal axis just as a train accelerates along a spatial one. This engineering framing is what separates Wells from every predecessor. It's also what connects him directly to Einstein: both treated time as something that responds to physical manipulation, not spiritual intervention.</p>

  <p>The novel contains several ideas that proved surprisingly compatible with later physics. The block universe — the idea that past, present, and future coexist as a static four-dimensional structure — is implicit in the Time Traveller's argument that all moments are equally real. The experience of time dilation during the journey (the Traveller watches the sun arc across the sky in seconds) mirrors what a relativistic observer would see. And the deep-future scenes, where the Traveller witnesses the heat death of Earth, anticipate thermodynamic arguments about the arrow of time that would dominate 20th-century physics.</p>

  <p>Literary scholar Elana Gomel has identified the fundamental tension in Wells's invention: for time travel to be plausible, determinism must be absolute — everything past, present, and future has already happened. But fiction needs characters who make meaningful choices. This contradiction, which Gomel calls "chronoclasm," has haunted every time travel story since. Heinlein embraced it (in "All You Zombies," a person is their own parent), Bradbury weaponized it (in "A Sound of Thunder," stepping on a butterfly rewrites history), and Nolan tried to dissolve it (Tenet's temporal pincer movement treats backward time as military strategy rather than metaphysical crisis).</p>`,

    <h2>The <em>Forgotten</em> First Time Machine</h2>
  </div>
  <p>Enrique Gaspar y Rimbau was a Spanish diplomat and playwright, not a scientist. In 1887 he published <em>El Anacronópete</em>, a novel whose title he constructed from Greek: <em>ana</em> (backward), <em>chronos</em> (time), <em>petes</em> (flyer) — "one that flies backward through time." The book was published with illustrations by Francesc Gómez Soler and contained a remarkably detailed description of its central device: a large iron vessel, shaped somewhat like a box, powered by electricity.</p>
  <p>The machine doesn't just transport people through time — it reverses time's passage for everything inside it. This creates a problem Gaspar anticipated with impressive logical clarity: if time runs backward inside the machine, the passengers would age in reverse, eventually becoming children and then ceasing to exist. His solution was a fictional fluid called "García's Electrified," which passengers must drink to remain immune to the time-reversal effect. This is hard science fiction thinking, decades before the term existed.</p>
  <h3>Why It Was Forgotten</h3>
  <p>The novel was written in Spanish. Wells wrote in English. The anglophone world dominated literary canon formation in the late 19th and 20th centuries. When literary historians discussed the origins of time travel fiction, they cited Wells — whose <em>The Time Machine</em> was a massive commercial and critical success — and had no awareness of Gaspar's Spanish-language precedent. It wasn't until scholars began recovering non-English sci-fi traditions in the late 20th century that <em>El Anacronópete</em> was recognized for what it was: the actual first time machine novel.</p>

  <p>Jeff Prucher, editor of <em>Brave New Words: The Oxford Dictionary of Science Fiction</em>, has documented how deeply science fiction's vocabulary has penetrated everyday language. Many of the words we treat as technical or scientific were born in novels and short stories, coined by writers who needed language for things that did not yet exist.</p>
  <h3>Robot — Karel Čapek (1920)</h3>
  <p>The word "robot" comes from Karel Čapek's 1920 play <em>R.U.R. (Rossum's Universal Robots)</em>. Čapek adapted it from the Czech word "robota," meaning forced labor or servitude. Interestingly, it was his brother Josef who actually suggested the word — Karel had originally planned to call his artificial workers "labori." The play's robots are not mechanical; they're biological constructs, closer to what we'd now call androids or clones. But the word stuck, migrating from biological to mechanical, and eventually becoming perhaps the most successful neologism in literary history.</p>
  <h3>Cyberspace — William Gibson (1982)</h3>
  <p>Gibson first used "cyberspace" in his 1982 short story "Burning Chrome," then gave it a fuller definition in his 1984 novel <em>Neuromancer</em>. The word combines "cybernetics" (from the Greek <em>kybernetes</em>, meaning "steersman") with "space." Gibson later called the word "meaningless" and a "buzzword," and noted that the cyberspace he described bore no resemblance to the actual internet. But the word gave us a way to talk about digital environments as places — a conceptual move that shaped everything from web design to virtual reality to legal theory about online jurisdiction.</p>

  `<div class="detail-header">

    <h2><em>Concepts</em> Coined by Authors</h2>
  </div>
  <p>The distinction between "coining a word" and "coining a concept" matters. Some writers invented terms for ideas that already existed in scientific discourse (like "genetic engineering"). Others invented entirely new conceptual frameworks that science later adopted or validated. The most interesting cases are where fiction created the concept first, and science followed.</p>
  <h3>Parallel Universes — H.G. Wells (1923)</h3>
  <p>Wells used the phrase "parallel universe" in his 1923 novel <em>Men Like Gods</em>, describing a utopian world that exists alongside our own. The many-worlds interpretation of quantum mechanics, proposed by Hugh Everett III in 1957, gave this fictional concept a physical basis — but Wells had the language, the narrative structure, and the cultural imagination 34 years earlier. When physicists needed to explain what Everett's math implied, they reached for Wells's vocabulary.</p>
  <h3>Three Laws of Robotics — Isaac Asimov (1942)</h3>
  <p>Asimov's Three Laws weren't just fictional rules for fictional robots — they became the foundational framework for discussing AI ethics. When modern researchers debate autonomous vehicle decision-making or military AI constraints, Asimov's Laws are the starting point, even when the conclusion is that they're insufficient. Fiction didn't just name the problem; it structured how we think about it.</p>
  <h3>The Butterfly Effect — Ray Bradbury (1952)</h3>
  <p>Bradbury's short story "A Sound of Thunder" describes a time-traveling safari where stepping on a prehistoric butterfly alters the present. The story popularized the idea that tiny initial changes can cascade into massive consequences — a concept that mathematician Edward Lorenz later formalized in chaos theory (1963). Bradbury's story predates the scientific concept by over a decade.</p>
  <h3>The Metaverse — Neal Stephenson (1992)</h3>
  <p>Stephenson's <em>Snow Crash</em> described a persistent, shared 3D virtual world accessed via avatars. When Mark Zuckerberg rebranded Facebook as Meta and announced the "Metaverse" in 2021, Stephenson publicly distanced himself from the corporate appropriation. The concept — a digital reality that supplements or replaces the physical one — belongs to fiction, and its cultural weight derives from Stephenson's narrative, not from any tech company's product roadmap.</p>
  <div class="callout">
    <h4>The Pattern</h4>
    <p>In nearly every case, the fictional concept arrived decades before the scientific or technological reality. Fiction doesn't predict the future — it creates the conceptual vocabulary that makes the future thinkable.</p>

  `<div class="detail-header">

    <h2><em>When</em> Fiction Became Science</h2>
  </div>
  <p>The most significant relationship between fiction and science is not prediction but causation. In several documented cases, scientists have explicitly credited fiction with inspiring their research. This is not a metaphorical influence; it is a direct causal chain from novel to laboratory.</p>
  <h3>Szilárd and Wells</h3>
  <p>In 1932, physicist Leó Szilárd read H.G. Wells's <em>The World Set Free</em> (1914). The novel described weapons that sustained nuclear explosions. In 1933, while crossing a London street, Szilárd conceived the idea of the nuclear chain reaction — the mechanism that would make atomic bombs (and nuclear power) possible. He later filed a patent on the concept and helped initiate the Manhattan Project. The chain from Wells's fiction to Hiroshima passes through a single reader's imagination.</p>
  <h3>Sagan and Thorne</h3>
  <p>In 1985, Carl Sagan was writing his novel <em>Contact</em> and needed a scientifically plausible mechanism for interstellar travel. He contacted Caltech physicist Kip Thorne, who assigned his PhD student Michael Morris the task of finding solutions to Einstein's field equations that would permit traversable wormholes. The resulting paper (Morris and Thorne, 1988) became a foundational text in the physics of wormholes — a serious area of theoretical research that began as a favor to a novelist.</p>
  <h3>Star Trek and Technology</h3>
  <p>Martin Cooper, the inventor of the first handheld mobile phone at Motorola, has stated that the Star Trek communicator (1966) directly inspired his work. Motorola later named its first flip phone the StarTAC. The tablet computers on Star Trek: The Next Generation prefigure the iPad by two decades. And NASA's Space Shuttle orbiter was renamed <em>Enterprise</em> after a letter-writing campaign by Trek fans.</p>
  <h3>The Feedback Loop</h3>
  <p>A 2025 paper in Nature by Rahwan, Shariff, and Bonnefon formally proposed "Science Fiction Science" (SFS) as a research methodology — using fictional scenarios to systematically study how people would behave in futures that don't yet exist. The Moral Machine experiment, which studied autonomous vehicle ethics decisions using millions of participants, is an early example. Fiction isn't just inspiring science; it's becoming a research tool within science itself.</p>
  <div class="verdict">
    <div class="v-col pro">
      <h4>Fiction's Gifts to Science</h4>

      <ul>
        <li>Makes impossible things seem inevitable</li>
        <li>Conflates technical plausibility with narrative excitement</li>

  // 08 Detail — Legacy
  `<div class="detail-header">
    <div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 08 — Deep Dive</div>
    <h2>The <em>Living</em> Lineage</h2>
  </div>
  <p>Every time travel story written today inherits a grammar that was invented before Einstein was born. The mechanisms have changed — from angels and sleep to machines and wormholes — but the narrative structures that make time travel stories work were all established in the pre-Einstein era.</p>
  <h3>The Five Structures</h3>
  <p>Virtually all time travel fiction uses one of five structural patterns, each of which has a pre-Einstein origin:</p>
  <p>The <strong>time slip</strong> (Rip Van Winkle, 1819): the traveler passes through time involuntarily, without understanding why or how. This is the structure of <em>Outlander</em>, <em>Midnight in Paris</em>, and <em>The Time Traveler's Wife</em>.</p>
  <p>The <strong>ghost of Christmas</strong> (Dickens, 1843): the traveler is shown past, present, and future as a moral lesson. This is the structure of <em>It's a Wonderful Life</em>, <em>Groundhog Day</em>, and every "what if you could see your future" story.</p>
  <p>The <strong>Yankee abroad</strong> (Twain, 1889): the traveler brings modern knowledge to the past and changes history. This is the structure of <em>Timeline</em>, <em>Lest Darkness Fall</em>, and the "fix the past" genre.</p>
  <p>The <strong>machine</strong> (Gaspar 1887, Wells 1895): the traveler engineers their passage through time. This is the structure of <em>Back to the Future</em>, <em>Primer</em>, and virtually all hard sci-fi time travel.</p>
  <p>The <strong>bootstrap</strong> (implicit in all the above): the traveler discovers that their journey was always part of history. This is the structure of <em>Dark</em>, <em>12 Monkeys</em>, and Heinlein's "All You Zombies."</p>
  <h3>The Block Universe Connection</h3>
  <p>The thread connecting this literary lineage to contemporary physics is the block universe. When Wells argued in 1895 that all moments of time exist simultaneously and that we merely experience them sequentially, he was describing what physicists now call eternalism — the view that past, present, and future are equally real. This is the standard interpretation of Minkowski spacetime. Vonnegut's Tralfamadorians say the same thing in <em>Slaughterhouse-Five</em>. Ted Chiang's heptapods embody it in "Story of Your Life." The block universe is the secret physics of time travel fiction, and fiction had the concept first.</p>
  <div class="callout">
    <h4>The Thesis</h4>
    <p>The common intuition about linear, flowing time may be the real fiction. The block universe — where all moments coexist — is closer to what physics describes. And science fiction, from the Mahabharata to Dark, has been articulating this insight across millennia.</p>
  </div>
  <p>This is the deepest legacy of pre-Einstein time travel fiction: it taught us to imagine that time might not work the way it feels. That imagination became the conceptual precondition for the physics that followed. Fiction didn't predict relativity. It made relativity thinkable.</p>`

const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

// ESC closes detail panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRight();
});
</script>
