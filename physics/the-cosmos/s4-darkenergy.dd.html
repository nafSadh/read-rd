  `<p>Two rival teams set out to measure how quickly the universe&rsquo;s expansion was <em>decelerating</em>. Instead, they discovered it was <strong>accelerating</strong>. Saul Perlmutter, Brian Schmidt, and Adam Riess shared the 2011 Nobel Prize for a discovery that reshaped modern cosmology.<sup class="fn"><a>[1]</a><span class="tip"><a href="https://www.nobelprize.org/prizes/physics/2011/popular-information/" target="_blank">DE-01 Nobel Prize 2011 &rarr;</a></span></sup></p>
   <div class="s-stat"><div class="st"><div class="sv">1998</div><div class="sl">discovery year</div></div><div class="st"><div class="sv">2011</div><div class="sl">Nobel Prize</div></div><div class="st"><div class="sv">68%</div><div class="sl">of universe</div></div><div class="st"><div class="sv">~1500</div><div class="sl">Type Ia SNe (DES)</div></div></div>`,

  `<p>Nobody knows what dark energy is. Four possibilities: a <strong>cosmological constant</strong> (fixed property of spacetime), <strong>quintessence</strong> (dynamic scalar field), <strong>phantom energy</strong> (w &lt; &minus;1, strengthening over time), or <strong>modified gravity</strong> (GR is wrong at cosmological scales). Each has different implications for the fate of the universe.</p>`,

  `<p>DESI mapped <strong>6+ million galaxies</strong>, measuring baryon acoustic oscillations across cosmic time. Combined with CMB and supernova data: dark energy may not be constant &mdash; <strong>2.8&ndash;4.2 sigma</strong> preference for time-varying w(z). Not yet 5-sigma, but the most significant hint of new physics since 1998.<sup class="fn"><a>[3]</a><span class="tip"><a href="https://www.desi.lbl.gov/" target="_blank">DE-03 DESI Year 1 Data &rarr;</a></span></sup></p>
   <div class="s-stat"><div class="st"><div class="sv">6M+</div><div class="sl">galaxies mapped</div></div><div class="st"><div class="sv">2.8&ndash;4.2&sigma;</div><div class="sl">evolving DE hint</div></div><div class="st"><div class="sv">w<sub>0</sub>w<sub>a</sub></div><div class="sl">parameterization</div></div></div>`,

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2>The <em>1998</em> Surprise</h2></div>

<h3>Two Rival Teams</h3>
<p>The <a href="https://www.nobelprize.org/prizes/physics/2011/popular-information/" target="_blank">Supernova Cosmology Project</a> (Saul Perlmutter, Berkeley) and the High-Z Supernova Search Team (Brian Schmidt &amp; Adam Riess) both used Type Ia supernovae as standard candles to measure how the expansion of the universe was changing over time. Everyone expected deceleration &mdash; gravity should slow things down.</p>
<p>Both teams found the opposite: distant supernovae were <em>fainter</em> than expected, meaning they were <em>farther</em> away than a decelerating universe would predict. The expansion was not slowing. It was speeding up. This was so unexpected that both teams spent months checking for systematic errors before publishing.</p>

<div class="diagram-wrap"><svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">

<h3>The Shock</h3>
<p>This was the most unexpected result in cosmology since Hubble discovered the expansion itself. The universe is not just expanding &mdash; it is expanding faster and faster. Something is pushing space apart, counteracting gravity on the largest scales. That something was named &ldquo;dark energy,&rdquo; and it accounts for approximately 68% of the total mass-energy content of the universe.</p>
<p>The Dark Energy Survey&rsquo;s final analysis of ~1,500 Type Ia supernovae over 5 years provided the strongest supernova constraints ever, confirming the acceleration and hinting at possible time variation in dark energy&rsquo;s strength.</p>

<div class="callout"><h4>A Reluctant Discovery</h4><p>Neither team was looking for acceleration. They were trying to measure how quickly gravity was decelerating the expansion. The result was so counterintuitive that Riess later said he expected to find a mistake. There was no mistake. The universe&rsquo;s biggest surprise earned the 2011 Nobel Prize in Physics.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2>Einstein&rsquo;s Biggest <em>Blunder</em></h2></div>

<h3>The Cosmological Constant</h3>
<p>In 1917, Einstein modified his field equations by adding a cosmological constant (&Lambda;) &mdash; a term representing a uniform energy density pervading all of space. His motivation was entirely wrong: he wanted a static universe, and &Lambda; provided the repulsive force to balance gravity. When Hubble discovered expansion in 1929, the static universe was dead, and Einstein reportedly called &Lambda; his biggest blunder.</p>
<p>The historical irony is notable. Einstein introduced the right term for the wrong reason, then abandoned it. Seventy years later, the 1998 discovery showed that &Lambda; &mdash; or something very like it &mdash; describes 68% of the universe. The blunder was not introducing &Lambda; but abandoning it.</p>

<div class="timeline">
  <div class="tl-item"><div class="tl-date">1917</div><div class="tl-text">Einstein adds &Lambda; to keep universe static</div></div>
  <div class="tl-item"><div class="tl-date">1929</div><div class="tl-text">Hubble discovers expansion; Einstein abandons &Lambda;</div></div>
  <div class="tl-item"><div class="tl-date">1998</div><div class="tl-text">Perlmutter, Schmidt, Riess discover accelerating expansion</div></div>
  <div class="tl-item"><div class="tl-date">2011</div><div class="tl-text">Nobel Prize for the discovery of accelerating expansion</div></div>
  <div class="tl-item"><div class="tl-date">2024&ndash;25</div><div class="tl-text">DESI hints &Lambda; may not be constant after all</div></div>
</div>

<h3>Lambda in the Modern Era</h3>
<p>As a mathematical object, &Lambda; is the simplest possible form of dark energy: a constant energy density that does not change with time or dilute as the universe expands. It has a single free parameter (its value), and it fits nearly all observational data. The equation of state parameter w = &minus;1 exactly. This simplicity is both its strength and its weakness &mdash; it offers no explanation for <em>why</em> &Lambda; has the value it does.</p>

<div class="callout"><h4>The Irony</h4><p>Einstein introduced the cosmological constant for wrong reasons, abandoned it as a blunder, and it turned out to describe the dominant component of the universe. As the APS history notes, the real blunder was removing it.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2>What <em>Is</em> Dark Energy?</h2></div>

<h3>Four Possibilities</h3>
<p>The honest answer is that nobody knows what dark energy is. Four broad categories of explanation compete, each with radically different implications for fundamental physics.</p>

<div class="feat-grid">
  <div class="feat"><h4>Cosmological Constant</h4><p>A fixed property of spacetime itself. w = &minus;1 exactly. Constant everywhere, for all time. The simplest explanation. No dynamical mechanism.</p></div>
  <div class="feat"><h4>Quintessence</h4><p>A dynamic scalar field that evolves over time. Energy density changes, potentially explaining why dark energy &ldquo;turned on&rdquo; recently in cosmic history. w varies.</p></div>
  <div class="feat"><h4>Phantom Energy</h4><p>Dark energy that strengthens over time (w &lt; &minus;1). Leads to the Big Rip &mdash; the universe tears itself apart at every scale. Exotic and unsettling.</p></div>
  <div class="feat"><h4>Modified Gravity</h4><p>Perhaps general relativity is wrong at cosmological scales. Dark energy is not a substance but a failure of our gravity theory. Requires explaining why GR works perfectly elsewhere.</p></div>
</div>

<h3>The Equation of State</h3>
<p>Dark energy&rsquo;s behavior is captured by the equation of state parameter w = pressure / (energy density). For a cosmological constant, w = &minus;1 exactly and does not change. For quintessence, &minus;1 &lt; w &lt; &minus;1/3 and w may vary with time. For phantom energy, w &lt; &minus;1. The DESI results are best fit by a model (w<sub>0</sub>w<sub>a</sub>) where w crosses &minus;1 &mdash; the &ldquo;phantom divide&rdquo; &mdash; which the cosmological constant cannot do.</p>
<p>Distinguishing these possibilities requires measuring w at multiple epochs with exquisite precision. This is exactly what DESI, Rubin Observatory, and Euclid are designed to do.</p>

<div class="callout"><h4>The Stakes</h4><p>If dark energy is a cosmological constant, the universe is comprehensible but mysterious (&ldquo;why this value?&rdquo;). If it is dynamic, entirely new physics is required. If it is phantom energy, the universe is doomed. If gravity is modified, our most successful theory of spacetime needs revision. Every option is revolutionary.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2>The <em>DESI</em> Revolution</h2></div>

<h3>Mapping the Universe in 3D</h3>
<p>The <a href="https://www.desi.lbl.gov/" target="_blank">Dark Energy Spectroscopic Instrument</a>, mounted on the 4-meter Mayall telescope at Kitt Peak, can measure 5,000 galaxy redshifts simultaneously using robotic fiber positioners. By March 2025, DESI had mapped over 6 million galaxies, creating the most detailed three-dimensional map of the universe ever made.</p>
<p>DESI measures baryon acoustic oscillations (BAO) &mdash; the imprint of primordial sound waves frozen into the galaxy distribution. These provide a standard ruler at multiple redshifts, tracing how the expansion rate has changed over cosmic time. When combined with CMB data from Planck and supernova data from DES, the results are striking.</p>

<h3>2.8 to 4.2 Sigma</h3>
<p>The combined DESI + CMB + supernova analysis finds a 2.8&ndash;4.2 sigma preference for a time-varying dark energy model (w<sub>0</sub>w<sub>a</sub>) over the simple cosmological constant. The best-fit model has w crossing &minus;1: dark energy was quintessence-like in the past and is becoming phantom-like now. This is not yet at the 5-sigma discovery threshold, but it is the strongest hint of new physics in cosmology since 1998.</p>
<p>DESI Year 3 data strengthens these hints. If Year 5+ data reaches 5 sigma, it would overturn the simplest Lambda-CDM assumption and require an entirely new theoretical framework for dark energy.</p>

<div class="callout"><h4>The Most Important Hint</h4><p>DESI director Michael Levi has said that dark energy may not be constant. If confirmed, this would be the most significant cosmological discovery since the accelerating expansion itself. The stakes could not be higher: the entire standard model of cosmology hangs in the balance.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2>The <em>Fate</em> of the Universe</h2></div>

<h3>Four Endings</h3>
<p>The ultimate fate of the universe depends entirely on the nature of dark energy. Different equations of state lead to radically different endings.</p>

<div class="feat-grid">
  <div class="feat"><h4>Big Freeze</h4><p>If &Lambda; is constant: expansion forever. Stars exhaust fuel in ~10<sup>14</sup> years. Black holes evaporate in ~10<sup>100</sup> years. Universe approaches 0 K. Most probable.</p></div>
  <div class="feat"><h4>Big Rip</h4><p>If dark energy strengthens (phantom, w &lt; &minus;1): expansion accelerates without limit. Galaxy clusters, galaxies, stars, planets, atoms torn apart. Possibly ~22 Gyr from now.</p></div>
  <div class="feat"><h4>Big Crunch</h4><p>If dark energy weakens or reverses: gravity re-dominates. Universe collapses to a singularity. Time-reverse of Big Bang. Currently disfavored by data.</p></div>

</div>

<h3>Heat Death in Detail</h3>
<p>The Big Freeze (heat death) is currently the most probable outcome. The second law of thermodynamics drives the universe toward maximum entropy. Stars will exhaust their nuclear fuel. Stellar remnants (white dwarfs, neutron stars, black holes) will be the only objects. Protons may decay on timescales of ~10<sup>36</sup>&ndash;10<sup>41</sup> years. Black holes evaporate via Hawking radiation on timescales of ~10<sup>67</sup> (stellar) to ~10<sup>100</sup> years (supermassive). The universe approaches thermodynamic equilibrium at a temperature asymptotically approaching absolute zero.</p>
<p>This is a gradual process rather than a sudden event &mdash; an asymptotic approach to darkness, cold, and thermodynamic equilibrium on timescales far exceeding any astrophysical process observable today.</p>

<div class="callout"><h4>An Honest Ending</h4><p>The Big Freeze is the thermodynamically expected outcome given current observations. Stars, planets, and biological complexity are temporary structures in a cosmos trending toward equilibrium &mdash; transient departures from maximum entropy made possible by the low-entropy initial conditions of the Big Bang.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2>The <em>Arrow</em> of Time</h2></div>

<h3>Why Time Has a Direction</h3>
<p>The laws of physics are (mostly) time-symmetric: they work equally well forward and backward. Yet the universe has an unmistakable arrow of time &mdash; eggs break but do not unbreak, stars burn but do not unburn. The second law of thermodynamics explains this: entropy (disorder) always increases in isolated systems.</p>
<p>On cosmic scales, this arrow points from the extraordinarily low-entropy Big Bang toward the maximum-entropy heat death. The CMB&rsquo;s uniformity is a sign of low gravitational entropy &mdash; matter was spread nearly evenly, and gravity had not yet had time to clump it into stars and galaxies and black holes. Black holes represent the highest-entropy objects in the universe, and the heat death represents the ultimate equilibrium.</p>

<h3>The Past Hypothesis</h3>
<p>The deepest question is: <em>why was the Big Bang&rsquo;s entropy so low?</em> The second law explains that entropy increases, but it does not explain the initial condition. This &ldquo;past hypothesis&rdquo; (a term from philosopher David Albert) is one of the most profound unsolved problems in physics.</p>
<p>Roger Penrose&rsquo;s Weyl Curvature Hypothesis proposes that gravitational entropy was zero at the Big Bang by some as-yet-unknown law. Sean Carroll has proposed that our universe is a &ldquo;baby universe&rdquo; budded from a higher-entropy parent, and that the apparent low entropy is a selection effect. Neither proposal is testable with current technology.</p>

<div class="callout"><h4>The Deepest Mystery</h4><p>We know the universe is heading toward heat death. We can calculate when each structure will decay. What we cannot explain is why it started in a state capable of creating structure at all. The arrow of time may ultimately be cosmology&rsquo;s most fundamental question.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2>The <em>Worst</em> Prediction</h2></div>

<h3>10<sup>120</sup> Times Wrong</h3>
<p>Quantum field theory predicts that empty space has energy &mdash; the vacuum energy from quantum fluctuations. When this energy is calculated using the Planck scale as a cutoff, the result is roughly 10<sup>120</sup> times larger than the observed value of the cosmological constant. This is not a small discrepancy. It is the worst prediction in the history of physics.</p>
<p>The observed &Lambda; corresponds to a vacuum energy density of approximately 10<sup>&minus;47</sup> GeV<sup>4</sup>. The naive QFT prediction is approximately 10<sup>71</sup> GeV<sup>4</sup>. The ratio is 10<sup>118</sup>&ndash;10<sup>120</sup>, depending on the exact calculation. No known mechanism can explain why the vacuum energy is so extraordinarily close to zero without being exactly zero.</p>

<div class="diagram-wrap"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">

  <text x="50" y="128" font-family="'IBM Plex Mono',monospace" font-size="8" class="lbl">~10^-47 GeV^4</text>

  <text x="200" y="178" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" class="lbl">No known mechanism explains this cancellation</text>
  <text x="200" y="188" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" class="lbl">The cosmological constant problem is &ldquo;the worst prediction in physics&rdquo;</text>
</svg></div>

<h3>Proposed Resolutions</h3>
<p>Several approaches have been proposed, none successful. Supersymmetry would cancel boson and fermion vacuum energies, but SUSY is broken at our energy scale and the cancellation is imperfect. The anthropic/multiverse explanation argues that &Lambda; varies across pocket universes, and we observe a small value because large values prevent galaxy formation &mdash; but this is unfalsifiable. Some physicists argue that the QFT calculation itself is misapplied and that vacuum energy does not gravitate the way the naive calculation assumes.</p>
<p>The cosmological constant problem is not merely a puzzle. It is a signal that our understanding of the connection between quantum mechanics and gravity is fundamentally incomplete. Solving it would likely require a revolution in theoretical physics comparable to quantum mechanics itself.</p>

<div class="callout"><h4>A Clue, Not Just a Problem</h4><p>The 10<sup>120</sup> discrepancy likely reflects a fundamental gap in the understanding of the relationship between quantum fields and spacetime. The question is what. Until we know, the cosmological constant problem stands as the most quantitatively precise failure in the history of theoretical physics.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2>What <em>We</em> Know</h2></div>

<h3>Consensus</h3>
<p>The accelerating expansion is established beyond any reasonable doubt. Multiple independent lines of evidence &mdash; Type Ia supernovae, baryon acoustic oscillations, CMB observations, and weak gravitational lensing &mdash; all point to the same conclusion: something is pushing the universe apart at an ever-increasing rate.</p>
<p>The cosmological constant (&Lambda;) is the simplest explanation and is consistent with nearly all observations. It requires only one parameter (its value) and fits data from z = 0 to z = 1100. Lambda-CDM &mdash; the standard cosmological model built around &Lambda; &mdash; is the most successful model in the history of cosmology.</p>

<div class="verdict">
  <div class="v-col pro"><h4>Settled</h4><ul>
    <li>Expansion is accelerating</li>
    <li>Dark energy ~ 68% of mass-energy</li>
    <li>&Lambda;CDM fits data remarkably well</li>
    <li>Big Freeze most probable fate</li>
    <li>Vacuum energy problem is real</li>
    <li>Einstein&rsquo;s &Lambda; was right after all</li>
  </ul></div>
  <div class="v-col con"><h4>Open Questions</h4><ul>
    <li>Is dark energy constant or evolving?</li>
    <li>What is the physical mechanism?</li>
    <li>Why is &Lambda; ~ 10<sup>120</sup> too small?</li>
    <li>Will DESI reach 5 sigma?</li>
    <li>Is w exactly &minus;1 or slightly different?</li>
    <li>Modified gravity or new field?</li>
  </ul></div>
</div>

<h3>The Connections</h3>
<p>Dark energy connects to every other section of this survey. It shapes the ultimate fate of the large-scale structure mapped in <a href="s1-scales.dd.html" title="Scales of the Universe">S1</a>. Its discovery relied on Type Ia supernovae calibrated through the distance ladder. Its density is encoded in the CMB (<a href="s2-bigbang.dd.html" title="The Big Bang &amp; CMB">S2</a>). Its interaction with dark matter (<a href="s3-darkmatter.dd.html" title="Dark Matter">S3</a>) determines the growth of cosmic structure. And DESI&rsquo;s results are among the most consequential results at the observational frontiers (S7).</p>

<h3>The Honest Edges</h3>
<p>We know that the expansion is accelerating. We know that dark energy accounts for ~68% of the universe. We have a simple model (&Lambda;) that fits the data. But we do not know what dark energy <em>is</em>. We cannot explain why the vacuum energy is 10<sup>120</sup> times smaller than predicted. And DESI is hinting that our simplest model may be wrong. The next decade &mdash; with DESI Year 5, Rubin Observatory, and Euclid &mdash; will either confirm &Lambda;CDM or force us to replace it.</p>

<div class="callout"><h4>The Core Insight</h4><p>Dark energy is the universe&rsquo;s most dominant component and its least understood. We discovered it accidentally. We named it vaguely. We describe it with a constant we cannot derive. And it determines the fate of everything. If cosmology has a central mystery, this is it.</p></div>`
