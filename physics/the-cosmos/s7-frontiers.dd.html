<p>JWST, launched December 2021, observes the universe in infrared with a 6.5-meter gold-coated beryllium mirror, seeing through cosmic dust and back to the first few hundred million years after the Big Bang. It orbits the Sun at the L2 Lagrange point, 1.5 million km from Earth.</p>

<h3>What JWST Challenges</h3>
<p>JWST&rsquo;s biggest impact may be what it challenges rather than what it confirms. The too-early, too-massive galaxies and black holes stress-test Lambda-CDM at its edges. If these objects cannot be accommodated within existing models, they may point to new physics in the early universe &mdash; modified dark matter properties, non-standard inflation, or primordial black hole formation mechanisms.<sup class="fn"><a>[1]</a><span class="tip"><a href="https://esawebb.org/news/" target="_blank">FR-01 ESA/Webb Press Releases &rarr;</a></span></sup></p>

<div class="callout"><h4>The Most Transformative Telescope</h4><p>All 10 sources in this section agree: JWST is the most transformative astronomical instrument since the Hubble Space Telescope. Its infrared capabilities reveal what was previously invisible, and its early results have already forced revisions to our understanding of the early universe.</p></div>`,

  <rect x="100" y="155" width="200" height="18" fill="rgba(0,0,0,0.03)" rx="3"/>
  <text x="200" y="167" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" class="lbl">Different detectors cover different frequency bands &middot; Complementary views</text>
</svg></div>

<h3>The Sub-Solar Mass Candidate</h3>
<p>In November 2025, LIGO detected a merger event that may involve a sub-solar-mass black hole. Stellar collapse cannot produce black holes below roughly 1.4 solar masses (the Chandrasekhar limit). If this event is confirmed, it would be strong evidence for primordial black holes &mdash; formed in the early universe rather than from dying stars &mdash; with major implications for dark matter.<sup class="fn"><a>[9]</a><span class="tip"><a href="https://www.ligo.caltech.edu/" target="_blank">FR-09 LIGO Sub-Solar Mass BH &rarr;</a></span></sup></p>

<div class="callout"><h4>Multi-Messenger Astronomy</h4><p>The combination of electromagnetic radiation, gravitational waves, and neutrinos gives us three fundamentally different ways to observe the universe. GW170817 &mdash; the neutron star merger detected in both gravitational waves and light &mdash; demonstrated the power of this approach and independently measured the Hubble constant.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2>Neutrino <em>Astronomy</em></h2></div>

<h3>The Third Observational Window</h3>
<p>IceCube, a cubic-kilometer detector buried deep in Antarctic ice, uses the ice itself as a detection medium. When high-energy neutrinos interact with ice molecules, they produce charged particles that emit Cherenkov radiation &mdash; faint blue light that IceCube&rsquo;s 5,160 optical sensors detect.</p>
<p>Neutrinos interact so weakly with matter that they travel straight through stars, galaxies, and dust clouds, providing an unobstructed view of the most violent environments in the cosmos.</p>

<div class="feat-grid">
  <div class="feat"><h4>TXS 0506+056</h4><p>First identified cosmic neutrino source (2018): a blazar &mdash; a supermassive black hole with a relativistic jet pointed at Earth.</p></div>
  <div class="feat"><h4>NGC 1068</h4><p>Most significant neutrino source: a Seyfert galaxy 47 million light-years away. Its core is hidden behind thick dust, invisible to optical telescopes.</p></div>
  <div class="feat"><h4>Tau Neutrinos</h4><p>7 astrophysical tau neutrino candidates identified in 2024 using machine learning. All three neutrino flavors now detected from cosmic sources.</p></div>
  <div class="feat"><h4>IceCube-Gen2</h4><p>8 km<sup>3</sup> detector (8x current volume), 10x detection rate. Installation beginning 2025/2026. Will transform neutrino astronomy from discovery to survey science.</p></div>
</div>

<div class="callout"><h4>Seeing Through Everything</h4><p>Neutrinos are the only known particles that can escape from the interior of a neutron star merger, the core of an active galaxy, or the earliest moments of the Big Bang. They carry information that is permanently invisible to telescopes and gravitational wave detectors alike.<sup class="fn"><a>[3]</a><span class="tip"><a href="https://icecube.wisc.edu/" target="_blank">FR-03 IceCube Tau Neutrino Discovery &rarr;</a></span></sup></p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2>The Hubble <em>Tension</em></h2></div>

<h3>The Most Significant Crisis</h3>
<p>Two independent methods of measuring the universe&rsquo;s expansion rate give incompatible results. Local measurements using the cosmic distance ladder (Cepheids calibrating Type Ia supernovae) yield H<sub>0</sub> = 73.04 &plusmn; 1.04 km/s/Mpc. Early-universe measurements from the Planck CMB give H<sub>0</sub> = 67.4 &plusmn; 0.5 km/s/Mpc. The discrepancy is approximately 5 sigma &mdash; far beyond random error.<sup class="fn"><a>[4]</a><span class="tip"><a href="https://newspaceeconomy.ca/" target="_blank">FR-04 Hubble Tension 2025 Status &rarr;</a></span></sup></p>
<p>JWST has independently validated the Cepheid distance calibrations that underpin the local measurement, making it harder to attribute the discrepancy to systematic error in the distance ladder.</p>

<h3>Proposed Resolutions</h3>
<div class="feat-grid">
  <div class="feat"><h4>Early Dark Energy</h4><p>An additional dark energy component active only in the first ~100,000 years. Would increase the early-universe H<sub>0</sub> to match local measurements.</p></div>
  <div class="feat"><h4>Modified Gravity</h4><p>Changes to general relativity at cosmological scales could alter the relationship between CMB observations and the inferred expansion rate.</p></div>
  <div class="feat"><h4>Primordial B-Fields</h4><p>Primordial magnetic fields could affect recombination, changing the CMB-derived H<sub>0</sub>. Would also explain the origin of cosmic magnetic fields.<sup class="fn"><a>[8]</a><span class="tip"><a href="https://phys.org/" target="_blank">FR-08 Primordial Magnetic Fields &rarr;</a></span></sup></p></div>
  <div class="feat"><h4>New Particles</h4><p>Extra neutrino species or decaying dark matter could modify the early universe&rsquo;s expansion history without affecting late-time observations.</p></div>
</div>

<div class="callout"><h4>No Consensus</h4><p>The &ldquo;Tensions in Cosmology 2025&rdquo; conference at Nature Astronomy highlighted that no proposed resolution has gained consensus. The tension may require genuinely new physics beyond Lambda-CDM &mdash; or it may eventually be traced to an unidentified systematic error. The stakes are high: if new physics is required, it would be the first crack in the standard cosmological model.<sup class="fn"><a>[5]</a><span class="tip"><a href="https://www.scientificamerican.com/" target="_blank">FR-05 SciAm: Hubble Crisis &rarr;</a></span></sup></p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2>Vera Rubin <em>Observatory</em></h2></div>

<h3>The Most Ambitious Survey</h3>
<p>The Vera C. Rubin Observatory in Chile began its 10-year Legacy Survey of Space and Time (LSST) in early 2026 &mdash; the most ambitious astronomical survey ever attempted. Named after the astronomer whose rotation curve measurements provided key evidence for dark matter, the observatory is designed to map the dark universe.</p>

<div class="feat-grid">
  <div class="feat"><h4>8.4-Meter Mirror</h4><p>Wide-field telescope designed for rapid sky coverage. Images the entire visible southern sky every few nights in six optical filters.</p></div>
  <div class="feat"><h4>3.2 Gigapixel Camera</h4><p>The largest camera ever built for astronomy. Each exposure covers 9.6 square degrees &mdash; about 40 full moons.</p></div>
  <div class="feat"><h4>20 Billion Galaxies</h4><p>Complete catalog of every galaxy visible from the southern hemisphere, enabling dark matter mapping via weak gravitational lensing at unprecedented resolution.</p></div>
  <div class="feat"><h4>Transient Discovery</h4><p>Real-time detection of supernovae, kilonovae, asteroids, and other transient events. Potentially 5 million new asteroid discoveries.</p></div>
</div>

<h3>Dark Energy Precision</h3>
<p>Combined with DESI&rsquo;s spectroscopic measurements, Rubin will measure the dark energy equation of state to 1% precision. If both confirm evolving dark energy, the simplest Lambda-CDM model &mdash; the backbone of modern cosmology for 25 years &mdash; will need fundamental revision.<sup class="fn"><a>[6]</a><span class="tip"><a href="https://rubinobservatory.org/" target="_blank">FR-06 Vera Rubin Observatory LSST &rarr;</a></span></sup><sup class="fn"><a>[10]</a><span class="tip"><a href="https://news.stanford.edu/" target="_blank">FR-10 Stanford/SLAC Rubin Plans &rarr;</a></span></sup></p>

<div class="callout"><h4>Named for a Pioneer</h4><p>Vera Rubin spent decades measuring galaxy rotation curves that provided some of the strongest evidence for dark matter, yet was never awarded a Nobel Prize. The observatory bearing her name will map more dark matter than any instrument in history &mdash; a fitting tribute to the astronomer who proved it existed.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2>DESI &amp; Evolving <em>Dark Energy</em></h2></div>

<h3>The Most Significant Hint Since 1998</h3>
<p>The Dark Energy Spectroscopic Instrument (DESI) has produced a 3D map of over 6 million galaxies, measuring baryon acoustic oscillations (BAO) at multiple redshifts. Combined with CMB and supernova data, DESI&rsquo;s 2024&ndash;2025 results show a 2.8&ndash;4.2 sigma preference for time-varying dark energy over the simplest cosmological constant model.<sup class="fn"><a>[7]</a><span class="tip"><a href="https://www.desi.lbl.gov/" target="_blank">FR-07 DESI Evolving Dark Energy &rarr;</a></span></sup></p>
<p>This is not yet at the 5-sigma threshold conventionally required for discovery. But it is the strongest hint of new physics in cosmology in over two decades.</p>

<h3>What Comes Next</h3>
<p>The critical questions for the next few years: Will DESI Year 5+ data reach 5 sigma? Will Rubin Observatory independently confirm? What theoretical framework replaces Lambda if dark energy evolves? Can quintessence, phantom energy, or modified gravity be distinguished observationally?</p>

<div class="callout"><h4>If Confirmed</h4><p>If evolving dark energy reaches 5-sigma significance, it would be the most important cosmological discovery since the 1998 finding of accelerating expansion itself. It would mean that the dominant component of the universe &mdash; 68% of its mass-energy &mdash; is not the simple constant that Einstein proposed, but something dynamic and poorly understood.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2>What We Might Know by <em>2050</em></h2></div>

<h3>The Next Quarter Century</h3>
<p>The coming decades will see an unprecedented convergence of observational capability. Multiple next-generation instruments, each independently capable of transforming cosmology, will operate simultaneously.</p>

<div class="feat-grid">
  <div class="feat"><h4>Hubble Tension</h4><p>JWST + Rubin + DESI combined will settle whether the tension is systematic error or genuine new physics. Expected resolution by ~2030.</p></div>
  <div class="feat"><h4>Dark Energy Fate</h4><p>DESI + Rubin will determine whether dark energy is constant or evolving, with 1% precision on the equation of state.</p></div>
  <div class="feat"><h4>Primordial Waves</h4><p>LiteBIRD (JAXA, 2032) and CMB-S4 (2030s) will search for B-mode polarization &mdash; inflation&rsquo;s smoking gun.</p></div>
  <div class="feat"><h4>10x More GW Events</h4><p>Einstein Telescope and Cosmic Explorer (2030s) will detect gravitational waves from across the entire observable universe.</p></div>
</div>

<h3>What We Will Probably Not Know</h3>
<p>Even with these extraordinary instruments, several questions will likely remain unanswered by 2050: what dark matter actually is (particles? PBHs? something else?), a theory of everything that unifies quantum mechanics and general relativity, and whether alien civilizations exist. Some of these questions may prove intractable on any foreseeable timescale.</p>

<div class="callout"><h4>An Extraordinary Moment</h4><p>The period from 2026 to 2035 may be the most data-rich decade in the history of cosmology. Multiple independent instruments will simultaneously probe dark matter, dark energy, gravitational waves, and the early universe. If any of these programs produces a 5-sigma surprise, the standard model of cosmology will need revision.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2>What <em>We</em> Know</h2></div>

<h3>Consensus Across Sources</h3>
<p>Despite significant open questions, the 10 sources in this section converge on five key assessments of the observational frontier.</p>

<div class="verdict">
  <div class="v-col pro"><h4>Established</h4><ul>
    <li>JWST reveals objects challenging Lambda-CDM</li>
