];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2>The <em>Fine-Tuning</em> Problem</h2></div>

<h3>Constants That Must Be Just Right</h3>
<p>Several physical constants appear tuned with narrow margins for the existence of complex structures and life. This is not a vague philosophical observation &mdash; it involves specific, quantifiable margins.</p>

<div class="feat-grid">
  <div class="feat"><h4>Cosmological Constant</h4><p>If &Lambda; were ~120 orders of magnitude larger (as QFT predicts), the universe expands too fast for structure. If large and negative, it collapses immediately.</p></div>
  <div class="feat"><h4>Strong Nuclear Force</h4><p>If 2% weaker, hydrogen is the only element. If 0.3% stronger, all hydrogen fuses to helium in the Big Bang &mdash; no stars, no chemistry.</p></div>
  <div class="feat"><h4>Carbon Resonance</h4><p>Carbon-12 has a nuclear resonance at exactly the energy needed for stellar nucleosynthesis. Fred Hoyle predicted this before it was observed.</p></div>
  <div class="feat"><h4>Dimensionality</h4><p>3 spatial dimensions allow stable orbits and complex chemistry. In 2 or 4+ dimensions, gravity and electromagnetism behave differently, preventing stable structures.</p></div>
</div>

<h3>Three Responses</h3>
<p>There are three fundamental responses to fine-tuning. First, <em>design</em>: the constants were chosen by an intelligence. This is not a scientific hypothesis because it is untestable. Second, <em>coincidence</em>: the universe simply is what it is, and the constants are brute facts requiring no explanation. Third, <em>selection</em>: if many universes exist with different constants, we necessarily observe one compatible with our existence. This is the multiverse/anthropic explanation.</p>

<div class="callout"><h4>The Question Behind the Question</h4><p>Does fine-tuning require explanation at all? Some physicists argue that asking &ldquo;why these constants?&rdquo; is like asking &ldquo;why does 2+2=4?&rdquo; &mdash; it may not be a meaningful question. Others argue that the extraordinary precision demands an answer. This disagreement is philosophical, not empirical.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2><em>Eternal</em> Inflation</h2></div>

<h3>Inflation That Never Ends</h3>
<p>Most viable models of cosmic inflation have a startling consequence: once inflation begins, it never completely stops. Quantum fluctuations in the inflaton field mean that while some regions stop inflating and become pocket universes (like ours), other regions continue inflating, producing an ever-expanding inflationary background that spawns new pocket universes forever.</p>
<p>In this picture, our observable universe is one bubble in an infinite, eternally inflating multiverse. Each bubble may have different physical constants, determined by the vacuum state it settled into when inflation ended locally. The fine-tuning is explained by selection: most bubbles are sterile (wrong constants for life), but we necessarily inhabit one that permits our existence.</p>

<div class="diagram-wrap"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="200" fill="rgba(0,0,0,0.025)" rx="6"/>

  <circle cx="280" cy="110" r="24" fill="rgba(91,91,214,0.06)" stroke="#5b5bd6" stroke-width="0.8"/>
  <text x="280" y="113" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" class="lbl">Sterile</text>

  <text x="340" y="78" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="5" class="lbl">Life?</text>

  <rect x="50" y="172" width="300" height="18" fill="rgba(0,0,0,0.03)" rx="3"/>
  <text x="200" y="184" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" class="lbl">Each bubble may have different physics &middot; Most are sterile &middot; We observe a habitable one</text>
</svg></div>

<h3>The Measure Problem</h3>
<p>The multiverse has a fundamental mathematical problem: how do you assign probabilities in an infinite ensemble? Different ways of counting (different &ldquo;measures&rdquo;) give different predictions, and there is no principled way to choose among them. This measure problem undermines the multiverse&rsquo;s predictive power and is one of the strongest technical objections to treating it as a scientific theory.</p>

<div class="callout"><h4>A Prediction of Tested Theory</h4><p>Eternal inflation is not an ad hoc hypothesis invented to explain fine-tuning. It is a natural consequence of the same inflationary models that successfully explain the CMB&rsquo;s flatness, uniformity, and perturbation spectrum. This gives the multiverse a theoretical pedigree that pure speculation lacks.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2>The <em>String</em> Landscape</h2></div>

<h3>10<sup>500</sup> Possibilities</h3>
<p>String theory predicts that the geometry of extra dimensions determines low-energy physics: particle masses, coupling constants, the cosmological constant. The number of possible geometries &mdash; the &ldquo;landscape&rdquo; of string theory &mdash; is estimated at roughly 10<sup>500</sup>. This is a number so inconceivably large that it dwarfs the number of atoms in the observable universe (10<sup>80</sup>) by 420 orders of magnitude.</p>
<p>Each vacuum state in the landscape corresponds to a different universe with different physics. Combined with eternal inflation (which provides a mechanism for populating different vacua), the string landscape offers a concrete realization of the multiverse: an infinite collection of pocket universes, each with its own laws of physics, selected from 10<sup>500</sup> possibilities.</p>

<h3>Unfalsifiable?</h3>
<p>Critics, including some prominent string theorists, argue that the landscape makes string theory unfalsifiable. If 10<sup>500</sup> vacua exist, any observation can be accommodated somewhere in the landscape. A theory that predicts everything predicts nothing. Proponents counter that the landscape, combined with the anthropic principle, does make statistical predictions &mdash; for instance, about the likely value of the cosmological constant &mdash; and that some of these predictions have been borne out.</p>

<div class="callout"><h4>The Landscape Controversy</h4><p>The string landscape divides the physics community more deeply than almost any other topic. For some, it represents the culmination of decades of theoretical work, providing a framework in which fine-tuning is explained naturally. For others, it represents the abandonment of the traditional goal of physics: to derive the constants of nature from first principles.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>Many-Worlds</em> Interpretation</h2></div>

<h3>No Collapse Needed</h3>
<p>In 1957, Hugh Everett III proposed a radical reinterpretation of quantum mechanics. The standard Copenhagen interpretation says that when you measure a quantum system, the wave function &ldquo;collapses&rdquo; to one outcome. Everett said: no collapse is needed. Instead, the universe branches into all possible outcomes. Every quantum measurement creates new branches. All branches are equally real.</p>
<p>This is a different kind of multiverse from the inflationary multiverse. All branches share the same fundamental physics (same constants, same forces) but differ in quantum outcomes. A coin flip does not create a universe with different physics; it creates two branches that are identical except for the flip result.</p>

<h3>Taken Seriously</h3>
<p>Many-worlds is not fringe science. It is taken seriously by prominent physicists including David Deutsch, Sean Carroll, and Max Tegmark. Its main advantage is mathematical elegance: the Schr&ouml;dinger equation alone, with no special collapse postulate, accounts for all observations. Its main disadvantage is ontological extravagance: it multiplies the number of real entities beyond anything in the history of science.</p>
<p>Many-worlds does not explain fine-tuning (all branches have the same constants), but it contributes to the broader multiverse concept and raises similar philosophical questions about what counts as &ldquo;real&rdquo; and what counts as &ldquo;scientific.&rdquo;</p>

<div class="callout"><h4>The Price of Elegance</h4><p>Many-worlds trades one type of weirdness (collapse) for another (infinite branching). No experiment can distinguish it from Copenhagen. The debate is about interpretation, not prediction. Yet the choice matters: it shapes our understanding of what reality fundamentally is.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2>The <em>Anthropic</em> Principle</h2></div>

<h3>Three Versions</h3>
<p>Brandon Carter formulated the anthropic principle in 1973. It comes in several strengths, each more controversial than the last.</p>

<div class="feat-grid">
  <div class="feat"><h4>Weak (WAP)</h4><p>Our observations must be compatible with observers existing. Tautological but useful &mdash; explains why we observe a habitable universe without invoking design.</p></div>
  <div class="feat"><h4>Strong (SAP)</h4><p>The universe must have properties that allow observers to develop at some point. More controversial &mdash; implies the universe is somehow constrained to produce life.</p></div>
  <div class="feat"><h4>Participatory (PAP)</h4><p>Wheeler&rsquo;s idea: observers are necessary to bring the universe into being. QM requires measurement; without observers, does the universe exist?</p></div>
  <div class="feat"><h4>Final (FAP)</h4><p>Information processing must come into existence and persist forever. Proposed by Barrow &amp; Tipler. Widely criticized as teleological.</p></div>
</div>

<h3>Selection vs Explanation</h3>
<p>The weak anthropic principle is uncontroversial and scientifically useful. It is simply the observation that we should not be surprised to find ourselves in a universe compatible with our existence &mdash; in the same way that we should not be surprised to find ourselves on a planet with oxygen rather than on Jupiter. Given a multiverse, the WAP explains fine-tuning through selection without invoking design.</p>
<p>The stronger versions blur the line between physics and metaphysics. The SAP suggests the universe is goal-directed toward producing observers, which is not a testable claim. The PAP connects to quantum measurement theory but may simply be a category error.</p>

<div class="callout"><h4>A Legitimate Tool</h4><p>The weak anthropic principle is not lazy reasoning. It is a legitimate scientific tool: observational selection effects are standard practice in statistics. We correct for them in every survey. The anthropic principle simply applies the same logic to cosmology.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>Science</em> or Philosophy?</h2></div>

<h3>The Falsifiability Debate</h3>
<p>The multiverse debate crystallizes the deepest question in the philosophy of science: what counts as a scientific explanation? Karl Popper&rsquo;s criterion of falsifiability says that a scientific theory must make predictions that could, in principle, be shown wrong. The multiverse appears to violate this: other universes are unobservable by definition.</p>

<div class="feat-grid">
  <div class="feat"><h4>For the Multiverse</h4><p>Selection effects are standard science (we don&rsquo;t find fish in deserts). Eternal inflation is predicted by well-tested inflation theory, not invented ad hoc. Fine-tuning is a real empirical fact demanding explanation.</p></div>
  <div class="feat"><h4>Against the Multiverse</h4><p>The multiverse is unobservable by definition. It replaces one mystery (fine-tuning) with another (why this multiverse?). Any observation is compatible with some multiverse theory &mdash; post-diction, not prediction. The measure problem prevents quantitative predictions.</p></div>
</div>

<h3>The Deeper Issue</h3>
<p>The debate may be unresolvable by data. It is possible that the multiverse is true but unprovable, or false but irrefutable. Some physicists argue we need to expand our notion of what constitutes a scientific explanation. Others argue that doing so opens the door to pseudoscience. The boundary between physics and philosophy has never been more contested.</p>

<div class="callout"><h4>At the Edge</h4><p>The multiverse sits at the boundary of science. It is not speculation &mdash; it is a logical consequence of our best-tested theories. But it is not directly testable either. This uncomfortable position may be permanent. Some truths about the universe may be inaccessible to the scientific method as traditionally conceived.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2>Multiverse <em>Taxonomy</em></h2></div>

<h3>Four Types</h3>
<p>Not all multiverses are the same. A 2025 taxonomy (arXiv:2509.04918) distinguishes several types, each with different theoretical foundations and different relationships to observation.</p>

<div class="feat-grid">
  <div class="feat"><h4>Inflationary</h4><p>Eternal inflation spawns pocket universes with different vacuum states. Different physics in each bubble. Causally disconnected from our universe.</p></div>
  <div class="feat"><h4>Everettian</h4><p>Many-worlds QM: universe branches at every quantum event. Same physics, different outcomes. All branches coexist in superposition.</p></div>
  <div class="feat"><h4>String Landscape</h4><p>10<sup>500</sup> possible vacuum states from extra-dimensional geometry. Provides the &ldquo;menu&rdquo; for the inflationary multiverse.</p></div>
  <div class="feat"><h4>Cyclic</h4><p>Universe oscillates between Big Bangs and Big Crunches. Each cycle may reset physical constants. Related to Penrose&rsquo;s conformal cyclic cosmology.</p></div>
</div>

<h3>Holistic vs Fragmented</h3>
<p>The 2025 taxonomy introduces a key distinction. <em>Holistic</em> multiverses (like many-worlds) have all branches existing simultaneously in a single mathematical framework. <em>Fragmented</em> multiverses (like inflationary bubbles) consist of causally disconnected regions with no shared physical framework beyond the inflaton field. This distinction matters for the falsifiability debate: holistic multiverses may leave subtle observable signatures, while fragmented multiverses are in principle permanently inaccessible.</p>

<div class="callout"><h4>Not One Idea</h4><p>The &ldquo;multiverse&rdquo; is not a single theory. It is a family of ideas with different origins, different evidence bases, and different relationships to testability. Conflating them &mdash; as public discourse often does &mdash; obscures the real scientific questions.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2>What <em>We</em> Know</h2></div>

<h3>Consensus</h3>
<p>Fine-tuning is a genuine empirical observation. The cosmological constant, the strong nuclear force coupling, the carbon resonance, and the dimensionality of space are all remarkably well-suited to the existence of complex structures. This is not controversial. What is controversial is whether fine-tuning requires explanation and, if so, what kind.</p>

<div class="verdict">
  <div class="v-col pro"><h4>Established</h4><ul>
    <li>Fine-tuning is empirically real</li>
    <li>Eternal inflation predicts a multiverse</li>
    <li>String landscape: ~10<sup>500</sup> vacua</li>
    <li>Weak anthropic principle is valid</li>
    <li>Many-worlds is mathematically elegant</li>
  </ul></div>
  <div class="v-col con"><h4>Open Questions</h4><ul>
    <li>Is the multiverse science?</li>
    <li>Does fine-tuning require explanation?</li>
    <li>Can we ever test multiverse predictions?</li>
    <li>Is the measure problem solvable?</li>
    <li>Copenhagen vs many-worlds: decidable?</li>
  </ul></div>
</div>

<h3>The Honest Edges</h3>
<p>The multiverse follows naturally from well-tested theories (inflation, string theory, quantum mechanics) and provides a framework for understanding fine-tuning without invoking design. Yet it may be permanently untestable. The debate between multiverse proponents and critics is not primarily about data &mdash; it is about the criteria for scientific explanation.</p>

<div class="callout"><h4>The Core Insight</h4><p>The multiverse question is not &ldquo;do other universes exist?&rdquo; It is &ldquo;what counts as science when the entities in question are unobservable?&rdquo; This is a methodological question as much as an empirical one, and it remains actively debated among physicists and philosophers of science.</p></div>`
];
