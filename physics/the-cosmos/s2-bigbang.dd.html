<h3>Three Pillars of Evidence</h3>
<p>The Big Bang theory rests on three independent lines of evidence, each discovered decades apart, each pointing to the same origin story. The first is Hubble expansion: in 1929, Edwin Hubble showed that galaxies are receding from us, and the further away they are, the faster they recede. Run the movie backward and everything converges to a single hot, dense point roughly 13.8 billion years ago.</p>
<p>The second pillar arrived in 1965, when Arno Penzias and Robert Wilson detected an unexpected microwave hiss in their radio antenna at Bell Labs. This turned out to be the cosmic microwave background &mdash; the afterglow of the primordial fireball, cooled by 13.8 billion years of expansion from thousands of degrees to a mere 2.725 kelvin. Its spectrum is a perfect blackbody &mdash; the most precise thermal spectrum ever measured in nature.</p>
<p>The third pillar is primordial nucleosynthesis. In the first few minutes, nuclear reactions forged hydrogen and helium in a ratio of roughly 75:25 by mass, plus traces of deuterium and lithium. These predicted abundances match observations across wildly different environments &mdash; old stars, intergalactic gas, distant quasar absorption lines. Three independent predictions, three confirmations.</p>

<h3>Not an Explosion</h3>
<p>The most common misconception about the Big Bang is that it was an explosion in pre-existing space &mdash; a firecracker going off at some point, with matter flying outward into emptiness. The reality is stranger: space itself expanded. Every point in the universe was &ldquo;at&rdquo; the Big Bang. There is no center, no edge, no privileged location. The expansion is happening everywhere, uniformly, right now.</p>
<p>This is why distant galaxies are not &ldquo;moving through space&rdquo; away from us. Space between us and them is stretching. The distinction matters: objects can recede faster than light without violating relativity, because it is space that is expanding, not objects moving through space. The edge of the observable universe is receding at roughly 3.3 times the speed of light.</p>

<div class="callout"><h4>Key Insight</h4><p>The Big Bang happened everywhere simultaneously. Observing the CMB means observing the Big Bang &mdash; or more precisely, the moment 380,000 years later when the universe first became transparent. Every direction reveals this same moment.</p></div>

<h3>What Came Before?</h3>
<p>General relativity predicts a singularity at t = 0 &mdash; a point of infinite density where physics breaks down. This is widely regarded not as a real prediction but as a sign that GR fails at extreme densities and a quantum theory of gravity is needed. Proposals include the Hartle-Hawking &ldquo;no boundary&rdquo; condition (time becomes space-like near the origin, so &ldquo;before&rdquo; is meaningless), Penrose&rsquo;s conformal cyclic cosmology, and various bouncing models from loop quantum gravity. None is confirmed.</p>`,

  `<div class="detail-header"><div class="num">02</div><h2>The <em>First</em> Three Minutes</h2></div>

<h3>A Universe-Sized Nuclear Reactor</h3>
<p>For the first few minutes after the Big Bang, the entire universe was a nuclear furnace. Temperatures exceeded a billion kelvin &mdash; hot enough for protons and neutrons to fuse. The physics of this epoch is remarkably well understood because it involves nuclear reactions at energies accessible to particle accelerators. We can literally reproduce Big Bang conditions (in terms of energy per particle) in the lab.</p>
<p>The sequence unfolded as follows. At one second, the neutron-to-proton ratio froze out at roughly 1:6 (modified by neutron decay to about 1:7 by the time fusion began). At three minutes, deuterium became stable enough to survive photodissociation, and the fusion chain ignited: protons + neutrons &rarr; deuterium &rarr; helium-3 &rarr; helium-4. By five minutes, the universe had cooled below fusion temperatures, and the process stopped.</p>

<h3>Why No Heavier Elements?</h3>
<p>The fusion window was astonishingly brief. By about 20 minutes, the universe had cooled below nuclear fusion temperatures, and the process stopped forever. Unlike stars, which sustain fusion for billions of years through gravitational compression, the expanding universe simply cooled too fast. There was no time to build elements heavier than lithium. Every atom of carbon, nitrogen, oxygen, iron &mdash; everything heavier than lithium in the periodic table &mdash; was forged later in stellar cores and supernovae. As Carl Sagan put it, we are star stuff.</p>

<h3>The Lithium Problem</h3>
<p>Nucleosynthesis predictions for hydrogen and helium-4 match observations beautifully. Deuterium also agrees well. But lithium-7 is observed at 3&ndash;5 times below the predicted abundance. This is not a minor discrepancy &mdash; it has persisted for decades and resisted multiple attempts at resolution. Possible explanations include: stellar depletion (lithium is destroyed inside stars, and what we observe is post-processed), non-standard nuclear reaction rates, new particles that alter the neutron-to-proton ratio, or systematic errors in the extremely challenging observations of primordial lithium. None is conclusive.</p>

<div class="callout"><h4>The Precision of BBN</h4><p>Big Bang nucleosynthesis is remarkable for what it gets right: from one free parameter (the baryon-to-photon ratio, measured independently from the CMB), it predicts the abundances of four elements across twelve orders of magnitude. The lithium discrepancy is the only significant failure &mdash; and even skeptics agree it may have a mundane explanation.</p></div>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Recombination</em> &amp; the CMB</h2></div>

<h3>The Universe Becomes Transparent</h3>
<p>For the first 380,000 years, the universe was opaque. Photons were trapped in a dense plasma, constantly scattering off free electrons in a fog of ionized hydrogen. The photon mean free path was absurdly short &mdash; a photon could travel only a few centimeters before hitting an electron. Information could not propagate. The universe was a glowing, featureless wall of light.</p>
<p>Then, at roughly 3,000 kelvin, something remarkable happened. Protons captured electrons to form neutral hydrogen atoms. This process &mdash; called <em>recombination</em>, somewhat misleadingly since protons and electrons had never been &ldquo;combined&rdquo; before &mdash; suddenly made the universe transparent. Photons were free. They have been streaming ever since, stretched by cosmic expansion from visible-light temperatures to microwave frequencies, from 3,000 K to 2.725 K.</p>

<h3>The Surface of Last Scattering</h3>
<p>When we observe the CMB, we are looking at a spherical shell surrounding us &mdash; the surface of last scattering. Every photon we detect took its last bounce off an electron roughly 380,000 years after the Big Bang, from a shell that is now 46 billion light-years away (thanks to expansion). We cannot see further back in time with electromagnetic radiation. To probe earlier epochs requires gravitational waves or neutrinos, both of which decoupled much earlier.</p>

<h3>A Perfect Blackbody</h3>
<p>The CMB spectrum is the most perfect blackbody ever measured. COBE&rsquo;s FIRAS instrument (1990) showed deviations from a Planck spectrum of less than 50 parts per million. This tells us the early universe was in nearly perfect thermal equilibrium &mdash; precisely what the hot Big Bang model predicts. Any energy-injecting process after recombination (decaying particles, black holes) would distort this spectrum. The near-perfection constrains such processes to extraordinary precision.</p>

<div class="callout"><h4>Why &ldquo;Recombination&rdquo;?</h4><p>The name is a historical accident. Protons and electrons had never been combined before &mdash; they were combining for the first time. But the term was borrowed from plasma physics, where ionized gas &ldquo;recombines,&rdquo; and the name stuck. Cosmologists occasionally use &ldquo;the epoch of first combination&rdquo; but the standard term endures.</p></div>`,

  `<div class="detail-header"><div class="num">04</div><h2><em>COBE</em>, WMAP, Planck</h2></div>

<h3>COBE: The First Map (1989)</h3>
<p>The Cosmic Background Explorer was NASA&rsquo;s first dedicated CMB satellite. Its FIRAS instrument confirmed the blackbody spectrum with extraordinary precision. Its DMR instrument detected anisotropies &mdash; temperature variations of ~30 microkelvin, one part in 100,000. George Smoot, at the 1992 press conference, called it &ldquo;looking at the face of God.&rdquo; He and John Mather shared the 2006 Nobel Prize. COBE proved that the early universe was not perfectly smooth &mdash; it had the seeds of all future structure.</p>

<h3>WMAP: Precision Cosmology (2001&ndash;2010)</h3>
<p>The Wilkinson Microwave Anisotropy Probe mapped the full sky at 35 times COBE&rsquo;s resolution. WMAP inaugurated the era of &ldquo;precision cosmology&rdquo;: it measured the power spectrum of anisotropies, determining the universe is flat (&#937;<sub>total</sub> = 1.0 &pm; 0.02), 13.7 billion years old, composed of 4% baryonic matter, 23% dark matter, and 73% dark energy. These numbers, established to percent-level precision, made the &Lambda;CDM model the standard model of cosmology.</p>

<h3>Planck: The Definitive Map (2009&ndash;2013)</h3>
<p>ESA&rsquo;s Planck satellite produced the finest CMB map ever &mdash; and likely the finest possible from space (the CMB itself limits ultimate resolution through Silk damping). Planck&rsquo;s six-parameter &Lambda;CDM fit is breathtaking in its economy: from just six numbers &mdash; baryon density, cold dark matter density, dark energy density, optical depth to reionization, scalar spectral index, and amplitude of perturbations &mdash; you can predict the full 2,500+ multipole power spectrum. The fit is extraordinary. It&rsquo;s as if Newton had derived planetary orbits from six initial conditions.</p>
<p>The Planck results refined the cosmic composition: 4.9% ordinary matter, 26.8% dark matter, 68.3% dark energy. Age: 13.799 &pm; 0.021 billion years. Hubble constant: 67.4 &pm; 0.5 km/s/Mpc &mdash; significantly lower than local measurements (~73 km/s/Mpc), creating what is now called the Hubble tension (see <a href="s7-frontiers.dd.html" title="Observational Frontiers">S7</a>).</p>

<div class="callout"><h4>Six Numbers</h4><p>The universe&rsquo;s entire large-scale structure can be predicted from six parameters measured by Planck. This is either the most elegant model in physics &mdash; or a sign that we are overfitting a model we don&rsquo;t fully understand. The Hubble tension suggests the latter may have some truth.</p></div>`,

  `<div class="detail-header"><div class="num">05</div><h2><em>Seeds</em> of Structure</h2></div>

<h3>Acoustic Oscillations</h3>
<p>Before recombination, photons and baryons were locked in a tightly coupled fluid. Gravity pulled matter into overdense regions; radiation pressure pushed it back out. The result was sound waves &mdash; acoustic oscillations in the primordial plasma. These waves had been ringing since inflation ended, and at recombination (380,000 years), they froze in place. The pattern of peaks and troughs in the CMB power spectrum is a snapshot of these frozen sound waves.</p>
<p>The first acoustic peak occurs at an angular scale of about 1 degree (multipole l &asymp; 200). Its position tells us the universe is flat: if the universe had positive curvature, the peak would shift to smaller angular scales; negative curvature would shift it larger. Planck confirms flatness to extraordinary precision: &#937;<sub>k</sub> = 0.001 &pm; 0.002.</p>

<h3>What the Peaks Encode</h3>
<p>The CMB power spectrum is a cosmic Rosetta Stone. The first peak&rsquo;s position gives geometry (flat). The ratio of the first to second peak gives baryon density. The ratio of the second to third peak constrains dark matter density. The overall envelope and damping tail constrain the spectral index, optical depth, and amplitude of perturbations. Planck measured peaks out to l &asymp; 2,500 before Silk damping (photon diffusion) erases the signal.</p>

<h3>From Fluctuations to Galaxies</h3>
<p>The CMB anisotropies are the seeds of all cosmic structure. Where the primordial plasma was slightly denser, gravity eventually won: matter accumulated, forming the first stars (at ~100&ndash;400 Myr), then galaxies, then clusters, then the cosmic web. The entire hierarchy of structure &mdash; everything visible through telescopes &mdash; grew from temperature variations of 30 microkelvin in a plasma 380,000 years old. The CMB is both a birth certificate and a blueprint.</p>

<div class="callout"><h4>Precision at Its Limit</h4><p>The CMB power spectrum has been measured so precisely that the main uncertainty is now cosmic variance &mdash; the statistical noise from having only one universe to observe. At the largest angular scales (low l), we are limited not by instrument sensitivity but by the finite number of independent modes on the sky.</p></div>`,

  `<div class="detail-header"><div class="num">06</div><h2><em>Inflation</em>: The First 10<sup>&minus;32</sup> Seconds</h2></div>

<h3>The Horizon Problem</h3>
<p>Look at opposite sides of the CMB sky. The two patches are separated by 93 billion light-years and have the same temperature to one part in 100,000. But in the standard Big Bang model, they were never in causal contact &mdash; no signal, not even light, could have traveled between them in the 380,000 years before recombination. How did they &ldquo;agree&rdquo; on a temperature? This is the horizon problem.</p>

<h3>The Flatness Problem</h3>
<p>General relativity allows the universe to be positively curved (like a sphere), negatively curved (like a saddle), or flat. Observations show it is flat to extraordinary precision: &#937; = 1.000 &pm; 0.002. But any deviation from exact flatness in the early universe would have been amplified by expansion. For the universe to be this flat today, it must have been flat to one part in 10<sup>60</sup> at the Planck time. Why?</p>

<h3>Guth&rsquo;s Solution</h3>
<p>In 1980, Alan Guth proposed that the universe underwent a brief period of exponential expansion between roughly 10<sup>&minus;36</sup> and 10<sup>&minus;32</sup> seconds after the Big Bang. During this interval, a region smaller than a proton was stretched to larger than the observable universe. This solves both problems at once: the horizon problem, because regions that appear causally disconnected today were actually in contact before inflation stretched them apart; and the flatness problem, because inflation drives the universe toward flatness the way inflating a balloon makes its surface appear flat.</p>
<p>Inflation also solved the magnetic monopole problem (GUTs predict monopoles that should dominate the universe; inflation dilutes them to unobservable densities) and, most remarkably, provided a mechanism for generating the seed perturbations: quantum vacuum fluctuations, stretched to macroscopic scales by the exponential expansion. These fluctuations became the CMB anisotropies, which became galaxies.</p>

<div class="callout"><h4>The Quantum Origin of Structure</h4><p>Every galaxy, every star, every planet exists because quantum vacuum fluctuations during inflation were stretched to cosmic scales. The largest structures in the universe trace their origin to the smallest possible fluctuations in the quantum vacuum. This connection between the smallest quantum scales and the largest cosmic structures is one of inflation theory&rsquo;s most striking implications.</p></div>`,

  `<div class="detail-header"><div class="num">07</div><h2><em>Evidence</em> &amp; Critique</h2></div>

<h3>Evidence For Inflation</h3>
<p>Inflation makes several specific predictions, most of which have been confirmed. The spectral index of perturbations should be nearly but not exactly scale-invariant: Planck measures n<sub>s</sub> = 0.9649 &pm; 0.0042, consistent with the simplest inflation models. Perturbations should be nearly Gaussian: no significant non-Gaussianity has been detected. The universe should be flat: &#937;<sub>k</sub> = 0.001 &pm; 0.002. There should be superhorizon correlations (perturbations larger than the horizon at decoupling): the CMB confirms these at large angular scales.</p>

<div class="feat-grid">
  <div class="feat"><h4>Scale Invariance</h4><p>n<sub>s</sub> = 0.965 &pm; 0.004, consistent with slow-roll inflation. Not exactly 1 &mdash; the slight tilt is itself a prediction of the theory.</p></div>
  <div class="feat"><h4>Gaussianity</h4><p>No non-Gaussianity detected by Planck (f<sub>NL</sub> consistent with zero). Constrains multi-field and non-standard models.</p></div>
  <div class="feat"><h4>Flatness</h4><p>&#937;<sub>k</sub> = 0.001 &pm; 0.002. Universe is flat to extraordinary precision, as inflation demands.</p></div>
  <div class="feat"><h4>Superhorizon Modes</h4><p>CMB shows correlations beyond the causal horizon at recombination &mdash; inflation&rsquo;s unique fingerprint on the sky.</p></div>
</div>

<h3>The Missing Smoking Gun</h3>
<p>Inflation&rsquo;s most dramatic prediction &mdash; primordial gravitational waves, imprinted as B-mode polarization in the CMB &mdash; has not been detected. The tensor-to-scalar ratio r is constrained to r &lt; 0.036 (Planck + BICEP/Keck 2021). The 2014 BICEP2 announcement of r &asymp; 0.2 was the most exciting result in cosmology in years &mdash; until it was retracted months later when the signal turned out to be galactic dust contamination. This remains one of modern science&rsquo;s most painful false alarms.</p>
<p>The retraction had far-reaching consequences. It demonstrated how challenging B-mode measurements are: the polarized signal from galactic dust can mimic primordial gravitational waves with remarkable fidelity. Future experiments must subtract foregrounds with extreme precision across multiple frequency bands. It also shifted the field&rsquo;s emotional center of gravity &mdash; from the euphoria of discovery to the patient discipline of upper limits. The community learned, painfully, that extraordinary claims require extraordinary caution.</p>

<h3>The Case Against</h3>
<p>Paul Steinhardt, Anna Ijjas, and Abraham Loeb have mounted the most sustained critique of inflation. Their arguments form a coherent challenge: (1) inflation requires fine-tuned initial conditions and potential shapes &mdash; it solves the fine-tuning of the Big Bang by introducing its own fine-tuning; (2) most inflation models predict eternal inflation, which generates an infinite multiverse where anything can happen, destroying the theory&rsquo;s predictive power; (3) with hundreds of viable inflation models consistent with current data, inflation is not a single theory but a flexible framework that can accommodate almost any observation &mdash; making it, they argue, unfalsifiable in practice.</p>
<p>They propose alternatives: bouncing cosmologies (the universe contracts then re-expands, avoiding the singularity and homogenizing naturally), the ekpyrotic model (two branes collide in higher-dimensional space), and slow-contraction scenarios. These alternatives are mathematically coherent and avoid the multiverse problem, but they are less developed and make fewer testable predictions than inflation.</p>
<p>The counterargument from inflation&rsquo;s defenders is powerful: inflation&rsquo;s core predictions &mdash; spectral index, Gaussianity, flatness, superhorizon modes &mdash; were made <em>before</em> the high-precision data existed, and the data confirmed them. No alternative theory has matched this track record of pre-data predictions. The debate is vigorous and ongoing, touching fundamental questions about what counts as a scientific theory when the predictions are statistical rather than deterministic.</p>

<div class="callout"><h4>LiteBIRD and CMB-S4</h4><p>JAXA&rsquo;s LiteBIRD satellite (launch ~2032) and the ground-based CMB-S4 experiment aim to measure r down to 0.001. If primordial B-modes exist at the levels predicted by many inflation models, these experiments will find them. If they don&rsquo;t, the simplest slow-roll models are ruled out &mdash; though the inflation framework itself survives with modified potentials. Either outcome reshapes cosmology.</p></div>`,

  `<div class="detail-header"><div class="num">08</div><h2>What <em>We</em> Know</h2></div>

<h3>Consensus</h3>
<p>The Big Bang framework is among the most thoroughly tested theories in science. The CMB exists, has a perfect blackbody spectrum at 2.725 K, and shows anisotropies at one part in 100,000 that encode the universe&rsquo;s geometry, age, and composition. &Lambda;CDM fits this data with six parameters &mdash; an economy that rivals Newton&rsquo;s laws. Primordial nucleosynthesis correctly predicts hydrogen and helium abundances. Inflation is the leading explanation for flatness, the horizon problem, and the seeds of structure.</p>
<p>The confidence level here is extraordinary. The CMB temperature is measured to six significant figures. The age of the universe is known to 0.15%. The baryon density is pinned to 1%. These are not rough estimates &mdash; they are precision measurements that would be the envy of most experimental sciences. Cosmology has transformed from a field of speculation to one of the most quantitative disciplines in physics.</p>

<div class="verdict">
  <div class="v-col pro"><h4>Settled</h4><ul>
    <li>CMB is real, thermal, 2.725 K</li>
    <li>&Lambda;CDM fits to 6 parameters</li>
    <li>Age: 13.799 &pm; 0.021 Gyr</li>
    <li>BBN confirmed for H, He, D</li>
    <li>Universe is flat (&#937;<sub>k</sub> &asymp; 0)</li>
    <li>CMB anisotropies seed all structure</li>
  </ul></div>
  <div class="v-col con"><h4>Open Questions</h4><ul>
    <li>Primordial gravitational waves?</li>
    <li>Inflation or alternative?</li>
    <li>Lithium problem (3&ndash;5x discrepancy)</li>
    <li>Hubble tension (5&#963; discrepancy)</li>
    <li>What preceded the Big Bang?</li>
    <li>Eternal inflation &rarr; multiverse?</li>
  </ul></div>
</div>

<h3>The Hubble Tension Connection</h3>
<p>Planck&rsquo;s value for the Hubble constant (H<sub>0</sub> = 67.4 &pm; 0.5 km/s/Mpc) disagrees with local measurements by the SH0ES team (73.0 &pm; 1.0 km/s/Mpc) at over 5 sigma. This is the most significant tension in modern cosmology. JWST has validated the local Cepheid calibrations, ruling out the most obvious systematic explanation. If the discrepancy is real, it requires new physics beyond &Lambda;CDM: early dark energy that modifies the sound horizon, additional neutrino species that change the expansion rate before recombination, modified gravity, or something entirely unexpected. See <a href="s7-frontiers.dd.html" title="Observational Frontiers">S7</a> for the full story.</p>

<h3>The Next Frontiers</h3>
<p>The CMB has told us almost everything electromagnetic radiation can tell us about the early universe. The next frontiers require entirely different messengers. Primordial gravitational waves from inflation (targeted by LiteBIRD and CMB-S4) would probe physics at 10<sup>&minus;36</sup> seconds. The cosmic neutrino background, decoupled at ~1 second, carries information from even earlier &mdash; but its detection requires sensitivity beyond current technology. 21-cm cosmology (mapping neutral hydrogen before and during reionization) opens a new window on the Dark Ages between the CMB and the first stars.</p>
<p>There is also the tantalizing possibility of spectral distortions in the CMB. COBE&rsquo;s FIRAS showed the spectrum is a perfect blackbody to 50 ppm, but energy injection from exotic processes (decaying particles, primordial black holes, Silk damping) would create mu- and y-type distortions at levels just below current sensitivity. A future FIRAS-class experiment could detect these, opening a window on physics from redshifts z ~ 10<sup>4</sup> to 10<sup>7</sup> &mdash; an era currently invisible to any instrument.</p>
