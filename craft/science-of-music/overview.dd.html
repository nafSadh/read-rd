<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Science of Music — Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#7c3aed;--accent2:#9b5cf6;--accent-soft:#7c3aed10;--accent-mid:#7c3aed20;--link:#2e6ab4;
  --cyan:#4ea8d0;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#7c3aed06;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#7c3aed15;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;--link:#9b7aed;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);transition:background 1s}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Sound', title: 'The <em>Physics</em> of Sound' },
  { num: '02', short: 'Harmony', title: '<em>Harmony</em> & the Math of Consonance' },
  { num: '03', short: 'Rhythm', title: '<em>Rhythm</em>, Time & the Brain' },
  { num: '04', short: 'Emotion', title: 'The <em>Neuroscience</em> of Musical Emotion' },
  { num: '05', short: 'Memory', title: 'Music & <em>Memory</em>' },
  { num: '06', short: 'Cultures', title: 'Music <em>Across</em> Cultures' },
  { num: '07', short: 'Future', title: 'The <em>Future</em> of Music' }
];

const summaries = [
  // 01 — Physics of Sound
  `<p>Every musical sound begins as a vibration &mdash; a pressure wave propagating through air at 343 meters per second. What separates music from noise is <em>structure</em>: the regular, periodic patterns that our auditory system can parse into pitch, loudness, and timbre. A vibrating string doesn&rsquo;t produce a single frequency but an entire series of overtones &mdash; integer multiples of the fundamental &mdash; and the relative strength of each overtone is what makes a trumpet sound like a trumpet and a violin sound like a violin, even at the same pitch.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">343 m/s</div><div class="sl">Speed of Sound</div></div>
    <div class="st"><div class="sv">440 Hz</div><div class="sl">Concert A</div></div>
    <div class="st"><div class="sv">f, 2f, 3f...</div><div class="sl">Harmonic Series</div></div>
    <div class="st"><div class="sv">2.0&ndash;2.25s</div><div class="sl">Optimal Hall RT60</div></div>
  </div>
  <p>Fourier analysis &mdash; the mathematical decomposition of any complex waveform into a sum of sine waves &mdash; is the bridge between physics and perception. It explains not only why instruments sound different but also underpins all digital audio processing, from studio recording to Spotify&rsquo;s recommendation engine. Concert hall acoustics, governed by Sabine&rsquo;s equation for reverberation time, determine how those sounds reach the listener &mdash; whether the room enhances the music or muddles it.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">ANATOMY OF A MUSICAL TONE</text>
    <line x1="20" y1="28" x2="480" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <text x="60" y="50" class="lbl-hi" font-size="9">FUNDAMENTAL (f)</text>
    <path d="M 20,90 Q 45,50 70,90 Q 95,130 120,90 Q 145,50 170,90 Q 195,130 220,90" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.8"/>
    <text x="290" y="50" class="lbl-hi" font-size="9">+ 2nd HARMONIC (2f)</text>
    <path d="M 270,90 Q 282,70 295,90 Q 307,110 320,90 Q 332,70 345,90 Q 357,110 370,90 Q 382,70 395,90 Q 407,110 420,90 Q 432,70 445,90" fill="none" stroke="var(--cyan)" stroke-width="1.5" opacity="0.6"/>
    <text x="60" y="130" class="lbl-hi" font-size="9">= COMPLEX WAVEFORM</text>
    <path d="M 20,170 Q 35,140 50,155 Q 60,162 70,148 Q 82,130 95,165 Q 108,185 120,155 Q 130,138 143,162 Q 155,178 170,148 Q 182,128 195,165 Q 208,188 220,155" fill="none" stroke="var(--bright)" stroke-width="2"/>
    <text x="290" y="130" class="lbl" font-size="9">FOURIER: Any periodic wave</text>
    <text x="290" y="145" class="lbl" font-size="9">= sum of sine waves</text>
    <text x="290" y="165" class="lbl-hi" font-size="9">Different mix = different timbre</text>
    <text x="290" y="185" class="lbl" font-size="8">Trumpet: strong odd harmonics</text>
    <text x="290" y="198" class="lbl" font-size="8">Violin: rich even + odd harmonics</text>
  </svg></div>`,

  // 02 — Harmony & Consonance
  `<p>The ancient Greeks discovered something remarkable: the intervals we hear as most pleasing correspond to the simplest mathematical ratios. An octave is 2:1, a perfect fifth is 3:2, a perfect fourth is 4:3. This connection between number and beauty captivated Pythagoras and has fascinated mathematicians and musicians ever since. Helmholtz later explained the mechanism: when two frequencies are close but not identical, they produce audible &ldquo;beats&rdquo; &mdash; rapid fluctuations in volume that the ear perceives as roughness. Simple ratios minimize this beating.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">2:1</div><div class="sl">Octave Ratio</div></div>
    <div class="st"><div class="sv">3:2</div><div class="sl">Perfect Fifth</div></div>
    <div class="st"><div class="sv">23.46&#162;</div><div class="sl">Pythagorean Comma</div></div>
    <div class="st"><div class="sv">12-TET</div><div class="sl">Equal Temperament</div></div>
  </div>
  <p>But nature plays a trick: you cannot stack pure fifths and arrive back at a pure octave. Twelve perfect fifths overshoot seven octaves by 23.46 cents &mdash; the Pythagorean comma. Every tuning system in history is a different compromise with this mathematical impossibility. Meantone sacrificed some keys for pure thirds. Well temperament gave each key a unique color. Equal temperament, our modern standard, makes every key identical by distributing the error evenly &mdash; but nothing is pure. Meanwhile, Javanese gamelan rejects the entire framework, using tunings that have no mathematical basis in the Western sense.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">THE TUNING PROBLEM: FOUR SOLUTIONS</text>
    <line x1="20" y1="28" x2="480" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <rect x="20" y="40" width="108" height="65" rx="3" fill="none" stroke="var(--accent)" stroke-width="1"/>
    <text x="74" y="58" text-anchor="middle" class="lbl-hi" font-size="10" font-weight="600">PYTHAGOREAN</text>
    <text x="74" y="73" text-anchor="middle" class="lbl" font-size="8">Pure 3:2 fifths</text>
    <text x="74" y="86" text-anchor="middle" class="lbl" font-size="8">Wolf fifth problem</text>
    <text x="74" y="99" text-anchor="middle" class="lbl" font-size="8" fill="var(--red)">Limited keys</text>
    <rect x="140" y="40" width="108" height="65" rx="3" fill="none" stroke="var(--green)" stroke-width="1"/>
    <text x="194" y="58" text-anchor="middle" class="lbl-hi" font-size="10" font-weight="600">MEANTONE</text>
    <text x="194" y="73" text-anchor="middle" class="lbl" font-size="8">Pure major thirds</text>
    <text x="194" y="86" text-anchor="middle" class="lbl" font-size="8">Narrowed fifths</text>
    <text x="194" y="99" text-anchor="middle" class="lbl" font-size="8" fill="var(--red)">Fewer usable keys</text>
    <rect x="260" y="40" width="108" height="65" rx="3" fill="none" stroke="var(--amber)" stroke-width="1"/>
    <text x="314" y="58" text-anchor="middle" class="lbl-hi" font-size="10" font-weight="600">WELL TEMP.</text>
    <text x="314" y="73" text-anchor="middle" class="lbl" font-size="8">All keys usable</text>
    <text x="314" y="86" text-anchor="middle" class="lbl" font-size="8">Each key unique</text>
    <text x="314" y="99" text-anchor="middle" class="lbl" font-size="8" fill="var(--green)">Bach&rsquo;s WTC</text>
    <rect x="380" y="40" width="108" height="65" rx="3" fill="none" stroke="var(--cyan)" stroke-width="1"/>
    <text x="434" y="58" text-anchor="middle" class="lbl-hi" font-size="10" font-weight="600">EQUAL (12-TET)</text>
    <text x="434" y="73" text-anchor="middle" class="lbl" font-size="8">All keys identical</text>
    <text x="434" y="86" text-anchor="middle" class="lbl" font-size="8">Nothing pure</text>
    <text x="434" y="99" text-anchor="middle" class="lbl" font-size="8" fill="var(--green)">Modern standard</text>
    <line x1="128" y1="72" x2="140" y2="72" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="248" y1="72" x2="260" y2="72" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="368" y1="72" x2="380" y2="72" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="250" y="130" text-anchor="middle" class="lbl" font-size="9">Each system trades purity for flexibility</text>
    <text x="250" y="148" text-anchor="middle" class="lbl" font-size="9">Gamelan rejects this entire framework:</text>
    <text x="250" y="166" text-anchor="middle" class="lbl-hi" font-size="9">no pure octave, each ensemble uniquely tuned</text>
  </svg></div>`,

  // 03 — Rhythm, Time & the Brain
  `<p>Rhythm is the one dimension of music that engages the motor system even when we sit perfectly still. The phenomenon of <em>entrainment</em> &mdash; neural oscillations spontaneously synchronizing with an external beat &mdash; explains why we tap our feet, nod our heads, and feel compelled to dance. The brain doesn&rsquo;t just passively follow a rhythm; it actively predicts the next beat, generating expectations that make syncopation feel like tension and downbeats feel like resolution.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">3:2</div><div class="sl">Cross-Rhythm Foundation</div></div>
    <div class="st"><div class="sv">SMA</div><div class="sl">Motor Planning Area</div></div>
    <div class="st"><div class="sv">BG + CB</div><div class="sl">Beat vs. Timing</div></div>
    <div class="st"><div class="sv">12/16</div><div class="sl">Pulse Cycles</div></div>
  </div>
  <p>Two subcortical structures play distinct roles: the basal ganglia specialize in finding the beat and generating internal rhythm (damaged in Parkinson&rsquo;s), while the cerebellum handles temporally precise encoding of individual events, especially at fast tempi. West African drumming traditions exploit this neural machinery to extraordinary effect &mdash; layering multiple rhythmic patterns (polyrhythm) based on the 3:2 cross-rhythm, the foundation of Sub-Saharan African rhythmic texture that later traveled to Cuba as the clave pattern.</p>`,

  // 04 — Musical Emotion
  `<p>Music triggers the same dopamine reward circuitry as food, sex, and drugs &mdash; a finding that surprised even the neuroscientists who discovered it. PET imaging revealed that the caudate nucleus fires during <em>anticipation</em> of a musical peak, while the nucleus accumbens fires during the peak itself. Musical pleasure is fundamentally a prediction game: the brain builds expectations about what comes next, and the interplay of confirmation, violation, and delay generates the emotional response.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">8</div><div class="sl">BRECVEMA Mechanisms</div></div>
    <div class="st"><div class="sv">DA</div><div class="sl">Dopamine System</div></div>
    <div class="st"><div class="sv">NAcc</div><div class="sl">Peak Pleasure</div></div>
    <div class="st"><div class="sv">?</div><div class="sl">Sad Music Mystery</div></div>
  </div>
  <p>Juslin&rsquo;s BRECVEMA framework identifies eight distinct mechanisms through which music induces emotion: brainstem reflex (startling sounds), rhythmic entrainment (body sync), evaluative conditioning (&ldquo;our song&rdquo;), emotional contagion (catching the mood), visual imagery, episodic memory, musical expectancy (prediction violation), and aesthetic judgment. Different mechanisms operate on different timescales and engage different brain regions. Why <em>sad</em> music feels good remains genuinely unsolved &mdash; the prolactin hypothesis (2011) failed its empirical test (2021).</p>
  <div class="feat-grid">
    <div class="feat"><h4>Brainstem Reflex</h4><p>Automatic response to loud, sudden, or dissonant sounds. Fast, subcortical, no learning needed.</p></div>
    <div class="feat"><h4>Rhythmic Entrainment</h4><p>Neural oscillations sync with rhythm, directly modulating arousal and affect.</p></div>
    <div class="feat"><h4>Musical Expectancy</h4><p>Prediction violation: the brain expects resolution and gets surprise. Amygdala + hippocampus.</p></div>
    <div class="feat"><h4>Episodic Memory</h4><p>Music triggers vivid autobiographical memories with full emotional context.</p></div>
  </div>`,

  // 05 — Music & Memory
  `<p>Music has a unique relationship with memory that no other stimulus matches. Over 90% of people experience earworms &mdash; involuntary musical imagery where a melody fragment loops in the mind, activating the auditory cortex as vividly as actual listening. At the other extreme, Alzheimer&rsquo;s patients who cannot recognize family members can sing songs they learned decades ago, because musical memory uses procedural and emotional encoding pathways that resist neurodegeneration long after declarative memory fails.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">90%+</div><div class="sl">Experience Earworms</div></div>
    <div class="st"><div class="sv">15&ndash;25</div><div class="sl">Reminiscence Bump</div></div>
    <div class="st"><div class="sv">SMA</div><div class="sl">Preserved in AD</div></div>
    <div class="st"><div class="sv">Multi</div><div class="sl">Encoding Pathways</div></div>
  </div>
  <p>The &ldquo;reminiscence bump&rdquo; explains why the songs of adolescence and early adulthood (ages 15&ndash;25) tend to be the most emotionally powerful throughout a person&rsquo;s life. This overlaps precisely with the period of identity formation, when neuroplasticity is high and emotional experiences are encoded most deeply. Musical mnemonics exploit this machinery: the alphabet song is not an accident but a demonstration of melody as a retrieval scaffold, and the same principle helps stroke and Alzheimer&rsquo;s patients recover verbal memory.</p>`,

  // 06 — Music Across Cultures
  `<p>Every known human culture has music &mdash; no exceptions have been documented in the ethnographic record. The pentatonic scale appears independently on every inhabited continent. Lullabies worldwide share acoustic features: descending pitch contour, narrow range, slow tempo, repetitive structure. Infants as young as five months relax to foreign lullabies they have never heard before, responding to universal acoustic signatures rather than learned associations.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">100%</div><div class="sl">Cultures With Music</div></div>
    <div class="st"><div class="sv">86</div><div class="sl">Societies Studied</div></div>
    <div class="st"><div class="sv">22</div><div class="sl">Indian Shruti</div></div>
    <div class="st"><div class="sv">40K+ yr</div><div class="sl">Oldest Instruments</div></div>
  </div>
  <p>But universality coexists with radical diversity. Indian ragas map melodies to times of day, seasons, and emotions using 22 microtones per octave. Arabic maqam employs quarter-tones absent from Western music. Javanese gamelan deliberately rejects the pure octave, with each ensemble uniquely tuned and instruments not interchangeable between sets. The great debate: Steven Pinker calls music &ldquo;auditory cheesecake&rdquo; (an evolutionary byproduct); Aniruddh Patel argues music and language share deep neural resources; Samuel Mehr proposes music evolved for credible signaling of group coordination and parental attention.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Pinker: Cheesecake</h4><p>Music is a pleasant byproduct of language evolution. No survival value. Just sensory pleasure.</p></div>
    <div class="feat"><h4>Patel: Shared Resources</h4><p>Music and language share neural syntactic processing. Potentially too deeply integrated to be accidental.</p></div>
    <div class="feat"><h4>Mehr: Credible Signal</h4><p>Synchronized music signals coalition strength. Lullabies signal parental attention. Adaptive.</p></div>
    <div class="feat"><h4>Darwin: Sexual Selection</h4><p>Music as courtship display, like birdsong. Attractive to mates. Predates language.</p></div>
  </div>`,

  // 07 — Future of Music
  `<p>The first piece of music composed by a computer &mdash; Hiller and Isaacson&rsquo;s <em>Illiac Suite</em> &mdash; debuted in 1957. Nearly seven decades later, Suno has 25 million users generating music from text prompts, and 82% of listeners cannot distinguish the output from human-created tracks. The AI music generation market, valued at $643 million in 2024, is projected to reach $3 billion by 2030. Music was arguably the first creative domain where AI outputs became indistinguishable from human work.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1957</div><div class="sl">First Computer Music</div></div>
    <div class="st"><div class="sv">25M</div><div class="sl">Suno Users</div></div>
    <div class="st"><div class="sv">$3B</div><div class="sl">Market by 2030</div></div>
    <div class="st"><div class="sv">&minus;17%</div><div class="sl">Diversity Drop</div></div>
  </div>
  <p>But the technology carries a paradox. Spotify&rsquo;s recommendation algorithm has reduced acoustic diversity by 17% since 2018, narrowing dynamic range and pushing artists toward &ldquo;algorithm-friendly&rdquo; production. AI music generators, trained predominantly on Western popular music, reproduce Western conventions by default. Meanwhile, brain-computer music interfaces are moving from laboratory curiosity to FDA-tracked technology. The democratization paradox: everyone can now create music, but algorithmic curation may be making what we actually <em>hear</em> less diverse than ever.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">ALGORITHMIC COMPOSITION: 1957 &mdash; 2026</text>
    <line x1="20" y1="28" x2="480" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <line x1="40" y1="80" x2="460" y2="80" stroke="var(--border)" stroke-width="1"/>
    <circle cx="60" cy="80" r="4" fill="var(--accent)"/>
    <text x="60" y="65" text-anchor="middle" class="lbl" font-size="8">1957</text>
    <text x="60" y="100" text-anchor="middle" class="lbl" font-size="7">Illiac Suite</text>

  // 01 — Physics of Sound
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01</div><h2>The <em>Physics</em> of Sound</h2></div>
  <h3>Why This Section Matters</h3>
  <p>Everything in this project rests on physics. Before we can discuss why music moves us emotionally, why certain intervals sound consonant, or why rhythm entrains the brain, we need to understand what sound actually <em>is</em>. The physics of sound is not merely background information &mdash; it is the foundation that constrains every other dimension. The overtone series determines which frequency ratios are simple (and therefore potentially consonant). The speed of sound determines how concert halls behave. Fourier analysis is the mathematical bridge from vibrating strings to digital audio processing.</p>
  <p>This section connects forward to <a href="s2-harmony.dd.html">S2 (Harmony)</a> through the overtone series, to <a href="s4-emotion.dd.html">S4 (Emotion)</a> through the brainstem reflex mechanism that responds to acoustic features, and to <a href="s7-future.dd.html">S7 (Future)</a> through Fourier analysis as the basis of all digital audio technology.</p>
  <h3>The Overtone Series</h3>
  <p>When a string vibrates, it doesn&rsquo;t just move as a whole. It simultaneously vibrates in halves, thirds, quarters, and every other integer fraction of its length. Each mode of vibration produces a frequency that is an integer multiple of the fundamental: the second harmonic at 2f, the third at 3f, and so on to infinity (in theory). The result is that every musical note is actually a <em>chord</em> &mdash; a stack of frequencies that the ear fuses into a single perceived pitch with a characteristic timbral quality.</p>
  <p>The relative amplitude of each harmonic is what creates timbre. A <a href="http://hyperphysics.phy-astr.gsu.edu/hbase/Audio/fourier.html" target="_blank">clarinet</a> emphasizes odd harmonics (1st, 3rd, 5th...) because it functions as a closed tube, producing a hollow, woody sound. A trumpet has strong lower harmonics with a particular emphasis on the 4th and 5th, giving it brilliance. A violin has a complex, continuously shifting harmonic profile due to the bow&rsquo;s interaction with the string.</p>
  <h3>Fourier Analysis: The Mathematics of Sound</h3>
  <p>Joseph Fourier&rsquo;s 1807 insight &mdash; that any periodic function can be represented as a sum of sine and cosine waves &mdash; is one of the most consequential results in all of applied mathematics. For music, it means that the infinite complexity of a waveform can be completely described by a finite (for practical purposes) set of frequencies and their amplitudes. The Fast Fourier Transform (FFT) algorithm, developed in 1965, made this decomposition computationally practical, enabling real-time spectral analysis of audio signals.</p>
  <p>The <a href="https://scholarworks.umt.edu/cgi/viewcontent.cgi?article=1389&context=tme" target="_blank">historical connection</a> between Fourier analysis and music runs both directions. Fourier was partly inspired by the physics of vibrating strings (already studied by Euler and Bernoulli). In turn, his mathematics provided the tools that would eventually underpin every aspect of modern audio technology: recording, synthesis, compression (MP3 is fundamentally a Fourier-domain compression scheme), noise cancellation, and AI music generation.</p>
  <h3>Concert Hall Acoustics</h3>
  <p>Wallace Clement Sabine, a Harvard physics professor, founded the field of architectural acoustics in 1898 when he derived the equation relating reverberation time to room volume and surface absorption. His formula &mdash; <code>RT60 = 0.161 &times; V / A</code> &mdash; remains the foundation of concert hall design over a century later. The optimal reverberation time for orchestral music is 2.0&ndash;2.25 seconds; for speech, approximately 1.0 second. Too short, and the room feels dead. Too long, and successive sounds blur together.</p>
  <p>Modern <a href="https://www.nature.com/articles/s41598-025-96139-8" target="_blank">computational acoustics</a> extends Sabine&rsquo;s work with ray tracing, finite element analysis, and detailed modeling of sound diffusion. The challenge of dual-function halls &mdash; spaces that must serve both music and speech &mdash; remains an active area of research, balancing the competing demands of warmth (long reverberation) and clarity (short reverberation).</p>
  <div class="callout"><h4>Key Insight</h4><p>The physics of sound is not culturally variable. A vibrating string in Tokyo produces the same overtone series as one in Lagos. What changes is which overtones a culture emphasizes, which ratios it considers pleasing, and how it shapes rooms to enhance the sound. Physics provides the universal canvas; culture paints on it.</p></div>`,

  // 02 — Harmony & Consonance
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02</div><h2><em>Harmony</em> & the Math of Consonance</h2></div>
  <h3>Why This Section Matters</h3>
  <p>Harmony is where physics meets aesthetics. The overtone series (<a href="s1-physics.dd.html">S1</a>) explains <em>why</em> simple frequency ratios reduce acoustic beating, but it doesn&rsquo;t explain why some cultures (Western Europe) built entire musical systems around maximizing consonance while others (Java, Bali) deliberately embraced what Western theory would call dissonance. The mathematics of tuning reveals a deep impossibility at the heart of music &mdash; the Pythagorean comma &mdash; and the history of attempts to solve it is a history of aesthetic compromise.</p>
  <h3>Pythagoras and the Discovery of Musical Ratios</h3>
  <p>The legend says Pythagoras heard harmonious sounds from a blacksmith&rsquo;s hammers and realized the weights were in simple ratios. The story is almost certainly myth, but the underlying discovery is real and demonstrable on a monochord: halving a string&rsquo;s length produces the octave (2:1), taking two-thirds produces the fifth (3:2), and three-quarters produces the fourth (4:3). These &ldquo;perfect consonances&rdquo; &mdash; recognized across cultures for millennia &mdash; correspond to the lowest, simplest ratios in the <a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)" target="_blank">harmonic series</a>.</p>
  <h3>Helmholtz and the Mechanism of Dissonance</h3>
  <p>Hermann von Helmholtz (1863) provided the physical explanation: when two tones are sounded together, their higher partials may fall within each other&rsquo;s &ldquo;critical bandwidth&rdquo; &mdash; roughly one-third of an octave at most frequencies &mdash; producing audible amplitude fluctuations (beats) perceived as roughness. Simple ratios minimize this overlap because their harmonics coincide rather than clash. Plomp and Levelt (1965) formalized this into a computational model that predicts perceived consonance from the <a href="https://emusicology.org/article/id/4597/" target="_blank">spectral content</a> of any two tones.</p>
  <h3>The Pythagorean Comma</h3>
  <p>Here is the deep mathematical problem. Stack twelve perfect fifths (3:2) starting from any note, and you should return to the starting note seven octaves higher (2:1 applied seven times). But <a href="https://johncarlosbaez.wordpress.com/2023/10/07/pythagorean-tuning/" target="_blank">3<sup>12</sup> = 531,441 while 2<sup>19</sup> = 524,288</a>. The fifths overshoot by a factor of 531441/524288 &mdash; approximately 23.46 cents, or about a quarter of a semitone. This gap is the Pythagorean comma, and it means that no tuning system can have both pure fifths and pure octaves. Every tuning system in history is a different answer to the question: where do you hide the error?</p>
  <h3>Bach and the Freedom of Keys</h3>
  <p>The Well-Tempered Clavier (1722, 1742) was not written for equal temperament &mdash; modern scholarship suggests Bach used some form of <a href="https://en.wikipedia.org/wiki/Well_temperament" target="_blank">well temperament</a> where all keys were usable but each retained a distinctive character. The work was a political statement: demonstrating that a keyboard could navigate all 24 keys without encountering a wolf fifth, arguing for tuning freedom against the meantone establishment that restricted composers to a handful of keys.</p>
  <h3>Beyond the Western Framework</h3>
  <p>Javanese gamelan uses two tuning systems &mdash; slendro (five roughly equidistant notes) and pelog (seven unequal notes) &mdash; that have <a href="https://direct.mit.edu/comj/article/47/2/21/124238" target="_blank">no systematic relationship to the pure octave</a>. Each gamelan ensemble has a unique tuning; instruments from different sets cannot be mixed. Paired metallophones are deliberately detuned from each other so that their combined sound produces interference beats &mdash; a &ldquo;shimmering&rdquo; quality that Western theory would call dissonance but that Javanese aesthetics considers essential. The lesson: consonance and dissonance are not just physics. They are culturally mediated responses to physical phenomena.</p>
  <div class="callout"><h4>Key Insight</h4><p>Equal temperament solved the Pythagorean comma by making every key equally impure. It is a specifically Western compromise &mdash; one that sacrificed tonal individuality for modulatory freedom. Other cultures chose differently, or never faced the problem at all.</p></div>`,

  // 03 — Rhythm
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03</div><h2><em>Rhythm</em>, Time & the Brain</h2></div>
  <h3>Why This Section Matters</h3>
  <p>Rhythm is the most embodied dimension of music. While harmony and melody can be appreciated intellectually, rhythm engages the motor system directly and involuntarily &mdash; which is why even people who &ldquo;can&rsquo;t dance&rdquo; find themselves tapping their feet. The neural mechanisms of beat perception connect forward to <a href="s4-emotion.dd.html">S4 (Emotion)</a> through Juslin&rsquo;s entrainment mechanism and to <a href="s6-cultures.dd.html">S6 (Cultures)</a> through the extraordinary rhythmic complexity of West African and Afro-diasporic traditions.</p>
  <h3>Entrainment: Why We Move to Music</h3>
  <p>Neural entrainment is the process by which <a href="https://www.mdpi.com/2076-3425/14/11/1063" target="_blank">endogenous brain oscillations synchronize</a> with external rhythmic stimuli. When a listener hears a steady beat, neural populations in the auditory cortex, motor cortex, and supplementary motor area begin firing in time with it &mdash; even if you make no overt movement. This is not just passive following. The brain actively generates predictions about when the next beat will arrive, which is why a <em>missed</em> beat (syncopation) creates such a strong perceptual effect: the prediction fires but the event doesn&rsquo;t arrive.</p>
  <h3>The Basal Ganglia and Cerebellum</h3>
  <p><a href="https://pubmed.ncbi.nlm.nih.gov/28910668/" target="_blank">Grahn et al. (2017)</a> demonstrated a functional dissociation. Patients with basal ganglia damage (Parkinson&rsquo;s disease) showed impaired beat-finding for complex rhythms &mdash; specifically rhythms where the beat must be internally generated rather than explicitly stated. Patients with cerebellar damage showed deficits primarily with fast tempi, where temporally precise encoding of individual events is critical. The basal ganglia find the beat; the cerebellum tracks the details.</p>
  <p>A <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9195154/" target="_blank">2022 meta-analysis</a> of neuroimaging studies identified a distributed rhythm network: supplementary motor area (bilateral), premotor cortex, basal ganglia, cerebellum, and auditory cortex. Notably, the SMA is activated by rhythmic processing even in the absence of movement &mdash; the motor system is &ldquo;playing along&rdquo; whether or not overt movement occurs.</p>
  <h3>Polyrhythm and Cultural Complexity</h3>
  <p>West African drumming traditions represent some of the most rhythmically complex systems documented in ethnomusicology. The foundational principle is the <a href="https://en.wikipedia.org/wiki/Rhythm_in_Sub-Saharan_Africa" target="_blank">3:2 cross-rhythm</a> &mdash; two simultaneous meters that create a perceptual ambiguity between triple and duple time. The <a href="https://folkways.si.edu/braiding-rhythms-the-role-of-bell-patterns-in-west-african-and-afro-caribbean-music" target="_blank">bell pattern</a> (or timeline) serves as an asymmetric organizing principle against which other parts play, and the master drummer improvises against all of them.</p>
  <p>This tradition traveled to Cuba and the Caribbean, where the West African bell pattern became the <em>clave</em> &mdash; the rhythmic key that organizes Afro-Cuban music. The son clave (3-2 or 2-3) is essentially the same pattern that A.M. Jones identified as the most common key pattern across Sub-Saharan Africa. From there it influenced jazz, rock, funk, and virtually all popular music of the Americas.</p>
  <h3>Groove and the Sweet Spot</h3>
  <p>Groove &mdash; the quality that induces the desire to move &mdash; appears to emerge from a sweet spot of rhythmic complexity. Too simple (a metronomic beat) and there is nothing interesting to entrain to. Too complex (free-form rhythm with no discernible beat) and the predictive system can&rsquo;t get a foothold. Moderate syncopation against a clear metric framework produces the strongest groove response. <a href="https://www.frontiersin.org/journals/neuroscience/articles/10.3389/fnins.2017.00208" target="_blank">Musicians show stronger neural entrainment</a> to complex grooves than non-musicians, suggesting that rhythmic expertise expands the range of complexity the brain can groove to.</p>
  <div class="callout"><h4>Key Insight</h4><p>Rhythm is the only dimension of music that directly and involuntarily engages the motor system. This is not a metaphor &mdash; motor planning areas activate during passive listening. The body is always part of the musical experience, whether it moves or not.</p></div>`,

  // 04 — Emotion
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04</div><h2>The <em>Neuroscience</em> of Musical Emotion</h2></div>
  <h3>Why This Section Matters</h3>
  <p>This is the section where all the preceding threads converge. The physics of sound (<a href="s1-physics.dd.html">S1</a>) provides the acoustic raw material. Harmony and tuning (<a href="s2-harmony.dd.html">S2</a>) create the tonal expectations. Rhythm (<a href="s3-rhythm.dd.html">S3</a>) provides entrainment. And now: why does any of it <em>matter</em> to us? Why does music make us cry, dance, feel chills run down our spines? The answer involves the brain&rsquo;s core reward circuitry &mdash; the same system that processes food, sex, and drugs &mdash; engaged by a stimulus that has no obvious biological utility.</p>
  <h3>Dopamine and Musical Chills</h3>
  <p><a href="https://www.nature.com/articles/nn.2726" target="_blank">Salimpoor et al. (2011)</a> used PET imaging with a radioactive dopamine tracer to directly measure neurotransmitter release during peak musical experiences. The finding was striking: dopamine was released in the striatum during music-induced chills, with a functional dissociation between anticipation (caudate nucleus) and experience (nucleus accumbens). This is the same anticipation-reward circuit that fires when a person smells food cooking before eating it.</p>
  <p><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116" target="_blank">Ferreri et al. (2019)</a> provided the causal proof. They pharmacologically manipulated dopamine levels: levodopa (a dopamine precursor) enhanced musical pleasure and motivation, while risperidone (a dopamine antagonist) reduced them. This was the first demonstration that dopamine doesn&rsquo;t just correlate with musical pleasure &mdash; it <em>causes</em> it.</p>
  <h3>The BRECVEMA Framework in Detail</h3>
  <p><a href="https://pubmed.ncbi.nlm.nih.gov/23769678/" target="_blank">Juslin (2013)</a> argued that treating &ldquo;musical emotion&rdquo; as a single phenomenon obscures eight fundamentally different mechanisms. Each operates on a different timescale, engages different neural substrates, and requires different amounts of musical experience. Brainstem reflexes are universal and instantaneous; aesthetic judgment is culturally mediated and reflective. The framework explains why the same piece of music can trigger different emotions in different listeners &mdash; they may be activating different mechanisms.</p>
  <h3>Musical Expectancy and the Prediction Game</h3>
  <p><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588" target="_blank">Cheung et al. (2019)</a> used information-theoretic measures to quantify musical surprise and found that pleasure peaks when <em>uncertainty is high</em> (the listener does not know what is coming) <em>and</em> the resolution is surprising. The amygdala and hippocampus tracked the interaction of uncertainty and surprise, while the nucleus accumbens reflected uncertainty alone. Musical pleasure, at least through this mechanism, is fundamentally about prediction &mdash; the brain&rsquo;s delight in being uncertain and then being surprised.</p>
  <h3>The Sad Music Paradox</h3>
  <p><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171" target="_blank">David Huron (2011)</a> proposed an elegant explanation: sad music triggers the release of prolactin, a hormone associated with consolation and comfort. The body responds to the acoustic cues of sadness (slow tempo, low pitch, minor key) with a hormonal response designed for real grief &mdash; but because there is no actual loss, the consolation arrives without the pain. Unfortunately, <a href="https://journals.sagepub.com/doi/10.1177/1029864919890900" target="_blank">Ladinig et al. (2021)</a> directly tested this by measuring prolactin levels during sad music listening and found no significant increase. The prolactin theory is likely wrong, and why sad music feels good remains one of the genuine open questions in the field.</p>
  <div class="callout"><h4>Key Insight</h4><p>Music engages the brain&rsquo;s primary reward circuitry &mdash; not a secondary aesthetic system, but the same dopamine pathways that process biological necessities. This finding raises profound questions about music&rsquo;s evolutionary status: why would a &ldquo;byproduct&rdquo; (Pinker) hijack the brain&rsquo;s most fundamental reward system?</p></div>`,

  // 05 — Memory
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05</div><h2>Music & <em>Memory</em></h2></div>
  <h3>Why This Section Matters</h3>
  <p>Music&rsquo;s relationship with memory is unique among all sensory stimuli. No other modality produces the combination of involuntary recall (earworms), resistance to neurodegeneration (Alzheimer&rsquo;s singing), age-specific emotional intensity (the reminiscence bump), and mnemonic scaffolding (the alphabet song) that music provides. This section connects to <a href="s4-emotion.dd.html">S4 (Emotion)</a> through the dopamine-memory encoding link, to <a href="s3-rhythm.dd.html">S3 (Rhythm)</a> through the preserved motor memory pathways, and to <a href="s6-cultures.dd.html">S6 (Cultures)</a> through the universal use of song for knowledge transmission.</p>
  <h3>Earworms: The Brain&rsquo;s Jukebox</h3>
  <p><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/" target="_blank">Involuntary musical imagery</a> (INMI) affects over 90% of the population at least weekly. The auditory cortex activates during earworms just as it does during actual music listening &mdash; the brain cannot neurologically distinguish between imagined and real sound. Research on <a href="https://www.sciencedirect.com/science/article/pii/S1053810015000975" target="_blank">cortical structure</a> shows that individual differences in earworm frequency correlate with cortical thickness in auditory and prefrontal regions, suggesting that earworm susceptibility is partly structural.</p>
  <p>Earworms tend to be triggered by recent exposure, emotional association, or environmental cues. They typically consist of a 15&ndash;30 second melodic fragment that loops involuntarily. Simple, repetitive melodies with distinctive intervallic features are most likely to become earworms. The phonological loop &mdash; a component of working memory normally involved in speech processing &mdash; appears to initiate and sustain the imagery independently of conscious control.</p>
  <h3>Musical Memory in Alzheimer&rsquo;s Disease</h3>
  <p>Among the most striking observations in clinical neuroscience is that Alzheimer&rsquo;s patients who cannot recognize family members, cannot form new memories, and cannot perform basic self-care tasks can nonetheless sing songs they learned decades ago &mdash; sometimes with remarkable accuracy. This dissociation reveals that musical memory uses fundamentally different encoding pathways than declarative (factual) memory.</p>
  <p>The key appears to be the supplementary motor area (SMA), which is relatively spared in early and moderate Alzheimer&rsquo;s. Singing involves procedural memory (motor sequences) and emotional memory (amygdala-mediated), both of which are more resistant to neurodegeneration than hippocampus-dependent declarative memory. Music therapy exploits this: familiar music can reduce agitation, improve mood, and sometimes unlock brief windows of lucidity in patients with moderate to severe dementia.</p>
  <h3>The Reminiscence Bump</h3>
  <p>When asked to recall autobiographical memories, people across cultures show a disproportionate clustering around ages 15&ndash;25 &mdash; the &ldquo;reminiscence bump.&rdquo; Music amplifies this effect enormously. Songs heard during this period evoke stronger emotional responses, more vivid memories, and a deeper sense of personal identity than music from any other life stage. Multiple factors converge: heightened neuroplasticity during adolescence, hormonal enhancement of emotional encoding, the novelty of first exposure to musical genres, and the overlap with identity formation.</p>
  <h3>Musical Mnemonics</h3>
  <p>The alphabet song is perhaps the most familiar example of musical mnemonic, but the principle extends far beyond children&rsquo;s education. Melody provides a retrieval scaffold for verbal information by adding multiple encoding cues: rhythmic structure constrains timing, pitch contour provides a parallel information stream, and emotional engagement strengthens consolidation. Clinical research has demonstrated that sung material improves word memory in MS patients, verbal narrative recall in stroke survivors, and lyric recognition in Alzheimer&rsquo;s patients compared to spoken presentation of the same information.</p>
  <div class="callout"><h4>Key Insight</h4><p>Musical memory is not just robust &mdash; it is uniquely resilient to neurological damage. The combination of procedural, emotional, and motor encoding creates a memory trace that persists when virtually all other forms of memory have failed. This is not just clinically useful; it reveals something fundamental about how deeply music is embedded in brain architecture.</p></div>`,

  // 06 — Cultures
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06</div><h2>Music <em>Across</em> Cultures</h2></div>
  <h3>Why This Section Matters</h3>
  <p>The previous sections established universal mechanisms: overtone series, dopamine reward, entrainment, memory encoding. This section asks the harder question: how much of musical experience is genuinely universal, and how much is culturally constructed? The answer matters for the evolutionary debate (<a href="s4-emotion.dd.html">S4</a>), for the future of AI music (<a href="s7-future.dd.html">S7</a>), and for whether the neuroscience of music &mdash; conducted almost entirely with Western stimuli on Western subjects &mdash; actually tells us about <em>music</em> or just about <em>one culture&rsquo;s music</em>.</p>
  <h3>Universals: What Every Culture Shares</h3>
  <p>The <a href="https://www.parsingscience.org/2018/02/20/mehr-and-singh/" target="_blank">Natural History of Song project</a> (Mehr, Singh et al.) analyzed ethnographic recordings from 86 societies and found that song types &mdash; lullabies, dance songs, healing songs &mdash; share acoustic features across cultures that listeners can recognize above chance. <a href="https://pubmed.ncbi.nlm.nih.gov/33077883/" target="_blank">Infants as young as five months</a> relax in response to unfamiliar foreign lullabies, as measured by heart rate, pupillometry, and electrodermal activity &mdash; suggesting that some acoustic features of music are recognized by biological mechanisms that predate cultural learning.</p>
  <p>The <a href="https://journals.sagepub.com/doi/full/10.1177/10693971241272406" target="_blank">systematic ethnographic evidence</a> confirms that lullabies worldwide share descending pitch contours, narrow pitch ranges, repetitive melodic structure, and slow tempo. The pentatonic scale appears independently across civilizations &mdash; from Chinese traditional music (documented for 24+ centuries) to Scottish folk music to West African tonal systems to Native American song.</p>
  <h3>The Raga, the Maqam, and the Gamelan</h3>
  <p>Against these universals, the <a href="https://globalmusictheory.com/a-comparison-of-different-musical-modes-used-in-different-parts-of-the-world/" target="_blank">diversity of musical systems</a> is staggering. Indian classical music uses 22 microtones (shruti) per octave, with each raga prescribing not just a scale but specific ornaments, characteristic phrases, ascending/descending patterns, and associations with time of day, season, and emotion. Arabic maqam employs quarter-tones &mdash; intervals that don&rsquo;t exist in Western music &mdash; and prescribes rules for melodic development within each mode. Javanese gamelan deliberately rejects the pure octave, tuning each ensemble uniquely.</p>
  <p>The key insight is that these are not &ldquo;primitive&rdquo; or &ldquo;less developed&rdquo; systems that are working toward Western tonality. They are <em>different solutions</em> to the same underlying question: given the physical properties of sound, how should music be organized? Each system maps acoustic features to emotional and spiritual meanings in its own way.</p>
  <h3>The Evolutionary Debate</h3>
  <p><a href="https://humanitiescenter.byu.edu/is-music-simply-auditory-cheesecake/" target="_blank">Steven Pinker (1997)</a> argued that music is &ldquo;auditory cheesecake&rdquo; &mdash; a pleasant byproduct of adaptations for language processing that serves no survival function. The counter-evidence is substantial: music is universal, ancient (bone flutes date to 40,000+ years ago), and engages the brain&rsquo;s primary reward circuitry. <a href="https://global.oup.com/academic/product/music-language-and-the-brain-9780195123753" target="_blank">Aniruddh Patel (2008)</a> proposed the SSIRH &mdash; that music and language share neural resources for syntactic processing, suggesting a deeper integration than Pinker&rsquo;s byproduct model allows. <a href="https://mehr.nz/pdf/2021_MehrEtAl_BBS-targetArticle.pdf" target="_blank">Mehr and Krasnow (2021)</a> proposed that music evolved for credible signaling: synchronized singing and dancing demonstrates group coordination to allies and enemies, while lullabies credibly signal parental attention.</p>
  <div class="callout"><h4>Key Insight</h4><p>The universality of music is not the same as the universality of any particular musical system. Every culture has music; no culture has the same music. The physics is universal but the aesthetics are not. Any science of music that ignores this distinction &mdash; as most neuroscience currently does &mdash; is studying culture disguised as nature.</p></div>`,

  // 07 — Future
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07</div><h2>The <em>Future</em> of Music</h2></div>
  <h3>Why This Section Matters</h3>
  <p>Every preceding section describes how music works &mdash; physically, neurologically, emotionally, culturally. This section asks what happens when technology intervenes in those mechanisms. AI music generation intersects with <a href="s1-physics.dd.html">S1 (Physics)</a> through Fourier analysis and digital audio processing, with <a href="s2-harmony.dd.html">S2 (Harmony)</a> through the historical parallel between equal temperament&rsquo;s standardization and algorithmic homogenization, and with <a href="s6-cultures.dd.html">S6 (Cultures)</a> through the risk that Western-trained AI systems will flatten global musical diversity.</p>
  <h3>From Illiac to Suno: Seven Decades of Machine Music</h3>
  <p>The <a href="https://en.wikipedia.org/wiki/Illiac_Suite" target="_blank">Illiac Suite</a> (1957) was a proof of concept: Hiller and Isaacson programmed a mainframe to apply rules of counterpoint and generate a string quartet. Each of its four movements tested a different compositional procedure, from strict rule-following to Markov chain randomness. Xenakis brought stochastic processes in the 1960s. Cope&rsquo;s EMI recombined existing musical patterns in the 1980s. Google&rsquo;s Magenta applied deep learning in 2016. But the qualitative leap came in 2023&ndash;24 with text-to-music platforms.</p>
  <p><a href="https://en.wikipedia.org/wiki/Suno_(platform)" target="_blank">Suno</a>, with approximately 25 million users, and Udio (backed by a16z) can generate complete songs &mdash; vocals, instrumentation, arrangement &mdash; from text prompts. The <a href="https://www.businesswire.com/news/home/20250327511227" target="_blank">AI music generation market</a> reached $643 million in 2024 and is projected to hit $3 billion by 2030. In July 2025, the first AI-creator record deal was signed: Hallwood Media signed Suno user imoliver, followed by a $3 million deal with AI-artist Xania Monet.</p>
  <h3>The Homogenization Problem</h3>
  <p>Spotify&rsquo;s recommendation algorithm, <a href="https://digital.hec.ca/en/blog/how-spotifys-algorithm-shapes-global-music-discovery-and-cultural-diversity/" target="_blank">built on deep learning since 2014</a>, has measurably reduced the diversity of what listeners hear. Between 2018 and 2023, average acoustic diversity dropped 17%, median tempo converged, and dynamic range narrowed by 3.2 dB. Artists report producing &ldquo;Spotify-friendly&rdquo; music to match algorithm preferences, creating a feedback loop: the algorithm shapes what gets heard, which shapes what gets made, which shapes what the algorithm recommends.</p>
  <p>AI music generators compound this problem. <a href="https://arxiv.org/abs/2509.11824" target="_blank">Analysis of Suno and Udio outputs</a> reveals a bias toward Western pop conventions &mdash; 4/4 time signatures, verse-chorus structures, pentatonic and diatonic melodies, limited timbral diversity. The training data reflects the digital music ecosystem, which is dominated by Western commercial music. The result: a technology that could theoretically explore infinite musical space instead converges on a narrow stylistic range.</p>
  <h3>Brain-Computer Music Interfaces</h3>
  <p>Brain-computer music interfaces (BCMIs) represent the next frontier. Current systems use EEG to translate brain activity into musical parameters in real time. <a href="https://link.springer.com/book/10.1007/978-1-4471-6584-2" target="_blank">The field</a> has produced dual-BCI systems (BrainiBeats, using inter-brain synchrony between two users), emotional neurofeedback instruments (Neurophone), and closed-loop affective interaction systems. The technology is still limited by EEG&rsquo;s low spatial resolution and artifact susceptibility, but BCI technology more broadly is advancing rapidly: FDA breakthrough designations, venture investment surging, and the first clinical devices reaching market.</p>
  <h3>The Democratization Paradox</h3>
  <p>More people can make music today than at any point in human history. AI tools eliminate the need for instrumental skill, music theory knowledge, or studio access. This is genuinely democratizing. But the paradox is that algorithmic curation may be making what people actually <em>hear</em> less diverse than before. More creators, more music, but narrower discovery. The economics reinforce this: streaming pays fractions of a cent per play, AI-generated content floods platforms, and labels can sign AI creators at lower cost than human artists. Music was the first creative domain AI disrupted &mdash; and the tensions playing out here will likely recur in every creative field that follows.</p>
  <div class="callout"><h4>Key Insight</h4><p>The parallel between equal temperament and AI homogenization is precise. Both technologies make music more accessible (all keys playable; anyone can create) while simultaneously flattening the diversity that makes music interesting. History suggests the standardization will win in the short term, and cultural resistance will eventually push back &mdash; but what is lost in the interim may not be recoverable.</p></div>`
];

const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
