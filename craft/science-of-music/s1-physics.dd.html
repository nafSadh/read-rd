<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Vibration', title: 'What <em>Sound</em> Is' },
  { num: '02', short: 'Overtones', title: 'The <em>Overtone</em> Series' },
  { num: '03', short: 'Timbre', title: '<em>Timbre</em>: The Color of Sound' },
  { num: '04', short: 'Fourier', title: '<em>Fourier</em> Analysis' },
  { num: '05', short: 'Resonance', title: '<em>Standing</em> Waves & Resonance' },
  { num: '06', short: 'Acoustics', title: '<em>Concert</em> Hall Acoustics' }
];

const summaries = [
  // 01 — What Sound Is
  `<p>Sound is a longitudinal pressure wave &mdash; molecules of air pushed together and pulled apart in a pattern that propagates outward from a vibrating source at 343 meters per second (at 20&deg;C).<sup class="fn"><a href="https://josephromano.github.io/PHYS1406/notes/notes.pdf">[1]</a><span class="tip"><a href="https://josephromano.github.io/PHYS1406/notes/notes.pdf" target="_blank">Romano: PHYS 1406 &mdash; Physics of Sound & Music (2022) &rarr;</a></span></sup> Three properties define any sound: <em>frequency</em> (vibrations per second, measured in Hertz, determining pitch), <em>amplitude</em> (the strength of the vibration, determining loudness, measured on the logarithmic decibel scale), and <em>waveform</em> (the shape of the pressure variation over time, determining timbre).</p>
  <div class="s-stat">
    <div class="st"><div class="sv">343 m/s</div><div class="sl">Speed in Air (20&deg;C)</div></div>
    <div class="st"><div class="sv">20&ndash;20K Hz</div><div class="sl">Human Hearing</div></div>
    <div class="st"><div class="sv">A4 = 440</div><div class="sl">Concert Pitch (Hz)</div></div>
    <div class="st"><div class="sv">~0.78 m</div><div class="sl">A4 Wavelength</div></div>
  </div>
  <p>The relationship between frequency and wavelength is governed by a simple equation: wavelength = speed / frequency. A4 at 440 Hz has a wavelength of approximately 0.78 meters in air. This matters for instrument design (a pipe organ must be physically large to produce low frequencies) and for concert hall acoustics (low frequencies diffract around obstacles that high frequencies bounce off).</p>`,

  // 02 — Overtone Series
  `<p>When a guitar string vibrates, it doesn&rsquo;t just move back and forth as a single unit. It simultaneously vibrates in halves, thirds, quarters, fifths, and every other integer fraction of its length. Each mode produces a frequency that is an integer multiple of the fundamental: the second harmonic at 2f, the third at 3f, the fourth at 4f, and so on to infinity.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)" target="_blank">Wikipedia: Harmonic Series (Music) &rarr;</a></span></sup> Every musical note is secretly a <em>chord</em> &mdash; a stack of frequencies that the ear fuses into a single perceived pitch.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">THE HARMONIC SERIES FROM A SINGLE STRING</text>
    <line x1="20" y1="28" x2="480" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <text x="30" y="55" class="lbl-hi" font-size="9">1f (fundamental)</text>
    <line x1="160" y1="55" x2="160" y2="45" stroke="var(--dim)" stroke-width="0.5"/>
    <line x1="460" y1="55" x2="460" y2="45" stroke="var(--dim)" stroke-width="0.5"/>
    <path d="M 160,50 Q 310,20 460,50" fill="none" stroke="var(--accent)" stroke-width="2"/>
    <text x="30" y="85" class="lbl-hi" font-size="9">2f (octave)</text>
    <line x1="160" y1="85" x2="160" y2="75" stroke="var(--dim)" stroke-width="0.5"/>
    <line x1="310" y1="85" x2="310" y2="75" stroke="var(--dim)" stroke-width="0.5"/>
    <line x1="460" y1="85" x2="460" y2="75" stroke="var(--dim)" stroke-width="0.5"/>
    <path d="M 160,80 Q 235,65 310,80 Q 385,95 460,80" fill="none" stroke="var(--cyan)" stroke-width="1.5"/>
    <text x="30" y="115" class="lbl-hi" font-size="9">3f (oct + fifth)</text>
    <path d="M 160,110 Q 210,98 260,110 Q 310,122 360,110 Q 410,98 460,110" fill="none" stroke="var(--green)" stroke-width="1.5"/>
    <text x="30" y="145" class="lbl-hi" font-size="9">4f (2 octaves)</text>
    <path d="M 160,140 Q 197,130 235,140 Q 272,150 310,140 Q 347,130 385,140 Q 422,150 460,140" fill="none" stroke="var(--amber)" stroke-width="1"/>
    <text x="30" y="175" class="lbl-hi" font-size="9">5f (2 oct + 3rd)</text>
    <path d="M 160,170 Q 190,162 220,170 Q 250,178 280,170 Q 310,162 340,170 Q 370,178 400,170 Q 430,162 460,170" fill="none" stroke="var(--red)" stroke-width="1"/>
    <line x1="160" y1="38" x2="160" y2="185" stroke="var(--border)" stroke-width="1"/>
    <line x1="460" y1="38" x2="460" y2="185" stroke="var(--border)" stroke-width="1"/>
    <text x="310" y="205" text-anchor="middle" class="lbl" font-size="9">All modes vibrate simultaneously &mdash; the mix defines the timbre</text>
  </svg></div>
  <p>The overtone series is not an abstract mathematical construct &mdash; it is the physical reason why simple frequency ratios (2:1, 3:2, 4:3) sound consonant. When two notes whose fundamentals are in a simple ratio are played together, their overtone series <em>overlap</em>: shared harmonics reinforce each other rather than clashing. This is the bridge from <a href="s2-harmony.dd.html">S2 (Harmony)</a>: consonance has a physical basis in the overtone series.</p>`,

  // 03 — Timbre
  `<p>Two instruments playing the same note at the same volume sound completely different because their overtone profiles differ. A <em>clarinet</em> emphasizes odd harmonics (1st, 3rd, 5th, 7th) because it functions as a closed cylindrical tube, producing a hollow, woody character. A <em>trumpet</em> has strong lower harmonics with emphasis on the 4th and 5th, giving it brilliance and bite. A <em>violin</em> has a continuously shifting harmonic profile as the bow interacts with the string, producing warmth and expressiveness.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Clarinet</h4><p>Closed tube: odd harmonics only (1, 3, 5, 7...). Distinctive hollow, woody timbre. Missing even harmonics create the characteristic sound.<sup class="fn"><a href="https://www.vedantu.com/physics/overtones">[3]</a><span class="tip"><a href="https://www.vedantu.com/physics/overtones" target="_blank">Vedantu: Overtones in Physics &rarr;</a></span></sup></p></div>
    <div class="feat"><h4>Trumpet</h4><p>Open tube with flared bell: full harmonic series. Strong 4th-5th harmonics add brilliance. Bell shape radiates high frequencies directionally.</p></div>
    <div class="feat"><h4>Violin</h4><p>Bowed string: rich, complex spectrum. Bow pressure and position continuously modify harmonic content. Body resonances shape final timbre.</p></div>
    <div class="feat"><h4>Piano</h4><p>Struck string: full harmonic series with inharmonicity. Stiff strings make upper partials slightly sharp. Each note has 1-3 strings tuned slightly apart.</p></div>
  </div>
  <p>Timbre is also shaped by the <em>envelope</em> &mdash; how a sound changes over time. A piano note has a sharp attack (hammer strike) and gradual decay. A violin can sustain indefinitely with the bow. An organ has an almost instantaneous onset and offset. The attack transient (the first few milliseconds) is particularly important for identification: studies show that listeners struggle to identify instruments when the attack is removed.</p>`,

  // 04 — Fourier Analysis
  `<p>In 1807, Joseph Fourier demonstrated that any periodic function can be represented as a sum of sine and cosine waves.<sup class="fn"><a href="http://hyperphysics.phy-astr.gsu.edu/hbase/Audio/fourier.html">[4]</a><span class="tip"><a href="http://hyperphysics.phy-astr.gsu.edu/hbase/Audio/fourier.html" target="_blank">HyperPhysics: Fourier Analysis and Synthesis (Georgia State) &rarr;</a></span></sup> For music, this means that the infinite complexity of any waveform can be completely described by a set of frequencies, their amplitudes, and their phases. The Fast Fourier Transform (FFT) algorithm, developed by Cooley and Tukey in 1965, made this decomposition computationally practical &mdash; and launched the entire field of digital signal processing.<sup class="fn"><a href="https://www.researchgate.net/publication/386131153">[5]</a><span class="tip"><a href="https://www.researchgate.net/publication/386131153" target="_blank">Applications of Fourier Series Harmonics in Musical Tones (ResearchGate, 2024) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">1807</div><div class="sl">Fourier&rsquo;s Theorem</div></div>
    <div class="st"><div class="sv">1965</div><div class="sl">FFT Algorithm</div></div>
    <div class="st"><div class="sv">O(n log n)</div><div class="sl">FFT Complexity</div></div>
    <div class="st"><div class="sv">44.1 kHz</div><div class="sl">CD Sample Rate</div></div>
  </div>
  <p>Every piece of audio technology you use relies on Fourier analysis. MP3 compression works by transforming audio into the frequency domain and discarding components the ear is unlikely to notice. Noise cancellation identifies unwanted frequencies and generates their inverse. Autotune detects the fundamental frequency of a voice in real time and shifts it. Spotify&rsquo;s recommendation engine analyzes the spectral content of songs. AI music generators like Suno process audio in the frequency domain. Fourier&rsquo;s 200-year-old mathematics remains the foundation of the entire digital audio ecosystem.</p>`,

  // 05 — Standing Waves & Resonance
  `<p>When a wave reflects back on itself and interferes constructively, it creates a <em>standing wave</em> &mdash; a pattern of fixed nodes (zero displacement) and antinodes (maximum displacement). Musical instruments are resonant systems that support specific standing wave patterns, which is why they produce harmonic series rather than arbitrary frequencies.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">STANDING WAVES IN TUBES</text>
    <line x1="20" y1="28" x2="480" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <text x="130" y="50" text-anchor="middle" class="lbl-hi" font-size="10" font-weight="600">OPEN TUBE (Flute)</text>
    <rect x="40" y="58" width="180" height="30" fill="none" stroke="var(--border)" stroke-width="1" rx="2"/>
    <path d="M 40,73 Q 85,55 130,73 Q 175,91 220,73" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
    <text x="130" y="105" text-anchor="middle" class="lbl" font-size="8">All harmonics: 1f, 2f, 3f, 4f...</text>
    <text x="130" y="118" text-anchor="middle" class="lbl" font-size="8">Antinode at both open ends</text>
    <text x="370" y="50" text-anchor="middle" class="lbl-hi" font-size="10" font-weight="600">CLOSED TUBE (Clarinet)</text>
    <rect x="280" y="58" width="180" height="30" fill="none" stroke="var(--border)" stroke-width="1" rx="2"/>
    <line x1="280" y1="58" x2="280" y2="88" stroke="var(--bright)" stroke-width="2"/>
    <path d="M 280,73 Q 340,55 400,73 Q 430,82 460,73" fill="none" stroke="var(--cyan)" stroke-width="1.5"/>
    <text x="370" y="105" text-anchor="middle" class="lbl" font-size="8">Odd harmonics only: 1f, 3f, 5f, 7f...</text>
    <text x="370" y="118" text-anchor="middle" class="lbl" font-size="8">Node at closed end, antinode at open</text>
    <text x="250" y="150" text-anchor="middle" class="lbl" font-size="9">The boundary conditions determine which harmonics are possible</text>
    <text x="250" y="168" text-anchor="middle" class="lbl-hi" font-size="9">This is why a clarinet and flute sound so different</text>
  </svg></div>
  <p>A string fixed at both ends (guitar, violin, piano) supports all integer harmonics. An open tube (flute) also supports all harmonics. But a closed tube (clarinet) only supports <em>odd</em> harmonics &mdash; which is why it has that distinctive hollow sound. The boundary conditions of the resonant system determine the harmonic content, which determines the timbre. Instrument design is fundamentally an exercise in engineering specific resonant properties.</p>`,

  // 06 — Concert Hall Acoustics
  `<p>Wallace Clement Sabine, a Harvard physics professor, founded architectural acoustics in 1898 by deriving the equation that relates reverberation time to room volume and surface absorption: <code>RT60 = 0.161 &times; V / A</code>, where V is volume in cubic meters and A is total absorption in sabins.<sup class="fn"><a href="https://www.thermaxxjackets.com/news/sabine-modern-architectural/">[6]</a><span class="tip"><a href="https://www.thermaxxjackets.com/news/sabine-modern-architectural/" target="_blank">Sabine&rsquo;s Formula & The Birth of Modern Architectural Acoustics &rarr;</a></span></sup> The optimal reverberation time for orchestral music is 2.0&ndash;2.25 seconds; for speech, approximately 1.0 second.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1898</div><div class="sl">Sabine&rsquo;s Equation</div></div>
    <div class="st"><div class="sv">2.0&ndash;2.25s</div><div class="sl">Orchestra RT60</div></div>
    <div class="st"><div class="sv">~1.0s</div><div class="sl">Speech RT60</div></div>
    <div class="st"><div class="sv">0&ndash;1</div><div class="sl">Absorption Range</div></div>
  </div>
  <p>Famous concert halls illustrate the principles: the Vienna Musikverein (~2.0s RT60) achieves its legendary warmth through a rectangular &ldquo;shoebox&rdquo; design with extensive wood paneling and a relatively small volume for its seating capacity. Boston Symphony Hall (~1.8s), designed with Sabine&rsquo;s direct input, was the first hall built using scientific acoustical principles. Modern computational acoustics extends Sabine&rsquo;s work with ray tracing, finite element analysis, and detailed modeling of sound diffusion. The challenge of dual-function halls &mdash; spaces that must serve both music and speech &mdash; remains an active area of research.<sup class="fn"><a href="https://www.nature.com/articles/s41598-025-96139-8">[7]</a><span class="tip"><a href="https://www.nature.com/articles/s41598-025-96139-8" target="_blank">Optimizing Acoustic Design for Dual-Function Halls (Scientific Reports, 2025) &rarr;</a></span></sup></p>`
];

const details = [
  // 01
  `<div class="detail-header"><div class="num">Section 01</div><h2>What <em>Sound</em> Is</h2></div>
  <h3>The Nature of Sound Waves</h3>
  <p>Sound is mechanical energy &mdash; molecules pushing against their neighbors in a chain reaction that propagates outward from a vibrating source. Unlike electromagnetic waves (light, radio), sound requires a medium: it cannot travel through vacuum. In air at 20&deg;C, sound travels at approximately 343 meters per second.<sup class="fn"><a href="https://josephromano.github.io/PHYS1406/notes/notes.pdf">[1]</a><span class="tip"><a href="https://josephromano.github.io/PHYS1406/notes/notes.pdf" target="_blank">Romano: PHYS 1406 &mdash; Physics of Sound & Music (2022) &rarr;</a></span></sup> In water, it moves at roughly 1,480 m/s; in steel, about 5,960 m/s. The speed depends on the density and elasticity of the medium.</p>
  <p>What we perceive as &ldquo;pitch&rdquo; is the brain&rsquo;s interpretation of frequency &mdash; the number of complete pressure cycles per second, measured in Hertz (Hz). Human hearing spans roughly 20 Hz to 20,000 Hz, though the upper limit decreases with age. The relationship between frequency and pitch is approximately logarithmic: doubling the frequency raises the perceived pitch by one <a href="s2-harmony.dd.html">octave</a>, regardless of the starting frequency. This logarithmic perception is fundamental to music &mdash; it&rsquo;s why we hear equal <em>ratios</em> as equal intervals.</p>
  <h3>Amplitude and the Decibel Scale</h3>
  <p>Amplitude &mdash; the strength of the pressure variation &mdash; determines loudness. But the relationship is not linear. The ear responds to an enormous range of intensities: the ratio between the faintest audible sound and the threshold of pain is approximately 1:1,000,000,000,000 (10<sup>12</sup>). To compress this range into manageable numbers, we use the decibel scale, which is logarithmic: every 10 dB increase represents a tenfold increase in sound intensity. Normal conversation is about 60 dB; a rock concert, 110 dB; the threshold of pain, around 130 dB.</p>
  <h3>Connection to the Larger Project</h3>
  <p>These basic properties of sound &mdash; frequency, amplitude, and waveform &mdash; are the raw material from which everything else in this project is built. The overtone series (next subsection) determines consonance (<a href="s2-harmony.dd.html">S2</a>). The brainstem&rsquo;s automatic response to sudden loud sounds is one of Juslin&rsquo;s BRECVEMA mechanisms (<a href="s4-emotion.dd.html">S4</a>). The speed of sound determines concert hall behavior. And the mathematical relationship between frequency and perception (logarithmic) is the reason why simple integer <em>ratios</em> &mdash; not simple integer <em>differences</em> &mdash; define musical intervals.</p>
  <div class="callout"><h4>Key Insight</h4><p>The ear is a logarithmic instrument. We perceive equal ratios as equal intervals, not equal differences. This is not arbitrary &mdash; it reflects the structure of the overtone series, where each harmonic is a fixed multiple of the fundamental. The mathematics of music is multiplicative, not additive.</p></div>`,

  // 02
  `<div class="detail-header"><div class="num">Section 02</div><h2>The <em>Overtone</em> Series</h2></div>
  <h3>How Strings Really Vibrate</h3>
  <p>A vibrating string is not a simple pendulum. While its most visible motion is the fundamental mode &mdash; the entire string swinging back and forth &mdash; it simultaneously vibrates in every integer subdivision. Each mode has its own frequency: the second harmonic at exactly twice the fundamental, the third at three times, and so on. These are not separate sounds but a single composite vibration that the ear and brain decompose into pitch and timbre.</p>
  <p>The <a href="http://hyperphysics.phy-astr.gsu.edu/hbase/Audio/fourier.html" target="_blank">harmonic series</a> is not arbitrary. It arises from the physics of wave reflection: when a wave reaches a fixed boundary (the end of a string, the wall of a tube), it reflects back. Only wavelengths that &ldquo;fit&rdquo; between the boundaries &mdash; producing constructive interference &mdash; survive as standing waves. For a string of length L, these are wavelengths of 2L, L, 2L/3, L/2, 2L/5... corresponding to frequencies f, 2f, 3f, 4f, 5f...<sup class="fn"><a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)" target="_blank">Wikipedia: Harmonic Series (Music) &rarr;</a></span></sup></p>
  <h3>Musical Intervals in the Overtone Series</h3>
  <p>The first few harmonics map directly to the most consonant musical intervals. The 2nd harmonic (2f) is the octave. The 3rd (3f) is the octave plus a perfect fifth. The 4th (4f) is two octaves. The 5th (5f) is two octaves plus a major third. The 6th (6f) is two octaves plus a perfect fifth. These relationships are not cultural conventions &mdash; they are consequences of physics. Any vibrating system with fixed boundaries will produce the same series.</p>
  <p>This is the deep connection between physics and harmony. When Pythagoras discovered that the most consonant intervals correspond to simple frequency ratios, he was (unknowingly) discovering the overtone series. The ratio 2:1 (octave) is the most consonant because the second harmonic of the lower note <em>is</em> the upper note. The ratio 3:2 (fifth) is nearly as consonant because the third harmonic of the lower note nearly coincides with the second harmonic of the upper note.</p>
  <div class="callout"><h4>Key Insight</h4><p>The overtone series is the physical foundation of consonance, tuning systems, and timbre. It is the single most important concept connecting the physics of sound to the perception of music. Everything in <a href="s2-harmony.dd.html">S2 (Harmony)</a> follows from it.</p></div>`,

  // 03
  `<div class="detail-header"><div class="num">Section 03</div><h2><em>Timbre</em>: The Color of Sound</h2></div>
  <h3>What Makes Each Instrument Unique</h3>
  <p>Timbre is determined by the relative amplitudes of the harmonics in the overtone series, plus the time-varying <em>envelope</em> of the sound (how it starts, sustains, and decays). A pure sine wave &mdash; a single frequency with no harmonics &mdash; has a thin, electronic quality. Add harmonics and the sound becomes richer, warmer, more &ldquo;musical.&rdquo; The specific recipe of harmonics is what the ear uses to identify the source.</p>
  <p>The reason different instruments have different harmonic profiles comes down to their physics. A <a href="https://www.researchgate.net/publication/386131153" target="_blank">clarinet</a> is effectively a closed cylindrical tube, which supports only odd-numbered harmonics.<sup class="fn"><a href="https://www.vedantu.com/physics/overtones">[3]</a><span class="tip"><a href="https://www.vedantu.com/physics/overtones" target="_blank">Vedantu: Overtones in Physics &rarr;</a></span></sup> This gives it a hollow quality distinctly different from a flute (open tube, all harmonics). A violin bow excites the string at a contact point that is typically about 1/7 to 1/10 of the string length from the bridge, which suppresses harmonics near those fractions and enhances others. The body of the instrument acts as a resonant filter, amplifying some frequencies and damping others.</p>
  <h3>The Attack Transient</h3>
  <p>Experiments have shown that when the first few milliseconds of a recorded instrument note are removed and replaced with silence, listeners have great difficulty identifying the instrument. The attack transient &mdash; the initial burst of energy as the string is plucked, the reed begins vibrating, or the hammer strikes &mdash; carries as much timbral information as the sustained portion of the note. This is one reason why synthesizers struggle to sound &ldquo;real&rdquo;: accurately modeling the attack is harder than modeling the steady state.</p>
  <h3>Inharmonicity and Real-World Deviations</h3>
  <p>Not all instruments produce perfectly harmonic overtones. Piano strings are stiff, which causes their upper partials to be slightly <em>sharp</em> compared to the ideal harmonic series &mdash; a phenomenon called inharmonicity. This is why piano tuners &ldquo;stretch&rdquo; the octaves slightly: the upper registers are tuned slightly sharp and the lower registers slightly flat, so that the inharmonic overtones of each note align with the fundamentals of related notes. Bells and metallic percussion instruments have strongly inharmonic spectra, which is why they don&rsquo;t produce a clear sense of pitch.</p>`,

  // 04
  `<div class="detail-header"><div class="num">Section 04</div><h2><em>Fourier</em> Analysis</h2></div>
  <h3>The Mathematical Foundation</h3>
  <p>Joseph Fourier&rsquo;s 1807 insight was deceptively simple: any periodic function can be represented as a sum of sine and cosine waves of different frequencies, amplitudes, and phases. For non-periodic signals (which all real-world sounds are), the discrete sum becomes an integral &mdash; the Fourier Transform. The inverse operation (Fourier Synthesis) reconstructs the original signal from its spectral components. Together, these operations allow us to move freely between the time domain (waveform) and the frequency domain (spectrum).</p>
  <p>The <a href="https://scholarworks.umt.edu/cgi/viewcontent.cgi?article=1389&context=tme" target="_blank">historical connection</a> between Fourier analysis and music predates Fourier himself. Euler and Bernoulli studied vibrating strings in the 18th century<sup class="fn"><a href="https://scholarworks.umt.edu/cgi/viewcontent.cgi?article=1389&amp;context=tme">[8]</a><span class="tip"><a href="https://scholarworks.umt.edu/cgi/viewcontent.cgi?article=1389&amp;context=tme" target="_blank">Historical Connection of Fourier Analysis to Music (U. Montana) &rarr;</a></span></sup> and debated whether an arbitrary vibration could be represented as a sum of sinusoidal modes. Fourier&rsquo;s contribution was to prove this rigorously (for a certain class of functions) and to provide the computational framework.</p>
  <h3>The FFT Revolution</h3>
  <p>The Fourier Transform requires O(n&sup2;) operations for n data points &mdash; prohibitively expensive for real-time audio processing. The Fast Fourier Transform (FFT), published by Cooley and Tukey in 1965, reduced this to O(n log n), making real-time spectral analysis practical. The spectrogram &mdash; a visual representation of frequency content over time &mdash; became the standard tool for visualizing sound.</p>
  <h3>Applications in Modern Audio</h3>
  <p>Fourier analysis underpins virtually every audio technology in use today. MP3 and AAC compression use the Modified Discrete Cosine Transform (a Fourier variant) to identify and discard inaudible spectral components. Noise-canceling headphones use spectral analysis to identify and invert ambient noise. Autotune detects the fundamental frequency of a voice in real time using autocorrelation (a Fourier-domain technique) and shifts it to the nearest semitone. The connection to <a href="s7-future.dd.html">S7 (Future of Music)</a> is direct: AI music generators process audio in spectral representations derived from Fourier analysis.</p>
  <div class="callout"><h4>Key Insight</h4><p>Fourier analysis is the single mathematical concept that connects the physics of vibrating strings to the digital audio ecosystem of 2026. Without it, there would be no digital recording, no MP3, no streaming, no AI music generation. It is the mathematical bridge from physics to technology.</p></div>`,

  // 05
  `<div class="detail-header"><div class="num">Section 05</div><h2><em>Standing</em> Waves & Resonance</h2></div>
  <h3>How Standing Waves Form</h3>
  <p>When a wave traveling along a string reaches a fixed boundary, it reflects back. If the reflected wave interferes constructively with the incoming wave, a standing wave forms &mdash; a pattern that appears to oscillate in place rather than travel. The points of zero displacement (nodes) and maximum displacement (antinodes) remain fixed. Only specific wavelengths produce standing waves for a given string length and boundary conditions, which is why instruments produce discrete pitches rather than a continuous spectrum.</p>
  <p>For a string fixed at both ends (guitar, violin, piano), the boundary condition requires nodes at both ends. This permits wavelengths of 2L/n for any positive integer n, corresponding to the harmonic series: f, 2f, 3f, 4f... For a tube open at both ends (flute), antinodes form at the open ends, producing the same full harmonic series. For a tube closed at one end (clarinet), a node forms at the closed end and an antinode at the open end, permitting only odd-numbered harmonics: f, 3f, 5f, 7f...</p>
  <h3>Resonance and Instrument Design</h3>
  <p>Resonance occurs when a driving frequency matches a natural frequency of a system, causing the amplitude to increase dramatically. Musical instruments are carefully designed resonant systems. The body of a violin, the air column of a flute, the sound board of a piano &mdash; all serve as resonators that amplify the vibrations of the primary oscillator (string, reed, lip buzz) and shape the resulting timbre by selectively reinforcing certain harmonics.</p>
  <p>Instrument design is an exercise in manipulating resonance. A guitar&rsquo;s body has specific resonant frequencies that amplify certain overtones. The shape of a trumpet&rsquo;s bell determines how energy is radiated at different frequencies. The material, shape, and size of every component contribute to the instrument&rsquo;s characteristic sound through their resonant properties.</p>`,

  // 06
  `<div class="detail-header"><div class="num">Section 06</div><h2><em>Concert</em> Hall Acoustics</h2></div>
  <h3>Sabine and the Birth of a Field</h3>
  <p>In 1895, Harvard president Charles Eliot asked physics professor Wallace Clement Sabine to fix the acoustics of the university&rsquo;s new Fogg lecture hall, where speech was unintelligible due to excessive reverberation. Sabine spent years measuring sound decay in rooms using an organ pipe and a chronograph, discovering that reverberation time depends on room volume and the total sound-absorbing capacity of the surfaces. His equation &mdash; RT60 = 0.161 &times; V / A &mdash; remains the foundation of architectural acoustics.<sup class="fn"><a href="https://www.thermaxxjackets.com/news/sabine-modern-architectural/">[6]</a><span class="tip"><a href="https://www.thermaxxjackets.com/news/sabine-modern-architectural/" target="_blank">Sabine&rsquo;s Formula & The Birth of Modern Architectural Acoustics &rarr;</a></span></sup></p>
  <h3>What Makes a Great Concert Hall</h3>
  <p>The optimal reverberation time for orchestral music is approximately 2.0&ndash;2.25 seconds. This provides enough lingering sound to blend successive notes into a rich, warm acoustic without blurring rapid passages into mush. For speech, the optimal RT60 is much shorter &mdash; around 1.0 second &mdash; because speech intelligibility requires clear separation between successive syllables.</p>
  <p>But reverberation time alone does not determine acoustic quality. Other factors include: early reflections (sound arriving within the first 50-80 milliseconds, which enhance clarity and &ldquo;spaciousness&rdquo;), lateral reflections (sound arriving from the sides, which increase the sense of envelopment), diffusion (scattering of sound to avoid echoes and flutter), and background noise level. The <a href="https://www.nature.com/articles/s41598-025-96139-8" target="_blank">modern computational approach</a> models all these factors using ray tracing and finite element analysis.<sup class="fn"><a href="https://www.nature.com/articles/s41598-025-96139-8">[7]</a><span class="tip"><a href="https://www.nature.com/articles/s41598-025-96139-8" target="_blank">Optimizing Acoustic Design for Dual-Function Halls (Scientific Reports, 2025) &rarr;</a></span></sup></p>
  <h3>Design Approaches</h3>
  <p>The &ldquo;shoebox&rdquo; design (rectangular hall with high ceilings) remains the most acoustically successful format. The Vienna Musikverein, Amsterdam Concertgebouw, and Boston Symphony Hall all use this shape. The rectangular geometry provides strong lateral reflections and even sound distribution. More adventurous designs &mdash; vineyard terracing (Berlin Philharmonie), surround seating (Walt Disney Concert Hall) &mdash; offer aesthetic and social advantages but require more sophisticated acoustic engineering to achieve comparable sound quality.</p>
  <div class="callout"><h4>Key Insight</h4><p>Concert hall acoustics demonstrates that music is not just about what the performer plays &mdash; it is about how the room transforms that sound before it reaches the listener. The room is, in a very real sense, the last instrument in the ensemble.</p></div>`
];
