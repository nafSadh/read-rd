<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Earworms', title: '<em>Earworms</em> & Involuntary Imagery' },
  { num: '02', short: 'Alzheimer\'s', title: 'Music & <em>Alzheimer\'s</em>' },
  { num: '03', short: 'Bump', title: 'The <em>Reminiscence</em> Bump' },
  { num: '04', short: 'Mnemonics', title: 'Musical <em>Mnemonics</em>' },
  { num: '05', short: 'Proust', title: 'The <em>Proust</em> Effect' },
  { num: '06', short: 'Recall', title: 'Voluntary vs. <em>Involuntary</em> Recall' }
];

const summaries = [
  // 01 — Earworms
  `<p>More than 90% of people experience earworms &mdash; involuntary musical imagery (INMI) &mdash; regularly.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/">[1]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/" target="_blank">Liikkanen & Jakubowski: Involuntary Musical Imagery as Ordinary Music Cognition (Psychonomic Bulletin & Review, 2020) &rarr;</a></span></sup> The auditory cortex activates during INMI just as it does during real listening &mdash; the brain literally cannot tell the difference between imagined and actual sound. A typical earworm is a 15&ndash;30 second melodic fragment that loops indefinitely.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">90%+</div><div class="sl">Prevalence</div></div>
    <div class="st"><div class="sv">15&ndash;30s</div><div class="sl">Typical Fragment</div></div>
    <div class="st"><div class="sv">Auditory Ctx</div><div class="sl">Brain Region</div></div>
    <div class="st"><div class="sv">Higher</div><div class="sl">In Musicians</div></div>
  </div>
  <p>Earworms are more common in musicians and people with high musical engagement, and their frequency correlates with cortical thickness in auditory and prefrontal regions.<sup class="fn"><a href="https://www.sciencedirect.com/science/article/pii/S1053810015000975">[2]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S1053810015000975" target="_blank">Tunes Stuck in Your Brain: INMI Frequency &amp; Cortical Structure (ScienceDirect, 2015) &rarr;</a></span></sup> They tend to be simple, repetitive melodies with distinctive intervals &mdash; which is why pop hooks are disproportionately represented.</p>`,

  // 02 — Alzheimer's
  `<p>Patients with Alzheimer&rsquo;s disease who cannot recognize family members can often sing songs learned decades ago. Musical memory uses different encoding pathways than declarative memory: procedural memory (motor sequences), which is preserved longer in neurodegeneration, and emotional memory through amygdala connections that survive even when hippocampal pathways fail.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/24794920/">[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/24794920/" target="_blank">Sarkamo et al.: Music, Emotion, and Cognition After Brain Damage (Cortex, 2014) &rarr;</a></span></sup></p>
  <div class="feat-grid">
    <div class="feat"><h4>Procedural Memory</h4><p>Motor sequences for singing are &ldquo;how to&rdquo; knowledge, stored in circuits that resist Alzheimer&rsquo;s longer than declarative memory.</p></div>
    <div class="feat"><h4>SMA Preservation</h4><p>The supplementary motor area, involved in both rhythm processing and singing, is relatively spared in early/mid Alzheimer&rsquo;s.</p></div>
    <div class="feat"><h4>Emotional Pathway</h4><p>Amygdala connections to musical memory persist even when hippocampal (declarative) memory fails.</p></div>
    <div class="feat"><h4>Therapeutic Value</h4><p>Music therapy reduces agitation, improves mood, and can unlock moments of lucidity in dementia patients.</p></div>
  </div>

  `<div class="detail-header"><div class="num">Section 01</div><h2><em>Earworms</em> & Involuntary Imagery</h2></div>
  <h3>What Earworms Are</h3>
  <p>Involuntary Musical Imagery (INMI) &mdash; the scientific term for earworms &mdash; refers to the spontaneous, unbidden experience of a melody playing in one&rsquo;s mind. Unlike deliberate musical imagery (choosing to imagine a song), INMI arises without intention and can persist for minutes to hours.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/">[1]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/" target="_blank">Liikkanen & Jakubowski: Involuntary Musical Imagery (Psychonomic Bulletin & Review, 2020) &rarr;</a></span></sup> Surveys consistently find that over 90% of the population experiences INMI at least once a week.</p>
  <h3>Neural Basis</h3>
  <p>The auditory cortex shows activation patterns during INMI that are nearly indistinguishable from those during actual listening. The brain is, in a very real sense, hallucinating music. Individual differences in earworm frequency correlate with cortical thickness in auditory and prefrontal regions,<sup class="fn"><a href="https://www.sciencedirect.com/science/article/pii/S1053810015000975">[2]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S1053810015000975" target="_blank">INMI Frequency Correlates with Cortical Structure (ScienceDirect, 2015) &rarr;</a></span></sup> suggesting a structural basis for individual variation.</p>
  <h3>Triggers and Characteristics</h3>
  <p>Common triggers include recent exposure to a song, environmental cues (hearing a word from a lyric), emotional associations, and states of low cognitive load (walking, showering). Earworms tend to feature simple, repetitive melodies with distinctive intervals &mdash; precisely the characteristics of effective pop hooks. This is not coincidental: the features that make a melody memorable are the same features that make it prone to involuntary recall.</p>
  <div class="callout"><h4>Key Insight</h4><p>Earworms reveal that musical memory is not a passive archive but an active system that can spontaneously generate auditory experiences indistinguishable (to the brain) from real sound. The phonological loop maintains the imagery independently of conscious intent.</p></div>`,

  `<div class="detail-header"><div class="num">Section 02</div><h2>Music & <em>Alzheimer&rsquo;s</em></h2></div>
  <h3>Preserved Musical Memory</h3>
  <p>The preservation of musical memory in Alzheimer&rsquo;s disease is one of the most striking phenomena in clinical neuroscience. Patients who have lost virtually all declarative memory &mdash; unable to recognize spouses, children, or their own faces &mdash; can sing complete songs learned decades earlier, with correct melody, rhythm, and often correct lyrics.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/24794920/">[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/24794920/" target="_blank">Sarkamo et al.: Music, Emotion, and Cognition After Brain Damage (Cortex, 2014) &rarr;</a></span></sup></p>
  <h3>Why Music Survives</h3>
  <p>Musical memory is encoded through multiple pathways that are differentially affected by neurodegeneration. Procedural memory (the &ldquo;how to&rdquo; of singing) uses basal ganglia and cerebellar circuits that are relatively spared in Alzheimer&rsquo;s. The supplementary motor area (SMA), which is critical for both rhythm processing (<a href="s3-rhythm.dd.html">S3</a>) and singing, is also preserved longer than hippocampal structures. Emotional memory pathways through the amygdala provide another route that survives when declarative memory fails.</p>
  <h3>Therapeutic Applications</h3>
  <p>Music therapy for dementia patients exploits these preserved pathways. Familiar music can reduce agitation, improve mood, decrease behavioral disturbances, and occasionally unlock moments of startling lucidity. The therapeutic mechanism is not simply &ldquo;distraction&rdquo; but genuine activation of preserved memory and emotional circuits. Singing, in particular, bypasses damaged speech production areas because singing and speaking use partially distinct neural pathways.</p>
  <div class="callout"><h4>Key Insight</h4><p>Musical memory&rsquo;s resilience in Alzheimer&rsquo;s is not a curiosity but a window into how the brain encodes music differently from other information. The redundancy of encoding &mdash; procedural, emotional, motor &mdash; makes musical memory one of the last cognitive capacities to be lost.</p></div>`,

  <h3>The Phenomenon</h3>
  <p>When adults of any age are asked to recall autobiographical memories, a disproportionate number cluster around ages 15&ndash;25. This &ldquo;reminiscence bump&rdquo; is one of the most robust findings in memory research. For music, the effect is even more pronounced: songs first encountered during this period produce stronger emotional responses, more vivid memories, and higher recognition rates throughout life.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/10546197/">[4]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/10546197/" target="_blank">Schulkind et al.: The Reminiscence Bump in Musical Memory (Memory & Cognition, 1999) &rarr;</a></span></sup></p>

  <p>Multiple mechanisms converge during this period. The adolescent brain exhibits heightened neuroplasticity, enabling stronger and more durable memory encoding. Pubertal hormones (particularly those associated with emotional arousal) enhance the consolidation of emotional memories. Identity formation is at its peak &mdash; music becomes part of &ldquo;who I am&rdquo; rather than merely &ldquo;what I listen to.&rdquo; And many musical experiences during this period are genuinely novel (first encounters with genres, first concerts, first romantic associations with music), and novelty enhances encoding.</p>

  `<div class="detail-header"><div class="num">Section 04</div><h2>Musical <em>Mnemonics</em></h2></div>
  <h3>The Retrieval Scaffold</h3>
  <p>Wallace (1994) demonstrated that melody provides a retrieval scaffold for verbal information: text set to a familiar tune was recalled more accurately than the same text spoken.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/8151279/">[5]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/8151279/" target="_blank">Wallace: Memory for Music &mdash; Effect of Melody on Recall of Text (J. Exp. Psychology, 1994) &rarr;</a></span></sup> The effect is not trivial &mdash; melody provides three distinct types of retrieval cue simultaneously: rhythmic structure (temporal patterning), pitch contour (melodic shape), and emotional encoding (affective association).</p>
  <h3>The Constraint Mechanism</h3>
  <p>The most powerful aspect of melodic mnemonics is temporal constraint. In free recall, each item could be followed by any other item &mdash; the search space is enormous. In sung recall, each note in the melody constrains what syllable or word can come next (through both rhythmic fit and melodic contour). This transforms free recall into cued recall, dramatically reducing the cognitive effort required. The alphabet song works not because the melody is inherently memorable but because it provides 26 sequential cues, each narrowing the search space for the next letter.</p>

  <p>The clinical evidence is consistent. MS patients showed improved word memory for sung versus spoken material. Stroke patients with aphasia improved verbal narrative recall when information was presented as song. Alzheimer&rsquo;s patients showed enhanced recognition of sung lyrics compared to spoken lyrics &mdash; suggesting that the melodic retrieval scaffold can partly compensate for degraded declarative memory pathways.</p>
  <div class="callout"><h4>Key Insight</h4><p>Musical mnemonics work not because melody makes information more &ldquo;fun&rdquo; but because melody provides temporal structure that constrains the retrieval process. Every known human culture uses song for knowledge transmission &mdash; a universal practice explained by the universal properties of melodic memory scaffolding.</p></div>`,

  `<div class="detail-header"><div class="num">Section 05</div><h2>The <em>Proust</em> Effect</h2></div>
  <h3>Music as Involuntary Memory Trigger</h3>
  <p>Marcel Proust described how a taste of a madeleine dipped in tea could unlock a flood of childhood memories. Music can serve as an even more potent trigger for involuntary autobiographical memory. A few bars of a song heard years ago can produce vivid, emotionally rich memories complete with visual imagery, sensory details, and the emotional state of the original experience.</p>
  <h3>Multi-System Activation</h3>
  <p>The potency of musical memory triggers arises from the simultaneous activation of multiple memory systems. The melody activates auditory cortex. The emotional tone activates amygdala. If the song was associated with movement (dancing, walking), motor memory circuits in basal ganglia and SMA are engaged. The autobiographical context activates hippocampus and medial prefrontal cortex. This convergent activation produces what feels less like recollection and more like re-experiencing.</p>
  <h3>Why Music Is Special</h3>
  <p>Music may be an unusually effective memory trigger because of its temporal extent. A visual cue (a photograph) is experienced instantaneously. A musical cue unfolds over time, allowing progressive reactivation of associated memories as the melody develops. The temporal structure of music matches the temporal structure of episodic memory, creating a more complete and immersive retrieval experience.</p>
  <div class="callout"><h4>Key Insight</h4><p>The Proust effect for music is not nostalgia in the casual sense. It is a specific neurological phenomenon: the simultaneous reactivation of multiple memory systems by a temporally extended auditory stimulus, producing an experience of re-living rather than merely remembering.</p></div>`,

  <h3>Two Modes of Musical Memory</h3>
  <p>Musical memory operates in two distinct modes. Voluntary recall is deliberate: you choose to remember a song and effortfully reconstruct it. Involuntary recall is spontaneous: a melody appears in consciousness without intention, triggered by environmental cues, emotional states, or internal associations. Research shows that these modes differ not only in phenomenology but in their neural substrates and the accuracy of the resulting memory.<sup class="fn"><a href="https://link.springer.com/article/10.3758/s13421-018-0792-x">[6]</a><span class="tip"><a href="https://link.springer.com/article/10.3758/s13421-018-0792-x" target="_blank">Involuntary and Voluntary Recall of Musical Memories (Memory & Cognition, 2018) &rarr;</a></span></sup></p>

  <p>The phonological loop is a component of working memory specialized for maintaining and rehearsing auditory information. It plays a central role in involuntary musical imagery: once a melodic fragment enters the loop, it can cycle autonomously, generating continuous auditory cortex activation without conscious effort.<sup class="fn"><a href="https://scholarblogs.emory.edu/artsbrain/2025/04/25/earworms-the-soundtrack-of-a-wandering-mind/">[7]</a><span class="tip"><a href="https://scholarblogs.emory.edu/artsbrain/2025/04/25/earworms-the-soundtrack-of-a-wandering-mind/" target="_blank">Emory Arts on the Brain: Earworms &mdash; The Soundtrack of a Wandering Mind (2025) &rarr;</a></span></sup> This autonomy explains both the persistence of earworms and the feeling that they are happening &ldquo;to you&rdquo; rather than being generated by you.</p>
  <h3>Accuracy Differences</h3>
  <p>Involuntary musical memories tend to be more temporally accurate than voluntary ones &mdash; the tempo, rhythm, and timing of the original are better preserved. This suggests that involuntary recall accesses a more veridical representation of the original experience, bypassing the reconstructive processes that introduce distortion in voluntary recall.</p>
