  { num: '02', short: 'BRECVEMA', title: 'The <em>BRECVEMA</em> Framework' },

const summaries = [
  // 01 — Musical Chills & Dopamine
  `<p>Salimpoor et al. (2011) used PET and fMRI to demonstrate that dopamine is released during peak emotional responses to music &mdash; the &ldquo;chills&rdquo; that run down the spine during a powerful passage.<sup class="fn"><a href="https://www.nature.com/articles/nn.2726">[1]</a><span class="tip"><a href="https://www.nature.com/articles/nn.2726" target="_blank">Salimpoor et al.: Dopamine Release During Peak Emotion to Music (Nature Neuroscience, 2011) &rarr;</a></span></sup> The study revealed a functional dissociation: the <em>caudate</em> nucleus is active during anticipation of the peak moment, while the <em>nucleus accumbens</em> fires during the experience itself.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">Caudate</div><div class="sl">Anticipation</div></div>
    <div class="st"><div class="sv">N. Accumbens</div><div class="sl">Peak Pleasure</div></div>
    <div class="st"><div class="sv">Dopamine</div><div class="sl">Neurotransmitter</div></div>
    <div class="st"><div class="sv">Primary</div><div class="sl">Reward Type</div></div>
  </div>
  <p>The same reward circuitry activated by food, sex, and psychoactive drugs responds to music. This means the brain treats music as a <em>primary reward</em> &mdash; not merely a pleasant stimulus but something the dopamine system values as fundamentally as biological necessities. The physiological markers of chills include changes in skin conductance, heart rate, and peripheral temperature.</p>`,

  // 02 — BRECVEMA Framework
  `<p>Juslin&rsquo;s BRECVEMA framework identifies eight distinct mechanisms through which music induces emotion, from fast subcortical reflexes to slow cognitive evaluations.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/23769678/">[2]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/23769678/" target="_blank">Juslin: From Everyday Emotions to Aesthetic Emotions (Physics of Life Reviews, 2013) &rarr;</a></span></sup> The key insight: &ldquo;emotion in music&rdquo; is not a single phenomenon but at least eight different processes operating on different timescales.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Brainstem Reflex</h4><p>Automatic response to acoustic features: loud, sudden, dissonant. Fast, subcortical, no learning required.</p></div>
    <div class="feat"><h4>Rhythmic Entrainment</h4><p>Neural oscillations sync with rhythm, modulating arousal and affect. Links to <a href="s3-rhythm.dd.html">S3</a>.</p></div>
    <div class="feat"><h4>Evaluative Conditioning</h4><p>Music paired with experiences creates conditioned emotional responses. The &ldquo;our song&rdquo; effect.</p></div>
    <div class="feat"><h4>Emotional Contagion</h4><p>Music mimics vocal expression; listener &ldquo;catches&rdquo; the emotion. Slow tempo + minor key signals sadness.</p></div>
    <div class="feat"><h4>Visual Imagery</h4><p>Music evokes mental images that carry emotional content. Individual and culturally variable.</p></div>
    <div class="feat"><h4>Episodic Memory</h4><p>Music triggers autobiographical memories with attached emotions. Links to <a href="s5-memory.dd.html">S5</a>.</p></div>
    <div class="feat"><h4>Musical Expectancy</h4><p>Violated, confirmed, or delayed expectations create surprise, satisfaction, tension.</p></div>
    <div class="feat"><h4>Aesthetic Judgment</h4><p>Reflective evaluation of music as art: appreciation, awe, being moved. Most cognitively complex.</p></div>
  </div>
  <p>Different mechanisms involve different brain regions, require different amounts of musical knowledge, and operate on different timescales &mdash; from the milliseconds of a brainstem reflex to the minutes of an aesthetic judgment.</p>`,

  // 03 — Expectancy & Surprise
  `<p>Musical pleasure is fundamentally a prediction game. Cheung et al. (2019) demonstrated that the interaction of <em>uncertainty</em> and <em>surprise</em> predicts pleasure: when a passage is harmonically uncertain and then resolves in a surprising way, the pleasure response is maximized.<sup class="fn"><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588">[3]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588" target="_blank">Cheung et al.: Uncertainty and Surprise Predict Musical Pleasure and Amygdala Activity (Current Biology, 2019) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">Amygdala</div><div class="sl">Uncertainty &times; Surprise</div></div>
    <div class="st"><div class="sv">Hippocampus</div><div class="sl">Expectation Dynamics</div></div>
    <div class="st"><div class="sv">N. Accumbens</div><div class="sl">Uncertainty Alone</div></div>
    <div class="st"><div class="sv">Maximum</div><div class="sl">High Unc. + High Surp.</div></div>
  </div>
  <p>The amygdala and hippocampus reflect the interaction between uncertainty and surprise, while the nucleus accumbens reflects uncertainty alone. Low uncertainty combined with low surprise produces comfortable but less pleasurable listening (predictable passages). The brain enjoys being uncertain and then surprised &mdash; and the most effective composers are masters of this dynamic.</p>`,

  // 04 — Why Sad Music Feels Good
  `<p>The sad music paradox: why do people voluntarily listen to music that makes them feel sad, and why does this experience feel <em>pleasurable</em>? Huron (2011) proposed an elegant explanation: sad music triggers prolactin release, a hormone associated with consolation and comfort, creating a pleasant feeling of being soothed without actual loss.<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171">[4]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171" target="_blank">Huron: Why Is Sad Music Pleasurable? A Possible Role for Prolactin (Musicae Scientiae, 2011) &rarr;</a></span></sup></p>
  <div class="verdict">
    <div class="v-col pro"><h4>Alternative Explanations</h4><ul>
      <li>Aesthetic distance: we know the sadness is not real</li>
      <li>Mixed emotions: sadness + beauty appreciation simultaneously</li>
      <li>Catharsis: emotional release through vicarious experience</li>
    </ul></div>
    <div class="v-col con"><h4>The Failed Test</h4><ul>
      <li>Ladinig et al. (2021) measured prolactin during sad music</li>
      <li>No significant prolactin increase was found</li>
      <li>The prolactin hypothesis is not supported by evidence</li>
    </ul></div>
  </div>
  <p>Ladinig et al. (2021) directly tested the prolactin hypothesis and found no significant increase in prolactin levels during sad music listening.<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1029864919890900">[5]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1029864919890900" target="_blank">Ladinig et al.: Enjoying Sad Music &mdash; A Test of the Prolactin Theory (Musicae Scientiae, 2021) &rarr;</a></span></sup> The mechanism by which sad music produces pleasure remains genuinely unknown as of 2025. This is one of the most interesting open questions in the field.</p>`,

  // 05 — The Minor Key Question
  `<p>In Western music, the minor key is conventionally associated with sadness and the major key with happiness. This association is so strong that even young children reliably categorize major-key music as &ldquo;happy&rdquo; and minor-key music as &ldquo;sad.&rdquo; The amygdala shows differential activation for minor versus major chords in Western listeners. But the question is: is this association <em>universal</em> or <em>cultural</em>?</p>
  <p>Evidence strongly suggests it is cultural. Indian classical music does not use the major/minor distinction; ragas are associated with specific emotions (rasas) through entirely different melodic and ornamental features. The connection to <a href="s6-cultures.dd.html">S6 (Cultures)</a> is direct: emotional associations in music are culturally encoded, not hardwired. This challenges neuroscience studies that use Western tonal music as stimuli and generalize findings to &ldquo;universal&rdquo; brain responses.</p>`,

  // 06 — Causal Evidence
  `<p>Correlation is not causation. PET and fMRI studies showed that dopamine is <em>associated with</em> musical pleasure, but could not prove that dopamine <em>causes</em> the pleasure. Ferreri et al. (2019) provided the first causal evidence through pharmacological manipulation.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116">[6]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116" target="_blank">Ferreri et al.: Dopamine Modulates Music Reward (PNAS, 2019) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">Levodopa</div><div class="sl">Enhanced Pleasure</div></div>
    <div class="st"><div class="sv">Risperidone</div><div class="sl">Reduced Pleasure</div></div>
    <div class="st"><div class="sv">Placebo</div><div class="sl">Baseline</div></div>
    <div class="st"><div class="sv">Causal</div><div class="sl">Evidence Level</div></div>
  </div>
  <p>Participants received levodopa (a dopamine precursor), risperidone (a dopamine blocker), or placebo before listening to music. Levodopa <em>enhanced</em> musical pleasure and increased the frequency of chills, while risperidone <em>reduced</em> both. This was the first direct causal demonstration that dopamine drives musical pleasure &mdash; moving the field from correlation to mechanism.</p>`
];

const details = [
  // 01
  `<div class="detail-header"><div class="num">Section 01</div><h2>Musical <em>Chills</em> & Dopamine</h2></div>
  <h3>The Salimpoor Study</h3>
  <p>The 2011 study by Salimpoor et al. in Nature Neuroscience was a landmark in the neuroscience of music.<sup class="fn"><a href="https://www.nature.com/articles/nn.2726">[1]</a><span class="tip"><a href="https://www.nature.com/articles/nn.2726" target="_blank">Salimpoor et al.: Dopamine Release During Peak Emotion to Music (Nature Neuroscience, 2011) &rarr;</a></span></sup> Participants selected music that reliably gave them chills. Using PET scanning with a radioactive dopamine ligand, the researchers tracked dopamine release in real time as participants listened. The key finding: dopamine was released not only during the chill itself but also during the anticipation of the chill &mdash; and these two phases involved different brain regions.</p>
  <p>The caudate nucleus, part of the dorsal striatum, was active during anticipation &mdash; the moment of building tension before the peak. The nucleus accumbens, part of the ventral striatum, was active during the peak experience itself. This dissociation mirrors the distinction between &ldquo;wanting&rdquo; (anticipatory pleasure) and &ldquo;liking&rdquo; (consummatory pleasure) that has been extensively studied in other reward domains.</p>
  <h3>Music as Primary Reward</h3>
  <p>A notable implication is that the brain treats music as a primary reward &mdash; engaging the same dopaminergic circuitry that responds to food, water, sex, and psychoactive drugs. This is surprising because music has no obvious survival value: a sonata cannot be consumed as food nor does a symphony confer reproductive advantage. Yet the reward system responds to music with the same neurochemical intensity as it does to biological necessities.</p>
  <div class="callout"><h4>Key Insight</h4><p>Musical pleasure is not a vague subjective state but a specific neurochemical event: dopamine release in the striatum, with anticipation and experience engaging different subregions. The brain is literally rewarding itself for listening to music it enjoys.</p></div>`,

  // 02
  `<div class="detail-header"><div class="num">Section 02</div><h2>The <em>BRECVEMA</em> Framework</h2></div>
  <h3>Eight Mechanisms, Not One</h3>
  <p>Juslin&rsquo;s central argument is that researchers have treated &ldquo;emotional response to music&rdquo; as a single phenomenon, when in fact it encompasses at least eight distinct psychological mechanisms.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/18826699/">[7]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/18826699/" target="_blank">Juslin & V&auml;stfj&auml;ll: Emotional Responses to Music &mdash; The Need to Consider Underlying Mechanisms (BBS, 2008) &rarr;</a></span></sup> The original 2008 model proposed six mechanisms; the 2013 revision expanded this to eight (BRECVEMA), adding Rhythmic Entrainment and Aesthetic Judgment.</p>
  <h3>From Fast to Slow</h3>
  <p>The eight mechanisms operate on a continuum from fast, automatic, and subcortical to slow, deliberate, and cortical. A brainstem reflex (response to a sudden loud chord) takes milliseconds and requires no musical knowledge. Aesthetic judgment (evaluating a piece as &ldquo;sublime&rdquo;) takes minutes and draws on extensive musical experience. Most real-world listening experiences involve multiple mechanisms simultaneously &mdash; which is why emotional responses to music are so complex and variable.</p>
  <h3>Implications for Research</h3>
  <p>The BRECVEMA framework explains many apparent contradictions in the literature. Studies that find &ldquo;universal&rdquo; emotional responses to music may be measuring brainstem reflexes (fast, automatic, culturally invariant). Studies that find highly individual responses may be measuring episodic memory or evaluative conditioning (slow, learned, personally specific). Both findings are correct &mdash; they are simply measuring different mechanisms.<sup class="fn"><a href="https://theses.gla.ac.uk/84234/">[8]</a><span class="tip"><a href="https://theses.gla.ac.uk/84234/" target="_blank">Jan: The BRECVEMA Model and Theories of Embodied Cognition (PhD Thesis, Glasgow, 2024) &rarr;</a></span></sup></p>
  <div class="callout"><h4>Key Insight</h4><p>BRECVEMA is the Rosetta Stone of musical emotion research. By distinguishing eight mechanisms, it resolves the apparent contradiction between studies that find universal and culturally specific emotional responses &mdash; they are measuring different things.</p></div>`,

  // 03
  `<div class="detail-header"><div class="num">Section 03</div><h2><em>Expectancy</em> & Surprise</h2></div>
  <h3>The Prediction Game</h3>
  <p>Cheung et al. (2019) used a computational model to quantify the uncertainty and surprise at each chord in a corpus of pop songs, then correlated these measures with real-time pleasure ratings from listeners.<sup class="fn"><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588">[3]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588" target="_blank">Cheung et al.: Uncertainty and Surprise Predict Musical Pleasure (Current Biology, 2019) &rarr;</a></span></sup> The key finding was an interaction effect: neither uncertainty nor surprise alone predicted pleasure. What mattered was their combination.</p>
  <p>High uncertainty followed by high surprise &mdash; an unexpected resolution after a period of harmonic suspense &mdash; produced the maximum pleasure response. Low uncertainty followed by low surprise &mdash; a predictable passage in a predictable context &mdash; was comfortable but not particularly pleasurable. This explains why the most emotionally powerful moments in music tend to follow periods of tension or ambiguity.</p>
  <h3>Neural Substrates</h3>
  <p>fMRI revealed that the amygdala and hippocampus tracked the interaction of uncertainty and surprise, while the nucleus accumbens tracked uncertainty alone. The amygdala&rsquo;s involvement is notable: this structure is typically associated with threat detection and fear learning, but here it is responding to harmonic predictions about chord progressions. Music engages the brain&rsquo;s prediction machinery for aesthetic pleasure.</p>
  <div class="callout"><h4>Key Insight</h4><p>Musical pleasure is not about hearing what the listener expects or hearing what the listener does not expect. It is about the dynamic relationship between the two: the brain enjoys being uncertain and then surprised. This is the harmonic equivalent of the rhythmic groove mechanism explored in <a href="s3-rhythm.dd.html">S3</a>.</p></div>`,

  // 04
  `<div class="detail-header"><div class="num">Section 04</div><h2>Why <em>Sad</em> Music Feels Good</h2></div>
  <h3>The Prolactin Hypothesis</h3>
  <p>Huron (2011) proposed that sad music triggers the release of prolactin, a hormone associated with consolation, nurturing, and social bonding.<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171">[4]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171" target="_blank">Huron: Why Is Sad Music Pleasurable? A Role for Prolactin (Musicae Scientiae, 2011) &rarr;</a></span></sup> The idea was elegant: when we hear sad music, the brain detects sadness cues (slow tempo, minor key, descending contour) and initiates a consolation response as if a real loss had occurred. But because there is no actual loss, we experience the comforting effects of prolactin without the negative context &mdash; a kind of evolutionary mismatch.</p>
  <h3>The Failed Test</h3>
  <p>Ladinig et al. (2021) directly measured blood prolactin levels before, during, and after participants listened to sad music.<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1029864919890900">[5]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1029864919890900" target="_blank">Ladinig et al.: Enjoying Sad Music &mdash; A Test of the Prolactin Theory (Musicae Scientiae, 2021) &rarr;</a></span></sup> The result was clear: no significant prolactin increase was observed. Participants did report emotional responses (sadness, being moved, pleasure), but these were not accompanied by the hormonal signature the theory predicted. The prolactin hypothesis, as stated, is not supported.</p>
  <h3>What We Do Not Know</h3>
  <p>The current state of the field is that no consensus exists on why sad music feels good. The leading alternative explanations &mdash; aesthetic distance, mixed emotions, catharsis &mdash; each capture part of the phenomenon but none provides a complete mechanism. This is one of the genuinely unresolved questions in the neuroscience of music.</p>
  <div class="callout"><h4>Key Insight</h4><p>The prolactin hypothesis is a textbook example of how science works: an elegant theory was proposed, a clear prediction was derived, the prediction was tested, and the theory was not supported. The question remains open &mdash; and more interesting for being unresolved.</p></div>`,

  // 05
  `<div class="detail-header"><div class="num">Section 05</div><h2>The <em>Minor</em> Key Question</h2></div>
  <h3>The Western Convention</h3>
  <p>The association between minor keys and sadness is deeply embedded in Western musical culture. Film composers exploit it routinely; advertisers avoid minor keys for upbeat products; music therapists use key as an emotional tool. The amygdala shows differential activation for minor versus major chords in Western listeners, suggesting that the association has a genuine neural signature &mdash; at least in people raised on Western tonal music.</p>
  <h3>Is It Universal?</h3>
  <p>The evidence strongly suggests that the minor-key/sadness association is culturally specific, not biologically hardwired. Indian classical music uses ragas to convey emotion, but the raga system does not map onto the major/minor distinction. A raga in what Western theory would call a &ldquo;minor&rdquo; scale may convey devotion, longing, or dawn &mdash; not necessarily sadness. Arabic maqam similarly assigns emotional qualities through modal characteristics that do not correspond to Western key associations.</p>
  <h3>The WEIRD Problem</h3>
  <p>Most neuroscience studies of musical emotion use Western tonal music as stimuli and Western participants as subjects. Findings about &ldquo;universal&rdquo; emotional responses may reflect the cultural homogeneity of the sample rather than genuine universals. The question &ldquo;would Indian classical music listeners show the same amygdala response to Western minor keys?&rdquo; has not been adequately tested. The connection to <a href="s6-cultures.dd.html">S6 (Cultures)</a> is direct: emotional associations in music are culturally encoded.</p>
  <div class="callout"><h4>Key Insight</h4><p>The minor-key/sadness link is not a fact about physics or neuroscience; it is a fact about Western musical culture. The brain does not inherently hear minor keys as sad &mdash; it learns to, through exposure to a musical tradition that encodes that association.</p></div>`,

  // 06
  `<div class="detail-header"><div class="num">Section 06</div><h2><em>Causal</em> Evidence for Dopamine</h2></div>
  <h3>From Correlation to Causation</h3>
  <p>The Salimpoor (2011) study established a correlation between dopamine release and musical pleasure. But correlation does not establish causation: perhaps dopamine was released <em>because</em> the participants were enjoying the music, rather than being the <em>cause</em> of the enjoyment. Ferreri et al. (2019) resolved this question through pharmacological manipulation.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116">[6]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116" target="_blank">Ferreri et al.: Dopamine Modulates Music Reward (PNAS, 2019) &rarr;</a></span></sup></p>
  <h3>The Experiment</h3>
  <p>In a double-blind, placebo-controlled design, participants attended three sessions. In each session, they received one of three treatments: levodopa (a dopamine precursor that increases available dopamine), risperidone (a dopamine receptor blocker that reduces dopamine signaling), or a placebo. They then listened to their favorite music and rated their emotional responses.</p>
  <p>The results were unambiguous. Levodopa enhanced musical pleasure: participants reported stronger emotional responses and experienced more frequent chills. Risperidone reduced musical pleasure: the same music that normally produced strong emotional responses felt flat and unengaging. The placebo condition fell in between.</p>
  <h3>What This Means</h3>
  <p>The Ferreri study established that dopamine does not merely accompany musical pleasure &mdash; it actively drives it. Increasing dopamine makes music more enjoyable; decreasing it makes the same music less enjoyable. This is causal evidence, not merely correlational, and it places music firmly alongside food, social bonding, and other primary rewards in the brain&rsquo;s dopaminergic value system.</p>
  <div class="callout"><h4>Key Insight</h4><p>Dopamine is not just a correlate of musical pleasure but a causal driver. The Ferreri study is one of the most important experiments in the neuroscience of music because it moved the field from &ldquo;dopamine is associated with musical pleasure&rdquo; to &ldquo;dopamine causes musical pleasure.&rdquo;</p></div>`
