<script>
const sections = [
  { num: '01', short: 'Origins', title: '<em>Algorithmic</em> Composition Origins' },
  { num: '02', short: 'AI Platforms', title: 'Modern <em>AI</em> Music Platforms' },
  { num: '03', short: 'Homogenization', title: '<em>Algorithmic</em> Homogenization' },
  { num: '04', short: 'BCMI', title: '<em>Brain-Computer</em> Music Interfaces' },
  { num: '05', short: 'Paradox', title: 'The Democratization <em>Paradox</em>' },
  { num: '06', short: 'First Domain', title: 'Music as <em>First</em> AI-Disrupted Art' }
];

const summaries = [
  // 01 — Algorithmic Composition Origins
  `<p>Computer-generated music began in 1957 with the Illiac Suite, composed by Lejaren Hiller and Leonard Isaacson at the University of Illinois using the ILLIAC I computer.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Illiac_Suite">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Illiac_Suite" target="_blank">Wikipedia: Illiac Suite &mdash; First Computer-Composed Score (1957) &rarr;</a></span></sup> The four movements tested different generative procedures: cantus firmus generation, rule-based counterpoint, rhythmic dynamics, and Markov chains. This was not AI in the modern sense but rule-based systems and stochastic processes.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">1957</div><div class="tl-text">Illiac Suite: first computer-composed score (Hiller & Isaacson)</div></div>
    <div class="tl-item"><div class="tl-date">1960s</div><div class="tl-text">Xenakis: stochastic music using probability theory</div></div>
    <div class="tl-item"><div class="tl-date">1980s&ndash;90s</div><div class="tl-text">David Cope&rsquo;s EMI: recombination of existing musical patterns</div></div>
    <div class="tl-item"><div class="tl-date">2016</div><div class="tl-text">Google Magenta: deep learning applied to music generation</div></div>
    <div class="tl-item"><div class="tl-date">2019&ndash;20</div><div class="tl-text">OpenAI MuseNet/Jukebox: transformer-based full music generation</div></div>
    <div class="tl-item"><div class="tl-date">2023&ndash;25</div><div class="tl-text">Suno, Udio: text-to-music generation; AI-creator record deals</div></div>
  </div>
  <p>The trajectory from the Illiac Suite to Suno spans nearly 70 years and represents a shift from rule-based pattern generation to neural networks that learn musical structure from millions of examples. The <a href="s1-physics.dd.html">Fourier analysis</a> that underpins all digital audio processing is the mathematical bridge connecting these two eras.</p>`,

  // 02 — Modern AI Music Platforms
  `<p>The AI music market was valued at $642.8 million in 2024 and is projected to reach $3 billion by 2030, a compound annual growth rate of 29.5%.<sup class="fn"><a href="https://www.businesswire.com/news/home/20250327511227">[2]</a><span class="tip"><a href="https://www.businesswire.com/news/home/20250327511227" target="_blank">Generative AI in Music Strategic Business Report 2025 (ResearchAndMarkets) &rarr;</a></span></sup></p>
  <div class="feat-grid">

const details = [
  // 01
  `<div class="detail-header"><div class="num">Section 01</div><h2><em>Algorithmic</em> Composition Origins</h2></div>
  <h3>The Illiac Suite (1957)</h3>
  <p>The Illiac Suite holds a unique place in music history as the first composition generated by a computer.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Illiac_Suite">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Illiac_Suite" target="_blank">Wikipedia: Illiac Suite (1957) &rarr;</a></span></sup> Lejaren Hiller, a chemist turned composer, and Leonard Isaacson used the ILLIAC I at the University of Illinois to generate a string quartet in four movements. Each movement tested a different compositional algorithm: the first used Palestrina-style counterpoint rules as constraints; the second loosened these constraints progressively; the third explored rhythmic and dynamic variation; the fourth employed Markov chains for pitch selection.</p>
  <h3>The Philosophical Trajectory</h3>
  <p>The trajectory from the Illiac Suite to modern AI music reveals a fundamental shift in approach. Early algorithmic composition was <em>rule-based</em>: humans encoded musical knowledge as explicit rules, and the computer applied them. Modern AI music is <em>learned</em>: neural networks extract patterns from millions of training examples without explicit rule encoding. The difference matters because learned systems can capture implicit patterns that no human could articulate as rules &mdash; but they also reproduce the biases of their training data.</p>
  <p>Iannis Xenakis (1960s) applied probability theory and stochastic processes to composition. David Cope&rsquo;s EMI (1980s&ndash;90s) used pattern recombination to generate music in the style of specific composers. Google Magenta (2016) applied deep learning. Each step increased the complexity of patterns the system could capture while decreasing the transparency of how it operated.</p>
  <div class="callout"><h4>Key Insight</h4><p>The history of algorithmic composition is a history of increasing opacity. We went from systems whose rules we wrote (and understood) to systems whose patterns are learned (and opaque). The music gets better; our understanding of how it is made gets worse.</p></div>`,

  // 02
  `<div class="detail-header"><div class="num">Section 02</div><h2>Modern <em>AI</em> Music Platforms</h2></div>
  <h3>The Current Landscape</h3>
  <p>Suno, founded by former Meta researchers, has rapidly become the dominant text-to-music platform with approximately 25 million users.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Suno_(platform)">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Suno_(platform)" target="_blank">Wikipedia: Suno (Platform) &rarr;</a></span></sup> The platform generates full songs &mdash; vocals, instrumentation, arrangement &mdash; from text prompts. The milestone statistic: 82% of listeners in blind tests could not distinguish Suno-generated tracks from human compositions. In July 2025, the first AI-creator record deal was signed, followed by a $3 million deal later that year.</p>
  <h3>Market Scale</h3>
  <p>The AI music market reached $642.8 million in 2024 and is projected to grow to $3 billion by 2030.<sup class="fn"><a href="https://www.businesswire.com/news/home/20250327511227">[2]</a><span class="tip"><a href="https://www.businesswire.com/news/home/20250327511227" target="_blank">AI Music Market Report (ResearchAndMarkets, 2025) &rarr;</a></span></sup> Major players include AIVA (250+ style templates, tiered pricing with full copyright at the Pro level), Mubert (algorithmic combination of human-created samples, API-first business model), and Udio (founded by former Google DeepMind researchers, backed by a16z).</p>
  <h3>The Indistinguishability Threshold</h3>
  <p>The 82% indistinguishability rate is the most consequential data point. It means that for most listeners, AI-generated music is functionally equivalent to human-composed music. This threshold was reached in music before it was reached in visual art, writing, or video &mdash; making music the first creative domain to face the full implications of AI capability.</p>
  <div class="callout"><h4>Key Insight</h4><p>The AI music industry has crossed the indistinguishability threshold: most listeners cannot tell AI from human music. The question is no longer whether AI can create convincing music but what this means for human musicians, cultural diversity, and the nature of musical creativity.</p></div>`,

  // 03
  `<div class="detail-header"><div class="num">Section 03</div><h2><em>Algorithmic</em> Homogenization</h2></div>
  <h3>The Spotify Effect</h3>
  <p>Spotify&rsquo;s acquisition of the Echo Nest in 2014 brought sophisticated audio analysis and recommendation to the world&rsquo;s largest streaming platform.<sup class="fn"><a href="https://digital.hec.ca/en/blog/how-spotifys-algorithm-shapes-global-music-discovery-and-cultural-diversity/">[4]</a><span class="tip"><a href="https://digital.hec.ca/en/blog/how-spotifys-algorithm-shapes-global-music-discovery-and-cultural-diversity/" target="_blank">HEC Digital: Spotify Algorithm &amp; Cultural Diversity &rarr;</a></span></sup> The algorithm uses collaborative filtering (users who liked X also liked Y) combined with deep learning analysis of audio features. The result is a powerful recommendation engine that excels at matching listeners with music they are likely to enjoy &mdash; but that also creates filter bubbles that narrow exposure to unfamiliar styles.</p>
  <h3>Measurable Convergence</h3>
  <p>Between 2018 and 2023, measurable homogenization occurred in the most-streamed music. Acoustic diversity scores dropped 17%. Median tempo converged. Dynamic range compressed by 3.2 dB (part of the broader &ldquo;loudness war&rdquo;). Artists began explicitly producing &ldquo;Spotify-friendly&rdquo; music: shorter introductions, earlier hooks, more repetitive structures, optimized for playlist placement rather than album listening.</p>
  <h3>The Equal Temperament Parallel</h3>
  <p>The parallel to <a href="s2-harmony.dd.html">equal temperament</a> is instructive. Equal temperament solved the Pythagorean comma by making every key equally impure &mdash; enabling free modulation at the cost of key color. Algorithmic recommendation solves the discovery problem by making every song equally accessible &mdash; enabling unlimited listening at the cost of stylistic diversity. Both are standardization solutions that trade richness for convenience.</p>
  <div class="callout"><h4>Key Insight</h4><p>Algorithmic homogenization is not a conspiracy but an emergent property of optimization. When algorithms optimize for engagement, and engagement correlates with familiarity, the inevitable result is convergence toward the familiar. The same dynamic that made equal temperament dominant is making algorithmic pop dominant.</p></div>`,

  // 04
  `<div class="detail-header"><div class="num">Section 04</div><h2><em>Brain-Computer</em> Music Interfaces</h2></div>
  <h3>Current Technology</h3>
  <p>Brain-computer music interfaces translate neural signals into musical parameters in real time.<sup class="fn"><a href="https://link.springer.com/book/10.1007/978-1-4471-6584-2">[5]</a><span class="tip"><a href="https://link.springer.com/book/10.1007/978-1-4471-6584-2" target="_blank">Brain-Computer Music Interfaces (Springer/IEEE) &rarr;</a></span></sup> BrainiBeats uses dual EEG to measure inter-brain synchrony between two users, translating their shared neural patterns into collaborative music. Neurophone maps emotional states detected via EEG to musical parameters, allowing listeners to influence music through their emotional responses.</p>
  <h3>Limitations</h3>
  <p>Current BCMI technology faces substantial limitations. EEG has poor spatial resolution (centimeters, not millimeters), is highly susceptible to motion artifacts (muscle movement overwhelms neural signals), and has limited bandwidth (only a few bits per second of reliable information). The music that current BCMIs produce is more accurately described as &ldquo;neurally modulated&rdquo; than &ldquo;neurally composed.&rdquo;</p>
  <h3>Future Potential</h3>
  <p>As BCI technology improves through companies like Neuralink and Synchron (both of which received FDA breakthrough designations in 2025), the bandwidth and resolution limitations may be overcome. A high-bandwidth neural interface could theoretically translate musical imagination directly into sound, bypassing the years of motor training required to play traditional instruments. This raises philosophical questions about what it means to &ldquo;play&rdquo; music when the instrument is your neural activity rather than your fingers.</p>
  <div class="callout"><h4>Key Insight</h4><p>BCMI is currently more promising than practical. But the trajectory of BCI technology suggests that direct brain-to-music interfaces may become feasible. If realized, they would challenge existing definitions of musicianship, composition, and performance.</p></div>`,

  // 05
  `<div class="detail-header"><div class="num">Section 05</div><h2>The Democratization <em>Paradox</em></h2></div>
  <h3>More Creators, Less Diversity</h3>
  <p>AI music tools have dramatically lowered the barrier to music creation. Anyone with a text prompt can generate a complete song. This is genuinely democratizing: people who could never have composed or performed can now create music. But the outputs of these tools cluster around Western pop conventions &mdash; 4/4 time, verse-chorus structure, pentatonic and diatonic melodies &mdash; because the training data is dominated by Western popular music.<sup class="fn"><a href="https://arxiv.org/abs/2509.11824">[6]</a><span class="tip"><a href="https://arxiv.org/abs/2509.11824" target="_blank">Data-Driven Analysis of AI-Generated Music (ArXiv, 2025) &rarr;</a></span></sup></p>
  <h3>The Economic Squeeze</h3>
  <p>The economic paradox is equally stark. More music is being created than ever before, but it is harder than ever to earn a living as a musician. Spotify pays approximately $0.003&ndash;0.005 per stream. AI-generated content is flooding platforms, increasing competition for listener attention. Labels have begun signing AI creators at lower costs than human artists, further compressing the economics of human musicianship.</p>
  <h3>Cultural Implications</h3>
  <p>The cultural paradox connects directly to <a href="s6-cultures.dd.html">S6 (Cultures)</a>. AI models trained on Western-dominated datasets reproduce Western-dominated musical styles. The raga system, maqam tradition, and gamelan tuning documented in S6 are not represented in training data and therefore not reproduced in AI output. Democratization of music creation may paradoxically <em>reduce</em> global musical diversity by flooding the world with AI-generated Western pop.</p>
  <div class="callout"><h4>Key Insight</h4><p>The democratization paradox is the defining tension of AI music: the same technology that gives everyone the power to create music is simultaneously narrowing what that music sounds like. More voices, less variety.</p></div>`,

  // 06
  `<div class="detail-header"><div class="num">Section 06</div><h2>Music as <em>First</em> AI-Disrupted Art</h2></div>
  <h3>The Leading Indicator</h3>
  <p>Music reached the AI indistinguishability threshold before visual art (Midjourney/DALL-E, 2022), writing (ChatGPT, 2022&ndash;23), and video (Sora/Runway, 2024&ndash;25). This makes music a leading indicator for how AI will transform other creative industries. The patterns emerging in music &mdash; economic displacement, copyright disputes, authenticity debates, homogenization &mdash; will likely recur in each domain as AI capability reaches the relevant threshold.</p>
  <h3>Why Music Was First</h3>
  <p>Several factors may explain why music was the first creative domain disrupted. Music is highly structured and rule-governed (scales, chords, form), making it amenable to pattern learning. Digital audio is a well-defined mathematical domain (thanks to <a href="s1-physics.dd.html">Fourier analysis</a>). And listeners are less discriminating about musical quality than they are about, say, photorealistic images or coherent text &mdash; a slightly off chord progression is more tolerable than a slightly off human face.</p>
  <h3>The Nostalgia Connection</h3>
  <p>The synthwave/retrowave genre explicitly recreates 1980s electronic sounds. More broadly, each generation&rsquo;s &ldquo;new&rdquo; music often reconstructs sounds from 20&ndash;30 years earlier &mdash; a pattern connected to the <a href="s5-memory.dd.html">reminiscence bump</a> from S5. AI music generation could accelerate this cycle by making it trivially easy to recreate past styles, potentially deepening nostalgia&rsquo;s hold on musical culture.</p>
  <div class="callout"><h4>Key Insight</h4><p>Music&rsquo;s position as the first AI-disrupted creative domain makes it a test case for questions that will define the creative economy: can AI outputs constitute art? Who owns AI-generated works? And what happens to human creators when their work is economically displaced by cheaper, faster, and indistinguishable machine output?</p></div>`
