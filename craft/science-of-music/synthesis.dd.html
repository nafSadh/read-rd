<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Thread', title: 'The Central <em>Thread</em>' },
  { num: '02', short: 'Consonance', title: 'The <em>Consonance</em> Puzzle' },
  { num: '03', short: 'Reward', title: 'Music as <em>Primary</em> Reward' },
  { num: '04', short: 'Memory', title: 'The <em>Resilience</em> of Musical Memory' },
  { num: '05', short: 'Universals', title: '<em>Universal</em> Mechanism, Cultural Content' },
  { num: '06', short: 'Homogenization', title: 'The <em>Homogenization</em> Parallel' },
  { num: '07', short: 'Open', title: '<em>Unresolved</em> Questions' }
];

const summaries = [
  // 01 — The Central Thread
  `<p>Music is the point where physics meets neuroscience meets culture. A vibrating string produces overtones governed by integer ratios.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Harmonic_series_(music)" target="_blank">Wikipedia: Harmonic Series (Music) &rarr;</a></span></sup> Those ratios create patterns the auditory cortex can predict. Prediction generates expectation. Violated expectation triggers dopamine.<sup class="fn"><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588">[2]</a><span class="tip"><a href="https://www.sciencedirect.com/science/article/pii/S0960982219312588" target="_blank">Cheung et al.: Uncertainty and Surprise Predict Musical Pleasure (Current Biology, 2019) &rarr;</a></span></sup> Dopamine creates pleasure.<sup class="fn"><a href="https://www.nature.com/articles/nn.2726">[3]</a><span class="tip"><a href="https://www.nature.com/articles/nn.2726" target="_blank">Salimpoor et al.: Dopamine Release During Peak Emotion to Music (Nature Neuroscience, 2011) &rarr;</a></span></sup> And yet &mdash; which patterns count as &ldquo;predictable&rdquo; depends enormously on what music you grew up hearing.</p>
  <p>This tension &mdash; between the universal physics of sound and the culturally specific experience of music &mdash; runs through every section of this project. The <a href="s1-physics.dd.html">overtone series</a> is universal; <a href="s2-harmony.dd.html">tuning systems</a> are cultural. <a href="s3-rhythm.dd.html">Neural entrainment</a> is universal; what grooves is cultural. The <a href="s4-emotion.dd.html">dopamine reward system</a> is universal; the minor-key/sadness association is cultural. The brain provides the mechanism; culture provides the content.</p>`,

  // 02 — The Consonance Puzzle
  `<p>The consonance puzzle is solved at the physical level but not at the perceptual level. Simple frequency ratios reduce beating within the critical bandwidth &mdash; Helmholtz&rsquo;s explanation, refined by Plomp and Levelt.<sup class="fn"><a href="https://emusicology.org/article/id/4597/">[4]</a><span class="tip"><a href="https://emusicology.org/article/id/4597/" target="_blank">Crystals of Sound: Plomp-Levelt Critical Bandwidth Model (Empirical Musicology Review) &rarr;</a></span></sup> But what counts as &ldquo;pleasant&rdquo; varies dramatically across cultures. Javanese gamelan deliberately creates beating that Western theory would classify as dissonant.<sup class="fn"><a href="https://direct.mit.edu/comj/article/47/2/21/124238">[5]</a><span class="tip"><a href="https://direct.mit.edu/comj/article/47/2/21/124238" target="_blank">Exploring the Many Tunings of Balinese Gamelan (Computer Music Journal, 2024) &rarr;</a></span></sup> Indian classical music uses 22 microtones that do not map to Western semitones.<sup class="fn"><a href="https://globalmusictheory.com/a-comparison-of-different-musical-modes-used-in-different-parts-of-the-world/">[6]</a><span class="tip"><a href="https://globalmusictheory.com/a-comparison-of-different-musical-modes-used-in-different-parts-of-the-world/" target="_blank">Global Music Theory: Comparison of Musical Modes Worldwide &rarr;</a></span></sup></p>
  <p>The thread from the overtone series through the Pythagorean comma<sup class="fn"><a href="https://johncarlosbaez.wordpress.com/2023/10/07/pythagorean-tuning/">[7]</a><span class="tip"><a href="https://johncarlosbaez.wordpress.com/2023/10/07/pythagorean-tuning/" target="_blank">Baez: Pythagorean Tuning (2023) &rarr;</a></span></sup> through equal temperament through gamelan&rsquo;s rejection of the octave traces a path from universal physics to cultural choice. Every tuning system is a different answer to the same mathematical impossibility &mdash; and none is more &ldquo;correct&rdquo; than the others.</p>`,

  // 03 — Music as Primary Reward
  `<p>The dopamine system treats music as a primary reward. Salimpoor et al. (2011) showed that the same neurotransmitter system activated by food and sex responds to music, with the caudate active during anticipation and the nucleus accumbens during peak experience.<sup class="fn"><a href="https://www.nature.com/articles/nn.2726">[3]</a><span class="tip"><a href="https://www.nature.com/articles/nn.2726" target="_blank">Salimpoor et al.: Dopamine Release During Peak Emotion to Music (Nature Neuroscience, 2011) &rarr;</a></span></sup> Ferreri et al. (2019) provided causal evidence: levodopa enhanced musical pleasure while risperidone reduced it.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116">[8]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.1811878116" target="_blank">Ferreri et al.: Dopamine Modulates Music Reward (PNAS, 2019) &rarr;</a></span></sup></p>
  <p>Juslin&rsquo;s BRECVEMA framework<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/23769678/">[9]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/23769678/" target="_blank">Juslin: From Everyday Emotions to Aesthetic Emotions (Physics of Life Reviews, 2013) &rarr;</a></span></sup> reveals that &ldquo;emotion in music&rdquo; is not one phenomenon but eight: from fast subcortical brainstem reflexes to slow cognitive aesthetic judgments. This resolves the apparent contradiction between studies finding universal emotional responses (measuring fast, automatic mechanisms) and those finding highly personal responses (measuring slow, learned mechanisms).</p>`,

  // 04 — The Resilience of Musical Memory
  `<p>Musical memory is uniquely resilient. Alzheimer&rsquo;s patients who lose all declarative memory can sing songs from decades ago<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/24794920/">[10]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/24794920/" target="_blank">Sarkamo et al.: Music, Emotion, and Cognition After Brain Damage (Cortex, 2014) &rarr;</a></span></sup> because musical memory uses different encoding pathways: procedural (motor sequences), emotional (amygdala connections), and the supplementary motor area, which is relatively spared in neurodegeneration.</p>
  <p>The reminiscence bump<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/10546197/">[11]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/10546197/" target="_blank">Schulkind et al.: The Reminiscence Bump in Musical Memory (Memory & Cognition, 1999) &rarr;</a></span></sup> connects emotion to memory: music from ages 15&ndash;25 is most powerful because that period combines heightened neuroplasticity, intense emotional responses (more dopamine), and active identity formation. Earworms<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/">[12]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7704448/" target="_blank">Liikkanen & Jakubowski: Involuntary Musical Imagery (Psychonomic Bulletin & Review, 2020) &rarr;</a></span></sup> reveal that musical memory is not a passive archive but an active system capable of generating auditory experiences indistinguishable from real sound. Musical mnemonics<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/8151279/">[13]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/8151279/" target="_blank">Wallace: Effect of Melody on Recall of Text (J. Exp. Psychology, 1994) &rarr;</a></span></sup> work because melody provides temporal structure that constrains retrieval &mdash; a mechanism exploited by every human culture for knowledge transmission.</p>`,

  // 05 — Universal Mechanism, Cultural Content
  `<p>The Natural History of Song project<sup class="fn"><a href="https://www.parsingscience.org/2018/02/20/mehr-and-singh/">[14]</a><span class="tip"><a href="https://www.parsingscience.org/2018/02/20/mehr-and-singh/" target="_blank">Mehr & Singh: Universality in Song (2018) &rarr;</a></span></sup> found that every documented culture has music and that functional song types (lullabies, dance songs) share acoustic features cross-culturally. Infants relax to foreign lullabies they have never heard,<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/33077883/">[15]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/33077883/" target="_blank">Mehr et al.: Infants Relax to Foreign Lullabies (Nature Human Behaviour, 2020) &rarr;</a></span></sup> suggesting biological recognition of certain musical features.</p>
  <p>But the specific musical systems cultures build on this biological foundation are enormously diverse. The evolutionary status of music remains debated: Pinker&rsquo;s &ldquo;auditory cheesecake&rdquo; (byproduct),<sup class="fn"><a href="https://humanitiescenter.byu.edu/is-music-simply-auditory-cheesecake/">[16]</a><span class="tip"><a href="https://humanitiescenter.byu.edu/is-music-simply-auditory-cheesecake/" target="_blank">BYU Humanities Center: Auditory Cheesecake? &rarr;</a></span></sup> Patel&rsquo;s SSIRH (shared neural resources with language),<sup class="fn"><a href="https://global.oup.com/academic/product/music-language-and-the-brain-9780195123753">[17]</a><span class="tip"><a href="https://global.oup.com/academic/product/music-language-and-the-brain-9780195123753" target="_blank">Patel: Music, Language, and the Brain (OUP, 2008) &rarr;</a></span></sup> and Mehr &amp; Krasnow&rsquo;s credible signaling theory<sup class="fn"><a href="https://mehr.nz/pdf/2021_MehrEtAl_BBS-targetArticle.pdf">[18]</a><span class="tip"><a href="https://mehr.nz/pdf/2021_MehrEtAl_BBS-targetArticle.pdf" target="_blank">Mehr & Krasnow: Origins of Music in Credible Signaling (BBS, 2021) &rarr;</a></span></sup> each capture part of the picture. The WEIRD research bias<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/33077883/">[15]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/33077883/" target="_blank">Mehr et al.: Cross-cultural infant studies as corrective to WEIRD bias &rarr;</a></span></sup> means that many claims about &ldquo;universal&rdquo; musical cognition may actually reflect Western-specific processing.</p>`,

  // 06 — The Homogenization Parallel
  `<p>AI music generation is recapitulating the homogenization that equal temperament imposed centuries ago. Equal temperament flattened the expressive differences between keys to enable free modulation. AI generation is flattening the differences between genres and cultural traditions, trained on Western-dominated datasets that reproduce Western-dominated styles.<sup class="fn"><a href="https://arxiv.org/abs/2509.11824">[19]</a><span class="tip"><a href="https://arxiv.org/abs/2509.11824" target="_blank">Data-Driven Analysis of AI-Generated Music (ArXiv, 2025) &rarr;</a></span></sup></p>
  <p>Spotify&rsquo;s algorithm compounds this by rewarding familiarity over novelty: acoustic diversity in top-streamed music dropped 17% between 2018 and 2023.<sup class="fn"><a href="https://digital.hec.ca/en/blog/how-spotifys-algorithm-shapes-global-music-discovery-and-cultural-diversity/">[20]</a><span class="tip"><a href="https://digital.hec.ca/en/blog/how-spotifys-algorithm-shapes-global-music-discovery-and-cultural-diversity/" target="_blank">HEC Digital: Spotify Algorithm &amp; Cultural Diversity &rarr;</a></span></sup> The democratization paradox is stark: AI tools give everyone the power to create music, but the output clusters around a narrow band of Western pop conventions. More voices, less variety. The raga, maqam, and gamelan traditions documented in <a href="s6-cultures.dd.html">S6</a> face a new threat: not suppression but irrelevance in a world flooded with AI-generated Western pop.</p>`,

  // 07 — Unresolved Questions
  `<p>This project surfaces five genuinely unresolved questions at the intersection of physics, neuroscience, and culture:</p>
  <div class="feat-grid">
    <div class="feat"><h4>Why does sad music feel good?</h4><p>Huron&rsquo;s prolactin theory<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171">[21]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1029864911401171" target="_blank">Huron: Why Is Sad Music Pleasurable? (Musicae Scientiae, 2011) &rarr;</a></span></sup> was not supported by Ladinig et al.&rsquo;s empirical test.<sup class="fn"><a href="https://journals.sagepub.com/doi/10.1177/1029864919890900">[22]</a><span class="tip"><a href="https://journals.sagepub.com/doi/10.1177/1029864919890900" target="_blank">Ladinig et al.: A Test of the Prolactin Theory (Musicae Scientiae, 2021) &rarr;</a></span></sup> The mechanism remains unknown.</p></div>
    <div class="feat"><h4>Is pentatonic truly universal?</h4><p>It appears across many cultures, but gamelan and maqam demonstrate that alternatives exist. Widespread or universal? The distinction matters.</p></div>
    <div class="feat"><h4>Can AI music be culturally diverse?</h4><p>Training data bias is structural. Can it be fixed, or does the economics of AI music generation inherently favor the largest corpus (Western pop)?</p></div>
    <div class="feat"><h4>Does the reminiscence bump transfer?</h4><p>Does it operate the same way in non-Western musical cultures? Cross-cultural studies are needed but largely absent.</p></div>
  </div>
  <p>These questions are not merely academic. They define the boundaries of current understanding of why music works the way it does &mdash; and what may be lost if algorithmic homogenization erases the cultural diversity that makes those questions tractable.</p>
  <div class="callout"><h4>The Central Argument</h4><p>Music sits at the intersection of physics, neuroscience, and culture, and the tensions between these domains are where the most interesting questions lie. The overtone series provides the universal foundation; the brain&rsquo;s reward system provides the universal mechanism; and culture provides the infinite variation. Understanding music means understanding all three &mdash; and the places where they conflict.</p></div>`
];
