<script>
const sections = [
  { num: '01', short: 'Pythagoras', title: '<em>Pythagoras</em> & Simple Ratios' },
  { num: '02', short: 'Helmholtz', title: '<em>Helmholtz</em> & Beating Frequencies' },
  { num: '03', short: 'Comma', title: 'The <em>Pythagorean</em> Comma' },
  { num: '04', short: 'Temperament', title: '<em>Tuning</em> Systems Through History' },
  { num: '05', short: 'Bach', title: '<em>Bach</em> & the Well-Tempered Clavier' },
  { num: '06', short: 'Gamelan', title: '<em>Non-Western</em> Tuning Systems' }
];

const summaries = [
  `<p>The legend says Pythagoras heard harmonious sounds from a blacksmith&rsquo;s hammers and realized the weights were in simple integer ratios. The myth is almost certainly fabricated, but the underlying discovery is real and demonstrable: the intervals we hear as most consonant correspond to the simplest mathematical ratios.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Pythagorean_tuning">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Pythagorean_tuning" target="_blank">Wikipedia: Pythagorean Tuning &rarr;</a></span></sup> An octave is 2:1, a perfect fifth is 3:2, a perfect fourth is 4:3. The simpler the ratio, the more the overtone series of the two notes overlap, and the more consonant the interval sounds.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">2:1</div><div class="sl">Octave</div></div>
    <div class="st"><div class="sv">3:2</div><div class="sl">Perfect Fifth</div></div>
    <div class="st"><div class="sv">4:3</div><div class="sl">Perfect Fourth</div></div>
    <div class="st"><div class="sv">5:4</div><div class="sl">Major Third</div></div>
  </div>
  <p>This connection between number and beauty was so striking to Pythagoras that he concluded the entire cosmos must be governed by numerical harmony &mdash; the &ldquo;music of the spheres.&rdquo; While the cosmology was wrong, the acoustics was right. The <a href="s1-physics.dd.html">overtone series</a> explains why: when two notes whose fundamentals are in a simple ratio sound together, their harmonics coincide rather than clash.</p>`,

  `<p>Hermann von Helmholtz (1863) provided the physical mechanism underlying consonance and dissonance. When two tones of slightly different frequency sound together, the listener perceives <em>beats</em> &mdash; periodic fluctuations in amplitude at the difference frequency. When two tones are within each other&rsquo;s &ldquo;critical bandwidth&rdquo; (roughly one-third of an octave), these beats are perceived as roughness &mdash; the defining sensation of dissonance.<sup class="fn"><a href="https://emusicology.org/article/id/4597/">[2]</a><span class="tip"><a href="https://emusicology.org/article/id/4597/" target="_blank">Crystals of Sound: Helmholtz Beating &amp; Plomp-Levelt Model (Empirical Musicology Review) &rarr;</a></span></sup></p>
  <div class="diagram-wrap"><svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
    <text x="250" y="18" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">BEATING FREQUENCIES &amp; CONSONANCE</text>
    <line x1="20" y1="28" x2="480" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <text x="30" y="52" class="lbl-hi" font-size="9">CONSONANT (octave 2:1)</text>
    <path d="M 30,75 Q 55,60 80,75 Q 105,90 130,75 Q 155,60 180,75 Q 205,90 230,75" fill="none" stroke="var(--green)" stroke-width="1.5"/>
    <text x="250" y="72" class="lbl" font-size="8">Harmonics coincide</text>
    <text x="250" y="84" class="lbl" font-size="8">No beating = smooth</text>
    <text x="30" y="110" class="lbl-hi" font-size="9">DISSONANT (semitone ~16:15)</text>
    <path d="M 30,130 Q 40,118 50,130 Q 55,136 60,125 Q 70,112 80,132 Q 85,138 90,122 Q 100,108 110,135 Q 115,142 120,120 Q 130,105 140,136 Q 145,142 150,118 Q 160,102 170,138 Q 175,144 180,116" fill="none" stroke="var(--red)" stroke-width="1.5"/>
    <text x="250" y="125" class="lbl" font-size="8">Harmonics within critical band</text>
    <text x="250" y="137" class="lbl" font-size="8">Rapid beating = roughness</text>
  </svg></div>
  <p>Plomp and Levelt (1965) formalized this into a computational model that predicts perceived consonance from spectral content alone. Their key finding: maximum dissonance occurs when two partials are separated by about 25% of the critical bandwidth. This explains not only why simple ratios sound consonant but also why consonance depends on register (the same interval sounds rougher in the bass than in the treble, because critical bandwidth is wider at low frequencies).</p>`,

  `<p>Here is the deepest mathematical problem in music. Start on any note and stack twelve perfect fifths (each with the ratio 3:2). You should arrive back at the starting note, seven octaves higher. But 3<sup>12</sup> = 531,441 while 2<sup>19</sup> = 524,288. The fifths overshoot seven octaves by a factor of 531,441 / 524,288 &mdash; approximately 23.46 cents, or about a quarter of a semitone. This gap is the <em>Pythagorean comma</em>.<sup class="fn"><a href="https://johncarlosbaez.wordpress.com/2023/10/07/pythagorean-tuning/">[3]</a><span class="tip"><a href="https://johncarlosbaez.wordpress.com/2023/10/07/pythagorean-tuning/" target="_blank">Baez: Pythagorean Tuning &mdash; Group Theory Perspective (2023) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">3&sup1;&sup2;</div><div class="sl">Twelve Fifths</div></div>
    <div class="st"><div class="sv">2&sup1;&sup9;</div><div class="sl">Seven Octaves</div></div>
    <div class="st"><div class="sv">23.46&#162;</div><div class="sl">The Comma</div></div>
    <div class="st"><div class="sv">&frac14; step</div><div class="sl">Audible Gap</div></div>
  </div>
  <p>The consequence is absolute: no tuning system can have both pure fifths and pure octaves. They are mathematically incompatible. Every tuning system in the history of Western music is a different answer to the question: <em>where do you hide the error?</em> Pythagorean tuning puts it all in one interval (the &ldquo;wolf fifth&rdquo;). Meantone spreads it across the fifths to save the thirds. Equal temperament distributes it uniformly across all twelve semitones.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Musical_temperament">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Musical_temperament" target="_blank">Wikipedia: Musical Temperament &rarr;</a></span></sup></p>`,

  `<p>The history of tuning is a history of aesthetic compromise. Each system sacrifices something to gain something else, and the choice reflects not just acoustics but the musical priorities of its era.</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">~500 BCE</div><div class="tl-text">Pythagorean tuning: pure 3:2 fifths, unusable wolf fifth, limited keys</div></div>
    <div class="tl-item"><div class="tl-date">~1500</div><div class="tl-text">Quarter-comma meantone: pure major thirds (5:4), narrowed fifths, dominant for 200 years</div></div>
    <div class="tl-item"><div class="tl-date">~1680</div><div class="tl-text">Well temperament emerges: Werckmeister, Kirnberger &mdash; all keys usable, each with unique color</div></div>
    <div class="tl-item"><div class="tl-date">1722</div><div class="tl-text">Bach&rsquo;s Well-Tempered Clavier demonstrates all 24 keys<sup class="fn"><a href="https://en.wikipedia.org/wiki/The_Well-Tempered_Clavier">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/The_Well-Tempered_Clavier" target="_blank">Wikipedia: The Well-Tempered Clavier &rarr;</a></span></sup> in a well-tempered system</div></div>
    <div class="tl-item"><div class="tl-date">~1850</div><div class="tl-text">Equal temperament (12-TET) becomes standard: all keys identical, none pure, maximum modulatory freedom</div></div>
  </div>
  <p>The shift from meantone to well temperament to equal temperament was driven by compositional demand. As composers explored increasingly remote keys and chromatic modulations, they needed tuning systems that could accommodate more harmonic territory &mdash; even at the cost of individual interval purity.</p>`,

  `<p>The Well-Tempered Clavier (Book I: 1722, Book II: 1742) contains 48 preludes and fugues &mdash; one in every major and minor key. It was a <em>political statement</em> about tuning. By demonstrating that beautiful music could be written in every key, Bach argued for tuning freedom against the meantone establishment that restricted composers to a handful of usable keys.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Not Equal Temperament</h4><p>Modern scholarship suggests Bach used some form of unequal well temperament where each key retained a distinctive character.</p></div>
    <div class="feat"><h4>Each Key Has Color</h4><p>In well temperament, C major sounds different from F-sharp major &mdash; not wrong, just different. This &ldquo;key color&rdquo; was a feature, not a bug.</p></div>
    <div class="feat"><h4>Lehman&rsquo;s Discovery</h4><p>In 2005, Bradley Lehman proposed that the ornamental squiggles on the WTC title page encode Bach&rsquo;s specific temperament.</p></div>
    <div class="feat"><h4>The Political Statement</h4><p>The WTC demonstrated that musical freedom required tuning flexibility &mdash; a radical position in an era of meantone orthodoxy.</p></div>
  </div>
  <p>Crucially, &ldquo;well-tempered&rdquo; does not mean &ldquo;equal-tempered.&rdquo; In equal temperament, all keys sound identical. In well temperament, all keys are <em>usable</em> but each retains a distinctive character. The WTC was designed to showcase these differences, not to eliminate them.</p>`,

  `<p>Western tuning theory assumes the octave (2:1) is sacrosanct and asks how to divide it. But not all cultures share this assumption. Javanese gamelan, Indian classical music, and Arabic maqam each represent fundamentally different relationships between mathematics and musical aesthetics.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Javanese Gamelan</h4><p>Slendro (5 notes, roughly equidistant) and pelog (7 notes, unequal). No pure octave. Each ensemble uniquely tuned. Paired instruments deliberately detuned for shimmering beats.<sup class="fn"><a href="https://direct.mit.edu/comj/article/47/2/21/124238">[6]</a><span class="tip"><a href="https://direct.mit.edu/comj/article/47/2/21/124238" target="_blank">Exploring the Many Tunings of Balinese Gamelan (Computer Music Journal, 2024) &rarr;</a></span></sup></p></div>
    <div class="feat"><h4>Indian Shruti</h4><p>22 microtones per octave &mdash; far more granular than Western 12 semitones. Each raga selects specific shruti. Ornaments (gamaka) exploit microtonal inflection.</p></div>
    <div class="feat"><h4>Arabic Maqam</h4><p>Quarter-tones that don&rsquo;t exist in Western music. Each maqam prescribes melodic development rules, modulation patterns, and emotional character.</p></div>
    <div class="feat"><h4>Chinese Pentatonic</h4><p>Five-note Gong scale, documented for 24+ centuries. Cosmological framework: notes mapped to elements, planets, colors, directions.</p></div>
  </div>
  <p>The lesson is profound: consonance and dissonance are not just physics. The <a href="s1-physics.dd.html">overtone series</a> provides a universal acoustic basis, but what a culture <em>does</em> with that basis varies enormously. Gamelan&rsquo;s deliberate beating, Indian music&rsquo;s microtonal inflections, and Arabic quarter-tones are not &ldquo;impure&rdquo; versions of Western tonality &mdash; they are <em>different systems</em> built on the same physical foundations.</p>`
];

const details = [
  `<div class="detail-header"><div class="num">Section 01</div><h2><em>Pythagoras</em> & Simple Ratios</h2></div>
  <h3>The Blacksmith&rsquo;s Hammer</h3>
  <p>According to Iamblichus (c. 300 CE), Pythagoras passed a blacksmith&rsquo;s shop and noticed that certain pairs of hammers produced harmonious sounds when struck simultaneously. He investigated and found the weights were in simple ratios: 2:1, 3:2, 4:3. The story is almost certainly apocryphal &mdash; hammer weight does not straightforwardly determine pitch &mdash; but the underlying discovery is real and can be demonstrated on a monochord (a single-string instrument with a movable bridge).</p>
  <p>Halving the string length doubles the frequency: the octave (2:1). Taking two-thirds of the length produces the fifth (3:2). Three-quarters gives the fourth (4:3).<sup class="fn"><a href="https://vocal.media/fyi/the-pythagorean-musical-scale-the-math-behind-its-importance-and-imperfection">[7]</a><span class="tip"><a href="https://vocal.media/fyi/the-pythagorean-musical-scale-the-math-behind-its-importance-and-imperfection" target="_blank">The Pythagorean Musical Scale: Math Behind Its Importance (Vocal Media) &rarr;</a></span></sup> These three intervals &mdash; octave, fifth, fourth &mdash; were recognized as the &ldquo;perfect consonances&rdquo; across cultures for millennia, and their mathematical simplicity is the reason. When two frequencies are in a simple ratio, their <a href="s1-physics.dd.html">overtone series</a> overlap extensively: shared harmonics reinforce each other rather than clashing.</p>
  <h3>Why Simple Ratios Sound Good</h3>
  <p>Consider two notes an octave apart (2:1). Every harmonic of the upper note is also a harmonic of the lower note (the 1st harmonic of the upper = the 2nd of the lower; the 2nd = the 4th; etc.). There is maximum overlap and zero conflict. For a perfect fifth (3:2), the overlap is still extensive: the 2nd harmonic of the upper note coincides with the 3rd of the lower. For a minor second (about 16:15), very few harmonics align, and many fall within each other&rsquo;s critical bandwidth, producing the roughness we call dissonance.</p>
  <div class="callout"><h4>Key Insight</h4><p>Consonance has a physical basis in the overtone series, but the degree to which a culture values consonance over other qualities (timbral complexity, microtonal nuance, deliberate beating) is a cultural choice, not a physical necessity.</p></div>`,

  `<div class="detail-header"><div class="num">Section 02</div><h2><em>Helmholtz</em> & Beating Frequencies</h2></div>
  <h3>On the Sensations of Tone (1863)</h3>
  <p>Hermann von Helmholtz&rsquo;s masterwork provided the first rigorous physical account of consonance and dissonance. His key insight: when two tones of slightly different frequency are sounded together, the listener perceives amplitude fluctuations (beats) at the difference frequency. If two tones are at 440 Hz and 442 Hz, you hear 2 beats per second. As the frequency difference increases, the beats become too rapid to perceive individually and are experienced instead as &ldquo;roughness&rdquo; &mdash; the defining quality of dissonance.</p>
  <h3>The Critical Bandwidth</h3>
  <p>Plomp and Levelt (1965) refined Helmholtz&rsquo;s theory by introducing the concept of critical bandwidth &mdash; the frequency range within which two tones interact in the cochlea (inner ear). The critical bandwidth is approximately one-third of an octave at most frequencies but wider at low frequencies. Maximum dissonance occurs when two tones are separated by about 25% of the critical bandwidth.<sup class="fn"><a href="https://emusicology.org/article/id/4597/">[2]</a><span class="tip"><a href="https://emusicology.org/article/id/4597/" target="_blank">Crystals of Sound: Plomp-Levelt Critical Bandwidth Model (Empirical Musicology Review) &rarr;</a></span></sup> Below this separation, the tones fuse into a single percept with beats. Above it, they are heard as separate tones with decreasing roughness.</p>
  <p>This explains a puzzle that pure ratio theory cannot: why the same interval (say, a major third) sounds rougher in the bass register than in the treble. The frequency difference is the same, but the critical bandwidth is wider at low frequencies, so the partials are more likely to interact. <a href="https://emusicology.org/article/id/4597/" target="_blank">Computational models</a> based on Plomp-Levelt theory accurately predict consonance ratings for arbitrary combinations of tones.</p>
  <div class="callout"><h4>Key Insight</h4><p>Dissonance is not merely &ldquo;bad consonance.&rdquo; It is a specific psychoacoustic phenomenon arising from the interaction of partials within the critical bandwidth. This makes it both physically grounded and context-dependent (register, timbre, and cultural familiarity all matter).</p></div>`,

  `<div class="detail-header"><div class="num">Section 03</div><h2>The <em>Pythagorean</em> Comma</h2></div>
  <h3>The Mathematics of Impossibility</h3>
  <p>The problem is elementary number theory. We want twelve perfect fifths (3/2)<sup>12</sup> to equal seven octaves (2/1)<sup>7</sup>. But 3<sup>12</sup> = 531,441 and 2<sup>19</sup> = 524,288. These numbers are close but not equal. The ratio 531441/524288 &asymp; 1.01364, corresponding to about 23.46 cents (where 100 cents = one semitone). This &ldquo;Pythagorean comma&rdquo; means that no tuning system can simultaneously have both pure fifths and pure octaves.</p>
  <p><a href="https://johncarlosbaez.wordpress.com/2023/10/07/pythagorean-tuning/" target="_blank">John Carlos Baez</a> explains this from a group theory perspective: the problem is that the groups generated by multiplication by 3/2 and by 2/1 are incommensurable. There is no finite cycle that returns to the starting point through both operations. The comma is not a flaw in any particular tuning system &mdash; it is a fundamental property of the relationship between powers of 2 and powers of 3.</p>
  <h3>Consequences for Music</h3>
  <p>The comma means that every tuning system must compromise. Pythagorean tuning accumulates the error in a single &ldquo;wolf fifth&rdquo; (the interval from G-sharp to E-flat), which is noticeably out of tune. Just intonation uses pure ratios for all intervals in one key but becomes increasingly impure as you modulate to distant keys.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Just_intonation">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Just_intonation" target="_blank">Wikipedia: Just Intonation &rarr;</a></span></sup> Equal temperament distributes the error evenly: each fifth is narrowed by about 2 cents (1/12 of the comma), making all keys equally (im)pure.</p>
  <div class="callout"><h4>Key Insight</h4><p>The Pythagorean comma is not a problem to be solved but a mathematical reality to be managed. Every tuning system is a cultural and aesthetic response to this impossibility. Equal temperament is the most egalitarian response; well temperament is the most expressive; and gamelan sidesteps the question entirely.</p></div>`,

  `<div class="detail-header"><div class="num">Section 04</div><h2><em>Tuning</em> Systems Through History</h2></div>
  <h3>Pythagorean Tuning (~500 BCE &mdash; 1500 CE)</h3>
  <p>The simplest approach: tune all fifths pure (3:2). This works beautifully for monophonic and simple polyphonic music in a few keys. But the accumulated comma creates a wolf fifth that makes certain keys unusable. Medieval music largely avoided the wolf by staying in a narrow range of keys.</p>
  <h3>Meantone Temperament (~1500 &mdash; 1700)</h3>
  <p>As Renaissance composers began using major thirds more prominently, the Pythagorean major third (81:64, about 8 cents sharp of pure) became unacceptable. Quarter-comma meantone narrows each fifth by one-quarter of the syntonic comma (the difference between the Pythagorean and pure major third), producing pure 5:4 major thirds. The cost: the wolf fifth moves and expands, making even more keys unusable. But for music that stayed in common keys, the thirds were gloriously pure.</p>
  <h3>Well Temperament (~1680 &mdash; 1850)</h3>
  <p>Werckmeister, Kirnberger, Vallotti, and others developed systems where all keys are usable but each retains a distinctive character. Common keys (C, G, D, F) sound nearly pure; remote keys (F-sharp, C-sharp) have more tension. This &ldquo;key color&rdquo; was valued by composers: the character of a piece was partly determined by its key. Bach&rsquo;s Well-Tempered Clavier showcases this.</p>
  <h3>Equal Temperament (~1850 &mdash; present)</h3>
  <p>12-tone equal temperament (12-TET) divides the octave into 12 equal semitones of exactly 100 cents each. Every key is identical. No interval is pure (except the octave). The fifth is 2 cents narrow; the major third is 14 cents sharp (nearly as bad as Pythagorean). But the gain is total freedom of modulation: any key can move to any other key without encountering a wolf. For chromatic Romantic music and jazz, this freedom was essential.</p>`,

  `<div class="detail-header"><div class="num">Section 05</div><h2><em>Bach</em> & the Well-Tempered Clavier</h2></div>
  <h3>The Political Context</h3>
  <p>When Bach composed the WTC, the keyboard world was divided between meantone and well temperament. Meantone players argued that purity of thirds was paramount and accepted the limitation to common keys. Well temperament advocates argued that all keys should be accessible. Bach was firmly in the second camp &mdash; as an organist, he played instruments tuned in various temperaments and valued the freedom to explore remote keys.</p>
  <p>The <a href="https://en.wikipedia.org/wiki/The_Well-Tempered_Clavier" target="_blank">Well-Tempered Clavier</a> is not a theoretical exercise but a practical demonstration: here are 48 pieces, one in every key, and they all sound good. The argument is made through music rather than mathematics. Note that the German title &ldquo;Das Wohltemperierte Clavier&rdquo; means &ldquo;The Well-Tempered Keyboard&rdquo; &mdash; &ldquo;well-tempered,&rdquo; not &ldquo;equally tempered.&rdquo;</p>
  <h3>What Did Bach Actually Use?</h3>
  <p>Modern scholarship suggests Bach used an unequal temperament based on 1/5 Pythagorean-comma fifths, tunable by ear without electronic assistance. In 2005, <a href="https://en.wikipedia.org/wiki/Bach_Temperament" target="_blank">Bradley Lehman</a> proposed that the ornamental spirals on the WTC title page encode Bach&rsquo;s specific temperament. The theory is debated but influential. What is clear is that Bach&rsquo;s temperament preserved key color: C major and F-sharp major sound different, and the music of the WTC exploits these differences.</p>
  <div class="callout"><h4>Key Insight</h4><p>The WTC is often cited as a landmark for equal temperament, but this is historically inaccurate. It is a landmark for well temperament &mdash; the idea that all keys should be usable while retaining their individual character. Equal temperament sacrifices character for uniformity; Bach wanted both accessibility and color.</p></div>`,

  `<div class="detail-header"><div class="num">Section 06</div><h2><em>Non-Western</em> Tuning Systems</h2></div>
  <h3>Javanese Gamelan</h3>
  <p>Gamelan has two principal tuning systems: slendro (five notes, roughly equidistant) and pelog (seven notes, unequal intervals). The crucial difference from Western tuning: <a href="https://direct.mit.edu/comj/article/47/2/21/124238" target="_blank">the octave is not based on the mathematical doubling of frequency</a>. Each gamelan ensemble has a unique tuning &mdash; instruments from different sets cannot be mixed. Paired metallophones (one slightly higher, one slightly lower) produce interference beats that create the characteristic &ldquo;shimmering&rdquo; quality. In religious contexts, these beats are understood as conveying divine presence.</p>
  <p>Western ethnomusicologists who attempt to analyze gamelan using frequency ratios miss a fundamental point: the Javanese concept of tuning is not a scientific measurement system based on the octave. It is an aesthetic practice where each ensemble develops its own personality through its unique tuning.</p>
  <h3>Indian Shruti System</h3>
  <p>Indian classical music divides the octave into 22 shruti (microtones) &mdash; far more granular than Western music&rsquo;s 12 semitones. Not all shruti are used in any single raga; each raga selects specific pitches and ornamental inflections (gamaka) that exploit the microtonal spaces between them. A performer might approach a note from slightly below or above, creating inflections that have no equivalent in Western notation.</p>
  <h3>Arabic Maqam</h3>
  <p>The <a href="https://globalmusictheory.com/a-comparison-of-different-musical-modes-used-in-different-parts-of-the-world/" target="_blank">maqam system</a> employs quarter-tones &mdash; intervals of approximately 50 cents that fall exactly between Western semitones. Each maqam is not just a scale but a set of rules for melodic development, modulation, and emotional expression. Like Indian ragas, maqams carry emotional and sometimes spiritual associations that are codified in music theory treatises.</p>
  <h3>The Larger Point</h3>
  <p>These systems are not &ldquo;primitive&rdquo; approximations of Western tonality. They are sophisticated, internally consistent musical languages that map the physical properties of sound to human experience in ways that Western equal temperament does not and cannot. The connection to <a href="s6-cultures.dd.html">S6 (Music Across Cultures)</a> is direct: the diversity of tuning systems reflects the diversity of human musical thought.</p>
  <div class="callout"><h4>Key Insight</h4><p>Equal temperament solved the Pythagorean comma by making every key equally impure. Gamelan solved it by not recognizing the octave as fundamental. Indian music solved it by embracing microtonal complexity. Each solution reflects a different aesthetic philosophy &mdash; and none is more &ldquo;correct&rdquo; than the others.</p></div>`
];

sections.forEach((sec, idx) => { const block = document.createElement('div'); block.className = 'section-block'; block.innerHTML = `<div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>${sec.title}</h2>${summaries[idx]}`; mainInner.appendChild(block); });
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => { const d = document.createElement('div'); d.className = 'detail'; d.id = `detail-${idx}`; d.innerHTML = details[idx]; rightInner.appendChild(d); });
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('dd-theme', n); }
const savedTheme = localStorage.getItem('dd-theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const ad = rightPanelOuter.querySelector('.detail[style*="display: block"],.detail[style*="display:block"]'); if (!ad) return; const h2 = ad.querySelector('.detail-header h2')||ad.querySelector('h2'); if (!h2) return; const r = h2.getBoundingClientRect(); const pr = rightPanelOuter.getBoundingClientRect(); const tb = document.querySelector('.right-topbar'); if (r.bottom < pr.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); tb.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); tb.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
