<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Entrainment', title: 'Neural <em>Entrainment</em>' },
  { num: '02', short: 'Meter', title: '<em>Meter</em> & Syncopation' },
  { num: '03', short: 'Brain', title: 'The <em>Neural</em> Basis of Beat' },
  { num: '04', short: 'Polyrhythm', title: '<em>Polyrhythm</em> & Cross-Rhythm' },
  { num: '05', short: 'Groove', title: 'The Science of <em>Groove</em>' },
  { num: '06', short: 'Dissociation', title: 'Rhythm vs. <em>Melody</em>' }
];

const summaries = [
  // 01 — Neural Entrainment
  `<p>Neural oscillations synchronize with external rhythmic stimuli &mdash; a process called <em>entrainment</em>. When you hear a steady beat, your brain does not passively register each pulse; it actively generates predictions about when the next beat will occur.<sup class="fn"><a href="https://www.mdpi.com/2076-3425/14/11/1063">[1]</a><span class="tip"><a href="https://www.mdpi.com/2076-3425/14/11/1063" target="_blank">From Sound to Movement: Neural Mechanisms of Auditory-Motor Entrainment (Brain Sciences, 2024) &rarr;</a></span></sup> This predictive mechanism is why we involuntarily tap our feet: the motor system entrains to auditory rhythm even without conscious intention to move.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">0.5&ndash;5 Hz</div><div class="sl">Entrainment Range</div></div>
    <div class="st"><div class="sv">~120 BPM</div><div class="sl">Preferred Tempo</div></div>
    <div class="st"><div class="sv">&lt;25 ms</div><div class="sl">Timing Precision</div></div>
    <div class="st"><div class="sv">Beta/Gamma</div><div class="sl">Key Oscillations</div></div>
  </div>
  <p>Entrainment is not unique to music &mdash; it governs how we synchronize speech, coordinate walking, and process temporal patterns in language. But music exploits entrainment more systematically and precisely than any other human behavior, creating temporal expectations that composers can then confirm, delay, or violate for emotional effect. The connection to <a href="s4-emotion.dd.html">S4 (Emotion)</a> is direct: rhythmic entrainment is one of Juslin&rsquo;s BRECVEMA mechanisms for emotional response.</p>`,

  // 02 — Meter & Syncopation
  `<p>Meter is the hierarchical organization of beats into patterns of strong and weak pulses &mdash; the framework that tells us whether music is &ldquo;in three&rdquo; or &ldquo;in four.&rdquo; Syncopation occurs when accents fall on normally weak beats, creating tension against the expected metrical framework. The relationship between these two forces &mdash; regularity and disruption &mdash; is central to how rhythm generates interest and emotion.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Simple Meter</h4><p>Beats divide into twos: 2/4, 4/4. March-like regularity. Strong-weak or strong-weak-medium-weak patterns.</p></div>
    <div class="feat"><h4>Compound Meter</h4><p>Beats divide into threes: 6/8, 12/8. Lilting, dance-like quality. Each beat has a triplet subdivision.</p></div>
    <div class="feat"><h4>Syncopation</h4><p>Accent on weak beats or between beats. Creates tension and forward momentum. Essential to jazz, funk, Latin music.</p></div>

  <p>The supplementary motor area (SMA) is active for metric processing even without overt movement &mdash; motor planning regions fire in response to rhythm alone.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9195154/">[4]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9195154/" target="_blank">Identifying a Brain Network for Musical Rhythm: Neuroimaging Meta-analysis (2022) &rarr;</a></span></sup> This explains why rhythm feels inherently physical: the brain treats hearing a beat and preparing to move as nearly the same operation.</p>`,

  `<div class="detail-header"><div class="num">Section 01</div><h2>Neural <em>Entrainment</em></h2></div>
  <h3>What Entrainment Is</h3>
  <p>Entrainment is the tendency of neural oscillations to synchronize their phase and frequency with external rhythmic stimuli. When a steady beat is presented, populations of neurons in the auditory cortex begin firing in phase with the stimulus, creating a template of temporal expectations.<sup class="fn"><a href="https://www.mdpi.com/2076-3425/14/11/1063">[1]</a><span class="tip"><a href="https://www.mdpi.com/2076-3425/14/11/1063" target="_blank">From Sound to Movement: Neural Mechanisms of Auditory-Motor Entrainment (Brain Sciences, 2024) &rarr;</a></span></sup> This is not passive tracking but active prediction: the brain anticipates the next beat before it arrives, and the neural response is actually stronger at the expected moment of the beat even if the beat is omitted.</p>
  <p>The entrainment frequency range for rhythm is approximately 0.5 to 5 Hz (30&ndash;300 BPM), with a sweet spot around 2 Hz (120 BPM) &mdash; close to the natural frequency of human locomotion. This may not be coincidental: the motor system&rsquo;s involvement in rhythm processing suggests that musical tempo preferences are linked to the biomechanics of walking and running.</p>
  <h3>Audiomotor Coupling</h3>
  <p>One of the most striking features of entrainment is that it engages the motor system even when the listener is sitting still. Premotor cortex, supplementary motor area, and even the cerebellum show activation during passive listening to rhythmic stimuli. This audiomotor coupling explains the almost irresistible urge to move in response to a strong beat. The connection is bidirectional: moving in time with music strengthens the entrainment signal, which is why dancing feels &ldquo;right&rdquo; and desynchronized movement feels uncomfortable.</p>
  <div class="callout"><h4>Key Insight</h4><p>Entrainment is the neural mechanism that explains why rhythm feels physical rather than purely intellectual. The brain treats hearing a beat and preparing to move as nearly the same operation, which is why music and dance are inseparable in virtually every human culture.</p></div>`,

  // 02
  `<div class="detail-header"><div class="num">Section 02</div><h2><em>Meter</em> & Syncopation</h2></div>
  <h3>Hierarchical Beat Organization</h3>
  <p>Meter is not simply &ldquo;the time signature.&rdquo; It is a hierarchical structure in which beats are organized into levels of relative strength. In 4/4 time, beat 1 is strongest, beat 3 is moderately strong, and beats 2 and 4 are weak. This hierarchy extends downward to subdivisions (eighth notes, sixteenth notes) and upward to hypermetric groupings (phrases of 4 or 8 bars). The listener infers this hierarchy automatically &mdash; it does not need to be explicitly stated in the music.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4101486/">[2]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC4101486/" target="_blank">Grahn & Rowe: Human Brain Basis of Musical Rhythm Perception (Brain Connectivity, 2013) &rarr;</a></span></sup></p>
  <h3>The Groove Sweet Spot</h3>
  <p>Syncopation creates tension by accenting unexpected beats &mdash; the &ldquo;and&rdquo; of beat 2, the last sixteenth note before beat 1. Research has identified an inverted-U relationship between syncopation and groove: no syncopation is boring (the brain has nothing to work against), extreme syncopation destroys the meter (the brain can no longer find the beat), and moderate syncopation hits the sweet spot where the metrical framework is maintained but constantly challenged. This optimal complexity is what makes funk, jazz, and Latin music feel irresistibly groovy.</p>
  <h3>SMA Activation and Metrical Processing</h3>
  <p>The supplementary motor area shows bilateral activation for complex beat-based rhythms, even without any overt movement. This motor planning region responds to metrical structure itself, not just to sound. Syncopated rhythms produce stronger SMA activation than isochronous rhythms, consistent with the idea that the brain &ldquo;works harder&rdquo; to maintain the beat against syncopation &mdash; and this effortful processing is experienced as groove.</p>
  <div class="callout"><h4>Key Insight</h4><p>Groove is not a property of the music alone but of the interaction between the music&rsquo;s rhythmic structure and the listener&rsquo;s metrical expectations. It requires both: a framework to expect and a pattern that challenges the framework.</p></div>`,

  // 03
  `<div class="detail-header"><div class="num">Section 03</div><h2>The <em>Neural</em> Basis of Beat</h2></div>
  <h3>Basal Ganglia: The Beat Finder</h3>
  <p>The basal ganglia &mdash; subcortical structures primarily known for their role in movement &mdash; are critical for finding the beat in music. Patient studies provide the strongest evidence: individuals with Parkinson&rsquo;s disease (a basal ganglia disorder) have difficulty finding the beat in complex rhythms, particularly when the beat must be internally generated rather than explicitly stated.<sup class="fn"><a href="https://pubmed.ncbi.nlm.nih.gov/28910668/">[3]</a><span class="tip"><a href="https://pubmed.ncbi.nlm.nih.gov/28910668/" target="_blank">Grahn et al.: Basal Ganglia and Cerebellum Contributions to Rhythm (Cortex, 2017) &rarr;</a></span></sup> The basal ganglia appear to specialize in &ldquo;beat-based timing&rdquo; &mdash; organizing temporal events into a regular periodic framework.</p>
  <h3>Cerebellum: The Precision Timer</h3>
  <p>The cerebellum handles a different aspect of temporal processing: the precise encoding of individual time intervals. Patients with cerebellar damage show deficits with fast tempi and complex rhythmic patterns but may retain the ability to find a basic beat. The cerebellum is particularly important for encoding polyrhythmic stimuli, where multiple timing streams must be tracked simultaneously. This &ldquo;complex timing&rdquo; complements the basal ganglia&rsquo;s &ldquo;beat-based timing.&rdquo;</p>
  <h3>The Rhythm Network</h3>
  <p>A 2022 neuroimaging meta-analysis identified the full rhythm processing network: SMA, premotor cortex, basal ganglia, cerebellum, and auditory cortex.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9195154/">[4]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9195154/" target="_blank">Identifying a Brain Network for Musical Rhythm: Neuroimaging Meta-analysis (2022) &rarr;</a></span></sup> These regions do not operate in isolation but form an integrated circuit where auditory information is continuously translated into motor representations and temporal predictions.</p>
  <div class="callout"><h4>Key Insight</h4><p>The basal ganglia find the beat; the cerebellum times the events; the SMA plans the movement; the auditory cortex tracks the sound. Rhythm perception is fundamentally a whole-brain operation that bridges sensory and motor systems.</p></div>`,

  `<div class="detail-header"><div class="num">Section 04</div><h2><em>Polyrhythm</em> & Cross-Rhythm</h2></div>
  <h3>West African Foundations</h3>
  <p>The 3:2 cross-rhythm is the foundation of West African rhythmic practice.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Rhythm_in_Sub-Saharan_Africa">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Rhythm_in_Sub-Saharan_Africa" target="_blank">Wikipedia: Rhythm in Sub-Saharan Africa &rarr;</a></span></sup> Unlike Western music, where rhythm typically elaborates a single metric framework, West African drumming creates music from the interaction of multiple independent rhythmic streams. The bell pattern (timeline) provides the organizing reference; individual drummers play patterns that interlock with the timeline and with each other, creating a texture that no single performer controls entirely.</p>
  <p>Agawu describes these recurring rhythmic kernels as &ldquo;asymmetrical topoi&rdquo; &mdash; patterns whose defining feature is their uneven distribution of accents within a cycle. The Smithsonian Folkways collection documents how these patterns migrated through the Atlantic slave trade to become the structural basis of Afro-Cuban clave, Brazilian samba, and ultimately jazz, funk, and hip-hop.<sup class="fn"><a href="https://folkways.si.edu/braiding-rhythms-the-role-of-bell-patterns-in-west-african-and-afro-caribbean-music">[6]</a><span class="tip"><a href="https://folkways.si.edu/braiding-rhythms-the-role-of-bell-patterns-in-west-african-and-afro-caribbean-music" target="_blank">Braiding Rhythms: Bell Patterns (Smithsonian Folkways) &rarr;</a></span></sup></p>
  <h3>The Clave as Structural Principle</h3>
  <p>The son clave (3-2 or 2-3) is not merely a rhythmic pattern but a structural principle that organizes entire musical compositions. In salsa, every instrument&rsquo;s part is understood in relation to the clave. Playing &ldquo;in clave&rdquo; means aligning with this structure; playing &ldquo;crossed&rdquo; (against the clave) creates deliberate tension. This approach to rhythm as structural framework rather than decorative surface is fundamentally different from the Western concept of rhythm as subdivision of meter.</p>
  <h3>Neural Processing of Polyrhythm</h3>
  <p>Musicians show stronger neural entrainment to polyrhythmic patterns than non-musicians,<sup class="fn"><a href="https://www.frontiersin.org/journals/neuroscience/articles/10.3389/fnins.2017.00208">[7]</a><span class="tip"><a href="https://www.frontiersin.org/journals/neuroscience/articles/10.3389/fnins.2017.00208" target="_blank">Neural Entrainment to Polyrhythms: Musicians vs Non-musicians (Frontiers, 2017) &rarr;</a></span></sup> particularly in tracking the subordinate (less prominent) rhythmic layer. This training-dependent plasticity suggests that polyrhythmic perception is partly a learned skill, not purely a matter of innate rhythmic capacity.</p>
  <div class="callout"><h4>Key Insight</h4><p>Polyrhythm is not &ldquo;complex rhythm&rdquo; in the Western sense of difficult subdivisions. It is a fundamentally different approach to temporal organization &mdash; multiple independent streams creating emergent patterns that no single stream contains. This is the rhythmic counterpart to the tuning diversity explored in <a href="s2-harmony.dd.html">S2</a>.</p></div>`,

  `<div class="detail-header"><div class="num">Section 05</div><h2>The Science of <em>Groove</em></h2></div>
  <h3>Defining Groove</h3>
  <p>Groove is typically defined as the quality of music that induces the urge to move in time. It is not simply loudness or tempo but a specific combination of rhythmic features: a clear metric framework, moderate syncopation, repetition with variation, and strong bass-register periodicity. The subjective experience of groove correlates with activation in the basal ganglia and supplementary motor area &mdash; the same regions involved in beat perception and motor planning.</p>
  <h3>The Inverted-U Curve</h3>
  <p>Experimental studies present listeners with rhythmic patterns at varying levels of syncopation and ask them to rate groove intensity. The consistent finding is an inverted-U: groove ratings increase with syncopation up to a moderate level, then decline as syncopation becomes extreme. At low syncopation, the rhythm is too predictable to engage the motor system. At high syncopation, the metrical framework collapses and the listener can no longer find a beat to entrain to. The sweet spot is where the beat is clearly present but constantly challenged.</p>
  <h3>Cultural and Individual Variation</h3>
  <p>What feels groovy depends partly on familiar rhythmic vocabulary. A listener steeped in West African polyrhythm may find groove in rhythmic complexity that would overwhelm a listener trained primarily on Western pop. Musical training also matters: musicians show stronger and more precise entrainment to complex grooves, suggesting that the motor system becomes more skilled at tracking challenging rhythmic patterns with experience.</p>
  <div class="callout"><h4>Key Insight</h4><p>Groove emerges from the sweet spot between order and disorder &mdash; enough structure for the brain to predict, enough violation to keep it actively engaged. This is the rhythmic parallel to the expectation/surprise dynamic that drives musical pleasure in <a href="s4-emotion.dd.html">S4 (Emotion)</a>.</p></div>`,

  // 06
  `<div class="detail-header"><div class="num">Section 06</div><h2>Rhythm vs. <em>Melody</em></h2></div>
  <h3>Double Dissociations</h3>
  <p>The strongest evidence for separate rhythm and melody processing comes from clinical double dissociations. Patient studies have identified individuals with congenital amusia (tone deafness) who cannot perceive pitch changes but have normal rhythmic abilities, and conversely, individuals with rhythmic deficits but intact pitch perception. If rhythm and melody were processed by a single system, selective impairment of one without the other would be impossible.</p>
  <h3>Distinct Neural Substrates</h3>
  <p>Neuroimaging confirms the clinical evidence. Rhythm processing more strongly activates subcortical structures (basal ganglia, cerebellum) and motor areas (SMA, premotor cortex), while melody processing more strongly activates cortical structures (auditory cortex, superior temporal gyrus, planum temporale). The subcortical rhythm network overlaps with movement control circuitry; the cortical melody network overlaps with language processing areas.</p>
  <h3>Implications for Music Cognition</h3>
  <p>The partial independence of rhythm and melody processing means that &ldquo;musicality&rdquo; is not a single trait but a family of related capacities. A person can be rhythmically gifted but melodically impaired, or vice versa. This has implications for music therapy: interventions can target specific musical capacities that are preserved in a patient&rsquo;s particular pattern of neurological damage.</p>
  <div class="callout"><h4>Key Insight</h4><p>Music is not processed by a dedicated &ldquo;music module&rdquo; in the brain. It is assembled from components &mdash; rhythm, pitch, timbre, emotional response &mdash; that have partially distinct neural substrates and can be selectively impaired or preserved in neurological disorders.</p></div>`

function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) closeRight(); else openDetail(lastDetailIdx); }
function toggleTheme() { const c = document.body.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', n); localStorage.setItem('dd-theme', n); }
const savedTheme = localStorage.getItem('dd-theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const ad = rightPanelOuter.querySelector('.detail[style*="display: block"],.detail[style*="display:block"]'); if (!ad) return; const h2 = ad.querySelector('.detail-header h2')||ad.querySelector('h2'); if (!h2) return; const r = h2.getBoundingClientRect(); const pr = rightPanelOuter.getBoundingClientRect(); const tb = document.querySelector('.right-topbar'); if (r.bottom < pr.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); tb.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); tb.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
</body>
