<script>
const sections = [
  { num: '01', short: 'Chiang', title: 'Ted Chiang&rsquo;s <em>Story</em> of Your Life' },
  { num: '02', short: 'Sapir-Whorf', title: 'The Sapir-Whorf <em>Hypothesis</em>' },
  { num: '03', short: 'Color', title: '<em>Color</em> Perception Evidence' },
  { num: '04', short: 'Time & Space', title: 'Time, Space &amp; <em>Causality</em>' },
  { num: '05', short: 'Thought Exp.', title: 'The Conlang as <em>Thought</em> Experiment' },
  { num: '06', short: 'Arrival', title: '<em>Arrival</em>: The Film' },
  { num: '07', short: 'Consensus', title: 'Weak Whorf <em>Wins</em>' },
  { num: '08', short: 'Debate', title: 'Agreement &amp; <em>Debate</em>' }
];

const summaries = [
  `<p>Ted Chiang&rsquo;s 1998 novella is widely regarded as the most intellectually rigorous fictional exploration of the Sapir-Whorf hypothesis.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life" target="_blank">Wikipedia: Story of Your Life &mdash; Nebula Award winner, 1998 &rarr;</a></span></sup> Linguist Louise Banks discovers the heptapods have two communication systems: Heptapod A (spoken, sequential) and Heptapod B (written, semasiographic, non-linear).</p>
  <p>The central conceit: the heptapods perceive time non-linearly. Their writing reflects this. As Louise learns Heptapod B, she begins to experience time the way they do.<sup class="fn"><a href="https://scholarblogs.emory.edu/lingsci/story-of-your-life/">[2]</a><span class="tip"><a href="https://scholarblogs.emory.edu/lingsci/story-of-your-life/" target="_blank">Emory: Heptapod B as semasiographic, non-linear writing &rarr;</a></span></sup> Chiang uses Fermat&rsquo;s principle of least time as structural metaphor.</p>`,

  `<p>The Sapir-Whorf hypothesis exists on a spectrum:</p>
  <div class="feat-grid">
    <div class="feat"><h4>Strong Version</h4><p>Language <em>determines</em> thought. If your language lacks a concept, you cannot think it. Few linguists support this today.</p></div>
    <div class="feat"><h4>Weak Version</h4><p>Language <em>influences</em> thought. Your native language makes some thoughts easier or harder, affects perception, and biases cognition. Substantial evidence supports this.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104">[3]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104" target="_blank">Winawer et al.: Russian blues color perception (PNAS, 2007) &rarr;</a></span></sup></p></div>
  </div>
  <p>Chiang deliberately engages the strong version as a thought experiment. Heptapod B doesn&rsquo;t just influence Louise&rsquo;s thinking &mdash; it fundamentally restructures her perception of causality and time.</p>`,

  `<p>The most robust evidence for linguistic relativity comes from color perception studies. Russian has two basic color terms for blue &mdash; <em>goluboy</em> (light blue) and <em>siniy</em> (dark blue). Russian speakers discriminate between them significantly faster than English speakers.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104">[3]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104" target="_blank">Winawer et al. (PNAS, 2007) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">2007</div><div class="sl">Russian blues study</div></div>
    <div class="st"><div class="sv">fMRI</div><div class="sl">neuroimaging confirms</div></div>
    <div class="st"><div class="sv">110</div><div class="sl">languages in World Color Survey</div></div>
  </div>
  <p>fMRI imaging shows that language processing areas activate during the discrimination task.<sup class="fn"><a href="https://www.researchgate.net/publication/sapir-whorf-colour-english-russian">[4]</a><span class="tip"><a href="https://www.researchgate.net/publication/sapir-whorf-colour-english-russian" target="_blank">ResearchGate: Sapir-Whorf colour study confirmation &rarr;</a></span></sup> The effect disappears under verbal interference &mdash; when language is occupied, the advantage vanishes.</p>`,

  `<p>Lera Boroditsky has documented linguistic effects on multiple cognitive domains:<sup class="fn"><a href="https://www.lera.ucsd.edu/">[5]</a><span class="tip"><a href="https://www.lera.ucsd.edu/" target="_blank">Boroditsky Lab: Language shapes spatial, temporal, causal cognition &rarr;</a></span></sup></p>
  <div class="feat-grid">
    <div class="feat"><h4>Time</h4><p>Mandarin speakers use vertical metaphors for time and show faster processing with vertical spatial cues. Aymara speakers place the past in front.</p></div>
    <div class="feat"><h4>Space</h4><p>Kuuk Thaayorre speakers use absolute directions (north/south) instead of left/right, maintaining constant cardinal direction awareness.</p></div>
    <div class="feat"><h4>Causality</h4><p>English emphasizes agents. Spanish and Japanese use constructions that omit the agent. English speakers remember who caused an accident; Spanish speakers remember it as an accident.</p></div>
    <div class="feat"><h4>Number</h4><p>Languages without exact number words (like Pirah&atilde;) make precise quantity matching more difficult for their speakers.</p></div>
  </div>`,

  `<p>Heptapod B is the most sophisticated example of a conlang designed to test a philosophical question. But it is not the only one:</p>
  <ul class="s-list">
    <li><strong>Lojban</strong> (1987): Designed to be syntactically unambiguous and based on predicate logic. Originally conceived to test whether a perfectly logical language would produce more logical thinking</li>
    <li><strong>Toki Pona</strong> (2001): A minimalist language with ~120 root words. Forces speakers to decompose complex concepts into simple components. Users report a meditative, simplifying effect on cognition</li>
    <li><strong>Ithkuil</strong> (2004): An ultra-precise language designed to express the maximum information in minimum words. So complex that even its creator cannot speak it fluently</li>
  </ul>
  <div class="chips"><span class="chip">Lojban</span><span class="chip">Toki Pona</span><span class="chip">Ithkuil</span><span class="chip">Heptapod B</span></div>`,
