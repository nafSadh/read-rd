<!DOCTYPE html>

  <title>Constructed Languages — Overview Deep Dive</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --close-text:"\2715";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);transition:background 1s}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'\263D'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'\2600'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.v-col h4{font-size:10px;font-family:var(--sans);letter-spacing:var(--label-ls);margin-bottom:12px;text-transform:uppercase;font-weight:var(--label-weight)}

sup{font-size:11px;line-height:0;vertical-align:super}sup.fn{position:relative;cursor:pointer;font-family:var(--sans)}sup.fn>a{color:var(--accent);font-weight:600;text-decoration:none;border-bottom:none}sup.fn:hover>a{color:var(--bright)}sup.fn .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:400;color:var(--text);white-space:normal;max-width:480px;min-width:200px;z-index:50;pointer-events:auto;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.15)}sup.fn .tip a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}sup.fn .tip a:hover{color:var(--bright);border-bottom-style:solid}sup.fn:hover .tip,sup.fn .tip:hover{display:block}
a{color:var(--dim);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--dim),transparent 50%);transition:color .2s,border-color .2s}
a:hover{color:var(--accent);border-bottom-color:var(--accent);border-bottom-style:solid}

.detail a:hover{color:var(--accent);border-bottom-color:var(--accent)}

<body>
<script>
const sections = [
  { num: '01', short: 'Overview', title: '<em>Constructed</em> Languages' },
  { num: '02', short: 'Timeline', title: 'A <em>Thousand</em> Years of Invention' },
  { num: '03', short: 'Traditions', title: '<em>Six</em> Traditions of Making' },
  { num: '04', short: 'Tensions', title: 'The <em>Core</em> Tensions' },
  { num: '05', short: 'Art vs Use', title: '<em>Art</em>, Utility &amp; Everything Between' },
  { num: '06', short: 'Communities', title: 'Languages <em>Need</em> Speakers' },
  { num: '07', short: 'Cognition', title: 'Language <em>Shapes</em> Thought' },
  { num: '08', short: 'Findings', title: '<em>Five</em> Cross-Cutting Findings' }
];

const summaries = [
  `<p>This survey maps the landscape of constructed languages across <strong>six dimensions</strong> and <strong>55 sources</strong> &mdash; from Hildegard von Bingen&rsquo;s mystical alphabet in the 1150s<sup class="fn"><a href="https://en.wikipedia.org/wiki/Constructed_language">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Constructed_language" target="_blank">Wikipedia: Constructed Language &mdash; Lingua Ignota (1150s) as first known conlang &rarr;</a></span></sup> to Brainfuck&rsquo;s eight-command programming language.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Brainfuck">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Brainfuck" target="_blank">Wikipedia: Brainfuck &mdash; 8 commands, Turing-complete (1993) &rarr;</a></span></sup> The same impulse &mdash; to build a language from scratch &mdash; has been directed at world peace, worldbuilding, entertainment, philosophy of mind, and computational art.</p>
   <p>What unites them is a belief that language is not merely found but can be <em>made</em>, and that making it reveals something about how it works. The most interesting findings are not within any single tradition but in the <em>tensions between them</em>.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">55</div><div class="sl">sources surveyed</div></div>
     <div class="st"><div class="sv">6</div><div class="sl">dimensions</div></div>
     <div class="st"><div class="sv">~870</div><div class="sl">years of conlang history</div></div>
     <div class="st"><div class="sv">1000+</div><div class="sl">documented conlangs</div></div>
   </div>`,

  `<p>The history of language invention follows a clear arc through seven phases: <strong>mystical</strong> (Hildegard, 1150s),<sup class="fn"><a href="https://blog.oup.com/2013/09/of-invented-languages/">[3]</a><span class="tip"><a href="https://blog.oup.com/2013/09/of-invented-languages/" target="_blank">Cambridge Blog: Of Invented Languages &mdash; Hildegard&rsquo;s Lingua Ignota &rarr;</a></span></sup> <strong>philosophical</strong> (Wilkins, 1668),<sup class="fn"><a href="https://en.wikipedia.org/wiki/An_Essay_towards_a_Real_Character,_and_a_Philosophical_Language">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/An_Essay_towards_a_Real_Character,_and_a_Philosophical_Language" target="_blank">Wikipedia: Wilkins&rsquo; Philosophical Language (1668) &rarr;</a></span></sup> <strong>utopian</strong> (Volapuk 1879, Esperanto 1887),<sup class="fn"><a href="https://beinecke.library.yale.edu/article/rise-and-fall-volapuk">[5]</a><span class="tip"><a href="https://beinecke.library.yale.edu/article/rise-and-fall-volapuk" target="_blank">Beinecke Library (Yale): The Rise and Fall of Volapuk &rarr;</a></span></sup> <strong>artistic</strong> (Tolkien, 1910s+),<sup class="fn"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien" target="_blank">Wikipedia: Languages constructed by Tolkien &rarr;</a></span></sup> <strong>media</strong> (Klingon 1984, Dothraki 2011),<sup class="fn"><a href="https://en.wikipedia.org/wiki/Klingon_language">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Klingon_language" target="_blank">Wikipedia: Klingon language &mdash; created by Okrand, 1984 &rarr;</a></span></sup> <strong>scientific</strong> (NSL 1980s, Arrival 2016),<sup class="fn"><a href="https://en.wikipedia.org/wiki/Nicaraguan_Sign_Language">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Nicaraguan_Sign_Language" target="_blank">Wikipedia: Nicaraguan Sign Language &rarr;</a></span></sup> and <strong>computational</strong> (APL 1962, Brainfuck 1993).<sup class="fn"><a href="https://en.wikipedia.org/wiki/Esoteric_programming_language">[9]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Esoteric_programming_language" target="_blank">Wikipedia: Esoteric programming language &rarr;</a></span></sup></p>
   <p>These phases overlap &mdash; they do not replace each other. But the dominant motivation has shifted from <em>utility</em> to <em>art</em> to <em>science</em>. The utopian dream of a universal language has given way to conlangs as creative medium, thought experiment, and even career.<sup class="fn"><a href="https://en.wikipedia.org/wiki/David_J._Peterson">[10]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/David_J._Peterson" target="_blank">Wikipedia: David J. Peterson &mdash; first full-time professional conlanger &rarr;</a></span></sup></p>
   <div class="diagram-wrap"><svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
     <text x="250" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5" style="font-size:10px">TIMELINE OF CONSTRUCTED LANGUAGES</text>
     <line x1="30" y1="30" x2="470" y2="30" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
     <line x1="30" y1="100" x2="470" y2="100" class="edge-hi" stroke-dasharray="none"/>
     <circle cx="50" cy="100" r="4" fill="var(--accent)"/><text x="50" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1150s</text><text x="50" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Lingua Ignota</text>
     <circle cx="110" cy="100" r="4" fill="var(--accent)"/><text x="110" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1668</text><text x="110" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Wilkins</text>
     <circle cx="160" cy="100" r="4" fill="var(--accent)"/><text x="160" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1879</text><text x="160" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Volapuk</text>
     <circle cx="180" cy="100" r="4" fill="var(--accent)"/><text x="180" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1887</text><text x="180" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Esperanto</text>
     <circle cx="230" cy="100" r="5" fill="var(--accent)"/><text x="230" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1910s</text><text x="230" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Tolkien</text>
     <circle cx="290" cy="100" r="4" fill="var(--accent)"/><text x="290" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1962</text><text x="290" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">APL</text>
     <circle cx="340" cy="100" r="4" fill="var(--accent)"/><text x="340" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1984</text><text x="340" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Klingon</text>
     <circle cx="380" cy="100" r="4" fill="var(--accent)"/><text x="380" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">1993</text><text x="380" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Brainfuck</text>
     <circle cx="420" cy="100" r="4" fill="var(--accent)"/><text x="420" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">2011</text><text x="420" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Dothraki</text>
     <circle cx="455" cy="100" r="4" fill="var(--accent)"/><text x="455" y="88" text-anchor="middle" font-size="8" class="lbl-hi" style="font-size:8px">2016</text><text x="455" y="120" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">Arrival</text>
     <rect x="40" y="145" width="80" height="16" rx="2" fill="var(--accent)" opacity="0.15"/><text x="80" y="156" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">MYSTICAL</text>
     <rect x="100" y="145" width="50" height="16" rx="2" fill="var(--accent)" opacity="0.15"/><text x="125" y="156" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">PHILOSOPHICAL</text>
     <rect x="150" y="145" width="70" height="16" rx="2" fill="var(--accent)" opacity="0.15"/><text x="185" y="156" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">UTOPIAN</text>
     <rect x="215" y="165" width="80" height="16" rx="2" fill="var(--accent)" opacity="0.15"/><text x="255" y="176" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">ARTISTIC</text>
     <rect x="280" y="165" width="100" height="16" rx="2" fill="var(--accent)" opacity="0.15"/><text x="330" y="176" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">COMPUTATIONAL</text>
     <rect x="330" y="145" width="100" height="16" rx="2" fill="var(--accent)" opacity="0.15"/><text x="380" y="156" text-anchor="middle" font-size="7" class="lbl" style="font-size:7px">MEDIA</text>
   </svg></div>`,

  `<p>Six distinct traditions of language invention, each with its own motivations, methods, and communities:</p>
   <div class="feat-grid">
     <div class="feat"><h4>Historical IALs</h4><p>Esperanto, Volapuk, Interlingua. Languages designed to bridge nations. The utopian tradition.</p></div>
     <div class="feat"><h4>Artistic Conlangs</h4><p>Tolkien's Quenya and Sindarin. Language as creative medium, with depth rivaling natural languages.</p></div>
     <div class="feat"><h4>Media Conlangs</h4><p>Klingon, Dothraki, Na'vi. Languages built for film and TV, now a professional career path.</p></div>
     <div class="feat"><h4>Philosophical / Cognitive</h4><p>Heptapod B, Lojban, Toki Pona. Languages designed to test how language shapes thought.</p></div>
     <div class="feat"><h4>Emergent Sign Languages</h4><p>Nicaraguan Sign Language, ABSL. Not designed but naturally constructed by communities.</p></div>
     <div class="feat"><h4>Programming Languages</h4><p>APL, Brainfuck, esolangs. Formal constructed languages that are the most successful conlangs ever.</p></div>
   </div>`,

  `<p>The most valuable findings in any comparative survey are the <em>tensions</em> &mdash; places where different traditions of language invention reveal contradictory truths about what language is and what it is for.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">6</div><div class="sl">core tensions identified</div></div>
     <div class="st"><div class="sv">Art vs Utility</div><div class="sl">fundamental divide</div></div>
   </div>
   <ul class="s-list">
     <li><strong>Art vs. utility</strong> &mdash; Tolkien (pure art)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien" target="_blank">Wikipedia: Tolkien&rsquo;s languages preceded his fiction &rarr;</a></span></sup> vs. Esperanto (pure utility)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Esperanto">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Esperanto" target="_blank">Wikipedia: Esperanto &mdash; ~100K speakers, 16 grammar rules &rarr;</a></span></sup></li>
     <li><strong>Creator vs. community</strong> &mdash; Schleyer destroyed Volapuk;<sup class="fn"><a href="https://en.wikipedia.org/wiki/Johann_Martin_Schleyer">[12]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Johann_Martin_Schleyer" target="_blank">Wikipedia: Schleyer refused to cede control of Volapuk &rarr;</a></span></sup> Klingon&rsquo;s community saved it<sup class="fn"><a href="https://www.kli.org/">[13]</a><span class="tip"><a href="https://www.kli.org/" target="_blank">Klingon Language Institute &mdash; founded 1992 &rarr;</a></span></sup></li>
     <li><strong>Strong vs. weak Whorf</strong> &mdash; Heptapod B (determines thought)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life">[14]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life" target="_blank">Wikipedia: Ted Chiang&rsquo;s &ldquo;Story of Your Life&rdquo; (1998) &rarr;</a></span></sup> vs. Boroditsky (influences thought)<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104">[15]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104" target="_blank">Winawer et al.: Russian blues color perception (2007) &rarr;</a></span></sup></li>
     <li><strong>Natural vs. designed</strong> &mdash; NSL (emerged naturally)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Nicaraguan_Sign_Language">[8]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Nicaraguan_Sign_Language" target="_blank">Wikipedia: Nicaraguan Sign Language &rarr;</a></span></sup> vs. Na&rsquo;vi (designed by one linguist)<sup class="fn"><a href="https://www.salon.com/2023/01/06/how-to-speak-navi/">[16]</a><span class="tip"><a href="https://www.salon.com/2023/01/06/how-to-speak-navi/" target="_blank">Salon: How to speak Na&rsquo;vi &mdash; Frommer hired by Cameron &rarr;</a></span></sup></li>
     <li><strong>Formal vs. natural notation</strong> &mdash; Dijkstra (formalism essential)<sup class="fn"><a href="https://www.cs.utexas.edu/users/EWD/ewd06xx/EWD667.PDF">[17]</a><span class="tip"><a href="https://www.cs.utexas.edu/users/EWD/ewd06xx/EWD667.PDF" target="_blank">Dijkstra EWD 667: On the foolishness of natural language programming (1978) &rarr;</a></span></sup> vs. LLMs (natural language works)<sup class="fn"><a href="https://brooker.co.za/blog/2025/01/natural-language-programming.html">[18]</a><span class="tip"><a href="https://brooker.co.za/blog/2025/01/natural-language-programming.html" target="_blank">Marc Brooker: On the success of natural language programming (2025) &rarr;</a></span></sup></li>
     <li><strong>Minimalism vs. richness</strong> &mdash; Brainfuck (8 commands)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Brainfuck">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Brainfuck" target="_blank">Wikipedia: Brainfuck &mdash; 8 commands, Turing-complete &rarr;</a></span></sup> vs. Quenya (full etymology)<sup class="fn"><a href="https://www.tolkienestate.com/writing/languages-scripts/">[19]</a><span class="tip"><a href="https://www.tolkienestate.com/writing/languages-scripts/" target="_blank">Tolkien Estate: Hostetter on Tolkien&rsquo;s linguistic methodology &rarr;</a></span></sup></li>
   </ul>`,

  `<p>The spectrum from pure art to pure utility defines the field. Tolkien never intended anyone to <em>speak</em> Quenya; it existed for its beauty and its role in generating narrative. Zamenhof never intended Esperanto to be <em>beautiful</em>; it existed to prevent war. Most conlangs fall somewhere between.</p>
   <p>Media conlangs occupy a notable middle ground: they serve a <strong>commercial purpose</strong> (authenticity, merchandising) while demanding genuine <strong>artistic quality</strong> (Peterson&rsquo;s Dothraki has 4,000+ words and naturalistic sound changes). Programming languages tilt entirely to utility &mdash; except for esolangs, which are pure art.</p>
   <p>The lesson: the same activity (designing a language) produces wildly different results depending on whether the designer optimizes for beauty, function, or understanding.</p>`,

  `<p>Every conlang creator must answer: <em>who controls the language?</em> The answer determines whether it lives or dies. Schleyer refused to let the Volapuk Academy reform his creation, and it died within a decade of its peak.<sup class="fn"><a href="https://beinecke.library.yale.edu/article/rise-and-fall-volapuk">[5]</a><span class="tip"><a href="https://beinecke.library.yale.edu/article/rise-and-fall-volapuk" target="_blank">Beinecke Library: 283 clubs by 1889, then collapse &rarr;</a></span></sup> Zamenhof released Esperanto to its speakers, and it survived for 140 years.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Esperanto">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Esperanto" target="_blank">Wikipedia: Esperanto &mdash; published 1887, UNESCO recognition &rarr;</a></span></sup> Tolkien kept his languages private and evolving &mdash; they outlived him in his published works.</p>
   <p>The deepest evidence comes from <strong>Nicaraguan Sign Language</strong>: no individual designed it, no committee approved it, no authority controlled it. Fifty deaf children created a full language because they needed to communicate.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0405328101">[20]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0405328101" target="_blank">Senghas &amp; Coppola: Children Creating Language (Columbia) &rarr;</a></span></sup> Given the need, language emerges from a community &mdash; designed or not.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">283</div><div class="sl">Volapuk clubs at peak</div></div>
     <div class="st"><div class="sv">~100K</div><div class="sl">Esperanto speakers today</div></div>
     <div class="st"><div class="sv">20-30</div><div class="sl">fluent Klingon speakers</div></div>
     <div class="st"><div class="sv">50</div><div class="sl">children who created NSL</div></div>
   </div>`,

  `<p>Linguistic relativity &mdash; the idea that language shapes thought &mdash; connects multiple sections of this survey. Tolkien intuited it: his languages generated his stories.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien" target="_blank">Wikipedia: &ldquo;The stories were made to provide a world for the languages&rdquo; &rarr;</a></span></sup> Chiang made it the central premise of <em>Story of Your Life</em>.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life">[14]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Story_of_Your_Life" target="_blank">Wikipedia: Chiang&rsquo;s 1998 Nebula Award-winning novella &rarr;</a></span></sup> Boroditsky proved it empirically.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104">[15]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104" target="_blank">Winawer et al.: Russian blues &mdash; language affects color perception &rarr;</a></span></sup> Iverson argued it for programming: <em>notation is a tool of thought.</em><sup class="fn"><a href="https://esolangs.org/wiki/Prehistory_of_esoteric_programming_languages">[21]</a><span class="tip"><a href="https://esolangs.org/wiki/Prehistory_of_esoteric_programming_languages" target="_blank">Esolang Wiki: APL as radical notation (Iverson, 1962) &rarr;</a></span></sup></p>
   <p>The evidence supports <strong>weak Whorf</strong>: language influences perception and reasoning without imprisoning it. Russian speakers discriminate blues faster. Mandarin speakers process temporal relationships with vertical metaphors. APL programmers think differently about arrays. But no one&rsquo;s cognition is <em>determined</em> by their language &mdash; Heptapod B remains science fiction.</p>

  `<p>Five findings emerge from looking across all six dimensions:</p>
   <ul class="s-list pro">
     <li><strong>The Control Paradox:</strong> Creator control kills communities (Volapuk), but total absence of control produces the richest languages (NSL)</li>
     <li><strong>Communities beat grammars:</strong> The most elaborate grammar means nothing without speakers. Esperanto survived; Ido didn&rsquo;t.</li>
     <li><strong>The Sapir-Whorf spectrum:</strong> Language influences thought (weak Whorf) but doesn&rsquo;t determine it (strong Whorf). True across natural, constructed, and programming languages.</li>
     <li><strong>Natural vs. constructed is a false binary:</strong> NSL and ABSL are natural languages constructed in observable time. Modern Hebrew was deliberately revived. The boundary is fuzzy.</li>
     <li><strong>Programming languages are the most successful conlangs:</strong> By any measure &mdash; speakers, utility, economic impact &mdash; Python dwarfs Esperanto. Yet the two communities rarely talk.</li>
   </ul>`
];

const details = [
  `<div class="detail-header"><div class="num">01</div><h2><em>Constructed</em> Languages</h2></div>
   <h3>Why This Survey Exists</h3>
   <p>Constructed languages are typically studied in isolation: Tolkien scholars study Tolkien, Esperantists study Esperanto, linguists study NSL, and programmers study programming languages. This survey is unusual in that it puts them all in the same frame. The reward for doing so is a set of cross-cutting insights that no single-tradition study can produce.</p>
   <p>The central finding: language invention is a single impulse expressed through wildly different traditions, and the tensions between those traditions reveal fundamental truths about what language is and what it is for.</p>
   <h3>Source Assessment</h3>
   <p>55 sources across six dimensions. Each section was assessed for adequacy before building: minimum 5-6 sources per section, with specific gap analysis where coverage was thin. Source types include Wikipedia for factual grounding, academic papers, Tolkien Estate scholarship,<sup class="fn"><a href="https://www.tolkienestate.com/writing/languages-scripts/">[19]</a><span class="tip"><a href="https://www.tolkienestate.com/writing/languages-scripts/" target="_blank">Tolkien Estate: Hostetter &amp; Smith on languages and scripts &rarr;</a></span></sup> interviews with professional conlangers,<sup class="fn"><a href="https://ideas.ted.com/meet-the-person-who-created-dothraki-and-valyrian/">[22]</a><span class="tip"><a href="https://ideas.ted.com/meet-the-person-who-created-dothraki-and-valyrian/" target="_blank">TED Ideas: Meet Peterson, creator of Dothraki and Valyrian &rarr;</a></span></sup> cognitive science research,<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104">[15]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104" target="_blank">Winawer et al.: Russian blues (PNAS, 2007) &rarr;</a></span></sup> and primary documents like Dijkstra&rsquo;s 1978 essay.<sup class="fn"><a href="https://www.cs.utexas.edu/users/EWD/ewd06xx/EWD667.PDF">[17]</a><span class="tip"><a href="https://www.cs.utexas.edu/users/EWD/ewd06xx/EWD667.PDF" target="_blank">Dijkstra: EWD 667 (1978) &rarr;</a></span></sup></p>
   <h3>How to Read This Survey</h3>
   <p>Each of the six section deep-dives (<a href="s1-history.dd.html">S1</a> through <a href="s6-programming.dd.html">S6</a>) can be read independently. The overview (this deep-dive) synthesizes the cross-cutting findings. The summaries in the center panel give the story arc; the details in this right panel give the evidence and analysis.</p>
   <div class="callout"><h4>The Thread</h4><p>The same question runs through every section: what happens when someone tries to design something that normally evolves on its own? The answer depends entirely on what the design is for.</p></div>`,

  `<div class="detail-header"><div class="num">02</div><h2>A <em>Thousand</em> Years of Invention</h2></div>
   <h3>The Seven Phases</h3>
   <p>The timeline of constructed languages reveals a striking pattern: the dominant motivation for creating languages has shifted over the centuries, from spiritual to intellectual to political to artistic to commercial to scientific to computational. Each phase introduced new practitioners and new standards for what counts as a successful conlang.</p>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">1150s</div><div class="tl-text">Hildegard von Bingen creates Lingua Ignota &mdash; ~1,000 words, mystical purpose. The first documented conlang.</div></div>
     <div class="tl-item"><div class="tl-date">1668</div><div class="tl-text">John Wilkins publishes his philosophical language &mdash; an attempt to categorize all knowledge in a single notation.</div></div>
     <div class="tl-item"><div class="tl-date">1879</div><div class="tl-text">Johann Martin Schleyer creates Volapuk. 283 clubs by 1889, then spectacular collapse over founder control.</div></div>
     <div class="tl-item"><div class="tl-date">1887</div><div class="tl-text">L.L. Zamenhof publishes Esperanto. It survives to become the most successful IAL, with ~100K speakers today.</div></div>
     <div class="tl-item"><div class="tl-date">1910s+</div><div class="tl-text">Tolkien begins constructing Quenya and Sindarin. Over fifty years, he builds the deepest conlang family ever created.</div></div>
     <div class="tl-item"><div class="tl-date">1962</div><div class="tl-text">Kenneth Iverson publishes APL &mdash; a radical programming notation that reshapes how its users think about computation.</div></div>
     <div class="tl-item"><div class="tl-date">1984</div><div class="tl-text">Marc Okrand creates Klingon for Star Trek III. It spawns the Klingon Language Institute and a real speaking community.</div></div>
     <div class="tl-item"><div class="tl-date">1980s</div><div class="tl-text">Deaf children in Nicaragua spontaneously create a new sign language &mdash; the strongest evidence for innate language faculty.</div></div>
     <div class="tl-item"><div class="tl-date">1998</div><div class="tl-text">Ted Chiang publishes &ldquo;Story of Your Life,&rdquo; widely regarded as the most sophisticated conlang thought experiment in fiction.</div></div>
     <div class="tl-item"><div class="tl-date">2011</div><div class="tl-text">David Peterson creates Dothraki for Game of Thrones &mdash; conlanging becomes a professional career.</div></div>
   </div>
   <h3>What the Timeline Reveals</h3>
   <p>The shift from Esperanto to Klingon is not just a change in purpose; it is a change in what counts as success. Esperanto&rsquo;s goal (world peace) was impossibly ambitious and ultimately unachieved. Klingon&rsquo;s goal (make aliens sound real) was modest and completely achieved. The professionalization of conlanging happened when the goals became achievable.</p>`,

  `<div class="detail-header"><div class="num">03</div><h2><em>Six</em> Traditions of Making</h2></div>
   <h3>A Taxonomy of Conlangs</h3>
   <p>The six traditions identified in this survey are not a standard taxonomy &mdash; most linguistic references divide conlangs into artistic, auxiliary, and philosophical. The six-way split adopted here reflects the finding that the <em>purpose</em> of a conlang matters more than its structural properties.</p>
   <div class="feat-grid">
     <div class="feat"><h4>Purpose-Driven</h4><p>IALs, Esperanto, Interlingua: the language exists to solve a problem (international communication). Success = adoption.</p></div>
     <div class="feat"><h4>Art-Driven</h4><p>Tolkien, artistic conlangs: the language exists for its beauty and narrative function. Success = aesthetic depth.</p></div>
     <div class="feat"><h4>Industry-Driven</h4><p>Klingon, Dothraki, Na'vi: the language exists for entertainment authenticity. Success = audience engagement.</p></div>
     <div class="feat"><h4>Cognition-Driven</h4><p>Heptapod B, Lojban: the language exists as a thought experiment. Success = insight into how language works.</p></div>
     <div class="feat"><h4>Emergent</h4><p>NSL, ABSL: the language was not designed but emerged from community need. Success = the fact of its existence.</p></div>
     <div class="feat"><h4>Computational</h4><p>APL, Brainfuck, esolangs: the language exists as formal system and/or art object. Success = Turing-completeness and elegance.</p></div>
   </div>
   <h3>Why This Matters</h3>
   <p>A taxonomy by purpose rather than structure explains why the &ldquo;best&rdquo; conlang depends entirely on what it is designed to do. Esperanto is a better IAL than Quenya, but Quenya is a better artwork than Esperanto. Brainfuck is a terrible programming language and a brilliant piece of conceptual art. Judging conlangs requires knowing what they were for.</p>`,

  `<div class="detail-header"><div class="num">04</div><h2>The <em>Core</em> Tensions</h2></div>
   <h3>Why Tensions Matter</h3>
   <p>The most valuable findings in any survey are the contradictions. When different traditions of language invention reach opposite conclusions about the same question, that reveals something important about the question itself. Each of the six tensions identified here recurs across multiple sections and cannot be resolved by choosing one side.</p>

  `<div class="detail-header"><div class="num">05</div><h2><em>Art</em>, Utility &amp; Everything Between</h2></div>
   <h3>The Spectrum</h3>
   <p>At one extreme: Tolkien&rsquo;s Quenya, created over fifty years with no intention that anyone would speak it. At the other: Esperanto, created as quickly as possible with the sole intention that everyone would speak it. Between them lies every other conlang, each making a different trade-off between beauty and function.</p>
   <p>Peterson&rsquo;s Dothraki is instructive as a middle case. It must be <em>functional</em> (actors need to speak it on set) and <em>beautiful</em> (audiences need to believe a culture speaks it). It must have <em>enough</em> grammar and vocabulary for the show&rsquo;s needs, but it must also feel like a real language that extends beyond what the camera captures. This dual demand is what makes media conlanging a genuine art form.</p>
   <h3>Esolangs as Pure Art</h3>
   <p>Esoteric programming languages represent the far end of the art axis within the computational tradition. Brainfuck, Piet (programs that are images), and Shakespeare (programs that read as plays) are not meant to be used. They are meant to be appreciated, discussed, and marveled at &mdash; exactly like a Tolkien language, but in a different medium.</p>`,

  `<div class="detail-header"><div class="num">06</div><h2>Languages <em>Need</em> Speakers</h2></div>
   <h3>The Volapuk Lesson</h3>
   <p>Volapuk had 283 clubs, 25 periodicals, and 316 textbooks in 25 languages by 1889<sup class="fn"><a href="https://beinecke.library.yale.edu/article/rise-and-fall-volapuk">[5]</a><span class="tip"><a href="https://beinecke.library.yale.edu/article/rise-and-fall-volapuk" target="_blank">Beinecke Library: Rise and Fall of Volapuk &rarr;</a></span></sup> &mdash; a larger infrastructure than many natural minority languages. And it died within a few years, killed by a founder who refused to let his community evolve his language.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Johann_Martin_Schleyer">[12]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Johann_Martin_Schleyer" target="_blank">Wikipedia: Schleyer rejected Academy reforms &rarr;</a></span></sup></p>
   <p>Esperanto survived because Zamenhof explicitly relinquished control.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Esperanto">[11]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Esperanto" target="_blank">Wikipedia: Esperanto &mdash; Zamenhof published under pseudonym &rarr;</a></span></sup> Klingon survived because the Klingon Language Institute gave the community infrastructure.<sup class="fn"><a href="https://www.kli.org/">[13]</a><span class="tip"><a href="https://www.kli.org/" target="_blank">KLI: Founded 1992, certifies proficiency &rarr;</a></span></sup> Nicaraguan Sign Language thrived because no individual controlled it at all.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0405328101">[20]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0405328101" target="_blank">Senghas &amp; Coppola: Children Creating Language &rarr;</a></span></sup> The pattern is clear: languages need communities more than grammars, and communities need autonomy more than perfection.</p>
   <h3>The NSL Evidence</h3>
   <p>The strongest evidence comes from Nicaraguan Sign Language, where 50 deaf children created a language with no design, no instruction, and no external model. The first cohort produced a pidgin; the second cohort transformed it into a grammatically regular creole; subsequent cohorts added further complexity. This is the language instinct in action &mdash; and it proves that the most important ingredient in a language is a community that needs one.</p>`,

  `<div class="detail-header"><div class="num">07</div><h2>Language <em>Shapes</em> Thought</h2></div>
   <h3>The Evidence</h3>
   <p>Linguistic relativity is the thread connecting Tolkien (language generates narrative), Chiang (language restructures time perception), Boroditsky (language influences spatial and temporal cognition), and Iverson (notation shapes mathematical thought).</p>
   <p>The strongest empirical evidence comes from color perception: Russian speakers, whose language distinguishes light and dark blue as separate basic categories, discriminate between the two faster than English speakers.<sup class="fn"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104">[15]</a><span class="tip"><a href="https://www.pnas.org/doi/10.1073/pnas.0701644104" target="_blank">Winawer et al.: Russian blues (PNAS, 2007) &rarr;</a></span></sup> fMRI imaging confirms that language processing areas activate during the task. Mandarin speakers process temporal relationships differently from English speakers due to vertical vs. horizontal metaphors. Speakers of Kuuk Thaayorre maintain constant cardinal direction awareness.</p>
   <h3>The Computational Parallel</h3>
   <p>APL&rsquo;s Kenneth Iverson received the Turing Award for demonstrating that notation shapes thought about computation<sup class="fn"><a href="https://esolangs.org/wiki/Prehistory_of_esoteric_programming_languages">[21]</a><span class="tip"><a href="https://esolangs.org/wiki/Prehistory_of_esoteric_programming_languages" target="_blank">Esolang Wiki: APL as radical notation &rarr;</a></span></sup> &mdash; a direct application of the Sapir-Whorf hypothesis to programming. APL programmers think about arrays differently than C programmers. Haskell programmers think about composition differently than Python programmers. The Whorfian effect is real, even in formal languages.</p>`,

  `<div class="detail-header"><div class="num">08</div><h2><em>Five</em> Cross-Cutting Findings</h2></div>
   <h3>The Findings in Full</h3>
   <p><strong>1. The Control Paradox.</strong> Every conlang creator must decide who controls the language. Schleyer destroyed Volapuk by refusing to cede control. Zamenhof saved Esperanto by releasing it. Tolkien kept his private. Okrand gave Klingon to its fans. Peterson builds for studios. The tension is not resolvable &mdash; different purposes demand different ownership models.</p>
   <p><strong>2. Communities beat grammars.</strong> The most elaborate grammar means nothing without speakers. Volapuk had 283 clubs and died. Esperanto has simpler grammar and lives. NSL proves the inverse: give a community the need to communicate, and language emerges without anyone designing a grammar at all.</p>
   <p><strong>3. The Sapir-Whorf spectrum.</strong> Weak Whorf is well-supported: language influences perception and reasoning. Strong Whorf remains unsubstantiated but powerful as fiction. The spectrum applies to natural languages, constructed languages, and programming languages alike.</p>
   <p><strong>4. Natural vs. constructed is a false binary.</strong> NSL and ABSL are natural languages that emerged in observable time. Modern Hebrew was deliberately revived. Programming languages are constructed but evolve organically. The boundary between designed and emergent is not a line but a gradient.</p>
   <p><strong>5. Programming languages are the most successful conlangs.</strong> Python has more active users than Esperanto ever imagined. JavaScript grew beyond its original purpose as dramatically as Klingon grew beyond Star Trek. Regex is the Volapuk of programming: universally used and universally hated. The parallels are deep and underexplored.</p>
   <div class="callout"><h4>The Meta-Finding</h4><p>The same impulse &mdash; to build a language from scratch &mdash; produces wildly different results depending on purpose, community, and medium. What they share is the conviction that language is not merely found but can be made, and that making it reveals something essential about how communication works.</p></div>`
];

// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">C<em>L</em></div>

        <div class="hero-title">Constructed <em>Languages</em></div>

    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = '<span class="sidebar-num">' + sec.num + '</span><span class="sidebar-label">' + sec.short + '</span>';
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => { tipActive = false; sidebarTip.classList.remove('visible'); });
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const item = e.target.closest('.sidebar-item');
  if (!item) { if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); } return; }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = '<div class="s-num"><span>' + sec.num + '</span><button class="s-detail-btn" onclick="openDetail(' + idx + ')"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div><h2>' + sec.title + '</h2>' + summaries[idx];
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = 'detail-' + idx;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById('detail-' + idx).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) { closeRight(); } else { openDetail(lastDetailIdx); } }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Compact main header + sidebar scroll spy
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); }
  else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); }
});

// ESC closes detail panel
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>
<script>
(function(){
  var MP3 = 'overview.mp3';

  // 1. Inject CSS
  var css = document.createElement('style');
  css.textContent = `
    .audio-bar{display:flex;align-items:center;gap:10px;padding:10px 0 4px;margin-top:6px;max-height:50px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
    .main-head.compact .audio-bar{max-height:0;padding:0;opacity:0;margin:0;pointer-events:none}
    .audio-bar audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    [data-theme="dark"] .audio-bar audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
    .ctrl-btn.audio-ctrl{display:none;position:relative}
    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}
    .audio-bottom audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    .audio-bottom .audio-dismiss{cursor:pointer;color:var(--dim);font-size:13px;padding:4px 8px;border:none;background:none;font-family:var(--sans);letter-spacing:.5px;transition:color .2s}
    .audio-bottom .audio-dismiss:hover{color:var(--accent)}
    [data-theme="dark"] .audio-bottom audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = '<audio id="audio-main" controls preload="none" src="'+MP3+'"></audio>';
  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
