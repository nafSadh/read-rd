<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'Klingon', title: '<em>Klingon</em>: The Accidental Community' },
  { num: '02', short: 'Translator', title: 'The Universal <em>Translator</em> Problem' },
  { num: '03', short: 'Peterson', title: 'David Peterson: <em>Full-Time</em> Conlanger' },
  { num: '04', short: "Na'vi", title: "Na'vi: The Linguist's <em>Showcase</em>" },
  { num: '05', short: 'LCS', title: 'The Language Creation <em>Society</em>' },
  { num: '06', short: 'Hollywood', title: 'Why Hollywood <em>Hires</em> Conlangers' },
  { num: '07', short: 'Communities', title: 'The <em>Community</em> Phenomenon' },
  { num: '08', short: 'Consensus', title: 'Agreement &amp; <em>Debate</em>' }
];

const summaries = [
  `<p>Marc Okrand, a linguist with a PhD from UC Berkeley, was hired for Star Trek III (1984) to create authentic-sounding dialogue for the Klingon characters.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Marc_Okrand">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Marc_Okrand" target="_blank">Wikipedia: Marc Okrand &mdash; PhD linguistics, UC Berkeley &rarr;</a></span></sup> His design choices were deliberately counter-intuitive: OVS word order, unusual phoneme inventory, no copula.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">1984</div><div class="sl">year created</div></div>
    <div class="st"><div class="sv">OVS</div><div class="sl">word order</div></div>
    <div class="st"><div class="sv">20-30</div><div class="sl">fluent speakers</div></div>
  </div>
  <p>What nobody expected: fans learned it. By 1992, Dr. Lawrence Schoen founded the Klingon Language Institute (KLI).<sup class="fn"><a href="https://www.kli.org/">[2]</a><span class="tip"><a href="https://www.kli.org/" target="_blank">Klingon Language Institute &mdash; founded 1992 &rarr;</a></span></sup> Shakespeare&rsquo;s Hamlet and much of the Bible have been translated into Klingon.</p>`,

  `<p>Star Trek introduced a recurring narrative problem: if a universal translator exists, why bother creating alien languages? The franchise handled this inconsistently. The solution in later productions was to treat the alien language as a cultural marker rather than a communication barrier.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Klingon_language">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Klingon_language" target="_blank">Wikipedia: Klingon language &mdash; cultural identity function &rarr;</a></span></sup></p>
  <p>You speak Klingon not because you have to, but because it connects you to Klingon identity. This is the same dynamic that keeps Esperanto alive: community identity matters more than practical utility.</p>`,

  `<p>David Peterson&rsquo;s career represents a phase transition in the field.<sup class="fn"><a href="https://en.wikipedia.org/wiki/David_J._Peterson">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/David_J._Peterson" target="_blank">Wikipedia: Peterson &mdash; 40+ conlangs, only full-time conlanger &rarr;</a></span></sup> When HBO needed languages for Game of Thrones (2011), the Language Creation Society organized a competition. Peterson won with his Dothraki proposal.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">40+</div><div class="sl">conlangs created</div></div>
    <div class="st"><div class="sv">4,000+</div><div class="sl">Dothraki words</div></div>
    <div class="st"><div class="sv">2015</div><div class="sl">Art of Language Invention</div></div>
  </div>
  <p>Peterson builds languages that mirror how real human languages work &mdash; full morphological paradigms, naturalistic sound changes, systematic irregularity.<sup class="fn"><a href="https://ideas.ted.com/meet-the-person-who-created-dothraki-and-valyrian/">[5]</a><span class="tip"><a href="https://ideas.ted.com/meet-the-person-who-created-dothraki-and-valyrian/" target="_blank">TED Ideas: Meet Peterson, creator of Dothraki &rarr;</a></span></sup> His Valyrian family was directly inspired by Tolkien&rsquo;s approach: a proto-language with multiple daughter languages.</p>`,

  `<p>Paul Frommer, a linguist at USC, was hired by James Cameron to create Na&rsquo;vi for Avatar (2009).<sup class="fn"><a href="https://www.salon.com/2023/01/06/how-to-speak-navi/">[6]</a><span class="tip"><a href="https://www.salon.com/2023/01/06/how-to-speak-navi/" target="_blank">Salon: How to speak Na&rsquo;vi &mdash; Frommer&rsquo;s process &rarr;</a></span></sup> Cameron had already developed 30 Polynesian-inspired words and wanted the full language to feel unfamiliar but beautiful.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Ejective Consonants</h4><p>Sounds made by compressing air in the throat, common in non-European languages but startling to English speakers.</p></div>
    <div class="feat"><h4>Tripartite Case</h4><p>A rare alignment system where agents, patients, and intransitive subjects are all marked differently.</p></div>
    <div class="feat"><h4>Infix System</h4><p>Grammatical modifications inserted <em>inside</em> words, not just at beginning or end.</p></div>
    <div class="feat"><h4>Polynesian Phonology</h4><p>Open syllables, vowel clusters &mdash; designed to sound beautiful and organic.<sup class="fn"><a href="https://www.campfirewriting.com/learn/paul-frommer-navi-language">[7]</a><span class="tip"><a href="https://www.campfirewriting.com/learn/paul-frommer-navi-language" target="_blank">Campfire: Frommer on Na&rsquo;vi construction &rarr;</a></span></sup></p></div>
  </div>`,

  `<p>Founded in 2007, the Language Creation Society (LCS) is a 501(c)(3) nonprofit that organizes biennial conferences, connects conlangers with the entertainment industry, and hosts publications and resources.<sup class="fn"><a href="https://conlang.org/">[8]</a><span class="tip"><a href="https://conlang.org/" target="_blank">Language Creation Society &mdash; founded 2007, 13 board members &rarr;</a></span></sup></p>
  <p>The LCS represents the professionalization of conlanging. Before it, creating languages was a private hobby. Now it is a recognized field with institutional support, professional standards, and career paths. The LCS ran the competition that selected Peterson for Game of Thrones.</p>`,

const details = summaries.map(function(s, i) { return '<div class="detail-header"><div class="num">SECTION ' + sections[i].num + '</div><h2>' + sections[i].title + '</h2></div>' + s; });

document.addEventListener('DOMContentLoaded', function() {
  var sidebarNav = document.querySelector('.sidebar-nav');
  var mainScroll = document.querySelector('.main-scroll');
  var right = document.querySelector('.right');
  var rightInner = document.querySelector('.right-inner');
  var mainHead = document.querySelector('.main-head');
  sections.forEach(function(sec, idx) {
    var item = document.createElement('div');
    item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
    item.innerHTML = '<div class="sidebar-num">' + sec.num + '</div><div class="sidebar-label">' + sec.short + '</div>';
    item.addEventListener('click', function() { selectSection(idx); });
    sidebarNav.appendChild(item);
  });
  function selectSection(idx) {
    document.querySelectorAll('.sidebar-item').forEach(function(it) { it.classList.remove('active'); });
    document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
    var sec = sections[idx];
    mainHead.innerHTML = '<div class="main-head-inner"><div class="hero-badge"><span class="dot"></span>SECTION ' + sec.num + '</div><h1 class="hero-title">' + sec.title + '</h1><div class="masthead-rule"></div></div>';
    mainScroll.innerHTML = '<div class="main-scroll-inner">' + summaries[idx] + '</div>';
  }
  function showDetail(idx) { rightInner.innerHTML = details[idx]; right.classList.remove('closed'); document.body.classList.add('detail-open'); }
  document.querySelector('.detail-btn').addEventListener('click', function() {
    if (document.body.classList.contains('detail-open')) { right.classList.add('closed'); document.body.classList.remove('detail-open'); }
    else { var ai = Array.from(document.querySelectorAll('.sidebar-item')).findIndex(function(it) { return it.classList.contains('active'); }); showDetail(ai); }
  });
  document.querySelector('.theme-btn').addEventListener('click', function() { var c = document.body.getAttribute('data-theme') || 'light'; document.body.setAttribute('data-theme', c === 'light' ? 'dark' : 'light'); });
  mainScroll.addEventListener('scroll', function() { mainHead.classList.toggle('compact', this.scrollTop > 20); });
  selectSection(0);
});
