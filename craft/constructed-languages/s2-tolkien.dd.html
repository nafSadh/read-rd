<script>
const sections = [
  { num: '01', short: 'Languages First', title: 'Languages <em>First</em>, Stories Second' },
  { num: '02', short: 'Quenya', title: '<em>Quenya</em>: The Finnish Connection' },
  { num: '03', short: 'Sindarin', title: '<em>Sindarin</em>: The Welsh Inspiration' },
  { num: '04', short: 'Family Tree', title: 'The <em>Family</em> Tree' },
  { num: '05', short: 'Scripts', title: 'Tengwar &amp; <em>Cirth</em>' },
  { num: '06', short: 'Depth', title: '<em>Depth</em> Without Limit' },
  { num: '07', short: 'Legacy', title: 'The Lesson for <em>Conlanging</em>' },
  { num: '08', short: 'Consensus', title: 'Agreement &amp; <em>Debate</em>' }
];

const summaries = [
  `<p>The single most important fact about Tolkien&rsquo;s creative process: the languages came first.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Languages_constructed_by_J._R._R._Tolkien" target="_blank">Wikipedia: Languages constructed by Tolkien &rarr;</a></span></sup> Middle-earth exists <em>because of</em> the languages. Quenya and Sindarin required speakers, history, migrations, wars, and cultural divisions to explain why they diverged from a common ancestor.</p>
  <p>Tolkien began inventing languages as a child, inspired by encountering Gothic, Finnish, and Welsh.<sup class="fn"><a href="https://www.multilingualmagazine.com/j-r-r-tolkiens-life-in-languages/">[2]</a><span class="tip"><a href="https://www.multilingualmagazine.com/j-r-r-tolkiens-life-in-languages/" target="_blank">Multilingual Magazine: J.R.R. Tolkien&rsquo;s Life in Languages &rarr;</a></span></sup> He was a professional philologist &mdash; a specialist in Old English at Oxford &mdash; and brought his professional tools to his hobby.</p>
  <div class="callout"><h4>Tension T1: Art vs. Utility</h4><p>Tolkien&rsquo;s languages represent the purest art end of the conlang spectrum. They were never meant to be spoken by real communities. They existed for their beauty and for the narrative world they generated.</p></div>`,

  `<p>Quenya, the High Elvish language, draws its aesthetic inspiration from Finnish.<sup class="fn"><a href="https://www.oxfordopenlearning.com/how-j-r-r-tolkien-built-a-language/">[3]</a><span class="tip"><a href="https://www.oxfordopenlearning.com/how-j-r-r-tolkien-built-a-language/" target="_blank">Oxford Open Learning: How Tolkien Built a Language &rarr;</a></span></sup> Key parallels: agglutinative morphology, vowel harmony aesthetics, and prevalence of liquid consonants.</p>
  <div class="s-stat">
    <div class="st"><div class="sv">10</div><div class="sl">grammatical cases</div></div>
    <div class="st"><div class="sv">Finnish</div><div class="sl">primary inspiration</div></div>
    <div class="st"><div class="sv">Archaic</div><div class="sl">register in Middle-earth</div></div>
  </div>
  <p>Quenya functions as an archaic, literary language in Middle-earth &mdash; analogous to Latin in medieval Europe. It is the language of lore, ceremony, and high poetry.</p>`,

  `<p>Sindarin, the language of the Grey Elves, takes its phonological character from Welsh.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Elvish_languages_of_Middle-earth">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Elvish_languages_of_Middle-earth" target="_blank">Wikipedia: Elvish languages &mdash; Sindarin from Common Telerin &rarr;</a></span></sup> Key features include consonant mutation (directly inspired by Welsh lenition), distinctive dh/th/ch sounds, and fusional morphology.</p>
  <p>Sindarin is the &ldquo;living&rdquo; Elvish language of the Third Age &mdash; what elves actually speak day to day. Its relationship to Quenya mirrors the historical relationship of Welsh to Latin.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Consonant Mutation</h4><p>Initial consonants change depending on grammatical context: soft, nasal, and mixed mutation &mdash; directly from Welsh.</p></div>
    <div class="feat"><h4>Fusional Morphology</h4><p>Unlike Quenya&rsquo;s agglutination, Sindarin changes word forms through internal modification.</p></div>
  </div>`,

  `<p>Tolkien used the tools of real comparative philology to construct his language family.<sup class="fn"><a href="https://www.tolkienestate.com/writing/languages-scripts/">[5]</a><span class="tip"><a href="https://www.tolkienestate.com/writing/languages-scripts/" target="_blank">Tolkien Estate: Hostetter on Tolkien&rsquo;s linguistic methodology &rarr;</a></span></sup> From Primitive Quendian through Common Eldarin to Quenya, Sindarin, Telerin, and Avarin &mdash; for each branch, Tolkien specified sound changes, morphological innovations, borrowings, and dialectal variation.</p>
  <div class="diagram-wrap"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <text x="200" y="18" text-anchor="middle" font-size="10" class="lbl" letter-spacing="1.5" style="font-size:10px">TOLKIEN&rsquo;S LANGUAGE FAMILY TREE</text>
    <rect x="140" y="30" width="120" height="24" rx="3" class="node-hi"/><text x="200" y="46" text-anchor="middle" class="node-text" style="font-size:11px">Primitive Quendian</text>
    <line x1="170" y1="54" x2="120" y2="80" class="edge-hi"/><line x1="230" y1="54" x2="280" y2="80" class="edge"/>
    <rect x="60" y="80" width="120" height="24" rx="3" class="node-hi"/><text x="120" y="96" text-anchor="middle" class="node-text" style="font-size:11px">Common Eldarin</text>
    <rect x="240" y="80" width="80" height="24" rx="3" class="node"/><text x="280" y="96" text-anchor="middle" class="node-text" style="font-size:11px">Avarin</text>
    <line x1="90" y1="104" x2="60" y2="130" class="edge-hi"/><line x1="120" y1="104" x2="170" y2="130" class="edge"/><line x1="150" y1="104" x2="260" y2="130" class="edge"/>
    <rect x="20" y="130" width="80" height="24" rx="3" class="node-hi"/><text x="60" y="146" text-anchor="middle" class="node-text" style="font-size:11px">Quenya</text>
    <rect x="130" y="130" width="80" height="24" rx="3" class="node"/><text x="170" y="146" text-anchor="middle" class="node-text" style="font-size:11px">Telerin</text>
    <rect x="220" y="130" width="80" height="24" rx="3" class="node-hi"/><text x="260" y="146" text-anchor="middle" class="node-text" style="font-size:11px">Sindarin</text>
    <text x="60" y="170" text-anchor="middle" class="node-sub" style="font-size:9px">Finnish-inspired</text>
    <text x="260" y="170" text-anchor="middle" class="node-sub" style="font-size:9px">Welsh-inspired</text>
  </svg></div>`,

  `<p><strong>Tengwar</strong> is a featural writing system where the shape of each letter encodes phonetic information.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Tengwar">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Tengwar" target="_blank">Wikipedia: Tengwar &mdash; featural script by fictional F&euml;anor &rarr;</a></span></sup> Letters for dental sounds share one shape family, velars another. The system has multiple &ldquo;modes&rdquo; for different languages.</p>
  <p><strong>Cirth</strong> (the Runic script) was designed for carving in stone or wood, as historical runes were.<sup class="fn"><a href="https://www.tolkienestate.com/writing/languages-scripts/">[7]</a><span class="tip"><a href="https://www.tolkienestate.com/writing/languages-scripts/" target="_blank">Tolkien Estate: Arden Smith on Writing Systems &rarr;</a></span></sup> More angular than Tengwar, with simpler strokes. Used primarily by Dwarves.</p>`,

  `<p>What distinguishes Tolkien&rsquo;s languages from other conlangs is depth.<sup class="fn"><a href="https://www.academia.edu/tolkiens-linguistics-artificial-languages-quenya">[8]</a><span class="tip"><a href="https://www.academia.edu/tolkiens-linguistics-artificial-languages-quenya" target="_blank">Coker (NCUR): Tolkien&rsquo;s Linguistics &mdash; full morphological paradigms &rarr;</a></span></sup> Most constructed languages create enough grammar for their purpose. Tolkien created full etymological histories, dialectal variation, register differences, poetry in multiple meters, and internal documents written <em>in</em> the languages.</p>
  <p>His languages were never &ldquo;finished&rdquo; because he kept revising them. New ideas about phonology would cascade through the entire system. The languages were, like natural languages, always in flux.</p>`,

  `<p>Tolkien demonstrated that a constructed language could have the depth, beauty, and internal consistency of a natural language. His key innovations:</p>
  <ul class="s-list pro">
    <li><strong>Diachronic construction:</strong> Building not just a language but its <em>history</em> &mdash; sound changes, borrowings, dialectal splits</li>
    <li><strong>Narrative integration:</strong> Language and story reinforcing each other</li>
    <li><strong>Aesthetic primacy:</strong> The sound and feel of a language mattering as much as its grammar</li>
    <li><strong>Professional rigor:</strong> Applying real linguistic methods, not amateur improvisation</li>
  </ul>
  <p>No conlanger since has approached Tolkien&rsquo;s diachronic depth. Peterson and Frommer produce linguistically sophisticated languages for media, but they work under deadlines and budgets. Tolkien had fifty years.</p>`,

  `<div class="verdict">
    <div class="v-col pro"><h4>Sources Agree</h4><ul>
      <li>Tolkien&rsquo;s languages preceded and generated his fiction</li>
      <li>Finnish inspired Quenya; Welsh inspired Sindarin</li>
      <li>Professional philological training was essential</li>
      <li>The depth is unprecedented in conlang history</li>
      <li>Tengwar is a genuinely innovative writing system</li>
    </ul></div>
    <div class="v-col con"><h4>Sources Disagree</h4><ul>
      <li>Whether Tolkien&rsquo;s languages are &ldquo;complete&rdquo; enough for real conversation</li>
      <li>Whether constant revision was a feature or limitation</li>
      <li>How much unpublished material represents final intent vs. abandoned experiments</li>
    </ul></div>
  </div>`
];

const details = summaries.map(function(s, i) { return '<div class="detail-header"><div class="num">SECTION ' + sections[i].num + '</div><h2>' + sections[i].title + '</h2></div>' + s; });

document.addEventListener('DOMContentLoaded', function() {
  var sidebarNav = document.querySelector('.sidebar-nav');
  var mainScroll = document.querySelector('.main-scroll');
  var right = document.querySelector('.right');
  var rightInner = document.querySelector('.right-inner');
  var mainHead = document.querySelector('.main-head');

  sections.forEach(function(sec, idx) {
    var item = document.createElement('div');
    item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
    item.innerHTML = '<div class="sidebar-num">' + sec.num + '</div><div class="sidebar-label">' + sec.short + '</div>';
    item.addEventListener('click', function() { selectSection(idx); });
    sidebarNav.appendChild(item);
  });

  function selectSection(idx) {
    document.querySelectorAll('.sidebar-item').forEach(function(it) { it.classList.remove('active'); });
    document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
    var sec = sections[idx];
    mainHead.innerHTML = '<div class="main-head-inner"><div class="hero-badge"><span class="dot"></span>SECTION ' + sec.num + '</div><h1 class="hero-title">' + sec.title + '</h1><div class="masthead-rule"></div></div>';
    mainScroll.innerHTML = '<div class="main-scroll-inner">' + summaries[idx] + '</div>';
  }

  function showDetail(idx) {
    rightInner.innerHTML = details[idx];
    right.classList.remove('closed');
    document.body.classList.add('detail-open');
  }

  document.querySelector('.detail-btn').addEventListener('click', function() {
    if (document.body.classList.contains('detail-open')) {
      right.classList.add('closed');
      document.body.classList.remove('detail-open');
    } else {
      var activeIdx = Array.from(document.querySelectorAll('.sidebar-item')).findIndex(function(it) { return it.classList.contains('active'); });
      showDetail(activeIdx);
    }
  });

  document.querySelector('.theme-btn').addEventListener('click', function() {
    var current = document.body.getAttribute('data-theme') || 'light';
    document.body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  });

  mainScroll.addEventListener('scroll', function() {
    mainHead.classList.toggle('compact', this.scrollTop > 20);
  });

  selectSection(0);
});
</script>
