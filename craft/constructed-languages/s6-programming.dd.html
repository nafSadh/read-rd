<script>
const sections = [
  { num: '01', short: 'Code as Conlang', title: 'Code as <em>Constructed</em> Language' },
  { num: '02', short: 'APL', title: 'APL: <em>Radical</em> Notation' },
  { num: '03', short: 'Brainfuck', title: 'Brainfuck: <em>Minimalism</em> as Art' },
  { num: '04', short: 'Esolangs', title: 'The <em>Esoteric</em> Language Tradition' },
  { num: '05', short: 'Dijkstra', title: 'Dijkstra vs. <em>Natural</em> Language Programming' },
  { num: '06', short: 'Parallels', title: 'Programming Communities <em>Mirror</em> Conlang Communities' },
  { num: '07', short: 'Regex', title: 'Regex: The <em>Worst</em> Conlang Ever' },
  { num: '08', short: 'Consensus', title: 'Agreement &amp; <em>Debate</em>' }
];

const summaries = [
  `<p>Programming languages are, by any reasonable definition, constructed languages. They are formal systems designed to express meaning in a structured notation. They have syntax, semantics, and pragmatics. They are learned, they form communities, and they evolve over time.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Esoteric_programming_language">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Esoteric_programming_language" target="_blank">Wikipedia: Esoteric programming language &rarr;</a></span></sup></p>
  <p>Yet the conlang and programming language communities rarely recognize each other. Both are engaged in the same fundamental activity: designing formal systems for expressing meaning. The design challenges are remarkably similar: balancing expressiveness with learnability, handling ambiguity, building communities of users.</p>`,

  `<p>Kenneth Iverson&rsquo;s APL (1962) is arguably the most conlang-like programming language ever created. It uses a unique character set that looks nothing like conventional mathematics or programming.<sup class="fn"><a href="https://esolangs.org/wiki/Prehistory_of_esoteric_programming_languages">[2]</a><span class="tip"><a href="https://esolangs.org/wiki/Prehistory_of_esoteric_programming_languages" target="_blank">Esolang Wiki: APL as radical notation &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">1962</div><div class="sl">published</div></div>
    <div class="st"><div class="sv">1979</div><div class="sl">Turing Award</div></div>
    <div class="st"><div class="sv">R&rarr;L</div><div class="sl">evaluation order</div></div>
  </div>
  <p>Iverson received the Turing Award in 1979. His lecture was titled &ldquo;Notation as a Tool of Thought&rdquo; &mdash; a direct engagement with the Sapir-Whorf hypothesis applied to programming. His argument: the notation you use shapes how you think about problems. APL&rsquo;s array notation makes certain mathematical insights visible that procedural languages obscure.</p>
  <div class="callout"><h4>Tension T5: Formal vs. Natural Notation</h4><p>APL proves that notation shapes thought. Its radical departure from conventional syntax changed how programmers think about computation &mdash; the strongest evidence for linguistic relativity in the computational domain.</p></div>`,

  `<p>Urban M&uuml;ller created Brainfuck in 1993 with a single goal: the smallest possible compiler. The entire language has eight commands: <code>&gt; &lt; + - . , [ ]</code><sup class="fn"><a href="https://en.wikipedia.org/wiki/Brainfuck">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Brainfuck" target="_blank">Wikipedia: Brainfuck &mdash; 8 commands, Turing-complete (1993) &rarr;</a></span></sup></p>
  <div class="s-stat">
    <div class="st"><div class="sv">8</div><div class="sl">total commands</div></div>
    <div class="st"><div class="sv">1993</div><div class="sl">year created</div></div>
    <div class="st"><div class="sv">Yes</div><div class="sl">Turing-complete</div></div>
  </div>
  <p>Brainfuck is the purest demonstration that a Turing-complete language can be almost impossibly minimal. It is a reductio ad absurdum of language design. But it is more than a joke &mdash; it is used to teach computational theory and is, arguably, art.<sup class="fn"><a href="https://theoutline.com/post/brainfuck-code-designed-to-hurt">[4]</a><span class="tip"><a href="https://theoutline.com/post/brainfuck-code-designed-to-hurt" target="_blank">The Outline: Brainfuck &mdash; code designed to hurt &rarr;</a></span></sup></p>
  <div class="callout"><h4>Tension T6: Minimalism vs. Richness</h4><p>Brainfuck (8 commands, Turing-complete) vs. Tolkien&rsquo;s Quenya (thousands of words, full etymology). Both are valid expressions of language as art &mdash; at opposite extremes of the same creative impulse.</p></div>`,

  `<p>INTERCAL (1972) was the first esoteric programming language, parodying FORTRAN, COBOL, and APL. The esolang tradition that followed includes:</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-date">1972</div><div class="tl-text">INTERCAL &mdash; first esolang, requires &ldquo;PLEASE&rdquo; occasionally or refuses to compile</div></div>
    <div class="tl-item"><div class="tl-date">1993</div><div class="tl-text">Befunge &mdash; programs on a 2D grid, execution in any direction</div></div>
    <div class="tl-item"><div class="tl-date">2001</div><div class="tl-text">Shakespeare &mdash; programs look like Shakespeare plays</div></div>
    <div class="tl-item"><div class="tl-date">2001</div><div class="tl-text">Piet &mdash; programs are bitmap images; colors encode operations</div></div>
    <div class="tl-item"><div class="tl-date">2003</div><div class="tl-text">Whitespace &mdash; only whitespace characters are meaningful</div></div>
    <div class="tl-item"><div class="tl-date">2007</div><div class="tl-text">LOLCODE &mdash; programs written in internet cat speak<sup class="fn"><a href="https://esolangs.org/wiki/Timeline_of_esoteric_programming_languages">[5]</a><span class="tip"><a href="https://esolangs.org/wiki/Timeline_of_esoteric_programming_languages" target="_blank">Esolang Wiki: Timeline of esolangs &rarr;</a></span></sup></div></div>
  </div>
  <p>Over 1,000 esolangs are documented. They form a community that parallels the conlang community: hobbyist creators, shared design challenges, aesthetic standards, and appreciation for the art of language design itself.<sup class="fn"><a href="https://awwsmm.com/blog/20-intriguing-unusual-and-goofy-programming-languages">[6]</a><span class="tip"><a href="https://awwsmm.com/blog/20-intriguing-unusual-and-goofy-programming-languages" target="_blank">AWWSmm: 20 Intriguing, Unusual, and Goofy Programming Languages &rarr;</a></span></sup></p>`,

  `<p>In 1978, Edsger Dijkstra wrote &ldquo;On the foolishness of &lsquo;natural language programming&rsquo;&rdquo; (EWD 667).<sup class="fn"><a href="https://www.cs.utexas.edu/users/EWD/ewd06xx/EWD667.PDF">[7]</a><span class="tip"><a href="https://www.cs.utexas.edu/users/EWD/ewd06xx/EWD667.PDF" target="_blank">Dijkstra EWD 667: Formal symbolism is essential (1978) &rarr;</a></span></sup> His argument: formal symbolism is essential to precise thought. Greek mathematics stalled because it was verbal. Modern science emerged via formal notation.</p>
  <p>Then came LLMs. In 2025&ndash;2026, people write code by describing what they want in English. Marc Brooker&rsquo;s response to Dijkstra: LLMs have made natural language programming partially successful.<sup class="fn"><a href="https://brooker.co.za/blog/2025/01/natural-language-programming.html">[8]</a><span class="tip"><a href="https://brooker.co.za/blog/2025/01/natural-language-programming.html" target="_blank">Brooker: On the success of natural language programming (2025) &rarr;</a></span></sup> But formal languages remain necessary for precision, verification, and debugging.</p>
  <div class="feat-grid">
    <div class="feat"><h4>Dijkstra&rsquo;s Position</h4><p>Formalism is the point. Programming languages should be as <em>unlike</em> natural language as possible. Ambiguity is the enemy.</p></div>
    <div class="feat"><h4>The LLM Response</h4><p>Natural language programming works now &mdash; partially. But formal languages remain essential for precision. Both are right.</p></div>
  </div>`,

  `<p>The structural parallels between conlang and programming language communities are striking:</p>
  <div class="feat-grid">
    <div class="feat"><h4>Esperanto &harr; Python</h4><p>Utility-focused, community-driven. Both survived through strong community identity rather than technical superiority alone.</p></div>
    <div class="feat"><h4>Quenya &harr; Haskell</h4><p>Mathematically beautiful, intellectually deep. Both prioritize elegance over accessibility.</p></div>
    <div class="feat"><h4>Klingon &harr; JavaScript</h4><p>Both grew wildly beyond their original purpose. Neither was designed to do what it now does.</p></div>
    <div class="feat"><h4>Volapuk &harr; Governance Failures</h4><p>Languages destroyed by founder control. The pattern recurs in both domains.</p></div>
    <div class="feat"><h4>Brainfuck &harr; Brainfuck</h4><p>It is literally both &mdash; a constructed language and a programming language. The purest overlap.</p></div>
    <div class="feat"><h4>Lojban &harr; Prolog</h4><p>Logical, designed to shape thinking. Both have small but fiercely dedicated communities.</p></div>
  </div>`,

  `<p>Regular expressions deserve special mention as a constructed language that is universally used, widely criticized, syntactically dense to the point of being write-only, learned by memorizing arcane symbols, and essential despite its poor readability.</p>
  <p>Regex is the Volapuk of programming: it works, but its users widely acknowledge its deficiencies. It evolved from theoretical computer science (regular languages in the Chomsky hierarchy) through Unix tools into a practical but notoriously opaque notation. Billions of lines of code depend on it, yet few practitioners would advocate its syntax as a model for new language design.</p>`,

  `<div class="verdict">
    <div class="v-col pro"><h4>Sources Agree</h4><ul>
      <li>Programming languages are designed formal systems with syntax and semantics</li>
      <li>APL demonstrates that notation genuinely shapes thought</li>
      <li>Esolangs parallel the conlang tradition as creative language design</li>
      <li>The natural language programming debate has been transformed by LLMs</li>
      <li>Programming communities mirror conlang communities structurally</li>
    </ul></div>
    <div class="v-col con"><h4>Sources Disagree</h4><ul>
      <li>Whether programming languages are &ldquo;really&rdquo; languages in the linguistic sense</li>
      <li>Whether Dijkstra&rsquo;s argument has been refuted by LLMs</li>
      <li>Whether esolangs are art, humor, pedagogy, or all three</li>
      <li>Whether the conlang&ndash;programming parallel is deep or superficial</li>
    </ul></div>
  </div>
  <div class="callout"><h4>Cross-Cutting Finding #5</h4><p>Programming languages are the most successful constructed languages ever created. By any measure &mdash; speakers, utility, economic impact &mdash; Python dwarfs Esperanto. Yet the two communities rarely talk. Both are engaged in the same fundamental activity: designing formal systems for expressing meaning.</p></div>`
];
