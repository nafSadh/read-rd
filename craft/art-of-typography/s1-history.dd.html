<script>
const sections = [
  { num: '01', short: 'Overview', title: 'A <em>Brief</em> History of Type' },
  { num: '02', short: 'Gutenberg', title: 'The <em>Gutenberg</em> System' },
  { num: '03', short: 'Renaissance', title: '<em>Manutius</em> &amp; the Portable Book' },
  { num: '04', short: 'Enlightenment', title: '<em>Caslon</em>, Baskerville, Bodoni' },
  { num: '05', short: 'Industrial', title: 'The <em>Display</em> Type Explosion' },

  { num: '08', short: 'Web Era', title: '<em>Web</em> Fonts &amp; Beyond' }
];

const summaries = [
  `<p>580 years separate Gutenberg&rsquo;s workshop from Google Fonts, but the through-line is constant: every revolution in how letterforms are made changes what is said with them. Movable type made the Reformation possible. Italic made books portable. The Industrial Revolution turned type into advertising. The Macintosh turned everyone into a typographer.</p>
   <p>This section traces seven turning points, each a collision between technology, aesthetics, and economics that reshaped how civilization communicates.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">~1450</div><div class="sl">Gutenberg&rsquo;s press</div></div>
     <div class="st"><div class="sv">1501</div><div class="sl">First italic type</div></div>
     <div class="st"><div class="sv">1816</div><div class="sl">First sans-serif</div></div>
     <div class="st"><div class="sv">1985</div><div class="sl">DTP revolution</div></div>
     <div class="st"><div class="sv">2010</div><div class="sl">Google Fonts launch</div></div>
   </div>`,

  `<p>Gutenberg&rsquo;s innovation was not movable type alone &mdash; Bi Sheng had ceramic movable type in China around 1040.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Movable_type">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Movable_type" target="_blank">Wikipedia: Movable Type &rarr;</a></span></sup> What Gutenberg created was a <em>system</em>: a metal alloy of lead, tin, and antimony that held precise shape through thousands of impressions; a hand mould for consistent, repeatable casting; oil-based ink that adhered to metal; and a press adapted from the wine industry.<sup class="fn"><a href="https://fontfabric.com/gutenbergs-typeface/">[2]</a><span class="tip"><a href="https://fontfabric.com/gutenbergs-typeface/" target="_blank">Fontfabric: Gutenberg&rsquo;s Typeface &rarr;</a></span></sup></p>
   <p>The 42-line Bible (1455) required approximately 2,500 individual type pieces per page. 180 copies were printed. By 1500, twenty million volumes had been printed across Europe.<sup class="fn"><a href="https://typeforyou.com/history-of-typography/">[3]</a><span class="tip"><a href="https://typeforyou.com/history-of-typography/" target="_blank">TypeForYou: History of Typography &rarr;</a></span></sup> The alloy Gutenberg invented remained the industry standard for 550 years.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">2,500</div><div class="sl">Type pieces per page</div></div>
     <div class="st"><div class="sv">180</div><div class="sl">Bible copies</div></div>
     <div class="st"><div class="sv">20M</div><div class="sl">Volumes by 1500</div></div>
     <div class="st"><div class="sv">550</div><div class="sl">Years alloy used</div></div>
   </div>`,

  `<p>Aldus Manutius moved to Venice in 1490 and within a decade had invented the pocket book.<sup class="fn"><a href="https://www.smithsonianmag.com/innovation/man-who-changed-way-we-read-forever-180970475/">[4]</a><span class="tip"><a href="https://www.smithsonianmag.com/innovation/man-who-changed-way-we-read-forever-180970475/" target="_blank">Smithsonian: The Man Who Changed Reading Forever &rarr;</a></span></sup> His octavo format made books lighter and cheaper &mdash; for the first time, books left the lectern. Francesco Griffo&rsquo;s italic type (1501), based on Niccoli&rsquo;s humanist cursive from the 1420s,<sup class="fn"><a href="https://www.semiovox.com/classics/aldine-italic/">[5]</a><span class="tip"><a href="https://www.semiovox.com/classics/aldine-italic/" target="_blank">Semiovox: Aldine Italic &rarr;</a></span></sup> compressed text to fit more words per page. The Virgil of 1501 was the first book entirely set in italic.</p>
   <p>Manutius also standardized punctuation &mdash; the comma and semicolon as we know them trace to his press. The Aldine Press produced over 100 editions between 1495 and 1505, predominantly Greek and Latin classics.</p>`,

  `<p>Three typefaces trace the Enlightenment&rsquo;s aesthetic arc across 76 years.<sup class="fn"><a href="https://www.toptal.com/designers/ui/history-of-fonts">[6]</a><span class="tip"><a href="https://www.toptal.com/designers/ui/history-of-fonts" target="_blank">Toptal: History of Fonts Timeline &rarr;</a></span></sup> <strong>Caslon</strong> (1722): sturdy, practical, warm &mdash; &ldquo;old style&rdquo; with gentle irregularities based on Dutch models. Used for the US Declaration of Independence. <strong>Baskerville</strong> (1757): &ldquo;transitional&rdquo; &mdash; more vertical axis, sharper serifs, higher stroke contrast. A bridge between craft and engineering. <strong>Bodoni</strong> (1798): &ldquo;modern&rdquo; &mdash; extreme thick-thin contrast, hairline serifs, geometric precision.</p>
   <p>The progression traded warmth for rationality, organicism for geometry, irregularity for perfection. Each step mirrored the Enlightenment&rsquo;s own trajectory.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1722</div><div class="sl">Caslon (Old Style)</div></div>
     <div class="st"><div class="sv">1757</div><div class="sl">Baskerville (Transitional)</div></div>
     <div class="st"><div class="sv">1798</div><div class="sl">Bodoni (Modern)</div></div>
   </div>`,

  `<p>The Industrial Revolution turned typography from a craft serving literature into an industry serving commerce. Darius Wells&rsquo;s lateral router (1827) made cheap wood type possible &mdash; half the cost of metal and available in sizes metal couldn&rsquo;t reach. A single poster from the 1850s might mix fat faces, slab serifs, sans-serifs, outlined, shadowed, and ornamental scripts all on one sheet.</p>
   <p>Robert Thorne and William Thorowgood created &ldquo;fat faces&rdquo; around 1803. Vincent Figgins launched slab serifs in 1810. William Caslon IV introduced the first known sans-serif in 1816. Typography became advertising.</p>
   <div class="chips">
     <span class="chip">fat face</span><span class="chip">slab serif</span><span class="chip">sans-serif</span><span class="chip">wood type</span><span class="chip">ornamental</span><span class="chip">outlined</span><span class="chip">shadowed</span><span class="chip">condensed</span><span class="chip">expanded</span>
   </div>`,

  `<p>Jan Tschichold&rsquo;s <em>Die Neue Typographie</em> (1928) declared that sans-serif was the type of the present day. Herbert Bayer&rsquo;s Universal Alphabet (1925) proposed a single-case, geometrically constructed alphabet &mdash; lowercase only &mdash; arguing that two alphabets doubled complexity for no benefit. Paul Renner&rsquo;s Futura (1927) gave geometric modernism its definitive typeface.</p>
   <p>The Swiss International Style (1950s-60s) formalized these ideas: mathematical grids, asymmetric layouts, sans-serif type, photography over illustration, flush left/ragged right text.<sup class="fn"><a href="https://en.wikipedia.org/wiki/International_Typographic_Style">[7]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/International_Typographic_Style" target="_blank">Wikipedia: International Typographic Style &rarr;</a></span></sup> Helvetica (1957) became its physical expression.</p>`,

  `<p>Three technologies converged in 1984&ndash;85 to transform typography forever. The Apple Macintosh (January 1984) with WYSIWYG display and Susan Kare&rsquo;s bitmap fonts. The Apple LaserWriter (January 1985) with PostScript-enabled 300dpi output. Aldus PageMaker (July 1985), the first desktop publishing software. Paul Brainerd coined the term &ldquo;desktop publishing.&rdquo;</p>
   <p>A $7,000 setup replaced typesetting systems costing $100,000 or more.<sup class="fn"><a href="https://www.computerhistory.org/revolution/digital-logic/12/330">[9]</a><span class="tip"><a href="https://www.computerhistory.org/revolution/digital-logic/12/330" target="_blank">Computer History Museum: Desktop Publishing &rarr;</a></span></sup> Designers gained direct control over every letter. Non-designers also gained control. The results were not always pretty.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">$7K</div><div class="sl">DTP setup cost</div></div>
     <div class="st"><div class="sv">$100K+</div><div class="sl">Replaced equipment</div></div>
     <div class="st"><div class="sv">300dpi</div><div class="sl">LaserWriter output</div></div>
   </div>`,

  `<p>Before 2010, web designers had approximately twelve &ldquo;web-safe&rdquo; fonts. CSS <code>@font-face</code> changed the technical constraint, and Google Fonts removed the economic one.<sup class="fn"><a href="https://devstars.com/2026-website-fonts-guide/">[8]</a><span class="tip"><a href="https://devstars.com/2026-website-fonts-guide/" target="_blank">DevStars: 2026 Website Fonts Guide &rarr;</a></span></sup> Launched in 2010, Google Fonts now offers 1,500+ free families and has delivered 70+ trillion total font serves.</p>
   <p>Variable fonts (2016) brought multiple weights and widths into a single file.<sup class="fn"><a href="https://inkbotdesign.com/variable-fonts/">[10]</a><span class="tip"><a href="https://inkbotdesign.com/variable-fonts/" target="_blank">Inkbot Design: Variable Fonts Explained &rarr;</a></span></sup> CSS <code>clamp()</code> enabled fluid typography without media queries. In 2026, the constraint on typography is no longer technology or cost &mdash; it is knowledge and taste.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">~12</div><div class="sl">Web-safe fonts pre-2010</div></div>
     <div class="st"><div class="sv">1,500+</div><div class="sl">Google Fonts families</div></div>
     <div class="st"><div class="sv">70T+</div><div class="sl">Total font serves</div></div>
   </div>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2>A <em>Brief</em> History of Type</h2></div>
   <p>The history of typography is not a smooth continuum but a series of ruptures &mdash; moments where a new technology collided with a cultural need and everything changed. Each rupture shares a pattern: an invention makes reproduction cheaper and faster, which expands who can participate in making and consuming text, which changes the culture of communication itself.</p>
   <h3>Why This History Matters</h3>
   <p>Understanding the arc from Gutenberg to Google Fonts is not antiquarian nostalgia. Every decision a designer makes today &mdash; serif vs sans-serif, tight tracking vs loose, display type vs body type &mdash; echoes a historical debate. The modernist preference for sans-serif was a <em>political</em> position, not just an aesthetic one. The desktop publishing revolution created the conditions for both typographic democracy and typographic chaos. The choices made by Miedinger in 1957 or Carson in 1992 are still being litigated every time someone opens a font menu.</p>

     <rect x="0" y="0" width="500" height="280" fill="rgba(0,0,0,0.02)" rx="4"/>
     <text x="250" y="20" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">TIMELINE: 580 YEARS OF TYPE</text>
     <line x1="30" y1="32" x2="470" y2="32" stroke="currentColor" stroke-width="0.5" class="edge"/>
     <line x1="50" y1="50" x2="50" y2="260" class="edge-hi" stroke-width="1"/>
     <circle cx="50" cy="60" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="58" class="lbl-hi" font-size="9" style="font-size:9px">~1450</text><text x="62" y="70" class="lbl" font-size="9" style="font-size:9px">Gutenberg&rsquo;s movable type system</text>
     <circle cx="50" cy="95" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="93" class="lbl-hi" font-size="9" style="font-size:9px">1501</text><text x="62" y="105" class="lbl" font-size="9" style="font-size:9px">Manutius/Griffo italic, portable octavo</text>
     <circle cx="50" cy="130" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="128" class="lbl-hi" font-size="9" style="font-size:9px">1722-1798</text><text x="62" y="140" class="lbl" font-size="9" style="font-size:9px">Caslon &rarr; Baskerville &rarr; Bodoni</text>
     <circle cx="50" cy="165" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="163" class="lbl-hi" font-size="9" style="font-size:9px">1816-1886</text><text x="62" y="175" class="lbl" font-size="9" style="font-size:9px">Sans-serif, wood type, Linotype machine</text>
     <circle cx="50" cy="200" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="198" class="lbl-hi" font-size="9" style="font-size:9px">1925-1957</text><text x="62" y="210" class="lbl" font-size="9" style="font-size:9px">Bauhaus, Tschichold, Swiss Style, Helvetica</text>
     <circle cx="50" cy="235" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="233" class="lbl-hi" font-size="9" style="font-size:9px">1984-1985</text><text x="62" y="245" class="lbl" font-size="9" style="font-size:9px">Mac + LaserWriter + PageMaker = DTP</text>
     <circle cx="50" cy="260" r="4" class="node-hi" fill="var(--accent)"/><text x="62" y="258" class="lbl-hi" font-size="9" style="font-size:9px">2010-2026</text><text x="62" y="270" class="lbl" font-size="9" style="font-size:9px">Google Fonts, variable fonts, fluid CSS</text>
   </svg></div>
   <h3>Source Landscape</h3>
   <p>This section draws from 10 sources spanning comprehensive design histories, specialist monographs, and institutional archives. The strongest are the Smithsonian&rsquo;s coverage of Manutius, the Toptal typeface timeline, and Fontfabric&rsquo;s Gutenberg analysis. Where sources disagree (the precise date of Gutenberg&rsquo;s first press, the attribution of the first sans-serif), this survey notes the consensus view and flags the uncertainty.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>The <em>Gutenberg</em> System</h2></div>
   <p>The popular narrative gives Gutenberg credit for &ldquo;inventing the printing press.&rdquo; This is misleading in two directions. First, movable type already existed &mdash; Bi Sheng created ceramic movable type in China around 1040, and metal movable type was used in Korea by the 13th century. Second, the press itself was adapted from existing technology (wine and olive presses). What Gutenberg actually invented was something more profound: a <em>complete system</em> for mass-producing identical copies of text.</p>
   <h3>The Five Components</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Metal Alloy</h4><p>Lead, tin, and antimony. Hard enough to hold shape, soft enough to cast, with a low melting point for rapid production. Each character identical across thousands of impressions.</p></div>
     <div class="feat"><h4>Hand Mould</h4><p>A two-piece adjustable mould that accepted a matrix (the negative impression of a letter). Enabled rapid, consistent casting of individual type pieces.</p></div>
     <div class="feat"><h4>Oil-Based Ink</h4><p>Water-based inks ran off metal. Gutenberg&rsquo;s oil-based formula adhered to the alloy and transferred cleanly to paper and vellum.</p></div>
     <div class="feat"><h4>Wooden Press</h4><p>Adapted from the screw presses used in winemaking. Applied uniform, controlled pressure across the type form.</p></div>
   </div>
   <p>The 42-line Bible was Gutenberg&rsquo;s masterwork. Each page required approximately 2,500 individually cast and set type pieces. The typeface was Textura, a dense blackletter modeled on the liturgical manuscripts that readers of the day expected sacred texts to resemble. Gutenberg was not just creating a book &mdash; he was creating the <em>expectation</em> of a book, one that looked as authoritative as a hand-copied manuscript but could be produced in multiples.</p>
   <div class="callout"><h4>The Speed of Adoption</h4><p>By 1500 &mdash; just fifty years after the Bible &mdash; approximately twenty million volumes had been printed across Europe. Printing presses operated in more than 250 cities. The information bottleneck that had constrained European civilization for a millennium was broken in two generations.</p></div>`,

   <p>Aldus Manutius was a scholar, not a craftsman. Born in Bassiano in 1449, he studied Latin and Greek in Rome before moving to Venice at age forty. Venice in the 1490s was a commercial capital open to outsiders with ideas. Manutius had one: books should be <em>portable</em>. The folio volumes of his era were massive, chained to lecterns, accessible only to the wealthy and institutional. Manutius wanted to put classical literature in the hands of ordinary educated readers.</p>
   <h3>The Italic Innovation</h3>
   <p>To fit more text on smaller pages, Manutius commissioned the punchcutter Francesco Griffo (also known as Francesco da Bologna) to design a new typeface based on the Italian humanist cursive &mdash; the <em>Cancellersesca</em> that had been developed by the humanist scholar Niccol&ograve; de&rsquo; Niccoli in the 1420s. The result was the first italic type. The Virgil of April 1501 was the first book entirely printed in italic, and the compressed, elegant letterforms allowed Manutius to use his smaller octavo format without sacrificing the amount of text per page.</p>
   <p>Manutius also gave us the semicolon and standardized the comma. His Aldine Press produced over 100 editions between 1495 and 1505 &mdash; a prolific output for the era. The majority were Greek and Latin classics, making texts that had been available only in manuscript copies accessible to readers across Europe.</p>
   <div class="callout"><h4>The Lesson</h4><p>Manutius proved that typographic innovation is never purely aesthetic. Italic was not created to look beautiful &mdash; it was created to solve an economic and practical problem (fitting more text in a smaller format). But the solution became an enduring aesthetic category. Technology drives form; form outlasts its original function.</p></div>`,

   <p>The 18th century produced three typefaces that, taken together, trace the intellectual trajectory of the Enlightenment itself. Each designer built on his predecessor, pushing toward greater rationality, precision, and abstraction. The progression from Caslon to Baskerville to Bodoni mirrors the broader Enlightenment journey from empiricism to idealism.</p>
   <h3>William Caslon (1722)</h3>
   <p>Caslon was a London gun engraver who turned to type design. His Roman typeface, first used around 1722, became the standard English typeface for the rest of the century. Its characteristics: slightly oblique axis, moderate stroke contrast, warm bracketed serifs, and a subtle irregularity that gave text a comfortable, human texture. Caslon was not innovative &mdash; he refined existing Dutch models &mdash; but the result was so readable and so reliable that the American colonies used it for the Declaration of Independence.</p>
   <h3>John Baskerville (1757)</h3>
   <p>Baskerville was a Birmingham industrialist and amateur typographer who approached type design as an engineering problem. His innovations were as much in paper and ink as in letterforms: he developed smoother papers and blacker inks that allowed finer detail. His typeface shifted the axis more toward the vertical, increased stroke contrast, sharpened the serifs, and cleaned up the irregularities that gave Caslon its warmth. Baskerville is classified as &ldquo;transitional&rdquo; &mdash; the stepping stone from old style to modern.</p>
   <h3>Giambattista Bodoni (1798)</h3>
   <p>Bodoni, working in Parma, took Baskerville&rsquo;s ideas to their logical extreme. Extreme thick-thin contrast. Hairline unbracketed serifs. Perfectly vertical axis. Geometric precision. The warmth of Caslon is entirely gone, replaced by a rationalist elegance that borders on severity. The parallel development of Firmin Didot&rsquo;s typeface in France produced almost identical results &mdash; suggesting that the aesthetic trajectory was cultural, not personal.</p>

   <p>The Industrial Revolution did not just change manufacturing &mdash; it changed what typography was <em>for</em>. For 350 years after Gutenberg, type existed primarily to serve literature, religion, and administration. The 19th century turned it into a tool of commerce. The poster, the broadside, the advertisement demanded letters that shouted, dazzled, and competed for attention in increasingly crowded visual environments.</p>
   <h3>Wood Type and Scale</h3>
   <p>Metal type had a practical size limit. Large metal letters were prohibitively heavy and expensive. In 1827, Darius Wells invented a lateral router that could carve letterforms from wood at a fraction of the cost &mdash; half the price of equivalent metal type, and feasible at sizes metal could never reach. Wood type enabled posters with letters a foot tall and higher, transforming the visual landscape of cities.</p>
   <h3>The Explosion of Variety</h3>
   <p>The century produced an astonishing proliferation of type styles, each designed to grab attention in a specific way. Robert Thorne and William Thorowgood created the first &ldquo;fat faces&rdquo; around 1803 &mdash; ultra-bold versions of existing serif types. Vincent Figgins launched slab serifs (also called Egyptians) in 1810 &mdash; heavy rectangular serifs designed for impact at distance. William Caslon IV introduced the first known sans-serif typeface in 1816, initially dismissed as grotesque (which became a category name). Ornamental, outlined, shadowed, condensed, expanded, decorated, and three-dimensional variations proliferated through the century.</p>
   <h3>Mechanization</h3>
   <p>Ottmar Mergenthaler&rsquo;s Linotype machine (1886) and Tolbert Lanston&rsquo;s Monotype (1887) automated typesetting, raising speed from approximately 1,500 characters per hour by hand to 6,000 or more by machine. This made newspapers, books, and commercial printing faster and cheaper, expanding the reach of the printed word yet again.</p>
   <div class="callout"><h4>The Aesthetic Backlash</h4><p>The exuberant chaos of 19th-century display type directly provoked the 20th-century modernist reaction. The Bauhaus, Tschichold, and the Swiss Style were not just proposing a new aesthetic &mdash; they were reacting against the Victorian excess that had turned every poster into a typographic circus. Modernist reduction is only comprehensible as a response to industrial-era overproduction.</p></div>`,

   <p>The Bauhaus, founded in Weimar in 1919, was not a typography school. It was an art and architecture school. But typography became central to its mission almost immediately, because the Bauhaus was concerned above all with the relationship between form and function &mdash; and type is the purest test of that relationship. Every letterform must simultaneously be beautiful and legible, expressive and efficient.</p>
   <h3>Key Figures</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Jan Tschichold</h4><p>Die Neue Typographie (1928). Codified modernist principles: sans-serif, asymmetric layout, white space as design element. Later repudiated his own extremism and returned to classical typography.</p></div>
     <div class="feat"><h4>Herbert Bayer</h4><p>Universal Alphabet (1925). Single-case (lowercase only), geometrically constructed. Argued two alphabets doubled complexity for no benefit. Influential but never widely adopted.</p></div>

   <p>Tschichold&rsquo;s later reversal is instructive. The young revolutionary who declared sans-serif as the only honest typeface eventually returned to traditional book typography, recognizing that strict modernist rules could be as dogmatic and lifeless as the Victorian excess they replaced. Modernist typography was a powerful corrective, but it was not a universal solution.</p>`,

   <p>The desktop publishing revolution was not a gradual evolution. It was a collision: three separate technologies, developed independently, converged in a 19-month window and permanently disrupted a centuries-old industry.</p>
   <h3>The Trinity</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">January 1984 &mdash; Apple Macintosh</div><div class="tl-text">The first commercially successful computer with a graphical user interface and bitmapped display. Susan Kare designed the original system fonts: Chicago, Geneva, Monaco, New York. WYSIWYG: what you saw on screen was what you got on paper.</div></div>
     <div class="tl-item"><div class="tl-date">January 1985 &mdash; Apple LaserWriter</div><div class="tl-text">The first PostScript-enabled laser printer. 300dpi output that approached typesetting quality. PostScript, developed by Adobe co-founders Charles Geschke and John Warnock (who had left Xerox PARC in 1982), was the enabling technology: a page description language that treated text as mathematical outlines.</div></div>
     <div class="tl-item"><div class="tl-date">July 1985 &mdash; Aldus PageMaker</div><div class="tl-text">The first desktop publishing software. Paul Brainerd, Aldus founder, coined the term &ldquo;desktop publishing&rdquo; as marketing language. PageMaker communicated typographic and graphic instructions to the LaserWriter via PostScript. For the first time, a single person at a single machine could compose, typeset, and print a professional document.</div></div>
   </div>
   <h3>Consequences</h3>
   <p>Professional typesetting &mdash; previously requiring Linotype and Monotype machines costing $100,000 or more, operated by skilled technicians &mdash; became accessible to anyone with a $7,000 Macintosh and LaserWriter setup. The typesetter as a profession began a decline from which it never recovered. Designers gained direct control over every letter, every kern, every leading adjustment. But the democratization was double-edged: non-designers now had the same tools, and the resulting explosion of amateur typography prompted Erik Spiekermann&rsquo;s observation that DTP stood for &ldquo;Destroy the Profession.&rdquo;</p>
   <div class="verdict">
     <div class="v-col pro"><h4>What DTP Enabled</h4><ul><li>Direct designer control over type</li><li>Radical cost reduction</li><li>Speed: hours instead of days</li><li>Experimentation and iteration</li><li>New type design tools (Fontographer, 1986)</li></ul></div>
     <div class="v-col con"><h4>What DTP Cost</h4><ul><li>Destruction of the typesetting profession</li><li>Loss of craft knowledge</li><li>Proliferation of bad typography</li><li>Default fonts becoming the norm</li><li>Speed prioritized over quality</li></ul></div>

   <p>The web&rsquo;s first decade was a typographic wasteland. HTML had no mechanism for specifying custom fonts. Browsers rendered text in whatever system fonts were available, which meant designers could reliably count on approximately twelve typefaces: Arial, Verdana, Georgia, Times New Roman, Courier New, and a handful of others. An entire generation of web design was constrained to this palette.</p>
   <h3>The @font-face Revolution</h3>
   <p>CSS @font-face existed in the specification since CSS2 (1998), but browser support and font licensing issues kept it impractical until 2009&ndash;2010. The real breakthrough came when Google launched Google Fonts in 2010: free, open-source typefaces served from Google&rsquo;s CDN. Any website could add professional typography with a single link tag. The web-safe font era ended overnight.</p>
   <h3>Google Fonts: Scale and Concerns</h3>
   <p>By 2026, Google Fonts offers 1,500+ free families and has delivered 70+ trillion total font serves. The service democratized web typography in a way that echoed the DTP revolution thirty years earlier. But concerns have emerged: each font request sends user data to Google (IP address, referrer, user agent). German courts ruled in 2022 that this constitutes a GDPR violation. Self-hosting &mdash; downloading the fonts and serving them from your own domain &mdash; eliminates the privacy issue and is now considered best practice for GDPR-conscious sites.</p>
   <h3>Variable Fonts: The Current Frontier</h3>
   <p>Variable fonts, introduced in OpenType 1.8 (2016), are the most significant advance in font technology since PostScript. A single font file contains multiple design axes &mdash; weight, width, slant, optical size, and custom axes &mdash; allowing developers to request any value along those axes. The benefits are concrete: one variable font file replaces the 10&ndash;20 static font files that a typical weight/style family requires, dramatically reducing HTTP requests and improving performance.</p>
   <p>In 2026, all major browsers support <code>font-variation-settings</code>. Google endorses variable fonts as the new standard (Google Sans Flex). Progressive enhancement patterns serve static fallbacks to older browsers while giving modern browsers the full variable experience.</p>
   <div class="callout"><h4>Looking Forward</h4><p>The constraint on typography in 2026 is no longer technology or cost. Every device can render sophisticated type. Every website can access thousands of typefaces for free. Variable fonts enable fine-grained control over every aspect of letterforms. The constraint is now knowledge and taste &mdash; understanding which of those thousands of available typefaces to choose, and why.</p></div>`

function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return; const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return; const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar'); if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
