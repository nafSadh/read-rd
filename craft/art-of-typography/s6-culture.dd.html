const summaries = [
  `<p>Typography is never just shapes on a page. Letterforms carry history, politics, identity, and power &mdash; sometimes deliberately encoded, sometimes inherited unwittingly. A typeface choice that seems purely aesthetic may signal national allegiance, colonial legacy, or cultural resistance.</p>
   <p>This section traces how nations encode identity through letterforms, how typography served as colonial infrastructure, and how emoji became the strangest chapter in the history of type.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1871</div><div class="sl">Fraktur made official</div></div>
     <div class="st"><div class="sv">1941</div><div class="sl">Fraktur banned</div></div>
     <div class="st"><div class="sv">3,836</div><div class="sl">Emoji in Unicode</div></div>
     <div class="st"><div class="sv">50K+</div><div class="sl">CJK characters</div></div>

  `<p>Five European typefaces became metonyms for their nations: Fraktur for Germany (1871&ndash;1941), Didot for France (post-Revolution),<sup class="fn"><a href="https://www.typofonderie.com/articles/the-didots">[1]</a><span class="tip"><a href="https://www.typofonderie.com/articles/the-didots" target="_blank">Typofonderie: The Didots &rarr;</a></span></sup> Bodoni for Italy, Caslon for England.<sup class="fn"><a href="https://www.typofonderie.com/articles/nationality-and-type-design">[2]</a><span class="tip"><a href="https://www.typofonderie.com/articles/nationality-and-type-design" target="_blank">Typofonderie: Nationality and Type Design &rarr;</a></span></sup></p>

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Type</em> as Culture</h2></div>
   <p>Typography is never neutral. Every letterform carries the weight of the culture that created it, the technology that rendered it, and the power structures that distributed it. To choose a typeface is to make a cultural statement, whether the designer intends it or not.</p>
   <p>This section examines the political, colonial, and cultural dimensions of typography &mdash; from Fraktur&rsquo;s impossible history through colonial imposition of Latin scripts to the emoji revolution. The thread connecting them: letterforms are artifacts of power, and every typographic choice encodes an ideology.</p>
   <div class="callout"><h4>The Core Argument</h4><p>Most type theory and classification systems were built around Latin scripts. This is not a neutral fact but a consequence of European colonial dominance over printing technology. The resulting Latin bias affects not just how typefaces are classified but how software is designed, characters are encoded, and what counts as typography.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2><em>National</em> Type Identities</h2></div>
   <p>Five European typefaces became metonyms for their nations, each association deliberately constructed through publishing policy, nationalist movements, and cultural pride.<sup class="fn"><a href="https://www.typofonderie.com/articles/nationality-and-type-design">[1]</a><span class="tip"><a href="https://www.typofonderie.com/articles/nationality-and-type-design" target="_blank">Typofonderie: Nationality and Type Design &rarr;</a></span></sup></p>
   <div class="feat-grid">
     <div class="feat"><h4>Fraktur &mdash; Germany</h4><p>Official state typeface after 1871 unification. Blackletter as German identity. Banned by the Nazis in 1941 after decades of championship.</p></div>
     <div class="feat"><h4>Didot &mdash; France</h4><p>Adopted after the Revolution, replacing Garamond&rsquo;s old-regime associations. High-contrast modern style as emblem of renewal and rationality. Used for French regulatory matter until the 1950s.</p></div>
     <div class="feat"><h4>Bodoni &mdash; Italy</h4><p>National pride in Parma&rsquo;s printing tradition. Extreme thick-thin contrast as Italian elegance. Parallel development with Didot reflects shared Enlightenment aesthetics.</p></div>
     <div class="feat"><h4>Caslon &mdash; England</h4><p>Sturdy, practical, pragmatic. Used for the US Declaration of Independence. The maxim &ldquo;When in doubt, use Caslon&rdquo; reflects English typographic conservatism.</p></div>
   </div>
   <p>The Didot family dominated French typography from the late 18th through 19th century.<sup class="fn"><a href="https://www.typofonderie.com/articles/the-didots">[2]</a><span class="tip"><a href="https://www.typofonderie.com/articles/the-didots" target="_blank">Typofonderie: The Didots &rarr;</a></span></sup> Their high-contrast modern style represented revolution, modernity, and rational clarity &mdash; in direct opposition to Garamond&rsquo;s associations with the Ancien R&eacute;gime. The parallel with Fraktur in Germany is striking: both nations encoded national identity into their dominant typeface.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>The <em>Fraktur</em> Paradox</h2></div>
   <p>Fraktur&rsquo;s trajectory is the most politically charged in type history, moving through four distinct phases of meaning.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Antiqua%E2%80%93Fraktur_dispute">[3]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Antiqua%E2%80%93Fraktur_dispute" target="_blank">Wikipedia: Antiqua-Fraktur Dispute &rarr;</a></span></sup></p>
   <h3>The Four Phases</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">Phase 1: Protestant Identity</div><div class="tl-text">Martin Luther chose blackletter to distinguish Protestant texts from Catholic ones (which used Roman/Antiqua). Effectively designated Fraktur as the Protestant typeface, creating unity through religion and geography.</div></div>
     <div class="tl-item"><div class="tl-date">Phase 2: National Symbol (1871+)</div><div class="tl-text">After German unification, Fraktur became the official state typeface. Bismarck refused to read books in Antiqua. The Reichstag debated the issue. Using Roman type was considered un-German.</div></div>
     <div class="tl-item"><div class="tl-date">Phase 3: Nazi Appropriation</div><div class="tl-text">The Nazis initially championed Fraktur as the embodiment of Germanic identity. Nazi propaganda extensively used blackletter. But Hitler personally disliked it.</div></div>
     <div class="tl-item"><div class="tl-date">Phase 4: The Ban (1941)</div><div class="tl-text">Martin Bormann&rsquo;s decree recharacterized Fraktur as &ldquo;Judenletter&rdquo; &mdash; claiming Jewish printers had contaminated the letterform. The real reason was likely pragmatic: Fraktur was unreadable in occupied territories.</div></div>
   </div>
   <p>The Nazis banned the very typeface they had championed.<sup class="fn"><a href="https://www.reading.ac.uk/typography/research/nazi-typography/">[4]</a><span class="tip"><a href="https://www.reading.ac.uk/typography/research/nazi-typography/" target="_blank">University of Reading: Typography and Nationalism &rarr;</a></span></sup> Today, Fraktur exists in permanent cultural radioactivity. Neo-Nazi groups have reclaimed it. Modern German designers navigate loaded associations. The typeface cannot be used without invoking its history.<sup class="fn"><a href="https://99percentinvisible.org/episode/fraktur/">[5]</a><span class="tip"><a href="https://99percentinvisible.org/episode/fraktur/" target="_blank">99% Invisible: Fraktur &rarr;</a></span></sup></p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Colonial</em> Typography</h2></div>
   <p>Typography was a fundamentally European technology. When European powers colonized, they brought printing presses designed for Latin scripts.<sup class="fn"><a href="https://futuress.org/magazine/a-resource-hub-for-decolonizing-typography/">[6]</a><span class="tip"><a href="https://futuress.org/magazine/a-resource-hub-for-decolonizing-typography/" target="_blank">Futuress: Decolonizing Typography &rarr;</a></span></sup> Missionary presses across Africa, Asia, and the Americas were Latin-centric by design.</p>
   <h3>The Imposition</h3>
   <p>Colonized peoples&rsquo; writing systems were forced to adapt to Latin-centric technology. Printing presses designed for 26 letters had to accommodate scripts with hundreds or thousands of characters. Metal type for complex scripts (Arabic, Devanagari, CJK) was prohibitively expensive. The result: indigenous scripts were often simplified, distorted, or abandoned in favor of Latin transliteration.</p>
   <h3>Digital Continuation</h3>
   <p>Font production software (FontLab, Glyphs, RoboFont) still primarily serves the Latin script. Non-Latin scripts are treated as extensions rather than first-class citizens. The Unicode standard reflects Western primacy: Latin has extensive coverage; many minority scripts remain underrepresented. The decolonization movement in type design seeks to address these structural inequities, but the Latin-centric foundation of digital typography remains.</p>
   <div class="callout"><h4>The Structural Problem</h4><p>The issue is not individual prejudice but systemic architecture. Every level of the typographic stack &mdash; from Unicode encoding to font editing tools to CSS rendering &mdash; was designed by and for Latin-script users. Retrofitting support for other scripts is possible but always asymmetric. True equity would require rebuilding the foundations, not just extending them.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2><em>Non-Latin</em> Scripts</h2></div>
   <p>Three non-Latin script systems illustrate the challenges of typography beyond the Latin alphabet.</p>
   <h3>Devanagari and Indian Identity</h3>
   <p>Devanagari was central to establishing India&rsquo;s graphical identity, distinct from Standard Urdu (Perso-Arabic script). Gandhi advocated Devanagari as a unifying script as early as the 1910s.<sup class="fn"><a href="https://www.typotheque.com/articles/devanagari">[7]</a><span class="tip"><a href="https://www.typotheque.com/articles/devanagari" target="_blank">Typotheque: Devanagari &rarr;</a></span></sup> Adapting Brahmic scripts to Latin-centric type technology required compromises: complex conjunct characters, the horizontal headline (shirorekha), and wide variety of vowel marks. Contemporary Devanagari type design faces &ldquo;Westernization&rdquo; pressure.</p>
   <h3>Arabic Script Design</h3>
   <p>Arabic presents unique challenges: right-to-left directionality, up to 4 contextual forms per letter, connected script, deep calligraphic tradition, and precise diacritical positioning.<sup class="fn"><a href="https://granshan.com/type-beyond-borders-29lt/">[8]</a><span class="tip"><a href="https://granshan.com/type-beyond-borders-29lt/" target="_blank">GRANSHAN: Type Beyond Borders &rarr;</a></span></sup> The 29LT foundry bridges Arabic and Latin multiscript typography, working to harmonize scripts without forcing one to conform to the other&rsquo;s aesthetics.</p>
   <h3>CJK: Scale as Challenge</h3>
   <p>Chinese uses approximately 50,000+ characters in common use. Japanese adds Hiragana and Katakana. Korean adds Hangul syllable blocks.<sup class="fn"><a href="https://www.typotheque.com/articles/cjk-regional-variants">[9]</a><span class="tip"><a href="https://www.typotheque.com/articles/cjk-regional-variants" target="_blank">Typotheque: CJK Regional Variants &rarr;</a></span></sup> Each character must be individually designed. A CJK font with 20,000 glyphs requires 100&times; the design effort of a Latin font with 200 glyphs. Regional variants (Simplified Chinese vs Traditional, Japanese Shinjitai) add further complexity.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2>The <em>Emoji</em> Revolution</h2></div>
   <p>In 1999, Shigetaka Kurita created 176 emoji for NTT DoCoMo on a 12&times;12 pixel grid, inspired by manga, kanji, and weather symbols.<sup class="fn"><a href="https://blog.emojipedia.org/major-moments-in-emoji-history/">[10]</a><span class="tip"><a href="https://blog.emojipedia.org/major-moments-in-emoji-history/" target="_blank">Emojipedia: Major Moments in Emoji History &rarr;</a></span></sup> Fragmented across Japanese carriers, they remained a local phenomenon until Apple and Google pushed for Unicode standardization in 2009&ndash;2010.</p>
   <h3>The Growth</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">1999 &mdash; 176 Emoji</div><div class="tl-text">Kurita&rsquo;s original set for NTT DoCoMo. 12&times;12 pixel grid. Japanese mobile carrier exclusive.</div></div>
     <div class="tl-item"><div class="tl-date">2010 &mdash; Unicode 6.0</div><div class="tl-text">First emoji officially encoded in Unicode. Cross-platform compatibility begins.</div></div>
     <div class="tl-item"><div class="tl-date">2015 &mdash; Skin Tone Modifiers</div><div class="tl-text">Fitzpatrick scale applied to human emoji. Representation becomes a governance question.</div></div>
     <div class="tl-item"><div class="tl-date">2024 &mdash; Apple Genmoji</div><div class="tl-text">AI-generated custom emoji. The boundary between designed and generated typography blurs.</div></div>
     <div class="tl-item"><div class="tl-date">2025 &mdash; 3,836 Emoji</div><div class="tl-text">Unicode Consortium as gatekeeper. Platform design convergence. Emoji as legal evidence in court cases.</div></div>
   </div>
   <h3>Emoji as Typography</h3>
   <p>Emoji function as punctuation (emotional tone markers), standalone communication (entire messages in emoji), cultural markers (meaning varies by region), legal evidence (emoji interpreted in court), and accessibility tools (communication aid for language barriers).<sup class="fn"><a href="https://emojishive.com/growth-of-emojis-key-milestones/">[11]</a><span class="tip"><a href="https://emojishive.com/growth-of-emojis-key-milestones/" target="_blank">EmojisHive: Growth of Emojis &rarr;</a></span></sup></p>
   <p>The question: are emoji typography? They exist in font files, are encoded in Unicode, render alongside text, and are governed by the same standards body that manages the letter A. But they are pictographs, not letterforms. They represent the largest expansion of what counts as &ldquo;typography&rdquo; since the introduction of italic type in 1501.</p>
   <div class="callout"><h4>The Thread</h4><p>Typography is never neutral. Every letterform carries the weight of the culture that created it, the technology that rendered it, and the power structures that distributed it. To choose a typeface is to make a cultural statement, whether the designer intends it or not.</p></div>`
