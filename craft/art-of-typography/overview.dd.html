<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Art of Typography — Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Jost:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);
  --right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;
  --dash-speed:1s;
  --close-text:"✕";
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);
  --right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;
  --dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;
  --topbar-glow:#9b7aed10;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%, var(--grad1), transparent),radial-gradient(ellipse 60% 50% at 85% 75%, var(--grad2), transparent),radial-gradient(ellipse 40% 40% at 50% 10%, var(--grad1), transparent);transition:background 1s}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'☽'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'☀'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--grad1), transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-list.con li{padding-left:20px}
.section-block .s-list.con li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}

<body data-theme="light">

<script>
const sections = [
  { num: '01', short: 'History', title: 'A <em>Brief</em> History of Type' },
  { num: '02', short: 'Anatomy', title: '<em>Anatomy</em> &amp; Classification' },
  { num: '03', short: 'Helvetica', title: 'The <em>Helvetica</em> Question' },
  { num: '04', short: 'Cognition', title: '<em>Type</em> &amp; Cognition' },
  { num: '05', short: 'Digital', title: '<em>Digital</em> Typography' },
  { num: '06', short: 'Culture', title: '<em>Type</em> as Culture' }
];

const summaries = [
  `<p>The story of typography is the story of information itself. From Gutenberg&rsquo;s workshop in Mainz (~1450)<sup class="fn"><a href="https://en.wikipedia.org/wiki/Movable_type">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Movable_type" target="_blank">Wikipedia: Movable Type &rarr;</a></span></sup> to Aldus Manutius&rsquo;s pocket books in Venice,<sup class="fn"><a href="https://www.smithsonianmag.com/innovation/man-who-changed-way-we-read-forever-180970475/">[2]</a><span class="tip"><a href="https://www.smithsonianmag.com/innovation/man-who-changed-way-we-read-forever-180970475/" target="_blank">Smithsonian: The Man Who Changed Reading Forever &rarr;</a></span></sup> from Caslon&rsquo;s sturdy practicality through Baskerville&rsquo;s refinement to Bodoni&rsquo;s geometric precision<sup class="fn"><a href="https://www.toptal.com/designers/ui/history-of-fonts">[3]</a><span class="tip"><a href="https://www.toptal.com/designers/ui/history-of-fonts" target="_blank">Toptal: History of Fonts Timeline &rarr;</a></span></sup> &mdash; each era&rsquo;s type reflected its intellectual temperament. The Industrial Revolution exploded typographic variety into advertising. The Bauhaus reduced it to geometry. The Macintosh democratized it.</p>
   <p>580 years, one through-line: every revolution in <em>how</em> letterforms are made changes <em>what</em> is said with them.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1450</div><div class="sl">Gutenberg&rsquo;s press</div></div>
     <div class="st"><div class="sv">1501</div><div class="sl">First italic type</div></div>
     <div class="st"><div class="sv">1957</div><div class="sl">Helvetica designed</div></div>
     <div class="st"><div class="sv">1985</div><div class="sl">Desktop publishing</div></div>
     <div class="st"><div class="sv">2016</div><div class="sl">Variable fonts</div></div>
   </div>`,

  `<p>Typography has a precise anatomical vocabulary: x-height, ascenders, descenders, counters, bowls, stems, serifs, finials.<sup class="fn"><a href="https://www.interaction-design.org/literature/topics/anatomy-of-type">[4]</a><span class="tip"><a href="https://www.interaction-design.org/literature/topics/anatomy-of-type" target="_blank">IxDF: What is Anatomy of Type? &rarr;</a></span></sup> These are not decorative labels &mdash; they describe the structural elements that determine how a typeface reads at any size, in any medium, for any audience. X-height alone accounts for more perceived size variation than the actual point size.</p>
   <p>The Vox-ATypI classification system organized typefaces into 9 families for 60 years &mdash; until ATypI formally de-adopted it in 2021<sup class="fn"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification" target="_blank">Wikipedia: Vox-ATypI Classification &rarr;</a></span></sup> as Eurocentric and unable to classify contemporary type. The font vs typeface distinction: a typeface is the design; a font is a specific implementation. Helvetica is a typeface. Helvetica Bold 12pt is a font.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">9</div><div class="sl">Vox-ATypI categories</div></div>
     <div class="st"><div class="sv">1954</div><div class="sl">Vox system created</div></div>
     <div class="st"><div class="sv">2021</div><div class="sl">Formally de-adopted</div></div>
     <div class="st"><div class="sv">65K</div><div class="sl">Max OpenType glyphs</div></div>
   </div>`,

  `<p>In 1957, Max Miedinger designed a typeface so neutral it was meant to have no meaning of its own.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Helvetica">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Helvetica" target="_blank">Wikipedia: Helvetica &rarr;</a></span></sup> By the 1970s, Helvetica was the visual identity of the NYC subway, NASA, American Airlines, and half the Fortune 500. Massimo Vignelli built an entire career on it. Michael Bierut said it &ldquo;feels like air.&rdquo;<sup class="fn"><a href="https://eyeondesign.aiga.org/revisiting-helvetica/">[7]</a><span class="tip"><a href="https://eyeondesign.aiga.org/revisiting-helvetica/" target="_blank">AIGA Eye on Design: Revisiting Helvetica &rarr;</a></span></sup></p>
   <p>Then came the backlash. Emigre magazine birthed experimental digital type. David Carson set an entire interview in Zapf Dingbats.<sup class="fn"><a href="https://www.hueandeye.com/david-carson-pioneering-grunge-typography/">[8]</a><span class="tip"><a href="https://www.hueandeye.com/david-carson-pioneering-grunge-typography/" target="_blank">HueAndEye: David Carson &rarr;</a></span></sup> And Microsoft created Arial &mdash; a metric-compatible substitute to avoid licensing fees<sup class="fn"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial">[9]</a><span class="tip"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial" target="_blank">Mark Simonson: The Scourge of Arial &rarr;</a></span></sup> &mdash; silently substituting it for Helvetica on every Windows machine. The Helvetica story is really a proxy war between two visions of design: universal clarity vs personal expression.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1957</div><div class="sl">Helvetica designed</div></div>
     <div class="st"><div class="sv">2007</div><div class="sl">Hustwit documentary</div></div>
     <div class="st"><div class="sv">1982</div><div class="sl">Arial created</div></div>
     <div class="st"><div class="sv">2019</div><div class="sl">Helvetica Now update</div></div>
   </div>`,

  `<p>Does font choice affect how well you learn? The serif vs sans-serif readability debate is largely settled: eye-tracking studies show no significant speed difference on screen.<sup class="fn"><a href="https://www.researchgate.net/publication/299536521">[10]</a><span class="tip"><a href="https://www.researchgate.net/publication/299536521" target="_blank">ResearchGate: Serif vs Sans Serif on Screen (2016) &rarr;</a></span></sup> Both work. The stronger predictors are spacing, contrast, x-height, and familiarity.</p>
   <p>The &ldquo;disfluency effect&rdquo; &mdash; the idea that harder-to-read fonts improve retention &mdash; generated headlines but failed replication.<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/20445911.2020.1847168">[11]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/20445911.2020.1847168" target="_blank">Tandfonline: Review of Disfluent Typography (2020) &rarr;</a></span></sup> RMIT&rsquo;s Sans Forgetica did not improve recall in controlled studies.<sup class="fn"><a href="https://designregression.com/article/exploring-disfluency">[12]</a><span class="tip"><a href="https://designregression.com/article/exploring-disfluency" target="_blank">Design Regression: Exploring Disfluency &rarr;</a></span></sup> Meanwhile, Comic Sans <em>is</em> recommended for dyslexia by the British Dyslexia Association, though dedicated dyslexia fonts like OpenDyslexic showed no improvement over standard sans-serifs.<sup class="fn"><a href="https://en.wikipedia.org/wiki/OpenDyslexic">[13]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/OpenDyslexic" target="_blank">Wikipedia: OpenDyslexic &rarr;</a></span></sup> And Monotype&rsquo;s research shows typeface choice can shift consumer responses by up to 13%.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">+13%</div><div class="sl">Font impact on response</div></div>
     <div class="st"><div class="sv">+40%</div><div class="sl">Trust from serif fonts</div></div>
     <div class="st"><div class="sv">5-17%</div><div class="sl">Dyslexia prevalence</div></div>
     <div class="st"><div class="sv">4.5:1</div><div class="sl">Min contrast ratio</div></div>
   </div>`,

  `<p>The history of digital type is a story of format wars and democratization. Adobe&rsquo;s PostScript (1985) created scalable fonts but locked them behind a proprietary format.<sup class="fn"><a href="https://en.wikipedia.org/wiki/PostScript_fonts">[14]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/PostScript_fonts" target="_blank">Wikipedia: PostScript Fonts &rarr;</a></span></sup> Apple&rsquo;s TrueType (1991) broke the monopoly.<sup class="fn"><a href="https://appleinsider.com/articles/23/08/10/the-history-of-postscript-truetype-and-opentype">[15]</a><span class="tip"><a href="https://appleinsider.com/articles/23/08/10/the-history-of-postscript-truetype-and-opentype" target="_blank">Apple Insider: History of PostScript, TrueType, and OpenType &rarr;</a></span></sup> OpenType (mid-1990s) merged both. Variable fonts (2016) put multiple weights and widths in a single file.<sup class="fn"><a href="https://inkbotdesign.com/variable-fonts/">[16]</a><span class="tip"><a href="https://inkbotdesign.com/variable-fonts/" target="_blank">Inkbot Design: Variable Fonts Explained &rarr;</a></span></sup></p>
   <p>The real revolution was access. Desktop publishing (1984&ndash;85) put professional typesetting on a $7,000 machine.<sup class="fn"><a href="https://www.computerhistory.org/revolution/digital-logic/12/330">[17]</a><span class="tip"><a href="https://www.computerhistory.org/revolution/digital-logic/12/330" target="_blank">Computer History Museum: Desktop Publishing &rarr;</a></span></sup> Google Fonts (2010) put 1,500+ families on every website for free &mdash; delivering 70+ trillion font serves. In 2026, CSS <code>clamp()</code> handles fluid type, system font stacks eliminate loading delays, and variable fonts are the default standard.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1985</div><div class="sl">PostScript + LaserWriter</div></div>
     <div class="st"><div class="sv">1991</div><div class="sl">TrueType</div></div>
     <div class="st"><div class="sv">1,500+</div><div class="sl">Google Fonts families</div></div>
     <div class="st"><div class="sv">70T+</div><div class="sl">Total font serves</div></div>
   </div>`,

  `<p>Type encodes national identity. Fraktur was Germany&rsquo;s official typeface from 1871 until the Nazis &mdash; who had championed it &mdash; banned it in 1941 as &ldquo;Judenletter.&rdquo;<sup class="fn"><a href="https://en.wikipedia.org/wiki/Antiqua%E2%80%93Fraktur_dispute">[18]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Antiqua%E2%80%93Fraktur_dispute" target="_blank">Wikipedia: Antiqua-Fraktur Dispute &rarr;</a></span></sup> Didot replaced Garamond in France after the Revolution.<sup class="fn"><a href="https://www.typofonderie.com/articles/nationality-and-type-design">[19]</a><span class="tip"><a href="https://www.typofonderie.com/articles/nationality-and-type-design" target="_blank">Typofonderie: Nationality and Type Design &rarr;</a></span></sup> Caslon was England. Bodoni was Italy. These were not accidents but deliberate cultural infrastructure.</p>
   <p>Typography was also a tool of colonialism: Latin-centric printing presses forced indigenous scripts to adapt.<sup class="fn"><a href="https://futuress.org/magazine/a-resource-hub-for-decolonizing-typography/">[20]</a><span class="tip"><a href="https://futuress.org/magazine/a-resource-hub-for-decolonizing-typography/" target="_blank">Futuress: Decolonizing Typography &rarr;</a></span></sup> Today, Devanagari, Arabic, and CJK scripts still struggle with software designed for 26-letter alphabets. And emoji &mdash; from 176 Japanese pictographs in 1999 to 3,836 Unicode characters in 2025<sup class="fn"><a href="https://blog.emojipedia.org/major-moments-in-emoji-history/">[21]</a><span class="tip"><a href="https://blog.emojipedia.org/major-moments-in-emoji-history/" target="_blank">Emojipedia: Major Moments in Emoji History &rarr;</a></span></sup> &mdash; may be typography&rsquo;s most unexpected chapter: pictographs governed by the same standards body that manages the letter A.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1871</div><div class="sl">Fraktur made official</div></div>
     <div class="st"><div class="sv">1941</div><div class="sl">Fraktur banned</div></div>
     <div class="st"><div class="sv">3,836</div><div class="sl">Emoji in Unicode</div></div>
     <div class="st"><div class="sv">50K+</div><div class="sl">CJK characters</div></div>
   </div>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2>A <em>Brief</em> History of Type</h2></div>
   <p>Gutenberg&rsquo;s innovation around 1450 was not merely movable type &mdash; Bi Sheng had that in China four centuries earlier.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Movable_type">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Movable_type" target="_blank">Wikipedia: Movable Type &rarr;</a></span></sup> What Gutenberg created was a <em>system</em>: a metal alloy of lead, tin, and antimony that held precise shape; a hand mould for consistent, repeatable casting; oil-based ink; and a press adapted from the wine industry.<sup class="fn"><a href="https://fontfabric.com/gutenbergs-typeface/">[2]</a><span class="tip"><a href="https://fontfabric.com/gutenbergs-typeface/" target="_blank">Fontfabric: Gutenberg&rsquo;s Typeface &rarr;</a></span></sup> The 42-line Bible required approximately 2,500 individual type pieces per page. By 1500, twenty million volumes had been printed across Europe. That alloy remained the standard for 550 years.</p>
   <h3>The Portable Book</h3>
   <p>Aldus Manutius moved to Venice in 1490, and within a decade had invented the pocket book.<sup class="fn"><a href="https://www.smithsonianmag.com/innovation/man-who-changed-way-we-read-forever-180970475/">[3]</a><span class="tip"><a href="https://www.smithsonianmag.com/innovation/man-who-changed-way-we-read-forever-180970475/" target="_blank">Smithsonian: The Man Who Changed Reading Forever &rarr;</a></span></sup> His octavo format made books lighter and cheaper. Francesco Griffo&rsquo;s italic type (1501) &mdash; based on Niccoli&rsquo;s humanist cursive from the 1420s<sup class="fn"><a href="https://www.semiovox.com/classics/aldine-italic/">[4]</a><span class="tip"><a href="https://www.semiovox.com/classics/aldine-italic/" target="_blank">Semiovox: Aldine Italic &rarr;</a></span></sup> &mdash; compressed text, fitting more words per page. The Virgil of 1501 was the first book entirely set in italic. Manutius also standardized punctuation: the comma and semicolon as we know them trace to his press.</p>
   <h3>The Enlightenment Arc</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">1722 &mdash; Caslon</div><div class="tl-text">William Caslon creates a sturdy, practical &ldquo;old style&rdquo; face based on Dutch models. Warm, slightly irregular. Used for the US Declaration of Independence.</div></div>
     <div class="tl-item"><div class="tl-date">1757 &mdash; Baskerville</div><div class="tl-text">John Baskerville&rsquo;s &ldquo;transitional&rdquo; type: more vertical axis, sharper serifs, higher contrast. A bridge between craft and engineering.</div></div>
     <div class="tl-item"><div class="tl-date">1798 &mdash; Bodoni</div><div class="tl-text">Giambattista Bodoni pushes to the extreme: hairline serifs, dramatic thick-thin contrast, geometric precision. The &ldquo;modern&rdquo; era of type begins.</div></div>
   </div>
   <h3>Industrial Explosion</h3>
   <p>The 19th century turned type into a commercial free-for-all. Darius Wells&rsquo;s lateral router (1827) made cheap wood type possible &mdash; half the cost of metal and available in sizes metal couldn&rsquo;t reach. A single poster from the 1850s might mix fat faces, slab serifs, sans-serifs, outlined letters, shadowed letters, and ornamental scripts all on one sheet. Robert Thorne and William Thorowgood created the first &ldquo;fat faces&rdquo; around 1803; Vincent Figgins launched slab serifs in 1810.</p>
   <h3>Modernist Reduction</h3>
   <p>Jan Tschichold&rsquo;s <em>Die Neue Typographie</em> (1928) declared that sans-serif was the type of the present day. Herbert Bayer&rsquo;s Universal Alphabet (1925) proposed a single-case, geometrically constructed alphabet &mdash; lowercase only &mdash; arguing that maintaining two alphabets doubled the complexity for no real benefit. The Bauhaus elevated typography from craft to discipline. The Swiss International Style formalized these ideas into grids, Helvetica, and objectivity.</p>
   <h3>Desktop Publishing</h3>
   <p>Three technologies converged in 1984&ndash;85: the Apple Macintosh, the LaserWriter printer (with PostScript), and Aldus PageMaker. Paul Brainerd coined &ldquo;desktop publishing.&rdquo; A $7,000 setup replaced typesetting systems costing $100,000 or more. Designers gained direct control over every letter. The democratization was real &mdash; but it also meant non-designers were now setting type, and the results were not always pretty.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2><em>Anatomy</em> &amp; Classification</h2></div>
   <p>Every letterform is an engineering drawing, even when it looks like art. The anatomy of type is a precise vocabulary that designers use to describe, evaluate, and communicate about letterforms. Understanding it is the difference between knowing a typeface feels wrong and knowing <em>why</em>.</p>

   <p>The baseline is the invisible line letters sit on. X-height &mdash; the distance from baseline to the top of lowercase &lsquo;x&rsquo; &mdash; is the single most important metric for perceived size and legibility. Two typefaces at the same point size can look dramatically different in apparent size if their x-heights differ. Ascenders (b, d, h, k, l) rise above x-height; descenders (g, j, p, q, y) drop below baseline.</p>
   <h3>Spacing: The Invisible Design</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Kerning</h4><p>Space between specific character pairs. The classic problems: AV, To, We. Modern fonts include hundreds of kerning pairs. Good kerning is invisible; bad kerning is immediately noticeable.</p></div>
     <div class="feat"><h4>Tracking</h4><p>Uniform spacing across a group of characters. Increase for all-caps and small type. Decrease for tight headlines. Unlike kerning, it applies uniformly.</p></div>
     <div class="feat"><h4>Leading</h4><p>Vertical distance between baselines. Named for the lead strips between metal type lines. Best practice: 1.4&ndash;1.6&times; font size for body text.</p></div>
     <div class="feat"><h4>Optical Spacing</h4><p>Adjusting space to look even rather than measure even. Round letters (O, C) must extend slightly beyond the baseline to appear aligned. The eye trumps the ruler.</p></div>
   </div>
   <h3>Classification: 60 Years of Vox-ATypI</h3>
   <p>Maximilien Vox&rsquo;s 1954 system classified typefaces by formal criteria: serif shape, stroke axis, contrast, x-height.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification" target="_blank">Wikipedia: Vox-ATypI Classification &rarr;</a></span></sup> ATypI adopted it in 1962. For sixty years it served as the international standard. The nine categories &mdash; Humanist, Garalde, Transitional, Didone, Mechanistic, Lineale, Glyphic, Script, Blackletter &mdash; traced a rough historical arc from Renaissance pen-drawn forms to modern geometric constructions.</p>
   <p>In 2021, ATypI formally de-adopted the system. The reasons: it could not classify contemporary type (what category is a variable-weight geometric slab?), it was Eurocentric (no provision for Arabic, Devanagari, CJK), and its categories blurred in practice. A working group was established to study alternatives; no replacement has been adopted.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>The <em>Helvetica</em> Question</h2></div>
   <p>Helvetica was born as Neue Haas Grotesk in 1957 at the Haas Type Foundry in M&uuml;nchenstein, Switzerland.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Helvetica">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Helvetica" target="_blank">Wikipedia: Helvetica &rarr;</a></span></sup> Max Miedinger designed it under the art direction of Eduard Hoffmann, basing it on the 1898 Akzidenz-Grotesk. The goal was explicit: a neutral typeface that should not carry inherent meaning. By 1960, licensed by Stempel and Linotype, it was renamed &ldquo;Helvetica&rdquo; &mdash; from the Latin for Switzerland &mdash; capitalizing on the country&rsquo;s design reputation.</p>
   <h3>What Makes Helvetica Helvetica</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Horizontal Terminals</h4><p>Unlike most grotesques, which have angled or oblique terminals, Helvetica&rsquo;s stroke endings are horizontal. This creates the signature &ldquo;closed&rdquo; feel.</p></div>
     <div class="feat"><h4>Closed Apertures</h4><p>The openings of e, c, s are relatively small. This is actually a legibility weakness &mdash; but it creates Helvetica&rsquo;s distinctive density.</p></div>
     <div class="feat"><h4>Large X-Height</h4><p>The x-height is tall relative to cap height, giving an impression of solidity and modernity even at small sizes.</p></div>
     <div class="feat"><h4>Near-Uniform Stroke</h4><p>Very little variation between thick and thin strokes. The result: a machine-like regularity that reads as objectivity.</p></div>
   </div>
   <h3>The Swiss Style Connection</h3>
   <p>Helvetica crystallized the ideals of the Swiss International Typographic Style: mathematical grids, asymmetric layouts, photography over illustration, and the belief that design should communicate objectively and universally. Josef M&uuml;ller-Brockmann, Armin Hofmann, and Emil Ruder built the theoretical framework; Helvetica became its physical expression. Wim Crouwel captured the philosophy: the meaning belongs in the content, not in the typeface.</p>
   <h3>The Corporate Conquest</h3>
   <p>By the 1970s, Helvetica was institutional shorthand for modernity. The NYC subway. NASA. American Airlines. Jeep, BMW, Lufthansa. Massimo Vignelli used it almost exclusively, arguing that one typeface was all any designer needed. The ubiquity became self-reinforcing: because Helvetica was everywhere, it became invisible, and because it was invisible, it seemed neutral, and because it seemed neutral, it was chosen again.</p>
   <h3>Arial: The Silent Substitution</h3>
   <p>In 1982, Robin Nicholas and Patricia Saunders at Monotype created Arial &mdash; matching Helvetica&rsquo;s metrics and proportions but using different terminal angles. When Microsoft needed a sans-serif for Windows 3.1 (1992), Arial was cheaper than licensing Helvetica from Linotype. The result: every Windows machine silently substitutes Arial when any application requests Helvetica. Most users have never seen Helvetica on their screens. Typographer Mark Simonson called Arial &ldquo;a parasite.&rdquo;<sup class="fn"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial">[7]</a><span class="tip"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial" target="_blank">Mark Simonson: The Scourge of Arial (2001) &rarr;</a></span></sup> There was no legal recourse &mdash; typefaces have no copyright protection in the United States.</p>
   <h3>The Counter-Reaction</h3>
   <p>Emigre magazine (1984&ndash;2005, VanderLans and Licko) birthed experimental digital type in Berkeley. David Carson at Ray Gun (1992&ndash;1995) made illegibility a statement &mdash; infamously setting an entire Bryan Ferry interview in Zapf Dingbats. Cranbrook Academy became the intellectual center for deconstructivist typography. The grunge movement lasted roughly 1990 to 1996, and died when the mainstream absorbed its gestures. But it permanently expanded what type could do: if Helvetica proved type could be invisible, Carson proved it could be loud.</p>
   <div class="callout"><h4>Key Insight</h4><p>The Helvetica story is not really about a typeface. It is about two irreconcilable positions: that design should erase itself in service of content, or that design is itself a form of content. Neither position is wrong. The tension between them is generative.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Type</em> &amp; Cognition</h2></div>
   <p>Typography is not just a visual art &mdash; it is a cognitive interface. Every time a reader encounters a word, the brain performs a cascade of pattern recognition, from identifying individual letterforms to parsing words, from decoding syntax to extracting meaning. The typeface in which those words are rendered affects every stage of that cascade, sometimes in ways that contradict intuition.</p>
   <h3>The Serif vs Sans-Serif Myth</h3>
   <p>The most persistent question in typography &mdash; which is more readable, serif or sans-serif? &mdash; is largely settled by empirical research. Eye-tracking studies show no significant reading speed difference between serif and sans-serif on modern screens.<sup class="fn"><a href="https://www.researchgate.net/publication/299536521">[8]</a><span class="tip"><a href="https://www.researchgate.net/publication/299536521" target="_blank">ResearchGate: Serif vs Sans Serif on Screen (2016) &rarr;</a></span></sup> Print offers a slight edge for serif in long-form reading, but the effect size is small. The stronger predictors of readability are character spacing, line length (50&ndash;75 characters optimal), contrast ratio (minimum 4.5:1 for accessibility), x-height, counter openness, and reader familiarity with the typeface.</p>
   <p>The practical takeaway: the serif versus sans-serif choice is primarily an aesthetic and tonal decision, not a readability one. Both categories are fully legible when well-designed and properly set.</p>
   <h3>The Disfluency Effect</h3>
   <p>In 2011, a study by Diemand-Yauman and colleagues appeared to show that harder-to-read fonts could improve memory and learning. The theory: &ldquo;desirable difficulty&rdquo; forces deeper cognitive processing. Media headlines followed. RMIT University in Melbourne created Sans Forgetica (2018), a typeface specifically designed to exploit the effect, with backslanted strokes and missing segments.</p>
   <p>The replication attempts were disappointing. Controlled studies found that Sans Forgetica did <em>not</em> improve recall compared to standard fonts.<sup class="fn"><a href="https://designregression.com/article/exploring-disfluency">[9]</a><span class="tip"><a href="https://designregression.com/article/exploring-disfluency" target="_blank">Design Regression: Exploring Disfluency (2023) &rarr;</a></span></sup> A 2020 meta-review found mixed results across studies, with the effect strongest for short texts and motivated readers in study contexts. Publication bias likely inflated initial positive findings. The disfluency effect is not a general-purpose learning tool and should not be used to justify making text harder to read.</p>
   <h3>Dyslexia and Typeface Design</h3>
   <p>Dyslexia affects 5&ndash;17% of the population. Dyslexic readers may experience letter reversal, visual crowding, letter migration, and difficulty tracking lines. The British Dyslexia Association recommends Comic Sans because its letter shapes are distinct &mdash; b and d are not mirror images. But no scientific study has demonstrated significant improvement from using Comic Sans specifically.</p>
   <p>OpenDyslexic (2011) was designed with weighted bottoms to prevent visual rotation. A 2016 controlled study found no improvement in reading rate or accuracy compared to Arial or Times New Roman.<sup class="fn"><a href="https://en.wikipedia.org/wiki/OpenDyslexic">[10]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/OpenDyslexic" target="_blank">Wikipedia: OpenDyslexic &rarr;</a></span></sup> Participants actually preferred Verdana or Helvetica. What helps dyslexic readers most is not a specialized typeface but adequate spacing, clear character differentiation, sufficient size (14pt+), and high contrast. Any well-designed sans-serif works.</p>
   <h3>Font Psychology in Branding</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Serif Fonts</h4><p>Increase perceived trustworthiness by approximately 40%. Associated with tradition, authority, reliability. Used in law, finance, luxury.</p></div>
     <div class="feat"><h4>Sans-Serif Fonts</h4><p>Signal modernity, innovation, approachability. Associated with technology, startups, contemporary brands. Clean and efficient.</p></div>
     <div class="feat"><h4>Round Fonts</h4><p>Perceived as friendly, warm, approachable. Softer emotional register. Used in food, children&rsquo;s products, wellness.</p></div>
     <div class="feat"><h4>Angular Fonts</h4><p>Perceived as authoritative, professional, strong. Sharper emotional register. Used in sports, automotive, industrial.</p></div>
   </div>
   <p>The most important finding from Monotype&rsquo;s research: font-brand congruence matters more than any single font property. A tech startup in Bodoni or a law firm in Comic Sans creates cognitive dissonance that undermines trust. The specific typeface matters less than the match between font personality and brand identity.</p>
   <div class="callout"><h4>Why Comic Sans Triggers Rage</h4><p>Vincent Connare designed Comic Sans in 1994 for Microsoft Bob &mdash; a children&rsquo;s interface. Its casual, handwritten style reads as deeply unprofessional in formal contexts. The reaction is to the mismatch between typeface and context, not to the typeface itself. The irony: one of the most hated fonts is also one of the most genuinely helpful for some readers.</p></div>`,

   <p>The shift from physical type to digital type was not a single event but a series of format wars, each driven by corporate competition and resolved by market consolidation. The result &mdash; OpenType and variable fonts &mdash; is elegant. The path to get there was messy.</p>
   <h3>The Format Wars</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">1984&ndash;85 &mdash; PostScript</div><div class="tl-text">Adobe&rsquo;s Charles Geschke and John Warnock created a page description language that treated text as mathematical outlines. Type 1 fonts with &ldquo;hinting&rdquo; for low-resolution screens. Apple licensed it for the LaserWriter. The desktop publishing revolution began.</div></div>
     <div class="tl-item"><div class="tl-date">~1991 &mdash; TrueType</div><div class="tl-text">Apple developed TrueType to break Adobe&rsquo;s monopoly, then licensed it to Microsoft. Quadratic B-splines vs PostScript&rsquo;s cubic B&eacute;ziers. Both platforms bundled it: Apple in System 7, Microsoft in Windows 3.1.</div></div>
     <div class="tl-item"><div class="tl-date">Mid-1990s &mdash; OpenType</div><div class="tl-text">Adobe and Microsoft jointly merged both formats. Up to 65,536 glyphs. Ligatures, small caps, old-style figures, stylistic sets. Cross-platform. The standard by the mid-2000s.</div></div>
     <div class="tl-item"><div class="tl-date">2016 &mdash; Variable Fonts</div><div class="tl-text">OpenType 1.8: a single font file with multiple axes (weight, width, slant, optical size). Jointly developed by Adobe, Apple, Google, Microsoft. One file replaces 10&ndash;20 static files.</div></div>
   </div>
   <h3>Google Fonts and Democratization</h3>
   <p>Before 2010, web designers had approximately twelve &ldquo;web-safe&rdquo; fonts. CSS @font-face changed the technical constraint, and Google Fonts removed the economic one. Free, open-source font families hosted on Google&rsquo;s CDN, now numbering 1,500+ with 70+ trillion total serves. Any website can use professional typography at zero cost.</p>
   <p>The concerns are real: each font request sends data to Google (IP address, referrer, user agent). German courts ruled in 2022 that this violates GDPR.<sup class="fn"><a href="https://devstars.com/2026-website-fonts-guide/">[11]</a><span class="tip"><a href="https://devstars.com/2026-website-fonts-guide/" target="_blank">DevStars: 2026 Website Fonts Guide &rarr;</a></span></sup> Self-hosting is the growing alternative: download fonts, serve them from your own domain, eliminate the privacy issue and the external dependency.</p>
   <h3>Web Typography in 2026</h3>
   <div class="feat-grid">
     <div class="feat"><h4>CSS clamp()</h4><p>Fluid typography that scales smoothly without breakpoints. Replaced media-query-based responsive type entirely.</p></div>
     <div class="feat"><h4>System Font Stacks</h4><p>system-ui, -apple-system, BlinkMacSystemFont as zero-latency fallbacks. Performance benefit: no font file download at all.</p></div>
     <div class="feat"><h4>Variable Fonts</h4><p>Now the default standard. Google endorsing with Google Sans Flex. Progressive enhancement: static fallback, variable for capable browsers.</p></div>
     <div class="feat"><h4>WOFF2 + Subsetting</h4><p>Standard compression format. Character subsetting removes unused glyphs. font-display: swap prevents invisible text during loading.</p></div>
   </div>
   <div class="callout"><h4>This Project&rsquo;s Font Stack</h4><p>EB Garamond (Georg Duffner&rsquo;s revival of Claude Garamond&rsquo;s 16th-century type) for serif headings and prose. Jost (Owen Earl&rsquo;s geometric sans inspired by Paul Renner&rsquo;s Futura) for body text and UI. IBM Plex Mono (Mike Abbink/Bold Monday for IBM) for data and code. Three fonts, three roles, three centuries of type history.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>Type</em> as Culture</h2></div>
   <p>Typography is never just shapes on a page. Letterforms carry history, politics, identity, and power &mdash; sometimes deliberately encoded, sometimes inherited unwittingly. A typeface choice that seems purely aesthetic may signal national allegiance, colonial legacy, or cultural resistance.</p>
   <h3>The Fraktur Paradox</h3>
   <p>Fraktur&rsquo;s trajectory is the most politically charged in type history. It begins with Martin Luther choosing blackletter to distinguish Protestant texts from Catholic ones, effectively designating it as the Protestant typeface. After German unification in 1871, Fraktur became the official state typeface. Bismarck refused to read books set in Roman type. The Reichstag debated the issue. Using Antiqua was considered &ldquo;un-German.&rdquo;</p>
   <p>The Nazis initially championed Fraktur as the embodiment of Germanic identity. Then in 1941 &mdash; the reversal. Martin Bormann&rsquo;s decree recharacterized Fraktur as &ldquo;Judenletter,&rdquo; claiming Jewish printers had contaminated the letterform.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Antiqua%E2%80%93Fraktur_dispute">[12]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Antiqua%E2%80%93Fraktur_dispute" target="_blank">Wikipedia: Antiqua-Fraktur Dispute &rarr;</a></span></sup> The likely real reason: Fraktur was unreadable in occupied territories, and the Reich needed Latin type for administrative control across Europe. The Nazis banned the very typeface they had championed. Today, Fraktur exists in permanent cultural radioactivity, reclaimed by neo-Nazi groups, navigated carefully by German designers, and impossible to use without invoking its history.</p>
   <h3>Didot and Revolutionary France</h3>
   <p>After the French Revolution, the Didot family&rsquo;s high-contrast modern style supplanted Garamond &mdash; which carried associations with the Ancien R&eacute;gime. Didot represented renewal, modernity, and nascent industrialization. It was imposed on French regulatory matter and school books, becoming the typeface of the French state until the 1950s. Where Germany encoded nationalism in blackletter, France encoded revolution in extreme contrast.</p>
   <h3>Colonial Typography</h3>
   <p>Typography was a fundamentally European technology exported through colonialism. Missionary presses across Africa, Asia, and the Americas were designed for Latin scripts. Indigenous writing systems &mdash; some with hundreds or thousands of characters &mdash; had to be forced into technology built for 26 letters. The result: scripts were simplified, distorted, or abandoned in favor of Latin transliteration. Digital font production software in 2026 still primarily serves the Latin script; all other scripts are adaptations to Latin-centric tools.</p>
   <h3>Non-Latin Script Challenges</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Devanagari</h4><p>Central to Indian national identity. Complex conjunct characters, horizontal headline (shirorekha), multiple vowel mark positions. Gandhi advocated it as a unifying script. Typography was a European import that forced adaptation.</p></div>
     <div class="feat"><h4>Arabic Script</h4><p>Right-to-left. Up to 4 contextual forms per letter. Connected script. Deep calligraphic tradition. The 29LT foundry works to bridge Arabic and Latin harmoniously without forcing conformity.</p></div>
     <div class="feat"><h4>CJK Characters</h4><p>50,000+ characters in common use. Each must be individually designed. A CJK font with 20,000 glyphs requires 100&times; the design effort of a Latin font. Regional variants shaped by government policy.</p></div>
     <div class="feat"><h4>Emoji</h4><p>176 Japanese pictographs (1999) to 3,836 Unicode characters (2025). Governed by the same Unicode Consortium that manages the letter A. An unexpected convergence of pictographic and typographic systems.</p></div>
   </div>
   <h3>The Emoji Revolution</h3>
   <p>Shigetaka Kurita created the first 176 emoji in 1999 for NTT DoCoMo on a 12&times;12 pixel grid, inspired by manga and weather symbols. After Unicode standardization in 2010, they exploded globally. Skin tone modifiers arrived in 2015. By 2025, 3,836 official emoji existed. Apple&rsquo;s Genmoji (2024) generates them with AI.</p>
   <p>Emoji function as punctuation, tone markers, standalone communication, cultural markers, and even legal evidence. They are pictographs, not letterforms &mdash; yet they exist in font files, are encoded in Unicode, render alongside text, and are governed by the same standards body. They are the biggest expansion of what counts as &ldquo;typography&rdquo; since the invention of italic type 500 years ago.</p>
   <div class="callout"><h4>The Thread</h4><p>Typography is never neutral. Every letterform carries the weight of the culture that created it, the technology that rendered it, and the power structures that distributed it. To choose a typeface is to make a cultural statement, whether the designer intends it or not.</p></div>`
];


// Build DOM
const shell = document.createElement('div');
shell.className = 'shell';
shell.innerHTML = `
  <div class="ctrl-group" id="ctrl-group">
    <button class="ctrl-btn theme-btn" onclick="toggleTheme()"></button>
    <button class="ctrl-btn detail-btn" id="detail-btn" onclick="toggleDetail()">
      <span class="icon-open"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></span>
      <span class="icon-close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="6.5" y1="12" x2="13" y2="12"/></svg></span>
    </button>
  </div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">Art of<em>T</em></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>
  <div class="main" id="main">
    <div class="main-head">
      <div class="main-head-inner">
        <div class="hero-badge"><span class="dot"></span> Deep Survey &middot; Gutenberg to Google Fonts</div>
        <div class="hero-title">The Art of <em>Typography</em></div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub"><span>60 sources &middot; 6 dimensions &middot; 580 years</span></div>
      </div>
    </div>
    <div class="main-scroll" id="main-scroll"></div>
  </div>
  <div class="right closed" id="right">
    <div class="right-topbar"><span class="sticky-title" id="right-sticky-title"></span></div>
    <div class="right-inner" id="right-inner"></div>
  </div>
`;
document.body.appendChild(shell);

// Build sidebar
const sidebarNav = document.getElementById('sidebar-nav');
sections.forEach((sec, idx) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (idx === 0 ? ' active' : '');
  item.setAttribute('data-label', sec.short);
  item.innerHTML = `<span class="sidebar-num">${sec.num}</span><span class="sidebar-label">${sec.short}</span>`;
  item.onclick = () => scrollToSection(idx);
  sidebarNav.appendChild(item);
});

// Sidebar hover tooltip
const sidebarTip = document.createElement('div');
sidebarTip.className = 'sidebar-tooltip';
document.body.appendChild(sidebarTip);
const sidebarEl = document.querySelector('.sidebar');
let tipActive = false;
sidebarNav.addEventListener('mouseleave', () => {
  tipActive = false;
  sidebarTip.classList.remove('visible');
});
sidebarNav.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('detail-open')) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const item = e.target.closest('.sidebar-item');
  if (!item) {
    if (tipActive) { tipActive = false; sidebarTip.classList.remove('visible'); }
    return;
  }
  const rect = item.getBoundingClientRect();
  const sRight = sidebarEl.getBoundingClientRect().right;
  sidebarTip.textContent = item.getAttribute('data-label');
  sidebarTip.style.left = (sRight - 1) + 'px';
  sidebarTip.style.top = rect.top + 'px';
  sidebarTip.style.height = rect.height + 'px';
  if (!tipActive) { tipActive = true; sidebarTip.classList.add('visible'); }
});

// Build main scroll
const mainScroll = document.getElementById('main-scroll');
const mainInner = document.createElement('div');
mainInner.className = 'main-scroll-inner';
mainScroll.appendChild(mainInner);
sections.forEach((sec, idx) => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `
    <div class="s-num"><span>${sec.num}</span><button class="s-detail-btn" onclick="openDetail(${idx})"><svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg></button></div>
    <h2>${sec.title}</h2>
    ${summaries[idx]}
  `;
  mainInner.appendChild(block);
});

// Build details
const rightInner = document.getElementById('right-inner');
sections.forEach((sec, idx) => {
  const detailDiv = document.createElement('div');
  detailDiv.className = 'detail';
  detailDiv.id = `detail-${idx}`;
  detailDiv.innerHTML = details[idx];
  rightInner.appendChild(detailDiv);
});

// Functions
let lastDetailIdx = 0;
function scrollToSection(idx) {
  const blocks = document.querySelectorAll('.section-block');
  if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'});
}
function openDetail(idx) {
  lastDetailIdx = idx;
  document.querySelectorAll('.detail').forEach(d => d.style.display = 'none');
  document.getElementById(`detail-${idx}`).style.display = 'block';
  document.getElementById('right').classList.remove('closed');
  document.body.classList.add('detail-open');
  document.getElementById('right').scrollTop = 0;
  document.getElementById('right-sticky-title').classList.remove('visible');
}
function closeRight() {
  document.getElementById('right').classList.add('closed');
  document.body.classList.remove('detail-open');
}
function toggleDetail() {
  if (document.body.classList.contains('detail-open')) { closeRight(); } else { openDetail(lastDetailIdx); }
}
function toggleTheme() {
  const current = document.body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Scroll spy + compact header
mainScroll.addEventListener('scroll', () => {
  document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40);
  const blocks = mainScroll.querySelectorAll('.section-block');
  const items = document.querySelectorAll('.sidebar-item');
  let activeIdx = 0;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i;
  });
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
});

// Sticky header in right panel
const rightPanelOuter = document.getElementById('right');
const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => {
  const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]');
  if (!activeDetail) return;
  const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2');
  if (!h2) return;
  const rect = h2.getBoundingClientRect();
  const panelRect = rightPanelOuter.getBoundingClientRect();
  const topbar = document.querySelector('.right-topbar');
  if (rect.bottom < panelRect.top + 56) {
    stickyTitle.textContent = h2.textContent;
    stickyTitle.classList.add('visible');
    topbar.classList.add('scrolled');
  } else {
    stickyTitle.classList.remove('visible');
    topbar.classList.remove('scrolled');
  }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
</script>

<script>
(function(){
  var MP3 = 'overview.mp3';

  // 1. Inject CSS
  var css = document.createElement('style');
  css.textContent = `
    .audio-bar{display:flex;align-items:center;gap:10px;padding:10px 0 4px;margin-top:6px;max-height:50px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
    .main-head.compact .audio-bar{max-height:0;padding:0;opacity:0;margin:0;pointer-events:none}
    .audio-bar audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    [data-theme="dark"] .audio-bar audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
    .ctrl-btn.audio-ctrl{display:none;position:relative}
    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}
    .audio-bottom audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    .audio-bottom .audio-dismiss{cursor:pointer;color:var(--dim);font-size:13px;padding:4px 8px;border:none;background:none;font-family:var(--sans);letter-spacing:.5px;transition:color .2s}
    .audio-bottom .audio-dismiss:hover{color:var(--accent)}
    [data-theme="dark"] .audio-bottom audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = '<audio id="audio-main" controls preload="none" src="'+MP3+'"></audio>';
  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
