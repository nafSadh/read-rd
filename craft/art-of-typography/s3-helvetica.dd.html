<script>
const sections = [
  { num: '01', short: 'Overview', title: 'The <em>Helvetica</em> Question' },
  { num: '02', short: 'Swiss Style', title: 'The <em>Swiss</em> International Style' },
  { num: '03', short: 'Creation', title: '<em>Helvetica</em>&rsquo;s Creation' },
  { num: '04', short: 'Corporate', title: 'The <em>Corporate</em> Conquest' },
  { num: '05', short: 'Documentary', title: 'The <em>Documentary</em>' },
  { num: '06', short: 'Arial', title: '<em>Arial</em>: The Great Knockoff' },
  { num: '07', short: 'Backlash', title: 'The <em>Counter</em>-Reaction' }
];

const summaries = [
  `<p>In 1957, Max Miedinger designed a typeface so neutral it was meant to have no meaning of its own.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Helvetica">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Helvetica" target="_blank">Wikipedia: Helvetica &rarr;</a></span></sup> By the 1970s, Helvetica was the visual identity of the NYC subway, NASA, American Airlines, and half the Fortune 500. Then came the backlash: Emigre magazine, David Carson, grunge typography. And Microsoft created Arial &mdash; silently substituting it for Helvetica on every Windows machine.</p>
   <p>The Helvetica story is really a proxy war between two visions of design: universal clarity vs personal expression.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1957</div><div class="sl">Helvetica designed</div></div>
     <div class="st"><div class="sv">2007</div><div class="sl">Hustwit documentary</div></div>
     <div class="st"><div class="sv">1982</div><div class="sl">Arial created</div></div>
     <div class="st"><div class="sv">2019</div><div class="sl">Helvetica Now</div></div>
   </div>`,

  `<p>The Swiss International Typographic Style emerged from Bauhaus, Constructivism, and De Stijl in the 1930s&ndash;1960s.<sup class="fn"><a href="https://en.wikipedia.org/wiki/International_Typographic_Style">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/International_Typographic_Style" target="_blank">Wikipedia: International Typographic Style &rarr;</a></span></sup> Formalized in Zurich and Basel by Josef M&uuml;ller-Brockmann, Armin Hofmann, and Emil Ruder, it rested on mathematical grids, asymmetric balance, sans-serif type, photography over illustration, and flush left/ragged right text.</p>
   <p>The core philosophy: design should be objective communication, not personal expression. Typography should be invisible &mdash; the content speaks, not the container.<sup class="fn"><a href="https://blazetype.eu/swiss-modernism-and-type-design/">[3]</a><span class="tip"><a href="https://blazetype.eu/swiss-modernism-and-type-design/" target="_blank">Blaze Type: Swiss Modernism and Type Design &rarr;</a></span></sup></p>`,

  `<p>Max Miedinger designed the typeface in 1957 under art direction of Eduard Hoffmann at Haas Type Foundry, M&uuml;nchenstein, Switzerland. Originally named Neue Haas Grotesk (based on 1898 Akzidenz-Grotesk), it was renamed &ldquo;Helvetica&rdquo; in 1960 from the Latin for Switzerland &mdash; capitalizing on Switzerland&rsquo;s design reputation.</p>
   <p>Design goals: neutral, should not carry inherent meaning. Key features: horizontal terminals, tight uniform spacing, large x-height, near-uniform stroke width, and distinctively closed apertures &mdash; actually a legibility weakness, but the source of Helvetica&rsquo;s distinctive density.</p>`,

  `<p>By the 1970s, Helvetica was institutional shorthand for modernity: NYC subway (Massimo Vignelli, 1970), American Airlines, NASA, Jeep, BMW, Nestl&eacute;, Panasonic, Lufthansa.<sup class="fn"><a href="https://artpublikamag.com/helvetica-a-brief-history/">[4]</a><span class="tip"><a href="https://artpublikamag.com/helvetica-a-brief-history/" target="_blank">ArtPublikaMag: Helvetica: A Brief History &rarr;</a></span></sup> Massimo Vignelli built an entire practice on Helvetica exclusively. Michael Bierut called it &ldquo;air.&rdquo;<sup class="fn"><a href="https://eyeondesign.aiga.org/revisiting-helvetica/">[5]</a><span class="tip"><a href="https://eyeondesign.aiga.org/revisiting-helvetica/" target="_blank">AIGA Eye on Design: Revisiting Helvetica &rarr;</a></span></sup></p>
   <p>The ubiquity became self-reinforcing: because Helvetica was everywhere, it became invisible; because it was invisible, it seemed neutral; because it seemed neutral, it was chosen again.</p>`,

  `<p>Gary Hustwit&rsquo;s 2007 film featured 80+ interviews and grossed $1.7M on a $400K budget &mdash; remarkable for a documentary about a typeface.<sup class="fn"><a href="https://www.globalgeneva.com/helvetica-swiss-style-60-years-of-font-war/">[6]</a><span class="tip"><a href="https://www.globalgeneva.com/helvetica-swiss-style-60-years-of-font-war/" target="_blank">Global Geneva: Helvetica: 60 Years of Font War &rarr;</a></span></sup> The film structured as a debate: <strong>pro-Helvetica</strong> modernists (Vignelli, Crouwel, Experimental Jetset) vs <strong>anti-Helvetica</strong> expressionists (Spiekermann, Scher, Carson, Sagmeister).</p>
   <p>Wim Crouwel: the meaning is in the content, not the typeface. Erik Spiekermann: using Helvetica is like going to McDonald&rsquo;s.</p>`,

  `<p>In 1982, Robin Nicholas and Patricia Saunders created Arial at Monotype &mdash; matching Helvetica&rsquo;s metrics exactly but differing in terminal angles.<sup class="fn"><a href="https://www.4over4.com/blog/guide-to-arials-history">[7]</a><span class="tip"><a href="https://www.4over4.com/blog/guide-to-arials-history" target="_blank">4over4: Guide to Arial&rsquo;s History &rarr;</a></span></sup> Microsoft licensed Arial for Windows 3.1 (1992) to avoid Linotype&rsquo;s Helvetica fee. Windows silently substitutes Arial whenever any application requests Helvetica.</p>
   <p>Mark Simonson called Arial &ldquo;a parasite.&rdquo;<sup class="fn"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial">[8]</a><span class="tip"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial" target="_blank">Mark Simonson: The Scourge of Arial (2001) &rarr;</a></span></sup> No legal recourse: typefaces have no copyright protection in the US.</p>`,

  `<p>Emigre magazine (VanderLans/Licko, 1984&ndash;2005) birthed experimental digital type in Berkeley. David Carson at Ray Gun (1992&ndash;1995) set an entire Bryan Ferry interview in Zapf Dingbats.<sup class="fn"><a href="https://www.hueandeye.com/david-carson-pioneering-grunge-typography/">[9]</a><span class="tip"><a href="https://www.hueandeye.com/david-carson-pioneering-grunge-typography/" target="_blank">HueAndEye: David Carson: Pioneering Grunge Typography &rarr;</a></span></sup> Barry Deck&rsquo;s Template Gothic (1990), Cranbrook Academy as intellectual center.</p>
   <p>The grunge movement lasted roughly 1990&ndash;1996 and died when the mainstream absorbed its gestures.<sup class="fn"><a href="https://www.theawl.com/2012/01/the-rise-and-fall-of-grunge-typography/">[10]</a><span class="tip"><a href="https://www.theawl.com/2012/01/the-rise-and-fall-of-grunge-typography/" target="_blank">The Awl: Rise and Fall of Grunge Typography &rarr;</a></span></sup> But it permanently expanded what type could do.</p>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2>The <em>Helvetica</em> Question</h2></div>
   <p>The Helvetica question is not really about a typeface. It is about two irreconcilable positions in design: that design should erase itself in service of content, or that design is itself a form of content. Neither position is wrong. The tension between them is generative &mdash; it has driven sixty years of typographic innovation and debate.</p>
   <h3>Why Helvetica Matters</h3>
   <p>No typeface in history has provoked more discussion, inspired more imitation, or generated more backlash than Helvetica. It is simultaneously the most used typeface in the world and the most criticized. It has been called the embodiment of democratic design and the typeface of corporate conformity. Understanding why requires understanding the Swiss design movement that created it, the corporations that adopted it, the designers who rebelled against it, and the knockoff that replaced it on most computers.</p>
   <div class="callout"><h4>The Central Paradox</h4><p>Helvetica was designed to be neutral &mdash; to carry no meaning of its own. But its very ubiquity made it the most meaning-laden typeface in existence. When everything from the NYC subway to the IRS uses the same typeface, that typeface becomes associated with institutional authority whether its designers intended it or not. Neutrality, it turns out, is its own ideology.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>The <em>Swiss</em> International Style</h2></div>
   <p>The Swiss International Typographic Style &mdash; also known simply as the International Style &mdash; emerged from two Swiss cities: Zurich (the Kunstgewerbeschule) and Basel (the Allgemeine Gewerbeschule).<sup class="fn"><a href="https://en.wikipedia.org/wiki/International_Typographic_Style">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/International_Typographic_Style" target="_blank">Wikipedia: International Typographic Style &rarr;</a></span></sup> Its intellectual roots lay in the Bauhaus, Constructivism, and De Stijl, but its formalization was distinctly Swiss.</p>
   <h3>Key Figures</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Josef M&uuml;ller-Brockmann</h4><p>The grid master. His poster designs for the Zurich Tonhalle are canonical examples of grid-based composition. Author of Grid Systems in Graphic Design.</p></div>
     <div class="feat"><h4>Armin Hofmann</h4><p>Basel teacher who emphasized the relationship between form and communication. His work explored the tension between geometric abstraction and photographic realism.</p></div>
     <div class="feat"><h4>Emil Ruder</h4><p>Author of Typography: A Manual of Design. Codified the principles of Swiss typography into a teachable system. Insisted on the primacy of legibility.</p></div>
     <div class="feat"><h4>Max Bill</h4><p>Bauhaus graduate who brought its principles to Switzerland. Founded the Ulm School of Design (1953). Bridge between Bauhaus modernism and Swiss formalism.</p></div>
   </div>
   <p>The Swiss Style elevated typography to the status of primary design element. The mathematical grid became the organizing principle for all visual communication. Photography replaced illustration. Sans-serif type &mdash; specifically grotesque and neo-grotesque faces &mdash; replaced serif type as the default for professional design. The philosophy was explicit: design as objective communication, stripped of personal expression.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2><em>Helvetica</em>&rsquo;s Creation</h2></div>
   <p>In 1957, Max Miedinger &mdash; a former Haas salesman turned freelance designer &mdash; was commissioned by Eduard Hoffmann to update the foundry&rsquo;s aging sans-serif offerings.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Helvetica">[2]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Helvetica" target="_blank">Wikipedia: Helvetica &rarr;</a></span></sup> The base was Akzidenz-Grotesk (1898), a workhorse grotesque with known irregularities. Miedinger&rsquo;s goal: smooth out the imperfections without adding personality.</p>
   <h3>What Makes Helvetica Helvetica</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Horizontal Terminals</h4><p>Unlike most grotesques, Helvetica&rsquo;s stroke endings are horizontal. This creates the signature closed feel and distinguishes it from Akzidenz-Grotesk&rsquo;s angled terminals.</p></div>
     <div class="feat"><h4>Closed Apertures</h4><p>The openings of e, c, s are relatively small. This is actually a legibility weakness at small sizes &mdash; but it creates Helvetica&rsquo;s distinctive visual density.</p></div>
     <div class="feat"><h4>Large X-Height</h4><p>The x-height is tall relative to cap height, giving an impression of solidity and modernity even at small sizes.</p></div>
     <div class="feat"><h4>Near-Uniform Stroke</h4><p>Very little variation between thick and thin strokes. The result: a machine-like regularity that reads as objectivity and neutrality.</p></div>
   </div>
   <h3>Helvetica Now (2019)</h3>
   <p>The first major update to Helvetica in 35 years. Three optical sizes (Micro, Text, Display) addressed the original&rsquo;s legibility weaknesses at small sizes. A Monotype project that acknowledged even the &ldquo;perfect&rdquo; typeface needed to evolve for contemporary use.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2>The <em>Corporate</em> Conquest</h2></div>
   <p>Helvetica&rsquo;s corporate adoption was not accidental &mdash; it was driven by the Swiss Style&rsquo;s promise of universal, objective communication. For corporations seeking to project modernity, efficiency, and trustworthiness, Helvetica offered a ready-made visual identity that required no explanation.</p>
   <h3>The Adoption Timeline</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">1960s &mdash; European Adoption</div><div class="tl-text">Lufthansa, BMW, and other European corporations adopted Helvetica as part of comprehensive identity programs influenced by the Swiss Style.</div></div>
     <div class="tl-item"><div class="tl-date">1970 &mdash; NYC Subway</div><div class="tl-text">Massimo Vignelli&rsquo;s signage system for the New York City subway made Helvetica the typeface of America&rsquo;s largest transit system.</div></div>
     <div class="tl-item"><div class="tl-date">1970s &mdash; US Government</div><div class="tl-text">IRS forms, federal signage, and government publications adopted Helvetica. The typeface became the voice of American institutional authority.</div></div>
     <div class="tl-item"><div class="tl-date">1970s&ndash;80s &mdash; Peak Ubiquity</div><div class="tl-text">American Airlines, NASA, Jeep, Nestl&eacute;, Panasonic, 3M. Helvetica became the default for any corporation seeking to project neutral professionalism.</div></div>
   </div>
   <p>Massimo Vignelli built an entire practice on Helvetica, arguing it was the only typeface a designer needed. His position was extreme but influential: if design should serve content transparently, then choosing a neutral typeface and using it consistently is the logical conclusion.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2>The <em>Documentary</em></h2></div>
   <p>Gary Hustwit&rsquo;s 2007 documentary <em>Helvetica</em> was a cultural event: the first feature-length film about a typeface, and improbably successful &mdash; $1.7 million at the box office on a $400,000 budget.<sup class="fn"><a href="https://www.globalgeneva.com/helvetica-swiss-style-60-years-of-font-war/">[3]</a><span class="tip"><a href="https://www.globalgeneva.com/helvetica-swiss-style-60-years-of-font-war/" target="_blank">Global Geneva: Helvetica: 60 Years of Font War &rarr;</a></span></sup></p>
   <h3>The Debate Structure</h3>
   <div class="verdict">
     <div class="v-col pro"><h4>Pro-Helvetica (Modernists)</h4><ul><li>Vignelli: only typeface needed</li><li>Crouwel: meaning in content, not type</li><li>Experimental Jetset: neutrality as virtue</li><li>Design serves content, not ego</li><li>Universal, timeless, democratic</li></ul></div>
     <div class="v-col con"><h4>Anti-Helvetica (Expressionists)</h4><ul><li>Spiekermann: like going to McDonald&rsquo;s</li><li>Scher: Helvetica is boring authority</li><li>Carson: legibility is not communication</li><li>Sagmeister: neutrality is a myth</li><li>Absence of expression = expression of blandness</li></ul></div>
   </div>
   <p>The film&rsquo;s lasting contribution was making typography visible to a general audience. Before Hustwit, typeface design was an inside-baseball conversation among designers. After the documentary, people began noticing &mdash; and having opinions about &mdash; the letters that surrounded them every day.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>Arial</em>: The Great Knockoff</h2></div>
   <p>The Arial story is one of corporate pragmatism trumping design integrity. In 1982, Robin Nicholas and Patricia Saunders at Monotype created Arial, based on Monotype&rsquo;s Grotesque designs but matching Helvetica&rsquo;s metrics exactly &mdash; the same character widths, the same proportions, the same spacing tables.<sup class="fn"><a href="https://www.4over4.com/blog/guide-to-arials-history">[4]</a><span class="tip"><a href="https://www.4over4.com/blog/guide-to-arials-history" target="_blank">4over4: Guide to Arial&rsquo;s History &rarr;</a></span></sup></p>
   <p>When Microsoft needed a sans-serif for Windows 3.1 (1992), Apple had already paid Linotype&rsquo;s licensing fee for Helvetica. Microsoft chose the cheaper route: license Arial from Monotype. The consequence was profound: Windows silently substitutes Arial whenever <em>any</em> application requests Helvetica. Most Windows users have never seen actual Helvetica on their screens, though they have read millions of words in what they believed was Helvetica.</p>
   <h3>The Differences</h3>
   <p>Mark Simonson&rsquo;s definitive critique identified the key differences: Arial has angled terminals where Helvetica has horizontal ones. The lowercase &lsquo;a&rsquo;, uppercase &lsquo;G&rsquo;, and uppercase &lsquo;R&rsquo; are the most visible distinctions.<sup class="fn"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial">[5]</a><span class="tip"><a href="https://www.marksimonson.com/notebook/view/the-scourge-of-arial" target="_blank">Mark Simonson: The Scourge of Arial (2001) &rarr;</a></span></sup> But at body text sizes, the differences are subtle enough that most readers never notice. The controversy is aesthetic and ethical, not legal: typefaces have no copyright protection in the United States. Monotype&rsquo;s Arial was technically legitimate.</p>
   <div class="callout"><h4>The Lesson</h4><p>Arial&rsquo;s success demonstrates that in typography, distribution beats design. A technically inferior typeface that ships on every computer will always reach more people than a superior one behind a paywall. Microsoft didn&rsquo;t need to create a better typeface than Helvetica &mdash; they needed one that was cheap, compatible, and good enough.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2>The <em>Counter</em>-Reaction</h2></div>
   <p>The backlash against Helvetica and Swiss rationalism was not a single movement but a convergence of independent revolts, each rejecting the idea that typography should be invisible, objective, and universal.</p>
   <h3>Emigre Magazine (1984&ndash;2005)</h3>
   <p>Founded by Rudy VanderLans and Zuzana Licko in Berkeley, California, Emigre was the birthplace of experimental digital typography. Licko designed typefaces <em>on</em> the Macintosh, embracing pixel constraints rather than fighting them. Her famous observation &mdash; &ldquo;people read best what they read most&rdquo; &mdash; challenged the assumption that certain typefaces are inherently more readable. The magazine published 69 issues, each a typographic experiment.</p>
   <h3>David Carson and Ray Gun (1992&ndash;1995)</h3>
   <p>Carson was a surfer and sociologist, not a trained designer &mdash; which freed him from typographic conventions.<sup class="fn"><a href="https://www.hueandeye.com/david-carson-pioneering-grunge-typography/">[6]</a><span class="tip"><a href="https://www.hueandeye.com/david-carson-pioneering-grunge-typography/" target="_blank">HueAndEye: David Carson &rarr;</a></span></sup> His art direction of the alternative music magazine Ray Gun deliberately violated every Swiss Style principle: text was layered, distorted, rotated, and occasionally rendered unreadable. The Bryan Ferry interview set entirely in Zapf Dingbats was the ultimate provocation: content as pure illegibility.</p>
   <h3>The Grunge Movement (~1990&ndash;1996)</h3>
   <p>Barry Deck&rsquo;s Template Gothic (1990) &mdash; based on a laundromat sign &mdash; became the typographic emblem of the movement.<sup class="fn"><a href="https://www.theawl.com/2012/01/the-rise-and-fall-of-grunge-typography/">[7]</a><span class="tip"><a href="https://www.theawl.com/2012/01/the-rise-and-fall-of-grunge-typography/" target="_blank">The Awl: Rise and Fall of Grunge Typography &rarr;</a></span></sup> Cranbrook Academy of Art, under Katherine McCoy, provided the intellectual framework: deconstructivist theory applied to letterforms. The movement was short-lived &mdash; it died when MTV and Nike absorbed its visual language &mdash; but it permanently expanded what typography could express.</p>
   <div class="callout"><h4>The Legacy</h4><p>If Helvetica proved type could be invisible, Carson proved it could be loud. The grunge rebellion demonstrated that legibility and communication are not synonyms &mdash; that a typeface can communicate powerfully even when (or especially when) it resists easy reading. The mainstream absorbed grunge&rsquo;s gestures, but the permission it granted &mdash; to use type expressively, emotionally, even irrationally &mdash; endures.</p></div>`
];

function toggleDetail() { if (document.body.classList.contains('detail-open')) { closeRight(); } else { openDetail(lastDetailIdx); } }
