<body data-theme="light">
<script>
const sections = [
  { num: '01', short: 'Overview', title: '<em>Anatomy</em> &amp; Classification' },
  { num: '02', short: 'Baseline', title: 'The <em>Baseline</em> System' },
  { num: '03', short: 'Strokes', title: '<em>Stroke</em> Components' },
  { num: '04', short: 'Spacing', title: '<em>Spacing</em> Systems' },
  { num: '05', short: 'Vox-ATypI', title: 'The <em>Vox-ATypI</em> System' },
  { num: '06', short: 'Modern', title: '<em>Modern</em> Classification' },
  { num: '07', short: 'Font vs Type', title: '<em>Font</em> vs Typeface' }
];

const summaries = [
  `<p>Typography has a precise anatomical vocabulary: x-height, ascenders, descenders, counters, bowls, stems, serifs, finials.<sup class="fn"><a href="https://www.interaction-design.org/literature/topics/anatomy-of-type">[1]</a><span class="tip"><a href="https://www.interaction-design.org/literature/topics/anatomy-of-type" target="_blank">IxDF: What is Anatomy of Type? &rarr;</a></span></sup> These are not decorative labels &mdash; they describe the structural elements that determine how a typeface reads at any size, in any medium, for any audience.</p>
   <p>Understanding letterform anatomy is the difference between knowing you don&rsquo;t like a typeface and knowing <em>why</em>. X-height alone accounts for more perceived size variation than the actual point size.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">9</div><div class="sl">Vox-ATypI categories</div></div>
     <div class="st"><div class="sv">1954</div><div class="sl">System created</div></div>
     <div class="st"><div class="sv">2021</div><div class="sl">Formally de-adopted</div></div>
     <div class="st"><div class="sv">7</div><div class="sl">Modern categories</div></div>
   </div>`,

  `<p>The baseline is the invisible line letters sit on. X-height &mdash; the distance from baseline to the top of lowercase &lsquo;x&rsquo; &mdash; is the single most important metric for perceived size and legibility.<sup class="fn"><a href="https://www.designmodo.com/typography-anatomy/">[2]</a><span class="tip"><a href="https://www.designmodo.com/typography-anatomy/" target="_blank">Designmodo: Anatomy of a Letterform &rarr;</a></span></sup> Two typefaces at the same point size can look dramatically different in apparent size if their x-heights differ.</p>
   <p>Cap height marks the top of uppercase letters. Ascenders (b, d, h, k, l) rise above x-height; descenders (g, j, p, q, y) drop below baseline. These five reference lines &mdash; baseline, x-height, cap height, ascender line, descender line &mdash; define the vertical architecture of every typeface.</p>`,

  `<p>Every letterform is built from a vocabulary of strokes. The <strong>stem</strong> is the main vertical stroke. The <strong>crossbar</strong> is horizontal (as in H, A, e). The <strong>bowl</strong> is the curved stroke enclosing a counter (in b, d, p, q, o). The <strong>counter</strong> is the enclosed or partially enclosed space within a letter &mdash; and counter openness directly affects legibility at small sizes.</p>
   <p>Decorative elements include <strong>serifs</strong> (extensions at stroke ends), <strong>finials</strong> (tapered or rounded endings), <strong>spurs</strong> (small projections), the <strong>ear</strong> of lowercase g, the <strong>apex</strong> of A, and the <strong>vertex</strong> of V.</p>
   <div class="chips">
     <span class="chip">stem</span><span class="chip">crossbar</span><span class="chip">bowl</span><span class="chip">counter</span><span class="chip">shoulder</span><span class="chip">spine</span><span class="chip">serif</span><span class="chip">finial</span><span class="chip">terminal</span><span class="chip">spur</span><span class="chip">apex</span><span class="chip">vertex</span>
   </div>`,

  `<p><strong>Kerning</strong> adjusts space between specific character pairs &mdash; the classic problems: AV, To, We. Good kerning is invisible; bad kerning is immediately noticeable. Modern fonts include hundreds to thousands of kerning pairs.<sup class="fn"><a href="https://www.numberanalytics.com/blog/ultimate-guide-to-type-design">[3]</a><span class="tip"><a href="https://www.numberanalytics.com/blog/ultimate-guide-to-type-design" target="_blank">NumberAnalytics: Ultimate Guide to Type Design &rarr;</a></span></sup></p>
   <p><strong>Tracking</strong> applies uniform spacing across a group of characters. <strong>Leading</strong> is vertical distance between baselines, named for the lead strips between lines of metal type. Best practice: 1.4&ndash;1.6&times; font size for body text.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">1.4&ndash;1.6&times;</div><div class="sl">Ideal leading ratio</div></div>
     <div class="st"><div class="sv">50&ndash;75</div><div class="sl">Chars per line optimal</div></div>
     <div class="st"><div class="sv">1000s</div><div class="sl">Kerning pairs in fonts</div></div>
   </div>`,

  `<p>Maximilien Vox devised the system in 1954. ATypI adopted it in 1962.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification">[4]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification" target="_blank">Wikipedia: Vox-ATypI Classification &rarr;</a></span></sup> Nine categories organized by formal criteria: Humanist, Garalde, Transitional, Didone, Mechanistic, Lineale, Glyphic, Script, Blackletter. The system traced a rough arc from Renaissance pen-drawn forms to modern geometric constructions.</p>
   <p>In 2021, ATypI formally de-adopted the system:<sup class="fn"><a href="https://atypi.org/de-adoption-of-vox-atypi/">[5]</a><span class="tip"><a href="https://atypi.org/de-adoption-of-vox-atypi/" target="_blank">ATypI: De-adoption of Vox-ATypI (2021) &rarr;</a></span></sup> it could not classify contemporary type, was Eurocentric, and its categories blurred in practice. No replacement has been adopted.</p>`,

  `<p>Working designers use a simpler, practical taxonomy: <strong>serif</strong> (traditional, authoritative), <strong>sans-serif</strong> (modern, clean), <strong>slab serif</strong> (bold, editorial), <strong>monospace</strong> (code, data), <strong>display</strong> (headlines only), <strong>script</strong> (formal, branding), and <strong>blackletter</strong> (historical, cultural).<sup class="fn"><a href="https://blkbkfonts.com/type-classification/">[6]</a><span class="tip"><a href="https://blkbkfonts.com/type-classification/" target="_blank">BLKBK Fonts: Type Classification &rarr;</a></span></sup></p>
   <p>The real skill is reading a typeface: understanding how x-height affects perceived size, how counter openness affects legibility, how stroke contrast creates personality. Classification is a starting point, not an answer.</p>`,

  `<p>The distinction matters: a <strong>typeface</strong> is the design (Helvetica); a <strong>font</strong> is a specific implementation (Helvetica Bold Italic 12pt, or Helvetica.otf). The analogy: a typeface is a song; a font is a specific recording. A <strong>font family</strong> is the complete set of fonts in a typeface.</p>
   <p>In practice, &ldquo;font&rdquo; has become the colloquial term for both. Designers who care about precision maintain the distinction. In digital contexts, a &ldquo;font file&rdquo; is technically correct &mdash; you download fonts, not typefaces.</p>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Anatomy</em> &amp; Classification</h2></div>
   <p>Every letterform is an engineering drawing, even when it looks like art. The anatomy of type is a precise vocabulary that designers use to describe, evaluate, and communicate about letterforms. Understanding it is the difference between knowing you don&rsquo;t like a typeface and knowing <em>why</em> &mdash; and being able to articulate that reason to others.</p>
   <h3>Why Anatomy Matters</h3>
   <p>When a designer says a typeface has &ldquo;a large x-height and open counters,&rdquo; they are making a specific claim about legibility at small sizes. When a critic says Helvetica has &ldquo;closed apertures,&rdquo; they are identifying a measurable feature that affects readability. When a brand guidelines document specifies &ldquo;minimum tracking of 20 units for all-caps headings,&rdquo; it is applying anatomical knowledge to ensure consistent visual quality. The vocabulary is not academic decoration &mdash; it is a working toolkit.</p>
   <h3>The Classification Challenge</h3>
   <p>The Vox-ATypI system served for sixty years as the international standard for classifying typefaces.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification" target="_blank">Wikipedia: Vox-ATypI Classification &rarr;</a></span></sup> Its de-adoption in 2021 left a vacuum: we have no agreed-upon replacement. The practical taxonomy that working designers use (serif, sans-serif, slab, monospace, display, script, blackletter) is useful but crude. It tells you nothing about stroke contrast, axis angle, or aperture width &mdash; the features that actually distinguish one sans-serif from another.</p>
   <div class="callout"><h4>The Meta Lesson</h4><p>Typography&rsquo;s classification problem mirrors a deeper truth: letterforms resist neat categories because they exist on a continuum. A typeface like Optima is neither serif nor sans-serif. Variable fonts can slide between weights and widths, making any single classification meaningless. The future of type classification may be parametric &mdash; describing typefaces by their measurable features rather than assigning them to discrete buckets.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>The <em>Baseline</em> System</h2></div>
   <p>Every typeface is built on a system of invisible horizontal reference lines. These lines define the vertical proportions of letters and are the foundation of typographic measurement.<sup class="fn"><a href="https://www.interaction-design.org/literature/topics/anatomy-of-type">[2]</a><span class="tip"><a href="https://www.interaction-design.org/literature/topics/anatomy-of-type" target="_blank">IxDF: What is Anatomy of Type? &rarr;</a></span></sup></p>
   <div class="diagram-wrap"><svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
     <rect x="0" y="0" width="500" height="200" fill="rgba(0,0,0,0.02)" rx="4"/>
     <text x="250" y="20" text-anchor="middle" class="lbl" font-size="10" letter-spacing="1.5">ANATOMY OF A LETTERFORM</text>
     <line x1="30" y1="30" x2="470" y2="30" stroke="currentColor" stroke-width="0.5" class="edge"/>
     <line x1="30" y1="60" x2="470" y2="60" stroke-dasharray="4,3" class="edge-hi"/><text x="475" y="64" class="lbl-hi" font-size="9" style="font-size:9px">ascender line</text>
     <line x1="30" y1="100" x2="470" y2="100" stroke-dasharray="4,3" class="edge"/><text x="475" y="104" class="lbl" font-size="9" style="font-size:9px">cap height</text>
     <line x1="30" y1="120" x2="470" y2="120" stroke-dasharray="4,3" class="edge-hi"/><text x="475" y="124" class="lbl-hi" font-size="9" style="font-size:9px">x-height</text>
     <line x1="30" y1="150" x2="470" y2="150" class="edge-hi" stroke-width="1.5"/><text x="475" y="154" class="lbl-hi" font-size="9" style="font-size:9px">baseline</text>
     <line x1="30" y1="180" x2="470" y2="180" stroke-dasharray="4,3" class="edge"/><text x="475" y="184" class="lbl" font-size="9" style="font-size:9px">descender</text>
     <text x="60" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--bright)">H</text>
     <text x="120" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--bright)">x</text>
     <text x="165" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--bright)">b</text>
     <text x="215" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--bright)">p</text>
     <text x="265" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--bright)">g</text>
     <text x="330" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--accent)">A</text>
     <text x="395" y="148" font-family="'EB Garamond',serif" font-size="72" class="node-text" style="fill:var(--accent)">e</text>
   </svg></div>
   <h3>X-Height: The Hidden Variable</h3>
   <p>X-height is the single most important metric for perceived size and legibility. Two typefaces set at the same point size can look dramatically different in apparent size if their x-heights differ. A typeface with a tall x-height (like Verdana) appears larger than one with a short x-height (like Garamond) at identical point sizes. This is why x-height, not point size, is the better predictor of how a typeface will <em>feel</em> to readers.</p>
   <p>Ascenders that extend well above x-height create visual distinctiveness in word shapes, aiding rapid recognition. Descenders that drop well below baseline create vertical rhythm. The proportional relationships between these five reference lines define the character of a typeface more than any individual letterform.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2><em>Stroke</em> Components</h2></div>
   <p>Every letter is composed of strokes, and each stroke type has a name that identifies both its form and its function. Knowing these names is not pedantry &mdash; it is the shared language that allows designers, developers, and critics to communicate precisely about letterforms.<sup class="fn"><a href="https://www.designmodo.com/typography-anatomy/">[3]</a><span class="tip"><a href="https://www.designmodo.com/typography-anatomy/" target="_blank">Designmodo: Anatomy of a Letterform &rarr;</a></span></sup></p>
   <h3>Structural Elements</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Stem</h4><p>The main vertical stroke of a letter. The backbone of H, I, L, T, and many others. Stem width defines weight.</p></div>
     <div class="feat"><h4>Bowl</h4><p>The curved stroke enclosing a counter. Found in b, d, p, q, o. Bowl shape and proportion vary dramatically between typefaces.</p></div>
     <div class="feat"><h4>Counter</h4><p>The enclosed or partially enclosed space within a letter. Open counters (as in Frutiger) improve legibility at small sizes. Closed counters (as in Helvetica) create density.</p></div>
     <div class="feat"><h4>Shoulder</h4><p>The curved stroke connecting to a stem, as in h, m, n. The shoulder&rsquo;s shape &mdash; angular or smooth &mdash; contributes to a typeface&rsquo;s personality.</p></div>
   </div>
   <h3>Decorative Elements</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Serif</h4><p>Extension at the end of a stroke. Bracketed (curved transition), unbracketed (sharp angle), or slab (rectangular). The presence or absence of serifs is the first-level classification.</p></div>
     <div class="feat"><h4>Finial &amp; Terminal</h4><p>A finial is a tapered or rounded end of a stroke without a serif. A terminal is any end of a stroke that doesn&rsquo;t have a serif. Helvetica&rsquo;s horizontal terminals are a signature feature.</p></div>
     <div class="feat"><h4>Apex &amp; Vertex</h4><p>The apex is where two strokes meet at the top (A). The vertex is where they meet at the bottom (V, W). The sharpness of these junctions affects the typeface&rsquo;s perceived precision.</p></div>
     <div class="feat"><h4>Ear &amp; Spur</h4><p>The ear is the small stroke extending from the top of lowercase g. The spur is a small projection off a main stroke. These are the details that distinguish one typeface from another at close inspection.</p></div>
   </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Spacing</em> Systems</h2></div>
   <p>Typography is as much about the space <em>between</em> letters as the letters themselves. Three spacing systems &mdash; kerning, tracking, and leading &mdash; control the rhythm and density of text, and each serves a different purpose.<sup class="fn"><a href="https://www.numberanalytics.com/blog/ultimate-guide-to-type-design">[4]</a><span class="tip"><a href="https://www.numberanalytics.com/blog/ultimate-guide-to-type-design" target="_blank">NumberAnalytics: Ultimate Guide to Type Design &rarr;</a></span></sup></p>
   <h3>Kerning: The Pair Problem</h3>
   <p>Kerning adjusts the space between two specific characters. The classic examples &mdash; AV, To, We &mdash; illustrate the problem: the default spacing between these pairs leaves visible gaps that make text look uneven. The eye expects even <em>optical</em> spacing, not even <em>mechanical</em> spacing, and because different letter shapes create different optical effects, individual pair adjustments are necessary.</p>
   <p>Modern fonts include hundreds to thousands of kerning pairs. A well-crafted professional typeface might have 3,000 or more. Good kerning is invisible; bad kerning is immediately noticeable (and the subject of countless design memes).</p>
   <h3>Tracking vs Kerning</h3>
   <p>Where kerning adjusts individual pairs, tracking applies uniform spacing adjustments across a group of characters. Increase tracking for all-caps text and headlines (uppercase letters without tracking look cramped). Decrease tracking for tight, impactful display type. Unlike kerning, tracking does not consider individual pair relationships &mdash; it is a blunt instrument, but an essential one.</p>
   <h3>Leading: The Vertical Rhythm</h3>
   <p>Leading (rhymes with &ldquo;heading&rdquo;) is the vertical distance between baselines. The term comes from the physical lead strips that typesetters inserted between lines of metal type. Modern best practice: 1.4&ndash;1.6&times; the font size for body text. Tighter for headlines (where each line is meant to be read individually), looser for small sizes and long-form reading (where the eye needs clear line separation to track correctly).</p>
   <div class="callout"><h4>Optical vs Mechanical</h4><p>The single most important principle in spacing: the eye trumps the ruler. Round letters (O, C, Q) must extend slightly beyond the baseline and cap height to appear aligned. Pointed apexes (A, V) must overshoot slightly. A typeface that is mechanically perfect will look optically wrong. This is why automated spacing is always a starting point, never a finished product.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2>The <em>Vox-ATypI</em> System</h2></div>
   <p>Maximilien Vox devised his classification system in 1954, and the Association Typographique Internationale (ATypI) adopted it in 1962.<sup class="fn"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification">[5]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/Vox-ATypI_classification" target="_blank">Wikipedia: Vox-ATypI Classification &rarr;</a></span></sup> For sixty years, it served as the international standard for classifying typefaces. The nine categories mapped to a roughly chronological arc of type history.</p>
   <h3>The Nine Categories</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Humanist (Venetian)</h4><p>Oblique axis, low contrast, bracketed serifs. Based on pen-drawn forms. Examples: Centaur, Jenson.</p></div>
     <div class="feat"><h4>Garalde</h4><p>Named for Garamond + Aldus. More refined than Humanist. Medium contrast. Examples: Garamond, Bembo.</p></div>
     <div class="feat"><h4>Transitional</h4><p>Vertical axis, higher contrast, sharp bracketed serifs. Examples: Baskerville, Times New Roman.</p></div>
     <div class="feat"><h4>Didone</h4><p>Extreme contrast, hairline serifs, vertical axis. Named for Didot + Bodoni. Examples: Bodoni, Didot.</p></div>
     <div class="feat"><h4>Mechanistic</h4><p>Heavy rectangular serifs, low contrast. Also called Slab Serif or Egyptian. Examples: Rockwell, Clarendon.</p></div>
     <div class="feat"><h4>Lineale</h4><p>No serifs. Subdivided into Grotesque, Neo-grotesque, Geometric, Humanist sans. Examples: Helvetica, Futura, Gill Sans.</p></div>
   </div>
   <p>The remaining three categories &mdash; Glyphic (incised/chiseled, like Trajan), Script (handwriting-based, like Zapfino), and Blackletter (Gothic/medieval, like Fraktur) &mdash; covered calligraphic and historical forms.</p>
   <h3>Why It Failed</h3>
   <p>The ATypI board formally de-adopted the system in April 2021.<sup class="fn"><a href="https://atypi.org/de-adoption-of-vox-atypi/">[6]</a><span class="tip"><a href="https://atypi.org/de-adoption-of-vox-atypi/" target="_blank">ATypI: De-adoption of Vox-ATypI (2021) &rarr;</a></span></sup> The reasons were fundamental: it cannot classify contemporary type (what category is a variable-weight geometric slab?), it is Eurocentric (no provision for Arabic, Devanagari, CJK, or other non-Latin scripts), and its categories blur in practice (many modern typefaces span multiple categories). A working group was established to study alternatives; as of 2026, no replacement has been adopted.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>Modern</em> Classification</h2></div>
   <p>In the absence of a formal replacement for Vox-ATypI, working designers have converged on a simpler, more pragmatic taxonomy.<sup class="fn"><a href="https://blkbkfonts.com/type-classification/">[7]</a><span class="tip"><a href="https://blkbkfonts.com/type-classification/" target="_blank">BLKBK Fonts: Type Classification &rarr;</a></span></sup> It prioritizes use over history, asking &ldquo;what is this typeface <em>for</em>?&rdquo; rather than &ldquo;where did it come from?&rdquo;</p>
   <div class="feat-grid">
     <div class="feat"><h4>Serif</h4><p>Traditional, authoritative, readable in long text. Used in books, newspapers, law firms, luxury brands. Subtypes range from old-style to modern.</p></div>
     <div class="feat"><h4>Sans-Serif</h4><p>Modern, clean, digital-friendly. Used in tech, UI, contemporary brands. From humanist (Frutiger) to geometric (Futura) to neo-grotesque (Helvetica).</p></div>
     <div class="feat"><h4>Slab Serif</h4><p>Bold, sturdy, for display and editorial. Heavy rectangular serifs give a mechanical, authoritative feel. Popular in headlines and branding.</p></div>
     <div class="feat"><h4>Monospace</h4><p>Every character occupies the same width. Essential for code, data, and technical content. IBM Plex Mono, Fira Code, JetBrains Mono.</p></div>
   </div>
   <p>The remaining categories &mdash; display (headline-only type too decorative for body text), script (formal invitations and branding accents), and blackletter (historical and cultural contexts) &mdash; serve more specialized purposes. The key insight: classification is a tool for font pairing and appropriateness, not a taxonomic exercise.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2><em>Font</em> vs Typeface</h2></div>
   <p>The distinction between &ldquo;font&rdquo; and &ldquo;typeface&rdquo; is one of the most commonly misunderstood points in typography. In the metal type era, the distinction was physical and obvious. Today, digital technology has blurred the line, but understanding the difference still matters for precise communication.</p>
   <h3>The Definitions</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Typeface</h4><p>The design itself. Helvetica is a typeface. It encompasses all weights, widths, and styles that share a common design vision. The typeface is the conceptual entity &mdash; the idea of Helvetica.</p></div>
     <div class="feat"><h4>Font</h4><p>A specific instance of a typeface. Helvetica Bold Italic 12pt is a font. Helvetica.otf is a font file. In the metal era, a font was literally a set of physical type pieces in one size and style.</p></div>
     <div class="feat"><h4>Font Family</h4><p>The complete set of fonts in a typeface. Helvetica Regular, Bold, Light, Condensed, Extended &mdash; all the weights and styles together form the font family.</p></div>
     <div class="feat"><h4>The Analogy</h4><p>A typeface is a song. A font is a specific recording of that song. Helvetica the typeface is the composition; Helvetica Bold 14pt is a particular performance of it.</p></div>
   </div>
   <p>In practice, &ldquo;font&rdquo; has become the colloquial term for both concepts, especially since digital distribution sells &ldquo;font files&rdquo; containing typeface designs. Designers who care about precision maintain the distinction; everyone else uses &ldquo;font&rdquo; for everything. Both usages are defensible. What matters is understanding that the design (the set of aesthetic decisions) and the implementation (the specific file, size, and style) are conceptually separate.</p>
   <div class="callout"><h4>Variable Fonts Complicate Everything</h4><p>Variable fonts further blur the distinction. A single variable font file contains an entire family &mdash; potentially infinite weights, widths, and styles along continuous axes. Is it one font or many? The answer depends on whether you define &ldquo;font&rdquo; by the file or by the instance. The terminology was designed for a world of discrete, physical objects. Digital typography keeps breaking the categories.</p></div>`
];
