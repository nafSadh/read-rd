<script>
const sections = [
  { num: '01', short: 'Overview', title: '<em>Type</em> &amp; Cognition' },
  { num: '02', short: 'Serif vs Sans', title: 'Serif vs <em>Sans-Serif</em>' },
  { num: '03', short: 'Disfluency', title: 'The <em>Disfluency</em> Effect' },
  { num: '04', short: 'Dyslexia', title: '<em>Dyslexia</em> &amp; Typography' },

const summaries = [
  `<p>Typography is not just a visual art &mdash; it is a cognitive interface. Every time a reader encounters a word, the brain performs pattern recognition from individual letterforms through syntax to meaning. The typeface affects every stage of that cascade, sometimes in ways that contradict intuition.</p>
   <p>What the research actually says: the serif vs sans-serif debate is largely settled, the disfluency effect failed replication, and Comic Sans genuinely helps some dyslexic readers despite being the most hated font in design.</p>
   <div class="s-stat">
     <div class="st"><div class="sv">+13%</div><div class="sl">Font impact on response</div></div>
     <div class="st"><div class="sv">+40%</div><div class="sl">Trust from serif fonts</div></div>
     <div class="st"><div class="sv">5-17%</div><div class="sl">Dyslexia prevalence</div></div>
     <div class="st"><div class="sv">4.5:1</div><div class="sl">Min contrast ratio</div></div>
   </div>`,

  `<p>The most persistent question in typography &mdash; which is more readable? &mdash; is largely settled. Eye-tracking studies show no significant reading speed difference between serif and sans-serif on modern screens.<sup class="fn"><a href="https://www.researchgate.net/publication/299536521">[1]</a><span class="tip"><a href="https://www.researchgate.net/publication/299536521" target="_blank">ResearchGate: Serif vs Sans Serif on Screen (2016) &rarr;</a></span></sup> In print, serif offers a slight edge for long-form reading, but the effect size is small.</p>
   <p>The stronger predictors of readability: character spacing, line length (50&ndash;75 chars optimal), contrast ratio (4.5:1 min), x-height, counter openness, and reader familiarity.<sup class="fn"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC11257385/">[2]</a><span class="tip"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC11257385/" target="_blank">PMC: Font Matters: Attention and Working Memory (2024) &rarr;</a></span></sup> The practical takeaway: serif vs sans-serif is an aesthetic and tonal decision, not a readability one.</p>`,

  `<p>In 2011, Diemand-Yauman and colleagues appeared to show that harder-to-read fonts improved memory. The theory: &ldquo;desirable difficulty&rdquo; forces deeper processing.<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/20445911.2020.1847168">[3]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/20445911.2020.1847168" target="_blank">Tandfonline: Review of Disfluent Typography (2020) &rarr;</a></span></sup> RMIT&rsquo;s Sans Forgetica (2018) was designed specifically to exploit this effect.</p>
   <p>Controlled replications were disappointing: Sans Forgetica did <em>not</em> improve recall.<sup class="fn"><a href="https://designregression.com/article/exploring-disfluency">[4]</a><span class="tip"><a href="https://designregression.com/article/exploring-disfluency" target="_blank">Design Regression: Exploring Disfluency (2023) &rarr;</a></span></sup> The effect appears real but narrow &mdash; strongest for short texts, motivated readers, moderate difficulty. It is not a general-purpose learning tool.</p>`,

  `<p>Dyslexia affects 5&ndash;17% of the population. The British Dyslexia Association recommends Comic Sans because its letter shapes are distinct &mdash; b and d are not mirror images.<sup class="fn"><a href="https://www.boia.org/blog/does-comic-sans-benefit-people-with-dyslexia">[5]</a><span class="tip"><a href="https://www.boia.org/blog/does-comic-sans-benefit-people-with-dyslexia" target="_blank">BOIA: Does Comic Sans Benefit People with Dyslexia? &rarr;</a></span></sup> But no scientific study demonstrates significant improvement from using Comic Sans specifically.</p>
   <p>OpenDyslexic (2011) &mdash; designed with weighted bottoms to prevent visual rotation &mdash; showed no improvement in a 2016 study vs Arial or Times New Roman.<sup class="fn"><a href="https://en.wikipedia.org/wiki/OpenDyslexic">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/OpenDyslexic" target="_blank">Wikipedia: OpenDyslexic &rarr;</a></span></sup> What actually helps: adequate spacing, clear character differentiation, sufficient size (14pt+), high contrast.</p>`,

  `<p>Monotype research: typeface choice can shift positive consumer responses by up to 13%.<sup class="fn"><a href="https://www.todaymade.com/blog/font-psychology/">[7]</a><span class="tip"><a href="https://www.todaymade.com/blog/font-psychology/" target="_blank">Todaymade: Font Psychology Ultimate Guide &rarr;</a></span></sup> Serif fonts increase perceived trustworthiness by approximately 40%. Sans-serif signals modernity and innovation. Round fonts read as friendly; angular fonts as authoritative.<sup class="fn"><a href="https://cognitiontoday.com/font-psychology/">[8]</a><span class="tip"><a href="https://cognitiontoday.com/font-psychology/" target="_blank">CognitionToday: Font Psychology Research (2024) &rarr;</a></span></sup></p>
   <p>The most important finding: font-brand <em>congruence</em> matters more than any single font property. A tech startup in Bodoni or a law firm in Comic Sans creates cognitive dissonance that undermines trust.</p>`
];

const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Type</em> &amp; Cognition</h2></div>
   <p>Typography is not just a visual art &mdash; it is a cognitive interface. Every time a reader encounters a word, the brain performs a cascade of pattern recognition, from identifying individual letterforms to parsing words, from decoding syntax to extracting meaning. The typeface in which those words are rendered affects every stage of that cascade, sometimes in ways that contradict intuition.</p>
   <h3>What This Section Covers</h3>
   <p>This section examines four empirical questions: (1) Is serif or sans-serif more readable? (2) Do harder-to-read fonts improve learning? (3) Can specialized fonts help dyslexic readers? (4) How does font choice affect brand perception? For each question, the section follows the evidence rather than the conventional wisdom, and the findings frequently challenge assumptions.</p>
   <div class="callout"><h4>The Meta-Finding</h4><p>The most consistent finding across cognition research is that the specific typeface matters less than the typographic context: spacing, contrast, size, line length, and reader familiarity are stronger predictors of readability and recall than serif vs sans-serif, weight, or style. Good typography is not about choosing the right font &mdash; it is about setting any font well.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2>Serif vs <em>Sans-Serif</em></h2></div>
   <p>The conventional wisdom held a clean division: serif for print (serifs guide the eye along the baseline), sans-serif for screen (fewer rendering artifacts at low resolution). Eye-tracking research has largely overturned this.<sup class="fn"><a href="https://www.researchgate.net/publication/299536521">[1]</a><span class="tip"><a href="https://www.researchgate.net/publication/299536521" target="_blank">ResearchGate: Serif vs Sans Serif on Screen (2016) &rarr;</a></span></sup></p>
   <h3>What Actually Affects Readability</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Character Spacing</h4><p>Too tight and letters merge; too loose and words fragment. The optimal depends on typeface design, size, and medium.</p></div>
     <div class="feat"><h4>Line Length</h4><p>50-75 characters per line for body text. Shorter lines for narrow columns; longer for wide screens with adequate leading.</p></div>
     <div class="feat"><h4>Contrast Ratio</h4><p>Minimum 4.5:1 for body text (WCAG AA). Higher contrast improves readability across all typeface categories.</p></div>
     <div class="feat"><h4>X-Height</h4><p>Larger x-height improves legibility at small sizes. This is why Verdana (large x-height) reads better than Garamond (small x-height) at 10px.</p></div>
     <div class="feat"><h4>Counter Openness</h4><p>Open counters (e, c, a in Frutiger) improve letter recognition. Closed counters (Helvetica) create density but reduce legibility at small sizes.</p></div>
     <div class="feat"><h4>Familiarity</h4><p>Readers perform best with fonts they encounter frequently. Preference is a strong predictor of perceived readability, independent of objective measures.</p></div>
   </div>
   <p>The practical takeaway: the serif versus sans-serif choice is primarily an aesthetic and tonal decision, not a readability one. Both categories are fully legible when well-designed and properly set. Context, spacing, and contrast matter more than the presence or absence of serifs.<sup class="fn"><a href="https://commons.emich.edu/cgi/viewcontent.cgi?article=1049">[2]</a><span class="tip"><a href="https://commons.emich.edu/cgi/viewcontent.cgi?article=1049" target="_blank">Eastern Michigan: Impact of Font Type on Reading &rarr;</a></span></sup></p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>The <em>Disfluency</em> Effect</h2></div>
   <p>In 2011, a study by Diemand-Yauman and colleagues appeared to show that harder-to-read fonts could improve memory and learning. The theory: &ldquo;desirable difficulty&rdquo; forces deeper cognitive processing, moving information from surface-level scanning to deeper encoding. Media headlines followed enthusiastically.</p>
   <p>RMIT University in Melbourne created Sans Forgetica (2018), a typeface specifically designed to exploit the disfluency effect: backslanted strokes with missing segments forced readers to mentally fill in gaps, theoretically deepening encoding.<sup class="fn"><a href="https://designregression.com/article/exploring-disfluency">[3]</a><span class="tip"><a href="https://designregression.com/article/exploring-disfluency" target="_blank">Design Regression: Exploring Disfluency (2023) &rarr;</a></span></sup></p>
   <h3>The Replication Failure</h3>
   <p>Controlled studies found that Sans Forgetica did <em>not</em> improve recall compared to standard fonts in recognition tasks. A 2020 meta-review found mixed results across studies, with the effect strongest for short texts and motivated readers in study contexts.<sup class="fn"><a href="https://www.tandfonline.com/doi/full/10.1080/20445911.2020.1847168">[4]</a><span class="tip"><a href="https://www.tandfonline.com/doi/full/10.1080/20445911.2020.1847168" target="_blank">Tandfonline: Review of Disfluent Typography (2020) &rarr;</a></span></sup> Publication bias likely inflated initial positive findings.</p>
   <h3>The Nuanced View</h3>
   <p>Disfluency may work under specific, narrow conditions: short texts (lists, flashcards, not chapters), moderate difficulty (slightly harder, not illegible), motivated readers (study context, not casual browsing), and novel/unfamiliar material. It is not a general-purpose learning tool. The evidence does not support making text deliberately harder to read in the hope of improving retention.</p>
   <div class="callout"><h4>The Lesson for Designers</h4><p>The disfluency story is a cautionary tale about extrapolating from narrow lab findings to broad design principles. A statistically significant effect in a controlled setting does not translate to a useful design guideline. The research consistently favors clarity over friction as a design principle.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Dyslexia</em> &amp; Typography</h2></div>
   <p>Dyslexia affects 5&ndash;17% of the population. Dyslexic readers may experience letter reversal (b/d, p/q), visual crowding, letter migration within words, and difficulty tracking lines. The typographic community has responded with dedicated dyslexia fonts &mdash; but the evidence for their effectiveness is surprisingly weak.</p>
   <h3>Comic Sans: Most Hated, Most Helpful?</h3>
   <p>The British Dyslexia Association recommends Comic Sans because its letter shapes are distinct &mdash; b and d are not mirror images.<sup class="fn"><a href="https://www.boia.org/blog/does-comic-sans-benefit-people-with-dyslexia">[5]</a><span class="tip"><a href="https://www.boia.org/blog/does-comic-sans-benefit-people-with-dyslexia" target="_blank">BOIA: Does Comic Sans Benefit People with Dyslexia? &rarr;</a></span></sup> Letters appear less crowded than in geometric sans-serifs. But no scientific study has demonstrated significant improvement with Comic Sans specifically. The preference may be psychological (friendly, non-threatening appearance) rather than functional.</p>
   <p>Vincent Connare designed Comic Sans in 1994 for Microsoft Bob &mdash; a children&rsquo;s interface. The mismatch between context and typeface triggers the rage: a casual, handwritten style in formal documents. The irony: one of the most hated fonts genuinely helps some readers.</p>
   <h3>OpenDyslexic: Noble Intent, Unproven Efficacy</h3>
   <p>Abelardo Gonzalez created OpenDyslexic (2011) with weighted bottoms to prevent visual rotation and wider spacing.<sup class="fn"><a href="https://en.wikipedia.org/wiki/OpenDyslexic">[6]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/OpenDyslexic" target="_blank">Wikipedia: OpenDyslexic &rarr;</a></span></sup> A 2016 controlled study found no improvement in reading rate or accuracy compared to Arial or Times New Roman. Participants actually preferred Verdana or Helvetica.</p>
   <h3>What Actually Helps</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Adequate Spacing</h4><p>Wider character and line spacing than default. This is the single most effective typographic intervention for dyslexic readers.</p></div>
     <div class="feat"><h4>Clear Differentiation</h4><p>Distinct shapes for easily confused characters: 1/l/I, b/d/p/q. Any typeface with good differentiation works.</p></div>
     <div class="feat"><h4>Sufficient Size</h4><p>14pt or larger recommended. Larger type reduces visual crowding and makes letter shapes more distinct.</p></div>
     <div class="feat"><h4>High Contrast</h4><p>Strong text-background contrast. Avoid light gray text on white, or pure white text on pure black (which can cause halation).</p></div>
   </div>
   <p>The takeaway: the intervention should be spacing and size, not specialized letterforms. Any well-designed sans-serif &mdash; Arial, Verdana, Tahoma &mdash; works when set with adequate spacing and size.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2>Font <em>Psychology</em> in Branding</h2></div>
   <p>Typography affects not just comprehension but emotional response. Research from Monotype and others has quantified effects that designers have long intuited.<sup class="fn"><a href="https://www.todaymade.com/blog/font-psychology/">[7]</a><span class="tip"><a href="https://www.todaymade.com/blog/font-psychology/" target="_blank">Todaymade: Font Psychology Ultimate Guide &rarr;</a></span></sup></p>
   <h3>Font Personality Dimensions</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Serif Fonts</h4><p>Increase perceived trustworthiness by approximately 40%. Associated with tradition, authority, reliability. Used in law, finance, luxury branding.</p></div>
     <div class="feat"><h4>Sans-Serif Fonts</h4><p>Signal modernity, innovation, approachability. Associated with technology, startups, contemporary brands. Clean and efficient.</p></div>
     <div class="feat"><h4>Round Fonts</h4><p>Perceived as friendly, warm, approachable. Softer emotional register. Used in food, children&rsquo;s products, wellness brands.</p></div>
     <div class="feat"><h4>Angular Fonts</h4><p>Perceived as authoritative, professional, strong. Sharper emotional register. Used in sports, automotive, industrial brands.</p></div>
   </div>
   <h3>Font-Brand Congruence</h3>
   <p>The most important finding: the font must match the brand personality.<sup class="fn"><a href="https://cognitiontoday.com/font-psychology/">[8]</a><span class="tip"><a href="https://cognitiontoday.com/font-psychology/" target="_blank">CognitionToday: Font Psychology Research (2024) &rarr;</a></span></sup> A tech startup in Bodoni or a law firm in Comic Sans creates cognitive dissonance that undermines trust. The specific font matters less than the match between font personality and brand identity. Congruence increases purchase intent; incongruence triggers skepticism.</p>
   <h3>Memory and Recall</h3>
   <p>Readable fonts improve content recall. Serif and sans-serif are both effective for memory retention. Overly decorative or display fonts reduce recall even when they look appealing. There is a real trade-off between visual impact and information retention &mdash; and for most informational applications, information retention is the higher priority.</p>
   <div class="callout"><h4>The 13% Effect</h4><p>Monotype&rsquo;s research found that typeface choice can increase positive consumer responses by up to 13%. This is a measurable but modest effect &mdash; meaningful for brands operating at scale, but not a magic lever. Typography is one variable among many. It matters, but it matters in proportion.</p></div>`
];

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) { closeRight(); } else { openDetail(lastDetailIdx); } }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return; const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return; const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar'); if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
