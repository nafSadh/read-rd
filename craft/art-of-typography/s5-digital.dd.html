const details = [
  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 01 &mdash; Details</div><h2><em>Digital</em> Typography</h2></div>
   <p>The shift from physical type to digital type was not a single event but a series of format wars, each driven by corporate competition and resolved by market consolidation. The result &mdash; OpenType and variable fonts &mdash; is elegant. The path to get there was messy.</p>
   <h3>The Format Wars</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">1984&ndash;85 &mdash; PostScript</div><div class="tl-text">Adobe&rsquo;s page description language that treated text as mathematical outlines. Type 1 fonts with hinting for low-resolution screens. Apple licensed it for the LaserWriter. The desktop publishing revolution began.</div></div>
     <div class="tl-item"><div class="tl-date">~1991 &mdash; TrueType</div><div class="tl-text">Apple developed TrueType to break Adobe&rsquo;s monopoly, then licensed it to Microsoft. Both platforms bundled it: Apple in System 7, Microsoft in Windows 3.1.</div></div>
     <div class="tl-item"><div class="tl-date">Mid-1990s &mdash; OpenType</div><div class="tl-text">Adobe and Microsoft jointly merged both formats. Up to 65,536 glyphs. Ligatures, small caps, old-style figures, stylistic sets. Cross-platform. The standard by the mid-2000s.</div></div>
     <div class="tl-item"><div class="tl-date">2016 &mdash; Variable Fonts</div><div class="tl-text">OpenType 1.8: a single font file with multiple axes (weight, width, slant, optical size). Jointly developed by Adobe, Apple, Google, Microsoft. One file replaces 10&ndash;20 static files.</div></div>
   </div>
   <div class="callout"><h4>The Pattern</h4><p>Each format war followed the same arc: a proprietary innovation creates a monopoly; a competitor develops an alternative; the market fragments; the rivals merge their standards. PostScript begat TrueType begat OpenType. The lesson: in typography as in software, open standards eventually win.</p></div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 02 &mdash; Details</div><h2><em>PostScript</em> &amp; the Revolution</h2></div>
   <p>PostScript was more than a font format &mdash; it was a page description language that could represent any combination of text, vector graphics, and raster images as mathematical descriptions.<sup class="fn"><a href="https://en.wikipedia.org/wiki/PostScript_fonts">[1]</a><span class="tip"><a href="https://en.wikipedia.org/wiki/PostScript_fonts" target="_blank">Wikipedia: PostScript Fonts &rarr;</a></span></sup> This meant that for the first time, what appeared on screen could be faithfully reproduced on paper at any resolution.</p>
   <h3>Type 1 Fonts</h3>
   <p>PostScript Type 1 fonts were scalable outline fonts with &ldquo;hinting&rdquo; &mdash; instructions embedded in each glyph that told the rasterizer how to align outlines to pixel grids at low resolutions. At 300dpi (the LaserWriter&rsquo;s resolution), hinting was the difference between readable text and jagged approximations.</p>
   <p>Adobe kept the Type 1 specification proprietary until 1990. During those five years, Adobe had a virtual monopoly on professional digital typography. The company charged premium prices for font licenses, and the Type 1 specification was available only to licensed foundries. This monopoly was the direct provocation for Apple&rsquo;s development of TrueType.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 03 &mdash; Details</div><h2>TrueType &amp; <em>OpenType</em></h2></div>
   <p>Apple&rsquo;s TrueType was a strategic weapon, not just a technical improvement.<sup class="fn"><a href="https://appleinsider.com/articles/23/08/10/the-history-of-postscript-truetype-and-opentype">[2]</a><span class="tip"><a href="https://appleinsider.com/articles/23/08/10/the-history-of-postscript-truetype-and-opentype" target="_blank">Apple Insider: History of PostScript, TrueType, and OpenType &rarr;</a></span></sup> It used quadratic B-splines (simpler math than PostScript&rsquo;s cubic B&eacute;zier curves) and included built-in rendering instructions. By licensing it immediately to Microsoft, Apple ensured that TrueType would ship on every major operating system.</p>
   <h3>OpenType: The Merger</h3>
   <p>OpenType was developed jointly by Adobe and Microsoft starting around 1996.<sup class="fn"><a href="https://bobbykegel.dev/blog/history-of-modern-fonts-part-3">[3]</a><span class="tip"><a href="https://bobbykegel.dev/blog/history-of-modern-fonts-part-3" target="_blank">BobbyKegel.dev: History of Modern Fonts Part 3 &rarr;</a></span></sup> The design goal was to unify Type 1 and TrueType into a single cross-platform format.</p>
   <div class="feat-grid">
     <div class="feat"><h4>65,536 Glyphs</h4><p>Up from 256 for Type 1. Enabled multilingual fonts with full Unicode support, plus extensive alternate characters.</p></div>
     <div class="feat"><h4>Advanced Features</h4><p>Contextual alternates, ligatures, small caps, old-style figures, stylistic sets. Typography that was previously impossible in digital formats.</p></div>
     <div class="feat"><h4>Cross-Platform</h4><p>Same file works on Mac and Windows. The end of format-specific font purchases.</p></div>
     <div class="feat"><h4>Dual Outlines</h4><p>Can contain either PostScript (CFF) or TrueType outlines inside. Both legacy formats preserved within a single container.</p></div>
   </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 04 &mdash; Details</div><h2><em>Variable</em> Fonts</h2></div>
   <p>Variable fonts, introduced in OpenType 1.8 (2016), are the most significant advance in font technology since PostScript.<sup class="fn"><a href="https://inkbotdesign.com/variable-fonts/">[4]</a><span class="tip"><a href="https://inkbotdesign.com/variable-fonts/" target="_blank">Inkbot Design: Variable Fonts Explained &rarr;</a></span></sup> Jointly developed by Adobe, Apple, Google, and Microsoft, they represent a rare moment of industry-wide cooperation.</p>
   <h3>How Variable Fonts Work</h3>
   <p>The designer defines master outlines at axis extremes (e.g., Thin and Black for the weight axis). Software interpolates intermediate values. Users and developers can request any value on any axis &mdash; not just the predefined weights that static fonts offer.</p>
   <h3>Benefits</h3>
   <div class="feat-grid">
     <div class="feat"><h4>Performance</h4><p>One file replaces 10-20 static font files. Fewer HTTP requests. Smaller total download size. Significant performance improvement for web typography.</p></div>
     <div class="feat"><h4>Flexibility</h4><p>Fine-grained control over weight, width, slant, and optical size. Any value on any axis, not just Regular/Bold/Light.</p></div>
     <div class="feat"><h4>Responsive Design</h4><p>Type can adapt to viewport width, container size, or user preferences. Weight can scale with heading level. Width can respond to available space.</p></div>
     <div class="feat"><h4>Creative Freedom</h4><p>Animation along axes. Fluid transitions between weights. Interactive typography that responds to user input. New design possibilities that static fonts cannot offer.</p></div>
   </div>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 05 &mdash; Details</div><h2>Desktop <em>Publishing</em></h2></div>
   <p>The desktop publishing revolution was not gradual &mdash; it was a collision of three technologies developed independently that converged in a 19-month window.<sup class="fn"><a href="https://www.computerhistory.org/revolution/digital-logic/12/330">[5]</a><span class="tip"><a href="https://www.computerhistory.org/revolution/digital-logic/12/330" target="_blank">Computer History Museum: Desktop Publishing &rarr;</a></span></sup></p>
   <h3>The Trinity</h3>
   <div class="timeline">
     <div class="tl-item"><div class="tl-date">January 1984 &mdash; Apple Macintosh</div><div class="tl-text">WYSIWYG display with Susan Kare&rsquo;s original system fonts (Chicago, Geneva, Monaco, New York). What you saw on screen was what you got on paper.</div></div>
     <div class="tl-item"><div class="tl-date">January 1985 &mdash; Apple LaserWriter</div><div class="tl-text">PostScript-enabled 300dpi laser printer. Near-typesetting quality from a desktop device. Adobe&rsquo;s PostScript was the enabling technology.</div></div>
     <div class="tl-item"><div class="tl-date">July 1985 &mdash; Aldus PageMaker</div><div class="tl-text">First desktop publishing software. Paul Brainerd coined the term. For the first time, one person at one machine could compose, typeset, and print a professional document.</div></div>
   </div>
   <p>Professional typesetting &mdash; previously requiring equipment costing $100,000 or more, operated by skilled technicians &mdash; became accessible to anyone with a $7,000 Macintosh setup. The democratization was double-edged: non-designers now had the same tools, producing what Erik Spiekermann called &ldquo;Destroy the Profession.&rdquo;</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 06 &mdash; Details</div><h2><em>Google</em> Fonts</h2></div>
   <p>Before 2010, web designers could reliably count on approximately twelve typefaces.<sup class="fn"><a href="https://devstars.com/2026-website-fonts-guide/">[6]</a><span class="tip"><a href="https://devstars.com/2026-website-fonts-guide/" target="_blank">DevStars: 2026 Website Fonts Guide &rarr;</a></span></sup> CSS <code>@font-face</code> existed since CSS2 (1998), but browser support and licensing kept it impractical until 2009-2010. Google Fonts removed both the technical and economic barriers simultaneously.</p>
   <h3>Scale and Impact</h3>
   <p>By 2026, Google Fonts offers 1,500+ free families and has delivered 70+ trillion total font serves. The service democratized web typography in a way that echoed desktop publishing thirty years earlier. Any website could add professional typography with a single <code>&lt;link&gt;</code> tag at zero cost.</p>
   <h3>Privacy Concerns</h3>
   <p>Each font request sends user data to Google: IP address, referrer URL, user agent string. German courts ruled in 2022 that this constitutes a GDPR violation. Self-hosting &mdash; downloading the fonts and serving them from your own domain &mdash; eliminates the privacy issue and is now considered best practice for GDPR-conscious sites. The growing trend toward self-hosted fonts reflects a broader reckoning with the costs of &ldquo;free&rdquo; services.</p>`,

  `<div class="detail-header"><div class="num"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>Section 07 &mdash; Details</div><h2>Web Typography <em>2026</em></h2></div>
   <p>The state of web typography in 2026 represents the culmination of forty years of digital type development. The tools are mature, the standards are stable, and the remaining challenges are about craft rather than technology.</p>
   <h3>Current Best Practices</h3>
   <div class="feat-grid">
     <div class="feat"><h4>CSS clamp()</h4><p>Fluid typography that scales smoothly without breakpoints. Replaces media-query-based responsive type entirely. Example: <code>font-size: clamp(1rem, 1.2rem + 0.5vw, 1.5rem)</code>.</p></div>
     <div class="feat"><h4>System Font Stacks</h4><p><code>system-ui, -apple-system, BlinkMacSystemFont</code> as zero-latency fallbacks. Performance benefit: no font file download at all for body text.</p></div>
     <div class="feat"><h4>Variable Fonts</h4><p>Now the default standard. Google endorsing with Google Sans Flex. Progressive enhancement: <code>@supports (font-variation-settings: normal)</code>.</p></div>
     <div class="feat"><h4>WOFF2 + Subsetting</h4><p>Standard compression format. Character subsetting removes unused glyphs. <code>font-display: swap</code> prevents invisible text during loading. <code>preconnect</code> to font CDNs.</p></div>
   </div>
   <h3>This Project&rsquo;s Font Stack</h3>
   <p>This project uses three fonts that span three centuries of type history: EB Garamond (Georg Duffner&rsquo;s revival of Claude Garamond&rsquo;s 16th-century type) for serif headings and prose; Jost (Owen Earl&rsquo;s geometric sans inspired by Paul Renner&rsquo;s Futura) for body text and UI; IBM Plex Mono (Mike Abbink/Bold Monday for IBM) for data and code.</p>
   <div class="callout"><h4>Looking Forward</h4><p>The constraint on typography in 2026 is no longer technology or cost. Every device can render sophisticated type. Every website can access thousands of typefaces for free. Variable fonts enable fine-grained control over every aspect of letterforms. The constraint is now knowledge and taste &mdash; understanding which typefaces to choose, and why.</p></div>`
];

let lastDetailIdx = 0;
function scrollToSection(idx) { const blocks = document.querySelectorAll('.section-block'); if (blocks[idx]) blocks[idx].scrollIntoView({behavior:'smooth',block:'start'}); }
function openDetail(idx) { lastDetailIdx = idx; document.querySelectorAll('.detail').forEach(d => d.style.display = 'none'); document.getElementById(`detail-${idx}`).style.display = 'block'; document.getElementById('right').classList.remove('closed'); document.body.classList.add('detail-open'); document.getElementById('right').scrollTop = 0; document.getElementById('right-sticky-title').classList.remove('visible'); }
function closeRight() { document.getElementById('right').classList.add('closed'); document.body.classList.remove('detail-open'); }
function toggleDetail() { if (document.body.classList.contains('detail-open')) { closeRight(); } else { openDetail(lastDetailIdx); } }
function toggleTheme() { const current = document.body.getAttribute('data-theme'); const next = current === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
mainScroll.addEventListener('scroll', () => { document.querySelector('.main-head').classList.toggle('compact', mainScroll.scrollTop > 40); const blocks = mainScroll.querySelectorAll('.section-block'); const items = document.querySelectorAll('.sidebar-item'); let activeIdx = 0; blocks.forEach((b, i) => { if (b.getBoundingClientRect().top < mainScroll.getBoundingClientRect().top + 120) activeIdx = i; }); items.forEach((item, i) => item.classList.toggle('active', i === activeIdx)); });
const rightPanelOuter = document.getElementById('right'); const stickyTitle = document.getElementById('right-sticky-title');
rightPanelOuter.addEventListener('scroll', () => { const activeDetail = rightPanelOuter.querySelector('.detail[style*="display: block"], .detail[style*="display:block"]'); if (!activeDetail) return; const h2 = activeDetail.querySelector('.detail-header h2') || activeDetail.querySelector('h2'); if (!h2) return; const rect = h2.getBoundingClientRect(); const panelRect = rightPanelOuter.getBoundingClientRect(); const topbar = document.querySelector('.right-topbar'); if (rect.bottom < panelRect.top + 56) { stickyTitle.textContent = h2.textContent; stickyTitle.classList.add('visible'); topbar.classList.add('scrolled'); } else { stickyTitle.classList.remove('visible'); topbar.classList.remove('scrolled'); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRight(); });
