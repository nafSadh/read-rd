<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Hail Mary — Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body data-theme="light">
<div id="styles"></div>
<script>
// Inject styles
document.getElementById('styles').outerHTML = '<style>' + `
[data-theme="light"]{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f2efe8;
  --border:#d6d0c4;--border-hi:#bfb8a8;
  --text:#363b48;--dim:#65707a;--bright:#141a1e;
  --accent:#2e6ab4;--accent2:#3d7ed0;--accent-soft:#2e6ab410;--accent-mid:#2e6ab420;
  --cyan:#9b7aed;--green:#2e6e3e;--red:#8b2020;--amber:#8a6e1e;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#2e6ab406;--grad2:#9b7aed04;
  --sidebar-bg:var(--bg2);--right-bg:var(--bg2);
  --grain-opacity:0.015;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--accent-soft);
  --edge-dim-w:.8;--edge-hi-w:1.5;--dash-speed:1s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;--topbar-glow:#2e6ab415;
}
[data-theme="dark"]{
  --bg:#0b0e18;--bg2:#0f1322;--bg3:#151b30;
  --border:#1c2440;--border-hi:#283558;
  --text:#8490aa;--dim:#546080;--bright:#dce0ec;
  --accent:#9b7aed;--accent2:#b598ff;--accent-soft:#9b7aed0c;--accent-mid:#9b7aed18;
  --cyan:#4ee8d0;--green:#4ee8a8;--red:#e87090;--amber:#e8c870;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'Jost',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body-font:var(--sans);--body-weight:400;
  --heading-weight:500;--label-weight:600;
  --heading-ls:.5px;--label-ls:2.5px;
  --grad1:#9b7aed06;--grad2:#4ee8d004;
  --sidebar-bg:var(--bg);--right-bg:var(--bg2);
  --grain-opacity:0.02;
  --callout-p-style:italic;--callout-p-weight:400;
  --callout-p-size:17px;--callout-p-color:var(--bright);
  --security-bg:none;
  --node-fill:var(--bg2);--node-hi-fill:var(--bg3);
  --edge-dim-w:.5;--edge-hi-w:1;--dash-speed:1.5s;
  --hero-size:40px;--h2-size:31px;--detail-h2-size:34px;
  --feat-h4-size:17px;--feat-h4-ls:0px;
  --stat-sv-font:var(--mono);--stat-sv-size:16px;--stat-sv-weight:500;--stat-sv-ls:0px;
  --link-size:11px;--link-ls:1px;--link-transform:uppercase;--link-hover-ls:2px;
  --close-size:17px;--close-ls:1px;--close-weight:300;
  --tl-date-size:10px;--tl-date-ls:1.5px;--tl-date-transform:uppercase;
  --price-h4-size:10px;--price-h4-ls:2px;--price-val-size:26px;--price-val-ls:0.5px;
  --list-ls:.1px;--chip-ls:.5px;--chip-size:11px;
  --code-weight:400;--medium-weight:400;--topbar-glow:#9b7aed10;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body-font);font-weight:var(--body-weight);-webkit-font-smoothing:antialiased;font-size:16px;transition:background .5s,color .4s}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:var(--grain-opacity);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,var(--grad1),transparent),radial-gradient(ellipse 60% 50% at 85% 75%,var(--grad2),transparent),radial-gradient(ellipse 40% 40% at 50% 10%,var(--grad1),transparent);transition:background 1s}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;transition:all .4s ease}
.ctrl-group{position:fixed;top:10px;right:16px;z-index:200;display:flex;gap:0;border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 8px #00000010;transition:all .4s cubic-bezier(.4,0,.2,1)}
.ctrl-btn{width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .2s,background .2s;color:var(--dim);background:transparent;border:none;border-right:1px solid var(--border);padding:0}
.ctrl-btn:last-child{border-right:none}
.ctrl-btn:hover{color:var(--accent);background:var(--accent-soft)}
.ctrl-btn svg{display:block}
[data-theme="light"] .ctrl-btn.theme-btn::after{content:'\\263D'}
[data-theme="dark"] .ctrl-btn.theme-btn::after{content:'\\2600'}
.ctrl-btn.detail-btn .icon-open,.ctrl-btn.detail-btn .icon-close{display:none}
.ctrl-btn.detail-btn .icon-open{display:block}
.detail-open .ctrl-btn.detail-btn .icon-open{display:none}
.detail-open .ctrl-btn.detail-btn .icon-close{display:block}
.detail-open .ctrl-group{top:10px;right:auto;left:50%;transform:translateX(-50%);border:1px solid var(--border);background:var(--bg2);box-shadow:0 2px 12px #00000015}
.sidebar{width:180px;min-width:180px;height:100vh;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.detail-open .sidebar{width:52px;min-width:52px}
.sidebar-head{padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;height:56px;display:flex;align-items:center}
.sidebar-logo{font-family:var(--serif);font-size:22px;color:var(--bright);font-weight:var(--heading-weight);white-space:nowrap;overflow:hidden;letter-spacing:var(--heading-ls);transition:all .3s}
.sidebar-logo em{font-style:italic;color:var(--accent);font-weight:400}
.detail-open .sidebar-logo{font-size:18px;text-align:center;letter-spacing:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{display:flex;align-items:baseline;gap:10px;padding:11px 16px;cursor:pointer;transition:all .25s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
[data-theme="dark"] .sidebar-item{border-left-width:1px}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.sidebar-num{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0;letter-spacing:1px}
.sidebar-item.active .sidebar-num{color:var(--accent)}
.sidebar-label{font-family:var(--sans);font-size:12px;color:var(--text);font-weight:var(--body-weight);letter-spacing:.5px;transition:opacity .3s}
.detail-open .sidebar-label{opacity:0;width:0}
.detail-open .sidebar-item{justify-content:center}
.sidebar-tooltip{position:fixed;z-index:300;font-family:var(--sans);font-size:12px;color:var(--bright);letter-spacing:.4px;font-weight:var(--body-weight);padding:0 24px 0 12px;white-space:nowrap;background:color-mix(in srgb,var(--sidebar-bg) 70%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-right:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-left:none;pointer-events:none;opacity:0;display:flex;align-items:center;transform:translateX(-8px);transition:opacity .12s,transform .18s cubic-bezier(.2,0,.1,1);box-shadow:4px 0 16px color-mix(in srgb,var(--bg) 40%,transparent)}
.sidebar-tooltip.visible{opacity:1;transform:translateX(0)}
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;transition:all .4s ease;overflow:hidden}
.main-head{flex-shrink:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:32px 40px 16px;transition:padding .35s ease}
.main-head-inner{max-width:860px;margin:0 auto}
.main-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--grad1),transparent 60%);pointer-events:none}
.hero-badge{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:var(--label-ls);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:var(--label-weight);position:relative;max-height:20px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
[data-theme="light"] .hero-badge{color:var(--dim)}
.hero-badge .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite}
[data-theme="dark"] .hero-badge .dot{box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hero-title{font-family:var(--serif);font-size:var(--hero-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.1;letter-spacing:var(--heading-ls);position:relative;transition:font-size .35s ease}
.hero-title em{font-style:italic;color:var(--accent);font-weight:400}
[data-theme="dark"] .hero-title em{text-shadow:0 0 40px #9b7aed20}
.masthead-rule{height:1px;background:linear-gradient(90deg,var(--accent),var(--cyan),transparent);margin:14px 0 0;position:relative;width:50%;opacity:.6;max-height:15px;overflow:hidden;transition:max-height .35s ease,margin .35s ease,opacity .25s ease}
.masthead-sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px 0;text-transform:uppercase;position:relative;max-height:30px;overflow:hidden;transition:max-height .35s ease,padding .35s ease,opacity .25s ease}
.main-head.compact{padding:0 40px;height:56px;box-sizing:border-box;display:flex;align-items:center}
.main-head.compact .main-head-inner{width:100%;max-width:860px;margin:0 auto}
.main-head.compact .hero-badge,.main-head.compact .masthead-rule,.main-head.compact .masthead-sub{display:none}
.main-head.compact .hero-title{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-scroll{flex:1;overflow-y:auto;padding:0 40px 80px}
.main-scroll-inner{max-width:860px;margin:0 auto}
.main-scroll::-webkit-scrollbar{width:4px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:var(--accent);opacity:.3;border-radius:0}
.section-block{padding:40px 8px;border-bottom:1px solid var(--border);position:relative}
.section-block:last-child{border-bottom:none}
[data-theme="light"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#2e6ab405,transparent);pointer-events:none}
[data-theme="light"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(odd)::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 100% 50%,#9b7aed04,transparent);pointer-events:none}
[data-theme="dark"] .section-block:nth-child(even)::before{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:radial-gradient(ellipse at 0% 50%,#4ee8d003,transparent);pointer-events:none}
.section-block .s-num{font-family:var(--sans);font-size:11px;color:var(--accent);margin-bottom:4px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight);display:flex;align-items:center;justify-content:space-between}
.s-detail-btn{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .2s;background:none;padding:0}
.s-detail-btn:hover{color:var(--accent);border-color:var(--border);background:var(--accent-soft)}
.s-detail-btn svg{display:block}
.s-detail-btn::before{content:'View details';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--bg2);background:var(--bright);padding:4px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;text-transform:none;font-weight:400}
.s-detail-btn:hover::before{opacity:1}
.section-block h2{font-family:var(--serif);font-size:var(--h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;margin-bottom:18px;letter-spacing:var(--heading-ls)}
.section-block h2 em{font-style:italic;color:var(--accent)}
.section-block p{font-size:16px;line-height:1.9;margin-bottom:14px;letter-spacing:.2px}
.section-block h4{font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:22px 0 8px;text-transform:uppercase;letter-spacing:var(--label-ls);font-family:var(--sans)}
.section-block .s-list{margin:8px 0;padding:0;list-style:none}
.section-block .s-list li{font-size:15px;line-height:1.8;padding:5px 0;position:relative;font-weight:var(--body-weight);letter-spacing:var(--list-ls);border-bottom:1px solid color-mix(in srgb,var(--border),transparent 50%)}
.section-block .s-list li:last-child{border-bottom:none}
.section-block .s-list.pro li{padding-left:20px}
.section-block .s-list.pro li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-block .s-stat{display:flex;gap:0;margin:14px 0;border:1px solid var(--border)}
[data-theme="dark"] .section-block .s-stat .st:first-child{border-left:1px solid var(--accent)}
.section-block .s-stat .st{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.section-block .s-stat .st:last-child{border-right:none}
.section-block .s-stat .sv{font-family:var(--stat-sv-font);font-size:var(--stat-sv-size);color:var(--bright);font-weight:var(--stat-sv-weight);letter-spacing:var(--stat-sv-ls)}
.section-block .s-stat .sl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans)}
.section-block .s-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.section-block .s-chip{font-family:var(--mono);font-size:10px;color:var(--dim);display:inline-block;border:1px solid var(--border);padding:3px 10px;letter-spacing:var(--chip-ls);font-weight:var(--body-weight)}
.section-block code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.right{width:50%;min-width:0;height:100vh;overflow-y:auto;background:var(--right-bg);border-left:1px solid var(--border);transition:all .45s cubic-bezier(.4,0,.2,1);position:relative}
.right.closed{width:0;min-width:0;border-left:none;overflow:hidden}
[data-theme="light"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#2e6ab406,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#9b7aed04,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="light"] .right.closed::before{opacity:0}
[data-theme="dark"] .right::before{content:'';position:fixed;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse 60% 40% at 80% 20%,#9b7aed06,transparent),radial-gradient(ellipse 50% 50% at 20% 80%,#4ee8d004,transparent);pointer-events:none;z-index:0;transition:opacity .3s}
[data-theme="dark"] .right.closed::before{opacity:0}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
[data-theme="dark"] .right::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0;opacity:.3}
.right-topbar{position:sticky;top:0;z-index:10;background:var(--right-bg);padding:10px 44px 0;font-family:var(--sans);height:56px;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px dotted transparent;transition:border-color .3s ease}
.right-topbar::after{content:'';position:absolute;top:100%;left:0;width:100%;height:10px;background:radial-gradient(50% 100% at 50% 0%,var(--topbar-glow) 0%,transparent 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.right-topbar.scrolled{border-bottom-color:color-mix(in srgb,var(--border) 50%,transparent)}
.right-topbar.scrolled::after{opacity:1}
.right-topbar .sticky-title{font-size:12px;color:var(--bright);font-weight:var(--heading-weight);letter-spacing:.3px;opacity:0;transform:translateY(-4px);transition:opacity .2s,transform .2s;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right-topbar .sticky-title.visible{opacity:1;transform:translateY(0)}
.right-inner{padding:0 44px 80px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.detail{display:none;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{margin-bottom:32px;display:block}
.detail-header .num{font-family:var(--sans);font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;margin-bottom:6px;letter-spacing:var(--label-ls);text-transform:uppercase;font-weight:var(--label-weight)}
.detail-header .num svg{display:block}
.detail-header h2{font-family:var(--serif);font-size:var(--detail-h2-size);font-weight:var(--heading-weight);color:var(--bright);line-height:1.25;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:var(--heading-ls)}
.detail-header h2 em{font-style:italic;color:var(--accent)}
.detail p{font-size:16.5px;line-height:2;margin-bottom:18px;font-family:var(--serif);font-weight:400;letter-spacing:.2px}
.detail h3{font-family:var(--sans);font-size:10px;font-weight:var(--label-weight);color:var(--accent);margin:32px 0 12px;text-transform:uppercase;letter-spacing:var(--label-ls);display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail h3::before{display:none}
.detail code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:1px;color:var(--accent);font-weight:var(--code-weight)}
.detail pre{background:var(--bg);border:1px solid var(--border);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto;margin:16px 0;color:var(--text);font-weight:var(--body-weight)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.feat{padding:18px 20px 18px 0;border-bottom:1px solid var(--border);background:none}
.feat:nth-child(2n){padding-left:20px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .feat{border-color:color-mix(in srgb,var(--border),transparent 40%)}
.feat:hover{background:var(--bg)}
[data-theme="dark"] .feat:hover{background:color-mix(in srgb,var(--accent),transparent 97%)}
.feat h4{font-family:var(--serif);font-size:var(--feat-h4-size);font-weight:var(--heading-weight);color:var(--bright);margin-bottom:6px;font-style:italic;letter-spacing:var(--feat-h4-ls)}
.feat p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.7;font-family:var(--sans);font-weight:var(--body-weight)}
.verdict{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:16px 0;border-top:1px solid var(--border)}
.v-col{padding:18px 18px 18px 0;background:none;border:none;border-radius:0}
.v-col:last-child{padding-left:18px;padding-right:0;border-left:1px solid var(--border)}
[data-theme="dark"] .v-col:last-child{border-color:color-mix(in srgb,var(--border),transparent 40%)}

<script>

const sections = [
  { num: '01', short: 'Premise', title: 'The <em>Astrophage</em> Crisis' },
  { num: '02', short: 'Ryland Grace', title: 'The <em>Reluctant</em> Hero' },

const summaries = [
  `<p>In the near future, scientists observe the Sun dimming. A faint infrared line\u2014the Petrova line\u2014connects the Sun to Venus, and a parasitic microorganism called Astrophage is identified as the cause. These single-celled organisms absorb stellar energy, breed on CO\u2082-rich planets, and spread between stars, threatening an extinction-level ice age on Earth.</p><p>The crisis is not unique to our solar system. Multiple nearby stars are dimming. But one star, Tau Ceti, 12 light-years away, appears immune. Understanding why becomes humanity\u2019s only hope\u2014and the foundation for the desperate interstellar mission that gives the novel its name.</p><div class="s-stat"><div class="st"><div class="sv">12 ly</div><div class="sl">Distance to Tau Ceti</div></div><div class="st"><div class="sv">~10%</div><div class="sl">Solar dimming</div></div><div class="st"><div class="sv">1 cell</div><div class="sl">Astrophage size</div></div><div class="st"><div class="sv">8 ly</div><div class="sl">Max spread range</div></div></div><div class="s-chips"><span class="s-chip">extinction event</span><span class="s-chip">stellar parasite</span><span class="s-chip">petrova line</span><span class="s-chip">interstellar biology</span></div>`,

  `<p>Dr. Ryland Grace is a junior high school science teacher\u2014and a former molecular biologist who left academia over a controversial paper on non-water-based life. He wakes up alone aboard the starship Hail Mary with total amnesia, two dead crewmates, and a robotic medical system keeping him alive.</p><p>The novel\u2019s dual timeline unfolds through Grace\u2019s recovering memories: flashbacks reveal how he was recruited by Eva Stratt to study Astrophage, made key scientific breakthroughs, and was ultimately forced onto a suicide mission he never volunteered for. His character arc moves from self-preservation to radical sacrifice.</p><div class="feat-grid"><div class="feat"><h4>The Amnesiac Narrator</h4><p>Grace\u2019s memory loss creates a mystery-box structure\u2014readers discover the mission alongside him.</p></div><div class="feat"><h4>Science Teacher Voice</h4><p>His instinct to explain makes complex science feel like an excited classroom lecture.</p></div><div class="feat"><h4>Reluctant Astronaut</h4><p>Unlike typical heroes, Grace was drugged and forced aboard\u2014making his eventual courage earned, not given.</p></div><div class="feat"><h4>Moral Evolution</h4><p>From a man who refused the mission to one who sacrifices his return home for an alien friend.</p></div></div>`,

  `<p>When Grace reaches Tau Ceti, a triangular alien craft approaches flashing at the Petrova wavelength. Its sole occupant\u2014a five-limbed, rock-skinned, eyeless engineer from 40 Eridani\u2014becomes the novel\u2019s emotional center. Grace names him Rocky. Their friendship is the beating heart of the book.</p><p>Rocky\u2019s species, the Eridians, breathe ammonia at 29 atmospheres of pressure and over 200\u00B0C. They perceive the world through echolocation, communicate in musical chords, and have no concept of relativity. Rocky has been orbiting Tau Ceti alone for 46 years. Their first contact unfolds through patient mimicry, model-building, and eventually a chord-to-English translator.</p><div class="s-stat"><div class="st"><div class="sv">46 yrs</div><div class="sl">Rocky\u2019s wait</div></div><div class="st"><div class="sv">291</div><div class="sl">Rocky\u2019s age (Earth yrs)</div></div><div class="st"><div class="sv">5</div><div class="sl">Limbs</div></div><div class="st"><div class="sv">689</div><div class="sl">Avg Eridian lifespan</div></div></div>`,

  `<p>Weir\u2019s approach: break exactly one law of physics (Astrophage\u2019s impossible energy storage via neutrino mechanics), then follow the consequences with ruthless internal consistency. The result is a novel where orbital mechanics, selective breeding, atmospheric chemistry, and relativistic travel all become genuine plot drivers.</p><p>The Hail Mary uses Astrophage itself as fuel\u2014the microbes emit directional infrared light for propulsion. The ship is streamlined for near-lightspeed travel through the interstellar medium, with Astrophage lining the hull as both radiation shielding and energy source. The spin-drive, centrifuge lab, and beetle probe system are all grounded in real physics principles.</p><div class="s-chips"><span class="s-chip">spin drives</span><span class="s-chip">astrophage fuel</span><span class="s-chip">xenonite</span><span class="s-chip">taumoeba</span><span class="s-chip">beetle probes</span><span class="s-chip">petrova wavelength</span></div>`,

  `<p>Eva Stratt is the ruthless pragmatist who runs Earth\u2019s response to the Astrophage crisis. Given unprecedented global authority, she commandeers resources, overrides sovereignty, and makes impossible decisions with cold efficiency. She is the novel\u2019s most morally complex figure\u2014the person willing to do what no one else will.</p><p>Stratt selects crews based on coma-survival genetics (1 in 7,000 candidates survive the 13-year induced sleep). When Grace\u2019s original crew dies in a lab accident shortly before launch, she forces the unwilling Grace aboard\u2014sedated and memory-wiped\u2014because he is the only person with the right combination of scientific skill and coma resistance.</p><div class="s-stat"><div class="st"><div class="sv">1:7000</div><div class="sl">Coma survival rate</div></div><div class="st"><div class="sv">13 yrs</div><div class="sl">Trip duration</div></div><div class="st"><div class="sv">3</div><div class="sl">Crew (2 died)</div></div><div class="st"><div class="sv">Global</div><div class="sl">Stratt\u2019s authority</div></div></div>`,

  `<p>At its core, Project Hail Mary is about what happens when survival requires more than self-interest. The novel layers its themes: individual survival vs. species survival, the universality of scientific curiosity, and the idea that friendship can transcend not just culture but biology itself.</p><p>Weir draws an implicit parallel between Astrophage\u2014a mindless organism following its biological imperative\u2014and the conscious moral choices made by intelligent beings. Both humans and Eridians choose to sacrifice for something larger than themselves. The novel argues that this capacity for choice is what defines intelligence.</p><ul class="s-list pro"><li>Friendship across radical biological difference as the novel\u2019s emotional engine</li><li>International cooperation under existential pressure as realistic backdrop</li><li>Scientific problem-solving as a mode of heroism\u2014not muscles, but methodology</li><li>The tension between individual survival instinct and species-level sacrifice</li></ul>`,

  `<p>The novel\u2019s climax forces Grace into an impossible choice. En route home to Earth, he discovers that the nitrogen-tolerant Taumoeba he bred can eat through xenonite\u2014the material that makes up Rocky\u2019s entire ship. Rocky\u2019s vessel is stranded, its Astrophage fuel consumed. Grace must choose: continue home to Earth, or turn back to save Rocky and the Eridian civilization.</p><p>Grace sends the beetle probes toward Earth with the Taumoeba samples, then turns the Hail Mary around. Sixteen years later, he is living on Erid, teaching science to young Eridians, while Rocky confirms that Earth\u2019s sun has returned to full luminance. Grace chose friendship over homecoming\u2014and both civilizations survived because of it.</p><div class="timeline"><div class="tl-item"><div class="tl-date">The Discovery</div><div class="tl-text">Taumoeba penetrates xenonite containers, consuming Rocky\u2019s Astrophage fuel</div></div><div class="tl-item"><div class="tl-date">The Choice</div><div class="tl-text">Grace launches beetle probes to Earth, turns ship around for Rocky</div></div><div class="tl-item"><div class="tl-date">16 Years Later</div><div class="tl-text">Grace lives on Erid, teaching Eridian children. Earth\u2019s sun recovers.</div></div></div>`,

  `<p>Published May 4, 2021, Project Hail Mary debuted at #3 on the New York Times bestseller list and won the Goodreads Choice Award for Best Science Fiction. It was a finalist for the 2022 Hugo Award for Best Novel. The audiobook, narrated by Ray Porter with melodic chord effects for Rocky\u2019s dialogue, won the 2022 Audie Award for Audiobook of the Year.</p><p>The film adaptation, starring Ryan Gosling and directed by Phil Lord and Christopher Miller, released March 20, 2026. Drew Goddard, who previously adapted Weir\u2019s The Martian, wrote the screenplay. The book has been recommended by both Bill Gates and Barack Obama, and has appeared on the NYT bestseller list for 40 consecutive weeks as of March 2026.</p><div class="s-stat"><div class="st"><div class="sv">2021</div><div class="sl">Published</div></div><div class="st"><div class="sv">2026</div><div class="sl">Film release</div></div><div class="st"><div class="sv">$3M</div><div class="sl">Film rights</div></div><div class="st"><div class="sv">40 wks</div><div class="sl">NYT bestseller</div></div></div>`
];

const DI = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="10" rx="1.5"/><line x1="3.5" y1="4" x2="8.5" y2="4"/><line x1="3.5" y1="6" x2="8.5" y2="6"/><line x1="3.5" y1="8" x2="6.5" y2="8"/></svg>';

const details = [
  `<div class="detail-header"><div class="num">${DI}Section 01 \u2014 Details</div><h2>The <em>Astrophage</em> Crisis</h2></div><p>The premise of Project Hail Mary begins with a real astronomical observation turned nightmare. Scientists notice the Sun\u2019s luminosity dropping\u2014not by the fractions of a percent that solar cycles produce, but by enough to trigger measurable cooling on Earth. The culprit: a faint infrared emission line connecting the Sun to Venus, discovered by Russian scientist Dr. Irina Petrova.</p><p>The Petrova line turns out to be a stream of single-celled organisms\u2014Astrophage\u2014migrating between the Sun and Venus. Each cell absorbs stellar energy until fully \u201Cenriched,\u201D then propels itself to a CO\u2082-rich planet to breed, consuming carbon dioxide in the process. The offspring migrate back to the star. This cycle, repeated trillions of times, dims the star measurably.</p><h3>How Astrophage Works</h3><p>Astrophage stores energy at densities that violate known thermodynamics. Weir\u2019s hand-wave: the organism\u2019s cell membrane interacts with neutrinos, allowing it to store and release energy at near-perfect efficiency. This single impossible conceit powers the entire novel\u2019s science. Everything else\u2014the propulsion system, the radiation shielding, the fuel mechanics\u2014follows logically from this one fictional leap.</p><div class="callout"><h4>The Panspermia Connection</h4><p>Weir solves a deep worldbuilding problem by placing life\u2019s single genesis event on Tau Ceti\u2019s planet Adrian. Four billion years ago, proto-Astrophage seeded outward, landing on Earth and Erid alike. This explains why human, Eridian, and Astrophage cellular biology share DNA-like structures\u2014all life traces back to one origin, and it was not Earth.</p></div><h3>The Spread Pattern</h3><p>Astrophage has a maximum interstellar range of about 8 light-years in spore form. From its origin at Tau Ceti, it spread to nearby stars in a chain: first to Epsilon Eridani, then outward to Sirius, 40 Eridani, and eventually to Sol. The spread follows a network of stellar neighbors, each within the 8-light-year radius\u2014a kind of slow-motion pandemic across the local stellar neighborhood.</p><div class="diagram-wrap"><svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#5b5bd6"/></marker></defs><circle cx="320" cy="60" r="8" fill="#0d9488" stroke="#14966e" stroke-width="1.5"/><text x="340" y="64" fill="#14966e" font-size="11" font-weight="500">Tau Ceti</text><text x="340" y="76" fill="#6e6b64" font-size="9">Origin \u00B7 Immune</text><circle cx="240" cy="130" r="6" fill="#5b5bd6" opacity="0.7"/><text x="254" y="134" fill="#5b5bd6" font-size="10">\u03B5 Eridani</text><circle cx="140" cy="100" r="6" fill="#5b5bd6" opacity="0.7"/><text x="108" y="94" fill="#5b5bd6" font-size="10" text-anchor="end">Sirius</text><circle cx="320" cy="180" r="7" fill="#7c3aed" opacity="0.7"/><text x="338" y="184" fill="#7c3aed" font-size="10">40 Eridani</text><text x="338" y="196" fill="#6e6b64" font-size="9">Rocky\u2019s home</text><circle cx="80" cy="200" r="8" fill="#e87040" stroke="#c05030" stroke-width="1.5"/><text x="46" y="196" fill="#e87040" font-size="11" font-weight="500" text-anchor="end">Sol</text><text x="46" y="208" fill="#6e6b64" font-size="9" text-anchor="end">Earth \u00B7 12 ly</text><line x1="314" y1="66" x2="248" y2="124" stroke="#5b5bd6" stroke-width="1" stroke-dasharray="4,3"><animate attributeName="stroke-dashoffset" from="0" to="-7" dur="1.5s" repeatCount="indefinite"/></line><line x1="234" y1="128" x2="148" y2="104" stroke="#5b5bd6" stroke-width="1" stroke-dasharray="4,3"><animate attributeName="stroke-dashoffset" from="0" to="-7" dur="1.5s" repeatCount="indefinite"/></line><line x1="246" y1="136" x2="322" y2="172" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"><animate attributeName="stroke-dashoffset" from="0" to="-7" dur="1.5s" repeatCount="indefinite"/></line><line x1="134" y1="104" x2="86" y2="194" stroke="#e87040" stroke-width="1" stroke-dasharray="4,3"><animate attributeName="stroke-dashoffset" from="0" to="-7" dur="1.5s" repeatCount="indefinite"/></line><rect x="20" y="244" width="360" height="26" rx="2" fill="#5b5bd6" fill-opacity="0.06" stroke="#5b5bd6" stroke-width="0.5" stroke-opacity="0.2"/><text x="200" y="261" text-anchor="middle" fill="#6e6b64" font-size="10">Astrophage spread: max 8 ly range \u00B7 Origin at Tau Ceti \u00B7 Chain infection</text></svg></div>`,

  `<div class="detail-header"><div class="num">${DI}Section 02 \u2014 Details</div><h2>The <em>Reluctant</em> Hero</h2></div><p>Ryland Grace\u2019s arc is one of the most unusual in science fiction. He is not a brave volunteer, not a military officer, not a chosen one. He is a middle-school science teacher who was once a molecular biologist\u2014until he published a paper arguing that life could exist without water as a solvent. The academic establishment rejected him. He retreated to teaching sixth-graders, where he found genuine happiness.</p><p>When Astrophage appears, Grace\u2019s discredited paper suddenly becomes relevant. Eva Stratt recruits him as a scientific advisor. He makes the critical early discoveries: identifying Astrophage\u2019s breeding cycle, its reliance on CO\u2082 atmospheres, and its potential as rocket fuel. But when the Hail Mary needs a crew member, Grace refuses. He explicitly does not want to die in space.</p><h3>The Amnesia Device</h3><p>Weir uses Grace\u2019s amnesia as a structural engine. The novel alternates between two timelines: Grace solving problems aboard the Hail Mary in the present, and flashbacks that gradually reveal the full scope of the Astrophage crisis, Stratt\u2019s machinations, and Grace\u2019s forced recruitment. The amnesia isn\u2019t just a plot device\u2014it mirrors the reader\u2019s own discovery process, creating a parallel between learning and remembering.</p><div class="callout"><h4>The Coward Who Became a Hero</h4><p>Grace\u2019s defining trait is that he did not choose this mission. He threatened sabotage. He was sedated. He woke up with no memory. And yet, when faced with the ultimate choice\u2014return home or save Rocky\u2014he chooses sacrifice. His heroism is not innate; it is grown through 400 pages of problem-solving, friendship, and the slow realization that some things matter more than survival.</p></div><h3>Grace as Narrator</h3><p>Grace\u2019s voice is what makes the hard science accessible. He is fundamentally a teacher, and his inner monologue naturally explains concepts as if to a classroom. This is Weir\u2019s most elegant trick: the narrator\u2019s profession justifies the exposition. When Grace works through Astrophage\u2019s absorption spectrum or Rocky\u2019s atmospheric requirements, he is not explaining to the reader\u2014he is thinking out loud the way a science teacher thinks.</p><div class="verdict"><div class="v-col pro"><h4>What makes him work</h4><ul><li>Humor under pressure\u2014self-deprecating, nerdy, never stoic</li><li>Genuine scientific methodology, not plot-convenient genius</li><li>Emotional honesty about fear, loneliness, and grief</li><li>The teaching instinct as character foundation</li></ul></div><div class="v-col con"><h4>Critiques</h4><ul><li>Some reviewers found his voice too similar to Mark Watney</li><li>A few problems solved with improbable luck or timing</li><li>Limited interiority beyond problem-solving mode</li></ul></div></div>`,

  `<div class="detail-header"><div class="num">${DI}Section 03 \u2014 Details</div><h2><em>First</em> Contact &amp; Rocky</h2></div><p>Rocky is widely regarded by readers and critics as the most memorable element of Project Hail Mary. A five-limbed, rock-skinned, Labrador-sized alien from the planet Erid in the 40 Eridani system, Rocky is blind to visible light, breathes ammonia at extreme heat and pressure, and communicates through five-chord musical phrases produced by internal air bladders vibrating across vocal cords. He is also an extraordinary engineer with a gentle personality and an endearing habit of expressing emotions through chord pitch.</p><p>The first-contact sequence is one of the novel\u2019s great achievements. There is no universal translator, no telepathy, no convenient shared language. Grace and Rocky begin with physical models, graduate to clocks and mathematical relationships, and eventually build an audio translation system. The process takes days of patient, methodical work\u2014and Weir renders every step believable.</p><h3>Eridian Biology</h3><p>Weir designed the Eridians as self-contained biospheres. They do not inhale or exhale\u2014they have an internal oxygen-to-CO\u2082 exchange system. Their pentasymmetrical body plan (five legs, five \u201Cfingers\u201D per hand, five vocal bladders) is arbitrary but consistently applied. They evolved on a world with an atmosphere so dense and opaque that visible light never reaches the surface, so they developed sophisticated echolocation instead.</p><div class="feat-grid"><div class="feat"><h4>Xenonite</h4><p>An Eridian super-material stronger than any human alloy\u2014used for chains, hull construction, and the critical atmospheric barrier.</p></div><div class="feat"><h4>No Concept of Relativity</h4><p>Eridians never discovered special relativity, leading to massive fuel overestimates\u2014which becomes a plot-saving advantage.</p></div><div class="feat"><h4>Chord Language</h4><p>Five simultaneous tones encode meaning. In the audiobook, Ray Porter voices Rocky with melodic sound effects.</p></div><div class="feat"><h4>Sleep Vulnerability</h4><p>Eridians cannot sleep alone\u2014they need another being present as a watcher. Rocky spent 46 years unable to properly rest.</p></div></div><h3>The Emotional Core</h3><p>What elevates the Grace-Rocky relationship beyond buddy-cop dynamics is its foundation in mutual intellectual respect and genuine vulnerability. When a hull breach nearly kills both of them, Rocky bursts through the xenonite barrier into Grace\u2019s lethal (to him) oxygen environment to save Grace\u2019s life. Grace later turns his entire ship around\u2014abandoning his only path home\u2014to rescue Rocky. Neither act is calculated. Both are instinctive.</p><div class="callout"><h4>Why Rocky Works</h4><p>Rocky is not humanized. He does not have human facial expressions, human body language, or human emotional patterns. His alienness is absolute and consistent. And yet readers consistently report strong emotional attachment to him. Weir achieves this by making Rocky\u2019s actions\u2014not his appearance\u2014legible: his patience, his engineering pride, his concern for Grace, his excitement at solving problems together. Character is behavior.</p></div>`,

  `<div class="detail-header"><div class="num">${DI}Section 04 \u2014 Details</div><h2><em>Hard</em> Science, Soft Rules</h2></div><p>Andy Weir\u2019s writing philosophy\u2014break one law of physics, then follow the consequences rigorously\u2014reaches its fullest expression in Project Hail Mary. The single break: Astrophage\u2019s cell membrane interacts with neutrinos, allowing it to store and emit energy at impossible densities. Everything else follows from real physics, chemistry, and biology.</p><h3>The Hail Mary Ship</h3><p>The spacecraft uses Astrophage as fuel. The organisms emit directional infrared light (at the \u201CPetrova wavelength\u201D) for propulsion\u2014essentially a biological photon drive. The spin drives leverage this emission for thrust, achieving near-lightspeed velocities. At peak velocity, the interstellar medium creates enough drag that the ship needs aerodynamic streamlining\u2014a detail astrophysicists have confirmed is plausible.</p><p>The crew section rotates to create artificial gravity via centripetal force for lab work. Astrophage lines the hull as a radiation shield, since its cell membrane blocks all electromagnetic radiation and even neutrinos. The ship carries four autonomous \u201Cbeetle\u201D probes\u2014named John, Paul, George, and Ringo\u2014designed to carry data back to Earth at mission\u2019s end.</p><div class="diagram-wrap"><svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e87040"/></marker></defs><path d="M60,110 L120,80 L320,80 L360,110 L320,140 L120,140 Z" fill="none" stroke="#5b5bd6" stroke-width="1.5"/><line x1="160" y1="80" x2="160" y2="140" stroke="#5b5bd6" stroke-width="0.8" stroke-dasharray="3,3"/><line x1="240" y1="80" x2="240" y2="140" stroke="#5b5bd6" stroke-width="0.8" stroke-dasharray="3,3"/><line x1="300" y1="80" x2="300" y2="140" stroke="#5b5bd6" stroke-width="0.8" stroke-dasharray="3,3"/><text x="90" y="114" text-anchor="middle" fill="#14966e" font-size="9" font-weight="500">SPIN</text><text x="90" y="124" text-anchor="middle" fill="#6e6b64" font-size="8">DRIVES</text><text x="200" y="108" text-anchor="middle" fill="#5b5bd6" font-size="9" font-weight="500">FUEL</text><text x="200" y="120" text-anchor="middle" fill="#6e6b64" font-size="8">Astrophage tanks</text><text x="270" y="108" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="500">LAB</text><text x="270" y="120" text-anchor="middle" fill="#6e6b64" font-size="8">Centrifuge 1g</text><text x="330" y="108" text-anchor="middle" fill="#0d9488" font-size="9" font-weight="500">CREW</text><text x="330" y="120" text-anchor="middle" fill="#6e6b64" font-size="8">Coma pods</text><line x1="58" y1="110" x2="20" y2="110" stroke="#e87040" stroke-width="2" marker-end="url(#arr2)"/><text x="14" y="100" fill="#e87040" font-size="9" text-anchor="end">IR thrust</text><rect x="340" y="145" width="40" height="16" rx="2" fill="none" stroke="#0d9488" stroke-width="0.8"/><text x="360" y="156" text-anchor="middle" fill="#0d9488" font-size="7">BEETLES \u00D74</text><text x="200" y="72" text-anchor="middle" fill="#9e9bac" font-size="8">\u2190 Astrophage radiation shielding layer \u2192</text><rect x="30" y="180" width="340" height="28" rx="2" fill="#5b5bd6" fill-opacity="0.06" stroke="#5b5bd6" stroke-width="0.5" stroke-opacity="0.2"/><text x="200" y="198" text-anchor="middle" fill="#6e6b64" font-size="9">Ship streamlined for near-c ISM drag \u00B7 1.5g accel \u00B7 4 subjective years</text></svg></div><h3>Taumoeba \u2014 The Solution</h3><p>The key discovery at Tau Ceti: a microorganism\u2014Taumoeba\u2014that preys on Astrophage, keeping the star\u2019s infection in check. Grace and Rocky must retrieve samples from the atmosphere of Adrian (Tau Ceti e), then selectively breed Taumoeba to survive in Venus\u2019s and Threeworld\u2019s atmospheres. The catch: both targets have nitrogen, which kills natural Taumoeba. The selective breeding for nitrogen tolerance takes days of intensive 1g lab work.</p><h3>What\u2019s Real vs. What\u2019s Fiction</h3><div class="verdict"><div class="v-col pro"><h4>Real Science</h4><ul><li>Tau Ceti and 40 Eridani are real star systems at correct distances</li><li>Centripetal artificial gravity is well-established physics</li><li>Relativistic time dilation calculations are accurate</li><li>ISM drag at near-lightspeed is a real engineering concern</li></ul></div><div class="v-col con"><h4>Fictional Leaps</h4><ul><li>Astrophage\u2019s neutrino-based energy storage violates thermodynamics</li><li>13-year induced coma would cause severe brain damage</li><li>Single-organism interstellar travel strains credulity on energy scales</li><li>Selective breeding timeline is extremely compressed</li></ul></div></div>`,

  `<div class="detail-header"><div class="num">${DI}Section 05 \u2014 Details</div><h2><em>Stratt</em> &amp; the Earth Response</h2></div><p>Eva Stratt is arguably the most interesting character who never leaves Earth. A Dutch bureaucrat given sweeping global authority by the UN to manage the Astrophage crisis, she embodies a specific kind of moral calculus: the person who will make every terrible decision so that others don\u2019t have to. She commandeers national resources, overrides objections, and treats individual rights as subordinate to species survival.</p><p>Weir uses Stratt to explore a question the novel never quite resolves: was she right? She forces an unwilling man onto a suicide mission. She administers amnesia-inducing drugs. She makes decisions that would be war crimes in peacetime. And yet, without her ruthlessness, humanity would have been extinct. The novel presents her without judgment, allowing the reader to grapple with the ethics.</p><h3>The Mission Architecture</h3><p>Under Stratt\u2019s direction, Earth\u2019s response is brutally pragmatic. The \u201Cblack panel\u201D program mass-breeds Astrophage as fuel using solar panels in orbit. Crew candidates are screened for the rare genetic trait that allows survival through extended coma\u2014a 1-in-7,000 occurrence. The mission is explicitly one-way: there is only enough fuel for the outbound trip. The beetle probes, not the crew, are designed to bring information home.</p><div class="callout"><h4>The DuBois-Shapiro Accident</h4><p>A catastrophic lab error\u2014a supply mix-up that provided a milligram of Astrophage instead of a nanogram\u2014vaporized the lab and killed the original crew candidates. With launch windows closing, Stratt had no choice but to conscript Grace. This accident is the fulcrum on which the entire plot turns.</p></div><h3>Global Cooperation Under Duress</h3><p>One of the novel\u2019s more optimistic elements is its depiction of global cooperation. Faced with extinction, national rivalries dissolve. The crew includes Commander Yao Li-Jie (Chinese), Olesya Ilyukhina (Russian), and Grace (American). Stratt\u2019s authority transcends national sovereignty not because nations agreed philosophically, but because the alternative was death.</p><div class="security-box"><h4>The Ethical Dilemma</h4><p>Stratt\u2019s actions raise a question the novel deliberately leaves open: can forced sacrifice be justified if the stakes are total extinction? Grace did not consent. He was drugged, transported, and memory-wiped. Whether this makes her a villain or a savior depends entirely on the reader\u2019s moral framework.</p></div>`,

  `<div class="detail-header"><div class="num">${DI}Section 06 \u2014 Details</div><h2><em>Sacrifice</em>, Survival &amp; Connection</h2></div><p>Project Hail Mary operates on multiple thematic registers simultaneously. On the surface, it is a survival narrative\u2014a person alone in space solving problems to stay alive. Below that, it is a first-contact story about communication across radical difference. And at its deepest level, it is a meditation on what it means to choose others over yourself.</p><h3>Survival as Universal Drive</h3><p>Weir draws an elegant parallel between Astrophage, Eridians, and humans. All three are driven by survival\u2014but Astrophage operates on pure biological imperative, while intelligent beings can choose to override instinct for moral reasons. Grace\u2019s arc traces this progression: from instinctive self-preservation to conscious self-sacrifice. The novel suggests that this capacity for moral override is what separates intelligence from mere life.</p><h3>Friendship Across Difference</h3><p>The Grace-Rocky relationship deliberately inverts the usual first-contact trope. There is no conflict, no territorial dispute, no cultural misunderstanding escalating to violence. Instead, two scientists from radically different biologies immediately recognize each other as problem-solvers and collaborators. Their friendship is built not on similarity but on shared purpose and mutual respect for competence.</p><div class="callout"><h4>Astrophage as Climate Allegory</h4><p>Several commentators have noted the parallel between Astrophage and climate change: a slow-moving, scientifically observable threat that requires global cooperation and individual sacrifice to address. The dimming sun is not dramatic\u2014it is gradual, measurable, and deniable until it is catastrophic. Weir has neither confirmed nor denied this reading.</p></div><h3>Science as Heroism</h3><p>Project Hail Mary belongs to a lineage of fiction where the hero\u2019s weapon is methodology, not muscles. Grace does not fight anyone. He does not fire a weapon. He solves problems: isolating variables, running experiments, testing hypotheses. The novel makes the scientific method itself heroic.</p><h3>The Cost of Pragmatism</h3><p>Stratt\u2019s subplot complicates the novel\u2019s optimism. Yes, global cooperation saved humanity. But it required a single person with absolute authority making morally indefensible choices. Grace\u2019s sacrifice is freely chosen and redemptive. Stratt\u2019s choices are coerced and morally ambiguous. The novel holds both truths without resolving the tension\u2014one of its most sophisticated moves.</p>`,

  `<div class="detail-header"><div class="num">${DI}Section 07 \u2014 Details</div><h2>The <em>Choice</em> That Defines Everything</h2></div><p>The final act pivots on a discovery that transforms the entire mission\u2019s moral calculus. Grace and Rocky have succeeded: they have bred nitrogen-tolerant Taumoeba, divided the samples for both civilizations, and said their goodbyes. Grace is heading home. Rocky is heading to Erid. The mission is complete.</p><p>Then Grace discovers that the nitrogen-tolerant Taumoeba have developed the ability to eat through xenonite\u2014the material that makes up Rocky\u2019s entire ship. The Blip-A\u2019s Astrophage fuel supply is being consumed. Rocky is stranded, and Erid\u2019s civilization will die unless someone helps.</p><h3>The Decision</h3><p>Grace faces a binary choice with no compromise. He can continue to Earth, deliver the Taumoeba via beetle probes, and save humanity\u2014but Rocky and all Eridians will die. Or he can turn the Hail Mary around, rescue Rocky, and deliver the solution to Erid\u2014but he will never return home.</p><p>He sends the beetles toward Earth. Then he turns around.</p><div class="callout"><h4>Why This Works</h4><p>The ending earns its emotional power because Grace was established, from the very first flashback, as a man who did not want to sacrifice himself. He refused the mission. He threatened sabotage. He was kidnapped. The person who turns the ship around is not the same person who tried to flee Earth. Three hundred pages of problem-solving alongside Rocky have changed him\u2014not through grand epiphany, but through the accumulated weight of shared work and genuine affection.</p></div><h3>The Epilogue</h3><p>Sixteen years later, Grace is alive on Erid. The Eridians, using a digital archive of human knowledge that Rocky brought aboard, have built him a livable environment and synthetic food. Rocky tells him that Earth\u2019s sun has returned to full brightness\u2014the beetle probes reached home, and the Taumoeba worked. Grace\u2019s sacrifice saved both civilizations.</p><p>The novel\u2019s final image: Grace in a classroom of young Eridians, teaching them science. The man who was a teacher before any of this began ends his story doing what he always loved\u2014just on a different planet, for a different species. It is the most emotionally satisfying ending Andy Weir has ever written.</p><h3>The Alternate Ending</h3><p>Weir has discussed in interviews that the original ending had Grace dying on the return trip, his sacrifice complete but his survival unresolved. His editor pushed for the Erid epilogue, and Weir agreed it was stronger. The optimistic ending does not diminish the sacrifice\u2014Grace still gave up Earth, his species, everything familiar. But it affirms that sacrifice can lead somewhere worth being.</p>`,

  `<div class="detail-header"><div class="num">${DI}Section 08 \u2014 Details</div><h2><em>Reception</em>, Film &amp; Legacy</h2></div><p>Project Hail Mary arrived in May 2021 as Weir\u2019s redemption arc after the mixed reception of Artemis (2017). Critics and readers alike recognized it as a return to form\u2014and in many ways, a surpassing of The Martian. The novel combines everything Weir does well (problem-solving, humor, accessible science) with emotional depth and alien-contact ambition that The Martian never attempted.</p><h3>Critical Reception</h3><p>The response was overwhelmingly positive. Kirkus gave it a starred review. The New York Times called it an engaging space odyssey. Blake Crouch declared it destined to become a classic. Mary Robinette Kowal, writing in the Washington Post, praised the science and character work while noting that some problems could have been avoided with basic checklists.</p><div class="feat-grid"><div class="feat"><h4>Goodreads Choice Award</h4><p>Won Best Science Fiction in 2021, competing against a strong field including Klara and the Sun.</p></div><div class="feat"><h4>Hugo Finalist</h4><p>Shortlisted for the 2022 Hugo Award for Best Novel\u2014the genre\u2019s most prestigious prize.</p></div><div class="feat"><h4>Audie Award Winner</h4><p>Ray Porter\u2019s narration, with Rocky\u2019s musical chord effects, won Audiobook of the Year in 2022.</p></div><div class="feat"><h4>Cultural Endorsements</h4><p>Recommended by Bill Gates and Barack Obama in their respective 2021 reading lists.</p></div></div><h3>The Film Adaptation</h3><p>MGM acquired the film rights for $3 million in early 2020, before the book was published. Ryan Gosling signed on to star and produce. Drew Goddard, who adapted The Martian, wrote the screenplay. Phil Lord and Christopher Miller directed. The film released March 20, 2026, with Sandra H\u00FCller in a key role.</p><p>The adaptation required solving a fundamental challenge: Rocky has no face, no eyes, and communicates in musical chords. Puppet designer James Ortiz created a practical puppet that early reviews have called the film\u2019s breakout performance.</p><h3>Weir\u2019s Evolution</h3><div class="timeline"><div class="tl-item"><div class="tl-date">2011</div><div class="tl-text">The Martian self-published online, later acquired by Crown Publishing</div></div><div class="tl-item"><div class="tl-date">2015</div><div class="tl-text">Ridley Scott\u2019s The Martian film grosses $630M worldwide</div></div><div class="tl-item"><div class="tl-date">2017</div><div class="tl-text">Artemis published to mixed reviews\u2014a lunar heist novel that lacked The Martian\u2019s warmth</div></div><div class="tl-item"><div class="tl-date">2021</div><div class="tl-text">Project Hail Mary published\u2014widely considered Weir\u2019s best work</div></div><div class="tl-item"><div class="tl-date">2026</div><div class="tl-text">Film adaptation releases, book returns to NYT bestseller for 40th week</div></div></div><div class="callout"><h4>What Project Hail Mary Changed</h4><p>Weir\u2019s novel demonstrated that hard science fiction\u2014with real equations, real stellar distances, and real atmospheric chemistry\u2014can also be deeply emotional, laugh-out-loud funny, and universally accessible. It proved that the audience for rigorous science and genuine feeling is far larger than publishing typically assumes.</p></div>`
];

    .ctrl-btn.audio-ctrl.playing{color:var(--accent)}
    .ctrl-btn.audio-ctrl.playing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    .audio-bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:6px 24px;background:color-mix(in srgb,var(--bg2) 85%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 -2px 12px #00000010;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .audio-bottom.visible{transform:translateY(0);pointer-events:auto}
    .audio-bottom audio{height:32px;flex:1;min-width:0;border-radius:0;filter:contrast(.9)}
    .audio-bottom .audio-dismiss{cursor:pointer;color:var(--dim);font-size:13px;padding:4px 8px;border:none;background:none;font-family:var(--sans);letter-spacing:.5px;transition:color .2s}
    .audio-bottom .audio-dismiss:hover{color:var(--accent)}
    [data-theme="dark"] .audio-bottom audio{filter:invert(1) contrast(.85) hue-rotate(180deg)}
  `;
  document.head.appendChild(css);

  // 2. Inline audio bar — insert after masthead-sub
  var bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = '<audio id="audio-main" controls preload="none" src="'+MP3+'"></audio>';
  var sub = document.querySelector('.masthead-sub');
  if(!sub) sub = document.querySelector('.masthead-rule');
  if(sub) sub.parentNode.insertBefore(bar, sub.nextSibling);

  // 3. Mini button in ctrl-group
  var miniBtn = document.createElement('button');
  miniBtn.className = 'ctrl-btn audio-ctrl';
  miniBtn.title = 'Play audio';
  miniBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  var ctrlGroup = document.getElementById('ctrl-group');
  if(ctrlGroup) ctrlGroup.insertBefore(miniBtn, ctrlGroup.firstChild);

  // 4. Sticky bottom bar
  var bottomBar = document.createElement('div');
  bottomBar.className = 'audio-bottom';
  bottomBar.innerHTML = '<audio id="audio-bottom-el" controls preload="none" src="'+MP3+'"></audio><button class="audio-dismiss" id="audio-bottom-dismiss">\u2715</button>';
  document.body.appendChild(bottomBar);

  var mainAudio = document.getElementById('audio-main');
  var bottomAudio = document.getElementById('audio-bottom-el');
  var bottomDismiss = document.getElementById('audio-bottom-dismiss');
  if(!mainAudio||!bottomAudio) return;

  var isCompact = false, dismissed = false;
  var head = document.querySelector('.main-head');

  if(head){
    new MutationObserver(function(){
      isCompact = head.classList.contains('compact');
      miniBtn.style.display = isCompact ? 'flex' : 'none';
      if(isCompact && !bottomAudio.paused && !dismissed) bottomBar.classList.add('visible');
      if(!isCompact){
        if(!bottomAudio.paused){
          mainAudio.currentTime = bottomAudio.currentTime;
          bottomAudio.pause();
          mainAudio.play();
        }
        bottomBar.classList.remove('visible');
      }
    }).observe(head, {attributes:true, attributeFilter:['class']});
  }

  mainAudio.addEventListener('play', function(){
    miniBtn.classList.add('playing'); dismissed = false;
    if(isCompact){
      bottomAudio.currentTime = mainAudio.currentTime;
      mainAudio.pause(); bottomAudio.play();
      bottomBar.classList.add('visible');
    }
  });
  mainAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  mainAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); });

  bottomAudio.addEventListener('play', function(){ miniBtn.classList.add('playing'); });
  bottomAudio.addEventListener('pause', function(){ miniBtn.classList.remove('playing'); });
  bottomAudio.addEventListener('ended', function(){ miniBtn.classList.remove('playing'); bottomBar.classList.remove('visible'); });

  miniBtn.addEventListener('click', function(){
    dismissed = false;
    if(bottomAudio.paused && mainAudio.paused){ bottomAudio.play(); bottomBar.classList.add('visible'); }
    else if(!bottomAudio.paused) bottomAudio.pause();
    else if(!mainAudio.paused) mainAudio.pause();
  });

  bottomDismiss.addEventListener('click', function(){
    bottomAudio.pause(); bottomBar.classList.remove('visible'); dismissed = true;
  });
})();
</script>
